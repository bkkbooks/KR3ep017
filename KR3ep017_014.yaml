body:
  text: 卷十四膈張子和治遂平李官人妻咽中如物塞食不下中滿他醫治之不效診其脈曰此痰膈也內經曰三陽結為膈王啟玄又曰格陽雲陽盛之極故食格拒而不入先以通經散越其一半後以舟車丸下之凡三次食已下又以瓜蒂散再越之健啖如昔日矣王思中治鹽院某行部至常州病膈症不起諸太醫麏集皆技窮王至曰此是關而非膈可治也乃以半夏曲一兩為君製劑與服不半月動履如常吳江縣誌章良玉老年得關格症醫藥不效殊無起色偶道人過門索食其子食之頃曰汝家何事奔皇乃爾語之故且延視之道人曰勿慮而翁今日可不死矣令人從我去其子即偕至三山門外小茅庵中道人出囊中藥草一束悉以付之曰此通腸接骨草也四月發芽百日枯多生於觀音山早向陽晚受陰狀似益母梗方而凹綠葉如芸採得汁一盞便活一人此則去年所收乾者可將若干放砂罐內用一大盂水煎歸如法治以進父服三碗果神效及走謝已行矣此草尚有半又轉以活上河一徐姓者考本草無所謂通腸接骨草也續金陵瑣事此條似屬可刪但世間實有治噎草藥用之如神今形狀悉具可以按形而索倘遇識者誠活人至寶也故存之至草藥多隨口起名必欲執本草以求之拘矣一貧叟病噎膈食入即吐胸中刺痛或令取韭汁入鹽梅滷汁少許細呷得入漸加此條乃真噎症治法亦佳忽吐稠涎數升而愈此亦仲景治胸痹用薤白皆取其辛溫能散胃脘痰飲惡血之義也本草綱目薛立齋治一婦人患膈症胸膈痞悶以此屬脾經血虛遂用四君芎歸調補脾氣尋愈又因怒兼兩脅痞悶頭目不清月經旬余未竭用加味逍遙散加鉤藤治之復瘥一婦人患膈病胸膈作痛面青目札小便頻數或時寒熱此肝氣滯而血凝先用失笑散二服痛止又用加味逍遙散而愈陳三農治一老人患膈氣飲食不下大便乾燥六脈浮大而硬用烏藥四分小茴香一錢研末肉湯調下二錢飲食即進三服後用烏藥三分陳皮蘇梗杏仁各五分苡仁錢半煎服而愈一中年婦患梅核氣用二陳加芎歸梔連枳實烏藥栝蔞旋覆花香附桔梗十數劑而愈山氏患咽喉噎塞如梅核時時噯氣足冷如冰用散結化痰湯十數劑罔效細思之此陰火也三陰至項而還陰虛火炎故噯氣咽塞足冷耳用滋陰清膈飲數劑諸症悉愈一士膈噎嘔吐或與清火或與疏通或與化痰散郁之藥半載愈甚陳曰氣口無力兩尺遲緩脾腎交虛之候也脾虛則升降失職而痰起中焦腎虛則真火衰微食難運化與白朮五錢炒焦色半夏二錢炮姜二錢沉香一錢二劑而愈孫文垣治張溪亭乃眷喉中梗梗有肉如炙臠吞之不下吐之不出鼻塞頭暈耳常啾啾不安汗出如雨心驚膽怯不敢出門稍見風則遍身疼火盛而鬱者多畏風畏寒小腹時痛小水淋澀而疼皆鬱火為患脈兩尺皆短兩關滑大右關尤摶指孫曰此梅核症也以半夏四兩厚朴一錢蘇葉一錢茯苓一錢三分姜三片水煎食後服每用此湯調理多效按梅核症乃鬱怒憂思七情大傷乃成此病案中所敘無非木燥火炎之候乃以燥克之劑成功合前陳三農案大同小異或當時病人質厚故耳香燥之劑暫能開氣故即愈但久則必復特案中不肯敘及耳非緣病人質厚也臧少庚年五十每飲食胸膈不順利覺喉中哽哽宛轉難下大便燥結內熱肌肉漸瘦醫與五香連翹湯五膈丁香散不效孫脈之其色蒼黑兩目炯炯不眊可治惟氣促骨立其脈左弦大右滑大曰據脈乃謀而不決氣鬱成火脾志不舒致成痰涎因而血少便燥內熱肌消張雞峰有言膈乃神思間病即是推之當減思慮斷色欲薄滋味絕妄想俾神思清淨然後服藥有功以桂府滑石六兩甘草一兩真北白芥子蘿蔔子射干連翹各一兩半辰砂五錢以竹茹四兩煎湯打饅頭糊為丸綠豆大每食後及夜用燈心湯送下一錢一日三服終劑而愈易思蘭治一人患膈滿其症胸膈胃脘飽悶臍下空虛如飢不可忍腰腿痠痛坐立戰搖大便燥結每日雖進清粥一二鍾食下嘔酸吐水醋心眾作膈治二年不效診得左右寸關俱沉大有力兩尺自浮至沉三候俱緊按之無力有搖擺之狀此氣膈病也須開導其上滋補其下兼而行之可也遂以暢胃舒中湯投之制之香附蒼朮貝母各八分蘇梗連翹各五分撫芎六分神麯沙參各一錢桔梗四分南木香半分大劑煎徐徐呷之每日空心服八味丸百粒服二日噯氣連聲後亦出濁氣五日可以坐立啖飯二碗服至二七動履如常喻嘉言治倪慶病膈氣十四日粒米不入口始吐清水次吐綠水次吐黑水次吐臭水呼吸將絕醫已歇手喻適診之許以可救渠家不信喻曰盡今日晝夜先服理中湯六劑不令其絕來早轉方一劑全安渠家曰今已滴水不食安能服藥六劑曰但得此等甘溫入口必喜而再服也渠諸子或庠或弁頗識理析僉曰既有妙方何不即投必先與理中此何意也曰金匱云病人噫氣不除者旋覆代赭石湯主之吾於此病分別用之者有二道一者以黑水為胃底之水臭水為腸中之水此水且去則胃中之津液久已不存不敢用半夏以燥其胃也一者以將絕之氣止存一絲以代赭墜之恐其立斷先用理中然後代赭得以建奇奏績一時之深心即同千古之已試也及簡仲景方見方中只用炮姜而不用幹姜又謂乾薑比半夏更燥而不敢用曰今所噫者下焦之氣也所嘔者腸中之水也陰乘陽位加以日久不食諸多蛔蟲必上居膈間非乾薑之辣則蛔不下轉而上氣亦不必下轉妙處正在此君曷可泥哉服之果再索藥三劑後能言云內氣稍接但恐太急俟天明再服後日轉方為妥次早旁議交沮後三劑不肯服矣乃持前藥一盞勉令服之曰立地轉方頃刻見效何如乃用旋覆花一味煎湯調代赭石末二匙與之才入口病者曰好藥吾氣已轉入丹田矣二劑胸腹頓爽已有起色因觸冷氣復嘔與前藥立止思粥令食半盞飢甚竟食二盞少頃已食六盞復嘔與前藥立止又因動怒以物擊婢復嘔與前藥立止以後不復嘔但精神困倦之極服補藥二十劑丸藥一斤將息二月始能出門方悔從前少服理中二劑耳李士材治張邑宰婦憂悶之餘得食輒噎胸中隱隱作痛診之脈緊且滑曰痰在上脘用二陳加薑汁竹瀝或曰半夏不燥乎曰濕痰中滿非此不治遂用四劑病尚不減改大半夏湯服四帖胸痛乃止又四帖而噎亦減服二十劑而安若泥半夏為燥而以他藥代之豈能愈乎惟痰不盛形不肥者不宜與服也凡用半夏者宜審之方春和年近五旬多欲善怒患噎三月日進粉飲一鍾腐漿半鍾且吐其半六脈細軟此虛寒之候也用理中湯加人乳薑汁白蜜半夏一劑便減十劑而進糜粥更以十全大補加竹瀝薑汁四十帖諸症皆愈一人膈噎不通渣質之物不能下咽惟以人乳醇酒數杯吐沫不已李曰口吐白沫法在不治脈猶未敗姑冀萬一用人參黃耆當歸白朮陳皮桃仁牛乳白蜜薑汁連進十劑白沫漸少倍用參術三月全安一人二十三歲以鼓盆之戚悲哀過度不能食飯又十餘日粥亦不能食隨食隨吐二便閉塞自謂必死診之脈按有力非死症也以酒蒸大黃加桃仁當歸砂仁陳皮蜜丸與服凡五服下燥矢乾血甚多病若失矣數日之間能食倍常張孟端夫人憂憤交乘食下輒噎胸中隱隱痛陽脈滑而陰脈搏痰血互凝之象以二陳湯加歸尾桃仁鬱金五靈脂四劑未效因思人參與五靈脂同用善於浚血即以前劑入人參三錢倍用五靈脂再劑血從大便而出十劑噎止彌月而愈人參與五靈脂並用非明於奇變者不可金元之之內患噎膈胸腹奇痛經阻醫認瘀血察其脈細為氣衰沉為寒痼況自下及上處處皆痛明非血矣用參耆白朮木香薑桂煎成和醇酒進之甫入口便快服理中湯半月而瘥以上二案醫通妙入張路玉治朱彥真酒膈嘔逆不食每日惟痛飲熱酒一二觥少頃即作酸嘔出膈間大痛雜治經年不效良由平昔好飲熱酒所致即丹溪所謂好飲熱酒死血留胃口之候授以人參散方用人參一兩煎成加麝香半分雄按麝兼能敗酒冰片三釐三劑便能進食蓋片麝善散胃口之痰與瘀血耳十劑後改服柏子仁湯半月而安二方出自云岐人多未知每以予為尚異何可為之辨耶沈錫蕃平昔大便燥結近患噎膈不能安穀者月餘雖素稟豐腴近來面色皎白大非往昔時方穀雨正此症危殆之際診得六脈沉澀按久則衰幸舉指則應為疏六君子湯下一味狗寶作散調服甫十劑嘔止食進再十劑穀肉漸安更十劑起居如故惟大便尚艱以六味丸去澤瀉加芎歸首烏作湯月餘便溺自如秋深更服八味丸而安大抵噎膈之人體肥痰逆者可治枯瘠津衰者不可治同道王公峻患此稟氣病氣與沈氏相類誤信方士專力委之致不起顧人月亦患此自謂脹急不當用參日服仙人對坐草而斃瘦人亦間有可療者秦伯源患此形神枯槁神志抑鬱且湯藥無資予門人鄒恆友令其用啄木鳥入麝熬膏時嗅其氣以通結內服逍遙散加香砂以散郁不數劑頓瘳後陳君亦用此法而愈又一農人噎膈不食時嘔清涎如赤豆沙水此屬血瘀可知誤用消克破氣藥致絕粒不食用桂苓飲加當歸桃仁丹皮牛膝用熬枯黑糖和蟲漿調服下溏黑如汙泥者甚多俞東扶曰石頑治病喜用古方而雜以新藥能生後學智慧如此數條雖皆昔賢成法無甚精義亦足以廣識見然金匱只有反胃湯藥不載噎膈情形豈真正膈症雖醫中之聖亦無法以治之耶張路玉曰王御九仲君因驚恐受病時方晚膳即兀兀欲吐而不得出遂絕粒不食而起居自如向後醇酒膏粱略無阻礙惟穀氣毫不可犯犯之輒吐醫不知為何病補瀉雜陳牛黃狗寶虎肚貓胞總無一驗數月來濕面亦得相安延及八月偶遇一人謂言此病非藥可除令用生鵝血乘熱飲之一服便安此雖未見方書生鵝血能化堅癖見江案心脾痛門揆之於理諒無妨礙一陽之夜遂宰一鵝取血熱飲下咽汩汩有聲忍之再三少頃嘔出瘀血升許中有血塊數枚是夜小試稀糜竟不吐其後漸能用飯從少至多不藉湯藥而安此即血膈症馬元儀治王客六旬外患關格上不得食下不得便口燥胸滿已一月診其兩脈俱虛而澀此因脾胃之氣鬱而不宣郁久成火消鑠津液升降失常上下不交而成痞塞治法宜宣通肺郁則清肅下行而燥火可除滋養胃源則精液四布而升降自如矣用紫菀五分蔞仁五錢枳殼桔梗杏仁蘇子半夏曲鬱金二劑兩脈起四劑胸滿釋後去鬱金加生首烏五錢四劑大便通脈和惟進飲不納穀蓋肺金鬱結之氣乍舒而胃土沖和之氣未復也令服人參倉廩湯一月而食進再服加味歸脾膏二月全愈朱丹溪治一人飲熱酒食物梗塞胸痛蓋有死血而然白朮貝母麥芽香附一兩栝蔞仁杏仁丹皮生甘草乾葛山梔黃芩紅花蓽澄茄右或丸或散任意服之黃濡富傾郡年逾艾病胸膈不寬俗醫或以降火而劑涼寒病滋甚又或以過傷而劑辛熱病益深而形神如故膈病皆如是橋曰脈兩寸益澀余皆弦數而躁兩尺特甚病由陰火炎上感怒傷肝此血膈也法當不治黃不懌乃謝橋逾月即嘔血如橋言醫麇治無效後吐敗血如腐肝乃卒同上蔣鑾年六十體故厚飲食起居如常惟胸膈稍稍不寬直自以為痰火耳久治無效橋診之曰寸口脈澀非痰火也此為血膈頃之必有死氣出焉勿謂無傷法當不治聞者大駭然疑信半之又曰公病之來且速亟問良醫如稍遲將咎橋發之晚也其後嘔紫血塊如指大者數十百枚嘔後竟胸膈頗寬橋曰不然此肝傷而不藏血血隨氣逆行宿血去而新血繼之緩治則緩死速攻則速死後更數醫月餘死魏玉橫曰陳二尹溶上家吳門年近五旬平日准頰微赤體略肥日喜火酒數杯昔在都與余甚相得近授廬陵丞乘便過訪因答候見服膏子藥問何恙曰近頗眩暈由痰飲所致耳請脈之乃笑曰君近亦能醫乎曰第略曉診得兩寸搏指左關弦尺弱六部略數此陰不足陽有餘症屬燥火非痰飲也語之故但唯唯索其方則二陳白朮香附遠志益智菖蒲諸辛燥芳香之品告以藥非對症久服恐生他變亦唯唯別去已五月抵任至九月忽歸寓湖上則已病也延往告以才到官即頭汗出眩暈益甚食漸減每飯入停膈中難下良久仍吐出後只進粥粥又不受乃進面面亦不受兩月來惟日啖饅頭一枚必自晨細嚥至暮略急則嘔矣大便十餘日始一行堅黑如彈丸更醫數人服藥數十劑用參亦數兩欲撿方相示曰無庸知所用必皆前膏子方中諸品耳乃果然此病由燥火又誤服香燥之藥劫其津液致兩陽明枯槁今已成關格幸大便未如羊矢則下焦之陰猶未告竭急飲潤劑猶可為也遂與生熟地天冬肉蓯蓉北沙參當歸牛膝等四劑大便略潤可飲粥一甌矣又四帖粥漸加乃用麻黃拌飯進一甌無礙再四帖大便調飲食如舊則以前方加減令服百帖及還蘇只服其半後三年病復作急至杭求診就前方加減令服五十帖遂至今無恙藜按此門所採俱非真噎症徐靈胎曰噎症之成無術可療故昔賢成案皆以反胃嘔吐等症當之並無治真噎食之案近日京師傳一方用未生毛小鼠陰陽瓦焙乾研末水酒沖服每投輒效可見昔人不治之症原有可治之方其方亦即在耳目之前特患慮不及故遂莫能措手耳余孝廉香圃母夫人年七十七膈間不調已二年矣春盡食愈減至仲秋漸嘔不能食或作脾胃虛寒與二陳二朮補骨脂吳茱萸薑桂諸辛香燥熱幾數十劑遂至湯飲不下勉進一盞則嘔必倍之所出皆黃涎而挾腥氣已絕意醫藥勉召診兩手俱無脈足冷漸過膝手亦過肘舌白胎而地則紫惟神氣頗清起居尚能自主斷為老年三陰血少相火上逆之症四肢冷者誤藥而熱盛作厥也兩手無脈者榮氣衰不能戴衛上朝寸口也舌苔白而地紫者肝火上乘肺金不下降也與生地杞子沙參麥冬蔞仁牛膝米仁川楝或問眾作寒治而君謂火何以驗之曰第詢病人小便可也既而日點滴而已又問昔人謂下有熱則為關上有寒則為格君但主熱得無偏乎曰若然則前方薑桂何以不效乃進藥遂不嘔數劑後忽掌心手背綻出青筋累累蓋肝主筋木得養而驟舒也入川連三分四肢漸暖小便漸長青筋亦隱再加熟地五七錢十餘劑全愈後指端生一癤問故曰其辛香燥熱之所釀乎然得此無患矣吾宗德吾翁年七十五多鬱而喜飲夏間時嘔隨愈初秋感寒復作服辛燥少愈季秋復感寒遂大作凡食即嘔日嘔涎沫數盆湯飲不下者幾十日前醫一以二陳薑桂轉服轉劇計所嘔不下擔石矣脈之洪大搏指面額作赭石色經曰諸逆衝上皆屬於火又素性速故食入即嘔也與重劑杞地沙參麥冬米仁入川連三四分一劑知二劑減問荸薺可食否曰可頓食斤許又減遂不服藥半月後復作輕令以前方重加熟地而痊或問老人陽氣衰微君常與黃連得毋過乎曰老人陽虛出自何說乃默然胡氏婦年五十來常患脅痛有塊時當心而痛甚則嘔其子醫以二陳加左金鬱金香附初稍愈後不應一老醫與丁香肉桂延胡索小茴香之類初亦應再發再與則嘔增劇延診則已數日不食將成膈矣幸大便不秘且溏小便則短澀口苦而燥脈左關又弦小而數兩寸鼓與生地杞子沙參麥冬酒連數劑而愈方天壺翁年近七十患心脅痛一老醫與二陳加人參薑附經年累月遂致食不入滿口似糜非糜晝夜不眠惟聞鼓吹謳歌之聲則稍寐延診六脈已無胃氣曰此血膈也始於肝火躁急致多暴怒血隨氣上逆於脘中會陽剛之藥劫其津液令大絡枯澀血遂凝而不下胃中熱而有瘀故不納食故喜聞歌吹也今真陰已竭陽氣獨留不可為矣勉索方與熟地一兩杞子五錢沙參三錢麥冬二錢每飲一劑則甜睡二三時與聞吹唱同於膈病則無與也其後嘔出血數甌而歿許君廣川年四十六性樂洪飲膏粱炙爆左脅痛痞時侵胃絡肝腎已傷宜滋水木南京醫者其識頗俗二陳五香六君六郁香砂左金逍遙越鞠出入加減惟此數方治之半載不見其良予與令坦相得始彰語以是症血膈須防既而秋仲飲食漸妨因念余說厥理孔長相延診視與藥勿嘗歲忽云暮嘔血如瓤再延診之擬養陰之劑僉以為謬及春詣蘇求治於繆繆與之方芝麻黑豆絳繪桑葉希延其壽豈知膏肓其績莫奏關格遂成湯飲不受長此告終芒種時候雄按此仿痹門施沛然治許贊勿例竟是一篇祭文按趙學敏本草綱目拾遺云石打穿一名龍芽草生山上立夏時發苗布地葉有微毛起莖高一二尺寒露時開花成穗色黃而細小根有白芽尖圓似龍牙莖有白毛頂開黃花故名金頂龍牙一名鐵胡蜂以其老根黑色形似之也又一種紫頂龍芽莖有白毛葉有微毛寒露時抽莖開紫花成穗俱二月發苗葉倒生貼地九月枯七月採趙學敏曰予親植此草於家園見小暑後抽臺屆大暑即著花吐蕊抽條成穗儼如馬鞭草之穗其花黃而攢簇條上始悟馬鞭草花紫故有紫頂龍牙之名此則花黃故名金頂龍牙與地蜈蚣絕不相類因此草亦有地蜈蚣之名故有草竟疑為石見穿也李氏草秘云石見穿生竹林等處葉少如艾而花高尺許治打傷撲損膈氣則石見穿之葉如艾又與石打穿深紋鋸齒之葉不侔矣世又名曰鐵筅帚山間多有之綠莖而方上有紫線紋葉似紫頂龍芽微有白毛七月開小黃花結實似筅帚形能刺人手故又名千條針附方云石打穿草按月取草頭一個如三月三個四月四個以月分為多寡之數搗汁同人乳羊乳和勻服神效膈症出蔣雲山傳方又蔣儀藥鏡拾遺云噎膈翻胃從來醫者病者咸以為不治之症余得此劑十投九效乃作歌以志之歌曰誰人識得石打穿綠深紋鋸齒邊闊不盈寸長更倍圓莖枝抱起相連秋髮黃花細瓣五結實扁小針刺攢宿根生本二尺許子發春苗隨弟肩大葉中間夾小葉層層對比相新鮮味苦辛平入腸肺穿腸穿胃能攻堅採掇莖葉搗汁用蔗漿白酒使佐全噎膈飲之痰立化津液平復功最先世眼愚蒙知者少岐黃不識名浪傳丹砂勾漏葛仙事余愛養生著數言按趙氏所引數說觀之石筅帚之綠莖而方與此道人所說方梗綠葉相似但道人所指不言開何色花亦不言莖有紫線紋而趙氏所引但言方莖而不言有凹與狀似益母其是一是二難以懸擬然此間的有此等治膈之草則確無可疑存之以俟識者臌膈同為極大之病然臌可治而膈不可治蓋臌者有物積中其症屬實膈者不能納物其症屬虛實者可治虛者不可治此其常也臌為病因腸胃衰弱不能運化或痰或血或氣或食凝結於中以致臌亨脹滿治之當先下其積聚然後補養其中氣則腸胃漸能克化矣內經有雞矢醴方即治法也後世治臌之方亦多見效惟臟氣已絕臂細臍凸手心及背平滿青筋繞腹種種齊見齊見則不治若膈症乃肝火犯胃木來侮土謂之賊邪胃脘枯槁不復用事惟留一線細竅又為痰涎瘀血閉塞飲食不能下達即勉強納食仍復吐出蓋人生在飲食經云谷入於胃以傳於肺五臟六腑皆以受氣今食既不入則五臟六腑皆竭矣所以得此症者能少納穀則不出一年而死全不納穀則不出半年而死凡春得病者死於秋秋得病者死於春蓋金木相剋之時也又有卒然嘔吐或嘔吐而時止時發又或年當少壯是名反胃非膈也此亦可治至於類臌之症如浮腫水腫之類或宜針灸或宜泄瀉病象各殊治亦萬變醫者亦宜廣求諸法而隨意施用也諸氣鄧安人年五十忽然氣痛投神保丸愈不一二日再痛再服神保丸六七十粒大便不通其痰轉甚亦有要用沉香木香薑桂等藥而未敢投痛甚則築心築背築走兩脅似有兩柴十字插定心脅叫聲徹天召良甫診之六脈沉伏乍來乍去眾問診脈吉凶何如答曰凡九痛之脈不可准也但以症辨同藥觀其人質肥偉問其便數日不通曰實痛也其腹必脹但以人按之痛甚手不可近此大實也經曰大滿大實者可下之用替針丸五六百粒是夜即愈醫說續編羅謙甫治趙運使夫人年五十八歲於至元甲戌三月中病臍腹冷疼相引脅下痛不可忍反復悶亂不得安臥以當歸四逆湯主之灸中庭穴同上朱丹溪治一婦氣自小腹丹田衝上遂吐清水火氣上逆由丹田虛寒故也用白朮二兩白豆蔻五錢為末早飯後以白湯送下白朮補脾豆蔻溫肺此藥服之則金水相生其病自愈若在男子純陰無陽則為不治之症矣按既是丹田虛寒何以純用脾藥所云金水相生之義亦未的二藥不過補脾扶氣而已陳三農治一人怒氣感寒小腹有塊氣逆上行喘息不安眾用散氣降氣藥益甚曰此因汗下過多傷其胃氣胃氣虛為衝脈所逆並脅下少陽脈二道而反行病多厥逆以調中益氣湯加炒黃柏炒青皮一劑而愈一老人大怒氣自臍下上攻兩脅作痛喘息不臥此動少陽之火也兩脅肝膽部分怒氣傷肝而動龍雷之火故逆上作痛耳用伏龍肝煎湯下左金丸愈按補脾瀉肝兼寓降逆制方何其簡妙一貴人患氣從小腹上攻胸脅頭項遍身急脹而痛諸治罔效曰此督脈為病也經曰督脈為病令人逆氣而裡急以四物加炒黑黃柏醋炒青皮一劑而愈朱丹溪治鄭仲遊年二十三膈有一點相引痛吸氣皮覺急滑石枳殼炒各一兩桃仁黃連炒各半兩炙甘草二錢為末每服一錢半以蘿蔔自然汁研煎熟飲之一日三五次作汙血治鄭仲本年二十七因吃熱補藥又妄自學吐納以致氣亂血熱嗽血消瘦遂與行倒倉法今嗽血消瘦已除因吃炒豆米膈間有一點氣梗痛似有一條絲垂映在腰小腹亦痛大率偏在左邊此肝部有惡血行未盡也滑石枳殼一兩柴胡黃連五分桃仁二兩黃丹三錢生甘草二錢紅花一錢服法同前繆仲淳治高存之婿浦生氣上逆每飯下一二口輒噯氣數十口再飯再噯食頃三四作曰此氣不歸元中焦不運也每劑須人參二錢不信服快氣藥愈甚逾二三月曰今須參四錢矣不信又逾二三月曰今須六錢矣不信又逾月飲食不下每嘔冷氣如團而出上下氣不屬分必死存之坐其家迫令服繆藥首服不動再煎不動然亦不如他湯藥輒嘔也服三劑忽心口下如爆一聲上則噯氣下則小遺無筭上下洞然即索粥頓食三四碗不上逆矣服五六劑減參二錢噯逆復作仍用六錢而安一月後方減參二錢服半年全愈人參六錢麥冬三錢五味二錢橘紅一錢砂仁一錢白芍二錢沉香五分益智仁一錢五分山萸肉三錢蘇子二錢枇杷葉三大片水煎臨服加沉香汁十五匙逆水蘆根汁一大盞又十倍為末山藥糊為丸空心白湯吞廣筆記梁溪一婦人喉間如一物上下作梗前後板痛服仲淳方二十劑愈降香通草蘇子橘紅枇杷葉人參炙草石菖蒲麥冬甘菊白芍遠志白豆仁木瓜石斛加蘆根汁一鍾同煎八分入薑汁二匙同上哮丹溪治一人哮十日一發此病在上焦不得汗泄正當十月遂以麻黃黃芩各二錢入薑汁煎服臨臥進小胃丹三十粒而安丹溪小胃丹芫花醋炒甘遂大黃大戟黃柏內為末白朮膏丸聖濟治一人飲醋嗆喉喘哮不止用粉甘草二兩去皮破開以豬膽六七枚取汁浸三日炙乾為末蜜丸清茶下三四十丸漸愈王宇泰治一人鹽哮用白麵二錢沙糖搜和以糖餅灰汁捏作餅子放在爐內熯干剷出切作四塊以輕粉四錢另炒糝在餅內食之吐痰而愈以上俱大還龔子材治一人哮喘十數年發則上氣喘促咳嗽吐痰自汗四肢厥冷六脈沉細此氣虛脾弱與六君子加黃耆五味二冬杏仁薑棗煎服而愈一人自幼患哮喘之症每遇寒即發發則喘急咳嗽痰涎上湧久不瘥已成痼疾與甘桔芩連栝蔞貝母二冬清肺合六味補腎為方名清上補下丸服一料全愈孫文垣治查少川夙有哮喘疾每發則遍身如燎上氣短促喉中痰聲響若湯沸每經七晝夜汗出漸愈七日來復之義居恆嗜飲縱欲不避風寒有教以石膏麻黃杏仁枳殼細茶各一兩作大劑飲之名曰五虎湯喘至即以此御之隨飲而止屢發屢進應若桴鼓凡三年飲五虎無算因而腹大如覆箕兩腿光腫如柱內外臁瘡清水不竭腥氣逼人不能伏枕者五閱月診時長至後一日也氣高而喘身熱而煩覆以棉被足納火箱環列火盆絨帽貂套束之以帕鼻亦絨套籠之坐重幔中猶凜凜畏寒今已十日其脈浮大無力其色白中隱青舊病由於氣虛中滿新病由於寒邪在表而然令先散之以紫蘇馬蹄細辛甘草防風白蔻仁蒼朮陳皮人參羌活生薑一帖得微汗畏寒之狀已去獨鼻尚寒用防風黃耆二兩煎湯令熏其鼻飯頃而止日凡三熏次日亦愈嘔惡不止用人參溫脾湯加丁香進之一帖旋已因欲利水自食鯉魚數斤夜脹極以平胃散入橄欖肉一兩能解魚毒兩劑而定獨腹脹小水不利不能伏枕為苦以附子理中湯加砂仁補骨脂赤小豆桂心連進四帖小水略長繼以尊重丸日三服之每服五丸五日後小水通利可以臥矣守此調理脹消而平李士材治顧文學十年哮喘百藥無功診其兩寸數而澀曰澀者痰火風寒久久盤踞根深蒂固矣須補養月餘行吐下之法半年之間凡吐下十次服補劑百餘遂愈更以補中益氣為丸加雞子秋石服年許永不再發補中益氣與此病不相登對其愈者攻補兼施之力也王說是也蓋虛家非補未易用攻施沛然治阮二華室患哮喘過用涼劑痰上壅面目浮黃而腫每昏暈則形靜若死蘇則齁䶎之聲聞於外庭醫者望而卻走診其六脈沉滑而弱兼緊病得之冬傷於寒經云形寒飲冷則傷肺古人治此病必用麻黃輕清辛散之劑若投以寒涼則邪氣閉痼而不得泄痰日膠結上焦之氣壅而不宣乃用通關散湧其痰涎凡三湧而痰氣始清喘息始定後以三拗湯兼導痰湯出入調理月餘而安局方三拗湯麻黃不去節杏仁甘草各等分生薑五片同煎局方通關散川芎一兩細辛五錢甘草川烏白芷撫芎各二兩龍腦薄荷葉兩半上為細末每服一錢蔥白茶清調下薄荷湯亦得錢國賓治金陵青衿趙豔澦母年六旬得痰症晝夜吼鋸嘔痰數碗初尚能行後漸不起幸胃不病飲食如常多醫罔效脈之六部浮滑右寸關更甚浮主肺氣虛弱滑主脾經積痰乃痰吼症也用導痰加杏仁麻黃二十劑病勢不減辭去又更二醫反重復求治曰吾技盡矣容思之忽悟吼痰屬太陰肺經之病症肺乃清虛之臟六葉兩耳四垂如蓋今膠痰固於肺縫中呼吸而作吼鋸之聲且胃主納受脾主運化今胃納而脾不運停飲作痰此症非劫劑不可也以三白丸方示彼用白砒三分煅黃貝母桔梗各三分搗飯為丸黍米大以冷茶臨睡下七丸七服痰止吼定服理脾清肺藥痊大抵病危至此不用客劫之味弗愈也此神明於七方十劑之意者也古人學力深今人學力淺再思能用狼虎劫奪之劑學力方到若迎奪劫伏神兵奇正當並用也奚王道可以盡岐黃之技哉如果見真劫劑亦不妨暫用也淡豆豉一兩白砒一錢為末用飯三錢研爛入末為丸如萊菔子大每服七粒白湯下治冷哮極效文田按王氏所附方可以治根深蒂固痰涎壅滯之症曾見其效比比然非萬不得已不必用此臟腑緣此致傷他日亦終吐血不可不慎也喘金陵一鋪治哮喘名白果定喘湯服之無不效者其人以此起家方用白果二十一個炒黃麻黃三錢蘇子二錢款冬花法制半夏桑白皮蜜炙各二錢杏仁去皮尖黃芩微炒各一錢半甘草一錢水三鍾煎二鍾隨時分作二服不用姜攝生方本草綱目文田按風寒則白果桑皮為大禁南省傷寒證少風熱什雜之氣多耳琇按此方惟風寒外感者宜用若上盛下虛氣不歸元者服之立斃如不問虛實概行與之雖起家而殺人多矣然今之時師執方治病謬為知服其人亦未必不起家而其罪則加等矣瀘東治一人九月間病發熱惡寒喘急脈洪大而似實眾作傷寒治不效此虛甚之脈非真實也止視其短氣不足以息即當作虛治以補中益氣湯加麥冬五味子熟附子三分六劑愈症亦有痰食阻滯而聲微喘促者與虛症相似不可不審也陳三農治一人每勞或怒即喘急吐痰不臥眾以降火化痰理氣清肺之劑不效脈浮數而虛澀此陰虛火動其痰也用補陰平肺飲下咽喘即定而愈同上薛立齋治一婦人傷風寒作喘或用表散愈而復患仍用前藥其症益甚飲食少思胸腹不利此因脾肺氣虛也先用六君子湯加桔梗漸愈又用補中益氣湯全愈侍御譚希曾喘咳吐痰或手足時冷此中氣虛寒用補中益氣炮姜而愈一婦人患前症屬命門火虛不能生脾土用補中益氣湯八味丸而痊後復患其喘益甚下前藥不應遂用黑錫丹二服喘止仍用前二藥而諸症痊凡屬邪氣有餘者其症易識治效亦速其屬元氣不足者變症不一效非可以旦夕期也定西侯蔣公患上氣喘急其脈寸口洪滑此痰滯胸膈也令先服稀涎散二錢更以熱水頻頻飲之用代探法殊妙則溢而吐其痰如膠內有一長條裹韭葉一根遂愈局方稀涎散江子仁六粒牙皂三錢明礬一兩為末每用三分吹入喉中一路姓者年近五十身體肥大飲食倍常病月餘每行動即喘診之六脈微澀曰此死症也眾為妄後逾月果卒孫文垣治程菊泉暑月患喘嗽咳咳連聲濃痰滾滾行動則喘促不寧夜分口渴胸膈脹悶脈兩寸滑而數兩關弦此肺有宿痰膽有鬱火經云火鬱發之又風寒外束者可發散蘇子半夏採曲杏仁各一錢石膏二錢款冬花桑皮各八分桔梗枳殼各五分麻黃三分病不減改以杏仁陳皮人參貝母款冬花麥冬各七分苡仁一錢五分桔梗知母各五分五味子十粒桑皮一錢陳皮六分痰減半胸膈未舒口乾腳熱前方減去款冬五味加枳殼葶藶兩帖全愈陸祖愚治唐鳴和平時有火症因試事成痰火咳嗽日夜吐黃痰二三碗氣逆喘急飲食不進服枳梗二陳尤甚改服參術幾危脈之兩手俱洪滑而數乃用茯苓桑皮貝母芩連花粉元參枳殼加牛黃竹瀝二三劑胸寬氣緩七八劑痰乃白色去牛黃三十餘劑而安黃履素曰予家有庖丁王姓生平多欲年四十患腳痛往針予謂此足三陰虛針無益也數年後患痰喘胸中痛晝夜不眠予謂此腎虛氣不歸元峻補其下則氣自降適名醫陳藥坡來診其持論與予略同奈病者服陳藥嫌其作悶別尋粗工治之大服降氣寬中之劑服後覺寬寬後復發病者尚以漸寬為效信服之以至於死良可嘆也大凡此等病服藥初覺悶久當漸寬漸愈愚者嫌悶而別求寬藥死者比比而是醫者病家兩宜熟悉如脾虛者亦然初服必作悶久則自寬破氣消導之藥服之覺寬久乃愈悶以至不救病者不可不知李士材治一人發熱乾咳呼吸喘急始用蘇子降氣不應乃服八味丸喘益急診之見其兩顴俱赤六脈數大此肺肝蘊熱也以逍遙散用牡丹皮一兩苡仁五錢蘭葉三錢連進兩劑喘吸頓止以地黃丸料用麥冬五味煎膏及龜膠為丸至十日而康局方逍遙散甘草當歸茯苓白芍白朮柴胡肝脾蘊熱與逍遙散不合因大用丹皮苡米而獲愈善後之法亦穩第用五味殊未妥王說是則是矣然內經有肝咳之論逍遙全治肝耳既治肝得效則何慮五味之酸收況曾經誤散傷其肺氣耶朱太學喘急多痰可以坐不可以臥可以俯不可以仰惶急求治李曰兩尺獨大而軟為上盛下虛遂以地黃丸一兩用桔梗三錢枳殼二錢甘草一錢半夏一錢煎湯送下不數劑而安黃給諫中氣大虛發熱自汗喘急診之脈大而數按之如無此內有真寒外見假熱當以理中湯冷飲舉家無主不能信從惟用清熱化痰之劑遂至不起金匱理中湯人參白朮甘草乾薑葉方伯夫人喘急痞悶肌膚如灼汗出如洗目不得瞑診之六脈皆空所謂汗出如油喘而不休絕症見矣辭不治三日而歿王氏按汗出至三日而後死此何必不可救此治脫不必治喘也真臟未見何畏於六脈之空乎宋氏女中氣素虛食少神倦春初忽然喘急悶絕不知人手足俱冷咸謂斃矣李曰氣虛極而不清肅不能下行非大劑溫補決無生理遂以人參一兩乾薑三錢熟附子三錢白朮五錢藥服而蘇後服人參七斤余薑附各二斤遂全愈王氏擬刪此案豈以朮附壅滯無治喘理乎然此證不少王氏亦一偏之見耳孫氏女久嗽而喘凡順氣化痰清金降火之劑幾於遍嘗絕不見效一日喘甚煩躁李視其目則脹出鼻則鼓肩脈則浮而且大肺脹無疑矣遂以越婢加半夏湯投之一劑而減再劑而愈曰今雖愈未可恃也當以參術補之助養金氣使清肅下行竟因循月餘終不補再發遂不可救藥矣急則治其標用越婢善矣緩則治其本用參術以善後猶未為當也馮楚瞻治司文選素患痰喘發則飲食不進旦夕不寐調治數月不效脈之兩寸少洪余皆沉弱其右關尺微細更甚乃命門之火衰極無根虛陽上浮且服克削脾元虧損致痰涎益甚虛氣愈逆以炒黃白朮八錢固中氣為君炒燥麥冬三錢清肺引氣降下為臣炮姜二錢溫中導火牛膝二錢下趨接引五味子一錢斂納收藏並以為佐製附子一錢五分承上藥力直達丹田為使如是數劑痰退喘止食進神強久服八味丸不再發馮氏治病大半皆是此種藥真景岳立齋嫡派而其用藥更狠嘗見一酒客病喘醫以此法施之大喘而死誤補與誤攻厥罪固維均也吳孚先治趙太學患水氣咳嗽而喘誤作傷風概投風藥面目盡腫喘逆愈甚曰風起則水湧藥之誤也以真武湯溫中鎮水諸症悉平李成槐之室驀地氣喘呼吸促急提不能升咽不能降氣道噎塞勢甚危或作痰逆氣滯欲用牛黃蘇合二丸不敢遽服脈之兩尺微細無神此肝腎虧損子午不交氣脫症也用人參一兩熟地二兩當歸五錢甘草二錢一帖稍定二帖喘平凡氣短似喘人謂其病在上不知元海無根病實在下也誤治立危予遇此等症重投熟地無力之家不能備參者以棗仁一兩枸杞子一兩代之亦應如桴鼓張飛疇治韓順溪內子患喘症月餘服破氣寬胸豁痰清火等藥不效發表利水亦不應其痰轉急稍動則喘難以休息診之六脈細數而面赤戴陽用大劑六味地黃丸作湯加青鉛兩許一服而緩三服而安柴嶼青治程別駕尊人高年忽患痰喘不進飲食診其脈有根決無意外事用四磨湯內加人參一兩一服而愈濟生方四磨飲人參檳榔沉香烏藥王觀察在太史時方酷暑令媳面紅唇燥發喘不止足冷至胯危甚兩脈鼓指按之微細必過服苦寒所至詢之果然曰此戴陽症也內真寒而外假熱急以人參三錢熟附子一錢五分投之喘定又加肉桂一錢五分半夜尚發煩躁足冷未愈遂以六味湯內加桂附各一錢五分六劑並煎冰冷頻頻飲之而愈少宗伯鄒小山春月患喘咳吐痰甚劇延診視按其諸脈和平惟肺部沉洪明有伏邪此小疾也緣醫謂風寒凝結用桂枝溫散徹夜不寐憊甚不支遂用清理藥而愈張三錫云綱目載一男子五十餘病傷寒咳嗽喉中聲如齁與獨柴湯一服而齁聲除至二三帖咳嗽亦漸退服二三斤病始痊不病亦屢用有驗但可與知者道耳今若但以寸脈大不知分別有力無力遽認為實枳桔桑杏芩梔妄投死亦不悔者多矣此案但盛稱柴胡之功而已流弊無窮今日市醫何患不用柴胡王氏刪之有見薛立齋治婦儒者體肥仲夏患痰喘用二陳芩連桔梗痰喘益甚加桑皮杏仁栝蔞盜汗氣促加貝母枳殼不時發熱飲食漸減脈大而無力以為脾肺虛寒用八味地黃丸以補土母用補中益氣湯以接中氣而愈王氏刪非是一婦人早間吐痰甚多夜間喘息不寢夫早間多痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝用補中益氣加麥冬五味而愈王氏刪非是王叔權治一貴人久患喘夜臥不得而起行夏月亦衣夾背心知是膏肓病也令灸膏肓而愈亦有暴喘者知是痰為梗令細銼厚朴七八錢重以姜七片水二碗煎七分服滓再煎服不過數服愈若不因痰而喘者當灸肺腧凡有喘與哮者為按肺腧無不痠疼皆為繆刺肺腧又令灸而愈亦有隻繆刺不灸而愈者此病有淺深也舍弟登山為雨所摶一夕氣悶幾不救見昆季必泣有欲別之意疑其心悲為刺百會不效按其肺腧云疼如錐刺以火針微刺之即愈因此與人治哮喘只繆刺肺腧不刺他穴惟按肺腧痠疼者然後點灸其他穴非是並資生經滁陽高司法名申之每苦寒喘痰發甚時非此藥不能治方名五味子湯用橘皮三兩去白甘草一兩半炙麻黃四兩去根節五味子二兩杏仁二兩面炒去皮尖上為粗末水一盞半藥末兩大錢煎至七分去渣通口服不拘時候如喘甚加藥末入馬兜鈴桑白皮同煎夏服減麻黃一兩醫方集成醫說篇陳三農治一人極言痰氣作楚喘急而不能食遍體作痛服清氣化痰藥無異服水何也曰豈止無益反受害矣肥人氣居於表中氣必虛脾弱不能勝濕氣虛不能健運是以多痰而喘以四君子加南星半夏佐以薑汁數劑而愈劉點生治汪去塵脾虛水逆傷肺喘嗽不食小水不通脈虛不勝補瀉用茯苓五錢澤瀉橘紅各一錢五分防風肉桂熟附各五分二服水去後加人參調理而安張氏醫通薛立齋治職方王用之喘嗽作渴面赤鼻乾為脾胃有痰用二陳加芩連山梔桔梗麥冬而愈一武職體魁梧素不圍爐不喜熱食行則喘促自謂氣實老痰服碑記丸攻伐之又名黑丸子診其脈洪數重按全無謂命門火衰脾肺虛寒與八味丸一服痰喘稍止數服全止遂能親火喜熱飲食蓋碑記丸出自西域方外人所制者經云西域水土剛強其民不衣而褐薦其民華色而脂肥故邪不能傷其形體其病生於內其治宜毒藥由此觀之恐不可概用也太守錢東圩先患肩疽屬足三陰虛火不歸元用壯水之主以制陽光而愈曰瘡疾雖愈當摒去侍女恐相火一動其精暗流金水復竭必致變症後果咳嗽痰出如湧面目赤色小便淋澀又誤認為外感風寒用麻黃湯表散汗出不止迎視其脈已脫惟太衝未絕曰此脾虛不能攝涎腎虛不能生水肺虛不能攝氣水泛為痰虛極之症也辭為難治勉以益火之源以消陰翳而愈繼又勞傷神思外邪乘之仍汗出亡陽以致不愈朱丹溪治七三嬸喘遇冬則發此寒包熱也解表則熱自除枳殼三錢炒麻黃防風黃芩桔梗各二錢木通一錢半通利九竅治肺壅甚當紫蘇葉五分四帖煎取小半盞飲之薛立齋治一男子咳嗽脈緊數以小青龍湯一劑表症已解更以葶藶大棗湯喘止乃以桔梗湯愈馬元儀治朱千秋患喘嗽自夏及秋群治不愈自謂已成陰虛曰陰虛者宜補陰以制火陽虛者宜補氣以散邪今兩脈浮濡浮為虛氣濡為氣弱病在陽而補陰故邪留而不愈也不信又一月食減喘增寒熱自汗身重不能轉側復求治其脈空大急疾此中氣大虧陽不外固治法先固衛外之陽次補內守之陰則真氣內振而虛風可熄矣遂與大劑玉屏風散加貝母杏仁蘇子桔梗一劑而脈症漸和再加人參三錢二劑諸症漸平惟咳嗽未已以六味湯加人參調理一月全安顧芝岩夫人喘嗽半載臥不著枕舌燥無津屢治不應診之右關尺虛澀無神此標在肺而本在腎也肺為出氣之路腎為納氣之府今腎氣虧乏吸不歸根三焦之氣出多入少所以氣聚於上而為喘嗽口乾不得安臥中藏經云陰病不能吸者此也法當清氣於上納氣於下使肺得清肅腎復其蟄藏則氣自納而喘嗽平矣用蘇子降氣湯加人參五錢肉桂一錢連進三劑症漸平改用金匱腎氣湯加人參五錢二十餘劑可以安枕後因調護失宜前症復作乃委之庸手純用破氣鎮逆之劑極詆人參為不可用病者自覺不支求少參不與遂氣敗而死傷哉邱友痰喘發熱口渴胸滿身如被杖時時惡寒或與驅風化痰不效診之弦數且澀此情志鬱結而肺燥也今之醫者但知散風清熱治痰風劑則辛寒劑則苦痰劑則燥辛能耗液苦能傷氣燥能動火是適助長而已今欲治痰必先清氣清氣必先滋燥使氣得清肅下行又何痰喘之有哉雄按論是藥非用蔞仁半夏曲枳殼秦艽杏仁蘇子少柴胡桂枝二劑症減半再加生首烏以滋陰燥大便通而全愈繆仲淳治臧儀部靜涵患氣喘自汗晝夜不眠食諸醫以外感治之繆診之曰此腎虛氣不歸元故火上浮喘汗交作脾虛故不思食亟以麥冬五味枸杞滋陰斂肺以蘇子橘紅降氣消痰以白芍棗仁茯苓補脾斂汗不數劑而愈葉都督患痰喘諸醫作胃虛治之不愈後以導水丸利五六次而安平治會萃薛氏書薛仲芳曰周忠介夫人年六十餘患痰喘五六年醫藥無效士材先師診之曰右寸浮洪肺有實邪須用麻黃石膏半夏防風細茶生薑等件藥雖峻而病當之無畏也投之果愈但麻黃只可用二三分服後兼須避風耳吳橋治程參軍汶年近耆久病痰喘秋冬遞作春夏浸平頃歸自留都痰喘如昔一醫以為熱也劑以石膏再服而痰喘不除加以泄瀉一醫以為攻損而虛也劑以人參峻補一服而痰喘大作喉壅塞不能言瞑而惛惛橋至診之寸口浮大弦數搏指然不任按病得之鬱怒而傷肝氣法當緩治而二醫以躁急乘之故甚脈雖九死猶可覬一生乃以導痰湯為劑加芩連麥冬一服而吐結痰有間稍寐未盡二服結痰越出喉吻間不能吐則以簪入口而衡引之累累連棉去如敗絮者盈二缶喘乃少定瞑而惛惛如前僵臥如屍七日乃寤寤則呻吟出息目微開始進勺飲間日一劑逾月而安或以參軍方趙簡子云太函集劉清江曰先君嘗施喘藥蓋用麻黃三兩不去根節湯浴過訶子二兩去核用肉二味為塵末每服三大匕水二盞煎減一半入臘茶一錢再煎作八分熱服無不驗者後於彭子壽侍郎處傳一方用新羅參一兩作細末以生雞子清和為丸如梧子大陰乾每服百粒溫臘茶清下一服立止嘗見知臨江葉守端向言其祖石林病此專服大黃而愈其尊人亦苦此疾乃純用附子至某則非麻黃不可然則又顴其所稟如何且自謂其女幼年已喘傳至四世而用藥皆不同劉昌詩字與號清江蘆浦筆記雄按一脈相傳病情如此世之執死方而治活病者皆盲醫也魏玉橫曰朱武章年三十八客姚江仲冬左額患疔七八日微喘疔潰後大喘疔愈喘甚坐不能臥醫與降氣清金不效已二旬歸而渡江比到岸兩腳赤腫如燈籠不能扱履矣舁負至家一月間更七醫其寬胸者重投厚朴瀉肺者峻用葶藶有謂表邪未清者有謂腳氣上攻者有謂水腫入腹者有謂疔毒入肺者雜治腫漸及囊一醫謂其虛也與八味反增譫語診之兩關模糊左尺不應餘部微數而洪面有紅光倚息不寐小便濃濁掌心熱炙臀起映瘡以久坐也其舌左邊赤紫四沿凸凹而左為甚鼻孔乾燥能俯不能仰曰此肝腎大傷之候初時之疔亦肝火熾盛而作治得其宜數劑可愈樸藶既非桂附亦誤今兼治藥必三十劑乃可與生熟地天麥冬沙參枸杞子蔞仁米仁四劑腫漸消譫亦止十劑便清腫退可臥矣惟仰臥及側向右則喘嗽不寧又三十劑已能應酬賓客但臥仍宜向左乃加熟地至一兩入五味三分蛤蚧一具一劑而安四劑全愈吳性全幼即病喘兒醫與枳桔橘半桑杏前蘇之屬傷其肺氣遂成痼疾每發必沉綿床第淹旬浹月年十七余診之令服重劑肝腎藥加沙參蔞仁麥冬之類自是發漸輕或數月一次仍以前方加減不過數劑即霍然近則終年亦罕作余治喘多矣多以此法取效蓋虛喘者十之九實喘者十之一也金太孺人四旬之外病喘以攻伐之過坐致痼疾已近七旬忽一醫與三子湯加葶藶服下脅痛厥逆欲脫余以大劑杞子地黃入川楝一枚得瘳蘭亭其四君也亦病喘面色㿠白發必數日臥床與以滋水生肝養金之劑後發漸少而輕自言得狗寶服之而愈此症凡遇面夭白皮急痰腥穢而小便點滴者不可治蓋症非肺癰而肺葉壞也肺為水源既敗則小便必少耳張司閽年六十餘嗜飲病喘吐痰無算動則齁䶎抬肩倚息或與杏仁枳殼蘇子前胡之類十餘劑喘益甚枯瘠如鬼辭不治矣余與二地二冬米仁蔞仁沙參杞子枳椇子女貞子等八劑全愈戒其勿飲初稍節久仍縱恣年餘復作左脈如按琴瑟弦此真臟見也不與藥月餘而歿張友樵治一酒客夏月痰喘氣喘夜不得臥服涼藥及開氣藥不效有議用金匱麥冬湯者張診之右寸數實此肺實非肺虛也投以人參則立斃矣遂用葶藶五錢焙研滑石五錢煎服立愈明年復感客邪壅塞肺氣喘咳復作醫以葶藶進不效反煩悶汗泄張診其右寸浮數口渴惡熱冷汗自出喘急煩悶曰此熱邪內壅肺氣鬱極是以逼汗外越非氣虛自汗也服葶藶反煩悶者肺熱極盛與苦寒相格拒也夫肺苦氣上逆本宜苦以泄之而肺欲散又當急食辛以散之與麻杏甘石湯一劑肺氣得通喘止汗斂諸症悉平杏仁煎杏仁一斤去皮尖搗熬作酪白蜜五合酥油五合以牛乳煎成者生薑汁三合以水三升內杏仁酪煎攪可減半入薑汁煎如稀糖入酥蜜煎令如稠糖每服一匙日三服夜一服漸加至二匙一方加貝母八合別篩末蘇子汁一升以七小合蘇子研和水濾取汁一方加生地汁三升麥冬五合王晉三曰此潤劑也治勞役表疏寒襲於肺上氣乾咳肺痿韾啞群復滑潤之品仍無腸泄之虞杏仁入肺功專降逆定喘臣以蜂蜜之利酥油之滑即佐以薑汁之上升皆同氣相求者逼留中焦和脾胃生肺津而乾咳自止加蘇子貝母者降氣分之火加地黃麥冬者清血分之火審證取捨惟學者裁之黃錦芳治祝某病喘咳日夜不寧寒熱交作兩邊頭痛二便不通兩肩頻聳上氣奔迫脈則兩尺甚弱兩寸甚洪乃氣上升而不下降之候用五味三十粒故紙六分沉香三分遠志肉五分以安右部之腎龍骨一錢牛膝一錢車前四分龜板一錢以安左部之腎使左右二腎之氣皆歸原宅而不上奔故服一劑而喘咳除頭痛寒熱俱去又服一劑而二便俱通遂愈呃逆朱丹溪治超越陳氏二十餘歲因飽後奔走數里遂患噦病但食物連噦百餘聲半日不止飲酒與湯則不作至晚發熱如此者三月脈澀數以血入氣中治之用桃仁承氣湯加紅花煎服下汙血數次即減再用木香和中丸加丁香服之十月而愈一人病後呃逆不止聲聞鄰家或令取刀豆子燒存性白湯調服二錢即瘥蓋取其下氣歸元而逆自止也本草綱目邃嵓治一人傷寒陽明內實地道不通發呃其脈長而實以大承氣湯下之而愈一人傷寒七日熱退而呃聲不絕六脈沉細無力倦甚以補中益氣湯加附子日進三服而安一人酒色過傷醫作外感治發汗過多絕食日久致血氣兩虛相火衝上呃逆五六日不止治以半夏黃連以瀉逆氣歸芍生地知母以養陰炒柏以瀉沖火二三劑而愈陳三農治一人患溫熱病十餘日身熱面紅舌燥黑呃逆日夜不止者三日眾醫以脈遲無力欲用丁附回陽熱劑陳以手按其胸腹痛不可近曰脈微遲非元氣虛由邪熱內實壅滯其脈而然也用解毒承氣湯入甘遂末三分下咽而燥熱片時去黑糞三四升熱退呃止而安一人患溫熱病大便不通用下藥糞去而呃大作眾尤下藥之過曰此燥糞在腸胃遏氣於下糞去而鬱氣暴升故奔迫而作呃耳以枳殼飲之而安一人呃逆連聲脈來有力正邪相爭肝木受邪自思金能剋木用鐵二斤燒紅水淬飲之即愈一婦患時疫飲水過多心下堅痞咳逆倚息短氣不臥諸藥無效作停飲治之進以五苓散一劑而安以上皆大還盧不遠治陳孟抒室人因怒發呃三日夜召診以來遲意甚不懌脈之曰固來遲然效極速果一劑而愈此蓋肝鬱甚怒弗暢氣將入胃而不能故發呃今不治呃用柴胡等條達木鬱郁解即止暴病氣全故易愈也吳孚先治袁氏女陡發呃症有用丁香柿蒂者有補之瀉之有灸之者俱不效乃與柴胡桔梗等味開提之不三劑而愈良由鬱怒肝木不舒上乘於胃故作呃經曰木鬱則達之謂也喻嘉言治王岵翁有脾約症得蓯蓉胡麻首烏山藥等潤劑即解冬盡偶飽食當風而吐胃氣大傷微似發熱左關脈甚大自云初覺中脘不舒今則氣反攻左初飲梨汁不投今服蔗汁稍定喻曰此虛風之候也以胃中空虛若谷風自內生左投肝木而從其類是以氣攻左而左脈即為之大且勁經云風淫於內治以甘寒梨蔗皆甘寒而一效一不效者乃胃中氣虛已極不奈梨性之達下而喜蔗性之和中也遂以甘寒定方人參竹瀝麥冬生地之屬眾議除參不用服後腹內呱呱有聲嘔出黃痰少許胸中遂快次早大便亦通症似向安然本胃經受病而胃脈反和惟心腎肝肺之脈不安其故口中味淡湯飲不肯下行此中央氣弱不能四迄轉達也宜急用四君子湯之理胃氣則中央之樞轉有力而四畔之機關盡利喉管之水氣不逆而口中之淡味亦除矣不信別召二醫一謂中風一謂傷寒微用表劑即汗出沾濡氣高神蕩呃逆不休矣再投黃連一劑則脈亂如沸羹頻轉頻歇神昏身強年壽黑滯氣出順而入必噦晝夜萬三千五百息即噦亦如之二醫卸禍謂喻前議四君今始可用喻曰氣已出而不入再加參術之膩阻氣立斷矣惟仲景旋覆代赭一方可收神功於百一進一劑而噦勢稍減二劑加代赭至五錢噦遂大減連連進粥神清色亮脈復體輕再用參苓麥冬木瓜甘草平調二日康復如初張三錫治一老人偶傷飲食消導未減或誤與潤腸丸二服下清水脹痛轉甚或復投巴豆丸二服至呃逆不止用大劑六君子湯二帖至五帖全止補養而愈一老人深秋患痢發呃逆嘔吐黃柏炒燥研末陳米飯為丸小菀豆大每服三十丸人參白朮茯苓三味濃煎湯下連服三劑即愈切不可下丁香等熱藥陳良甫治一人痢疾呃逆不止六脈沉弱諸醫藥灼艾皆無效乃投退陰散兩服愈又嘗治許主簿痢疾呃逆不止諸藥無效灸期門穴不三壯而愈良方王叔權治一男子忽氣出不絕聲病數日矣以手按其膻中而應微以冷針頻頻刺之而愈初不之灸何其神也資生經陳霞山治一人咳逆上氣體重氣短脹滿坐不得臥常作水雞聲用白前湯白前二兩紫菀半夏各三兩大戟一兩水一斗煮三升分三服水腫大實之治薛立齋治一婦人痢後嘔噦即呃逆也服降火化痰等劑愈甚脈洪大按之虛細作渴飲湯諸藥到口即嘔此脾胃虛寒不能司納以參朮炮薑末各一錢以飯作丸米飲不時送三五粒至三兩餘聞藥不嘔乃以六君加炮姜三十餘劑一婦人患症同前飲食少思胸腹膨脹大便不實所見之症悉屬虛寒假實遂朝用補中益氣湯加炮薑木香夕用六君子湯送四神丸漸愈又用八味丸料煎送四神丸而痊一婦人因怒嘔噦時或昏憒口噤時或舉體內動其面色或青或赤此肝火熾甚脾土受侮用小柴胡湯加山梔鉤藤治之漸愈又用加味歸脾逍遙二藥調理而痊繆仲淳治高存之鄰人賣腐者傷寒微噦兩日夜不省人事其子乞方問之曰汝父當時曾頭身熱乎曰然曰曾服汗藥乎曰未也曾吐下乎曰未也因索傷寒書檢之其方類用乾薑柿蒂丁香及附子等溫熱之藥檢方云云者蓋示人以病系陽明熱嘔以上諸藥均不可用非臨陣看兵書也末條僅載白虎湯一方繆思之曰傷寒頭痛口渴身熱本屬陽明熱邪傳裡故身涼發噦傳裡身涼亦是金針未經汗吐下邪何從而出但其人年老多作勞故於白虎湯中加人參三錢二劑立愈馬元儀治葛懷年六旬外下痢呃逆兩足微冷或以痢治之轉劇診之兩脈虛微此中氣挾寒下痢當大劑溫補以恢復元氣時有言下痢多由濕熱在胃不行清理而反溫補恐未合曰濕熱傷者其脈必實其腹結痛且無呃逆足冷之症此由年高氣弱火衰於下氣虛於中因之升降失常而輸泄無度溫補非治痢也陽回則痢自止耳若必俟痢止而後補之晚矣遂與人參四兩合附桂理中湯連投四大劑而瘥陸聖修年逾六旬呃逆泄瀉面赤如妝足冷如冰兩脈沉微曰人身之中賴元氣以充養今因泄瀉而氣衰於下復因呃逆而氣傷於上上下交徵年高氣弱何以當此所幸者猶未喘與汗尚可挽也與附子理中湯大培火土加丁香以暖胃止呃蓋一法而升降之道備焉降者以腎中陽旺則氣不上僭而下收崇土之功升者以脾中陽旺則氣不下陷而中守之運行有職則飲食自然變化精液而泄瀉安有不愈乎朱氏子未第時患腹脹食少倦怠自汗呃逆口乾脈之左得弦急右見虛微此中虛肝盛得之煩勞且怒也煩勞則氣分馳而脾胃損鬱怒則肝木橫肆而脾胃傷由是汗出不止脾虛而腠理不固也口中乾燥者脾虛而精液不升也腹脹者氣虛而傳化失常也食少者胃陽不化健運失職也呃逆者五陽不布陰氣用事也當用桂附理中湯大培中土土旺則不受制於木且能生肺以制木也服四劑脈漸起脹漸平因停藥數日脹如故與大劑桂附理中湯少加沉香以和胃氣而行肝氣調理一月而安病本多項因呃逆為病之最故入此老僕王忠婦嘔逆呃氣幾無寧刻脈之右寸獨大餘脈虛微此中州土敗水氣不行五陽不布濁陰上逆也與五苓散一劑此肝邪挾水氣上逆也五苓利水中有桂以制肝故速愈服後一時許吐逆頓止再與附桂理中湯連服之明日兩脈向和呃逆亦止微覺倦怠與加桂理中湯四五劑而安張意田治董友之母年將七旬病已八日脈之軟緩而遲滯發熱日晡益甚舌苔黃厚大便不行便知非丁香柿蒂症畏寒呃逆閱諸方咸以老年正氣虛用丁香柿蒂與補陰之劑夫脈來遲滯畏寒陽邪入里也舌苔黃厚日晡熱盛陽明實也此乃表症未解而陷里之熱急致氣機逆窒而發呃法當下之毋以年高為虛也與小承氣服後大便轉矢氣兼有心煩不寧之狀與一劑臨晚下黑屎數枚二更戰慄壯熱四更大汗天明又便黑矢然後呃止神清而睡此實呃之症也宜審之朱丹溪治一中年婦人病噦以四物湯加和白陳皮留尖桃仁生甘草酒紅花濃煎入驢尿飲以防其或生蟲也與數十帖而呃逆除矣樓全善治其兄九月得滯下每夜五十餘行嘔逆食不下五六日後加呃逆與丁香一粒噙之立止但少時又至遂用黃連瀉心湯加竹瀝引之此實中挾虛之症得黃連瀉心實症除而虛症未已故得補斂而安若施之純實之症則危矣呃雖少止滯下未安若此十餘日痢久故可用澀遂空心用御米殼些少澀其滑日間用參朮陳皮之類補其虛自服御米殼之後呃聲漸輕滯下亦收而安沈明生治唐玉如夏間患血淋數日淋止發呃舉體振動聲大且長或與開胃消痰益劇勺粒不入已兩日夕又欲進丁香柿蒂且加薑桂參耆診之乃陰衰火炎症也蓋勞役而兼房幃時際炎敲水不制火血虛而氣上衝是以脹滿不食呃逆不已今六部脈洪數顏如煤炲大便六七日不行小水滴瀝不快經云諸逆衝上皆屬於火先哲云呃滿須看前後部腎虛不能納氣歸元故呃聲長大從丹田出丁香柿蒂可妄投耶乃先用膽導得垢數枚覺兩足微暖此逆氣下達也即以六味湯料稍減山藥萸肉入黃連梔子車前牛膝薄暮煎服不夜分呃全愈矣明晨進粥滯色漸清夫呃症有寒熱之分呃聲有上下之別今以勞劇之體血淋後見之是不由胃而由於腎也六脈洪數大小便不利是不由於寒而由於熱也真水耗於平日火症萃於一時虛則肝腎不能納氣自下焦上逆為聲非中焦熱邪之比其腰疼顏黑俱屬可虞幸得兩足溫得補而噦止乃壯水制陽光之明驗亦坎離既濟之隹徵也依方調理半月全瘳婁東吳大令梅頓先生弟也丁未夏歸自煙臺炎風烈日不無感受萑符不靖不無驚恐舟中兼有當夕者至中途疲薾殊甚急棹抵吳門或謂憔悴之體竟應投補沈見脈數未平氣口獨盛以為虛中有實熱初用薷芩等劑溯其源也繼用劫利等劑導其流也宿垢既除旋培元氣元氣漸復行且勿藥矣因設酬勞之宴勞倦憊甚其夕神昏肢倦俄而發呃沈曰勞復發呃當施溫補無疑第虛氣上逆其勢方張恐湯藥未能即降須艾焫佐之為妙一友于期門穴一壯即緩三壯全除調補而瘥魏玉橫曰祖姓人年近七旬素有胃痛病於二月間忽發呃晝夜不絕聲者十餘日胃亦痛食入即嘔或與二陳湯加丁香藿香等病轉劇脈之兩手皆洪數兩寸溢而鼓時見歇止乃厥陰之火上衝而然與杞子米仁各一兩沙參五錢麥冬三錢酒連四分二劑而愈後半年病復作以貧乏無力再藥而死此貧亦為不治之一也哀哉
