body:
  text: 附先友記一則魏柳州先生名之琇字玉橫錢塘人幼孤貧力學先府君十餘歲即與定交以齒長於府君接之在師友之間歿為刊其暮年詩即世所傳柳州遺稿也先是鮑君淥飲嘗為刊嶺南詩鈔才氣縱橫落花詩一時膾炙人口晚乃悔其少作力持風格造詣益上矣墓在赤山埠青龍山題曰錢塘詩人魏柳州之墓買山營葬皆先府君任之值春秋改序率同人具斗酒隻雞拜奠墓下今古歡堂集中詩人歿後新吟少世味嘗來古道稀宿草更彈知己淚清尊難起故人顏句皆展先生墓作也先生精於醫著續名醫類案五雄按當作六十卷邀録四庫館書吾母嘗言敬時多病先生來必乞為診視先生歿於乾隆壬辰時敬甫離襁褓身受其惠而先生之音容了不復記可慨也夫續名醫類案書後提要謂此書綱羅繁富變證咸備惜編次潦草不免蕪雜雄按十一卷瘧門陸祖愚治陳雅初案後云己丑長至後一日録是案嗣考胡書農學士先友記言先生歿於乾隆壬辰然則以六十卷之書僅三年而藏事縱極敏捷殆不過草創初就耳倘天假以年重為刪定斷無以上諸病矣雄不才於先生無以為役然孤貧艱瘁少境頗同讀其書而不覺感慨流涕焉爰忘弇陋略附按語圈其佳案用質宗工鑑定且臚目次以便翻譯並採柳州遺稿序暨胡氏先友記於篇末俾讀是書者得見先生大概云咸豐元年冬十一月杭州王士雄
