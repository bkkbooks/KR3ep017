body:
  text: 卷三十五外科膿疥蘇頌曰黔人治疥癬遍體諸藥不效者生取白花蛇切斷以磚燒紅沃醋令氣蒸置蛇於上以盆覆一夜如此三次去骨取肉芼以五味令爛頓食之瞑睡一晝夜乃醒瘡疕隨皮便退其疾便愈本草綱目張子和曰貨生藥焦百善云有蕘夫來買苦參欲治疥不識藥性緩急但聞人言可治濃煎一碗服之須臾大吐痰涎一盆二三日疥作痂矣潘塤曰豫蔓孫患膿疥三年身無完膚下體尤甚內治外治百無一效乃治制一方名和中固氣湯以蒼朮一錢燥濕白朮一錢固脾黃耆一錢實腠理升麻八分柴胡一錢引清氣元參八分散上焦火芩連各七分清中焦火黃柏七分伏下焦火歸身一錢養心血甘草陳皮人參各五分調中氣煎服存渣加白蒺藜金銀花煎洗十數劑而全愈楮記室姚應鳳診一人遍體發小疥如粟應鳳曰是名淨海瘡不治生治死其人不信治之死錢塘縣志元希聲侍郎治卒發疥祕驗方石灰隨多少和醋漿水調塗隨手即減一法用石灰炒紅出火氣香油調敷薛立齋治稽勳李龍岡患疥腿足為甚日晡益焮口乾作渴小便頻赤此腎經虛熱用補中益氣湯五味丸而痊一儒者善嚏患疥以為內有濕熱腠理不密外邪所搏也與補中益氣湯加白芷川芎治之不從自服荊防敗毒散痛處發腫小便赤澀此肺腎陰虛用補中益氣湯加五味麥冬而愈一儒者患疥誤用攻伐之劑元氣虛而不能愈用補中益氣湯加茯苓其瘡頓愈又因調養失宜日晡益甚其腿日腫夜消以為氣血虛而有熱朝用補中益氣夕用加味逍遙而愈一男子時疫愈後所患如前用前藥補養而愈有同患用砭法出血而死此因陰虛血熱色黑作癢也何乃反傷陰血哉一婦人疥久不愈食少體倦此肝脾虧損而虛熱先用補中益氣湯加川芎炒梔元氣漸復更以逍遙散而愈若復聞譫語此熱入血分用小柴胡湯加生地治之血虛者四物合小柴胡湯熱退卻用逍遙散以補胃生陰血或有寒熱如瘧亦治以前藥一婦人患疥作癢膿水不止脈浮無力以消風散四劑少愈更以四生丸月餘而平一男子癢少痛多無膿水以芩連荊防山梔薄荷白芍歸梢治之而愈一男子患疥焮痛發熱脈浮數以人參敗毒散四劑少愈更以當歸飲子數劑而愈一男子患疥焮痛寒熱便祕脈數有力以防風通聖散二劑少愈更以荊防敗毒散加黃芩山梔四劑而愈一婦人患疥作癢午後尤甚以當歸飲子數劑少愈更以人參荊芥數劑而安薛立齋治一男子患疥久不愈搔起白屑耳作蟬聲以四生散白附子黃耆獨活蒺藜數服癢止更以當歸飲子數劑而痊一男子患疥下體居多焮痛日晡尤甚腿腕筋紫而脹脈洪大此血熱而然也就於紫處刺去瘀血以四物湯加芩連地骨皮柴胡四劑而安患在上體若臂腕筋紫脹亦宜刺去其血以前湯加柴胡黃芩即愈一男子搔癢成瘡日晡痛甚以四物加芩連荊防數劑而止更以四物加蒺藜首烏黃耆二十劑而愈智化寺一僧病瘡疥自用雄黃艾葉等藥燃於被中熏之翌日遍身焮腫皮破出水飲食不入投以解藥不應而死蓋藥熏入腹內而散真氣其禍如此丁丑豫舉家生瘡家人亦用此方熏之瘡不愈未幾鑾兒出痘症極凶藥不能下咽而歿殆亦受其毒耳一男子患瘡疥搔破出膿水面赤作渴大便堅實脈洪數左關寸為甚此木火相搏也先用瀉青丸料煎服熱勢頓減又用梔子柴胡散加味逍遙散而瘡愈一儒者遍身生瘡搔癢膿水淋漓自知醫服八珍荊防之類益甚脈洪大按之無力謂此氣血虛熱也用八珍湯加丹皮治之而愈繼娶後兩足生瘡久不愈尺脈數而無力用地黃丸八珍湯而痊一男子患疥干癢作痛以芩連荊防山梔薄荷白芍歸梢治之而愈蔣仲芳治一僧初患疥自以水銀蘄艾熏之遂喘息胸滿遍身浮腫或投五皮飲不效投椒目大黃等喘腫愈甚曰氣道皮膚肺氣熱也復以火熏火毒傷肺遂失降下之令氣道塞水道閉喘息溺澀浮腫之所由來也今復推蕩陰血又傷若非童真難免於死矣以麥冬黃芩山梔桑皮花粉滑石木通燈草與之四劑而愈薛案有一僧亦用熏法致死胡氏子年二十餘生膿窠已一年服藥無算長臥床席二三日間昏暈數次入其室穢氣盈溢膿血痛苦仰臥不能轉側兩手背皆瘡不能診候問其飲食噁心否云尚可飲食曰胃氣在可生也即以黃耆白朮當歸甘草廣膠為主佐以銀花浮萍煎之以酒六劑瘡愈大半二十劑而全愈姚氏婦有子而胸乳肥瘡如桃背及下半身俱滿異痛異癢膿血淋漓已經三月不時寒熱漸作惡心蔣曰病急矣但喜其日未久因乳子氣血驟虛因多臥而飲食不運也亦以前方加黃柏連翹陳皮香附外以大黃朴硝松香東丹為末少加飛鹽麻油調敷亦不久而愈此二人者胡豫清熱消運之品俱為日久虛弱者設也若初起壯實者粒如小粟而多癢曰疥瘡風熱為勝理以苦參黃柏荊芥防風為君膿泡如痘而多痛曰膿窠濕熱居多理宜蒼朮秦艽銀花連翹為主俱加天麥門冬酒炒黃芩以清肺蓋肺主皮毛肺熱則皮毛有是疾也若日久則肺虛又宜補肺而不宜清肺矣此意先哲未及故附之癬張子和治一女子年十五兩股間濕癬長三四寸下至膝發癢時爬搔湯火俱不解癢定黃赤水出又痛不可耐灸焫熏泄硫黃䕡茹殭蠶羊蹄根之藥皆不效其父母來求療張曰能從豫言則瘥父母諾之以排針磨尖快當其癢處於癬上各刺百餘針其血出盡煎鹽湯洗之如此四次大病方除此方不盡以告後人恐為癬藥所誤濕淫於血不可不砭者矣薛立齋治一人生風癜似癬三年不愈五心煩熱脈洪按之則澀此血虛之症當以生血為主風藥佐之若專攻風毒則血愈虛而熱愈熾血被煎熬則發瘰癧或為怯症遂以逍遙散數劑及人參荊芥散二十餘劑而愈劉禹錫傳信方云豫少年曾患癬初在頸項間後延上左耳遂成濕瘡浸淫用斑蟊狗膽桃根諸藥徒令蜇蠚其瘡轉盛偶於是州賣藥人教用蘆薈一兩研甘草炙半兩相和令勻先以溫漿水洗癬乃用舊干帛子拭乾便以二味合和敷立干瘥神效本草立齋治一男子面青腿內臁患癬色赤作癢或為砭刺出血發熱焮痛服消風散而益甚服遇仙丹愈加發熱作渴仍服之膿水淋漓其脈洪數左關為甚此肝經血虛火內動復傷其血而瘡甚先用柴胡清肝散數劑又用四物山梔治之諸症漸退用八珍湯地黃丸兩月餘而瘥張子和治一童子病滿胸腹濕癬每爬搔則黃水出已年餘先以末作丸上湧次以舟車丸浚川散下三五行次服涼膈加朴硝藥成時時呷之不數日而愈疙瘩翟立之素善飲遍身疙瘩搔起白屑上體為甚面目焮腫成瘡結痂承漿眼赤出淚左關脈洪數有力或作癘風治之膿潰淋漓此肝火濕毒以四物湯加乾薑連翹山梔柴胡一劑諸症悉退四劑全退兩睛各顯青白翳一片亦屬肝火再劑翳去乃用六味丸而愈一儒者身發疙瘩時起赤暈憎寒發熱服癘風之藥眉落筋攣後疙瘩漸潰日晡熱甚肝脈弦洪餘脈數而無力此肝經血虛風熱也先以小柴胡合四物湯加丹皮酒炒黑梔再與加味逍遙散加參朮鉤藤服兩月瘡悉愈而眉漸生後因怒復作用小柴胡湯加芎歸鉤藤木賊而愈後勞役發熱誤用寒劑不時身癢日晡赤暈早與補中益氣湯加五味麥冬山藥午後與加減八味丸尋愈後食炙爆等物仍發疙瘩小便白濁關脈滑大有力用補中益氣湯加山梔諸症悉退一男子秋間發疙瘩兩月餘漸高有赤暈月餘出黑血此風熱血虛所致先用九味羌活湯風熱將愈再用補中益氣湯而愈後不慎房欲復作盜汗晡熱口乾唾痰體倦懶言用補中益氣湯加減八味丸頓愈一婦人遍身疙瘩瘙癢敷追毒之藥成瘡出水寒熱脅痛小便不利月經不調服祛風之藥劑形體消瘦飲食少思此肝火血燥生風也前藥益傷肝血先用歸脾湯二十餘劑又用加味逍遙散二十餘劑諸症漸愈乃用六味地黃丸調理而瘥此等症候服風藥而死者多矣一男子不時患疙瘩搔癢成瘡膿水淋漓惡寒發熱先用羌活當歸散而癢止又用易老祛風丸而不發後飲燒酒起赤暈二便不通口舌生瘡熱渴不安用防風通聖散二便遍利但口乾體倦飲食不入用七味白朮散去木香四劑而愈一男子遍身患疙瘩作癢勞而益甚用參耆歸術為君佐以柴胡炒芩桔梗川芎炙草而痊更用補中益氣湯之劑後不再發一男子患疙瘩癢發熱形氣虛弱口鼻氣熱且喜飲冷屬外邪也以消風散二劑外邪悉解但倦怠少食更以參耆陳皮炙草五味而健又以補中益氣湯去柴胡升麻加茯苓白芍乃痊一男子患疙瘩多在臀腳勞役則癢甚小便色黃服敗毒散芩連之劑患處癢痛夜不能寐此脾氣下陷用補中益氣湯加五味麥冬炒黑黃柏治之而痊凡病日間如故日晡倦怠遇勞愈加晨起如故皆元氣虛也宜用前藥補而治之一男子患疙瘩色黯作癢出黑血日晡至夜益甚其腿日腫夜消以為氣血虛而有熱朝用補中益氣湯夕用加味逍遙散而愈一儒者應試後遍身瘙癢後成疙瘩此勞傷元氣陰火內熾秋寒收斂腠理鬱熱內作補中益氣湯加茯苓川芎白芷而愈後復勞仍作惑於人言服祛風敗毒藥如大風之狀又發熱作渴倦怠懶食用補中益氣湯倍參耆歸朮半夏茯苓五味麥冬而愈一婦人遍身患疙瘩發熱作癢內服敗毒祛風外搽攻毒追蝕各潰成瘡膿水津淫形氣消瘦飲食日減惡寒發熱作渴飲冷脈浮數按之則澀此元氣復傷也先用七味白朮散數劑其渴漸止飲食稍加乃用八珍湯加柴胡丹皮膿水漸干又用六君芎歸丹皮山梔瘡漸收斂仍用八珍山梔丹皮而愈一婦人因怒寒熱發赤暈服祛風之劑發疙瘩或砭出血患處焮腫發熱頭痛內服外敷俱系風藥膿水淋漓服花蛇酒之類前症益甚更加晡熱煩渴不寐脈洪大按之如無此血脫煩躁先用補血當歸湯稍緩用四君當歸數劑得睡但倦怠頭暈少食用補中益氣湯加蔓荊子稍可又用八珍湯加用芎芍倍用參術三十餘劑而能步履又復月餘而痊一婦人性急善怒月經不調內熱口苦患疙瘩作癢服敗毒之藥膿水淋漓熱渴頭眩日晡益甚用加味逍遙散漸愈後因大怒月經如湧眼出淚用四物湯加山梔柴胡連芩數劑而愈年餘左足臂腕起白點漸大搔起白屑內熱盜汗月經兩月餘一至每怒或惡寒頭痛或不食作嘔或胸乳作脹或腹內作痛或小便見血或小水不利或白帶注下此皆肝木製伏脾土元氣虛而變症也用補中益氣湯加炒黑山梔及加味歸脾湯服半年而愈後每怒惱患赤暈或以風疾治之發疙瘩又服遇仙丹赤腫作癢出膿水外敷追蝕之藥寒熱作渴又服胡麻草烏之藥遍身瘙癢眉毛脫落膿水淋漓咳嗽發熱月經兩月一行用四君當歸丹皮月餘熱渴稍止飲食少進又服月餘咳嗽少可卻用八珍湯加丹皮二十餘劑患處漸干經水如期復因傷食作瀉不食用六君子湯飲食漸進又因怒發熱作渴患處作痛經行不止用加味逍遙散漸可仍用四君子湯而全愈一女子二十歲月經先期或過期或怒則身發赤暈或患疙瘩六七日方退服祛風藥瘙癢作渴搔破成瘡膿水浸淫曰此肝火生風再服是藥必致筋攣不悟後兩手拘攣始信先用地黃丸四物湯月餘熱渴頓減乃佐以加味逍遙散又月餘患處膿少又用四君子山梔丹皮二十餘劑指能伸屈因怒發熱經水不止睡中筋脈抽動不安以加味逍遙散加鉤藤治之而痊仍用四物山梔鉤藤丹皮而瘡結靨乃去鉤藤調理元氣復而瘡靨干一女子常患癮疹作癢因怒發熱變為疙瘩腫甚用梔子清肝散治之而愈後又怒患痕起赤暈遊走不定自砭出紫血甚癢徹骨其熱如炙如大麻風欲用風藥治之不效乃以當歸補血湯四劑其熱悉止又用聖愈湯加味逍遙散而痊一婦人身發疙瘩或如丹毒癢痛不常搔碎成瘡膿水淋漓發熱渴煩頭目眩日晡益甚此血虛內熱之症以當歸飲加柴胡山梔治之而愈一婦人患前症肢體疼痛頭目不清自汗盜汗月水不調肚腹作痛食少倦怠先用人參荊芥散後用逍遙散治之而痊一婦人因忿怒身發疙瘩憎寒發熱此肝火用小柴胡湯加山梔黃連治之而愈後口苦脅痛小便淋漓復用前藥遂全愈一婦人患前症發熱夜間譫語此血分有熱以小柴胡湯加生地治之而安後用四物湯加柴胡山梔丹皮而熱退又用逍遙散全愈一女子常患疙瘩時或作癢服消風之類搔破成瘡其癢不止延及頭面先用羌活當歸散其癢頓止用加味逍遙散其熱頓痊又用當歸飲而瘡亦愈用八珍柴胡山梔而不再作血風隱疹薛立齋治一男子面赤作渴面常患小瘡作癢服祛風藥遍身發赤㿔服白花蛇酒更發赤暈遍行砭刺又服消風散發熱口渴飲水不止謂肝經血虛而風熱也用梔子清肝散及地黃丸料煎服熱渴漸止瘡漸結靨用八珍湯地黃丸瘡靨漸脫又復月餘瘡漸愈一男子面生粉刺或生小㿔服消風散瘡益甚服遇仙丹加遍身赤癢仍服前藥發熱焮腫又服旬余潰而出水形體骨立先用四君子當歸桔梗四劑飲食稍進又用八珍湯數劑而痊一男子嗜膏粱炙爆醇酒辛辣之物遍身生㾦㿔甚癢服消風散之類更起赤暈又砭出血其癢益甚敷敗毒之劑遂各成瘡膿水津淫眉毛漸脫赤癢益甚此脾經積熱傷血所致先用犀角地黃湯加黃連治之膿水漸止乃以八珍湯加山梔丹皮眉毛漸生因飲食失宜胸腹作脹飲食少思或大便下血用五味異功散加升麻飲食漸進又用補中益氣湯而血止仍用異功散加當歸丹皮而痊一女子性急多怒月經先期患㾦㿔色赤作癢搔破膿水不止服祛風藥其瘡益甚服花蛇酒四肢瘛瘲眉毛脫落先用柴胡清肝散加鉤藤數劑又用加味逍遙散加鉤藤諸症漸愈又用易老祛風丸而安一女子年十四腕軟處生物如黃豆大半在肉中紅紫色痛甚諸藥不效一方士以水銀四兩白紙一張揉熟蘸水銀擦之三日自落而愈李樓怪症朱丹溪治朱院君三十餘久患癮疹身痹而紫色與防風通聖散加牛蒡為極細末每一錢水盞半入薑汁令辣煎食熱飲之汪石山治一人年逾六十形瘦蒼紫夜常身癢搔之熱蒸皮肉磊如豆粒癢止熱散肉磊亦消醫用烏藥順氣升麻和氣等不效診之脈皆細濡近駛曰此血虛血熱也而為順氣和血所謂誅罰無辜治非所宜遂以生地元參白蒺藜歸芎耆芍黃芩甘草陳皮煎服月餘而愈一老人患疹色微赤作癢發熱以人參敗毒散二劑少愈以補中益氣湯加黃芩山梔而愈一婦人遍身瘙癢秋冬則劇脈浮數此風邪客於皮膚而然也名曰血風飲以消風散及搽蛇床子散少可更以四物湯加荊防數劑而愈一婦患此夏月尤甚脈洪大以何首烏散一婦患赤斑瘙癢搔破成瘡出水久而不愈內服當歸飲外搽蛇床子散並愈又一婦患此諸藥不應以四生散數服而愈大抵婦人體虛風邪客於皮膚則成白疹寒濕客於肌肉鬱熱而為赤疹色雖有異治法頗同凡人汗出不可露臥及浴經云汗出見濕乃生痤痱雷公云遍身風疹酒調生側柏用之屢驗瘙癢薛立齋治一男子遍身瘙癢後成瘡出水灑淅惡寒皮膚皴起眉毛漸落大便祕結小便赤少此屬肺火為患用補氣瀉榮湯四劑諸症漸退但倦怠惡寒小便清少此邪氣去而真氣虛也用補中益氣湯兼換肌散半載元氣復而諸症退時中秋忽大便不實小便頻數體倦食少灑淅體重此濕邪乘虛而作用東垣益胃湯二劑頓安仍用前藥調理三月餘全愈一男子兩目俱赤遍身癢痛搔起白皮此肝肺陰虛誤服驅風燥劑鼻赤面紫身發疙瘩搔出血水用升麻湯下瀉青丸數服又用加味逍遙散數劑身鼻漸白疙瘩漸消又用四物湯加參耆柴胡山梔並換肌散各百餘服喜其年少謹疾全愈一婦人日晡身癢外內用追毒祛風之劑膿水淋漓午前畏寒午後發熱殊類癘風用補中益氣湯加山梔鉤藤又以加味逍遙散加川芎而愈一婦人手心赤瘙癢發熱頭暈作渴晡甚服祛風清熱之藥膚見赤痕月經過期用加味逍遙散倍熟地熱止癢退更以四物湯加柴胡參耆炙草茯苓頭清渴止再用四物湯加參朮茯苓山梔赤暈亦消一男子患瘙癢破而成瘡如大麻風服遇仙丹發熱作渴大便祕結脈沉實右關為甚此熱蓄於內也先用黃連內疏湯而大便通利又用防風通聖散去硝黃而熱渴止卻用八珍湯而瘡愈一男子脾腎氣虛血熱遍身瘙癢時喜熱水浴之後患瘡㿔破而出水用風藥益甚或赤或白眼作花癢先用胡麻散六味丸而痊次年兩股小腹頸項復作癢用四生散六味丸而愈一婦人經水先期勞役或氣惱則寒熱瘙癢服祛風降火等藥不勞怒而自癢發熱更加痰喘氣促服化痰清氣之藥形氣倦怠食少胸痞身發瘡疹服消毒之類膿水淋漓服大麻風藥口乾作渴欲水而不敢飲經水又過期眉間若動又復月餘眉毛脫落經水淋漓此心肝二經風熱相搏制金不能平木木克脾土而不能統血肝火旺而不能藏血也經雲水生木遂朝用地黃丸以滋腎水生肝血夕用加味逍遙散以清肝火生肝血月餘諸症漸愈又佐以四君芎歸丹皮月餘而經水旬日而止又兩月餘經水五十餘日而至乃夕用五味異功散加當歸服兩月經水四十餘日而至因怒寒熱經水如崩眉稜角動脈洪數弦肝脾二脈為甚用柴胡梔子散二劑以平肝火用五味異功散二劑以補脾氣發熱頓退經水頓止更以八珍湯倍加參術及地黃丸兩月餘經水如期眉毛漸生因食停滯腹脹作痛另服祛逐劑泄瀉不止小腹重墜飲食甚少先用六君子湯送四神丸數劑瀉漸止飲食少進又用補中益氣湯倍用升麻數劑重墜漸愈後因勞心發熱飲食難化嘔吐涎水其熱自臍上起覺飢熱頻作乃用六君子湯加炮薑治之熱時飲稠米湯稍安兩月餘又常服加味歸脾補中益氣二湯而痊一婦人秋間肢體作癢時發寒熱日晡熱甚口苦喜酸月水先期面色常青熱甚則赤恪服清熱涼血後發疙瘩赤癢益甚乃清熱敗毒破而膿水淋漓謂此肝脾血虛燥不信仍治瘡毒其瘡益甚形氣倦怠飲食減少先用補中益氣湯間佐以六君當歸元氣稍復乃以八珍湯倍用參術少用川芎白芍間佐以補中益氣湯諸症漸愈又以四君子湯佐以加味逍遙散兩月餘膿水漸少又復月餘瘡漸結靨因怒寒熱腹脹飲食少思患處復甚用六君子湯加山梔柴胡乃用四君子湯為主而瘡漸愈又因怒月經甚多發熱作渴瘡痛出血用柴胡清肝散熱退止痛仍用四君子湯而結靨又用八珍湯山梔丹皮而愈一婦人遍身瘙癢膿水淋漓發熱身如蟲行月經不調先用升麻湯送瀉一丸熱癢頓退又用加味逍遙散經行如期用換肌丸而瘡愈後因怒經行不止筋骨作痛用秦艽地黃湯易老祛風丸而愈一婦人性沉靜懷抱不樂月經過期遍身作癢服祛風清火之劑搔破成瘡出水不止其癢益甚或用消風散之類眉稜跳動眉毛折落又服遇仙散患處俱潰咳嗽發熱飲食日少月經先期作肝脾鬱怒而血燥前藥復傷而益甚先用四君子芎歸山梔丹皮飲食漸進服月餘而嗽止又以加味逍遙散加鉤藤二十餘劑而眉不動乃去鉤藤倍加參朮當歸月餘瘡結靨又以八珍湯加山梔丹皮而痊一婦人患前症膿水淋瀝發熱作渴體倦惡寒經水不利久而不愈此肝脾虧損而虛熱也先用補中益氣湯加山梔川芎而元氣漸復又用逍遙散而瘡漸愈又虛後患疥遍身作癢搔起疙瘩破而出膿或出血水誤服醉仙散殊類風症用八珍湯數劑而安又用十全大補湯患處漸干矣一婦人日晡身癢素清苦因肝鬱怒遍身晡熱內熱自汗盜汗月經不行口乾咽燥用歸脾湯數劑諸症稍退後兼加味逍遙五十餘劑而痊一婦人瘙癢發熱日晡益甚皮膚赤暈月經過期此血虛而有熱也以逍遙散倍加熟地熱止癢退更以四物加柴胡參耆炙草茯苓調理而愈一婦人懷抱久郁患前症膿水淋漓服連翹消毒散食少胸痞服清氣化痰丸作嘔吐痰服清熱化痰丸煩熱畏寒四肢焮熱面目赤色脈大而無力此脾胃虧損而虛寒隔陽氣於外遂用六君子湯加炮薑治之諸症少愈飲食頓進又佐以四物湯諸症漸愈又以四君子每味各一錢四物湯每味各五分諸症全愈一婦人每秋間兩手心作癢搔起白屑因勞役惱怒則發寒熱遍身作癢起疙瘩或以為風症內服花蛇等藥外敷硫黃之類又服遇仙丹諸熱渴益甚月水不通謂脾肝二經血燥生風先用加味逍遙散熱渴漸減又用八珍柴胡山梔患處少可後因怒氣發熱脅痛患處焮腫用加味逍遙散四劑而安又用四君芎歸山梔丹皮至半載而痊一男子遍身瘙癢諸藥不效脈浮按之而澀以生血藥為主間以益氣百帖而愈宋生遍身作癢搔破成瘡出水脈浮數此手足陽明經風熱所致以人參敗毒散對四物湯加芩連服之外以松香一兩枯礬五錢輕粉三錢為末麻油調敷月餘而愈又一人患此但脈沉以前藥加大黃治之漸愈再服人參敗毒散而平黃錦芳治一僧身癢異常服驅風敗毒藥不愈診其脈左手俱平靜惟脾脈湧突異常詢得飲食無味飽脹時噯此內氣不清而濁邪外溢於經絡也用茯苓三錢半夏二錢木香八分廣皮五分川厚朴一錢日服二劑遂愈瘡癤陸肖愚治徐邑宰秋末冬初遍身生癤大小不一紅痛焮癢黃水淋漓或謂風熱用防風通聖數劑不減或謂諸痛瘡瘍皆屬心火用芩連山梔生地等十劑益甚且飲食漸減脈之浮按微數沉按中按皆緩而弱曰凡風熱大都為癮疹未必為瘡癤至瘡瘍之為心火經固言之第脈微弱為多此元氣不足也緩者濕也數雖為熱而微數不可純責之火據今日之症火為標濕為本原得病之由又濕為標元氣不足為本此必乘虛汗出澡浴濕漬肉腠久而熱蝕為膿水發為痛癢也用蒼朮薏仁茯苓燥濕為君人參白朮黃耆甘草補氣為臣連翹蟬蛻清熱為佐葛根白芷入陽明肌肉為使二劑痛癢頓減胃少開十劑全愈張子和治穎皋韓吉卿自髀至足生濕𧈟大者如錢小者如豆癢則搔破水到則浸淫類蟲行袴襪愈而復生瘢痕成凹十餘年不瘥張哂之曰此濕𧈟瘡也由水濕而得故多在足下以舟車濟川大下十餘行一去如掃一省掾背項常有痤癤愈而復生張曰太陽血有餘也先令湧泄之次於委中扉針出紫血病更不復作也張君袞常喜熱火烘灼其背及兩足又食自死肉久而兩足常生癤毒愈而復生半月餘以清涼飲子下之得紫黑血積於便中去者月餘其積毒頓除是知積熱毒致癰腫者如此薛立齋治春元沈霓川之內暑月面生痤癤乘涼入風面目浮腫赿二日左臂腫痛癮疹如丹背脅髀股等處發腫塊三四肉色不紅痛甚晝夜號呼寒熱往來飲食不思服活命飲及行氣敗毒之劑其勢愈熾肝脈浮澀脾脈弦弱此屬二經榮氣不從風邪乘虛流注經絡為患先以八珍加黃耆柴胡青皮數處漸漸紅焮又以十全大補加銀花白芷龍膽草貝母十餘劑脅腿二處潰膿碗許余塊漸平仍服十全大補湯調理月餘而安向使專於祛風攻毒鮮不敗事矣張仲安治凍瘡用黃柏燒存性研細以雞子清調敷破者干糝上神妙治暑月肌膚瘡爛或因搔成瘡多是大暑汗出坐臥濕地致肌膚多瘡爛汁出有一乳母曰此易瘥也取干壁細土末敷之隨手即瘥治一切惡瘡遍用藥不效者陳米飯緊作團火煆存性麻油膩粉調敷蘇滔光丁亥年耳上病碎瘡或痛或癢兩月餘百藥不效季倅子長傳此方初不之信試用之果日即愈辛丑年再作呂仲發顯謨云此症夏以痰飲法治之故只用肥皂燒存性生油膩粉調敷尤佳薛立齋治一男子年四十三歲自四十以來每至夏發熱而倦日午益甚晚涼少可面生瘡㿔耳下筋微腫更結小核三四枚附筋上曰此火令不慎房勞虧損腎水不能制火然也名曰注夏彼不信服降火敗毒藥加口乾倦怠夜間熱甚午後腿軟足心熱筋牽痛復來問治曰口乾倦怠此中氣陷下也夜間發熱陽氣陷於陰分也午後腿軟足熱陰虛火甚也耳下筋牽痛血虛不能潤筋也先以補中益氣湯少用柴胡升麻加五味麥冬熟地治之諸症頓退更服滋腎丸而痊若以每至火令而然用敗毒涼藥鮮不危矣凡春末夏初患頭痛腳軟食少體熱此仲景云春夏劇秋冬瘥而脈弦大者正世俗所謂注夏病也趙州守北方人年逾四十頭面生瘡瘍數枚焮痛飲冷積日不潰服清熱消毒藥不應診其脈數按之則實以防風通聖散二劑頓退又以荊防敗毒散而愈又一男子患在四肢審其脈症亦屬有餘以黃連解毒湯治之亦愈繆仲淳治一婦人生癤臂上用連翹白芷白芨花粉各二錢甘菊一兩紫花地丁金銀花各五錢甘草生地茜草各三錢地榆四錢角刺牛蒡各一錢服之半日立出膿血而愈又治一男子生癤膝下加牛膝三錢立破出鮮血愈廣筆記丁右武親驗坐板瘡方松香五錢雄黃一錢均研細如濕癢加蒼朮三錢各末和勻以綿紙包里捻成紙燃二條臘月豬油浸透點火燒著取滴下油搽上立效同上立齋治一男子年逾四十胃氣素弱面常生瘡盜汗發熱用黃耆建中湯少愈更以補中益氣湯而平東垣云氣虛則腠理不密邪氣從之逆於肉裡故多生瘡若以甘溫之劑實其根本則腠理自固即無他疾張生患漆瘡作嘔由中氣弱漆毒侵之以六君子湯加砂仁藿香酒芍治之彼不信另服連翹消毒散嘔果盛復求治仍以前藥外以麻油調鐵鏽末塗之而愈趙千兵患兩腿生瘡每服敗毒藥則飲食無味反增腫脹此脾虛濕熱下注也以六君子湯加蒼朮升麻酒芍服之以黃蠟麻油各一兩輕粉三錢為膏貼之而愈大凡下部生瘡雖屬濕熱未有不因脾腎虛而得者一男子濕熱下注兩腿生瘡以人參敗毒散加蒼朮黃柏服之以金黃散敷貼又一人患此久而不愈以船板灰存性一兩輕粉三錢為散麻油調敷更以黃柏知母防己龍膽草茯苓當歸川芎黃耆白朮服之亦愈若人兩腿作痛或遍身作痛以當歸拈痛湯治之一婦人兩腿腕紫黯寸許搔破出水或用祛風砭血之劑年餘漸平如掌乃服草烏等劑遍身搔癢有時出血水內熱體倦飲食無味月經三月一至脈洪而數按之則澀此燥劑愈傷脾血也先以補中益氣湯加白芍川芎五味十餘劑乃與加味逍遙散加熟地鉤藤二十餘劑再用歸脾湯加川芎熟地治之而不發一婦人素清苦四肢似癬疥作癢出水怒則起赤暈服祛風敗毒等劑赤暈成瘡膿水淋漓晡熱內熱自汗盜汗月經不行口乾咽喉腫痛此郁傷脾血也用歸脾湯逍遙散兩月而痊一儒者素食膏粱發熱作渴飲冷患瘡如大麻風大便出黑血服清熱祛風等寒藥益甚謂血分有熱火也故寒之不寒用四物二連湯以清熱涼血用六味丸以補腎生水而熱退又用柴胡梔子散調理而痊一婦人性急善怒月經不調內熱口苦患時瘡服敗毒藥膿水淋漓熱渴頭痛日晡益甚用加味逍遙散服之漸愈因大怒月經如湧眼赤出淚用四物湯加山梔柴胡芩連數劑而愈年餘手足臂腕起白點漸大搔起白屑內熱盜汗月經兩月餘一至忽怒或惡寒頭痛或胸乳作脹或腹內作痛或小便見血或小水不利或白帶下注此皆肝木製伏脾土元氣虛而變症也用補中益氣湯加黑山梔及加味歸脾湯間服半年而愈一婦人久郁患在四肢腿腕尤甚誤用敗毒寒涼之劑晡熱內熱自汗盜汗月經不行口乾咽燥此鬱火傷脾也用歸脾湯數劑後兼服逍遙散五十餘劑而痊劉松篁經驗方云會水灣陳玉田妻患天蛇毒瘡一老翁用水蛇一條去頭尾取中截如手足指長刮去骨肉勿令病者見以蛇皮包手指自然束緊以紙外裹之頓覺遍身皆涼其病即愈數日後解視手指有一溝如小蠅蛇皮內宛然有一小蛇頭目俱全也本草綱目孫思邈以貞觀五年七月十五日夜以左手中指觸著庭木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者論有此方遂用治之手下即愈痛亦除瘡亦即瘥未十日而復如故方用蒲公英搗爛取汁塗之愈同上張子和曰麻先生妻病足趾痛不可忍酒調通經散一錢半夜先吐吐畢而痛減余因嘆曰向見陳五曾病此醫以為小蟲傷或以草上有毒物觸之遷延數月膿盡方已今日觀方可發大笑王思中治一人患瘡疹陰囊腫脹如斗升不能跬步王曰此瘡蠱也就外科劑中加麥稈四十九莖遂消吳江縣志戊申之水乃二百餘年創見之變人足浸水中數日即皮破生瘡痛不可忍一法取水荊條煎水浴之立愈續金陵瑣事梁溪一男子生癤膝下楚甚仲淳適至即於席間作劑服之飲酒數杯癤立破出鮮血愈連翹三錢白芷二錢粉甘草水炙三錢金銀花五錢牛膝三錢生地三錢地榆四錢皂刺一錢鼠黏子酒炒研一錢瘍症魏玉橫治吳性全忽患症如癘風眉毛脫落面額褪皮皮去肉色又如白癜風耳前後目上下多生小癤乳旁及腿上亦有頗多膿血往時久病喘豫以養肝之劑愈之自是足趾縫及兩旁常作癢出稠水及面瘍既發足疾頓愈有指為風者有指為濕者指為牛皮癬大麻風者幸渠素不輕藥守至數月不愈乃就診余曰前所指皆非也此即往時喘之變症耳良由肝火熾甚火極似風上淫於肺蓋火就燥也前在經絡則為喘今在皮毛則為瘍薛立齋謂之癘癘瘍類症治之必五十劑乃瘳與生地杞子蔞仁赤芍甘草麥冬淨銀花首烏之屬出入加減果五十劑而愈夫肝木為龍龍之變化莫測其於病也亦然明者遇內傷症但求得其本則其標可按藉而稽矣此天地古今未泄之祕內經微露一言曰肝為萬病之賊六字而止似聖人亦不欲竟其端矣殆以生殺之柄不可操之人耳余臨症數十年乃始獲之實千慮之一得也世之君子其毋忽諸雄按此玉橫案余謂外感由肺而入內傷從肝而起魏氏長於內傷此言先得我心惟各門附案悉用此法豈生平得意在此而欲獨豎一幟耶瘍症便祕薛立齋治一男子患癰未作膿焮痛煩躁便閉脈實用內疏黃連湯二劑諸症悉退以四物湯加芩連四劑而消一男子瘍症潰後便澀脈浮按之則澀以八珍湯加紅花桃仁陳皮杏仁治之而愈一弱人患瘍潰後便祕而脈澀以四物湯加紅花桃仁黃耆治之而愈薛立齋治一男子患瘍潰後便祕而脈浮以四君子湯加陳皮杏仁當歸治之而愈雄按此症宜養血一老人患瘍潰後大便祕小便赤澀診之脈浮數而澀以八珍湯加知柏治之而愈後小便復數而赤大便祕口乾目花以加減八味丸滋腎丸治之而愈此症乃陰血虛陽火盛故用前藥有效若投苦寒之劑必致有誤矣一男子患瘍潰後便澀肌膚作癢謂氣血虛不能榮於腠理用補劑治之不信乃服風藥致不救大抵瘡瘍始作便祕脈數而澀者宜降火涼血為主潰後便祕脈澀者宜補血氣為主若投風藥禍在反掌鄺進士患癰將痊大便祕結服大黃等藥反廢飲食乃用補氣血之劑加桃仁麻仁未效更以豬膽汁深納穀道續以養氣血而愈原病式云諸澀枯涸皆屬於燥燥者火之病氣病後血衰故大便祕澀宜以辛甘潤之如用苦寒則胃氣乏矣凡老弱産後便難者皆氣血虛也膽汁最效腎臟風薛立齋治一男子患腎臟風飲燒酒發青暈砭出血敷追毒之藥成瘡出水日晡益甚類大麻風服遇仙丹眉毛折落大便下血虛羸內熱飲食甚少勢誠可畏先用聖濟犀角地黃湯其血漸止又用五味異功散加當歸升麻飲食漸進用四物加參朮丹皮內熱漸減用易老祛風丸膿水漸少又以八珍丹皮之類漸結靨因思慮發熱盜汗作癢赤暈用加味歸脾湯數劑熱漸止用加味逍遙散六味丸而痊一男子遍身生瘡膿水淋漓晡熱口乾兩足發熱形體消瘦雜服風藥六年未愈尺脈洪數而腎經瘡也如小兒腎疳之疹用加減八味丸不半載而痊一男子遍身生瘡似疥非疥膿水淋漓兩腿尤甚作癢煩熱肢體倦怠年餘不愈以為腎經虛火用加減八味丸而即痊一男子素膏粱醇酒患腎臟風延及遍身服癘藥益甚又用捻藥於被中熏之嘔吐腹脹遍身浮腫潰爛膿水淋漓如無皮而死一男子患足三陰虛患血風瘡症誤服祛風敗毒之藥外敷斑貓巴豆等藥肌肉潰爛嘔吐腹膨或泄瀉虛冷或煩熱作渴此症系脾胃虛敗也辭不治不越月歿一男子患遍身小瘡或時作癢口乾作渴服消風散起赤癢益甚服遇仙丹膿水淋漓飲食無度肌肉消瘦尺脈洪數左尺尤甚謂腎水不足虛火上炎為患先用加減八味丸其渴漸止用補中益氣湯加五味肌肉漸生佐以八珍湯加丹皮麥冬百餘帖而痊二年後不節房勞其瘡復作惑於人言又服消風散之類其瘡復患仍用前藥不一月而痊一男子內臁作癢色黯搔起白皮各砭刺出血其癢益甚更起赤暈延及外臁浸淫不已服祛風之藥肢體亦然作渴引飲左尺脈洪大而數無力謂此腎經虛火復傷其血火益甚而患耳先以八珍湯加五味子丹皮三十餘劑諸症漸退乃佐以加減八味丸料又百餘劑而痊劉鴻腿生濕瘡數年不愈尺脈輕診似大重按無力此腎氣虛風邪襲之而然名曰腎臟風瘡以四生湯治之不信自服芩連等藥遂致氣血日弱膿水愈多形症愈憊逮二年復求治仍以前藥治之而愈夫肢體有上下臟腑有虛實世之患者但知苦寒之藥能消瘡毒殊不知腎臟風因腎氣不足所致當以蒺藜為君黃耆為臣白附子獨活為佐使若再服敗毒等藥則愈耗元氣速其死矣癘風竇材治一人病癘症鬚眉盡落面目赤腫手足悉成瘡痍令灸肺俞心俞二穴各十壯服換骨散一料二月全愈鬚眉更生雄按竇氏治中風用換骨丹治癘風用換骨散此與第三條所用皆是換骨散一人遍身赤腫如錐刺竇曰汝病易治命灸心俞肺俞二穴各一百壯服胡麻散二服而愈手足微不隨復灸前穴五十壯又服胡麻散二料全愈雄按胡麻散用黑芝麻紫浮萍薄荷牛蒡子甘草竇氏方此最平穩一人面上黑腫左耳下起云紫如盤蛇肌肉中如刀刺手足不知痛詢其所以因同僚邀遊醉臥三日覺左臂黑腫如蛇形服風藥漸減今又發竇曰非風也乃濕氣客五臟之俞穴前服風藥乃風勝濕故當暫好然毒根未去令灸腎俞二穴各百壯服換骨丹一料痊愈面色光潤如故張子和治桑惠民病面風黑色畏風不敢出爬搔不已眉毛脫落作癩治三年張曰非癩也乃出素問風論曰腎風之狀多汗惡風脊痛不能正立其色炲面龐浮腫今公之病腎風也宜先刺其面大出血其血當如墨色三刺血變色矣於是下針自額上下扉針直至頭頂皆出血果如墨色遍腫處皆針之惟不針目鋭眥外兩旁蓋少陽經此少血多氣也隔日又針之血色乃紫二日外又刺其血色變赤初針時癢再刺則額覺痛三刺其痛不可任蓋邪退而然也待二十餘日又輕刺一遍方已每刺必以水洗其面十日黑色退一月面稍赤三月乃紅白但不服除根下熱之藥病再作張在東方無能治者雄按今更無能治之人矣然不可不知有此證吳恕字如心錢塘人博極群書少貧貨烏蛇丸治瘋疾時乘採風使適有患此疾者召恕與談驚服其議論遂委託治之疾果愈杭州府志祕韞治大風用大烏蛇一條打死盛之待爛以水二碗浸七日去皮骨入糙米一升浸一日曬乾用白雞一隻餓一日以米飼之待毛羽脫去殺雞煮熟食以酒吃盡以熱湯一盆洗大半日其瘋自愈本草綱目王海藏云王氏患大瘋病眉須墮落掌內生瘡服紫菀丸半月瀉出癩蟲二升如馬尾長寸許紫菀丸吳茱萸菖蒲柴胡厚朴各一兩桔梗茯苓皂莢桂枝乾薑黃連蜀椒巴豆去皮膜肉油炒人參各五錢川烏三錢加羌活獨活防風各一錢蜜丸桐子大每服三丸漸加至五丸七丸生薑湯送下食後臨臥服孕婦忌服之此方治病甚多不能悉録周子固治王君海子病癘衆醫莫能療周授已七藥漱之牙齦出穢血數升既而形盡瘦骨立後第以美味補之數月瘥九靈山房集薛立齋治一男子冬間口苦耳鳴陰囊濕癢來春面發紫塊微腫麻木至冬遍身色紫不知痛癢至春紫處俱大至夏漸潰又至春眉落指潰此患在肝膽二經令刺手指縫並臂腿腕出黑血先與再造散二服下毒穢更以小柴胡合四物湯加白芷防風天麻角刺漸愈又與換肌散但遍體微赤此血虛有火因家貧未得調理秋間發熱至春面仍發塊用前散並養血藥喜年少謹疾得愈一膏粱之人鼻壞眉落指脫體潰熱渴晡甚四物湯加炒黑知柏五味麥冬白芷天麻角刺三十餘劑熱渴少止時仲夏精神倦怠氣喘身熱小便黃澀大便稀溏此元氣虛而時熱勝也用補中益氣湯頓安乃與換肌散及益氣湯兼服兩月更以生肌散代茶飲瘡少退至仲秋眩暈少食自汗體重大便溏稀此亦時濕之症用清燥湯調理而愈又用補中益氣湯少加酒炒黑知柏角刺天麻兩月餘而痊又因勞傷倦聾瞶熱渴誤服祛風藥病氣益劇身發赤疹與益氣聰明湯月許而愈大麻風症先麻木不仁次發紅斑久則破爛浮腫無膿蓋皮死麻木不仁肉死刀割不痛血死破爛流水筋死指節脫落骨死鼻梁崩塌也又癩風症初起水泡作癢成瘡破流脂水癢至徹骨久則成片傳及遍身好浴熱湯徐靈胎曰大麻風症總屬不治遷延歲月則有之然患此者絶少若稍似風症並非真風醫者竟以治風之惡藥治之反傷敗氣血變成風症此等最多不可不知又曰癩風之症有似大麻風而毒氣不深全在肌肉故尚可治喻嘉言曰治癘風以清榮衛為主汗宜頻發血宜頻刺皆清榮衛之捷法也生蟲由於肺熱宜兼清肺然清肺亦必先清榮衛蓋榮衛之氣腐而不清傳入於肺先害其清肅之令故也治宜生血清熱為主驅風殺蟲為輔易老祛風丸東坡四神丹最為平善可以久服取效奉以為法焉祛風丸黃耆枳殼防風枸杞子白芍甘草地骨皮生地熟地等分蜜丸四神丹羌活元參當歸生地等分或煎或丸服一男子赤痛熱渴膿水淋漓心煩掌熱目昧語澀怔忡不寧此心經受症也用安神丸兼八珍湯少加木通炒黑黃連遠志元氣漸復卻行砭刺外邪漸退但便燥作渴用柴胡飲並八珍湯而愈再用換肌散劑而瘥一男子肚見赤筋面起紫泡發熱作渴寅卯時甚脈弦數腿轉筋小便澀此肝經火症先用柴胡飲熱退便利卻用小柴胡合四物湯加龍膽草炒山梔三十餘劑及八珍湯加柴胡山梔調其血氣乃用換肌散去其內毒而安年餘因勞役飲食失宜寒熱頭痛遍身亦疹自用醉仙散而歿一男子面發紫疙瘩膿水淋漓睡中搐搦遍身麻木漸發赤塊勞則麻怒則癢肝脈洪大砭刺臂腿腕各出血用清胃湯加大黃角刺四劑煎下瀉青丸肝脈少退以升麻湯數劑下前丸諸症少愈卻用寶鑑換骨散斤許又用小柴胡合四物湯加蒼朮天麻角刺百餘劑及六味地黃丸半載而愈後因勞遍身麻癢脈微而遲此氣血俱虛不能榮於腠理用十全大補湯加五味麥冬調理年餘而安一男子面赤發紫泡下體癢痛午後發熱大便燥黑此火盛而血虛也用再造散及四物湯加防己膽草及刺腿趾縫出毒血而便利仍以前藥加白朮白芷茯苓羌獨活而便黃仍以四物去膽草防己少用獨活加元參萆薢五十餘劑而瘡退卻用補中益氣湯加天麻麥冬而氣血漸充時仲秋霖雨遍身痠痛用清燥湯而安隨用換肌散胡麻散八珍湯兼服而愈一上舍面發腫肌如癬後變疙瘩色紫搔之出水此脾肺之症也先用清胃湯以清胃熱而解表毒又用四物湯加山梔黃芩柴胡角刺甘草節以癢陰血祛風熱又砭臂腿腕手足指縫並患處以出毒血疏通隧道乃與八珍湯加白芷角刺五加皮全蠍及二聖散兼服月餘以養陰血治瘡毒又與補氣瀉榮湯少愈再與換肌散而全愈後因勞倦遂發赤暈日晡尤甚以四物湯加丹皮柴胡山梔並用補中益氣湯年餘雖勞而不發一男子遍身如癬搔癢成瘡色紫麻木掐之則痛小便數而少此脾胃受症邪多在表用清胃散更砭刺患處並臂腿腕出黑血神思漸爽但惡寒體倦口乾此邪氣去而真氣虛也以大劑參耆芎歸蒺藜桔梗數劑元氣頓復卻用八珍湯加黃耆白芷蒺藜天麻軟柴胡及二聖散治之其瘡漸愈後用換肌散八珍湯等藥調理半載而痊後症仍發誤用克伐攻毒患兩感傷寒而死一男子遍身疙瘩搔則癢掐則痛便閉作渴此邪在內也治以再造散二服微下三次用桃仁承氣湯加當歸四劑及砭出黑血漸加痛癢但形體倦怠用培養之劑復其元氣又用二聖散其瘡頓愈更用大補年餘而康後患痰涎壅盛舌強語塞用二陳湯蒼朮知柏澤瀉數劑而愈再用補中益氣湯調理而安一男子素清苦眉盡落病在肝膽二經也乃刺臂腿腕及患處出黑血空心服八珍湯加五味胡麻首烏威靈食後服換肌散喜其無兼變之症又能篤守禁忌不半年而愈一儒者腳心或癢痛或麻癢腫脹二年後身體作癢漸變疙瘩發熱耳鳴日晡益甚此屬腎虛也乃砭刺臂腿腕及手足指縫去其瘀血用六味地黃丸料加五味柴胡五十餘劑以補腎又用換肌散祛風丸各斤許以治瘡漸愈得滋補守禁而痊一上舍遍身患之形病俱虛謂須調補元氣完復方治其瘡不信恪服蛇酒以攻內毒更敷砒霜等藥以蝕外毒頓加嘔吐清水體痛如錐或以為毒氣外發不知脾主肌肉此因毒藥傷脾而然也反服祛毒之劑吐瀉不止而歿一男子患癘風用藥湯熏洗汗出不止喘嗽不食腹鳴足冷肢體抽搐謂此因熱傷元氣腠理不密汗出亡陽耳是日果卒下疳此症與梅瘡無甚差別丹溪治一鄰人年三十餘性狡而躁素患下疳瘡或作或止夏初患白痢膈上微悶醫與理中湯四帖昏悶若死片時而蘇脈之兩手皆澀重取略弦似數曰此下疳瘡之深重者與當歸龍薈丸去麝四帖而利減與小柴胡去半夏加黃連白芍川芎生薑煎服五六帖而安薛立齋治一男子下疳腫痛不消一男子潰而腫痛發熱小便祕澀日晡或熱一小兒腫痛諸藥不應俱以小柴胡湯吞龍薈丸數服而愈一小兒十五歲患前症雜用消毒之藥虛冷悉具三年餘矣詢之乃稟受所致用萆薢湯月餘諸症漸愈又用補陰八珍湯補中益氣湯而瘥一男子陽事腫痛小便如淋自汗甚苦或尿血少許尺脈洪數按之則澀先用清心蓮子飲加牛膝山梔黃柏知母柴胡數劑更以滋腎丸一劑而痊玉機微義曰如自汗小便自少若再利之則榮衛枯竭無以制火而煩熱愈甚當俟熱退汗止小便自行也兼此症乃陽明經病大忌利小便張景嶽治一少年因偶觸穢毒遽患下疳始潰龜莖敷治不效旋從馬口延入尿管以漸而深真直至肛門逐節腫痛形如魚骨每過夜則膿結馬口脹不得出潤而通之則先膿後尿敷洗皆不能及張嘗遇一山叟傳得槐花蕊方因以治之不十日莖根漸愈半月後自內達外退至馬口而痊後現些微廣瘡復與五加皮飲十餘劑而愈向傳方者曰此方善治淫瘡熱毒從小便泄去且服此者可免終身瘡毒後患然猶有解毒奇驗則在發瘡之時但見通身忽有云片紅斑數日而沒者即皆瘡毒應發之處瘡毒已解瘡形猶見是其驗也張初未之信及此人應發瘡之時固不多而通身紅斑果見凡兩日而消方在新因陳四十立齋治州守薑節甫患下疳膿水淋漓作渴吐痰午前惡寒午後發熱曰午前惡寒屬陽氣虛弱午後發熱屬陰血不足不信反服二陳知柏之類飲食益少大便不實又日晡熱渴小腹重墜患處焮腫服四物知柏之類飲食不思此脾氣虛而下陷先用補中益氣湯調養脾胃以升陽氣諸症漸愈又用六味丸滋補腎水以生肝血而痊一男子患下疳腫硬焮痛寒熱先以人參敗毒散二劑而止更以小柴胡湯加黃連青皮治之而愈一男子患下疳潰而腫痛小便赤澀以加減龍膽瀉肝湯加青皮黃連二劑少愈又以小柴胡湯加知柏當歸茯苓數劑而愈一男子因勞莖竅作癢時出白物發熱口乾以清心蓮子飲治之而安一男子患下疳潰而腫痛發熱日晡尤甚以小柴胡湯加黃連知母當歸而愈一男子患下疳已愈惟莖中一塊不散以小柴胡湯加青皮荊防服之更以荊防牛膝首烏滑石甘草各五錢煎湯熏洗各數劑而消一男子莖中作痛或筋急縮或作癢白物如精隨溺而下此筋疝也並用龍膽瀉肝湯治之皆愈張子和曰遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也不可妄歸之腎冷若血涸不月月罷腰膝上熱足躄嗌乾癃閉小腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕一男子下部生疳諸藥不應延及遍身突腫狀似翻花筋牽骨痛至夜尤甚此肝腎二經濕熱所致先以導水丸五服次以龍膽瀉肝湯數劑再與除濕健脾之藥外貼神異膏吸其膿血蒜灸拔其毒而愈若表實者以荊防敗毒散裡實者以內疏黃連湯表裡俱實者防風通聖散表裡俱虛者八珍湯氣虛者四君子湯血虛者四物湯俱加兼症之藥治之並愈瘍科大法略具於此若服輕粉等藥反收毒於內以致迭發概服防風通聖散氣血愈虛因而不治者多矣繆仲淳治數友下疳用黃柏宮粉膩粉杏仁珠末冰片敷之無不愈者後去膩粉杏仁加黃芩更以大小薊地骨皮湯洗淨敷之效更良廣筆記又下疳糝方橄欖燒灰研細末糝之仲淳治下疳極祕神方用鮮小薊鮮地骨皮各三兩煎濃汁浸之不三四日即愈一切極痛者屢用神效同上立齋治一老人患下疳小便淋漓脈細體倦此氣虛兼濕熱也用清心蓮子飲及補中益氣湯治之而愈又一弱人拗中作痛小便淋瀝此因火燥下焦無血氣不能降而滲泄之令不行用四物湯加黃柏知母茯苓牛膝木通十餘帖痛止便利先君氣短拗中若瘡小便不通用四物湯加參耆煎吞滋腎丸而愈蓋前症以虛為本以病為末益其本則末自去設若不固元氣專攻其病害滋深矣王錦衣年逾四十素有疳瘡焮痛倦怠用小柴胡湯加黃連黃柏青皮當歸而愈繆仲淳治下疳方蟬蛻七分白殭蠶用紫蘇葉包蜜炙七個杏仁去皮尖七粒芭蕉根搗爛五錢獨核肥皂仁七粒雪裡紅一把打爛土茯苓去皮二兩白蘚皮一錢牛膝二錢黃柏一錢木通七分皂莢核七粒薏苡仁二錢連翹一錢漢防己酒浸六分甘草節一錢石斛三錢柴胡六分萆薢二錢地骨皮二錢水煎不拘時飢則服氣虛脾弱者加蜜炙黃耆三錢血虛加生地三錢梅瘡李時珍曰今醫家有搜風解毒湯治楊梅瘡不犯輕粉病深者月餘淺者半月即愈服輕粉藥筋骨攣痛癱瘓不能動履者服之亦效其方用土茯苓一兩薏仁金銀花防風木瓜木通白蘚皮各五分皂莢子四分氣虛加人參七分血虛加當歸七分水二大碗煎飲一日三服忌飲茶及牛羊雞鵝魚肉燒酒發麵房勞蓋祕方也本草綱目雄按史搢臣方當歸五錢淨銀花防風荊芥何首烏勿犯鐵器木棒打碎各三錢肥皂子九個打碎土茯苓瓷鋒刮去皮木棒打碎四兩豬胰一具河水六碗瓦器煎濃每早中晚空心溫服一碗恪守禁忌雖年久毒重者二十劑即收功且無後患此方平淡而有神效也縣中陳某家有使女生廣瘡求治於方上道人其方只用乾荷葉一味煎濃湯當茶日逐飲之儘量而止不過六七日即愈親試甚驗又一當縣甲首者生廣瘡傳方上道人方用麥冬母子草根搗汁和好酒同服即愈其草取竹中無露水者為上李翊戒庵漫筆馮楚瞻治張姓人曾患梅瘡清涼解毒而愈未幾忽頭顱面頰牙床鼻柱疼痛不堪飲食難進謂餘毒為害復用清涼解毒漸致飲食俱廢坐臥不寧精神疲困六脈微弱馮曰果屬陽毒脈宜洪大此為寒涼久服致陰陽失職耳即惡瘡初發亦由精血元陽虧損斯陰寒凝沍之氣得以乘之乃與大劑熟地麥冬白朮牛膝五味附子兼八味丸並服半月而愈雄按如果涼藥過投陰寒凝沍為病而六脈微弱則當溫煦以培陽氣何必再用大劑熟地以滋窒膩哉孫文垣治吳東星瘧止腰疼白濁咳嗽肌肉大消百治不應痛劇欲死脈之左弦細右滑大俱六至口渴眼赤知其昔患梅瘡餘毒尚伏經絡因瘧後氣血不足舊毒感動故痛而暴也以當歸白芍甘草牛膝鉤藤薏仁木通白蘚皮用土茯苓四兩煎湯煎藥服下痛止嗽脈緩其半數帖大效精神漸復冬至日乘酒縱欲次日腰如束縛足面疼左眼赤小水短足底有火從兩胯衝上痛不可言再以歸芍鉤藤甘草牛膝薏仁石斛紅花生地黃柏調理三日症略減適大雪寒甚有女醫因其大便燥結一日夜進玄明粉一兩五錢大便且不行而腰痛愈猛兩足攣縮氣息奄奄面青慘六脈俱伏痛使然也知服玄明粉所致曰症雖熱但病在經絡筋骨間徒瀉腸胃無益也足攣腰痛也者由天氣寒極經絡凝澀法當溫散寒邪之標使痛定然後治本乃用桂心杜仲炙草蒼朮破故紙五加皮二劑痛定四肢柔和飲食始進囑曰病在經絡俟春和始可除之勿亟也不信更服滋陰降火之劑兩月無功再求治乃以煨腎散進大瀉五六度仍是瀉其腸胃矣四肢皆冷咸以為瀉之非也曰病從此減矣夫何憂再進理脾藥數帖神氣遂轉腰胯柔和漸能步履乃以威靈仙末二錢入豬腰內煨食之又瀉一二度審其梅毒濕熱已清改用薏仁當歸生熟地白芍牛膝黃柏丹參龜板調理全安雄按煨腎用甘遂或用牽牛皆通行經絡不比玄明粉之直走陽明也繼煨以靈仙用意尤妙俞東扶曰此條病情反覆孫公能隨其病機曲折以赴之就所録者已有七次治法惟始終匯載方知其中間有效有不效乃可垂為模範苟逸其半而存其半則不知來路之淵源未明結局之成敗何以評騭其是非乎因不禁慨然於臨證指南朱懷竹壯年客外不謹患楊梅瘡恐人知之欲歸乃求速愈用藥熏洗不瘳又用藥末點之日服煎藥三帖治兩月毒且入內下則肛脫瘡滿如菌上則肺壅喘甚胸脹不能仰臥內熱惡寒譫語陰囊疙瘩腫痛兩足瘡延腫大脈之俱洪大而數曰病重甚壯年猶可治第胸中有瘀血毒物俟出後乃可與藥否則反用致疑另延醫果大發喘嗽吐紫黑血塊如膿者碗許腥穢不可近此熏藥迫毒入肺瘀壅肺竅喘嗽必俟吐盡從而消之斯易為力也乃用丹皮桑白皮白蘚皮木通前胡枳殼桔梗甘草薏仁杏仁葶藶服後大便急重二十餘次所下黑紫膿血甚多喘咳稍定紅痰稍淡二三劑能臥改用白芍當歸白蘚皮貝母黃連銀花皂角薏仁麥冬木通二帖足瘡腫漸消陰囊出膿血二碗兩尺已不洪大前方加丹參又二帖囊結疤三日後落下厚可半寸洞見兩丸系一光薄白胞用紅粉霜加生肌藥敷之日三次膿水乾再以人參歸芍白芷甘草白蘚皮皂角薏仁首烏調理一月悉愈令日用土茯苓豬肉各半斤同煎爛入醬鹽如常食之湯當茶飲遂瘳次年生女談公亮患結毒醫用五寶丹餌之三年不效仲淳云五寶丹非完方也無紅鉛靈藥不能奏功時無紅鉛姑以松脂鉛粉麻油調敷應手而減公亮先用喬伯圭所贈乳香膏止痛生肌甚捷及用此二味功效彌良乃知方藥中不在珍貴之劑也廣筆記陸養愚治朱少川因感冒寒熱咳嗽筋骨疼痛服發散之藥寒熱已除而疼痛咳嗽不止或以羌活治痛前杏治嗽不效又以其漁色必陰虛投六味月餘反口渴異常身熱疼痛益甚脈之沉細弦數而有力因問其曾患梅瘡否答曰已過矣曰此症正其遺毒也疼痛者毒在經絡骨髓也咳嗽口渴者毒火上炎也用養血解毒之劑倍土茯苓數劑而減十劑全愈薛立齋治一男子遍身皆患梅瘡左手脈浮而數以荊防敗毒散治之表症乃退以仙方活命飲六劑漸愈兼飲萆薢湯月餘而愈一童子外腎患此症延及小腹數枚作痛發熱以小柴胡湯吞蘆薈丸更貼神異膏月餘而安一儒者患前症先外腎作癢出水後陰囊股內小腹脅臂發小瘰或干或膿窠誤服祛風等藥肢體倦怠惡寒發熱飲食漸減大便不實脈見浮弦兩尺浮數此腎水虛熱肝木乘脾土也用六味地黃丸補中益氣湯為主佐以換肌消毒散而愈一人患此症服攻毒等藥患處凸而色赤作痛肢體倦怠惡寒發熱脈浮而虛此元氣復傷而邪氣實也用補中益氣湯二劑而愈進士劉華甫患此症數月用輕粉硃砂等藥頭面背臀各結一塊二寸許潰而形氣消弱寒熱口乾舌燥唇裂小便淋瀝痰涎上湧飲食少思此脾胃傷諸臟弱而虛火動也先用六君子湯二十餘劑又用補中益氣湯加山藥山萸麥冬五味服之胃氣復而諸症愈惟小便未清痰涎未止用加減八味丸而痊一男子患楊梅瘡後兩腿一臂各潰二寸許一穴膿水淋漓少食不睡久而不愈以八珍湯加棗仁茯神服之每日以蒜搗塗患處灸良久遂貼膏藥數日稍可卻用豆豉餅灸之更服十全大補湯而愈一婦人患此症皆愈惟兩腿兩臁各爛一塊如掌兼筋攣骨痛三年不愈諸藥無效日晡熱甚飲食少思以萆薢湯兼逍遙散倍用茯苓白朮數劑熱止食進貼神異膏更服八珍湯加牛膝杜仲木瓜三十餘劑而愈薛立齋治一婦人患此症燃輕粉藥於被中熏之致遍身皮塌膿水淋漓不能起居以滑石黃柏緑豆粉末等藥鋪席上令可臥更服神功托裡散月餘痊青浦四十二堡一大家聚妾生楊梅瘡遍身潰爛臨終棄之於野一乞丐收養之數日不死女忽思食肉適有數盜在盂婆墩祭賽丐者乞肉即與一肩懷歸食婦食未盡者懸之樹枝為蜈蚣所食毒侵肉中婦食之瘡為毒發旬日全愈其色更麗於前丐欲送歸婦不許曰我當終身從君矣遂為伉儷生一子丐者日操舟乞食龍潭其婦言笑不苟亦云賢矣云間雜志立齋治一男子咽間先患及於身服輕粉之劑稍愈已而復發仍服之亦稍愈後大發上齶潰蝕與鼻相通臂腿數枚其狀如桃大潰年餘不斂神思倦怠飲食少思虛症悉具投以萆薢湯為主以健脾胃之劑兼服之月餘而安一婦人患此症臉鼻俱蝕筋骨作痛腳面與跟各腫一塊三月而潰膿水淋漓半載不斂治以前藥亦愈一男子陰莖患此症腫痛先以導水丸龍膽瀉肝湯各四服少愈再以小柴胡湯加黃柏知母蒼朮五十餘劑而平一男子患此症陰莖腫潰小便赤澀肝脈弦數以小柴胡湯加木通青皮龍膽草四帖又服龍膽瀉肝湯數帖而全愈一婦人患此症焮腫便祕作渴脈沉實以內疏黃連湯二劑里症已退以龍膽瀉肝湯數劑頓退間服萆薢湯月餘而愈一男子患此症發寒熱便祕作渴兩手脈實以防風通聖散治之而退以荊防敗毒散兼龍膽瀉肝湯愈一男子患此症愈後腿腫一塊久而潰爛不斂以蒜搗爛敷患處用艾隔蒜灸之更貼神異膏及服黑丸子並托裡藥兩月而愈一男子患此症皆愈但背腫一塊甚硬肉色不變年餘方潰出水三載不愈氣血俱虛飲食少思以六君子湯加當歸藿香三十餘劑少愈更飲萆薢湯兩月餘而愈一男子患此症勢熾兼脾胃氣血皆虛亦服前藥而痊後不復發馬銘鞠治李行甫患黴瘡俗名廣瘡誤用水銀番磽等藥搓五心三日間舌爛齒脫喉潰穢氣滿室吐出腐肉如豬肝色湯水不入腹脹二便不通醫皆謝去獨用治喉藥吹喉痰壅愈甚痛難忍幾死馬按其腹不痛雖脹滿未堅猶未及心知水銀毒入腹未深法宜以鉛收之急用黑鉛斤余分作百餘塊加大劑甘桔湯料銀花甘草各用四五兩水二三十碗鍋內濃煎先取三四碗入湯注中徐灌之任其自流逾時舌漸轉動口亦漱淨即令恣飲數盞另取渣再煎連前濃汁頻濯手足次日二便去黑水無算始安方用吹口藥及敗毒托裡藥數劑而愈後賈僕有顏孝者亦患黴瘡誤用水銀熏其症如一行甫即以前法治之次日立起廣筆記廣筆記治黴瘡方豬胰脂二兩金銀花二錢皂角刺一錢芭蕉根一兩雪裡紅五錢五加皮二錢土茯苓白色者二兩皂莢子七粒打碎獨核肥皂仁七粒切片白殭蠶炙七分木瓜一錢白蘚皮一錢蟬蛻一錢年久力衰者加薏苡仁五錢甘草節二錢綿黃耆三錢生地二錢人參二錢久不愈加胡黃連三錢胡麻仁二錢全蠍七枚水三大碗煎至一碗不拘時餓則服廣筆記治結毒方獨核肥皂仁七粒雪裡紅一名千年矮一兩皂莢子七粒甘草節一錢半木瓜錢半蟬蛻一錢青木香一錢土茯苓白色者二兩綿黃耆鹽水炒三錢連翹一錢白殭蠶蜜炙炒研七分鱉蝨胡麻仁炒研三錢白芷一錢何首烏三錢金銀花三錢水煎服又方極木一名十大功勞一名貓兒殘即本草拘骨黑子者是紅子者名樞木亦可用取其葉或泡湯或為末不住服此方兼治積年虛勞痰火健脾進食廣筆記云凡父母正患黴瘡時生兒鮮有完者其證渾身破爛自頂至踵兩目外幾無完膚日夜號泣或吐或瀉似瘧似驚變態百出若別作治療十無一全治法以牛黃為君量加犀角羚羊角硃砂冰片和入茯苓粉生蜜調服使兒日日利出惡毒見有他證隨宜治之母亦隨宜用藥其外用大粉草金銀花為極細末二三升破爛處洗淨大握敷之半月後再易神效敷藥再敷數日愈愈後一兩月當復發再後兩三月當再復發發漸輕仍如法治之自愈愈後或口角眉角或肛門存二三餘毒不必治矣其渾身或癬或瘡忽聚忽散敷之便愈大抵年餘始得除根若母不禁口或兒漸大不能禁口有延至二三年者然不斃足矣胎中之毒徹骨入髓焉能旦夕除哉升藥五靈散方膽礬治筋而滋肝辰砂養血而益心雄黃長肉而補脾明礬理脂膏而入肺磁石榮骨而壯腎此方見焦氏外加水銀一兩與前五味等分和勻入陽城罐內打火三炷香取出加入敷藥中用之效又神效敷藥方合花白者良陰乾象皮同黃砂炒候軟切片再炒候冷方研降香炒研乳香沒藥各去汗血竭兒茶濕紙包煨花蕊石五倍子色帶紅者良半生半煆各一兩白蠟八錢珍珠五錢冰片一錢各研極細末方入白蠟研勻最後入冰片如欲去腐每兩加五靈散二錢欲生肌每兩加前散三分或五分如治痘後膿水淋漓下疳等瘡只加一二分治湯火傷每兩加絲綿灰二錢剔牙松皮煆存性五六錢鉛粉煆黃五六錢或干糝或香油調一切外症俱效
