body:
  text: 卷三十嗽張子和曰鹿子春一小兒八歲夏月病嗽羸甚余欲湧之子春以為兒幼弱懼其不勝少難之一日飲酒家人與之酒過多大吐吐定而嗽止蓋酒味苦苦屬通劑乃大悟余之言也萬密齋治胡元溪子五歲春病嗽醫用葶藶丸乍止乍作至夏轉作又一醫用五物湯不效或以葶藶或以三拗發表攻裡其嗽益加至百十聲不止面青氣促口鼻出血勢急矣曰自春至秋病已半年治之不易乃用二冬二母梔芩甘桔蘇子茯苓陳皮去白連進三劑咳只二三十聲一醫以二陳加防風百部杏仁紫菀桑皮萬曰肝氣已逆吾方降之其咳稍罷防風百部升發之品似不可用彼云防風百部乃咳嗽聖藥也服之氣上逆而咳百十聲不止口鼻血復來再求治仍用前方取生茅根搗自然汁和藥與之五日而血止去茅根或加款冬杏仁以止其咳或去黃芩梔子加人參白朮以補其脾或加阿膠以補其肺調理二旬而安蓋方春時多上升之氣肺感風寒當與發散葶藶丸乃攻裡之劑肺金本虛而反瀉之此一逆也夏天火旺肺金受克當用清金瀉火之劑三拗湯乃發散藥也用熱犯熱此二逆也一汗一下肺金大虛矣方秋時氣應降而不降反用升發之劑此三逆也今用收斂清降之藥以平其浮游之火火衰於戌時值九月故病易已許氏子病嗽痰中帶血或用茅根湯治之不效延萬治因問先生治胡元溪子用茅根此亦用茅根然不愈何也曰彼病於秋肺旺肝燥此病於冬血衰時也且彼乃口鼻出血屬陽明胃此是痰中有血屬太陰肺病既不同治亦有別乃用阿膠為君杏仁霜栝蔞霜貝母為臣蘇葉桔梗甘草為佐煉蜜為丸薄荷煎湯化服而愈萬石泉女病久嗽不止胸高氣急曰此龜胸病也胸者肺之府也肺脹則胸骨高起而狀如龜殼吾聞其病未曾治之故無方也或者不可治乎石泉曰氣脹者肺實也當服葶藶丸曰病有新久症有虛實知為虛何不投補再服葶藶瀉肺之劑恐有虛脫之禍不聽竟以是卒吳孚先治一小兒咳嗽動便作痰聲喉如曳鋸脈數洪滑紋如魚刺用加減二陳湯兼服神仙玉露散而痊萬密齋治舉人蔡沙江子病咳久不止其咳連聲不絕咳時面青右手常自擺動曰不可治也問何故曰咳者肺病也肺屬金面青者肝之色也肝屬木手擺者肝風欲發之狀木來侮金寡乎畏也今十月金病木生之時四時之序將來者進成功者退木生而進金病而退必發搐甲乙日劇果乙日搐而死此段談理入微然何不大用養肝清肺之劑以冀萬一設玉橫遇此症必有以處之矣曾芸塘子九歲病咳半夜甚乃胎稟不足腎虛嗽也用人參固本丸加阿膠桑皮盡劑而安又汪元津子病腎虛嗽與上症同亦用人參固本丸加茯苓知母貝母山藥各等分為丸服之而安蔣仲芳治盛氏女十餘歲患內熱乾咳特甚醫與清火滋陰麥冬黃芩之品服之不效脈得弦數脈症湯藥甚相合也因何不愈沉思間忽聞女衣有煙火氣詢其曾臥火箱中乎曰然即以前方與之令其遷臥床上遂不終劑而愈問故曰咳嗽火熱爍金以清火潤肺之品治之甚當其如外火復逼一杯水其能救車薪之火乎今離卻外火其病自愈耳可見藥即對症而飲食起居調攝失宜亦致不效非如此細心體察鮮不誤矣喘萬密齋治一兒四歲忽作喘氣逆痰壅鼻孔開張萬曰此馬脾風也以鼻煽命名也如胸高肩聳汗出發潤皆下脫也則不可治須急治之以葶藶丸去防己加大黃除肺之熱合小陷胸湯除肺之痰碾為細末竹瀝調服作實治服法精當一兒病兩腮紅上氣喘急脈浮緩而濡此得之傷食食傷脾脾虛則不能養肺母病子亦病也兩腮紅者虛熱也上氣喘急者肺虛也脈浮緩而濡氣虛也時醫咸以驚風為治用抱龍丸牛黃丸蘇合丸不效聞其言皆匿笑乃以阿膠炒成珠煎蘇葉烏梅湯化服三劑而瘳觀其治法乃肺虛之喘以阿膠補肺陰兼用一散一斂之法其用意甚巧傷食云云乃英雄欺人語未足為據也一富室小兒先病瀉醫以藥服之乃作喘歸咎於醫萬曰非醫之誤乃冷傷脾作瀉脾傳肺作喘脾為母肺為子傳其所生也用陳氏芎葛散一服喘止而安後用此方治瀉後喘者良驗一女子素有喘病發則多痰用補腎地黃丸或曰喘者肺病也今補腎何也曰肺主氣腎則納而藏之痰涎者腎之津液所生也哮喘吐痰乃氣不歸元津涎無所受也果服此而安朱丹溪治一女年十二自小喘嗽白朮陳皮青皮各五錢麻黃茯苓木通片芩各三錢蒼朮桔梗各二錢乾薑一錢甘草五分每帖一錢半煎服龔子才治一小兒外感風邪服表散之劑汗出作喘此邪風去而脾虛也用異功散而汗喘止再劑而乳食進馮楚瞻治同姓子三歲平時面色㿠白囟門寬大顱骨開解一夕忽發微喘不能睡倒抱起稍可至二三日雖抱起而喘急不減出多入少兩便亦急肝腎大虧理宜用上病療下之法恐不肯輕服乃設詞曰喘已多日肺氣虛矣當以人參錢許配生脈飲作湯化服啟脾丸乃愈也急歸寓以八味丸杵作大丸代之服下喘日減四五日後本症悉平精神倍長屢索啟脾丸而囟門顱骨俱長滿矣吳孚先治一小兒氣急而喘喉中聲如水雞叫用三拗湯而愈錢國賓治中翰六登之次子自幼吼喘日夜不絕今八歲莫愈身體無病診右寸浮滑主肺竅有痰喘吼三白丸煅白砒貝母桔梗各三分飯丸黍米大每睡時冷茶送下五丸至五日此子索物不厭其母嗔之猛然一嗆吐出黑痰一塊如圓眼大其臭滿室剖開內包大黑瓜子一枚尖小破從此吼喘即止舉家感激除此子一生之患矣及問其故曰肺有六葉兩耳四垂如華蓋清虛之臟一塵不染因乳子誤吞瓜子入於肺縫久則痰膠阻礙呼吸之氣作吼喘聲也今藥力攻出肺清而金不鳴則無聲痰出而呼吸利則無吼喘症矣哮萬密齋治胡三溪女素有哮症遇天欲雨則發發則多痰服五虎湯九寶湯即止不能斷根五虎湯麻黃杏仁陳茶石膏甘草九寶湯麻黃陳皮薄荷玉桂蘇葉桑白腹皮杏仁甘草姜煎曰是蓋痰聚則作喘痰去則止痰者水液之渾濁者也難經云腎主液液者水所化也腎為水臟入心為汗入肺為涕入脾為涎此腎水泛為痰而喘也乃以六味地黃丸服之不復發矣陳三農治一小兒鹽哮遇陰雨即發聲如曳鋸以白砒一錢入精豬肉四兩內以鹽泥固齊火煅出清煙取出研細入江西豆豉一兩搗和為丸如黍米大白水下二三丸忌油膩葷腥一月而愈朱丹溪治一男子年十四歲哮十日則發一遍此痰在上焦不當汗泄正當九月十月之交宜溫散仍與小胃丹佐之溫散如麻黃黃芩每帖用一錢半入薑汁研細末以水盞半煎去渣飲之每夜臨臥時與小胃丹十二粒津下之此用麻黃乃以開肺竅非溫散法也馮楚瞻治朱姓兒三歲哮喘大作數日身熱汗出或以滾痰丸利之益甚脈洪數胸脅扇動扶肚抬肩頭汗如雨不食不眠曰久喘下元已傷復以峻利傷之故見諸惡候也以人參麥冬各五錢五味三粒肉桂二分煎服日二三帖喘頓減至夜復作蓋夜屬陰而陰未有以配之也以八味丸加牛膝麥冬五味內熟地六錢桂附各四分水煎冷服午前後各一劑睡醒食進喘止但勞動則喘聲微有此未復元之故以生脈飲調理三四日全安虛損竇材治一幼女病咳嗽發熱咯血減食先灸臍下百壯服延壽丹黃耆建中湯而愈戒其不可出嫁犯房事必死過四年而適人前病復作竇曰此女稟賦素弱只宜固守終老不信余言破損天真元氣將脫不可救矣強余丹服之竟死李士材治汪氏兒年方舞象太文發熱咳嗽羸弱頭眩二冬二母知柏黃芩不啻百劑病勢轉增脈之右虛軟乃脾肺氣虛火不生土之候也用補中益氣加五味子苡仁薑桂至三錢必困苦寒過傷乃可十劑而減兩月乃安春初復發令其服補中丸一錢諸症永不作矣柴嶼青曰六兒身熱懶食脈細而無力屬陰虛血少服逍遙散二劑未效內人力請延醫及診視云脈弦為痹瘧余固爭脈並不弦醫不服強令服二帖身熱更甚遂立意服壯水之劑二十帖始愈至乙丑復患身熱服六味湯四十日始霍然因嘆曰幸是自家小兒故得自主倘他人延治四五帖未效必更醫矣能保其不誤事哉馮楚瞻治張氏子年十三忽患腿癰外科云勢難消散出膿得兩月收功視其體浮胖色㿠白知為先天不足矣再診其脈六部沉細而微復視其腫則右腿為甚色白而冰冷經曰血氣不和留結為癰今但使血氣和而無留結癰何由成與八味湯加牛膝杜仲各二錢食前服之一劑腿溫痛減半三四帖全瘳薛立齋治一小兒九歲解顱足軟兩膝漸大不能行履此腎稟不足用六味丸加鹿茸三月而能步履一小兒年十四肢體倦怠發熱晡熱口乾作渴吐痰如湧小便淋漓或面目赤色身不欲衣此亦稟賦不足也用補中益氣湯及前丸而愈一小兒十五歲而御女大小便道牽痛服五苓散之類虛症蜂起與死為鄰用補中益氣湯加減八味湯而愈一小兒十二歲內熱晡熱形體倦怠食少作渴或用清熱等藥治之虛症悉具以為所稟怯弱用六味丸加鹿茸補之不越月而痊萬密齋治一兒四歲出痘時頸軟頭傾曰此兒胎稟不足瘡毒正發壯火食氣亟補元氣使痘易發易靨幸而保全再補其陰不然恐難出二八數也乃大進調元湯連進之獲安江蘭峰子七歲頭面汗出如流用人參當歸二味同獖豬心煮湯服之安一女嗜臥發熱項軟頭傾欲作風治持疑未決萬曰此陽虛病也蓋頭者諸陽之首胃者諸陽之會此女必乳食傷胃胃氣不足故清陽不升而頭軟不能任元陽也可服調元湯一劑而愈一小兒脫肛半載常服升補元氣之藥而愈繆仲淳治里中一童子年十五患寒熱咳嗽面赤鼻塞夜劇家人以為傷風繆視之曰陰虛也蓋傷風之症面色宜黯今反赤而明傷風發熱必晝夜無間今夜劇鼻塞者因虛則火上升壅肺故鼻塞以是知其陰虛也投以麥冬五味桑皮貝母百部生地鱉甲黃沙參不四劑而瘳立齋曰一小兒十四歲解顱自覺頭大視物皆大畏日羞明先兄以謂稟怯弱用六味丸加五味鹿茸及補中益氣加山藥山萸半載漸愈二載而囟合後畢姻覺囟門開解足心如炙喜其斷色欲戒厚味日服前藥二劑三載而愈一小兒白睛多黑睛少吐瀉後喉喑口渴大便不實朝夕悉服地黃丸而痊後患瀉其喉復喑仍服前丸遂愈疳萬密齋治朱氏子年七歲脾胃虛弱食多則傷食少則困形瘦面黑醫者因其傷食則與枳朮保和丸以消導之因其困倦則與參朮茯苓丸以補之時補時消精神日瘁將成疳矣萬曰脾胃素虛不能消穀故食易傷也傷食而後消導之則脾益虛虛而復補脾未得實而傷者又至矣豈良法哉今專以補脾為主內兼消導名肥兒丸用四君子加陳皮青皮木香砂仁山藥蓮肉使君子肉神麯麥芽山楂肉共為細末荷葉包粳米煮爛搗為丸米飲下自此不復傷食肌肉漸肥教諭許厚子年十四吐血醫作痰火治不效脈之兩尺右關皆不足曰年未二八脈當沉緊今反不足當作胎稟怯弱之病然觀宗師體厚何以有此必夫人當有虛病或乳少得之也父母臟腑有病兒多稟之臨症之工宜留心也許曰其母孕時果病產後無乳問治法曰十六歲後病此者曰勞十五歲前病此者曰疳即勞也數語兒醫不可不知宜用六味地黃丸以補腎參茯白朮丸以補脾病自安矣如言服之一月而愈一女五歲因感冒不愈變為瘧瘧止變為痢痢止成疳肌肉消瘦飲食減少日啖蓮肉十數枚萬視之曰疳病也形色雖衰幸胃氣尚存可愈也以集聖丸調理三月而安胡氏子一歲病腦後啞門穴在風腑穴之下天柱兩穴之中生一毒如桃大已潰白膿不幹萬視之曰此無辜疳也法不能治或問何謂無辜疳曰此全幼金鑑所載也有妖鳥名睢一名夜行遊女白晝不出夜則出飛此鳥無雄飛入人家遇襁褓衣曬晾未收者則布毒其上兒著此則病而死掠取其魂化為己子是名無辜疳亦傳屍之類也其病頭上有核破之內有白粉況項下之疽又九不治中之一症也故云難治五日果死孫文垣族孫女年十歲大便脫肛鼻中時常出血夜多咬牙肚熱面黃將成疳症以山楂青蒿枳實升麻酒連滑石各一兩甘草蘆薈乾蟾各五錢為末神麯為丸一料全愈龔子才治一小兒四肢消瘦肚腹脹大行步不能頗能飲食作渴發熱去後臭穢此脾臟傷也用異功服肥兒丸調理而愈薛立齋治一小兒面色萎黃眼胞微腫作渴腹脹飲食少思腹中一塊或移動小便澄白大便不實此脾疳之患用四君子加山梔蕪荑兼肥兒丸而愈一小兒尿濁如米泔疳之候也以江南做酒小曲炒為末酒調下三服愈孝伯有女曰止者病疳發於目啼不可止以視李紹伯乃取十餅投之未半而瘥錢氏云疳在肝則膜遮睛法當補肝地黃丸主之又孝若之乳母棄其子乳他姓子其子骨立矣又不任見日肝腎枯稿紹伯曰渴乳傷食亟治之必服羊肝散一具活矣某謂紹伯某即不知醫是兒於望聞二法俱無生理紹伯曰固也吾藥能主胸突腹凹骨開者此症未見何得勿活乎筆談萬密齋治一小兒五歲腹大善食初見之謂其父母曰乳多必損胃食壅必傷脾腹大如是又縱其口腹恐腸胃乃傷不成腸癖必成疳也後果成疳肚大青筋以集聖丸調理而安胡鳳厓子病疳但多食則腹痛曰人以食為本谷入作痛豈新谷為患乎必有舊谷為積未能消去故新谷相持也乃與養脾消積丸服之而安一兒八歲形氣甚弱其父責令讀書謂曰此兒稟弱宜懷保之不可一於嚴也留養脾丸肥兒丸與之後半年病成疳矣一醫謂傷食以一粒金丹服之病乃劇延治問前藥則未服也曰不可治矣一粒金丹內有草烏巴豆大毒之品此兒素性弱食少而瘦故與前丸調理乃舍此而服彼此犯虛虛之戒也後果歿朱丹溪治一富家子年十四面黃善啖易飢非肉不飽泄瀉一月脈之兩手皆大不甚瘦倦以為濕熱當脾困而食少今反形健而多食且不渴意其疾必蟲作痢也取大便視之果蛔蟲所為適欲他往令兒醫用治蟲藥治之禁其勿用去積藥待再診而止痢也後勿果至次年春夏之交其瀉復作腹不痛而口渴曰此去年治蟲而不治疳故也遂以去疳之藥濃煎白朮湯下三日後而瀉止月後乃甚瘦教以白朮為君白芍為臣川芎陳皮黃連胡黃連入少蘆薈為丸白朮湯服之半月而止禁其勿食肉與甜物三年當自愈馬銘鞠治張守為幼郎患癆疳嗜食易飢腹如蜘蛛過數日一瀉瀉則無度面目黧黑指節中亦幾無剩肉矣其母亦病診脈緊數骨蒸勞熱大渴引飲淋閉腹若蜘蛛曰兒病實母病也用麥冬枇杷葉生地白芍青蒿鱉甲之屬以治母用乾蟾為君加羚羊角犀角白芙蓉花牛黃每用分許日入雞肝內飯上蒸服以治兒再用滑石扁豆茯苓車前山楂五穀蟲等分為末拌人乳曬乾七次略入砂仁末陳米湯丸彈子大日進兩丸不二十日子母俱痊二方絕無藥氣故兒喜啖之廣筆記說約云予表侄二三歲間患疳積症頭大身瘦發熱溺如米泔諸治不效後聞藥氣即吐束手無策偶遇異人傳此紅燕丹方和於糖果粥飲中與之數服全愈後以此濟人無不效矣魏玉橫曰俞氏兒四歲痘後失調致成疳疾猛啖而頻瀉腹大皮急夜哭咬牙因其母病延診藥殊無效適見醫至見所用藥皆香砂楂枳車前扁豆茯苓豆蔻類皆消積滲利之品兒益困憊其母哭泣至目腫流血乃謂曰今以母病托予而子病不痊則母病亦進必先愈子而後母可愈也問當奈何曰無已請以母所服分飲之則兩病俱愈矣其家非素封既難資費又無旁議遂如言治之不逾旬母子皆安蓋其母由產後兒緣痘後母則寒熱往來面足俱腫惡露逾月不止頭痛不眠食難下咽與兒之症同為血虛生火木盛剋土而然彼兒醫者烏能用生熟地黃沙參杞子黃連麥冬以愈是疾哉凌表侄孫四齡予嘗見之曰兒將病疳不以為意也逾半年則疳已甚天柱傾側臍突筋青毛髮脫落股肉亦消嗜食而泄利亦極穢多怒多啼似難為矣但其皮未急目尚有神乃與生地杞子沙參麥冬棗仁米仁病不減心亦疑之少加木香砂仁則瀉益甚西席黃澹翁通人也謂泄益甚得毋香砂為害乎予曰然遂去之益以熟地川連十餘劑乃全愈予女八九歲時疳病枯瘠如柴矣以六味加減熟地用八錢十劑而痊向後但以前方治效者不可枚舉小兒諸疳使君子肉二錢雷丸檳榔各一錢黑醜頭末各五分俱生曬研末每服三分以雞卵一枚打破空頭內藥紙封飯上蒸熟食之藥完即愈小兒積滯海蜇鳧茈常煮食之兼治大人痰哮及肝乘胃痛浸燒酒飲之能消大人胸中痞塊又紹興青腐乳汁作下飯能消疳積治腹脹身黃小兒疳氣攻目雞肝一具不落水竹刀切片用牡蠣粉八分飛辰砂少許拌勻糝入飯鍋上蒸熟食之如此十次翳即退淨當時忌食茶湯油膩治小兒疳病用雞肫皮二十個勿落水瓦焙乾研末車前子四兩炒研末二物和勻以米糖溶化拌入與食食完即愈忌油膩麵食煎炒又方取田雞白水煮熟薑末少許亦效仲淳肥兒丸人參三錢蕪荑使君子肉白芍黃連白茯苓滑石扁豆青黛各一兩橘紅八錢甘草砂仁各五錢紅曲麥芽山楂肉各七錢蓮肉二兩煉蜜為丸如彈子大每服一丸空心白湯化下又集驗良方肥兒丸山藥炒二兩白茯苓白芍藥白扁豆麥芽炒五穀蟲炒神麯炒山楂肉炒當歸各一兩五錢白朮土炒陳皮使君子肉煨一兩生甘草胡黃連薑汁炒各七錢蜜丸綠豆大每服一錢奇效肥兒丸陳皮一兩青皮醋炒神麯炒檳榔使君子肉煨各五錢木香黃連姜炒各三錢飴糖丸綠豆大每服五六分皆治疳病方也匯錄於此以便選用又廣筆記疳積散治小兒面黃腹大小便濁如米泔大便黃泄酸臭皮毛枯索甚至雙目羞明生翳夜熱晝涼等證用厚朴去皮切片薑汁炒熱淨末二兩廣陳皮去白淨末八錢粉甘草去皮炙七分真蘆薈淨末七錢蕪荑淨末五錢青黛取顏料鋪浮碎花青淘淨末二錢百草霜即山莊人家鍋底煤二錢五旋覆花淨末一錢五分勻和成劑小兒每一歲用藥一分燈心湯空心調服服後病愈再用肥兒丸調理又脾氣未實用啟脾丸或大健脾丸如疳氣未盡用陳皮一兩白木香三錢白茯苓五錢加平胃散三錢為末陳米湯調下若疳瀉痢見紅白積者用前散加黃連薑汁土炒肉豆蔻二味燈心湯少入熟蜜調服若食積重者前散用砂仁湯調服若疳眼用雞肝一具不拘大小雌雄一二歲兒只用半具外去衣內去筋膜研極細入前末調極勻入前末厚薄相和隔湯頓熱空心服或用甜酒少加熟白湯調服凡小兒疳在內目腫腹脹瀉痢青白體瘦羸弱疳在外鼻下赤爛頻揉鼻耳或肢體生瘡鼻瘡用蘭香散蘭香葉燒灰二錢銅青輕粉各五分為末干貼諸疳瘡用白粉散海螵蛸三分白芨二分輕粉一分上為末先用漿水洗拭乾貼肝疳一名筋疳白膜遮睛或瀉血面瘦心疳面黃頰赤身體壯熱脾疳一名肥疳體黃瘦削皮膚乾澀而有瘡疥腹大嗜土腎疳一名骨疳肢體瘦削遍生瘡疥喜臥濕地肺疳一名氣疳喘嗽氣促口鼻生瘡若患潮熱當先補肝後瀉心勿妄以硝黃諸藥利之若患癖當消磨若誤以巴豆硼砂下之及傷寒誤下皆能成疳其初病者為熱疳久病者為冷疳冷熱相兼者津液短少者皆因大病脾胃虧損內亡津液所致當固脾胃為主早為施治則不變敗症也葉天士曰稚年五疳猶大方之五勞雖方書有五臟之分是症夏令為多咸從脾胃蓋小兒乳食雜進運化不及初斷乳後果腥雜進氣傷滯聚致熱積於裡肌肉消瘦腹大肢細名曰丁奚或善食或不嗜食或濁飲無度或便瀉白色久延不已多致凶危宜忌食生冷腥肥凝滯治法即用清熱和中分利次則疏補佐運常有繼病治之無效待妊婦產過自愈者徐靈胎曰小兒為孕婦所抱則生繼病雖不盡然實有此病理不可解幼兒斷乳納食值夏月脾胃主氣易於肚膨泄瀉手足心熱形體日瘦或煩渴善食漸成五疳積聚當審形體之強弱病之新久有餘者當疏胃清熱食入糞色白或不化當健脾佐消導清熱若濕熱內郁蟲積腹痛徐靈胎曰最多導滯驅蟲微下之緩調用肥兒丸之屬藜按肥兒丸方最多景岳全書有四方一四味肥兒丸蕪荑炒神麯炒麥芽炒黃連炒分為末豬膽和丸黍米大每服二三十丸木通湯下二六味肥兒丸黃連陳皮川楝子肉炒神麯炒麥芽炒各一兩白蕪荑半兩為末糊丸麻子大每服一二十丸空心米飲下三七味肥兒丸黃連炒神麯炒廣木香各一兩五錢檳榔二十個肉豆蔻泡二兩使君子酒浸麥芽炒每四兩為末麵糊丸麻子大每服三五十丸米飲下良久用五味異功散一服以助胃氣四蘆薈肥兒丸蘆薈龍膽草木香人參使君子肉蚵蚾酥炙去頭足即土鱉蟲麥芽炒各二錢檳榔黃連酒炒白蕪荑各三錢胡黃連五錢上為細末豬膽汁為丸黍米大每服五六十丸米飲下又醫宗金鑑肥兒丸人參三錢半白朮五錢茯苓三錢黃連二錢胡黃連五錢使君子肉四錢神麯炒麥芽炒山楂肉各三錢半炙甘草錢半蘆薈煨二錢半上為末黃米糊丸黍米大每服二三十丸米飲下金鑑蘆薈肥兒丸五穀蟲炒二兩生蘆薈胡黃連炒川黃連姜炒各一兩銀柴胡炒一兩二錢扁豆炒山藥炒各二兩南山楂二兩半蝦蟆煆四個肉豆蔻煨七錢檳榔五錢使君子肉炒二兩半神麯炒二兩麥芽炒一兩六錢鶴蝨炒八錢蕪荑炒一兩飛淨硃砂二兩麝香二錢其為末醋糊為丸黍米大每服一錢米飲下腫脹小兒腹痛體瘦面色㿠白目無睛光口中氣冷不思飲食或嘔利撮口此脾上虛而寒水所侮也若口中氣溫面色黃白目無睛光或多睡惡食或大便酸臭此積病也若腹脹而悶亂喘滿者實也若不悶亂者脾虛也誤下之以致目無精光四肢浮腫肚腹愈脹因下而喘脾氣更虛也脾虛不能勝腎水隨肺氣行於四肢如水狀若浸浮於肺即大喘也若腎熱傳於膀胱熱甚逆於脾肺脾胃虛而不能制腎水流走四肢而身面皆腫若土勝則形於肺故令喘也葉天士治一徐姓小兒單脹數月幼科百治無功僉用肥兒丸萬安散磨積丹綠礬丸雞肫藥俱不效宜治血絡所謂絡瘀則脹也用歸鬚桃仁延胡山甲蜣螂䗪蟲靈芝山楂之類為丸十日全愈孫兆治殿中丞某郎中妹十歲腹痛色不變按之而大陷心腹痞膈病已月餘按甲乙經云三焦脹者氣滿於皮膚中腫如石堅遂與仲景方厚朴生薑各二兩半夏七錢甘草半兩人參一錢每用藥一兩五錢水煎分三服一日服之至二十日愈張子和治郾之營兵秋家小兒病風水醫用銀粉粉霜之藥小溲反澀飲食不進頭腫如腹四肢皆滿狀若水晶家人以為死矣強勉求治張曰此症不與壯年同壯年病水者或因留飲及房室此兒方七歲乃風水症也宜出汗乃置燠室以屏障遍遮之不令見火若內火見外火必昏憒也使大服胃氣湯而浴之浴訖以布單重覆之凡三五重其汗如水腫減七分乃二汗而全減尚未能食以檳榔丸調之兒已喜笑如常日矣李時珍鄰家一小兒因積黃腫腹脹如鼓偶往羊桃樹下取食之至歸而大吐痰水病遂愈羊桃乃山楂同類醫家不用而有此效則其功應相同矣本草綱目張景岳在京治十五歲兒適經藥鋪見有曬晾巴豆其父誤以為松仁以一粒與食之嚼而味辣亟吐出已半粒下咽矣少頃大瀉十餘次日肚腹通身即腫脹絕口不食或謂宜黃連綠豆以解毒或謂四苓五物以利口張曰大攻之後豈非大虛之症乎能再堪苦寒以敗脾否大瀉之後又尚有何水之可利遂單用獨參湯及溫胃飲以培脾氣不數劑而復元夫既已大瀉而何以反脹若是是可知大虛致成腫脹者類多如此雄按巴豆性熱瀉後心虛繆氏治莊斂之一案可證未必可投溫藥馮楚瞻治何氏子九歲肚腹脹極痞塊有形肌削神困耳中膿潰目紅腫牙齦出血或時腐爛咳嗽氣短膝痠疼夜不能寐日不能食已成壞症詢其病由乃起於腿半周之內肚稍腫硬初時消導後用補脾兼消及清熱化滯六七年來腹脹更加痞硬更大牙痛耳目腫爛益甚僅存皮骨脈之或時弦洪有力或時弦而無力知為久服克伐真氣內亂轉護邪氣為害先天之真陰真陽已竭乃中空外浮之象也先以金匱腎氣丸料加麥冬五味作湯大劑空心溫服數劑熱減腹稍軟隨以前劑衝入人參湯三錢食前日二劑十餘日後精神稍長諸症漸退後早晨以生脈飲送下加五味牛膝之八味丸三錢申酉仍以前方服之兩日諸症悉平向之痞脹如失張氏子亦患腹腫消導幾死亦以八味去附子倍熟地加麥冬五味牛膝而愈第不能久服丸藥次年夏忽兩脅腫硬如婦人之乳垂下外科與解毒不效加兩頤之下腫亦如之百治不減或議開刀馮曰此肝腎之火上炎耳何毒之有仍以前方加青皮四分土貝二錢食前服之不十劑全愈一兒病腫有庸醫假專門之名不守家傳之法常稱得異人之術用牽牛葶藶為治腫方之神藥作散服之元氣下陷肚大坐不得臥陰囊腫大莖長而卷萬見之嘆曰脾土已敗肝木獨旺乃賊邪也不可治矣果死一兒病腫腹大彼信庸醫妄談五日消一分乃取繩子圍其腹量之投以牽牛葶藶服之利下數行腫減十分之二父母甚喜約至五日再消三分未三日又大腫較大於前庸醫聞之走去病勢日甚而死張氏子瘧後病腫求治曰此脾虛腫也與胃苓丸用長流水煎燈心湯送下教以每日午時前後天氣和暖於避風處湯洗之洗畢覆被睡一時令有微汗為度此水漬法也經曰漬形以為汗調理半月平復如常高鼓峰治沈啟廷孫三歲脾虛發腫兩足更甚乳食不思午後發熱頭面羸瘦俗醫云此病如用官料藥鬚髮黃鼓脹而死但當服草頭藥並以針挑其指出黃水自愈浙西人言出自醫家藥籠中者謂之官料藥俗傳單方一二味謂之草頭藥病家信之服其藥日益劇高視之曰凡藥皆草根樹皮也何以出自醫家便為官料此無稽之談也投以溫補之劑服之漸有起色未幾又發瀉又頭上生毒爛至見骨又出瘄皆極重病纏綿不休乃一味補正他病見則隨症稍加減之如是者自夏迄冬用參幾斤余才得脫體次年長肌肉設惑眾說寧有救否按腫症多濕熱為患雖云脾虛必審其小便長短清濁及大便溏燥濃淡以施治若一概云脾虛參術蠻補必致綿延不已今自夏迄冬誠何故哉至用參斤余即今時富家亦委命而已孫文垣治張後谿之孫遍身瘡疥浮腫腫自足背起漸上大腿今且至腹大便泄瀉發熱少眠此風溼症當令與時違之候治從開鬼門潔淨府二法使清陽升則瀉可止小水利則腫可消上下分去其濕之意也蒼朮一錢苡仁桑皮各三錢青蒿防風升麻柴胡各五錢錢當是分大腹皮五加皮各六分八帖全安薛立齋治一小兒肚腹膨脹飲食即瀉手足逆冷以為脾氣虛寒先用人參理中丸後用六君子湯而愈萬密齋治孫先病瘧傷食成疳又傷食甚瘦腹脹大而堅見人則哭用參苓朮草半夏曲枳實炒厚朴黃連木香莪朮砂仁使君子神麯麥芽鱉甲夜明芎歸等藥一小兒瀉後腹脹用加味正氣丸服之愈一兒瘧久不退腹大而堅用化癖丸服之愈一兒善食腹大用保和丸胃苓二方服之調理而安蔣仲芳曰山中君仲子年十歲患水腫月餘候予不至遇一方士與之草汁大便遂行數次腹寬腫退予適到喜曰兒病久候不至今服草藥幸已愈矣然須服調理之劑即喚出診之脈來沉細尚微喘按心下則痛甚予曰此非予之所能療矣草汁性烈已下數次痛宜愈喘宜定今若此病雖去而臟腑真氣受傷必不久也猶未信至明日腹大痛而死癖積龔子才治小兒患痞癖服檳榔蓬朮枳實黃連之類痞益甚曰此脾經血虛痞也不可克伐遂用六君子加當歸數劑胃氣耗憊脾胃損傷氣血乾涸肢體羸瘦面色瘦黃肚大青筋身熱自汗喘急氣促泄瀉腹脹浮腫不思飲食與補中益氣湯久服而愈萬密齋治一小兒周歲因食雞肉太早自此成積日漸羸瘦不思乳食其父詳告取藥治之與養脾去積丸白朮陳皮蒼朮厚朴枳殼半夏青皮神麯麥芽山楂甘草先服三日後服丁香脾積丸雞肉湯下取下雞肉一片猶未化也再進養脾丸而愈王氏子一日胃脘當心而痛萬治之七日不止以手按其胸腹惟心下手不可近曰誤矣無怪其不效也凡手可按者虛痛也手不可按者實痛也實痛非食即痰另立方以枳實導飲丸控涎丹二方內摘取枳實黃連半夏各二錢木香黑牽牛頭末白芥子炒甘草等分搗羅為末用生薑自然汁和神麯作丸麻子大以沉香木香檳榔磨水下或薑湯亦可初服二十一丸少頃痛移下中脘又服七丸至臍下又服五丸利下清水而止乃知是脾痛也復作青皮丸加青皮陳皮木香砂仁神麯麥冬山楂調理而安李時珍治宗室富順王孫嗜燈花但聞其氣即哭索不已診之曰此癖也以殺蟲治癖之藥丸服一料而愈本草綱目陸養愚治潘司寇子年十四初因感冒服藥已愈後復夜熱便黃日中亦微熱或謂表散之後血氣不足與補養氣血熱益甚遂以為童子勞陰虛夜熱也滋陰降火肚腹漸脹肌肉漸瘦飲食漸減其熱日夜不止矣脈之人迎頗和氣口緊盛兩尺洪滑此食積也宜消導之與枳實黃連檳榔神麯麥芽山楂茯苓澤瀉甘草數劑脹減熱除精神漸復去檳榔澤瀉麥芽加人參白朮乾薑數劑全愈陸祖愚治費表侄垂髫患瘧後痢初愈復傷食蒸蒸內熱大便欲行不行數至圊而未嘗便醫不細審以久病初愈復日數行其為脾虛滑泄無疑投以參術補劑經所謂益其勝而贊其復病寧不劇乎服後身熱益甚煩躁咽乾又以六脈浮洪久痢身熱脈大均非吉候診之果六脈洪盛有力而胸腹手不可按曰脈症俱實又且相應無張皇也但久痢之後津液枯槁耳用生地當歸白芍黃連倍枳實山楂一劑覺腹中運動二劑即轉矢氣少頃去燥矢十餘枚遂連去三四次脈靜身涼神清氣爽再用生津補脾調理半月而愈薛立齋治一小兒腹內結塊或作痛上攻小便不調用龍膽瀉肝湯蘆薈丸而愈後形氣消鑠發熱作渴此肝木剋制脾土用補中益氣湯及蘆薈丸而愈湯某治戶部侍郎小娘子患痞蘊積結聚已經年矣其候腹滿壯熱大小便閉不食諸醫皆作虛熱潮濕或作胃寒不食治然既不食大小便自然少又欲作疳熱治百藥俱試而無一中勢已窘迫招湯視之問曰合服何藥答曰當服甘遂大黃張驚曰前諸醫者皆用補劑此女不進食久矣不宜利動腸胃答曰信我者生逆我者死張曰更有無甘遂而次於此藥方者可否乃令即服大承氣湯二服而愈次日診之尚有餘滯積實其症必過數日而復閉須服前藥始可除根數日後果再閉腹滿痞結再服此藥一服而痊朱丹溪治賈福六舅子十六歲左脅有塊能飲食青皮醋炒三稜柴胡三分桂枝川芎防風各二錢白朮二錢半木通一錢半海藻一錢甘草五分分七帖煎取半盞下保和丸十五丸忌一切發物蔣仲芳治一兒七歲食後受驚遂發寒熱右脅有塊重則脹痛輕則硬滿已三年忽患三陰瘧又年餘以丸藥截之瘧雖愈而朝涼暮熱咳嗽骨立痞塊痛甚用耆朮鱉甲當歸各四兩參芍知母丹皮麥芽神麯山楂各二兩青皮陳皮檳榔木香官桂各一兩稜莪柴胡桃仁各七錢煎成膏入飴糖四兩和勻不俱時服未終劑而愈蟲萬密齋治王氏子善食嘗病腹痛乃蟲痛也用安蟲丸服之三日後取下一蟲甚異約長一尺身赤色大如蟮令持兩頭牽之長可丈餘其形如線放下依舊短縮此蟲母也以火焚之而愈胡氏子嘗腹痛萬診之曰蟲病也問何以辨之曰腹痛凡一向不止乃積痛也腹中成聚口吐涎水者蟲痛也用安蟲丸與解毒丸屢進不效因思此蟲有靈當設法取之擇定除破日在月初旬取之勿令兒知也隔夜煎苦楝根湯次日五更用清油煎雞子餅一個令兒聞其香味遂急欲食故遲不與而以少許啖之覺腹中有如物湧上心口乃取藥與服之少頃心口之物墮下以蛋食之不食矣巳時腹中大鳴而瀉下一蟲甚異如指長有頭手足狀如嬰兒萬曰此三傳勞蟲也初起於父再傳其母三傳其子幸去之矣令一婢用鐵鉗夾送河中焚之其婢受煙氣一口亦勞病死此兒至今無恙雄按紫庭方云第一代初勞蟲如嬰兒萬氏此說不知何本閻姓子有蟲病黃瘦腹中時痛口饞如有肉食則痛不發一日無肉則痛甚萬視其體甚弱不敢下只用苦楝根皮放肉汁中煮食之單服三日下蟲如蝌蚪者一盆色黃黑後以養脾丸調理而安一兒七歲善食肉常病腹痛其父問積痛蟲痛何如萬曰積痛發有常處手不可按惡食而口乾蟲痛無常處喜人按摩口饞而吐清水此兒乃蟲痛也以藥取之下蟲大者十餘條而痛止未一月又痛萬曰不事再取矣恐傷胃氣乃立一方用黃連木香檳榔去積為主陳皮青皮三稜莪朮枳實山楂專去其蟲等分為末神麯為丸麻子大米飲下常服之時下小蟲及下大蟲如指大約長一尺乃蟲母也自後痛漸減吳孚先治一婢面黃身瘦嗜油甚至燈盞垢膩都盡與醫下蟲如蝦者數枚遂而不嗜矣尋肥健本草綱目載患發瘕者能食油至五斤一小兒將自身布衣渾身遍吃兩袖吃至肩上吳用煎蟲丸下蟲如蠶者數枚而愈錢仲陽治辛氏女五歲病蟲痛醫以巴豆乾漆硇砂之屬治之不效至五日外多哭而俯仰睡臥不安自按其心腹時大叫面無正色或青或黃或白或黑目無光而慢唇白吐沫至六日胸高而臥轉不安錢視之用蕪荑散三服見目不除青色大驚曰此病大困若更加瀉則為逆矣至三更果瀉如藥汁以杖攪之見有丸藥錢曰此兒肌厚當氣實今症反虛不可治矣辛曰何以然錢曰脾虛胃冷則蟲動今反目青此肝乘脾又更加瀉知其氣極虛也而丸藥隨糞下脾胃已脫兼形病不相應故知死病五日昏篤七日而死此醫用乾漆巴豆之過也龔子才治一兒腹中作痛看看至死腹中揣摩似有大小塊諸醫不效乃令人慢慢以手搓揉痛處半日其蟲自大便出而愈四明顧氏女十餘歲尫羸骨立百治不瘥奄奄待斃偶端午家人調雄黃酒女竊飲之不覺大醉嘔穢狼藉視之中有物如鱉蠕蠕動色純紅兩眼正碧家人驚怪以足踩之頸伸甚長以鉗夾之掉頭齧之格格有聲棰之不死亟搗捶至爛埋之土中明日發視僅血塊耳自後女益長成無恙新安方懋記朱肇能著圍棋生一女腹多蟲偶在何矩所在談及一醫云食榧子當愈果食榧子下蟲曝乾尚有八尺長續金陵瑣事鄉間一大姓有子方周歲值熱天遍身疼痛啼哭不休延請諸醫束手無策王起云後至云能以十金酬我一刻即愈主人唯唯乃濃煎甘草湯浴兒未幾兒即睡去半日方醒已不作痛矣主人大喜出銀酬之特問小兒何病王云此乳母抱之納涼為刺毛所著耳疑即毛蟲俗呼為羊辣子故以甘草湯浴之若預說明豈肯以十金酬我哉眾大笑而別云間雜記張子和治一兒悲哭亦以浴愈謂心火乘肺浴之汗出則肺熱散也雄按毛蟲刺者皮膚即時赤腫最忌洗浴宜以菜油塗之小兒口吐涎沫或吐清水面㿠白心腹痛有時者蟲痛也與癇相似但目不斜手不搐也安蟲散主之胡粉炒黃檳榔川楝子鶴蝨各三錢枯白礬二錢五分上為末每服五六分痛時米飲調下吐蛔張景岳治胡氏子三歲因飲食不調幼科以清火化痰等劑損其胃氣反致嘔吐溏泄復與清利遂致吐蛔初止數條漸至數十條細如燈草甚至成團攪結而出早晚不絕所下者亦如之羸困已極因與溫胃飲二三劑其蟲如故不知其從何來而生化之速一至於此其家謂先逐蟲蓋蟲吐盡則病日甚其能生乎弗聽但以前藥倍人參加附子二三劑而嘔吐漸稀瀉亦隨止乃以理陰煎溫胃飲出入間用十餘日蟲漸少月餘而飲食進肌肉生復元如故大凡逐蟲之藥多傷胃氣向使胃氣再傷非惟蟲不能逐病必不起今使胃氣日強則拔去化蟲之源而愈矣世俗以甘蔗宜小兒雖痘食之無禁群醫相爭一曰性熱所以發疹一曰性寒所以解毒一曰性溫平所以無害及退余撿方書則曰蔗能節蛔蟲多者減之少者益之蛔適其中則兒無病所以兒宜也豈在寒熱溫平間哉群醫不可漫猜殊可哂也李日華紫桃軒又綴雄按此說未可信也餘四妹幼時曾以多啖至疾心腹痛月埠張氏兒十歲自幼心痛得於母氣不時發發時飲食不進呻吟反復三四日仲淳疏方藥入口即止檳榔黑醜各一錢木香五分使君子橘紅白芍旋覆花各二錢茯苓三錢豬苓錢半廣筆記蔣仲芳治魏交讓子年十歲患小腹痛三四年矣諸醫不效診之脈來沉遲二便如常按之無塊此必腎家虛寒也六味地黃丸加炮薑肉桂青皮香附車前牛膝而愈雄按炮姜不若用橘核或茴香否則易以當歸黃疸萬密齋治一義子年十五病疸面目俱黃問之對曰傷食起腹中大熱又痛乃立一方用黃柏梔子等分大黃減半以退其熱豬苓澤瀉茯苓蒼朮等分以去其濕枳實厚朴神麯以去其食積茵陳蒿倍用以去其黃共為細末酒糊丸車前子煎湯下三日後吐出黃水二碗許胃中不熱又二日泄三行腹中不痛十日以後小便漸清黃亦減矣孫文垣治王文川子原傷飲食又傷冷菱等物遍身發黃眼如金色夜發熱天明則退腹痛手不可近號叫通宵市醫因其黃而曰胡苩真矣三字未詳恐系土語眾議草頭藥進王至急止之曰向以草藥幾誤其母復欲誤其子夫脾胃喜溫惡寒此症乃食積釀成黃為濕熱所致法當健脾用溫暖之劑下之濕熱去而黃自退草頭藥性多寒用之是損脾土而益其疾也即以保和丸一錢入備急丸五分作一次服之少頃瀉一次又少頃連下三次去積甚多腹痛盡止再與調中丸一月黃盡退張子和治一童子年十五患疸一年面黃如金遍身浮腫乏力惟食鹽與焦物張以茶調散與之湧涎一盂臨晚又以舟車丸七八十粒通經散三錢下四五行待六七日又以舟車丸浚川散下四五行鹽與焦物見而惡之面色變紅再以茶調散湧之出痰二升方能愈矣陸養愚治孫奎者其婦患面黃腹脹人多以為胡苩用草頭藥療之不半月而殂或咎之彼謂草頭藥服遲故也後其子偶傷冷食腹脹痛手不可近發熱眼胞又有黃氣乃曰又是胡苩矣急尋草澤醫其主人大叱之乃止延診曰不必按脈當溫行之脾胃喜溫而惡冷既傷冷食而服草頭寒藥烏得不敗因以炮薑附子草果陳皮木香為煎劑送潤字丸二錢下數行而痛脹俱減又以前劑送大安丸數服而愈湖郡黃疸稱為胡苩此與前孫按略同薛立齋治一小兒旬日內先兩目發黃漸及遍身用瀉黃散服之愈錢氏瀉黃散藿香葉甘草石膏山梔防風姜酒微炒為末每服一二錢水煎一小兒因母食鬱飽脹咽酸而患遍身皆黃以越鞠丸治其母以瀉黃散治其子並愈錢仲陽治曹宣德子三歲面黃時發熱不食飲水或用牛黃麝香二丸不愈用止渴乾葛散反吐錢謂伏於胃脘先以白餅子下之又以消積丸磨之而愈丁香縮砂巴豆烏梅肉麵糊丸每服五七丸啼哭張子和治一小兒悲哭彌日不休兩手脈弦而緊此心火甚而乘肺肺不受則哭故肺主哭王太僕云心爍則痛甚痛甚則悲益甚令浴以溫湯漬形以為汗肺主皮毛汗出則肺熱散矣浴止而啼亦止仍命服涼膈散加當歸桔梗連翹大黃芒硝甘草黃芩薄荷梔子以竹葉生薑朴硝同煎瀉胸中之邪熱萬密齋治縣尹張之子未周歲啼哭晝夜不止醫謂腹痛用理中丸不效又謂傷食用瀉黃散不止萬視之曰公子腮頳面赤乃心煩而哭也若腸痛當見面青傷食當見面黃也乃用導赤散木通竹葉生地燈心黃芩甘草加黃連麥冬煎服之次日早即入告曰昨夜哭多何也萬曰病即安矣曰病安何以哭不止曰公子啼哭三日夜不吃乳昨夜熱退心涼欲得乳而乳母在外蓋往夜之哭病哭也昨夜之哭飢哭也乃笑曰果然乳母五更到即止矣江某生子三日啼不住萬視之曰此必斷臍失謹風冷之氣入臍腹痛而哭也乃用蘄艾搗如綿再烘令熱以封其臍冷則易之三易而哭止一兒生二月啼不止萬曰此肝熱也以瀉青丸竹葉湯入沙糖少許調服而安羌活大黃山梔仁當歸芎藭膽草防風蜜丸芡實大竹葉湯入砂糖化下一小兒夜啼不止狀若鬼祟用蟬蛻下半截為末薄荷湯入酒少許調下或者不信將上半截為末煎湯調下即復啼也古人立方莫知其妙本草綱目出普濟方雄按余兒生逾兩月患風熱音嘶易驚多哭余以蚱蟬湯飲之而愈徐仲光治一兒觸忤夜啼用本家灶下火柴頭一段以朱書云我是上天五雷公將你作神將能擒夜啼鬼一縛永不放急急如律令柴頭以火燒焦為主書不使人知立在床下倚床前腳裡面男左女右孝廉楊回山止一子方歲周暑月旦暮啼不乳亟召王起云視之王曰從我則生否則不可救也然須以百金酬我楊謹奉教王乃於堂中畫石灰一圈置兒其中屏去乳母兒啼甚移時睡去王索香薷飲俟其覺以藥一丸投之隨瘥蔡寧認問曰子何術而神若是王曰乳母甚肥天又暑兒愈哭則乳母愈摟抱不忍釋中熱太甚所以啼不乳我俾以哭散熱氣即愈矣石灰畫圈醒後投劑不過假以索謝耳此所謂術也蔡為之鼓掌云間雜記馬銘鞠治華虛舟五郎尫甚善哭周歲中每哭即氣絕絕而蘇一飯時許矣至三歲其病日深哭而絕絕而蘇甚至經時初或一月或半月一發後即頻發有日再發者投以琥珀丸人參圓眼湯下數丸遂瘥琥珀人參甘草蓮肉各三錢山藥一兩天竺黃茯神膽星各二錢密丸硃砂錢半為衣每服一錢小兒夜啼因包裹太暖熱極所致取雞屎塗兒臍中男用雄女用雌牛黃硃砂各五釐研極細以少許塗兒舌上立止語遲行遲龔子才治一小兒五歲不能言咸以為廢人矣視其形瘦痿乃肺腎不足遂以六味丸加五味鹿茸及補中益氣加五味兩月餘形氣漸健將半載始能言一二言至年許始聲音明亮一富翁子年八歲不能步履緣過惜不能得土氣致肌肉軟脆筋骨柔弱用黃土入於夾襖內與穿同服地黃丸加人參鹿茸牛膝虎脛骨未半料已能行矣薛立齋治一小兒患泄瀉聲音不亮雜用清熱等劑聲音如啞飲食少思去後多在清晨朝用地黃丸加五味夕用補中益氣湯其泄頓止卻專服前丸不兩月其言漸亮遂全愈矣一小兒三歲言步未能牙發稀少體瘦骨立發熱作渴目睛黑少服肥兒丸不應此腎虛疳症也前丸乃脾胃經之藥久服則腎益虛而疳益甚不信果牙發漸落用六味丸加鹿茸五味子半載而痊一小兒體瘦腿不能行步齒不堅固發稀短少屬足三陰虛用六味丸補中益氣湯半年悉愈形體充實一小兒七歲體細短寸許不良於行目睛白多或有盜汗發黃成穗用地黃丸加鹿茸五味為主佐以補中益氣散半載行履如故胎疾萬密齋曰一兒頸細其父嘗問於予可養何如予曰頸者頭之莖細則不能任元在父母調養之八歲後再議至五歲死一兒解顱未一歲認字唸書父母甚愛之予曰此兒胎稟不足腎虛顱解真陽弱矣聰慧早發真陽泄矣恐遺父母憂未一歲而發搐死雄按余兒壽源生而壯偉無一夭相惟善解人意未半歲即能認字見者無不歎賞余憂其發泄太早果不滿八月而殤可悼也已一兒周歲後多笑予曰此兒難養父問故曰腎為水心為火水陰火陽陰常不足陽常有餘笑者火之聲也水不勝火故得難養曰諸兒笑者皆不可養乎曰待人引之而笑者此有情也見人自笑者此無情也後以瘡痘死一兒頭縫四破皮光而急兩眼甚小萬曰腦者髓之海也腎主骨髓中有伏火故髓熱而頭破額顱大而眼楞小也宜服地黃丸不信至十四歲而死一兒生下便有目赤口瘡之症自是頭常熱山根青筋橫截痰甚多曰此胎熱其治在肝小兒者純陽之體頭者諸陽之會肝為乙木旺於春乃少陽發生之氣也經云春氣者病在頭故頭常熱也肝之色青故青筋浮露也肝常有餘不治恐發驚風乃用瀉青丸去大黃加黃芩為末蜜丸服之遂頭涼筋隱病亦少矣鬾病萬密齋治一小兒二歲常利下綠水形瘦如鬼醫作病疳治之不效萬曰此非疳也乃胎氣所害名曰鬾病者是也凡人家小兒勿與懷孕婦人抱之如胎稟強者則無礙怯弱者犯之即成鬾病如客忤之類治之但補其脾胃待彼兒生自然安矣肥兒丸主之錢氏肥兒丸黃連神麯木香檳榔肉蔻使君子麥芽麵糊丸如麻子大每服三五十丸巢氏云小兒被鬾病者婦人懷胎孕有鬾神導其腹中胎嫉妒小兒致令此病其狀微微下利寒熱往來毛髮鬇鬡情思不悅也千金論鬾者小兒鬼也凡婦人先有小兒未能行而母繼有胎妊令兒漸漸羸瘦骨立毛髮稀黃不長時作壯熱大便不勻乃鬾病也又曰繼病法當用紫霜丸下鬾以乳益散補之紫霜丸代赭煆醋焠七次赤石脂各一兩杏仁五十枚巴豆去皮油三十枚蒸餅為丸如粟米大一歲五丸百日內三丸乳汁調下令小兒斷乳即安消乳丸異功散亦妙劑也其或他婦人有妊而抱他人嬰孩者亦有此症同此治法有熱者龍膽湯相思薛東明治王生子周歲忽不乳食肌肉消盡醫疑為疳薛曰此相思症也眾皆嗤笑之薛命取平時玩弄之物悉陳於前有小木魚兒一見遂笑疾遂已江南通志萬密齋治胡三溪子歲半日入後忽啼不止時七夕也三溪招萬飲已而報啼甚請入視之無病也飲未竟兒啼甚人以兒故意不樂三溪強再視細察之實無病無病而哭必心有所欲不能言也乃問曰兒今日所喜弄者何物乳母曰馬鞭子即令取至乃笑而持之擊其乳母不復哭矣於是暢飲而罷明日有問者曰此小兒害相思病也可以為案一兒半歲忽日慘然不樂昏睡不乳萬曰形色無病將謂外感則無風寒之症將謂內傷則無乳食之症此兒莫有所思思則傷脾乃昏睡不乳也其父母悟云有一小廝相伴者吾使他往今三日矣乳母亦云自小廝去後便不欣喜不吃乳父急命呼之歸兒見其童嬉笑父曰非翁妙術不能知也跌撲損傷薛立齋治少參王陽湖孫八歲傷股骨正體斜視其面青而兼黃口角微動此肝木侮脾土故也且氣血筋骨皆資脾土而生但壯脾氣則所傷自愈遂用六君子湯加鉤藤當歸三十餘劑諸症悉愈義興楊純父幼兒病寒熱勢甚危諸醫以為傷寒也藥之不效仲淳曰此必內傷純父不信遍詢乳媼及左右並不知所以傷故仲淳固問不已偶一負薪者自外至聞而訝曰曩見郎君攀竹稍為戲稍折墜地傷或在此乎仲淳曰信矣投以活血導滯之劑數服而起仲淳嘗言古先望聞問而後切良有深意人以多問嘲醫醫者含糊診之以致兩誤悲矣廣筆記一小兒五歲因自戲劇以莖入搗藥臼中不復出舉家驚呼無計或教之使執兒兩足以新汲水急澆之驚啼體縮遂得出發背張景岳長男甫二周而患背疽初起時背中忽見微腫數日後按之則根深漸闊其大如杯皮色不變亦不甚痛至十餘日身有微熱其勢滋甚乃謀之瘍醫或云背疽或云痰氣或曰葷腥溫補毫不可入口乃以解毒之藥投之而身反大熱神氣愈困飲食不進因思丹溪有云癰疽因積毒在臟腑當先助胃氣為主使根本堅固而以行經活血佐之又曰但見腫痛參之脈症虛弱便與滋補氣血無虧可保終身是誠確論也全書中何以大非薄之因卻前醫而專固元氣以內托其毒遂用人參三錢製附子一錢佐以當歸熟地炙草肉桂之屬一劑而飲食頓進再劑而神采如舊抑何神也由是弛其口腹藥食並進十劑而膿成以其根深皮厚復用針出膿甚多調理月餘而愈大凡腫瘍潰瘍虛症未見但無實熱壅滯可據者便宜托補如此張子和治一富家女子十餘歲好食紫櫻每食即二三斤歲歲如此至十餘年一日潮熱如勞診其兩手尺脈皆洪大而有力謂之曰他日必作惡瘡腫毒熱氣上攻乃陽盛陰脫之症其家大怒不肯服解毒之藥不二三年患一背疽如盤痛不可忍其女忽思張曾有是言再三悔過請張張以排針繞疽暈刺數百針去血一斗如此三次漸漸痛減腫消微出膿而斂將作痂時使服十劑內托散乃痊痊後終身忌口然目亦昏終身無子結核萬密齋治朱震三之子結喉上生一核如李源病式云結核者熱也又考本草消結核之藥立一方芩連梔貝昆布海藻桔梗麥芽薄荷各一錢五分紫背天葵元參連翹瞿麥各二錢為末溫湯調服即效後病者服之無不應驗名之曰神應丹帥碧泉公子項下生一結核或作癧治用藥破爛轉加腫大此任脈所過之路元氣受傷致成疳症遂不救王思泉女四歲耳後側有結核曰非癧瘡乃痰核也不必治亦不為害他醫作癧治之用斑蝥內消之藥過多脾胃受傷致成疳勞而死朱氏子五歲病結喉下起一核大如李兩旁有小核相連者二三方用東垣涼膈散去甘草加龍膽草元參貝母海藻麥芽為丸彈子大每服一丸研細溫酒調服七日而安後用此方全活小兒甚眾薛立齋治一小兒七歲頸結二核時發寒熱日久不愈以連翹丸治之而消若患在兩臂等處尤當用此藥若潰而不斂宜服托裡之劑下疳附錢縛陽薛立齋治一小兒二歲莖痿濕癢不時搔捻莖中作痛時出白津以為肝火用龍膽瀉肝湯六味地黃丸而愈一小兒下疳潰爛發熱作痛一小兒莖中作痛不時搔捻一小兒莖中潰痛小便秘澀日晡尤甚一小兒目癢出水或項間結核或兩眼連札或陰囊瘙癢俱屬肝火皆用九味蘆薈丸並愈萬密齋治三府小女溺出如清水著肉處潰爛成瘡問曰豈女之臟腑壞耶答曰膀胱受五臟之液以藏之化為溺也各隨本臟之色青者肝之色也著處成瘡肝火盛也火之所灼則潰爛矣以導赤散加山梔條芩膽草甘草稍黃柏為丸調理五日而安立齋治魏戶部邦寧子年十六鼻眼蝕爛肝脈弦長恚怒不息三年不愈諸藥不應服蘆薈丸半劑頓退一劑而痊一小兒下疳潰爛爪黑麵黧遍身生疥此腎經內外疳症用地黃丸為主佐以四味肥兒丸而瘥邱汝誠治一嬰孩以扇縛其陽莖腫脹不得脫號呼欲絕令汲水擲之於器驚啼後復故疝薛立齋治一小兒睪丸作痛小便赤澀寒熱作嘔乃肝脾之症用小柴胡湯加山梔車前茯苓而愈一小兒睪丸腫硬小便黃澀用小柴胡湯加山梔車前並蘆薈丸而消萬密齋治梁大尹子病疝右睪丸腫大如雞卵長約五寸絡脈旁下抵陰囊硬痛大小便不通用當歸川芎木香青皮山梔仁山楂子小茴香川楝子澤瀉二劑而安一小兒腸痛即小腸疝也用諸症辯疑內一方五苓散加川楝子小茴香入鹽一捻神效張子和治霍秀才之子年十二歲睪丸一旁腫脹張見之曰此因驚恐得之驚之為病上行則為嘔血下則腎傷而為水腫以琥珀丸通經散一瀉而消散便血高存之幼郎病內傷大小便俱紅諸醫競用紅花桃仁病愈甚仲淳曰桃仁之類疏其瘀也血且行奈何又重傷之傷則補之而已以生地四錢續斷及杜仲牛膝等飲之稍平而腹痛不已仲淳曰是在內經強者氣行則愈弱者著而成病加人參二錢一劑而愈廣筆記湯某治鄭都丞子患七年搖頭三年下血已服百餘方前後所服治搖頭者無非風藥止血者或在腸風俱不效視之亦不明其標本退而思之乃肝血盛外有風熱乘之謂肝病則得之矣謂血病盛而風熱外乘則未必然耳肝屬木盛而脾土為木所克脾與肺是子母俱為肝所勝而血遂潰於大便故便血不止遂處一方但損肝祛風而益脾初亦一時之見只數服而愈十餘日後血止而下白膿遂安用犀角屑甘草各一錢栝蔞半兩蛇蛻炙一錢防風五錢鉤藤一錢麻黃去節一錢炙耆半兩羌活白芍各半兩為末棗肉丸食後薄荷湯下只二服已效頭搖即止便血隨愈次開服胃風湯數日頓除沈舍人子服之亦效蔣仲芳治周忠介公孫女年七八歲大便下血不止有用黃連犀角者有用人參阿膠者俱不效診得氣口沉緊服末子三進而血止問故曰人但知脾虛不能攝血不知飲食傷脾亦不攝血今用消導之劑食去則脾氣復而血自攝焉得不愈其末子即沉香末也疳瘡薛立齋治一小兒頭患白瘡皮光且急諸藥不應名曰腦疳瘡乃胎毒挾風熱而成也服以龍膽丸及吹蘆薈末於鼻內兼搽解毒散而愈若重者髮結如穗腦熱如火遍身出汗腮腫胸高尤當服此藥一小兒咳嗽喘逆壯熱惡寒皮膚如粟鼻癢流涕咽喉不利頤爛吐紅氣脹毛焦是名曰肺疳以地黃清肺飲及化蟲丸治之而愈一小兒眉皺多啼嘔吐清沫腹中作痛肚脹筋青唇口紫黑肛門作癢名曰蛔疳以大蘆薈丸治之而愈有蟲食脊膂身熱黃瘦煩溫小利拍背如鳴鼓脊骨如鋸齒十指生瘡常齧此脊疳也當以前丸治之一小兒鼻外生瘡不時揉擦延及兩耳諸藥不效以蘆薈丸及搽松香綠豆末而愈一小兒十歲患瘡疥久不愈肌體羸瘦寒熱時作腦熱足冷滑瀉肚痛齦爛口臭乾渴爪黑麵黧此腎疳也服六味地黃丸更搽解毒散而愈一小兒十五歲遍身似疥膿水淋漓身熱口熱口乾形體骨立四年矣此腎疳之症用六味丸而愈後陰莖作癢小便澄白疥瘡如大風用蘆薈四味肥兒丸諸症漸愈又用大蕪荑湯而全安一小兒項結一核堅硬如粟面色萎黃飲食不甘服托裡藥不應此無辜疳毒也以蟾蜍丸治之而愈若數服不消按之轉動軟而不痛者內有蟲如粉宜急針去之若不速去則蟲隨氣走內蝕臟腑不治丸用蟾蜍一枚夏月溝渠中取腹大不跳不鳴者先取糞蛆蟾蜍撲死投在蛆中任與蛆食次以新布袋系之置丸如麻子大每服二三十丸空心米飲下一小兒遍身生瘡頭髮成穗眉毛脫落肌肉消瘦大便酸臭小便不調頸間結核肚大青筋先用五味異功散月餘後用四味肥兒丸又用大蕪荑湯異功散而痊一小兒面黃頰赤作渴驚悸兼手心發熱遍身如疥此心驚內外疳症用肥兒丸為主佐以秘旨安神丸而愈史少參幼子二歲項後結核不時仰首或以為熱瘡內潰用針決之服消毒之藥後曲腰啼哭謂此無辜疳外吊症也曲腰而哭內吊症也果歿一小兒數歲腦後並結二核肉色如故而不焮腫正屬膀胱經觀其形狀審其糞色兼屬肝脾腎三經用九味蘆薈丸以清肝脾地黃丸以補腎水形體漸健不兩月而消一小兒遍身如瘡或癢或痛肌體消瘦日夜發熱口乾作渴大便不調年餘不愈用蘆薈丸以治肝兼五味異功散以補脾而愈瘍症薛立齋治一三歲小兒臂患毒焮痛服解毒丸及搽神功散而消常治便秘或煩躁服五福化毒丹亦效若膿成者急刺去用紙捻蘸麻油紝瘡內以膏藥貼之若兒安靜不必服藥候有膿取去仍用紝貼有小兒瘡毒不愈或愈而後發皆因其母食炙爆辛辣或有熱症宜先治母熱就於母藥中加漏蘆令母服之其瘡亦愈一周歲小兒先於頭患瘡疥漸至遍身久而不愈飲四物湯加防風黃芩升麻外搽消毒散月餘而愈一小兒頭面患瘡數枚作癢出水水到處皆潰成瘡名曰黃水瘡也用綠豆粉松香為末香油調敷飲以荊防敗毒散而愈一小兒頭面生瘡數枚作癢瘡痂積累名曰黏瘡也以枯白礬黃丹末等分麻油調搽更飲敗毒散而愈一小兒癮疹瘙癢發熱不安以消風散治之又一小兒亦患此咳嗽時嘔以葛根橘皮湯並愈一小兒頸面胸腹患水泡數枚潰而成瘡此風邪乘於皮膚而然也名曰瘭瘡飲荊防敗毒散更以牛糞燒存性為末敷之而愈又瘭瘡一症為患最毒形如粟許大者如慄患無常處多在手指潰而出血用南星半夏白芷末敷之重見骨或狂言煩悶一小兒遍身患疥或癢或痛肢體消瘦發熱口乾作渴大便不實年餘矣此肝脾食積鬱熱服蘆薈丸不月而愈一小兒因有食積服克滯之劑肢體生瘡似疥服消毒之藥發疙瘩赤色作癢膿水浸淫先用五味異功散加柴胡山梔以補脾胃平肝木赤癢漸消又用四味肥兒丸五味異功散治之而食積愈一女子赤暈作癢寒熱發搐服風藥身發疙瘩搔破出水此肝血風熱症先用加味小柴胡湯後用四味肥兒丸而愈一小兒傷食咳嗽頭面瘙癢微腫先用消風散一劑又用梔子清肝散而痊一小兒遍身生瘡小便不調頸間結核兩目連札服祛風之劑眉毛脫落謂肝經風熱之症先用大蘆薈丸後用四味肥兒丸漸愈後因飲食停滯發熱其瘡復起用大蕪荑湯四味肥兒丸而痊後每停食遍身發赤作癢服四味肥兒丸即愈一小兒面部浮腫遍身如癬半年後變疙瘩色紫作癢敷巴豆等藥皮破出水痛癢寒熱大便堅硬脾肺脈洪數而實先用防風諸經散便利調和又用四物湯加荊防黃芩柴胡角刺甘草節諸藥漸愈更以八珍湯加白朮荊防角刺五加皮而愈後但勞則上體發赤暈日晡益甚此氣血虛而有火也先用四物湯加丹皮參朮柴胡治之稍愈又用補中益氣加酒炒黑知柏月餘全愈一小兒遍身生瘡大便下血發熱作渴腹大青筋眉毛漸落用大蘆薈丸五味異功丸其瘡漸愈佐以補中益氣湯加吳茱萸制黃連治之血止瘡愈一女子素有肝火因怒頸項結核寒熱晡熱遍身起赤暈作癢服祛風之藥搔癢出水唇口搐動以為脾經血虛內熱生風用梔子清肝散加鉤藤而寒熱頓減又用當歸川芎散而漸愈乃用加味逍遙散而痊一小兒遍身瘙癢或如蟲行內服胡麻散外敷解毒藥患處皆潰誠如麻風視其唇或掣動或兩目連札此肝木乘脾土用升麻湯煎服瀉青丸而漸愈又用樺皮散而痊一小兒身瘙癢起赤暈後膿水不止先用歸脾飲二劑又用胡麻散而愈後因驚挾食發熱起赤暈用越鞠丸一錢枳朮蓬朮末各五分蔥湯調服二次又用消風散一服赤暈頓消又用越鞠丸而痊
