body:
  text: 卷三十一外科癰疽李東垣治通父家翟粳於尻臀上足太陽經生癰堅硬腫痛大作左右尺脈俱緊按之無力羌活黃柏各二錢防風藁本連翹各一錢肉桂七分甘草蒼朮陳皮各五分當歸一錢黃耆一錢五分酒二大盞水一大盞煎至一盞去渣空心熱服以夾被蓋覆其癰使藥行罷去之一服愈豫族叔父平生多慮質弱神勞年近五十忽右膊外側廉上生結核身微寒熱而易怒食味頗厚脈之俱弦大浮數而重按似澀曰此多慮而憂傷血時在初秋勿輕視之宜急補以防變症以人參一斤作膏下以竹瀝病者吝費招一外科以十宣五香散間與服旬日後一日大風拔木病者發熱神思不佳急召視之核稍高大似有膿於中起一紅線延過肩後斜走繞背脊過入右脅下不痛覺肩背重而急迫食有嘔意脈同前但弦多耳作人參膏合芎朮生薑汁飲之用人參三斤瘡潰膿干又與四物湯加參朮陳皮甘草半夏生薑百餘帖而安此等若在春令雖神仙不治也幸而在秋金之令不幸因時下暴風激起木中相火而致此自非參膏驟補何由得免朱朗年四十餘惡寒發熱右腿內廉厥陰分生一腫毒此是冷折熱在肝經血分與此方蔞仁黃藥子赤芍歸頭條芩各三錢青皮角刺桂枝各二錢甘草節一錢分四帖煎服一盞入忍冬藤汁二蛤殼食前飲以忍冬藤渣敷腫上呂孺人惡寒發熱腹上有小疽此血少有熱與此方白朮川芎各三錢赤芍連翹各二錢半防風陳皮黃芩各二錢木通錢半甘草五分分五帖煎服鄭經歷性嗜酒與煎爆年五十餘忽春末夏初患額絲竹空湧出一角長短大小如雞距稍堅求治曰此非膏粱所致而何宜斷厚味先解食毒針灸以開泄壅滯未易治也此少陽經所過氣多血少者鄭以憚煩召他醫以大黃朴硝腦子等涼藥罨之一夕豁開如醬蚶徑三寸一二日後血自蚶中濺出高數尺而死此涼藥外逼熱鬱不得發宜其發之暴如此也陳自明外科精要云神仙截法治癰疽發背一切惡症預服則毒氣不入內真麻油一斤銀石器內熬十數沸候冷用酒兩碗入油五盞通口熱服一日用盡緩則數日服之吳安世云吾家三世用之無有不驗又云獵者云丸中藥箭急飲麻油藥毒即消鄭學諭德甫屢用之甚驗薛立齋治一男子患癰腫硬疼痛發熱煩躁飲冷脈沉實大便祕乃邪在臟也用內疏黃連湯疏通之以絶其源先投一劑候行一次勢退一二再進一劑諸症悉退乃用黃連消毒散四劑而消一男子患癰膿熟不潰欲針之補以托裡不信乃服攻毒藥及致噁心少食始悟而用針更以六君子湯加藿香當歸四劑少可再以加味十全大補湯數劑而斂凡瘡膿熟不行針刺膿毒侵蝕輕者難療重者不治老弱之人或偏僻之處及緊要之所若一有膿宜急針之更以托裡庶幾無變一男子患癰作痛服寒涼藥痛雖止而食愈少瘡亦不潰以六君子湯而食進再以托裡藥潰之而愈大抵瘡疽之症寒熱虛實皆能作痛熱毒之痛者以寒涼之劑折之寒邪之痛者以溫熱之劑散之因風而痛者除其風因濕而痛者導其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者瀉之膿鬱而閉者開之惡肉侵蝕者去之陰陽不和者調之經絡閉澀者利之慎勿概用寒涼之藥況血脈喜溫而惡寒若冷氣入里血即凝滯反為難瘥矣馮楚瞻治趙翁年七十二右頰腫硬連及頤項耳後一片堅實不熱不痛已兩月餘諸治不效漸至口內出膿牙噤不開飲食少進精神日衰脈則洪大而空知為元氣大虧陰寒所聚所謂石疽是也不得陽和何以外解若內潰日久穿喉破頰不可療矣乃用豬脂搗爛入肉桂細末蔥頭食鹽杵勻厚敷患處敷藥以脂膏治血肉同氣相應也蔥能透竅鹽能軟堅桂能行血油能浸潤皮膚內則空心生脈飲送八味丸食遠志參耆歸芍苓朮薄桂銀花角刺之類使陽回則陰寒自解血氣衝和自能逐毒三五日後冰硬者熱軟漫腫者高聳木者疼痛紫者紅活飲食日進血氣漸長毒既外出久凝久瘀之血肉消者消膿者膿不再旬而愈張景嶽治一儒者年近三旬素病聤耳發必潰膿至是益甚自耳根下連頸項上連頭角耳前後莫不腫痛或與散風降火一月後稠膿鮮血自耳迭出每二三日必出鍾許而腫痛全不消枕不可近察其形色已大不足而腫痛則若有餘脈之或急或緩弱此非實熱可知遂先與六味湯二三劑元氣稍振繼與一陰煎加牛蒡茯苓澤瀉倍加白蒺藜為君服五十餘劑外用降癰散晝夜敷治兩月而後愈蓋此症雖似潰瘍有餘而實以肝腎不足上實下虛一奇症也何奇之有張通府耳後髮際患腫一塊無頭肉色不變按之微痛彼以為痰結核其脈軟而時見數經云脈數不時見則生瘡也非痰結仲景云微弱之脈主血氣俱虛形精不足又云沉遲軟弱皆宜托裡遂以人參白朮黃耆當歸川芎炙草以托裡少加金銀花白芷桔梗以消毒彼謂不然內飲降火化痰外帖涼藥覺寒徹腦患處大熱頭愈重飲食愈少復請治以四君子湯加藿香炮乾薑數劑飲食漸進膿成刺之更以十全大補湯去桂及炙草貼以豆豉餅又月餘而愈胡生耳後寸余發一毒名曰鋭疽焮痛發熱煩躁喜冷此膽經蘊熱而發先用神仙活命飲一劑勢減二三時值仲冬彼惑於藥有用寒遠寒之禁故不再服自用十宣散托裡之藥勢漸熾耳內膿潰復請治視其喉腫閉藥不能下而歿一婦人年逾四十近環跳穴生一毒尺脈沉緊腿不能伸經曰脾寒移於肝癰腫筋攣夫脾主肉肝主筋肉溫則筋舒肉冷則筋急遂與乳香定痛丸治之少愈更以助胃壯氣血藥二十餘劑而消一婦人倏傷次指成膿不潰焮痛至手誤敷涼藥以致通焮微嘔少食彼以為毒氣內攻診其脈沉細此痛傷胃氣而然也遂刺之服六君子湯加藿香當歸食進更服八珍湯加黃耆白芷桔梗月餘而愈又一後生亦患此色黑不痛其指已死欲令斬去速服補劑恐黑上臂不治彼不信另服敗毒藥手竟黑遂不可救又一男子亦傷拇指色紫不痛服托裡藥及灸五十餘壯作痛潰膿而愈又吳舉人幼女因凍傷兩足至春發潰指俱壞遂去之服以大補藥而愈又藍上舍女患嵌甲傷指年餘不愈日出膿數滴謂足大趾乃肝脾二經發源之所宜灸患處使瘀血去陽氣至瘡口自合否則不治彼忽之不早治後變勞症而歿蓋至陰之下血氣難到若女人患此又多因扎縛致血脈不通或被風邪所襲則無氣血榮養遂成死肉惟當壯其脾胃行其經絡生其血氣則愈其有成破傷風以致牙關緊急口眼喎斜者先以玉真散一二服然後投以通經生血之劑於御郎骸胛患毒痛甚服消毒藥其勢未減即以槐花酒一服勢隨大退再以托裡消毒之藥而愈立齋曰豫丙子年忽噁心大椎骨甚癢須臾臂不能舉神思甚倦此天疽危病也急隔蒜灸之癢甚愈又明灸五十餘壯癢遂止旬日而愈精要云灸法有回生之功信矣大凡蒸灸若未潰則拔引郁毒已潰則接補陽氣祛散寒邪瘡口自合其功甚大其法用大獨蒜切片如三錢厚貼疽頂上以艾炷安蒜片上灸之每三壯一易蒜若灸時作痛要灸至不痛不痛要灸至痛方止大概以百壯為度膿潰則以神異膏貼之不日而安一能使瘡不開大二內肉不壞三瘡口易合見效甚神丹溪云惟頭為諸陽所聚艾壯宜小而宜少王大廣年逾六十素厚味頰腮患毒未潰而肉先死脈數無力胃經積毒所致腮頰正屬胃經未潰肉死則胃氣虛極老人豈宜患此辭不治果歿內經云膏粱之變足生大疔受如持虛黃履素曰豫座師茅五芝先生長公子子京偶於腎間患一毒地非要害直易視之子京素知醫恐痛傷元氣輒服人參其毒愈甚發寒熱乃始延醫又遇粗工潰後胸滿應服參耆又不能多服竟致不能收口而歿蓋癰疽初起先宜瀉毒而後議補若補之太早遂有此禍可鑑也邱汝誠面生疽即買藥鋪四所合神芎散丸豫之曰以此療之其人怒不肯服歸而告人人曰未必非良法也服之即瘥蓋其人嗜酒此丸實去酒病云揮塵新談彭羡門少宰傳治腫毒初起方用雞子用銀簪插一孔用明透雄黃三錢研極細末入之仍以簪攪極勻封孔入飯內蒸熟食之日三枚神效居易録前寧都令李聘説麥粉不拘多少用陳醋熬膏貼無名腫毒神效雄按此名烏龍膏麥粉乃洗麩造麵筋澄下之粉也徐靈胎曰瘍科之法全在外治其手法必有傳授凡辨形察色以知吉凶及先後施治皆有成法必讀書臨症二者皆到然後無誤其升降圍點去腐生肌呼膿止血膏塗洗尉等方皆必純正和平屢試屢驗者乃能應手而愈至於內服之方護心托毒化膿長肉亦有真傳非尋常經方所能奏效也惟煎方則必視其人之強弱陰陽而為加減此則必通於內科之理全在學問根柢然又與內科不同蓋煎方之道相同而其藥則有某毒主某藥某症主某方非此不效亦另有傳授焉故外科總以傳授為主徒恃學問之宏博無益也有傳授則較之內科為尤易惟外科而兼內科之症或其人本有宿疾或患外證之時復感他氣或因外症重極內傷臟腑則不得不兼內科之法治之此必平日講於內科之道而通其理然後能兩全而無失若不能治其內症則並外症亦不可救此則全在學問深博矣若為外科者不能兼則另請明理內科為之定方而為外科者參議於其間使其藥與外證無害而後斟酌施治則庶幾兩有所益若其所現內症本因外證而生如痛極而昏暈膿欲成而生寒熱毒內陷而脹滿此則內症皆由外症而生只治其外症而內症已愈此又不必商之內科也但其道甚微其方甚衆亦非淺學者所能知也故外科之道淺言之則惟記煎方數首合膏圍藥幾料已可以自名一家若深言之則經絡臟腑氣血骨脈之理乃奇病怪疾千態萬狀無不盡識其方亦無病不全其珍奇貴重難得之藥亦無所不備雖遇極奇極險之症亦瞭然無疑此則較之內科為更難故外科之等級高下懸殊而人之能識其高下者亦不易也日外科之法最重外治而外治之中尤重圍藥凡毒之所最忌者散大而頂不高蓋人之一身豈能無七情六欲之伏火風寒暑濕之留邪飲食痰涎之積毒身無所病皆散處退藏氣血一聚而成癰腫則諸邪四面皆會惟圍藥能截之使之併合則周身之火毒不至矣其已聚之毒不能透出皮膚勢必四布為害惟圍藥能束之使不散漫則氣聚而外泄矣如此則形小頂高易膿易潰矣故外治中之圍藥較之他藥為特重不但初起為然即成膿收口始終賴之一日不可缺若世醫之圍藥不過三黃散之類每試不效所以皆云圍藥無用如有既破之後而仍用圍藥者則群然笑之故極輕之毒往往至於散越而不可收拾者皆不用圍藥之故至於圍藥之方亦甚廣博大假以消痰拔毒束肌收火為主而寒熱攻提和平猛屬則當隨症去取世人不深求至理而反輕議圍藥之非安望其術之能工也神授衛生湯治一切瘡症能宣熱散風行瘀活血解毒消腫疏通臟腑徐靈胎曰其法不外此四句藥性和平功效甚速誠外科首用方也羌活八分搜風發表勝濕防風勝濕解表去風白芷發表散風熱活血排膿穿山甲土炒研沉香紅花散結消腫排膿瘡家聖藥連翹石決明煅各六分金銀花皂魚刺歸尾甘草節生肌止痛花粉太寒不可用破後口渴者可用以上各一錢乳香五分大黃酒浸炒一錢脈虛便利者勿用水二碗煎八分病在上部先服藥隨飲酒一杯病在下部先飲酒一杯隨後服藥以行藥勢徐靈胎曰其方之分量亦最宜斟酌得中除大黃共一兩零五分此外科之主方加減不外乎此又曰外科與內科大不相同內科之病千頭萬緒一病必有一病之主方外科不過托毒清火及生肌長肉等數法耳即有加減亦惟隨症選擇幾味無多法也學者果能將藥性細細參考自能隨症施治投無不利繆仲淳治疔疽及一切腫毒方生甘菊連根打碎一兩五錢紫花地丁五錢甘草用水炙三錢鼠黏子炒研一錢五分栝蔞根二錢貝母三錢金銀花五錢白芷一錢五分生地三錢白芨三錢連翹二錢五分五爪龍即茜根五錢先用夏枯草六兩河水六碗煎三大碗去渣入煎藥一碗不拘時服潰後加鹽水炒黃耆五錢麥冬五錢又圍陰症瘡瘍方紅藥子四兩白芨一兩五錢白蘞一兩五錢乳香六錢沒藥六錢硃砂三錢雄黃三錢麝香一錢冰片一錢黑狗下頦一個煅存性豌豆粉一兩各另研極細末和勻以醋蜜調敷四圍以極滾熱醋蘸潤亦可服腦疽薛立齋治一男子患腦疽其頭數多痛不可忍先服黃連消毒散不應更以忍冬酒服之即酣睡覺而勢去六七再四劑而消又一男子所患尤甚亦令服之腫痛頓退但不能平加以黃耆當歸栝蔞白芷甘草節桔梗數劑而愈舉人潘光甫年四十患腦疽焮腫診其脈沉靜謂陽症陰脈斷不起已而果然蓋瘡瘍之症雖屬心火尤當分表裡虛實果元氣充實內有實火者寒劑或可責效若寒涼過度使胃寒脾弱陽變陰或結而不潰潰而不斂陰陽乖戾水火交爭死無日矣一老婦患腦疽稟壯實潰而痛不止脈實便祕與清涼飲二劑而痛止更以消毒托裡藥而愈一老人患此症色赤腫痛脈數而有力與黃連消毒散二劑少愈更以清心蓮子飲四劑而愈一男子患此症腫痛脈數以黃連消毒散二劑少退以仙方活命飲二劑而止更以芎歸白芍銀花知柏而潰又以托裡藥而愈一男子頭項俱腫雖大潰腫痛益甚兼作瀉煩躁不睡飲食少思其勢可畏診其脈毒尚在與仙方活命飲二劑腫痛退半與二神丸及六君子湯加五味麥冬棗仁四劑諸症少退飲食少進睡亦少得又與耆芩白朮散數服飲食少進又與十全大補湯加銀花白芷桔梗月餘而瘥一老人面赤腫痛脈數而有力與黃連消毒散二劑少退更與清心蓮子飲四劑而消一婦人患此症膿熟不潰脹痛欲嘔飲食少思急針之與托裡藥而愈又一婦人患之不甚痛不作膿以托裡消毒散膿成針之補以托裡藥而愈一老人患此症膿清兼作渴脈軟而澀以為氣血俱虛用八珍湯加黃耆五味子彼不信及服降火之劑果反作嘔少食始信服香砂六君子湯四劑嘔止食進仍投前湯四劑而愈一男子患此症膿成未潰兼作渴尺脈大而無力以四物湯加知柏麥冬黃耆四劑而渴減又與加味八味丸渴止瘡潰更用托裡藥兼前丸而愈一男子患此症腫痛脈數以荊防敗毒散二劑而痛止更以托裡消毒藥而消一男子患此症焮腫疼痛發熱飲冷脈洪數與涼膈散二劑而止以金銀花四劑散而潰更以托裡藥而愈一老婦患此症稟實潰而痛不止脈實便祕服清涼飲二劑而止更以托裡消毒藥而愈一男子患此症腫硬不作膿惟瘡口出水痛甚以仙方活命飲二劑痛止而膿成針之更以托裡藥而愈常見膿清而補不應及不痛或木悶堅硬者俱不治一男子患此症膿將成微痛兼渴尺脈大而無力此陰虛火動之症彼謂心經熱毒自服清涼降火藥愈熾復求治乃以四物湯加知柏五味麥冬黃耆及加減八味丸渴止瘡潰更以托裡藥兼前丸而愈中藏經云癰疽瘡腫之作皆五臟六腑蓄毒不流非獨榮衛壅塞而發其行也有處其主也有歸假令發於喉舌者心之毒皮毛者肺之毒肌肉者脾之毒骨髓者腎之毒發於下者陰中之毒發於上者陽中之毒外者六腑之毒內者五臟之毒故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑者易治感於五臟者則難治也觀此則疽發於腦者乃膀胱腎脈陰氣不足陽火熾盛而出也豈可專泥於火而不滋益陰氣耶一男子耳後漫腫作痛肉色不變脈微數以小柴胡湯加芎歸桔梗四劑腫少起更以托裡消毒散數劑脈滑數此膿已成矣宜針之彼畏而不肯用因痛極始針之出膿碗許以托裡藥兩月餘始愈凡瘡不起者托而起之不成膿者補而成之使不內攻膿成而及時針之不數日即愈矣常見患者皆畏針痛而不肯用又有恐傷良肉而不肯用殊不知瘡雖發於肉薄之所若膿成其腫亦高寸余瘡皮又厚分許用針深不過二分若發於背腫高必有三四寸入針止寸許況患處肉已壞矣何痛之有何傷之慮怯弱之人又患附骨疽待膿自通以致大潰不能收斂氣血瀝盡而亡者多矣用針之法一男子素不慎起居飲食腦忽焮赤腫痛尺脈洪數以黃連消毒散二帖濕熱頓退惟腫硬作痛以仙方活命飲二帖腫痛悉退但瘡頭不消投十宣去桂加銀花藁本白朮茯苓陳皮以托裡排膿彼欲全消自制黃連消毒散二帖反腫硬不作膿始悟仍用十宣加白朮茯苓半夏腫少退乃去桂又四劑而膿成膿勢亦退繼以八珍散加黃耆五味麥冬月餘膿潰而愈夫苦寒之藥雖治陽症尤當分表裡虛實次第時宜豈可始末悉用之然焮腫赤痛尺脈數按之則濡乃膀胱濕熱壅盛也故用黃連消毒散以解毒除濕腫硬作痛乃氣血凝滯不行而作也遂用仙方活命飲以散結消毒破血其瘡頭不消蓋因熱毒熏蒸氣血凝滯而然也宜用甘溫之劑補益陽氣托裡以腐之況此症原屬督脈經陰虛火盛而出若不審其因專用苦寒之劑使胃氣弱何以腐化收斂何不致於敗耶凡瘡之易消散易腐潰易收斂皆氣血壯盛故也汪太常太夫人年逾八十腦疽已潰發背繼生頭如粟許脈大無力此膀胱經濕熱所致夫脈無力乃血氣衰也遂以托裡消毒藥數服稍可更加參耆之劑雖起而作渴此氣血虛甚以人參黃耆各一兩當歸熟地各五錢麥冬五味各一錢數服渴止而不潰以前藥加肉桂十餘劑膿成針之瘀肉漸腐徐徐取去而膿猶清不斂投以大劑十全大補湯加白蘞貝母遠志三十餘劑膿稠而愈凡患者氣質素實或有痰不服補劑不知膿血出多氣血並虛豈不宜補嘗治瘡陰用參耆大補之劑陽用敗毒之方與服之服不中滿瘡亦有效虛甚者尚加薑桂及附子也一男子患腦疽腫高作痛腫處敷藥痛雖止而色變黯腫外作痛仍敷之肉色亦黯喉肉不痛不腫此為涼藥所誤及盡頸敷之其頸皆潰而死朱丹溪治元杜清碧學道武夷至婺源病腦疽自治不愈朱往視之曰何不服防風通聖散清碧曰服數次矣朱曰盍以酒製之清碧乃悟服不盡劑而愈自此心服丹溪續醫説竇材治一人病腦疽六日危篤不進飲食竇曰年高腎虛邪氣滯經也令服救生湯即刻減半夜間再進一服全安一老婦腦後作痛筋拘急竇曰此欲發腦疽也急服救生湯三服全愈鬢疽薛立齋治一男子患鬢疽焮腫作痛發熱以小柴胡湯加連翹金銀花桔梗四劑而消一男子因怒後鬢際腫痛發熱以小柴胡湯加連翹銀花花粉桔梗四劑根畔俱消惟瘡頭作痛以仙方活命飲二劑痛止膿成針之更以托裡消毒藥而愈一男子頭面焮腫作痛時仲冬脈弦緊以托裡溫經湯汗之而愈一男子患此症腫痛寒熱拘急脈浮數以荊防敗毒散二劑表症悉退更以托裡消毒散潰之而安一男子患此症膿熟不潰脹痛針之而止更以托裡消毒散而愈凡瘡膿熟不潰屬氣血虛也若不託里必致難瘥一男子患此症作膿焮痛發嘔少食以仙方活命飲一劑而止以六君子湯加當歸桔梗角刺潰而愈一男子患此症膿清不斂以托裡散加乳香麥冬而斂一老人患此症腫痛發熱膿清作渴脈軟而澀此血氣俱虛也欲補之彼見作渴發熱乃服降火之劑果作嘔少食復求治投六君子湯四劑嘔止食進仍用補藥月餘而愈夫患者臟腑血氣上下各有虛實況陰症似陽陽症似陰豈可以發熱作渴而概用寒涼之劑常治患者正氣虛邪氣實以托裡為主消毒佐之正氣實邪氣虛以攻毒為主托裡佐之正氣虛邪氣實而專用攻毒則先損胃氣宜先用仙方活命飲托裡消毒散或用灸法俟邪氣退正氣復再酌量治之大抵正氣奪則虛邪氣勝則實蓋邪正不並立一勝則一負其虛不待損而自虛矣若發背腦疽疔毒及患在四肢必用灸法拔引郁毒以行瘀滯尤不可專於攻毒診其脈而辨之庶不自誤一男子患此症腫焮痛甚發寒熱服十宣散愈熾診之脈數而實此表裡俱有邪也以荊防敗毒散加芩連大黃二劑少愈更以荊防敗毒散四劑而消大抵瘡瘍之症腫焮痛甚寒熱往來或大便祕結小便淋漓心神潰悶恍惚不寧皆邪熱之實也豈可補哉東垣云瘡疽之法其受之有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒劑則是皮毛始受邪引入骨髓受之內者法當疏利以寒劑反用溫劑托裡則是骨髓之病上徹皮毛表裡通潰共為一瘡助邪為毒苦楚百倍輕則危殆重則死矣趙宜人年逾七十患鬢疽已潰焮腫痛甚喜冷脈實大便祕澀東垣云煩躁飲冷身熱脈大精神昏悶者皆臟腑之實也遂以清涼飲一劑腫痛悉退更以托裡消毒藥三十餘劑而平若謂年高潰後投以補劑實實之禍不免矣維陽俞黃門年逾三十冬月鬢患毒腫焮煩躁便祕脈實此膽經風熱壅上而然也馬氏云瘡瘍之症熱壅而不利者大黃湯下之遂以一劑便通瘡退更以荊防散敗毒散二劑再以十宣散去桂加花粉銀花數劑而愈大宗伯羅公耳後髮際患此焮痛脈緊數以小柴胡湯加桔梗牛蒡銀花四劑而愈頤疽薛立齋治高舉人年逾三十夏月熱病後患頤毒積日不消氣息奄奄脈診如無飲食少思大便不禁脈經云脈息如無似有細而微者陽氣衰也齊氏云飲食不入大便滑利腸胃虛也遂以六君子湯加炮薑肉豆蔻破故紙數劑瀉止食稍進更加以黃耆當歸肉桂潰而膿水清稀就於前藥每服加熟附子一錢數劑食進膿亦漸稠再以十全大補湯用酒芍加白蘞月餘而痊項癰薛立齋治二守施希祿患項毒膿已成因畏針焮延至胸色赤如霞其脈滑數飲食不進月餘不寐肢體甚倦此氣血虛而不能潰也乃針之膿出即睡覺而思食用托裡藥兩月而愈劉璽素虛患此不針潰透頷頰氣血愈虛竟不救一婦人項患癰焮痛發寒熱以荊防敗毒散二劑少愈以小柴胡湯加連翹牛蒡桔梗四劑而消一男子項患毒潰而作痛以參耆地黃芎歸補之而止更以八珍湯加黃耆桔梗三十餘劑而愈馬元儀治沈氏婦頸項間患瘍痛甚躁煩發熱晝夜不眠多方不愈診之兩脈浮大沉小此陽明氣血交虧之候也陽明之氣一日一夜五十周於身而血隨之氣虛血澀則病生焉況所現皆血虛氣衰之症較之熱毒有餘者殊矣用黃耆一兩當歸五錢人參三錢炙草七分紅花五分調補氣血四劑而安張子和在西華寄食於夏官人宅忽項上病一病狀如白瘡瘡腫根紅硬以其微小不慮也忽故人見邀以羊羔酒飲雞魚醢蒜皆在焉張以故人不能辭又忘禁忌是夜瘡大痛不可忍項腫及頭開口發狂言目見鬼神夏君甚懼欲報其家張笑曰請無慮來日當平乃以酒調通經散六七錢下舟車丸百餘粒次以熱面羹投之上湧下泄一時齊作各去半盞明日日中瘡腫已平一二日膿出而愈朱丹溪治王姑丈七十餘患項疽脈實而稍大此因憂悶而生太陽經治之歸頭二錢黃柏一錢五分黃耆羌活地黃酒芩桔梗各一錢酒連連翹防風生甘草人參陳皮防己澤瀉各五分白水煎服柴嶼青治夏同司鑲黃旗覺羅諱瑪德患對口人皆謂之落頭疽難治柴以為無害服藥五十日而愈後某公亦患前症亦服藥五十日而安姚應鳳診一人項生瘡求治應鳳曰是天蛇頭瘡宿因也三年頭當自落而斃竟如其言仁和縣志肩癰薛立齋治一男子肩患毒焮痛飲冷煩躁便祕脈數而實以清涼飲兩劑少愈以金銀花散四帖悉退又以十宣散去桂加天花粉銀花數帖瘡潰而痊此脈與症皆有餘也一婦人癸卯冬失物發怒缺盆內微腫甲辰春大如覆碗左肩胛亦腫肉色如故或針出鮮血三碗許腹痛如錐泄瀉不止四肢逆冷嘔吐惡寒或時發熱絶食已七日矣其脈洪大時或微細此陽氣脫陷也用六君加炮薑三錢附子二錢早服至午不應再劑加附子五錢熟睡覺來諸症頓退六七少進稀粥再四劑諸症悉退飲食如故缺盆始痛針出清膿二碗許諸症復至此虛極也以十全大補加薑桂附各一錢三劑而安後減薑桂附各五分與歸脾湯兼服五十餘劑而愈上舍陳履學之內先從左肩下一點寒三日後右肩下發一白瘡腫如甌盅紅如酒盞自用消解涼藥一劑不散次投十宣散四劑加痛略紅次連投參耆丁桂防芷之劑膿潰後噁心嘔吐頭暈不止厥逆寒戰鼓牙虛汗頂平膿清此投解散涼劑之誤急洗去圍藥投以參耆歸朮地黃薑附大劑一服原從左肩下舊寒一點先熱起又進一服遍腫浮熱腫高膿稠兼紝烏金膏數日出腐筋如脂膜大小數片日進前藥二服參耆投至八錢逾兩月始安愈後時以勞厥即投參耆歸朮薑附大劑乃蘇一男子肩患毒焮痛飲冷煩躁便祕脈數而實以清涼飲二劑少愈以金銀花散四劑悉退又以十宣去桂加天花粉金銀花數劑瘡頭潰而痊一婦人肩下患毒脈弦緊以白芷升麻湯二劑表症已退更以托裡藥潰之而愈一男子素弱肩患腫欲內消服涼藥反致作瀉少食以二神丸及香砂六君子湯加肉豆蔻而瀉止食進又以托裡藥而腫亦消一男子肩下患疽已數日漫腫微痛頭甚多皆如粟許色不變不起發此氣血虛也診其脈果然先以仙方活命飲二劑殺其大勢更以托裡藥而起發瘡頭雖潰但流血水氣血尚虛不能為膿也彼欲服太乙錠豫謂此藥止能攻毒不能托裡不信仍服之至四次飲食不進瘡色黑陷厄逆不絶胃氣虛極也不治強投溫中健脾之劑不應而死一男子肩患毒腫硬作痛惡症迭見用白礬末三錢糊丸以蔥頭七莖煎湯調下腫痛悉退再服諸症亦退更以仙方活命飲二劑出水而消此祕方名千金化毒湯白礬末蔥湯調服因末難服故易為丸一方士治瘡疽不問腫潰先用此藥三二服後用消毒藥甚效常治芻蕘之人用此即退不用托裡藥亦愈蓋此熱毒為患血氣不虧故也若因金石毒藥發疽者尤效蓋礬又能解金石之毒也一方用礬末五錢硃砂五分熱酒下亦效此藥托裡固內止瀉解毒排膿不動臟腑不傷氣血有益無損其藥易得其功甚大偏僻之處不可不知此方或蟲犬所傷溶化熱塗患處更以熱酒調末服皆效福泉黃吏部肩患毒發熱惡寒大渴煩躁似有餘之症其脈雖大而無力卻屬不足用當歸補血湯治之愈王喬年逾三十肩患毒以人參敗毒散一劑更以十宣散去參桂加銀花花粉四劑而潰因怒動肝火風熱上壅頭面赤腫焮痛飲冷以荊防敗毒散加芩連薄荷二劑不應急砭患處出黑血盞許仍以一劑勢退大半再進人參敗毒散四劑而愈夫病有表裡上下之殊治有緩急攻補之異若不砭刺毒氣結於內里藥不能及焮腫日甚使投峻利之藥則上熱未除中寒已作必傷命矣一上舍肩患疽脈數以槐花酒一服勢頓退再與金銀花黃耆甘草十餘劑而平槐花治濕熱之功最為神速若虛寒之人不可過劑王洪緒治姚氏女年二十九小産月餘左肩手搭處先發一毒周尺有五半月背添一毒上下長三寸上闊下尖皆白陷十日後始延治勢甚篤連服陽和湯三劑能起坐五劑自能便溺十二劑其續發者全消先發之搭手亦消剩瘡頂如棋子大不痛而潰四日收功後云背上如負一版轉舒不快以小金丹十丸每日三進全愈臂癰薛立齋治進士申天益臂患癰寒熱頭痛形氣虛弱此手足陽明經風熱邪之症用桔梗升麻湯二劑外邪頓散用托裡消毒散二劑腫痛頓退乃用補中益氣散湯調理形氣漸復而愈一婦人臂患腫惡寒不作膿以十宣散六劑而潰以托裡散數劑而瘳一婦人臂腫未成膿飲食少思遇勞作痛發熱以補中益氣湯二劑痛少止補氣血健脾胃藥而消一婦人臂患毒腫硬咽喉壅塞四肢逆冷發寒熱以五香連翹湯二劑頓愈以瘡科流氣散四劑而消一男子臂患癰脈弦緊有力以白芷升麻湯二劑頓退又二劑而消一男子臂患癰不作膿灸以豆豉餅及飲托裡藥三十餘劑而潰又月餘而瘳一婦人患臂癰瘡口紫陷膿清不斂彼以為毒未盡欲服攻毒之劑謂瘡瘍之症腫起堅硬膿稠者實也腫下軟慢膿稀者虛也遂以附子餅灸之及飲十全大補湯百劑始愈西蜀彭黃門太安人臂痛數年服活絡丹二十丸而瘥朱丹溪治從叔平生多慮質弱神勞年近五十忽左膊外側臁上起一小紅腫大約如栗曰慎勿輕視且先與人參大料作湯二三斤為好彼未之信慢進小帖數服未解而止旬余值大風拔木瘡上起一道紅線繞至背胛直抵右胛肋曰必大料人參少加川芎陳皮白朮等補劑與之後與此方兩閲月而安東垣曰尹老家素貧己酉歲十月初寒形志皆苦於手陽明大腸經分出癰初有㿗疝其臂外皆腫痛先腫在陽明左右寸脈皆短中得之俱弦按之洪緩有力此癰得自八風之變以脈斷之邪氣在經脈之表其症大小便如故飲食如常腹中和口知味知不在裡也不惡風寒止熱躁脈不浮知不在表也表裡既和邪氣止在經脈之中內經曰凝於經絡為瘡癰其癰出身半以上風從上受之故知是八風之變為瘡者也宜治其寒邪調其經絡中血氣使無凝而已以白芷升麻湯療之一服而愈炙甘草升麻桔梗白芷當歸梢生地黃生黃芩酒黃芩連翹黃耆肉桂紅花上㕮咀水酒各大盞半同煎服愈薛治王揮使臂腫一塊不痛不赤惟脈軟懶食時嘔以六君子加藿香酒芍嘔止食進再以八珍湯二十餘劑成膿刺之又以十全大補而愈次年傷寒後此臂仍腫微痛乃傷寒餘毒也無表症但虛弱先用十宣散四劑取參耆芎歸扶助元氣防風桔梗白芷厚朴行散腫結肉桂引經破血腫退三四再以八珍湯膿潰而愈至冬臂復作痛因復祛風藥反筋攣痛甚此血虛不能養筋筋虛不能束骨遂以加味十全大補而愈一室女臂患腫潰久不斂寒熱交作五心煩熱飲食少思月水不通與逍遙散八珍湯經行瘡愈一婦人月水不行潮熱咳嗽肌體日瘦胸膈不利頸腫一塊日久不消亦服前藥熱退腫消經行而愈宋琰年逾三十臂患癰潰而不痛膿稀脈弱丹溪云疽潰深而不痛者胃氣大虛而不知痛也東垣云膿水清稀瘡口不合氣血俱虛也當以大補藥治彼不聽服消毒藥氣血虛甚遂不救丹溪云才見腫痛參之脈症虛弱便與滋補氣血無虧可保終吉又云潰瘍內外皆虛宜接補為主王時亨年逾四十臂患毒焮痛作嘔服托裡消毒藥愈甚以涼膈散二劑頓退更以四物湯加芩連四劑而消王文遠臂患毒作痛服寒涼藥遂致食少大便不實以理中丸二服更以六君子湯加砂仁藿香治之再以托裡藥膿潰而愈大凡瘡痛甚者如稟厚有火則宜苦寒之劑若稟薄者則宜補中益氣湯加芩連之類在下加黃柏人肥而瘡作痛者用荊防羌獨之類蓋取其風能勝濕也方云起臂生一疽膿潰百日方愈中有惡肉突起如蠶豆大月餘不消醫治不效因閲本草得劉涓子鬼遺方用烏梅肉燒存性研敷試之一日夜去其大半再上一日而平乃知世有奇方如此遂留心搜刻諸方始基於此方也本草綱目乳癰乳岩薛立齋治一婦人因怒兩乳腫兼頭痛寒熱此肝經氣鬱症也用人參敗毒散二劑表症已退用小柴胡加芎歸枳殼桔梗四劑而愈一婦人因怒左乳作痛胸膈不利此屬肝脾氣滯以方脈流氣飲加木香青皮四劑而安一婦人久郁左乳內結核如杏三月不消心脈澀脾脈大按之無力此肝脾氣血虧損以八珍加貝母遠志香附柴胡青皮桔梗五十餘劑而消一婦人乳內結核年餘晡熱少食此血氣不足欲用益氣養榮湯彼反服行氣之劑潰出清膿而歿又一婦乳內結核如栗亦服前藥大如覆碗堅硬如石出血水而歿又郭氏妾乃放出宮人乳內結一核如栗亦以前湯彼不信乃服瘡科流氣飲及敗毒散三年後大如覆碗堅硬如石出水不潰亦歿大抵鬱悶則脾氣阻肝氣逆則成隱核不痛不癢人多忽之最難治療若一有此宜戒七情遠厚味解鬱結更以養氣血之藥治之庶可保全否則不救亦有一二載或五六載方潰下陷者皆曰乳岩以其形岩凸似巖穴也最毒慎之可保十中一二也一婦人乳腫而不作膿以益氣養榮湯加香附青皮數劑而膿成針之旬日而愈一婦人右乳腫發熱怠惰嗜臥無氣以動至夜熱亦甚以補中益氣湯兼逍遙治之而痊一男子左乳腫硬痛甚以仙方活命飲二劑而止更以十宣散加青皮四劑膿成針之而愈若膿成未破瘡頭有薄皮剝起者用代針之劑點起皮處以膏藥覆之膿亦自出不若及時針之不致大潰如出不利更紝搜膿化毒之藥若膿血未盡輒用生肌之劑反助邪氣縱早合必再發不可不慎也一男子年逾五十憂子不成立左乳腫痛左脅脹腫肝脈弦數而澀先以龍薈丸二服諸症皆退又以小柴胡對四物加青皮貝母遠志數劑而膿成欲針之仍以養氣血解鬱結彼不從乃雜用流氣敗毒之劑致便祕發熱作渴復請治謂膿成不潰陽氣虛不能鼓舞也便祕發熱陰血竭不能濡潤也辭不治果死一男子因怒左乳腫痛肝脈弦數以復元通氣散二服少愈以小柴胡湯加青皮芎歸數劑而消復元通氣散木香茴香青皮甲片陳皮白芷甘草漏盧貝母各等分每服三錢溫酒調下孫文垣侄婦素有痰涎胸膈痞脹近因乳腫大發寒熱欲成癰以加味神效栝蔞散二帖寒熱退而腫不消用貝母白芷為臣栝蔞為君赤芍當歸連翹為佐青皮甘草柴胡為使痛稍減腫仍不消脈之近數知已成膿與內托十宣散加銀花地丁二帖而膿潰因腳上生瘡且有浮氣前方去地丁銀花加苡仁蒼耳子調理全安薛立齋治王汝道室年逾三十每怒後乳內作痛或腫此肝火所致用小柴胡合四物加青皮桔梗香附枳殼而愈彼欲絶去病根自服流氣飲遂致朝寒暮熱益加腫毒此氣血被損而然與八珍三十餘劑喜其年壯元氣易復愈一婦人乳內腫一塊如雞子大勞則作痛久而不消服托裡藥不應此乳勞症也屬肝經血少所致先與神效栝蔞散四劑更隔蒜灸之腫稍退再與八珍湯倍加香附夏枯草地丁仍間服前散月餘而消亦有乳疽一症其狀腫硬木悶雖破而不潰腫亦不消尤當急服此散及隔蒜灸之此症氣血為七情所傷亦勞症也宜戒惱怒節飲食慎起居否則不治一婦人患乳癰氣血頗實但瘡口不合百治不應與神效栝蔞散四劑少可更與數劑及豆豉餅灸之而愈一婦人患此未潰亦與前藥三劑而消陳良甫曰婦人乳勞便服此藥可杜絶病根毒已成能化膿為水未成者則從大小便散之一人抱病小愈左乳復生癰繼又胸膈間結核其堅如石荏苒半載百藥不能施已而牽掣於肩痛特甚禱於張王祠夢神語曰但用生薑自然汁制香附服之可也比覺簡本草視之二物治症相符訪醫者張祿亦云有理香附去毛薑汁浸一宿為末二錢米飲調才數服瘡膿流出腫硬漸消而愈槎庵小乘朱丹溪治一婦人年六十厚味鬱氣而形實多妒夏無汗而性急忽左乳結一小核大如棋子不痛自覺神思不佳不知食味經半月以人參湯調青皮甘草末入生薑汁細細呷一日夜五六次至五七日消矣此及乳岩之始不早治隱至五年十年已後發不痛不癢必於乳下潰一竅如巖穴出膿又或五七年十年雖飲如故食如故洞見五內乃死惟不得於夫者有之婦人以夫為天失於所天乃能生此謂之岩者以其如穴之嵌岈空洞而外無所見故名曰岩患此者必經久淹延惟此婦治之早消患於未形余者皆死凡十餘人又治一初嫁之婦只以青皮甘草與之安一孺人但經將行而乳腫先兩日發口乾而不渴食少減脈左弦帶數右卻平治用四物湯加陳皮白朮茯苓帶熱下與點丸三十粒義二孺人平時乳內有結核不痛忽乳邊又有一腫核頗覺有些痛黃芩川芎木通陳皮各四錢人參二錢白芍一錢大腹皮三錢炙甘草生甘草各一錢當歸頭一錢分二帖煎服黃孺人乳腫痛青皮石膏連翹角刺黃藥子當歸頭木通各一錢生甘草三分入好酒些少同煎飲又別藥洗腫處李東垣治一婦人乳間出黑頭瘡瘡頂陷下作黑眼子其脈弦洪按之細小升麻連翹葛根各一錢半肉桂三分黃芩歸身甘草炙各一錢牛蒡五分黃柏二錢水煎至一盞二服愈立齋治一婦人患乳癰寒熱頭痛與荊防敗毒散一劑更與蒲公英一握搗爛入酒二三盞再搗取汁熱服渣熱塗患處而消丹溪云此草散熱毒消腫核又散滯氣解金石毒之聖藥陳良甫云開慶間淦川嘉林曾都運恭人年已五十而病奶癰後果不起又癸亥年僕處五羊趙經略夫人年七十一歲隔一二年前左乳房上有一塊如鵝卵大今忽然作楚召豫議藥僕云據孫真人云婦人年五十以上乳房不宜見癰見則不可以治矣幸而未破恐是氣瘤漫以五香連翹湯去大黃煎服服後稍減則已過六七年後每遇再腫脹時再合服必消減矣立齋曰一婦人乳內結核年餘不消口乾倦怠脈澀少食此肝脾二經血氣虧損之症宜培養為主乃用草藥數帖遂不救繆仲淳治顧文學又善內人患左乳岩用夏枯草蒲公英為君銀花漏蘆為臣貝母桑葉甘菊雄鼠糞連翹白芷紫花地丁山茨菰炙草栝蔞茜根陳皮乳香沒藥為佐使另用夏枯草煎濃汁丸之服斤許而消三年後右乳復患用舊存余藥服之亦消後以方治數人俱效廣筆記馬銘鞠治沈氏婦患乳癧潰爛經年不見臟腑者一膜耳用鼠糞土楝樹子經霜者佳川楝不用露蜂房各三錢俱煆存性各取淨末和勻每服三錢酒下間兩日一服痛即止不數日膿盡收斂此方傳自江西販糖客因治祝氏喉症得之廣筆記張王屋録後江孟修兄驗過乳癖方白芷一錢雄鼠糞一錢二種曬乾為末用好酒調服飲取一醺睡而愈雄鼠糞尖者是又一神驗方用活鯽魚一個山藥一段如魚長同搗汁敷乳上以紙蓋之立愈廣筆記薛治一婦人乳癰愈後發熱服養氣血藥不應與八珍湯加炮薑四劑而止仍以前湯加黃耆香附三十餘劑血氣平復薛立齋治一婦年逾二十稟弱乳內作痛頭疼脈浮與人參敗毒散倍加人參一劑表症悉退但飲食少思日晡微熱更以小柴胡湯合六君子湯二劑熱退食進方以托裡藥加柴胡十餘劑針出膿而愈又一婦患此症膿成畏針病勢漸盛乃強針之膿出三碗許脈數發渴以大補藥三十餘帖而愈丹溪云乳房為陽明所經乳頭為厥陰所屬厥陰者肝也乃女子致命之地宗筋之所且各有囊橐其始焮腫雖盛患止於一二囊若膿成不針攻潰諸囊矣壯者猶可弱者多致不救所以必針而後愈也錢國賓治一婦人年五十六歲左乳患癰已七年爛過半矣中間一孔如桃時流血水凡貼膏藥痛反增劇以布圈系護防其摩擦夫乳頭屬足厥陰肝乳房屬足陽明胃乃肝胃二經之症非單方不足以治其外非峻補不足以養其內以形色氣味治之用陳香櫞一個其穰之瓣如乳內之房其色先青而後黃青屬肝黃屬胃其味先酸而後甘酸屬肝甘屬胃其氣香能通肝胃之氣煆黑止血酒服和經此治其乳也制一枚為末作二次服又用酒炒黃耆二兩益氣實表土炒白朮二兩山藥五兩健脾收濕芎歸地芍各一錢養血水六碗煎三碗作四次服調至一月痊論藥入微可為格物之法王洪緒曰凡乳岩初起或乳中或乳旁生一小塊不痛不癢皮色不變與瘰癧惡核相似是乃陰寒結痰總因悲哀憂愁患難驚恐所致初起以犀黃丸每服三錢酒送下十服即愈或以陽和湯加土貝母五錢煎服數日可消倘以膏藥敷貼必致日漸腫大內作一抽之痛便覺難治若遲至皮色變異尤難挽回勉以陽和湯與犀黃丸早晚輪服服至自潰而痛者用大蟾多隻每日早晚取蟾破腹連雜以蟾身刺孔貼患處內服千金托裡散人參防風黃耆官桂白芷厚朴川芎桔梗甘草三五日後接服犀黃丸可救十中三四潰後不痛而癢極者無一挽回大忌開刀開則翻花最慘萬無一生男女皆有此症王洪緒治一婦乳患白疽寒熱痛甚與以陽和丸同二陳湯煎服得睡痛息三服全愈又一婦患相同服夏枯草花粉連翹蘇葉等藥五劑號痛不絶王曰向患白色今變紅色難以全消矣投以前藥痛止能睡根盤收小連進數劑不痛而潰貼陽和膏收功陽和丸方肉桂一兩麻黃五錢炮薑炭五錢水泛為丸一婦兩乳皆患乳岩兩載如桂圓大因子死悲哀忽發如杯以五通丸犀黃丸早晚輪服九日全消五通丸方廣木香麻黃沒藥去油乳香去油五靈脂等分研末飯搗為丸梧子大每服五錢用川芎當歸赤芍連翹甘草煎湯送下凡大癰生要緊穴道將發大時服此丸甚效與三黃丸間服尤妙三黃丸熟大黃二兩乳香沒藥各一兩麝香一錢五分西牛黃三分雄黃五錢以熟大黃酒浸搗爛將各末和入搗丸如梧子大每服五錢一男子患乳岩貼鯽魚膏兩日發大如拳色紅王令揭去膏藥與陽和湯四劑色仍紅以陽和湯犀黃丸輪服至十六日四圍皆消獨患頂潰用蟾拔毒三日半月收功胸癰薛立齋治一男子胸患癰腫高焮痛脈浮而緊以內托散煎服二劑表症悉減以托裡消毒散四劑而消一男子素弱胸患癰飲食少而倦以六君子湯加芎歸黃耆膿成針之更以托裡藥而愈薛立齋治一男子胸患癰焮痛煩躁發熱作渴脈數而實時季冬此熱毒內蓄也須舍時從症欲治以內疏黃連湯彼以時當隆寒乃雜用敗毒藥愈熾仍求治投前藥二劑後去二次諸症悉退以金銀花散加連翹山梔四劑出水而消大抵症有主末治有權宜治其主則末自退用其權則不拘於時泥於守常必致病勢危甚況慣用攻劑動損各經故丹溪云凡瘡發於一經只當求責本經不可干擾余經羅謙甫曰守常者衆人之見知變者智者之事知常而不知變細事因而取敗者多矣一男子胸患毒焮痛怕冷脈洪數以黃連解毒湯二劑頓退更以金銀花散六劑而消一少婦胸膺間潰一竅膿血與口中所咳相應而出以參耆當歸加退熱排膿等藥而愈余按此因肺痿所致原注張都憲夫人性剛多怒胸前作痛肉色不變脈數惡寒經云洪數之脈應發熱而反惡寒瘡疽之謂也今脈洪數則膿已成但體豐厚故色不變似乎無膿以痛極始肯用針入數寸膿出數碗遂以清熱消毒藥治之而愈設泥其色而不用針無可救之理矣琇按肝脈挾胃貫膈又曰是所生病者為胸滿故胸之癰疽本由於肝也楊百戶胸患毒腫高焮赤發熱脈數大小便澀飲食如常齊氏曰腫起色赤寒熱疼痛皮膚壯熱頭目昏重氣血之實也又云大便硬小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛身熱脈大精神昏塞臟腑之實也遂以黃連內疏湯二劑諸症漸退更以荊防敗毒散加芩連山梔四劑少愈再以四物加芩連白芷桔梗甘草銀花數劑而愈一男子胸腫一塊半載不消令明灸百壯方潰與大補藥不斂復灸以附子餅而愈張路玉治談仲安體肥善飲夏患壯熱嘔逆胸膈左畔隱痛手不可拊便溺澀數舌上滑胎食後痛嘔稠痰漸見血水脈來澀澀不調與涼膈散加石斛連翹下稠膩極多先是醫作肺癰治不效張曰肺癰必咳嗽吐腥穢痰此但嘔不嗽洵為胃病無疑下後四五日復嘔如前再以小劑投之三十而勢甫平後以保元苓橘平調二十日而痊先時有李姓者患此專以清熱豁痰解毒為務直至膈畔潰腐膿水淋漓纏綿匝月而斃良因見機不早悔無及矣琇按此症最難別白即內經所謂內有裹大膿血之症也吾鄉一名醫自患此同道診之不知為癰也雜進參附丁桂之劑久之吐出臭膿乃省已無及矣脅癰薛立齋治一婦人脅患癰未成膿惡寒脈緊以十宣散加柴胡二劑表症悉退更以托裡散數劑膿清而愈一男子近脅患疽腫而不潰投大補之劑潰而已愈後患弱症而歿薛立齋治一上舍年逾四十因怒脅內作痛不止數日後外結一塊三寸許漫腫色不赤按之微痛此怒氣傷肝致血傷氣鬱為患以小柴胡湯對四物倍用芎歸黃芩貝母肉桂治之彼謂丹溪云腫瘍內外皆癰宜托裡表散為主又云凡瘡未破毒攻臟腑一毫熱藥斷不可用況此症為氣血凝滯乃服流氣飲愈虛始信而復求治視之虛症並臻診之胃氣更虛彼欲服薛前藥曰急者先治遂以四君子湯加酒芍炮薑四劑少得更加當歸又四劑胃氣漸醒乃去薑又加黃耆芎歸肉桂數劑瘡色少赤並微作痛又二十餘劑膿成針之卻與十全大補湯喜其謹疾又兩月餘而瘳夫氣血凝滯多因榮衛之氣弱不能運散豈可復用流氣飲以益其虛況各經氣血多寡不同心包絡膀胱小腸肝經多血少氣三焦膽腎心脾肺少血多氣前症正屬膽經少血之臟人年四十以上陰血日衰且肝症俱屬不足腫瘍內外皆壅宜托裡表散為主乃補氣血藥而加以行散之劑非專攻之謂也若腫焮痛甚煩躁脈大辛熱之劑不但腫瘍不可用雖潰瘍亦不可用也凡患者須分經絡氣血地步遠近年歲老幼稟氣虛實及七情所感時令所宜而治之常見以流氣十宣二散概治結腫之症以致取敗者多矣此案與舊案東侍御一則正同而此之發明最為緊要而舊案節之故重録於此馬元儀治沈氏婦左脅患腫瘍長五寸許治已兩月發表托裡劑多功少診其兩脈弦數兼澀腫處低陷作痛寒熱經行不止口燥艱食此症頗危必得之勞郁且怒邪熱結聚厥陰之位榮衛不行周身火邪獨徹上下表斂俱所不宜用生首烏一兩滋其內燥柴胡一錢疏其氣血枳殼桔梗各一錢舒通肺氣以制肝木杏仁蘇子各二錢調氣化痰以清上焦丹皮一錢清其血半夏曲一錢和其中兩劑寒熱減而經止患處焮腫潰稠膿飲食少進瘍醫以潰後當行大補投耆術之屬後致瘡口內陷食少曰癰疽已潰當補此其常耳今兩脈遲澀遲則氣滯澀則血滯鬱而得補其鬱彌甚始猶肝木自傷既乃轉戕脾胃以不循常度分肉不溫經隧不行而欲瘡之斂也其可得乎夫榮不通須以血藥和之當歸桃仁紅花延胡索是也白朮枳殼一補一瀉所以推陳氣以致新氣乾薑暖胃而和血楂肉消滯而和中服二劑復大潰出稠膿碗許食進神旺而安名言至理須細參之朱丹溪診李兄年四十餘而面稍白神氣勞甚忽脅下生一癰腫如桃一人教用補劑衆笑阻之於是流氣飲十宣散雜而進之旬余召視之曰非惟不與補藥抑且多得解利血氣俱憊不可為矣已而果然立齋曰一男子因怒左脅腫一塊不作痛脈澀而浮此肝經邪火熾甚而真氣不足為患宜培養氣血為主乃用草藥數帖遂致不救一男子因勞發熱脅下腫痛脈雖大而按之無力此氣血虛腠理不密邪氣襲於肉裡而然也河間云若人飲食疏精神衰氣血弱肌肉消導榮衛之氣短促而澀滯故寒搏腠理而癰腫也當補之以接虛怯之氣遂以補中益氣湯加羌活四劑少可去羌活又十餘劑而愈又一男子年二十遍身微痛腰間作腫痛甚以前藥加茯苓半夏並愈一朝士腹脅間病疽經歲或以地骨皮煎湯淋洗出血一二升家人懼欲止之病者曰疽似快更淋之有五升許血漸淡乃止以細穰貼之次日結痂而愈同上張子和治襄陵馬國卿左乳二肋間期門穴中發痛硬而不潰痛不可忍瘍醫皆曰乳癰或曰紅絲漏或曰覷心瘡使服內托數百日又服五香連翹湯數月皆無驗張曰此馬刀也足少陽膽經之病出靈樞十二經以示之其狀如馬刀故曰馬刀堅而不潰乃邀之於食肆中使食浸湯餅稍覺緩次日先以滄鹽上湧又以涼劑滌去熱勢約十數行腫已散矣朱葛黃家妾左脅病馬刀憎寒發痛已四五日矣張曰此足少陽膽經病也少血多氣堅而不潰不可急攻當以苦劑湧之以五香連翹湯托之既而痛止然瘡根未散有一道人過見之曰我有妙藥可潰而為膿不如此何時而愈既紝毒藥痛不可忍外寒內嘔血不止大便黑色飲食不下號呼悶亂幾於死再求治張曰脅間皮薄肉淺豈可輕用毒藥復令洗去以涼劑下之痛立止腫亦消腋癰薛立齋治一童子腋下患癰久不斂膿清脈大倦怠懶食少寐自汗口乾以內補黃耆湯及豆豉餅灸之兩月而愈凡瘡膿潰而清或瘡口不合或聚腫不赤肌肉寒冷自汗色脫者皆氣血俱虛也非補不可一男子腋下患毒咳逆不食腸鳴切痛四肢厥冷脈細以托裡溫中湯二劑頓愈更以香砂六君子湯三神丸而飲食頓進以十全大補湯二十劑而斂里中有周七者少年曾患毒左腋下得一異方用糯米焮飯乘熱入鹽塊夾蔥管少許搗極爛如膏貼患處輒消至中年腰間忽生一毒熱如火板硬痛不可忍傴僂局蹐自分必死屢藥不效急思前方如法貼之未幾大便去糞如宿垢甚多硬者漸軟數日而起薛立齋心法治河南張承祖年逾二十腋下患毒十餘日腫硬不潰脈弱時嘔謂腫硬不潰脈弱乃陽氣虛嘔吐少食乃胃氣弱先以六君子湯加藿香砂仁治之彼謂腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之曰此丹溪大概之言也即諸痛癢瘡皆屬心火之意假如赤腫痛甚煩躁脈實而嘔為有餘法當下不腫硬不痛不潰脈弱而嘔為不足法當補之亦有痛傷胃氣或感寒邪穢氣而作嘔者雖腫瘍尤當助胃壯氣彼執不用信用攻伐之藥病愈甚復請診其脈微細而發熱謂熱而脈靜脫血脈實汗後煩躁者皆難治後果然夫腫瘍毒氣內侵作嘔十有一二潰瘍濕氣內侵作嘔十有八九豈可混為一途朱文鼎母因忿鬱腋下結一核二十餘年因怒加腫痛完穀不化飲食少思東垣云瀉利不止飲食不入此腸胃虛也遂以六君子湯加砂仁肉桂乾薑肉豆蔻瀉雖止而膿清瘡口不合氣血虛也以十全大補湯月餘而愈一男子年逾五十腋下患毒瘡口不合右關脈數而渴此胃火所致用竹葉黃耆湯遂止再用補氣藥而愈嘗治午後發渴或發熱用地骨皮散亦效胃脘癰張隱菴曰順治辛卯歲豫年四十有二八月中生一胃脘癰在鳩尾斜下右寸許微腫不紅按之不痛隱隱然如一雞卵在內姚繼元視之曰此胃脘癰也一名捧心癰速宜解散否則有性命之憂與一大膏藥上加末藥二三錢中間烘貼至暮手足蘇軟漸至身不能轉側仰臥於書齋心煩意亂屏去家人至初更時癰上起一毒氣從左乳下至肋下脅入於左腎入時如燒錐刺入眼中一陳火光大如車輪神氣昏暈痛楚難言火光漸搖漾而散神昏始蘇過半時許其氣復起其行如舊痛楚如前如此者三四次豫思此戊與癸合也腑邪入臟自分必死妄想此毒氣不從脅下入腎得從中而入於腸胃則生矣如此靜而行之初次不從二次即隨想而仍從左乳下入於腸中腹中大鳴無復前痛楚矣隨起隨想因悟修養之道氣隨想而運用者也至天明大泄數次胸膈寬舒繼元先生視之曰毒已散解無妨事矣豫問曰膏藥乃毒藥耶曰上撒之末藥名端午藥純用砒霜巴豆於端午日配製無此毒藥焉能透入皮肉之內豫曰何不早言昨晚以為必死於毒今早始悟膏藥中必有毒藥而得生於毒矣毒藥攻疾有如此之妙也至次年中秋復發仍用膏藥末藥毫無前番之狀腫亦不消豫因想運氣之妙經行坐臥以手按摩意想此毒仍歸腸胃而出如此十餘日而散至次年中秋又發豫謂繼元先生曰去歲膏藥不應今須另法治之姚曰部院劉公之夫人生此疾曾另置末藥比前更毒貼之要起大泡此藥用之無有不驗貼之數日並不起泡腫亦不消豫想此症已頑不受毒藥之制即揭去膏藥用大艾圓迎頭灸九壯其毒隨火四散嗣後永不發矣豫想陽明之毒準在中秋金旺之時而發初從毒攻而解次隨氣運而散後因勝制而消因悟氣運制化之道有如此之妙用五行合化之理人與天地相參即以此理推治百病奇妙異常王紹隆先生曰業醫人須病病經過始得之矣王洪緒曰井泉疽生於心口又名幔心鋭毒初起若心口內有塊漸大心口發高毒陷即死此醫家縮手之症諸書亦無治法惟余家祕集載以本人兩手十指以線量以長短共積其線在喉管正中處雙環至背脊之中看兩線頭盡處為中穴又以本人之中指中一節用柴心量準作一寸中穴之左右各遠一寸各以墨記分立三穴如品字狀每穴用艾灸三大壯一齊火灸灸則全愈
