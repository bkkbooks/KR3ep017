body:
  text: 卷十五汗竇材治一人額上時時汗出乃腎氣虛也陽明熱則額上出汗常人多有此症未可即斷為腎虛也凡病虛實無不對待未可執一不治則成癆瘵先灸臍下百壯服金液丹而愈一人夜多虛汗亦腎氣虛也服全真丹黃耆建中湯而愈一人每日四五遍出汗灸關元穴亦不止乃房事後飲冷傷脾氣復灸右命門百壯而愈常東軒挺晚苦陰汗有教之用牡蠣粉撲之者始雖少減久之至潰腐見其睪丸焉豈非殺之以藥乎志雅堂雜抄琇按陰汗必由下部濕熱而成以牡蠣收澀之故郁瘀而潰爛也宋懷州知州李治與一武臣同官怪其年七十而輕健面如渥丹能飲食叩其術則服首烏丸也乃傳其方後治得病盛暑中半體無汗已半年竊自憂之造丸服至年餘汗遂浹體其治血治風之功大有補益方用赤白何首烏各半斤米泔浸三夜竹刀刮去皮切焙石臼搗為末煉蜜丸梧子大每空心溫酒下五十丸亦可末服本草綱目滑伯仁治一人暑月病身冷自汗口乾煩躁坐臥欲於泥水中脈浮而數按之豁然空散曰脈至而從按之不鼓諸陽皆然此為陰甚格陽得之飲食生冷坐臥當風所致以真武湯附朮苓芍冷飲一進汗止再進躁去三飲而安琇按江案暑門滑治一人汗出如雨身熱煩躁醫誤用朮附乃以黃連人參白虎三進愈之宜參看薛立齋治一婦盜汗不止遂致廢寢神思疲甚口乾引飲作血虛有熱用當歸補血湯代茶炙耆一兩當歸三錢又以六黃湯加人參五味子二劑而愈陳三農治一人感寒用麻黃髮汗汗遂不止用建中湯汗出愈多痰喘有聲此傷寒損血兼用藥之過陰虛而陽無所附遂用川芎三分白芍生地各二錢當歸一錢雄按芎歸尚有可議元胡索香附各三分再服而愈四物是矣加香附元胡是所不解一少年人汗出三年不愈用棉子炒黑入湯一滾服四五日腳腿能立後以歸脾補中等湯而安楊乘六治朱氏子年二十外勞倦發熱上半身自汗如雨三晝夜不止一切斂汗方法無效脈之浮細沉洪軟弱無力面白無神舌胖而軟且白滑意此必肺氣大虛而腠理不固也以黃耆湯加五味附子各二錢自子至卯連進三劑其汗如故思之良久乃用蜜炙黃耆二兩人參五錢白朮一兩蜜炙升麻柴胡陳皮各一錢上半身有汗下半身無汗明是陽氣不能內斂琇按柴胡升麻究竟無謂歸身炙草炒黑乾薑各二錢白芍五味附子各三錢大棗五枚一劑而斂此症本以勞力傷其脾肺中臟之陽陷而不升衛外之陽虛而不固以致陰氣不肯下降乘虛外溢故特用升麻以升提下陷之氣用黑薑以收固衛外之陽使在外而為陰之衛在內而為陽之內守後用清金滋水等劑而愈薛立齋治一婦人盜汗自汗遍身痠疼五心發熱夜間益甚或咳嗽咽乾月經兩三月一至用加味逍遙散六味地黃丸兼服臨臥又服陳術丸陳皮白朮三月餘諸症悉愈其經乃兩月一至又服兩月而痊一婦人患前症食少倦怠肌肉消瘦日晡發熱至夜益甚月水過期漸至不通猶奪汗者無血也時發渴燥汗多而津液涸誤用通經之劑熱倦愈重飲食愈少乃用八珍加升麻丹皮山梔柴胡治之熱漸退又用八珍丹皮軟柴胡調理而愈羅謙甫曰齊大兄因感寒邪頭項強身體痛自用酒服靈砂丹四五粒遂大汗出汗後身輕至夜前病復發以前藥復汗其病不愈復以通聖散發汗病添身體沉重足脛冷而惡寒是日方命醫醫者不究前治又以五積散汗之翌日身重如石不能反側足胻如冰冷及腰背頭汗如貫珠出而不流心胸躁熱煩亂不安喜飲西瓜梨柿冰水之物常置左右病至於此命診之六脈如蛛絲微微欲絶乃以死決之主家曰得汗多矣焉能為害曰夫寒邪中人者陽氣不足之所致也而感之有輕重治之豈可失其宜哉仲景云陰盛陽虛汗之則愈汗者助陽退陰之意也且寒邪不能自汗必待陽氣泄乃能出也今以時月論之大法夏月宜汗然亦以太過為戒況冬三月閉藏之時無擾乎陽無泄皮膚使氣亟奪為養臟之道也逆之則少陰不藏此冬氣之應也凡有觸冒宜微汗之以平為期邪退乃已急當衣暖衣居密室服實表補衛氣之劑雖有寒邪勿能為害此從權之治也今非其時而發其汗乃謂之逆仲景有云一逆尚引日再逆促命期今本傷而並汗汗而復傷傷而復汗汗出數四使氣亟奪衛氣無守陽泄於外陰乘於內故經云獨陽不生獨陰不長不死何待雖盧扁不能治活也是日至夜將半項強身體不仁手足搐急爪甲青而死矣金匱要略云不當汗而妄汗之奪其津液枯稿而死今當汗之症一過中亦絶其命況不當汗而強汗者乎華他傳縣吏尹世苦四肢煩口中乾不欲聞人聲小便不利他曰試作熱食得汗則愈不汗後三日死即作熱食而不汗出他曰臟氣已絶於內當啼泣而絶果如他言此亦臟氣傷燥之病三國志馬元儀治沈康生夫人病經一月兩脈浮虛自汗惡風此衛虛而陽弱也與黃耆建中湯一劑汗遂止夫人身之表衛氣主之凡所以溫分肉實腠理司開闔者皆此衛氣之用故內經曰陽者衛外而為固也今衛氣一虛則分肉不溫腠理不密周身毛竅有開無闔由是風之外入汗之內出其孰從而拒之故用黃耆建中湯以建立中氣而溫衛實表也越一日病者叉手自冒心間脈之虛濡特甚此汗出過多而心陽受傷也仲景云發汗過多病人叉手自冒心心下悸者桂枝甘草湯主之與一劑良已丁庠生頭汗火升食少心悸恍惚不寧或議用滋陰脈之兩寸獨鼓兩關尺虛微少神此脾腎交虧真陽欲脫之候也與人參桂附理中湯大培火土以復虛陽彼以生平不任熱劑為辭曰若謂頭汗火升為火邪上熾耶不知此乃真氣上越也且謂心悸恍惚為陰氣內虧耶不知此乃真元無主也遂與人參四錢白朮五錢附子肉桂各三錢乾薑二錢炙草一錢連進四劑脈始和症始退再溫養元氣一月而安羅謙甫治刑部侍郎王立甫之壻年二十五仲冬因勞役憂思煩惱飲食失節而病時發躁熱肢體困倦盜汗濕透其衾不思飲食氣不足以息面色青黃不澤診其脈浮數而短澀兩寸極小曰此危症也治雖粗安春至必死當令親家知之夫人不以為然遂易醫至正月躁熱而卒他日王謂羅曰吾壻果如君言願聞其理曰此非難知也內經曰主勝逆客勝從天之道也蓋時令為客人身為主冬三月人皆懼寒獨渠躁熱盜汗是令不固其陽時不勝其熱天地時令尚不能制藥何能為冬乃閉藏之月陽氣當伏於九泉之下至春發為雷動為風鼓坼萬物此奉生之道也如冬藏不固春生不茂為疫癘之災且人身陽氣亦當潛伏於內不敢妄擾無泄皮膚使氣亟奪此冬藏之應也令壻汗出於閉藏之月腎水已涸至春何以生木陽氣內絶無所滋榮不死何待乃嘆息而去施笠澤治一人服參耆數日後每將昏反發熱至夜得盜汗而解曰此陰虛不能勝其陽也參耆雖能補陽助陰而陰血未易驟生乃用六味丸料加參歸陳皮一劑而熱退汗止後以六味丸參苓白朮散全愈庠友張君牙患寒熱咸作瘧治服解表之劑乃盜汗潮熱肢節頸項強痛夜臥則汗出如沐濕透重襟二旬余目不交睫診得左寸浮細欲絶右尺浮大無力此汗多亡陽症也與加味歸脾湯不效自加麥冬更服二劑胸膈滿悶飲食不進遂疑參術不可服一僧欲進大劑苦參湯施曰診法陰盛陽衰者不可以柔藥柔藥助陰陽氣衰弱陰氣益著實實虛虛之禍其能免乎今君相二火俱虧非急進歸脾湯加桂心五味不可豈前藥有陳腐或泡製失宜耶令取藥一劑是夜即安汗亦漸止間進八味丸一月而愈庠生施爾祁病脈之曰陰虛火動也病使人發熱盜汗肢節作楚正合丹溪滋陰降火之劑服三日後服虎潛丸病全愈所以知爾祁之病者切其脈虛而數經云血虛脈虛腎水之真陰不足而虛火妄動也先是一醫謂是歷節風飲以風劑即肢節浮腫痿弱不能行汗出如淋經云足受血而能步又云奪血者無汗奪汗者無血蓋風能生火又能耗血血虛則內熱益甚肢熱則腫肺熱則痿矣錢國賓治荊州李山人年四十餘凡飲食頭上汗多氣如煙霧必頻抹乃止寸關浮洪兩尺沉實胃脈倍盛而數此胃熱蒸籠頭也飲食入胃遇熱上蒸心肺心主汗液火性上騰肺主皮毛腠理不密故頭汗出若蒸籠之氣因煎迫而如煙霧也以三黃石膏湯數劑清胃熱愈文田按此脈真合用白虎湯矣魏玉橫曰詹渭豐母年六旬外素有肝病因患瘧自五月至九月瘧愈而他症蜂起自汗如洗徹夜不眠食少便溏脅痛齒痛口淡噁心惡風畏寒頭頂皮帽身襲皮衣重幃夾幔猶懍栗不勝診時以止汗為囑脈之弦小急知為陰虛火盛瘧邪未清誤作陽虛多與補氣斂汗之劑而然叩之果服歸脾五味子麻黃節浮麥龍骨甚夥乃與生地杞子地骨叉斛首烏鱉甲黃連蔞仁渭豐曰諸醫咸謂頭為諸陽之首惡寒若此又自汗而喜熱飲明屬陽虛今方中惟與養陰又口淡便溏噁心皆屬脾胃虛寒黃連蔞仁安可用至瘧疾已愈何必用首烏鱉甲再所重在汗多而又全不治汗其故何也曰此症乃火鬱之極內真熱而外假寒也瘧本膽腑之邪因肝虛而腑傳臟故寒熱止而變為諸症故以生地杞子地骨叉斛養肝治其本黃連清伏暑蔞仁散鬱熱以治標首烏鱉甲入肝而去瘧邪蓋肝火熾盛逆胃胃絡上蒸則為汗下迫為瀉若見汗則收斂見瀉則固澀一藥肆人足矣醫云乎哉如方服之數劑而愈濟生歸脾湯人參龍眼黃耆甘草白朮茯苓木香當歸棗仁遠志何某年七旬矣偶於冬間苦盜汗乃水衰肝火內熾當閉藏之候反蒸鬱而為汗也或教以黃耆煮黑棗服之四五日汗果止而咳嗽作或以為傷風與前胡桔梗杏仁蘇子秦艽防風之類或以為痰火與二陳薑汁竹瀝或以為血虛與四物知母黃柏咸不效已半年診其脈則弦數而促其症則痰多食少天柱已傾雙足浮腫投以生地麥冬杞子地骨沙參女貞四劑無進退已召畫工傳真矣告曰某本籍越中今病已膏肓量不可起治任欲歸第乞疏一方俾可服多劑者以希萬一耳仍前方加熟地蔞仁與之後二年偶退之客坐彼前致謝甚殷余茫然叩其故曰某何姓昔患咳嗽幾斃蒙惠方渡江後服二十餘劑竟獲全愈此再造之德也視其容貌充腴迥非疇曩其病之痊殊意外矣書此以為輕信單方並見汗治汗之戒以此條與羅謙甫治王立甫壻之案參看可見閉藏之令過汗雖屬危症亦非斷無生機羅公於此有遺憾矣楊元植年四旬外早衰鬚髮盡白素患肝腎病客吳門病瘧瘧愈而汗出不止凡生脈飲六黃湯牡蠣龍骨五味黑豆一切斂汗之藥莫不嘗之矣吳醫技窮乃遄歸就豫診脈但虛數與熟地一兩杞子五錢棗仁五錢麥冬一錢蔞仁一錢胡黃連四分地骨皮三錢一服減二服瘥趙坤維令正病自首至胸汗出如淋動則尤甚頗能食然食入則滿面淋漓衣領盡透醫與玉屏風散當歸六黃湯俱不效延診右關寸數大問面浮及齒痛否曰然此少厥二陰之火上逆胃絡也與重劑玉女煎入杞子五錢川連少許二帖而瘳楊兆成病瘧瘧愈大汗如雨一日夜約鬥余醫盡力與固表收澀反較麻黃羌活為甚延診脈洪數有力日啖粥十餘甌猶覺飢蓋瘧時多服半夏豆蔻蒼朮厚朴藿香橘皮諸燥烈之劑擾動胃火而然若與六黃湯則汗止而瘧必更作乃用生地一兩石膏五錢黃連八分麥冬三錢蔞仁一錢半一服減二服瘥瘧亦不作張玉書年近六旬素患陰虛火甚兩手脈上入溢掌心夏月偶不快就混堂澡浴以圖汗解歸而寒熱大作頭痛兩耳後焮腫上連承靈下至天牖急邀余視余適他出別延外科謂當成耳枕癰勢甚危投以搜風敗毒之劑腦後肩胛筋絡益抽掣急絆燥渴躁悶小便淋瀝如火逮余至困憊不支矣脈之洪數異常知其中熱邪在陽明少陽以陰虛過汗火就升上又為風藥所鼓而然不可與柴胡乃君以黃芩石膏臣以鮮干兩地黃佐以滑石生甘草使以連翹木通大劑飲之次日腫痛減腫處尚赤色前方入緑豆一合腫痛全消再與導赤散合六一散而愈徐靈胎曰治病之法不外汗下二端下之害人其危立見故醫者病者皆不敢輕投至於汗多亡陽而死者十有二三雖死而人不覺也何則凡人患風寒之症必相戒以為寧暖無涼病者亦重加覆護醫者亦云服藥必須汗出而解故病人之求得汗人人以為當然也秋冬之時過暖尚無大害至於盛夏初秋天時暑燥衛氣開而易泄更加閉戶重襟復投發散之劑必至大汗不止而亡陽矣又外感之疾汗未出之時必煩悶惡熱及汗大出之後衛氣盡泄必陽衰而畏寒始之暖覆猶屬勉強至此時雖欲不覆而不能愈覆愈汗愈汗愈寒直至汗出如油手足厥冷而病不可為矣其死也神氣甚清亦無痛苦病者醫者及旁觀之人皆不解其何故而忽死惟有相顧噩然而已總之有病之人不可過涼亦不宜太暖無事不可令汗出惟服藥之時宜令小汗仲景服桂枝湯法云服湯已溫覆令微汗不可如水淋漓此其法也至於亡陽未劇猶可挽回傷寒論中真武理中四逆等法可考若以脫盡無補救矣又盛暑之時病者或居樓上或臥近灶之所無病之人一立其處汗出如雨患病者必至時時出汗即不亡陽亦必陰竭而死雖無移徙之所必擇一席稍涼之地而處之否則補丹不救也裴兆期曰一士人大病久虛後已大受餐且日服大補氣血之藥兼旬越月宜其起矣不謂飲食頓減遍體畏寒自汗盜汗晝夜不止已延二三名家進以桂附參耆汗愈多而寒益甚參耆加至兩許亦不驗余以羌活防風為君蒼朮半夏為臣黃連陳皮砂仁厚朴茯苓桂枝浮麥為使一劑而汗收並不畏寒矣隨制人參大補脾丸與之調理不逾月而康蓋大病久虛之後胃雖強而脾尚弱易於加餐難於運化且湯藥之補無虛日濕熱鬱於中宮故飲食頓減而多汗多寒也人身捍衛之氣出於胃胃既為痰涎所閉則捍衛之氣不能布皮毛充腠理先哲謂中脘有痰令人多寒脾濕不流令人多汗此之謂也其多汗而反用羌防者以其腠理開疏風氣乘虛來客必先去其風而汗始易收也其畏寒而反用黃連者以寒非虛寒乃濕熱生痰所致之寒濕清而汗自止也凡人當大病之後切不可恣投以藥無論藥謬即對病者亦不可不慎蓋人之元氣以胃氣為本胃氣又以穀氣為本大病之人與穀氣久疏則所喜者食物所惡者藥物理之常也此際正當以食投其所好以養胃氣胃氣旺則元氣亦旺不補之中有至補者在安用此拂意之物妨礙胃氣耶今之醫者不明此理每遇病久乍痊必謂氣血兩虛尚須大補其藥不外當歸地黃枸杞故紙山藥蓯蓉參耆苓術等類不煎則丸恣投無忌有服之而飲食反減者有服之而作瀉作嘔與腫滿者甚至有膈脹不能食而反生他症者名為補人而實害人矣可不戒哉裴兆期治一孝廉為諸生時以遷居縈擾復不免有少年事於秋盡冬初日晡發熱亦恬不為意裴診之則六脈已虛疾無倫為之駭然以人參五錢桂附歸術各二錢囑曰急急煎服庶可無虞猶泄泄未之遽信不移時輒汗流如洗手足冷而目眩神疲就枕不能布語始急以前藥連服五六劑人參加至一兩餘勢乃稍定脈尚几几欲絶越日往視脈狀如前汗復以時至裴即宿於其家用人參一兩附子半枚另用黃耆二兩煎湯煮藥凡四進汗猶不止時漏已三下無處市藥不得已以前渣合煎以濟權時之急至子後陽生胃氣方回啖糜粥二甌肉食數箸汗始漸止脈亦自此有敘天明急市參以繼之調理而愈藜按此自汗之極重者不惟陽虛陰亦大傷純用參耆桂附已不免偏勝之弊參入當歸尤不合法得藥渣甘淡之力胃氣始回復得粥食助其胃氣而汗始斂非得力於參耆桂附也徐靈胎曰經云奪血者無汗奪汗者無血血屬陰是汗多乃亡陰也故治汗之法必用涼心斂肺之藥何也心主血汗為心之液故當清心火汗必從皮毛出肺主皮毛故又當斂肺氣此正治也惟汗出太甚則陰氣上竭而腎中龍雷之火隨水而上若以寒涼折之其火愈熾惟用大劑參附佐以咸降之品如童便牡蠣之類冷飲一碗直達下焦引其真陽下降則龍雷之火反乎其位而汗隨止此與亡陰之汗真大相懸絶故亡陰亡陽其治法截然而轉機在頃刻當陽氣之未動也以陰藥止汗及陽氣之既動也以陽藥止汗而龍骨牡蠣黃耆五味收澀之藥則兩方皆可隨宜用之醫者能於亡陰亡陽之交分其界限則用藥無誤矣其亡陰亡陽之辨法何也亡陰之汗身畏熱手足溫肌熱汗亦熱而味鹹口渴喜涼飲氣粗脈洪實此其驗也亡陽之汗身反惡寒手足冷肌涼汗冷而味淡微黏口不渴而喜熱飲氣微脈浮數而空此其驗也至於尋常之正汗熱汗邪汗自汗又不在二者之列此理知者絶少即此汗之一端而聚訟紛紛毫無定見誤治甚多也又曰汗出總由於心火不寧屬熱者多屬寒者少今人皆用補陽治法乃一偏之見皆由不知汗出之液在何經也誤人多矣亡陽之汗乃陽氣飛越下焦空虛此乃危急之症非參附不能回陽與自汗盜汗大不相同醫者全然不知併為一病貽誤無窮深為可笑尤在涇曰一人食鹹頭汗如注食淡則否診之心脈獨大而持指因問曰燥欲飲乎曰然每晨起舌必有刺因悟所以頭汗出者心火太盛而水不勝之也味鹹屬水而能降火火與水持火盛水微不能勝之而反外越也其出於頭者水本潤下而火性上炎水為火激反從其化也食淡則否者鹹味湧泄為陰淡味滲泄為陽陽與陽從不相激射故得遂其滲泄之性而下行也咳嗽徽宗寵妃苦痰嗽終夕不寐面浮如盤詔內醫李防禦用藥令供狀三日不效當誅李憂撓技窮與妻對泣忽聞外間叫云咳嗽藥一文一帖吃了今夜睡得李使人市藥十帖其色淺碧用淡虀水滴麻油數點調服李疑草藥性獷或使臟腑滑泄並三為一自試之既而無他於是取三帖合為一攜入禁庭授妃請分兩服是夕嗽止比曉面腫亦消上喜賜金帛值萬緡李念病即安倘索方無以為對令僕俟前賣藥人過邀飲以百金賂其方乃蚌粉一物新瓦炒令通紅拌青黛少許耳叩其從來曰壯而從軍老而停汰頃見主帥有此方故剽得之以其易辨姑藉以度餘生無他長也李給之終身槎庵小乘文田按咳嗽症辛升太過腎氣逆上故蚌粉以養其腎陰所以能愈潘塤曰豫夏秋之交火嗽月餘晝夜不輟聲不能伏枕幾殆群醫皆主故常曰西方金司令肺氣盛耳當瀉或曰久嗽肺虛當補或曰斂之愈豫曰金初司令稚金也火尚未伏壯火也壯火能爍稚金瀉之金愈弱火愈熾此嗽所以不能止也經曰無違時無伐化又曰無伐生生之氣今氣初生而伐瀉之伐化也殆於不可況五火相煽肺失清化之令補之恐反助火斂之恐不能散火請更思之醫不聽各主所見潰藥不敢嘗日飲解毒涼膈散去硝黃加白朮以助胃氣晨服童便不時服梨汁瓜漿各十數杯醫乃暗投人參五味煎以豫飲而豫不知也飲之則愈嗽加喘乃專主己見飲前藥數日火退嗽止而病瘳矣楮記室解毒涼膈散大黃芒硝甘草連翹黃芩薄荷梔子為末加竹葉生蜜漢陽庫兵王六病痰嗽並喘百藥不效於嶽陽遇一道人教用五味子白礬等分為末每服三錢以生豬肺炙熟蘸末細嚼白湯下兩服病遂不發久病乃可服此本草綱目張子和治東門高三郎病嗽一年半耳鳴三月矣嗽吐膿血面多黑點身表俱熱喉中不能發聲曰嗽之源心火之勝也秋傷於濕冬生咳嗽冬水既旺水濕相接隔絶於心火火不下降反而炎上肺金被爍發而為嗽金煅既久聲反不發醫補肺腎皆非也令先備西瓜冰雪等涼物次用湧泄之法又服去濕之藥病日已矣劉氏一男子年二十餘病勞嗽咯血吐唾黏臭不可聞秋冬少緩春夏則甚寒熱往來日晡發作狀如痎瘧寢汗如水纍服麻黃根敗蒲扇止汗汗自若也又服寧神散寧肺散止嗽嗽自若也張先以獨聖散吐其痰狀如雞黃汗隨湧出昏憒三日不省時時飲以涼水精神稍開飲食加進又與人參半夏丸桂苓甘露散服之不數日乃愈趙君玉妻病嗽時已十月矣張處方用陳皮歸身甘草白朮枳殼桔梗趙以其不類嗽藥張笑曰君怪無烏梅鶯粟囊乎夫冬嗽乃秋之濕也濕上逆而為嗽此方皆散氣除濕解結和經三服而愈竇材治一人病咳嗽盜汗發熱困倦減食四肢逆冷六脈弦緊乃腎氣虛也先灸關元五百壯豫保命延壽丹二十丸鍾乳粉二錢間日服金液丹百丸一月全安一人病咳嗽脈症與上條同但病人怕灸止服延壽丹五十粒金液丹百粒鍾乳粉二兩五日減可十日脈沉緩乃真氣復也仍服前藥一月全安蓋此病早不灸亦可遲必加灸否則難治凌漢章治里人病嗽絶食五日衆投以補劑益盛凌曰此寒濕積也穴在頂針之必暈絶逾時始蘇命四人分牽其發使勿傾側乃針果暈絶家人皆哭凌言笑自若頃之氣漸蘇復加補始出針嘔積痰鬥許病即除明史一中年婦人乾咳寸脈滑動似豆狀余皆散大不浮左大於右每五更心躁熱有汗但怒氣則甚與桔梗貝母諸藥不效遂以石膏香附為君芩連青黛門冬栝蔞仁陳皮炒柏歸梗為臣五味砂仁川芎紫菀為佐凡二十餘帖而安醫學綱目崔某療久嗽熏法每旦取款冬花如雞子大少許蜜拌花使潤約一升鐵器鐺中又用一瓦碗鑽一孔內安小竹筒或筆管亦得其筒少長置碗鐺相合及插筒處皆麵糊塗之勿令泄氣鐺下著炭火少時款冬煙自管出以口含筒吸取咽之如胸中稍悶須舉頭即將指頭捻竹筒頭勿令漏煙出氣及煙盡止凡如是五日一為之至六日則飽食羊肉餛飩一頓永瘥一法不用鐺碗用有嘴瓦瓶燒藥蓋住瓶口卻以口於瓶嘴吸煙咽之尤捷也侍御談希曾咳嗽吐痰手足時冷以為脾肺虛寒用補中益氣加炮薑而愈竇材以肢冷為腎氣虛一婦人患咳嗽脅痛發熱日晡益甚用加味逍遙散熟地治之而愈年餘因怒氣勞役前症仍作又太陽痛或寒熱往來或咳嗽遺尿此肺氣虛肝火盛而尿脬失制也用前散及地黃丸月餘而瘥表弟婦咳嗽發熱嘔吐痰涎日夜約五六碗喘咳不寧胸痞燥渴飲食不進崩血如湧此命門火衰脾土虛寒用八味丸及附子理中湯加減治之而愈一婦人久咳嗽面色萎黃或時㿠白肢體倦怠飲食少思稍多則瀉此脾土虛而不能生肺金朝用補中益氣湯夕用六君子湯為主間佐以八珍湯三月餘漸愈後感寒邪喘嗽胸腹作脹飲食不入四肢逆冷此中氣尚虛不能充皮毛實腠理司開闔之所致也遂用六君加生薑及桔梗而愈一婦人患勞嗽晡熱內熱寒熱往來作渴盜汗小便頻數其經兩三月一行此肝脾氣血虛損用八珍湯六味丸六十餘劑諸症漸愈其經兩月一行仍用前二藥間以加味逍遙散各三十餘劑後恚怒適經行去血過多諸症悉至飲食少思腹脹氣促用十全大補湯數劑漸愈仍用前藥調補復因喪子胸腹不利食少內熱盜汗便血無寐用加味歸脾湯仍兼前藥而愈錦衣李大用素不慎起居吐痰自汗咳嗽發熱服二陳芩連枳殼山梔之類前症不減飲食少思用四物二陳芩連元參知柏之類前症愈甚更加胸腹不利飲食亦少內熱晡熱加桑皮紫蘇杏仁紫菀桔梗之類胸腹膨脹小便短少用豬苓澤瀉白朮茯苓枳殼青皮半夏黃連蘇子胸膈痞滿脅肋膨脹小便不通加茵陳葶藶喘促不臥飲食不進診之六脈洪數肺腎二部尤甚曰脾土既不能生肺金而心火又乘之此肺癰之候也當滋化源緩則不救不信後唾膿痰復求治胸膈痞滿脾土敗也喘促不臥肺金敗也小便不通腎水敗也脅肋膨脹肝木敗也飲食不化心火敗也此化源既絶五臟已敗藥豈能生已而果然絲客姚荃者素鬱怒年近六十脾胃不健服香燥行氣飲食少思兩脅脹悶服行氣破血飲食不入右脅脹痛喜用手按彼疑為膈氣痰飲內傷曰肝木克脾土而脾土不能生肺金也若內有瘀血雖單衣亦不敢著肉用滋化源之藥四劑諸症頓退彼以為愈曰火令在邇當保脾土以補肺金彼不信後復作另用痰火之劑益甚求治左關右寸滑數此肺內潰矣仍不信服前藥果吐穢膿而歿嘉興周上舍每至夏患咳嗽服降火化痰之劑咳嗽益甚脾肺腎脈皆浮而洪按之微細此脾土虛不能生肺金肺金不能生腎水而虛火上炎也朝用補中益氣湯夕用六味地黃丸而痊後至夏遂不再發一婦人不得於姑患咳嗽胸膈不利飲食無味此脾肺俱傷痰鬱於中先用歸脾湯加山梔川芎貝母桔梗諸症漸愈後以六君加川芎桔梗間服全愈一婦人咳嗽脅痛或用清氣化痰降火等劑久不愈更加內熱晡熱若兩脅或小腹內熱其嗽益甚小便自遺此屬肝經血虛火動用六味丸加五味子滋腎水以生肝血用補中益氣生脾土以滋肺金而尋愈上舍陳道復長子虧損腎經久患咳嗽午後益甚薛曰當補脾土滋化源使金水自能相生時孟春不信乃服黃柏知母之類至夏吐痰引飲小便頻數面目如緋薛以白朮當歸茯苓陳皮麥冬五味丹皮澤瀉四劑乃以參耆熟地山茱為丸俾服之諸症頓退復請視以為信遂以前藥如常與之仍泥不服卒致不起陸養愚治吳氏妾寡居夜熱以煩勞感冒乾咳無痰醫與疏風藥反增嘔惡更以二陳症不減而夜不能寐若失神志煩亂不安脈之沉弦而數曰乾咳乃火鬱之甚最為難治況寡居多年其鬱可知雖有風寒但於養氣養血舒郁清熱中微加疏散若竟發其表升動陰火則病反甚重以二陳之燥宜其煩亂不寐神志如失也用清氣養榮湯加黃芩前胡薄荷杏仁蘇葉二劑咳嗽煩悶俱減第睡未安脈微浮而數去蘇葉前胡杏仁加貝母知母山梔棗仁竹茹大棗二劑諸症俱愈但四肢倦怠氣乏不足以息脈浮數而弱此虛火已平真氣衰乏之候仍用前湯加貝母棗仁更入人參一錢五分數劑而愈陳曙倉室咳嗽或時純血或時純痰或時痰血相半夜熱頭眩胸膈不舒腳膝無力服滋陰降火藥已半年矣飲食漸少精神漸羸脈之兩寸關沉數而有力兩尺澀弱而微浮此上盛下虛之症也上盛者心肺間有留飲瘀血下虛者肝腎之氣不足用人參固本丸令空腹服之日中用貝母蘇子山楂丹皮桃仁紅花小薊以茅根煎汁入藥同煎十劑痰清血止後以清氣養榮湯與固本丸間服三月後病痊而孕陸肖愚治吳遜齋患咳嗽身熱脅痛日輕夜重寢食俱廢咸以年高病重為慮脈之左手浮弦右手弦滑曰此病極輕何以憂疑乃內有食積痰飲外感風邪所致也少為消導疏散即愈矣用蘇葉柴胡以解其表青皮白芥以治其脅桑皮前胡杏仁以治其嗽陳皮半夏以清其痰山楂枳實以消其食二劑而減四劑脫然陸祖愚治費表母生平飲酒多而穀食少釀成痰火每至五更則疾作喘嗽頻並氣逆息粗不能伏枕由來久矣年近七旬其痰大發日夜昏暈數次四肢厥冷自汗如洗形容瘦削六脈如絲或與清火清痰毫不應乃用附子理中料千杵蜜丸淡鹽湯服以助下元另以知母貝母桑皮輩煎湯徐徐含咽清其上膈數劑嗽稀喘止肢溫汗斂再用十全大補湯料丸服數十年痼疾從此遂瘳陳三農之室遇夜嗽甚多痰作陰虛火動以四物換生地貝母知母蔞仁杏仁麥冬五味二劑而愈孫文垣侄婦喉中焮癢咳嗽紅痰兩寸關洪大內熱生瘡山梔小薊生地丹皮滑石青皮麥冬甘草黃連蔞仁水煎服血止嗽除後遇勞即咳嗽嗽喉中血腥總由上焦熱甚而然以枇杷葉山梔生地白芍甘草丹皮地骨皮天花粉滑石紫菀常服三五劑兩月而安溫天衢冬月病目醫與發散太過至春間吐血碗余及夏下午潮熱咳嗽胸膈脹疼早晨冷汗淋漓大便溏一日兩行飲食少肌肉消十之七脈數孫曰據症脈法在不治衆懇不能辭乃用瀉白散加五味白芍貝母馬兜鈴服下其夜帖然而臥不嗽惟大便溏前藥加扁豆山藥茯苓汗亦漸止復與瀉白散加石斛馬兜鈴貝母陳皮苡仁白芍山藥五味桔梗調理三月而痊琇按此與孫治吳肖峰內人注夏誤服參蘇飲成咳嗽同為發散所傷世俗謂傷風不醒變成勞者是也過表之害洵然然亦有風寒痼閉不出而成勞者魏君猶知其一未知其二也不知此等皆為市醫不分虛實恣用疏散散病變之重而重者至死猶曰傷風不醒哀哉吳案見痿門李士材治一人咳而上氣凡清火潤肺化痰理氣之劑幾無遺用而病不少衰診其腎脈大而軟此氣虛火不歸元用人參三錢煎湯送八味丸五錢一服而減後用補中益氣湯加桂一錢附子八分凡五十劑及八味丸二斤而痊一人經年咳嗽更醫數十人藥不絶口而病反增劇自謂必成勞嗽李曰不然脈不數不虛惟右寸浮大而滑是風未解必多服酸收故久而彌甚用麻黃杏仁半夏前胡桔梗甘草橘紅蘇子五劑減十劑已馮楚瞻治李孝廉患咳嗽甚頻視其身長肥白頰色常紅知為表有餘而里不足上假熱而下真寒病必當劇勸以重服藥餌時有通譜新貴甚精醫藥乃托其治所用乃山梔黃芩花粉橘紅貝母蘇子杏仁之類止之勿聽數劑後嗽轉甚煩躁喜冷倍常益信寒涼為對症倍用之轉劇再進煩躁更甚粒不下咽飲水無度更以為實熱以三黃丸下之利行不多漸加喘促再劑夜半喘大作有出無入遍身麻木潰汗如雨神昏目直口噤不言委頓極矣亟招馮診兩寸左關僅存時當六月欲與四逆理中主人畏懼改以人參一兩麥冬二錢五味六分肉桂錢許始允急煎服之喘減片刻奈病大藥小頃復大作乃不咎寒涼之誤反以參桂為罪矣因思盡吾之力尚可以活若徇彼之見必死而已乃堅定一方勒令服之用炒白朮三兩人參二兩炮薑三錢五味子一錢五分製附子三錢煎濃汁灌之下咽後病人張口大聲云心中如火烙欲死此不與冷服故傍觀疑怨交起不為動頃之又大聲曰臍間更疼更熱欲死矣乃竊喜其陽能下達未之絶也果少焉喘定汗收手足溫而神思清語言反甚無力此方術多參少者因中宮久困寒冷不先為理中則陽氣難下達也呂東莊治徐鸞和內病咳嗽醫以傷風治之益甚邀診則中虛脈也曰鼻塞垂涕痰急皆傷風實症何得云虛曰此虛實真假所辨在脈庸醫昧此誤人多矣彼不知脈請即以症辨之其人必晡熱潮熱至夜半漸清至晨稍安然乎曰然然則中虛何疑乎所言喜者正此鼻塞垂涕耳乃投以人參白朮當歸黃耆白芍各三錢軟柴胡升麻各一錢陳皮甘草五味各六分三劑而咳嗽立止再診謂之曰上症已去惟帶下殊甚近崩中耳驚應曰然即前方重用人參加補骨脂阿膠各二錢數劑兼服六味丸而愈柴嶼青治陳氏甥女咳嗽吐痰夜間發熱衆醫以為必成勞症診其脈雖稍洪尚有根柢並非細數何至不治純用滋陰之藥調養半年而愈同學蔡為章患痰嗽夜難就寢身不勝衣夜臥床不能轉側診其六脈微弱氣血兩劇擬用參耆補劑蔡以痰嗽不宜用補為疑乃力任之先用六君子湯加炮薑桂附數帖而嗽減繼用養榮湯十數劑始能下床行動調理月餘而康張惕中咳嗽吐痰醫誤認風寒服藥十數劑病增劇身熱喘嗽夜不能臥胸膈痞塞困於床第小便短縮診得人迎脈緩絶非外感氣口空大左寸弱甚兩沉微微此心腎不足的系內傷之症其小便不利者三焦之氣化不能運於州都也從東垣治內傷條師其意而變通之旬日而痊左中丞夫人年二十餘形體瘦弱痰嗽息粗夜不能寐醫頻與消痰理氣愈委頓診其脈甚微細此氣虛也仲景云氣虛有痰腎氣丸補而逐之遂用六味湯加麥冬五味治之而愈惟夜間尚未熟睡再用養榮湯加茯神棗仁十數劑即加餐安睡漸得復元丙寅新正冏卿諱伊喇齊長郎賀節至寓云咳嗽求方診其兩脈細數右寸鬱結斷其難以收功勉用麻黃湯伊斷斷不可曰我子陰虧他醫熟地人參服過數兩柴曰陰虧誠然但風邪閉塞肺氣補劑又從而壅遏之非此不能去邪力爭不信早決其不起果然琇按凡損症脈見右寸厥厥然如豆按之梗指其病原屬不起以肺金敗也今以右寸鬱結斷為風邪閉塞然必見鼻塞聲重或頭痛痰濃或咳嗽連續方是其候王肯堂治一婦人咳嗽不已服諸藥不效漸成勞瘵診之六脈濡弱此血弱又因憂戚太過而成斯疾合用當歸等藥治之必愈遂先以古今録驗橘皮湯空心服蘇子降氣湯徐用金叉煎熟地黃丸當歸丸調理而安橘皮湯文田按今見千金方五十四卷橘皮麻黃各三兩柴胡乾紫蘇各三兩宿薑杏仁各四兩石膏八兩上七味㕮咀水九升煎麻黃兩沸去沫下諸藥煮取三升分三服張路玉治吳江郭邑侯喘嗽氣逆診之兩尺左關弦數兩寸右關澀數弦者腎之虛澀者肺之燥夏暑內伏肺絡遇秋月燥收之令發為咳嗽也自言每歲交秋則咳連發四載屢咳痰不得出則喘至夜不能臥咳劇則大便枯燥有血曾服越婢湯嗽即稍可張曰公腎氣素強固水虧火旺陰火上爍肺金金燥不能生水咳甚則便燥有血者肺移熱於大腸也賴有此耳合用千金麥門冬方除去半夏生薑之辛燥易以葳蕤白蜜之甘潤藉麻黃以鼓舞麥冬生地之力與越婢湯中麻黃石膏分解互結之燥熱同一義也郭曰諸醫咸詆麻黃為發汗重劑不可輕試僅用杏仁蘇子甘梗前胡等藥服之其咳轉甚何也曰麻黃雖云主表今在麥門冬湯中不過藉以開發肺氣原非發汗之謂麻黃在大青龍湯麻黃湯麻杏甘石湯方其力便峻以其中皆有杏仁也杏仁雖舉世視為治嗽通藥虛實混用然辛溫走肺最不純良耗氣動血莫此為甚熬黑入大陷胸丸佐甘遂等搜逐結垢性味可知遂用前方連進二劑是夜便得安睡脈弦雖未退按之稍軟氣口則虛濡乏力與六味生脈加葳蕤白蜜作湯四服嗽頓減即以此方制丸恆服至秋無復嗽之虞先是公子柔痓用桂枝湯及六味作湯加蠍尾服之而瘥其後夫人素有敗痰生道左右兩脅俱有結塊大如覆盆發則咳嗽喘逆腹脅掣痛六脈止促按之少力用六君加膽星枳實香附沉香二劑大吐稠痰結垢一二升嘔止嗽寧不必更進他藥矣何督學媳素常咳嗽不已痰中間有血點恆服童真丸不徹以父歿哀痛迫切咳逆倍常痰中雜見鮮血因與瑞金丹四服仍以童真丸烏骨雞丸調補而安勞太夫人年五十餘素稟氣虛多痰數日來患風熱咳逆咳甚則兀兀欲吐且宿有崩淋近幸向安法當先治其咳以桔梗湯加葳蕤白薇丹皮橘紅蜜煎生薑四劑撤其標症次與六君子加葳蕤以安胃氣繼進烏骨雞丸方療其痼疾以久不茹葷不忍傷殘物命改用大溫經湯加麋茸角腮作丸藥雖異而功則一也陳三農治一婦咳嗽痰喘飽脹水火不通眠食俱廢以人參白芍為君蘇子炒研細為佐枇杷葉三大片白茯苓佐之二服得眠大小便通東坡蓋公堂記云始吾居鄉有病寒而咳者問諸醫醫以為蠱不治且殺人取其百金而治之飲以蠱藥攻伐其腎腸燒灼其體膚禁切其飲食之美者期月而百病作內熱惡寒而咳不已纍然真蠱者也又求於醫醫以為熱投之以寒藥旦夕吐之暮夜下之於是始不能食懼而反之則鍾乳烏喙雜然並進而漂疽癰疥眩瞀之狀無所不至三易醫而病愈甚里老父教之曰是醫之罪藥之過也子何疾之有人之生也以氣為主食為輔今子終日藥不釋口臭味亂於外而百毒戰於內勞其主隔其輔是以病也子退而休之謝醫卻藥而進所嗜氣全而食美矣可以一飲而效從之期月而病良已容齋五筆後文節薛立齋治甥範允迪咳嗽痰盛胸腹不利飲食少思肢體倦怠脈浮大按之微弱服二陳枳殼等藥愈甚脾肺腎虛也用補中益氣湯六味丸而愈萬密齋治監生胡篤庵咳久不止汗之不可下之不可因表裡之邪俱甚也為制方用蘇葉薄荷葉桑白皮杏仁霜栝蔞霜桔梗甘草等分為末虛者阿膠蜜丸白湯下或口中噙化五日而安後以治人多效立齋治一癧婦咳而無痰日晡發熱脈浮數先以甘桔湯少愈後以地骨皮散而熱退更以腎氣丸及八珍湯加柴胡地骨皮丹皮而愈丹溪云咳而無痰者此係火鬱之症及痰鬱火邪在中用苦梗開之下用補陰降火之劑不已則成勞嗽此症不得志者多有之又原病式曰人瘦者腠理疏通而多汗血液衰少而為燥故為勞嗽之痰也文田按薛方誠未盡善然癧症少陽盛而少陰虛立齋之偶驗亦幸中耳豫亦嘗見癧症須用附子而後愈者至少陽之用柴胡則中庸定理王氏治病從溫病入故頗畏朮附而酷惡柴胡所謂過猶不及矣瘰癧為勞怯之根加以乾咳潮熱則勞症成矣此數方者烏足以愈之大約薛氏因丹溪有此論故附會言之否則其病少衰便以為愈耳不足信也一男子咳嗽氣急胸膈脹滿睡臥不安以葶藶散二服少愈更以桔梗湯而瘥一男子咳嗽項強氣促脈浮而緊以參蘇飲二劑少愈更以桔梗湯四劑而痊馬元儀治楊咸時咳嗽多痰氣逆作喘自汗不食已兩月脈之虛微無神此勞倦致傷脾肺也經云勞則氣耗氣與陰火勢不兩立氣衰則火自勝土虛既不能生金陰火又從而克之故喘咳而汗作矣若行疏泄以定喘止嗽是耗散其氣也用人參三錢黃耆五錢炙草五分貝母一錢杏仁蘇子各二錢紫菀桔梗防風以佐之兼進七味丸以培土母歸脾大造膏以實脾肺而愈來天培治一婦年二旬余季夏酷熱患咳嗽頭痛發熱胸膈不舒或以蘇杏前貝生地黃芩治之轉甚視其面色浮腫懶言氣怯咳嗽聲微胸膈脹滿飲食不下六脈微弱此風寒內伏裡虛致感也始宜以參蘇飲倍薑棗一二劑可已今增虛矣非薑附不能瘳也以補中益氣湯去升麻柴胡加川芎炮薑附子一劑汗出遍身腫脹漸消再劑熱退改用八珍加薑附二劑而咳嗽除終以歸脾加熟地炮薑四劑聲高食進矣彼云舊有風症兩手不能舉今服藥乃能舉於頭矣此治病必求其本之謂歟沈明生治金斐文夏患咳嗽清痰續續不已時風熱嗽甚多金謂所投之劑非疏風化痰即清金滌熱及診曰是非溫補不痊金駭愕問故曰君以外感盛行之際必無內因者耶初得之症必無屬虛者耶是則時有一定之方症有一定之藥人皆可以為醫矣夫嗽屬外因必肺氣脹滿咳嗽相屬或兼頭疼鼻塞涕唾稠濃聲壯氣壅脈浮數有力或人迎脈大此為外因今脈不浮而沉非風也不數而緩非熱也按之不鼓非有餘也嗽雖頻而氣短不續痰雖多而清薄不濃若疏解則徒耗肺家之金清涼則轉瘠中州之土是欲去病而反重病也宜用補中益氣與六君子參合復方藉參苓術以補肺之母使痰無由生藉橘半升柴以升清降濁則嗽可不作一二劑嗽微減再服浹旬而愈吳橋治鄱陽王令領邑甫及期病咳嗽唾痰稠黏而臭且雜以血久之潮熱失聲食少肉消閉戶逾月將乞骸骨歸幸橋至診之橋獨任其無害令愕然且固問橋橋曰此肝氣凌脾治者謬以為陰虛火動劑涼則脾愈滯津液不通肝愈熾而無所制矣法當扶脾抑肝三劑如脫七劑而出視事太函集徐靈胎曰咳嗽由於風寒入肺肺為嬌臟一味誤投即能受害若用熟地麥冬萸肉五味等滋膩酸斂之品補住外邪必至咯血失音喉癬肛癰喘急寒熱近者半年遠者三年無有不死蓋其服此等藥之日即其絶命之日也間有見機而停藥者或能多延歲月我見以千計故今之吐血而成勞者大半皆因咳嗽而誤服補藥所致也或云五味子乃仲景治嗽必用之藥不知古方之用五味必合乾薑一散一收以治寒嗽之症非治風火之嗽也況加以熟地麥冬則受禍尤烈又嗽藥中多用桔梗桔梗升提甘桔湯中用之以載甘藥上行治少陰之喉痛與治嗽宜清降之法者非宜苟誤服之往往令人氣逆痰升不能著枕凡用藥當深知其性而屢試屢驗方可對病施治無容冒昧也張柳吟曰亦有咳嗽屬於陰虛肺燥者誤投溫散劫其津液必成勞損即此論之對面也醫者臨症可不詳審其病情哉徐靈胎曰今之醫者謂吐血為虛勞之病此大謬也夫吐血有數種大概咳者成勞不咳者不成勞間有吐血偶咳者當其吐血之時狼狽頗甚吐止即痊皆不成勞何也其吐血一止則周身無病飲食如故而精神生矣即使亡血之後或陰虛內熱或筋骨疼痛皆可服藥而痊若咳嗽則血止而病仍在日嗽夜嗽痰壅氣升多則三年少則一年而死矣蓋咳嗽不止則腎中之元氣震蕩不寧肺為腎之母母病則子亦病故也又肺為五臟之華蓋經云穀氣入胃以傳於肺五臟六腑皆以受氣其清者為榮濁者為衛是則臟腑皆取精於肺肺病則不能輸精於臟腑一年而臟腑皆枯三年而臟腑竭矣故咳嗽為真勞不治之疾也然亦有咳嗽而不死者其嗽亦有時稍緩其飲食起居不甚變又其人善於調攝延至三年之後起居如舊間或一發靜養即愈此乃百中難得一者也更有不咳之人血症屢發肝竭肺傷亦變咳嗽久而亦死此則不善調攝以輕變重也執此以決血症之死生百不失一矣久嗽不愈由於肺虛有火法當清肺潤肺忌用澀燥閉氣之藥設若誤用粟殼訶子俾火壅於肺不得下降若兼參朮半夏即死不旋踵矣世醫往往蹈此覆轍相尋卒無悟者聊為論著敢告方來廣筆記葉天士治陸某咳嗽乃秋暑燥氣上受先干於肺令人咳熱此為清邪中上當以辛涼清潤不可表汗以傷津液青竹葉連翹花粉杏仁象貝六一散又陸某濕必化熱熏蒸為嗽氣隧未清納穀不旺必薄味靜養壯盛不致延損飛滑石花粉象貝苡仁緑豆皮通草胡某年六十六脈右徑因疥瘡頻以熱湯沐浴衛疏易傷冷熱皮毛內應乎肺咳嗽氣塞痰多久則食不甘便燥結胃津日耗不司供肺況秋冬天降燥氣上加漸至老年痰火之象此清氣熱以潤燥理勢宜然倘畏虛日投滯補益就枯燥矣霜桑葉甜杏仁麥冬玉竹白沙參天花粉甘蔗漿甜梨汁熬膏徐靈胎曰老年而無外感之嗽麥冬玉竹亦可用一人年四十脈弦胸膈痹痛咳嗽頭脹此燥氣上侵肺氣不宣使然當用輕藥以清上焦枇杷葉桑葉川貝母杏仁冬瓜子一人年二十七脈細促久嗽寒熱身痛汗出由精傷及胃用黃耆建中湯去薑又一人年二十四脈弦右大久嗽背寒盜汗用小建中去薑加茯神徐靈胎曰咳嗽服薑必吐血並能令人失音去之為宜此亦人所不知也風嗽挾火者服桂枝必吐血百試百驗又曰葉氏用建中諸法治久嗽而中宮虛乃補母之義真古聖相傳之正法也若陰火虛勞之嗽與建中正相反也葉氏用此得手而誤施於虛勞亦辨之不審耳馮長年孝廉素患陰虛咳嗽而犯時氣遂用蔥白香豉湯加人中黃童便三日而安又一地師宿有血症亦感時氣即用前湯更加犀角丹皮服後大便下血而愈王公峻治一孕婦風熱咳嗽已經發散後胎上逼心上氣倚息咳則遺漏用紫蘇飲去川芎腹皮加葳蕤白薇一劑而胎寧張誕先治一少年陰虛而傷秋燥常時火炎乾咳五心煩熱妄夢失精小水時白時黃杪秋忽大咳嗽坐間遍地清痰周身凜凜畏寒肌表微微發熱咳甚則嘔嘔則鼻衄如注大便結燥小水如淋先用異功散去朮加山藥次與六味丸加麥冬五味半月而嗽方止歷推治驗凡陰虛而更感風寒未有不重在本病者大抵火炎乾咳悉是陰虛古人雖有腎肝同治之論然細格病情多屬腎水枯竭肝臟多火之證所以只宜壯水制陽而導火之法斷斷不可輕試也薛一瓢曰久咳移邪犯胃因咳而肺肅無權故氣升逆勿用瀉損肺氣之藥水梨去心帶皮搗爛絲棉濾清慢火煎膏收入瓷瓶內每日開水送下五錢古人造字兩火著力為勞故為君相二火而説溫補中州以靜痰之源補下焦以益水之源但病勢已深恐非一擊可破也熟地枸杞子元參牛膝茯苓紫石英橫則為坎豎則為水中間一點真陽水虧則露為龍火震下之陽與之同源升為雷火所以雷為木屬皆陰中之火也純陰之藥愈潑愈熾一切草木無能制之當用一元丹久服愈矣淡秋石五六斤紅棗漿為丸早服五六錢晚服二三錢以陽秋石點湯送下脈弦數尺獨大咳而喉痛失音在數載失血之後其陰虧火炎不言可喻矣惟有至靜之品引陽潛入陰中庶近內經之旨然須作靜攝工夫使陰密陽固得坎離相交之力為妙熟地用海石粉搗爛金石斛北沙參茯苓麥冬生白芍龜腹板山藥此病起於費心勞碌風寒不節遂致咳嗽吐痰久則內傷內傷者內中之臟氣傷也即古人所謂虛勞總不得愈必須絶去費心勞碌之事一毫凡念不起助之以藥或可延年麥冬阿膠桔梗炙草沙參苡仁茯苓此真陰虧證俗名百日勞也稍有伏暑所以寒熱愈甚惜乎治之不早爾熟地茜草青蒿元參滑石丹皮脈得數而且弦此陰虧證也並非外感今以虛火升而頭痛漸有金水兩傷之勢靜攝乃得藥餌其次也熟地女貞子麥冬龜板元參淡秋石棗漿為丸開水送下心陰虛則多汗肺陰虛則多嗽肝陰虛則火升腎陰虛則發熱脾陰虛則便溏非一真陰乎怯症之漸也但知頭痛醫頭之為良醫不知履霜堅冰至君子其為憂危之心也炒白芍小生地麥冬棗肉桂枝尖甘草青蒿梗雲苓此由金水不相承挹故咳久不愈切勿理肺肺為嬌臟愈理愈虛亦不可泛然滋陰北沙參玉竹云茯神川石斛甜杏仁生扁豆治咳嗽神方甜杏仁二兩去皮尖搗如泥分為三服每服加冰糖三錢開水沖連末服下早晚各一次三服愈煎服則不驗
