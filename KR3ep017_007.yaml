body:
  text: 卷七泄瀉崔萬安分務廣陵苦脾瀉家人禱於後土祠是夕萬安夢一婦人珠耳珠履衣五重皆編貝珠為之謂萬安曰此痰可治今以一方相與可取青木香肉豆蔻等分棗肉為丸米飲服下二十丸此藥太熱痰平即止如其言愈稽神録宋高宗嘗以瀉疾召王繼先繼先至則奏曰臣渴甚乞先宜賜瓜而後靜心診脈上急召大官賜瓜繼先即食之既上覺其食瓜甘美則問繼先朕可食此乎繼先曰臣死罪索瓜固將以起陛下食此也詔進瓜上食之甚適瀉亦隨止左右驚上亦疑問繼先曰此何方也繼先曰上所患中暑故瀉瓜亦能消暑耳四朝聞見録葉紹翁王涇亦頗宗繼先術亦有奇驗然用藥多孟浪高宗居北宮苦脾疾涇誤用瀉藥竟至大漸孝宗欲戮之市朝憲聖以為恐自此醫者不肯進藥止命天府杖其背黔海山涇先懷金箔以入既杖則以敷瘡若未嘗受杖後放還居天街獨揭於門曰四朝御醫王防禦有輕薄子以小楮貼其旁云本家兼施瀉藥王慚甚同上竇材治一人患暴注因憂思傷脾也服金液丹霹靂湯不效蓋傷之深耳命灸二百壯小便始長服草神丹而愈一女人因泄瀉發狂言六脈緊數乃胃中積熱也竇詢其丈夫因吃胡椒生薑太多以致泄瀉五日後發狂言令服黃芩知母湯而愈衍義治一人大腸寒清小便精出諸熱藥服及一斗二升未效後教服赤石脂乾薑各一兩胡椒半錢同為末醋糊為丸如梧子大空心及食前米飲下五七十丸終四劑遂愈醫學綱目張子和曰昔聞山東楊先生治府主洞泄不止楊初至對病人與衆人談日月星辰纏度及風雲雷雨之變自辰至未而病者聽之忘其圊楊嘗曰治洞泄不已之人先問其所愛之事好棋者與之棋好樂者與之笙笛勿輟脾主信又主思慮投其所好以移之則病自愈維陽府判趙顯之病虛贏泄瀉褐色乃洞泄寒中證也每聞大黃氣味即注泄張診之兩手脈沉而軟令灸分水穴一百餘壯次服桂苓甘露散胃風湯白朮丸等藥不數月而愈趙明之米穀不消腹作雷鳴自五月至六月不愈諸醫以為脾受大寒故泄與聖散子豆蔻丸雖止一二日藥力盡而復作諸醫不知藥之非反責病之不忌口張至而笑曰春傷於風夏必飧泄飧泄者米穀不化而直過下出也又曰米穀不化熱氣在下久風入中中者脾胃也風屬甲乙脾胃屬戊己甲乙能克戊己腸中有風故鳴經曰歲木太過風氣流行脾土受邪民病飧泄診其兩手脈皆浮數為病在表也可汗之直斷曰風隨汗出以火二盆暗置床下不令病人見火恐增其熱招之入室使服湧劑以麻黃投之既乃閉其戶從外鎖之汗出如洗待一時許開戶減火一半須臾汗止泄亦止喻嘉言治周信川用火之法殆祖於此見痢門麻知幾妻當七月間臟腑滑泄以降火之藥治之少愈後腹脹及乳痛狀如吹乳頭重壯熱面如渥丹寒熱往來嗌乾嘔逆胸脅痛不能轉側耳鳴食不可下又復泄瀉麻欲瀉其火則臟腑已滑數日矣欲以溫劑則上焦已熱實不得其法請張未至因檢劉河間方惟益元散正對此證能降火解表止渴利小便定利安神以青黛薄荷末調二升青黛薄荷用得妙所以能散少陽之邪也置之枕右使作數次服之夜半遍身冷汗出如洗先覺足冷如冰至此足大暖頭頓輕肌涼痛減嘔定利止及張至麻告之已解張曰益氣固宜此是少陽證也能使人寒熱偏劇他經縱有寒熱亦不至甚既熱而又利何不以黃連解毒湯服之乃令診脈張曰娘子病來心常欲痛哭為快否婦曰欲如此豫亦不知所謂張曰少陽相火凌爍肺金金受屈制無所投舍肺主悲故但欲痛哭而為快也子和之學如此是真能洞見癥結者豈後學所可輕議麻曰脈初洪數有力服益元散後已平又聞張之言便以當歸白芍和解毒湯味數服之大瘥一僧病泄瀉數年丁香豆蔻乾薑附子官桂烏梅等燥藥燔針燒臍焫脘無有缺者一日發昏不省張診兩手脈沉而有力脈訣云下利微小者生脈浮大者無瘥以瓜蒂散湧之出寒痰數升又以無憂散泄其虛中之積及燥糞盈斗次日以白朮調中湯五苓散益元散調理數日而起劉德源病洞泄逾年食不化肌瘦力乏行步傾敬面色黧黑凡治利之藥遍用無效張乃出示內經洞泄之說以曉之先以舟車丸無憂散下十餘行殊不困已頗善食後以檳榔丸磨化其滯待數日病已大減又下五行後數日更以苦劑越之病漸愈而足上患一癤此里邪去而之外病痊之候凡病皆如是也子治余氏媼膈證將愈亦指上生癤劉倉使大便少而頻日七八十次常於兩股間懸半枚瓠蘆如此十餘年張見而笑曰病既頻欲通而不得通也何不大下之此通因通用也此一服藥之力耳乃與藥大下之三十餘行頓止殷輔之父年六十餘暑月病泄瀉日五六十行喜飲而家人輩爭之張曰夫暑月年老津液衰少豈可禁水但勸之少飲先令以緑豆雞卵十餘枚同煮卵熟取出令豆軟下陳粳米作稀粥攪令寒食雞卵以下之一二頓病減大半蓋粳米雞卵皆能斷利然後制抑火流濕之藥與調理而愈一男子病泄十餘年豆蔻阿膠訶子龍骨烏梅枯礬皆用之矣中脘臍下三里歲歲灸之皮肉皺槁神昏足腫泄如泔水日夜無度張診其兩手脈沉微曰生也病人忽曰羊肝生可食乎曰羊肝止泄尤宜食病人悅食一小盞許以漿粥送之幾半升續又食羊肝生一盞許次日泄減七分如此月餘而安夫胃為水穀之海不可虛怯虛怯則百邪皆入矣或思葷蔬雖與病相反亦令少食圖引漿粥此權變之道也若專以淡粥責之則病人不悅而食減久則增損命世俗誤甚矣子和之持論如此豈放手攻瀉而不顧元氣者哉第其用補專重飲食調攝而不恃藥餌故萬全無弊而亦無可舉之功其書具在惟好學深思之士能通其意耳孫文垣治張懷赤每早晨腸鳴瀉一二次晚間瀉一次年四十二且未有子診之尺寸短弱右關滑大曰此蓋中焦有濕痰君相二火皆不足故有此證以六君子湯加破故紙桂心益智仁肉豆蔻煎服瀉遂減半前方加杜仲為丸服之愈次年生子何洗心每飲食稍冷饘粥或稀必作脹瀉理脾之劑歷試不瘳孫診之左三部皆濡弱右寸亦然關滑尺沉微此下元虛寒所致法當溫補以補骨脂杜仲菟絲各二錢山萸肉人參山藥各一錢茯苓澤瀉各八分肉果三分數劑愈吳鶴洲母年八十六素有痰火大便日三四行一夜兩起腸鳴臍腹膨脹脈三四至一止或七八至一止醫以苦寒入平胃散投之克伐太過因致腹疼且謂年高而脈歇至是為凶兆辭不治孫診之曰脈緩而止曰結數而止曰促此乃結脈非凶脈也由寒濕之痰凝滯所致法當溫補下元俾火得以生土所謂虛則補其母是也吳間壽算如何曰兩尺迢迢有神壽徵也以補骨脂白朮各三錢為君杜仲二錢為臣茯苓澤瀉陳皮甘草各一錢為佐肉豆蔻益智仁各五分為使四帖大便實惟腸鳴未止減肉果加炮姜五分而安壽至九十有八薛立齊治侍御沈東江之內停食腹痛作瀉以六君加木香炮姜而愈後復作傳為腎瀉用四神丸而安侍御徐南湖子室瀉屬腎經不信薛言專主滲泄後遂致不起一婦人年逾五十不食夜飯五更作瀉二十年矣後患痢午前用香連丸午後用二神丸各二服而痢止又以二神丸數服而食夜飯不月而形體如故吳江史玄年母素有血疾殆將二紀平居泄瀉飲食少思面黃中滿夏日尤甚治血之藥無慮數百劑未嘗少減薛以為脾腎虛損用補中益氣湯送二神丸復用十全大補湯煎送前丸食進便實病勢頓退若泥中滿忌參術痰痞忌熟地便泄忌當歸皆致誤事府博趙宜人患泄瀉諸藥無效診之曰此肝腎虛也服木香散而愈經曰泄痢前後不止腎虛也又曰諸厥洞泄皆屬於下下謂下焦肝腎之氣也門戶束要肝之氣也肝氣厥而上行故下焦不能禁固而泄痢腎為胃關門戶不要故倉廩不藏也薛立齊治沈大尹病瀉五更輒利此腎瀉也用五味子散數服而愈因起居不慎瀉復作年餘不瘥此命門火虛不能生土法當補其母火者土之母也遂用八味丸瀉即止食漸進東垣云脾胃之氣盛則能食而肥虛則不能食而瘦全賴命門火為生化之源滋養之根也故用八味丸屢效只用六味亦可龔子才治一人食下腹即響響即瀉至不敢食諸藥不效以生紅柿去核紙包水濕炭火燒熟食之不三四個即止許州黃太守患泄瀉二三年不愈每飲燒酒三鍾則止二三日以為常畏藥不治龔診之六脈弦數先服藥以解酒毒後服理氣健脾丸而愈宜黃連一兩生薑四兩以慢火炒令姜干去姜取宣連搗末每服二錢空心臘茶湯下甚者不過二服專治久患脾泄陳三農治一士喜食瓜果縱飲無度忽患大瀉先用分利不應再用燥濕反加沉困診其脈浮因思經曰春傷於風夏生飧泄非汗不解以麻黃三錢參術各二錢甘草升麻各一錢與之泄瀉頓止以四君子調治而愈一人脾胃素弱少有傷即泄瀉此肝氣乘脾且久瀉濕熱在腎故也用白朮八兩紅棗去核四兩二物間襯煮至焦色搗餅烘乾入松花七錢白豆蔻五錢新米糊為丸午前服愈一人腳膝常麻飲食多即泄瀉此脾虛濕熱下流用補中益氣湯加防己黃柏而愈一人食物入口頃從大便出其脈洪數此火性急速也用黃連滑石木通澤瀉人參徐徐服二帖愈楊起云余壯年患肚腹微微作痛痛則瀉瀉亦不多日夜數行而瘦怯尤甚用消食化氣藥俱不效一僧授方用蕎麥麵一味作飯連食三四次即愈簡便方本草綱目李時珍謂氣盛有濕熱者宜之虛寒人食則大脫無氣而落鬚眉也李時珍治魏刺史子久泄諸醫不效垂殆李用骨碎補為末入豬腰中煨熟與食頓愈蓋腎主大小便久泄屬腎虛不可專從脾胃也本草綱目一婦年七十餘病瀉五年百藥不效李以感應丸五十丸投之大便二日不行再以平胃散加椒紅茴香棗肉為丸與服遂瘳每因怒食舉發服之即止同上一婦人年六十餘病溏泄已五年肉食油物生冷犯之即作痛服調脾升提止澀諸藥則轉甚診之脈沉而滑此乃脾胃久傷冷積凝滯所致王太僕所謂大寒凝內久利溏泄綿歷多年者法當以熱藥下之則寒去利止遂用蠟匱巴豆丸五十粒與服二日大便反不行其瀉遂愈自是每用治泄痢積滯諸病皆不瀉而病愈者近百人蓋妙在配合得宜藥病相對耳苟用所不當用則犯輕用損陰之戒矣同上有人患內寒暴泄如注或令食煨粟二三十枚頓愈腎主大便粟能通腎於此可驗同上易思蘭治瑞昌王妃患泄瀉屢用脾胃門消耗諸藥四五年不能止一醫用補中益氣湯加人參三錢服一月不泄忽一日胸膈脹滿腹響如雷大瀉若傾昏不知人口氣手足俱冷渾身冷汗如雨用人參五錢煎湯灌蘇如是者三病者服久自覺口中寒逆醫者以為汗出過多元氣虛弱於前湯內加人參三錢棗仁大附子薄桂各一錢昏厥尤甚肌膚如冰夏暑亦不知熱二年計服過人參念五斤桂附各二斤棗仁七十斤至己巳冬飯食入口即時瀉出腹中即飢飢即食食即瀉日十數次邪火不殺穀火性迫速愈盛而愈迫也身不知寒目畏燈火熱明顯初診之六脈全無久按來疾去緩有力如石聞其聲尚雄壯此乃大鬱火證也以黃連四錢入平胃散與之蓋此病火勢甚烈不可偏用苦寒故以平胃之溫為脾胃之引飲下少頃熟睡二時不索食不泄瀉飲五日方知藥味甘苦既用通元二八丹與湯藥間服一月飲食調和其病遂愈吳孚先治腧用昭秋間水瀉腹痛異常右脈弦數洪實知腸胃濕熱挾積用枳殼山楂黃連青皮檳榔木香一劑而滯見病人慮藥克伐意欲用補曰有是病服是藥邪氣方張非亟攻不退邪退則正復攻即是補也前方再服三劑愈矣設不早攻必致病痰非一月不痊謝武功素患大便溏泄兼病咳嗽用涼藥則咳減而瀉增用熱藥則瀉減而咳劇用補脾則咳瀉俱盛診之右尺軟如爛綿兩寸實數摶指酌用附子肉果以溫下焦之寒麥冬川連以清心肺之火茯苓甘草一以降氣一以和中上實下虛上熱下寒最為棘手之症其用藥規矩森然足為後學程式甫四劑而證頓減不加人參者緣肺有鬱熱耳喻嘉言治胡太夫人病偶然肚腹不寧瀉下數行醫以痢疾藥治之其利轉多更引通因通用之法用九蒸大黃丸三錢下之遂擾動胃氣脹痛全不思食狀如噤口診之六脈皆沉而伏應指模糊曰此非痢病乃誤治之證也今但安其胃不必治利而利自止不必治脹痛而脹痛自除遂以四君子湯為主少加薑蔻暖胃之藥二劑利果不作但苦胃中脹痛不安必欲加入行氣之藥以冀脹痛止而速得進食固爭曰寧可緩於食不可急於藥蓋前因藥誤引動胃氣作楚若再加行氣則脹痛必無紀極即用橘皮和中亦須炒而又炒絶不惹動其氣凡五日未得大便亦聽之痛止脹消食進便利共七日全安渾不見藥之功其實為無功之功也陸養愚治許默庵素有腸風證常服寒涼之藥中年後腸風幸愈致傷脾胃因成泄瀉之證初時服胃苓湯一帖便愈久之不效近來四肢浮腫而厥肚腹膨脹而鳴面色萎黃而帶青身體苦冷而帶熱診之左脈沉緩而遲右脈沉弱而弦曰諸緩為濕應瀉而浮腫諸遲為寒應厥而苦冷右弦為木乘土位應腹脹而面青沉者陽氣不升也弱者陰精不實也脈色與證患相應用人參白朮黃耆炙甘草為君以補其虛炮薑附子為臣以溫其寒升麻防風為佐以升其陽茯苓澤瀉為使以勝其濕十劑而諸證減又合八味丸間服而愈疑從薛案化出沈少西女年二十自小脾胃受傷不時作泄作嘔近則寒熱不時手足厥冷胸膈不舒脅脹噯氣左眠則氣不通暢左脅胃脘時疼時止渴而不欲飲小便短大便日二三行腹中雷鳴彈之如鼓揉之如水大約氣上塞則脹而痛氣下墜則泄而痛幸飲食不甚減常服胃苓白朮黃連及消導之藥或調氣補血之品不應謂此證非參術不能取效但今微有表邪先與小柴胡加桔梗二三帖寒熱稍和近時庸師專得此訣易以調中益氣湯去黃柏加青皮以伐肝神麯以助脾炮姜以溫中四帖脹痛俱減大便稍實但微有寒熱中宮不實不堅且聚且散無積可攻法當補益臟氣用人參黃耆白朮茯苓棗仁柴胡遠志炙草炮薑龍眼肉大益元氣以退虛熱數劑後夜來略脹更以六君子料加枳實黃連神麯木香砂仁為丸與煎劑間服月餘而安陸祖愚治潘古臣母患脾泄久多啖水果瀉更甚嘗因經行腹痛服攻瘀去血之劑致淋瀝不止肌肉枯槁身體發熱不能轉側不思飲食氣短口渴夜臥不安服養血健脾藥內有麥冬生地棗仁等物而瀉不止渴益甚脈之兩寸關虛數兩尺隱隱若無此下元不足中氣虛寒虛火上炎之證乃用人參炮薑白朮陳皮山楂木香薏仁木通山藥甘草蔻仁服之頗覺相宜又用肉果人參白朮炮薑棗肉為丸日服兩次一月瀉止兩月肌肉漸長月事亦調黃履素曰乙巳之夏余患中脘痛既而泄瀉偶遇姑蘇一名醫令診之驚曰脾胃久傷不治將滯下豫體素弱憚服攻克之藥因此醫有盛名一時惑之遂服枳朮黃連厚朴山楂木通等藥數劑又服枳朮丸一月以致脾胃大傷是秋遂溏泄不止漸覺飲食難化痞悶脹飽深自悔恨乃服參耆等藥及八味丸十餘年始得愈然中氣不能如故苦不耐飢稍飢則中氣大虛憊不可狀凡山楂消導之物入口即虛脾胃之不可妄攻如此方書極言枳朮丸之妙孰知白朮雖多不能勝枳實之迅利豫友胡孝轅刺史亦誤服枳朮丸而大病可見此丸斷非健脾之藥或飲食停滯偶一二服則可耳又曰脾胃喜暖而惡寒脾虛必宜溫暖之藥或飲食停滯偶一二服患嘔吐不止服聶逆源五氣丹數丸遂不復發豫近患脾不和不時溏泄服參術三日不效服胡與辰金鉛一丸脾氣頓佳得兩三月安妥家庵中一比邱尼患脾疾甚殆肛門不收穢水任出服金鉛一丸肛門頓斂漸調而愈其神效有如此者故知脾病之宜於溫暖也張路玉治陳總戎泄瀉腹脹作痛服黃芩白芍之類脹急愈更甚其脈洪盛而數按之則濡氣口大三倍於人迎此濕熱傷脾胃之氣也與厚朴生薑半夏人參湯二劑瀉痢止而飲食不思與半夏瀉心湯二劑而安柴嶼青治學士於鶴泉痢後久瀉醫以人參川連為末日服遂至飲食不思每欲小便大便先出求治其兩尺微細欲絶經曰腎主二便又曰腎司啓閉今腎氣不固是以大便不能自主況年逾六旬不必診脈已知其概而脈又如此更無疑義遂用補中益氣湯更加熟附子二錢煨肉果二錢送八味二劑彼頗思飲食大便止瀉勃有生機乃慕時醫某以為一劑立效二劑而歿惜哉馬次周令嗣於甲子場前身熱脾泄醫以外感治之屢藥不效診其人迎左尺平弱氣口微緩此屬肝腎脾胃不足用六君子湯加柴胡數劑身涼去柴胡再加歸芍調理而安是科獲雋張三錫治一人泄瀉口乾舌燥脈洪數與六一散一服知二服已又一人服不應用芩連四物散效一老嫗久瀉服補劑不應以參苓白朮散加黃連肉豆蔻少許作丸服未半斤永不發立齊治橫金陳子復面帶赤色吐痰口乾或時作瀉或用二陳黃連枳實之類不應脈之左關弦急右關弦大此乃腎水挾肝木之勢而勝脾土也不信後交夏果患痢而亡婁全善治翁仲政久泄每早必瀉一二行泄後便輕快脈濡而少弱先與厚朴和中丸五十丸大下之後以白朮為君枳殼茯苓半夏為臣厚朴炙甘草芩連川芎滑石為佐吳茱萸十餘粒為使生薑煎服十餘帖而愈作食積傷脾治羅謙甫曰丁巳豫從軍至開州夏月有千戶高國用謂豫曰父親七十有三於去歲七月間因內傷飲食又值霖雨瀉利暴下數行醫以藥止之不數日又傷又瀉止而復傷傷而復瀉至十月間肢體瘦弱四肢倦怠飲食減少腹痛腸鳴又易李醫治以養臟湯數日泄止復添嘔吐又易王醫用丁香人參藿香橘紅甘草同為細末生薑煎數服而嘔吐止延至今正月間飲食不進扶而後起又數日不見大便問何以治之醫曰老人年過七旬血氣俱衰弱又況瀉利半載脾胃久虛津液耗少以麻仁丸潤之可也或謂馮村牛山人見證不疑有果決遂請治之診其脈問其病曰此是風結也以搜風丸百餘丸服之利數行而死悔恨不已敢以為問豫曰人以水穀為本今高年老人久瀉胃中精液耗少又重瀉之神將何依靈樞經曰形氣不足病氣不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶減少者不復矣又曰上工平氣中工亂脈下工絶氣危生絶氣危生牛山人之謂歟琇按是證牛山人固無足論前李王二君惟知治嘔治瀉不知下多亡陰力進香燥至臟腑枯竭而上不納下不出其視牛亦魯衛之政也蓋當時此等證候即羅公生平亦未解用峻劑養榮矧其他哉豫有治宋復華兄母夫人一案可參閲繆仲淳治梁溪一女人茹素患內熱每食腸鳴清晨水泄教服脾腎雙補丸立愈人參一斤蓮肉一斤菟絲一斤半五味六兩半萸肉一斤山藥一斤車前十二兩橘紅六兩砂仁六兩巴戟天十二兩補骨脂一斤白芍十兩扁豆十二兩蜜丸緑豆大每五錢空心食時各一服如虛有火火盛肺熱者去人參巴戟添補骨脂一方有肉豆蔻無白芍扁豆廣筆記開慶己未年七月間裕齊馬觀文夫人費氏病氣弱怠四肢厥冷惡寒自汗不進飲食一醫作伏暑治之投暑藥一醫作虛寒治之投熱藥無效召僕診之六脈雖弱而關獨甚此中焦寒也中焦者脾也脾胃既寒非特但有是證必有腹痛吐瀉之證今四肢厥冷屬脾是脾胃虛冷無可疑者答云未見有腹痛吐瀉之證今用何藥治之僕答云宜用附子理中湯未服藥間旋即腹痛而瀉莫不神之即治此藥一投而瘥良方陳良甫治趙府博與輈宜人病泄瀉不止如附子木香訶子肉豆蔻龍骨等藥及諸丹服之皆無效診之云是肝腎脈虛弱此肝腎虛也府博云其說見在何經曰諸方論泄瀉止是言脾胃病不過謂風冷濕毒之所侵入及飲食傷滯遇腸風則泄利而不知肝腎氣虛亦能為泄利古書所載甚明不可不辨經云泄瀉前後不止腎虛也又諸厥固泄皆屬於下下謂下焦肝腎之氣分也門戶束要肝之氣也守司於下腎之氣也肝氣厥而上行不能禁固而泄利腎為胃關門戶不要倉庫不藏也若病泄利其源或出於此而專以脾胃藥治之則謬固千里矣遂服木香散數服而愈舊傳有人年老而顏如童子者蓋每歲以鼠糞灸臍中神闕穴一壯故也豫嘗患久溏利一夕灸三七壯則次日不如廁連數夕灸則數日不如廁足見經言主泄利不止之驗也又豫年逾壯覺左手足無力偶灸此而愈薛立齊治僉憲高如齊飲食難化腹痛泄瀉用六君子加砂仁木香治之而痊後復作完穀不化腹痛頭疼體重困倦以為脾虛受濕用芍藥防風湯而愈太僕楊舉元先為飲食停滯小腹重墜用六君子加升麻柴胡漸愈後飲食難化大便患泄瀉心腹作痛飲食不甘用和中丸倍加益智仁而尋愈光祿楊立之元氣素弱飲食難化泄瀉不已小便短少灑淅惡寒體重節痛以為脾肺虛用升陽益胃湯而痊大凡泄瀉服分利調補等劑不應者此肝木鬱於脾土必用升陽益胃之劑一儒者季夏患泄瀉腹中作痛飲食無味肢體倦怠用補中益氣湯八味地黃丸月餘而痊後彼云每秋間必患痢今則無恙何也曰此閉藏之月不遠幃幕妄泄真陽而然前藥善能補真火火能生土脾氣生旺而免患也憲副屠九峰先瀉而口渴尺脈數而無力恪用解酒毒利小便之劑不應曰此腎陰虧損虛火熾甚宜急壯水之主不然必發疽而不能收斂也不信別服降火化痰之劑果發疽而歿繆仲淳治無錫秦公安患中氣虛不能食食亦難化時作泄胸膈不寬一醫誤投枳殼青皮等破氣藥下利完穀不化面色黯白乃用人參四錢白朮二錢橘紅一錢乾薑七分甘草炙一錢大棗肉豆蔻四五劑漸加參至一兩而愈三年後病寒熱不思食一醫欲用參仲淳至曰此陰虛證也不宜參乃用麥冬五味牛膝枸杞白芍茯苓石斛棗仁鱉甲十餘劑愈廣筆記從妹患泄後虛弱腹脹不食季父延諸醫療之豫偶問疾見其用二陳湯及枳殼山楂等味豫曰請一看病者見其向內眠臥兩手置一處不復動曰元氣虛甚矣法宜理中湯恐食積未盡進以人參三錢橘紅二錢加薑汁竹瀝數匙夜半食粥神思頓活季父大喜盡謝三醫再以六君子湯加山楂砂仁麥冬調理之數劑立起同上朱丹溪治一老人奉養太過飲食傷脾常常泄瀉亦是脾泄白朮二兩白芍神麯山楂半夏各一兩黃芩五錢上為末荷葉包飯燒為丸平治會萃聶久吾治盧陵尹之嶽素以善醫名患傷感泄利自治不效脈之知其原感風寒未經發汗久則入里郁為溫熱又內傷飲食脾胃不和是以下泄乃先與清解滌其入里之邪前胡甘草麥冬連翹赤芍赤茯苓花粉廣皮山楂厚朴黃芩乾葛黃連枳殼生薑次日再診知其熱鬱已去脾胃虛滑用補脾藥一劑而安魏玉橫曰宋復華兄尊堂年七十體素肥長夏病泄瀉診之曰此肝木乘脾也雄按所云肝木乘脾實皆乘胃之症也故潤藥相宜如果乘脾則參術又為主藥矣宜養肝腎則愈勿治脾與數劑病已略減會復華以事入都家人另延醫投以蒼白朮補骨脂肉豆蔻丁桂香砂仁建蓮扁豆之類頻服至百餘日肌肉枯削動則忡惕眩暈食入即嘔而下利益頻始謝去再延余但與重劑杞子地黃沙參麥冬米仁山藥初加黃連三分四劑隨減去加人參一錢四五劑亦減去後加肉蓯蓉四錢四劑凡服藥一月而安類皆甘寒潤滑之品有泥景嶽之說謂吐瀉皆屬脾胃虛寒者宜變通焉復華令正亦患脾泄每五更黎明必行一二次醫亦以香燥辛熱健脾之劑與之治半年餘泄瀉轉加月事數月不至寒熱無時頭暈心忡四肢厥冷每下午則面赤口苦舌燥食則欲嘔寐則多驚幸脈未數亦與杞地沙參麥冬間入酒連諸證遞愈經水亦行再加山藥棗仁食增瀉止褚某年二十四五新婚數月忽病泄瀉日五六次食後即急欲如廁腹脹甚腰亦疼脈之兩手俱弦與生地杞子沙參麥冬米仁川楝稍減旋覆乃加杞子至一兩入酒連四分二劑而愈項秋子尊堂年五十久患泄瀉日常數行凡飲食稍熱即欲泄後食漸減治數年無效已聽之偶昏暮於空房見黑影疑外孫也撫之無有因大恐失跌遂作寒熱左脅如錐刺徹夜不眠口苦眩暈或疑邪祟或疑瘀滯幸未服藥診之脈弦數與川連楝肉米仁沙參麥冬生地杞子蔞仁才下咽脅痛如失再劑則纍年之泄瀉亦愈矣或問故曰此肝經血燥火旺乘脾之證經曰人虛則目䀮䀮無所見其見黑影者乃眩暈時作又因恐而失跌也原夫向之泄瀉屢治罔驗者蓋時師見證治證所用必香砂芩術諸燥劑也火生於木禍發必克此陰符經之祕旨也醫者能擴而充之則世無難治之病矣瘧竇材治一人病瘧月餘發熱未退一醫與白虎湯熱愈甚竇曰公病脾氣大虛而服寒涼恐傷脾胃病人曰不服涼藥病何時得退竇曰內經云瘧之始發其寒也烈火不能止其熱也冰水不能遏當是時良工莫能措其手且扶元氣待其自衰公元氣大虛服涼藥退火吾恐熱未去而元氣脫矣因為之灸命關才五七壯脅中有氣下降三十壯全愈子和治陳下一人病瘧三年不愈止服溫熱之劑漸至衰羸求張治張見其羸亦不敢便投寒涼之劑張公原自細心乃取內經刺瘧論詳之曰諸瘧不已刺十指間出血正當發時令刺其十指出血血止而寒熱立止咸駭其神故息城一男子病瘧求治診之兩手脈皆沉伏而有力內有積也此是肥氣病者曰左脅下有肥氣腸中作痛積亦作痛形如覆杯間髮間止今已三年祈禳避匿無所不至終不能療張曰此痎瘧也以三花神祐丸五七十丸以冷水送過五六行次以冷水止之冷主收斂故也濕水既盡一二日煎白虎湯作頓啜之瘧猶不愈候五六日吐之以常山散去冷痰涎水六七次若翻漿次柴胡湯和之間用妙功丸磨之瘧悉除吳中內翰政和丁酉居全椒縣歲瘧大作遇寒多熱少飲食不思用高良薑麻油炒乾薑炮各一兩為末每服五錢用豬膽汁調成膏子臨發時熱酒調服或以膽汁和丸每服四十丸酒下亦佳凡救人以百計張大亨病此甚欲致仕亦服之而愈大抵寒熱發於膽用豬膽引二姜入膽去寒而燥脾胃一寒一熱所以效也朱氏集驗方本草綱目野史云盧絳中病痁瘧疲瘵忽夢白衣婦人念曰食蔗可愈及旦買數梃食之翌日疾愈雄按此即飲食消息之法夔州談遠病瘧半年故人竇藏叟授方用真阿魏好丹砂各一兩研勻米糊和丸皂子大每空心人參湯化服一丸即愈世人治瘧惟用常山砒霜毒物多有所損此方平易人所不知草窗周密云此方治瘧以無根水下治痢以黃連木香湯下瘧痢多起於積滯故耳雄按此方甚妙惜阿魏殊罕真者但宜為小丸吞服調化恐臭烈難入於口矣顧寶光善畫陸溉痛風瘧久不療寶光嘗詣溉遂命筆圖一獅子像於戶外云旦夕當有驗至夜聞蟋蟀之聲明日視獅子口有血淋漓溉病遂愈姑蘇志張守淳冬月患三瘧骫骫一月延王孝先診王搖首曰更十日則不治矣必用參附乃可小減其父瞿然縮舌不敢應王力持前說服參附各一錢乃至二錢瘧粗損六七明年初夏始愈孫文垣族子應章三陰瘧發於子午卯酉日昔人謂少陰瘧已越四月矣每發於夜熱多寒少左脈微弦右關大以二陳加柴胡黃柏川芎當歸黃連兩帖熱少輕飲食不進四肢懶倦脾氣大虛以白朮何首烏各三錢鱉甲二錢青皮七分烏梅一個一帖而止應章之弟十月發三陰瘧至次年仲春未止每發於辰戌丑未脈弦數有力用白芍當歸各一錢白朮二錢柴胡川芎甘草砂仁桂枝酒芩各三分生薑三片水煎服再以首烏鱉甲白朮各三錢柴胡一錢青皮酒芩甘草各五分烏梅一個生薑三片臨發五更服兩帖而止後半月下身大發瘡癤以東坡四神丹調理而痊伏暑未盡方中缺用黃連之故江省吾暮秋患瘧三日一次發於夜次年仲春猶未止遍身疼痛背脊疼灸之僅止一日後仍發面青肌瘦此邪在足太陽經以遍身及背脊疼也用麻黃一錢五分人參桂枝白芍甘草知母各一錢陳皮貝母各七分薑棗煎服痛減半瘧未止以首烏白朮各五錢青蒿一錢烏梅一個陳皮二錢姜三片水煎臨發之日五更服尋常以六君子加黃耆五味烏梅草果調理而愈侄孫二水年三十體肥夏月常浸溪中臥松陰下至八月大發寒熱自巳午至天明乃退飲食不進嘔吐黃膽汁胸膈脹悶舌上乾燥生芒刺沉香色強硬以冷水頻漱乃能言語惟啖西瓜生藕先發熱之日吐血一口今則大便下血且咳嗽此溫瘧症也由醫未解散遽用黃耆以閉邪氣致成大困用柴胡知母各三錢石膏七錢葛根三錢橘紅竹茹各一錢五分酒芩枳實各二錢甘草貝母各五分三帖吐止改用二陳湯加柴胡枳實黃芩黃連花粉鱉甲白朮首烏調理而愈喻嘉言治袁繼明素有房勞內傷偶因小感自煎薑蔥湯表汗因而發熱三日變成瘧疾脈之豁大空虛且寒不成寒熱不成熱氣急神揚知為元陽衰脫之候因謂來日瘧發慮大汗不止難於救藥防危不以為意次日五鼓時病人精神更覺恍惚扣門請救及覓參至瘧已先發矣又恐人參補住瘧邪雖急救無益也此語未善瘧未發時豈無邪耶要之發時不當用藥耳姑俟瘧勢稍退方與服之服時已汗出沾濡頃之果大汗不止昏不知人口流白沫灌藥難入直至日暮白沫轉從大孔遺出乃喜曰白沫下行可無恐矣但內虛腸滑獨參不能勝任急以附子理中湯連進四小劑人事方蘇能言但對面談事不清門外有探病客至渠忽先知家人驚以為祟曰此正神魂之離舍耳今以獨參及附子理中駟馬之力追之尚在半返未返之界以故能知宅外之事再與前藥二帖而安裕民坊民家淘井得一瓦枕枕上有一符符下有驅瘧二篆字相傳為諸葛武侯所制病瘧者枕之即愈彼此轉相借用遂為鄰人所匿因訟於官亦不能得續金陵瑣事陸養愚治崔鹽院八月間患瘧日一發治療十日不愈崔曰此病或煎藥一二劑或丸藥一服未有不止者今服藥一二十劑而病發轉劇何醫之無良也醫者承風進診曰前日內外之邪尚重未敢即截今邪已去可以截矣因進丸藥一服服之嘔惡移時明日果愈但飲食無味口每干苦甫三日而復作陸診時正值寒戰床帷俱動面赤戴陽戴陽二字缺妥汗泄不止身熱如火其脈洪數無倫沉按則駛瘧發時脈亦難憑曰此熱瘧也與三黃石膏湯乃謂瘧門不載仍進前丸一服嘔吐不止至巳午時瘧發更甚熱竟日不退再召診因思兩番丸藥胃氣重傷且脈較前更弱不可純作實熱治矣以白虎湯合建中生脈之半投之一夜二劑嘔噦即止明日瘧不發矣以清氣養榮湯調理而安按面戴陽而脈無倫次則似理中症矣乃作實熱而與三黃石膏其說不無可議戴陽症下虛上實脈洪數無倫沉之則虛微或無乃其候也今身熱汗出脈洪數而沉按則駛是浮沉俱有力正陽明大熱之症其面赤者乃胃熱熏蒸所致非戴陽也案中竟以戴陽為面赤之稱原屬稱名之誤魏君又泥其說而以為似理中症亦未免拘文牽義矣朱遠齊醫名藉甚與陸莫逆交歸安令聞其名屢召不赴借事系之獄欲斃之杖下邑紳十餘輩為請竟不釋其妻奔號求救陸亦無計可施適按臺巡湖患瘧醫治無效召陸診陸喜曰機在是矣視其脈兩寸關浮數微弦按之極弱兩尺沉按緊小其症不發時亦倦怠身常熱有汗飢而痞悶不敢食小腹脹急大便欲行不行者已七八日發時戰栗身極熱煩渴躁擾且喘急之甚前醫初與發表後以痞悶用二陳青皮草果燥熱之品常山亦私用而不應審其平日極喜厚味病後禁絶惟日啖干糕數枚夫滋潤不進腸胃已干重以風熱燥削之劑安得不痞滿燥結乎因思此症乃腸實胃虛若以丸劑通其下結以煎劑補其中虛可立已然必徐為之方可為遠齊地乃曰病無大害第勢正猖獗必數日方可衰其半十日則全愈矣促進藥曰此時病將發經云無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗為其病逆未可治也既定以清氣養榮湯進之令以火肉進粥二碗大便未行以蜜導出燥矢數枚次日瘧減十之三再進前湯二劑已減十之六七因乘間曰症雖減而脈似未減此餘邪未盡恐後時有變某有師兄朱如玉術高某百倍若得此人商治百無一失奈渠得罪縣尊現在監禁按臺隨令捕官著歸安縣請朱朱得免及進視論病如見因用潤字丸三錢先服隨以前湯方加生脈散是夜下宿垢極多明日瘧止矣上者宜湯下者宜丸虛者宜補實者宜瀉分類施治斯兩不相妨亦定法也陸肖愚治沈俊庵年五十七月間患瘧日一發或兩發服藥不效用丸藥截之嘔吐竟日次日瘧不作矣然飲食日減倦怠嗜臥至八月中復發寒熱一二日仍以藥丸截遂嘔瀉數日不止飲食不進即湯水亦盡吐出身熱戴陽語多譫妄醫尚擬二陳五苓及診脈浮而微細如絲乃謂曰病亟矣兄藥寬緩恐無濟今當用附子理中以冀萬一耳彼醫心不然之又病家見用附子大駭陸遂辭去彼醫療治兩日而殂陸祖愚治朱明宇因暑月多飲水又煩勞過度飲食失節常徹夜不眠偶赴酌歸感寒頭疼身熱胸膈不快自用蔥姜表汗轉成瘧疾間日一發醫用檳榔柴胡草果青皮乾葛羌活之類投之輒吐及瘧發呻吟煩躁益甚日久漸危脈之氣口沉實有力臍之上下手不可按六七日不大便口乾燥渴極欲西瓜冷水曰可立起也因投其所喜用嫩蘇葉嫩薄荷搗汁和勻入井水中與飲吐止而有微汗甚覺爽利隨以潤字丸四錢投之渴則以前水飲之薄暮沉睡至四鼓腹中響微微作痛下燥矢七八枚後又連行三次去稠膩甚多是日微發熱懈怠乃用歸芍茯苓知母貝母前胡花粉人參甘草等味調理數日而安吳抑之少年稟弱多煩勞患瘧間一日一作醫以參術大補家人又以參粥良之遂痞悶發狂煩躁不寐脈之左三部弦細而數右寸關浮弦按之有力右尺似有似無其氣血固虛而風寒積滯則實也用柴胡乾葛黃芩山楂厚朴青皮陳皮半夏一劑胸膈略舒數劑譫妄煩躁悉除瘧發於陽分矣其鼻乾唇裂不眠腹中梗塊作痛皆陽明大腑未清也改用枳實熟大黃山楂甘草加鐵鏽水一服即下宿垢十餘枚諸症頓減但真元衰弱瘧猶未已以當歸白芍人參白朮茯苓甘草柴芩麥冬二母數劑而愈李士材治楊太史瘧發關脈見弦緊兩發後苦不可支且不能忌口便求截之曰邪未盡而強截之未必獲效即使截住必變他症不若治法得所一二劑間令其自止升麻柴胡各二錢提陽氣上升使遠於陰而寒可止黃芩知母各一錢五分引陰氣下降使遠於陽而熱自已以生薑三錢卻邪歸正甘草五分和其陰陽一劑而減半再劑而竟止程武修患瘧每日一發自巳午時起直至次日寅卯而熱退不逾一時則又發矣已及一月困頓哀苦求速愈曰頭痛惡寒脈浮而大表症方張此非失汗必誤截也果服截瘧丸而增劇此邪未解而遽止之邪不能出教以八劑四日服盡決效矣石膏黃芩各三錢抑陽明之熱使其退就陽明脾胃為夫妻使之和合則無陰陽舛亂之愆半夏檳榔各一錢五分去胸中之痰蘇葉二錢發越太陰之邪葛根一錢斷入陽明之路甫三劑而瘧止改用小柴胡倍人參服四劑補中益氣湯服十劑而痊沈相國患瘧吐蛔悶不思食六脈沉細李曰瘧傷太陰中寒蛔動也用理中湯加烏梅三個黃連五分進四劑後胸中豁然寒熱亦減蛔亦不吐去黃連加黃耆二錢生薑五錢五劑而瘧止蓋病人素有寒中之疾雖盛暑寒冷不敢沾唇故瘧發而蛔動也陳眉公三日瘧浹歲未瘥素畏藥餌尤不喜人參其脈浮之則濡沉之弱榮衛俱衰故遷延不已因固請曰素不服參天畀之豐也今不可缺者病魔之久也先服人參錢許口有津生腹無煩滿遂以人參一兩何首烏一兩煎成入薑汁鍾許一劑勢減七八再劑瘧止與景嶽何人飲意同醫通一士人病瘧久不愈有道士來以棗一枚按病人口上咒曰我從東方來路逢一池水水內一尊龍九頭十八尾問他吃什麼專吃瘧疾鬼太上老君急急如律令敕連咒三遍將棗納入口中令嚼食之遂愈二酉余談馮楚瞻治徐六御患瘧不已熱時噁心胸脹倍甚醫用柴胡湯加草豆蔻意其痰食為患耳乃徐素有鼻衄症今當壯熱之時忽遇辛熱之藥迫血妄行潰湧數斗昏暈不省冷汗如珠四肢皆冷脈微欲絶令以獨參兩餘煎汁半鍾灌之始能吞咽再煎再灌次日稍蘇但厄逆不止乃以溫補之劑重用人參沖服諸症漸平但人參略少厄逆便甚八味十全早晚服兩月全愈韓老夫人患瘧甚重壯熱無汗六脈洪大而空馮曰汗生於陰腎主生液今六脈有陽無陰豈可更汗以促其孤陽亡越乎凡治傷寒感症均宜達此不惟瘧疾為然然必用於誤表之後斯為合法以八味加牛膝五味子每劑納熟地二兩煎碗余灌飲之滋水即所以發汗也果大汗而愈趙某形甚肥壯而中氣甚虛下元不足夏月患瘧醫以發散和解不愈復以補中益氣調之亦不應發時寒熱大作喉如齁鼾臉紅喘促出多入少脈之寸關豁大兩尺甚微勢甚危困諺云少不可弱老不可瘧老年氣血衰微大寒大熱非所堪也故氣多出少入一時暴絶理宜大補真陽仍佐下焦斂納封藏之劑如八味加五味牛膝為穩若補中益氣恐益令孤陽上浮陽食於上陰絶於下便有不測之患觀此則知補中益氣不可漫用也況以陰虧陽損之軀而犯陰竭陽浮之病復當陽浮陽耗之時升浮之藥斷非所宜奈病家醫者均以熱天熱病畏投桂附補中益氣先哲良方必欲進之果喘促愈加夜半而逝可以為戒雄按今秋相簡哉室患瘧初投消散繼以補中益氣延至匝月骨瘦如柴左乳震躍氣促心悸眩暈汗多腹中如有聚氣時欲上衝綿惙已極其師趙菊齊拉余診之脈來弦敝而微細如絲投以西洋參龍齒牡蠣龜板鱉甲冬蟲夏草甘草小麥熟地歸身杞子麥冬紅棗蓮子心等藥出入為方浹旬而愈徐氏婦七十餘患瘧上則咳嗽吐血下則泄瀉粒米不進人事不省胸膈脹悶脈則兩寸細數左關弦大右關甚微兩尺重按不起勢甚危篤知為陰虛內熱外寒肝無血養而強脾無氣充而弱血無所統而吐谷無所運而瀉氣無所納而脹悉屬本源為病用重劑熟地白朮麥冬五味牛膝製附子參湯沖服瘧止神清既而病人自謂胸膈有停滯不肯用補乃詭以八味丸為消食丸參湯送下遂諸症悉痊謝登之年七十餘偶途中遇雨疾趨而歸繼發瘧疾甚危每發輒大便便必昏暈欲絶醫以疏散勢愈劇馮曰冒雨受寒疏散宜矣獨不思經曰驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾皆傷臟也凡入者為實出者為虛大便出而昏暈元氣欲脫矣尚可以既散之微寒為重而垂絶之元氣為輕耶急以附子理中湯加五味投之而愈按黃履素引立齊云凡久瘧乃屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食泄瀉手足厥冷寒戰加栗若誤投以清脾截瘧二飲多致不起又三瘧久不止者多成壞症想不遵此治法而醫藥亂投之故豫表兄沈鴻生孝廉精神素旺自閩遊歸患三瘧幾一載元氣都耗後瘧雖止而面黑眼黃見者驚異如是又二載卒以鼓脹亡先生指久瘧為元氣虛寒信為確論余少時曾患此雖不敢服清脾截瘧等藥而所進皆柴胡黃芩之劑十四五發方得止亦甚狼狽矣此病最忌生冷葷腥使滋味淡泊邪氣自衰豫病守戒甚嚴瘧止後茹素者半月才極乃葷是以脾胃頓開飲食較未病前倍增精神始旺黃之侄倩孫培之得吳與辰金鉛丸有一比邱患山瘧久不止與一丸服之減半蓋山瘧屬元氣虛寒金鉛丸能助陽氣故兩丸竟愈張路玉治張怡泉恆服參附鹿角膠等陽藥而真陰向耗年七十五七月病瘧誤進常山截瘧一劑遂人事不省六脈止歇按之則二至一止舉之則三五至一止惟在寒熱之際診之則不止熱退則如前此真氣衰微不能貫通於脈及寒熱時邪氣衝激經脈反得開通此虛中伏邪之象為制方常山一錢酒拌同人參五錢焙乾去常山但用人參以助胸中大氣而祛逐之因常山傷犯中氣而變劇故仍用之為嚮導耳晝夜連進二服遂得寢但寒熱不止脈止如前乃令日進人參一兩作二次服並與稀粥助其胃氣數日寒熱止脈微續而安雄按談脈有理用藥可法顧玉書瘧發即昏睡囈語痞脹嘔逆切其氣口獨見短滑乃有宿滯之象與涼膈散易人中黃加草果仁一劑而霍然金氏子八月間患瘧發於辰戌丑未至春子午卯酉每增小寒熱直至初夏診其脈如絲面青唇白乃與六君子加桂附四服不應每服加人參至一兩桂附各三錢辰戌丑未之寒熱頓止子午卯酉之寒熱更甚此中氣有權而邪並至陰也仍與前藥四服面色榮食進寒熱悉除後與獨參湯送八味丸調理而安顧文學年逾八旬初秋患疸瘧昏熱譫語喘乏遺溺或以為傷寒譫語或以為中風遺溺危疑莫定張曰無慮此三陽合病譫語遺溺口不仁而面垢仲景暑症原有是例遂以白虎加人參三啜而安同時顧文學夫人朔客祈連山皆患是症一者兼風用白虎加桂枝一者兼濕用白虎加蒼朮俱隨手而瘥或問今歲瘧脈不弦之故曰瘧屬少陽經證其脈當弦而反不弦如平人者以邪氣與正氣渾合不分故也金匱云溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之當知脈既不弦便非風木之邪即不當用柴胡少陽經藥豈可以常法施治乎張飛疇治沈子嘉平昔夏間臍一著扇風則腹痛且不時作瀉六脈俱微數此腎臟本寒閉藏不密易於招風也下寒則虛火上僣故脈數與六味去澤瀉加肉桂肉果五味白蒺藜作丸服由是臍不畏風脾胃亦實明秋患瘧醫用白虎竹葉石膏等瘧寒甚而不甚熱面青足冷六脈弦細而數用八味丸二倍桂附作湯更以四君合保元早暮間進二日瘧退調理而愈高鼓峰治曹獻扆室人十一月病瘧發則頭重腰痛寒從背起頃之壯熱烙手汗出不止曰此太陽經瘧也用大青龍湯曹曰病來五六日委頓甚矣且病者稟素怯弱又他醫言有汗要無汗帶補為全今汗如此而復用此藥恐不能當高笑曰第服此其病自除當晚汗猶未止進一大劑即熟睡次日不發逾日以補中益氣調理而痊全在認症明白故能談笑自若徐方虎病三陰瘧已四年矣幸所治皆武林名醫服藥得法不致潰敗刻薄而善占地步用人參幾十余斤然年久病深至是遂不能支形肉盡脫飲食不進每覺有氣從左脅上衝即煩亂欲脫奄奄幾殆乃重用桂附白芍地黃加以養榮逐積之藥冬至日正發期是日遂不至豫從侄藻明業醫患此治不效偶端午大啖黃魚竟愈又數人患此遇朔日亦痊附方用何首烏五錢陳皮二錢青皮三錢酒一碗河水一碗煎至一碗溫服治瘧不論久近即愈張三錫治翁氏婦久瘧食少汗多用六君子加黃連枳實月餘不應因悟連枳之過純用補劑又令粥多於藥而食進再加附子三分半一服而痊張三錫云準繩載一婦人夏患瘧用柴胡升麻葛根羌活防風之甘辛氣清以升陽氣使離於陰而寒自已以知母石膏黃芩之苦寒引陰氣下降使離於陽而熱自已以豬苓之淡滲分利陰陽使不得交併以穿山甲引之以甘草和之一劑而止有人患久瘧諸藥不效或教以灸脾腧即愈更一人亦久患瘧聞之亦灸此穴而愈蓋瘧多因飲食得之故灸脾俞即效陸祖愚治朱襟湖六旬外肩上忽生癤毒因褪衣敷藥致感冒成瘧要知癤毒本由伏暑又因遇寒遂發瘧耳脈浮虛乃於補氣血藥中加疏表之味數劑後膿潰而精神愈憊遂加參耆兩許六七日後瘧雖輕而未止有人謂斬鬼丹之妙不可勝言次早水吞一服少頃寒熱愈熾嘔吐不止昏暈異常喘氣不定乃用甘草為君黃連為臣佐以金銀花藿香開胃解毒暈吐止乃用大劑人參何首烏數服瘧止再用養血補托收斂生肌腫毒消而全愈陳雅仲四月初過仙霞嶺陡遇狂風驟兩雨具徒施遍身俱濕宿店又無火焙兼長途勞頓水土不服飲食失宜遂患瘧閩醫用藥與浙迥殊即柴胡一味惟以前胡代之名曰香柴胡陳君之療發散為主得汗而病轉甚陸適在閩診之面色槁而黑自汗神昏懶於言語疲憊已甚此風去而濕存之候其脈左手弦細而滑氣口緩弱知其勞頓之後重加發散乃與養血健脾寬中和解之劑去病猶反掌云嚴力庵著有柳洲遺稿豫之至友也以在閩病瘧數月歸及兩旬而歿因録是案不覺惘然天耶人耶時己丑長至後一曰雄按沈再平云今人治瘧必用柴胡若非柴胡即不足以為治者故致展轉淹滯變生不測竟能殞命則知瘧本非死證惟概以柴胡治瘧者殺之也夫柴胡為少陽表藥若其瘧果發於少陽而以柴胡治之無不立愈若系他經用之則必令他經之邪展轉而入少陽遷延日久正氣已虛邪氣仍盛而且瀰漫諸經以致斃命所必然矣奈醫家病家彼此昏迷率以柴胡為治瘧要藥從無悔悟良可浩嘆余謂不概以柴胡治瘧惟繆葉丙家耳薛立齊治大尹曹時用患瘧寒熱用止截之劑反發熱惡寒飲食少思神思甚倦其脈或浮洪或微細此陽氣虛寒用補中益氣內參耆歸術各加三錢甘草一錢五分加炮薑附子各一錢一劑而寒熱止數劑而元氣復又治東洞庭馬志卿與此同但去附子加炮姜一錢一婦人勞役傷食患瘧或用消導止截飲食少思體瘦腹脹以補中益氣倍參耆歸朮草當歸加茯苓半夏各一錢五分炮姜五分一劑頓安前藥炮姜用一錢不數劑全愈朱丹溪治浦江洪宅一婦人病瘧間兩日而發飲食絶少經脈不行已三月矣診其脈兩手並無時正臘月極寒議作虛寒治之遂以四物湯加吳茱萸附子神麯為丸與之朱自以處方未當次早再求診之見其梳妝無異平時言語行步並無倦怠朱驚曰前藥誤矣經不行者非無血也為痰所礙而不行也無脈者非血衰少而脈絶實乃積痰生熱結伏而脈不見爾當作實熱治之遂以三花神祐丸與之旬日後食稍進脈亦稍出一月後六脈俱出但帶微弦瘧尚未愈因謂胃氣既全春深經血自旺便自可愈不必服藥教以淡滋味節飲食之法半月而瘧愈經自行矣以丹溪之才而如此虛心如此細心真可為後世法一男子患瘧久而腹脹脈不數而微弦重取則來不滑利輕又皆無力遂與三和湯令於方中倍加白朮入薑汁服之數服而小便利一二行腹稍減隨又小便短少作血氣兩虛於前藥中入人參牛膝歸身作大劑服四十餘帖而愈一人久瘧先間日後一日一來早晚不定皆腎不納氣故也用人參茯苓半夏各一錢丁香五味子各五分益智甘草各三分姜水煎服王宇泰治蔣先生牝瘧衆醫因身疼寒甚欲用桂附曰溽暑未衰明系邪熱安可溫也經曰陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷巨陽虛則腰背頭項疼三陽俱虛則陰氣勝斯骨寒而痛寒生於內則中外皆寒此寒乃陰陽交爭非真寒也遂以柴胡羌活防風升麻葛根以升接三陽以桃仁紅花引入陰分而取邪氣出還於陽分以豬苓分隔之使邪不復下一服而愈又治劉令君患瘧而洞泄不止以交加飲子一劑而愈一人患三日瘧久而不愈飲食不思口不知味熱多寒少用人參黃耆柴胡半夏茯苓當歸各一錢黃芩七分甘草青皮各五分薑棗煎服又治一老嫗患瘧因年高懼其再發欲截曰一劑而已亦甚易焉用截為遂以羌防柴葛升麻升陽氣使離於陰知母石膏黃芩引陰氣下降使離於陽以豬苓之淡滲分利陰陽勿使交併以山甲引之甘草和之一劑而愈此與李士材治楊太史一案合轍其方大同小異治一老婦夜瘧瘧作時大小便俱下血飲食不進危甚此邪熱在於血分故夜作發血得熱而妄行故便血以桂枝桃仁湯去血中之邪一劑而愈薛立齊治一婦人因怒舉發無期久而不已胸腹不利飲食少思吞酸吐痰用六君子加柴胡山梔二十餘劑尋愈但晡熱少食又用四君子加柴胡升麻為主佐以逍遙散而痊馮楚瞻治張子芳年將六旬無發熱頭疼等候但飲食日少大便甚細而難小便甚赤而澀凡間三日則夜必氣逆上壅欲死通夕不寐形容枯槁神氣漸衰六脈洪數惟右關尺稍緩無力此陰道虧極孤陽無根但三日一甚此兼脾主信而為病也凡病之難名者悉由本氣但從根本治之自無可藏匿而外見矣此千古不傳之祕乃以熟地一兩六錢麥冬三錢炒白朮六錢牛膝三錢五味附子各一錢參湯沖服數劑後每至期則寒熱如三瘧狀此邪外達也照方再服十餘劑諸症全安凡上衝之症悉由厥陰小便赤澀者肝火熾盛也大便細而難者木來剋土耗其胃中之津液也三日一發者木數主三也得大劑滋潤則津液充而木自柔復發寒熱者厥陰之邪轉由少陽而出也馮氏之論雖精似尚未切病機而方中白朮五味附子亦均未妥善鄙見如此未知有當否耳立齊治洞庭馬志卿母瘧後形體骨立發熱惡寒自汗盜汗胸膈痞滿日飲米飲盞許服參術藥益脹臥床半年矣以為陽氣虛寒用大劑補中益氣加附子一錢二劑諸症漸退飲食漸進又二劑而愈一婦人久瘧寒熱服清脾飲之類胸膈飽脹飲食減少用補中益氣湯加茯苓半夏炮姜各一錢而痊朱丹溪治義一侄婦瘧疾初安因沖氣又發腰痛白濁已與參朮檳榔半夏補方治瘧又教以煅牡蠣一錢木通五分炒柏三分治濁入萆薢杜仲枸杞根治腰痛為粗末同服馬元儀治宋初臣年四十患瘧寒則戰栗熱則躁煩脈之兩關尺空大按之豁然若在熱發時見此未可便斷為參附症也所服不過汗下溫和之劑曰此症得之內虛所感其受傷在少陰腎之一經也與風暑痰熱發瘧者有天淵之別法宜大振陽氣以敵虛邪時一醫極力排阻言之不入因思此症一誤不堪再誤乃謂所親曰病勢甚危今晚可密煎人參一兩附子三錢即與服庶可逆挽如言服之便得大睡寒熱頓止再劑而安一月後復見嘔吐徹夜不眠兩脈空大詢其故有穿窬者至因恐而得夫恐則傷脾火隨上逆況大病後元氣初復虛陽易於上越遂投以真武湯一劑而安母舅沈青城自金陵歸途中忽染瘧疾三發困甚診之兩脈浮弦滑實得之風暑痰滯表裡俱實陰陽俱病也脈證有餘可任攻達以柴胡三錢以祛少陽之邪黃芩二錢以清少陽之熱乾葛二錢白芷一錢以越陽明之表知母二錢石膏五錢以清陽明之裡蘇葉三錢生薑五錢以散太陽之寒白豆蔻厚朴橘紅半夏檳榔各二錢以疏太陰之滯二劑寒熱大減三日而安黃氏姑患三日瘧發陰分用何首烏一兩牛膝一兩當歸五錢鱉甲醋炙一兩橘紅三錢水三鍾煎一鍾空心服立愈虛極者加參一兩廣筆記於中父病三日瘧初服人參一兩生薑皮五錢水煎空心服不肯服仲淳堅持此方加人參至三兩生薑皮至一兩五錢二服即起繆仲淳年十七時為瘧所苦凡湯液丸飲巫祝靡不備嘗終無救於病遍檢方書乃知瘧之為病暑邪所至經曰夏傷於暑秋必痎瘧遂從暑治不旬日瘳後數以意消息散邪之外專養胃氣痰多者消痰氣虛者補氣血虛者補血又分臟腑經絡各從其類以施嚮導即經年不愈者竟霍然起矣同上沈少卿中丞請告時苦瘧仲淳往診之憊甚曰再一發死矣先生何方立止之仲淳曰何言之易也疏三方作五劑一日夜飲之盡次早瘧止先二劑清暑用大劑竹葉石膏湯加桂枝以其渴而多汗也次二劑健脾去滯用橘紅白豆蔻白朮茯苓谷蘖烏梅扁豆山楂麥芽最後一劑人參一兩生薑皮一兩水煎露一宿五更溫服盡劑而效同上顧伯欽患瘧仲淳之門人疏方以白虎湯加人參一兩一庸工云豈有用參至兩數者乎改用清脾飲二十餘劑而瘧不止體尫弱仲淳至笑曰此虛甚非參不可吾徒不謬也投以大劑參耆一劑而瘥人參一兩黃耆蜜炙一兩知母蜜炙五錢陳皮二錢乾葛二錢甘草八分石膏五錢同上莊斂之妾患瘧寒少熱甚汗少頭痛不嗜飲食余為診脈洪數而實用麥冬五錢知母三錢五分石膏一兩五錢竹葉六十片粳米一撮橘紅二錢牛膝一兩乾葛茯苓扁豆各三錢三劑不應忽一日凡寒熱者再昏迷沉困不省人事勢甚危急斂之曰恐是虛瘧前方石膏知母竹葉似近寒涼非其治也繆亦心疑為去石膏等而加人參二錢已別矣復追想前脈的非屬虛急令人往視令其將參煎好勿輕與服待按脈加斟酌焉次早往視其脈洪數如初急止人參勿服惟仍用前方而加石膏至二兩何首烏五錢令其進二劑瘧遂止雄按袁子才云丙子九月余患瘧早飲呂醫藥至日昳嘔逆頭眩不止家慈抱余起坐覺血氣自胸僨起命在呼吸適同徵友南豐趙藜村來訪診脈有方曰誤矣此陽明暑瘧也誤以升麻羌活提之血乃逆流而上惟白虎湯可治甫投一勺如以千鈞之石將陽胃壓下血氣全消未半盂即睡去微汗而醒趙問思食西瓜否曰想甚即命儘量食之食片許如醒醐灌項晚便進粥次日愈矣莊斂之妾前患瘧越一載忽頭痛如裂心內雜亂不清喉作痛失音舌破咳嗽有痰胸膈胞脹噁心不思飲食如此者四日陡發寒熱如瘧狀寒少熱多熱後頻出汗方解平時有心口痛症並作下元無力如腳氣狀斂之疑為傷寒繆曰此受暑之症即前年所患瘧而勢加劇耳法當先去其標令以石膏二兩麥冬牛膝各五錢知母貝母花粉各三錢橘紅二錢半鱉甲四錢竹葉一百五十片河水煎服三四劑心內清頭疼喉痛失音舌破飽脹寒熱俱愈但噁心不思食如故而心口痛下元無力不減為去石膏知母竹葉鱉甲貝母花粉而加延胡索木瓜竹茹各二錢五靈脂七分生蒲黃錢半苡仁八錢石斛扁豆白芍各三錢枇杷葉三片炙草四分幾十劑而愈雄按暑瘧邪在氣分必以白虎為主而隨證加減繆氏獨知此法不膠守於小柴胡一方然牛膝鱉甲之類初起豈宜驟用若邪入榮分則無礙矣今夏石芷卿室患此因陰分素虛邪即入榮余於白虎加犀角元參銀花石斛竹葉大劑而瘳聞者無不駭異實則見病治病有何奇哉新秋汪子與室寡居患暑瘧誤服柴胡薑萸等藥昏熱欲厥兩尺皆空勢瀕於危乃祖朱樁年太史浼余視之亦兩投犀角地黃加減而痊高存之甥女嫁後患胎瘧久不止仲淳云病在陰分以人參五錢牛膝一兩兼健脾清暑一劑而止同上章衡陽子室患瘧後失音寒熱愈甚告急仲淳仲淳云此必瘧時不遇明眼人妄投半夏故也投以大劑麥冬茯苓炙甘草鱉甲知母貝母數劑而瘳同上來天培治潘康侯季秋患瘧惡寒發熱頭疼身痛嘔吐無汗腰重腿痠間日而發脈之沉而弦此寒邪閉伏募原不能外解也以柴葛解肌羌芎止頭痛藿香廣半止嘔吐枳桔利肺氣白豆仁溫胃桂枝達募原領邪外出不使復入茯苓淡滲利竅加薑棗和榮衛一劑諸已瘳沈明生治丁又銘食後動怒復受風邪惡寒發熱連日委頓咸謂停食感冒耳曰寒以時而來熱得汗而解脈弦且數雖素未患瘧瘧從此開已而果然與清脾飲加減寒熱漸輕但莖卵日縮有類陽痿甚憂曰無慮也此非傷寒厥陰危症亦非陽衰者比乃陽明熱極不潤宗筋所謂諸痿生於肺熱若謂為虛而補之誤矣乃用苓梔等劑久而莖卵如故瘧亦止惟便祕日久然不脹不疼此瘧時多汗汗多則津液燥而腸胃涸俟飲食漸進參術滋補氣血充而便自行勿亟也或診之謂邪氣方實安得用補及今下之尚可為也與承氣湯服半日許便不行而莖縮再延診仍與調補數日進參二兩餘去宿垢甚多而全愈鼒於是症得三益焉於其初也可驗瘧於受邪之始於其中也知痿不盡由陽事之虛王節齊言詳矣其末也知便祕有服參術乃通不可遽然攻下若下之不當雖硝黃亦不能蕩滌徒令真元耗損在經固有明訓而世但知堅者削之未詳塞因塞用之法耳錢國賓治大同右營把總張道患瘧七年奄奄一息診之六脈弦長尚有胃氣乃足太陰脾經痰血結於腹右名為瘧母也且久病血凝經絡不攻痰血病不愈也內經曰瘧之間作者邪氣深入薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作先以四物湯加桃仁紅花牛膝人參蒼白朮服十餘帖經絡方活瘧轉陽分又以八珍湯加黃耆一錢何首烏一兩服十帖補養正氣瘧輕漸早又以常山三錢酒炒七次陳皮甘草各一錢五分蔥三段姜五片煎露空心熱服瘧止又以雞蛋上透一孔用簪攪勻清黃入番木鱉一個真麝四釐紙封頭飯上蒸熟去殼去木鱉不用熱酒吃雞蛋日日空心一個月餘瘧母消盡凡遇久瘧不知此法不起也魏玉橫曰施渙之豫之至交也夏秋間自都至吳門就婚橫塘初冬以彌月親戚會飲飲散而病寒熱頭痛自服芎蘇飲一劑不愈即進理中湯轉甚蓋以新婚故自疑為陰症也自是所延醫咸以溫補進日益困亟使詣杭招豫比至已十餘日矣入門見煮藥未退診之脈沉弦而數且六七至舌強苔黑而燥自言服溫補後寒熱已退惟大便不行小便頻數夜間尤甚幾五六十次膈間時有冷氣上衝日惟進粥甌許奄奄危殆未審何症曰此伏氣為瘧也小便頻數者內熱下迫也其出必點滴其色必赤濁驗之果然至冷氣上衝乃熱鬱中宮猶火焰之上必有冷氣也其大便不行則內熱而燥結不待言矣夫邪伏既深其發乃止何得遽用溫補幸壯年臟陰未竭急投涼解得寒熱再作乃可無虞叩所煎藥則人參白朮薑附桂萸棗仁五味等云昨已服一劑病勢不減今用參三錢桂附俱用錢半乃考前方皆二陳四君子桂薑萸之屬曰今日再進參朮桂附則不可為矣以小柴胡小陷胸合白虎作一劑與之其友壻惶惑無措堅不肯從蓋洞庭醫者主於其家就中為難耳曰既不相信請即原舟告辭雖誼屬至友來為治病非送殮也渙之聞乃懇留治乃令以藥具相付親與調煎服後小便遂不頻數次日粥加進再與前方則寒熱大作而舌黑漸退神氣漸爽又去白虎二劑寒熱減小便長又二日大便去黑燥甚多改用甘露飲加減數劑而安雄按今秋湯振聲患瘧於嘉興醫知為暑即與清解轉為泄瀉遂改溫燥瀉益甚而熱不退因束手令其返杭所親張月卿延余視之苔黑麵紅胸間拒按便如膠漆小溲全無譫語耳聾不眠善笑脈則芤數豫黃連黃芩黃柏梔子銀花石斛知母蔞仁元參緑豆調服神犀丹四劑而胸不拒按略進淖糜黑矢漸稀稍有小溲乃去神犀加地黃石膏服三日熱退神清脈形漸靜始授甘涼養液十餘帖而愈又朱生甫令郎仲和數年前患瘧纏綿半載大為所苦今夏患此形證與前相若亟延余診且曰必受經年纍月之困矣余謂暑濕為患不服柴桂薑棗旬日可瘳彼不甚信及投劑果八服而痊始悟從前竟為小柴胡湯所誤也許民懷年近三十患胎瘧適禾中名醫寓杭延視見其舌苔如爛鐵之剝蝕有苔處淡黃無苔處則深紫如豬腰三四發即困憊不堪杖而後起飲食驟減日啜薄粥兩甌遂不敢與藥診之脈虛數而弦左寸鼓而上溢右尺微弱曰此手足兩少陰素虛且受暑邪入包絡經云暑傷心舌乃心之竅故見症如是初與黃連香薷飲一劑即思食繼與導赤散合益元舌紫退再與人參小柴胡寒熱愈愈後乃告曰其戚友同於是日發瘧者共三人又皆苔瘧其二人死矣一葉姓一周姓也雄按此門治法於暑濕時瘧缺然未備惟繆氏解用白虎以治暑證而又初病即雜以牛膝首烏等陰分之藥皆未可為軌則也胎瘧之稱尤為俗說以魏君之賢而亦惑之陋矣裴兆期治一人瘧久不已發時必燥渴恣飲更嘔噦膨脹面色黃瘁此濕盛為瘧之候也醫不審日以補中湯加知母麥冬烏梅花粉等類治之益劇裴以蒼朮三兩半夏茯苓澤瀉厚朴陳皮砂仁黃連各五錢作丸每服二錢日再進旬余而安夫服潤劑而渴增服燥藥而渴反止何也流濕以潤燥也凡久瘧之人必多黃涎惡水聚於中宮中宮濕甚則生熱熱甚則生燥所以作渴而多飲流其濕則熱不生熱不生而燥自潤矣古人不我欺也黃錦芳治羅姓婦人瘧疾每於夜靜即發熱多寒少飲食如故口渴不嘔熱退無汗發則喃喃錯語脈則枯澀已極知是邪入血分若不從陰提出必致陰分耗竭致成不救用當歸二錢川芎五分熟地二錢知母一錢酒炒紅花五分升麻三分於未發時煎服四五劑而愈陸六息體偉神健從來無病因憂勞而病瘧飲食減少肌肉削瘦形體困倦時時噯氣其候一日輕一日重纏綿三月大為所苦此飢飽勞佚所感受傷在陽明胃之一經飲食減而大便艱澀者胃病而運化之機遲也肌肉削瘦者胃主肌肉也形體困倦者胃病而約束之機關不利也時時噯氣者胃中不和而顯晦塞之象也至於一日輕一日重者亦陽明胃經之候經曰陽明之病惡人與火聞木聲則惕然而驚又曰陽明之病喜見火喜見日月光此正更實更虛之妙義而與日輕月重之理相通者也蓋得病之始邪氣有餘故惡人惡火惡木音者惡其助邪也及病久則邪去而正亦虛故喜火喜日月光者喜其助正也甲丙戊庚壬天時之陽乙丁己辛癸天時之陰瘧久食減胃中正氣已虛而邪去未盡是以值陽日助正而邪不能勝則輕陰日助邪而正不能勝則重也今吃緊之處全以培養中氣為主蓋人雖一胃而有三脘之分上脘象天清氣居多下脘象地濁氣居多而能升清降濁者全賴中脘為之運化病者下脘之濁氣本當下傳也而傳入腸中則艱不當上升也而升至胸中甚易以中脘素受飲食之傷不能阻下脘濁氣上干清道耳故中脘之氣旺則水穀之清氣上升於肺而灌輸百脈水穀之濁氣下達大腸從便溺而消胸中何窒塞之有哉所用六味丸凝滯不行之藥大為胃病所不宜今訂理中湯一方升清降濁為合法耳
