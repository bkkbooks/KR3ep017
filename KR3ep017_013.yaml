body:
  text: 卷十三癱瘓竇材治一人病半身不遂先灸關元五百壯一日二服八仙丹五日一服換骨丹覺患處汗出來日病減四分一月全愈再服延壽丹半斤保元丹一斤五十年病不作千金等方不灸關元不服丹藥惟以尋常藥治之雖愈難久一人患左半身不遂六脈沉細無力竇曰此必服峻利之藥損其真氣故脈沉細病者云前月服捉虎丹吐涎二升此後稍輕但未全愈耳竇嘆曰中風本因元氣虛損今服吐劑反傷元氣目下雖減不數日再作不復救矣不十日果大反復求治雖服丹藥竟不能起余嘗行衡州道中遇醴陵尉自衡陽方回以病歸問其得疾之由曰某食豬肉入山既深無肉可以食偶從者食穿山甲肉因嘗數臠舊有風疾至是復作今左手足廢矣因以篋中風藥遺之後半月聞其人頓愈及至永州觀圖經曰穿山甲不可殺於堤岸血一入土則堤岸不可復塞蓋能透地脈也如此尉因誤食致病而旬日痼疾盡愈亦可怪也今人用以通婦人脈甚驗萬鎡家貧拆字度日得末疾以帛絡臂於項左手執杖而行服藥不效一日遇呂純陽謂曰汝少饒今澀怒盛於肝以致生火其如雷擊風旋二氣不合是以火不生土而土焦土不生金而金鑠金不剋木木反克之子孫拂意方致汝蹶血氣停滯於脈絡乃致如此因以手捫腰臂曰酸乎曰不又再捫至膝曰酸矣曰此乃環跳穴所在汝既知酸他日將棄此杖矣又見鎡手有懸帛又將手向衣內上下捫者三曰幸瘦可愈汝五臟俱火不必餌藥惟武夷茶能解之茶以東南枝者佳採得烹以澗泉則茶豎立若以井水則橫還居數日忽不知手舉足步矣續金陵瑣事雄按茶專清肅肺金李時珍治一人偏風手足不舉用萆麻油同羊脂麝香鯪鯉甲即穿山甲等藥煎作摩膏日摩數次一月餘漸復兼服搜風化痰養血之劑三月而愈又一人病手臂一塊腫痛亦用萆麻搗膏貼之一夜而愈本草綱目外治法甚佳不可不知薛立齊治一婦人性善怒常自汗月經先期以為肝火血熱不信乃泛用降火之劑反致月經過期復因勞怒口噤呻吟肢體不遂六脈洪大面目赤色用八珍麥冬五味山梔丹皮數劑漸愈兼用逍遙六味丸各三十餘劑全愈一婦人因怒患痰厥而蘇左手臂不能伸手指麻木口喎眼斜痰氣上攻兩腿骨熱或骨中痠痛服烏藥順氣散之類諸症益甚不時昏憒更加內熱晡熱此肝經血虛內熱生風前藥復耗肝血虛火熾盛而益甚也先以柴胡梔子散調養肝經氣血數日後用八珍湯加鉤藤鉤散諸症稍愈又用加減八味丸料少加酒炒黃柏知母黑色者數劑諸症頓退乃服八珍柴胡梔子散半載而痊後勞役即有復作之意服柴胡梔子散遂安至正十二年某月括蒼葉仲剛氏居天台郡為府史且三歲一日病肢體不隨衆醫皆以為洞風謂風洞徹四肢也療之不能愈請於施敬仲敬仲診其脈曰病積於身有日矣為大劑飲之不旬日遂愈人咸神異其故敬仲曰某所以知仲剛病者切其脈大而來徐是積熱盤鬱於內久不得發卒與風遇其病當作吾以脈治之而愈何神異焉白雲集醫說續編王肯堂治一人右手足偏廢不起床三年矣久服順氣行痰之藥不效至夜神志輒昏度不可支服十全大補即覺清明數日能扶策而起無何能捨策而步矣經云邪之所湊其氣必虛但治其虛不理其邪而邪自去也此等語最誤後人此人因多服順氣化痰藥致虛本元故以十全大補取效若不論邪之有無但以純補為祛邪妙法則大謬矣李東垣治陝帥郭巨濟病偏枯二指著足底不能伸以長針刺委中深至骨而不知痛出血一二升其色如墨又且繆刺之如是者六七次服藥三月病良愈試效方馮楚瞻治於某患偏枯症右臂浮腫或麻或痛難於步履或者謂痰謂火謂風多與清涼消克發散之劑一日忽昏迷不省痰喘潰汗脈之六部沉微此中氣久虛不為峻補反肆克伐非重劑無以挽回乃用人參六兩炒黃白朮四兩生附子一枚去皮薑汁炒水煎一碗灌之汗漸收脈漸起痰喘定而神清調補一月而愈吳孚先治王季衡患左半身不遂或作痛風與發散或作痰治與滾痰丸下數行精神困憊左部沉細而弱此非濕痰死血乃血虛也左屬血然非氣以統之則不流法當從陽引陰上午用四君子湯加黃耆桂枝首烏制附下午用四物湯加秦艽續斷炮姜並加新絳少許取絲有棉棉不絶之形絳有入心化赤之義也治左半身不遂尤宜用之四十帖手能運動倍之足能步履如初近時吳門專以此法欣動愚昧韓貽豐治孔學使尚先患半身不遂步履艱難語言謇澀音含糊氣斷續為針環跳風市三里各二十一針即下床自走不煩扶掖筋舒血活無復病楚意惟語言聲音如舊翌日又為針天突膻中十四針遂吐音措詞琅然條貫矣穆大司農和倫先是左手患木風指不能伸屈此半身不遂之兆也召韓治為用七針指即伸縮無恙逾兩月復患腿疾必恃杖而行因力辭乞休已而韓為針環跳風市三里針數次而疾頓瘳遂視事如故喻嘉言治季蘅翁年將七旬半身不遂已二載病發左半口往右喎昏厥遺尿初服參耆頗當惑於左半屬血不宜補氣之說幾至大壞云間施笠澤以參附療之稍安然概從溫補未盡病情也脈之軟滑中時帶徑疾蓋痰與風雜合之症痰為主風為標也又熱與寒雜合之症熱為主寒為標也平時手冷如冰故痰動易厥厥已復蘇嘔去其痰眠食自若冬月頗能耐寒可知寒為外顯之假寒熱為內蘊之真熱熱蒸濕以為痰阻塞竅隧故衛氣不周外風易入加以房幃不節精氣內虛與風相召是以雜合而成是症耳今欲大理右半脾胃之氣以運出左半之熱痰虛風要非溫補一端所能盡也夫治雜合之病必須用雜合之藥而隨時令以盡無窮之變如冬月嚴寒身內之熱為寒所束不得從皮膚外泄勢必深入筋骨為害矣故用薑附以暫撤外寒而內熱反得宣泄若時令之熱與內蘊之熱相合復助以薑附三熱交煽有灼筋腐肉而已夫左右者陰陽之道路故肝膽居左而其氣常行於右脾胃居右而其氣常行於左往來灌注是以生生不息也肝木主風脾濕為痰風與痰之中人原不分於左右但翁過損精血是以八八天癸已盡之後左半先虧而右半飲食所生之痰與皮毛所入之風以漸積於空虛之府而驟發始覺耳風脈徑疾痰脈軟滑故病則大筋短縮即舌筋亦短而謇於言小筋弛長故從左而喎於右是可知左畔之小筋弛而不張矣若左筋之張則左矣凡治一偏之風法宜從陰引陽從陽引陰從左引右從右引左以參術為君臣以附子乾薑為佐使寒月可恃無恐以參術為君臣以羚羊柴胡知母石膏為佐使而春夏秋三時可無熱病之纍然宜刺手足四末以泄榮血而通氣恐熱痰虛風久而成癘也門人問曰半身不遂之病原有左右之分豈左右分屬之後病遂一往不返乎若答曰風與痰之中人各隨所造初無定體病成之後亦非一往不返也蓋有往有復者天運人事病機無不皆然如風者四時八方之氣從鼻而入天之氣也痰者五穀百物之味從口而入脾胃之濕所結地之氣也勢本相遼亦嘗相兼全似內傷之與外感每挾雜而易眩故風勝者先治其風痰勝者先治其痰相等則治風兼治痰此定法也內經曰風之中人也先從皮毛而入次傳肌肉次傳筋脈次傳骨髓故善治者先治皮毛其次治肌肉由此觀之乃從右而漸入於左也皮毛者肺主之肌肉者胃主之筋脈者肝主之骨髓者腎主之從外入者轉入轉深故治皮毛治肌肉不使其深入也又曰濕之中人也先從足始此則自下而之上無分於左右者也但內風素勝之人偏與外風相召內濕素盛之人偏與外濕相召內風之人大塊之噫氣未動而身已先惕內濕之人室中之礎磉未潤而體已先重是以治病必從其類也從外入者以漸而驅之於外從下上者以漸而驅之於下如治風用大小續命湯方中桂附苓朮麻黃表裡龐雜今人見為難用不知用桂附所以驅在裡之邪用苓術所以驅在中之邪用麻防等表藥獨重者正欲使內邪從外而出也至於病久體虛風入已深又有一氣微汗之法一旬微利之法平調半月十日又微微驅散古人原有規則若任其一往不返安貴其為治乎至於治痰之規則不見於方書如在上者用瓜蒂散梔豉湯等方在左者用龍薈丸在右者用滾痰丸以及虛人用竹瀝達痰丸沉寒錮冷用三建湯之類全無奧義吾今為子明之蓋胃為水穀之海五臟六腑之總司人之飲食太過而結為痰涎者每隨脾之健運而滲灌於經隧其間往反之機如海潮然脾氣行則潮去脾氣止則潮回所以治沉錮之法但取辛熱微動寒凝以後止而不用恐脾得熱而過動痰得熱而妄行為害不淺也人身之痰既由胃以流於經隧則經隧之痰亦必返之於胃然後可從口而上越從腸而下達此惟脾氣靜息之時其痰可返故凡有痰症者早食午食而外但宜休養脾氣不動使經隧之痰得以返之於胃而從胃之氣上下不從脾之氣四迄乃為善也試觀人痰病輕者夜間安臥次早即能吐出泄出痰病重者昏迷復醒反能嘔出泄出者豈非未曾得食脾氣靜息而豫痰以出路耶從來服峻補之藥者深夜亦欲得食人不知其故反以能食為慶不知愛惜脾氣令其晝運夜息乃可有常肯因俚言而三思否雄按戚鶴泉云左陽位東南右陰位西北天有餘於陽故不滿西北而人身頭以上應天左耳目常明於右其感於邪也必右甚於左地有餘於陰不足於陽故不滿東南而人身頭以下應地右手足常便於左其感於邪也必左甚於右所謂邪乘虛而入也在上右甚虛在血在下下左甚虛在氣凡半身不遂頭面無過者當以左陽右陰地道右強於左之義權之如病在左此自陽不足而然為順如反病在右而陰血大虧並其有餘者損之病為逆也左陽右陰為天地定理不得肝位左為主血肺位右為主氣遂以左為血病右為氣病錯陰陽之道路也更推言之則男子法乎天女子法乎地天道左盛男上病不可在左若身以下屬地道則東南陽常不足左病非逆也地道右盛女下病不宜在右若身以上屬天道則西北陰常不足右病非逆也朱丹溪治一肥人憂思氣鬱右手癱口喎與補中益氣湯有痰加半夏竹瀝薑汁煎服程云來曰里中一老醫右手足廢不能起於床者二年矣忽遇諸塗詢之曰吾之病幾危始服順氣行痰之劑了無應薄暮則神志輒昏度不可支令家人煎進十全大補湯即覺清明遂日服之浹數月能杖而起無何則又能捨杖而步矣經云邪之所湊其氣必虛吾治其虛不理其邪而邪自去吾所以獲全也余曰有是哉使進順氣疏風之劑不輟者墓木拱矣然此猶拘於成方不能因病變通隨時消息故奏功稍遲使吾為之當不止是也程云來醫眼卮言據程說只用大劑人參有痰者宜竹瀝少加薑汁佐之其用四物二陳膽星天麻者大謬俞東扶曰偏枯之症昔人謂左屬血虛右屬氣虛自得喻氏之論其理始明而隨時換藥及刺四末尤見巧妙因思幼讀內經生氣通天論曰風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害又云風雨寒熱不得虛邪不能獨傷人又曰虛邪之風與其身形兩虛相得乃客其形是確指虛人而後中於虛風也然猶是因虛受風故靈樞又有真氣去邪氣獨留發為偏枯之說偏枯難療二語盡之再讀通評虛實論曰凡治消疸撲擊撲擊者如人被擊而撲即今之卒倒也偏枯痿厥氣滿發逆肥貴人則膏粱之疾也此條暗包痰飲濕熱陰虛陽虛諸候未嘗偏中於邪風矣蓋肥貴人自然慎避邪風而膏粱之變風從內生劉李朱三家從此悟入大凡治病必求於本擊撲偏枯以虛為本也從讀劉宗厚玉機微義暨王宇泰靈蘭要覽二書益信塞外多真中江南多類中至繆仲淳立論謂真陰虧而多熱甚者煎熬津液凝結為痰壅塞氣道不得通利熱極生風亦致卒然僵撲類乎中風此即內虛暗風初用清熱順風化痰次用治本或益陰或補陽其藥以二冬二地菊花枸杞胡麻桑葉首烏柏仁蒺藜花粉參耆歸芍鹿茸虎骨膠霞天膏梨膏竹瀝人乳童便等出入互換另出機軸今臨證指南中風一門大半宗此又可補劉李朱張所未備矣痿徐靈胎曰下體痿弱屬虛者多溫補肝腎亦不為過但其中必兼有風寒痰濕一味蠻補亦有未到之處此等方法起於宋而盛於明古人不如是也米南宮五世孫巨秀亦善醫嘗診史相脈未發史謂之曰可服紅丸子否米對以正欲用此亦即愈史病手足不能舉朝謁遂廢樞中要務運之帷榻米謂必得天地丹而後可丹頭偶失去歷年莫可訪尋史病甚召米於常州至北關發舟買飯偶見有進拳石於肆者頗異米即而玩之即天地丹頭也史當未死鬼神猶相之問售者爾自何致此曰去年有人家一奶子以售米因問厥值售者漫索錢萬米以三千酬值持歸調劑以供史史未敢嘗有閽者亦疾痿試服即能坐起又以起步司田帥之疾史始信而餌身即輕遂內引及史疾再殆天地丹已盡遂薨於賜第葉紹翁四朝聞見録張子和治武辨宋子玉因駐軍息城五六月間暴得痿病腰胯兩足皆不任用躄而不行求治於張張察其脈俱滑實而有力張憑內經火淫於內治以鹹寒以鹽水越其膈間寒熱宿痰新者為熱舊者為寒或宿食宿飲在上脘皆可湧之宿痰既盡因而下之節次數十行覺神志日清飲食日美兩足漸舉腳膝漸伸心降腎升更繼以黃連解毒湯加當歸等藥又瀉心湯涼膈散柴胡飲子大作劑煎時時呷之而愈經曰治心肺之病最近用藥劑不厭頻而少治肝腎之病最遠用藥劑不厭頻而多此之謂也夫痿病無寒多發於五六七月若誤作痹與腳氣治之用烏附乳沒自然銅威靈仙之類燔針艾火湯煮袋蒸痿弱轉加如此而死者豈亦天乎李成章治一人病痿李察諸方與治法合而不效疑之忽悟曰藥有新陳則效有遲速此病在表而深非小劑能愈乃熱藥二鍋傾缸內稍冷令病者坐其中以藥澆之逾時汗大出立愈明史李明玉龔子才治一人兩足痿弱不能動止以鹿茸人參各五錢又銼一劑水煎空心溫服連進數服而愈孫文垣治徐氏子年弱冠肌肉瘦削尻膝腫大手肘肩顒皆腫腫處痛熱或作風與濕痰及鶴膝鼓捶風治病轉甚診之六部皆弦其色青而白飲食少時當長至曰此筋痿也諸痿皆不可作風治病轉甚者以前藥皆風劑耳風能傷血血枯則筋愈失養況弦脈乃肝木所主攙前而至是肝有餘而脾土受克脾傷則飲食少而肌肉削也經曰治痿獨取陽明陽明者腸與胃也法當滋補腸胃俾飲食日加臟腑有所稟受榮衛流行氣煦血濡調養至春君火主事之時宗筋潤而機關可利也五加皮薏仁甘草蒼耳子枸杞子瑣陽人參杜仲黃柏黃耆防風服二十劑而精神壯腰膂健飲食加惟間有夢遺去杜仲加遠志當歸三十帖全愈雄按議論極是方未盡善易思蘭治一婦人年十九稟賦怯弱庚辰春因患痿疾臥榻年餘首不能舉形瘦如柴髮結若氈起便皆賴人扶一粒不嘗者五月惟日啖甘蔗汁而已服滋陰降火藥百帖不效有用人參一二錢者輒喘脹不安其脈六部俱軟弱無力知其脾困久矣以補中益氣湯加減治之而人參更加倍焉服二劑遂進粥二盞雞蛋二枚後以強筋健體之藥調理數月飲食步履如常全愈或問曰諸人皆用滋陰降火公獨用補中益氣何也易曰痿因內臟不足治在陽明陽明者胃也為五臟六腑之海主潤宗筋宗筋主束骨而利機關痿由陽明之虛胃虛不能生金則肺金熱不能榮養一方脾虛則四肢不能為用茲以人參為君耆術為佐皆健脾土之藥也土健則能生金金堅而痿自愈矣又問向用人參一二錢便作喘脹今倍用之又加諸補氣藥而不喘脹何也曰五月不食六脈弱甚邪氣太盛元氣太衰用參少則杯水車薪不惟不勝而反為所制其喘脹也宜矣豫倍用之如以大軍摧大敵豈有不剿除者哉加減補中益氣湯方人參一錢黃耆八分歸身八分陳皮六分白朮八分炙甘草五分澤瀉六分黃柏五分丹皮六分陸養愚治王庚陽中年後患足拘攣屈伸不利以風濕治不效自制史國公藥酒服之亦不效脈之左手細數重按則駛右手稍和重按亦弱詢其病發之由告曰始偶不謹而冒寒便發寒熱口苦筋骨疼痛服發散藥寒熱除而口苦疼痛不減至月餘先左足拘攣難以屈伸漸至右足亦然又漸至兩手亦然手更振掉不息醫數十人不外疏風順氣及行氣行血而已數月前少能移動而振動疼痛不可忍今雖不能移動幸不振掉疼痛曰若不疼痛大事去矣曰不移動則不疼痛若移動極其痠痛曰幸尚可藥此筋痿症也少年房帷間曾有所思慕而不得遂願否曰早年一婢其色頗妍因昵之拙荊覺而私黜他方後極想念本年間欲事反縱後患遺精白濁今陽事久不起矣曰內經痿論中一條云肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿由思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫又曰筋痿者生於疾使內也蓋思願不遂遇陰必恣風寒乘虛襲之而不覺至中年後血氣既衰寒變為熱風變為火消精爍髓而病作醫又以風熱之藥治之重耗其血筋無所養不能束骨而利機關宜其病轉劇也所幸飲食未減大便猶實蓋痿症獨取陽明陽明盛則能生氣生血未為難治用當歸地黃參耆白朮丹皮黃柏青蒿山萸枸杞牛膝少加秦艽桂枝羌活獨活煎服又以紫河車鹿角龜板虎脛骨熬膏酒服兩許調治一月而愈李士材治朱太學八年痿廢屢治無功診之六脈有力飲食如常此實熱內蒸心陽獨亢症名脈痿用承氣湯下六七行左足便能伸縮再用大承氣又下十餘行手中可以持物更用黃連黃芩各一斤酒蒸大黃八兩蜜丸日服四錢以人參湯送一月之內去積滯不可勝數四肢皆能展舒曰今積滯盡矣煎三才膏十斤與之服畢而痊倪文學四年不能起於床李治之簡其平日所服寒涼者十六補肝腎者十三診其脈大而無力此榮衛交虛以十全大補加秦艽熟附各一錢朝服之夕用八味丸加牛膝杜仲遠志萆薢虎骨龜板黃柏溫酒送下七錢凡三月而愈高兵尊患兩足痠軟神氣不足向服安神壯骨之藥不效改服滋腎牛膝薏仁二妙散之屬又不效純用血藥脾胃不實診之脈皆沖和按之亦不甚虛惟脾部重取之澀而無力此上虛下陷不能制水則濕氣墜於下焦故膝脛為患耳進補中益氣倍用升麻數日即愈夫脾虛下陷之症若誤用牛膝等下行之劑則下愈陷此前藥之所以無功也俞東扶曰此三案精妙絶倫以藥對脈確切不移首案連用承氣繼用參湯送寒下藥皆是獨取陽明治法末案補中益氣與大黃補瀉不同總歸乎取陽明也喻嘉言治徐嶽生軀盛體充昔年食指因傷見血以冷水灌之血凝不散腫潰出膿血數升小筋脫出三節指廢不伸後兩足至秋畏冷重棉蔽之外跗仍熱內踹獨覺其寒近從踵至膝後筋痛不便遠行醫令服八味丸深中其意及診自云平素脈難摸索乃肝肺二部反見洪大大為病進時在冬月木落金寒尤為不宜八味丸之桂附未可輕服蓋筋者肝之合也附筋之血既經食指外傷不能榮養筋脈加以忿怒數動肝火傳熱於筋足跗之大筋得熱而短是以牽強不便於行也然肝木所畏者肺金故必肺氣先清周身氣乃下行今肺脈大則為心主所傷而壅窒是以氣不下達而足寒也所患雖微已犯三逆平素脈細而今大一逆也肝脈大而熱下傳二逆也肺脈大而氣上壅三逆也設以桂附治之壅熱愈甚即成痿痹矣故治此患先以清金為第一義清金又以清胃為第一義胃不清則飲酒之熱氣厚味之濁氣咸輸於肺矣藥力幾何能勝清金之任哉金不清如大敵在前主將懦弱已不能望其成功況舍清金而更加以助火爍金倒行逆施以為治耶必不得之數矣原注後徐仍服八味一月餘竟成痿痹臥床一載聞最後陽道盡縮小水全無乃肺經之氣先絶於上所以致此錢叔翁形體清瘦平素多火少痰邇年內蘊之熱蒸濕為痰夏秋間濕熱交勝時忽患右足麻木冷如冰石蓋熱極似寒也誤以牛膝木瓜防己五加皮羌獨之屬溫之甚者認為下元虛憊誤用桂附河車之屬補之以火濟火以熱益熱由是腫潰出膿水浸淫數月足背趾踵廢而不用實為痿之變症總為誤治使然若果寒痰下墜不過堅凝不散已耳甚者不過痿痹不仁已耳何至腫而且潰黃水淋漓腐肉穿筋耶蓋此與傷寒壞症熱邪深入經絡而生流注同也所用參膏但可專理元氣而無清解濕熱之藥以佐之是以元老之官而理繁治劇也若與竹瀝同事人參固其經竹瀝通其絡則甘寒氣味相得益彰矣徐某服人參以治虛治風誤以附子佐之迄今筋脈短縮不便行持亦由不識甘寒可通經絡也今用參膏後脾亦大旺日食而外加以夜食是以參力所生之脾氣不用之運痰運熱只用之運食誠可惜也近者食亦不易運以助長而反得衰乃至痰飲膠結胸中為飽為悶為頻咳而痰不應豫常見肺熱之人雖産婦服參亦多此症總為脾失其運不為胃行津液而飲食反以生痰漸漬充滿肺竅咳不易出皆由內熱之故與脾卻無與雖以治痰為急然治痰之藥大率耗氣動虛恐痰未出而風先入也惟是確以甘寒之藥杜風清熱潤燥補虛豁痰乃為合法至於辛熱之藥斷斷不可再誤矣醫者明明見此輒用桂附無算想必因膿水易干認為辛熱之功而極力以催之結局耳可勝誅哉按此症實為肝經燥火鬱於脾土而成世罕知者即喻君亦以膿水浸淫認為濕熱豫有治黃淡翁案附後黃案未見蓋此書脫誤甚多也盧不遠治織造劉監病痿一年欲求速效人亦以旦暮效藥應之二月診之六脈細弱血氣太虛而其性則忌言虛以己為內家也然多手擁近侍之美者此即內經所謂思想無窮所願不得意淫於外入房太甚發為筋痿及白淫是也乃直謂之曰尊體極虛非服人參百劑不復能愈若所云旦暮效者是欺也不敢附和遂用十全大補湯四劑後又惑人言乃為陽不用參而陰用之至四月參且及斤藥將百帖而能起矣次年七月疾作欲再用前法加參不信因斷其至冬仍痿立春必死果然馮楚瞻治李主政足病疼痛不堪步履久廢醫用腳氣祛風燥濕之劑久服不效飲食不甘精神益憊脈之兩寸洪大而數兩關便弱兩尺更微據脈乃上熱中虛下寒也再用祛風燥濕則氣血更受傷矣夫治痿獨取陽明而脾主四肢肝主筋腎主骨則足三陰宜並重焉羽翼軒岐誠在此等餘子紛紛不足數也乃與重劑熟地麥冬牛膝五味製附子炒黃白朮加杜仲另煎參湯沖服十餘劑漸愈再用生脈飲送八味丸加牛膝杜仲鹿茸丸及歸脾湯全瘳雄按議論雖精藥未盡善而馮氏最為玉橫之所心折故不覺所許過當也孫文垣治一文學兩足不酸不痛每行動或扭於左而又墜於右或扭於右而又墜於左持杖而行不能正步此由筋軟不能束骨所致夫筋者肝之所主肝屬木木縱不收宜益金以制之用人參黃耆白芍以補肺金薏仁虎骨龜板杜仲以壯筋骨以鐵華粉專制肝木蜜丸早晚服之竟愈然則此亦筋痿病也邱大守侄丁年患兩手筋攣掉不能伸屈臂內肉削體瘠面白寢食大減脈之六部俱弦重按稍駛詢其病源蓋自去冬偶發寒熱筋骨疼痛至仲春寒熱退而筋骨之疼不減藥無虛日甚則三四進僉謂是風而治不效孫謂此筋痿症也乃少年多欲且受風濕邪氣乘虛而入醫者不察天時不分經絡概行汗之仲景治風濕之法但使津津微汗則風濕盡去若汗大出則風去而濕存由是氣血俱虛經云陽氣者精則養神柔則養筋虛則筋無所養漸成痿弱乃不足之病古人皆謂諸痿不可作風治誤則成痼疾曰服風藥已二百劑矣顧今奈何曰幸青年猶可圖也法當大補氣血經云氣主煦之血主濡之血氣旺則筋柔軟筋柔軟則可以束骨而利機關又何攣掉之有以五加皮薏仁紅花人參鹿角膠龜板虎骨當歸丹參地黃骨碎補蒼耳子之類服兩月肌肉漸生飲食大進兩手攣掉亦瘳黃履素曰余己酉夏應試南都與姊文吳公甫聯社課藝見公甫步履微有不便云苦腿痛精神固無恙也聽庸醫之言以為風濕專服祛風燥濕之劑形容日槁八月間見咯血之症肌肉盡削至冬而歿即此驗之則腿足痠痛疼不可概作風治也益明矣腿足皆是三陰部位多系肝腎陰虛法宜滋補顧反服風藥以耗之豈不速其死哉張三錫治一蒼瘦人每坐輒不能起左脈微弱右關寸獨弦急無力因酒色太過所致用丹溪加味四物湯不二十劑愈後服鹿角膠調理一人體厚二足行履不便時作眩暈以大劑二陳加南星二朮黃柏黃芩入竹瀝薑汁數劑頓愈作痰治一人自覺兩足熱如火炙自足踝上衝腿膝且痿弱軟痛脈濡而數乃濕熱挾虛也以蒼朮黃柏為君四兩牛膝二兩龜板虎脛骨漢防己各一兩當歸二兩人參二兩山藥糊丸桐子大每服一百丸空心鹽湯送下上方加附子一老人痿厥用虎潛丸不應後豫虎潛丸加附子遂愈蓋附子有反佐之功也一人兩足沉重不能舉六脈沉數詢之平居痛飲遂作濕熱治乃以四苓三妙加牛膝木通防己數服漸減用健步丸調理而安薛立齊治舉人於尚之素腎虛積勞足痿不能步履復舌喑不能言面色黧黑謂此腎氣虛寒不能運及所發用地黃飲子治之而愈後不慎調攝而復作或用牛黃清心丸之類小便祕澀口舌乾燥仍用前飲及加減八味丸漸愈又用補中益氣湯而痊冢宰劉紫岩因勞下體軟痛發熱痰盛用清燥湯入竹瀝薑汁服之熱痛減半再劑而全愈張路玉治勞俊卿年高攣廢或用木瓜獨活防己威靈仙豨蘞之類半年餘致跬步不能移動或令服八味丸亦不應脈之尺中微浮而細時當九夏自膝至足皆寒冷如從水中出知為腎虛風雨所犯而成是疾遂與安腎丸方終劑能步履連服二料絶無痿弱之患矣陸養愚治施鳳岡母年及五旬患四肢削而微腫腕膝指節間腫更甚筋外露而青向來月事後必煩躁一二日因而吐血或便血一二日服涼血藥丹皮生地芩連之類三劑方止若不服藥則去血必多近來天癸既絶血症亦減而肢節之症作矣史國公藥酒服之無效數年間蒼朮烏附羌防豨蘞及活絡諸湯驅寒勝濕之劑皆遍服今且飲食便溺動輒須人攣痛尤不可忍脈之六部微澀兩尺緩弱尤甚曰始因過用寒涼損其肝氣繼則多用風燥耗其肝血肝主筋今氣血俱虛筋失其養故腫露而持行俱廢用人參川芎當歸首烏少佐肉桂秦艽為煎劑以虎潛丸料倍鹿角膠為丸服月餘而減三月而持行如故半年全瘳雄按用藥未善朱丹溪治鄭安人年六十虛而有痰脈緩足弱與半夏天麻白朮湯下酒芩丸愈一士夫因腳弱求診兩手俱浮洪稍鼓飲食如常惟言問不答肌上起白屑如麩片時在冬月作極虛處治詢其弟乃知半年前曾於背臂腿三處自夏至秋冬節次生疽率用五香連翹湯十宣散與之今結痂久矣為作參耆白朮當歸膏以二陳湯化飲之三日後盡藥一斤白屑沒者大半病者自喜呼吸有力補藥應取效以漸而病家反怨藥不速應自作風病論治煉青礞石二錢半以青州白丸作料煎飲子頓服之阻之不聽因致不救書以為警云痿症作風治多死薛立齊治一婦人患血痔兼腿痠痛似痹此陰血虛不能養於筋而然也宜先養血為主遂以加味四斤丸治之愈一老人筋攣骨痛兩腿無力不能步履以局方換腿丸治之而愈一婦人筋牽痹縱兩腿無力不能步履以三因勝駿丸治之而瘥河間云腳氣由腎虛而生然婦人亦有腳氣者乃因血海虛而七情所感遂成斯疾今婦人病此亦衆則知婦人以血海虛而得之與男子腎虛類也男女用藥固無異更當兼治七情無不效也因虛而成故以入痿姚僧垣治金州刺史伊婁穆自腰至臍似有三縛兩腳緩縱不復自持僧垣為診脈處湯三劑穆初服一劑上縛即解次服一劑中縛後解又服一劑三縛悉解而兩服疼痹猶自攣弱更為合散一劑稍得屈伸僧垣曰終待霜降此患當愈及至九月遂能起行周書琇按此即春夏劇秋冬瘥之痿症也張子和曰宛邱軍校三人皆病痿積年不瘥腰以下腫痛不舉遍身瘡疥兩目昏暗唇乾舌燥求治於張張欲投瀉劑二人不從為他醫溫補之藥所惑皆死其同病有宋子玉者俄省曰彼以熱死我其改之竟從治之而愈張曰諸痿獨取陽明陽明者胃與大腸也此言不止謂針也針與藥同也王執中曰列子載偃師造偈云廢其腎則足不能行人之患此蓋腎有病也當灸腎俞再一再灸而不效宜灸環跳風市犢鼻膝關陽陵泉陰陵泉三里絶骨等穴但按略痠疼處即是受病處灸之無不效也資生經施靈修有一里人善酒臥床褥者三年靈修憐而索方於仲淳仲淳親診之知其酒病也夫酒濕熱之物多飲者濕熱之邪貫於陽明濕熱勝則下客於腎而為骨痿故昔人治痿獨取陽明以五味子為君黃連為臣麥冬乾葛扁豆為佐服之愈廣筆記薛立齊治一人年逾五十筋骨軟痿臥床五年遍身瘙癢午後尤甚以生血藥治之癢漸愈痿少可更以加味四斤丸治之調理謹守年餘而痊河間云熱淫於內而用溫補藥何也蓋陰血衰弱不能養筋筋緩不能自持陽燥熱淫於內宜養陽滋陰陰實則水升火降矣錢國賓治龍泉沈士彥平生無病肝氣不平過五八腿無故而軟由軟至癱由癱至攣臥不起矣遍寫病狀與知識求醫答之曰能直不能屈者其病在骨能屈不能直者其病在筋筋舒則無病矣內經云心生血肝藏血公平生肝薄多怨血不能養筋筋不能束骨耳久則冷痹而攣彼聞此論遣使求方用臍帶紫河車為君人乳枸杞何首烏為臣芎歸地黃牛膝紅花為佐使血旺則養筋筋和則束骨此藥作丸服矣外取童便數升盛大鉢內以腿於鉢上鉢放腿下另置炭火一爐用新瓦三四片每片打二三塊燒紅淬童便內更易不論次數口取熱氣熏灼約一時琇按外治法精妙止之次日再如此半月筋舒一月能步二月能走矣童便味鹹寒咸能軟堅久能走血散瘀經云血不足者補之以氣謂陰生於陽也又經火氣熱散筋骨冷痹藉瓦引導入筋骨之分治法深奧得竅者知之魏玉橫曰張玉書子年近三十忽寒熱頭痛時師謂傷寒也蠻治月餘後竟不知為何病惟晝夜喊叫痛極延診問何遲曰人皆謂先生專用補渠系傷寒故不敢請領之入視見病人尸臥在床髮長覆額面垢鼻煤皮枯肉臘狀如奇鬼脈之弦而堅左關尺殊澀數詢其痛處起自臂側下連趾踵肩背頭腦亦時抽痛僵直莫能動動則欲死乃謂其父曰此筋骨兼痿之候也若早補何至此極此由少年不慎接內之後即遠行勞役三陰受傷今痛自環跳穴下連大敦隱白湧泉蓋三穴為肝脾腎所主至連肩背頭腦皆掣痛督脈亦傷矣其母私問之果以接內後因事疾走江干歸而疾發其父曰洵如是已誤治許時今奈何曰幸少年血氣易復第須服藥百劑否則雖愈必跛也與肉蓯蓉生熟地杞子米仁當歸牛膝紅花丹皮蔞仁麥冬之屬十劑能起坐又十劑可杖而行其父素慳吝見病已起遂勿藥從後果一足筋短一二寸至今行路傾欹吳太宜人年六旬外病筋絡抽掣上連巔頂肩項下至腰腹胸脅莫不牽痛背脹頭昏口燥心忡便數食減兩手極熱常欲冷水浸之診得脈弦急而疾曰症即多端均由肝火盛而血液虧筋燥失養久之則成痿矣但濡以潤之可立愈也與養榮湯加米仁蔞仁當歸女貞等十劑而痊痛痹方勺云一人遍體作痛殆不可忍都下醫或云中風或云中濕或云腳氣藥悉不效周言亨言是血氣凝滯所致用元胡索當歸桂心等分為末溫酒服三四錢隨量頻進以止為度遂痛止蓋元胡索能活血化氣第一品藥也其後趙侍制霆因導引失節肢體俱攣亦用此數服而愈泊宅編本草綱目錢乙本有羸疾每自以意治之愈而復甚嘆曰此周痹也入臟者死吾其已夫既而曰吾能移之使在末因自制藥日夜飲之左手或攣不能用喜曰可矣所親登東山得茯苓大逾鬥以法啖之盡由是雖偏廢而風骨得堅如全人張子和治一衲子因陰雨臥濕地一半手足皆不隨若遇陰雨甚病轉加諸醫皆作中風偏枯治之用當歸白芍乳香沒藥之類久反大便澀風燥生經歲不已張以舟車丸下之三十餘行去青黃沫水五升次以淡劑滲泄之數日手足皆舉張曰夫風濕寒之氣合而成痹水痹得寒而浮蓄於皮腠之間久而不去內舍六腑曰用去水之藥可也水濕者人身中之寒物也寒去則血行血行則氣和氣和則愈矣邊校白公以隆暑時飲酒覺極熱於涼水池中漬足使其冷也為濕所中臍股沉痛又因醉臥濕地其痛轉加意欲以酒解痛遂連朝而飲反成赤痛髮間止且六七年往往斷其寒濕腳氣以辛熱治之不效或使服神芎丸數服痛微減他日復飲疾作如前睪囊癢濕腫硬臍下似有物難於行張曰豫亦斷為寒濕但寒則陽火不行故為痛濕則經隧有滯故腫先以苦劑湧之次以舟車丸百餘粒浚川散四五錢微下一兩行張曰如激劑尚不能攻況於熱藥補之乎異日又用神祐丸百二十丸通經散三四錢又來日以神祐八十丸投之續見一二行又次日服益腎散四錢舟車丸百餘粒約下七八行已覺膝睪寒者暖硬者軟重者輕也腫者亦退飲食加進又以湧之其病全瘳疏疏風丸方與之此不肯妄服辛熱故可治也張子和治梁宜人年六十餘忽曉起梳髮覺左指麻斯須半臂麻又一臂麻斯須頭一半麻此及梳畢從脅至足皆麻大便二三日不通醫皆云風也或藥或針皆不效左手三部脈皆伏比右手小三倍此枯澀痹也不可純歸於風亦有火燥相兼乃命一湧一泄一汗其麻立已後以辛涼之劑調之潤燥之劑濡之惟小指次指尚麻張曰病根已去此餘烈也方可針溪谷溪谷者骨空也一日清和往針之用靈樞中雞足法向上臥針三進三引訖復卓針起向下臥針送入指間皆然手熱如火其麻全去劉河間作原病式常以麻與澀同歸燥門中真知病機者也琇按燥為六氣之一其為病至夥而烈然皆病成而變者為多故皆散入諸症不能專立一門一人病濕痰腫痛經年不能行遇乞食道人授一方用豨蘞草水紅花蘿蔔纓白金鳳花水龍骨花椒槐條甘草蒼朮金銀花共十味煎水蒸患處水稍溫即洗之此方已醫好數人續金陵瑣事周漢卿治諸暨黃生背曲須杖行他醫皆以風治之漢卿曰血澀也刺兩足崑崙穴頃之投杖去明史朱丹溪治何縣長年四十餘形瘦性急因作勞背痛臂疼骨節疼足心發熱可與四物湯帶熱下大補丸保和丸共六十粒食前服許知可在歙川有一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌作鬼邪治許曰此正歷節症也以麝香丸三服愈此藥專治白虎歷節風疼痛遊走無定狀如蟲行晝靜夜劇本事方醫說續篇陳良甫治一婦人先自兩足踝骨痛不可忍次日流上於膝一二日流於髀骨甚至流於肩肩流於肘肘流於後溪或如錘鍛或如蟲齧痛不可忍晝靜夜劇服諸藥無效陳診之六脈緊曰此真歷節症也非解散之藥不能愈但用小續命湯一劑而效鄧安人夏月亦病歷節痛不可忍諸藥不效良甫診之人迎與心脈虛此因中暑而得之令先服酒蒸黃連丸衆醫莫不笑用此藥一服即愈自後與人良驗良方宋青龍中司徒顏奮女苦風疾一髀偏痛有人令穿地作坑取雞矢荊葉燃之安脛入坑中熏之有長蟲出遂愈範汪方本草鋼目龔子材治張太僕每天陰即遍身痛如錐刺已經數年左脈微數右脈洪數乃血虛有濕熱也以當歸拈痛湯加生地白芍黃柏去人參數劑而瘳張子和治麻先生妻病代指痛不可忍酒調通經散一錢半夜大吐吐畢而痛減因嘆曰向見陳五曾病此醫以為小蟲傷或以草上有毒物因觸之迂延數月膿盡方已今日觀之可以大笑孫真人云豫以貞觀五年七月十五日夜以左手中指背解著庭木至曉痛不可忍經十日痛日深瘡日高大色如熟小豆色常聞長者之論有此方遂依治之手下即愈痛亦除瘡亦即瘥未十日而平復楊炎南行方著其效云其方取蒲公草搗敷腫上千金方序琇按上二症即世俗所謂木蛇咬也張說似不然之虞天民治一男子四十歲因感風濕得白虎歷節風症遍身抽掣疼痛足不能履地者三年百方不效身體羸瘦骨立自分於死一日夢人與木通湯服愈遂以四物湯加木通服不效後以木通二兩銼細長流水煎汁頓服服復一時許遍身癢甚上體發紅丹如小豆大粒舉家驚惶隨手沒去出汗至腰而止上體不痛矣次日又如前煎服下體又發紅丹方出汗至足底汗乾後通身舒暢而無痛矣一月後人壯氣復步履如初後以此法治數人皆驗潘塤曰豫少時讀書郡學夏月洗足風濕搏於右足外踝注痛十餘年足跟不仁宦遊北方少愈歸老又發前後幾四十年沉痼之疾也嘉靖丁未右臂亦遭此患牽連上下手腕及指將成偏痹用藥宣通驅逐敷貼攻尉百治不效蓋風邪入於筋骨藥力莫能達也豫思骨必有竅喘息呼吸百骸相通邪氣因乘虛而入亦可引之而出又思手居上體出路頗近先從手臂試之心之所注氣必至焉元門運氣之法不過如是乃澄心靜慮每夜側臥右臂向上伸手平嚲以意從肩井骨竅中步步存想而下直至指尖復徐徐引氣而上過兩腕直至肩井旁分一路穿頸入喉出口細細吐之每夜如是行者往復十數遍倦則止行之二三夜意熟路通又四五夜覺骨竅中有一線氣隨意想上行微微牽通至十數夜覺肩井紅腫生小瘡而腹亦微痛蓋惡氣上衝肩井旁一路由喉下墜入腹不能盡從口中吐出也乃用拔毒膏帖肩井瘡潰而成膿腹自利二三遍痛止而右臂豁然通矣因思足外踝歲雖久而病根所發道雖遠而骨竅相通亦如前法側臥伸足以意存想以漸引氣過膝穿腿入腹則惡氣注腹而大痛口不及引之而出也忽一日大瀉四五遍臭味極惡而足病亦瘳此殆神啓愚衷獨得靈異之訣至妙至妙者歟而昔人未之有行也諸記室琇按此與景嶽之父導痰飲之法頗宜參閲張案在飲門孫文垣治姚畫老夫人年幾七十右手疼不能上頭醫者皆以中風治不效益加口渴煩躁診之右脈浮滑左平曰此濕痰生熱熱生風也治宜化痰清熱兼流動經絡乃可瘳也二陳湯倍加威靈仙酒芩白殭蠶秦艽四劑病去如失吳少溪有酒積常患胃脘痛近又腰眼足跟肢節皆痛孫曰此由濕熱傷筋脾肺痰火所致法宜清肅中宮消痰去濕俾經絡流通筋骨自不疼矣切不可作風痛而用風劑以二陳湯加威靈仙蒼朮黃柏五加皮枳實葛根山梔子進之肢節痛減改用清氣化痰丸加瓦楞子蒼朮枳實薑黃用竹瀝神麯打糊為丸調理而安李妓體素肥患痛風自二月起至仲冬諸治不效六脈大而無力手足肢節腫痛兩胯亦痛不能起止肌肉消半日僅進粥二碗月汛兩月一行曰此行痹也以人參白朮薏仁各三錢當歸枸杞杜仲龜板蒼耳子各二錢晚蠶砂秦艽防風各一錢附子甘草桂枝黃柏各五分五帖痛止腫消改用歸芍六君子加薏仁丹參紅花石斛紫荊皮三十帖全愈案中孫胡為友人昵此妓無力贖之孫乃力肩治愈設法卒歸其人為良家婦茲以文繁節之崔百原年四十餘為南勳部郎患右脅痛右手足筋骨俱痛艱於舉動者三月醫作偏風治之不效孫視其色蒼神困性多躁急脈左弦數右滑數時當仲秋曰此濕痰風熱為痹也脈之滑為痰弦為風數為熱蓋濕生痰痰生熱熱壅經絡傷其榮衛變為風也非假歲月不能愈與二陳湯加鉤藤蒼耳子薏仁紅花五加皮秦艽威靈仙黃芩竹瀝薑汁飲之數日手足之痛漸減脅痛如舊再加鬱金川芎白芥子痛俱稍安囑其慎怒內觀以需藥力遂假歸調養半年而愈夏益吾肢節腫痛手足彎腫痛尤甚不能動止凡腫處皆紅熱先起於左手右足五日後又傳於左足右手此行痹症也且喘咳氣湧不能睡脈之左浮數中按弦右滑數乃濕熱風痰壅遏經絡而然以蒼朮薑黃薏仁威靈仙秦艽知母桑皮黃柏酒芩麻黃服下右手腫消痛減夜服七制化痰丸而嗽止得睡再兩劑兩足消半左手經渠列缺穴邊腫痛殊甚用薏仁蒼朮秦艽甘草花粉五加皮石斛前胡枳殼威靈仙當歸旋服旋愈一婦人年五十餘向來小水短少今則右背鹽匙骨邊一點痛夜尤甚已半月治不效且右邊手肢節皆脹痛筋皆暴起肌肉上生紅點子脈兩手皆滑數右尺軟弱乃濕熱傷筋而起痛痹以東垣舒筋湯為主兩帖而愈族孫壯年患遍身筋骨疼痛肢節腫痛痛處如虎齧如火燎非三五人不能起居呻吟不食醫投疏風之劑不應又以乳香沒藥活血止痛亦不應診之六脈浮緊而數曰此周痹也俗名白虎歷節風乃濕熱所致丹溪云腫屬濕痛屬火火性速故痛暴而猛以生地紅花酒芩酒連酒柏秦艽防風羌活獨活海桐皮威靈仙甘草四帖痛減大半再加赤芍當歸蒼耳薏仁去獨活秦艽又八劑全愈陸養愚治孫監司體肥畏熱平時澡浴每以扇代拭後因喪子悲哀不思粥飯惟恣飲自解忽脊背似脹漸及肘膝痠疼醫謂脈氣澀弱骨節痠疼乃血虛火鬱也用四物湯加丹皮山梔香附等十劑不效改用牛膝首烏枸杞輩又十劑亦不效再用鹿膠虎骨河車病如故舉止甚艱時時令人熱手附摩初則輕按如刺良久雖重亦不痛矣脈極浮極滑中按即和診畢以溢飲症對問出何書曰仲景要略云飲水流行歸於四肢當汗出而不汗出名曰溢飲今聞澡浴不拭是外之水濕侵入皮膚矣又悲憂飲酒內經謂悲哀傷肺肺傷則分布之令失且又過飲則內之水濕能不溢於經絡乎其特甚於陽分部位者外濕不拭陰處熱而易干陽處冷而難乾又酒性屬陽故其濕亦並溢於陽分也治法溢飲者當發其汗時天氣頗寒令構一密室四圍生火以熱湯置浴桶中乘腹飽時浴之良久投藥一劑用防風五錢蒼朮三錢麻黃蘇葉羌活獨活威靈仙甘草各一錢煎一二沸熱服一滿碗頻添熱湯浴至汗透方止逾時便覺身體寬暢夜間甚安間三日又為之如是五次遍體輕快病全去矣因浴得病即以浴治之所謂求其屬以衰之也由此類推可以應無窮之變矣邵南橋子壯年患遍身筋骨疼痛肢節腫脹痛處熱如火煅飲食不下呻吟不已其脈浮之而數沉之而澀曰此似白虎歷節症而其因總不出於血虛有火若誤以為風氣投表散燥熱之藥病必增劇用生地當歸白芍紅花酒芩秦艽花粉連翹數劑減半十劑全瘳李士材治陸文學兩足麻木自服活血之劑不效改服攻痰之劑又不效半載後手亦麻左脅下有尺許不知痛癢曰此經所謂著痹也六脈大而無力氣血皆損用神效黃耆湯加茯苓白朮當歸地黃十劑後有小效更用十全大補五十餘劑始安王孝廉久患流火靡藥勿嘗病勢日迫李曰經年之病痛傷元氣非大補氣血不可彼曰數日前曾服參少許痛大作故不敢用李曰病有新久之不同今大虛矣而日從事於散風清火清火則脾必敗散風則肺必傷言之甚力竟不能決遂不起一人遍體疼痛尻體皆腫足膝攣急李曰此寒傷榮血脈筋為之引急內經所謂痛痹也用烏藥順氣散七劑而減更加白朮桂枝一月而愈馮楚瞻治李相國諱之芳當耿逆之變勤勞軍旅左臂強硬作痛上不能至頭下不能撫背醫與驅風活絡不效且大便圓如彈子以書有糞如羊矢者不治深以為憂診之六脈大而遲緩無神知為中氣久虛榮衛不能遍及肢末乃有偏枯之象至其大便亦由中氣不足命門火衰以致運行不健轉輸遲滯糟粕不能連接直下猶蜣蜋之轉丸故圓而且大非若關格之病津液燥槁腸胃窄細致黑小如羊糞者然宜空心服八味加牛膝杜仲以培其本食遠以加減歸脾加甜薄桂以壯其標元陽得旺則運行健而大便自調氣血既充則肢節和而臂強自愈矣如法而痊精神更倍盧不遠治張二如病脊膂痛艱於起拜形傴僂楚甚脈之以為精虛須龜鹿四仙膏一大劑服三月方可愈彼不信越三年再求治用四仙膏一料佐以透冰丹二十粒全愈或問故曰此房後風入髓中也骨氣不精故屈伸不利用透冰以祛腎風用四仙以填骨髓病去精滿百體從合矣顧渠三年之中未嘗不服補精血祛風邪之藥不知藥不可籠統而用須精專必使之填髓入骨中透風自骨出斯為合法耳孫文垣治程參軍年六十四向以乏嗣服下元藥太多冬月單袴立溪邊督工受寒致筋骨疼痛肩井缺盆腳膝跟踝及骨節動處皆紅腫而痛臥床三年或認為虛為寒為風為濕百治不效腿間大肉盡消惟骨節合處腫大而痛脈之弦澀有力知為濕熱痰火被寒氣凝滯固澀經絡也所喜目中精神尚在胃氣未全損其小便在器少頃則澄結為砂色紅而濁兩膝下及腳趾皆生大瘡瘡靨如靴釘狀皆由向服春方所致為先逐經絡凝滯然後健脾消痰俾新痰不生血氣日長後以補劑收功斯得也以新取威靈仙一斤裝新竹筒中入燒酒二斤塞筒口刮去青皮重湯煮三炷官香為度取出曬乾為末用竹瀝打糊為丸桐子大早晚酒送一錢日服二次五日後大便去稠黏痰積半桶腫痛減大半改以人參石斛蒼朮黃柏薏仁蒼耳子牛膝烏藥葉龜板紅花犀角木通煎服二十帖又用前末藥服三日又下痰積如前之半仍以前藥服半月又服末藥三日腹中痰漸少乃以虎骨晚蠶砂蒼朮黃柏丹參杜仲牛膝莖葉薏仁紅花五加皮蒼耳子龜板酒打糊為丸梧子大每空心服七八十丸外以丹溪保和丸食後服半年全愈孫質庵患痛風兩手自肩顒巨骨下臂臑上及曲池肘彎處三里上以至手梢兩足自膝及跟尻腫痛更甚痛處熱火流注也飲食少伏褥者三年脈之皆弦細而數面青肝色肌瘦火多大小腿肉皆瘦削三陰虛損曰此得之稟氣弱下虛多內以傷其陰也燕地多寒今血虛則筋失養故榮不榮於中氣為寒束百骸拘攣故衛不衛於外是名周痹治當養血舒筋疏濕潤燥使經絡通暢待痛止即以大補陰血之劑實其下元先與五加皮蒼朮黃柏蒼耳子當歸紅花薏仁羌活防風秦艽紫荊皮二十劑筋漸舒腫漸消痛減大半更以生地龜板牛膝蒼朮黃柏晚蠶砂蒼耳子薏仁海桐皮當歸秦艽三十劑腫痛全減戒之曰難足而易敗者陰也須痛絶酒色以固根本斯刀圭可恃乃用仙茅為君杞子牛膝鹿膠虎骨人參為臣熟地黃柏晚蠶砂茯苓蒼耳子為佐桂心秦艽澤瀉為使蜜丸服百日腿肉長充精神復舊俞東扶曰此案論治處方俱精當葉案有藍本於此者薛立齊治一男子先腿腫後四肢皆痛遊走不定至夜益甚服除濕敗毒之劑不應診其脈滑而澀此濕痰濁血為患以二陳湯加蒼朮羌活桃仁紅花牛膝首烏治之而愈凡濕痰濕熱或死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和焉能得愈一男子肢節腫痛脈遲而數此濕熱之症以荊防敗毒散加麻黃二劑痛減半以檳榔敗毒散四劑腫亦消更以四物湯加二朮牛膝木瓜數劑而愈一婦人兩腿作痛時亦走痛氣短自汗諸藥不應診之尺脈弦緩此寒濕流注腎經也以附子六物湯治之而愈但人謂附子有毒多不肯服若用童便炮製何毒之有況不常服何足為慮薛中氣不足以補中益氣湯加附子服之三年何見其毒也經云有是病用是藥馮楚瞻治唐某患左足左手骨節疼痛勢如刀割旦夕呼號既而移至右手右足皆遍矣或用祛風活絡之劑不效見其口燥咽乾誤作流火投以涼劑幸而吐出神氣疲困六脈洪弦此氣血久虛筋骨失養將成癱瘓之候惟宜大用熟地當歸白芍養血為君銀花秦艽少借風勢以達藥力於筋骨為臣牛膝續斷杜仲以調筋骨為佐更用桂枝松節以鼓舞藥性橫行於兩臂為引再用參術以固中培元調理半月漸瘳後以生脈飲送八味丸加牛膝杜仲鹿茸五味子各四五錢日中仍服前劑始能步履更以大補氣血強筋壯骨之藥以收全功未幾其室人因日夜憂勞亦患是症六脈沉微右手足疼痛既而不流於左而竟攻之於里胸脘痞悶噁心疼痛欲絶知為內傷日久寒邪不為外達直中陰分宜急溫之以人參白朮各五錢肉桂附子各二錢濃煎徐徐溫服次日脈少起胸中病痛悶大減身有微熱左亦略疼此陽氣還表寒邪欲外散之機也照方再服內症漸平惟手足之痛尚在然亦不甚以參術補中為君歸芍養血為臣杜仲續斷牛膝秦艽桂枝舒筋活絡為佐全愈夫痛風止有五痹皮痹脈痹肌痹骨痹筋痹未聞有臟腑之痹也然經曰寒氣勝者為痛痹又曰其留連筋骨間者疼久其留皮膚間者易已其入臟者死可不慎歟薛立齊治一婦人肢節作痛不能轉側惡風寒自汗盜汗小便短雖夏亦不去衣其脈浮緊此風寒客於太陽經用甘草附子湯一劑而瘥一婦人月經不調且素有痛風遇勞必作用衆手重按稍止此氣血俱虛用十全大補加獨活而痛痊用六味丸逍遙散而經調一婦人肢體作痛面色萎黃時或赤白發熱惡寒吐瀉食少腹痛脅脹月經不時或如崩漏或痰盛喘嗽頭目眩痛或五心煩熱口渴飲湯或健忘驚悸盜汗無寐等症臥床年許悉屬肝脾虧損氣血不足所致用十全大補加味歸脾兼服月餘諸症悉痊張仲景治婦人六十二種風及腹中血氣刺痛以紅藍花酒主之紅花一味以酒一大碗煎減半頓服一半頃之再服喻嘉言治張令施弟傷寒壞症兩腰僂廢徹夜痛叫百治不效脈亦平順無患其痛則比前大減曰病非死症但恐成廢人矣此症之可轉移處全在痛如刀刺尚有邪正互爭之象若全不痛則邪正混為一家相安於無事矣今痛覺大減實有可慮病者曰此身既廢命安從活不如速死欲為救全而無治法諦思良久謂熱邪入兩腰血脈久閉不能復出止有攻散一法而邪入既久正氣全虛攻之必不應乃以桃仁承氣湯多加肉桂附子二大劑與服服後既能強起再仿前意為丸服至旬余全安此非昔人之已試一時之權宜也然有自來矣仲景於結胸症有附子瀉心湯一法原是附子與大黃同用但在上之症氣多故以此法瀉心然在下之症多血獨不可仿其意而合桃仁肉桂以散腰間血結乎後江古生乃弟傷寒兩腰僂廢痛楚不勞思索徑用此法二劑而愈陳洪章治沈沃田年七十餘左臂及指拘攣不能伸舒食減神憊或謂老人虛弱用補劑以致日甚陳診之曰此由風濕邪郁胸脾波及四肢用二陳湯加芒硝砂仁以薏苡仁三兩煎汁煎藥連服四劑病去大半去硝仍用二陳又服六劑而全愈沃田手札新案立齊治一婦人肢節腫痛脛足尤甚時或自汗或頭痛此太陽經濕熱所致用麻黃左金湯二劑而愈昔有人患足痹者趁舟見舟中一袋以足倚之比及登岸足以善步及詢袋中何物乃木瓜也本草備要王執中雲有貴人手中指攣已而無名指亦攣醫為灸肩顒曲池支溝而愈支溝在腕後三寸或灸風池多有不灸支溝或灸合谷云李景中中丞傳筋骨疼甚如夾板狀痛不可忍者將騾子修下蹄爪燒灰存性研末或酒或白湯調服立愈廣筆記雄按此方治臁瘡久不愈者甚效乾者麻油調敷濕者糝之馬元儀治陳氏婦患痛痹手足瘛瘲周身盡痛不能轉側口乾躁煩脈之弦數兼澀此陽明津液不足則生熱熱極則生風手足瘛瘲者風淫末疾也口乾煩躁者火邪內熾也惟專滋陽明不治風而風自息不治痛而痛自除矣用生首烏一兩生地五錢黃連黃芩秦艽半夏曲枳殼桔梗各一錢四劑症減六七又數劑而痊張氏子周身掣痛頭不可轉手不能握足不能運如是者半月矣診之兩脈浮虛浮雖風象而內痛者脈亦浮而無力以脈參症當是勞倦傷中陽明不治之候也陽明者五臟六腑之海束筋骨而利機關不治則氣血不榮十二經脈無所稟受而不用矣衛中空虛榮行不利故相搏而痛也法當大補陽明氣血不與風寒濕成痹者同用人參二錢黃耆當歸各三錢炙甘草桂枝紅花各五分秦艽一錢兩劑脈和而能轉側去桂枝加白朮肉桂杞子熟地等調理半月而安夫病有虛實不同治法因之而異風寒濕所致者氣滯於內而為痹邪踞於表而為痛病之實者也陽明中虛所致者血不養筋而為痛氣虛於內而不運病之虛者也其實者急在邪氣去之不速留則生變也其虛者急在正氣補之不早愈久愈劇也凡病皆然不獨此也書之以為見病治病者鑑袁某患痛痹身及手足掣痛徹夜不得安臥發熱口燥胸滿中痛兩脈弦右關獨大此胃熱壅閉為陽明內實症也陽明之氣不能充灌周身十二經脈不得流利故肢體不能自如琇按此與上條一虛一實恰是對面此類觀之最足啓發心思增識力以調胃承氣加黃連秦艽一劑大便得通再劑症減六七改用清胃和中之劑調理而愈吳漢章痛風發熱神昏妄言見鬼手足瘛瘲大便不行此胃津傷而肝木生火內熾則便閉神昏外攻則發熱身痛也法當滋其內則火自息風自除痛自止矣用生首烏蔞仁黃連知母枳殼桔梗桂枝秦艽一劑漸減但心神不安如在舟車雲霧中不能自主改用人參炙草生地麥冬遠志棗仁茯神貝母橘紅羚羊角三劑再與歸脾湯調理數日而安杜漢飛患周身流走作腫手不能握足不能履已三月脈之浮大而數發熱口乾此陰虛生內熱熱勝則生風風性善行傷於筋脈則縱緩不收逆於肉理則攻腫為楚也用生地五錢酒炒芩連各一錢紅花五分蓋苦以勝熱辛以散風也二劑得酣睡數劑而諸苦若失治臂腿之間忽一兩點痛若著骨不可忍芫花根研為細末米醋調隨大小敷之立效醫云此陶成一醫者方曾以治一婦人産後得此疾者良驗但敷貼不住須以紙花覆其上用白絹札定也百乙方立齊治徐工部宜人先兩膝痛後至遍身骨節皆痛脈遲緩投羌活勝濕湯及荊防敗毒散加滲濕藥不應次以附子八物湯一劑痛悉退再服而愈若脈洪數而痛者宜服人參敗毒散張子和治一稅官病風寒濕痹腰腳沉重浮腫夜則痛甚兩足惡寒經五六月間猶棉纏靴足腰膝皮膚少有跣露則冷風襲之流入經絡其痛轉劇走注上下往來無定其痛極處便擁急而腫起肉色不變腠理間如蟲行每遇風冷病必轉增飲食轉減肢體瘦乏須人扶掖猶能行立所服者烏附薑桂種種燥熱燔針著灸莫知其數前後三年不愈一日命張脈之其兩手皆沉滑有力先以導水丸通經散各一服是夜瀉二十餘行痛減過半漸服赤茯苓湯川芎湯防風湯此三方在宣明論中治痹方是也日三服煎七八錢漐漐然汗出又作玲瓏灶法熏蒸若熱病反劇諸汗法古方亦多有之惟以吐發汗者世罕知之故嘗曰吐法兼汗良以此夫常仲明病濕痹五七年矣張令上湧之後可瀉五七次其藥則舟車浚川通經神祐益腎自春及秋必十餘次方能愈公之疾不必針灸與令嗣皆宜湧但臘月非其時也欲俟春時恐余東邁今姑屏病之大勢至春和時人氣在上可再湧之以去其根卒如所論而愈繆仲淳治高存之長郎兩年腹痛服參地歸芍陳皮白朮等藥而愈愈後又患臂痛每發一處輒於手臂指屈伸之間腫痛不可忍三四日方愈痛時在手即不能動曰此即前病之餘虛火移走為害也立丸方凡四五更定服至此方全愈生地一斤丹皮蒸六兩萸肉八兩茯苓人乳拌蒸六兩山藥八兩澤瀉六兩天冬六兩麥冬八兩五味八兩牛膝酒蒸八兩黃柏蜜炒八兩枸杞八兩砂仁二兩甘菊花八兩何首烏一斤虎前脛骨二對酥炙蒺藜炒去刺十兩菟絲三兩蜜丸每服五錢空心白湯下一婦人臂痛肢攣不能伸屈遇寒則劇脈緊細正陳良甫所謂肝氣虛為風寒所中流於血脈經絡搏於筋筋不榮則乾急而為痛先以舒筋湯更以四物湯加丹皮澤蘭白朮治之而痊亦有臂痛不能舉或轉左右作痛由中脘伏痰脾氣滯而不行宜茯苓丸或控涎丹治之胡縣丞遍身走痛兩月後左腳面結腫未幾腿股又患一塊脈輕診則浮重診遲緩此血氣不足腠理不密寒邪襲虛而然以加減小續命湯四劑及獨活寄生湯數劑疼痛頓去更以托裡裹倍加參耆歸朮百帖而愈施沛然治許戶部贊勿患痛痹不能步履者浹旬矣遍治無效診之曰病得之暮不收拒數見風露立而使內擾其筋骨許曰然然未有語其因者疇昔之夏祝融肆虐竹筐幾床如焚如炙移榻露處涼飈拂拂越女揮扇齊姬薦席行女坐臥匪朝伊夕豈以斯故乃攖厥疾曰無難也當為起之乃飲以丹參虎骨酒萆薢蠲痹湯不一月而病若失步履如常矣蔣仲芳治張蒔官年十九春來遍身筋骨疼痛漸生小骨久藥不效視其身纍纍如龍眼蓋筋非骨也因濕邪氣入筋縮結而然譬之頸癧結核而硬豈真骨乎遂針委中大椎以治其後內關三里以治其前內服當歸生地白朮秦艽桂枝桑枝炙草羌活米仁牛膝生薑入酒三分以助藥力數日其骨漸小一月盡消劉云密治一女子年三十外病冬月怯寒並頭痛背重墜而痛下引腰腿及腿肚痛甚右臂痛不能舉醫以五積散為主加羌活烏藥以散凝寒而行滯似亦近之然但除怯寒與腰痛而頭腿肚及右臂之痛只小愈耳至背之重墜而痛毫未減蓋止知散寒而不知達陽止知行胃腎之氣而不知達胸中之陽也夫陽氣受於胸中而背固胸之府也因簡方書有以薑黃為君而用羌活白朮甘草四分之一乃加入附子三分服頭飲則諸痛去其三再如前劑用其三分之一與前渣同煎服竟而諸症霍然此以薑黃達上焦之陽為其能不混於治血且不等於治氣之味也徐靈胎曰天下有治法不誤而始終無效者此乃病氣深痼非泛然之方藥所能愈也凡病在皮毛榮衛之間即使病勢極重而所感之位甚淺邪氣易出至於臟腑筋骨之痼疾如勞怯痞膈風痹痿厥之類其感非一日其邪在臟腑筋骨如油之入面與正氣相併病家不知屢易醫家醫者見其不效雜藥亂投病日深而元氣日敗遂至不救不知此病非一二尋常之方所能愈也今之集方書者如風痹大症之類前録古方數首後附以通治之方數首如此而已此等治法豈有愈期必當遍考此病之種類與夫致病之根原及變遷之情狀並詢其歷來服藥之誤否然後廣求古今以來治此症之方選擇其內外種種治法次第施之又時時消息其效否而神明變通之則痼疾或有可愈之理若使執數首通治之方屢試不效其計遂窮未有不誤者也故治大症必學問深博心思精敏又專深久治乃能奏效世又有極重極久之病諸藥罔效忽服極輕淡之方而愈者此乃其病本有專治之方從前皆系誤治忽遇對症之藥自然應手而痊也大活絡丹治一切中風癱瘓痿痹痰厥拘攣疼痛癰疽流注跌撲損傷小兒驚癇婦人停經白花蛇烏梢蛇威靈仙兩頭尖俱酒浸草烏天麻煨全蠍去毒首烏黑豆水浸龜板炙麻黃貫衆炙草羌活官桂藿香烏藥黃連熟地大黃蒸木香沉香以上各二兩細辛赤芍沒藥去油另研丁香乳香去油另研殭蠶天南星薑製青皮骨碎補白蔻安息香酒熬製附子黃芩蒸茯苓香附酒洗浸焙元參白朮以上各一兩防風二兩半葛根虎脛骨炙當歸各一兩半血蠍另研七錢地龍炙犀角麝香另研松脂各五錢牛黃另研冰片另研各一錢五分人參三兩共五十味為末蜜丸如桂圓核大金箔為衣陳酒送下徐靈胎曰頑痰惡風熱毒瘀血入於經絡非此方不能透達凡肢體大症必備之藥也方書亦有活絡丹只用地龍乳香等四五味此乃治藜藿人實邪之方不堪用也葉天士治吳某脈弦小數形體日瘦口舌糜碎肩背掣痛肢節麻木膚膝瘙癢目眩暈耳鳴已有數年此操持積勞陽升內動旅動爍筋損液古謂壯火食氣皆陽氣之化先擬清血分中熱繼當養血熄其內風安靜勿勞不致痿厥生地元參天冬丹參犀角羚羊角連翹竹葉心丸方何首烏生白芍黑芝麻冬桑葉天冬女貞子茯神青鹽腫脹黃錦芳曰水腫之症至為繁雜有風有水風濕風痰風熱風毒與夫水濕水氣濕熱食積諸虛夾雜等症然總不越以水為害大約陽臟多熱熱則多實陰臟多寒寒則多虛先滯於內而後及於外者多實先腫於表而後及於里者多虛小便紅赤大便閉結者多實小便清利大便稀溏者多虛脈滑而不遠者多實脈浮而微細者多虛形色紅黃聲音如常者多實形色憔悴聲音短促者多虛少壯氣道壅滯者多實中衰勞倦氣怯者多虛若但腫而不脹則病在水而氣不堅凡一切枳實檳榔枳殼丁香白蔻故紙沉香下氣迅利之藥切勿輕投猶之臌脹在氣則一切升提呆補之藥亦勿輕用也余族一人病水腫六脈浮濡滿指而右寸尤甚按其腫處浮而不起知其水溢於肺所服之藥皆破氣破血之品病安得愈以連翹梔子茯苓澤瀉牛膝滑石葶藶木通防風蒼朮輕平之藥投之數服而愈葉天士治陳某腫脹進神芎導水丸二日所下皆黏膩黃濁形色前議腑氣窒塞水濕黏滯濁攻犯肺為痰嗽水漬脈隧為浮腫大凡經脈六腑之病總以宣通為是內經云六腑以通為補今醫不分臟腑經絡必曰參術是補豈為明理然肢節足跗之濕出路無由必針刺以決其流內外冀可皆安戊己丸三錢用二日後再進前藥一服徐靈胎曰句句名言腹滿等症必須有出路故人兼以針刺為治但其道甚微不知其理而蠻針之反有大害又曰脹滿之為病即使正虛終屬邪實故古人慎用補法又脹必有濕有濕則有熱內經所以指為熱症若用溫補之藥即兼通利之品而臣不勝主貽誤必多又曰脹滿必有有形之物宜緩緩下之葉天士治朱某初因面腫邪干陽位氣壅不通二便皆少桂附不應即與導滯滯屬有質濕熱無形入肺為喘乘脾為脹六腑開合皆廢便不通爽溺短渾濁時或點滴舌絳口渴腑病背脹臟病腹滿更兼倚倒左右腫脹隨著處為甚其濕熱布散三焦明眼難以決勝矣經云從上之下者治其上又云從上之下而甚於下者必先治其上而後治其下此症逆亂紛更全無頭緒皆不辨有形無形之誤姑以清肅上焦為先飛滑石錢半大杏仁去皮尖十粒生薏仁三錢白通草一錢鮮枇杷葉去毛三錢茯苓皮三錢淡豆豉錢半黑山梔殼一錢急火煎五分服此手太陰肺經藥也肺氣窒塞當降不降杏仁微苦則能降滑石甘涼滲濕解熱薏仁通草淡而滲氣分枇杷葉辛涼能開肺氣茯苓用皮謂諸皮皆涼梔豉宣其陳腐鬱結凡此氣味俱薄為上焦藥仿齊之才輕可去實之義徐靈胎曰喘脹用此方甚合足見心思靈巧如此等治法真堪匯入醫案一宦者年已近耄因勞倦傷脾脾虛病瘧瘧愈而脾胃之虛日益旋病腫此時飲食尚進起居亦不甚衰正宜補中益氣湯隨症加減以調脾胃元氣後用金匱腎氣丸補腎行水使腫自消始為至治乃日以澤瀉豬苓柴胡葛根厚朴陳皮等藥朝餌暮餐咸不知返兩月後真氣克削無餘腫脹彌劇喘息不得眠者六晝夜更一醫猶以為肺病而用蘇子芥子二母二冬之類卒至湯飲俱廢而死王宇泰曰手足浮腫未必成水也服耗氣利水之藥而不已則水病成矣趙養葵曰腎虛不能納氣歸元而作喘徒從事於肺者執流而忘源也惜哉扁鵲玉壺丸治命門火衰陽氣暴絶寒水臌脹殊有神功凡硫黃八兩配真麻油八兩以硫打碎入冷油內燉爐上炭宜微勿烈以桑條徐調候硫溶盡即傾入大水內急攙去上面油水其色如金取缸底淨硫見若干兩仍配麻油若干兩照前溶傾其色如絳第五轉用肥皂四兩水中同煮六時第六轉用牙皂四兩水中同煮六時投淨制硫之油攙去其水其色如硫火之紫第七轉用爐中炭灰淋鹼水制六時第八轉用水豆腐制六時拔淨皂鹼之性第九轉用田字草出水荒稻田中葉如田字八月九月採搗汁和水煮六時臨用研如飛面凡淨硫一兩配炒糯米粉二兩或水法或濕搗為丸每服以三分為準漸加至一錢開水送下竇材嘗因路過衢州野店見一婦人遍身浮腫露地而坐竇曰何不在門內坐婦曰昨日蒙土地告我明日有扁鵲過此可求治病我故於此候之竇曰汝若能聽我我當救汝婦曰汝非醫人安能治病竇曰我雖非醫然得扁鵲真傳有奇方故神預告汝遂與保命延壽丹十粒服之夜間小便約去二升五更覺飢二次又服十五粒點左右命關穴灸二百壯大便下白膿五七塊半月全安婦人曰真扁鵲再生也琇按材為紹興間人著有扁鵲心書曾進呈且有達天青詞謂其書得傳可以濟人而非妄也此案在書中為首則故表其為扁鵲之名如此材曾為巡檢官一人病四肢皆腫氣促食則脹悶止吃稀粥令日服金液丹百粒至四日覺大便滑再二日乃令吃麵食亦不妨蓋治之早也竇氏治疾純用大熱之劑腫脹之真陽衰絶者用之能收捷效若誤用於濕熱之症亦立致奇禍用者審之一婦人病面腳皆腫飲食減少世醫皆作血虛治之不效竇曰非血病乃脾胃虛也令日服延壽丹十粒全真丹五十粒至十日覺大便滑病愈張子和治張小一初病疥爬搔變而成腫喘不能食張斷為風水水得風而暴腫故遍身皆腫先令浴之乘腠理開豁就燠室中用酸苦之劑加全蠍一枚吐之節次用藥末至三錢許出痰約數升汗隨湧出腫去八九分隔一日臨臥向一更來又下神祐丸七十餘粒三次咽之至夜半動一行又續下水煮桃仁丸六十丸以麝香湯下又利三四行後二三日再以舟車丸通經散及白朮散調之愈張子明之母極肥偶得水腫四肢不舉張令上湧汗而下泄之去水三四斗初下藥時以草儲布囊高支兩足而臥其藥之行自腰以上水覺下行自足以上水覺上行水行之狀行如蛇走墜如線牽四肢森然涼寒會於臍下而出不旬日間病大減餘邪未盡張更欲用藥竟不能從其言張承應年幾五十腹如孕婦面黃食減欲作水氣或令服黃耆建中湯及溫補之劑小溲涸閉張曰建中湯攻表之藥也古方用之攻裡已誤矣今更以此取積兩重誤也先以湧劑吐之置火於其旁大汗之次與豬腎散四錢以舟車丸引之下六缶殊不困續下兩次約三十餘行腹中軟健啖如昔常仲明曰向聞人言瀉五六缶人豈能任及問張承應渠云誠然乃知養生與攻疴本自不同今人以補劑療病宜乎不效此與葛某之論同常說丹溪大不然之因謂子和書非手撰乃出自麻知幾等元時名醫宋會之治水蠱法用老絲瓜一枚去皮及子剪碎與巴豆二七粒同炒視巴豆褐色為度去巴豆存絲瓜又用黃米如絲瓜之數同炒視米褐色去絲瓜存米研末清水和為丸梧桐子大每服百丸白湯下蠱水盡從大便中出而疾除矣其言曰巴豆逐出水者也而患其迅藉絲瓜取其氣絲瓜有筋象人身脈絡得引巴豆之氣達諸脈絡而仍用米者投其胃氣也仍去絲瓜者畏其受巴豆之氣太甚也鮮于樞為之記如此峨眉僧治一人肚腹四肢腫脹用乾雞矢一升炒黃以酒醅三碗煮一碗濾汁飲之名牽牛酒少頃腹中氣大轉動利下即腳下皮皺消也未盡隔日再作仍以田羸二枚滾酒瀹食白粥調理而愈其人牽牛來謝故以名方本草綱目魏秀才妻病腹大而鼓四肢骨立不能貼席惟衣被懸臥穀食不下者數日矣忽思鶉食如法進之遂暈劇少頃雨汗莫能言但有更衣狀扶而圊小便突出白液凝如鵝脂如此數次下盡遂起蓋中焦濕熱積久所致也董炳集驗方張路玉治王庸若水腫嘔逆溲便點滴不通或用五苓八正不應六脈沉細如絲因與金液丹十五丸溺如泉湧勢頓平後以濟生腎氣培養而安李時珍治一人妻自腰以下胕腫面目亦腫喘急欲死不能伏枕大便溏滯小便短少服藥罔效其脈沉而大沉主水大主虛乃病後冒風所致是名風水也用千金神祕湯加麻黃一服喘定十之五再以胃苓湯吞深師薷術丸二日小便長腫消十之七調理數日全安本草綱目俞東扶曰金液丹神祕湯人所罕用而善用之則各奏奇功因思古方具在簡冊特患尋不著對頭帽子耳神祕湯乃生脈散合二陳湯去麥冬茯苓加紫蘇桑皮桔梗檳榔生薑三片為引施於此證恰好加麻黃更好並非八寸三分通行之帽也邱汝誠友人朱升患酒積舉身黃腫無能治者邱視之曰可救也出囊中赤藥七丸以酒下之須臾下黃水滿器腹即消其半下五丸遂愈揮塵新談陳三農治一人患腹脹滿服補中六君其脹減十之七八誤服行積丸遂致食減脹甚脈細數以補中湯加乾薑肉桂各五分附子七分吳茱萸一分姜水煎飲愈一人腹脹時痛吐小便利則大便不通大便利則小便不通用炒乾姜三錢升麻一錢五分吳茱萸微炒五分煎服愈原注此寒邪痞塞於膀胱也時吐者寒迫火上也一人患單腹脹將愈因惱怒腹脹而痛口乾身熱食減膻中近右作痛按之則止用人參乾薑炒半夏各七分白朮茯苓蒼朮各二錢陳皮神麯各五分甘草肉桂各二分吳茱萸七釐服之愈一人頭面四肢浮腫帶黃色行動腳軟此脾胃虛弱只宜健脾固中氣為主用人參白朮茯苓陳皮甘草漸愈孫文垣治陳光祿松巒常五更胸脅脹痛遍治無效診之右寸軟弱左平兩尺亦弱曰肺腎二經之不足也補而斂之可無恙矣以補骨脂萸肉人參各三兩鹿角膠鹿角霜各五兩杜仲巴戟白茯苓車前子各一兩五錢山藥二兩鹿角膠酒化為丸空心淡鹽湯送下又以御米穀去筋膜蜜水炒三兩訶子麵煨去核一兩陳皮一兩半煉蜜為丸五更枕上白湯送下一錢服一月病愈溧水令吳湧瀾夫人每五更倒飽必瀉一次腹常作脹間亦痛脈之兩手寸關洪滑兩尺沉伏曰此腸胃中有食積痰飲也乃與總管丸三錢生薑湯送下大便雖行不甚快利又以神授香連丸和之外用滑石甘草木香枳殼山楂陳皮白芍酒連調理而安熊成八官江右南昌人早起行路忽見邪火兩團滾滾而來大驚駭次日腹中膨悶漸成脹滿面白皮薄兩手瘦削兩足皆有浮氣按之窅然不起濕也行動氣促形神俱弱醫謂神弱氣促胸腹青筋縷縷如貫索小水清長形症如此脾虛所致以參苓白朮散投之十日堵然如鼓中有一塊纍然突出堅若鐵石臍已平滿勺粒不入醫與決曰若疾法在不治盍早歸毋作異鄉鬼也孫脈之沉弦有力曰非氣虛中滿之候前補大驟適助長耳顧今黴雨途遙濕熱病值濕熱時即歸未能時刻可到且治非良手則大事去矣豫有一藥尚可冀生也以琥珀調中丸日二進之一進甚甘再進稱快十日腹漸寬塊漸熔半月盡消去青筋俱斂改以平胃散加蘿蔔子薑黃薏仁木香調養一月飲食大加兩足之浮亦愈利水消積法喻嘉言治劉泰來年三十二歲面白體豐夏月用冷水灌汗坐臥當風新秋病瘧三五發後用藥截住遂覺胸腹脹滿不旬日外腹大胸高上氣喘急二便全無食飲不入能坐不能臥能俯不能仰勢頗危急醫以二便不通下之不應商用大黃二兩作一劑喻駭曰此名何病而敢放膽殺人耶醫曰傷寒腸結下而不通惟有大下一法何謂放膽喻曰世有不發熱之傷寒乎傷寒因發熱故津液枯槁腸胃燥結可用下藥以開其結然有不轉矢氣者不可攻之戒正恐誤治太陰經之腹脹也此病因腹中之氣散亂不收故水液隨氣橫溢成脹全是太陰脾氣不能統攝所致一散一結相去天淵再用大黃猛劑若不脹死定須腹破矣醫唯唯辭去病家仍欲服之喻乃擲去其藥另與理中湯畏不敢服欲俟來日喻曰腹中真氣漸散今夜子醜二時陰陽交剝之界必大汗眩暈難為力矣不得已令煎就以待既而果發暈即服下得睡片時次日略覺減可遂以三劑作一服加人參至三錢服後又進一大劑少加黃連脹已大減謂大便未通不敢進食但飲米湯喻曰腹中原是大黃推蕩之滯糞以膀胱脹大撐住大腸不得出耳於是以五苓散與之以通膀胱之氣藥才下咽即覓圊小便先出大便隨之滯下半桶而愈一月後小患傷風取藥四劑與葷酒雜進及傷風未止並謂治脹亦屬偶然矣溫補法吳聖符單腹脹腹大如箕堅硬如石胃中時生酸水吞吐皆然經年罔效蓋由醫輩不察病之所起與病成而變之理耳惟腎氣丸一方猶是前人成法但此病用之譬適燕而南其指也夫腎氣丸為腫脹之聖藥者以能收攝腎氣使水不泛溢耳今小水一晝夜六七行水無泛溢之虞也且謂益火之源以消陰翳耳今酸味皆從火化尚可更益其火乎又謂指腹脹為食積用局方峻攻不足論矣原是疾起於脾氣不宣鬱而成火使初時用火鬱發之之法升陽散火病霍然矣逮至郁之愈湮漸為脹滿則身中之氣一如天地不交而成否塞病成而變矣猶進檳榔厚朴萊蔔之類以耗氣助火於是病轉於胃胃中之熱有如麴櫱俟谷飲一入頃刻釀成酢味夫新谷芳甘胃所喜也舊谷酸腐胃所惡也故有時新入而舊出矣人身天真之氣全在胃口似是而非之語節之不盡土曰稼穡作甘者也木曰曲直作酸者也甘反作酸木來侮土喻君但知腫脹為脾氣不宣未知此病原由木鬱也至春木旺則難治矣今欲反酸為甘但有用剛藥一法以氣味俱雄之藥能變胃而不受胃變也參伍以協其平但可用剛中之柔不可用柔中之剛八味丸柔中之剛也於六味作酸藥中入二味止酸藥烏能取效惟連理湯丸剛有柔以濟其剛可收去酸之績矣酸去而後治脹破竹之勢乃成原注善後多年聞用黃柏知母之屬始得全效更奇何奇之有門人問曰聖符之病酸止脹消已奏全績不知意外尚有何患請示善後之法喻曰聖符之病乃自脾入傳於胃今酸去脹消亦自胃復返於脾善後之法以理脾為急而胃則次之設胃氣未和必不能驅疾然使胃能容受而脾未能健運則倦怠多睡惟樂按摩者有之受食稍多身重異常者有之登高涉險則覺上重下輕舉足無力者有之食後喜溉沸湯藉資於有形者之熱者有之其病之餘夏熱為疸秋清為瘧燥勝脾約濕勝脾瀉者有之故理脾則百病不生不理脾則諸疾續起久之乃入於胃也至若將息失宜飲食房勞所犯脾先受之猶可言也設忿怒之火一動則挾木邪直侵胃土原病陡發不可言也又其始焉酸脹胃中必另創一膜囊若贅龐者乃肝火衝入透開胃膜故所聚之水暗從木化變酸久之漸滿膜囊垂大其腹之脹以此為根觀其新谷入口酸物迸出而芳谷不出及每食飴糖如吸筒入喉酸水隨即湧出皆可徵也若非另一窠臼則其嘔時宜新腐迸出如膈氣之類何得分別甚清耶余訂善後之方用六君子煎調赤石脂末蓋因其膜囊既空而以是填之俾不為異日患耳昔治廣陵一血蠱服藥全消左脅肋露病根一條如小枕狀以法激之嘔出黑汙鬥許余從大便泄去始消每思蠱脹不論氣血水痰總必自闢一字方可久聚內經論五臟之積皆有定所何獨於六腑之聚久為患如蠱脹等類者遂謂漫無根柢區界乎是亦可補病機之未逮雄按天真在胃的是名言下文木來侮土未嘗不知為木鬱也李士材治何太學夏月好飲水一日候文宗發放自晨抵暮為炎威所迫飲水計十餘碗歸寓便脹悶不能食越旬日腹如抱甕氣高而喘診之皮薄而光水積不化也且六脈堅實其病暴成法當利之遂以舟車丸每服三錢香薷湯送再劑二便湧決如泉復進一錢五分腹減如故用六君子湯十帖而愈潔淨府法方太和大怒後復大醉至明日目下如臥蠶脾受水濕居七日肢體皆腫不能轉側二便不通煩悶欲絶診之脈沉且堅當逐其水用疏鑿飲子一服二便快再服四肢寬更以五皮飲三日隨愈錢賞之酒色無度秋初腹脹冬杪遍體腫急臍背平在法不治乃與大劑腎氣方料煎服兼進理中湯服五日無效可見病重藥輕藥即中病亦復無濟古今如此延誤而死者頗多虛實症皆有之也李欲辭歸彼自知必死堅求再治即不起無怨也勉用人參一兩生附子二錢牛膝茯苓各五錢二日之間去小便約四十餘碗腹有皺紋計服人參四斤附子薑桂各一斤半載而痊極虛大補法李都憲積勞多郁肢體脹滿以自知醫輒用胃苓湯加枳殼三月以來轉加痞悶脈之沉澀而軟視其色黃白而枯此虛症也宜大溫大補始猶不信爭之甚力僅用參二錢稍覺寬舒欲加桂附執不肯從李曰症坐虛寒喜行攻伐已見既執良言不納雖有扁倉豈能救耶兩月果歿徐錦衣稟畀素壯病餘肥甘過度腹脹氣粗診之脈盛而滑按之不甚虛宜以利氣之劑少佐參術惑於旁議旦暮更醫李復診曰即畏參不用攻擊之劑決不可投也後與他醫商之仍用理脾疏氣之劑而安消補兼行法吳孚先治一人患腫脹皮繃急脈之系脾腎虛用二陳去甘草加人參乾薑肉桂木香茯苓大腹皮姜皮車前十帖腹有皺紋復與金匱腎氣丸一料全愈先理脾後補腎法張路玉治王庸若水腫嘔逆溲便涓滴不通或用五苓八正不應六脈沉細如絲因與金液丹十五丸溺如泉湧而勢頓平後以濟生腎氣培養而安與張抱赤症治同顧文學鼓脹喘滿晝夜不得寢食者二旬醫用大黃三下不除更醫先與發散次用削克破氣二十餘劑少腹至心下遂堅滿如石腰脅與胯中皆疼痛如折診之脈弦大而革按之漸小舉指復大大便八九日不通小便雖少清白如常此因削克太過中氣受傷濁氣上逆與生料六味地黃丸加肉桂三錢沉香三分下黑錫丹二錢導其濁陰是夜即脹減六七胸中覺飢進粥但腰胯疼軟如失兩腎之狀再劑胸腹全寬少腹反覺微硬不時攻動此大便欲行津液耗竭不能即去故也診其脈僅存一絲改用獨參湯加當歸枳殼大便略去結塊痛稍可少腹遂和又與六味地黃仍加肉桂沉香調理而安收殘救敗法盧不遠治瞿婁周馬皆少年水腫肢體洪盛臚腹膨脹水道不通飲食絶口有以為疸者為鼓者為氣者診之以藥克濟乃針足上出水皆石余次日脹小減三日大減足尚腫又針之服以八味丸以溫其腎期年皆孕婁調護善子母兩全馬失調護子母俱斃此蓋腎中陽氣不足陰氣有餘遂聚水而病作飲食湯藥用水而不能導之轉助長乃致於此非針去水則菀陳之瘀何從而泄水去腎衰非溫補之則濁凝之陰必致復聚腎中之火氣復然周身之陽氣有蒂天癸自行生育可必如流離之後所宜愛養得之則生聚否則待斃耳楊乘六治汪司農年近六旬春仲病腹脹兼作痛飲食不進群醫不應且增甚診之六脈洪大滑甚重按益加有力如年壯氣實人面色則㿠白而帶萎黃舌色則青黃而兼胖滑簡閲前方則皆香附烏藥厚朴木香山楂神麯半夏陳皮藿香元胡枳殼桔梗萊蔔子大腹皮等一派消導寬快之屬曰若但據脈症則諸方殊得當也第面色白上加黃且㿠而萎舌色黃里見青且胖而滑則症之脹痛與脈之洪盛皆非實候矣此由心境不舒思慮鬱怒虧損肝脾致兩經虛而臟寒生滿且作痛耳乃擬養榮湯倍人參加附子與之彼以切中病情立煎飲之一劑減再劑瘥胡念庵治俞翰林母七旬余平日患嗽喘痰紅常服滋陰涼潤之劑秋月忽患水腫喘急難臥日漸腫脹飲食少進進則喘急欲死諸治無效診之六脈弦大而急按之益徑而空曰此三焦火氣虛憊不能歸根而浮於外水隨氣奔致充郛郭而溢皮膜必須重溫以化否則不救彼云吾素內熱不服溫補片姜到口痰即帶紅今所論固是第恐熱藥不相宜也曰有是病服是藥成見難執且六脈緊大陽已無根即脫矣此皆平日久服寒涼所致若再舍溫補不用恐無生理乃以桂附薑萸五味人參三錢不三劑腹有皺紋八劑全消飲食如故又二劑全愈痰喘吐紅竟不發矣一婦因子遠出饔飧不給憂愁成病變為水腫喘急粥飲不入者月餘矣診之六脈欲絶臍突腰圓喘難著席脾腎之敗不可為矣因處十味方令服四劑喘微定而腫漸消覺思飲食復診其脈略有起色又四劑腫消食進壬子秋余應試北雍有孝廉張抱赤久荒於色腹滿如斗以參湯吞金匱丸小便差利滿亦差減閲旬日而滿復如故肢體厥逆仍投前藥竟無裨也舉家哀亂惟治終事抱赤泣告曰若可救我當終身父事之余曰能餌金液丹數十粒雖不敢謂萬全或有生理乃連服百粒小便遄行滿消食進更以補中八味並用遂獲全安本草通元一見扁鵲心書陳以揆子壯年漁色一曰腹膨如鼓喘不能臥或與消導溫補五苓八味了無微效以揆令吞生硫黃每服三分以腐皮裹咽日數服不三日其脹如失此豫所目擊者柴嶼青治侍御葛述齊夫人單腹脹兼脾瀉下血食後愈脹必捶腹少安衆醫咸主攻伐診之知肝木乘脾脾家受傷不能統血力排衆議之非並持薛案及醫統正脈中論說與看彼尚疑信參半先服加減逍遙湯二劑血止即繼以異功加腹皮一錢厚朴八分連進十餘劑其勢漸殺後重用參術調理而愈肝脾調治法沈濤祖母年七十餘自上年患腹脹滿醫以鼓脹治之服沉香鬱金香附等藥數十劑病轉劇脾滯腿腫食減診之左關弦洪右關弦軟此肝木乘脾之象也先用逍遙散加川連吳茱萸連進三劑脹減瀉止飯食頓加復用歸芍六味調理而痊肝腎調治法太史汪舒懷令弟腹大脹滿醫以鼓脹屢治不效診其右關空大而帶濡餘脈如常此乃脾胃不和兼有水氣故不思食而食且不化與胃苓湯數劑頓安若果系鼓脹亦理應補脾次養肺金以制肝木使脾無賊邪之患更滋腎水以治火使肺得清化卻厚味遠房幃無有不安倘喜行快利不審元氣而概用峻劑攻之暫時得寬其復轉甚病邪既盛真氣愈傷遂不可救司命者其慎旃脾濕治法張子和曰一男子目下腫如臥蠶狀曰目之下陰也水亦陰也腎為水之主故其腫至於目下也此由房室交接之時勞汗遇風風入皮腠得寒則閉風不能出與水俱行故病如是不禁房室則死凡腹脹經久忽瀉數升晝夜不止服藥不驗乃為氣脫用益智子煎濃湯服立愈危氏方喻嘉言治郭臺尹年來似有癆怯意胸腹不舒治之罔效茫不識病之所存也聞喻治病先議後藥姑請治焉見其精神言動俱如平人但面色萎黃有蟹爪紋似傷食矣而得五虛脈應之因告之曰多怒乎善忘乎口燥乎便祕乎胸緊乎脅脹乎腹疼乎答曰種種皆然此何症也曰外症未顯內形已具將來血蠱之候也曰何以知之曰合色與脈而知之也夫血之充周於身也榮華先見於面今色黯不華既無舊恙又匪新疴其所以憔悴不榮者何在且壯盛之年而見脈細損宜一損皮毛二損肌肉三損筋骨不起於床矣乃皮毛肌肉步履如故其所以微弱不健者又何居因是斷為血蠱腹雖未大而如瓜瓠然其趨於長也易耳曰血蠱乃婦人之疾男子亦有之乎曰男子病此者甚多而東方沿海一帶比他處尤多醫者漫用治水治氣之法嘗試夭枉無算總緣不究病情耳所以然者東海擅魚鹽之饒魚者甘美之味多食使人熱中鹽者鹹苦之味其性偏於走血血為陰象象字不妥初與熱合不覺其病日久月增中焦沖和之氣亦積漸而化為熱矣氣熱則結而血始不流矣於是氣居血中血裹氣外一似婦人受孕者然至彌月時腹如抱甕矣陳修園於此症擬用六君子加川芎乾薑防己共研末陳米湯糊丸每服三錢日三服以為執中央從運四旁之法用意雖精然以熱益熱亦未見其有當也但孕系胞中如果熟自落蠱蟠腹內如附贅難療又不可同語也究而論之豈但東方之水土致然凡五方之因膏粱厚味椒薑桂醑成熱中者除癰疽消渴等症不常見外至腹滿一症人人無不有之但微則旋脹旋消甚則脹不大消而成蠱耳要知人之有身執中央以運四旁者也今反竭四旁以奉其錮尚有精華髮現於色脈間乎此所以脈細皮寒少食多汗危羸之狀不一而足也言當不謬請自揆之竟不能用半載而逝琇按是症多由醉飽入房大傷真陰絶其帶脈水虧木燥乘其所不勝之脾致成脹耳魚鹽之論恐未必然一人血蠱服藥百日後大腹全消左脅始露病根一條如小枕狀以法激之嘔出黑汙血鬥許余從大便泄去始消每思蠱脹不論氣血水痰總必自開一宇如寇盜蟠據必依山傍險方可久聚內經論五臟之積皆有定所何獨於六腑之積久為患如鼓脹等類者遂謂漫無根底區界乎張氏醫通載此謂是喻嘉言案泛論一番至此積果在何腑卻又說不出此即吳聖符案之後半段也楊乘六治孫氏女年十九病鼓症先自頭面腫起漸次手足浮腫又次肚腹腫脹小水不利醫雜用枳殼厚朴蒼朮陳皮三稜莪朮半夏黃芩等並利水藥腫脹益甚更加痰喘詢其起病之由知為寒水侮土因治不如法致水勢沖激而土崩防潰也以大劑補中益氣加木瓜乾薑送金匱腎氣丸月餘而愈與立齊治素性急婦人同法三原民荀氏婦者病蠱脹諸醫束手氣已絶矣逾二鼓忽蘇家人驚喜問之曰適已出門若將遠行者途遇一老人云吾已延孫思邈真人醫汝速反也乃入門見真人已先在年可三十許以連環針針心竅上久之遂醒不知身之已死也視之果有上下二孔七日始合又十一年而終三原醫士王文之說池北偶談王損庵治嘉定沈氏子年十八患胸腹身面俱脹醫治半月不效診其脈六部皆不出於是用紫蘇桔梗之類紫蘇別名水督郵可知其治水有殊能也煎服一盞胸有微汗再服則身盡汗其六部和平之脈皆出一二日其症悉平又見醫說續編謂出趙氏或問一男子三十餘胸腹脹大發煩躁渴面赤不得臥而足冷王以其人素飲酒必酒後入內奪於所用精氣溢下邪氣因從之上逆逆則陰氣在上故為䐜脹其上焦之陽因下逆之邪所迫壅塞於上故發煩躁此因邪從下而上盛於上者也於是用吳茱萸附子人參輩以退陰逆冰冷飲之以收上焦之浮熱入咽覺胸中頓爽少時腹中氣轉如牛吼泄氣五七次明日其症愈矣治法匯同上張隱菴在苕溪治一水腫者腹大膚腫久服八正散五子五皮之類小便仍淋漓痛苦曰此雖虛症然水不行則腫不消正氣焉能平復時夏月欲用麻黃恐陽脫而汗漏止以蘇葉防風杏仁三味各等分令煎湯溫服覆取微汗而水即利矣次日至病者之室若翻水數盤床幃被褥無不濕透告以服藥後不待取汗小水如注不及至圊就床上坐溺天明不意小水復來不及下床是以沾濡若此今腹脹痛楚悉除矣曰未也此急則治其標耳病由火土傷敗以致水泛乃久虛之症必待脾元復故乃保萬全與六君子去甘草加蒼朴薑附令每日溫服後即以此方為丸半載後來謝已全愈矣張曰如此症水雖行而正氣不復後仍腫脹而死者多矣至不知發汗行水之法徒事滲利久之正氣日消邪氣日甚而死者亦多矣可不慎哉陸養愚治吳體原婦患腹脹每於雞鳴時發至午即寬或與調氣治之不效後於半夜即發至兩日漸於薄暮即發矣夜不能臥飲食亦減肌體日瘦脈之沉微而遲曰若論症日寬夜急血不足也當養血論脈沉弱而遲氣不足也當補氣乃以補中益氣湯倍當歸加豆仁木香數劑而愈陸肖愚治陸南洋妾患痞或以為食積痰飲服消導二陳之類痞滿益甚或以為氣虛中滿與補中益氣湯亦不效寒熱消補約一年飲食大減肌肉漸消大便時瀉時結診其脈浮之弦大沉之澀小曰如此非百劑不能全愈用調氣養榮湯加參術各一錢五分木香豆仁各三分二劑反微甚因減參術增木香豆仁仍不應乃增木香豆仁至一錢減參術至七分而脹滿稍愈後增木香豆仁至錢半而飲食漸加脹滿始寬大半自後漸加參術至二三錢減香豆至一二分約六十劑全瘳朱丹溪治一人患趺腫漸上膝足不可踐地頭面遍身腫脹用苦瓠瓤實捻如豆大以麵裹煮一沸空心服七枚至午當出水一斗三日水自出不止大瘦乃瘥須慎口味苦瓠須擇無靨翳細理緊淨者不爾有毒與徐文江妻用葫蘆治法略同萬密齊治萬邦瑞之女年十四病腫寅至午上半身腫午至戌下半身腫亥子丑三時腫盡消惟陰腫溺不得出諸醫莫識其病萬曰此肝腎病也腎者水臟也亥子醜水旺之時也肝屬木腎之子也木生於亥子醜二時肝膽氣行之時也肝經之脈環陰器當其氣行之時故陰腫而溺不出也水在人身隨上下午時以前氣行於上故上半身腫午時以後氣行於下故下半身腫此病源也五苓散瀉水之劑也經曰諸濕腫滿皆屬脾土平胃散燥濕之劑也以二方為主名胃苓湯加生薑皮之辛熱助桂枝陳皮以散肝經之邪茯苓皮之甘淡助豬苓澤瀉以滲腎經之邪防己之通行十二經以散流腫上下之邪也十餘劑而愈張子和曰涿郡周敬之自京師歸鹿邑道中渴飲水過多漸成腫滿或用三花神祐丸憚其太峻或用五苓散分利水道又太緩淹延數月終無一效蓋粗工之技止於此耳後手足與腎皆腫大小便皆祕托常仲明求治於張張令仲明付藥比至已歿矣張曰病水之人其勢如長川泛溢欲以杯杓取之難矣必以神禹決水之法斯愈矣合陳三農案以觀之則潔淨府一法當用宜速用也薛立齊治一婦人面目浮腫月經不通此水分也朝用葶藶丸夕用歸脾湯漸愈更用人參丸兼服而全愈瀉補兼行法一婦人素性急先因飲酒難化月水不調或用理氣化痰藥反吐腹膨脹大便泄瀉又加烏藥蓬朮肚腹腫脹小便不利加豬苓澤瀉痰喘氣急手足厥冷頭面肢體腫脹指按成窟脈沉細右寸尤甚此脾肺虛冷不能通調水道下輸膀胱滲泄之令不行生化之氣不運也東垣云水飲留積若土在雨中則為泥矣得和氣暖日水濕去而陽化自然萬物生長喜脈相應遂與金匱加減腎氣丸料服之小便即通數劑腫脹消半四肢漸溫自能轉側又與六君加木香肉桂炮姜治之全愈後不戒七情不調飲食頓作泄瀉仍用前藥加附子五分而安誤消用補法孫兆治一女子心腹腫痛色不變經曰三焦脹者氣滿皮膚硜硜然石堅遂以仲景厚朴生薑半夏人參甘草湯下保和丸漸愈丹溪治一婦血氣俱虛患單腹脹因氣餒不能運化瀕死但手足面目俱腫氣尚行陽分猶可治遂以參朮芎歸白芍以斂脹滑石腹皮以斂氣蘇桔卜子陳皮以泄滿海金砂木通利水木香運氣而愈補瀉兼行法一婦人胸膈不利飲食少思腹脹吞酸或用疏利之劑反致中滿不食此脾土虛而肝木勝用補中益氣湯加砂仁香附煨姜又以六君子加芎歸桔梗而愈吳江史元年母久病之後遇事拂意忽胸腹脹滿面目微腫兩腿重滯氣逆上升言語喘促所服皆清氣之劑不效薛曰此脾肺虛寒也先用六君子湯一劑病勢頓減後用補中益氣加茯苓半夏乾薑二劑形體頓安後以七情失調夜間腹脹乃以十全大補加木香而痊太倉陸中舍以腎虛不能攝水肚腹脹大用黑丸子又名碑記丸未數服而歿於京今之專門治蠱者即此方也用之無不速亡病家不可不知此機房蔡一素不慎起居患症同前更加手足逆冷惡寒不食用補中益氣湯加附子一錢先回其陽至數劑諸症漸愈薛因他往或用峻利之劑下鮮血甚多亦致不起紹興術士朱蘘衣名甫苦水蠱腹脹醫者只令服嘉禾散久之不效葛丞相授以此法即安右取嘉禾散四柱散細末各等分合和令勻依法煎服百乙方王尚之提刑傳云武義縣方治數人甚妙用黃顙魚一個緑豆一合許右煮淡羹頓食紹興張醫升之云以商陸根煮緑豆令熟去商陸取緑豆任意食之亦妙王氏博濟方第二卷逐氣散與此藥大同小異同上有病蠱者夢一道人示頌云似犬非犬似貓非貓烹而食之其病自消偶有狐入其室殺而爛烹食之腹自消夷堅志按白氏六帖云青邱狐食之令人不蠱又本草孟詵云狐補虛又主五臟邪氣蠱毒發寒熱原注丹溪治一婦人夜間發熱面先腫次及肚足渴思冷水用麻黃葛根川芎蒼白朮木通腹皮梔子甘草愈此開鬼門法一人秋冬患腫午前上甚午後下甚口渴乏力脈澀弱食減此氣怯汗不能自出鬱而為痿遂灸肺腧大椎合谷分水用葛根蘇葉白朮木通海金砂大腹皮茯苓皮厚朴陳皮黃芩甘草漸愈同上散利兼行法陳三農治一人年甫三旬怒後發腫飲水過多旦日肢體俱腫腹脹異常年方壯而病發於驟脈方實而藥不厭攻若不急於疏通久必成大患以胃苓散加牛膝車前三進而不為少動是病深藥淺也更以舟車神祐丹進而小便泉湧肢體漸收仍與胃苓湯加白朮椒仁十五日而愈喻嘉言治顧鳴仲有腹疾近三十年朝寬暮急每一大發腹脹十餘日方減食濕面及房勞其應如響肝腎虛故房勞即發脾不運故食麵即發病情已大顯著矣腹左隱隱微高鼓呼吸觸之汩汩有聲以痞治之內攻外貼無效診之曰人身五積六聚之症心肝脾肺腎之邪結於腹之上下左右及臍之當中者皆高如覆盂者也膽胃大小腸膀胱命門之邪各積於本位不甚形見者也此症乃腎臟之陰氣聚於膀胱之陽經有似痞塊耳蓋腎有兩竅左腎之竅從前通膀胱右腎之竅從後通命門邪結於左畔即左腎與膀胱為之主也六腑惟膽無輸泄其五腑受五臟濁氣傳入不能久留即為輸泄者也今腎邪傳於膀胱膀胱溺其輸泄之職舊邪未行新邪踵至邪字缺分曉勢必以漸透入膜原膜原在膈間去膀胱甚遠如何透入如革囊裹物者然經曰膀胱者州都之官津液藏焉氣化則能出矣然則腎氣久聚不出豈非膀胱之失其運化乎夫人一團之腹大小腸膀胱俱居其中豈獨此耶而胞又居膀胱之中膀胱即脬也昔人曾有辨之者惟其不久留輸泄是以寬乎若有餘地今腎之氣不自收攝悉輸膀胱膀胱之氣蓄而不泄有同膽腑之清淨無為據云則是其人竟無小便耶其能理乎宜其脹也經曰腎病者善脹尻以代踵脊以代頭倘膀胱能司其輸泄何致若此之劇耶又曰巨陽引精者三日太陽膀胱經吸引精氣者其脹止於三日巨陽引精句乃內經言風勞之文引入此間殊覺牽強喻氏英雄欺人往往如此此之為脹且數十年之久其吸引之權安在哉治法補腎水而致充足則精氣深藏而膀胱之脹自消只此數句是此症肯綮補膀胱而令氣旺則腎邪不蓄而輸化之機自裕所以然者以腎不補不能藏膀胱不補不能瀉然補腎易而補膀胱則難以本草諸藥多瀉少補也經於膀胱之子不足者斷以死期後人莫解其故吾試揣之豈非以膀胱愈不足則愈脹脹極勢必傳於腎腎脹極勢必逆傳於小腸小腸脹極勢必逆傳於脾乃至通身之氣散漫而無統耶醫者於未傳之先早見而預圖之能事殫矣琇按是症專屬肝腎二經與膀胱毫無干涉乃舍肝而強入膀恍便覺支離滿紙實肝脾腎三經之症未可專舉肝腎葉天士治一女子年二十七歲病腫甚異寅後午前上半身腫午後醜前下半身腫上下盡消惟牝戶腫小便難諸醫不能治經云半身以上天之陽也宜發其汗使清氣出上竅也身半以下地之陰宜利小便使濁陰出下竅也正上下分消以去濕之法惟半夜陰腫不得小便此又當從肝經求之蓋厥陰肝經之脈丑時起於足上環陰器又肝病者則大小便難用胃苓五皮湯發汗利小便也內有茯苓所以伐腎肝之邪木得桂而枯又以辛散肝經之水以溫腎之真寒濕也連服十餘服而腫盡消朱丹溪治赤岸馮令八官素飲食不知飽但食肉必泄忽遍身發腫頭面加多致目亦不可開膈滿如築兩足麻至膝而止渾身不可見風陰器挺長其脈左沉而重取不應右三部雖短小卻有和滑氣象遂令單煮白朮湯飲早晨空心探而去之食後白朮二錢麻黃五分川芎半錢防風三分作湯下保和丸五十丸如此者二日因吐中得汗通體上截為多遂得腫寬而眼開氣順而食進卻於前方中減麻黃防風加白朮一錢木通通草各半錢下保和丸五十丸如此者五日而安此即開鬼門之法也羅謙甫治許魯齊仲平年五十有八於至元戊寅五月間積雨霖淫面目肢體浮腫大便溏多腹脹腸鳴時痛飲食減少脈得弦細而緩自云年壯時多服牽牛大黃藥面目四肢時有浮腫今因陰雨故大發曰榮運之氣出自中焦者胃也胃氣弱不能布散水穀之氣榮養臟腑經絡皮毛故氣行而澀為浮腫大便溏多而腹脹腸鳴皆濕氣勝也四時五臟皆以胃氣為本有胃氣則和平而身安若胃氣虛弱不能運動滋養則五臟脈不和平本臟之氣盛者其脈獨見此盛字當活看輕則病過甚則必死故經曰真臟之脈弦無胃氣則死此亦木乘土也故虛損病宜注意滋養肝木今疾幸而未至於甚尚可調補人知服牽牛大黃為一時之快不知其為終身之害也遂以平胃散加白朮茯苓草豆蔻仁數服諸症皆愈飲食進惟四肢猶腫以導滯通經湯主之良愈雄按今秋治一山居黃嫗患證同此醫者進理中腎氣多劑其病日甚束手矣余診之脈果弦細沉兼數舌絳口乾腫處赤痛溲少而熱乃陰虛肝熱也清潤不遑未可因其起於黴雨之時輒用溫燥也與白頭翁湯加金鈴銀花梔子元參丹皮緑豆數服而症減知飢漸佐養血充津而愈矣馬元儀治華氏子患腹脹已三月形色憔悴而脈沉微治者但謂邪氣盛不知其正氣虛也靈樞曰脈之應於寸口其大堅以澀者脹也素問曰徵其脈與色俱奪者此久病也今兩脈微弱無神面色不華肢體倦怠其初亦邪正相搏而成治者但責其實而忘其虛攻伐過多始則邪氣當之繼乃轉傷元氣運化失職升降不利熱者變寒實者變虛而病機遷矣經曰足太陰之別公孫虛則鼓脹又胃中寒則滿脹可見中臟虛寒亦能成脹不獨實病為然也治法但用溫補之劑健脾胃補三焦然須積久成功不可欲速所謂新病可急治久病宜緩調也遂恪服加桂理中湯三十餘劑脹漸消脈漸轉兩月後全安莊季裕云豫自許昌遭金狄之難憂勞艱危沖冒寒暑避地東方丁未八月抵四濱感痎瘧既至琴川為醫妄治榮衛衰耗明年春末尚苦胕腫腹脹氣促不能食而大便利身重足痿杖而後起得陳了翁家傳為灸膏肓腧自丁亥至癸巳積三百壯灸之次日即胸中氣平腫脹俱消利止而食進甲午已能肩輿出謁後再報之仍得百壯自是疾症頓減以至康寧時親舊間見此殊功後灸者數人宿疴皆除孫真人謂若能用心方便求得其穴而灸之無疾不愈信不虛也針灸四書王執中曰有里醫為李生治水腫以藥飲之不效以受其延待之勤一日忽為灸水分與氣海穴翌早觀其面如削矣信乎水分之能治水腫也明堂故云若是水病灸大良蓋以此穴能分水不使妄行耳但不知明堂又云針四分者豈治其他病當針四分者耶水腫惟得針水溝若針余穴水盡即死此明堂銅人所戒也庸醫多為人針水分殺人多矣若其他穴亦有針得瘥者特幸焉耳不可為法也或用藥則禹餘糧丸為第一豫屢見人報驗故書於此然灸水分則最為要穴也資生經姚僧垣治大將軍襄樂公賀蘭隆有氣疾加水腫喘息奔急坐臥不安或有勸其服決命大散者其家疑未能決乃問僧垣僧垣曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時抑屈今日始來竟不可治意實未盡僧垣知其可瘥即為處方勸使急服便即氣通更服一劑諸患悉愈周書黃司寇葵峰中年病蠱得異方真茅山蒼朮末也每清晨米飲調三錢服不數月強健如故終身止服術七十餘終少停疾作矣廣筆記徐文江夫人病蠱脹張漣水治之百藥不效張曰計窮矣記昔年西山有一嫗患此意其必死後過復見之云遇一方上人得生徐如言訪嫗果在也問其方以陳葫蘆一枚去頂入酒以竹箸松其子仍用頂封固重湯煮數沸去子飲酒盡一吐幾死吐後腹漸寬調理漸愈蓋元氣有餘而有痰飲者也若腎虛脾弱者宜用金匱腎氣丸十全大補湯去當歸加車前子肉桂同上通血香一錢取小葫蘆一個不去子膜入香在內再入煮酒以所開之蓋合縫封之以酒入鍋懸葫蘆酒中挨定不可傾倒蓋鍋密煮以三炷香為率煮時其香透遠牆屋外煮完取葫蘆內藥約有五六錢之數病已釋然矣通血香陝西羊絨客人帶來蘇杭有同上沈孝通觀察中年無子患中滿蠱脹勢孔棘靜養郭外小園中翛然獨坐獨宿食淡者五年歸脾湯六味地黃丸朝暮間服不輟連舉二子同上汪石山治一婦人五十七歲五月間因勞夜臥天熱開窗醒來遍身脹痛疑是痧症刮背起紫疙瘩因而胸膈脹痛磨木香服之致小腹作痛咳嗽氣壅不能伏枕吐痰腥臭每次一二碗亦或作瀉肛門脹急自汗不止身表浮腫純是肺熱壅塞之候醫作傷寒而用發散或作肺癰而用寒涼綿延一月醫皆辭去其子來召汪汪曰第未知得何脈耳告曰醫謂脈洪數也曰年逾五十血氣已衰又加小勞當酷熱之時又不免壯火食氣其洪乃熱傷元氣而然非熱脈也所可慮者脈不為汗衰為泄減耳彼曰用生脈湯人參一錢麥冬二錢五味二錢病似覺甚曰邪重劑輕宜黃耆五錢固表人參五錢養內白朮三錢茯苓錢半滲濕散腫陳皮七分吳茱萸四分消痰下氣再加甘草五分以和之麥冬一錢以救肺雄按即知邪重則生脈已誤何以猶謂劑輕而竟再誤以大補耶溫熱客邪古賢往往疏忽也依法煎服十餘帖後雖稍安脈與病相反終不救琇按是症終挾熱邪初時或宜涼膈白虎為是蕭萬輿曰曾氏婦年四旬素鬱怒嫠居十載神思為病忽一日因行經暴怒血上溢兼致臌脹或投散氣藥不效且漸篤曰此臟病得之數年今始顯發丹溪鼓脹論可鑑也脈之洪短與病相符峻補脾元不半載可愈議用六君加薑桂倍人參白朮彼懼不敢服因改投金匱腎氣丸服一月血逆已止脹雖如故未見增劇為藥力未到須寧耐耳不信另延一醫恃有神丹謂旦夕可愈果投一劑下咽半晌而即脹消便泄進食靜睡精神爽快舉家欽以為神願擲百金酬謝而尤刺余之迂緩也及察前方乃阿魏薑黃甘遂甲片葶藶牽牛元胡之屬越數日症仍作投前藥亦隨手而應獨氣困怠耳不三日朝夕喘滿不堪再投不應日甚一日不及旬而歿蕭從舅曾六海長子亦因素郁患前症曰此病始本稱難治但廣費珍藥又非舌耕清儒所能辦當奈何未幾有進草藥者彼悅捷法信服之飯許大號數聲而斃嗚呼病從何生藥從何治如此盲妄矜功頃刻殺人轉盻誰之咎哉吳橋治王英妻年三十許病脹滿劑以補中氣利小水者皆無功久之喘急而汗沾衣嘔逆不能下昏亂殊甚橋切之浮取弦數沉取澀滯則以為蓄血下之宜或以汗多亡陽丞下則速之斃橋曰否病繇血滯故氣壅壅則騰騰上蒸而汗出焉遂進桃仁承氣湯薄暮始進嘔者半之中夜下敗血三升喘即定乃酣寢詰朝腹脹平太函集聶久吾治司理毛具茨夫人病兩月餘初時每至五鼓胸腹脹氣上衝不能臥起坐方安已而漸至四鼓又漸至三鼓即脹今則二鼓起而終夜不能臥矣初以為氣血不調與調氣二劑不應因思其病作於夜間而日間不脹必血虛故改用四物等補血數劑病減半因延診之其脈弱不惟血虛氣亦虛也改用八物湯加二陳十餘劑全安
