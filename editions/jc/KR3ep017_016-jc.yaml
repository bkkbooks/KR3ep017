body:
  text: 卷十六痰洞虛子曰痰之為病成偏頭風成雷頭風成太陽頭痛眩暈如坐舟車精神恍惚或口眼瞤動或眉稜耳輪俱癢或頷腮四肢遊風腫硬似疼非疼或渾身燥癢搔之則陰疹隨生皮烘熱色如錦斑或齒頰似癢似痛而無定所滿口牙浮痛癢不一或噯氣吞酸鼻聞焦臭喉間豆腥氣心煩鼻塞咽嗌不利咯之不出咽之不下或噴嚏而出或因舉動而吐其痰如墨又如破絮或如桃膠或如蜆肉或心下停冰鐵閉滯窒妨悶噯嚏連聲狀如膠氣或寢夢如刑戮刀兵劍戟或夢入人家四壁圍繞暫得一竇百計得出則不知何所或夢在燒人地上四面煙火枯骨焦氣撲鼻無路可出或因觸發忿怒悲啼兩淚而寤或時郊行忽見天邊兩月交輝或見金光數道回頭無有或足膝痠軟或骨節腳腰腎疼痛呼吸難任或四肢肌骨間痛如擊戮乍起乍止並無常所或不時手臂麻疼狀如風濕或如芒刺在揹著膚或如毛蟲所螫或四肢不舉或手足重滯或眼如姜蜇膠黏癢澀開闔甚難或陰晴交變之時胸痞氣結閉而不發則齒癢咽痛口糜舌爛及其奮然而發則噴嚏連聲初則唾稠黏次則清水如注或眼前黑暗腦後風聲耳內蟬鳴筋瞤肉惕治之者或曰腠理不密風府受邪或曰上盛下虛或曰虛或曰寒或曰發邪惟洞虛子備此苦疾乃能治療病勢之來則胸腹間如有二氣交紐噎塞煩郁有如煙火上衝頭面烘熱眼花耳鳴痰涎涕淚並從肺胃間湧起凜然毛豎噴嚏千百然後遍身煩躁則去衣凍體稍止片時或春秋乍涼之時多加衣衾亦得暫緩或頓飲冰水而定或痛飲一醉而寧終不能逐去病根乃得神秘沉香丸屢獲大效愈人萬數但不欲輕傳匪人故以詩隱括之詩曰甑里看翻甲帶金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中沉半兩水丸梧子意須斟驅除怪病安心志水瀉雙身卻不任大黃蒸八兩黃芩八兩青礞石一兩硝煨如金色沉香半兩孫兆治彩白鋪劉員外患傷寒六七日晝夜不得眠方眠即起方起即倒未嘗少息時復身上冷出汗孫診之尺寸脈皆沉關中亦沉重診之鼓擊於指上此寒痰積聚於胸中也遂用陳皮半夏乾薑三物各一兩為飲生薑半兩槌碎以水兩碗煎七分去渣分二服服藥經時遂睡經一晝夜不蘇既覺下痰一塊如雞子大其病遂愈凡痰皆有冷汗其症明矣張子和治一婦人心臍上結硬如斗按之若石人皆作痞治針灸毒藥禱祈無數如捕風然一日張見之曰此寒痰也診其兩手寸關皆沉非寒痰而何以瓜蒂散吐之連吐六七升其塊立消過半俟數日後再吐之其涎沫類雞黃腥臭特殊約二三升凡如此者三以人參調中湯五苓散調服以平矣朱丹溪治白雲許先生始因飲食作痰成脾疼後累因觸冒風雪腿骨作疼眾皆以脾疼骨疼為寒雜進黃牙等藥雜治十餘年間艾灸數萬計或似有效及至病再作反覺加重至五十一歲時又冒雪乘船而病愈加至坐則不能起扶起亦不能行兩胯骨不能開合若脾疼作時則兩胯骨痛處似覺稍輕若飲食甘美脾疼不作則胯骨痛增重諸老袖手計無所出朱謂此初因中脘有宿食積痰雜以沖冒寒濕抑遏經絡血氣津液不行痰飲注入骨節往來如潮其湧而上則為脾疼降而下則為胯痛非湧泄之法不足以治之時七月二十四日遂以甘遂末一錢入豬腰子內煨以食之連瀉七行至次日兩足便能行步至八月初三日嘔吐大作不能起床顆粒不食但時煩躁氣弱不能言語諸老皆歸罪於七月之瀉而又知累年之熱補俱誤皆不敢用藥朱嘗記金匱云病人無寒熱而短氣不足以息者此實也其病多年鬱結一旦以刀圭之劑泄之走動猖狂之熱未有制御之藥所以如此仍以吐劑達其上焦以次第治及其中下二焦於初三日用瓜蒂吐不透初六日用梔子又吐不透初九日用附子三枚和漿與之始得大吐嘔噦終日前後所吐共得膏痰沫液一大水桶初十日遂以朴硝滑石黃芩石膏連翹等涼藥㕮咀一斤蒸濃汁放井水中極冷飲之十一十二十三十四日每日食上件藥一盞十五日腹微滿大小便皆秘悶朱欲用大承氣下之諸老皆以為不可十六日六脈皆歇止朱診其脈獨歇止於卯酉二時其餘時刻平和如舊朱曰卯酉為手足陰陽之應卯時屬大腸酉時屬胃此大腸與胃有積滯不行當速瀉之爭論不已至十八日遂作紫雪半斤十九日紫雪成成每用一匙頭以新汲井水化下至二十日天未明已服紫雪五兩神思少安腹滿亦減琇按觀於此案丹溪之大智神勇卓識定力色色可臻絕頂若少一遊移大事去矣景岳輩每疵議丹溪之學不知遇此大症能措手否遂收起紫雪不與二十一日大為小便閉作痛所苦遂飲以蘿蔔汁半茶盅隨手痛止小便立通二十二日小腹滿痛不可捫摸神思不佳遂以大黃牽牛作丸服至三百丸至二十三日巳時大小便並通如爛魚腸三碗許臭惡可畏是日神思少安診其脈不歇止矣二十四日腹大絞痛殆不能勝者約一時許腰胯沉重且墜兩時不出聲不能言瀉下穢物如柏油條者一尺許肚中如燒片時方定至二十五日神思漸安夜間得睡二十六日漸出聲言語自初二日至此並顆粒不曾入口語言並不出聲至二十七日方啜半盞稀粥者四次似有生意至次月初四日方平安其脈自嘔吐至病安日皆平常弦大之脈唯有中間數日歇止少異耳至次年四月復行倒倉法方步履如初徐東皋治匡掌科夫人年三十餘病胃脘連胸脅痛日輕夜重兩寸關脈弦滑有力諸醫以為積滯凝寒用發散及攻下藥繼用鐵刷散四磨飲等方俱不效後至湯水皆吐而不納經月不食痛且益甚徐謂其為痰鬱明矣但痛久弱甚不敢行吐法奈何偶一醫謂五靈脂沒藥素用有效眾皆哂之曰此藥用之久矣多矣徐謂再用亦無妨何哂之有彼用酒調服病者到口便吐隨吐綠痰兩碗許痛即止遂納飲食此蓋痰在上下之亦不去必得吐法而後愈經曰有故無隕此之謂也歟全書孟望湖淮安人耳中聞人聲悉是祖考談其家擾撓不休邀劉春齋醫治診之曰暴病謂之胃火怪病謂之痰用滾痰丸下之而痊續金陵瑣事一男子吐痰胸膈不利飲食少思服海石栝蔞之類不應曰此脾氣虛弱不能消導而為痰當健脾為主彼不信又服驅逐之劑其痰如湧四肢浮腫小腹腫脹小便澀滯曰此復損脾腎所致也先用金匱加減腎氣丸補中益氣湯治之諸症漸減又用八味丸兼前湯而愈一男子素吐痰遇怒其痰益甚胸膈痞滿此肝木製脾土也用六君子湯加木香治而愈一婦人吐痰頭暈帶下青黃用四七湯送白丸子小柴胡加白朮茯苓治之而安舊僚錢可久素善飲面赤痰盛大便不實薛以為胃痰壅滯用二陳苓芩連山梔枳實乾薑澤瀉升麻一劑吐痰甚多大便始實此後日以黃連三錢泡湯飲之而安一婦咳嗽其痰上壅日去五六碗作氣虛水泛為痰用六味丸料及四君子各一劑而愈陳三農治一人痰出盈盆不止脈豁大無力此內傷不足之症用人參附子各五錢乾薑蓽茇檳榔枳殼一劑而愈一人滿口痰珠至舌尖則成大泡綿綿不絕此火熱在胃大寒在肺也肺與胃息息相通斷無胃熱而肺反寒之理矣且試觀其用藥殆胃熱輕而肺寒重耳用參附湯保定肺氣後砂仁益元散瀉胃火而安一人痰涎壅盛汗出不止此脾虛不能攝痰而肺失所養切不可作痰治只補脾胃為主用參朮煨姜各二錢半夏一錢煎服愈陸養愚治董潯陽夫人稟氣怯弱性情沉鬱年三十得一病晚間發熱天明始止飲食漸減煩躁不安初服補血養陰年餘轉羸瘦又服參耆補氣不效醫謂脈已歇止恐不能久診之右手果然左手但微弱而數詢其月事則先期而少曰先期是血熱應左手之數少是血虛應左脈之微脈症相應右手歇止此必郁痰伏在氣分故脈結不至非死脈也第發熱必有所起之處令詢之則曰右脅一團熱起漸延遍身再問熱起處必有結而成形者按之果有柔塊如碗狀曰不足憂也攻去其塊諸症自愈矣為制一方香附一斤醋製與巴豆一兩同炒至巴豆黑色去之醋打麵糊為丸梧子大米飲下五十丸日三服又用四物湯加山梔貝母白蔻仁木香薑棗煎日一劑半月塊消肌肉漸長一月精神爽健矣陸肖愚治李安吾正室不育乃納妾則俱孕生子出痘正者死而妾者生悲愁彌月遂胸脅脹痛每臥必令人於背上捶之良久方得就枕片時臥不能仰仰則氣湧而喘食減肌消月事數月不行脈之寸沉而數關沉而滑尺沉而弱脈與病應此鬱火成痰之症也用調氣養榮湯加白芥子倍霞天曲數劑胸脅少舒可仰臥矣第大便五日不行小腹脹急與滾痰丸二錢又慮元氣不足改用補氣養榮湯二劑大便去燥矢數枚後出皆痰積脹痛減後與補藥間服月餘而安吳遜齋體肥素有酒積胃脘作疼近又肢節疼而下體更甚或以為風用史國公酒療之時作時止改用虎潛河車等丸則疼處且腫脈之六部皆緩滑而關稍帶弦此濕痰流注關節而痛非風亦非虛也治法宜先用丸劑清中宮之積痰繼用煎劑疏筋絡之壅滯則肢節之痛除而胃脘之疼亦愈矣依法服之果然丸方霞天曲山楂橘紅白朮茯苓枳實神麯竹瀝打糊為丸食遠白湯送下煎方蒼朮苡仁半夏南星白芥子威靈仙秦艽炙甘草青木香煎成入酒一小杯半飽時服潘元石怒後縱飲遂患吐逆飲食半留半出甚則嘔物如褐色胸脅脹痛徹背或以翻胃治之反潮熱煩躁又以肺癰治之飲食減而嘔服益甚或見吐出之物謂肺爛矣診之見其肌肉未消聲音不改兩寸滑數左關弦右關滑兩尺寸平曰此非壞也第為鬱怒所致耳怒則血菀於上與痰膠結濁陰不降而䐜脹生焉法當湧之用常山五錢紅花五錢酒二碗煎一碗令通口服之一湧而出初見褐色痰塊後多紫黑約有盆余胸膈頓寬背亦不痛不作嘔矣再以清氣養榮湯調理而愈陸祖愚治沈振宇妾患郁痰鬱火症醫咸謂不起矣診之形容枯槁咳咯涎沫六脈沉滯隱隱似有似無重按至骨或有力或無根或遲或數已飲食不進似胃氣將絕者但自能坐起聲音響亮知為痰涎壅隔血氣凝塞故脈亦不流通耳用二陳加蔻仁蘇子黃連白芥子貝母石菖蒲等味一劑未效再診聞病人喜聞爆竹硝黃之氣遂於前方加薑汁竹瀝每劑入牛黃半分調服症脈漸起再與加減六日後進蘇合丸一丸能飲粥再與六君子加減調理月餘而安李江州因下第歸飲食不思精神倦困醫謂遠歸久曠投以補劑胸膈痞塞大便艱難不寐又與養血安神煩躁而小腹脹滿診之見其面容昏滯六脈沉滑乃以枳實黃連栝蔞陳皮貝母檳榔元明粉兼服潤字丸三錢半日未應又以前丸二錢催之良久腹中鳴轉下矢氣去稠黏臭穢五色錯雜約半桶頓快繼以前湯丸少少與之兩三日間糞微黃改用參朮歸芍健脾養血調理而安費表嫂患胸之下臍之上溫溫作痛可揉可按凡溫中消導清火歷試不效診之六脈沉弦而滑以痰治之數劑而痛止精神未復而勞於女工且患血崩食入不化遷移數日胸腹腫脹其熱如火湯藥難投致呻吟不絕人事不省脈之寸關沉伏不見而尺尚沉滑有神曰以沉痰之為祟也元氣雖弱痰結不得不通徐靈胎謂人虛症實不必顧忌但急去其實則精神自復此類是也用滾痰丸徐徐投之至半夜胸前隱隱有聲五更下稠痰盆許神氣頓蘇胸膈少利再以養榮合二陳調理半月而愈張宇清少時體羸多病專主溫補病愈而火症時發乃滋水制火其疾如失六味之力也迨壯年肥盛濕痰醞釀於中仍滋陰不徹六旬外痰症陡發復以六味加二母歸芍麥冬服後痰涎壅塞四肢厥冷口開眼合人事昏沉診之六脈洪滑而數遂用加味導痰湯繼之蘇合丸兩劑才覺精神清問用何藥以前方告乃怒曰我生平最忌燥劑豈可服此今後斷不可用乃郎心知父之非每日以地黃湯一劑與驗過暗以導痰之藥以進病愈後洞悉前情不勝歉仄孫文垣治李古愚每食後即大便腹皮稍脹急胸膈飽悶服參術則痞悶愈甚小水清長脈之左寸澀右寸滑按之如黃豆大且鼓指關尺皆弦小左手迢迢有神據脈乃積痰鬱於肺而莫能出以致大便之氣不固也當效丹溪治乃叔用吐法吐去上焦痰積大便自實矣先用苦梗蘿蔔子各三錢白豆仁橘紅山梔各一錢以川芎五分生薑三片蔥三根水煎服之取吐服半時許吐出清痰噁心未已乃痰積膠固未易出也又用蘿蔔一合擂漿水加蜂蜜與半碗飲之始吐膠痰二碗許平日每小水則大便並行吐後小水始能單去連三四次胸腹覺舒初亦以吐為懼至是豁然稱快大便五日一行再以二陳加白朮旋覆花麥芽調理全愈李士材治章給諫暑月心中大痛醫與香薷飲痛轉增而寸口弦急此痰食交結也服砂仁二陳二劑痛雖略減而困苦煩悶更以胃苓湯加半夏二錢大黃三錢下黑矢數枚痛減三四仍以前湯用大黃四錢下膠痰十餘碗始安徐主政勞且怒後神氣昏倦汗出如浴語言錯亂危困之極脈大而滑且軟此氣虛有痰也用補中益氣湯料並四劑為一劑用參至一兩加熟附子一錢熟半夏三錢四日稍蘇更以六君加薑汁一鍾服數日兼進八味丸兩月而安王郡侯患痰嗽輒服清氣化痰丸漸至氣促不能食李曰高年脾土不足故有是症若服前丸則脾土益弱矣投以六君子湯加煨姜三錢益智仁一錢五分十劑而痰清更以前方煉蜜為丸約服一斤飲食乃進朱文學遍體如蟲螫口舌糜爛朝起必見二鬼執盤食以獻向李泣曰某年未三十高堂有垂白之親二鬼旦暮相侵必無生理診其寸脈乍大乍小意其為鬼祟細察兩關弦滑且大遂斷以痰投滾痰丸三錢雖微有所下而病患如舊更以小胃丹二錢與之復下痰積及水十餘碗遍體之痛減半至未明早鬼亦不見矣更以人參三錢術二錢煎湯服小胃丹三錢大瀉十餘行約二十碗許病若失矣乃以六君子為丸服四斤而愈張路玉治一燕人體肥痰盛善肉善飲患痰鳴喘嗽數年食傷恆發發則六脈遲滑時見歇止聲如拽鋸遍地皆痰每歲或一二發或三五發深秋初冬尤甚遂用倒倉法此亦可用滾痰丸治之倒倉法未可輕試也自言肢體皆輕症遂愈二年後因不禁牛肉復發然其勢較前不過十一是亦不慎口腹所致耳郭邑侯夫人素有敗痰失道左右兩脅俱有結塊大如覆杯發則咳嗽喘逆腹脅掣痛六脈至促按之少力用六君子湯加膽星枳實香附沉香二劑服之大吐稠痰結垢一二升因嘔勢太甚促往診之至則嘔吐已寧脈息調勻不必更藥矣黃履素曰立齋治痰每言腎虛水泛為痰法當補腎予壬申秋咳嗽多痰自知因於色遵先生法恪服六味丸更不治痰嗽月餘竟愈時師治痰最忌用熟地以為膩膈是烏知箇中妙理哉龔子才治周藩海甥陽生患痰嗽喘熱左足腫痛日輕夜重每年發一二次已三十年遍治勿效診之左微數右弦數此血虛有濕痰也以四物湯加蒼朮黃柏木瓜檳榔木通澤瀉空心服以治下元茯苓補心湯臥時服以治上焦各三服而愈後以神仙飛步丸空心服清氣化痰丸臨臥服各一料全愈張三錫治一中年婦每夜發熱天明方止症兼噁心不食肢倦且云體素肥今漸消瘦因憶古人有言昔肥而今瘦者痰也痰滯中宮阻礙升降宜乎不食且作惡心痞悶血無所滋因而不足故夜熱乃以二陳治痰參補其中氣枳實麥芽寬中香附炒梔子清火柴胡退熱凡二十劑間服橘半枳朮丸一月愈後進人參湯體漸復舊一人素肥盛半年漸瘦兩膝與背互痛兩尺沉滑古人有言昔肥今瘦者痰也遂以加減豁痰湯連進數服一日食後偶作惡心乃以瓜蒂散一錢投之吐稠痰半升而愈朱丹溪治一人項強痛不可忍不可以回顧作痰客太陽經之症治之用二陳湯加酒芩羌活紅花服後二日而愈張路玉治吳別駕夫人患痞眩嘔逆向因下體畏寒肢體麻木久服八味參附不徹六脈弦滑按之則濡此中焦素蘊痰濕陽氣不能周於四末之象得桂附辛熱之力有時雖可暫開究非真陽之虛且有地黃之滯所以痞暈漫無止期遂與局方七氣加沉香一服豁然再劑神爽食進而安薛立齋治一儒者脾腎素虛而有痰或用導之之法痰甚作渴頭暈煩熱謂中氣虛弱而變症用補中益氣湯而愈後勞役發熱此氣虛不能上升也用前湯加蔓荊子而愈後又勞神畏見風四肢逆冷口淡痰多此脾氣虛寒真病以六君子加炮薑肉桂而愈一男子素腎氣虛而咳痰亦用導痰之法虛症悉具痰涎上湧小便頻數謂足三陰虛而復損也朝用補養脾氣湯培養脾肺之虛氣夕用六味丸加五味子收斂耗散之精而愈大尹陳克明導痰後痰益多大便不實喜極熱飲食手足逆冷謂命門火衰而脾肺虛寒不能攝涎歸源用六味丸而愈進士張禹功飲食停滯胸滿吐痰或用藥導之痰涎上湧眩暈熱渴大便秘結喜冷飲食手足發熱謂腎水虛弱津液難降敗液為痰用六味丸而愈儒者楊文魁素唾痰諸藥不應服牛黃清心丸吐痰甚多或頭暈或熱從脅起左脈洪大有力右脈浮大而無力薛曰此三陰虧損火不能歸源用補中益氣加麥冬五味及加減八味丸補其化源而愈雄按三陰虧損補中益氣湯何得浪施秋官張碧崖面赤作渴痰甚頭暈此腎虛水泛為痰用地黃丸而愈儀制賀朝卿吞酸胸滿痰盛作瀉飲食少思用清氣化痰等藥前症益甚兩膝漸腫寒熱往來謂脾胃虛濕熱下注用補中益氣倍參術加茯苓半夏炮姜而愈考功楊林庵嘔吐痰涎胸腹脹痛飲食少思左關脈弦長按之微弱此木剋土用六君子加柴胡山梔木香而愈二守陳子忠飲食少思吐痰口乾常服二陳枳實黃連之類脾胃受傷乃問於薛薛述東垣先生云脾胃之症實則枳實黃連瀉之虛則白朮陳皮補之彼遂以二味等分為丸常服由是多食而不傷過時而不飢趙以德云予近治一男子肩井後腫痛身熱且嗽其腫按之不堅此乃酒痰流結者遂用南星半夏栝蔞根芩連竹瀝作煎飲燒蔥根敷腫處另用芥子白礬作小丸就煎藥吞二十丸服後痰隨嗽出半日約去三四碗病即愈同上羅成之既得丹溪之學歸隱崇明三沙張太尉士誠患痰疾氣怔忡諸名醫治療不效迎成之診之主以倒倉法張卒用其方諸病悉除賜勞甚厚醫史同上陸養愚治孫景陽室年近五旬向患痰火發則頭空眩暈飲食減少旋髮旋愈蓋有年矣近發轉甚將及月餘診之六脈洪滑而數按之無力肢冷麵赤肌肉黃瘦不時眩暈甚則昏不知人水穀不進其似不可攻然其脈來有神當棄症憑脈乃用枳實栝蔞膽星貝母芩連橘紅牙皂入薑汁竹瀝服之吐痰數碗四肢漸溫再用川牛黃五分配以蠟丸頓服三丸徐徐頻飲竹瀝催之腹響後服潤字丸三錢便垢穢若干病頓減後以清火消痰健脾養血調理而安吳淑止室軀體壯盛自來有痰初出口時稀白澄清唾地良久反極稠膩過勞即眩暈昏冒近則兩三日一發始則叫號既而昏憒角弓反張食頃乃蘇四肢厥冷胸腹滿硬六脈如細而且澀以為寒痰凝滯中焦用二陳導痰湯半夏與四五錢服後一夜不安痰壅愈甚口舌燥渴因想脈症不同此當棄脈從症改用貝母芩連桔梗花粉前胡膽星栝蔞竹瀝薑汁煎湯吞潤字丸五分數服後胸膈柔軟昏暈已除大便數日不行用滾痰丸三錢不應又以潤字丸三四錢催之始得更衣症減半兩日後遂晡熱唇紅面赤干唾無痰胸膈不暢竟似弱症乃清晨服丸藥生地麥冬銀柴胡黃連知母鱉甲秋石歸芍杜仲食後服煎藥半貝母黃連楂橘枳朮前胡花粉白蔻仁如是出入增損養血順氣清火消痰兩月全愈薛立齋治一男子素耽厚味胸滿痰盛此膏粱之人內多積熱與法制清氣化痰丸而愈彼以為有驗修合饋送脾胃虛者無不受害一婦人元氣素弱痰氣時作或咽間不利或胸痞等症以為鬱結傷脾以加味歸脾湯治之而愈後遇大怒前症仍作惑於眾言以為痰飲妄用祛痰之劑吐瀉數次變諸異症口噤不省薛以為脾胃復傷日用六君子一劑米飲濃煎常服匙許至四日漸進粥食乃服前藥間以歸脾和其胃調養兩月餘諸症悉愈傅青主治一老人患痰湧喉間氣不得出入其間具棺待殮先生診之曰不死令搗蒜灌之吐痰數升而蘇劉紹攽九疇古文王肯堂曰予初喜唾痰愈唾愈多已而戒之喉間梗梗不可耐輒呷白礬湯數口咯入口中用舌攪研令碎因之而漱之百餘津液滿口即從鼻中吸氣嚥下以意送至丹田默存少頃咽間清泰如未清再漱再咽以化盡為度方咯出時其味甚咸漱久則甘世人乃謂瘀濁之物無澄而復清之理何其謬哉吾嘗渡河見舟人掬濁水而入之甕糝入礬末數分即時澄清此可悟治痰之法也丹陽賀魯庵年七十餘膈間有不快飲食少思初無大害就醫京口投以越鞠丸清氣化痰丸胸次少寬日日吞之遂不輟口年餘困頓不堪僦舟來訪問脈於王則大肉已脫兩手脈如遊絲太谿絕不至矣見王有難色因曰吾亦自問必死但膈滿太甚大便秘結不通殊以為苦但得少寬即瞑目無憾也因求王疏方以至親難辭教用人參白朮之類大劑進之少竟如廁下積痰升余胸膈少寬矣更數日而歿蓋此二方乃時師常用之物本欲舒郁適增其痞本欲清痰適速其斃豈可恃哉薛立齋治一人胃弱痰盛口舌生瘡彼食滾痰丸愈盛反瀉不止惡食倦怠此胃氣受傷也以香砂六君子湯數劑少可再以補中益氣湯加茯苓半夏二十餘劑而愈夫胃氣不足飲食不化亦能為痰補中益氣乃治痰之法也苟虛症而用峻利之劑鮮不危矣施沛然治莫進士公謨患痰嗽日吐痰數盂形體瘦削僉曰火症純用柔劑診之曰此肝木乘脾也脈浮而關弦面黃而鼻青補之則瘳瀉之則劇用六君子加炒芍薑汁製連二劑不信仍用山梔黃柏之類更教以豬首佐饔飧施曰三日大瀉絕粒奈何經曰陰劑柔勝積凝為洞泄寒中之屬則真火微而榮衛至三日後大瀉脈脫鼻息如冰口不能言彼醫曰脈脫矣大勢其在今日乎急投附子或可救也曰無庸昨梔柏而今附子烏附何冰炭反掌耶寒涼過劑脾氣大傷食復滯之按之則楚先取山楂作液少服旋進獨參湯沈明生治玉峰李嘏侯之恙也病萌於已亥夏風鶴之驚至九月間夜讀忽覺神思昏沉中心若墜嗣後怔忡不已一友見其素稟清弱勤於鉛槧虛症昭然勸令服參越兩月困怠轉加眩暈特甚則以參少力薄故益至五錢一劑約三四兩後見病日深輟參勿服歷叩醫家或以為陰火亢盛當成勞瘵者或謂其冬得春脈當其時不能再見者或斷之終至癲癇者醫更藥雜歲將暮矣延診曰從前所議皆不誤也所以不即愈者未治痰也今當專事豁痰徐議其虛可耳遂用二陳湯加鉤藤菖蒲等味漸進煎劑書一案云思慮傷神痰乘包絡以致虛靈之宰不獲自持時覺心繞千絲時覺腹無一物獨處則萬緒紛紜臨事則五色眩瞀痰上逆也痰為火擾夜臥難寧痰助陽明多食不飽流於精道則夢失見之脈候則滑弦治宜先標後本驅其壅閉俾神明之官仍安厥位繼以補血養心庶滋潤之品不致泥膈而余疴不治自愈矣歸芍寧神至寶丹一料送服入春全愈錢國賓治無錫劉元女咳嗽吐痰氣短經閉骨瘦如柴但不夜熱以新婿不相顧病益劇劉延診以決死生六脈結滯或五七至中一止十餘至中一止兩更實實凡勞症脈當芤細弦牢短促今見痰脈非勞脈也以導痰湯枳實半夏膽星蒼朮茯苓陳皮白芥子各一錢甘草三分加熟大黃二錢二三劑下痰少許身體困極以參湯調理漸安令服八珍湯而愈劉云密曰愚於戊戌歲冬深終之氣主氣寒水既與司天相合而客濕土又與在泉相合更加於主氣寒水之上其病於陽氣甚矣氣乃肺主之故肺易受寒邪既病於主氣之肺陽陽氣益不得施化而水中之陽化更微致濕淫滋患故濕痰生聚於胃而不行是濕痰愈覆其陽則肺生鬱熱遂口舌為燥而肺所治之上焦亦俱不爽且移於所合之大腸而化風矣治之者宜麻黃杏仁輩以散寒炒乾薑制白朮以除濕第所郁之火驟以薑術投之適益其勢耳乃散寒以麻杏而除濕暫用二陳加南星乃入蛤粉於中以鎮陰僭而散陽郁其痰漸化而熱亦行徐以乾薑白朮輩理中乃得全愈飲孫兆治俞伯道忽患微熱心中滿頭有汗不能解眾醫以為濕病用表藥有謂食在膈者治之皆不效召孫至曰用半夏茯苓湯遂瘥眾問故曰頭有汗心下滿非濕症乃水結胸膈也水既去其病乃愈且如濕氣心下滿自當遍身汗若有食心滿頭豈得有汗若言是表身又不疼不惡寒表症何在故凡水結胸膈脅頭必有汗耳雄按此案已列卷一傷寒門張子和曰有一婦人年三十餘病滑泄經年皆云虛中有積以無憂散五七日一服至二十服不效又服纏積丹軟金丹丸諸藥皆不效其人服藥愈速病勢愈甚飲食日減人或謂曰此休息痢也宜灸中脘及左右穴也下氣海及膀胱穴以三里引之每年當冬至日夏至日灸之前後計萬餘壯忽門外或者曰此病我屢識蓋傷飲之故即日桃花正開俟其落時以長棘針刺之得數十萼勿犯人手以白麵和作餅子文武火燒令熟嚼爛以米飲湯下之病人如言服之不一二時瀉如傾前後六七日計數十行昏困無所知覺惟索冷水徐徐而飲至六七日少省後食日進神日昌氣血日和不數年生二子子和治郭敬之留飲面目浮腫不能食腳腫連腎囊痛先以苦劑湧之後以舟車丸浚川散瀉之病去如拾遺又一田叟姓楊其病嘔酸臭水十餘年本留飲諸醫皆以燥劑燥之中脘臍胻以火艾燔針刺之瘡未嘗合張以苦劑越之其涎如膠乃出二三升談笑而愈李七老病湧水症面黃而喘兩足皆腫按之陷而復起行則濯濯有聲常欲飲水不能睡臥張令上湧去痰而汗之次以舟車丸浚川散下之以益腎散復下之以分陰陽利水道之劑調之水盡瘥一婦從少年時因大哭罷飲冰困臥水停心下漸發痛悶咸以為冷積治以溫熱之劑及禁食冷物一聞茶氣病輒內作如此數年燎灸燒艾瘡孔數千十餘年後小大便秘悶兩目如昏積水轉甚流於兩脅世謂水癖或謂支飲硇漆稜莪攻磨之藥竟施之矣食日衰積日茂上至鳩尾旁至兩脅及臍下但發之時按之如水聲心腹結硬手不可近者月發五次甚則欲死已二十餘年張診其脈寸口獨沉而遲此胸中有痰先以瓜蒂散湧痰五七升不數日再越痰水及鬥又數日上湧數升凡三湧三下汗如水者亦三其積皆去以流濕飲調之月餘大瘥中丞常子正苦痰飲每食飽或陰晴節變率十日一發頭痛背寒嘔吐酸汁即數日伏枕不食服藥罔效宣和初為順昌司錄於太守蔡達道席上得吳仙丹方服之遂不再作每遇飲食過多腹覺滿脹服五七十丸便已少頃小便作茱萸氣酒飲皆隨小水而去前後痰藥甚眾無及此者用茱萸湯泡七次茯苓等分為末煉蜜丸梧子大每熱水下五十丸其效如神朱氏集驗方本草綱目陸養愚治施南石二十九歲患晡熱至天明方退夜熱尤甚咳嗽無痰咳則痛引胸脅熱甚則咳亦甚咳甚則痛亦甚初服芎蘇散喘急殊甚易以前胡杏仁桑皮蘇子輩亦不效後以陰虛治之二冬二母服數月飲食漸減肌肉羸瘦或謂勞瘵已成不可療矣最後一醫診得脈弦數左關尤甚此肝火也用柴胡青皮黃連赤芍山梔白芥子數劑亦無驗於是苦於藥餌不延醫三月診之六脈沉數而滑右關尺更有力其脅痛若從右而應乎左因思仲景云飲在脅下咳則引痛謂之懸飲今咳痛明是其症第十棗湯非常用之方且病人狼狽已極亦必不肯服乃以潤字丸料加入甘遂和丸令一二分一服日二服每日加一分加至五分一服使便出稠痰碗許中有一塊半硬半軟如雞子大脅痛如失熱嗽減之十之六七又用人參白朮歸芍茯苓貝母甘草作煎劑與丸藥間服丸藥仍減一分直待便中無痰始止丸藥用前煎藥日一帖調月餘全安雄按體虛病實深得緩攻之法迨衰其半又合寓攻於通補之道陳三農治一婦患眩暈腰痛過寅卯二時則日夜昏迷不省人事身如在浮雲中脈細數弦滑細為濕數為熱弦為飲濕熱痰飲留滯胸膈隨氣升降上湧則為眩暈下墜則為腰痛痰飲沃心包致竅不通故昏不省人事至巳午時心火助其濕熱鼓擊痰涎故昏癡益甚也此必痛飲所致叩之果然遂以稀涎散湧酸臭痰數升仍以舟車丸泄如漏屋水者五六次諸症均愈一貴婦患溢飲遍身虛腫用金沸草散一劑汗出腫減繼以澤瀉湯加枳實旋覆花前胡四劑而安一婦患時疫飲水過多胸膈堅痞咳逆倚息短氣不臥湯飲入而吐出諸藥罔效作停飲治以五苓散一劑愈一婦患霍亂飲陰陽水左腹堅硬痛極作留飲治以半夏旋覆花各三錢澤瀉青皮枳實白朮乾薑各一錢吳茱萸二分一劑愈李士材治秦景明素有痰飲每歲必四五發發即嘔吐不能食此病久結成窠囊非大涌之弗愈也須先進補中益氣十日後以瓜蒂頻投投湧如赤豆沙者數升已而復得水晶色者升許如是者七補之七湧之百日而窠囊始盡專服六君子八味丸經年不輟吳孚先治西商王某氣體甚厚病留飲得利反快心下積堅滿鼻色鮮明脈沉此留飲欲去而不能盡去也用甘遂甘草半夏白芍加白蜜五匙頓服前症悉痊或問甘遂與甘草其性相反用之無害而反奏效何也曰正取其性之相反使自相攻擊以成疏瀹決排之功西人賦性厚尤當用之張景岳尊人早年善飲後及四旬遂得痰飲之疾嘔酸脹滿飲食日減眩暈不支驚惕恍惚痰瘧等症相繼迭出百方治痰無效因慕張子和吐法之妙遵而用之初用獨聖散茶調散及虀汁之類一吐稍效再吐再效自此屢用不止雖諸症漸退而元氣勿復也如此年餘漸覺純熟忽悟其理遂全不用藥但於五鼓睡醒時仰臥用噯提氣氣有不充則嚥氣為噯隨咽隨提痰涎必隨氣至雖最深之痰無不可取其最後出者形色臭味紫氣酸惡不堪言狀每吐後或至唇咽腫痛但以涼水一二口漱咽解之吐畢早膳用屏五味用薄粥一二碗以養胃氣自四旬後絕不用酒行吐法四十餘年自六旬外則一月或半月必行一次凡吐後神氣必倍旺陽道必勃然一切內傷外感無不盡卻蓋道用督此則用任所用不同所歸一也不惟卻病而且延年後至八旬外猶能登山及燈下抄錄古書無病而卒葉天士曰按張子和儒門事親云凡人之病自外而入由內而起皆邪氣也邪氣加諸身速攻之可也及其聞攻則不悅聞補則樂之至於無邪無積之人始可議補有邪有積而議補者如鯀湮洪水之徒也故立汗吐下三法以去病病在表者汗之在上者吐之在下者下之以病去為先病去之後以穀肉果菜補之非藥補也景岳言子和吐法之妙不知汗下之法更妙然以法惟在上者吐之非一概可吐也又有補論一篇甚言誤補之害惟庸醫治病純講補其虛不敢治其實世人皆以為平穩而自誤景岳但見其吐法不見其補論一篇乎子和之學亦宗河間與東垣丹溪並傳大用寒涼攻擊以治病毫不用補以補之適足為害也景岳重子和而毀河間丹溪豈子和另有溫補之書抑不敢議其非歟張三錫治一人肩背與膝相引而痛寸脈弦知痰飲為患也投小胃丹一服吐痰半升間日再進一服瀉痰小有如膠者一升許病良已張子和治一人病留飲者數十年不愈診之左寸脈三部皆微而小右手脈三部皆滑而大微小為寒滑大為燥以瓜蒂散湧其寒痰數升汗出如沃次以導水禹功去腸中燥垢亦數升其人半愈然後以痰劑流其餘蘊以降火之劑開其胃口不逾月愈朱丹溪治一人素耽於酒患遍身關節腫痛此愈彼劇胸膈不寬此酒濕症痰飲在胃流注經絡即流飲症也用二陳湯加酒芩蒼朮羌活威靈仙澤瀉倍葛根而愈許叔微自患飲澼三十年始因少年夜坐寫文左向伏几是以飲食多墜左邊中夜必飲酒數杯又向左臥壯時不覺三五年後覺酒從左下有聲脅痛食減嘈雜飲酒半盞即止十數日必嘔酸水數升暑月止右邊有汗左邊絕無遍訪名醫及海上方間或中病愈得月餘復作其補如天雄附子礬石利如牽牛甘遂大戟備嘗之矣自揣必有澼囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則不流莫若燥脾以去濕崇土以填科臼乃製蒼朮丸服三月而疾除蒼朮一斤去皮切片末之用白芝麻半兩水盞研濾取汁大棗十五枚爛煮去皮核以麻汁勻研成稀膏搜和入臼熟杵丸如桐子大干之每日空腹溫湯吞下五十丸加至百丸忌桃李雀鴿初服時必膈微燥且以茅朮制之覺燥甚即進山梔散一服久之則不燥也山梔散用山梔一味干之為末沸湯點服馬元儀治沈表侄因悲哀勞役面色枯白形體憔悴右脅有塊凝結作痛痛則嘔手足厥逆飲食不思大便時溏時結吐出痰飲動輒盈盆或一日一發或間日一發苦楚萬狀診其脈左三部弦而勁急右三部虛微無力方用附子理中加桂湯稍安越三日又發與前方不應乃倍加附子甚安後復發前方又不應因思仲景傷寒治法有用真武湯一法原以真火飛越水氣上逆故用此以復陽收陰坐鎮少陰北方之位究其功用全在行水醒脾之妙今因勞郁所傷中氣損甚由是所勝之木乘脾所不勝之水侮之而逆木橫則痞結作嘔水逆則痰飲泛溢若非真武何以攝元陽而鎮陰邪耶遂用此方倍加分兩多用人參連進三十餘劑嘔漸已痰漸少令早服八味丸晚服附桂理中丸調理諸症悉愈惟結塊不除則以久積陰寒難解恐成痼疾也用真武湯甚合法而多加人參未免又沿俗蓋參性膩滯最不宜於飲症也此症元氣復後即宜間用攻劑以盡根株徒事溫補安能望結塊之去耶繆仲淳治丹陽葛文學字十內人因作家勞郁患飲每每發嘔吐不已腸如欲出所吐俱清水動以盆桶計日夜不止不思飲食就醫金壇諸醫以健脾行氣理郁清痰藥投之愈劇困頓待斃計無復之矣繆視脈審病知為飲無疑乃用薑製半夏四兩廣皮四兩茯苓四兩豬苓二兩澤瀉米泔浸炒二兩旋覆花三兩厚朴薑汁炒一兩五錢白朮二兩枳實麵炒一兩川連一兩木香五錢加人參一兩三錢一劑吐止再劑霍然隨啖粥糜脾氣漸復至今每病作檢方服之即平此丸方也用稀米糊加薑汁和丸如綠豆大每服五錢淡薑湯下如作煎劑取二十倍中一倍加白蔻仁末木香汁薑汁和服因寒濕者加蒼朮二兩木香五錢白豆蔻五錢因郁者加紫蘇四錢去蒼朮云間康孟修患寒熱不食久之勢甚危以治寒熱劑投不應遍檢方書與王宇泰議投五飲丸立瘥蓋飲症原有作寒熱之條故治飲病自退矣廣筆記吳橋治汪錢始壯輒患嘔逆胸膈痛諸醫悉以膈治骨立而羸久之隨絕而汗如流水漿不能入口診其脈即浮濡不任按無他端曰此停飲爾誤以膈治病者心悸則氣澀於胸中血從氣行氣阻則血亦阻矣此二缶撞鐘惑也第先屏二缶然後治之瘀血當下病者憮然為間曰敬如公言遂修行氣一劑飲之飲未畢而痛止徐下黑糞瘀血畢病乃平太函集程氏有少婦病小腹痛吐痰多嘔清水發熱泄瀉肌削而屏饔飧六脈沉細弦數曰此積飲也法當發其積而病可除第病久而孱伐無太過劑以和中去濕小腹大痛而昏既則嘔吐盈盆沉沉皆綠水眾異曰何為有此橋曰吾固以為濕也蓋地下濕則生苔其緣同尋無恙同上羅練年近壯病中脘疼痛連背脅及心間吐清水久之痛甚如剚刃人事昏昏族醫技窮謂六脈絕矣橋後至則曰停飲也痛甚故脈伏非絕也遂以溫補之劑投之一服而脈見再服而愈太函集徐靈胎曰凡病必有邪如人病湯水下咽少頃即傾囊湧出者此乃胃中積水寒飲故食入即拒法當扶陽滌飲驅開寒邪然後補其中氣亦必兼滌飲之藥不可竟用參術補住寒飲若無邪而現症若此乃胃絕之徵亦不必治矣洞庭一金姓者患嘔吐症其先人與葉氏甚相契葉氏竭力治之年餘而病者幾殆因求治於余余曰蓄飲也世無知者為制一方其病立已其人因受業於余吞酸𩞄雜潘塤曰余昔年脾胃受病每日申未時飯至二鼓食消方寢夜半睡醒噯氣吞酸糟粕乘氣浮上起坐摩娑久之復寢漫服枳朮平胃散或分消或疏導久不效自思年六旬外恐脾胃弱不能運化卻去晚餐凡黏硬果物及濕熱酒面一切不入口不知何以致此因讀東垣脾胃瀉論乃知陽氣下陷陰火上衝脾胃不實故耳得一方曰補脾胃瀉陰火升陽湯藥品主佐在本方並服藥時日所宜所忌切中病情又讀調理脾胃治驗謂不可用淡滲之劑抑遏陽氣反助陰邪必加升陽風藥以羌獨活升麻防風炙甘草根截入煎藥水煎服乃依方服之片時後陽氣縷縷而上不數日陰火漸伏脾胃實而愈高鼓峰治杭人沈孟嘉妻患吞酸膈痛屢年矣肌肉枯削幾於絕粒診之六脈細數此木乘脾土也先投六君子湯加炮姜十餘劑覺吞酸減半繼用補中益氣湯加半夏炮姜十餘劑而吞酸盡去膈痛亦除次用歸脾湯倍木香加炮姜吞八味而全愈薛立齋治一婦人飲食後或腹悶或吞酸自服枳朮丸飲食日少胸膈痞滿腿肉痠痛畏見風寒或用養胃湯腿痛浮腫益甚月經不行此鬱結所傷脾虛濕熱下注清晨四君子湯芎歸二陳午後以前湯送越鞠丸諸症漸見愈又用歸脾八珍二湯兼服兩月餘而經行一婦人胸滿少食或腹脹吞酸或經候不調此中氣虛不能施行化也用補中益氣加砂仁香附炮姜而進飲食更以六君芎歸貝母桔梗而經自調一婦人飲食少思胸中嘈雜頭暈吐痰此中氣虛而有熱用六君子湯加黑山梔桔梗而愈後因勞碌頭暈發熱吐痰不食用補中益氣加半夏茯苓天麻而痊一婦人中脘嘈雜口中辛辣或咳嗽吐痰發喘面色或白或赤此脾氣虛而肺中伏火也用六君子加山梔桔梗柴胡及炒黑片芩苓治之尋愈一婦人嘈雜吞酸飲食少思大便不實此脾氣虛寒而下陷用補中益氣湯加茯苓半夏炮姜漸愈又常服人參理中丸而安一婦人飲食後嘈雜吞酸此熱鬱為痰用六君子湯送越鞠丸漸愈又用加味歸脾湯而痊後因怒兩脅脹痛中脘作酸用四君子湯送左金丸漸安仍用六君湯送下越鞠丸而瘥朱丹溪治一人因濕熱病嘔吐酸水如醋用二陳湯加姜炒芩連蒼朮白朮梔子藿香香附砂仁而愈陳三農治一婦每食止碗許稍加非大便泄瀉即噎腐吞酸腹脹痞悶此脾虛寒不能化也用六君子加茱連藿香香附砂仁神麯煨姜而愈薛立齋治一婦人飲食少每碗許稍加非大便不實必吞酸噯腐或以為胃火用二陳黃連枳實加內熱作嘔曰末傳寒中故噯氣吞酸脹滿痞悶不信仍用火治虛症並至月經不止始信以六君子加炮薑木香數劑元氣漸復飲食漸進又以補中益氣飲食漸進加炮薑木香茯苓半夏數劑全愈後因飲食勞倦兼之怒氣飲食頓少元氣頓怯用前藥便加發熱誠似實火脈洪大按之而虛兩尺如無此命門火衰用補中益氣加薑桂及八味丸兼服兩月餘諸症悉愈此症若因中氣虛弱者用人參理中湯或六君子加木香炮姜不應用左金丸或越鞠丸虛寒者加附子或附子理中湯無有不愈一男子虛弱惡食雖熱食亦少作脹吞酸日削瘦服參苓等藥及灸脾腧等穴不應用八味丸治之而愈此真氣不足不能生土虛火上炎之症也一婦人年二十餘飲食每每因怒氣吞酸噯腐或兼腿根焮疼服越鞠丸等藥不應此脾氣虛濕氣下注而然以六君子湯香附砂仁藿香炮姜數劑少愈更以六君湯數劑而愈一男子瘰癧已愈患吞酸服參術藥不應彼謂餘毒薛治以附子理中丸而愈張景岳曰予向在都中治一搢紳病吞酸告以為寒彼執為熱堅持造酒之說以相問難莫能與辨竟為芩連之屬所斃此見理不真而固執以致釀成大害者選頭徐靈胎曰頭風一症往往本熱而標寒清火之藥固能愈風火輕症或有寒邪犯腦及風寒外來則溫散之法固不可略而外提之法尤當博考也凡屬形體之疾皆當兼外治不明外治之法服藥雖中病僅得醫術之半耳又曰頭風之疾輕者易愈其重者風毒上攻絡血橫逆重則厥冒久則傷目必重劑並外治諸法方能有效有人三代不壽問彭祖祖觀其寢處果有穴洞當其腦戶令塞之遂得壽蓋隙風入耳吹腦則陽氣散頭者諸陽所最以主生也延壽書竇材治一人起居如常但時發頭痛此宿食在胃脘也服丁香丸十粒而愈陽明食積頭痛張子和治南卿陳君將赴秋試頭痛偏腫連一目狀若半壺其脈洪大張出視內經面腫者風此風乘陽明經也陽明氣血俱多風腫宜汗乃與通聖散入生薑蔥根豆豉同煎一大盞服之微汗次日以草莖入鼻中大出血立消陽明風熱頭痛王定國病風頭痛至都梁求明醫楊介老治之連進三丸即時病失懇求其方則用香白芷一味洗曬為末煉蜜丸彈子大每嚼一丸二茶清或荊芥湯化下遂名都梁丸其藥治頭風眩暈女人胎前產後頭痛及血風頭痛皆效百一選方按此方惟陽明風熱宜之余不可服張大復曰偏頭風之苦病者不能自言方亦多岐而罕效戊申予忽病此正悶郁時周叔明以餅法見寄未服也五月五日顧民服貽二餅貼太陽上一夕良已法用南星半夏白芷三味等末爛搗生薑蔥頭為餅不服不攻不熏視諸方更簡便也筆談按此方風痰用之姚應鳳治嚴州施盛宇三載患頭痛不可忍姚曰法當取首中骨今八月時收斂難猝治期以明歲春乃割額探去其骨出瘀血數升頓愈錢塘縣誌此症似與腦中石蟹略同雄按未免涉誕龔子才治杜侍御患頭痛如刀劈不敢移動懼風怕語言耳鳴目中溜火六脈緊數有力與酒浸九蒸九曬大黃為末三錢茶調服一劑而愈此亦陽明血熱為病病在至高之地故大黃必用如是製法孫文垣治蔡樂川內人患頭痛如刀破髮根少動則痛連滿頭痛倒不省人事逾半時乃蘇通身亦作疼胸膈飽悶飲湯水停膈間不下先一日因怒吐水數次蛔蟲三條今或惡風或惡熱口渴或不渴而大便秘脈則六部皆滑大有力此痰厥頭痛也先以藿香正氣散止其吐繼以牛黃黑虎丹清其人事頭仍痛甚又以天麻藁本各三錢半夏二錢陳皮白芷薄荷麻黃生薑蔥白煎服得少汗而頭痛少止至晚再服之更痛止大半人事未全清此蓋中州痰盛非下不可乃用半夏五錢巴霜一分麵糊為丸每服三十丸生薑湯下下午大便行三次皆稠黏痰積也飲食少進餘症差可惟遍身疼未盡去改用二陳湯加前胡石膏藁本薄荷枳殼黃芩石菖蒲調理而安木盛土衰朱丹溪治一人因浴冷水發熱頭痛脈緊此有寒濕也宜溫藥汗之蒼朮麻黃乾葛甘草陳皮川芎二劑得汗後知病退又與下補藥陳皮川芎乾葛白朮蒼朮人參木通甘草四劑姜水煎服濕熱一婦人頭痛發熱而渴白朮陳皮川芎乾葛木通甘草水煎溫服陽明病婁全善治一老婦人頭病歲久不已因視其手足有血絡皆紫黑遂用三稜針盡刺出其血如墨汁者數盞後視其受病之經刺灸之而得全愈即經所謂大痹為惡及頭痛久痹不去身視其血絡盡出其血是也三陽風熱李時珍治一人病氣鬱偏頭痛用蓖麻子同乳香食鹽搗貼一夜痛止治標妙法李士材治蔣少宰頭痛如破昏重不寧風藥血藥痰血久治無功脈之尺微寸滑腎虛水泛為痰也地黃四錢山藥丹皮澤瀉各一錢茯苓三錢沉香八分日服四劑兩日輒減六七更以七味丸人參湯送五日其痛若失近日上盛之病最多觀此可悟一切少陰病吳孚先治一人患頭病痛不可禁脈短而澀吳曰頭為諸陽之首若外邪所乘脈當浮緊而弦今反短澀短則陽脫於上澀則陰衰於下更加手足厥冷名為真頭痛與真心痛無異法在不治為猛進參附或冀挽回萬一如法治之果愈李成章官六安衛千戶善針灸或病頭痛不可忍雖震雷不聞李診之曰此蟲啖腦也合殺蟲諸藥為末吹鼻中二三日蟲即從眼耳口鼻出即愈明史雄按此症雖奇實有是病婺人多患之彼處呼為天白蟻亦因風熱所生也一人素病黃忽苦頭痛不已發散降火歷試無效診得脈大而緩且一身盡痛又兼鼻塞乃濕家頭痛也投瓜蒂散一匕內鼻中黃水去一大杯而愈張三錫屢見苦頭痛百法不效詢之曾生過楊梅瘡用土茯苓四兩白蘚皮苦參金銀花各三錢黃柏一錢皂角子三十粒苡仁木通防風各二錢氣虛加參耆血虛加四物大獲其驗身痛亦效治法匯濕毒一人頭痛脈滑而數乃痰火上攻也二陳荊芥羌活酒芩不應加石膏二劑稍可終未盡除前方加熟大黃三錢食遠煎服病去如脫同上陽明痰火一人苦頭痛眾作外感治診得右手寸口脈大四倍於左兩尺洪盛乃內傷氣血頭痛也外兼自汗倦怠以補中益氣湯加炒黃柏一劑知二劑已氣虛一人頭痛而面色青黑身體羸瘦左手寸關俱不應指兩尺獨洪盛因作陰虛治用滋陰四物加黃柏知母元參二服減半十日痊血虛一婦苦頭痛誤為外感治發散消導愈投愈甚診之氣口急大而數按之即濡右脈而虛大詢之先不熱服藥後始熱曰風寒必先發熱在一二日間豈有先不熱而後熱者此氣虛頭痛也觀其氣短不足以息余皆可知今發散過度復耗其氣又復下之復損其血氣血兩傷宜乎虛火獨熾而身反熱也非大補詎能挽回遂以補中益氣湯大劑加熟附子一片為嚮導雄按此藥未嘗無疵服下即熟睡覺而痛止第人事不清復加筋惕肉瞤振振不寧彼歸咎於補劑曰虛極所致復更一醫用柴胡表藥致一身之火遊行於外變為斑爛彼益信為傷寒矣化斑承氣日進遂不救同上一人頭痛身形拘急惡寒便秘噁心作食鬱治不應診得氣口脈和平獨尺數而細且行步艱難乃腳氣欲動也從腳氣治而愈同上一人頭痛作外感治不應左脈平和氣口獨盛症兼飽悶噁心乃食鬱也消導而愈同上陽明病一人牙與頭角互痛乃少陽陽明二經病盛之故清胃散對小柴胡去半夏人參加薄荷石膏二劑瘳同上一老嫗頭痛連額發散降火備用不效面上皆出小紅泡有微水不甚潰一月後痛悉移於右左眼胞上紅腫且懶於言動飲食不甜用辛涼愈甚六脈濡弱如珠絲初按少弦因作氣虛治六君倍黃耆加蔓荊子三服後漸安心跳不眠愈急乃以調中益氣湯加茯神元參棗仁柏子仁連進數服頓愈同上東垣常病頭痛發時兩頰青黃眩暈目不欲開懶言身體沉重兀兀欲吐潔古曰此厥陰太陰合病名曰風痰以局方玉壺丸治之灸俠谿即愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工矣醫說續編湖南押衙顏思退治頭風掣痛用蠟二斤鹽半斤相和於錫罐中熔令相入捏作一兜鍪勢可合腦大小搭頭量至額頭痛立止經驗方同上王叔權云予年逾壯寒夜觀書每覺腦冷飲酒過量腦亦痛甚後因灸囟會穴而愈有兵士患鼻衄不已予教令灸此穴即愈有人久患頭風亦令灸此穴即愈但銅人明堂經只云主鼻塞不聞香臭等疾而已故予書此以補其治療之缺然以腦戶不宜針觀之囟會亦不宜針針經只云八歲以下不宜針恐未盡也叔權母氏隨叔權赴任為江風所吹身體頭動搖如在舟車上如是半年乃大吐痰遍服痰藥並灸頭風諸穴方愈有士人患腦熱疼甚則自床下頭以腦拄地或得冷水稍得安而疼終不已服諸藥不效人教灸囟會而愈熱疼且可灸況冷疼乎凡腦痛脾瀉先宜灸囟會而強間等穴蓋其次也以上並資生經薛立齋治一儒者酒色過度頭腦兩脅作痛以為胃虛而肝病用六味地黃料加柴胡當歸一劑頓安商儀部勞則頭痛作陽虛不能上升以補中益氣湯加蔓荊子而痊王肯堂治一人寒月往返燕京感受風寒遂得頭痛數月不愈一切頭風藥無所不服厥痛愈甚肢體瘦削因思此症明是外邪緣何不解語云治風先治血血行風自滅本因血虛而風寒入之今又疏泄不已烏能愈哉又云痛則不通通則不痛乃用當歸生汗活血木通通利關竅血脈其人能酒用酒一斗入二藥其中浸三晝夜重湯煮熟乘熱飲之致醉則去枕而臥然有火鬱於上而痛者宜酒合石膏之類治之又方用芎歸熟地連翹各二錢以薄荷二錢放碗內將滾湯衝下鼻吸其氣候溫即服服之立愈然亦為血虛者設耳馬元儀治一人患頭痛經年不愈早則人事明瞭自午至亥神氣昏憒不寧作風治治無效診之兩脈俱沉且滑此太陰陽明痰厥頭痛也用礞石滾痰丸間服導痰湯以盪滌之次以六君子少加秦艽全蠍調理而安張樹滋妹患頭痛累月診之陽脈大陰脈澀曰此陰衰於下陽亢於上上盛下虛之候也法宜六味地黃丸加青鉛五錢俾清濁定位斯不治痛而痛自止矣所以然者以陽氣居上體本虛也而濁氣干之則實陰氣居下體本實也而氣反上逆則虛頭為清陽之位而受濁陰之邪陰陽混亂天地否塞而成病矣治之者不察其脈概以頭痛為風火專行透解之劑有不益虛其虛者乎朱某患頭痛累月苦不可忍咸用散風清火之劑診其脈浮虛不鼓語言懶怯肢體惡寒此勞倦傷中清陽之氣不升濁陰之氣不降也故汗之反虛其表清之益傷其中其惡寒乃氣虛不能上榮而外固也況脈象浮虛體倦語怯尤為中氣氣弱之驗與補中益氣湯雄按此湯升清則有之如何能降濁升清降濁加蔓荊為使令至高巔一劑知二劑已一人頭風畏冷首裹重綿三十年不愈以蕎麥粉二升水調作二餅更互合頭上微汗即愈李樓怪症奇方王帶存曰此方先裝溪伯曾治族祖經驗繆仲淳治梁溪一女子頭痛作嘔米飲不能下曰因於血熱血虛火上炎也麥冬五錢橘紅木瓜茯苓各二錢白芍三錢枇杷葉三大片蘇子錢半甘菊錢半烏梅二個竹瀝一杯蘆根汁半碗二劑嘔止頭尚痛加天麥冬二錢頭痛止加土茯苓二兩小黑豆一撮全愈廣筆記沈觀頤中丞傳自一道人頭風神方予僕婦患此痛甚欲自縊服二劑數年不發土茯苓四兩忌鐵金銀花三錢蔓荊子防風明天麻各一錢元參八分辛夷川芎各五分黑豆四十九粒燈心二十莖芽茶五錢河水井水各盅半煎一盅服廣筆記廣筆記治半邊頭風屬火症者用之大黃末三分黃芩末一錢二味和生白酒一碗頓熱調勻服之即愈立齋治一婦人腦左腫痛左鼻出膿年餘不愈時或掉眩如坐舟車正許叔微所謂肝虛風邪襲之而然也以川芎一兩當歸三錢羌活旋覆花細辛蔓荊子防風石膏藁本荊芥穗半夏曲乾地黃甘草各五錢乃制一料每服一兩姜水煎服而愈劉云密曰一婦季冬受寒至於中春巔頂並左後腦痛是原病手足太陽寒水寒久郁化熱上行以病於手太陽因風升之化不達而病亦在左厥陰也經謂過在巨陽厥陰者誠然診者云手太陽熱甚於風足厥陰熱勝於濕更謂脾肺亦有鬱熱余止治手太陽而微兼肺以手太陽之氣化在肺主氣者也心有微熱並治足厥陰以風升之化達而手太陽之氣化乃暢更微利小腸以通血脈而和其氣並心經之熱亦去故不必多治他經也按此亦治巔頂之一因見寒者溫治之未盡耳酒片芩二分半酒枯芩分半蔓荊子二分半防風分半萸連二分半柴胡三分藁本三分升麻二分川芎二分酒黃柏三分當歸三分木通四分牛膝三分水煎一劑立愈嘉祐初仁宗寢疾藥未驗間召草澤醫始用針自腦後刺入針方出開眼曰好惺惺翼日聖體良已自爾以穴目為之惺惺穴經初無此名或曰即風府也書謾煉宋張舜民吳橋治方簡妻病五年食饘不盡一器至夜則頭岑岑遞絕遞蘇達旦乃定橋至曰食少久臥肌宜脧今且腴而脈不數奚病為或婦當娠大損血於頭審是治二年可受胎復產男而起矣蓋婦嘗妊哭姑髮根有疣如豆大出血數升匿勿令人知尋免男弗育也治不補氣專補血累二年而舉子命之曰去病遂如常太函集眉發須李林甫婿鄭平為省郎林甫見其髩發斑白因曰上明日當賜甘露羹鄭郎食之能烏髮翼日食之一夕兩髩如黳瑯琊代醉編李卿換白髮方云刮生老薑皮一大升於鐺中以文武火煎之不得令過沸其鐺惟得多油膩者尤佳更不須洗刮便以姜皮置鐺中密封固濟勿令過氣令一精細人守之地色未分時黎明也便須煎之緩緩不得火急如其人稍疲即換人看火一伏時即盛置於瓷缽中研極細李方雖云一伏時若火候勿至日西即成藥也使時以簪腳蘸取如麻子大先於白髮下點藥訖然後拔之再點以手指熱捻之令入肉第四日當有黑者生神效梅師治年少白髮拔去白者以白蜜塗毛孔中即生黑髮不生取桐子搗汁塗上必生黑者千金療發黃熊脂塗髮梳之散頭入床底伏地一食頃即出便盡黑不一升脂驗薛立齋治一男子因大怒發熱眉發頓落蓋發屬腎而眉屬肝此肝腎素虛為怒所激陰火愈盛銷鑠精血而然也用六味丸料加柴胡山梔黃柏數劑漸生又二十餘劑而完一男子染時瘡服換肌散之類眉毛頓落遍身作癢或時赤暈乃燥藥損其陰血陽氣偏旺而然朝用四物湯倍熟地加茯苓白朮丹皮山梔甘草夕用六味丸料加當歸黃耆治之瘡既愈眉毛亦生一男子素不慎房勞其發忽落或發熱惡寒或吐痰頭暈或口乾作渴或小便如淋兩足發熱或冷至脛屬足三陰虧損而陰火內熾朝用十全大補夕用六味丸料加炒黑黃柏枸杞治之諸症悉退而發漸生一男子遍身瘙癢服祛風辛燥之劑眉發脫落此前藥復傷肝腎精血虛而火內熾所致朝用八珍湯加麥冬五味夕用六味丸枓加當歸黃耆治之風熱退而眉發生矣一儒者遍身作癢破膿血淋漓眉毛脫落如癘風症久服祛風等藥致元氣虧損用補中益氣湯加茯苓而愈後失調理日晡熱甚用八珍湯加五味麥冬五十餘劑而痊繆仲淳烏髮明目丸女貞子酒拌炒九蒸九曬淨末一斤甘菊花十二兩何首烏赤白各半如法蒸曬淨末二斤牛膝酒蒸一斤桑葉一斤生地酒洗淨二斤甘枸杞一斤半乳拌茯苓酥一斤麥冬一斤半槐角子十兩蒼朮蜜酒拌蒸曬十二兩人參一斤人乳拌烘乾山萸肉酒蒸十二兩烏飯子之黑者取汁熬膏每斤加煉蜜半斤丸如梧子大每服五錢日三服白湯送下忌白萊菔牛肉牛乳桃李蒜雀蛤繆仲淳定烏須方何首烏勿去皮黑豆同牛膝蒸制如常法最後用人乳拌曬三四十次赤白各二斤女貞實酒拌九蒸九曬二斤旱蓮草熬膏十二兩烏飯子即南竹子也熬膏十二兩蒼朮米泔浸蒸曬三次去皮切片十二兩真川椒紅去白膜開口者十二兩沒石子十兩為細末以旱蓮草膏烏飯子膏同煉蜜為丸如梧子大每五錢空心飢時各一服白湯下面孫兆治樊樓店家劉三一日滿面皆黑色有相者斷云不過月餘死既逾月且安適孫入店與客飲酒遂拜孫述說其病狀孫診之曰非病也乃為臭氣所熏穢氣蓄於面部不散故有此色問劉汝一月前聞甚一陣非常臭氣不能避耶劉曰一日登溷其廁臭氣不可聞隱忍良久下廁明日遂有此疾孫曰去至臭無過香我家有南人將至售香可用沉檀二香各一兩碎擘焚於爐中安帳內以熏絹被蓋定勿令香氣散可端坐香邊瞑目靜坐候香氣散方可出帳明日引鑑照之劉依其言面色漸變旬日如故樓全善曰腎臭腐屬水脾臭香屬土廁臭者腐臭也故聞之則入腎而面黑沉香者香臭也故熏之則脾土勝腎水面色還也蘇子由面有瘡高安丐者趙生謂子由曰君好道而不得要陽不降陰不升故肉多而浮面赤而瘡吾將教君碗水以灌溉子骸經旬諸疾可去子由用其說信然惟怠不能久故不能極其妙龍川志略治面部生瘡或鼻臉赤風粉刺用盡藥不效者惟有此藥可治神妙不可言每以小許臨臥時洗面令淨如面油用之近眼處勿塗數日間瘡處自平赤亦消如風刺粉刺一夕見效敏捷點方用生硫黃五分香白芷五分芫青七個去翅足全蠍一個洗炒栝蔞五分膩粉五分蟬蛻五個洗去泥上為細末麻油黃蠟約度如合面油多少熬熔取下離火入諸藥在內每用少許塗面上醫說續編趙君猷撫干所傳云有二卿趙再可知湖州時與一僧相厚而僧患酒齄鼻端生赤贅數枚大者如橘小者如梅李下垂過口言語飲食皆所妨廢良自厭苦之郡有一小兵事刀鑷人但聞其善取靨痣不知其能治酒齄也一旦自言於僧請醫此疾即以藥敷之凡半月餘每日取惡物如膿血自皮膚出者甚多其贅後悉成痂落去皮面瑩然遂以十千為謝且語二卿備直齋閣而求得其方以傳秀邦治人良驗用黃丹五文餅藥五十文著大罐子盛硇砂三十文研極細用巴豆十個去殼膜紙裹壓去其油上件同入餅藥罐子中慢火熬三沸取下續入研細生礦灰三錢酒齄鼻用鵝毛掃在紅處一日一次上藥以追出毒物病退即止雀子斑用小竹捧兒挑藥點患處才覺微腫即便洗去恐力太猛並集成同上陳三農治鄰婦面上一熱即通身躁熱而汗隨之日夜六七次百治不愈細思之經曰面熱者足陽明病此脾陰不足而胃火有餘也以山藥為君歸芍地黃為臣以補脾陰之不足用石膏生甘草以瀉胃火黃耆麥冬五味以固腠理加竹葉以去煩熱二劑愈朱丹溪治一婦人面頰兩腮熱腫此膈壅之病也乾葛桔梗各錢半升麻一錢蘇葉錢半薄荷一錢炙甘草七分姜一片水煎食後服王莽遺孔休玉休不受莽曰君面有疵美玉可以滅瘢休由不受莽曰君嫌其價重乎遂槌碎進休休方受之薛立齋治吳黃門之腮赤腫痛此胃經風熱上攻所致以犀角升麻湯二劑而平又姜大理患此處前方為人所惑謂湯內白附子性溫而不服另用荊防敗毒散愈甚後雖用此湯尚去白附子亦不應後用前方三劑而愈本草云白附子味甘辛氣溫無毒主面上百病及一切風瘡及風熱之主藥內經曰有是病有是藥苟不用主病之藥病焉得而愈哉吳進士面患瘡已潰作渴自服托裡藥及降火藥不應診其脈浮而弱丹溪云潰瘍作渴屬氣血俱虛況脈浮弱投以參耆各三錢歸朮熟地各二錢數服渴止又以八珍湯加黃耆數劑脈斂而愈韓氏子年十四早喪天真面紅腫如風狀不時舉作或誤用癘風藥內虛發熱口燥煩渴此內傷不足陰火上炎之類赤遊風症也藥宜滋其陰則火自退用地黃湯加參耆四十劑又用此作丸服斤許不兩月而痊癡瘍機要許學士治王檢正患鼻額間痛或麻痹不仁如是數年忽一日連唇口頰車髮際皆痛不開口難言語飲食亦妨在額與頰上常如糊手觸之則痛作足陽明經絡受風毒傳入血凝滯而不行故有此症或者以排風小續命透髓丹之類與之皆不效乃制犀角升麻湯贈之數日而愈犀角升麻防風羌活川芎白附白芷黃芩甘草上粗末每服四錢水煎日三四服陽明經絡環唇挾舌起於鼻合頞中循頰車上耳前過客主人循髮際至額顱今所患皆一經絡也王橫老母年七十餘累患頰車痛每多言傷氣不寢傷神則大發上連頭下至喉內及牙齦皆如針刺火灸手不可犯乃至口不得開言語飲食並廢自覺火光如閃電尋常涎唾稠黏如絲不斷每勞與飢則甚得臥與食則稍安知其虛也始以清胃散犀角地黃湯人參白虎湯羌活勝濕湯加黃芩甘桔皆不效後改用參耆朮草葛歸升柴桔梗之類稍佐黃芩山梔牛蒡連翹空腹進之食遠遠則服加減甘露飲始漸安然老人性多躁而不耐閒勞與多言時有之不能除去病根然發亦稀少即發亦不如往歲之劇矣又從子語因喪子鬱結復多餌鹿角膠諸種子藥或於食後臨臥輒進之以至成積於胃遂患面痛如老母之症服清胃散甘露飲重加石膏太過而見虛症又服參耆等補藥而復見火症門人施生以越鞠丸加山梔連翹貝母橘紅之屬開其鬱結而始安然如舊日矣
