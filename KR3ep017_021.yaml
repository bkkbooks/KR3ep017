body:
  text: 卷二十一驚悸張子和治衛德新之妻旅中宿於樓上夜值盜劫人燒舍驚墮床下自後每聞有響則驚倒不知人家人輩躡足而行莫敢冒觸有聲歲余不痊諸醫作心病治之人參珍珠及定志丸皆無效張見而斷之曰驚者為陽從外入也恐者為陰從內出也驚者謂自不知故也恐者自知也足少陽膽經屬肝木膽者敢也驚怕則膽傷矣乃命二侍女執其兩手按高椅之上當面前置一小几張曰娘子當視此一木猛擊之其婦大驚張曰我以木擊幾何以驚乎伺少定擊之驚又緩又斯須連擊三五次又以杖擊門又遣人畫背後之窗徐徐驚定而笑曰是何治法張曰內經云驚者平之平者常也平常見之必無驚是夜使人擊門窗自夕達曙夫驚者神上越從下擊幾使其下視所以收神也一二日雖聞雷亦不驚德新素不喜張至是終身壓服如有人言張不知醫者執戈以逐之雄按分驚恐為外入內出可謂一言破的古人皆云心主驚而不知情志字皆從心惟驚字從馬以馬無膽故善驚驚則傷膽尤為卓識其論治豈常人所能測識哉余嘗謂亙古以來善治病者莫如戴人不僅以汗吐下三法見長也卜氏子年二十八歲病身弱四肢無力面色蒼黃左脅下身側上下如臂狀每發則痛無時食不減大便如常小便微黃已二三載矣諸醫計窮求張治之視其部分乃足厥陰肝經兼足少陽膽經也曰甲膽乙肝故青其色黃者脾也診膽脈小此因驚也驚則膽受邪腹中當有驚涎緑水病人曰昔曾屯軍被火自是而疾作乃夜以舟車一百五十丸浚川散四五錢加生薑自然汁平旦果下緑水四五行或問大加生薑何也曰辛能剋木也下後覺微痛命再下之比前藥三之一又下緑水三四行痛止思食反有力張謂卜曰汝妻亦當病卜曰太醫未見吾妻何以知之曰爾感此驚幾年矣卜曰當被火我正在草堂中熟寐人驚喚我睡中驚不能言火已塞門我父拽出我火中今已五年矣張曰汝膽伏火驚甲乙乘脾土是少陽相火乘脾脾中有熱故能食而殺穀熱雖能化谷其精氣不完汝必無子蓋敗經反損婦人汝妻必手足熱四肢無力經血不時卜曰吾妻實如此亦已五年矣他日門人因觀內經言先瀉所不勝次瀉所勝之論其法何如以問張張曰且如膽木乘脾土此土不勝木也不勝之氣尋救於子己土能生庚金庚為大腸味辛者為金故大加生薑以伐木然不開脾土無由行也遂用舟車丸先通其閉塞之路是先瀉其所不勝後用薑汁調浚川散大下之次瀉其所勝也大抵陽干克陽干腑克腑臟克臟雄按的是通人見解昔賢皆謂驚入心治法不鎮心安神病焉能愈哉後學雖不能用此法亦當讀其書師其意其則不遠也無如曲高和寡溫補風行專尚補虛不知治病醫道日晦誰之過歟張路玉治吳昭如室年壯體豐而素有嘔血腹脹脾約便難之恙兩遭回祿憂恚頻仍近於失血之後忽然神氣憤亂口噤目瞪診其氣口數盛而促人迎弦大而芤形神不能自主似有撮空之狀或謂症犯條款疑不出五日當斃張謂不然若是撮空必然手勢散漫今拈著衣被盡力拉摘定為挾驚挾怒無疑爪者筋之餘非驚怒而何況脈來見促當是痰氣中結殊非代脈之比詢其病因驚怒俱有遂用鉤藤一兩煎成入竹瀝半盞薑汁五匙連夜制服服後即安寢六脈亦稍平但促未退仍用前方減半調牛黃一分其夕大解三度去結屎五六十枚腹脹頓減脈靜人安數日平復如常雄按辨證明晰可師立方輕重可法老僧悟庵心悸善恐遍服補心養血之藥不應天王補心丹服過數斤驚悸轉增面目四肢微有浮腫之狀求張治察其形肥白不堅診其脈濡弱而滑此氣虛痰飲浸漬於膈上也以導痰湯稍加參桂通其陽氣數服而悸恐悉除更以六君子加桂水泛作丸調補中氣而安雄按此證最多世皆誤治吳孚先治王兵憲患驚悸時或煩躁夜更靡寧右關虛弱左寸尤甚與加味歸脾二十劑而全愈龔子才治一童子因用心過度少寐驚悸怔忡惡寒先用補中益氣湯加茯苓棗仁遠志惡寒漸止又用加味歸脾湯驚悸稍安再用養心湯而安杜某治林學士子居常喜食海蛤飲食之頃未嘗不設至十八年忽面色頓青形體瘦削夜多驚悸皆謂勞瘵之疾百療不瘳杜脈之曰非病何以知之雖瘦削麵青精神不減問學院子秀才好食甚物曰多食南海中味杜曰但多服生津液藥病當自愈如是經兩月面色漸有紅潤意夜亦無驚悸林問所以然杜曰王冰素問云鹽發渴乃勝血之症海味如鹽既多食使心血漸衰則夜驚悸今既去咸用生津之藥人且少壯津血易生故疾去而安矣薛立齊治一婦人勞則心跳怔忡寒熱往來用歸脾湯為主佐以八珍湯諸症悉愈又用加味逍遙散寧志丸而安後復作服歸脾寧志藥即愈一婦人患驚悸怔忡日晡發熱月經過期飲食少思用八珍湯加遠志山藥棗仁三十餘劑漸愈佐以歸脾全愈後因勞發熱食少體倦用補中益氣湯又因怒適月經去血不止前症復作先以加味逍遙散熱退經止又用養心湯治之而痊一婦人驚悸怔忡自汗盜汗飲食不甘怠惰嗜臥用歸脾湯而愈至年餘懷抱鬱結患前症兼衄血便血仍用前湯而愈許紳者京師人嘉靖初供事御藥房受知於世宗纍遷太醫院使歷加工部尚書領院事二十年官婢楊金英等謀逆以帛縊帝氣已絶紳急調峻藥下之辰時下藥未時忽作聲去紫血數升遂能言又數劑而愈帝德紳加太子太保禮部尚書賜賚盛厚未幾紳得疾曰吾不起矣曩者宮變吾自分不效必殺身因此驚悸非藥石能療也已而果卒賜諡恭僖官其一子恤典有加明太醫官最顯者止紳一人明史金陵瑣事亦載此則其藥乃大黃桃仁紅花等馬元儀治一人患心悸症肢體倦怠或以陰虛治之不效診其脈浮虛無力蓋得之焦勞思慮傷心也內經云心痹者脈不通煩則心下鼓又原病式云水衰火旺心胸躁動據此則是陰虛矣且後面於二句又無發明又何必勉強闌入其言脈不通者正以焦勞太過心臟之脈鬱而不通也鬱則傷血而動君火故悸動不寧也心之下脾位脾受心病鬱而生涎精液不生清陽不布故四肢無氣以動而倦怠也法宜大補心脾乃與歸脾湯二十劑即以此方作丸服之全愈章氏婦因失恃于歸勞心悒鬱形志倍傷遂心悸恍惚身體如在舟車雲霧中或與降氣理痰之劑不應診之兩脈虛微尺脈倍弱曰憂勞過度則脾損脾虛必盜母氣以自救故心虛而悸心藏神為十二官之主虛則無所聽命而恍惚不安也宜大培土氣則脾自復不仰給於心而心亦安神亦守矣與人參附子理中湯一劑而安四劑神氣大復脈和而愈仲氏女因驚恐即發熱神昏語言錯妄脈之右結澀左浮弦此雖因驚恐而得實先因悒鬱所傷也凡鬱則肺金必虧肝脈因之寡畏而妄行腎水因之失養而不足加以驚恐則腎益傷而肝愈擾其發熱者風木內甚也神昏者火熱上騰也宜舒通肺氣以制肝生腎用栝蔞仁紫菀枳殼桔梗杏仁蘇子秦艽膽星三劑右脈透神氣清加生首烏黃連二劑熱退再以生地三錢首烏五錢遠志一錢牛膝知母膽星各一錢貝母橘紅茯神各一錢甘草五分而愈蓋金氣治則木受制而水得所養一舉而三善備矣若泥驚恐所致而用金石腦麝之品不幾延寇入室乎高逢辰表侄嘗遊惠山暮歸遇一巨人醉臥寺門驚悸不解自是便溺日五六十次李氏云心小腸受盛腑也因驚而心火散心虛腎冷而然其傷心腸之驗歟醫說續編按經云驚則心無所倚恐則傷腎是為水火不交二臟俱病臟既受病腑欲專為其可得乎此受盛職廢運化無權而滲泄不禁矣原注長山徐嫗遘驚痰初發手足顫掉褫去衣裳裸而奔或歌或哭或牽曳如舞木偶粗工見之吐舌走以為鬼魅所惑周漢卿獨刺其十指端出血已而安續文萃繆仲淳治顧太學叔夏內人舟中為火所驚身熱羸弱幾成勞瘵症醫誤投參耆勢危甚以清肌安神之劑與之戒以勿求速效凡十數劑而安麥冬青蒿子銀柴胡桑白皮蜜炙枇杷葉各二錢炙鱉甲苡仁各三錢五味白芍生地各一錢施沛然治呂孝廉沈僕患驚悸三月聞響則甚遇夜則恐恐甚則上屋逾垣旋食旋飢日啖飯無算或謂心偏失神用補心湯益甚脈之右關洪數無倫兩尺浮大按之極濡病得於酒且內腎水枯竭客熱犯胃經云腎主恐又曰胃熱亦令人恐又曰消穀則令人飢又曰足陽明病聞木音則惕然而驚甚則逾垣上屋此病在胃與腎脾心屬火是脾之母補心則胃益實火盛則水益涸故藥之而病反甚也但病本在腎而標在胃也先治其標用瀉黃散後治其本用腎氣丸一病而寒熱並用補瀉兼施第服瀉黃散三日當不飢矣服腎氣丸十日當不恐矣已而果然一儒者苦學久困場屋得痰吐衄盈盆尫羸骨立夜臥交睫即夢鬥敗爭負恐怖之狀不可形容如是十載每勞則發用正心安神不效一日讀臟氣法時論乃知人魂藏於肝肝又藏血作文既苦衄血又傷則魂失養故交睫若此知非峻補不奏功乃以酒溶鹿角膠空腹飲之五日而睡臥安半月而肌肉生一月而神氣復始能出戶來氏撰張景嶽治一強壯少年遭酷吏之恐病似脹非脹似熱非熱絶食而困衆謂痰火宜清中焦診之曰此恐懼內傷少陽氣索而病及心腎大虧之證也遂加溫補兼治心脾一月而起愈後雖氣健如初而陽寂不舉告之曰根蒂若斯腎傷已極非少壯所宜之兆速宜培養心腎庶免他虞彼反以恐嚇為疑全不之信未及半載竟復病而歿惜哉一婦人産後驚悸聞聲輒死非用力抱持則虛煩欲死如是纍月仲淳曰此心脾肝三經俱虛也用人參棗仁茯神遠志芍藥石斛甘草麥冬五味丹砂為丸以龍眼湯吞服彌月而愈盧不遠治沈君魚終日畏死龜卜筮數無不叩名醫之門無不造一日就診盧為之立方用藥導諭千萬言略覺釋然次日侵晨又就診以卜當十日死盧留宿齊中大壯其膽指菁山叩問谷禪師授參究法參百日念頭始定而全安矣戊午過東瀛吳對亭大參山房言及先時恐懼狀蓋君魚善慮慮出於肝非思之比思則志氣凝定而慮則運動展轉久之傷肝肝血不足則善恐矣情志何物非世間草木所能變易其性惟參禪一著內忘思慮外息境緣研究性命之源不為生死所感是君魚對症之大藥也君魚病良已能了知此藥物否顛狂孫兆治相國寺僧充患顛疾經半年過服名醫藥不效僧俗兄潘氏家富召孫療之孫曰今夜睡著明後日便愈也潘曰且告投藥報恩不忘孫曰有咸物但命師吃待渴卻來道至夜僧果渴孫至遂求溫酒一角調藥一服與之有頃再索酒與之半角其僧遂睡兩晝夜乃覺人事如故潘謝孫問治法曰衆人能安神矣而不能使神昏得睡此乃靈苑方中硃砂棗仁乳香散也人不能用耳辰砂一兩光明有牆壁者棗仁半兩微炒乳香半兩光瑩者右量所患人飲酒幾何先令恣飲沉醉但勿令吐至靜室中以前藥都作一服溫酒調下作一盞調之令頓服如飲酒素少人但隨量取酒服藥訖便安置床枕令臥病淺者半日至一日病深者三兩日令家人潛伺之鼻息勻調但勿喚覺待其自醒即神魂定萬一驚寤不可復治正肅吳公少時心病服此一劑五日方寤遂瘥醫藥綱目浙江一婦人顛狂不止醫以瓜蒂半兩為末每一錢重井花水調滿一盞投之隨得大吐吐後熟睡勿令驚動自此無恙同上竇材治一人得風狂已五年時發時止百法不效竇為灌睡聖散三錢先灸巨闕三十壯醒時再服又灸心腧五十壯服鎮心丹一料但病患已久須大發一回方愈後果大發一日全好又一婦人産後得此症亦如前灸服姜附湯而愈張子和治一叟年六十值徭役煩擾而暴發狂口鼻覺如蟲行兩手爬搔數年不已兩手脈皆洪大如絙繩足陽明經起於鼻交額之中旁納太陽下循鼻柱交人中環唇下交承漿故其病如是夫徭役煩擾便屬火化火乘陽明經故發狂經言陽明之病登高而歌棄衣而走罵詈不避親疏又況肝主謀膽主決徭役迫遽則財不足支肝屢謀而膽不能決屈無所伸怒無所泄心火磐礴遂乘陽明然胃本屬土而肝屬木膽屬相火火隨木氣而入胃故暴發狂乃命置燠室中湧而汗出如此三次內經曰木鬱則達之火鬱則發之良謂此也又以調胃承氣湯半斤用水五升煎半沸分作三服大下二十行血水與瘀血相雜而下數升乃康以通聖散調治其後大下則是土鬱奪之也一男子落馬發狂起則目瞪狂言不識親疏棄衣而走罵言雜出氣力加倍三人不能執縛燒符作醮問鬼跳巫殊不知顧丹砂牛黃犀珠腦麝資財散去室中蕭然張以車輪埋之地中約高二丈許上安中等車輪其輞上鑿一穴如作足盆之狀縛病人於其上使之伏臥以軟裀襯之令一人於下坐機一枚以棒攪之轉千百遭病人吐出青黃痰沫一二斗許繞車輪數匝其病人曰我不能任可解我下從其言而解之索涼水與之冰水飲數升狂乃罷矣奇思幻想得未曾有張公真妙人也範純佑女喪夫發狂閉之室中夜斷窗櫺登跳樹上食桃花幾盡及旦家人接下自是遂愈按此亦驚恐傷肝痰挾敗血遂致發狂偶得桃花利痰飲散滯血之功與張仲景治積熱發狂用承氣湯蓄血發狂用桃仁承氣湯之意相同蘇鶚杜陽編本本草綱目一婦人顛狂十年至人授以真鬱金七兩明礬三兩為末薄糊為丸梧子大每服五十丸白湯下初服心胸間覺有物脫去神氣灑然再服而蘇此驚憂痰血結聚心竅所致鬱金入心去惡血明礬化頑痰故也本草綱目龔子材治一人顛狂亂打走叫上屋用瓜蒂散吐出臭痰數升又以承氣湯下之而愈一人氣心風即是痰迷心竅發狂用真花蕊石煅黃酒淬一次為細末每服一錢黃酒下一婦人發狂棄衣而走逾屋上垣不識親疏狂言妄語人拿不住諸醫束手龔令家人將涼水亂潑不計其數須臾倒僕脈之六部俱弦數有力此熱極生風也用防風通聖散加生地黃黃連桃仁紅花丹皮三劑而安後復服祛風至寶丹而全愈凌漢章治金華富家婦少寡得狂疾至裸形野立凌視曰是謂喪心吾針其心心正必知恥蔽之帳中慰以好言釋其醜可不發乃令二人堅持用涼水噴而針之果愈明史雄按固是正論恐難效法孫文垣治吳某以績學勞心有星士決其發解適以瘧作不能終場遂抑鬱而成顛狂或悲或歌或鼓掌或頓足甚則罵詈不避親疏診之面白而青兩寸短澀左關弦右關滑兩尺平此心肺之神不足志願高而不遂鬱結不舒津液生痰而不生血又攻痰克伐太過心神不得養故昏亂無所攝持經云主不明則十二經危按此則宜補養收斂精神兼之清痰可萬全也用棗仁人參茯苓甘草丹參當歸以補心安神黃連竹茹以清肝膽之火元參佐之外以龍齒珍珠羚羊角牛黃膽星天麻青黛辰砂全蠍冰片黃連甘草膏為丸金箔為衣調理而愈張路玉治黃文學譫妄顛仆數月來或六七日一發或一日二三發發則大吐涎水血沫或一日半日而蘇狀同癇症晝夜恆見亡婢僕婦二鬼纏綿或時昏憒不省或時妄言妄見精氣不時下脫不能收攝服二冬二地連金櫻石蓮之屬反作瀉不食診之寸盛尺微前大後小按之忽無舉之忽有知為神氣浮散之候因與六君子加龍齒菖蒲遠志送養正丹間續而進前後共六七服是後譫妄顛仆絶不復發邪祟亦不復見惟夢泄為平時痼疾更與平補鎮心丹兩月而愈此與前孫案症治大同一婦人狂言叫罵歌笑不常似祟憑依一邊眼與口角吊起或作狂治或作心風治皆不效乃是舊有頭風之病風痰使然用芎辛散加防風服之頓愈婦科鄭青山因治病不順沉思徹夜兼受他醫諷言心甚懷憤天明病者霍然憤喜交集病家設酌酬之而諷者已遁憤無從泄忽然大叫發狂即是觀之業醫者亦可憐哉有志之士慎勿為此彼云不可不知醫者非聖人之言也同道治之罔效一日目科王道來往候索已服未服等方視之一併譭棄曰此神不守舍之虛症豈豁痰理氣清火藥所克效哉遂令覓上好人參二兩一味煎湯服之頓安三啜而病如失更與歸脾湯調理而愈醫通李士材治張少椿女以喪子悲傷忽雷雨交作大恐苦無所避旦日或泣或笑或自語或罵詈如見鬼祟診其心脈浮滑余皆沉細此氣血兩虧憂恐傷心心傷則熱熱積生風也以滾痰丸用桔梗延胡索陳皮杏仁煎湯送下出痰積甚多而愈醫通雄按此脈沉細恐是血氣鬱滯如果兩虧何以可用此藥奏功龔子材治一女子年二十歲未婚患每見男子咬住不放後昏倒陰戶流出冷精頃間即醒其厥陰肝脈弦出寸口乃陰盛思男子不可得也令其父母用棍痛責使之思痛而失欲也後服抑青丸而愈雄按治法凜然勝於藥石韓貽豐治永和一少年患風狂百治不效其父兄縛送求治為針百會二十針升堂公坐呼少年前來命去其縛豫杖者再杖畢而醒問以前事茫然不知也神針心法雄按此係祟附之證一婦因夫病垂危心患之乃夫病愈婦即病風狂晝夜不思眠食白日裸身狂走或登高阜或上窯房莫能禁也乞韓治將至其家其婦正在袒裼狂跳中忽自覓衣覆體斂容屏息若有所俟者鄰媼訝之初不解其何意俄而韓至令之跪則跪因跪而受針時韓為本邑宰為針其百會一穴鬼眼二穴各二十一針針畢即叩頭謝曰吾今不敢為祟矣願乞饒命吾去矣言畢而醒雄按些二條皆臨以邑宰之威而又善針法祟身退避故雖抱有為之才必居可為之地而後易建大功也柴嶼青治少京兆傳嘉言夫人忽患顛症診知胸有鬱結投以逍遙散加鬱金香附兩劑而癡象頓愈惟神氣尚呆不語即用前方為散服三兩用靈苑方服之而瘥靈苑方見孫兆案王海藏治許氏陽厥狂怒罵詈不避親疏或哭或歌六脈舉按無力身表如冰石發則叫呼聲高潔古云奪其食即已因不與之食乃以大承氣湯下得臟腑積穢數升狂稍寧數日復發復下如此五七次行大便數斗疾緩身溫脈生良愈此易老奪食之法也大還綱目亦收一人病顛脈洪且搏指承氣湯數下而安病機沙篆陳良甫治一女人眼見鬼物言語失常循衣直視衆醫多用心藥治之無效乃投養正丹二帖煎乳香湯送下以三生飲佐之立愈又一男子亦常病此症亦用此藥收效養正丹與百乙方抱膽丸無異抱膽丸內無硫黃有乳香也自合方見效良方王執中治一士妄語無常且欲打人病數日矣意其心疾為灸百會百會治心疾故也又疑是鬼邪用秦承祖灸鬼邪法並兩手大拇指用軟帛繩急縛定當肉甲相接處灸七壯四處皆著火而後愈更有二貴人子亦有此患有醫生亦為灸此穴而愈張子和治一狂人陰不勝陽則脈流薄厥陽並乃狂難經曰陽極則狂陰極則顛陽為腑陰為臟非陽熱而陰寒也熱並於陽則狂狂則生寒並於陰則顛顛則死內經曰足陽明有實則狂故登高而歌棄衣而走無所不為是熱之極也以調胃承氣湯下數十行三五日復上湧一二升三五日又復下之凡五六十日下百餘行吐亦七八度如吐時暖室置火以助其熱汗數汗方平醫說續編廣筆記風顛病神方好犀角四兩銼末每用一兩加清水十碗入砂鍋內熬至一碗濾淨再加水十碗熬至二酒杯以淡竹葉四兩水六碗煎二碗去渣加犀角汁同服盡四劑即愈汪石山治一人縣差拿犯人以鐵索鎖犯行至中途投河而死犯家告所差人索騙威逼致死所差脫罪未免費財憂憤成病如醉如癡謬言妄語無復知識診之曰此以費財而憂必得喜乃愈藥豈能治哉令其熔錫作銀數錠置其側病者見之果喜握視不置後病遂愈此以喜勝憂也劉宏壁治一富室女正梳洗間忽見二婦相拘方奔逸復擠至遂大叫叫後乃大哭哭已即發狂寒熱相繼目眩不眠以為鬼祟召巫符咒而益困因診之肺脈直上魚際肝亦雙弦知所見者本身之魂魄也蓋肺藏魂肝藏魄因用小柴胡湯去甘草之戀加羚羊魚龍骨牡蠣清肺肝鎮驚怯一服而安凡患癡顛或羊頭風總因心竅有痰所致取橄欖十斤敲破入砂鍋內煮數滾去核入臼搗爛仍入原湯煎之至無味去渣以汁共歸一鍋煎成濃膏用白礬八錢研末入膏勻和每日早晚以開水沖服三錢或初起輕者取橄咬破一頭蘸礬末食之亦效癇黃錦芳曰古人論虛癇之症晝發責之陽蹺虛損用十補湯加益智仁夜發責之陰蹺虛損用六味丸加鹿角膠或用紫河車當歸人參蓋陽蹺之脈同陽維護背之陽其脈起於足根中上合三陽從足太陽膀胱經足外踝下五寸陷中申脈穴從肩入頸糾屬目內眥而合太陽主持肌肉以上之表通貫六腑而使左右機關敏速不滯曰陽蹺者謂其所起所循所入所止皆在陽之經也是病則見跌仆倒地身軟作聲而癇及或脈緩而伸為瘲衛氣不行於陰為不寐脈則兩寸浮細而緊治當補其左右之陽陰蹺之脈同陰維護腹之裡其脈亦起於跟中由足少陰腎別脈然骨穴上行內踝從股入胸腹上至咽喉精明穴合於太陽陽蹺與陰蹺並榮於目主持肌肉以下之踝通貫五臟而使左右機關敏速不滯曰陰蹺者謂其所起所行所循所入所至皆屬陰之經也是病則或語言顛倒舉止錯誤及筋急而縮為瘛脈則兩尺沉細而緊治當補其左右之陰余治馮旭先病癇晝夜俱發外感全無左右尺寸皆彈指應作二蹺俱損治之用黃耆二錢人參一錢當歸二錢地黃二錢紫河車四錢益智仁一錢白朮一錢山藥一錢服之而愈若陽蹺而兼陽維虛損則於補中益氣湯加桂枝益智陰蹺而兼陰維虛損則於六味丸加鹿膠鹿茸人參故紙當歸河車紫石英此外若非兩蹺虛損之症而挾火挾痰挾氣挾寒則當隨症隨脈活潑施治不可株守二方以誤人也補心寧志丸治癇症天竺黃另研如面五錢泥香另研如面三錢天冬去心酒洗蒸二兩白芍酒炒三兩白茯神去心四兩遠志肉甘草汁浸蒸二兩麥冬二兩炙甘草六錢旋覆花一兩五錢真蘇子研一兩香附醋浸曬乾童便拌瓦上炒三兩半夏薑汁拌以明礬末少許同浸二兩皂角策去黑皮酥炒去子取末二兩和勻懷山藥粉糊丸如豌豆大硃砂一兩為衣每服三錢用竹瀝點湯下廣筆記竇材治一人病癇三年餘灸中脘五十壯即愈又一婦病癇已十年灸中脘五十壯愈凡人有此疾惟灸法取效最速藥不及也張子和云一婦病風癇自六七歲因驚風得之後每三二年間一二作至五七年五七作逮三十歲至四十歲則日作甚至一日十餘作遂昏癡健忘求死而已值歲大飢採百草而食於水濱見草若蔥壯採歸煮熟食之至五更忽覺心中不安吐痰如膠連日不止約一二斗汗出如洗甚昏困三日後遂輕健病去食進百脈皆和以所食蔥訪之乃憨蔥苗也即本草藜蘆是也龔子才治王大參子年十八歲患癇每發即仆地吐涎不省人事少頃復蘇或一月一發或兩月發四五次已七年遍醫不效診之六脈滑數人迎緊盛此氣血虛而有寒痰壅並也以追風祛痰丸加人參當歸黃連各一兩與安神丸二藥兼服未及半年而痊後有數人俱如此治而愈馮楚瞻治金氏子年十四患癇病群醫針灸不效繼之消痰鎮墜其發更且頻診脈洪弦有力而二尺俱弱此陰虧之極孤陽不斂火性上炎僵仆諸候乃發理所然也消痰鎮墜不更耗陰分乎乃令空心淡鹽湯吞加味八味丸四五錢以使真陽藏納然陽無陰斂何能久藏火無水制難免浮越隨以重濁大料壯水之劑繼之以助其封蟄之勢則水火得其所矣下午乃服調補氣血養心清肺和肝之膏滋一丸如是調理兩月精神倍長癇症不治而愈加味八味丸方大熟地一斤用八兩清水煎汁去渣將八兩入汁內煮爛搗爛入淮山藥四兩炒黃牡丹皮四兩焙白茯苓三兩人乳拌透曬乾焙山萸肉四兩酒拌蒸曬乾焙澤瀉二兩淡鹽水拌曬乾炒五味子二兩銅刀逐個切開蜜酒拌蒸曬乾焙燥牛膝三兩淡鹽酒拌炒肉桂去粗皮一兩五錢製附子一兩五錢用熟地膏加煉蜜為丸曬乾每早空心淡鹽湯送服四錢隨服煎劑使陽藏而陰以祕也煎方大熟地一兩丹參一錢五分麥冬三錢生白芍二錢茯苓一錢五分遠志用甘草水煮透一錢二分牛膝三錢五味子六分燈心十根蓮子十粒煎八分溫服於八味丸後凡滋陰藥最忌熱服熱則走陽分不能養陰冷則直入腸中又不能滲行經脈也膏滋丸方酸棗仁炒熟搗碎四兩歸身酒炒四兩熟地八兩叉石斛二兩白芍蜜水炒三兩麥冬黃米拌炒去米三兩牛膝三兩遠志肉甘草濃汁煮透二兩先用建蓮一斤煎取濃汁三十餘碗去渣入前藥煎取頭汁去渣熬膏用人參三兩白茯苓四兩各研極細末入前膏內收成大丸每枚重四錢下午食遠白湯化下一丸楊乘六治翁姓病癇症每日至子時必僵仆手足徑硬兩目直視不能出聲其狀若死必至午後方蘇蘇則言動依然飲食如故別無他病如是者三年略無虛日遍治不痊楊視其氣色晦滯口眼呆瞪面若失神上下眼胞黑暈舌紅如無皮脈則右關虛大而滑右寸若有散意曰此非癇症也乃痰厥也必因驚而得蓋心為君主驚則心胞氣散君火受傷致脾土不生中州虧損不能攝水因而生痰夫痰隨氣升降者也天地之氣升於子而降於午人身亦然當子時一陽生其氣上升痰亦與之俱升逢虛則入迷於包絡之中故不省人事僵仆若死也至午時一陰生其氣下降痰亦隨之同降包絡得清虛而天君泰然百體從令矣詢之數年前果受驚幾死今因驚致損因損致痰然鎮驚消痰皆無益也惟有補其火養其包絡俾其氣不散則痰不能侵擾而為害且君火漸旺則能生土以攝水其痰不消而自消矣養榮湯去遠志棗仁五味白芍一劑是晚即不發五日連服十劑皆貼然安臥至晚留方而別因其病久而虛故治法如此否則益錮其痰矣薛立齊診鴻臚王之室人素有癇症遇勞役怒氣則發良久自省一日因飲食勞役失宜發而半日方省不能言語或以為風中於臟用祛風化痰順氣之劑及牛黃清心丸病益甚六脈浮大兩寸虛而不及本部不進飲食曰此脾胃之氣傷也若風中於臟禍在反掌彼不信仍用風藥後果卒劉宏壁治一女年方及笄忽染怪病醫莫能識邀視牙關緊閉手足抽搐目睛上瞪晝夜兩發非癇而何蘇後腹內攪痛欲吐不得冷汗淋漓皆肝木為祟察其邪不在表裡而在上下上部有熱下部有寒胸胃互異寒熱交戰投以黃連湯勢漸殺再數劑輒頌更生蓋連以治熱姜以治寒桂枝半夏祛風化痰參棗甘草輔心和中使正氣建立邪氣分散如心應手矣琇按癇症多由肝病兼挾痰火方中薑夏以豁痰連桂以平肝甘草緩肝而和脾參棗補脾而壯肺肺盛則木亦自平劉用此獲愈當矣然目之為怪痰而曰上熱下寒逮知其然而未知其所以然者也闡發精透醫案中如此等方論不相關照者甚多皆認證未真而適遇對症之方因而獲愈故用方者亦不知所以獲效之故也哭笑張子和次子自出妻之後日瘦語如甕中此病在中也常捻第三指失笑此心火也約半載日飲冰雪更服涼劑張曰惡雪則愈矣其母懼其大寒張罵曰吾用藥如鼓之應桴尚惡寒涼藥宜乎世俗之謗我也至五七日厭水不飲病日解矣雄按通才絶技往往不信於家人自古已然亦可嘆也邱汝誠一女子恆笑不止求診問生平所愛何衣命著之使母與對飲故滴酒沾其裙女大怒病遂瘥先達李其性歸德府鹿邑人也世為農家癸卯獲雋於鄉伊父以喜故失聲大笑及春舉進士其笑彌甚歷十年擢諫垣遂成痼疾初猶間發後宵旦不能休大諫甚憂之從容與太醫某相商因得所授命家人紿乃父云大諫已歿乃父慟絶幾殞如是者十日病漸瘳佯而為郵語云趙大夫治大諫絶而復蘇李因不悲而症永不作矣蓋醫者意也喜則傷心濟以悲而乃和技進乎道矣戴元禮治姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療戴曰此郁病也痰閉於上火鬱於下故長號則氣少舒經云火鬱發之是已遂用重劑湧之吐痰如膠者數升乃愈兩浙名賢録析理甚精治法亦高此與上條皆善師子和者也吳孚先治宋小泉發熱自汗肢體搖振或時自利嘔噦間作倏爾喜笑倏爾悲哭語言錯亂六脈沉澀微弱此陰盛陽虛四君子加炮薑茯苓一劑和二劑已此殆五精相併之症非僅陰盛陽虛也管先正治一婦妊娠四五個月臟燥悲傷遇晝則慘切淚下數次象若神靈如有所憑醫與巫皆無益與仲景大棗湯一投而愈醫學綱目孫文垣表嫂孀居二十年矣右癱不能舉動不出戶者三年今則神情恍惚口亂言常悲泣詰之答曰自亦不知為何故也兩寸脈短澀以石菖蒲遠志當歸茯苓人參黃耆白朮附子晚蠶砂陳皮甘草服四帖稍愈但悲泣如舊夜更泣因思仲景大棗小麥湯正與此對兩帖而瘳方用大棗十二枚小麥一合大甘草炙三寸水煎飲此憂傷肺肺臟寒故多泣也憂傷肺二語本經文第參耆朮附實溫肺藥服之更泣大棗小麥甘草實心脾藥服之而瘳何也喻嘉言謂為肺臟燥而然似較臟腑寒有理錢仲陽治小兒哭叫謂為金木相系亦有見解馬元儀治吳氏婦兩寸浮數餘脈虛澀時悲哀不能自禁喉間窒塞火升痰喘此悒鬱過多肺金受病也金病則火動痰生火痰相搏氣湊於上故喘促不寧而氣道不利法當舒通肺郁則火降痰清而悲哀喘促諸症自已用紫菀乾葛枳殼桔梗半夏曲橘紅杏仁蘇子一劑而神氣清再劑而悲哀息繼以人參白朮炙甘草補其心氣遠志茯神寧其神志半夏曲廣皮導其痰涎肉桂黃連以交心腎數劑而神復脈和再以歸脾湯調理而愈王執中母久病忽泣涕不可禁知是心病也灸百會穴而愈執中凡遇憂愁悽慘亦必灸此有疾者不可不知也吳橋治胡有濡母中年親酒而疏谷忽心亂恍惚日夜啼泣如不欲生橋始診之曰脈無他但此病非歲月可已假令用藥即積寒涼而他病生但勿藥聽其自愈顧語不入遍謁諸醫治逾年病益深逆橋復診橋曰脈稍損於前然不為害第勿藥而聽其自愈耳母敬諾每月延橋視之橋持議如初勿藥逾年而愈太函集雄按世之不察病情妄投藥餌以誤人者觀此能無愧乎不眠張子和治一富家婦人傷思過慮二年不寐無藥可療其夫求張治之張曰兩手脈俱緩此脾受之脾主思故也乃與其夫約以怒激之多取其財飲酒數日不處一法而去其婦大怒汗出是夜困眠如此者八九日不寤自是食進脈平雄按此法人皆能之然須問其是否愈人之病也王思中治周氏患發熱咳嗽以陰虛內傷治愈劇經月不得眠王診之曰此謂懸飲乃鬱熱所致氣不升降則湯液停積漸成飲囊法當開鬱行氣每劑用荷葉蒂七枚一服而鼾睡數日平復吳江縣志飲囊一症喻氏徐氏皆論之極詳皆不出方徐氏但云須用輕清通透之單方治之今用荷葉蒂即此義也張漣水名康忠嘗治董尚書噚陽不眠用百部一兩半夏一兩董即得美睡酬之百金董既睡夢為役夫牽船行赤日中甚疲勞忽見涼樹美蔭甚樂大喜而寤人謂張君二味藥即得百金董公百金乃得役夫一息識小録徐樹丕雄按此亦飲證也孫文垣治潘景宇內人後半夜不眠肝火浮入包絡兩太陽及眉稜骨痛肝火上逆支絡面黃肌瘦大便溏稍勞則體熱四肢無力皆肝陽盛而脾陰虛其脈左寸洪滑肝脈上溢自春至秋皆然此由脾虛肝心二經火盛然也當云肝盛脾虛先用四君子加酒連柴胡扁豆澤瀉滑石調理夜與錢仲陽安神丸燈心湯下服八日得睡兩太陽亦不痛黃連之功居多繼用六君子加黃耆秦艽柴胡澤瀉當歸白芍黃柏全安盧不遠治聞子將母冬月心忽然如散而沉下便不得睡幾三月矣脈之獨左關弱不能應指以為肝虛須補其母當立春始安用熟地為君茯苓棗仁當歸人參防風遠志佐之防風遠志宜酌服二十帖至期愈子將問心散不寐似屬心經何反以肝腎藥見效而立春始應曰此得之脈也經曰肝不足則恐恐則氣下雖情志無恐懼而氣象似之據脈按證肝虛無疑因肝不足故先其令而痰作補水生木待時而元氣乃復也豈得以心散便屬心經是非心散乃心見身中氣散之象耳則散者為病見散者非病設心自病又安能自見其散哉李土材治張同初善怒善郁且應酬繁劇膈中痛甚夜不成寐醫用菖蒲枳朴木香豆蔻殊不知此症屬虛虛則濁陰不降神氣失守故痛且寤也遂以歸脾湯倍用人參當歸不十劑而胸次快然安寢醫通張路玉治一少年因恐慮兩月不臥服安神補心藥無算與以溫膽湯倍半夏柴胡一劑頓臥兩晝夜竟爾霍然一人遺精煩擾不得臥與六味丸料加棗仁數服而安寢如常一人潰瘍久不收斂而不得臥瘍醫不能療令與大劑十全大補而安陸養愚治沈翰撰虹臺年近五旬體肥善酒而耽厚味常露臥秋末冬初忽酒後煩躁不得寐或以安神養血不效惟服清痰清火稍應後每易一方間瘥數日即復如故惟大醉後得吐始熟寐一二時然日間則倦不能起且飲食無味延至仲夏偶煩躁身癢以熱湯澡浴是夜睡至天明由是臨臥必浴即不能長睡而或一二更安寢若間日浴即不寐至立秋浴亦不應八月間竟全不睡矣診之六脈沉澀兩寸尤甚自言平日天氣稍暖即畏熱多汗自病後但煩閉而不畏熱暑月竟無汗因思內經每有論無方獨不寐一條兼有其方何今人不知用及用亦無效也經言不寐之因則曰衛氣行於陽不得入於陰行於陽則陽氣盛不得入於陰則陰虛故目不瞑又曰陽明逆不得從其道故不得臥又曰胃不和則臥不得安言治療之法調其虛實以通其道而去其邪又曰決瀆壅塞經絡大通陰陽得和其方以千里水揚之萬遍炊以葦薪用秫米半夏煎飲其汗病新發者覆杯則臥汗出則已澡浴則睡是外之經絡胥通也因用子和法以獨聖散三日約通其涎飲盆許是夜身雖困倦然已得睡禁其厚味酒醴惟進稀粥五日後令密室中置沸湯數鍋使熱氣熏蒸中設一桶探湯澡浴之拭乾就寢用麻黃蘇葉乾葛防風威靈仙半夏各一兩照內經煎法熱服後覆之汗微微而來是夜睡始沉又將息二日再以此法大汗之自此睡臥如常身體輕快精神清爽六脈皆起且流利而病去矣一人煩躁發熱肌體骨立目不得瞑已三年矣醫與清熱養陰化痰安神之藥及千劑勿效一宵不得安臥診之肝脈獨沉而數此怒火久伏而木鬱宜達用柴胡四錢白芍二錢丹皮梔子各二錢五分甘草五分桂枝四分藥進熟寐至一晝夜後用逍遙散加人參丸服而愈木鬱土中之症非柴胡不能達此症用之最為合宜若立齊之隨手濫用則必有隱受其害者矣李季蚪庶母因兒痘驚苦積勞虛煩不得臥心膽虛怯觸事驚悸百藥不效家弟長文偶於友人處聞興化陳丹崖療一女人甚奇其症與母類叩其方乃溫膽湯也試之數劑而效半夏七錢竹茹枳實各三錢陳皮四錢半茯苓甘草各二錢二分半分二劑薑棗煎服外加棗仁五錢後因虛極加人參二錢質之仲淳曰此必有痰而善飲者也果然廣筆記顧太學叔夏內人患陰虛火症徹夜不眠者兩月飲食俱廢形體日削中外疑其必無救矣李為之診視決其必無大害第要多需時日矣用大劑人參棗仁茯神遠志生地當歸五味麥冬因虛甚氣怯佐以琥珀辰砂金銀器之類約百餘劑而瘳後友人詢其故李謂此病雖屬虛幸臟腑無損心經雖有火幸不至爍肺多服補陰收斂之劑則水火自然升降所云壯水制陽光正此謂耳至於久病脈調身不發熱豈有他虞哉錢國賓治陝西喻少川久以開氈店居杭體厚剛健偏嗜炙爆性躁動肝氣年逾五旬終夜不寐者六年用痰火氣血之藥多矣早晨診候寸關洪浮有力若堅實之象惟兩尺脈大熟思之以脈論肥人當沉今六脈洪浮有力以症論上身怕熱足反畏冷以藥論清補俱已盡服難經曰人之安睡神歸心魄歸肝意歸脾志藏腎五臟各安其位而寢且夜屬陰主靜日屬陽主動陰陽和平安然寤寐此六年不睡乃陽亢症也當大泄其陽使陰氣漸復則寐矣用大承氣湯加大黃二兩泄十餘行其人昏倦睡數日方醒進以粥食愈跌撲陸養愚治沈華南原有濕熱痰積五旬時因乘馬墜地傷其左脅痛不可忍外科以膏散敷治之而愈然每疾走脅間一點微痛少息半時痛止矣周甲偶患滯下小腹痛引左脅手不可按裡急後重或與香連檳榔痢止而痛不止發熱便澀後重尤劇飲食全不思脈之沉弦有力左關尤甚曰痛者積瘀也治法云瘀血穢腐下焦令人不食則飲食不消者亦瘀也當急下之則痛隨利減矣用潤字丸和桃仁泥合丸之紅花湯送下二錢出稠痰碗許而腹脅抽痛更甚此瘀積動而未出故也再投二錢半日許又出稠痰碗許內有黑色如泥者一二塊痛仍不減脈尚沉而堅又投三錢半日許出泥色塊並稠痰數碗而痛頓覺減腹脅即可按漸思飲食其脈亦和後以達氣養榮湯加人參數劑而安陸肖愚治寧見源年近古稀偶登舟失足墮水足大股挫傷作痛左脅亦引痛服藥已愈三月矣忽左股內髀樞作痛或謂此乃肝經所絡之地高年肝血不足虛而作痛或謂濕痰流注或謂肝經久郁或謂崑崙氣逆遍治疼腫日甚增寒作熱脈之六部洪數而左關帶弦因詢其曾有所傷否乃述前墮水之由曰此必瘀血未盡留而成毒也視痛處已有膿在內令延外科教以針破之出膿血數碗服大料參耆托裡散數十劑而痊一人因墜馬腰痛不止日輕夜重瘀血諦矣與四物去生地加肉桂桃仁泥紅花蘇木四服大便下黑血而痊湖廣有胡氏子五六歲時因升高為戲墜地傷其頭骨稍長竟不能伸朱守真者同里也一日相見戲挈其頭有聲戛然置地溘然死矣朱懼而逸胡氏子一時復蘇頭項復直歸家家人驚喜謀尋朱謝之說頤張子和治張仲溫因登露臺高四尺許下臺傷肭一足外踝腫起熱痛如火一醫欲以針刺腫出血張急止之曰肭已痛矣更加針二痛俱作何以忍也乃與神佑丸八九十丸下二十餘行禁食熱物夜半腫處發癢痛止行步如常張曰吾之此法十治十愈不誑後人一小兒七八歲膝破行則痛數月矣張曰小病耳以舟車丸通經散溫酒調而下之夜半湧泄齊行上吐一碗下泄半缶既上床其小兒謂母曰膝臏癢不可任來曰使服烏金丸壯其筋骨一月疾愈而走矣德宗時有朝士墜馬傷足國醫為針腿針不出有氣如煙出朝士困憊將至不起國醫惶懼有道士詣門云某合治得視針處責國醫曰公何容易生死之穴乃在分毫人之血脈相通如江河針灸在思其要津公亦好手但誤中孔穴乃令舁床就前於左腿氣滿處下針曰此針下彼針跳出當至檐板言訖遂針入寸余舊穴之針沸然躍出果至檐板氣出之處泯然而合病者當時平愈朝士與國醫拜謝以金帛贈貽道士不受啜茶一甌而去逸史雄按可為針家龜鑑石城尉戴堯臣試馬損大指血出淋漓用蔥新折者糠火煨熱剝皮其間有涕便將罨損處仍多煨續續易熱者或搗爛敷之而痛止翌日洗面不見瘢痕近宋惟官縣尹皆得此方每有殺傷氣未絶亟令用此活人甚衆本草綱目龔子才治一男子墜馬腸有瘀血服藥下之遂發熱盜汗自汗脈浮澀此重劑過傷氣血所致也投以十全大補湯益甚時或譫語此藥力未及而然以前藥加炮薑附子五錢服之即睡覺來頓安再劑而愈張三錫云曾見人因踢門用力遂小腹痛不止湯藥亂投臨死小腹腫青方悟往日受病之因也孫文垣治一人梅瘡後偶遭一跌環跳脫出不能復入科臼疼痛殊甚兩足長短不齊此蓋瘀血流入科臼占滿故竅致骨不得復入也今但消去瘀血以行氣活血之藥主之佐以下行嚮導之劑庶可復原用陳年窖中磚瓦洗淨煅過四兩生地杜牛膝骨碎補丹參赤芍各一兩五錢自然銅三兩蒲黃車前子蘇木各一兩鹿角二兩元明粉五錢各為末以茅草根一斤紅花四兩煎膏拌曬前藥煉蜜為丸梧子大每空心及食前酒送下八九十丸初足長出二寸余服藥後只差半寸設再製久服必能全愈惜素畏藥中道而止李克齊家一鶴飛來馴熟不去以為祥瑞未幾鶴折其脛私心殊不喜因問有能接其脛骨者乎一人對曰家藏接骨祕方想人禽一理或可接也急命其修制之方用土鱉新瓦焙乾半兩錢醋淬七次自然銅乳香沒藥菜瓜子各等分為細末每服一分半酒調灌之鶴脛如故但人上體傷飯後服之下體傷空心服之李公乃以其方傳於人續金陵瑣事張三錫云南京下浮橋梁回回丹藥每用二三釐瓜仁搗泡酒下極驗遠近患損傷者競覓之要皆不外土鱉自然銅第製法精耳四川提督總兵官吳英說昔得祕傳治撲打跌損傷極效雖重傷瀕死但一絲未絶灌下立蘇往在福建為副將時軍中有二辨相鬥皆重傷其一則死矣吳聞馳往治之惟心頭氣尚微暖亟命以藥灌入覺胸間喀喀有聲不移時張目索食翌日遂能行起自後屢著神效云其方以十一月採野菊花連枝葉陰乾用時每野菊花一兩加童便無灰酒各一碗同煎熱服又一方未退胞毛小雞一隻和骨生搗如泥入五加皮敷傷處接骨如神居易録馮楚瞻於五十歲由欒城回都適有鄉人伐一大樹時風沙蔽目騎至樹僕人騎俱為壓倒正在腰脊間脊骨脫縫疼如腰斬胸骨扇動腰膚青紫下體俱冷頭汗如雨因憶跌撲傷損門中有一絲血入心即死之語以酒沖童便服之頓覺臍下極冷氣逆上奔乃思急固陽氣為主以人參一兩炒白朮六錢製附子三錢煎服日二劑有外科老醫勸用破血行瘀之藥馮曰傷在上者宜消瘀滯傷在下者宜補血氣此正法也遂早晚用八味丸治之加牛膝杜仲五味各五錢隨進參朮附子各一劑緣右腎連脊受傷腎經祖氣無根故不能寐並不能言一言一寐即逆氣上奔欲絶馮仗藥力之猛得以接納藥後必進干餅以壓之腸中如火干餅多進亦易消化八日始便並無點瘀外以豬油熬化頭髮入十全大補加減煎膏以乳沒收之遍貼傷處七日後氣逆少緩半月後漸可寐言月餘始能憑几而坐兩月餘始能扶杖而脊骨突出半寸終成痼疾自是精力大衰膝踝筋脈之間時疼痛然幸知破格為治得以全生李南公知長沙縣有鬥者甲強乙弱各有青赤南公召使前自以指捏之乙真甲僞也詰之果服蓋南方有櫸樹以葉塗膚則青赤如毆傷者剝其皮橫置膚上以火尉之則加倍傷者以水洗不落南公曰毆者血聚而硬僞者不然故知之司馬涑水紀聞華南岩刺蒲時有哄者訴於州一人流血被面經重創腦幾裂絶命懸旦夕公見之惻然時家有刀瘡藥公即起入內自搗藥令舁至幕廳委一謹厚廳子及幕官曰宜善視之勿令傷風此人死汝輩責也其家人亦不令前乃略加審核呈狀收其仇家於獄余皆釋之友人問其故曰凡人爭鬥必無好氣此人不救而死則償命者一人寡人之妻孤人之子者幾人干證連繫者幾人破家者幾人此人愈特一斗毆罪耳且人情欲獄勝雖於骨肉亦甘心無所恤忿懥故也未幾傷者果平復而二家之訟遂息刀瘡藥方端午取韭菜搗汁和石灰杵熟為餅陰乾用以治諸傷敷創處即止雖骨破亦合有奇效韓貽豐攝永寧篆有部民被毆死已逾夕即單騎往驗則遍身重傷僵挺無生氣矣因念死者父母年老貧病惟此子死則二老必不能生不得已因取針針其百會亦冀萬一非謂其必活也時天氣甚寒令村人各解衣輪尉尸身又熬水令極熱探湯揉尸手足無何得人氣體頓柔針至十四針忽喉中作響口鼻微有氣診其脈脈忽動乃喜曰有救矣至二十一針則喉間大出聲手足能屈伸口稱遍體痛不可忍則皆被毆處也乃呼酒來以藥飲之傷處糝之以藥痛處以針針之責令凶首保護調養如限內死仍抵償後傷者全愈求和息乃杖凶者而遣之薛立齊治一男子墜馬傷頭臂令以蔥搗爛炒熱罨患處以熱手尉之服末藥降聖丹而愈本草云蔥大治傷損一字散治一切打撲損傷筋骨斷折宗子趙叔恭名公寅以善鐵錘著名其父宰嵊縣日因與族人聚飲超化寺醉酒墜懸崖之下亟視之昏不醒人手臂已折舁歸得此二藥治之遂愈其後運錘如故叔恭嘗知大寧監云韓希道知府傳五靈脂沒藥別研川烏頭草烏頭俱去皮臍生用各四兩地龍乳香各半兩別研麝香半錢別研白膠香一兩後四味加減些不妨上為細末每服一錢溫酒調下丸如梧桐子大加減自少至多服之亦可若腰以上損食後服腰以下損食前服覺麻為驗未麻加藥麻甚即減百乙方福州長樂縣一盜囚被笞捶身無全膚以情告獄吏求買胡孫姜爛研取汁以酒煎或調服留滓以敷瘡不數日平服如故同上濠梁靈泉寺僧傳治打撲傷損用半兩古文錢不拘多少以鐵貫之用鐵匣盛以炭火煅通紅碗盛好酒米醋各半升鐵鉗開匣取錢於酒醋中淬再煅再淬候蘇落盡如酒醋少再添候錢淬盡澄去酒醋以溫水淘洗如些三次淘洗數多尤妙火毒不盡令人患啞既淨焙乾研極細入乳香沒藥水蛭等分同為細末每服半字或一字生薑自然汁先調藥次用溫酒浸平服若不傷折即時嘔出若傷折則藥徑下纏繳如金絲如弓上之筋神驗初服忌酒三日劉諒縣傳王丞相在東府時施一接骨藥云用半兩錢極有效驗恐即是此方也同上雄按寺僧所用即一字散也打撲損腫痛不止用生薑自然汁米醋牛皮膠同熬溶入馬屁勃末不拘多少攪勻如膏藥以紙花攤敷腫處痛即止以多敷為妙紹興倅廳二人用之得效同上南臺掾梁彥思使閩而足不能履醫以風論或以腳氣治經年不瘳項彥章診之六脈僅微數而他無所病即探患處乃骨出不入肯綮耳施以按摩即愈九靈山房集南臺治書迭里迷失公足失履而傷腕骨掌反於後者六閲月矣衆醫不能治公知抱一翁精按摩曰幸豫治也翁令壯士更相摩從辰至申而筋肉盡腐遂引其掌以揉之覺喋喋然有聲藥以兩月其足如常時同上鯁刺張子和治一小兒約五六歲同隊小兒以蜀黍楷相擊逆芒倒刺於咽中數日不下粥藥腫大發其家告張張命取水依道經咒法以左手屈中指及無名指作三山印坐水盞於其上右手掐印文是金槍印腳踏丁字立望太陽或燈火取氣一口次在淨水盞中咒曰吾取老君東流順老君奉敕攝去毒水五託大帝尊所到稱吾者各各現帝身急急如律令攝念七遍吹在盞中虛攪卓三次為定其兒咽水下咽曰我可也三五日腫散乃知法亦有不可侮者夷堅志云小兒誤吞稻芒著咽喉中不能出者名曰谷賊惟以鵝涎灌之即愈蓋鵝涎化谷相制耳一兒誤吞一錢在咽中不下諸醫不能取亦不能下戴人熟思之忽得一策以淨白表紙令卷實如著以刀縱橫亂割其端作鬅鬙之狀又別取一箸縛針鉤於其端令不可脫先下咽中輕提輕抑探之覺鉤入錢竅然後以紅卷納之咽中與鉤尖相抵覺鉤尖入紙卷之端不礙肌肉提之而出此法奇而穩然非子和靈心妙手亦未必有濟也方雪瓢偶在鮑淥飲處談及名醫類案中以南硼砂治誤吞金及羊脛骨灰治法皆神驗座客有言麵筋灰治誤吞銅錢甚異者方默識之歸適鄰家誤吞銅錢哽咽間不能上下危急之際方即以法教之才下咽錢自口中出其巧值如斯殆有鬼神使之耶因附記之其法以麵筋置新瓦上燒作炭研末用滾湯調溫服錢未下咽者即從口中出已下咽者必從便出近又傳方以生大蒜塞鼻中其錢立出尤為簡便但未之試耳張子和曰昔過株林見一童子誤吞銅鐵之物成疾而羸足不勝身會六七月淫雨不止無薪作食過飢數日一旦鄰牛死聞作葵羹粳飯病人乘飢頓食之良久注瀉如傾覺腸中痛遂下所吞之物余因悟內經中肝苦急急食甘以緩之牛肉粳米葵菜皆甘物也故能寬緩腸胃且腸中久空又遇甘滑之物此銅鐵所以下也如此時刻留心觸處靈通技安得不精此古人之所以不可及也近有稚子戲以線錘置口中誤吞之有胡僧啖以餳糖啖之半斤即於穀道中隨穢而下僧云凡誤吞五金者皆可啖也近峰聞略及續醫說舊案有僧用餳糖出眼中箭頭甚捷張景嶽治王氏子甫周歲其母與一鐵釘與之玩弄吞入喉間往視之見其母倒提兒足以冀其出口鼻皆血因曉之曰此豈倒懸可出者乎速令抱正遂聞啼聲蓋釘已下咽不在喉矣因閲本草鐵畏朴硝遂得一法用磁石一錢朴硝二錢並研為末令以熬熟豬油加蜜和調藥末與服下午吞之至三鼓時解下一物瑩如蓴菜潤滑無稜藥護其外撥視之則釘在其中矣乃京中釘鞋所用磨菰釘也立方之意以硝非磁石則不能使藥附釘磁石非硝則不能逐釘速出非油則無以潤非蜜則未必滑則著者著逐者逐潤者潤同功合力裹護而出矣此景嶽傑出之案也使悉能如此用法周到夫何間然按物理小識亦載小兒誤吞鐵針以乳香荔枝朴硝為末以犬豕脂入鹽和之吞下自愈若碎鐵則用皂莢硇砂雷學曰鐵遇神砂和泥似粉神砂應即硇砂也硇砂大毒何可輕用一吏部無子妻極妒妾方坐蓐乃盤腸生妻暗用細針刺於腸上妾覺後腸時有刺痛難忍穩婆私告於妾妾與吏部言之諸醫束手一全真曰我能治之用磁石一大塊從痛處引之至於臍針從臍出妾竟無恙黃蟄南公談續金陵瑣事劉浴德號壺隱知醫洞庭葉雅南之細君五七日前因事不順意意欲自斃遂吞布針十餘根因請乩仙降筆云吾碧雲仙使也始問曾吞針否又曰果則果矣事則無事仙方又書凡方可治復問明書凡方良久乃書問壺隱子因造劉問方劉教以櫟炭末三錢用井水調服可下如未下可再服之乃曰愚意欲餌瓷石未審何如劉曰叵叵叵叵猶言不可不可也宜取磁石兩大塊置肛門外或庶幾焉如法治針果出續金陵瑣事百一選方以淨水盛新汲水一盞捧之面東默念云謹請太上東流順水急急如南方大帝律令敕一氣念七遍即吹一口氣入水中如此七吹以水飲患人立下或用此咒水可以食針並竹刺較子和案中咒頗簡易諸骨鯁喉用清水一碗以手指向水面虛寫天上金雞叫地下草雞啼兩雞並一雞九龍下海喉嚨化如滄海二十五字口誦七七遍飲之立愈向又一法以清水一碗用手指向水虛寫鳥飛龍下魚化丹邱八字飲之立效並酉陽雜俎雄按此皆祝由遺意或於水面虛寫水活魚龍順五字飲之亦妙劉浣鄰人馬湘生兒數月偶遺金網中圈子於案上兒誤吞之哀泣不已湘求救於醫醫適出湘司於門坐立不定或詢其子何疾驚惶如是湘以前事告或教以急買韭數莖熟而不斷與蠶豆同咽之不過二次從大便出矣此法方書所不載故表之北壕紀言李奎治一人誤吞指爪喉哽幾殆奎令剪人指爪煅服之立愈疑其古方奎曰不然此內經所謂衰之以其屬者也聞者歎服寧波府志張子和治當塗郭祥正子患咳嗽肌骨如削醫多以為勞張曰是不足憂就坐飲以藥忽大吐使視涎沫中當有物也視之得魚骨宿疾皆愈新安志一富家子被雞骨鯁百方莫治家人驚惶忽一叟至自云我有巧術但行手法取之不勞藥餌也許以千緡厚謝叟乃以絲棉裹白糖如梅大令其咽下入喉間留一半於外時時以手牽掣俾喉中作癢忽然痰涎湧出其骨黏於棉上遂如約酬之續醫說張文垣治查良本內人怒後偶食魚頭骨鯁於喉中即饅頭粽肉等壓之骨雖下隨覺胸膈不快又服銷骨藥二帖已七日矣胸膈脹痛殊甚飲食悉從背下惡寒發熱脈之兩手弦數蓋骨鯁之後用硬物壓之傷其胃脘必有瘀血停蓄膈間將食管逼向後故飲食覺從背下也但銷去瘀血使管復原胸膈之痛可瘳矣以五靈脂為君元胡索山楂桃仁枳殼等為臣赤芍丹皮香附山梔為佐柴胡石菖蒲為使臨服入韭汁一酒杯服後胸膈寬快大便瀉一次痛減大半飲食乃從右下右邊胸喉略痛吞物甚艱吐出痰皆血腥氣改以山梔赤芍歸尾桃仁劉寄奴五靈脂丹皮穿山甲入韭汁服之二帖全瘳張景嶽曰凡諸物鯁於喉中或刺於骨必得鋒芒之逆所以棘而不下凡下而逆者反而上之則順矣故治此者當借飲食之勢湧而吐之使之上出則如拔刺之捷也若芒刺既深必欲推下非惟理勢有不能亦且遲延或食飲既消無可推送以致漸腫為害非細又曰凡諸骨鯁或以餳糖一大塊滿口吞而咽之或用韭菜煮略熟勿切吞下一束即裹而下亦妙高坡纂異載洪洞韓肅即忠定公之父也三歲時誤吞一釘家人皆驚哭待盡其祖以神醫名視之曰無恙必待三年釘乃得出人莫之信遂定時日書壁間以俟但每作腹痛必絶而復蘇久漸黃瘦骨立及期謂家人曰兒將瘳勢必大作雖絶勿懼宜先煮粥食以俟之既而腹果大痛一叫而絶良久吐出釘脫盡刓又復絶逾時始蘇歲余獲安壽七十一卒金陵秣陵鄉中一人姓李號守泉符水絶妙遠近求無不立效其法命鯁者坐自己佛堂中佛前放一盂淨水令親屬往求燒符用法訖徐以小筊卜之云已愈矣其人歸看淨水中所鯁之物在內隨愈乃親見者治法匯景德鎮湖田市張姿女名婆兒因吃糍糕被噎而死氣尚未絶須明日方斂守尸悲哭忽聞擊戶聲問誰人曰我是河裡住人陳曾二也張曰何故夜深相過曰知道婆兒不幸但扶䇿起坐將苕帚拍打背三下糍便落腹可活矣張啓門稱謝了無所見試用其法不食頃女腹如雷鳴即時安好逮曉尋訪陳曾二蓋七年前溺水而死者鬼未受生猶懷惻隱存心如是張乃命僧為薦拔之夷堅志
