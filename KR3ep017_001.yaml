body:
  text: 卷一傷寒許叔微云有病傷寒身熱頭疼余視之曰邪在表此表實症也當汗之以麻黃湯或問曰傷寒大抵因虛故邪得以入之邪在表何以雲表實也予曰古人稱邪之所湊其氣則虛留而不去其病則實蓋邪之入人也始因虛入邪居中反為實矣大抵調治傷寒先要明表裡虛實能明此四字則仲景三百九十七法可立而定也何以言之有表實有表虛有裡實有裡虛有表裡俱實有表裡俱虛仲景麻黃湯之類為表實而設也桂枝湯之類為表虛而設也裡實則承氣之類是也裡虛則四逆之類是也表裡俱實所謂陽盛陰虛下之則愈也表裡俱虛所謂陽虛陰盛汗之則愈也常讀華佗傳有府吏倪尋李延其症俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋外實延內實故治之異耳外實內實汗卞倒施疑有誤此可當傷寒總論一人初得病四肢逆冷臍下築痛身痛如被杖蓋陰症也急服金液破陰來復等丹其脈遂沉而滑沉者陰也滑者陽也陰病得陽脈者生仍灸氣海丹田百壯手足俱溫陽回得微汗而解或問滑沉之脈如何便有生理曰仲景云翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故名曰滑古人論脈滑雖曰往來前卻流利旋轉替替然與數相似仲景三語而足也此三字極難曉翕合也言張而復合也故曰翕為正陽沉言忽降而下也故曰沉為正陰方翕而合俄降而沉奄為忽忽間仲景論滑脈可謂諦當矣其言皆有法故讀者難曉宜細思之可作傷寒論讀治陰症指南一人病傷寒下利神昏多困譫語不得眠或者見下利便以譫語為陰虛症許曰此亦小承氣症眾駭曰下利而服小承氣仲景之法乎許曰此仲景之法也仲景曰下利而譫語者有燥糞也屬小承氣湯而得解予嘗讀素問云微者逆之甚者從之逆者正治從者反治從多從少視其事也帝曰何謂反治岐伯曰塞因塞用通因通用王冰注云大熱內結注瀉不止熱宜寒療結熱須除以寒下之結散利止則通因通用也正合於此又何疑焉引經論治瞭如指掌治里症法一人患傷寒五六日頭汗自出自頸以下無汗手足冷心下痞悶大便秘結或見四肢冷又汗出滿悶以為陰症診其脈沉而緊為少陰症多是自利未有秘結也此症半在表半在裡投以小柴湯得愈仲景謂四肢冷脈沉緊腹滿全似少陰然大便硬頭汗出不得為少陰蓋頭者三陽同聚若三陰止胸而還有頭汗出自是陽虛故曰汗出為陽微是陰不得有汗也若少陰頭有汗則死矣故仲景平脈法云心者火也明少陰則無頭汗者可治有汗者死心為手少陰腎為足少陰相與為上下惟以意逆志者斯可得之治半表半裡法一人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也診之曰勞心之所致神之舍未復其初而又勞傷其神營衛所以失度也當補其子益其脾解其勞庶幾得愈授以補脾湯佐以小柴胡湯解之而愈補脾湯人參白朮甘草橘皮青皮乾薑各等分傷寒之後防有餘熱乾薑白朮尚宜斟酌侯國華病傷寒四五日身微斑渴欲飲診之沉弦欲厥陰脈也服溫藥數日不已又以薑附等藥覺陽微回脈漸生因渴私飲水一杯脈退又見頭不舉目不開問之則犯陰陽易只與燒裩散連進二服出大汗兩晝夜而愈陽易治法衍義治傷寒汗不出搐腳法用海蛤粉烏頭各二兩穿山甲三兩為末酒糊為丸大一寸許捏匾置患人足心下擘蔥白蓋藥以帛纏足坐於暖室取熱湯浸腳至膝下久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以和為度外治取汗法以上俱醫學綱目張子和曰予之常溪雪中冒寒入浴重感風寒遂病不起但使煎通聖散單服之一二日不食惟渴飲水亦不多飲時時使人捶其股按其腹凡三四日不食日飲水一二十度至六日有譫語妄見以調胃承氣湯下之汗出而愈常謂人曰傷寒勿妄用藥惟飲水最為妙藥但不可使之傷常令揉散乃大佳耳至六七日見有下證方可下之豈有變異哉奈何醫者禁人飲水至有渴死者病人若不渴強與水飲亦不肯飲也予初病時鼻塞聲重頭痛小便如灰淋汁及服調胃承氣一兩半覺欲嘔狀探而出之汗出漐漐然須臾下五六行大汗一日乃瘳當日飲水下則痰出約一二碗痰即是病也痰去則病去矣予時年六十一歲傷寒初起在表時速以麻黃湯解之則不至成下證否則二三日後便入里不得不用承氣矣子和此案俱得法惟解表略緩故須繼以承氣耳焦百善偶感風寒壯熱頭痛其巷人點蜜茶一碗使啜之焦因熱服之訖偶思張語曰凡苦味皆能湧今兼頭痛是病在上試以箸探之吐畢其痛立解孫兆治俞伯道忽患微熱心下滿頭痛汗不能解眾醫以為溫病用表有謂食在膈者治之不愈召孫至用半夏茯苓湯問其故曰頭有汗心下滿非濕症乃水結胸也小便既去其病乃愈且如濕氣心下滿自當遍身有汗有食心下滿豈得有汗若言是表身又不惡寒疼痛表症何在故凡水結胸頭必有汗出傷寒口訣竇材治一人患肺傷寒別名頭痛發熱惡寒咳嗽肢節疼脈沉緊服華蓋散黃耆建中湯略解至五日昏睡譫語四肢微厥乃腎氣虛也灸關元百壯服姜附湯始汗出愈作虛治一人傷寒昏睡妄語六脈弦大竇曰脈大而昏睡定非實熱乃脈隨氣奔也強為之治用烈火灸關元穴初灸病人覺痛至七十壯遂昏睡不痛灸至三鼓病人開眼思飲食令服姜附湯至三日後方得元氣來復大汗而解一人患傷寒至八日脈大而緊發黃生紫斑噫氣足趾冷至腳面此太陰症也最重難治為灸命關五十壯關元二百壯服金液丹鍾乳粉四日汗出而愈一人患傷寒至六日脈弦緊身發熱自汗太陰症也先服金液丹灸命關穴病人不肯灸傷寒惟太陰少陰二症死人最速若不早灸雖服藥無功不信至九日瀉血而死一人傷寒至六日微發黃一醫與茵陳湯次日更深黃色遍身如梔子此太陰症誤服涼藥而致肝木侮脾為灸命關五十壯服金液丹而愈一人患傷寒初起即厥逆脈一息八九至諸醫以為必死竇曰乃陰毒也厥逆脈敝斷為陰毒必有爪青吐利蜷臥等症與姜附湯一盞至半夜汗出而愈若以脈數為熱下涼藥必死無疑張子和之僕嘗與鄰人同病傷寒俱至六七日下之不通鄰人已死僕發熱極投於井中撈出以汲水貯之檻使坐其中適張遊他方家人偶記張治法曰傷寒三下不通不可再攻便當湧之試服瓜蒂散良久吐膠痰三碗許與宿食相雜在地狀如一帚頓快乃知世醫殺人多矣又一吏吐訖使服太白散甘露散以調之邪結陽明發為狂熱吐之猶是宿食非若燥糞便硬可下而愈也萬密齋治縣尹唐肖峰二月間患傷寒醫進九味羌活湯不效又云內傷挾外感進補中益氣湯不效又進紫苓湯去人參病略減四日復發熱頭苦痛醫欲下之未決萬脈之陽明少陽洪長而弦曰此元氣素虛因起早感寒得之今病在少陽陽明並病乍熱乍涼者少陽也頭苦痛者陽明也宜小柴胡合葛根蔥白湯唐曰吾素多痰火病勿用人參萬曰元氣不足乃虛火也實火宜瀉虛火宜補幸勿疑一劑而病愈胡晏年五十病傷寒十六日不解其症乍寒時即以衣被厚覆矇頭而臥不勝其寒乍熱時即撤去衣被暴露其身更用扇不勝其熱如此一日夜十餘次醫皆不識萬至告以病狀可怪邀診其脈曰不必診此易知耳夫惡寒病在表也何以無頭痛症惡熱病在裡也何以無渴及便溺不利症此病在半表半裡陰陽混亂也陰氣乘陽則惡寒陽氣乘陰則惡熱宜用小柴胡以治其半表半裡之邪梔子豆豉以治其陰陽錯雜之邪服之寒熱不再作而愈李養晦患傷寒苦右脅痛醫用陶節庵法以小柴胡加枳殼桔梗服之無效已十七日萬脈之沉弦且急曰此蓄水症也經云沉潛為水支飲脈弦急必得之飲水過多問曾服何方以前藥對萬曰只用此方再加牡蠣以泄其蓄水可耳一服而痛止一門子病傷寒醫與發汗七日復不愈小腹滿而痛欲下之未敢萬脈之沉弦而急問曾渴飲水乎答曰甚渴雖飲水渴不止曰此蓄水似疝症不可下也乃用五苓散以利其水加川楝子小茴香以止小腹之痛一服洞泄四五行皆清水次日再求診曰不必再藥水盡泄自止矣三日後果安沈天祿病傷寒汗下後病不解身無大熱不惺惺醫者但云譫語以症論之乃錯語也譫語錯語極宜細辨緣汗下之後元氣未復神識不清耳與補中益氣湯去升柴加麥冬生地熟附子一服而愈孫文垣治張二官發熱頭痛口渴大便秘結三日未行脈洪大曰此陽明少陽二經之症用大柴胡湯行三五次所下皆黑糞夜出臭汗次日清爽惟額上仍熱陽明部位用白虎湯加葛根天花粉因食粥太早復發熱咳嗽口渴殊甚且噁心食復用小柴胡加枳實山梔麥芽次日渴不可當半夏枳實麥芽皆能耗陽明津液改以白虎湯加麥冬花粉外與辰砂益元散以井水調服五錢熱始退渴始定不虞夜睡失蓋復受寒邪天明又大發熱人事不知復感急用小柴胡湯加升麻葛根前胡薄荷汗出熱退神思大瘁四肢皆冷語言懶倦且咳嗽以生脈散加石斛百合大棗白芍服後咳嗽尋止精神日加飲食進而愈繆仲淳治姚平子傷寒頭疼身熱舌上黃胎胸膈飽悶三四日熱不解奄奄氣似不屬者邪熱甚則正氣餒不可誤認為虛一醫以其體素弱病久虛其意欲投參少許繆叱曰一片入口死矣亟以大黃一兩栝蔞二枚連子切片黃連枳實下之小陷胸加大黃主人驚疑不得已減大黃之半二劑便通熱立解遂愈高存之一家人婦傷寒來乞方繆已疏方與之矣見其人少年曰若曾病此否曰然曰愈幾日而妻病曰八九日曰曾有房欲否曰無之繆故曰若有房欲此方能殺人也其人即置方不取遂以褌襠雄鼠糞麥冬韭白柴胡二劑勢定更用竹皮湯二三劑全愈觀此則傷寒初愈臟腑猶多熱毒時師不察驟投參耆朮附溫補其遺患可勝言哉一奴傷寒熱解後復下血不止主人以痢藥投之更甚繆曰此傷寒失汗之餘症也用地榆麥冬知母竹葉以代仲景諸血症藥遂愈翁具茨感冒壯熱舌生黑苔煩渴陽明症勢甚劇諸昆仲環視揮淚群醫束手繆以大劑白虎湯加人參三錢一劑立蘇或問繆治傷寒有秘方乎繆曰熟讀仲景書即秘方也藜按此係溫病故以人參白虎湯取效常熟吳見田在京邸時有小青衣患傷寒愈而復復而愈愈而再復不知其幾謂繆曰非兄不能救診之病人面色黃白有胃色六脈微弱有胃色大便不通胸中不快亦不思食曰此為傷寒百合無經絡百脈一齊致病謂之百合病壞症正氣已虛邪氣留滯及過經不解瘥後或虛羸少氣皆謂之壞病之餘邪且退矣以色脈斷胸中不快虛而氣壅非實邪不大便者久病津液枯氣弱不能送也投以人參五錢麥冬一兩枳殼炒八錢盡劑立解而瘥文田按用百合治者方謂之百合病今藥無百合而云百合病非也此直是傷寒壞症耳梁溪一男子素虛春中感冒頭痛肌痛發熱羌活二錢麥冬三錢炙甘草一錢紫蘇一錢五分北細辛七分前胡一錢五分次日頭痛止熱未退口渴繆用白芍五味子人曰風未退遽用酸斂何也曰因人而施爾一杯即愈麥冬三錢甘草一錢栝蔞根二錢五分乾薑一錢五分桑皮三錢桔梗一錢白芍一錢五味子五分四明虞吉卿因三十外出疹不忌豬肉兼之好飲作泄八載矣忽患傷寒頭疼如裂滿面發赤汗出不徹舌生黑苔煩躁口渴時發譫語兩眼不合者七日皆屬陽明洞泄如注較前益無度協熱也脈之洪大而數實熱為疏竹葉石膏湯方因其有腹瀉之病石膏只用一兩病初不減此兄素不謹一友疑其虛也云宜用肉桂附子凡診病淺見者反若深慮多令病者無所適從或以其言來告繆曰誠有是理但前者按脈似非此症豈不數日而脈頓變耶復往視仍洪大而數曰此時一投桂附即發狂登屋必不救矣一照前方但加石膏至二兩或曰得毋與瀉有妨乎曰邪熱作祟此客病也不治立殆渠泄瀉已八年非暴病也治病須先太甚急治其邪徐並其夙恙除之急進一劑夜臥遂安即省人事再劑而前惡症頓去數日霍然但瀉未止耳為疏脾腎雙補丸更加黃連乾葛升麻以痧痢法治之不一月瀉竟止八載沉疴一旦若失藜按此亦溫熱症非傷寒也莊欽之一莊僕因受寒發熱頭痛如裂太陽兩目俱痛陽明渾身骨內疼痛下元尤甚勞傷狀如刀割不可忍耐熱甚傷寒口渴甚大便日解一次胸膈飽脹下不解已待斃矣為疏一方乾葛三錢石膏一兩五錢麥冬八錢知母三錢五分羌活二錢五分大栝蔞半個連子打碎枳殼一錢桔梗一錢竹葉一百片河水煎服四劑而平此太陽陽明病也貧人素多作勞故下體疼痛尤甚以羌活去太陽之邪石膏竹葉乾葛麥冬知母解陽明之熱栝蔞桔梗枳殼疏利胸膈之留邪故遂愈又莊一僕因傷寒後勞復發熱頭痛腹中作瀉勢甚危急為疏一方山梔仁四錢枳實二錢豆豉一兩川黃連二錢乾葛三錢調六一散五錢服二劑熱退瀉止頭痛亦愈但不思飲食為去山梔枳實黃連加鱉甲四錢炙甘草二錢五分麥冬五錢不數劑而愈朱遠齊治從祖近湖公少年因房勞食犬肉傷寒諸醫以其虛也攻補兼施至發狂登屋奔走號呼陽明腑症實熱日夜令壯夫看守幾月余矣急走使延朱朱先令煎人參膏二斤以待用潤字號丸藥數錢下之去黑糞無算熱遂定奄奄一息鄰於死矣徐以參膏灌之至一百二十日全瘳以上廣筆記龔子才治一人頭疼發熱憎寒身痛發渴譫語日久不出汗以大梨一枚生薑一塊同搗取汁入童便一碗重湯煮熟食之汗出如水即愈制方甚佳愈於甘露且免地黃之忌太守劉云亭患傷寒發熱面紅唇赤面壁蜷身而臥諸醫以小柴胡湯解毒湯之類數劑弗效診之六脈浮大無力此命門無火也合脈與症即是戴陽以人參附子沉香服之立愈三服全安一嫗年七旬傷寒初起頭痛身疼發熱憎寒醫以發散數劑不效淹延旬日漸不飲食昏沉口不能言眼不能開氣微欲絕純見陰證凡實證而見此亦宜獨參猛進貧者以重劑杞地少入乾薑與人參五錢煎湯徐徐灌之須臾稍省欲飲水煎渣服之頓愈又十年乃卒當與疫症內蘇韜光一案同參李士材治一人傷寒九日以來口不能言目不能視體不能動四肢俱冷咸謂陰症診之六脈皆無以手按腹兩手護之拒按是也眉皺作楚實邪按其趺陽大而有力乃知腹有燥矢也欲與大承氣湯病家惶懼不敢進李曰吾郡能辨是症者惟施笠澤耳此等症人便稀識可為浩嘆延診之若合符節遂下之得燥失六七枚口能言體能動矣故按手不及足者何以救此垂絕之症耶一人傷寒煩躁面赤亂悶欲絕時索冷水手揚足踢難以候脈五六人制之方得就診洪大無倫按之如絲李曰浮大沉小陰症似陽也與附子理中湯當有生理其弟駭曰醫者十輩至不曰柴胡承氣則曰竹葉石膏今反用此熱劑烏乎敢李曰溫劑猶生涼劑立斃矣卜之吉遂用理中湯加人參四錢附子一錢煎成入井水冷與飲甫及一時狂躁定矣再劑而神爽服參至五斤而安得力在入井水冷服凡遇此等傷寒能以全料六味減苓瀉加麥冬杞子用大砂罐濃煎與之必數杯而後酣寢汗出而愈於時此法未開惟倚仗人參之力取效本陰竭之症乃峻補其陽復生陰而愈故用參每多至數斤使在今時非猗頓之家不可為矣一人傷寒至五日下利不止懊憹目脹諸藥不效有以山藥茯苓與之慮其瀉脫也李診之六脈沉數按其臍則痛此協熱自利中有結糞小承氣倍大黃服之果下結糞數枚遂利止懊憹亦痊一人傷寒第二日頭痛發熱李曰方今正月時令猶寒必服麻黃湯兩日愈矣若服沖和湯不惟不得汗即使得汗必致傳經遂以麻黃湯熱飲之更以滾水入浴桶置床下熏之得汗如雨密覆半晌易被神已爽矣晚索粥家人不與李曰邪已解矣必不傳裡食粥何妨明日果愈不以麻黃汗之傳變深重非半月不安也藜按用麻黃取汗須防太過吳光祿患傷寒頭痛腹脹身重不能轉側口內不和語言譫妄有云表裡俱有邪宜以大柴胡下之李曰此三陽合病也誤下之決不可救乃以白虎湯連進兩服諸症漸減更加花粉麥冬兩劑而安藜按此亦溫熱之症楊與師妾發熱頭疼六日後忽見紅疹眾皆以為發斑用升麻犀角等湯凡五日不效李視之曰此疹也非斑也斑為陽明火毒疹為太陰風熱一表一里判如天淵乃用防風二錢黃芩一錢甘草五分薄荷桔梗蟬蛻各一錢四劑霍然矣一人傷寒六日譫語狂笑頭痛有汗大便不通小便自利眾議承氣湯下之脈之洪而大因思仲景云傷寒不大便六七日頭疼有熱小便清知不在裡仍在表也方今仲冬宜與桂枝湯眾皆咋舌掩口謗甚力以譫語為陽盛桂枝入口必斃矣李曰汗多神昏故發譫妄雖不大便腹無所苦和其營衛必自愈矣遂違眾用之及夜笑語皆止明日大便自通故夫病變多端不可膠執向使狐疑而用下藥其可活乎有汗不可用麻黃無汗不可用桂枝古人之定例也此症明明有汗豈可執譫妄一端而誤用下藥乎且不大便腹無所苦即不可下之的據盧不遠治來熙庵侄身體豐碩傷寒已二十八日人事不省不能言語手足揚擲腹脹如鼓而熱烙手目赤氣粗齒槁舌黑參附石膏硝黃芩連無一不服諸醫告退矣診之脈濁鼓指用大黃一兩佐以血藥以血藥佐下穩妥微妙一劑下黑血一二斗少蘇四劑始清蓋此症寒邪入胃蓄血在中其昏沉揚擲是喜妄如狂之深者也當時大黃未嘗不用而投非其時品劑輕小不應則惑矣寧望放膽哉先時雖用大黃仍是失下合脈與症復大下之非高手不能蜀孝廉阮太和病寓吳山下召診披衣強坐對語甚莊神氣則內索也身熱進退舌苔黃而厚蓋自吳門受寒以肉羹為補而時啜之遂纏綿匝月盧用疏散輕劑熱退又復強啖再熱不能起坐越五日診之譫妄呼笑不識人已三日形骨立汗雨下而內熱特甚胸脅之熱捫之烙手第脈尚有神乃用人參八錢加四逆散中一劑而譫妄定三劑而熱邪清矣自言其神魂窮天之上極地之下飛揚奇變得太乙神符召之始得返生愈後問藥狀曰此寒傷心氣荏苒厥深而湊於胸也以不第南旋病淹中道骨肉遼遠藥石弗周則心已傷矣又反復再四汗液多亡內無主宰熱遂入胸胸為心主之宮城精神因而渙散是以遊魂為變也用四逆使熱外出加入參俾神內凝邪氣散是以主耳有此二端便非陰證吳孚先治一人傷寒身寒逆冷時或戰慄神氣昏昏大便秘小便赤有此二端便非陰證六脈沉伏或憑外象謂陰症投熱劑或以脈沉伏亦作陰治吳診之脈沉伏而重按之則滑數有力愈按愈甚視其舌則燥探其足則暖曰此陽症似陰設投熱藥火上添油矣乃用苦寒峻劑煎成乘熱頓飲而痊寒因熱用法按內真寒而外假熱諸家嘗論之矣至內真熱而外假寒論及者罕此案故宜熟玩一人病昏昏默默如熱無熱如寒無寒欲臥不能臥欲行不能行虛煩不耐若有神靈莫可名狀此病名百合雖在脈實在心肺兩經以心合血脈肺潮百脈故也蓋心藏神肺藏魄神魄失守故見此症良由傷寒邪熱失於汗下和解致熱伏血脈而成用百合一兩生地汁半鍾煎成兩次服必候大便如漆乃瘥論百合病深得真諦張景岳治王生年三旬病陰虛傷寒葉天士曰陰虛二字尚要講明陰虛者水因火耗當用滋陰若用桂附則非陰虛乃虛寒火衰之症或戴陽格陽陰症似陽乃可用矣此處關頭宜細詳察其舌芒刺干裂焦黑如炭身熱便結大渴喜冷而脈則無力神則昏沉群謂陽症陰脈必死無疑察其形氣未脫遂以甘溫壯水等藥大劑進之以救其本仍間用涼水以滋其標蓋水為天一之精涼能解熱甘可助陰非苦寒傷氣可比故於津液乾燥陰虛便結而熱渴火盛之症在所不忌由是水藥並進葉天士曰若用桂附人參此虛寒之證冷水必不喜飲豈可飲一二斗乎此言甚覺謬妄惟邪熱熾盛可飲冷水然後諸症漸退飲食漸進神氣俱復矣但察其舌則如故心甚疑之閱數日忽舌上脫一黑殼其內新肉燦然始悟其膚腠焦枯死而復活使非大合添補安望再生若此一症特舉其甚者凡舌黑用補得以保全者甚多蓋傷寒之舌則熱固能黑以火盛而焦也虛亦能黑以水虧而枯也葉天士曰水虧之黑豈可用熱若以舌黃舌黑悉為實熱則陰虛之症萬無一生之矣按是症既云陰虛燥渴用涼水是矣而又雜與桂附各數兩治法未能無疵至舌苔成殼脫落恐桂附之投不能無過也一衰翁年過七旬陡患傷寒初起即用溫補調理至十日之外正氣將復忽爾作戰自旦至辰不能得汗寒慄危甚用六味回陽飲入人參一兩薑附各三錢煎服下咽少頃即大汗如浴時將及午而浸汗不收身冷如脫鼻息亦幾無令以前藥復煎與之曰先服此藥已大汗不堪今又服此尚堪再汗乎笑謂曰此中有神非爾所知也急令再進遂汗收神復不旬日起矣嗚呼發汗用此而收汗復用此無怪乎人之疑之也不知汗之出與汗之收皆元氣為之樞機耳喻嘉言治黃長人犯房勞病傷寒守不服藥之戒身熱漸退十餘日外忽然昏沉渾身戰慄手足如冰乃熱深厥亦深也亟請喻至一醫已合就薑附之藥矣見而駭之診畢再三辟其差謬主人自疑陰症言之不入又不可以理服乃與醫者約曰此一病藥入口中出生入死關係重大吾與丈各立擔承倘用藥差誤責有所歸醫者云吾治傷寒三十餘年不知甚麼擔承喻笑曰有吾明眼在此不忍見人活活就斃吾亦不得已也如不擔承待吾用藥主家方安心請治與以調胃承氣湯約重五錢煎成熱服半盞少頃又熱服半盞其醫見厥漸退人漸蘇知藥不誤辭去仍與前藥服至劑終人事大清忽然渾身壯熱厥止則陽回復現熱症再與大柴胡一劑熱退身安門人問曰病者雲系陰症見厥先生確認為陽症而用下藥果應其理安在答曰其理頗微吾從悟入可得言也凡傷寒病初起發熱煎熬津液鼻乾口渴便秘漸至發厥者不問可知其為熱也若陽症忽變陰厥者萬中無一從古至今無一也蓋陰厥得之厥症一起便直中陰經唇青面白遍身冷汗便利不渴身蜷多睡醒則人事了了與傷寒傳經之熱邪轉入轉深人事昏惑者萬萬不同諸書類載陰陽二厥為一門即明者猶為所混況昧者乎如此病先犯房勞後成傷寒世醫無不為陰症之名所惑往往投以四逆等湯致陰竭莫救促其暴亡尚不知悟總由傳派不清耳蓋犯房勞而病感者其勢不過比常較重如發熱則熱之極惡寒則寒之極頭痛則痛之極所以然者以陰虛陽往乘之非陰盛無陽之比況病者始能勿藥陰邪必輕旬日漸發尤非暴症安得以陰厥之例為治耶且仲景明言始發熱六日厥反九日後復發熱三日與厥相應則病旦暮愈又云厥五日熱亦五日設六日當復厥不厥者自愈明明以熱之日數定厥之痊期也又云厥多熱少則病進熱多厥少則病退厥愈而熱過久者必便膿血發癰厥應下而反汗之必口傷爛赤先厥後熱利必自止見厥複利利止反汗出咽痛者其喉為痹厥而能食恐為除中厥止思食邪退欲愈凡此之類莫非熱深發厥之旨原未論及於陰厥也至於陽分之病而妄汗妄吐妄下以致勢極如汗多亡陽吐利煩躁四肢逆冷者皆因用藥差誤所致非以四逆真武等湯挽之則陽不能回亦原不為陰症立方也蓋傷寒才一發熱發渴定然陰分先虧以其誤治陽分比陰分更虧不得已從權用辛熱先救其陽與純陰無陽陰盛格陽之症相去天淵後人不窺制方之意見有成法轉相效尤不知治陰症以救陽為主治傷寒以救陰為主此一語為治傳經症之秘旨傷寒縱有陽虛當治必看其人血肉充盛陰分可受陽藥者方可回陽若面黧舌黑身如枯柴一團邪火內燔者則陰已先盡何陽可回耶故見厥除熱存津液元氣於什一已失之晚況敢助陽劫陰乎證治方云若證未辨陰陽且以四順丸試之直指方云未辨疑似且與理中丸試之亦可見從前未透此關縱有深心無可奈何耳因為子輩詳辨並以告後之業醫者云成無己云凡厥若始得之手足便厥而不溫者是陰經受邪陽氣不足可用四逆湯溫之若手足自熱而至溫從四逆而至厥者傳經之邪也四逆散主之必須識此勿令誤也又當兼以外症別之予嘗治過一中年婦人惡熱身熱而渴脈數細弱先厥後熱用溫藥反劇後以四逆散兼參術各半兩服之厥即愈脈出洪大而痊按成所論陰經受邪及傳經之邪二厥一用四逆湯溫治一用四逆散涼治已昭然若揭喻氏或未之見耳故列其案於此陸平叔文學平素體虛氣怯面色萎黃藥宜溫補不宜寒涼固其常也秋月偶患三瘧孟冬復受外寒雖有寒熱一症而未至大寒大熱醫者以為瘧後虛邪不知其為新受實邪也因舊病感新邪最易誤人投以參術補劑轉至奄奄一息遷延兩旬間有從外感起見者用人參白虎湯略無寸效昏昏默默漫無主持已治木矣喻診之察其脈未大壞腹未大滿小水尚利謂可治但筋脈牽掣不停只恐手足痿廢仲景云筋脈動惕者久而成痿今病已二十餘日血枯筋燥從可知矣今治則兼治當於仲景之外另施手眼以仲景雖有大柴胡湯兩解表裡之法而無治痿之法治痿獨取陽明清陽明之熱邪則痿不治而愈況此症原屬暴傷非損也變用防風通聖散成方減白朮以方中防風荊芥薄荷麻黃桔梗為表藥大黃芒硝黃芩連翹梔子石膏滑石為里藥原與大柴胡之制略相仿且內有當歸川芎白芍正可領諸藥深入血分而通經脈減白朮者以前既用之貽誤不可再誤耳當晚連進二劑一劑殊相安二劑大便始通少頃睡去津津汗出次早診之筋脈不為牽掣但陽明胃脈洪大反加隨用白虎湯石膏知母每各兩許次加柴胡花粉芩柏連翹梔子一派苦寒連進十餘劑要之前誤用溫補之劑亦不少矣神識清飲食進半月起於床一月步於地略過啖即腹痛泄瀉儼似虛症喻不之顧但於行滯藥中加柴胡桂枝升散餘邪不使下溜變痢然後改用葳蕤二冬略和胃氣間用人參不過五分前後治法一一不違矩矱始克起九死於一生也徐國楨傷寒六七日身熱目赤索水到前復置不飲異常大躁將門牖洞啟身臥地上輾轉不快更求入井一醫洶洶急以大承氣與服喻診其脈洪大無倫重按無力謂曰此用人參附子乾薑之症奈何認為下症耶醫曰身熱目赤有餘之邪躁急若此再與薑附逾垣上屋矣喻曰陽欲暴脫外顯假熱內有真寒以薑附投之尚恐不勝回陽之任況敢以純陰之藥重劫其陽乎觀其得水不欲咽熱在陽明經者亦漱水不欲咽情已大露豈水尚不欲咽而反可咽大黃芒硝乎天氣懊蒸必有大雨此症傾刻大汗不可救矣且既認大熱為陽症則下之必成結胸更可慮也惟用薑附所謂補中有發並可散邪退熱一舉兩得不必疑慮以附子乾薑各五錢人參三錢甘草二錢煎成冷服後寒戰戛齒有聲以重棉和頭覆之縮手不肯與診陽微之狀始著再與前藥一劑微汗熱退而安一戴陽症耳說得甚奇然此症實不多見張卿子治塘棲婦人傷寒十日熱不得汗或欲以錦黃下之主人懼延卿子診之曰脈強舌黑而有芒投錦黃為宜今舌黑而潤不渴此附子症也不汗者氣弱也非參耆助之不可一劑而汗仁和縣誌張路玉治範主事求先患傷寒營症惡寒三日不止曾用發散二劑第七日躁擾不寧脈亦不至手足厥逆診之獨左寸厥厥動搖心主汗故也知是欲作戰汗之候令勿服藥宜記省但與熱薑湯助其作汗若誤藥必熱不止後數日枉駕謝別詢之果如所言不藥而愈戰汗治法吳氏子年二十餘素有夢交之疾十月間患傷寒頭痛足冷用發散消導屢汗而昏熱不除反加喘逆更醫用麻黃頭面大汗喘促愈甚或以為邪熱入里主用芩連或以為元氣大虛議用冬地爭持未決張診之六脈瞥瞥按之欲絕正陽欲脫亡之兆急須參附庶可望其回陽此喻嘉言所謂誤治致陽虛也遂疏回陽返本湯加童便以斂陽三啜安臥改用大劑獨參湯加童便調理數日頻與稀糜而安一人途次患傷寒經吳門泊舟求治詢之自渡淮露臥受寒恣飲燒酒發熱在京口服藥行過兩次熱勢略減而神昏不語不時煩擾見其唇舌赤腫燥裂以開水與之則咽不與則不思察其兩寸瞥瞥虛大關寸小弱按久六脈皆虛曰此熱傳手少陰經也與導赤瀉心湯一啜神識稍寧泊舟一日夜又進二帖便溺自知次早解維再診脈靜神安但與小劑五苓去桂易門冬二帖囑其頻與稀糜可收功吳介臣傷寒餘熱未盡曲池壅腫不潰不消日發寒熱瘍醫禁止飲食日服消毒清火藥上氣形脫倚息不得臥渴飲開水一二口腹脹滿急大便燥急不通兩月中用蜜導四五次所去甚艱勢大危診之其脈初按繃急按久絕無此中氣逮盡之兆豈能復勝藥力耶乃令續進稀糜榻前以鴨煮之香氣透達徐以汁啜之是夕大便去結糞甚多喘脹頓止飲食漸進數日後腫赤漸消此際雖可進保元獨參之類然力不能支僅惟穀肉調理而安近一人過餌消導胃氣告匱聞穀氣則欲嘔亦用上法不藥而痊高鼓峰治徐五宜長君傷寒危甚延診頃之有人來言病者晚來狂叫暈去五六次早起一暈竟絕不必往矣問病來幾日云九日矣又問胸尚熱否曰胸但不冷耳曰可救也急往視之至則殭屍在床口鼻無氣面色青黯口噤目閉手撒獨唇色紫黑高笑曰此人不死陰虛症誤服白虎所致耳切其脈兩尺尚在脈在仍是厥耳遂取人參一兩熟地二兩炮姜五錢濃煎湯挖而灌之盡劑口開面色轉紅不及一時大叫冷甚連以熱湯飲之即發壯熱通身淋漓汗下而蘇此晚腹脹不便曰無憂也大汗之後虛不能出耳再飲藥一鍾即得解次日諸病悉除但多妄言怒罵如有鬼神驅之者調治數日至夜半診其脈曰虛至此乎復以大劑附子理中建中投之數日而愈杭友沈僑如甥病傷寒診其脈浮數有力舌黑胸脅痛脹此得之勞倦後復傷飲食戰汗而解不得單謂飲食勞倦醫以寒涼消導攻之火受遏抑無所歸也急以大劑參朮歸耆炮姜救之戒其家人曰夜半當發戰戰則汗而解矣如戰時頻頻以粥與之高臥天長寺四鼓時病家急叩門曰服藥後果寒甚索被頃之大熱昏沉而死矣先生尚有法救之否曰不足慮也汗來矣但戰時曾進粥否曰實未也曰吾語汝戰時須與粥要以助胃氣使汗來速不至困乏耳今亦無妨第歸此時當得汗矣果如言齁睡而安與粥助汗亦仿仲景桂枝治法張隱菴治一少年傷寒三四日頭痛發熱胸痛不可忍病家曰三日前因食麵而致病張曰不然面飯糧食何日不食蓋因外感風寒以致內停飲食非因食麵而為頭痛發熱證也故凡停食感寒只宜解表不可推食如裡氣一鬆外邪即陷入矣為庸師說法且食停於內在胸下胃脘間按之而痛今胸上痛不可按此必誤下而成結胸病家云昨延某師告以食麵故用消食之藥以致胸中大痛因診其外症尚在仍用桂枝湯加減一服而愈張令韶治一婦人患傷寒十餘日手足躁擾口目瞤動面白身冷譫語發狂不知人事勢甚危篤其家以為風縛其手足或以為痰迷心竅或以為虛或以為寒或辭不治張診之切其脈全無問其證不知按其身不熱張曰此非人參附子證即是大黃芒硝證出此入彼死生立判因坐視良久聆其聲重而且長亦有中焦停食而奄奄似不屬者亦下之而愈見繆仲淳治姚平之案曰若是虛寒證到脈脫之時氣沉沉將絕那得有如許氣力大呼疾聲久而不絕即作大承氣湯牙關緊閉挖開去齒藥始下咽黃昏即解黑糞半床次早脈出身熱人事亦知舌能伸出而黑又服小陷胸湯二劑而愈一婦人素有虛弱之症後患傷寒一醫以為陰虛發熱用滋陰之藥命食雞子火肉而病更甚所用皆玉竹骨皮丹皮歸芍之類十餘日死症悉具延張至其人已死張請視之氣雖絕而脈尚在且帶滑曰此症不死乃誤服補藥使邪不解胃絡不通胃家實也幸正氣未敗可治少頃果蘇亦以厥故用調胃承氣湯一服而結糞解諸症愈次日大汗如雨此虛象也用人參三錢耆朮棗仁各五錢而愈一男子新婚吐蛔發熱醫以為陰症用理中湯而吐愈甚張診其脈緩而長一日夜吐蛔十餘條以為風木生蟲濕熱相蒸則蟲頓然而生隨生隨吐欲用黃連等清濕熱之藥不信復易一醫用歸芍玉竹之類吐益甚蟲愈多復延張張曰必欲治非黃連不可遂用黃連厚朴枳實廣皮半夏各等分煎服其吐稍止再服不吐神清蟲從大便而出約數十餘大小不等後加白朮等以補之即脹不安共用黃連枳實二十劑而愈此乃千百中偶見之症不可以為常有也按發熱脈緩而長則是陽明經症案中但與治蛔似多脫略俟再考陸養愚治周兩峰頭痛身熱又舟行遇風幾覆比至家脅大痛耳聾煩渴譫語醫來診忽吐血盤許醫曰兩尺不應寸關弦緊煩渴譫語是陽症也弦乃陰脈仲景曰陽病見陰脈者死況兩尺乃人之根蒂今不起根蒂已絕孤陽上越逼血妄行據症脈不可為矣辭去陸至血已止而喘定脈之兩寸關弦而微數兩尺果沉而不起蓋症屬少陽弦數宜矣脅痛耳聾亦少陽本症兩尺不起亦自有故經雲南政之歲陽明燥金司天少陰君火在泉故不應耳吐血者因舟中驚恐血菀而神攝為熱所搏也譫語者三陽表症已盡將傳三陰也先以小柴胡和之俟堅實而下之旬日當愈因與二劑明日脅痛減耳微聞但仍譫語胸膈滿悶舌上薄黃苔仍以小柴胡加桔梗黃連日服一劑二日胸膈少寬而苔黑有刺大便不行約七日矣乃以潤字丸三錢煎湯送下至夜更衣身潔諸症頓失後去枳桔加歸芍調理旬日而起王野溪病傷寒六七日已發表矣忽身熱煩躁口渴咽乾大小便利而不任風寒或用涼膈散反胸前見斑數十點色微紅乃投消斑青黛飲又發譫語手足厥逆謂熱深之故擬用承氣下之陸脈之浮數六七至按之而空曰此陰盛格陽症也下之立斃內經至真要論云病有脈從而病反者何也岐伯曰脈至而從按之不散諸陽皆然今脈浮之而數按之而空乃陽虛為陰所拒不能內入而與陰交身熱煩躁口渴咽乾浮陽外越之故也惡風畏寒陽氣不足也發斑者因寒藥激之致無根之火聚於胸中上熏於肺傳之皮膚也譫語者神不守舍也厥逆者陽將竭也若冷至肘膝則無及矣此與東垣治馮內翰之侄目赤煩渴王海藏之治侯輔之發斑譫語同例一用真武一用理中此先哲之成驗後學不知取法耳急用大料參朮薑附峻補回陽麥冬五味甘草白芍斂而和之濃煎俟冷徐徐服之日夜令藥不斷三日夜病勢始減旬日後稍加減之月餘而起吳子玉病發熱頭痛腰疼煩躁口渴無汗有主麻黃湯者有主羌活沖和湯者脈之陽部浮數而不甚有力陰部沉弱而澀謂曰此症此脈有兩感之象必重有所用力兼之房勞而得者不可輕汗宜先投補劑托住其氣血待日期而汗之或曰太陽症而用補仲景有此治法乎曰雖無此治法而未嘗無此論太陽症宜汗假令尺中遲不可發汗何以知之以榮氣不足血少故也今寸脈浮數而無力表症不甚急尺脈沉弱而澀則裡虛可知傷寒有失汗而傳裡者亦有誤汗而傳裡者此症是矣眾不決姑服羌活沖和湯一日夜二劑前症俱劇仍不得汗擬麻黃者以藥輕病重欲大汗之陸曰若服麻黃湯亡陽譫語即見斃可立俟也乃用補氣養榮湯二劑病未減亦不劇診之寸關如故兩尺稍有神再二劑又約一日夜方以參蘇飲微汗之汗後諸症悉愈通人之論所謂凡病必有兩面也凌東陽患傷寒已經汗下身體外不熱捫之則熱極不能食而飢不可忍及強進稀粥即脹不可任必用力揉之一二時始下大腹甫下又飢不能支大便五六日不行而少腹不硬滿醫以汗下身涼而用開胃養血順氣劑病日甚診之兩寸關浮數兩尺沉數有力曰此蓄血症也因下之太早濁垢雖去邪熱尚留致血結成瘀胃中飢甚者火也食即脹者邪熱不殺穀也揉下仍飢者胃中空涸邪熱尚在也法宜清上焦之熱去下焦之瘀而後議補或曰許學士謂血在上則喜忘血在下則發狂今云瘀血何以無此症也曰成無己固深於傷寒者也謂不大便六七日之際無喜忘如狂之症又無少腹硬滿之候何以知其有蓄血蓋以脈浮數故也浮則熱客於氣數則熱客於血下後浮數俱去則病已如數去而浮仍在則邪熱獨留於衛善飢而不殺穀潮熱及渴也浮去而數仍在則邪獨留於榮血熱下行血得泄必便膿血若大便六七日不行血不得泄必蓄在下焦而為瘀須以抵當湯下之此前賢之成案也乃用淡鹽湯送抵當丸三錢取咸走血之意以去榮中之結熱隨濃煎人參湯調涼膈散五錢以去衛中之結熱用人參湯者病久數下恐元氣不能支也如此兩日結血去浮熱解飲食進後以清氣養榮湯調理旬日而愈湯二老病傷寒已發汗矣後忽下利身熱頭痛昏憒或謂合病下利復用解肌發表藥反增劇自汗惡風或謂陰虛用理中合四物遂不眠妄見躁煩譫語或云此協熱下利也用白頭翁湯二劑病略可數日諸症不減四肢厥逆脈之浮按散大而數沉按細數而有力曰向云協熱者是也第宜調胃承氣湯下之不當止用白頭翁湯耳或云下利厥逆可復下乎曰內經云塞因塞用通因通用王太僕云大熱內結淫瀉不止熱宜寒療結熱自除以寒藥下之結散利止此通因通用之法也又仲景云下利譫語有燥屎也厥逆者熱深厥亦深也承氣下之第此症初見時下之即愈今日數已久元氣將脫不得竟下因用人參二錢濃煎送潤字丸五錢半日許出燥屎數十枚利減半手足稍溫第昏沉更甚問之不語左脈微浮略數右脈少沉微數無力再用人參五錢濃煎送潤字丸二錢少時又去燥屎數枚溏便少許遂能語索食稀粥與之次日身涼神爽後用調養氣血少佐清熱之品旬日漸愈而大便常結用八物倍生地月餘而瘳陸肖愚治臧苕泉患傷寒發熱鼻燥口乾嘔惡胸脅痛滿小水短赤大便瀉利或投柴芩湯反增頭痛如破徹夜不寐已三日脈之左弦右洪寸關數兩尺稍和以柴葛解表為君黃芩石膏知母清腑為臣枳桔寬中為佐竹茹甘草平逆為使一日二劑嘔止痛減熱仍未退臥仍未安溺赤便瀉如故因去知母黃芩竹茹倍柴葛加生薑五片亦一日二劑熱退安臥瀉亦止矣口尚微渴以花粉麥冬甘草陳皮黃芩桔梗枳殼扶元氣清餘熱四帖已而安後十餘日復身熱譫語如見鬼狀舌黑有刺大便三日不行日輕夜重脈沉有力兩尺帶弦用枳實黃連蔞仁桃仁白芍檳榔元明粉二劑諸症悉減而大便未行用桃仁十枚煎湯下潤字丸一錢五分全愈後以清氣養榮湯調理之此少陽陽明證初治不誤以表力未至故餘證如故去知母黃芩太驟故表解後變為里證待下而後愈桔梗枳殼亦未合法吳煦野子年二十三精神素旺清明自館中歸有房事五更小解忽臍下作痛腸中雷鳴小便不利明日遂發寒熱頭痛醫來告以酒後犯遠歸之戒醫疑是陰症傷寒以理中湯二劑令一日夜服之次日嘔逆大作煩躁口渴飲食不進晝夜不臥已三日矣診之其脈左弦右洪寸關有力尺部尚和面赤戴陽乃與柴葛解肌二劑病家因述遠歸陰虛投理中不減咸擬倍加參附陸曰脈症俱陽縱有房事陰未嘗虛若再投參附不可為矣令今夜必服此二劑庶不傳裡病者心虛止服一劑明早診之症不增劇脈仍洪大並兩尺亦大曰熱邪已入腑日晡必劇以白虎湯二劑與之病者猶豫謂曰今日怕石膏明日大黃也怕不得延挨未服而煩渴躁熱大作且有譫語遂連進二服熱略不減再以前方二劑與之至五更始得少睡早間診視兩尺沉實舌苔已厚改用小陷胸湯送潤字丸一錢至晚又進一錢夜半出燥屎數十枚熱減瀉止又服枳實黃連至數十劑少用滋補即痞隔飲食不能進調治二月方得全愈面赤胃火上炎非盡陰虛陽格也陸祖愚治顧玉岩年六十患傷寒服藥頭疼骨痛已除身熱煩躁兼發赤斑而狂診之六脈沉數有力目瞪直視噤不出聲舌黑芒刺四肢冰冷詢其大便二十日不行謂年雖高脈尚有神力任無事投以大承氣湯目閉昏沉咸謂決死一二時頃腹中鳴響去燥屎若干諸症脫然僅存一息改用人參麥冬歸芍耆術調理而安吳開之二月間患頭痛身熱服藥已逾旬日矣忽耳後紅腫作痛大發寒熱或以為毒用花粉連翹解表數劑不效或以為痰核用南星半夏數劑反甚胸脅滿痛飲食不進氣喘而粗夜臥不安脈之兩寸關弦數兩尺和此本傷寒少陽之邪不解所以發頤耳之前後上下乃少陽部分寸關弦數亦少陽不和之脈宜小柴胡湯和解之用軟柴胡七錢乾葛黃芩各三錢生甘草桔梗蘇子白芥子各一錢薑棗煎服二劑喘定四劑腫痛全消而愈治陳湖一男子患傷寒仰臥一月且耳聾意其病尚在少陽故脅痛不能轉側及耳聾也與小柴胡湯加山梔一劑即能轉尾閭處內潰皆蛆耳亦有聞蓋少陽屬風木而風木能生蟲也一卒傷寒大小便不通予與五苓散而皆通五苓固利小便矣而大便亦通者津液生故也或小便通而大便尚不通宜用蜜煎法導施秘監尊人患傷寒咳甚醫告技窮試檢針經於結喉下灸三壯即瘥蓋天突穴也神哉資生經華佗傳府吏倪尋李延二人俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋外實延內實故治宜殊即各與藥明旦並起三國志範汪方云故督郵顧子獻得病已瘥詣華佗視脈曰尚虛未復勿為勞事御內即死臨死吐舌數寸其妻聞其病除從百餘里來省之止宿交接中間三日發病如佗言婦人傷寒雖瘥未滿百日氣血骨髓未牢實而合陰陽當時即不覺惡經日則令百節解離經絡緩弱氣血虛衰骨髓空竭恍恍吸吸氣力不足著床不能動搖起居仰人食飲如故是其症也丈夫亦然有士蓋正者疾愈後六十日已能射獵一犯房室即吐涎而死及熱病房室名為陰陽易皆難治近者有一士大夫小得傷寒瘥已十餘日能乘馬行自謂平復亦以房室後即小腹急痛手足拘攣而死婦人溫病雖瘥未平復血脈未和尚有熱毒而與之交接得病者名為陰陽易醫者張苗說有婢得病瘥後數日有六人奸之皆為所誤林觀子父因積寒腹痛以痧症治之而愈數日後神思鬱結胸腹不快每日食粥二三次大便溏日二三行雜治二旬余漸劇後一醫診之曰傷寒之邪尚在何誤至此也服小柴胡八劑別下結糞十數枚而安此亦臟結之類所謂飲食如故時時下利也觀子注傷寒折衷吳仁齋治一人傷寒十餘日脈沉細手溫而足冷大便不通面赤嘔煩渴藥不能下惟喜涼水一二口或西瓜一塊食下良久吐出此陰甚於內逼其浮陽上衝咽嗌故面赤煩嘔也附子一枚去皮尖切片又以人參三錢炮姜二錢水煎取浸冷水中待冷服之而愈一人傷寒七八日服涼藥太過遂變身涼手足厥冷通身黑斑惟心頭溫暖乃伏火也六脈沉細昏不知人不能言語狀如屍厥遂用人參三白湯加熟附子半個乾薑二錢服下一時許斑漸紅手足漸暖蘇矣數日復有餘熱不清此伏火未盡再用黃連解毒竹葉石膏湯調治而安馬元儀治沈某發熱七月神昏譫語中州結塊高突拒按作痛診之右脈虛微左見弦澀此正氣奪而邪氣盛也症實脈虛法在不治不得已必先補後攻庶幾萬一與人參桂枝炮薑半夏枳實厚朴廣皮補正散結脈稍起再附子加桂理中湯以恢復元氣二劑右脈已透四劑兩脈有神而前症猶在中痛轉甚時眾議交沮蓋此症原有積滯可攻兩日用藥專行溫補者全是顧慮元氣若早下之必先脫矣今已補完胃氣即可施治實之法也以人參三錢大黃五錢厚朴一錢枳實一錢桂枝五分服未一時大便連行三次其塊如失諸症悉平次與調理脾腎而愈藜按凡治實症當顧其虛處此案是也卜晉公患傷寒數日面赤躁煩手足搐搦起臥轉側不安口燥渴大便結或用清火發散俱不應診其脈虛澀兼結夫澀則傷陰結則氣滯得之憂思勞郁肺胃受傷津液虧而虛邪結也散邪清火適所以耗其陰而留其邪耳治法必須大劑滋解乃可用栝蔞實一兩紫菀三錢枳殼桔梗各一錢秦艽一錢杏仁蘇子半夏曲等一劑便得大睡身安調理數日而愈鮑坤厚病經半月兩寸獨鼓兩關尺虛微頭痛如斧劈汗出不止譫語神昏曰寸大尺小為上盛下虛之候況頭痛如破者虛陽上僭也汗出不止者虛陽外散也譫語神昏者孤陽氣浮神失其守也非人參附子無以追散失之元氣非童便豬膽蔥白無以通僭逆之陽氣法當用白通湯以急救之時夜半特宰豬取膽比藥成牙關緊急不知人事乃挖而灌之黎明神氣漸清此陽氣已漸歸原但欲其深根固蒂非大劑溫補不可用人參四兩附子二兩肉桂五錢合附子理中湯法連投數劑痛定汗止調理而安一人傷寒六日兩脈微弱不起面垢遺尿自汗譫語身重不能轉側此三陽合病汗下兩不可用仲景云腹滿身重口不仁而面垢譫語遺尿自汗者白虎湯主之蓋三陽合邪至遺尿譫語其中州擾亂真氣與津液並傷可知故仲景復云發汗則譫語下之則額上生汗手足逆冷以汗則偏於陽而津液益傷下則偏於陰而真氣復損惟白虎一法解熱而不礙表裡但三陽病其脈當浮大而反微弱不起者以邪熱鬱遏不得外達非陽衰脈微之比但清其壅熱而脈自起矣用大劑白虎一服便得大睡再劑神清脈起與補虛清熱而痊張氏子傷寒四五日兩脈虛微神氣昏亂煩躁不寧時欲得水復置不飲棄衣而走勇力倍常言語狂妄不避親疏此陰盛格陽欲脫外假熱內真寒也欲與理中湯咸謂火熱有餘之症欲行寒下曰豈有大熱症而不引水自救者況兩脈微弱明屬陰盛陽微若不急與溫補大汗一至不可為矣前方加人參至四兩煎成冷服一二時許狂亂頓止反見寒慄欲覆重被再與前藥一劑神清熱退而安周禹九傷寒五日發熱中痛嘔逆須三四人搖扇取涼與藥隨吐脈之寸空大關尺虛小曰兩寸空大陽欲從上越也關尺虛小陰欲從下脫也若大汁一至陰陽兩絕不可為矣以白通湯加人尿豬膽服後嘔逆隨已寸脈平關脈起後見口燥中痛脈實乃以承氣湯下之周身發斑疹兩頤發腫轉用黃連解毒湯而愈張氏僕病經五日發熱脈沉微口燥煩躁不眠曰發熱為陽脈沉微為陰少陰症似太陽也口燥煩躁乃邪氣內擾當用麻黃附子細辛湯以溫少陰之經而驅內陷之邪或以子身安得陰症別商栝蔞滋解之法症益甚再脈之沉微轉為虛散已犯條款不得已惟四逆湯一法或亦可挽回遂連進二服是夜得睡明日熱退脈起而安繆仲淳曰趙和齊年六十患病予以他事請見延至中堂云偶因勞倦體疲正欲求教為診視細按其六部並察其形神謂云翁病屬外邪非勞發也須著意珍重時葛存誠在坐私謂云此病是極重外感邪氣有內陷之兆恐難挽回別去三日復邀看則神氣已脫脈無倫次問所服何藥雲石膏湯曰病症固重服藥又差無汁發熱非陽明症何得用石膏此太陽症未經發汗邪氣傳裡裡虛水涸不勝邪熱真氣已脫必不可救時猶以予言為妄不兩月而斃矣廣筆記張意田治一人春間傷寒七日後煩躁咽痛胸悶泄瀉皆作濕熱治不效診得脈來細急乃少陰脈象也夫少陰上火下水而主樞機水火不交則脈急胸滿而煩躁火上咽痛水下泄瀉此神機內郁旋轉不出不得周遍於內外之症也與少陰下利咽痛胸滿心煩之論吻合宜用豬膚六兩刮取皮上白膚煎汁一大碗去滓及浮油加白蜜五錢穀芽一兩炒香研末文火熬成半碗溫服之症稍減其脈細而短澀此戊癸不合以至陽明血液不生經脈不通之候也與炙甘草湯宣通經脈會合陽明遂脈緩而愈薛立齋云鄭汝東妹婿患傷寒得純黑舌醫士曾禧謂當用附子理中湯人咸驚駭遂止迨困甚治棺曾往視之謂用前藥猶有生理其家既待以死拼從之數劑而愈大抵舌黑之症有火極似水者即杜學士所謂薪為黑炭之意也宜涼膈散之類以瀉其陽有水來剋火者即曾所療之人是也宜理中湯以消陰翳又須以生老薑擦其舌色稍退者可治堅不退者不可治一云以姜切平蘸蜜擦之弘治辛酉金臺姜夢輝患傷寒亦得純黑舌手足厥冷呃逆不止眾醫猶作火治幾至危殆判院吳仁齋用附子理中湯而愈夫醫之為道有是病必有是藥附子療寒其效可數奈何世皆以為必不可用之藥寧視人之死而不救不亦哀哉至於火極似水之症用藥得宜效應不異不可謂百無一治至遂棄之也傷寒折衷庚辰年少司馬楊夫人傷寒誤服附子藥一鍾即時咽喉赤腫急邀薛治薛謂仲景先生云傷寒論桂枝下咽陽盛則斃何況附子乎辭不治是日果死辛卯年一吏傷寒誤用附子藥一鍾發躁奔走跌死夫盛暑之際附子桂姜三藥並用連進三四劑而無事嚴冬時候三藥單用一味止進一劑者恰死可見羅謙甫先生舍時從症權宜用藥之功吳洋治汪伯至從嫂病眾醫術窮洋始至目家人曰易治爾第以寒水飲之其黨謂病者三日不食奈何與水洋曰傷寒陽明熱甚恃藥將不遑即投所宜勿藥可也乃督汲者陳榻先以一杯飲之病者爽然遂盡一斗病良已乃進人參白虎湯而平太函集吳橋治表侄方輅自浙病傷寒諸醫不效歸途挾寒數日熱不退耳稍聾體倦心煩醫卒投以補劑漸至昏瞀絕食循衣摸床已治木且延橋至六脈弦緊而數病由傷寒未解而復感寒幸而年力方強非汗不愈尋以麻黃石膏湯進得汗而解同上陳孟杼尊公戊午六月自山東邸中受寒淹淹未已至次年二月忽小腹與腰急痛令人緊挽外腎稍松便欲死盧用羌活黃柏茯苓肉桂等劑令刮委中穴痛止足軟至五月天熱身發紫斑有汗至足而始健此是小腸腑病經曰小腸病者腰脊控睪而痛以羌活入太陽小腸故痛隨愈然身猶未健者以未盡本病之因故待時而暢耳病自六月傷寒太陽有所未盡故入腑而痛作久病氣衰雖補未達其因原以寒邪鬱火故需夏時則火力全而血脈之邪始去所以斑出足汗百骸暢美者寒得淨盡而火遂融通也金鑑春月病溫以其發於春月故喻氏指名溫病其實乃傷寒也若系溫病斷無用麻黃附子細辛湯之理誤治二旬釀成極重死症壯熱不退譫語無倫皮膚黏澀胸膛板結舌卷唇焦身蜷足冷二便略通半渴不渴面上一團黑滯喻視之曰此症與兩感傷寒無異但兩感證日傳二經三日傳經已盡則死不死者三日又傳一周定死矣傷寒亦有不傳者此語未的此春溫症不傳經春溫亦有逆傳順傳之證故雖邪氣留連不退亦必多延幾日待元氣竭絕乃死觀其陰症陽症混合一區與兩感證病情符合當即以仲景表裡二方為治於是以麻黃附子細辛湯兩解其在表陰陽之邪果透汗而熱退再以附子瀉心湯兩解其在裡陰陽之邪即胸中柔活人事明瞭諸症俱退以後竟不需藥而愈張令施之弟傷寒壞症兩腰僂廢徹夜痛叫喻診之脈亦平順無患而痛則大減喻曰此症之可以轉移處全在痛如刀刺尚有邪正互爭之象若全然不痛則邪正混為一家相安於無事矣夫熱邪深入兩腰血脈久閉不能復出止有攻散一法而邪入既久正氣全虛攻之必不應乃以桃仁承氣湯多加桂附二大劑與服服後即能強起再仿前意為丸服旬余而安仲景於結胸證有附子瀉心湯一法原是附子與大黃同用夫在上之證氣多故以此法瀉心然則在下之證血多獨不可仿其意以散腰間之血結乎後江古生乃弟復患此症徑用前法二劑而愈裴兆期治一貴室婦傷寒汗下後脈洪大而熱不止口不渴腹不滿身無寒熱只氣乏神疲昏迷似睡叫呼不應醫有謂傷寒兼中痰者有謂是狐惑傷寒者有謂腹中尚有燥屎更須通利者有謂是餘邪未清更須和解者裴曰皆非也乃元氣大虛耳以人參五錢炒黑乾薑二錢當歸三錢五味三十粒不問晨夕頻與之遂身涼脈靜氣爽神清而愈李懷茲治一婦素稟羸弱產育過多常患頭痛背上畏寒之極夏月必用綿絮裹首復衣掩背初冬傷寒發熱頭痛異常周身痛楚膝下與手臂皆不溫而手心獨熱胸膈無恙二便如常或用表藥熱勢不減畏寒轉增胸膈迷悶二便艱澀李用補中益氣湯加蔓荊子微汗而安蓋此婦素常陽氣不升而頭痛背寒復與發散傷其衛氣所以熱不除而轉加畏寒也用補中益氣以升舉清陽衛得參耆之力自能祛邪外散此東垣之微旨也一年少體肥之人平素左半身無汗脅下一片常冷數日前索逋下鄉是日天氣暴寒舟中食飯一箸隨食隨冷便覺凜凜畏寒登岸失足顛仆扶挾解帶而寢是夜即發熱頭痛喘鳴胸滿遍體煩疼腰脊左脅尤甚左半身不能轉側仍冷不熱手足亦微冷第三日扶病而歸其脈左手弦細右手遲滑總不似外感之候因見脈弦脅痛與小柴胡二服不應又似半身風廢與小續命亦不應檢方書中半身無汗例當二陳四物合用按法治之亦無效舌上有微薄苔而左畔白滑右畔微黃得病後大便已去二次去亦無多小便略見黃澀或問張飛疇此是何病當用何藥張曰此人素有寒飲結聚脅下更兼內外感寒加以驚僕痰逆則發熱喘鳴頭痛胸滿身疼勢所必致其右畔經絡貫通處受邪則從陽而化為熱左畔寒飲積結之界平時尚且無汗縱有寒邪湊泊亦必從陰而釀寒陽氣不到之所自然重著難移陽氣不行於脈自然弦細搏指至於右脈遲滑手足微寒皆緣脾氣向衰熱勢不盛所以舌苔不能幹燥大便不能結硬其小便黃澀一證雖因肺胃氣化不行亦見下焦真陽未艾斯人向後必夭目今尚可挽回當與五積散晝夜三進總藉辛溫解散之力可以內消寒滯中溫血脈外逐表邪一舉而有三得其外可用白芥子川烏姜渣炙熱包熨之俟表邪分解裡氣調和然後用六君加辛附薑桂之屬溫中氣可也一少年形體肥盛患傷寒昏熱或用表藥得汗遂譫妄躁亂用涼膈散加黃連而熱除但頭痛經月不止晝則目珠與眉稜太陽俱痠痛夜則大痛引急如掣目中如有風吹狀以熱掌按之稍覺爽快寐則頭與胸前大汗如漉左脈緊細右脈浮緩服茶調散用搐鼻法不應用養血藥亦不應或問於張飛疇張曰此熱邪雖從內泄而寒痰襲於經中因體肥不能外泄所以流連不解內經所謂其人肥則為目風眼寒是也治當解營分鬱閉之火除經絡沉冱之寒授以三因芎辛湯加生石膏半兩數日必能獲效如法服之果愈徐靈胎曰驅邪之法惟發表攻裡二端而已發表所以開其毛孔令邪從汗出也當用至輕至淡芳香清冽之品使邪氣緩緩從皮毛透出無犯中焦無傷津液仲景麻黃桂枝等湯是也然猶恐其營中陰氣為風火所煽而銷耗於內不能滋潤和澤以托邪於外於是又啜薄粥以助胃氣以益津液如此後世不知凡用發汗之方每專用厚朴葛根羌活白芷蒼朮豆蔻等溫燥之藥即使其人津液不虧內既為風火所熬又復為燥藥所灼則汗何從生汗不能生則邪無所附而出不但不出邪氣反為燥藥鼓動益復橫肆與正氣相亂邪火四布津液益傷而舌焦唇乾便閉目赤種種火象愈出則身愈熱神漸昏惡症百出若再發汗則陽火盛極動其真陰腎水來救元陽從之大汗上泄亡陽之危症生矣輕者亦成痙症遂屬壞病難治故用燥藥發汗而殺人者不知凡幾矣此其端開於李東垣其所著書立方皆治濕邪之法與傷寒雜感無涉而後人宗其說以治一切外感之症其害至今益甚況治濕邪之法更以淡滲為主如豬苓五苓之類亦無以燥勝之者蓋濕亦外感之邪總宜驅之外出而兼以燥濕之品斷不可專用勝濕之藥使之內攻致邪與正爭而傷元氣也至於中寒之症亦先以發表為主無竟用熱藥以勝寒之理必其寒氣乘虛陷入而無出路然後以桂附回陽此仲景用理中之法也今乃以燥藥發雜感之汗不但非古聖之法並誤用東垣之法醫道失傳只此淺近之理尚未知何況深微者乎或問於裴兆期曰有病傷寒傳裡熱結不通者已經屢下而腹中按之則仍繞臍堅若仰瓦然其人伏枕不起又已累旬肌肉盡削湯飲幾廢氣怯不足以布息當此之際攻補不能施其巧計將安出曰論常法在所必攻不攻則腸胃無由清水穀無由進元氣無由復而人曷以生若遽攻則此立稿之形垂絕之氣能堪之乎計必先行補法而後察邪正之緩急輕重以攻之攻後旋覆從補補後旋覆從攻而又旋覆從補則庶幾耳但補與攻皆當以漸而毋驟其始也且以小劑生脈散加陳皮煎飲半小甌移時無反復復少與之繼則或可漸倍並商攻法也如腹中鬱熱未清渴欲冷飲即常啖以橘藕瓜梨之屬潤其喉吻飲食久疏胃必苦弱又當間與焦米湯大棗湯或扁豆筍蕨萊菔暨飴糖等湯隨所好以蘇胃氣此皆適口不助邪之物佐藥餌所不及也皆補法也補既得力方可議攻攻則惟元明粉一味為佳生何首烏煎服亦佳蜜導膽導尤為良法或詳脈之虛實氣之盛衰邪之深淺以導滯丸或小承氣加當歸微下之下後仍須照管元氣毋徑前而不顧其有虛也倘其候可以授餐亦勿得驟與以濃厚先以焦米煎湯飲之次煮熟梨熟棗萊菔等少與之無忤始可少徐投漿粥與他物耳須知此物腹中攻不克盡惟期脈靜身涼口不發渴便可圖進水穀俟其水穀融液腸胃充盈不攻亦自可去若必欲去盡而復與之食不且速其死乎然此皆陽症之攻補法耳亦有元氣內損之病治療失宜損中復損內雖熱結外則手足未冷而鼻先寒六脈沉遲或虛疾無倫次則又是陽症變陰之候急當以桂附參姜酌微甚而溫補之又不可與梨瓜橘藕承氣元明粉同日而語法者矣智者於此不可不熟審而通其變也不特傷寒為然凡雜病日久鮮有不犯此證者余於治案中每詳言之矣孫文垣治萬肅庵之子發熱十一日舌心色若沉香口渴甚乾燥額上及兩脅極熱耳微聾已下二次熱不退小便少神昏足冷左脈中按數而有力右脈軟弱乃少陽陽明並病也先以柴胡湯清其熱視汗有無再相機而處柴胡五錢葛根三錢白芍石膏各二錢人參升麻天花粉各一錢粉甘草七分服後脈稍緩熱稍退齒仍干小水不利神思尚昏沉改用柴胡粉草花粉黃芩人參白朮茯苓滑石木通澤瀉小便去二次下午又覺微熱面赤額上痛且重黎按此白朮壅氣之故與益元散三錢大便行一次溏而色黃熱仍甚面仍赤再診之寸關脈將和兩尺洪大藜按此六一散引熱下行之效知其熱在下焦惟利之而已再與益元散五錢口渴稍止齒下盤潤而上盤仍燥神思昏沉睡而不醒知其熱在心包絡投導赤散二帖而神清惟小水尚短以四苓加酒連木通二帖而諸症悉退吳心逸僕患額疼口大渴身大熱汗多胸痞噁心昏沉孫與柴苓湯加枳殼桔梗熱減大半次日以六君加黃芩白芍調理而愈此勞倦傷寒故宜先散後補也周鑑泉室病傷寒發熱譫語口渴咳嗽胸膈痛泄瀉嘔逆遍身發斑六脈洪滑此少陽陽明合病也以升麻葛根湯加滑石五味進之服後汗大出熱退神清復與柴苓湯加五味滑石瀉亦止次日診之左脈和右脈亦稍收斂改用白芍為主陳皮柴胡酒芩五味子牡蠣滑石茯苓澤瀉白朮服四帖而安陳茂之勞倦後勉強色欲精竭而血繼至續感風寒發熱頭痛胸膈飽滿始從太陽而傳少陽胸脅痛耳聾嘔逆口苦咳嗽六脈弦數此少陽症也以小柴胡加枳殼桔梗竹茹而嘔逆止因進粥早復熱口渴小水不利大便一日夜六七次所行皆清水日晡熱甚舌上黃苔昏沉振顫此食復之候以豬苓澤瀉各三錢赤茯苓一錢柴胡八分升麻木通各五分連進二帖小便利而大便實但熱不退進六神通解散一帖熱如故次日診之左脈不弦數矣兩寸脈如故服藥無汗口渴漱水不欲咽咽此邪熱傳陽明經不急涼血必作鼻衄投黃芩芍藥湯合生脈散以止嗽渴用葛根湯以解肌熱白芍三錢葛根升麻黃芩各一錢人參一錢五分麥冬滑石各三錢甘草五味子各五分烏梅一枚進二帖大便下燥糞十數枚始得微汗安眠進粥而愈龐太夫人病頭痛惡寒胸膈懣且痛時發寒熱投四物湯加元胡索丹皮香附治五日不瘥孫診之脈右滑大左浮弦而數曰頭痛惡寒外感症也浮弦而數胸膈懣痛少陽脈症具在右脈滑飲食滯而為痰也四物湯皆滯痰閉氣之藥內傷可以得消外感何由得出投以柴胡湯合平胃散一服而愈一老僕頭痛遍身骨節痛面色黑發熱口渴胸膈膨脹飲食七日不進復感寒脈左弦數右洪大以藿香蒼朮防風葛根白芷紫蘇甘草陳皮大腹皮麥芽枳實投之服後胸膈稍寬熱與痛更甚改以麻黃葛根柴胡各二錢石膏滑石各三錢紫蘇蒼朮白芷各一錢甘草五分姜三片服後大汗出而熱痛皆除惟口渴又以白芍當歸石膏知母柴胡黃芩麥冬葛根陳皮服之而愈此三陽合病先為飲食所傷故用藿香正氣湯加消導以助其內又以六神通解散加助表之藥以治其標病雖重年雖高喜其色脈相合故易愈也蔡中林室發熱口渴舌上燥裂小腹痛嘔吐藥食不入口者七日右寸脈絕不應指關沉滑有力左手弦數此陽明少陽合病邪熱壅於上焦也以軟柴胡石膏各五錢半夏曲黃芩黃連葛根竹茹人參各二錢姜三片五更下黑糞數塊痛熱減半次日仍與前藥右寸脈亦起改用小柴胡湯加橘紅竹茹葛根服三帖全安
