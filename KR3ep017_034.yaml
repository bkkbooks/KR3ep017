body:
  text: 卷三十四外科時毒此症感四時邪毒之氣其後發於鼻面耳項咽喉赤腫無頭或結核有根寒熱頭痛狀如傷寒此乃時行濕毒之氣發於頭面所謂大頭瘟也以其能作膿出毒故入外科少宰李蒲汀患時毒用發散之藥耗損元氣患處不消體倦惡寒食少口乾用益氣湯加桔梗及托裡消毒散而愈秋官陳同野患時毒元氣素弱脈微細而伏此形病俱虛也用參朮芎歸陳皮柴胡升麻炙草以升舉陽氣用牛蒡元參連翹桔梗以解熱毒二劑腫頓消而脈亦復矣苟以脈微細為屬陰以腫赤為屬陽而藥之鮮有不誤者一婦人時毒潰後腫赤不消食少體倦膿清色白乃脾肺氣虛也先用六君加桔梗芎歸後用益氣湯加桔梗而斂春官袁谷虛之妹患時毒表散過度腫硬不痛脈浮大按之而短此真氣絕也辭不治後果歿一男子患此症腫痛發熱作渴脈實便秘以五利大黃湯下之諸症悉退以葛根牛蒡子湯四劑而痊一男子患此症表裡俱解腫痛尚不退以葛根升麻湯二劑而腫消一男子患此症腫痛發寒熱脈浮數以荊防敗毒散二劑少愈以人參敗毒散二劑勢減半又二劑而痊一男子患此症耳面赤腫作痛咽乾發熱脈浮數先以荊防敗毒散二劑勢退大半以葛根牛蒡子湯四劑而痊一婦人患此症表邪已解腫尚不消診之數脈滑而數乃瘀血欲作膿也以托裡消毒散潰之而愈一男子患此症焮腫脹痛作渴煩熱便秘脈數按之尤實用防風通聖散一劑諸症頓退以荊防敗毒散加元參牛蒡黃芩二劑而瘥一老人冬月頭面耳項俱腫痛甚便秘脈實此表裡俱實病也飲防風通聖散不應遂砭患處出黑血仍投前藥即應又以荊防敗毒散而瘳蓋前藥不應者毒血凝聚上部經絡藥力難達故也惡血既去其藥自效或拘用寒遠寒及年高畏用硝黃而用托裡與夫尋常之劑或不砭泄其毒專假藥力鮮不危矣徐靈胎曰通聖散乃治表裡俱熱之方所謂兩解法也須審定內外俱熱之症乃可消息施用又曰荊防敗毒散為時毒主方惟人參不宜輕用一男子患此症表裡俱解惟腫不消以托裡消毒散四劑膿成針之而愈一婦人患此症腫痛用硝黃之劑攻之稍緩翼日復痛診之外邪已退此瘀血復作膿也用托裡消毒散潰之而愈一男子頭面腫痛服硝黃敗毒之劑愈甚診之脈浮數邪在表尚未解用荊防敗毒散二劑勢退大半更以葛根牛蒡子湯四劑而痊內經曰身半以上腫天之氣也身半以下腫地之氣也乃邪客心肺之間上攻頭目而為腫此感四時不正之氣為患與夫膏粱積熱之症不同硝黃之劑非大便秘實不可用若不審其因不辨其虛實表裡概用攻之必致有誤常見饑饉之際芻蕘之人多患之乃是胃氣有損邪氣從之為患不可不察常治邪在表者用葛根牛蒡子湯人參敗毒散或普濟消毒飲子邪在裡者五利大黃湯梔子仁湯表裡俱不解者防風通聖散表裡俱解而腫不退者犀角升麻湯如腫甚者砭患處出惡血以泄其毒或用通氣散取嚏以泄其毒十日外自愈若嚏出膿血即愈欲其作膿者用托裡消毒散欲其收斂者用托裡散此法最為穩當五七日咽喉腫閉言語不出頭面不腫食不知味者不治此乃時行濕毒之氣發於頭面所謂大頭瘟也以其能作膿出毒故入外科一男子患此症服表散藥愈熾發熱便秘診其脈沉實此邪在裡也以大黃湯下之里症悉退以葛根牛蒡子湯浮腫亦消惟赤腫尚存更以托裡藥潰之而愈齊氏云時毒者為四時邪毒之氣而感之於人也其後發於鼻面耳項咽喉赤腫無頭或結核有根令人憎寒發熱頭痛或肢體痛甚者恍恍不寧咽喉閉塞昧者將謂傷寒便服解藥一二日腫氣增益方悟始求瘍醫原夫此症古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為與時毒特不同耳蓋時毒初起狀如傷寒五七日間乃能殺人治者宜精辨之先診其脈滑數浮洪沉緊弦澀皆其候蓋浮數者邪氣在表也沉澀者邪氣深也氣實之人急服化毒丹以攻之熱實不利大黃湯下之其有表症者解毒升麻湯以發之或年高氣軟者五香連翹湯主之又於鼻內㗜通氣散取十餘嚏左右看病之人每日用㗜藥嚏之則不傳染其病人每日亦用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角連翹散之類至七八日大小便不通利頭面腫起高赤者可服托裡散黃耆散宜鐮砭割出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭不腫食不知味者必死治之無功矣然而此疾有陰有陽有可汗有可下常見粗工但云熱毒就用寒涼殊不知病有微甚治有逆從不可不審也徐考功年逾三十耳面焮腫寒熱拘急脈浮洪此時毒症也邪在表以荊防敗毒散加牛蒡元參治之漸愈更以升麻葛根連翹桔梗川芎銀花牛蒡而平復疔羅謙甫云丙午歲予居藁城人多患疔瘡縣尹董公謂予曰今歲患疔瘡者極多貧民無力醫治近於史侯處得數方用之者無不效官給藥錢君當舍手治之遂諾其語董公榜示通衢命予施藥如此一年全活甚眾其用保生錠子千金托裡散神聖膏藥破棺丹凡四方保生錠金腳信二錢雄黃三錢輕粉二錢硇砂三錢麝香一錢半巴豆四十九粒蟾酥一錢為細末用黃蠟五錢溶開將藥和成錠子冷水浸少時取出捏作餅子如錢眼大將瘡頭撥開每用一餅次用神聖膏後用托裡散若瘡氣入腹危者服破棺丹世傳疔瘡必有一條紅線可針紅線所至之處出毒血乃敷藥神聖膏藥當歸藁本各半兩乳香沒藥各二錢白芨琥珀各二錢半黃丹二兩白膠香三兩黃蠟二兩粉霜一錢木鱉子五十個去皮巴豆十五粒去油清油槐柳枝各百二十枝膽礬一錢先將槐柳枝下在油內熬焦取出復下余藥熬勿至焦濾出待油澄清下黃丹再熬成膏用緋帛攤之立有神效托裡散耆一兩五錢樸芎防各二兩桔芷翹各二兩二錢芍桂草參各一兩歸木香乳香沒藥各半兩細末每服三錢酒一大盞煎二三沸和渣溫服破棺丹大黃二兩半生半熟甘草芒硝各一兩細末蜜丸彈子大每服半丸食後溫酒化下或童便半盞研化之忌冷水薛立齋治上林陳靜涵面患疔脈洪數有力屬邪氣蘊結用清熱消毒散二劑未應或用黃耆玉桂等藥二劑反益其勢致耳目唇口俱腫閉頭面如斗由邪氣外實也前脈按之無力由元氣內虛也連進托裡消毒之藥及數砭患處出黑血碗許已而膿與腐肉並潰而出復用托裡之藥瘡勢漸愈七日後復因調護失宜以致煩渴不食兩尺脈如絲欲絕急用八味丸料煎服其脈頓復手足自溫使非砭以泄其外托裡散以補其內八味丸以回其陽則治之失宜必致不救慎之慎之長洲庠蘇子忠鼻梁患疔症屬表邪但氣血俱虛不勝發散遂以補中益氣為主佐以防風白芷而愈張所望治理安寺一僧患水疔走黃絕水穀者已三日眾莫能治延所望入視曰毒已入內奈何須下一針方可因向瘡頂刺入寸余始聞痛聲曰生矣隨以膏塗之復投丹藥數粒拔其疔根寸許堅黑如鐵遂愈錢塘縣誌立齋治一男子足患疔作癢噁心嘔吐時發昏亂脈浮數明灸二十餘壯始痛以奪命丹一服腫起更以荊防敗毒散而愈一男子患疔發熱煩躁脈實以清涼飲下之而愈一男子胸患疔遍身麻木脈數而實急針出惡血更明灸數壯始痛服防風通聖散得利而愈一男子左手背患疔是日一臂麻木次日半體皆然神思昏潰遂明灸至二十餘壯尚不知痛又三十餘壯始不麻至百壯始痛以奪命丹一服腫始起更用神異膏及荊防敗毒散而愈一老婦足大趾患疔甚痛令灸之彼不從專服敗毒藥致真氣虛而邪氣愈實竟至不救蓋敗毒散雖能表散瘡毒然而感有表裡所發有輕重體段有上下所稟有虛實豈可一概而用之耶且至陰之下藥力之所難到專假藥力則緩不及事不若灸之為良故下部患瘡皆宜隔蒜灸之痛則灸至不痛不痛則灸至痛若灸之而不痛者宜明灸之及針疔四畔去惡血以奪命丹一粒入瘡頭孔內仍以膏藥貼之若針之不痛或無血者以針燒赤頻烙患處以痛為度或不痛眼黑如見火光者此毒氣入臟腑也不治若患在手足紅絲攻心腹者就於絲盡處刺去惡血宜服荊防敗毒散若絲近心腹者宜挑破瘡頭去惡水亦以膏藥貼之如麻木者服奪命丹如牙關緊急或喉內患者並宜噙一二丸凡人暴死多是疔毒用燈照看遍身若有小瘡即是宜急灸之俟醒更服敗毒藥或奪命丹人汗入肉食之則生疔瘡不可不慎劉禹錫纂柳州救三死方云元和十一年得疔瘡凡十四日益篤善藥敷之皆莫知長樂賈方伯教用蜣螂肉一夕而百苦皆已明年正月食羊肉又大作再用亦如神效其法一味貼瘡半日許可再易血盡根出遂愈蜣螂心腹下度取之其肉稍白是也所以云食羊肉又大作者蓋蜣螂食羊肉故耳用時便禁食羊肉其法蓋出葛洪肘後方也本草韓光治疔腫人也貞觀初衛州徐使君訪得此方用艾蒿一擔燒作灰入竹筒中淋取汁一二合和石灰如麵漿以針刺瘡中至痛即點之點三遍其根自拔亦大神驗貞觀中用治三十餘人得瘥故錄之千金方繡坡公曰疔瘡全看部位如部位不佳者甚為難治觀其毒將走之症用針破其四圍插入拔疔之藥其浮腫處用針刺之出其惡血此法甚妙繆仲淳治顧博士伯欽內人左耳患疔時方孕令先以白藥子末雞子清調塗腹上護胎次以夏枯草甘菊貝母忍冬地丁之屬大劑飲之一服痛止疔立拔胎亦無恙白藥子療馬病者廣筆記馬銘鞠治顧聖符幼弟患髭疔醫者先用火針圍腫腫脹至目與鼻俱隱入肉牙關緊急用患者耳垢齒垢刮手指甲屑和勻如豆大於茶匙內燈火上灸少許取作丸令洗淨圍藥將銀簪挑開疔頭抹入外用棉紙一層津濕覆之痛立止半日腫半消目可開次日服仙方活命飲二劑愈此法兼可治紅絲疔長洲華承溪指節間患之得此而痊又云可治面白疔未試也此方傳自道人廣筆記廣筆記云用陳年露天鐵鏽碾如飛面將金簪腳挑破毒處一孔納鐵鏽末於內仍將皮蓋好少傾黑水流盡中有白絲如細線慢慢抽盡此疔根也盡即立愈又方用甘菊花並根葉搗汁以酒下之立消二方俱神效屢試屢驗立齋治劉貫卿腳面生疔形雖如粟其毒甚大宜峻利之藥攻之因其怯弱以隔蒜灸五十餘壯癢遂止再灸片時乃知痛更用膏藥封貼再以人參敗毒散一服漸愈夫至陰之下道遠位僻且怯弱之人用峻利之藥則藥力未到胃氣先傷虛脫之禍有所不免不如灸之為宜松江諸大尹唇生一疔已五日腫硬脈數煩躁喜冷此胃經積熱所致先以涼膈散一服熱去五六更與奪命丹二粒腫退二三再與荊防敗毒散四劑而愈楊錦衣唇下生疔脈症俱實而不下反用托裡致口鼻流膿而死是謂實實之禍馬氏室忽惡寒作嘔肩臂麻木手心瘙癢遂瞀悶不自知其故與卒然暴厥者不同但手有一泡此乃患疔毒也令急灸患處至五十餘壯知痛投以荊防敗毒散而愈古人謂暴死多是疔毒急用燈照遍身若有小瘡即是此毒宜急灸其瘡但是胸腹溫者可灸先君云有人因剝死牛瞀悶令看遍身俱有紫泡便急灸泡處良久遂蘇更以敗毒藥而愈張都憲夫人面生疔腫焮痛甚數日不潰脈症俱實以荊防敗毒散加芩連治之稍愈彼以為緩乃服托裡一劑其勢愈甚痛極始悟再用涼膈散二劑痛減腫潰又與連翹消毒散十餘劑而愈鄭氏舉家生疔在四肢皆由食死牛肉所致刺去黑血更以紫金丹服之悉愈王撿討汝和感痘毒面生疔十餘枚腫痛脈數以荊防敗毒散治之雖小愈尚可畏更以奪命丹一服而痊陸宣子山東名醫也言京師李公子某指甲中生肉管赤色傾刻長三尺余垂至地能動動則血眯欲死諸醫束手公子乃取酒痛飲引刀自斷之出血數斗良久復生如初自分死矣有乞兒自言能治召之肩大蛇至顧罵諸醫者曰公子蛇頭疔也其管通四肢百骸絕則又出若輩何能為蓋乞兒初饒於財嘗患此破家求醫不可得遇一丐命其妻納大蛇袴中穴袴出蛇首握之與肉管相向蛇以氣吸之不移時而消蛇則紅絲百道僵死矣及如其法治之公子亦愈竟分其產之半與乞兒云蔣湘帆治疔瘡方松香二十兩白蠟二兩乳香三兩去油研細黃蠟十兩銅綠五兩研細麻油六兩沒藥三兩去油研細百草霜五兩須山莊人家淨燒草者佳先將麻油煎滾次下松香三下白蠟四下黃蠟五下乳香六下沒藥七下銅綠八下百草霜滾過數次或傾磚地或即在鍋內冷透搓成條子用時以圓眼核大丸呵軟捏扁貼患處是疔即黏否則不黏如黏片時即可止痛次日消腫少出黃水即愈忌葷腥生冷辛辣每丸約重四分又方白菊花四兩甘草四錢水煎服不過二劑即消一切消疔之藥皆不及此蓋菊花全身皆治疔之聖藥也疣附癭周漢卿治山陰楊翁項有疣如瓜大醉僕階下潰血不能止疣潰者必死漢卿以藥糝其穴血即止明史薛立齋治長洲庠王天爵辛丑春左腿近環跳穴患瘤狀如大桃按之濡軟恪服除濕流氣化痰之劑惡寒發熱食少體倦形氣俱虛脈洪大而虛氣瘤也肺主之蓋肝屬木肺屬金然發於膽經部分乃肺金侮肝木元氣虧損而其膿已內潰矣遂用十全大補湯數劑出清白稀膿甚多頓加寒熱煩渴頭痛殊類傷寒狀此因膿泄而血氣益虛仍用前藥其勢益甚脈洪數大按之如無乃加附子一錢其勢愈甚而脈復如前此虛甚而藥不能及也更加附子二錢三劑諸症頓退乃朝用補中益氣湯夕用十全大補湯各三十餘劑出腐骨五塊瘡口將完後因不慎起居患處復潰諸症更發咽間如焚口舌無皮用十全大補加附子一錢服之諸症即愈二日不服內病悉至患處復潰二年後又患服前藥不應診其尺脈微細如絲此屬命門火衰用八味丸為主佐以十全大補湯稍愈至乙巳仍患虛寒之症而歿一男子左腿外側近臀腫一塊上有赤縷三年矣飲食起居如常觸破湧出血膿發熱惡寒此膽經受症故發於腿外側診其脈左尺洪數左關弦洪此腎水不能生肝木用補中益氣湯六味地黃丸而痊一老嫗右腋下生一瘤漸長至尺許其狀如長瓠子久而潰爛一方士以長柄鮮葫蘆燒存性研末搽之水出消盡而愈系瘤法芫花淨洗帶濕不得犯鐵器於木石器中搗取汁用線一條浸半日或一宿以線系瘤經宿即落如未落再換線不過兩次自落後以龍骨並訶子末敷瘡口即合依上法系奶痔累用得效系瘤法蘇沈良方有用蜘蛛絲者然費力不如此徑捷如無根只用花泡濃水浸線亦得趙氏家姊嘗用繫腰間一瘤不半日即落亦不痛百乙方琇按芫花用之系瘤即落雄猛可知蟲門中孫文坦嘗用三分以治某氏婦立下其症苟非實積未可輕試孫真人治癭一二年者以萬州黃藥子半斤須緊實者若虛而輕即他處產者用一斤取無灰酒一斗浸固臍器口以糠火燒一伏時停待酒冷卻開令患者日飲之不令酒氣絕經三五日後以線圍頸覺消即停飲否則令項細也用火時不可多惟燒酒氣出瓶頭有津即止火不待經宿也已驗如神忌毒食黃履素曰予年三十時臀生一小瘤根細如線而頭如豆大越十年漸大如荔有妨跨馬予有鑑於決瘤之說不敢醫常嘆曰吾年若六七十此瘤當如碗大必妨行坐矣奈何既而嘆曰七十即礙行坐亦何妨遂安意養之及四十七歲時偶擦傷瘤皮水滲出不止懼其成漏乃延潘惠峰問之云欲去此瘤甚易欲塞此漏甚難瘤去則漏自塞矣不得已聽其治潘以藥塗瘤甚痛其肉盡黑少傾血出津津予甚懼且悔不復求治但求止血之藥越宿則黑肉已堅如石片數日脫去其根尚存如豆水出仍不止復商之潘潘曰不去其根漏仍不可塞也又以前藥點之痛甚肉黑如初次日復點凡三次內服托裡散每劑用黃耆五錢凡旬日堅肉脫去則根已平仍服托裡散外用長肌收口藥絕欲色勞以漸收滿肌肉完好予之服藥勤守戒慎者而潘君亦可謂妙手矣張子和在西華眾人皆訕以為吐瀉一日魏壽之與張入食肆中見一夫病一瘤正當目之上綱肉眥色如灰李下垂覆目之睛不能視物乃謂壽之曰吾不待食熟立取此瘤魏未之信也語其人其人曰人皆不敢割曰吾非用刀割別有一術焉其人從之乃引入一小室中令俯臥一床以繩束其胻刺乳中大出血先令以手揉其目瘤上亦刺出雀糞立平壽之大驚張曰人之有技可盡窺乎一女子未嫁年十八兩手背皆有瘤一類雞距一類角丸腕不能馴嚮明望之如桃膠然夫家欲棄之張見之曰在手背為膠瘤在面者為粉瘤此膠瘤也以䤵針十字刺破按出黃膠三兩匙立平更不再作非素明者不敢用此法一婦人年四十餘有癭三瓣張令以咸吐之三湧三汗三下癭已半消次服化癭之藥遂大消去夫病在上皆宜吐亦自有消息之法耳張景岳三旬外忽臀下肛門前骨際皮里生一小粒初如綠豆許不以為意及半年大如黃豆又一年如棗核復如慄矣乘馬坐榻皆有所礙且漸痛料此作敷藥可散又非煎藥可及若漸長大如升如斗懸掛腰股間行動不便將奈何謀之識者皆云不可割刺恐為害初亦不敢然熟思此時乘小不取則日久愈大愈難矣遂決意去之乃飲酒乘醉以柳葉針刺之所出如豆腐白皮之類蓋粉瘤也刺後頓消兩日後則腫如熱癰以會通膏貼三日膿潰而愈不兩日又腫起更熱更大始悔其刺之誤再以會通膏貼之又三日而大潰潰出一囊如魚脬者然後收口全愈使治之再遲則難瘳矣藜按徐靈胎云凡形體有形之症最宜外治此語極為有見余鄉一人項生瘤大如拳已十餘年一日忽消去問之則曰近得一膏藥貼之故遂愈急索其方視之不過半夏貝母花粉陳皮芥子當歸川芎紅花降香桂枝山甲羌活防風麻黃大黃等藥大意消痰活血通經絡並無奇特然用之輒應手取效後用之以貼流注亦即消散可見藥不在奇對症即能取效景岳以瘤為非敷藥可散亦未明此理耳一人眼皮下弦生一小瘤初如米粒漸大如豆外科用攢針三四枚翻轉眼皮刺其內膜少少出血如此二三次其瘤日縮竟得盡消一人臂上生一瘤漸大如龍眼其人用小艾於瘤上灸七壯竟爾漸消亦善法也或用隔蒜灸之亦無不可一人腹上生一瘤大如胡桃治者以蛛絲捻成粗線扎其根數日其絲漸緊瘤根漸細屢易屢細不十日竟脫落誠奇法也可見他線日松惟蛛絲日緊物理之妙有當知者如此然纏之亦宜早若形勢既大恐不宜也方出焦氏筆乘舊案已載其略沈摳文幼齧指甲及長不能自禁此肝火血燥也又頸側常生小疣子屢散屢發又臂生一塊如綠豆大若觸碎則如斷束縷扯之則長縱之則縮後兩鬢髮白點求治曰子素肝病此部亦屬肝膽經也夫爪為筋之餘但行人身之側正與齧爪生疣等症相應須滋補腎水以生肝膽則諸症自愈與六味地黃丸服之一年白點自退瘤亦不生一男子小腹中一塊不時攻痛或用行氣化痰等藥不應猶以為血鱉服行氣逐血之劑後手背結一疣子漸長寸許形如鱉狀肢體間如豆大者甚多彼疑鱉生子今發於外亦用行血虛症悉至左尺洪數關脈洪數而弦謂腎水不能生肝木以致肝火血燥而筋攣用六味丸滋水生肝三月而愈陶氏佃民有病癭者嘗與陶僕輸谷如市道遠勞極癭攖其頸氣幾不接陶僕素愚匆遽間削竹為銳銛刺之癭穿氣溢頸復完復荷擔而起一無所苦說頤雄按可謂其愚不可及也予兄奇峰生兩瘤大如拳僧傳一方用竹刺將瘤頂上稍稍撥開油皮勿令見血細研銅綠少許放於撥開處以膏藥貼之數日即潰出粉而愈續金陵瑣事錢國賓治山西神池百長張侄女年十七自八歲左手背生瘤日大已如鍾許看系粉瘤可治與一方用巴豆蓖麻子肉各四兩大杏仁一兩香油一斤二兩血丹八兩熬膏藥貼之一日一換其皮漸厚旬日皮紅半月皮破出膿碗許瘤消口平辛酉夏廣陵各鹽場大行時疫人多濕熱病若傷寒頭疼發熱不惡寒身體痛舌紅昏睡不食思涼飲肌黃大便結小便紅醫用發散清涼劑罔效錢亦臨症治復不投病勢數日如故前後胸背漸長數十瘤如核桃大其皮甚薄以針挑破每瘤出蝨數千遍抓四處人人寒禁莫敢近視瘤破蝨出調服後人仿此俱愈氣頸之症乃人項下墜如長瘤也山東多有此症雖風水所致亦臥熱炕過食辛辣而然他方間有此根由足厥陰肝經之脈循喉嚨之後上入頏顙屬肝統於足陽明胃經此蓋起於肝胃二經瘤長掛下雖非致命大不美觀古今並無治法錢訪海上仙方遇異人傳授用青皮六錢疏肝桔梗六錢引導木饅頭一名鬼饅頭煅存性一兩消癭散肝胃二經結氣共末酒下一錢凡氣頸小者三四月消大者七八月或一年消其功雖緩其方百發百中即錢已治蘭溪王元直兗州趙瑚璉二人矣不惜良方普利後世會溪黃元亮文士也年五旬頸生氣瘤候其六脈衝旺榮衛俱足精神元氣亦厚止肝部沉滯氣結成瘤錢告之曰公無病人也氣瘤結於頸下不過不美觀耳然無大害書云凡粉瘤痰瘤蠱瘤石瘤腿瘤蝨瘤發疽瘤可治凡氣瘤筋瘤肉瘤肩瘤癭瘤血瘤肋瘤乳瘤肘臂瘤不可治治之破膜泄氣不救宜絕此念勿信庸愚以輕性命也黃拜謝而去結核王洪緒治一婦項上痰核三處年久生管以拔管藥插入日易半月愈其二惟一管漸淺不意其夫遠歸兩日管深如前後其母接女歸治之即愈一壯年臂上有二管王問其有暗疾否曰素患夢遺乃以六味去澤瀉增龜膠龍骨芡實蓮鬚為丸鹿含草煎湯早晚送下三錢服半料愈愈後即用拔管藥仍服前丸二管皆愈一人耳下患惡核被醫穿生管以陽和湯小金丹輪服未潰者全消復求消管王曰消管甚易管消即斂倘將斂時一經走泄管即復生矣喜其謹疾遂愈消管方皂角刺尖五錢柘樹膜五錢紅腹金錢鱉三錢榆樹皮一錢真蟾酥一錢研極細每遇漏管先以豬鬃探通料其淺深然後以綿紙卷藥為條塞入日易日塞至愈乃止薛立齋治一婦人經事不調肢體結核如榛如豆不計其數隱於肉裡其色不變三年餘矣大按則痛或投以降火消毒乃不按自痛發熱作渴日晡益甚經水過期左關脈數此肝火血燥也用清肝益榮湯六十餘劑諸症已愈惟項核未消又以當歸龍薈丸散服及八珍湯加柴胡山梔三十餘劑而痊一婦人久鬱怒胸脅內股外臁各結核寒熱往來經候不調胸膈不利飲食少思大便不調左關弦洪右寸弦數右關弦緊曰左關弦洪肝經熱也左寸弦數木生火也右關弦緊肝克脾也右寸弦浮木侮金也法當生肝血遂用加味四物湯而諸症退用加味逍遙散而經候調用加味歸脾而全愈一婦人因怒肢體結核睡中發搐左關弦洪此肝火血燥筋攣當清肝火養元氣遂用加味小柴胡湯加味逍遙散漸愈又用八珍湯加丹皮柴胡山梔鉤藤而愈一婦人肢體結核胸腹痞悶氣泄稍寬此肝脾鬱滯不信服降火行氣化痰病愈甚而氣愈虛用加味逍遙加味歸脾二藥間服半載而痊一婦人項間結核不時寒熱左目緊小頭項振掉四肢抽搐此肝火血虛風熱也用加味逍遙加鉤藤數劑諸症漸愈又用八珍湯調理而痊一婦人耳內耳後項側結核作痛寒熱口苦月經不調此肝膽經火而傷脾胃也用四君柴胡丹皮及六味丸而愈一婦人因怒結核經行不止發熱晝安靜而夜譫語此血分有熱用小柴胡加生地頓安其核尚在經來先期肝脈弦數此肝火血涸而筋攣也用加味逍遙加生地月經如期而核消一婦人項臂結核頭疼寒熱乳內時疼兩脅焮痛此肝脾鬱火而血燥先以加味逍遙散再用加味歸脾湯而愈一婦人素鬱怒患結核內熱晡熱久而不愈若面色萎黃則月經過期而少若面色赤則月經先期而多曰面黃過期脾經虛弱也面赤先期脾虛火動也朝用補中益氣升舉脾土以益氣血夕用加味逍遙滋養肝血以息陰火復以歸脾湯解鬱結半載元氣復而痊又有患前症因脾虛下陷而發熱乃專治其瘡變瘵而歿一女子耳下結核焮痛寒熱此屬肝經風熱用梔子清肝飲一劑諸症悉愈後因怒耳後並額兩角作痛寒熱此兼少陽經症仍以前藥加羌活二劑而瘥一婦人項患五核時常寒熱肝肺弦長而出寸口此血盛無耦之症也用小柴胡湯加生地烏梅治之而愈雄按陰虛者每見此脈治宜壯水小柴加梅地不過用法之一格耳施二守項右患一核用涼藥貼頸皆腫又敷之腫連胸脅冷應腹內不悟涼藥所致尚以為毒盛形體困憊自分不起見其敷藥處熱氣如霧急令去藥良久瘡色變赤刺出膿血用托裡藥而愈舉人江節夫兩耳下兩臂兩肋結核恪服祛痰降火軟堅之劑益甚薛曰此膽經血虛火燥也蓋膽經行人身之側前藥必致虧損至明年七月復請視各核皆潰脈浮大而澀時金旺於秋木受金克必不治果卒周上舍兩耳下項間筋牽壅腫堅硬咳嗽氣喘內熱盜汗所服皆化痰散堅行氣之劑勢益甚診之左關弦澀左尺洪數此怒氣傷肝房勞損腎須滋腎水生肝血慎調攝至水旺之際庶可愈矣彼欲速效乃外敷商陸石灰等藥內服海藻蓬朮之類至秋金旺之際元氣愈虛腫甚而歿一上舍素豪善怒耳下結一核後潰而瘡口翻張如菌焮連頭痛或胸脅作脹或內作寒熱或用清熱消毒之藥年餘未瘥用補中益氣湯六味地黃丸而尋愈瘡口翻出亦名翻花瘡邵黃門子手合骨處患一核半年後潰一小孔如粟又年餘不合日出清膿數滴或止三四滴面上赤脈數口乾夜則發熱晝則惡寒行履如故此氣血俱虛也辭不治月餘後他處相會彼云小兒有不藥之功矣薛曰過火令方為善也已而果斃繆仲淳治一女子頦下發一硬塊而不痛有似石癭用貝母首烏各三錢連翹白芨花粉各二錢牛蒡蒼耳青木香各一錢半銀花鮮菊地丁各五錢先用夏枯草五兩河水五碗煎三碗去渣納前藥煎至一碗服十劑全消外敷方南星三兩海藻昆布檳榔薑黃白蘞牙皂各一兩末醋調薛立齋治一男子神勞多怒頸腫一塊久而不消諸藥不應以八珍湯加柴胡香附每日更隔蒜灸數壯及日飲遠志酒二三盞而漸消瘰癧薛立齋治一男子患瘰癧腫痛發熱大便秘結以射干連翹散服六帖熱退大半以仙方活命飲四帖而消一男子患此症腫硬不作膿脈弦而數以小柴胡湯兼神效栝蔞散各數劑及隔蒜灸數次月餘而消一婦人頸腫不消與神效栝蔞散六劑少退更以小柴胡湯加青皮枳殼貝母數劑消大半再以四物對小柴胡數劑而平一男子因怒項下結核腫痛痞悶兼發熱用方脈流氣二帖胸膈利以荊防敗毒散二帖而熱退肝脈尚弦澀以小柴胡加芎歸白芍四劑脈症頓退以散腫潰堅丸一料將平惟一核不消乃服遇仙無比丸二兩而痊薛立齋治一婦人久郁患瘰癧不潰既潰不斂發熱口乾月水短少飲食無味日晡尤倦以益氣養榮湯二十餘帖少健謂須服百帖庶保無虞彼欲求速效反服斑貓之劑及數用追蝕毒藥去而復結致不能收斂出水不止遂不救此症屬虛勞氣鬱所致宜補形氣調經脈未成者自消已成自潰若投慓悍之劑則氣血愈虛多變為瘵症然堅而不潰潰而不合氣血不足明矣況二經之血原自不足不可不察一男子瘰癧潰久不斂神思困倦脈虛欲投以托裡彼以為迂乃服散腫潰堅湯半月餘果發熱飲食愈少復求治投益氣養榮湯三月喜其謹守得以收效齊氏云結核無膿外症不明者並宜托裡膿未成者使膿早成已潰者使新肉早生血氣虛者托裡補之陰陽不和托裡調之大抵托裡之法使瘡無變壞之症所以宜用也一男子瘰癧久不斂膿出更清面黃羸瘦每清晨作利瀉與二神丸數服瀉止更以六君子湯加芎歸月餘肌體漸復灸以豆豉餅及用補劑作膏藥貼之三月餘而愈一婦人患此症潰後核不腐以益氣養榮湯三十餘劑更敷針頭散腐之再與前湯三十餘劑而斂一男子瘰癧未潰倦怠發熱以補中益氣湯治之少愈以益氣養榮湯月餘而潰又一月而痊一婦人肝經積熱患瘰癧作痛脈沉數以射干連翹湯四帖少愈更用散腫潰堅丸月餘而消丹溪云瘰癧必起於足少陽一經不守禁忌延及足陽明經食味之厚鬱氣之久曰毒曰風曰熱皆此二端拓引變換頭分虛實虛者可慮此經主決斷有相火且氣多血少婦人見此若月水不調寒熱變生稍久轉為潮熱自非斷欲食淡神醫不能療也一室女年十七項下時或作痛乍寒乍熱如瘧狀肝脈弦長此血盛之症也先以小柴胡湯二劑少愈更以地黃丸治之而痊婦人良方云寡婦之病自古未有言也惟倉公傳與褚澄略為論及言寡者孟子所謂無夫曰寡是也如師尼喪夫之婦獨陰無陽欲男子而不可得是以鬱悒而成病也易曰天地絪縕萬物化醇男女媾精萬物化生孤陽獨陰可乎夫處閨門欲已萌而不遂致陰陽交爭乍寒乍熱有類瘧疾久而為癆又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等症皆寡婦之病診其脈獨肝脈弦出寸口而上魚際究其病源其疾皆血盛而得經云男子精盛則思室女人血盛則懷胎觀其精血思過半矣雄按此脈有由陰虛火動所致未可均指為血盛一男子耳下患五枚如貫珠年許尚硬面色萎黃飲食不甘勞而發熱脈數軟而澀以益氣養榮湯六十餘劑元氣已復患處已消一核尚存以必效散二服而平一男子因勞而患怠惰發熱脈洪大按之無力謂須服補中益氣湯彼不信乃服攻伐之劑吐瀉不食而死大抵此症原屬虛損若不審虛實而犯病禁經禁鮮有不誤常治先以調經解鬱更以隔蒜灸之多自消如不消即以琥珀膏貼之自有膿即針之否則變生他處設若兼痰兼陰虛等症只宜兼症之劑不可干擾余經若氣血已復而核不消卻服堅散之劑至月許不應氣血亦不覺損方進必效散或遇仙無比丸其毒一下即止二藥更服益氣養榮湯數劑以調理若瘡口不斂宜用豆豉餅灸之用琥珀膏貼之氣血俱虛或不慎飲食起居七情者俱不治此症以氣血為主氣血壯實不用追蝕之劑亦自腐但取去使易收斂若氣血虛不先用補藥劑而數用追蝕之藥適足取敗耳雄按洪大無力之脈顯屬陰虧攻伐固謬補中益氣亦豈可投其餘議論皆是見到之言一男子體素弱瘰癧潰後肉不腐此氣血皆虛用托裡養榮湯氣血將復核尚在以簪挺撥去又服前藥月餘而愈一男子患此症氣血已復核尚不腐用針頭散及必效散各三次不旬日而愈一男子患瘰癧痰盛胸膈痞悶脾胃脈弦此脾土虛肝木乘之也當以實脾土伐肝木為主彼以治痰為先乃服苦寒化痰藥不應又加以破氣藥病愈甚始用六君子加芎歸數劑飲食少思以補中益氣湯倍加白朮月餘中氣少旺健又以益氣養榮湯兩月腫消而血氣亦復矣夫左關脈弦弦屬木乃木盛而克脾土為賊邪也虛而用苦寒之劑是虛虛也況痰之為病其因不一主治之法不同凡治痰利藥過多則脾氣愈虛則痰愈易生如中氣不足必用參術之類為主佐以痰藥一婦人因怒項腫月經不通四肢浮腫小便如淋此血分症也先以椒仁丸數服經行腫消更以六君子湯加柴胡枳殼數劑項腫亦消矣亦有先因小便不利後身發微腫致經水不通名曰水分宜葶藶丸治之婦人良方云婦人腫滿若先因經水斷絕後致四肢浮腫小便不通名曰血分水化為血血不通則復化為水矣宜服椒仁丸若先因小便不利後身浮腫致經水不通名曰水分宜服葶藶丸一室女年十九頸腫一塊硬而色不變肌肉日削筋攣急痛此七情所傷氣血所損之症也當先滋養血氣不信乃服風藥後果不起盧砥鏡曰經云神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮稿志傷於盛怒則腰脊難以俯仰何侍郎有女適人夫早逝患十指攣拳垂莫能舉膚體瘡瘍如慄粟果然又湯劑雜進飲食頓減幾於半載適與診之則非風也正乃憂愁悲哀所致耳病屬內因藥仍以鹿角膠輩多用麝香熬膏貼痿處攣能舉指能伸病漸安一癧婦四肢倦怠類痿症以養氣血健脾胃藥而愈一室女性急好怒耳下常腫痛發寒熱肝脈弦急投以小柴胡湯加青皮牛蒡荊防而寒熱退更以小柴胡對四物數劑而腫消其父欲除病根勿令再發謂肝內主藏血外主榮筋若恚怒氣逆則傷肝肝主筋故筋蓄結而腫須病者自能調攝庶可免患否則肝迭受傷則不能藏血血虛則為難瘥之症矣後不戒果結三核屢用追蝕藥而歿一少婦耳患腫毒勤苦發熱口乾月水每過期而至且少一老媼以為經閉用水蛭之類通之以致愈虛而歿夫月水之為物乃手太陽手少陰二經主之此二經相為表裡主上為乳汁下為月水為經絡之餘氣苟外無六淫所侵內無七情所傷脾胃之氣壯則衝任之氣盛故為月水適時而至若面色萎黃四肢消瘦發熱口乾月水過期且少乃陰血不足也非有餘熱之症宜以滋養血氣之劑徐而培之則經氣盛而經水自依時而下一放出宮女年逾三十兩胯作痛肉不腫色不變大小便作痛如淋登廁尤痛此瘀血潰入隧道為患乃男女失合之症也難治後潰不斂又患瘰癧而歿此婦為湯氏妾湯為商常在外可見此婦在內久懷憂鬱及在外又不能如願是以致生此疾愈見流注瘰癧乃七情氣血皆已損傷不可用攻伐之劑皎然矣故精血篇云精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色已降其精則精不出而內敗小便道塞而為淋精已耗而復竭之則大小便道攣疼愈疼則愈欲便愈便則愈疼女人天癸既至逾十年無男子合則經不調未逾十年思男子合亦不調不調則舊血不出新血誤行或潰而入骨或變而為腫或雖合而難子合男子多則瀝枯虛人產乳眾則血枯殺人觀其精血思過半矣一室女年十七患瘰癧久不愈月水尚未通發熱咳嗽飲食少思有老嫗欲用巴豆肉桂之類先通其經謂此症潮熱經候不調者不治但喜脈不澀且不潮熱尚可治須養氣血益津液其經自行彼惑於速效之說仍用之薛曰非其治也此類乃慓悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛經果通而不止飲食愈少更加潮熱遂致不救經云女子七歲腎氣盛齒更髮長二七天癸至任脈通太衝脈盛月事以時下然過期而不至是為失常必有所因夫人之生以血氣為本人之病未有不先傷陰血者婦女得之多患於七情寇宗奭曰世有室女童男積想在心思慮過多當多致勞損男子則神色先喪女子則月水先閉何以致然蓋憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故致咳嗽既作水氣絕故四肢干木氣不充故多怒鬢髮焦筋骨痿俟五臟傳遍故卒不能死者然終死矣此一種於勞中最難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生舉此為例其餘諸方可按脈與症而治之一男子先於耳前下患瘰癧將愈次年延及項側缺盆三年遂延胸及腋不愈診之肝脈弦數以龍薈散堅二丸治之將愈肝脈尚數四年後小腹陰囊內股皆患毒年餘不斂脈診如前以清肝養血及前丸而愈薛立齋云一富商項有瘰痕一片頗大云因怒而致困苦二年百法不應忽方士與藥一服即退二三再服頓退四服而平以重禮求之乃必效散又一媼治此乃用中品錠紝瘡內以膏藥貼之其根自腐未盡再用更搽生肌散藥數日即愈又一道人治此用雞子七個每個入斑貓一枚飯上蒸熟每日空心食一枚求者甚多各書瘰癧門及本草云合前二法觀之惟氣血不虛者有驗虛者恐不能治也薛立齋治一瘰婦面黃體倦咽酸噯氣此中氣虛弱欲用補中益氣湯加茯苓半夏不信反降火利氣胸膈痞滿癧瘡腫痛又散堅利氣噯氣不絕大便不實四肢時冷曰今變中氣虛寒矣用六君子湯加薑桂少用升麻柴胡漸愈更佐以補中湯全愈一婦人患瘰癧噯氣用降火清胃食少吞酸胸膈痞悶用利氣消導吐痰氣促飲食日少用清熱化痰大便堅澀內熱身瘦曰吞酸噯氣脾胃氣虛也胸痞痰喘脾肺氣虛也大便堅澀內熱日瘦脾肺血虛也遂以補中益氣湯加炒黑吳茱萸三分數劑佐以六味丸諸症頓退乃用歸脾湯逍遙散間服而愈一男子患瘰癧腫硬久不消亦不作膿服散堅敗毒藥不應令灸肩尖肘尖二穴更服益氣養榮湯月餘而愈一婦人瘰癧久潰發熱月經每過期且少用逍遙兼前湯兩月餘氣血復而瘡亦愈但一口不收敷針頭散灸前穴而痊常治二三年不愈者連灸三次兼用托裡藥必愈田氏婦年逾三十瘰癧已潰不愈與八珍湯加柴胡地骨皮夏枯草香附貝母五十餘劑形氣漸轉更與必效散二服瘡口遂合惟氣血未平再與前藥三十餘劑而愈後田生執此方不問虛實概以治人殊不知散中斑貓性毒雖瘰癧多服則損元氣若氣血實者以此下之而投補劑或可愈或虛而用下藥或用追蝕藥瘀肉雖去而瘡口不合反致難治一儒者癧愈後體瘦發熱晝夜無定此足三陰氣血俱虛用八珍湯加麥冬五味二十餘劑又用補中益氣加麥冬五味及六味而愈儒者張子容素善怒患瘰癧久而不愈瘡出鮮血左關弦洪重按如無此肝火動而血妄行症屬氣血俱虛用補中益氣湯以補脾肺六味丸以滋腎而愈陸子溫病兩耳下腫硬用伐肝軟堅之劑益甚其脈左關弦緊左尺洪數此腎水虧損而筋攣也當生肺金滋腎水則肝得血而筋自舒矣彼不悟仍服前藥竟至不起楊乘六治俞某患瘰癧左右大小十餘枚俱堅硬如石頭項腫大不能轉側吐血咳嗽夢遺半年皆服滋陰降火固精伐肝之劑脈之弦勁中兼見躁動左關尺獨緊細如刃口舌青嫩而胖滑知其肝膽用事肝膽先病延及心脾其痰嗽不絕者肝氣虛逆痰隨氣上也其夢泄不止者肝血虧損疏泄失職也其瘰癧腫大肝火鬱結不舒也乃以養榮湯內加肉桂月餘已有痊意更以前方佐歸脾養心二方消息守服三月而愈周漢卿治錢塘王氏女生瘰癧環頭及腋凡十九竅竅破白瀋出將死矣漢卿為剔竅貫深二寸其餘烙以火灸之也數日結痂愈明史張子和治一婦人病瘰癧延及胸臆皆成大瘡相連無好皮肉張曰火淫所勝治以鹹寒命以滄咸吐之一吐而著痂再用涼膈散解毒湯等劑皮肉乃復如初灸瘰癧以手仰置肩上微舉肘取肘骨尖上是穴隨所患處左即灸左右即灸右艾炷如小筋頭許三壯即愈復作即再灸如前不過三次永絕根本先倅湯壽資宰鍾離有一小鬟病瘡已破傳此法於本州一漕官早灸晚間膿水已乾凡兩灸遂無恙後屢以治人皆驗駱安之妻患四五年瘡痂如田螺靨不破退辰時著艾申後即落所感頗深凡三作三灸遂除安矣薛立齋治一男子素嗜欲且勞神惡熱喜冷仲冬始衣綿乃患瘰癧脈洪大無力曰此陰氣耗散陽無所附陽氣浮散於外而惡熱也敗毒散加芩連山梔服四劑少愈再以四物湯加芩連白芷桔梗根甘草金銀花數劑而消雄按既云此脈為陰耗陽浮何以第十三條主以補中益氣耶此用敗毒亦系發表太過也繆仲淳治朱文學鏕患癧為灸肩井肘尖兩穴各數壯而愈廣筆記薛立齋治一婦人患瘰癧延至胸腋膿水淋漓日久五心煩熱肢體疼痛頭目昏重心忪頰赤口乾咽燥發熱盜汗食少嗜臥月水不調臍腹作疼謂非瘡故乃血虛而然也服逍遙散月餘少可更服八珍湯加丹皮香附又月餘而經通再加黃耆白朮兩月餘而愈沈氏室患瘰癧久而不消自汗惡寒此氣血俱虛也遂以十全大補湯月餘而潰然堅核雖取而瘡口不斂更灸以豆豉餅仍與前藥加烏藥香附兩月而愈大抵堅而不潰潰而不合皆由氣不足也嘗見患此者瘡口雖合而不加補往往變為瘵症薛立齋治一婦人因怒耳下腫痛以荊防敗毒散加連翹黃芩四劑而愈嘗治此旬日不消者以益氣血藥及飲遠志酒遠志一味末之酒一盞調澄清飲之以渣敷先宜泔浸患處治女人乳疽尤效其腫自消若無膿者亦自潰不戒忿怒者難治一婦人發怒耳下焮腫頭痛寒熱與荊防敗毒散加黃芩表症悉退但飲食少思日晡發熱東垣云雖有虛熱不可太攻熱去則寒生也遂以小柴胡湯加地骨皮川芎當歸茯苓白朮陳皮十餘劑而愈次年春復腫堅不潰來索方與八珍湯加香附柴胡地骨皮桔梗自制服之至六七劑以為延緩仍服人參敗毒散勢愈甚又服流氣飲則盜汗發熱口乾少食至秋復求治診視氣血虛極辭不治果歿今人有瘡瘍不審元氣虛實病在表裡便服敗毒流氣藥殊不知敗毒散乃發表之劑果有表症亦只宜一二服多則元氣反損其毒愈甚雖有人參莫補流氣飲乃耗血之劑果氣結膈滿亦只宜一二服多則血氣愈傷反為敗症雖有芎歸莫救丹溪云此不因膏粱丹毒之變因虛勞氣鬱所致也一婦人患瘰癧不消膿清不斂以八珍湯治之少愈忽肩背痛不能回顧此膀胱經氣鬱所致當以防風通氣湯治之蓋膀胱之脈始於目內眥上頂巔至腦後過風府下項走肩膊一支下腰膂是經氣動則脊痛項強腰似折按此非膀胱經症而何彼乃云瘰癧膽經病也其脈主行項側即是經火動而然遂自服清肝降火之藥反致不食痛盛復求治診其脈胃氣愈弱先以四君子湯加陳皮炒芍半夏羌活蔓荊子四劑食進痛止繼以防風通氣湯二劑而愈又一婦流注潰久忽發熱乃虛也與補藥二劑不用另用人參敗毒散大熱而斃夫老弱之人雖有風邪亦宜以補中益氣湯治之況又非表症而峻表不死何俟瘰癧乃虛損之症最為難治古人雖有成法而用之多不驗余得一膏藥方用紅毛雄雞一隻取全骨一具先用麻油煎枯去渣入降香五兩千里奔即騾馬修下蹄甲五錢當歸甘草各一錢槐枝三十寸煎枯去渣黃丹收膏紅絹攤貼未成者即消已潰者即變出稠膿屢試屢驗並治一切腫毒未成者貼之即行消散神效無比一男子因怒耳下及缺盆患癧潰延腋下形氣頗實瘡口不合以散腫潰堅丸治之而愈一婦患此氣血不弱亦服此丸其核並消而瘡口不斂更以十全大補湯及灸以豆豉餅始痊江中翰侄年及二十耳下患癧焮痛左關脈數此肝經風熱所致以荊防敗毒散三帖表症悉退再與散腫潰堅丸月餘而復一婦年二十耳下結核經水每過期午後頭痛服頭風藥愈甚以八珍湯加柴胡地骨皮二十餘劑而愈治瘰癧丸方元參蒸牡蠣煅醋炒川貝母去心各四兩煉蜜為丸每服三錢開水下日二服此方神效治愈不計其數王洪緒治一人年十七頸患瘰癧成片延爛耳腋及腰如手掌大數塊瘦弱成怯初以洞天救苦丹與服毒水大流十日後以陽和湯醒消丸每日早晚各一服十日項能舒轉飲食日增外貼陽和膏內服大棗丸始終用荊芥湯洗以山蓮散敷九十日收功因未服子龍丸小金丹其毒根未除後腋生惡核仍以子龍丸消之洞天救苦丹方露蜂窠要內有子者兩頭尖青皮苦楝子立冬後者佳各用瓦上炙存性為末等分研和每服三錢陳酒送服務要隔兩日再服醒消丸方乳香沒藥各一兩麝香一錢五分明雄黃五錢用飯一兩搗為丸如萊菔子大日乾忌烘每服三錢陳酒送服醉蓋取汗陽和解凝膏方新鮮大力子根梗葉三斤活白鳳仙花梗四兩用麻油十斤煎枯去渣次日入生附子桂枝大黃當歸五靈脂肉桂川草烏地龍赤芍殭蠶白芷白蘞各二兩廣木香一兩白芨二兩川芎四兩續斷防風荊芥香圓陳皮各一兩再煎枯去渣隔宿油冷每油一斤加炒透黃丹七兩攪和文火慢熬至滴水成珠為度移鍋冷處加入乳香末一兩麝香研細一兩蘇合油四兩入膏和勻半月後攤貼專治一切爛潰陰疽凍瘡瘧疾貼背心大棗丸方山羊屎曬乾入鍋炒如炭存性為末用大棗去皮核先搗爛然後入前粉捶成丸遇毒爛不堪將見內腐者黑棗湯送服四錢山蓮散方大活鯽魚一尾破腹去雜以山羊屎塞實魚腹瓦上慢火炙乾研末加麝香一錢瓷瓶密收如遇爛潰不堪與內臟腑止隔一膜者用此敷立見奇功子龍丸方法制甘遂每一斤用甘草四兩煎湯浸三日湯黑去湯河水洗淘取清水日淘日洗日浸每日換水數次三日後去心再淘浸四五日取一撮入白瓷盆內隔一宿水無異色乃撈起瀝乾以麵裹如團入糠火內煨黃透取出入鍋炒磨粉聽用法制大戟去旁枝用水煮透去骨切片曬乾聽用白芥子炒以上三物各等分為末煉蜜為丸日服三次每服三分淡薑湯送下此治瘰癧惡核流注之專藥也一王姓媳頸內瘰癧數個兩腋惡核三個又大腿患一毒不作痛癢百餘日後日漸發大形大如斗按之如石皮現青筋常作抽痛王視之曰此石疽也初起時可消今日久發大上現筋紋雖按之如石然其根下已成膿矣如偶作一抽之痛乃是有膿之症也上現青筋者其內已作黃漿可治如上現小塊高底如石岩者不治三日後主發大痛不潰而死如現紅筋者其內已通血海不治倘生斑點即自潰之症潰即放血三日內斃今患現青若醫至軟為半功潰後膿變稠後可冀收功也外以活商陸根搗塗內服陽和湯十日則止一抽之痛十三劑內外作癢十六劑頂軟十八劑通患軟頸項之癧兩腋之核盡行消散止剩石疽高起內膿袋下令服參一錢於筋絡處先以銀針穿之後以刀闊其口以紙針塞入口內次日兩次流水斗余大劑滋補托裡刪去人參倍用生耆服十劑甚相安一醫令將耆草俱炙用三日四圍發腫內作疼痛復延王治王照前方服二十餘劑外以陽和膏滿貼患此獨留患孔加以布捆綁王曰凡經潰陰疽將愈則外皮漸活而內膜生斯為佳兆所出之膿在皮裡膜外僅以空弄又不能以生肌散藥放入內服溫補滋陰養血溫暖膏藥之用捆使其皮膜相連易於膿盡且又易於連接生肌果綁後數日內膿濃厚加參服兩月收功化核膏專治瘰癧貼即暗消內服子龍丸方可除根並杜後發壁虎十四個蜘蛛二十八個蝸牛三十六個用菜油四斤熬枯去渣再入鮮首烏藤葉甘菊根薄荷牛蒡草蒼耳草各半斤用武火熬枯去渣俟油冷再入連翹元參苦參白蘞白芥子殭蠶水紅子大黃荊芥防風各四兩浸一宿熬枯去渣再熬至滴水成珠每油一斤加黃丹七兩熬黑加入丁香油二錢麝香二錢蘇合油一兩攪勻退火攤貼凡治瘰癧忌用海藻夏枯草久服則成癧勞後數年內忌食香橙食則復發流注徐靈胎曰流注者纏綿不已或五或七或九愈者愈發者發變化萬端若新生一兩個旋即消潰非真流注也薛立齋治一婦人因暴怒而腰腫一塊或胸膈不利或走氣作痛此榮氣鬱滯與方脈流氣飲數劑而止更以小柴胡湯對四物加香附貝母月餘而愈一婦人患流注遇勞必痛眾手按之痛乃止屬氣血俱虛用十全大補湯六味丸逍遙散而愈一婦人先肢體作痛後患流注發熱惡寒食少脅脹月經不調痰盛喘嗽五心煩熱健忘驚悸盜汗無寐悉屬肝脾虧損氣血不足用十全大補加味歸脾兼服諸症悉痊一婦人素頭暈患流注月經遲少此屬中氣虛弱用補中益氣湯而愈後因勞仆地月經如湧此勞傷火動用前湯加五味子一劑而愈一婦人患前症用行氣化痰等胸膈不利飲食少思用疏利之藥大便作泄中滿不食此脾胃復傷用補中益氣湯加炮姜脾胃健飲食進又用六君子加芎歸百餘劑始全愈一婦人素鬱結肩臂各腫如覆杯此肝脾虧損用加味逍遙散多用補氣藥右手脈不足補氣藥當多於補血藥切不可發表薛立齋治一男子腿患腫肉色不變不痛脈浮而滑以補中益氣湯加半夏茯苓枳殼木香飲之以香附餅熨之彼謂氣無補法乃服方脈流氣飲愈虛復求治以六君子湯加芎歸數劑飲食稍進再用補劑月餘而消夫氣無補法俗論也以其為病痞悶壅塞似難於補殊不知正氣虛而不能運行則邪氣滯而為病經云壯者氣行則愈弱者則著而為病苟不用補法氣何由而行乎經語在流注門尤為吃緊一婦人潰後發熱以為虛彼不信仍服敗毒藥果發大熱竟至不救夫潰瘍雖有表症發熱宜以托裡藥為主佐以表散之劑何況瘰癧流注乎若氣血充實經絡通暢決無患者此症之因皆由氣血素虧或七情所傷經絡鬱結或腠理不密六淫外侵墜道壅塞若不審其所因辨其虛實鮮不誤人一男子腿患流注久而不斂飲大補藥及附子餅更用針頭散紝之而愈一男子患臂年餘尚硬飲食少思朝寒暮熱以八珍湯加柴胡地骨皮丹皮月餘而寒熱少止繼以益氣養榮湯及附子餅灸之兩月餘膿成針之更服人參養榮湯半載而痊一婦人患此症膿潰清稀脈弱惡寒久而不愈服內塞散灸以附子餅而痊一婦人腰間患一小塊肉色如常不潰發熱謂當以益氣養榮湯解鬱之藥治之不信別服流氣飲後針破出水年餘而歿一婦人流注久不斂忽發寒熱決其氣血俱虛彼反服表散之劑果大熱亦死大抵流注之症多因鬱結或暴怒或脾氣虛濕氣逆於肉理或腠理不密寒邪客於經絡或閃撲或產後瘀血流注關節或傷寒餘邪未盡為患皆因真氣不足邪得以乘之常治郁者開之怒者平之閃撲及產後瘀血者散之脾虛及腠理不密者徐而補之傷寒餘邪者調而解之大要以固元氣為主佐以見症之藥如久而瘡寒者更用豆豉餅或附子餅灸之有膿管或瘀肉者用針頭散腐之自愈錠子尤效若不補氣血及不慎飲食起居七情俱不治雄按因於痰飲者亦甚多也一男子元氣素弱時患流注胸膈不利飲食少思欲治健脾胃解鬱結養氣血彼不從乃服辛香流氣之劑致腹脹又服三稜蓬朮厚朴之類飲食愈少四肢微腫兼腰腫一塊不潰而歿蓋此症本虛痞今用克伐之劑何以不死況辛香燥熱之劑但能劫滯氣取快於一時若不佐制過服益增鬱火煎熬氣液為痰日久不散愈成流注之症一聘士流注久潰肌肉消瘦發熱作渴惡寒飲食以六君子加歸耆附子服數劑患處遂紅活又服十全大補湯三十餘劑膿漸稠而愈後惑於人言謂盛暑不宜用附子彼又因場屋不遂意復患前症專服敗毒流氣之劑元氣消爍肌肉日瘦醫以為不治自分不起其師滕洗馬雲曏者病危得附子藥而起今藥不應以致危篤何不仍服附子藥遂復求治其脈微細症屬虛寒並無邪毒仍用附子藥乃得愈賈閣老子患流注脈數作渴不喜飲冷膿水清稀面帶赤色曰此氣血虛而兼火也治難奏功彼以為迂別服燥濕分利之劑兩月餘反加煩渴寒熱往來復邀治形體已脫曰雖治亦無功矣後果不起陳進士遂初年逾三十患腹腫硬逾年而瘡頭破時出血水此七情所傷榮氣絕於肉理而然名曰流注診之肝脈澀蓋肝病脈不宜澀小腹正屬肝經須澀脈退乃可愈欲以甘溫之劑補其氣血令自消潰不信仍服攻伐之藥致氣血愈虛果歿於金旺之月丹溪云諸經惟少陽厥陰之生癰疽宜預防之以其多氣少血也少血而肌肉難長瘡久不合必成敗症苟不知此輒欲用峻利毒藥以伐其陰分之血則其禍不旋踵矣一室女背腫結一塊如鈔大而不焮但倦怠少食日晡發熱脈軟而澀此虛勞氣鬱所致也用益氣養血開鬱之藥又令飲人乳精神稍健彼不深信又複流氣飲飲食遂少四肢痿軟乃悔之復求治以為決不可起矣後果斃一男子年三十餘素飢寒患右肋腫如覆瓢轉作水聲脈數經曰陰虛陽氣湊襲寒化為熱熱甚則肉腐為膿即此症也及按其腫處即起是膿已成矣遂以濃煎黃耆六一湯耆六草一令先飲二鍾然後針之膿出數碗而虛症並至遂以大補藥治之三月餘而愈大抵膿血大泄氣血必虛當峻補之雖有他病皆宜緩治蓋元氣一復諸症自退若老弱之人不問腫潰尤當補也一婦人十九腰間腫一塊無頭色不變三月不潰飲食少思肌肉日瘦此寒搏腠理榮氣不行鬱而為腫也名曰濕毒流注百餘劑元氣復而腫消後因勞役怒氣經行不止服涼血之劑其血如崩此因脾氣復傷下陷而血從之朝用補中益氣湯夕用歸脾湯而愈一婦人稟弱性躁脅臂腫痛胸膈痞悶服流氣敗毒藥反發熱以四七湯數劑胸寬氣利以小柴胡對四物加陳皮香附腫痛亦退大抵婦人性執著不能寬解多被七情所傷遂致遍身作痛或肢節腫痛或氣填胸滿或如梅核塞喉咽吐不出或痰涎湧盛上氣喘急或嘔逆噁心甚者渴悶欲絕產婦多有此症宜服四七湯先調滯氣更以養血之藥若因憂思致小便白濁者用此湯吞青州白丸子屢效一婦人腿患筋攣骨痛諸藥不應脈遲緊用大防風湯二劑頓退又二劑而安又一婦人亦然先用前湯二劑更服黑丸子而痊此二患失治必潰成敗症一老人傷寒表邪未盡股內患腫發熱以人參敗毒散二劑熱止灸以香附餅又小柴胡加二陳羌活川芎歸身白朮枳殼數劑而散一男子肩胛患之微腫形勞氣弱以益氣養榮湯服黑丸子及木香生地作餅覆患處熨之月餘膿成針之仍服前藥而愈一男子臂腫筋攣骨痛年餘方潰不斂診其脈更虛以內塞散一料少愈以十全大補湯及附子餅灸之而痊精要云留積經久極陰生陽寒化為熱以此潰多成瘻宜早服內塞散排之一男子腿患流注潰而不斂用人參養榮湯及附子餅更以補劑煎膏貼之兩月而愈通府李廷儀患流注唾痰氣促自恃知醫用化痰理氣等劑半載而潰用托裡等劑膿水淋漓腫硬不消寒熱往來飲食少思肌肉消瘦大便不實手足時冷兩尺脈浮大按之微細曰此屬命門火衰當用八味丸不信乃服參耆歸術之類更加痰喘泄瀉服八味丸益氣湯年餘而痊一婦人背患流注內潰脹滿服流氣化痰之劑自汗盜汗脈大而弱此元氣虧損之症也與參耆各一兩歸術各五錢肉桂二錢服而針之至夜半始出稀膿二碗許翼日大汗倦甚煩熱作渴揚手氣促脈洪大而數仍用前藥加附子一錢炙草二錢二劑脈症悉退又以六君子加薑桂二十餘劑始離床褥後因勞復寒熱作渴汗出時仲冬寢幃氣出如霧用十全大補湯加桂附二劑而痊一學士年十六患此症二載矣脈洪大而數膿清熱渴食少體倦夜間盜汗午前畏寒曰真氣不足邪氣有餘治之無功矣午前以四君子湯加芎歸炙草午後以四君子加五味麥冬參耆兩月諸症遂可一二又有用滲利之劑保其必生者三月後形體骨立後竟不救一弱人患流注內潰出敗膿五六碗是時口眼歪斜以獨參湯加附子二錢二劑少愈更以十全大補之劑月餘而痊大抵瘡瘍膿血既泄當大補氣血為先雖有他症當以末治之凡癰潰發熱惡寒皆屬氣血虛甚若左手脈不足者用補血藥元戎云若人飲食疏精神氣血弱肌肉消薄榮衛之氣短促而澀滯故寒搏腠理閉鬱而為癰腫當補之以接虛怯之氣遂以十全大補加香附陳皮三十餘劑始針之出白膿二碗仍用前藥倍參及以豆豉餅灸之漸愈彼欲速效內服敗毒外貼寒涼反致食少膿稀色紫喜得精氣未喪仍以前藥加遠志貝母白蘞百劑而愈劉文通室年逾二十腰間突腫寸許肉色不變微痛不潰發熱脈大此七情所傷氣血凝澀於隧道而然也當益氣血開鬱結更以香附餅熨之使氣血充暢內自消散雖潰亦無虞不聽乃服十宣流氣藥氣血愈虛破出清膿不斂而斃王洪緒治陳姓婦年七十餘膝下患陰疽流注潰經數月患下及旁又起硬腫二塊與前患相連一醫誤以為前患旁腫與托毒藥二劑致新發者被托發疽始延王治王令服陽和丸湯三劑新發之二毒皆消接服小金丹十丸後服滋陰劑以杏仁散敷半月膿厚令再服保元湯加肉桂十餘劑愈流注之症毒發陰分蓋因痰塞清道氣血虛寒凝結一曰寒痰一曰氣毒初起皮色不變惟腫惟痛雖身體發熱內未作膿二陳湯加陽和丸同煎數服即消消後接服小金丹七丸杜其復發如皮色稍變極痛難忍須服陽和湯以止其痛消其未成膿之毒氣使已成膿者至不痛而潰如患頂軟即為穿之膿多白以陽和膏貼之但此症潰後定增毒痰流走患生不一故即潰之後五日內宜服小金丹十丸以杜後患接用犀黃丸陽和湯早晚輪服使毒消盡方可收功王洪緒治一兒甫歲半太陽一毒背上心臍對處二毒頸口對此一毒腰腹二毒二腿五毒共十一毒皆皮色無異其大腿二毒已經醫開刀王以小金丹令日每服二次至五日九毒俱消又以小金丹日服一次十日後二孔皆紅活以保元湯耆草皆用生者加肉桂三分煎服另以參六分水煎和入半月後耆草皆易炙者一月收功小金丹方白膠香一兩五錢草烏一兩五錢地龍一兩五錢木鱉一兩五錢五靈脂一兩五錢沒藥七錢五分乳香七錢五分炮姜一錢二分當歸身七錢五分麝香三錢共研末以糯米粉一兩二錢為糊搗千錘為丸如芡實大此一料約為丸二百五十丸曬乾忌烘臨用取一丸布包於石上敲碎入杯內以好酒浸之約一二時以銀物加研陳熱酒送下醉蓋取汗如流注初起及一切痰核瘰癧乳岩橫痃服至消乃止如流注等症成功將潰及潰久者當以十丸作五日早晚服之以杜流走後患但方內有五靈脂不可與人參同服又方中乳香沒藥每一斤用燈心四兩同炒至圓脆可粉為度扇去燈心磨粉草烏去皮取白肉每斤用綠豆半斤同煮俟豆開花去豆取草烏切片曬乾木鱉子用水浸半月入鍋煮數滾再浸熱湯中數日刮去皮心入香油鍋中煮至油沫盡再煮百滾透心黑脆以鐵絲篩撈出即用土末拌拌至土末有油氣入粗篩篩去油土另換土末拌至三次淨以木鱉同土炒入盆中拌罨一夜取鱉磨粉聽用以上各藥須如法泡製方可用
