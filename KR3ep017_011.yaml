body:
  text: 卷十一虛損張子和治束茂之病虛勞寢汗面有青黃色自膝以下冷痛無汗腹中燥熱醫以姜附補之五晦朔不令飲也又禁梳頭作寒治之張曰子之病不難愈難於將護恐愈後陰道轉茂子必不慎束曰不敢乃先以舟車丸浚川散下五七行心火下降覺渴與冰水飲之又令澡浴數日間面紅而澤後以河水煮粥溫養脾胃又以治血當歸丸人參柴胡散五苓散木香白朮散調之病即瘥汗止足暖食進張曰此本肺脾之病當以涼劑蓋水一物在目為淚在皮為汗在下為小溲若禁飲水則渴而燥熱生人若不渴與水亦不飲之矣束既愈果忘其戒病復作張已去乃殂竇材治一婦人傷寒瘍後轉成虛勞乃前醫下涼藥損其元氣故也病人發熱咳嗽吐血少食為灸關元百壯服金液保命四神鍾乳粉一月全愈弘治乙丑歲姑蘇儒學聞教諭恭遘羸疾吳醫治之率用三白湯無奇效一日謁張養正求治亦用三白湯家人曰前醫用之多矣養正正色曰子勿嘵嘵吾用湯便不同遂投熟附二三片煎俾服即瘥續醫說王時勉治常熟徐氏中氣不足脈曰此脈宜補劑當參耆譬如築室造基不可時日計其成緒須藥百裹乃可望愈一至於十病不少減更謀一醫病勢增劇復請於王王脈之曰爾信道不篤又更別藥以致增劇徐莫諱乃曰曾服利氣之劑王曰必如吾言則生否則非吾所能也從之果及期而愈肯堂嘗見格致餘論載浦江鄭君仲夏患痢丹溪煎人參膏與服至五斤而劑止十斤而病安今人輕身重財不顧體之強弱病之淺深亟於求效況謀利嗜賄之徒動輒便施剛峻劫劑至於輕病變重重病至危往往有之古人有言曰不死於病而死於醫竇材治一人身長五尺因酒色傷漸覺肌肉消瘦令灸關元三百壯服保元丹一斤自後大便滑小便長飲食漸加肌肉漸生半年如故此案附骨縮病後故念庵謂有缺文孫文垣治吳肖峰室董潯陽次女而龍山之妹也患咳嗽體倦多汗腹痛呻吟不絶口者半月諸治愈加脈之左手三五不調而右手沉弦面色青息甚微腹中漉漉有聲問上年夏日曾病否曰曾頭痛體倦多汗但不咳嗽不腹痛今五月初病如上年醫謂傷風用參蘇飲發之始咳嗽與治嗽則加腹痛又謂通則不痛以沉香滾痰丸下之遂憊不可支曰此乃注夏病仲景謂春夏劇秋冬瘥者是也問注夏何為咳嗽曰原不咳嗽由參蘇飲重發其汗肺金受傷故燥而咳何以腹痛曰因治咳寒其中氣故也況又服滾痰丸之劑以重傷之蓋五月六陽之氣布散於外汗而又汗汗多則亡陽夏至一陰將萌腹中尚虛虛而復下下多則亡陰陰陽俱亡不憊何待乃用酒炒白芍五錢甘草黃耆各三錢桂枝二錢大棗二枚水煎臨臥服加飴糖一合飲訖而睡自巳至申不醒咸謂夏不用桂伐天和也諸痛不補助邪氣也不可為矣龍山以其言告曰既已得睡則陰氣生汗可斂痛可止也問所投劑何名曰此仲景小建中湯也夫腹痛如縛帶脈急縮也面青脈弦肝木盛而脾土受克也故以白芍和之桂枝伐之甘草緩之黃耆大棗飴糖以補之自虛回汗斂而痛止矣語未竟病者醒而索粥粥後又睡至天明腹全不痛惟稍咳嗽加五味子麥冬兼治注夏而全愈矣臨別語龍山曰令妹之病克伐太過今雖愈而脈弦不退不用滋水生木弦安得遂退所謂知其一未知其二猶為可慮宜戒惱怒節飲食謝去人事恬淡頤養安可責之婦人庶可永年否則有害至陰極陽生恐不能保無患也後至期與良人齟齬怒而絶藥果以凶聞薛立齊治沈察年二十六所稟虛弱兼之勞心癸巳春發熱吐痰甲午冬為甚其熱時起於小腹吐痰無定時或謂脾經濕痰鬱火用芩連枳實二陳或專主心火用三黃丸之類至乙未冬其熱多起足心亦無定時吐痰不絶或遍身如芒刺或又以為陰火生痰用四物二陳知柏之類俱無驗丙申夏熱痰甚盜汗作渴曰此乃腎經虛損火不歸經當壯水之主以鎮陽光其脈尺洪大余卻虛浮遂用補中益氣及六味地黃而愈後不守禁其脈復作謂火令可憂當慎調攝會試且緩但彼忽略至伐戊戌夏果歿於京雄按洪大虛浮之脈火不歸經之證豈補中益氣之可試乎雖與六味同用亦非治法龔子才治周侍御患虛損目不敢閉閉則神飛飄散無所知覺且不敢言言即氣不接昏沉懶食診視之六脈虛微此元氣衰弱心神虛憊也先與硃砂安神丸一服少安後以補中益氣湯倍參耆加遠志茯神棗仁白芍生地麥冬連進數劑漸瘳雄按據脈證宜補而兼以鎮攝為治升麻柴胡未可輕試劉氏子年十八患虛勞熱咳痰喘面赤自汗旬余不能就枕勢危劇診之六脈微數乃陰虛火動也令五更時以壯盛婦人乳一鍾重湯煮溫作三四十口呷之天明煎河東地黃丸一服少頃將大小米入山藥蓮肉紅棗胡桃仁數個煮稀粥食半晌又煎清離滋坎湯二劑加竹瀝童便薑汁少許頻頻服之至午又進粥少許加白雪糕食之過半晌又進前藥二劑夜間睡則藥止醒則即服如此三晝夜藥不住口火乃漸息能枕席後減藥之半半月病減六七服湯劑調理而愈此症若以尋常之法施治日進一二劑則是一杯水豈能救車薪之火哉孫文垣治張文學子心二尹可泉長君也弱冠病醫作勞瘵治久不效自分必死督家人治含斂脈之左寸短弱右關略弦余皆洪大咳嗽下午熱從足心起漸至頭面夜半乃退面色青形羸氣促多夢遺臥床奄奄已絶粒斷藥二日謂可治可泉曰醫僉謂火起九泉者死大肉盡削者死咳嗽加汗者死脈不為汗衰者死此感症則然又當火令之時恐肺金將絶乃謂可治何也曰症雖危兩顴不赤心火未焚也聲音不啞肺金未痿也耳輪不焦腎水未涸也面赤者憂疑不決左寸短者心神不足關略弦者謀為不遂症與色脈皆非瘵也良由志願不遂殆心病非腎病也故謂可治蓋病人因星士許發解因而落第故挹怏寢疾也為立方名調肝益神湯以人參棗仁龍骨為君丹參石斛貝母麥冬五味為臣山梔香附為佐服二十劑而病起丸方則熟地龜板枸杞人參麥冬五味茯苓蜜丸服三月全安陸祖愚治金伯遠婦年未四旬生育已多且數小産致病怯弱不時眩暈噁心胸膈痞滿飲食不進四肢浮腫晡時潮熱大便時瀉時燥此及夜間恍惚不眠診得左寸浮澀兩關俱弦細兩尺初取覺洪大重按則少神知其心脾腎三經受病而前醫純以清涼治之非也以陳皮貝母前胡蘇子木通苡仁當歸白芍天麻為煎劑巳午未三時服黎明用熟地人參製附子杜仲麥冬山藥知母白朮同為丸淡鹽湯送下黃昏服安神丸如此分為三治初服便覺有頭緒調理兩月諸症如失殷岐山於春末患傷寒醫與汗下症已愈矣然精神時常覺恍惚肌肉未能充實至秋時發熱微咳嗽食減肌削且精滑便溏醫謂陰虛服六味加減幾百劑至冬甚惡寒不能出戶診其脈浮之損小其色㿠白不澤曰陽虛症也非參不可凡陰虛之熱蒸蒸內出骨甚於肉肉甚於皮陰分必劇重捫則熱不甚明乎外熱內不熱也且熱發無常是陽氣有時虧盈也語未妥陰虛火旺之嗽口口相續口渴咽乾痰涎稠濁此近傷風症矣今微咳無痰明乎陽氣之不能上升也亦未妥即精滑者亦因陽氣不足故陰精不固也至大便不實與畏寒其為陽虛顯然矣總由傷寒汗下之後元氣未復而強力作勞以致損憊用加減八味丸五更淡鹽湯下日中用四君四物加棗仁遠志作煎劑間用補中益氣湯兩月而愈黃履素曰豫少患下元虛不能多言稍不戒所得病不可狀丹田若無物者甚則夜半陰極之時陽氣欲脫手足厥冷汗大泄一交子醜氣分乃漸復此係腎陽衰弱之候常服溫腎之藥於滋陰料中多用菟絲子枸杞子肉蓯蓉五味子鹿茸紫河車之屬遂得漸愈前症因目病誤服黃連丸頓劇要知陽衰之症寒藥在所最忌知母黃柏之屬最傷胃中生髮之氣即平人亦不宜多服又本草云升麻川芎下虛人忌服豫服四物湯川芎稍多服補中益氣湯失加人參皆頓覺下虛前症陡發藥之響應如此李士材治何邑宰之子虛損遺精盜汗瘦骨柴立已瀕於危簡其所服以四物知柏為主芩連二冬為加減診其脈大而數按重極軟猶有胃氣故可治曰中氣大寒反為藥苦矣乃以歸脾湯入肉桂一錢人參五錢當晚熟睡居十日而汗止精藏更以還少丹兼進補中益氣服一月而愈顧宗伯患發熱困倦目昏耳鳴腳軟不能行大便燥結手足麻痹腰胯疼痛李診之曰腎虛不能上交心虛不能下濟用八味丸十全大補湯加龍眼肉三十枚五十餘日精神漸旺肌肉漸充一日多飲虎骨酒大便乃結醫者皆云八味丸非久服之藥十全大補宜去肉桂反用知母元參佐之服之數月遂至不起琇按是症八味十全元參知母其失正均惟集靈膏一方真的劑也李翰林勞而無度醉而御內汗出多痰服寬膈化痰之藥轉覺滯悶診其脈沉而澀兩尺尤甚曰痰得澀脈難愈況尺中澀甚精傷之象也在法不治乞投劑勉用補中益氣加半夏茯苓兩帖有小效衆醫皆喜李曰澀象不減脈至無根死期近矣果十餘日而歿據脈症藥亦大左盧不遠治吳叔顯三月間生瘡服藥瘡已合而喘急殊甚十日不能就枕往診之先用發瘡開肺次用降氣補腎斷其次日當瘡發五日當足腫六日當出水十日可喘定就睡嗣後足生二毒三月始完復次年七月偶以傷風微熱左三部脈惟隱隱見以大劑人參歸地甘草十帖脈方起二十帖如常十月再感左脈更不如秋但微熱起居如故三日就枕七日頭痛如破因告其兄以秋病之危今若昏死決無生理彼尚疑其言九日果微昏錯語十二日不識人再七日死或問曰某昨歲垂危君言變症歷歷如響幸全生焉今冬微恙君言不起果應其言其症為一為兩曰其人氣骨夭弱腎精不全其瘡亦從腎發也不知而用發散元氣轉耗瘡毒內逆於肺而喘豫用四逆散使太陰氣開瘡遂外出用六味料使少陰納氣息遂內均清升濁降足腫生癰病俱外去是以生也今秋左脈不起是元氣內索不堪左旋矣比起而再戕賊之病發於骨髓所以腦痛因之遂昏是內關之症氣獨內絶是以死也其病皆根本於腎是一非兩不在症之輕重為異同也馮楚瞻治余侍讀數年參藥久服或時氣逆上攻或時氣墜下迫二陰皆重失氣甚頻大便溏而不暢脈則細數無力向服補中益氣殊不知愈升則氣愈降況兼陳皮辛散反泄元氣豈未聞塞因塞用之說乎乃以八味加鹿茸補骨脂五味子為丸參湯吞服於空心以嫩防風三兩酒煮取汁拌炒黃耆一斤炒黃白朮半斤熟附子四兩三味煎汁去滓熬膏以人參六兩為末收成細丸日中食遠白湯吞服四錢耆能升托術能固中參能補里附能回陽四味共劑收功何慮虛陷者不為振作發生也遂愈胡春坊年將六旬抱病九月餘寒熱攻補雜進症隨藥變虛虛實實之間幾莫能辨診之六脈洪大有力似非陽虛也乃時當暑月汗出惡風痰嗽鼻塞飲食如故卻精神實疲此陰虧不能斂陽以致陽浮陰散清濁不分邪火消穀生痰不生血也但為養陰則陽有所依投以六味加鹽水煮橘紅麥冬五味子不三劑而愈趙宦病赤如妝不省人事口多譫語手足躁動六脈洪大搏指所服乃柴廣半之類以其劑小不能為害不知真陰失守虛陽上浮神氣欲脫補救尚虞不及敢以清利速其死耶以人參八錢熟地麥冬丹參白芍茯神遠志牛膝薑炭每日二劑不數日而愈高鼓峰治吳升玉發熱多汗便祕數日不行醫曰此停食傷寒也不宜與食待熱退始可以稀粥飲之病勢轉甚延治問曰肚中飢否曰飢索其日所用藥則芩連枳殼花粉厚朴之屬笑曰但吃飯病即除矣無庸此等藥也病者喜甚曰吾本無食醫言有食故耐此數日飢耳然便祕云何曰致新則推陳矣胃中久無穀氣故前物積而不下且子之發熱多汗一味虛症遂用參術調理而愈立齊治州同劉禹功素不慎起居七情以致飲食不甘胸膈不利用消導順氣肚腹痞悶吐痰氣逆用化痰降火食少泄瀉小腹作脹用分利降火小便澀滯氣喘痰湧服清氣化痰丸小便愈滯大便愈瀉肚腹脹大肚臍突出不能寢臥六脈微細左寸甚虛右手短促此命門火衰脾腎虛寒之危症也先用金匱加減腎氣丸料肉桂附各一錢二分二劑下瘀穢甚多又以補中益氣送二神丸二劑諸症悉退五六又用前藥數劑並附子之類貼腰臍及湧泉穴六脈漸和而安後因怒腹悶惑於人言服沉香化氣丸大便下血諸症悉至曰此陰絡傷也辭不治果段吳厚先治薛氏子吐血止後忽患心跳振衣或時驚恐用熟地一兩山藥五錢女負山萸枸杞各三錢服二十餘帖本方加元武膠為丸症頓減間藥一日即跳動偶一醫用六君子加補心鎮心之品症復增吳曰此心跳乃虛里之動也經曰胃之大絡名虛里貫膈絡肺出於左乳下其動應衣宗氣泄也凡患腎虛勞怯者多見此症腎屬水而肺主氣氣為水母腎虛不納故宗氣上泄而腎水愈竭於下欲納氣歸元惟補陰配陽為是耳琇按凡治小兒不論諸症宜先揣此穴若跳動甚者不可攻伐以其先天不足故也幼科能遵吾言造福無涯矣此千古未泄之祕也診之貴之高鼓峰診楊在公六脈動甚因語之曰脈緊而弦不出一月危病至矣定方而別斯時無甚病至十月中忽患咳嗽醫作風寒治數以羌活與之十餘日遂大吼喘痰湧如潮作齁䶎聲不得臥坐一人於床以額俯靠其背稍抬頭即喘急欲死走人邀診曰以前脈推之病根固深然不宜困敗如此之速也此殆攻伐之藥逼成之耳無救矣病家只哀求定喘曰定喘不難無如脈色皆去縱喘定之後仍虛脫而死矣遂朝用參耆歸芍暮用加減八味三日而能臥飲食倍進其家甚喜以為得生高曰出入廢則神機化減升降息則氣立孤危今出入升降俱廢息矣縱挽回何施茲不過暫留命門一絲未斷之氣逾十日必死矣已而果然向使病未見之先預行補救可以消患於未萌即已見之後醫能以大劑填補峻補之藥投之即不能如奮尚可稍延歲月不至若是之促此可為妄肆攻伐之戒徐次鏐病咳嗽高細診其脈六部皆動因問徐嗜酒乎曰然服天麥冬知貝母生地等類乎曰服逾斤許矣高曰君病與此藥相反可禁勿服寫歸脾湯六味丸兩方與之高歸語友人曰次鏐病即素問所謂二陽病發心脾也其人必勞心過度又嗜酒多欲急救三陰乃為良法醫以陰寒逼之火無所發泄遂成燎原之病今六脈純是陰火有出無入不逾年死矣或謂次鏐無恙不過患傷寒耳何遽至是曰脈法當如是耳八月中高適寓孤山徐邀遊天竺曰聞子善太素脈乞為我診辛丑可得第否高曰太素兩字出在三墳後入竊之以欺天下之耳目且造為歌訣妄言禍福軒岐無是也但素問自有一種榮枯壽夭貧富貴賤得失成敗之說要不出乎吉凶悔吝善惡逆從之理其道精微然我能約略言之診畢語之曰辛丑固好然不若甲辰更得當也云云者固知其將死欲阻其北上耳次問壽曰子年甫三十外不必問壽察其意惟以科名為急耳不及病情難以直言因語其尊人使急返石門告之曰令郎脈氣不佳如北上其不返乎曷阻之曰豫固阻之弗能止也固為制大料參膏令戒酒絶色服之庶可冀其還家如或似火而用寒涼藥則殆矣到京後閩人有以前說進者信之用發散寒涼不十劑吐血而歿張路玉治顏氏女虛羸寒熱腹痛裡急自汗喘嗽者三月餘屢更醫不愈忽然吐血數口脈之氣口虛澀不調左皆弦微而尺微尤甚令與黃耆建中加當歸細辛或曰虛澀失血曷不用滋陰降火反行辛燥乎曰不然虛勞之成未必皆本虛也大抵皆由誤藥所致今病欲成勞乘其根蒂未固急以辛溫之藥提出陽分庶幾挽回前失若仍用陰藥則陰愈亢亢字未妥而血愈逆上矣從古治勞莫若金匱諸法如虛勞裡急諸不足用黃耆建中湯即腹痛悸衄亦不出此加當歸以和榮血細辛以利肺氣毋慮辛燥傷血也遂與數帖血止次以桂枝人參湯數服腹痛寒熱頓除後用六味丸以棗仁易萸肉或時間進保元異功當歸補血之類隨症調理而安胡念安治王在廷之室病虛勞十餘載喘促吐沫嘔血不食形體骨立諸醫束手診之見其平日之方皆滋陰潤肺溫平之劑曰以如是之病用如是之藥自然日趨鬼道矣焉望生機仲景云咳者則劇數吐痰沫以脾虛也又昔賢云腎家生陽不能上交於肺則喘又云脾虛而失生化之原則喘今脾腎敗脫用藥如此安望其生乃重投參耆薑附等二劑而喘定緣泄瀉更甚加萸寇十餘劑而病減十七又灸關元因畏痛只灸五十壯迄今十餘年體大健醫林指月凡虛損病能受溫補者原極易治古人醫案所載大半俱系此症其實與陰虛內熱之虛勞病了沒交涉也一董姓者壅正三年初冬來求診脈其脈或二動一止或七動一止或十二動或十七動一止此心絶脈也仲冬水旺其何能生姑定參耆茸附河車臍帶桂心棗仁等方與之服十劑脈之歇止參差不似前之有定數也又十劑而歇止少矣又十劑六脈如常矣噫不可謂之無功也且知治早雖不用丹艾亦有可生全者同上昔蜀中一道人童顏漆發眉字疏秀自歌曰尾閭不禁滄海竭九轉神丹都漫說惟有斑龍頂上珠能補玉堂關下穴按斑龍珠乃鹿茸鹿之精血結而為角性溫大補精血元陽相火虛者宜之或加於六味地黃丸中亦妙治法匯張三錫張三錫治一人咳嗽已成勞極用四物知柏不愈乃以秦艽鱉甲散加二母二冬十數劑而愈陸祖愚診傅小泉室高年患濕痰症暑月或與香燥過多反增頭暈口渴眼花不寐飲食少進骨節痠疼診得左寸洪數關尺細澀右手浮滑關尺沉細且九至一止曰此血虛痰火也論症尚有治法獨是右關尺歇止有常數便不可為矣凡血虛症即是肝病大都庚日篤辛日危況立秋在邇乎或聞而非之乃與養血清火消痰順氣之劑果覺有驗十劑後竟可步至中堂料理家務每日約進粥十餘碗人皆謂能起死為生矣忽一日小腹作痛冷汗不止至夜半不知人事次日酉時死矣小泉不忘前言檢歷視之果是辛日也陳三農弟昏倦發熱頭痛惡風因中氣太虛元氣下陷陽氣不充而頭痛形氣衰少而內熱用調中益氣湯加葛根一劑而安更制脾腎丸服逾月而愈治一貴婦咳嗽泄瀉咳嗽甚則泄瀉愈泄瀉甚則咳嗽略止午前微寒午後微熱此皆脾胃虛弱痰涎隨虛火上潮則咳甚而瀉止痰涎隨虛火下注則泄甚而咳止不必治其諸症但補養脾胃自愈用保元湯加炒松花乾薑五味破故紙八劑而咳嗽寒熱皆除又八劑而泄止雄按未必盡然須憑於脈薛立齊治一婦人發熱晡熱盜汗自汗殊畏風寒飲食少思或腹痛吞酸或大便不實此脾胃諸經不足氣血虧損朝用補中益氣夕用八珍湯倍用參耆白朮各二十餘劑尋症漸愈因喪母哀傷盜汗便血用加味歸脾湯數劑而止仍用前二藥又五十餘劑尋愈月經兩月而至適因怒去血過多發熱作渴肢體酸倦頭目暈痛用逍遙散加味歸脾湯二藥調補痊一婦人飲食少思胸膈不利或胸中作痛或大便作瀉或小便不利用逍遙散加山梔茯神遠志木香而愈後因怒寒熱往來倦怠煩熱以前藥加炒黑黃連三分頓愈用八珍湯調理後因怒吐血燥渴用人參五錢芩朮當歸各三錢陳皮甘草各一錢治之而愈一婦人內熱口乾頭暈吐痰帶下體倦飲食少思此脾氣虛弱而不能生肺金用補中益氣湯加茯苓半夏脾氣漸強飲食漸進諸症漸退再用加味逍遙散治之尋愈一婦人日晡熱甚月水不調飲食少思大便不實胸膈痞滿頭目不清肢體倦怠發熱煩躁此七情肝脾虧損之症用濟生歸脾湯加味逍遙散補中益氣湯調治元氣漸復而愈一婦人胸脅膨滿小腹悶墜內熱晡熱飲食不甘體倦面黃日晡則赤灑淅惡寒此脾肺氣虛先用六君加川芎當歸諸症漸愈又用補中益氣加茯苓半夏諸症全愈然飲食失節勞怒惡寒發熱不食用加味小柴胡二劑而熱退用逍遙散歸脾湯調理而愈一婦人月經不調飲食少思日晡熱甚此肝脾氣血俱虛用十全大補加山藥山茱丹皮麥冬五味而愈次年秋寒熱如瘧仍用前藥而愈沈大方室趙氏初患痰喘熱渴或以降火散氣治之肌日削而氣日索延至甲辰木旺痰盛身熱口腐腹脹神昏絶食此乃虛熱無火薛投壯水生土之劑隨愈至戊申夏初坐則頭墜不能視臥則背冷透體煩熱暈眩咳嘔痰湧手足麻冷勢成危殆薛曰此內真寒而外假熱也遂與薑附大補之劑三四劑勢漸安仍以前藥加減而愈此沈自述之案胡念庵治一中年婦夜熱咳嗽本小疾耳為張李二醫合用滋陰退熱藥應是苦寒之劑月餘致面青脈急喘促吐血嘔沫日數升飲食不進二醫束手覆而不治胡為重用參附十餘劑而安此非其本原受虧乃誤藥所致故易收功也醫林指月立齊治一儒者每春夏口乾發熱勞則頭痛服清涼化痰藥瀉喘煩躁用香薷飲神思昏憒脈大而虛此因閉藏之際冬月不遠幃幕為患名曰注夏凡稟賦薄弱即小兒亦多此病用補中益氣湯去升麻柴胡加五味麥冬炮姜一劑脈益甚仍用前藥加肉桂五分服之即蘇更用六味丸而痊司空何燕泉小便赤短體倦食少缺盆作痛此脾肺虛弱不能生腎水當滋化源用補中益氣六味丸加五味而安庶吉士黃伯鄰發熱吐痰口乾體倦自服補中益氣湯不應薛謂此金水俱虛之症兼服地黃丸而愈後背患一癤煩痛寒熱彼嘗偕視郭主政背疽郭不經意決其殞於金旺之日果然已而郭氏妻孥感其毒皆患惡瘡黃所患與郭同心甚恐曰此小瘡也憎寒等症皆陰虛舊症果是瘡毒亦當補氣血乃以地黃丸料煎與服之即睡良久各症頓退自後常有頭面耳目口舌作痛或吐痰眩暈服四物黃連黃柏愈少司空何瀟川足熱口乾吐痰頭暈服四物黃連黃柏飲食即減痰熱益甚用十全大補加麥冬五味山藥山茱萸而愈薛甥凌雲霄年十五壬寅夏見其面赤唇燥形體消瘦曰子病將進矣癸卯冬復見之曰子病愈深矣至甲辰夏胃經部分有青色此木乘土也始求治先以六君加柴胡白芍山梔蕪荑炒黑連數劑及四味肥兒六味地黃二丸及參苓白朮歸芍山梔麥冬五味炙草三十餘劑肝火漸退更加柴胡膽草二十餘劑乃去芍加肉桂三十餘劑及加減八味丸元氣漸次而復一儒者因屢婚腳腿軟痛面黑食減惡寒足腫小腹脹痛上氣痰喘此少陰虧損陽氣虛寒之症用八味丸料煎服諸症頓除又服丸劑半載元氣漸充形體如故一男子年逾二十早於斫喪夢遺精滑睡中盜汗唾痰見血足熱痿軟服黃柏知母之類曰此陽虛而陰弱也當滋其化源不信恪服之前症益甚其頭漸大囟門漸開視物皆大吐痰喊叫乃如法調補諸症漸退頭囟漸斂而安一儒者口乾發熱小便頻濁大便祕結盜汗夢遺遂致廢寢用當歸六黃湯二劑盜汗頓止用六味地黃丸二便調和用十全大補湯及前劑兼服月餘諸症悉愈朱丹溪治王二十四大發熱脅痛咳嗽紅痰口渴大便祕倦怠脈稍數而虛詢之發熱曾飲水一碗病因飲水不節或積病發又飲冷水傷胃成虛傷肺成痰白朮一錢半人參陳皮川芎各一錢白芍黃芩桔梗炙草各五分作二帖煎取八分入竹瀝二分再煎沸熱飲下龍薈丸二十丸如嗽三十丸立齊治一婦人素勤苦冬初患咳嗽發熱久而吐血盜汗經水兩三月一至遍身作痛或用化痰降火口噤筋攣此血虛而藥損耳遂用加減八味丸及補中益氣加參冬五味山藥治之年餘而愈柳叔度言吾養生無他術但不以元氣佐喜怒使氣海常溫耳今人既不能不以氣海佐喜怒矣若能時灸氣海使溫亦其次也豫舊多病常苦氣短醫者教灸氣海氣遂不促自是每歲須一二次灸之以氣怯故也資生經羅謙甫云丙辰秋楚邱縣賈君次子二十七歲病四肢困倦躁熱自汗氣短飲食減少咳嗽痰涎胸膈不利大便閉形體羸削一歲間更數醫不愈或曰明醫不如福醫某處某醫雖不精方書不明脈候看症極多治無不效人因之曰福醫諺曰饒你讀得王叔和不如我見過病症多頗有可信試令治之醫至診其脈曰此病豫飽諳矣治之必效於肺腧各灸三十壯以蠲飲枳實丸消痰導滯不數服大便溏泄無度加腹痛食不進愈添困篤其子謂父曰病久瘦弱不任其藥病劇卒冬豫從軍回其父以告豫豫曰內經云形氣不足病氣不足此陰陽俱不足瀉之則重不足此陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶減壯者不復矣故曰不足此其理也令嗣久病羸瘦乃形不足氣短促乃氣不足病漸作時嗜臥四肢困倦懶言語乃氣血皆不足也補之惟恐不及反以小毒之劑瀉之虛之愈虛損之又損不死何待賈君嘆息而去豫感其事略陳其理夫高醫愈疾先審歲時太過不及之運察人血食布衣勇怯之殊病有淺深在經在臟之別藥有君臣佐使大小奇偶之制治有緩急因用引用返正之則孫真人云凡為太醫必須諳甲乙素問黃帝針經明堂流注十二經三部九候五臟六腑表裡孔穴本草藥對仲景叔和諸部經方又須妙解五行陰陽精熟周易如此方可謂太醫不爾則如無目夜遊動致顛殞正五音者必取師曠之律呂而後五音得以正為方圓者必取公輸之規矩而後方圓得以成五音方圓特未技者尚取精於其事者況醫者人之司命列於四科非五音方圓之比不精不醫不通不脈不觀諸經本草幸而運通命達而號為福醫病家遂委命於庸人之手豈不痛哉噫醫者之福福於渠者也渠之福安能消病者之患焉世人不明此理而委命於福醫至於傷生喪命終不能悟此惑之甚者也悲夫薛立齊云辛丑年余在嘉興屠漸山第有林二守不時昏憒請治之譫語不絶六脈按之如無此陽虛之症也當用參附湯治之有原醫者陽喜而迎曰先得我心之同然遂服之即靜睡覺而進食午後再劑神思如故其脈煩斂余返後又詐云用附子多矣吾以黃連解之陰仍用參附湯觀仲景先生治傷寒云桂枝下咽陽甚即斃硝黃入胃陰甚乃亡不辨而自明矣吾恐前言致誤患者故表而出之薛甥居宏年十四而娶至二十形體豐厚發熱作渴面赤作脹或外而砭血內用降火肢體倦怠痰涎愈多脈洪數鼓指用六味丸及大補湯加麥冬五味而痊馬元儀治汪周拔子患弱症經年諸治不效診其脈兩寸浮大而虛關尺虛小咳嗽夢泄面色枯白不任風寒曰兩寸浮虛衛外之真陽不固兩尺虛澀腎中之真陽亦弱較陰虛咳嗽之症不啻天淵擬玉屏風散多加人參以益真氣而充腠理不數劑而咳嗽漸已稍可當風兼令早進七味丸以養腎氣而主蟄藏兼服大造歸脾丸補心脾而充血氣如是調兩月而安何繼武患寒熱躁煩足冷如冰汗出如注兩脈虛微形氣病氣俱屬不足責之脾腎二經虧損虛寒內伏雖見寒熱有似表邪而躁煩自汗足冷已兆虛陽欲脫之機況兩脈虛微尤非表邪可散之比若行表散是速其陽之亡也法當大溫大補和養中州生髮陽氣方可圖愈因與附子理中湯二大劑汗止足溫寒熱漸已數劑霍然沈氏僕惡寒發熱時躁煩兩脈空大自覺氣從耳鼻衝出洞然若無關閘此脾肺虧損陰火內動也凡人受天之氣必先入肺乃行於下其彆氣走於耳宗氣出於鼻亦從胸中注於肺以行其上是肺實居氣之要路以行治節肺臟虧損則氣之出入皆失其常法當補脾斂肺而氣自治矣黃耆白朮各五錢炙草防風各一錢二劑脈稍斂熱稍減四劑而燥已耳鼻間氣治如常再以七味地黃丸補養水臟而愈王維春年三十攜妓縱恣月餘內虛之下不耐煩暑當夜露坐明日遂寒熱躁煩自汗不止面赤如妝兩脈虛微此陰虛陽暴絶也非夏月傷暑脈虛而身熱自汗之比若行表散氣浮不返矣用人參一兩附子二錢回陽返本服後汗止神清躁煩俱息明日診之兩脈轉為洪數但重按少力此脈症無可慮矣但陰虛之極恐陽氣無偶終亦散亡治法不可救陽而賊陰但當養陰以戀陽得其平而已用生首烏人參甘草橘紅黃芩知母等四劑寒熱平而愈張子和曰嘗過鳴鹿邸中聞有人呻吟聲息瘦削痿然無力余視之乃五虛症急以聖散子二帖作一服服之此症非三錢二錢可塞也續以胃風湯五苓散等各作大劑使頓服注瀉方止而漿粥入胃不數日而其人起矣故五虛之人不加峻塞不可得實也庸工治症草草補瀉如一杯水救一車薪之火竟無成功反曰虛者不可補實者不可瀉此何語也籲不虛者強補不實者強攻自是庸工不識虛實之罪豈有虛者不可補實者不可瀉哉五虛者脈細皮寒少氣泄利前後飲食不入也繆仲淳治陸作先乃正咳嗽飽脹痰喘水火不通眠食俱廢人參君白芍臣蘇子炒研極細佐枇杷葉三大片茯苓使二服得眠大小便通啖粥廣筆記湖廣張仲虎客邸耽於青樓且多拂意之事至冬底發大寒熱咳嗽吳中醫者皆以外感治之發表和解無不遍試毛子晉拉繆視之見其神色消耗脈氣虛數中時復一結咳嗽有血臥不貼席繆謂子晉曰此陰虛內傷症也陰精虧竭故脈見虛數內有瘀血故結脈時見肺肝葉損所以臥不能下此不治之症況誤認外感多服發散復蹈虛虛之戒耶不數日而歿太學許韜美形體卑弱神氣短少且素耽酒色時常齒衄辛未春偶患右乳傍及肩背作痛異常手不可近捫之如火日夜不眠醫以內傷治之服桃仁紅花乳沒延胡靈脂等藥二十餘劑不效診之六脈虛數肝腎為甚斷為陰虛火旺之症當滋陰養血扶持脾胃俾陰血漸生虛火降下則痛不求止而止矣如必以和傷治痛為急則徒敗胃氣克削真元非所宜也用生地丹皮白芍牛膝枸杞續斷石斛甘草桑枝麥冬蘇子囑其服十劑方有效以陰無驟補之法也八劑後復診其脈氣漸和精神漸旺雖痛未盡除而生機躍然矣惜其欲速太過惑於群小復以前藥雜進一月後胃氣果敗嘔逆陰血愈耗潮熱腹脹再半月而死顧季昭患陰虛內熱仲淳曰法當用甘寒不當用苦寒然非百餘劑不可慎勿更吾方欲加減使吾徒略加增損可也果百劑而安天冬麥冬桑皮貝母枇杷葉白芍蘇子車前各二錢地骨皮鱉甲各三錢五味子一錢姚公遠內子病延仲淳入診其繼母乘便亦求診仲淳語伯道曰婦病不足慮嫂不救矣聞者駭甚曰吾方新婚亡大恙何至是耶仲淳曰脈弦數真弱症也不半歲夜熱咳嗽勢漸劇倉皇延伸淳至疏方與之曰此盡余心爾病不起矣逾年醫家百藥雜試竟夭廣筆記瞿元立夫人素清癯不耐煩勞一日謂仲淳曰弟婦未生子而弱煩兄為診其故次日仲淳往診得其脈細無神趙文肅公問曰兄從元立許來診其嫂得何脈曰今雖無恙必不久矣文肅頓足曰有是哉天胡厄善人甚耶此丙戌四月事也至秋夫人歿同上祝氏婦年五十餘患中滿腹脹兼崩漏下清上則下虛彌甚實下則上脹彌甚仲淳為立二方以蘇子石斛陳皮貝母元參人參白芍治其上以地榆阿膠木瓜牛膝杜仲茜根椿皮治其下各為丸分食前後服之尋愈同上來天培治周殿先室年近古稀每病胸中痞塞背寒或時氣逆嘔吐有塊在胸下飲食不思數日稍痊或用山梔黃連木香香附吳萸等藥勿效診之六脈浮細而軟曰此肝腎氣虛上逆之症宜滋肝益腎養血扶脾引火歸源之劑用牛膝澤瀉歸芍枸杞茯苓山藥萸肉沉香肉桂二劑諸症霍然後復作服此即痊有士人觀書忘食有紫衣人立前曰公不久思思則我死矣問其何人曰我穀神也於是絶思而食如故醫說續編吳橋治方生年二十五內而早起枵腹而服勞無何而發熱頭痛醫以為內熱乃用清涼三日汗流昏憒欲絶橋診六脈皆不應指甚則微若蛛絲語其父曰郎君甚危此虛脫也急宜重劑溫補即稍緩無及矣父惟唯唯一劑而愈近日乃大安太函集方勉孝丁年病孱面生赤食與肌遞減矣即內即遺皆不害或病作日三四溺亦如常第多一行則自項領以上凡在頭顱面目髮膚忽若崩頽昏眩不支嗒焉欲喪遞進補劑久而無功也橋診之心腎微數無力曰病得之既內而臨小溲忽受驚恐法當分治病者俯首唯唯於是早劑補腎晚劑補心旬月而愈同上瓊玉膏治虛勞乾咳生地自然汁四斤白茯苓十二兩白蜜二斤人參六兩癯仙加沉香血珀各一錢五分上以地黃汁同蜜煎沸用絹濾過將參為細末入煎汁和勻以瓷瓶用綿十數層加箬葉封好入砂鍋內以長流水浸沒瓶頸桑柴火煮三晝夜取出紙封扎口以蠟封固懸井中一日取出仍煮半日湯調服徐靈胎曰此為血症第一方乾生地四兩浸透可取自然汁一兩若淅地則十斤只取自然汁一斤須三十斤方可配諸藥故修之方必隨時地交通也集靈膏西洋參刮去皮飯上蒸曬乾九次杞子懷牛膝酒蒸天冬麥冬懷地仙靈脾等分熬膏白湯或溫酒調服此方始見於廣筆記無仙靈脾云出內府又於治法匯並無牛膝方後注血虛加當歸脾虛加白朮且云治一切氣血虛身熱咳嗽者皆獲效凡少年但覺氣弱倦怠津液短少虛火上炎正合服之免成勞病理虛元鑑治咳嗽去參膝加杞子甘桔元參峻補肝腎之陰實無出此之上者十灰散治吐血咯血嗽血先用此藥止之大薊小薊荷葉側柏葉白茅根茜草根梔子川大黃丹皮棕櫚皮等分燒灰存性研極細末以紙包置泥地上一夕出火毒每服五錢藕汁或萊蔔汁或京墨汁半碗調服周楊俊云治吐血者首推葛氏而先以此方止血明明劫劑毫無顧忌細玩始知先生意之到理之深也人生於陽根於陰陰氣虧則陽自勝上氣為之喘促咳吐痰沫發熱面紅無不相因而生故留得一分自家之血即減得一分上升之火易為收拾何今日之醫動以引火歸經為談不可概用止血之味甚至有吐之為美壅反為害之說遂令遷延時日陰虛陽旺煎熬不止至於不救果誰之咎乎引經而緩時日冀復元神有形之血豈能使之即生而無偶之陽何法使之即降此先生所以急於止血之大旨也雄按諸藥燒灰皆能止血故以十灰名方但止澀之品棕櫚一味余皆清熱行滯破瘀之器難保止血而無兜澀留瘀之弊雄每用之並無後患何可視為劫劑乎太平丸治久咳嗽肺痿肺癰天冬麥冬知母貝母款冬花各二兩杏仁當歸熟生地黃連各二兩五錢蒲黃京墨桔梗薄荷各一兩上十四味研細末和勻以白蜜四兩於銀石器中煉熟再入阿膠二兩五錢俟煬後下諸藥末攪勻再入麝香少許熬三五沸即彈丸子大食後細嚼一丸薄荷湯緩化下臨臥噙此丸仰臥使藥氣入肺竅則肺清嗽止凡咳嗽服此七日即痊潤肺膏治久嗽肺燥肺痿羊肺一具杏仁淨研柿霜真酥真粉各一錢白蜜二兩上將羊肺洗淨次將五味入水攪黏灌入肺中白水煮熟如常服食周揚俊云血去則燥燥則火旺肺枯欲從腎滋水而不先滋水之母有是理乎然肺為多氣少血之臟故一切血藥概不欲用以羊肺為主諸味之潤者佐之人所易能也若以真粉之甘涼不獨清金且以培土人所未知也此治上損之主劑也肺熱葉焦之痿飲不解渴之上消並可仿為此法可為治損聖手故葉氏治吐血諸證皆宗之奈後人多從醫貫入手不分上損下損惟六味八味等方而已宜其無效也燮理十全膏平補陰陽調劑氣血人參炙耆各三兩白朮六兩熟地八兩當歸白芍川芎各二兩炙草一兩熬膏將成入龜鹿膠四兩收之窨內去火氣每開水調服數錢此薛一瓢方也其方論云古人治無形之勞怠必培以甘溫人參為君白朮為臣黃耆為佐甘草為使有形之勞倦必助以辛溫歸芎是也資以酸甘芍地是也故以八味為首旨而拘䇿以肉之特如鹿之勤能通腎脈龜之淨能通任脈此二膠者各稟一德草木力微賴以神其用也陰陽兩虛者服之無偏勝無不及又或陳皮半夏以利樞機先為主道之劑凡培養元氣方之宜簡而純簡則臟腑易承氣血亦易行純則溫厚和平可以補偏救弊俾自相灌注循環之理無端生生不已以合其先天所賦流行之道若稍穿鑿非本然之理矣杜勞方專治骨蒸勞熱羸弱神疲腰脊痠痛四肢痿軟遺精吐血咳嗽吐痰一切陰虛火動之症輕者二三料全愈重者四五料除根若先天不足之人不論男女未病先服漸可強壯以其性味中和久任亦無偏勝之弊勿以平淡而忽之枇杷葉五十六片刷去毛鮮者尤良去皮切片大棗八兩熟後去皮煉白蜜一兩便燥多加溏瀉勿用先將枇杷葉放砂鍋內煎透去渣絹取清汁後將果蜜同拌入鍋鋪平取枇杷葉汁浸之煮半炷香翻轉再煮半炷香收器內每日隨意溫熱連汁食咳嗽多痰加川貝母末一兩起時加入一二滾即收吐血加藕汁同煮虛勞欲火甘梨汁胡桃肉研各一斤芽茶五兩生地當歸末各六錢熬至滴水成珠入雞子清一枚收瓷內封好冷水浸去火毒每服一匙慎柔五書曰損病六脈俱數聲啞口中生瘡晝夜發熱無間經云數則脾氣虛此真陰虛也用四君加黃耆山藥蓮肉白芍五味子麥冬去頭煎不服服第二三煎此養脾虛之法也服十餘日發熱退口瘡漸好方用丸劑如參苓白朮散亦去頭煎曬乾為末陳米鍋焦打糊為丸如緑豆大每服三錢或上午一錢白滾湯下蓋煎去頭煎則燥氣皆去遂成甘淡之味淡養胃氣微甘養脾陰此師相授受之語無輕忽焉黃錦芳治一女患虛勞症脈雖數而不甚是尚可治但飽不思飲食痰涎甚多索前醫單視之用白朮地黃以補脾清火廣半附子以除痰固虛意頗周密但病多水壅白朮之滯地黃之濕皆所不宜改用香砂橘半以疏其脾飲食漸加至三劑微見陰火起隨用龜板阿膠潛伏之味而火漸息食漸加痰漸少以後隨病增減總以疏脾滯為要遂愈此乃陽傷六七陰傷二三勞在將成未成之際故尚可治若再用白朮地黃必不救矣凡虛勞症脾肺俱損者即為難治脾喜燥而惡濕肺苦燥而喜潤飲食不進宜用香砂則於肺燥不宜咳血吐血宜用膠地則於脾濕不宜惟燥熱甚而能食不瀉者潤肺當急而補脾之藥亦不可缺也倘虛極不食而瀉多雖咳嗽不寧亦必以補脾為急而滑潤之品不可輕投蓋脾有生肺之能肺無補脾之力故補脾之藥尤要於補肺也至於脾腎俱傷者尤難措手方欲以甘寒補腎而食少不化又恐不利於脾方欲以辛溫快脾而陰氣耗竭又恐愈損其水兩者並衡而卒以健脾為急者以脾上交於心下交於腎也要知滋腎之中扶以砂仁沉香壯脾之中參以牛膝菟絲龜板隨時活法以治之庶幾有濟葛可久曰勞症施治宜早若至脾敗不食則萬無一生故治勞須於平時力救脾胃為佳尤在涇曰風勞骨蒸久而咳嗽吐血脈來弦數者柴胡梅連散主之蓋邪氣久積於表裡之間而不退非可一汗而去者故用柴胡之辛散必兼烏梅之酸收而久積之風內蘊骨髓者已變風之體而為熱則宜用黃連前胡之苦寒以清之然兵無嚮導則不達賊境藥無引使則不通病所新病且然況伏邪乎故膽以合膽髓以合骨薤白之通陽童便之通陰而表裡肌膚之邪庶盡出歟羅氏秦艽鱉甲散與柴胡梅連同意亦治風勞骨蒸肌熱之症然減前胡之泄氣而加當歸之和血去黃連之苦寒而用青蒿之辛涼氣味為較和矣久病之人未必不宜緩法也陽虛者氣多陷而不舉故補中益氣多用參耆朮草甘溫益氣而以升柴辛平助以上升陰虛者氣每上而不下故六味丸多用熟地萸肉山藥厚味體重者補陰益精而以茯苓澤瀉之甘淡引之下降氣陷者多滯陳皮之辛所以和滯氣氣浮者多熱丹皮之寒所以清浮熱六味之有苓澤猶補中之有升柴也補中之有陳皮猶六味之有丹皮也其參耆歸朮甘草猶地黃茱萸山藥也法雖不同而理可通也歸脾湯兼補心脾而意專治脾觀其於甘溫補養藥中加木香醒脾行氣可以見矣龍眼遠志雖曰補火實以培土蓋欲使心火下通脾土而脾益治五臟受氣以其所生也故曰歸脾虛勞之人氣血枯耗生氣不榮則內生寒冷張雞峰所謂冷勞是也宜建中復脈八味腎氣之屬甘溫辛潤具生陽化陰之能者治之亦有邪氣淹滯經絡瘀郁者元珠所謂體虛之人最易感於邪氣當先和解微利微下之次則調之醫不知而遽行補劑往往致使邪氣不解是故虛勞之治固不必專以補陰降火為事也羅氏論虛勞之症都因邪伏血鬱而得不獨陰虧一端至晚寒熱時減時增其為陽陷入陰可知滋腎生肝最為合法略加損益不必更張也熟地白朮丹皮茯苓淮山藥柴胡鱉甲炙草真陽氣弱不榮於筋則陰縮不固於里則精出不衛於表則汗泄三者每相因而見其病在三陰之樞非後世方法可治古方八味丸專服久服當有驗也肺實於上腎虛於下脾困於中之候也然而實不可攻姑治其虛虛不可燥姑溫其下且腎為胃關而火為土母或有小補未可知也金匱腎氣丸裴兆期曰補虛之最切要者在扶胃氣胃氣強則飲食進飲食進則氣血生補何如之今之不善補者概用歸地參朮甘草黃耆等類以為補虛之法莫此若矣不知此等品類皆甜膩壅膈之物胃強者尚可胃弱者服之不脹則瀉不瀉則嘔吐而不能食矣病不轉加者未之有也一宦室妾年二旬不甚得所抑屈傷脾飲食漸減幾半歲後乃月事不來日晡潮熱醫以養血滋陰為治寢至肌肉消爍喘息不眠噁心不能食大便不通脈來數弦右關特細素問云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者即此類也在法不治旬余果卒夫二陽者胃與大腸也病者傳化失常飲食少進也發心脾者治於脾心也因不得遂其隱曲之情心脾屈結而發也心生血脾統血腸胃既病則心脾無所資而血脈枯故不月血既枯則陰不勝陽而生熱熱盛則生風而肌肉消爍矣故曰風消肺屬金主氣金為熱迫則氣上賁喘息不寧故曰息賁初起時即宜開導腸胃中積滯使真氣流通胸膈寬利能飲能食始用血分等藥調月事之不來退日晡之潮熱方為正治乃不審二陽因抑屈久而積滯不行為受病之根漫執月事不來日晡潮熱是血少陰虛不用逍遙則用四物朝餐暮餌而卒至於死良可嘆也女子患此者甚多余故詳著其證並釋經義云或曰養血滋陰之藥世皆用之以補虛勞不足者也豫且謂有傷脾之患而大補丸反多耗氣之品何以取之曰此深有當於脾胃元氣本然之妙乾乾不息者也晝夜循環於臟腑肢體關竅間若天行之健而未始或息停者也細思此方雖用人參白朮補氣為君而又以滲濕消痰之茯苓半夏為臣更以開滯疏壅之枳實山楂陳皮厚朴木香砂仁黃連神麯穀芽為佐使名為大補而實無有所謂大補之藥為使脾胃通調胸膈和利能飲能啖不失其常降濁升清時靡有間旋推以陳旋致以新助彼乾乾不息之妙而已矣雖無所謂大補之藥而大補之理實具焉以故每施之脾胃氣衰之人為脹為腫為痞為痰為久瘧久痢與高年百損産後諸虛而不克加餐等病屢獲奇效不然則山楂枳實厚朴陳皮等藥耗元氣者也曷有補於人哉一宦者以積勞後間發往來之熱漸至形神枯槁懶於動止飲食日損不知味纍月矣醫作脾虛治用補中歸脾參苓散大補脾丸等藥皆罔效余視之六脈澀且濡而尺為甚此腎氣虛而脾無所稟也治當於兩腎中培化源之本則脾始充而病斯已矣用紫河車一具為君熟地二兩為臣杜仲生萸肉破故紙山藥芡實各一兩茯苓益智砂仁青鹽各八錢為佐使即以河車地黃二味酒煮搗丸如桐子大服不逾月而形氣飲啖俱如初蓋急欲下達以固腎而救脾故不但用辛能潤腎之砂仁為嚮導而又加咸能下降之青鹽為直入之兵毫不敢雜他臟之藥以分其勢若加入參朮勢必顧戀中州而下行之力反緩安能直入腎以培土而捷效乎或問勞瘵痰嗽治以二冬二母款冬紫荊菀之屬十九不效者何也曰勞瘵痰嗽非肺病也原於先天腎陰虧敗不能制火火無所畏亢而刑金金極則鳴耳此謂水泛為痰之嗽非風痰熱痰痰飲痰涎諸症可比法當峻補真陰佐以味鹹下降之品徐徐引之歸元始為善法然則補陰下降之物其孰為優則惟童便一味為上藥耳童便味鹹性溫溫可養元氣咸則歸腎速而引火下行實人身中之氣血藥也用治本元虧損之病則同氣有情而易入褚氏謂服寒涼者百不一生服溲便者百不一死良以此也一人年三十餘積病而多欲遂起熱兼旬無盜汗六脈飲食不減此勞症之微而未深者也正與養血滋陰治法相合藥用生地三錢醋炙鱉甲二錢知母當歸柴胡丹皮山萸肉各一錢黃芩六分煎服六劑而熱平隨灸百勞膏肓二穴以杜其根更以河車丸與之調理不百日形氣飲食脈候俱如初而愈葛可久曰勞症最為難治當治於微病之時莫治於已病之後今此病正當微發之時故能取效於旦夕間耳若不早為之治必至乾咳聲嘶肌消腸滑脈來細數而莫能挽回矣患此者不可不防微而杜漸也昔王好古論人參曰肺熱用之則傷肺王節齊論人參曰陰血虛血證忌服服之過多必不治余深味之皆千古不可移易之繩墨何後之妄議其非者紛然耶是豈詞不足以發其理而人莫之解歟非也唱和成風耳熱心痼遂不復有揭其理而正其誤者謂非吾道之一大不幸哉夫所謂肺熱者即陰虛之肺熱也所謂陰虛者即陰虛也蓋肺熱謂陽獨盛陰虛謂陰獨虛則陰獨虛不足以化陽為火熾火則爍金而咳血咯血干嗽聲嘶諸肺熱之候所從出矣此症有陽無陰之病治當曲盡養陰之法以化陽而救熱遽用人參助其陽氣則肺愈熱而陰愈虛嗽喘痰血不愈甚乎此兩先生所以諄諄垂戒也藜按方書於虛勞症無不執陽生陰長之說主用參耆然投之陰虛火旺之軀無不輒敗想諸老於此等病症皆付之不治之列故未嘗躬親閲歷細心體驗也理虛元鑑獨持清金保肺之諭可稱卓見然其用藥亦斥節齊為繆論實不免隨聲附和之失裴公此諭與歸重脾胃一著皆治虛勞之要法具見高出前人遠甚學者不可不細參也原文反復辨論其說甚詳然精意已在於此故節之虛勞病惟於起初時急急早灸膏肓等穴為上策外此則絶房室息妄想戒惱怒慎起居節飲食以助火攻之不逮一或稍遲脈旋增數雖有良工莫可為矣至於藥餌則貴專而少不貴泛而多萬不可漫聽名流積月窮年不廢潤肺滋陰之藥蓋此等藥其名雖美釀禍極深不可不知不可不慎凡勞心勞力之人須時時偷閒歇息以保既耗之元氣蓋氣根於息息調則氣調氣調則一身之中無不流通四達百脈安和神情清泰雖勞不甚苦人矣調息之法端默靜坐隨境澄心口目俱閉上於鼻中徐呼徐吸任其自然勿得作意思維若著力太重反使本來不息之真窒而不利此治虛勞之妙法仿而行之無有不驗勝於藥餌多矣凡用補藥必先瀉邪邪去則補藥得力譬之滌衣先除垢膩而後粉飾可加耳若專事補而不知邪氣之當瀉補必為害此用藥之真訣凡病皆然而勞症尤為切要虛勞病未嘗非陰血虛也雖聖人復起亦未嘗不謂陰血虛也是則生熟地黃當歸知母元參天冬麥冬諸藥豈曰無功舉世遵而行之豈曰不可但此等之藥既寒涼又濡潤在脾胃既衰水穀未減之時用此治標則可若多服久服未有不使脾胃生化之源而為卻谷減餐者矣經曰血乃水穀之精生化於脾又曰脾為至陰人之陰虛乃脾虛也脾土一虛則生化之源竭何能運行水穀而成陰血乎故進滋補之藥者當時時以飲食進退為消息但見飲食減少咳嗽熾盛急思調和脾胃兼行氣清金等藥有司命之責者豈可專執而不知變通哉有客過而問余曰一大病久虛人容顏黃瘁飲食減少兩足浮腫已經年歲氣血下陷無疑矣速進補中益氣湯反肋滿胸膨嘔穢不能食則奈何余曰據子所言是誠氣虛下陷之病然古人立教言有盡而意無窮雖不足者補之而不足之中未始不兼有餘之病於此而漫補焉則不足者未補而有餘者必熾矣雖然下陷者清升而清氣下陷者未必絶無濁氣之在上於此而漫升焉則清氣未升而濁氣已先橫矣子之所以用升補而反劇者大率近是客曰何以知其不足中之有餘清氣上之濁氣乎曰以證知之夫證之見於外者如惡膨滿痰嗽喉痛腹痛作瀉與飲食有妨之類是也此即所謂有餘之病兼在上之濁氣也升補之法便須酌量而施之然此乃見症之顯者更有症雖見而實隱尤為難察如本不噁心而胸中則時懊憹本不膨脹而肋間隱刺痛本不痰嗽喉痛而偶然似哽似噎本不作痛作瀉而大便不時至欲解不解本不妨飲食而亦時有厭飫而難安如此等症亦即有餘之病兼在上之濁氣也升補之藥便須酌量而後施非用心精而晰理密者不能也故用補中益氣湯必審之當而察之詳始用之無弊矣此段審症最為精細凡脾胃之症如此推求非專為補中益氣湯言也勞瘵江陰萬融病勞四體如焚寒熱煩躁一夜夢一人腹擁一月光明使人心骨皆寒及寐而孫元規使遺藥服之遂平叩之則明月丹也乃悟所夢方用兔矢四十九粒硇砂如兔矢大四十九粒為末生蜜丸梧子大月望前以水浸甘草一夜五更初取汁送下七丸有蟲下急鉗入油鍋內煎殺不下再服無不愈者沈存中良方本草綱目一貴婦病瘵得神傳膏方乃剪草一味每用一斤淨洗曬乾為末入生蜜二斤和為膏以器盛之忌鐵一日一蒸九蒸乃止病人五更起面東坐不得言語以匙抄藥四匙服之良久以稀粟米粥飲下之藥只冷服米飲亦勿大熱或吐或否不妨如久病肺損咯血只一服愈尋常嗽血妄行每服一匙可也既而九日藥成前一夕病者夢人戒令翌日勿亂服藥次日將服藥屋上土墜器中不可用又合成將服藥覆器又不得服再合未就而人卒矣此藥之異有如此若小小血妄行只一啜而愈也此藥絶妙而世失傳惜哉同上阿魏散治骨蒸傳尸勞寒熱羸弱喘嗽方亦載續夷堅志阿魏三錢研青蒿一握細切向東桃枝一握細銼甘草如病人中指許大男左女右童便三升半先以童便隔夜浸藥明早煎一大升空心溫服服時分為三次次服調檳榔末三錢如人行十里許時再一服丈夫病用婦人煎婦人病用丈夫煎合藥時忌孝子孕婦病人及腥穢之物勿令雞犬見服藥後忌油膩濕面諸冷硬物服一二劑即吐出蟲或泄瀉更不須服余半若未吐利即當盡服之或吐或利出蟲皆加人發馬尾之狀病瘥即吐利後虛羸魂魄不安以茯苓湯補之茯苓茯神各一錢人參三錢遠志去心三錢龍骨二錢防風二錢甘草三錢麥冬去心四錢犀角五錢銼為末生乾地黃四錢大棗七枚水二大升煎八分分三服溫下如人行五里許時更一服謹避風寒若未安隔一日再作一劑以上二方須連服之居易録水邱先生歌訣水邱道人年一百煉得龍精並虎魄流傳此法在人間聊向三天助陰德扶危起困莫蹉跎此藥於人有效多不問陰陽與冷熱先將脾胃與安和脾經虛冷易生風最是難將冷藥攻閉卻大便並上氣為多厚朴與蓯蓉此法精關兩道方病人入口便知良但須仔細看形候莫向陰中錯用陽涕唾稠黏小便赤乾枯四體無筋力烏龍膏子二十圓便是枯焦得甘滴遺精夢泄腹膨高咳嗽陰熱為患勞此病是陰須識認便當急下玉龍膏嗽里痰涎仰臥難陰陽交併候多端卻須兼服訶黎散治取根源病自安準繩薛立齊治一婦人素勤苦因喪子飲食少思忽吐血甚多而自止此後每勞則吐數口瘵症已具形體甚倦午前以補中益氣午後以歸脾湯送地黃丸而愈一女子患前症反其唇視有白點此蟲蝕肺也薛云急尋獺肺治之不信果咳膿而歿後聞其弟兄三人皆夭於此症大凡久嗽當視其兩唇最易曉若上唇有點蟲蝕上部下唇有點蟲蝕下部陳自明云昔人一女久病勞瘵為尺蟲所噬磨服神仙追毒丸一粒吐下小蟲甚多更服蘇合丸遂愈方見蠱症門陳又云一家患傳尸勞兄弟五人已死者三人有方士令服神仙太乙丹者遂各進一錠一下惡物如膿狀一下死蟲如蛾形俱獲生其人以此藥廣濟尸症無不驗者余嘗用治一切雜病及瘡疽等毒未成膿甚效其已成膿者亦能殺其大勢考其藥品雖不言補令羸瘦之人服之並效誠神劑也然以價計之用銀三錢藥有七十二錠可救七十人有力之家合以濟人近人制此往往加以硃砂雄黃考之諸書並無此說雜入恐反亂其真也識者當自知之方見蠱門孫文垣治程道吾婦夜為夢魔所驚時常暈厥精神恍惚一日三五發咳嗽面青常不思穀食日惟啖牛肉脯數塊屢治無效或謂寒痰作厥與附子肉桂厥益甚診之左脈弦右脈滑兩寸稍短道吾先娶二妻皆卒於瘵知其為傳尸瘵症也不易治乃權以壯神補養之劑消息調理俟胃氣轉始可用正治之法人參茯苓柏子仁石菖蒲遠志丹參當歸石斛以補養神氣陳皮貝母甘草紫菀化痰治嗽服半月無進退乃為制太上渾元丹用紫河車一具辰砂鱉甲犀角各一兩鹿角膠紫石英石斛各八錢沉香乳香安息香茯神紫菀牛膝人參各五錢麝香五分煉蜜為丸赤豆大每早晚鹽湯或酒送下三十六丸又制霹靂出獵丹用牛黃狗寶阿魏安息香各一錢虎頭骨五錢喙木鳥一隻獺爪一枚敗鼓心破皮三錢麝香五分天靈蓋一個酥煉蜜為丸雄黃三錢為衣每五更空心蔥白湯送下五分三五日服一次與太上渾元丹相兼服才半月精神頓異不似前時恍惚矣但小腹左邊有一點疼前煎藥中加白芍一錢服一月精神大好暈厥不作矣次年生一女俞東扶曰此較袁州道士所授方更奇蓋彼專於殺蟲此則殺蟲而兼穿經透絡搜邪補虛也張路玉曰胡又曾患虛勞吐血一夕吐出守宮狀者一條頭足宛然色如櫻桃不祟朝而斃柴嶼青治宗室某子十五歲咳嗽吐痰兩脈細數陰虧已極辭不治強開一方後屢邀青以為服藥漸愈飲食加增不得已再往而脈如故決其必不能起果然勞損病已不可為服藥得法往往得驟驗乃虛陽暫伏也數服後症皆仍舊矣臨症者不可不知張三錫曰常見氣弱者往往生子多羸或母病陰虛稟來已弱加以過勞及鑿竅太早斫喪天真遂成陰虛咳嗽吐血骨蒸非染也曾見一家五人悉患此病已殞其三家中競覓尸蟲藥豫以丹溪法大補氣血使陽旺生陰繼以大造丸二人俱無恙貴公在蜀作宣撫甚祕寶此法以膏肓之疾藥不能及熏之即效此方治咳嗽發骨蒸不已好雄黃三錢半茜草二錢款冬花二錢元參三錢百部三錢艾葉一錢雷丸厚朴為末以香爐有蓋者封固止留一小孔出煙患人以紙塞鼻以口吸其煙久則飲少清米飲日三次蟲死嗽愈一方加百部蕪荑仁蘇木熔黃蠟和攤紙上葉餘慶字元善平江人自云嘗瘵疾其居對橋而行病不能度有僧為之灸膏肓穴得百壯後二日即能行數里登降皆不倦自是康強其取穴法但並足垂手正身直立勿令俯仰取第七椎下兩旁同身寸各三寸灸時以軟物枕頭覆面臥垂手附身或臨時置身取安便而已葉轉為人灸亦用此法云針灸四書有人傳尸勞瘵寒熱交攻久嗽咯血日見羸瘦先以三物湯蓮心散煎萬不失一同上昔人嘗與勞病婦人交婦人死遂得疾遇人云勞氣已入臟急令服神授散二斤其病當去如其言服之幾盡大便出一蟲狀如蛇遂安續有人服之獲安濟者多矣其法用川椒二斤擇去子併合口者炒出汗上為末每服三錢空心米湯調下須暈悶少頃如不禁即以酒糊為丸如梧子大空心服三十丸危氏方李士材診許氏女吐血痰嗽六月診之兩寸如爛綿兩尺大而數曰金以火為仇肺不浮澀反得洪大賊脈見矣秋令可憂八月五日復診肺之洪者變而為細數腎之軟者變為疾徑日歲在戊午少陰司天兩尺不應今尺當不應而反大寸當大而反沉細尺寸反者死肺至懸絶十二日死計其期當死於十六日然能食過期況十六十七二日皆金未遽絶也十八日交寒露又值火日經云太陰氣絶丙日篤丁日死言火日也寅時乃氣血注肺之時不能注則絶必死於十八日寅時矣病家以其能食猶不肯信果於十八日未曉而終徐書記有室女病似勞醫僧發靖診曰二寸脈微伏是憂思隔氣而勞請示病實庶治之無誤徐曰女子夢吞蛇漸成此病發靖謂蛇在腹中用藥轉下小蛇其疾遂愈靖密言非蛇病也因夢蛇憂過感疾當治意而不治病其蛇亦非臟腑出吾亦未嘗轉藥也名醫録又醫說續編傅青主醫甚神有苦勞瘵者教之運氣不三日而可劉氏紹攽九疇古文晉平有病求醫於秦秦伯使醫視之曰疾不可為是謂近女室疾如蠱非鬼非食或以喪志良臣將死天命不佑公曰女不可近乎對曰節之淫蠱六疾六氣日陰陽風雨晦明也分為四時序為五節過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陰物而晦時淫則內熱惑蠱之疾今君不節不時能無及此乎蔡仍子因之妻九院王家女也忽患瘵疾沉綿數年既死已就小斂時上皇宮中聞之惜其不早以陷冰丹賜之今雖已死試令救之因命中使馳賜一粒時氣息已絶乃強灌之須臾遂活數日後而安但齒皆焦落後十五年方死張邦基墨莊漫録吳洋治汪伯玉父妾病瘵汗淫而渴骨蒸而內爍其肌膚洋以人參白虎湯飲之病減半曰此胃燥也急治其標自今宜主補中毋以悍劑歲至乃可刈其根耳越二載中氣復出驅蟲下蟯蟯黝而殷長尺有咫太函集吳橋治吳氏婦瘵三年鄰家有事庖廚相去百步必先言食品乃求食其母憐之日饋一雞飼之橋曰此傳尸蟲下之便家人曰凡死於是者七人矣願除之飲藥三日腹甚痛下二蟯尺有咫大如箸赤首黝背頳腹狀如玳瑁然七日乃下七蟯其後者差小爾蟯既下婦不復求食母餉之雞則以餉之御人其母叱御人攘吾女而自啖也卒強之食遂作瀉而終然其家故病傳尸迄今無患矣太函集方大激故病瘵且成賴橋而治既病食痹幾殆亦復賴橋會橋出疆其人不戒而病作虛火中痞恃粥而啜二三碗陰火上騰自湧泉起喉喑咳血盜汗夢遺舉身潮熱而羸泄瀉不止橋歸復診之六脈沉數而弦蟲內蝕爾下之得群蟯皆異狀並去癥瘕尋愈理虛元鑑曰虛症之因有六一曰先天之因受氣之初父母或年已衰老或乘勞入房或病後入房或妊娠失調或色欲過度此皆精血不旺致令生子夭弱故有生來五臟之氣先有不足之處至二十左右易成勞怯然其機兆必有先見或幼多驚風骨軟行遲稍長讀書不能出聲或作字動輒手振或喉中痰多或胸中氣滯或頭搖目瞬此皆先天不足之徵宜調護於未病之先或預服補藥或節養心力未可以其無寒無熱能飲能食而恃為無懼也即其病初起亦不過精神倦怠短氣少力五心煩熱而已豈知其危困即在目前哉二曰後天之因或色欲傷腎或勞神傷心或屈怒傷肝或憂愁傷肺或思慮傷脾先傷其氣者氣傷必及於精先傷其精者精傷必及於氣或發於十五六歲或二十左右或三十上下病發雖不一而理則同也三曰痘疹及病後之因痘乃先天陰毒疹乃先天陽毒故痘宜益氣補中則陰毒之發也淨而終身少脾病疹宜清散養榮則陽毒之發也徹而終身少肺病調治失宜多貽後患故凡後此脾泄胃弱腹痛氣短神瘁精虧色白足痿種種氣弱陽衰之症皆由痘失於補也凡肺氣哮喘音啞聲嘶易致傷風咳嗽等類種種陰虧血枯之症皆由疹失於清也至於病後元虧或勞動以傷其氣或縱欲以竭其精頃刻之間五臟齊損多至不救尤宜慎之四曰外感之因語云傷風不醒便成勞若元氣有餘者自能逼邪外出或腎素厚水能救母或素無屈火屈熱則肺金不至猝傷若此者不過為傷風咳嗽而已若其人或酒色無度或心血過傷或肝火易動陰血素虧肺有伏火一傷於風火因風動則勞嗽之症作矣蓋肺主皮毛肺氣便逆而作嗽嗽久不已提起伏火上乘於金則水精不布腎源已竭且久嗽失氣不能下接於腎水子不能救金母則勞嗽成矣五曰境遇之因蓋七情不損則五勞不成惟是真正解脫方能達觀無損外此鮮有不受病者從來孤臣泣血孽子椎心遠客有異鄉之悲閨婦有徵人之怨或富貴而驕佚滋甚或貧賤而窮迫難堪皆能亂人情志傷人氣血醫者未詳五臟先審七情未究五勞先調五志相其機而拯其弊是不能全恃乎藥餌矣六曰醫藥之罔或病非感冒而重用發散或稍有停滯而妄用削伐或並無裡熱而概用苦寒或弱體侵邪未經宣發而漫用固表滋里遂致邪熱膠固永不得解凡此能使假者成真輕者變重所宜深辨也心主血而藏神腎主志而藏精以先天生成之體論則精生氣氣生神以後天運用之主宰論則神役氣氣役精精氣神養生家謂之三寶治之原不相離故於滑精夢泄種種精病者必本於神治於怔忡驚悸種種神病者必本於氣治蓋安精必益其氣益氣必補其精虛勞初起多由於心腎不交或夢泄滑精體倦骨痿健忘怔忡或心脾少血肝膽動焰上熱下厥種種諸症但未至傷肺終成蒸熱者可用養心丸或歸脾丸主之其養心丸內以石蓮肉桂交心腎於頃刻歸脾丸以龍眼木香甘溫辛熱之品直達心脾主補中而生血故凡火未至於乘金補火亦是生土之妙用而何慮乎溫熱之不可從治也哉若夫陰劇陽亢木火乘時心火肆炎上之令相火舉燎原之焰肺失降下之權腎鮮長流之用氣高而喘咳嗽頻仍天突火燃喉中作癢咯咽不能嗽久失氣氣不納于丹田真水無以制火於是濕挾熱而痰滯中焦火載血而厥逆清竅伏火射其肺系則能坐而不能臥膈痰滯於胃絡則能左而不能右斯時急宜清金補肺以宣清肅之令平肝緩火以安君相之炎培土調中以奠生金之母滋陰補腎遏陽光之焰一以中和為治補其虛戢其焰鎮其泛定其亂解其爭制其過潤其燥疏其淹收其耗散庶有濟也若執補火之說用辛熱之品與彼寒涼傷中者異病而同治豈不殆哉
