body:
  text: 卷十癥瘕附痃癖陳自明治昆陵一貴宦妻患小便不通臍腹脹痛不可忍衆醫皆作淋治如八正散之類俱不得通陳診之曰此血瘕也非瞑眩藥不可去與桃仁煎更初服至日午大痛不可忍遂臥少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥治病的切然猛烈大峻氣虛血弱者宜斟酌之桃仁大黃朴硝各一兩虻蟲半兩炒黑共為末醋煉丸梧桐子大五更初溫酒吞下五丸原注此方不可妄用良方杜壬治馬氏婦年三十二腹中血塊作疼經五六年形已骨立衆皆曰不可為奈其未死何家甚貧而大小憫之一日召杜至告杜曰但以濟物為懷則可業已請召明醫非所言也遂以少物帛贈杜杜不受曰但服某藥必獲安無以是為疑遂示方用沒藥牛膝乾漆當歸各半兩硇砂木香水蛭炒紅娘子炒紅花丹皮硃砂各一分海馬一個斑蝥去翅足炒十四個為末酒醋各半升熬為膏每日天明用一皂子大酒醋化下一月病退六十日漸安此藥較桃仁湯更峻宜斟酌用之陳藏器曰昔有患痃癖者夢人教每日食大蒜三顆初食遂致瞑眩吐逆下部如火後有人教取數瓣合皮截卻兩頭吞之名曰內炙果獲大效本草綱目張景嶽治面停小腸右角與此意同張子和治汴梁曹大使女年既笄病血瘕數年太醫宜企賢以破血等藥治之不愈企賢曰除得陳州張戴人方愈一曰戴人至汴京曹乃邀問焉戴人曰小腸移熱於大腸為伏瘕故結硬如塊面黃不食乃用湧泄之法數年之疾不再旬而愈柴嶼青乾隆己未寓瀋陽京兆署兵房吏王某患症疾教以蒸臍法治之兼服加減五積散而愈其妻母同患是症王即照方遺之亦痊孫文垣治汪氏婦經水久不止內有紫黑色血塊胃胸腹皆痛玉戶且腫手足皆冷不知飢餓腹下有一塊堅如石脈左數右沉澀此血瘕症也用糖球子五錢元胡索五靈脂香附麥芽青皮各一錢水煎服痛減半手足漸溫加當歸丹皮蒲黃益母川芎四帖痛止玉戶亦消又四帖而經水調方甚平穩張子和治一童子入門狀如鞠躬而行張曰此痃氣也令解衣揣之二道如臂其家求療先刺其左如刺重紙剝然有聲而令按摩之立軟其右亦然觀者嗟異或問之曰石關穴也永康應童嬰腹疾恆病瘻行久不伸松陽周漢卿解裳視之氣衝起腹間者二其大如臂漢卿刺其一魄然鳴又刺其一亦如之稍按摩之氣血盡解平趨無留行續大粹武叔卿曰夫痃癖癥瘕血氣塊硬發歇刺痛甚則欲死究而言之皆血之所為陳良甫常治一婦人血氣刺痛極不可忍甚而死一二日方省醫巫並治數年不愈僕以蔥白散烏雞丸遂安陳良甫治一婦人血氣作楚如一小盤樣走注刺痛要一人扶定方少止亦用此一二藥而愈尋常小小血氣用此二藥亦有奇效濟陰綱目陳良甫治婦人病血氣作楚痛不可忍服諸藥無效召診之曰關脈弱沉而肝脈沉緊此血氣漸成痃癖也亦只以前二方治之而愈又四明馬朝奉後院亦病此用二方治之亦愈同上宋孝武路太后病衆醫不識徐文伯診之曰此石博小腹耳乃為水濟消石湯病即愈南史董含妾腹內生一痞始如彈丸五六年後大類鵝卵中似有一窟往來移動或痛或止百藥罔效久之遍體發腫內作水聲日夕呻吟死而復蘇者再諸醫束手無策皆云此名水鼓病已成不可復痊矣章文學旭字東生名醫也善治奇疾往邀之曰此非水症乃積聚所致不半日可愈但所用藥猛烈轉鬥而下驅水甚疾試問疾人願服與否而病者曰我已垂殆苟一錢可救死無憾也於是取紅丸十粒如緑豆大以檳榔枳實等五六味煎湯下之初覺喉中響聲可畏勢將不支頃之胸膈間如刀刃亂刺哀號轉擲痛不可狀又頃之下水斗許頭面腫退不逾時又下數升腹背亦退病人曰我今覺胸背頓寬遂熟睡片刻時章君猶在坐也曰此番不獨水去痞亦當漸散矣進補劑二日明後日可連服之遂辭去至晚又下水四五升手足腫全退不三日病全愈既而忽痞勢搖動下紅黑痢三晝夜痞亦不見衆醫驚服往叩其故章曰此名腸覃在內經水脹論中君輩自坐不讀書耳皆慚而退按歧伯曰寒氣客於腸外與胃氣相搏癖而內著瘜肉乃生始如雞卵至其成若懷子之狀按之則堅推之則移月事以時下腸覃生於腸外故也又有一種名石瘕病狀相同月事不以時下石瘕生於胞中故也皆婦人之病因有積聚可導而下似水脹而非水脹也臨症之工大宜分別此疾若非章君久作泉下之鬼矣今人能感激如是者鮮矣三岡識略一男子腸鳴食少臍下有塊耕動若得下氣多乃已已而復鳴屢用疏氣降火藥半年不愈乃以理中湯為君佐芩連枳實一服腸鳴止又每服吞厚朴紅豆蔻丸其氣耕亦平矣薛立齋治一婦人經不調兩拗腫脹小便澀滯腹中一塊作痛或上攻脅腹或下攻小腹發熱晡熱惡寒肌膚消瘦飲食無味殊類瘵症久而不愈此肝脾血氣虧損用八珍湯逍遙散歸脾湯隨症互服而愈一婦人性多鬱怒勤於女工小腹內結一塊或作痛或痞悶月經不調恪服伐脾之劑今人受此害者尤多內熱寒熱胸膈不利飲食不甘形體日瘦牙齦蝕爛此脾土不能生肺金肺金不能生腎水腎水不能生肝木當滋化原用補中益氣六味地黃至仲春而愈必舉仲春者以肝木斯令時也松江太守何恭人性善怒腹結一塊年餘上齶蝕透血氣虛極時季冬肝脈洪數按之弦緊餘脈微弱或用伐肝木清胃火之藥薛曰真氣虛而邪氣實也恐伐肝木至春不發生耳用八珍湯以生氣血用地黃丸以滋腎水肝脈頓退因大怒耳內出血肝脈仍大煩熱作渴此無根之火也仍以前藥加肉桂二劑脈斂熱退復大怒果卒於季冬辛巳日乃以金剋木故也一婦人耳下腫赤寒熱口苦月經不調小腹內一塊此肝火氣滯而血凝也用小柴胡加山梔川芎丹皮治之諸症悉退潤州某公補劑中多用敗龜板垂十年頗健晚患蠱膈乃謁白飛霞飛霞診視良久曰此瘕也公豈餌龜板藥耶今滿腹皆龜吾藥能逐之其骨節腠理者非吾藥所能也乃與赤丸如粒服之下龜如菽大者升余得稍寬不數月死易簀時驗小遺悉有細蟲倣佛龜形物得氣而傳如此可不慎哉周櫟圖書影黃山畢公服膃肭臍初頗有驗久之得沙淋疾沙皆作犬形頭尾略具同上陳自明治一婦人腹內結塊久而不消與神仙追毒丸一粒即痊方見蠱門陳自明云豫族子婦病腹中大塊如杯每發則痛不可忍時子婦已貴京下善醫者悉診治莫能愈豫應之曰此血瘕也投黑神丸盡三丸塊氣盡消終身不復作良方醫説續編孫俟居比部病腹中若有癥瘕不食不眠煩悶身熱仲淳投以人參白芍茯苓麥冬木通棗仁石斛方甫具史鶴亭太史至見方中有大劑人參駭曰向因投參至劇此得無謬乎仲淳曰病勢先後不同當時邪未退滯未消故不宜今病久飽脹煩悶者氣不歸元也不食者脾元虛也不眠而煩者內熱津液少也今宜亟用此藥矣四劑而瘳後復病仲淳診之曰此陰虛也非前症矣更以麥冬白芍枸杞五味生地車前而熱遂退廣筆記痞立齋治黃恭人腹內一塊不時作痛痛則人事不知良久方蘇諸藥不應診其脈沉細則非瘡毒河間云失笑散五靈脂蒲黃等分為末醋湯調每服二錢治疝氣及婦人血氣痛欲死並效與一服痛去六七再服而平此藥治産後心腹絞痛及兒枕痛尤妙錢國賓治陳小山妻年三十二歲痞成形狀宛如鯽魚長五寸闊寸許頭尾口牙悉具漸漸遊行穿腸透膜上近喉邊下近穀道飲血咬肝聲呼痛楚形神狼狽其脈強牽尚有胃氣可治先以古方五味紫金錠磨服止痛次以煅刀豆殼一兩為君以此豆能殺痞也乳香沒藥定痛活血麝香通竅木香順氣調以砂糖作餌痞受毒藥旬日內伏不動月餘而化便出如蜆肉一堆以四物參朮枸杞香附調理百日全安張文潛藥戒云張子病痞積於中者伏而不能下自外至者捍而不能納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而又不支焦膈導達呼吸開利快然若未始疾者不數日痞復作以故藥其快然也亦如初自是逾月而痞五作五下輒下每愈然張子之氣一語而三引體不勞而汗股不步而栗膚革無所耗於外而其中薾然莫知所自來聞楚之南有良醫焉往而問之醫嘆曰子無嘆是薾然者也天下之理其甚快於余心者其未必有所傷求無傷於終身者則初無快於吾心痞橫於胸中其纍大矣擊而去之不須臾而除甚大之纍和平之物不能為也必將擊搏震撓而後可其攻未成而和平已病則子之痞凡一快者子之和一傷矣不終日而快者五則和平之氣不既索乎且將去子之痞而無害其和乎子歸燕居三月而後豫之藥可為也張子歸三月而後請之醫曰子之氣少全矣取藥而授之三日而疾少平又三日而少康終年而復常且飲藥不得亟進張子歸而行其説其初使人悶然遲之蓋三投其藥而三反之也然日不見其所攻久較則月異而時不同蓋終歲而疾平容齋五筆張子和治息城司侯聞父死於賊乃大悲哭之罷便覺心痛日增不已月餘成塊狀若杯覆而大痛不住藥無功議用燔針炷艾病人患之乃求於張張至適巫者坐其旁乃學巫者雜以狂言以謔疾者至是大笑不可忍回面向壁一二日心下結塊皆散張曰內經言憂則氣結喜則百脈舒又曰喜勝悲內經亦有此法治之不知何用針灸哉適足增其痛耳妙人妙想觸機即應故古今真能治疾者子和一人而已劉子平妻腹中有塊如瓢十八年矣經水斷絶諸法無措張令一月之內湧四次下六次所去痰約一二桶其中不化之物有如葵菜爛魚腸之狀湧時以木如意揃之覺病稍如刮漸漸如平及積之盡塊反窪如臼略無少損至是面有童色經水既行若當年少可以有子張主簿妻病肥氣初如酒杯大發寒熱十五年餘後因性急悲盛病益甚惟心下三指許無病滿腹如石片不能坐臥針灸匝矣徒勞力耳張曰此肥氣也得之季夏戊己日在左脅下如覆杯久不愈令人發痎瘧痎瘧者寒熱也以瓜蒂散吐之如魚腥黃涎約一二缶至夜令用舟車丸通經散投之五更黃涎濃水相半五六行凡有積處皆覺痛後用白朮散當歸散和血流經之藥如斯湧泄凡三四次方愈山東顏先生有積二十年目視物不真細字不睹當心如頑石每發痛不可忍食減肉消黑皯滿面腰不能直因遇張令湧寒痰一大盆如片粉夜以舟車丸通經散下爛魚腸葵菜汁七八行病十去三四以熱漿粥投之復去痰一盆次日又以舟車丸通經散前後約一百餘行略無少困不五六日面紅皯去食進目明心中空曠遂失頑石所在旬日外來謝杜弓匠子婦年三十有孕已歲半矣每發痛則召侍媼侍之以為將産也一二日復故凡數次張診其脈澀而小斷之曰塊病也非孕也脈訣所謂澀脈如刀刮竹形主丈夫傷精女人敗血治法有病當瀉之先以舟車丸百餘粒後以調胃承氣湯加當歸桃仁用河水煎乘熱投之三日後又以舟車丸桃仁承氣湯瀉出膿血雜然而下每更衣以手向下推之揉之則出後三二日又用舟車丸以豬腎散佐之一二日又以舟車丸通經散如前數服病去十九俟晴明當未食時以針瀉三陰交穴不再旬已消矣孫主簿季述之母久患胸中痞急不得喘息按之則脈數且澀曰胸痹也因與仲景三物小陷胸湯一劑知三劑愈醫學綱目龔子才治吳仰泉堅年五旬患腹中積塊如盤大年餘漸臥不倒腹響如雷噯氣不透口乾吐白沫下氣通則少寬五心煩熱不思飲食肌瘦如柴屢治無效診之六脈澀亂數氣口緊盛知為寒涼克伐之過使真氣不運而瘀血不行與八珍湯加半夏陳皮木香厚朴萊蔔子大腹皮海金沙三劑小便下血如雞肝狀至十二劑下黑血塊盆許腹中仍有數塊仍以八珍湯加枳實香附五劑而痊一婦人年近三十患腹左脅有一大塊堅硬如石有時痛肚腹膨脹經水不調白帶頻下夜熱脈急數以千金化鐵丸一料塊消即孕生一女此方疑龔杜撰四物之外一派破血行氣而已李河山患腹左一塊數年不愈後食柿餅過多腹脹滿悶診之六脈洪數氣口緊盛以藿香正氣丸加山楂神麯二劑而愈逾月又因飲食失節腹脹如初用前藥勿效與行濕補氣養血湯二十餘劑始安因囑曰病雖愈體未復元務宜謹守勿犯禁忌後數月過龔曰凡有病者皆天與也不在服藥謹守若顏子亞聖豈不能保養何短命死矣我今保養半年未見何如從可知也龔不能對遂復恣縱無忌未旬日忽患痢赤白裡急後重痛不可忍日夜無度乃自置大黃一劑數下無效復求診六脈洪數先與調中益氣湯二劑又以補中益氣湯加白芍黃連微效彼欲速愈易醫不審其夙有痞滿之病復下之不愈又易一醫再與下藥遂肛門下脫痛如刀割腹脹如鼓此元氣下陷也當大補升提而反瀉之不亡何待此症濕熱內蘊兼有積滯因柿餅之寒滯故為脹滿藿香正氣能燥濕行氣故遂愈然病根未拔故傷食而復病繼用湯藥想即藿香正氣之類去濕而不能去熱故不效行濕補氣養血湯又加以血藥益濕之品雖遷延而愈非真愈也始終治法均未中肯若早以黃連理中枳實理中更互治之病必速愈何至有變痢之患乎陸養愚治茅鹿門三夫人經期參前腹中有塊升動有時作痛作脹大便不實脾胃不和其脈人迎大於氣口二倍以此斷為血有餘茅問曰此症屢服消導及養血之藥輕則枳實枳殼木香豆仁重則檳榔稜莪俱以養血佐之藥頗中和而病反增劇何也曰據脈左盛於右氣不足而血有餘今所服不惟誅伐無過且損不足而益有餘欲其病之不劇得乎用人參白朮陳皮乾薑大棗以益其氣用消痞丸以去其血之瘀其方用香附醋炒四兩元胡索醋炒一兩五錢歸尾二兩川芎紅花桃仁海石瓦楞子火煅醋淬各一兩醋打麵糊為丸與煎劑相間服未半料而塊已失大便結實經水如期李士材治於郡守在白下時每酒後腹痛漸至堅硬得食輒痛得食反痛實症無疑脈之浮大而長脾有大積矣然兩尺按之軟不可峻攻令服四君子湯七日投以自制攻積丸三錢但微下更與四錢與服下積十餘次皆黑而韌者察其形不倦又進四錢於是腹大痛而所下甚多服四君子湯十日又進丸藥四錢去積三次又進二錢而積下遂至六七碗許脈大而虛按至關部豁如矣乃以補中益氣調補一月全愈攻補互施法王工部鬱結成痞形堅而痛甚攻之太多遂泄瀉不止一晝夜計下二百餘次一月之間肌體骨立神氣昏亂舌不能言已治木待斃李診之曰在症雖無活理在脈猶有生機以真臟脈不見也大虛之後法當大溫大補一面用枯礬龍骨粟殼樗根之類以固其腸一面用人參二兩熟附五錢以救其氣三日之間服參半斤進附二兩瀉遂減半舌轉能言更以補中益氣加生附生乾薑並五帖為一劑一日飲盡就進藥而論則胃能納受可知如是者一百日精旺食進瀉減十九然每日夜猶下四五行兩足痿廢用仙茅巴戟丁附等為丸參附湯並進計一百四十日而步履如常痞瀉悉愈枯礬雖斂而苦寒何不用禹糧石脂姚氏婦久患痞積兩年之間攻擊之劑無遺用矣而積未盡除形體尫羸李曰積消其半不可伐矣但用補劑元氣一復病自祛耳遂作補丸服畢而痞果全消逾三年調理失宜胸腹痛甚醫以痛無用補法用理氣化痰之劑痛不減脈之大而無力此氣虛也投以歸脾湯加人參二錢其痛乃止喻嘉言治袁聚東年二十歲生痞塊臥床數月進化堅消痞之藥漸至毛瘁肉脫面黧髮捲殊無生理其塊自少腹臍旁分為三岐皆硬如石按之痛不可忍脈只兩尺洪盛余俱微細謂初時塊必不堅以峻猛之藥攻至真氣內亂轉獲邪氣為害其實全是空氣聚成非如女子月經凝而不行即成血塊之比觀兩尺洪盛明是腎氣傳於膀胱誤施攻擊其氣不運結為堅塊故按之則愈痛也虛症亦有按之而愈痛者姑用大補中藥一劑以通中下之氣然後用大劑藥內收腎氣外散膀胱之氣約三劑可全愈矣先以理中湯加附子五分一劑塊減十之三再用桂附一大劑腸中氣向甚喧頃之三塊一時頓沒再服一劑果全愈更用補腎藥加桂附多用河車為丸以善後取其以胞補胞而助膀胱之化源也俞東扶曰此人攻伐太過易以溫補未足為奇惟兩尺洪盛非此詮解誰不面牆至於桂附河車同補腎藥為善後計則與腎氣傳膀胱之論緊切不泛非通套治痞成法可比馮楚瞻治戚氏婦腹中有塊作痛發則攻心欲死上則不進飲食下則泄瀉無度醫藥三百餘劑不效脈之六部沉細已極右關尺似有似無明系火衰土弱腎家虛氣上凌於心脾土不能按納奔豚之氣非溫補不可用炒乾熟地八錢補水以滋土炒黃白朮六錢補土以固中炮薑熟附各二錢補火以生土更入五味子一錢以斂之俾祖氣有歸髒得其藏而腎氣納而不出也數劑而安一月全愈琇按馮公此案前人所未發字字如良玉精金後賢宜三復之吳孚先治一人患痞前醫用攻藥已去六七適前醫他往吳與湯丸俱系參術補劑病者云去疾莫如盡奈何留之吳曰正所以盡去其疾也經曰大積大聚衰其半而止此前醫之用攻也又曰補正則邪自除此余之用補也若必盡攻則痞去而鼓脹成是欲盡去其疾而反益其疾矣乃遵服不間而痊張路玉曰顧晉封室患痞在脅下或令用膏藥加阿魏一分麝香半分貼之五六日間遂下鮮血血塊甚多一二日方止是後每歲當貼膏時必發近鄰嫗亦用阿魏膏貼痞下血如前世以阿魏麝香為痞塊必用之藥外用為患若此況服食乎為拈出以為虛弱人漫用攻擊之戒韓貽豐治咱中翰如穎病數日二旬不食矣已治木韓視之病色如灰聲低喉澀瞳神黯然無光私語其子曰此甚難治病者覺之乃哀懇曰我今年六十七矣即死不為夭但遇神針而不一用而死死且不瞑目我生平好酒而不好色幸為我下一針於是乃勉為用針令臥床坦腹拊其臍下有一痞周圍徑七寸堅硬如石乃以梅花針法重重針之又針其三脘又針其百勞百會皆二十一針針畢令飲醇酒一杯乃搖手曰惡聞酒氣以兩月矣強之初攢眉既而滿引如初顧鳴仲有腹疾近三十年朝寬暮急每發腹脹十餘日方減食麵及房勞其應如響腹左隱隱微高鼓呼吸觸之汩汩有聲以痞塊法治之內攻外貼究莫能療喻嘉言議之曰人身五積六聚心肝脾肺腎之邪結於腹之上下左右及當臍之中者皆高如覆盂者也膽胃大小腸膀胱命門之邪各結於其本位不甚形見者也此症乃腎臟之陰氣聚於膀胱之陽經有似於痞塊耳腎有兩竅左從前通膀胱右從後通命門邪結於腹之左畔即左腎與膀胱為之主也六腑惟膽無輸瀉其五腑受五臟濁氣不能久留即為輸瀉者也今腎邪傳於膀胱膀胱失其輸瀉之職舊邪未行新邪踵至勢必以漸透入募原如革囊裹物者然夫人一圍之腹大小膀胱俱居其中而胞又居膀胱之中惟其不久留而輸瀉是以寬然有餘今腎氣不自收攝悉輸膀胱膀胱之氣蓄而不瀉失其運化宜其脹也治法補腎水而致充足則精氣深藏而膀胱之脹自消補膀胱而令氣旺則腎邪不蓄而輸化之機自裕然補腎易而補膀胱難以本草諸藥多瀉少補也經於膀胱之不足者斷以死期豈非以膀胱愈不足則愈脹脹極勢必逆傳於腎腎脹極勢必逆傳於小腸小腸脹極勢必逆傳於脾乃至通身之氣散漫而無統耶醫者能早見而預圖之能事殫矣楊乘六治朱氏婦病胸膈痞悶兼寒熱往來口乾作渴飲食不進服寬利清解藥益甚脈之右關弦數而沉面色帶紅舌乾微黃乃與益陰地黃湯或曰胸滿不食纍月矣二陳枳殼尚不能通地黃山藥五味萸肉俱酸澀陰滯之物其可投乎曰此症本因肝膽燥火閉伏胃中其原則由於腎水之不足蓋腎者胃之關也水不足則火旺熏蒸而胃陰虧胃與肝膽相併且為其所勝又腎既不足則肝膽陰木無水以養而燥火獨熾於是乘其所勝之虛而入之且衝於上則口乾咽燥流於下則二便祕急塞於中則為胸悶脈浮弦而關更甚右手沉細而關則帶滑此肝木有餘脾血不足之候也與疏肝助脾調氣養血則火降郁開而痰自內消矣用調氣養榮湯加陳皮前胡佐茯苓消痰止嗽青皮香附豆仁白芍疏肝寬腸總之氣得川流則血自津潤數劑後用潤字丸間服每次五分十日症遞減改用六君子改養血調氣藥蓋邪之所湊其氣必虛壯者氣行則愈弱者著而成病也後以純補間用調氣治嗽之品五旬而痊陳三農治一少年體薄弱且咳血左邊一塊不時上攻作痛左金蘆薈俱不應診其脈三部雖平而細澀不流利因作陰虛治四物湯加知柏元參丹參鱉甲數劑頓愈盧縫中去聲痞痰忽夢一白衣婦人謂之曰食蔗即愈詰朝見鬻蔗縫揣囊中且乏一鏹惟有唐山一册遂請易之曰吾乃負販者將安用此哀求之遂貽數挺縫喜而食之至旦遂愈野史琇按本草蔗能治蛔蛔能令人痞脹盧病逮是蛔作楚耳故食之即愈張子和治顯慶公僧應寺有沉積數年雖不臥床枕每於四更後心頭悶硬不能安臥須起行寺中習以為常人莫知為何病以請於張張令湧出涎膠一二升如黑礬水繼出緑水又下膿血數升自爾胸中如失便能飲餌無算安眠至曉一婦人小腹中有塊其脈澀服攻藥後脈見大以四物湯倍白朮白芍甘草為佐俟脈充實間與硝石丸兩月消盡至正二十五年夏六月里人周伯安病積氣在右脅下喘且脹者五閲月醫來類補以溫熱之劑病日劇幾殆矣陸君祥往視之曰是息賁也法當大下內經所謂留者攻之土鬱者奪之也積氣賁門邪未去其可補乎從之不終日而愈強齋集汪石山治一人年逾三十形瘦蒼白病食則胸膈痞悶汗多手肘汗出尤甚多四肢倦怠或麻晚食若遲來早必泄初取其脈浮軟近駛兩關脈乃略大曰此脾虛不足也彼曰嘗服參朮膏胸膈亦覺痞悶恐病不宜於參耆曰膏則稠黏難以行散也改用湯劑痞或愈乎用參耆各二錢白朮錢半歸身八分枳實甘草各五分麥冬二錢煎服一帖上覺胸痞而下覺失氣彼疑參耆使然曰非也使參耆使然但當胸痞不當失氣恐由脾胃過虛莫當枳朴之耗也宜除枳朴加陳皮六分再服一帖頓覺胸痞寬失氣除精神爽塏脈皆軟緩不大亦不駛矣可見脾胃虛者枳朴須慎用為佐使況有參耆歸術為之君尚不能制然則醫之用藥可不戒乎張景嶽治金孝廉以勞倦傷脾別無他症但不食遂用參朮歸附桂薑甘草之屬半月始愈後因病後復不食如此自分必死仍用前藥而安錢國賓治王元直父腹左一痞形如鏡大視之乃鏡痞也生於皮內肉上可治以三品膏巴豆萆麻子肉各四兩杏仁一兩黃丹八兩香油一斤二兩熬膏藥貼二十日一日一換出膿一二碗內服參耆托裡月餘收口而愈蔣仲芳治陳氏婦年二十六生痞塊已十年在臍上月事先期夜則五心發熱火嘈膨悶忽一日痞作聲上行至心下則悶痛欲絶為針上脘癖下而痛定然臍旁動氣不息復針天樞穴動氣少止遂用當歸五錢白芍白朮延胡丹皮川芎條芩各一錢枳實官桂檳榔木香各三分醋炙鱉甲二錢水煎空心服至十二劑而愈聶久吾治劉氏妹稟氣怯弱性情沉鬱年三十病晚間發熱天明覆止飲食少進煩躁不安肉削骨露醫藥不效診其脈歇至因其煩躁發熱頗用芩連知柏等涼劑雖無效亦不覺寒涼第恐多服傷胃則無生機矣因問其熱從何處起曰自右脅一圍先熱遂至遍身乃悟此必氣鬱痰結而成痞塊胸膈壅滯遂燥熱氣結而脈亦結此脈與症合不足憂也當先攻痞以除其根則諸症自愈因用磨痞丸每日服三次服至三四次而塊消其半熱漸退至七八兩塊消熱盡除不數月全安矣當其痰凝氣滯痞結右脅不惟醫者不知而病者亦不覺也非察其病根而拔去之何能取效也三稜莪朮皆醋炒花粉大黃酒炒制香附各八錢檳榔黃連薑汁炒黃芩酒炒枳實炒貝母連翹各六錢山梔前胡青皮醋炒延索各五錢廣皮四錢南木香二錢鬱金三錢為末先用竹瀝灑潤次用黏米粉攪硬糊丸緑豆大每服百丸按此案與痰門陸養愚治董潯陽夫人脈症俱同而方異大約陸案乃剽襲耳今此案入痞門者俾知痞症有痰結一端也化痞膏方密陀僧六兩阿魏五錢羌活一兩水紅花子三錢同研細末用香油一斤熬膏退火攤貼凡患此症肌膚定無毫毛須看準以筆圈記方用膏貼多年者只用兩張內服克堅酒水紅花子研三錢浸火酒兩斤日服三次隨量飲之鬱症竇材治一人年十五因大憂大惱卻轉脾虛庸醫用五苓散及青皮枳殼等藥遂致飲食不進胸中作悶乃命灸命關二百壯灸關元五百壯服薑附湯一二劑金液丹二斤方愈方書混於勞損用溫平小藥誤人不少悲矣一人功名不遂神思不樂飲食漸少日夜昏默已半年矣諸治不效此藥不能治令灸巨闕百壯關元二百壯病減半令服醇酒一旦三度一月全安原注失志不遂之病非排遣性情不可以灸法操其要醉酒陶其情此法妙極張子和治項關令之妻病飢不欲食常好叫呼怒罵欲殺左右惡言不輟衆醫半載無效張視之曰此難以藥治乃使二媼各塗丹粉作伶人狀其婦大笑次日又令作角抵又大笑其旁令兩個能食之婦常誇其食美其婦亦索其食而為一嘗之不數日怒減食增不藥而瘥後得一子夫醫貴有才無才何得應變無窮羅太監治一病僧黃瘦倦怠詢其病曰乃蜀人出家時其母在堂及遊浙右經七年忽一日念母之心不可遏欲歸無腰纏徒爾朝夕西望而泣以是得病時僧二十五歲羅令其隔壁泊宿每以牛肉豬肚甘肥等煮糜爛與之太監替和尚開葷凡經半月餘且慰諭之且又曰我與鈔十錠作路費我不望報但欲救汝之死命耳察其形稍蘇與桃仁承氣湯一日三帖下之皆是血塊痰積次日與熟乾菜稀粥將息又半月其人遂愈又半月與鈔十錠遂行格致餘論孫文垣治丁耀川母年四十四常患胃脘痛肝木侮胃孀居十五年日茹疏素七月因怒吐血碗許不數日平矣九月又怒吐血如前加腹痛肝木乘脾次年二月木旺之時忽裡急後重肛門大疼肝火後迫小便短澀惟點滴痛不可言肝火前迫腰與小腹熱如湯泡三陰火熾日惟仰臥不能側側則左胯並腿作痛兩胯原有痛二陰之痛前甚則後減後甚則前減諸痛屬火至不能坐遇驚恐則下愈墜疼驚則火動火動則水傷經不行者兩月往行經時腰腹必痛下紫黑血塊甚多今又白帶如注口渴不寐不思飲食多怒面與手足虛浮喉中梗梗有痰肌肉半消診之脈僅四至兩寸軟弱右關滑左關弦兩尺澀據脈上焦氣血不足中焦有痰下焦氣凝血滯鬱而為火蓋下焦肝腎所攝腰胯肝之所經二便腎之所主也據症面與手足虛浮則脾氣甚弱飲食不思則胃氣不充不寐由過於憂愁思慮而心血不足總為七情所傷故爾經曰二陽之病發心脾女子得之則不月此病近之所幸脈不數聲音清亮當先為開鬱清熱調達肝氣保過夏令欠通後再峻補陰血必戒惱怒使血得循經乃可愈初投當歸龍薈丸以徹下焦之熱繼以四物湯龍膽草知柏柴胡澤蘭煎吞滋腎丸連服兩日腰與少腹之熱漸退後以香薷石葦龍膽桃仁滑石杜牛膝甘草稍軟柴胡煎吞滋腎丸二陰全減韓約齋子婦每怒動則夜臥不安如見鬼魅小水淋瀝今又大便祕結腹中疼痛腰胯脹墜如生産狀坐臥不安因痛而脈多不應指孫曰此肝經鬱火所致法當通利以杏仁桃仁各三錢桕樹根皮山梔仁青皮各一錢檳榔五分枳殼八分水煎服之少頃大便通痛脹遂減琇按此亦治標耳非滋水生肝病何能已一婦人因夫荒於酒色不事生産多憂多郁左胯及環跳穴疼痛過膝肝火下鬱於經隧大小便頻數肝火下迫於二陰臍腹脹痛口乾脈之右手弱左手數近又發熱惡寒汗因痛出時刻不寧此食積痰飲瘀血流於下部足厥陰經挾鬱火而痛恐成腸癰與神效栝蔞散一帖痛減半汗止數脈稍退小腹堅如石按之且痛再與前藥小腹稍軟余無進退再進之每帖大栝蔞二枚加丹皮莪朮五靈脂金銀花諸症悉平亮卿內人頭痛遍身痛挾暑前後心乳皆脹玉戶撮急肛門逼迫皆肝火為患大便三日未行口乾因大拂意事而起下午發熱似瘧噁心煩躁不寧而時當盛暑乃怒氣傷肝挾暑熱而然以石膏三錢青皮柴胡枳殼各一錢半夏曲黃芩各八分甘草桔梗各五分夜與當歸龍薈丸下之大小便皆利熱退諸症悉減惟略見噁心與青皮飲兩帖全安程湘內人鼻衄後眩暈噪雜嘔吐清水夜臥不安腹中飢而食不下膈孫謂由脾虛肝膽有鬱火也以人參黃連白朮扁豆甘草陳皮半夏竹茹茯苓石膏水煎調理而平黃履素曰豫少年患鬱火之症面時赤而熱手足不溫復覺咽乾口燥體中微黃夜更甚就醫吳門粗工投以黃連黃芩黃柏等藥服方二劑忽覺手足甚冷漸漸過腕過膝鼻間突出冷氣神魂如從高橋墜下深溪陰陰不能自止幾登鬼籙延名醫張漣水治之張云症雖誤服寒藥又不可驟以熱藥激之但服八珍湯加薑及天麻久當自愈如法調之雖漸安而元氣則大減矣後簡方書有云郁不可折以寒劑誤治必致死然則豫之不死者幸也夫記之以為戒鑑潘塤曰豫稟氣素偏於火晚年多難懷抱鬱郁因而肝氣不平上衝心肺水火不能既濟殊無應病之藥乃自制一方名曰兼制丸以柴胡龍膽青皮各五錢平肝歸身一兩養肝生地一兩生甘草五錢黃柏一兩知母五錢補北方蒼朮八錢燥濕芩連各六錢清心肺桂心二錢引經加白朮防己陳皮茯苓蜜丸每服八十丸常服有效楮記室琇按合黃潘二説觀皆鬱火之症也一則服苦寒幾斃一則服苦寒有效要之人之稟賦各殊陰陽亦異臨症者不宜執著也龔子才治何進士夫人患經行胃口作痛憎寒發熱一醫以四物湯加官桂香附服之即吐血而痛愈甚診之六脈洪數乃鬱火也以山梔二兩薑汁炒黑色服之立愈馮楚瞻治一壯年作宦失意退居抑鬱成疾即經所謂常貴後賤名曰脫營常富後貧名曰失精其後氣血日消神不外揚六脈弦細而澀飲食入胃盡化為痰必咳吐盡出乃能臥津液內耗肌表外疏所以惡寒而瘦削以人參保元固中為君黃耆助表達衛為臣當歸和養氣血白朮助脾勝濕麥冬保護肺中之氣五味收斂耗散之金炙甘草和藥性而補脾並以為佐桂枝辛甘之性能調榮衛而溫肌達表麻黃輕揚力猛率領群藥遍徹皮毛驅逐陰凝之伏痰化作陽和之津液並以為使但恐麻桂辛烈有耗榮陰入白芍和肝以抑二藥之性更加白朮以固中薑棗以助脾生津二三劑脈氣漸充有神痰涎咳吐俱愈繼以十補丸及歸脾養榮加減全愈呂東莊治辨玉偶患寒熱旋至熱不退胸中作惡診之曰此肝鬱而致感也用加減小柴胡湯一劑熱減半次進柴胡飲地黃飲子呂適他往後日用六君子湯加黃芩且戒之曰明日若尚有微熱在內則後日須再用地黃飲子一帖而後用六君子此後皆有次第不可亂也因服地黃飲子覺熱已盡退遂竟用補中益氣一帖是夜即煩熱不安乃知次第果不可紊仍用地黃飲子即安然後依次服至第三日再用補中益氣湯泰然得力矣第覺病後煩怒易動時體虛劣自改用歸脾湯呂歸診之曰今脈已無病但夜不寐著耳曰正若此奈何曰當加味歸脾湯曰今已服此方而未效曰君試我歸脾自愈矣一劑而鼾睡達旦必去遠志木香而入地黃麥冬白芍琇按此等病豫惟以地黃飲子令服五七劑永無他患今必用六君補中歸牌以至紛紛此何故耶未免呆守立齋成法之過沈氏婦夏月發寒熱醫以為瘧也時月事適下遂淋漓不斷又以為熱入血室用藥數帖寒熱益厲月事益下色紫黑或如敗醬醫且云服此藥勢當更甚乃得微愈矣乃疑其説請呂診之委頓不能起坐脈細數甚按之欲絶問其寒熱則必起未申而終於子亥曰鬱火虛症耳檢前藥則小柴胡湯彼意以治寒熱往來兼治熱入血室也又加香薷一大握則又疑暑毒作瘧也乃笑曰所謂熱入血室者乃經水方至遇熱而不行故用清涼而解之今下且不止少腹疼痛與此症何與而進黃芩等藥乎即灼知熱入血室矣當加逐瘀通經之味香薷一握又何為者乃用肉桂二錢白朮四錢炮薑二錢當歸白芍各三錢人參三錢陳皮甘草各四分一服而痛止經斷寒熱不至五服而能起惟足心時作痛此去血過多肝腎傷也投都氣飲子加肉桂牛膝各一錢而全愈使卒進寒涼重陰下逼天僵地折生氣不內水泉冰潰不七日死矣乃云更甚方愈夫誰欺哉庸妄之巧於卸脫而悍於誅伐如是夫朱綺崖多憤郁又以內病憂勞百感致疾初發寒熱少陽之症也漸進不解時方隆冬醫進九味羌活湯不效易醫大進發表消中之藥凡狠悍之味悉備雜亂不成方三劑勢劇又進大黃利下等物下黑水數升遂大熱發狂昏憒暈絶湯水入口即吐其家無措試以參湯與之遂受垂絶更蘇次日呂至尚憒亂不省人事承靈在顛頂通天穴兩旁正營在承靈穴兩旁及長強在尻骨上腰腧穴下俱發腫毒時時躁亂診其脈數而大曰幸不內陷可生也遂重用參耆歸術加熟地一兩許時村醫在座欲進連翹角刺等敗毒散且力言熟地不可用其家從呂言進藥是夜得臥次早神情頓清謂曰吾前竟不解何故臥此今乃知病如夢始覺也又次日脈數漸退煩躁亦平但胃口未開腫毒礙事旬日間但令守服此諸症悉治因晉方及加減法且囑之曰毋用破氣藥以開胃苦寒藥以降火通利藥以啓後敗毒藥以消腫有一於此不可為也出邑遇友人問其病狀曰七情內傷而外感乘之傷厥陰而感少陽從其類也乃不問經絡而混表之三陽俱敝矣然邪猶未入府也轉用枳實厚朴山楂栝蔞之屬而邪入二陽矣然陰猶未受病也用大黃元明粉而傷及三陰矣究竟原感分野之邪不得外泄展轉內逼中寒拒逆幸得參扶胃氣鼓邪出外其發於承靈正營者乃本經未達郁怫之火也其發於腰腧長強者乃下傷至陰凝沍而成也蓋毒得發者參之功也今毒之麻木平塌將來正費調理者前藥之害也其家如言守防服之而愈張路玉治江禮科次媳春初患發熱頭疼腹痛咳逆無痰十指皆紫黑而痛或用發表順氣不效診之脈來弦數而細左大於右曰此懷抱不舒肝火鬱干脾土而發熱熱蒸於肺故咳因肺本燥故無痰脾受木克故腹痛陽氣不得發越故頭疼四肢為諸陽之本陽氣不行氣凝血滯故十指疼紫其脈弦者肝也數者火也細者火鬱於血分也遂以加味逍遙散加桂枝於土中達木三劑而諸症霍然十指亦不疼紫矣徐孝廉室不得寐不能食心神恍惚四肢微寒手心熱汗至晚則喉間熱結有痰兩耳時塞用安神清火藥不效診之六脈縈縈如蛛絲而兼弦數此中氣久郁不舒虛火上炎之候也本當用歸脾湯以補心脾之虛奈素有虛痰陰火不勝耆圓之滯木香之燥用歸脾之法遂以五味異功散略加歸芍肉桂以和其陰導其火不數劑而食進寢寧諸症釋然矣張飛疇治一婦平昔虛火易於上升因有怒氣不得越致中滿食減作酸噯氣頭面手足時冷時熱少腹不時痠痛經不行者半載余其脈模糊駛而無力服諸破氣降氣行血藥不愈此蘊怒傷肝肝火乘虛而克脾土脾受克則胸中之大氣不布隨肝火散漫肢體當知氣從濕騰濕由火燥惟太陽當空則陰霾自散真火行令則鬱蒸之氣自伏又釜底得火則能腐熟水穀水穀運則脾胃有權大氣得歸而諸症可愈矣用生料八味倍桂附十日而頭面手足之冷熱除間用異功而中寬食進調理兩月經行而愈柴嶼青治潼川守母八十三在瀋陽禮部時聞伊母在京病甚忽身熱吐痰妄言昏憒衆醫俱主發表病勢日增始求治悲淚哀號自分必死診其右關沉澀微滑曰此思慮傷脾更兼鬱結痰涎壅盛脾不能運也身熱昏憒清陽不升脾氣傷也先用二陳栝蔞治其標繼用歸脾加神麯半夏柴胡調治數口而痊向使誤服表劑豈不蹈昔人虛虛之戒耶山陰林素臣偶患時氣為醫所誤身熱嘔吐緑水轉側不寧柴以為肝鬱所致用逍遙散加吳茱萸川黃連各五分一服吐止身涼二服全愈又服調理藥數劑而安陸養愚治沈立川內人胸膈不舒咽嗌不利中脘少腹常疼大便溏經水淋瀝腰膝無力倦怠頭眩得食少可食後則異常不快半年間順氣清熱開鬱化痰消食之藥服將百劑脈之左手沉數而細右手沉弦而微此肝脾燥熱忿鬱積久而致前屬有餘今為不足宜用補劑沈曰前用人參五分且有開氣之藥極痞滿恐補不能投曰參少而兼開氣所以痞滿也乃用八物湯人參一錢服之大脹乃加參二錢脹即減加至三錢竟不脹矣又合六味丸空心服之調理二月而痊一婦鬱怒憂思胸腹脹痛痛甚則四肢厥冷口噤冷汗用二陳湯加芍歸烏藥青皮枳殼香附厚朴蘇葉一劑痛脹即愈後去蘇葉加薑炒黃連再服一劑而安一婦鬱怒不發久之噫聲甚高言談不知終始𩞄雜易飢經曰心病為噫此因憂而血鬱於心胸也用桃仁承氣湯大黃桃仁桂枝芒硝甘草下蓄血數升而安經曰血蓄在上則喜忘在中則喜狂也一中年人因鬱悒心下作痛一塊不移日漸羸瘦與桃仁承氣湯一服下黑物並痰碗許永不再發薛立齋治一婦人身顫振口妄言諸藥不效薛以為鬱怒所致詢其故蓋為素嫌其夫而含怒久也投以小柴胡湯稍可又用加味歸脾湯而愈一婦人年六十有四久鬱怒頭痛寒熱春間乳內時痛服流氣飲之類益甚不時有血如經行又因大驚恐飲食不進夜寐不寧此因年高去血過多至春無以生髮肝木血虛火燥所以至晚陰旺則發熱經云肝藏魂魂無所附故不能寐先以逍遙散加酒炒黑龍膽草一錢山梔一錢五分二劑腫痛頓退又二劑而全消再用歸脾湯加炒梔貝母諸症悉愈一婦人因喪子懷抱不舒腹脹少寐飲食素少痰涎上湧月經頻來曰脾流血而主涎此鬱悶傷脾不能攝血制涎歸源遂用補中益氣濟生歸脾二湯而愈又用八珍湯調理而愈秀才楊君爵年將五十胸痞少食吐痰體倦肌肉消瘦所服方藥皆耗血破氣化痰降火曰此氣鬱所傷陽氣未升越屬脾經血虛之症當用歸脾湯能解鬱結生脾血用補中益氣壯脾氣生髮諸經否則必為中滿氣膈之患不信仍用前藥後果患前症而歿羅謙甫曰疏五過論云常貴後賤里不中邪病從內生名曰脫營鎮陽一士人軀幹魁梧而意氣豪雄喜交遊而有四方之志年逾三旬已入仕至五品出入騎從塞途姬侍滿前飲食起居無不如意不三年以事罷去心思鬱結憂慮不已以致飲食無味精神日減肌膚漸致瘦弱無如之何遂耽嗜於酒久而中滿始求醫醫不審得病之情輒以丸藥五粒溫水送下二十餘行時值初秋暑熱猶盛因而煩渴飲冷過多遂成腸鳴腹痛而為痢疾有如魚腦以致困篤命豫治之診其脈乍大乍小其症反復悶亂兀兀欲吐嘆息不絶豫料曰此症難治啓元子曰神屈故也以其貴之尊榮賤之屈辱心懷慕戀志結憂惶雖不中邪病從內生血脈虛減名曰脫營或曰願聞其理黃帝針經有曰宗氣之道內谷為主谷入於胃乃傳入於脈流溢於中布散於外精專者行於經隧周而復始常營無已是為天地之紀故氣始從手太陰起注於陽明傳流而終於足厥陰循腹理入缺盆下注肺中於是復注手太陰此營氣之所行也故晝夜氣行五十營漏水下百刻凡一萬三千五百息所謂交通者並行一數也故五十營備得盡天地之壽矣今病者始藥後苦皆傷精氣精氣竭絶形體毀阻暴喜傷陽暴怒傷陰喜怒不能自節蓋心為君主神明出焉肺為輔相主行榮衛制節由之主貪人欲天理不明則十二官相使各失所司使道閉塞而不通由是則經榮之氣脫去不能灌溉周身百脈失其天度形乃大傷以此養生則殃何疑之有馬元儀治洪聲遠惡寒發熱倦怠懶言神氣怯弱兩脈弦虛此甲木內郁生氣不榮而陽明受病也蓋甲木乃少陽初生之氣勾萌始坼其體柔脆一有拂鬱即萎軟抑遏而不上升反下克脾土而為病矣由是樞機不利虛邪入之而與陰爭則寒頃之既去而與陽爭則熱倦怠者胃病而約束之機關不利也神怯者木臟傷而心臟之神明失養也是皆木鬱土衰之故木氣既郁惟和風可以達之陰雨可以滋之柴胡風劑之平者能入少陽清發升陽而行春氣當歸白芍味辛而潤辛以疏其氣潤以養其陰白朮茯苓陳皮炙甘草以和中氣而益脾土兩劑脈象有神四劑寒熱已再用補中益氣升發生陽之令而康純用薛立齋法木鬱於肝脾之中而血不虧者可以用之朱氏子場屋不利鬱郁而歸遂神識不清胸滿譫語上不得入下不得出已半月診之兩脈虛澀兼結此因郁所傷肺金清肅之氣不能下行而反上壅由是木寡於畏水絶其源邪火內擾而津液干格胸中滿結者氣不得下也神昏譫語者火亂於上也上不得入下不得出者氣化不清而現晦塞之象也但通其肺氣諸症自已用紫菀五錢宣太陰以清氣化乾葛二錢透陽明以散火鬱枳桔各一錢散胸中之結杏仁蘇子各二錢導肺中之痰一劑而脈轉神清再劑而諸症悉退改用歸脾湯調理而痊顧霖蒼婦寒熱如瘧便血不已左脅有塊攻逆作楚神氣昏憒診之兩脈弦數兼澀弦則為風數則為熱澀則氣結此脾肝之氣悒鬱不宣胸中陽和鬱而成火故神明不精肝之應為風肝氣動則風從之故表見寒熱也人生左半肝腎主之左氣逆故左脅攻楚有塊也肝為藏血之地肝傷則血不守而風熱益勝為亡血之由也用生首烏一兩滋燥而兼搜風黃連一錢治火兼以解鬱柴胡以疏其表黃芩知母以清其里枳實厚朴以和其中一劑脈起神清再劑便行熱解而安方論俱佳繆仲淳曰甲申夏傭婦因鬱火痰喘身熱手拳目張半月不眠食按其胃口不痛諸醫疑其虛也或云中暑百藥試之痰喘滋急以皂角末嚏鼻通竅痰上逆如沸延楊石林診之請亟吐之先大夫曰病久矣虛甚可奈何石林曰經云上部有脈下部無脈其人當吐不吐則死即以鹽湯吞之去白痰數碗喘定先大夫曰何以藥之石林曰吐即藥也待其熟寢勿服藥以養胃氣夜半啜粥二碗詰旦投六君子湯數劑而起石林者里中博雅士不行術而精醫者也深得子和之法姑蘇張漣水治紀華山雅自負數奇更無子悒悒不快漸至痞張四年肌肉削盡自分死矣張診而戲之曰公那須藥一第便當霍然以當歸六錢菲菜子一兩香附童便炒八錢下之紀有難色不得已減其半張曰作二劑耶即服夜忽夢遺舉家慟哭張拍案曰吾正欲其通耳仍以前半劑進胸膈間若勇士猛力一擁解黑糞數升尋啜粥二碗再明日中櫛起見客矣逾年生一子即是表弟汝占也廣筆記張意田治柯姓人病劇診之得脈浮大而空左關沉候有微弦之象左尺沉候有一絲之根面目皆紅鼻青耳聾眼瞪神昏自語不休舌燥赤大唇紫齒燥只此數端便非戴陽症明矣初病發熱咳嗽已七八日所服乃傷風散解之藥昨日早間連大便三四次即臥床不省人事今日忽然發昏或謂戴陽症用熟地附子等未服張思外症雖類戴陽然症起無因察其所言皆平日之事則似少陰之獨語至鼻現青色時在秋令則肺氣絶矣然面有光亮為表氣不和唇色深紫宜有鬱火且左尺有根本非無治左關微強則別有致病之故詢之乃昨早失手自碎粥罐因怒不止即大便昏迷知為鬱怒所傷肝火上逆而諸症蜂起經所謂怒則氣上是也與戴陽相去遠矣用逍遙散去白朮加地黃丹皮炒梔之屬而愈病多隱微醫不審察誤斯衆矣一宦素謹言一日會堂屬官筵中有蘿蔔頗大客羡之主曰尚有大如人者客皆笑以為無主則悔恨自咎曰人不見如此大者而吾以是語之宜以吾言為妄且笑也因而致病藥不應其子讀書達事思其父素不輕言因愧赧成病必須實所言庶可解釋遂遣人至家取蘿蔔如人大者至官所復會堂屬強父扶病而陪陪至數巡以車載蘿蔔至席前客皆驚訝其父大喜厥旦疾愈石山醫案一女與母相愛既嫁母喪女因思母成疾精神短少倦怠嗜臥胸膈煩悶日常懨懨藥不應豫視之曰此病自思非藥可愈彼俗酷信女巫巫托降神言禍福謂之卜童因令其夫假託賄囑之托母言女與我前世有冤汝故託生於我一以害我是以汝之生命克我我死皆汝之故今在陰司欲報汝仇汝病懨懨實我所為生則為母子死則為寇仇夫乃語其婦曰汝病若此我他往可請巫婦卜之何如婦諾之遂請卜一如夫所言女聞大怒詬曰我因母病母反害我我何思之遂不思病果愈此以怒勝思也蕭萬輿治一婦年四旬懷抱鬱結嘔痰少食胸膈脹痛雖盛暑猶著綿衣六脈浮結或煩渴不寐此命門火衰元氣虛寒也以六君子加薑桂及八味丸不兩月而症痊矣易思蘭治徐文淙妻臥病三年身體羸瘦畏寒戰栗後發熱得汗始解脊背拘痛腰膝軟弱飲食不進則腸鳴作瀉心虛驚悸胸肋氣脹畏風畏熱頭眩目昏月信愆期易診之曰此氣鬱病也左寸脈心小腸屬火當浮大而散今心脈大而散卻不浮蓋心為一身之主藏神而生血宜常靜而不宜多動人能靜養則心血充滿脈自浮大若事事攪亂心不寧則神不安而血不充是以脈無力而不浮怔忡驚悸之病由之以生況診七八至或十二三至又往關中一獵有類以灰種火之狀此乃君火鬱於下而無離明之象也據脈論證當有胸中煩悶蒸蒸然不安蒸出自汗則內稍靜而腠理不密畏寒為驗左關肝膽屬木宜弦細而長今左關弦長而不細又侵上寸部二分推之於內外見洪大有力是肝氣有餘也蓋因火鬱於中下不能承順正化之源木母太旺上助心火中侮脾土肝藏血而主筋病當頭眩目昏脊背項強卒難轉側背冷如冰甚則一點痛不可忍下則腰膝軟弱無力脾胃不和等症為驗左尺腎與膀胱屬水脈宜沉濡而滑惟此部得其正右寸肺與大腸屬金脈宜短澀而浮茲診得沉滯而大按三五至或十數至一結結乃積深沉則氣滯此正肺受火邪氣鬱不行也病當胸膈不利或時悶痛右肋脹滿飲食不進大腸鳴泄等症為驗右關脾胃屬土脈宜緩而大此部雖無力猶不失其本體右尺三焦命門屬相火亦宜沉靜不宜浮大此部浮取三焦脈浮而無力侵上脾胃是君火鬱於下而相火升於上侮其金也病主氣滿胸膈𩞄雜飲食不利等症為驗詳六部脈症惟左尺得體腎為壽元根本尚固右關脾土為木所侮雖是少力然來去緩大而不弦此五臟之源生氣有存無足慮也病症多端要之不過氣鬱而已丹溪云氣有餘便是火火鬱則發之先投以和中暢衛湯用蘇梗桔梗開提其氣香附撫芎蒼朮神麯解散其鬱貝母化其鬱痰砂仁快其滯氣鬱氣散則金體堅木平水王何慮相火不降耶若夫木當夏月成功者退雖王不必專治服三劑而肺脈浮起胸次豁然諸症頓減繼以清中實表固其腠理月信大行久積盡去表裡皆空用補陰固真之劑並紫河車丸日進一服月餘全愈內傷裴兆期曰凡人偶得潮熱往來之候未可遽執為外感風寒輒服發表之藥蓋其間亦或有元氣內損而然者一或少瘥則陰症立至多死少生矣吾鄉一高年紳只一子年三十餘素恃形氣強偉不知節慎六月間因母壽連日宴客應酬勞倦遂發往來潮熱渠宿與一醫相善即邀以治之值醫他往其徒代為之視輒投以羌活紫蘇防風等藥一劑後汗大出不止乃求治於余六脈已細數無倫矣舉方用人參黃耆各五錢桂附各二錢當歸三錢浮小麥一撮令急煎服藥劑甫煎成而所善之醫適至亦認為外感傾棄豫藥仍以前藥表之汗更大出深夜而斃須知膏粱子弟外強中乾不可見其氣強形偉而遂視之為大椿也萬密齋治董氏子年十七病請治診其脈浮大無力問其症無惡寒頭痛但身熱口渴四肢倦怠曰似白虎症而脈虛乃飢渴勞力得之黃耆炙當歸酒洗各一兩作湯服之而愈陳正夫萬之母舅也病三日後胸中痞脹小便少大便不通萬聞往問疾時近城一醫欲以大柴胡湯下之察脈症不可下內傷中氣不運故上竅閉而下氣不通也丹溪云二陳湯加蒼朮白朮升麻柴胡則大便潤而小便長與之一服而安龔子才治劉太府因勞役太過發熱憎寒頭疼身痛口乾發渴嘔噁心煩或以羌活湯或以藿香正氣散愈甚手足無處著落心慌神亂坐臥不安湯水不入聞藥亦吐皆由風燥之劑鼓動其火而然診之六脈洪數氣口緊盛此內傷元氣也以補中益氣加遠志棗仁竹茹麥冬一劑即熟睡再進一服全安陳三農治一老人患頭痛惡寒骨節疼痛無汗譫語自服參蘇飲取汗脈洪數而左甚此胃虛作勞陽明雖受邪氣不可攻擊當補其虛俟胃氣充足必自汗而解以參耆歸朮陳皮炙草加熟附子四五劑諸症雖減但口乾熱未退遂去附子加白芍漸思食汗出而安陸養愚治叢邑宰煩勞忿怒飲食不思已數月矣初春患左脅痛不能向左眠又感冒遂咳嗽喘促汗出惡風嘔惡飲冷胸脘痞塞煩躁泄瀉耳鳴手指肉瞤振搖不已脈之兩寸微浮而澀關尺微虛不固曰凡靠左不得眠者肝脹靠右不得眠者肺脹及咳嗽自汗喘促下泄俱難治況澀脈見於春時金來剋木亦可畏幸神氣尚未乏兩寸帶浮尚有微陽小便稠黃猶長面色焦黑而微有黃氣猶可療也仲景云脈虛微弱下無陽又云微虛相搏乃為短氣又云微浮傷客熱東垣云陰先亡陽欲得去乃見熱壅口鼻謂之假熱之症此蓋得之七情傷陰煩勞傷陽風寒乘虛入客胸膈痞塞因邪在半表半裡又為冷水停凝症似支飲結脅側不能臥寐覺痛作雖飲留肝實亦是元氣不充不調合之諸症俱屬正氣已傷宜調養氣血使邪自散用順氣養榮湯加桂枝甘草二劑諸症頓減易以補中益氣少佐小青龍湯一二分以和榮衛二劑自汗喘嘔病已除第痞塞脅痛不甚減更以六君子倍半夏陳皮少佐蔻仁木香胸痞脅痛亦止又與四神丸實脾腎氣丸固本調治月餘而痊朱少湖仲冬夜間忽頭項微強身體微痛疑是傷寒連夜用紫蘇二大把生薑十片濃煎熱服厚覆大汗之身體覺輕自謂愈矣至明日之夜復覺拘急反增沉重復如前取汗不解身體如石煩躁口乾睡臥不安天明延一醫診之謂脈極浮數冬月傷寒非麻桂不解薑蘇輕劑豈能療此大病乎擬用大青龍湯病家疑而卜之不吉復延陸同議診之脈浮數而微細如蛛絲按之欲絶曰陽虛症也原不宜汗況經謂冬三月閉藏之令無擾乎陽無泄皮膚使氣亟奪一之為甚其可再乎彼醫曰仲景云陰盛陽虛汗之即愈既曰陽虛何為不可汗況麻桂青龍正為冬時虛寒而設如拘閉藏之令不宜汗則仲景此等湯劑必待春夏傷寒而後用乎陸不能辨但徐曰議論甚高第恐此脈不相應耳病家問當用何藥曰惟建中生脈酌而用之彼醫謂邪在表而補斂之不死何待陸曰汗之而愈則補誤補之而愈則汗誤原不兩是也病家不能決卜之謂補吉汗凶乃以建中生脈合投之煩躁仍劇噫氣不絶足脛逆冷身不能轉彼醫謂斃可立而俟也陸曰誤汗者再藥輕病重故未效耳仍前方倍人參加附子濃煎冷服少頃煩躁頓定數劑諸症悉除月餘時出虛汗不能起用人參數兩方獲安此駁未嘗無理陸不徑指為內傷而泛引經文致招如此駁詰又不肯明指其失而喻之第含糊其詞以示意亦名醫之習氣也喻嘉言治劉筠之七旬御女不輟此先天素厚也然以房中之術數擾其陽又值夏月陽氣在外陰氣在內偶不快飲食起居如常醫者以壯年傷暑之藥香薷黃柏石膏知母滑石車前木通投之即刻不支診時則身僵頸硬舌強喉啞無生理矣曰此症雖危然因誤藥所致甫隔一晚尚可以藥速追急以大附子乾薑人參白朮各五錢甘草三錢大劑煎服可解此厄衆議不決姑以前方四分之一服之安貼再煎未遲灌下一寸香之久大嘔一聲醒而能言呼諸子乳名云適才見州官回詢其所由開目視之不語轉問醫者何人曰江西喻遂抬手一拱又云門縫有風來塞塞喻促煎所存之藥續進而姻族雜進商以肩輿送其回寓另進他藥啞瞶如前越二日而逝李士材治程幼安食少腹悶食粥者久之偶食蒸餅遂發熱作渴頭痛嘔逆或以傷寒治之或以化食破氣之藥投之俱不效勢甚危診之曰脈無停滯之象診之軟且澀是脾土大虛之症也法當以參術理之聚皆不然李曰病勢已亟豈容再誤遂以四君子湯加沉香炮薑與之數劑而減一月而安倪文學素勞積鬱胸膈飽悶不能飲食服消食理氣行痰開鬱清火凡百餘劑不效病勢日增李診之脈大而軟喟然嘆曰明是火衰不能生土以伐氣寒涼藥投之何異入井而又下石乎遂以六君子湯加乾薑肉桂益智仁各一錢十劑少愈然食甚少也遂加附子一錢兼用八味丸調補百餘日而痊盧不遠治戴養吾夫人體常困倦眩暈不食胸膈痞滿脈之寸關不透以為肝脾之氣不伸用八珍加升麻柴胡而愈後每病用前方即安若稍為加減便不獲效凡十五年皆倚恃焉蓋夫人性靜體厚起居安適是以氣血不振而消沮故於補氣血藥中加開提之劑得其性情故可久服何介甫病脾數年飲食少而精神悴卒酉七月就診兩關軟弱不透於寸用參苓歸芍陳皮防風甘草數十劑遂善啖肥濃數年之疾脫然問曰豫疾有年補脾補腎法非不詳而未之效君何從平易得之曰君疾在肝非脾腎病也凡診病者當窮其源無為症惑如飲食少雖關脾胃其所以致脾胃病者何故此當審者今君兩關脈弱不透於寸右固脾虛明矣左則何謂此脾體不足而脾用不行也蓋脾之用肝也星家取克我者為用神脾體無肝木為之用則氣血便不條暢運化遲鈍而脾胃轉困矣且秋來金肅肝更不伸乃為補助肝木之氣使之揚溢則脾土伸舒精神油然外發雖不治脾實所以治也安用奇特之法哉馮楚瞻治王慎瞻平日過勞乃遠行途中食冷麵羊肉及歸胸中疼脹不堪醫所用無非楂蔔枳朴之類服之益甚漸至心如壓扁昏暈悶絶少減則蘇曰食乃有形之物惟入腸胃滯則為脹為疼著而不移豈能升降於胸次乎蓋胸為心肺之部止受無形之氣不能藏有形之物也且六脈弦細而數身不熱語言無力皆非傷食之候乃積勞所傷無根之氣上逆於心以致脹痛不堪耳當用塞因塞用之法乃以棗仁硃砂乳香為細末剖豬心血為丸用人參五六錢煎濃湯送服少頃以蓮子煮白米粥壓之令忍脹強吞半碗如是數日疼脹漸減繼以胸膈自覺甚空雖多食不飽而大便出者無幾蓋勞役太過臟腑脂膏耗竭狀如中消食物入腹銷鑠無餘故多入少出也談銓部病熱數日醫以為傷寒投以發散禁其飲食日漸危篤脈之弦緩無力乃勞傷發熱也先以濃粥湯半碗進之覺香美甚甘飲食目頓清亮遂與歸脾湯令以薄粥繼之三四日後神氣頓復而愈以飲食調之最是補虛妙法徐主政夫人年逾七十江行驚恐早晚積勞到家未幾壯熱頭疼醫作傷寒發散數劑漸至面色煩躁神昏不語頭與手足移動日夜無寧刻脈之細數無倫重取無力此勞極發熱熱者乃元陽浮越於表也更發散之陰陽將竭矣非重劑挽之無及熟地一兩六錢炒麥冬炒白朮各三錢牛膝二錢五味子八分製附子一錢二分另用人參六錢濃煎沖服二三劑後病減神清後用八味歸脾二湯加減全愈洪氏子因勞傷發熱頭疼咳嗽脅痛醫謂傷寒大用發散一劑汗大出熱更甚神昏見鬼躁渴舌黑身重足冷徹夜不寐困頓欲絶脈細數無倫胃脈微極此勞傷中氣發熱東垣補中益氣湯為此等病而設令陰陽氣和自能出汗而解今更虛其虛陽氣發泄殆盡所以身愈熱而神愈昏陰陽既脫自爾目盲見鬼津液既亡所以舌黑足冷至於身重異常此尤足少陰極虛之症蓋腎主骨骨有氣以舉則輕否則重也與熟地二兩炒麥冬四錢乳炒白朮五錢牛膝三錢五味子一錢附子二錢濃煎人參一兩煎汁沖服口渴另用熟地二兩麥冬五錢人參八錢濃煎代茶三四劑後汗收熱退舌潤神清嗽止食進後用生脈飲送十補丸四五錢再以歸脾加減煎膏成丸彈子大圓眼湯化服全愈劉君鄉試入都長途冒暑氣已傷矣復日夜課誦未幾壯熱頭疼咳嗽乾噦不寐神疲脈之兩寸俱洪兩尺俱弱右關沉取則無此犯無胃氣之症矣非溫補脾腎無濟也而以暑天熱病堅不肯服乃坐視數日熱益甚復延診其脈轉躁澀無力此久熱陰陽愈傷也與大劑熟地人參白朮麥冬五味子牛膝二劑諸症漸愈惟噦聲間作胃脈不起猶不喜食乃早以生脈飲送八味丸去丹皮澤瀉加鹿茸五味子牛膝晚以歸脾湯去木香甘草加五味肉桂一補先天一補後天全愈又同時彭公子亦患是病身熱兩月服補中益氣加減已數十劑不知此方乃為虛人發散而設不宜久服且時當夏月陽氣上浮致令陰陽離決精氣乃絶面青浮腫肚腹脹硬心下痞膈咳嗽咽痛口多甜涎壯熱畏寒五心燥熱口乾不渴足脛常冷脈則兩寸乍洪乍數兩關無力兩尺更微上盛下虛已極以前方重劑另煎人參一兩沖服旬余漸愈復惑旁言再用發散消痰及補中六君加減遂不起太親家高年且患足疾初愈乃途中遇雨疾趨而回遂身熱自汗頭疼咳嗽繼而吐血飲食不思精神狼狽脈之兩寸皆洪大而數右關兩尺甚弱此勞傷中氣脾不統血也咳嗽者火爍於肺也身熱者元陽浮越也自汗者氣虛不能攝液也頭疼者血虛火冒也與熟地一兩麥冬四錢炒白芍六錢牛膝三錢五味子一錢製附子一錢二分另煎人參湯沖服數劑咳嗽吐血俱止早晨生脈飲送加減腎氣午後加減歸脾湯服之全愈高鼓峰治呂用晦病熱症造榻與語察其神氣內傷症也詢其致病之由曰偶夜半從臥室出庭外與人語移時就枕次日便不爽快漸次發熱飲食俱廢不更衣者數日矣服藥無效曰雜工皆以為風露所傷故重用辛散不進飲食便曰停食妄用消導孰知邪之所湊其氣必虛若投以補中益氣湯則汗至便通熱自退矣用晦欣然輒命取藥立煎飲之旁觀者皆以熱甚又兼飽悶遽投補藥必致禍慰之曰無庸驚擾即便矣頃之下燥矢數十塊覺胸膈通泰旁觀者始賀是晚熟寐至五鼓熱退進粥連服前方而愈範中行感冒風寒又過於房勞發熱昏悶醫以為傷寒也羌活柴胡投之不應又以為陰症也肉桂木香投之又不應熱且愈甚飲食俱廢舌黑如炭八日不便醫正議下診之脈細數而沉曰陰虧甚矣胃氣將絶矣非溫和甘潤之劑弗能救也急以左歸及滋水清肝等藥重加參耆服之他醫以為不大便奈何議補高曰子以為承氣症也誤矣第服藥必得便至第四日果下黑矢升許熱退舌亦紅潤但尚未進食病家猶以用補為嫌慰之曰本內傷症一補中益氣療之足矣無奈粗工雜投胃氣轉傷不能即復今以藥補之以稀粥調之不過數日自然知味不信另延一醫重用承氣湯服至二劑不得便必反以為前藥補住病轉劇無顏再延高往蘇中延薛楚玉楚玉至聞述病情及用藥次第曰既用熟地而便效可知矣奈何舉將收之功而棄之耶今無能為矣病家目楚玉為黨究不之信嗟乎舉天下學問之人而盡目之為黨為彼之醫不亦難乎呂東莊治友人董雨舟夏月搗膏勞力致感頭疼發熱服解表之藥不效其長君方白來問呂曰子不觀東垣脾胃論乎服補中益氣加五味麥冬自愈矣如言服之頓安復起作勞仍發熱頭痛別用清解藥增甚因同葉御生往診之四肢微冷胸腹熱甚煩悶腰墜下小腹脹痛不能小便時旁觀者以為重感邪所致力主發散呂曰虛邪內郁正以勞倦傷中生氣不足不能托之使盡去又過清涼其火下逼膀胱責及水臟故然安可攻也請以滋腎飲子合生脈散與之何如御生論與呂合竟投之得睡醒熱解小便通矣留方補之而別翌日方白至曰內熱時作煩悶頭痛亦間發恐邪不盡曰餘火未散移熱於上也用軟柴人參白朮黃連丹皮甘草茯神等而愈楊乘六治徐氏妾勞倦發熱時作微熱倦怠嗜臥下午更甚醫用發散兩劑咳嗽不絶脅痛如錐更用清金瀉火泄利不止不食不寐者旬日脈之浮分細軟沉則緩大面色滉白眼光散大舌胖嫩淡白而滑兩手厥冷而振此勞倦傷脾氣虛發熱初時若用補中益氣一二劑即愈乃誤藥致咳嗽痛利胃陰被劫於前中氣重傷於後乃擬人參熟地白朮各一兩附子炮薑各三錢赤石脂禹餘糧炙甘草各五錢濃煎大碗徐服至一碗即睡去巳刻至戌分始寤咳利俱除脅痛如失能進粥飲服用前藥胃氣漸開用調中益氣生金滋水而愈簡某病感症壯熱時微寒嗜臥懶言日輕夜重或與羌防發散燥渴譫妄不食脈浮數無序重按虛大無力舌嫩黃中間焦燥此內傷似外感症誤表以劫胃陰津枯液涸火無所畏而變生燥症也與左歸飲加生地當歸白芍兩劑便解熱退再診浮數俱除虛火仍在繼起之病已退初時之病未減蓋初病因中氣素虛而來後病因胃陰暴傷而致若不先救其陰而即補其氣是為無制之陽邪樹幟而將垂絶之真陰下石矣今陽火既退陰汁漸充則初起之症可立除也以補中益氣湯合生脈四劑而愈治內傷者類以補中益氣為神丹不可不三復此論薛立齋云余性愛靜坐觀書久則倦怠必用補中益氣湯加麥冬五味酒炒黑黃柏少許方覺精神清妥否則夜間少寐足內酸熱若再良久不寐腿內亦然且兼腿內筋自有抽縮意致兩腿左右頻移展轉不安必致倦極方寐此勞傷元氣陰火乘虛下注丁酉五十一歲齒縫中有如物塞作脹不安甚則口舌如有瘡然日晡益甚若睡良久或服前藥始安至幸醜時五十有五晝間齒縫中作脹服補中益氣一劑夜間得寐至壬寅內艱之變日間雖服前劑夜間齒縫亦脹每至午前諸齒並肢體方得稍健午後仍脹觀此可知氣血日衰治法不同琇按立齋生平善用補中益氣據此病先下盛服之宜矣柴嶼青治瀋陽司寇覺羅諱吳祥延診曰數日前因感冒風寒至今未愈其脈或兩至一歇遲而見代並非外感乃虛寒凝結氣血耳用人參養榮湯吳曰無力用參以玉竹代之此十月二十一日也至次日告云昨服藥後腰發板轉動必以人以需人參購覓可也遂用參一錢二十三日早診之脈氣稍轉仍用原方午後兩膝強硬自令人以熱面尉之忽至發迷再促診而醫者數人但云風寒方用大表散並欲下大黃及諸人去後吳云伊等如何可信仍服公藥但為斟酌之乃於方內加參一錢逮服至冬至方斷煎劑即以原方配合為丸調理而康向使吳公信任不篤必至難保夏大兒年友蘇中陳雍喈身熱譫語不甚辨人太守苕溪陸祝三因赴補在京邀柴診視其脈大而無力此陽虛發熱擬用人參陸驚而咋舌以為斷不可用乃力任方從一劑後身和三劑熱全退調理月餘而瘥少司馬諱雅爾圖以扈從打圍至德州抱病給假回京醫投小陷胸湯一劑頓即仰臥神昏不語又一醫進參三錢神氣稍蘇言語恍惚惡食不寐延診雅云素有肝病遂述前方按左關脈平和惟心部空大此心家之疾與肝無涉用酸棗仁湯而愈周太守家人發熱不食晚間怕鬼因途中冒雨食冷粽而起柴曰脈無停滯只見虛大經所謂形寒飲冷則傷肺飢飽勞役則傷脾此內傷所致擬用人參以價貴為難遂用扁黨六君子加炮薑大棗數劑而愈太史周希用丁卯場前勞倦外感身熱委頓兩足無力欲用發表之劑未決求治右脈軟弱人迎不緊外感輕而內傷重以補中益氣治之後用異功散數劑病痊遂聯捷觀察沈椒園在侍郎時家人某新從山左回京身熱不食沈以熟地等滋陰大劑進遂嘔吐增劇求治於柴柴曰此傷胃氣所致非陰藥所宜用香砂六君子湯治之而痊主政蔡修持令節發熱口渴胸悶舌純黑苔譫語延醫無效已二十餘日矣診之脈氣平弱並無外邪投以滋陰之藥二劑不應改用六君子加炮薑一服尚未效後戴廷傅加制附一錢吳茱萸五分一劑汗出胸快再劑汗出胸中豁然調理而愈病固有如此之類者毋粗忽也陸養愚治朱少湖病已半年先因房勞汗出又傷食用消導藥後乃夢遺頭暈自服人參少安遂每日五錢或一兩服至數斤其病自汗身熱咳血痰逆胸膈不舒心口如物窒礙手足時厥頭常暈眼或昏暗不見人大便已六日不行每頭暈時服參湯則稍止脈之氣口及關弦滑而有力左寸關浮弦似虛尺濡弱此由肝有怫熱重以思慮房勞致虛參雖中病單服多服益陽太過化為熱火與積痰膠固脾胃遂致熱結幽門火逆上行而動血動痰向以惡寒汗泄重幃厚褥帕裹綿裝至是悉令徹去以潤字丸三錢服之外用蜜導法去宿垢盆許再用人參七分歸身遠志各一錢棗仁一錢山梔茯神各一錢三分煎好入竹瀝一鍾一帖即胸次豁然得寐每日以前方潤字丸數十粒便潤汗止咳嗽痰血漸減十服而安陸祖愚治潘洪宇以過勞傷脾脾虛而肺臟亦損咳嗽痰喘微寒微熱或以清涼滋補健脾消導月餘飲食頓減精神愈衰僅奄奄一息耳診之遍身瘡癬六脈如絲言語輕微夜苦無寐大便則向來艱澀乃用人參白朮貝母棗仁麥冬生地為煎劑另以人參麥冬五味為丸五更吞下每日服參約四五錢數日漸瘳再以歸芍生地連翹地榆煎湯揉洗肚腹大便通潤調理百餘日而安陸祖愚治本府添設曾向緣中氣不足宜服參耆一日午飯未幾啖楊梅過多便胸中不快身熱頭眩吐痰口渴不思飲食三日不更衣或用楂枳芩連厚朴二陳之類三四劑大便一次去燥矢數枚而症如故又用歸芍知麥楂芩而腹滿作嘔脈之左三部浮微而弱右三部浮大虛數曰脾胃虛弱氣不能運故胸膈不舒並有積滯也況素不能服苦寒豈可用芩連之類經云但治其虛安問其餘乃六君子湯加白豆仁煨薑大棗二劑症頓減再與補中益氣湯數劑遂霍然一人憂思不已飲食失節傷脾面色黧黑環口尤甚心懸如飢又不欲食呼吸短促曰此脾氣受傷也憂思不已則脾滯而不行飲食失節則脾氣耗而不足陰氣上入陽中也經曰陽明症衰面始焦故知陽之氣不足也遂以參耆白芍升麻葛根白芷蒼朮甘草薑棗助陽明生髮之氣而愈朱丹溪治一人因勞倦發熱醫以小柴胡湯黃連解毒湯芩連梔柏白虎湯等劑反加痰氣上湧狂言目不識人目赤上視身如烈火六脈洪數七八至按之豁然左略弦而芤此因中氣不足內傷寒涼之物致內傷發熱又與苦寒藥太多為陰盛格陽之症與補中益氣湯加薑附大棗二劑而愈陳三農治一友飲食不均遠行勞倦發熱煩悶症類傷寒醫禁食不與診之言語輕微手背不熱六脈數而軟此真氣不足非有外邪也力勉其進粥乃與甘溫大補之劑恪服數日熱退而安陳三農治夏夫人年已八旬憂思不已偶因暑浴遂患發熱頭痛醫者以為傷寒禁其食而肆行解散越三日氣高而喘汗出如洗昏冒發厥診其脈大而無力乃為之辨曰外感發熱手背加甚內傷發熱手心為甚外感頭痛常痛不休內傷頭痛時作時止辨內傷外感要訣宜熟玩今頭痛時休而手背不熱是為虛也遂用參耆各五錢白朮半夏各二錢橘紅一錢甘草六錢一劑減半後倍參術而痊一人年近四旬發潮熱口乾喜飲冷水或以涼藥服之罔效四五日渾身沉重不能動止四肢強直耳聾譫言妄語眼開不省人事六脈浮大無力此氣血虧損之極以十全大補湯去白芍地黃加熟附子一服鼾睡痰響或謂服參耆肉桂附子之誤曰此藥病交攻不必憂疑又進一服過一時許即能轉身動止次日連進數劑則諸病潛瘳矣此從脈不從症之治也李時珍治一人素飲酒因寒月哭母受冷遂病寒中食無薑蒜不能一啜至夏酷暑又多飲水兼懷怫鬱因病右腰一點脹痛牽引右脅上至胸口則必欲臥發則大便裡急後重頻欲登圊小便長而數或吞酸或吐水或作瀉或陽痿或厥逆或得酒少止或得熱少止但受寒食寒或勞役或入房或怒或飢即時舉發一止則諸證泯然如無病人甚則熱發數次服溫脾勝濕滋補消導諸藥皆微止仍發此乃飢飽勞役內傷元氣清陽陷遏不能上升所致也遂用升麻葛根湯合四君子湯加柴胡蒼朮黃耆煎服服後仍飲酒一二杯助之其藥入腹則覺清氣上行胸膈爽快手足和暖頭目精明神采迅發諸症如掃每發一服即止神驗無比若減升麻葛根或不飲酒則效便遲大抵降多升少稟受弱而有前諸症者並宜此藥活法治之本草綱目薛立齋治府庠王以道元氣素弱丙午丁未二年以科場歲考積勞致疾至十二月間其病盛作大熱淚出隨凝目赤面黯楊手露胸氣息沉沉幾絶脈洪大鼓指按之如無舌乾捫之如刺此內真寒而外假熱也遂先服十全大補湯曰既服此湯其脈當收斂為善少頃熟睡覺而惡寒增衣脈頓微細如絲此虛寒之真象也以人參一兩加熟附三錢水煎頓服而安夜間脈復脫以人參二兩熟附五錢仍愈後以大劑參朮歸身炙草等藥調理而安一男子發熱煩渴頭痛誤行發汗喘急腹痛自汗譫語用十全大補加附子治之熟睡喚而不醒及覺諸症頓退再劑而安黃武選飲食勞倦發熱惡寒誤用解表神思昏憒胸發赤斑脈洪數而無力此內傷元氣非外邪也急用溫補之劑彼不從後果歿王肯堂治外兄虞文華病發熱一醫審無身痛等症知非外感用平胃散加人參五分投之熱愈甚用平胃亦無謂又一醫至診之曰此人參之過也亟汗之汗而不解又一醫至診之曰邪入里矣宜涼膈散下之煎成欲服王適至急止之診得六脈皆洪大搏指舉按有力笑曰此醫之所以誤也用茯苓補心湯加人參六錢麥冬三錢棗仁一錢五分時不臥九日矣服藥即鼾睡良久而蘇病已退診之脈頓微弱為治方每劑用人參四錢棗仁茯神歸朮耆麥冬川芎之類令其多服不輟遂別去數日以小便不利來扣令服導赤散明日熱復作舌黑如墨復延診脈復洪大因連日所服藥皆減參三分之二而導赤散中又加花粉山梔黃芩等藥故病復作亟令用人參六錢合前諸藥大劑投之舌色始淡熱始除小便亦清利倘進涼膈之劑必不治藥可妄投哉馬元儀治邱德初素積勞郁近復失恃過哀因而發熱惡寒𩚬逆煩渴面赤如妝診其兩脈沉微無力知非實火內燔乃虛陽上越得之悲哀勞倦內傷也悲哀則傷肺勞倦則傷脾脾虛無以生肺肺虛無以生腎所以封藏不固致虛陽上升升降失常致濁氣上行由是氣逆於胃則為𩚬逆火遊於上則為煩渴也法宜溫補之劑從其性而歸之於下則諸症自平矣與人參加桂理中湯五劑霍然吳洪先病經七日寒熱似瘧手足麻木汗出如注心悸恍惚診得寸脈空大關尺虛澀曰此症人多謂風寒外感不知為勞倦內傷也寸大關尺澀乃脾肺之氣受虧心腎之陰亦涸氣虛不能升達陰往乘之則寒陰虛不能內養而陽復乘之則熱心悸恍惚者陰不主事而陽內擾汗出如注者陽不主事而陰外亡也手足麻木者陰陽兩虧氣血俱不得榮也以當歸補血湯為主加人參二錢以補脾肺之陽肉桂黃連各七分俾坎離內交廣皮炙草以補胃而和中一劑便得鼾睡再劑汗止再以補中益氣湯升發陽氣加穿山甲以祛內邪寒熱遂止脈亦和但重按少力微見𩚬逆用大劑桂附理中加丁香半夏數劑而痊王亦林患勞倦發熱神昏倦怠已半月皆作外感治不愈診得兩脈浮虛右脈倍甚此飲食失節勞役過度脾虛則胃氣亦虛氣不上行於陽反下陷於陰而發熱也夫內傷脾胃之症與外感風寒者不同東垣言之詳矣外感風寒乃傷其形為有餘之症內傷脾胃乃傷其氣為不足之症有餘當瀉汗之吐之下之克之是也不足當補溫之和之調之補之是也經云勞者溫之損者溫之又上氣不足者推之揚之脾不足者以甘補之當以辛甘溫之劑補其中而升其陽則愈矣乃用補中益氣湯服後得微汗然非發汗也乃陰陽氣和而汗自出也一劑熱退再劑神清不數劑而康復倍常矣氣虛故用參耆下陷故用升柴此補中益氣之旨也設陰氣亦虧則升柴便當斟酌用者詳之朱丹溪治一人本內傷汗下後譫語初能認人後三日語便妄言此神不守舍慎勿攻伐脈多細數不得睡足冷氣促面褐青色鼻乾燥用補中益氣加人參半兩竹葉三十片煎服效繆仲淳治一人年三十三歲因努力即發心中飽滿疼痛直至臍下皆板兩脅空松不可言腹寒即欲就火火至稍睡痛止大便不通小便短縮似宿茶日夜不臥至五周時飲食漸加時常舉發大約性嗜酒善怒勞碌所致方用當歸身五錢牛膝四錢麥冬五錢酒芍五錢炙草七分五味一錢橘紅二錢茅根一錢五分生地三錢宜多食韭菜童便胡桃肉廣筆記於中父患目珠痛如欲墮此肝火上衝也胸膈及背如槌碎狀此怒而血瘀也晝夜咳嗽此悲傷肺也眠食俱廢自分不起繆令進童便三大碗七日下黑血無數痛除咳熱如故再以二冬貝母蘇子橘紅白芍鱉甲青蒿桑皮五味百部枇杷葉竹瀝童便久之未痊病家疑其虛促用參耆繆不可乃陰以黃耆二錢入前藥嘗之竟夕悶熱目不交睫始信不謬固守前方兼服噙化丸勿輟逾月平蓋仲父病起於哀傷過甚更觸惱怒所致非虛也肺熱而實肝火上衝故不宜參耆耳噙化丸用薄荷葉三兩五錢百部酒浸去心三兩五錢麥冬二兩天冬二兩蜜炙桑皮三兩蜜炙枇杷葉三兩貝母二兩桔梗米泔浸蒸一兩炙甘草七錢天花粉二兩元參一兩蜜炙五味一兩款冬花二兩紫菀八錢真柿霜二兩橘紅一兩研末蜜丸彈子大臨臥噙化立齋治一人因勞倦耳下焮腫惡寒發熱頭痛作渴右手脈大而軟此不足症也當服補中益氣湯彼反用發表藥遂致嘔吐始悟以六君子湯治之更服補中益氣湯而愈大抵內傷者榮衛失守皮膚間無氣以養則不能任風寒胃氣下陷則陰火上衝氣喘發熱頭痛發渴而脈大此乃不足之症也大抵飲食失節勞役過度則多成內傷不足之症若誤以為外感表實而反瀉之豈不致虛虛之禍哉東垣曰凡內傷為飲食勞役所傷則右手脈大於左手外感風寒則左手脈大於右手當以此辨之倪仲賢治林仲因勞發熱熱隨日出入為進退飲食漸減倪切之曰此得之內傷故陽氣不伸陰火漸熾溫則進涼則退是其徵也投以治內傷之劑其疾如失原機啓微張意田治鍾姓人因舉重用力略有脅痛數日後發熱身疼甚至胸脅痞硬服大小陷胸更劇診之左脈強硬而數右脈寸尺浮而關沉滯胸脅拒按四肢厥逆症似結胸然服陷胸不應必有他故察其臂上筋肉微黃咳出痰色如橘合症與脈知為用力太過脅肋受傷瘀血為患欲發黃也所謂瘀血類傷寒者此耳治宜桃仁承氣湯下之但瘀滯日久雜用攻散陰氣大損當重兼養血為是用生地二兩當歸八錢丹參四錢桃仁三錢大黃三錢枳實二錢芒硝二錢甘草八分服後下瘀血紫塊二次熱退胸平惟神氣欠清脈氣弦軟此傷陰絡而神虛故也服補陰舒絡之劑而愈治實症兼顧其虛極其周到沈明生治徐來一外有下帷之勞內忘衽席之戒偶於夏月縱啖生冷致患脹滿不食腹中漉漉有聲且復喜嘔水道祕澀凡疏解清涼之劑遍嘗罔效診之即主溫補而座間競持他説乃索筆書云積滯雖令中滿獨不思中氣不足則腹為之善脹腸為之善鳴乎諸逆衝上雖多屬火獨不思胃寒不化亦令人吐乎小便黃赤雖為內熱之徵獨不思氣不施化溺因色變乎總之症在疑似惟憑切脈今脈來沉弱右關更微兼之喜暖畏涼其為虛寒症明矣遂先用六君子湯兼以炮薑智仁之屬繼投八味丸出入於參耆桂附之間旬日良已嗣後依方調理不特精神倍常抑且連徵熊夢吳橋治陳龍年八十而病溺濁不禁則隱几而日夜坐不復近衾裯診之六脈沉沉垂絶矣叟乃命孫扶起曲跽告曰老夫春秋高子孫僅立門戶死其時也吾從侄繼鸞年四十病瘵且危家極貧舉室五口嗷嗷待哺願公救其死即龍死賢於生就而診之臥無完席室中僅二缶作炊然左脈平右脈虛大而數曰此憂思傷脾也扶脾土則有生理治宜補脾抑肝此金匱法也叟聞瘵者可生則大喜過望其病一再劑而愈逾月瘵者無恙則夫婦帥諸子羅拜謝之太函集魏玉橫曰王某膏粱子也年弱冠好角力因舉石井欄致勞傷久而晡熱咳嗽脅痛面青白目下胞青紫諸治不效診之脈弦略數右尺弱兼澀曰腎為作強之官因勞而傷肺為腎母因子病而耗及母氣肝為腎子母病而子失其養乃金不生水水不滋木木燥則生火上侮金而下乘土故目胞青紫咳嗽諸症作也與生熟地杞子沙參麥冬地骨皮女貞等四劑忽盜汗如雨疑藥之誤曰此佳兆也夫火燥為患津液之虧得純陰之劑以濡之猶釜中有水熏蒸而益潤也由是鬱熱除而血脈復矣問可斂乎曰不可若斂之則火仍內伏第再養金水使陰平陽祕則汗自止而病自瘳矣如言而愈江氏姊年五十餘因子病傷寒二十餘日焦勞過甚及子愈而己病作寒熱頭疼面赤滿口舌發疱目不交睫者數夜一老醫謂少陽陽明熱症與小柴胡合竹葉石膏湯脈之豁大無倫乃力斷為勞傷虛火上浮戴陽假熱之症若誤藥立見危殆乃與熟地一兩肉桂一錢炙甘草一錢麥冬二錢歸身三錢一劑即熟睡比覺口舌之疱盡消遂霍然矣當是時余初臨症由今思之則但與養清湯為至當也後六旬外復患虛症誤服黃耆煮棗單方月餘忽遍身浮腫動即氣急後服熟地數斤乃愈
