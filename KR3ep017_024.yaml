body:
  text: 卷二十四妊娠王顯字世榮文昭皇后之懷世宗也夢為日所逐化為龍而繞後後寤而驚悸遂成心疾文明太后敕召徐謇及王顯等為後診脈徐謇言是微風入臟宜進湯藥及加針灸顯診云按三部非有心疾將是懷孕生男之象後果如言汪石山診一婦形長色紫妊五月矣求脈之以別男女汪曰脈右大於左脈訣云左大為男右大為女今脈右大當是女耶彼則喜曰我男胎矣往歲有妊時尊甫先生診之亦謂右脈浮大當是女孕後生男今妊又得是脈可知為男矣後果生男汪曰脈書但道其常莫能盡其變此醫所以貴乎望聞問切也張子和診一婦人年四十餘得孕自以為年衰多病故病復作醫亦不察加燔針於兩臍旁又以毒藥攻磨轉致腹痛食減形羸已在床枕張診其脈曰六脈皆平惟右尺洪大有力此孕脈也兼擇食為孕無疑左右皆笑之不數月生一女兩目下各有燔針痕幾喪其明凡治病婦當先問孕不可倉卒王胡之妻病臍下積塊擇食面黃肌瘦而不月或謂之乾血氣治之無效張視之曰孕也其人不信再三求治乃與之平藥以應其意妙否則別求人治或致誤事終不肯下毒藥凡攻病之藥皆曰毒藥後月到果胎也問何以別之曰尺脈洪大也亦有尺脈微弱而孕者見求子門汪石山案素問陰陽別論所謂陰摶陽別之脈崑山周知縣景星家一婦病腹中塊痛專科診之曰氣積投以流氣破積之劑又命人以湯餅軸戛之不效聞有巫峰神廟頗靈往問之云此胎氣也勿用藥信之彼果生一男南京戶都主事韓文光妻病腹中作痛按之若有物在臍左右者適浙中一名醫至京請診之云是癥瘕服三稜蓬朮之劑旬余覺愈長亦以其不效乃止後數月生二男此皆有命而然可不慎哉客中間集程氏光治一有胎婦兒啼腹中皆不治乃傾豆於地令婦低頭拾之兒啼止江西通志萬密齋曰兒啼腹中此症臨月將産婦人有之師母錢氏嘉靖戊子有娠九個月兒在腹中哭錢大驚令作男子拜而止之過二十日生師兄邦孝師母以下似萬門人語邦孝似萬之子李有懷妾高氏懷妊二十七月舉子後亦長成云間雜志朱丹溪曰懷孕受物乃一臟之虛假如肝臟虛其肝氣止能養胎無餘用也不能榮肝肝虛故愛酸物治法邢氏亡其名朱勝非婦偶小疾命視之曰小疾爾不藥亦愈然不宜孕孕必死其家以為狂言後一一歲朱婦得子其家方有抱孫之喜彌月婦疾作急召之堅不肯來曰去歲已言之無可療之理越宿而婦卒人共奇之錢塘縣志薛立齋治一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍參朮茯苓三十餘劑胃漸健胎安而長矣一妊婦因怒寒熱往來內熱晡熱脅痛嘔吐胎至八月而不長此因肝脾鬱怒所致用六君加柴胡山梔枳殼紫蘇桔梗病愈而胎亦長矣胎動薛立齋治鴻臚張淑人痢疾後胎動心神不安肢體殊倦用八珍散二十餘劑漸愈因勞加煩熱頭痛以大劑補中益氣湯加蔓荊子治之熱痛頓止仍用前散又五十餘劑而安其後生産甚易一妊婦八月胎欲墜如産臥久稍安日晡益甚此氣血虛弱用補中益氣湯加茯苓半夏隨愈更以八珍湯調理而安一妊婦小便作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝木熾盛所致用龍膽瀉肝湯一劑諸症頓愈乃以四君子加柴胡升麻以培脾土而安孫文垣治張溪亭子室娠已七月夢見亡過祖母揮拳在背打一下即覺胎動不安血已下大小便皆急腰與小腹脹痛者五日診之兩寸俱短弱此上焦元氣大虛當驟補之人參阿膠黃耆白朮各二錢當歸白芍條芩杜仲各一錢砂仁香附各五分苧根嫩皮三錢蔥白六錢一劑而血止再劑諸症悉除四劑後減去蔥白苧根調理旬日足月産一女吳孚先治孫氏妊婦六月作瀉欲小産診之曰此水胎也四君子加炮薑制附十餘劑而安陳三農治一孕婦腰痛甚如欲小産用杜仲一兩薑汁拌炒續斷一兩二味為丸白湯送下遂安薛立齋治一婦人胎下墜或動身體倦飲食少思此脾氣虛弱用補中益氣湯倍白朮加蘇梗三十餘劑而安産後眩暈胸滿咳嗽用四物加茯苓半夏桔梗而愈一妊婦內熱晡熱或兼寒熱食飲少思其胎或下墜或上攻此肝經血虛而火動耳先用加味逍遙散數劑次用六君子加柴胡枳殼各數劑而愈一婦人每受胎三四月作痛欲墜此為胎痛用當歸二錢熟地黃三錢而愈張飛疇曰古人用條芩安胎惟形瘦血熱榮行過疾胎常上逼者相宜若形盛氣衰胎常下墜非人參舉之不安形實氣盛胎常不運者非香砂耗之不安血虛火旺腹常急痛者非歸芍養之不安體肥痰盛嘔逆眩運者非二陳豁之不安此皆治母氣之偏盛也若有外邪仍宜表散伏邪時氣尤宜急下惟忌芒硝切不可犯雄按條芩但宜於血熱之人若血虛有火者余以竹茹桑葉絲瓜絡為君而輔以他藥極有效蓋三物皆養血清熱而息內風也物之堅強莫如竹皮肉之緊貼亦莫如竹實為諸血證之要藥觀其塞舟不漏可知矣桑葉蠶食之以成絲絲瓜絡筋膜聯絡質韌子堅具包羅維繫之形且皆色青入肝肝虛而胎系不牢者勝於四物阿膠多矣子懸此證即胎上逼也附子滿嚴氏紫蘇散許叔微云治懷胎近上脹滿疼痛謂之子懸陳良甫曰妊至四五月君相二火養胎熱氣逆上胎湊心胸腹滿痞悶用此加黃芩山梔之類一方無川芎名七寶散紫蘇一兩腹皮人參川芎橘皮白芍當歸各三分甘草一分銼分三服水一盞生薑四片蔥白煎去渣服汪訒庵曰此方每服止用蘇葉一錢當歸七分腹皮以下皆五分甘草二分無蔥白沈堯封治郁姓婦懷妊九月偶因勞動遂覺腹痛胎漸升至胸中氣塞不通忽然狂叫咬人數人扶持不住即子懸之最重也用旋覆代赭湯去參棗連灌兩劑胎墮得生又一婦證亦如之服前藥胎墮而死又陸檢修正室子上撞心江穩婆教磨代赭汁服遂産兩子一子在上橫於心下一子撞著上子故經一晝夜不止撞心得不死産下遂安陳良甫曰一婦孕七個月遠歸忽然胎上衝作痛坐臥不安兩醫治之無效遂云胎已死矣用萆麻子研爛和麝香貼臍中以下之命在呼吸陳診之兩尺脈絶他脈和平陳問二醫作何證治之答云死胎陳問何以知之曰兩尺沉絶以此知之陳曰此説出何書二醫無以答陳曰此子懸也若是胎死卻有辨處面赤舌青子死母活面青舌赤吐沫母死子活唇舌俱青母子俱死今面不赤舌不青其子未死是胎上逼宜以紫蘇飲連進至十服而胎近下矣雄按戊申秋荊人妊八月而患咳嗽礙眠鼻衄如射面浮指腫諸藥不應余思素屬陰虛內火自盛胎因火動上湊心胸肺受其沖咳逆乃作是不必治其嗽仍當以子懸治之用七寶散去參芍生薑為其胸滿而內熱也加生石膏以清陽明之火熟地以攝根蒂之陰投匕即安今年冬亦以八月之妊而悲哀勞瘁之餘胎氣衝逆眩暈嗽痰脘脹便溏舌黃口渴豫蠲飲六神湯去膽星茯苓加枳實蘇葉大腹皮以理氣開鬱黃芩梔子竹茹以清熱安胎一劑知二劑已凡子懸證因於痰滯者余每用此法無不應如桴鼓薛立齋治一妊婦每因恚怒其胎上逼左關脈弦洪乃肝火內動用小柴胡加茯苓枳殼山梔而愈但體倦不食用六君子加枳殼柴胡山梔而瘥孫文垣治費少垣乃眷妊已九月痰多喘嗽胎氣上逆眼撑不能起兩太陽微疼此子懸症兼痰火也以大紫蘇飲為主才服一帖即不上逆胸膈頓寬惟喘咳不止與七制化痰丸而安紫蘇飲紫蘇腹皮川芎白芍陳皮當歸生薑人參甘草蔥白陸祖愚治梅養中子婦孕七月其夫出外經商患胎上衝心不時昏暈或與紫蘇安胎飲數劑不效脈之寸大於關關大於尺俱帶弦數此血虛極而火炎之故也用清氣養榮湯磨沉香四分牛黃二分煎就徐徐灌之不終劑而蘇矣萬密齋治徐太和之妻娠八月得子滿病或作子懸治不效腹滿轉甚胎墜下迫玉門大張胞形外露但仰臥不能坐其脈兩手俱堅大搏指謂曰病無害乃雙胎也胎肥氣弱不能束約故下墜耳用束胎利氣主之加人參一錢升麻炒三分服三劑胎復上而安後生一男一女楊乘六治我修侄婦妊八月一日胎忽上搶塞至心口喘滿不思食自汗悶絶僵臥口噤目直視面色不赤舌色不青按其兩手脈息尚有急取丸子兩許滾水研化灌之灌至兩酒杯胸口鬆動口開睛轉手足運動而蘇問何藥乃爾神效曰八味丸也又問此何病而用此丸曰此子懸也由下元虛冷中無火以養嬰兒故上湊以就心火之溫如入睡被中足冷則上縮也後用耆朮芎歸煎送前丸服至兩月而産沈堯封云此是百中僅一非實見虛寒脈證熱藥不可嘗試子腫一孕婦遍身皆腫或以為白火疸或以為鼓脹治俱不效産科郭大生曰此名琉璃胎至將産一月前必飲食大進産即腫消矣後果然彼蓋閲歷多故耳然病之所以然究未之知也一婦孕七月先下體發腫漸及面目閲數日忽子戶內突出一水泡皮薄而光亮於是身體悉消矣然起臥不便困苦非常後復皮破出水恆不得干偶一內親自言昔嘗患此有醫教用王不留行及明礬等藥煎洗而痊如言試之苦於螫痛如此月餘比前稍愈而終不除詢産科亦罕知者但云此似不妨必所謂琉璃胎也産時自消後果然雄按此症恐是氣虛挾水一孕婦遍身發腫既産仍不消只向里床臥終日昏迷不省人事有時少醒即又狂躁不寧如此二十餘日絶口不食諸醫束手偶有村媼聞而告曰無憂我兒媳亦曾如此不餓死也但用陳年白鯗向病人前炙熱以米醋沃之彼聞香自然飲食如言果愈腫亦遂消薛立齋治一妊婦每胎至五月肢體倦怠飲食無味先兩腿腫漸至遍身後及頭面此脾肺氣虛朝用補中益氣湯夕用六君加蘇梗而愈元豐中淮南陳景初名醫也獨有方論治妊婦子腫病其方初謂之香附散李伯時易名曰天仙藤散王荊公居金陵舉家病以詩贈景初曰舉族貧兼病煩君藥石功到家何所有一一問徵鴻因此見方得於李伯時家傳方録於臨川張右丞宅立齋治一婦子腫用紫蘇飲三服而愈轉脬鍾大延治一貴家孕婦小便祕腫痛面赤發喘衆醫莫效大延診之曰是可弗藥乃胎壓膀胱耳令其周身運轉而瘳寧波府志孫卓浮梁人素精歧黃正德間邑令以宸濠之變先輿送其夫人避中山病前祕五日腹大如鼓仰面張目息已微急召孫孫曰此盛暑急驅飲水過度羞溺而轉脬也法以豬尿脬吹氣貫滿令女婢投入沖之而溺淋淋下遂起江西通志孫文垣治一富家婦大小便祕者三日市師以巴豆丸二帖大便瀉而小便愈祕脹悶臍突二寸余前陰脹裂不可坐臥啼泣呻吟欲求自盡孫曰此轉脬病也桖樹東行根皮一寸滑石三錢元胡索桃仁當歸瞿麥各一錢臨服入韭菜汁半杯服後食頃小便稍行玉戶痛甚非極用力努之則不能出改用升麻桔梗枳殼元胡索煎成調元明粉二錢乃提清降濁之意服後大小便俱行始不脹急次日報云每便時腹先痛有淡血水小便短再以丹參丹皮當歸白芍甘草青皮香附元胡茯苓山梔山楂兩帖而安孫君又有四卷七十七頁一案亦轉脬病治法大抵如前惟多令患者橫臥界有力婦人以患者兩腿膝彎架肩上將下體虛空提起搖擺數回則尿脬倒上徐徐放下患者去衣不及小便箭射而出熱如湯黑如墨頃刻盈盆按轉脬病古人但令患者橫臥榻上高其下體良久其尿自通殊不費力黃履素曰豫窗友賀立庵方伯常言其伯父賀嶽精於醫曾治一孕婦將坐草患小便不通百藥不效愈飲愈飽束手待斃賀君診之曰此乃脾氣虛弱不能勝胞故胞下壓塞膀胱以致水道不通大健其脾則胞舉而小便自通以白朮二兩土炒加炒砂仁數錢別加一二輔佐之藥服一劑小便立通其神如此豫常記此言於懷中王寅歲內人有妊臨月竟同此病醫療無效危甚余以此法告醫者喜醫虛心如法治之立效遂舉長子寅錫余若不聞此言母子均殆矣雄按今夏錢希敏室人患此甚危速余視之脈甚滑數睛赤口乾與車前子滑石血餘栝蔞知母梔子牛膝紫草沙苑大劑投之溺仍不行竟産一男既而胞下溲滿其中蓋兒已出胞頻飲湯水盡貯於中心余雖初不料其如此然設非開泄導下則胎不即下而再加健脾燥補之藥則吉凶不可知矣臨證不亦難乎李時珍嘗治數人小便不通及轉脬危急者令將蔥管吹鹽入莖內極有捷效又小兒不尿乃胎熱也用大蔥白切四片乳汁半盞同煎片時分作四服即通不小便者服之即通不飲乳者服之即飲乳若臍四旁有青黑色皮口撮者不可救也本草綱目薛立齋治司徒李杏岡仲子室孕五月小便不利諸藥不應薛曰非八味丸不能救不信別用分利之藥肚腹腫脹以致不起儒者王文遠室患小便不通小腹腫脹幾至於殆用八味丸一服小便滴瀝再以前藥一料加車前子一劑即利肚腹頓寬而安陸養愚治方思桂女年十四患大小便不通已三日村醫與丸藥數十粒如芝麻大服之大便立通而瀉小便仍祕又二日脹悶臍下突出脹時抽痛不能坐臥啼泣呻吟欲求自盡脈之沉數而兩尺尤甚曰此轉脬病也時尚炎熱以六一散井水調服之小便稍行行時陰中極痛後仍點滴不暢大便努責而無積腹痛時作痛則如刀刺再診脈仍沉數乃用升麻三分柴葛甘桔各一錢以提清降濁服後二便俱行小便純血大便亦帶血水其家猶危之曰今無恙矣嚮者丸藥必巴豆也病本熱鬱而以極熱之藥攻之向之刺痛今之溺血皆巴毒使然也以犀角地黃湯加黃連山梔而愈萬密齋治一娠婦小便淋瀝不通醫作轉胞治之不愈乃用檳榔赤芍二味研末順取長流水煎湯調服效此方治男婦一切血淋及淋澀水道疼痛用之無不神效馬元儀治沈氏妾妊娠八月下利二十餘日利後患小便淋閉渴而引飲飲畢方去滴許澀痛異常已三晝夜診得肺脈獨大餘脈虛澀曰下利經久脾陰必耗燥火自強今見肺脈獨大是火據肺位金被火制氣化不及州都便溺何由而出經曰病在下者治上令上竅越則下竅自行矣且妊婦之體脈見虛澀氣血不能養胎可知若再行趨下不惟病不除且有胎動之患因與紫菀五錢專理肺氣下及膀胱乾葛一錢升發胃氣敷布津液火鬱則氣燥以杏仁蘇子潤之燥勝則風生以薄荷清之加枳殼桔梗開提三焦之氣一劑小便如泉再劑利下亦止吳橋治趙氏婦故孱弱有身七月病不得大小溲醫者遞以四苓利之卒不利久則小腹前後脹急痛楚躁亂昏憒殆將不勝橋診之則以補中益氣湯加黃連為劑一服小溲稍行明日為湯液五斗呼潔壺者口授之扶病者坐臨盤遞引湯沃病者腹沃已口授産嫗舉手捧其胎大小溲即行病愈矣病得之食砒而吐未盡其遺毒觸胎病者故內虛胎氣下墮而壓脬矣或曰胎壓脬而不得小溲誠是也大溲何為橋曰小溲塞則鼓膀胱是將壅大腸其氣亦為不利故爾聞者曰善太函集胎墜薛立齋治一婦人墮胎昏憒不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎湧出彼以為中風欲用祛風化痰之劑薛曰此屬脾氣虛寒所致遂用十全大補湯加炮薑二十餘劑尋愈一婦人年二十餘疫疾墮胎時咳服清肺解表喘急不寐薛謂脾土虛不能生肺金藥損益甚先與補中益氣加茯苓半夏五味炮薑四劑漸愈又與八珍加五味及十全大補湯全愈龔子才治一婦人每懷孕至三個月必墮不肯服藥教以四五年老母雞煮湯入紅殼小黃米煮粥食之不數服而胎固至足月生男方節庵之夫人朱氏屢受産難因就醫乞墮胎方服之無效復求方於鄭氏鄭云墮胎不下必貴兒也今後宜服安胎藥矣一日方間步阡陌間見一道人手攜竹筐坐於橋下與之語道氣盎然因設齋留之到家問筐中何物曰此濟瘳病人丹藥也因授一方名曰回生救産丹並勸修合普施朱夫人誕彌厥月時服一丸則果如達矣遂連生二子長名鵬字矯亭次名鳳字改亭後一為宮詹一為御史張氏卮言薛立齋治一婦苦於生育孕及三月以麵粉燒酒調服墮胎胎去下血不止嘔吐湯藥不納六脈細小欲絶作毒藥傷胃氣胃氣虛不能司納以人參二錢甘草五分水煎徐徐與服嘔止用八珍湯調理而安又治一孕婦用前藥患前症胸腹飽滿嘔吐不止用緑豆甘草湯飲之而安一婦懷孕三月而墮墮後發熱自汗四肢軟弱曰氣血虛不能榮養其胎故墮墮後益虛陰虛則發熱陽虛則自汗以十全大補湯去桂加五味子而安吳橋治程應兆妻故多病三月不月已忽微行諸醫以為積血而力導之惡乃大至舉身汗溢垂絶而蘇則又為虛極而重劑補之上視反張驚搐昏冒飾巾待盡橋診之脈雖離經按之不絶曰此妊脈也誤謂積血迫之大行胎離經而欲下則血竭而途窮陽氣無陰血可依則浮騰而上越胎墮陽上逆而觸心故上視反張驚搐昏瞀法不當死乃豫順胎散始進甚艱既及半而藥力行嗒焉而寐諸醫目橋曰死矣橋曰藥中病乃寐諸公待之頃之呻吟始雲頭痛諸醫以為餘燼也夜分乃終橋曰中夜陽生比當來復時至而圉圉乃少舒詰朝爽然俄僕臥內諸醫目懾橋曰真死矣橋曰胎欲下而血垂盡壅閼不得行尋以順胎散下之則血塊大如拱諸醫懾橋曰吾儕固以為積血果然橋徐應曰非積血也胎也立引水激而濯之外紫而中白具人形病者漸安諸醫乃服太函集徐靈胎曰婦科之最重者二端墮胎與難産耳世之治墮胎者往往純用滋補治難産者往往專於攻下二者皆非也蓋半産之故非一端由於虛滑者十之一二由於內熱者十之八九蓋胎惟賴血以養故得胎之後經事不行者因衝任之血皆為胎所吸無餘血下行也苟血或不足則胎枯竭而下墮矣其血所以不足之故皆由內熱火盛陽旺而陰虧也故古人養胎之方專以黃芩為主又血之生必由於脾胃經云榮衛之道納穀為寶故又以白朮佐之乃世之人專以參耆補氣熟地滯胃氣旺則火盛胃濕則不運生化之源衰而血益少矣至於産育之事乃天地化育之常本無危險之理險者千不得一世之遭厄難者乃人事之未工也其法在乎産婦不可令早用力蓋胎必轉而後下早用力則胎先下墜斷難舒轉於是橫生倒産之害生又用力則胞漿驟下胎已枯澀何由能産此病不但産子之家不知即收生穩婦亦有不知者至於用藥之法則交骨不開胎元不轉種種諸症各有專方其外或宜潤或宜降或宜溫或宜涼亦當隨症施治其大端以養血為主蓋血足則諸症自退也至於易産強健之産婦最多卒死蓋大脫血之後衝任空虛經脈嬌脆健婦不以為意輕舉妄動用力稍重衝脈斷裂氣脫血崩死在頃刻尤忌舉手上頭如是死者吾見極多不知者以為奇異實理之常生産之家不可不知也胎死章虛谷治陳姓婦年未三十懷妊已六月腹滿及胸飲食不進大便艱燥小便不利左胯間與小腹掣痛如錐刺日夜坐不能寐醫用五苓散方章診之左脈弦強關尤甚右關弦滯曰凡溫邪脈必濡細今脈象如是乃血少肝氣犯脾胃也彼以小便不利故認為濕邪不知經云肝主遺溺癃閉此肝火鬱結之癃閉也風火煽動故胯間刺痛若用利水藥反傷津液其燥愈甚必致痙厥之變矣乃重用大生地為君佐以當歸白芍黃芩紫蘇生甘草梢加厚朴木香等服兩劑脈稍和滿略減惟小便仍澀猶有刺痛於前方加黃柏車前服兩劑小便暢行其痛若失乃去黃柏紫蘇又服兩劑胸寬食進惟腹滿不能全消至第三夜忽於睡夢中震響一聲落下死胎一個滿床皆水始悟水在胞中其胎早經泡死利水之藥斷不能泄胞中之水反耗其陰必致痙厥而死病情變幻有非常理所能測者同時章侄女亦患此症為醫用利水藥而致痙厥又妄認為中寒用附子理中湯一劑乃至陰陽脫離章用大劑滋陰攝陽之藥晝夜急進竟不能救延三日而卒許裕卿治邵涵貞內子孕十七月不産不敢執意憑脈問諸情況果孕非病但云孕五月以後不動心竊訝之為主丹參一味令日服七錢兩旬余胎下已死而枯其胎之死料在五月不動時經十三月在腹不腐而枯如果實在樹敗者必腐亦有不腐者則枯胎之理可推也雄按此由結胎之後生氣不旺未能長養萎於胞中又名僵胎余治過數人矣若胎已長成豈能死於腹中而不為大患哉惜許君言之未詳也故及之張路玉治馬雲生婦孕十三月不産脈來微結為處十全大補湯服至二十餘劑而下胎枯色白治雖異而胎枯則一也喻嘉言治顧季掖乃室仲夏時孕已五月偶爾下血醫以病經一月用阿膠勉固其胎又身腫氣脹血逆上奔結聚於會厭胸膈間飲食才入觸之痛楚轉下甚難稍急即嘔出全似噎症數更醫皆謂胎氣上逼延至秋計孕已八月病已造極中之極呼吸將絶診之不云病狀其脈尺部微澀難推獨肺部洪大無倫其喘聲如曳鋸其手臂青紫腫亮如毆傷色乃駭曰似此凶症何不早商然不必明言以滋驚恐姑以善藥投之通其下閉上壅可也季掖必求病名曰上壅者以肺脈之洪大合於會厭之結塞知其肺當生癰也下閉者以尺脈之微澀合於肉色之青腫知其胎已久壞也善藥者瀉白散加芩桔之苦以開之不用硝黃等厲藥也服一大劑腹即努痛如欲産狀問欲産乎曰肺氣開而下行多時閉拒惡穢得出可也奚産之云再進一劑身腫稍退上氣稍平下白汙如膿者數斗裹朽胎而出旬余尚去白汙並無點血相間可知胎朽腹中已近百日蔭胎之血和胎俱化為膿也病人當時胸膈即開連連進粥神思清爽然朽胎雖去而穢氣充斥周身為青腫者未去也胸膈雖寬而肺氣壅遏為寒熱咳嗽者未除也乃一以清肺為主旬余獲痊然則肺癰未成乃穢濁之氣上攻而然耳立齋治一穩婆之女勤苦負重妊娠腹中陰氣重墜口中甚穢意其胎必死令視其舌果青黑與朴硝半兩許服之隨下穢水而愈濟陰綱目是薛案一婦胎死服朴硝而下穢水肢體倦怠氣息淹淹用四君子為主佐以四物薑桂調補而愈雄按未可即投大補恐穢濁逗遛反生他變也李將軍妻病甚呼華他視脈曰傷娠而胎不去將軍言間實傷娠胎已去矣他曰按脈胎未去也將軍以為不然他捨去婦稍小瘥百餘日復動更呼他他曰此脈故是有胎前當生兩兒一兒先出血出甚多後兒不及生母不自覺旁人亦不寤不復迎遂不得生胎死血脈不復歸必燥著母脊故使多脊痛今與湯並針一處此死胎必出湯針既加痛急如欲生者他曰此死胎久枯不能自出宜使人探之果得一死男手足完具黑長可尺許他之絶技凡此類也三國志陳鬥岩治一婦孕四月而墮墮後腫脹發熱氣喘脈洪盛面赤口鼻舌青黑陳曰脈洪盛者胎未墮也面赤者心火盛而且干也口鼻舌青黑肝氣絶而胎死也以蛇蛻煎湯調平胃散加芒硝歸尾服之下死胎而安甘陵相夫人有妊六月腹痛不安華他視脈曰胎已死矣使下之果下男形即愈三國志陳良甫治僇宅厥媳孺人杜氏生産不下坐婆魂童救療皆無效召診之曰産前脈不可考但當察色而知之遂揭帳明燭以察之其面色赤舌色青如此色者知胎已死母卻無憂矣或問曰何以知之答曰面赤舌青子死母活明矣躬自合至寶丹三粒服之胎即落矣此以見古人處方神速良方異胎莊氏婦懷妊三年不産有醫者診之曰脈象頗異疑必異物當以藥下之服畢覺腹中奇痛産一胞墮地而裂中有小蛇蜿蜒盤屈以次而出急撲之沈布衣麟親見其事三岡識略張路玉治一婦懷孕六月因喪子悲哭動胎醫用黃芩白朮等二服不應改用香附紫蘇枳殼砂仁一服胎遂上逼心膈下脹悶喘急口鼻出血第三日薄暮往診其脈急疾如狂風驟雨十餘至則不至頃之復至如前因喻之曰此孕本非好胎安之無益不若去之以存母命因思此胎必感震氣所結震屬木惟金可制令以鐵斧燒紅醋淬乘熱調芒硝一兩灌之夜半果下異胎下後脈息微和神思恍惚所去惡露甚多又與安神調血之劑數服而安孫文垣治張氏婦年二十一診之左寸關短弱尺滑右寸亦滑關濡弱尺沉微診畢其夫問曰脈何如不告原病曰心神脾志皆大不足囫圇得妙肺經有痰孫君平生多以一痰揣病左寸短弱如此安得有孕曰已七十日矣問曾經孕育否曰已二次此其三也問二産皆足月否男耶女耶曰始産僅九月手足面目俱全第無啼聲抱起已身冷矣細檢之乃知其無水火也水火前後陰也次亦九月而産亦無啼聲驗之口中無舌二胎之異如此乃為制方以補心脾為主令多服以百帖為率棗仁茯神遠志各一錢白朮二錢白芍當歸枸杞各一錢五分甘草五分生地八分艾絮二分龍眼肉五個水煎服足月産一子次年又有身不以前事為意至九月産下形體俱備外有脂膜一片包其面不能去即殞因思上年所産獲全藥之力也乃以前方黏壁間才見有身即照方服之後生子女皆無恙凡小兒有不足之症皆緣父母有虛損處觀此當舉一三反郭茂恂嫂金華君産七日不食始言頭痛頭痛已又作心痛既而目睛痛如割如刺更作更止相去無瞬息間每頭痛欲取大石壓良久漸定心痛作則以十指抓壁血流滿掌痛定目復痛又以兩手自剜取之如是十日不已衆醫無計進黑龍丹半粒疾少間中夜再服乃瞑目寢如平時至清晨下一行約三升許如蝗蟲子三疾減半巳刻又行如前則頓愈矣濟陰綱目河南開封府有丹客之婦懷妊甚巨動躍間似雙胎也丹客語婦曰若生二男當名虎四兒虎五兒一日欲出而天若雨狀謂妻曰晴履可耶抑雨具去可耶妻未答則腹中朗應曰無雨丹客驚懼曰汝何人則曰虎四兒也言未竟又聞聲曰雖不落也有幾點丹客曰汝又何人曰虎五兒一日丹客欲煉丹其妻腹中又曰汝所為竟煉不成必須爐如何置火如何候藥如何辨又應曰如何如何乃皮毛也如何如何小點化如何如何大點化待吾母為之可也丹客遂如言行之火然硫黃偶客至門室既不深廣而客又不行其婦與二兒俱曰黃氣迫人奈何奈何至夜熏蒸而死琇按後世有小點化之説謂其傳也豫則以為豈非天怒其泄故欲滅其口乎然亦不知何妖也錢國賓云山西大同軍人朱劉祿娶妻孔氏七年始孕其腹極大七月不能行八月不能動仰臥於床延診右寸及兩尺脈加別部一倍經斷當生雙女其懷胎之狀主難産令服易産湯劑以救其母至十月期足而産産下一女其腹不減至三日腹陳痛再産一女其腹仍大咸謂怪異必傷其母矣次日腹又陳痛又産一女腹始如故初生二女存三生之女斃雄按此不為異也餘里中故老張氏兄弟三人同産皆壽而母亦無恙又見王成衣之妻一産三子並育而母産畢即暈脫隨園詩話載有一乳而生四子者異事也鬼胎滑伯仁治仁孝廟廟祝楊天成一女薄暮遊廟中見黃衣神覺心動是夕夢與之交腹漸大而若孕邀伯診治診之曰此鬼胎也其母道其由與破血墜胎之藥下如蝌蚪魚目者二升許遂安薛立齋治一婦人經閉八月肚腹漸大面色或青或黃用胎症之藥不應診之曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病也此郁傷脾肝之症非胎也不信仍用治胎散之類不驗薛用加味歸脾逍遙二藥各二十餘劑諸症稍愈彼欲速效別服通經丸一服下血昏憒自汗惡寒手足俱冷嘔吐不食薛用人參炮薑二劑漸愈又用十全大補湯五十餘劑而安此案依婦人良方鬼胎門選入東白馬氏婦有妊歷十四月不産形瘠尫且黑松陽周漢卿脈之曰非孕也乃為妖之所乘耳以藥下一物如金魚疾旋已立齋治一婦人虛羸有鬼胎癥塊經候不通診之曰此病也非胎也令服四物湯加芫花根而塊漸消又令用吳萸川芎柴胡殭蠶巴戟巴豆不去油芫花醋製為末煉蜜丸梧桐子大每服七丸蜜酒下即出惡物而愈後以八珍湯調理而安錢國賓云余之太倉有長年吳山其妻懷孕十有八月胎形漸大山以貧人難治日懷生死之憂求便道一診其脈浮沉長短去來至止上下不一知痰非胎矣曾見痰火喘門書中一款凡婦人當經受驚其痰由心包絡流入血海如懷胎狀經閉漸大活動身安此假胎也以清痰活血輕劑用芎歸地芍貝母天冬半夏香附白芥子茯苓陳皮枳殼各一錢煎服數月後乃愈六和塔農夫朱言之妻生平無病為人寡言凡有氣惱皆不肯發肝火久郁可知矣於天啓二年經後胎漸大起居飲食如常至十月不生又十月不生家人憂甚醫皆莫知其故錢亦曾診見六部浮鼓亦未敢斷又過五月終日撒屁如此兩月胎消因當經著氣傷肝久郁衝於血海似懷胎而無形此名氣胎表出以資多識雄按正胎亦有逾十月而産者余見許培之茂才暨其一妹一弟皆年餘或二年而生傷寒繆仲淳治於潤父夫人妊九月患傷寒陽明症頭痛壯熱渴甚舌上黑苔有刺勢甚危繆投竹葉石膏湯索白藥子醫馬病者不得即以井底泥塗臍上干則易之一日夜盡石膏十五兩五錢病瘳産一女母子毋恙治妊娠傷寒護胎為要否則墮胎多死以白藥子為細末雞子清調攤綿紙上如碗大自臍貼至臍下胎存生處干即以濕水潤之臨産者慎勿忘此感寒馮楚瞻治一孕婦勞役受寒忽四肢厥冷喘急大作額汗如雨六脈沉細欲絶令以人參五錢桂附共三錢煎服病家曰已孕三四月服桂附保勿墮乎曰此時重母不重子未有母亡而子活者服下少頃即吐出清水藥入腸胃其聲汩汩直達而下作噯數聲喘減汗收脈漸起乃平和調理以漸而安十月足生一子張路玉治一婦人素稟氣虛多痰懷妊三月因臘月舉喪受寒遂惡寒嘔逆清血血字疑水字之誤腹痛下墜脈得弦細如絲按之欲絶與生料乾薑人參半夏丸二服不應更與附子理中加苓半肉桂調理而康大抵懷孕母氣多火得連則安多寒得桂附則安多痰得苓半則安務在調其偏勝適其寒溫未有母氣逆而胎得安亦未有母氣安而胎反墮者較馮説自然所以金匱有懷妊六七月胎脹腹痛惡寒少腹如扇用附子湯溫其臟者然認症不果不得妄行是法一有差誤禍不旋踵非比芩連之誤猶可引延時日也傷暑孫文垣治竹匠婦孕五月患心痛究所由為失足墮樓也教飲韭菜汁一盞痛隨止又服他醫藥二帖心復痛吐鮮血盈盆胸間沖沖上抵痛不可言危在頃刻再診六脈皆洪大汗出如雨喘息不相續亟令移居樓下與益元散五錢紫蘇調服戒之曰今夜若睡聽其自醒切勿驚動汗止即蘇也服之果睡至曉汗斂胸膈不痛喘息亦定再與固胎飲一帖全安先是鄰醫診之謂吐血脈宜沉細今反洪大又汗出喘息不休危在今夜見病起來詢曰孕婦不得汗下及利小便謂之三禁昨劑悉犯之而反獲效何也曰醫貴審症蓋婦之汗非由病以樓居低小當酷暑熱逼故也汗血去而胎失養故上抵喘息不續移樓下避暑氣益元散為解暑聖藥紫蘇又為安胎妙品氣下則血歸元而病痊矣法出醫壘元戎中四血飲是也乃唯唯而退雄按紫蘇雖安胎大汗如雨者不嫌太散乎請酌之喘逆張子和治吳産祥之妻臨月病喘以涼膈散二兩四物湯二兩朴硝一兩作二服煎令冷服一服病減大半次又服之病痊張曰孕婦有病當十月九月內朴硝無礙八月者忌之七月卻無妨十月者已成形矣雄按朴硝究宜慎用周仁齋治一孕婦痰喘用生半夏一錢五分肉桂乾薑各五分五味子三分麻黃二分先以水煎後下藥勿令太熱熱服其喘即止半夏肉桂皆孕婦所忌宜酌用證治大述薛立齋治吳江庠史萬湖仲子室二十餘疫疾墮胎時咳服清肺解表之藥喘急不寐此脾土虛而不能生肺金藥復損而益甚也先與補中益氣加茯苓半夏五味炮薑四劑漸愈後往視之用八珍湯加五味十全大補湯而愈咳嗽薛立齋治一妊婦嗽則小便自出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土生金六味丸加五味以生腎氣而愈一妊婦咳嗽其痰上湧日五六碗許諸藥不應此水泛為痰用六味丸料及四君子湯各一劑稍愈數劑而安一妊婦因怒咳嗽吐痰兩脅作痛此肝火傷肺金以小柴胡湯加山梔枳殼白朮茯苓治之而愈但欲作嘔此肝侮脾也用六君子湯加柴胡升麻而愈沈堯封曰錢彬安室人內熱咳嗆涎痰夜不能臥脈細且數呼吸七至邀余診視問及經事答言向來不準今過期不至余因鄰近素知伊稟怯弱不敢用藥就診於吳門葉氏云此百日勞不治婦延本邑浦書亭療之投逍遙散不應更葳蕤湯亦不應曰病本無藥可治但不藥必駭病者可與六味湯因取六味丸料二十分之一煎服一劑咳減二劑熱退四劑霍然惟覺腹中有塊日大一日彌月生一女母女俱安越二十餘年女嫁母故後以此法治懷妊咳嗆涎痰或內熱或不內熱或脈數或脈不數五月以內者俱效五月以外者有效有不效沈堯封治一婦妊七八月痰嗽不止有時嘔厚痰數碗投二陳旋覆不應用清肺滋陰愈甚遂不服藥彌月而産痰嗽如故日夜不寐三朝後用二陳加膽星竹茹吐出厚痰數碗嗽仍不止更用二陳加旋覆當歸少減稍可吃飯因嗽不減痰漸變薄加入生地四錢食頓減嗽轉甚通身汗出脈象微弦用歸身三錢茯苓二錢炒甘草一錢紫石英三錢因汗欲用黃耆因嗽又止推敲半晌仍用炒黃耆三錢一服汗止嗽亦大減十劑而安煩熱沈堯封曰子煩病因曰痰曰火曰陰虧因痰者胸中必滿宜二陳加黃芩竹茹旋覆花陰虧火盛仲景地黃阿膠湯最妙汪訒庵醫方集解有竹葉湯一方治妊娠心驚膽怯終日煩悶名子煩因受胎四五月相火用事或盛夏君火大行俱能乘肺以致煩躁胎動不安亦有停痰積飲滯於胸膈以致煩躁者麥冬錢半茯苓黃芩各一錢人參五分淡竹葉十片竹葉清煩黃芩消熱麥冬涼肺心火乘肺故煩出於肺茯苓安心人參補虛妊娠心煩固多虛也如相火盛者單知母丸君火盛者單黃連丸神不安者硃砂安神丸切不可作虛損用梔豉等藥治之一方茯苓為主無人參有防風一方有防風知母無人參有痰者加竹瀝薛立齋治一妊婦煩熱吐痰惡熱噁心頭暈此脾虛風痰為患用半夏白朮天麻湯以補元氣祛風邪漸愈惟頭昏未痊乃用補中益氣湯加蔓荊子以升補陽氣而愈一妊婦煩熱兼咽間作痛用知母散知母麥冬黃耆子芩赤苓甘草加山梔竹瀝以清肺金而愈後內熱咳嗽小便自遺用補中益氣加麥冬山梔以補肺氣滋腎水而痊雄按後治未妥嘔吐薛立齋治一妊婦停食腹滿嘔吐吞酸作瀉不食以為飲食停滯兼肝木傷脾土用六君子湯以健脾胃加蒼朮厚朴以消飲食吳茱萸制黃連以清肝火諸症悉愈又以六君加砂仁調理而脾土乃安一娠婦嘔吐脅脹或寒熱往來面色青黃此木旺而克脾土用六君子加柴胡桔梗枳殼而安一娠婦胸脅脹痛吐痰不食此脾胃虛而飲食為痰用半夏茯苓湯漸愈又用六君子加枳殼蘇梗桔梗而飲食如常後因恚怒脅脹不食吐痰噁心用半夏茯苓湯加柴胡山梔而愈立齋治娠婦亦時用半夏一妊婦因怒寒熱胸脅脹痛嘔吐不食症如傷寒此怒動肝火脾氣受傷也用六君子加柴胡山梔枳殼丹皮而愈但內熱口乾用四君子加芎歸升麻而安雄按丹皮忌用一妊婦霍亂已止但不進飲食口內味酸泛行消導寬中薛曰此胃氣傷而虛熱也當服四君子湯彼不信乃服人參養榮湯嘔吐酸水其胎不安是藥復傷也仍與四君子湯俾煎熟令患者嗅藥氣不作嘔則呷少許恐復嘔則胎為釣動也如是旬余而愈胃虛固不待言既作酸則猶有濕熱專用四君猶未盡合否則人參養榮亦補劑何以反加嘔酸耶沈堯封曰費姓婦懷妊三月嘔吐飲食服橘皮竹茹黃芩等藥不效松郡車渭津用二陳加旋覆花薑皮水煎沖生地汁一杯一劑吐止四劑全愈一醫笑曰古方生地半夏同用甚少不知此方即千金半夏茯苓湯除去細辛桔梗川芎白芍四味也按嘔吐不外肝胃兩經病人身臟腑本是接壤懷妊則腹中增了一物臟腑機括為之不靈水穀之精微不能上蒸為氣血遂凝聚而為痰飲窒塞胃口所以食入作嘔此是胃病又婦人既有妊則精血養胎無以攝納肝陽則肝陽易升肝之經脈夾胃肝陽過升則飲食自不能下胃此是肝病千金半夏茯苓湯中用二陳化痰以通胃也用旋覆高者抑之也用地黃補陰以抑陽也用人參生津以養胃也其法可謂詳且盡矣至若細辛亦能散痰桔梗亦能理上焦之氣川芎亦能宣血中之滯未免升提白芍雖能平肝斂陰仲景法胸滿者去之故車氏皆不用斟酌盡善四劑獲安有以也又蔡姓婦惡阻水藥俱吐松郡醫用抑青丸立效黃連一味為末粥糊丸麻子大每服二三十丸按肝陽上升補陰吸陽原屬治本正理至肝陽亢盛滴水吐出即有滋陰藥亦無所用不得不用黃連之苦寒先折其太甚然後以滋陰藥調之以收全效雄按左金丸亦妙沈姓婦惡阻水漿下咽即吐醫藥雜投不應身體骨立精神困倦自料必死醫亦束手一老婦云急停藥八十日當愈後果如其言停藥者即金匱絶之之義也至八十日當愈一語豈金匱六十日當有此證之誤耶不然何其言之驗耶沈堯封治朱承宗室甲戌秋體倦吐食診之略見動脈詢得停經兩月惡阻症也述前治法有效有不效如或不效即當停藥録半夏茯苓湯方與之不效連更數醫越二旬復邀沈診前之動脈不見但覺細軟嘔惡日夜不止且吐蛔兩條沈曰惡阻無礙吐蛔是重候姑安其蛔以觀動靜用烏梅丸早晚各二十丸四日蛔止嘔亦不作此治惡阻之變局也故志之藜按仍是治肝之法喻嘉言治李思萱室人有孕冬月感寒至春而發因連食雞子雞面遂成夾食傷寒一月才愈又傷食吐瀉交作前後七十日共反五次遂成膈證診時其脈上湧而亂重按全無嘔噦連綿不絶聲細如蟲鳴久久方大嘔一聲曰病人胃中全無水穀已翻空向外此不可救之證也無已必多用人參但才入胃中即從腸出奈何李曰盡十兩余尚可勉備喻曰足矣乃煎人參湯調赤石脂末以墜安其翻出之胃氣乃少回少頃大便氣即脫去凡三日服過人參五兩赤石脂末一斤俱從大腸瀉出得食仍嘔但不嘔藥耳因思必以藥之渣滓如粟粥之類與服方可望其稍停胃中頃之傳下又可望其少停腸中遂以人參陳皮二味剪如芥子大和粟米同煎作粥與半盞不嘔良久又與半盞如是三日始得胃舍稍安但大腸之空尚未填實復以赤石脂為丸每用人參湯吞服兩許如是再三日大便亦稀此三日參橘粥內己加入陳倉米每進一盞日十餘次人事遂大安矣仍用四君子湯調理共用人參九兩全愈然此亦因其胎尚未墮有一線生氣可續不然用參雖多安能回元氣於無何有之鄉哉後生一子小甚緣母病百餘日失蔭故也黃咫旭乃室病膈氣二十餘日飲粒全不入口診之尺脈已全不至矣詢其二便自病起至今從未一行止是痰沫上湧厭厭待盡或謂其脈已離根頃刻當壞喻曰不然脈經上部有脈下部無脈其人當吐不吐者死是吐則未必死也但得天氣下降則地道自通此證以氣高不返中無開闔因成危候宜緩法以治其中自然見效遂變旋覆代赭成法用其意不用其方緣尺脈全無莫可驗其孕否若有而不求以赭石乾薑輩傷之呼吸立斷矣姑闕疑以赤石脂易赭石煨薑易乾薑用六君子湯加旋覆花煎調服下嘔即稍定三日後漸漸不嘔又三日粥飲漸加但不大便已月餘矣日以通利為囑曰臟氣久結飲食入胃每日止能透下一二節積之既久自然通透蓋以歸地潤腸恐滯膈而作嘔喻君於肝腎病治法終身未曉硝黃通腸恐傷胎而殞命姑拂其請堅持三五日果氣下腸通月餘腹中之孕漸著而病全瘳矣雄按歸地滯膈之説何可厚非魏氏獨擅此長謂可概治一切未免矯枉過正如後列施笠澤一案斷不可投以血藥者烏得專究肝腎而不問其他耶施笠澤治吳玄水婦妊病嘔吐四十日不進糜飲二十七日不溲溺衆以為必死矣診其脈俱沉滑而數曰此痰因火搏凝結中脘陰陽失次氣苞血聚是謂關格靡有攸處治之則生不治則死吳曰雖九仙之木精石髓其如不內何曰姑試之乃用雞䏶胵沉丁香海石等末之若塵用甘瀾水濃煎枇杷葉取湯調服始吐漸留旋進香砂湯一飲而溲通再飲而糜進然喉中有物哽哽不能上下曰此病根也仍用煎湯探吐吐出結痰如麥冬蓮實者三四枚其病遂瘳妊亦無恙泄瀉陳三農治一婦有孕常作瀉久瀉屬腎用白朮四兩煮熟山藥二兩炒甘草一兩炙杜仲薑汁炒松花炒各七錢米糊為丸服愈雄按仍是治脾薛立齋治邊太常側室妊娠泄瀉自用枳朮黃連之類腹悶吐痰發熱惡寒飲食到口即欲作嘔強進匙許即吞酸不快欲用祛痰理氣此因脾胃傷而痰滯中脘若治痰氣復傷脾胃矣遂以參朮炮薑為末丸如黍米不時含咽三五丸漸加至三百丸後日進六君子湯尋愈進士王繳徵之內懷妊泄瀉惡食作嘔此脾氣傷也其姑憂之強進米飲薛曰飲亦能傷脾胃且不必強別用人參養胃湯飲之吐水酸苦又欲投降火寒藥曰若然則胃氣益傷也經云損其脾胃者調其飲食適其寒溫後不藥果愈一婦人因怒胸膈不利飲食少思服消導順氣之劑脾胃愈弱飲食少大便不實且無度久而便黃水或帶白視其面色黃中隱白曰黃色脾虛也白色肺虛也朝以補中益氣湯升補胃氣夕以六君子湯培補脾氣而愈易思蘭治石城福王歉之妃癸酉六月受孕偶患泄瀉府中醫用淡滲藥止之自後每月泄三五日有作脾泄者用參苓白朮散之類二三服亦止然每月必泄五七次至次年三月生産後連泄半月日夜八九次諸藥不效易診之兩寸尺俱平和惟兩關洪大有力易曰此暑病也以黃連香薷飲治之一劑減半再劑全愈惟肝脈未退又用通元二八丹調理半月後平復王曰妃患泄近一載醫未有言暑者公獨言暑何見也易曰見之於脈兩關浮而洪大有力故知為暑泄也王曰脈經云風脈浮暑脈虛今洪大有力非虛也何以斷暑易曰暑傷氣初感即發其邪在肺皮膚衛氣受病故脈虛自去年六月至今將十月矣其邪自表入里蘊蓄日久而暑熱日深故其脈洪大而有力王曰暑病固矣公斷非産後之病又何見也易曰産脈見於尺寸尺寸既平於産何干況病患於未産前非産病明矣王曰諸醫用藥止效一時而不能除根何也易曰諸醫有分利者有補養者各執己見未得其源也其源在暑若用暑藥豈有不除根者哉雄按此症尚非全由伏暑薛立齋治一妊婦遺尿內熱肝脈洪數按之微弱或兩太陽作痛脅肋作脹此肝火血虛用加味逍遙散六味地黃丸尋愈後又寒熱或發熱或恚怒前證仍作用八珍散逍遙散兼服以清肝火養肝血而痊祕結張子和治一婦人病大便燥結小便淋澀半生不孕常服疏導之藥則大便通利暫止則結滯忽得孕至四月間醫者禁疏導之藥大便仍難臨圊則力努為之胎墮凡如此胎墜者三又孕已經三四月前後結澀自分胎隕張診之兩手脈雖滑不敢陡攻遂以食療之用花減煮菠菱葵菜以車前苗作蔬雜豬羊血作羹食之半載居然生子燥病亦愈屢見孕婦利膿血下迫極努損胎但用前法治之愈者莫知其數減字疑誤然儒門事親亦是減字故仍之薛立齋治李蒲汀側室妊娠大小便不利或用降火理氣之劑元氣反虛肝脈弦急脾脈遲滯視其面色青黃不澤薛曰此鬱怒所致也用加味歸脾湯為主佐以加味逍遙散而安主政王天成之內妊娠痢病愈後二便不通其家世醫自用清熱之劑未效診其脈浮大而澀此氣血虛朝用八珍湯加桃仁杏仁夕用加味逍遙散加車前子而瘥陸養愚治一婦孕九月大小便不通已三日忽胎上衝心昏暈數次診之脈洪大而實謂當下之與服大承氣湯一劑少加木香豆仁村醫見用大黃兩許搖頭伸舌其良人有難色乃謂之曰余坐汝家待其得生始去始安心煎服一二時許二便俱行去黑矢極多胎亦無恙乃留調氣養榮湯二劑而不服數日後小水不利乃煎服之而愈月餘産一男陳三農治一婦妊娠五月大小便不通胸腹痞滿腿足及心腹刺痛難忍用芎歸赤芍枳殼檳榔木通滑石杏仁蔥白童便水各一鍾煎八分入大黃末二錢車前子末二錢再沸入蜜四五匙溫服大小便皆利而安聶久吾曰一醫來問云我治一婦孕八九月忽然大小便不通腹脹甚用承氣湯下之仍不通今危矣此非煎藥所能下教用牽牛大黃丸下之服至一兩許而大小便俱通次日其夫來謝因云諸病皆除惟小便時要人將手緊按小腹方可便否則不能便因思此是氣尚閉與青皮香附等行氣藥一劑而愈逾月生男母子毋恙方見嘔門沈堯封曰昔丹溪治一妊婦小便不通令一婦以香油塗手自産門入托起其胎溺出如注即用人參黃耆升麻大劑煮服又治一婦轉胞用參歸煎服探吐得愈汪訒庵載其方名參朮飲蓋當歸熟地川芎芍藥人參白朮留白陳皮半夏炙甘草加薑煎空心服丹溪論曰窘胞之病婦人之稟受弱者憂悶多者性躁急者食味厚者多有之古方用滑藥鮮效因思胞不自轉為胎被壓若舉起胞則水道自通矣近吳宅寵人患此脈似澀重則弦豫曰此得之憂患澀為血少氣多弦為有飲血少則胎弱不能舉氣多有飲中焦不固而溢則胎避而就下乃以上藥與飲隨以指探吐候氣定又與之而安此恐偶中後治數人皆效瘧疾薛立齋治一妊婦瘧久不已噯氣下氣胸腹膨脹食少欲嘔便血少寤寐此屬肝脾鬱怒用歸脾湯加柴胡山梔漸愈又用六君子湯加柴胡山梔升麻而愈一妊婦患瘧已愈但寒熱少食頭痛晡熱內熱此脾虛血弱用補中益氣湯加蔓荊子頭痛頓止又用六君子湯加芎歸飲食頓進再用逍遙散加白朮而寒熱愈陳良甫治一妊婦六七個月而瘧疾先寒後熱六脈浮緊衆醫用柴胡桂枝無效陳言此疾非常山不愈衆醫不肯因循數日病甚無計勉強聽之遂用七寶散一服愈良方薛立齋治一妊婦三月飲食後因怒患瘧連吐三次用藿香正氣散二劑隨用安胎飲一劑而愈後因怒痰甚狂言發熱胸脹手按少得此肝脾氣滯用加味逍遙散加川芎二劑頓退四劑而安蔣仲芳治一孕婦瘧疾大作脈得弦數用知母四錢柴胡三錢陳皮二錢甘草一錢井河水各一碗煎至一碗露一夜明早隔湯頓服而愈不愈加生首烏五錢自盜汗甚加黑豆三錢食多加枳殼二錢此方熱多者宜之一孕婦瘧疾右脈微滑左脈微弦曰脾虛生痰也以白朮五錢生薑三錢井河水煎露一夜溫服而愈此方寒多者宜之下痢薛立齋治地官胡成甫之內妊娠久痢自用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應薛曰腹重墜下元氣虛也胎動不安內熱甚也遂用補中益氣而安又用六君子湯全愈何以遺卻內熱薛氏用藥不愜人意往往如此盛用敬治陳杰妻有胎而患痢數月昏厥六日矣所下若室漏水棺斂已俱盛診之曰無慮藥之痢止而胎動越數日生一子吳江縣志孫文垣表侄女孕已七月患赤痢腹痛後重體素弱以白芍三錢條芩一錢五分白朮地榆各八分甘草三分二帖而愈後因稍勞痢復作以當歸三錢川芎一錢五分真阿膠二錢艾葉三分一帖全愈此非積滯為痢故治法如此朱丹溪治八嬸將産患痢脈細弦而稍數後重裡急用滑石三錢白芍二錢枳殼炒一錢五分木通二錢甘草五分白朮二錢茯苓一錢桃仁九枚研同煎馬元儀治張氏婦孕八月患痢晝夜四五十行腹痛胎氣攻逆不思飲食診之兩關尺沉細下半徹冷曰據證亦濕熱成痢但脈沉則為寒微細則為虛又下半徹冷乃火衰於下土困於中五陽之火敷布於上則水穀之氣順趨而下津液血脈不充胎元失養而攻逆便膿脈沉腹痛脈微均屬危險當舍證從脈可以母子保全用人參一兩合附子理中湯二劑脈安和四劑減半調理而愈友人虞元靜房中人方孕五月患滯下腹痛日不下數十次為定此方甫服一鍾覺行至腹即解一次痛亦隨已滯亦全愈川黃連四錢白芍黃芩枳殼各三錢蓮肉四十粒橘紅乾葛各一錢五分扁豆紅曲各二錢升麻五分炙草一錢烏梅肉一個廣筆記魏玉橫曰汪陛堂鄰居也其室人病痢已久未嘗藥初下紅白後單下紅每甚於夜腹痛後重渠嶽翁乃儒而醫者與歸脾合補中益氣持方問余余曰此古人成法也第慮服之轉劇耳不信服二劑果下益頻乃延診脈沉細且駛與棗仁山藥杞子地黃當歸白芍甘草黃芩六劑全愈因問曰君向謂歸脾補中服之必增劇已而果然此何故也余曰久痢亡陰耆朮升柴令陽愈升則陰必愈降理所必然又問腹尚痛而後重未除乃不用香砂此又何説余曰用香砂亦無大害第不能速愈耳唐赤城內人年二十餘孕月喜瓜果夏間腹痛下痢以為胎氣冬盡已分娩而痛痢不減一老醫謂産後虛寒且久痢與白朮炮薑建蓮扁豆香附砂仁木香遠志諸溫燥健脾痢轉甚又加補骨脂肉豆蔻痢益頻每粥食才下咽糞穢即下出不及至圊視之乃完穀不化僉謂腸胃已直瀉若竹筒病必不起將治木診之脈細數而澀額頰嬌紅舌苔燥黑曰此痢疾也第服藥二劑必見紅白因告以向醫謂為虛寒將敗之證今以為痢再下紅白寧望生乎曰病緣過傷生冷滯於回腸久從熱化産後腹空其積將下乃為燥熱所劫致積反留而真陰愈傷內熱愈熾今之頻並急速乃協熱下痢之痢非虛寒下脫之痢也試觀其面紅陰虛可知舌黑內熱可知但先助其陰則其下必緩而積滯見矣與熟地杞子各一兩棗仁五錢服下面紅頓減舌黑漸退食入遂不下迫再服則裡急後重紅白兼行仍與前方入芩連歸芍甘草出入加減十餘劑已愈八九矣以歲除停藥新正邀診已飲食如常起居復故惟便後微有淡血水此脾絡受傷之餘證也前方去芩連加烏梅二劑可愈乃云舍親謂先生用補藥太早致成休息痢蓋前醫是其至戚特令其邀豫一次以相嘲耳豫因謂曰與其為直腸瀉毋寧為休息痢乎一笑而別凌表侄婦素怯弱孕數月幾成損證以重劑滋養而愈已十月因時感發瘄專科投荊防枳桔等二劑其師黃淡翁力止之乃但服頭煎已而乾咳咽痛面赤口燥夜熱盜汗因食生梨數片遂泄瀉如痢腹痛後重日夜十餘行或曰立齋云梨者利也凡病後及孕産皆不可食今腹痛下痢非傷生冷而何診之脈洪數左寸鼓指曰錢仲陽謂疹子無他症者但用平藥今病人陰虛多火滋養猶恐不及乃用香竄以鼓之致三陰之火乘虛上衝肺既熱甚勢必下迫大腸而為痢於梨何與蓋立齋之言言其常耳合脈與證猶當以涼潤取效也詢其小便熱短而口臭用生地杞子沙參麥冬川連蔞仁元參牛蒡二劑痢止後重除忽肛門腫痛謂欲作痔曰非也此肺火下傳病將愈耳去黃連加黃芩數劑諸證全愈瘧痢趙養葵治一孕婦瘧痢齊發他醫治兩月餘瘧止而痢愈甚又加腹痛飲食少進趙診之曰虛寒也以補中益氣加薑桂一服痢止大半再一服而反加瘧疾大作主人驚恐趙曰此吉兆也嚮者瘧之止乃陰甚之極陽不敢與之爭今服補陽之劑陽氣有權敢與陰戰再能助陽之力陰自退聽方中加附子五分瘧痢齊愈大進補劑越三月産一子産後甚健張路玉治太學夫人懷孕七月先瘧後痢而多鮮血與補中益氣湯加吳茱萸制川連而愈每見孕婦病瘧胎隕而致不救者多矣郝氏婦懷孕九月患瘧三四發即嘔惡畏食診其脈氣口澀數不調右關尺弦數微滑此中脘有冷物阻滯之候以小柴胡去黃芩加炮薑山楂四服稍安思食但性不嗜粥連食肺鴨之類遂瘧痢兼併胎氣下墜不安以補中益氣去黃耆加木香烏梅五服而産産後瘧痢俱不復作矣其僕婦産後數日亦忽下痢膿血至夜微發寒熱小腹脹痛與千金三物膠艾湯去榴皮加炮薑山楂六服而瘳萬密齋治典史熊鏡妻有孕先於五月病熱或治之變瘧更醫加痢至八月瘧痢並行脈左沉實有力右浮大而虛此男娠內傷病也用補中益氣湯加條芩倍白朮十餘劑瘧痢俱止後以胡連丸調理而安後生一男沈堯封曰夏墓蕩一婦豐前橋章氏女也己卯夏章氏來請云懷孕七月患三瘧痢疾及診病者止云小便不通腹痛欲死小腹時有物壟起至若痢疾晝夜數十起所下無多仍是糞水瘧亦寒熱甚微豫思俱是肝病蓋肝脈環陰器抵小腹肝氣作脹故小腹痛溺不利脹甚則數欲大便肝病似瘧故寒熱豫議泄肝法許其先止腹痛後利小便彼云但得如此即活不必顧胎用川楝子橘核白通草白芍茯苓甘草煎服一劑腹痛止小便利四劑瘧痢盡除胎亦不墜以後竟不服藥彌月而産雄按徐悔堂云秣陵馮學團之內久患痞痛每發自臍間策策動未幾遍行腹中疼不可忍頻年醫治不一其人而持論各異外貼膏藥內服湯丸攻補溫涼備嘗不效病已頻危論絶醫藥逮半月後病勢稍減兩月後飲食如常而向之策策動者日覺其長馴至滿腹又疑其鼓也復為醫治亦不能愈如是者又三年忽一日腹痛幾死旋産一男母子無恙而腹痞消計自初病至産蓋已九年餘矣此等異證雖不恆見然為醫考不可不知也內傷高鼓峰治吳餐霞室人妊娠患胸腹䐜脹不思飲食口渴下痢醫以消導寒涼與之病轉甚而胎不安高曰此得於飲食後服涼水所致耳脈必沉而遲濡投以大劑理中湯數劑乃全愈一婦人患內傷證孕已八月身體壯熱口渴舌苔焦黑醫以寒涼治之高曰無論內傷即麻黃桂枝證也須安胎後攻邪今兩手脈數大無倫虛熱盛極乃復用寒涼陽受陰逼其能久乎投以滋腎生肝飲一劑熱退繼用補中益氣湯而愈薛立齋治一妊婦因停食服枳朮丸胸腹不利飲食益少少服消導寬中之劑其胎欲墜此脾氣虛而不能承載也用補中益氣及六君子湯中氣漸健其胎漸安又用八珍湯加柴胡升麻調理而痊一妊婦飲食停滯心腹痛脹或用人參養榮湯加青皮山楂枳殼其脹益甚其胎上攻噁心不食右關脈浮大按之則弦此脾土不足為肝木所侮用六君子加柴胡升麻而愈後小腹痞悶用補中益氣湯升舉脾氣乃痊虛損魏玉橫曰姚葭田室人年三十餘頎而肥白前二子皆殞後孕而胎墮今又惡阻甚逆脈之虛軟而大與杞子地黃沙參麥冬川連等漸向安又腰腹腿足時痛或加當歸白芍或加山藥棗仁熟地用至兩許或下墜則以補中益氣一二劑以熟地山藥代參術或時胸腹脹痛稍用香砂橘術則中氣便覺沖惕良由久虛榮弱香燥毫不相宜彼執方治病者可與言治法乎哉後服藥幾百帖足月生男胡乾若室人年二十餘婚數年無生育因診翁便求診曰孕也然三陰俱不足曰孕或未然今所患夜熱咳嗽腹痛便溏左足不良於步詢其腹痛必內外牽引腰亦必痛足之筋則短而不舒又下午則腫否曰皆如所言然則三陰虛損無疑矣與杞地歸芍沙參麥冬等令服五十劑臨月再服二十劑乃無後患又服十餘劑病已痊遂不藥後臨産暈厥産後復厥專科以其寒熱往來則投柴胡桂枝腹痛便溏則與炮薑白朮致身發白痱細者如芝麻粗者如緑豆腹痛甚則偃臥以蒲團著腹左右旋轉稍可脈之弦急而數舌黑而燥此肝火乘三陰大傷為患也令以前方加熟地川連白芍甘草數劑而愈次年患痢醫以痢藥愈之又明年腹痛便溏與前年初孕證同召前醫則仍以為痢也恪與攻伐遂胎墮而死又張氏姊妹三人每胎皆腹痛泄利産後乃止此雖胎氣亦由肝木乘脾所致悲傷薛立齋治一孕婦無故悲泣用大棗湯而愈後復患以四君子加麥冬山梔而愈陳良甫曰鄉先生鄭虎卿內人黃氏妊娠四五個月遇晝則慘戚悲傷淚下數次如有所憑醫與巫者兼治皆無益良甫時年十四正在儒中習業見説此證而虎卿惶惶無計良甫遂告之管先生伯同説先人曾説此證名曰臟燥悲傷非大棗湯不愈虎鄉借方看之甚喜對證治藥一投而愈良方心腹痛薛立齋治一妊婦心痛非真心痛也煩熱作渴用白朮散即愈後因停食其痛仍作胸腹膨滿按之則痛此因飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君子湯補之而愈一妊婦心腹作痛胸脅作脹吞酸不食此肝脾氣滯用二陳山楂山梔青皮木香而愈又因怒仍痛胎動不食面色青黃肝脈弦緊脾脈弦長此肝乘其土用六君子湯加升麻柴胡木香而愈一妊婦心腹作痛胎氣上攻吐痰噁心飲食少進此脾虛氣滯而為痰用六君子加柴胡枳殼諸證漸退飲食漸進又用四君子加枳殼山梔桔梗而安後因怒兩脅氣脹中脘作痛惡寒嘔吐用六君子加柴胡升麻一劑而愈朱丹溪治孫院君因近喪冒惡氣傷胎肚痛手不可近發熱口中不思飲食須安胎散滯氣青皮二錢黃芩白芍各二錢歸尾一錢五分木香五分甘草炙四分水三盞先煎苧根二大片煎至二盞去苧根入前藥同煎至一盞熱服全愈吳洋治汪伯玉從叔母吳病小腹急痛面癢惡寒醫路萬先生曰妊娠轉胞洋曰不然此陰證也叔曰若病得之內誠如公言萬拂衣行厲聲曰吳生殺而嬸矣洋即為灸氣海一穴進理中湯頃之疾平萬語塞太函集喑附咽痛博陵醫之神者曰郝翁有妊娠喑不能言郝曰兒大經壅故不能言兒生經通自能言矣葉杏林女科蕭賡六曰內經大奇論以胞精不足為死不言為生此可驗九月而喑非胞精不足故當十月而復言也黃錦芳治石蕙文室素稟水衰火微水衰則火時遊於上而見咽痛氣逆火衰則食不甚化常與虛火內結稍用地黃以滋之則食益壅滯稍用當歸以補血則火隨辛性上竄而熱起稍用沙參元參以清咽則氣覺頓下而眼昏不見稍用人參白朮以補氣則眼雖光明而氣又覺急迫胸滿而痛稍用疏氣抑肝之品則腰腎重墜腹痛欲解至於偶感風寒稍用表藥則熱勢蒸蒸而氣隨火逆時兼有孕愈難調攝黃診之六脈俱弦而兼微數兩關尤覺高突胸滿氣喘喉痛腳腫眼昏食後胸滿愈甚孕已九月將足乃用自制和氣安胎飲茯苓廣皮炒白芍丹皮大腹毛炒麥冬人參白朮蘇葉濃煎溫服隨藥漸愈乳痛孫文垣治程玉吾內人妊已七月乳忽紅腫而痛灑淅惡寒發熱將成內吹以大栝蔞四錢為君當歸尾二錢為臣甘草節蒲公英貝母連翹各一錢二分為佐青皮柴胡各八分橘葉五片為使二劑而瘳此方治驗不可勝數婦女怒郁肝經為多栝蔞甘草為緩肝之劑貝母開鬱連翹蒲公英解毒柴胡青皮調氣橘葉引經當歸活血血活氣調毒解熱散而腫痛消釋也若將成膿可加白芷醫學綱目治婦人吹乳皂角散歌曰婦人吹乳治如何皂角燒灰蛤粉和熱酒一杯調一字頃間揉散笑呵呵惡阻龔子才治劉尚書妾有孕患惡阻嘔吐不止飲食不下心中煩躁頭目眩暈咸以二陳湯藿香正氣散保生湯之類遍投不效診之左脈微數氣口數此血虛氣盛有火也若不養血則火不降火不降則嘔不止以茯苓補心湯加薑汁炒黃連竹茹二服全愈盧不遠治史氏婦嘔吐之聲遠聞百步脈之左關鼓指不連於寸兩尺滑搏於左獨加水飲不入唇七日矣與透肝之劑斷其必男藥進而嘔定月足果産男是證初寒熱大作嘔吐不食人皆以為傷寒盧以尺中脈搏知其為妊其關不連寸者蓋肝鬱善怒而不能發也順其性而伸之調之肝舒氣平惡自無阻而嘔自定耳馮楚瞻治一婦妊娠三月而大吐兩月有餘藥食俱不能受六脈沉微已極竟依脈立方以人參五錢炙甘草一錢炮薑制附各一錢五分數劑而愈胎亦安然經曰有故無殞亦無殞也柴嶼青治翁氏家人沈泰女懷娠三月患惡阻醫以感冒治之方中用半夏二錢連投二劑腹痛異常身熱盜汗歷有二旬求診柴謂半夏乃孕婦所禁如何可用二錢無怪乎腹痛之甚也其胎不墮幸矣遂與養陰之劑半月而瘥並令其八月後服達生散十餘劑至臨産生理甚順而速得舉一子張路玉治錢氏婦去秋瘧久大虛飲食大減經水不調季冬略行一度今春時發寒熱腹滿不食服寬腸利水藥不應擬進破血通經之劑張診之其脈左手厥厥動搖右關與兩尺雖微弦而重按久按卻滑實流利惟右寸左關虛濡而數尋之澀澀少力此陰中伏陽之象洵為胎脈無疑良由中氣虛乏不能轉運其胎故作脹耳前醫曰自結縭至今距十二載從未受孕病後元氣大虛安有懷子之理張曰向之不孕必有其故今病後餘熱留於血室因而得孕亦恆有之理細推病機每粥食到口輒欲作嘔惟向晚寒熱之際得熱飲入胃其寒熱頓減豈非胃氣虛寒水精不能四布留為涎液汪洋心下乎俗名惡阻是也其腹滿便難之虛實尤當明辨金匱云跗陽脈微弦法當腹滿不滿必便難乃虛寒從下上也當以溫柔藥服之況大便之後每加脹急以裡氣下通濁陰乘之上擾與得下暫時寬快回殊其治雖當以安胎為主但濁陰之氣非藉辛溫不能開導其結遂疏六君子湯益入歸芍以收榮血之散稍借肉桂為濁陰之嚮導使母氣得溫中健運之力胎息無濁陰侵犯之虞桂不傷胎龐安常先有明試余嘗屢驗之矣服後寒熱漸止腹脹漸寬飲食漸進胎息亦漸形著至仲夏因起居不慎而胎漏下血前醫猶認石瘕欲進破積喻以左寸動滑斷屬乾象與扶脾藥得安後産一子陳三農治惡阻諸藥不納以蘇梗三錢砂仁一錢煎服或烏藥為君沉香次之人參甘草又次之為細末以薑切片黏藥末咬嚼咽津液送至丹田過一時又如此嚼即愈一孕婦嘔吐酸水胸滿不食此脾土虛為肝木所侮用六君子加白芍而愈又用四君子加枳桔而安萬密齋治徽商吳儼妻年三十餘少子二歲尚食乳月水未行因反目激怒得嘔逆病食入隨吐凡所食物鼻中即作其臭醫俱作反胃治不效其脈左三部沉實搏手右三部平和曰此有孕也當生二男汪曰前生三子皆三歲而後孕今兒方二歲經水未動宜非孕也曰身自有孕且不知之況醫人乎宜其治之不效蓋怒傷肝肝傳心諸臭皆屬於心心傳脾故隨所食物即作其氣而出也嘔逆食臭皆肝心二臟之火炎上也以黃芩一兩黃連白朮陳皮香附茯苓各五錢炒砂仁二錢為末神麯糊丸緑豆大每服五十丸白湯下未五日而安後生雙男下血薛立齋治一妊娠下血服涼血之藥下血益甚食少體倦此脾氣虛而不能攝血用補中益氣湯而愈後因怒而寒熱其血仍下此肝火旺而血沸騰用加味逍遙散血止用補中益氣湯而安一妊婦下血發熱作渴食少體倦屬脾氣虛而肝火所侮用四君子加柴胡山梔血止因怒復作用六君子加柴胡山梔升麻而安一妊婦六月每怒血下甚至寒熱頭痛脅脹腹痛作嘔少食薛謂寒熱頭痛乃肝火上衝此語無人解通脅脹腹痛乃肝氣不行作嘔少食乃肝火侮胃小便下血乃肝火血熱用小柴胡加白芍炒山梔茯苓白朮而愈一妊婦胎及六月形體倦怠飲食少進勞役下血胎動不安用六君加當歸熟地升麻柴胡而愈張子和治一婦娠半年因傷損下血張診之以三和湯一名玉燭散承氣湯四物湯對停加朴硝煎之下數行痛如手拈下血亦止此法可與智識高明者言膏粱之家慎勿舉似非徒駭之抑又謗之嗚乎正道難行正法難用古今皆然孫文垣治侄孫婦三孕而三小産六脈滑數乃氣虛血熱也因血頻下甚恐怖終日偃臥稍起血即大下與生地白芍白朮地榆桑皮寄生續斷甘草升麻椿根白皮黃柏條芩服之血三日不來惟白帶綿綿下因起身稍勞血復行謂血滑已久若不澀必不能止又血海甚熱亦肝風所致防風子芩丸正與病對宜制與之又制白芍六兩側柏葉條芩各三兩防風椿根白皮各二兩蜜丸服之遂血止胎定足月産子此後絶無胎漏之患後遇此證第用此法皆驗張路玉治鄭墨林夫人素有便紅證妊七月正肺氣養胎時患冬溫咳嗽咽痛如刺下血如崩脈較平時反覺小弱而數此熱傷手太陰血分也與黃連阿膠湯二劑血止後去黃連加葳蕤桔梗人中黃四劑而安柴嶼青治其妾母懷孕五月與女伴爭競致傷腹痛見紅穩婆驗云昨夜子已在産門定死腹中診其六脈如常驗其舌紅活斷以決無此理用安胎養血藥二劑而起至十月滿足産一子葉杏林曰一婦人妊娠月信不斷而胎不損産科熊宗古曰婦人血盛氣衰其體必肥是以月信來而胎不損若作漏胎則胎必墮若不作漏胎則胎未必墮也立齋治一妊婦尿血內熱作渴寒熱往來胸乳作脹飲食少思肝肺弦弱此肝經血虛而有熱也用加味逍遙六味兼服漸愈又用八珍湯加柴梔丹皮而全愈矣魏玉橫曰許竹溪室人妊娠七月偶以舉重跌磕遂胎動下血甚多與熟地一兩杞子五錢白芍三錢甘草五分棗仁三錢數劑全愈胡田室人先嘗妊娠以胎漏諸治罔效延至二十四月而産近有孕仍漏血下因胃痛求治脈之兩關弦數與生地杞子沙參麥冬川楝胃痛愈而胎亦不漏矣子癇與痙病略同薛立齋治一婦人素口苦月經不調或寒熱妊娠五月兩臂或拘急或緩縱此肝火血虛所致也用四物加柴胡山梔丹皮鉤藤治之而愈雄按炎上作苦口苦皆膽火上炎一妊婦因怒寒熱頭項動掉四肢抽搐此肝火血虛風熱用加味逍遙加鉤藤數劑而痊一妊婦頸項強直腰背作痛此膀胱經風邪所致用拔萃羌活湯一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊一妊婦四肢不能伸服祛風燥血之劑遺尿痰甚四肢抽搐此肝火血燥用八珍湯加炒黑黃芩為主佐以鉤藤湯而安後因怒前證復作小便下血寒熱少寐飲食少思用鉤藤散加山梔柴胡而血止用加味逍遙散寒熱退而得寐用六君子湯加白芍鉤藤飲食進而漸安萬密齋治一婢臨月病口眼喎邪腰背反張手足攣曲不省人事用黃連解毒湯加硃砂干開口灌之稍定其夜生一男産後猶昏迷不省以七珍湯與之即安據萬云即子癇薛立齋治一妊婦出汗口噤腰背反張時作時止此怒動肝火也用加味逍遙散漸愈又用鉤藤散而止更以四君加鉤藤山梔柴胡而安一妊婦因怒臥地良久而蘇吐痰發搐口噤項強用羚羊角散漸愈更用鉤藤散始痊又用歸脾湯而安孫文垣治黃氏婦青年初孕已及彌月忽午夜口中呶呶因作上視角弓反張裸裎不知羞恥口眼偏斜昏憒不知人事問之不能言此風痰為怒所動而成子癇當從云歧子葛根湯加大腹皮一兩劑可愈也用葛根貝母丹皮防風川芎當歸茯苓桂心澤瀉甘草各二錢獨活人參各四錢水煎飲之而蘇原注按貝母令人易産未臨月者用升麻代之陸肖愚治謝四府女與夫俱在青年妊將七月日間因責婢大怒又與夫反目號哭半日夜即不能寐至夜半忽口中譫語不已目上視竟於床褥中裸形而出其伕力抱之遂昏憒不知人事問之不語醫不識何病咸以為祟謝公夜起著紅袍執劍壓之而號叫笑詈千端萬狀召診悉其證乃令數婦執而脈之六部洪數有力曰此子癇證非祟也證亦時見但此殊甚耳用真正霞天曲貝母黃連山梔天麻青皮白芍龍膽草青黛加燈心竹瀝一劑而醒二劑減半四劑全瘳問其病狀毫不知也吳橋治程鈞妻孕且四月矣著屐而履橋版偶失足臥地扶起則目上視而瞑惛憒而為鬼言逆橋視之寸口脈動而微尺脈按之不絶右差勝曰非直病易去也胎且安主生男聞者愕然乃以大劑參耆加安神寧志藥僅服過半舒氣一聲而目微開問之則歷述所遇皆亡者言畢復瞑仍進前藥乃蘇日漸得安七日而痊或問嚮者榆村程氏婦與此同而彼七日死何也橋曰往者吾不及見無敢以口給臆之今病者故中氣虛妊子食母氣且盡母失所養而震驚出其不虞氣下陷而火上炎痰壅心絡故憒憒欲死非真死也又謂見鬼物者何經曰脫陽者見鬼此無足怪雄按此必挾痰如果脫陽則為敗證安神寧志豈能即愈沈堯封曰妊婦病源有三大綱一曰陰虧人身精血有限聚以養胎陰分必虧二曰氣滯腹中增一障礙則升降之氣必滯三曰痰飲人身臟腑接壤腹中遂增一物臟腑之機括為之不靈則津液聚為痰飲知此三者庶不為邪説所惑妊婦卒倒不語或口眼歪斜或手足瘛瘲皆名中風或背腰反張時昏時醒名為風痙又名子癇古來皆作風治不知卒倒不語病名為厥乃陰虛於下孤陽逆上之謂也口眼歪斜手足瘛瘲或因痰滯經絡或因陰虧不吸肝陽內風暴動至若腰背反張一證臨危必見戴眼其故何歟蓋足膀胱經太陽之脈起於目內眥上額交巔循肩膊內夾脊抵腰中足太陽主津液虛則經脈時縮故腰背反張經曰瞳子高者太陽不足謂太陽之津液不足也脈縮急則瞳子高甚則戴眼治此當用地黃麥冬各等藥滋養津液為主胎前病陽虛者絶少慎勿誤用小續命湯沈堯封治錢鵠雲室飲食起居無恙一夜連厥數十次發則目上竄形如尸次日又厥數十次至晚一厥不醒以火炭投醋中近鼻熏之不覺切其脈三部俱應不數不遲並無怪象診畢其父問可治否沈曰可用青鉛一斤化煬傾盆水內撈起再煬再傾三次取水煎生地一兩天冬二錢石斛三錢甘草一錢石菖蒲一錢服之是晚止厥六次亦甚輕照方再服厥遂不發後生一子計其時乃受胎初月也移治中年非受胎者亦甚效
