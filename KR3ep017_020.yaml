body:
  text: 卷二十遺精孫文垣治一人色欲過度夢遺精滑先服清相火之劑不效繼用固澀之劑亦無功求孫治與以玉華白丹濃煎人參湯送二錢雄按此丹必須脈象微弱別無實火症者始可暫用兩服後稍固兼進六味地黃丸加蓮鬚芡實遠志五味子凡一月而愈玉華白丹鍾乳粉白石脂陽起石左顧牡蠣李妓兩寸短澀兩尺洪滑關弦孫診之問經可行否曰僅行一日亦點滴耳曰此脈在良家主夢遺若不宜有也曰良然即御客時亦或遺遺則冷汗淫淫體倦不能支不與藥或問故曰金木相勝心神無主法在不治或謂人尚無恙何便至此曰弦為春令當金之時猶然猖獗設在卯月木旺火相則肺金枯萎水之上源竭矣且腎脈洪滑雄按洪為火是矣滑則未必為陰虧審為是脈不過血熱耳如果陰虧虛而欲火內熾尺脈必然洪數加以關弦必死於春夏矣妓以欲勝陰血既虧淫火愈熾陰虛則病陰絕則死今已咳嗽其死見矣烏可治乎次年二月果死薛立齋治朱工部勞則遺精齒牙即痛用補中益氣加半夏茯苓白芍雄按勞則遺精火浮齒動補中益氣何可投乎雖佐滋陰未足為訓並六味地黃丸更以十全大補加麥冬五味子而痊一男子白濁夢遺兼腳跟著痛口乾作渴大便閉澀午後熱甚用補中益氣湯加白芍元參並加減八味丸而愈龔子才治陳桂林秀才患夜夢遺精每月一二次或三五次遺後神思昏沉身體困倦診之六脈微澀無力此陰虛火動之症以辰砂既濟丸加紫河車龍骨服之數月奏效奈數患不能謹守因口占俚語一章以戒之曰培養精神貴節房更祛塵慮要周防食惟半飽宜清淡酒止三分勿過傷藥飢隨時應勉進功名有分不須忙幾行俚語君能味便是長生不老方黃履素曰餘年三十外曾患遺精龜頭時有精微微流出晝夜常然初時驚懼特甚人身中幾許精血而堪此涓涓不絕乎醫之高明者謂為無害但毋服澀藥雄按惟火症故不可澀虛寒精滑澀之何害醫者先須審證不可偏守一法也綠病以服附子得之知是火證但涼補而勿熱補用六味丸加沙菀蒺藜菟絲子及炒黃柏少許等藥將此病付之度外莫置諸懷如常調理凡兩年始全愈龍骨牡蠣等藥從未入口蓋人身中惟氣血周流斯快暢豈可澀之使滯雖得暫效為害實深患者審之予初有懼心及兩年間應酬如常絕無倦態豈此精與交媾之元精不同故無大害耶張路玉治韓慕廬季子素稟清癯宿有精滑不禁之恙診之脈微弦而數尺中略有不續之狀此不但腎氣不充抑且氣秘不調致不能司封藏之令與六味丸去澤瀉加鰾膠五味略兼沉香於補中寓宣法雖如此但久滑竅疏難期速效耳李士材治一人考試勞神患精滑小便後及夢寐間俱有遺失自服金櫻膏經月不驗李診之曰氣虛而神動非遠志丸不可服十日減半一月全愈王叔權曰有士人年少覓灸夢遺為點腎腧穴令其灸而愈不拘老少皆腎虛也古人云百病皆生於心又曰百病皆生於腎心勞生百病人皆知之腎虛亦生百病人或未知也蓋天一生水地二生火腎水不上升則心火不下降茲病所由生也人不可不養心不可不愛護腎也資生經平江譚醫云夫遺泄尋常只治心腎未有別治以素問仲景考之當治脾服之屢效用厚朴二兩薑汁製羊脛一兩炭火煅過通紅取出研細如粉上二味白水麵糊為丸如梧桐子大每服百丸至三百丸米湯下集成同上雄按中焦有濕熱者宜之與松石豬肚丸同功非可概治一切之遺也陸祖愚治一人因作文夜深倚幾而臥臥即夢遺明早吐血數口數日後復吐自此或間日或連日或數日或吐血或夢遺或與六味地黃湯幾百帖即加減亦不出滋陰清火而已數月不愈口乾微咳惡風惡寒懶於動作大便溏小便短赤脈之豁大無力沉按則駛曰此症非得之房室乃思慮太過損其心血心血虛則無以養其神而心神飛越因有夢交之事神不守舍則志亦不固而腎精為之下遺腎虛則火益無制逼血妄行而吐上刑肺金而咳其畏風寒而懶動作者火為元氣之賊火旺則元氣自虛也其肌肉削而大便溏者思慮損其心血即是傷其脾陰也與歸脾湯二十劑吐遂減半又二十劑諸症俱痊百劑而精神加倍矣繆仲淳治婁東王官壽患遺精聞婦人聲即泄瘠甚欲死醫告術窮繆之門人以遠志為君蓮鬚石蓮子為臣龍齒茯神沙菀蒺藜牡蠣為佐使丸服稍止然終不斷繆於前方加鰾膠一味不終劑而愈趙景之太史未第時因肄業勞心太過患夢遺症已三四年矣不數日一發發過則虛火上炎頭面烘熱手足冷逆終夜不寐補心腎及澀精藥無不用過壬申春偶因感冒來邀診視談及前症之苦為疏丸方以黃柏為君佐以地黃枸杞蓮鬚鰾膠萸肉五味車前天麥冬之類不終劑而瘳初景之疑黃柏大寒不欲用謂尊恙之所以久而不愈者政未用此藥耳五臟苦欲補瀉云腎欲堅急食苦以堅之黃柏是也腎得堅則心經雖有火而精自固何夢遺之有哉向徒用補益收澀而未及此故難取效立齋治王上舍遺精勞苦愈甚坳中結核服清心蓮子飲連翹消毒散不應以八珍湯加山藥萸肉遠志十餘劑漸愈更以茯苓丸治之遂不復作葉巡檢患此云諸藥不應盧丹谷與八味丸治之而愈徐靈胎曰遺精治法不外乎填精鎮心本無神妙方法俗醫往往用溫熱及黏膩等物必至傷人蓋此症總有伏邪為患如火如痰如濕如風必須搜剔餘邪兼以調和臟氣委曲施治方無變症一味安神填腎猶多未盡之理也淋濁沈朗仲治王雨泉壯年氣弱溺後精水淋漓不斷服六味丸不應易八味丸反加澀痛兩尺脈數而氣口虛大此土虛不能堤水也與補中益氣加麥冬五味十劑而痊張氏醫通薛立齋治一婦人善怒或小腹痞悶或寒熱往來或小便頻數時下白淫藥久不愈面青口苦薛以其積憤而不能發散所致用龍膽瀉肝湯而愈用加味逍遙散八珍湯間服而安龔子才治一男子莖中痛出白津小便閉時作癢用小柴胡加山梔澤瀉木通炒連膽草茯苓二劑頓愈又兼六味地黃而痊司廳陳石鏡久患白濁發熱體倦用補中益氣加炮姜四劑白濁稍止再用六味地黃丸兼服諸症悉愈少宰汪涵齋患頭暈白濁用補中益氣湯加茯苓半夏愈而復患腰痛用山藥山萸五味萆薢遠志頓愈又因勞心盜汗白濁以歸脾湯加五味而愈後不時眩暈用八味丸全愈孫文垣治一人稟質素強縱飲無度忽小便畢有白精數點自以為有餘之疾不治經三月以來雖不小便時有精出覺頭目眩暈此上病多由下之證驗也雄按據服證治驗則此頭暈亦非下虛使然醫者以固精澀脫之劑治之兩月略不見功診之六脈滑大此因酒味濕熱下注精臟遂以白朮茯苓橘紅甘草乾葛白豆蔻加黃柏少許兩劑即效不十日全安潘見所患白濁精淫淫下治三年不效孫診之兩寸短弱兩關滑兩尺洪滑曰疾易愈第待來年春仲一劑可瘳問故曰素問云必先歲氣毋伐天和今所患為濕痰下流症也而脈洪大見於尺部為陽乘於陰法當從陰引陽今冬令為閉藏之候冬之閉藏實為來春發生根本天人一理若強升提之是逆天時而泄元氣也雄按此治內傷之經旨也而薛氏不拘何症動輒補中益氣雖明知其為陰虛陽浮亦不輕割愛連篇屢牘垂訓後人余恐受其害者不僅當時求治之人也後醫者接踵竟無效至春分逆孫以白螺螄殼火煅四兩消痰為君牡蠣二兩固澀為臣半夏消痰葛根升陽明之清氣柴胡升少陽之清氣苦參燥濕各一兩為佐黃柏堅骨一兩為使麵糊為丸名端本丸令早晚服之不終劑而愈李士材治李郡侯白濁服五苓散數劑無功診之兩尺大而澀是龍火虛火精瘀竅道用牛膝茯苓黃柏麥冬山藥遠志細生甘草十劑而安吳光祿閉精行房患白濁莖中痛如刀割自服瀉火疏利之劑不效改服補腎之劑又不效李診之曰精久蓄已足為害況勞心之餘水火不交坎離頻用也有語病用萆薢分清飲加茯神遠志肉桂黃連四劑即效兼服補中益氣一二劑而愈陸祖愚治韓舜臣年近三旬夏月遠歸連宵多事臥當風涼致成瘧疾間日一發自以為虛而投參附凡用參二三錢及五錢者數十劑一醫用參一兩附三錢又八劑服參約及二斤其病寒輕而熱重偶於靜坐時覺陽道微濕以紙拭視如漿糊一點白而光亮訝為滑精滲漏若此無怪大劑補養無效決死無疑及診視正當悲哀之後面赤如妝六脈洪滑而數曰脈候無事不必張惶令將溺器滌淨次早診之脈略和而仍滑大令傾溺器中有白膩稠黏約半碗許乃曰當此短夜去已如許之多則從朝至暮自當加倍此是白濁非滑精也雄按此症誤投溫補設無白濁以為去路則早殆矣試思少壯之時每交感輸泄之精能有幾何病者始大悟乃用萆薢分清飲川萆薢石菖蒲益智烏藥茯苓甘草四劑其症減半又以二陳湯加升麻柴胡蒼朮白朮十餘劑濁淨而瘧亦止夫奇經之脈督行於背脊任行於腹外沖行於腹中溺出於前自膀胱而來精出於後自夾脊腎臟而來男濁女帶自胃家傍沖而下蓋沖為血海其脈起於脬中丹溪曰胃中濁液下流滲入膀胱曾詢患濁者小水或渾或清其濁或隨泄溺而下或不時淋瀝可見與膀胱竟不相干又見患此症者經年累月飲食照常起居如故非胃家濕熱而何此君加之以勞頓醉飽陰虛貪涼而得故得補益甚丹溪曰二陳湯加升麻能使大便潤而小便長前後二方昔賢所驗第後人未知用耳雄按精與溺原分二道所云良是至謂濁不由膀胱而出自謂傍沖而下然則湯飲入胃獨不可傍沖而下乎不知帶濁之病多由肝火熾盛上蒸胃而乘肺肺主氣氣弱不能散布為津液反因火性迫速而下輸膀胱之州都本從氣化又肝疏泄反稟其令而行遂至淫淫不絕使但胃氣濕熱無肝火為難則上為痰而下為瀉耳古今醫案於帶濁二門獨罕存者亦以未得其旨而施治無驗也至單由濕熱而成一味涼燥雖藥肆工人亦能辨此觀其父肖愚一案治吳南邱之子亦瘧且濁以二妙散取效即其症也立齋治光祿柴黼庵因勞赤白濁如注用歸脾湯而愈司廳張檢齋小腹不時作痛莖出白淫用小柴胡山梔龍膽草山茱芎歸而愈馬元儀治陳晉臣患濁症累月不止後因房勞痛益甚濁愈頻有語以煎蘇葉湯澡洗者從之遂致精滑傾盆躁擾不寧發熱煩渴兩手脈沉而微尺脈沉而數此陰精大傷真陽無偶將脫不乘此時陰氣尚存一線以急救其陽而通其陰直至陰盡而欲回陽罕克有濟矣或曰既有陽無陰補陰猶恐不及尚堪純陽之藥重竭其陰乎曰真陽以水為宅水足則凝然不動水竭則不安其位甚而飛揚屑越孰能把握之哉此時陰未回而陽已絕矣宜急攝虛陽先歸窟宅然後補陰以配陽此必然之次序也煎大劑白通湯與服便得濃睡諸症漸已次服人參七味湯使陰陽兩平而愈蕭萬輿治一健卒年甫三旬素善飲喜啖辛香病濁竅痛以二陳湯加芩連膽草赤芍車前二劑即止如實症本不難治若概施補必變生他症漳庠林震伯素善飲因修途勞頓飢飽失時覆冒暍病白濁經年不瘥察前治非辛熱即涼瀉或滋補壅塞遂至小腹脹悶或氣喘拒食六脈滑數無力此中宮虛熱津液下陷膀胱氣化不能分泌以歸脾湯去木香加炒山梔半夏車前黃連七劑而濁止便清神思清爽矣施笠澤治公謨病小便黃醫欲用淡滲之劑施曰靈樞不云乎中氣不足溲便為之變但當服異功散加黃柏一二分可也醫曰黃柏一二分遂足清利小便耶曰子不觀之漉酒者乎濁醪數斗投以黃柏少許旋澄清徹底豈一溲不足當之眾皆大噱用之果驗蔣仲芳治梁敬州年六十餘濁三年矣淡滲寒涼溫補俱不效診之六脈俱微惟左寸帶數此因心火不降致脾胃之氣不升濁物因而下滲法當養心升補若用本病藥無益也用丹參茯神遠志棗仁山萸山藥黃耆白朮升麻柴胡甘草陳皮薑棗煎服三劑其濁倍至詢其體健否曰如故曰若便所出盡為津液其體必憊甚今濁增而體健知濁物積於其中為藥所迫而出耳清者既升濁者自降再服二劑而病如失矣投之果然使無定見再易一方寧能愈乎張子和治酒監房善良之子年十三病沙石淋已九年矣初因瘡疹餘毒不出作便血或告之令服太白散稍止後又因積熱未退變成淋悶每發則見鬼神號則驚鄰張曰諸醫作腎與小腸病者非也靈樞言足厥陰肝經之病遺溺閉癃閉謂小便不行癃謂淋瀝也此乙木之病也本為所抑火來乘之故熱在脬中下焦為之約結成沙石如湯瓶煎煉日久熬成湯鹼今夫羊豕之脬吹氣令滿常不能透豈真有沙石而能漏者邪以此知前人所說服五石散而致者恐未盡然經曰木鬱則達之先以瓜蒂散越之次以八正散加湯鹼等分頓啜之其沙石自化而下張氏兒年十四病約一年半矣得之麥秋發則小腸大痛至握其陰跳躍旋轉號呼不已小溲數日不能下下則成沙石大便秘澀肛門脫出一二寸諸醫莫能治張曰今日治今日效時日在辰巳間矣以調胃承氣僅一兩加牽牛末三錢汲河水煎之令作三五度咽之又服苦末丸如芥子許六十粒日加晡上湧下瀉一時齊出有膿有血既定令飲新汲水一大盞小溲已利一二次矣是夜凡飲新水二三十遍病去九分止哭一次明日困臥如醉自晨至暮猛然起走索食歌笑自得頓失所苦繼與太白散八正散等調一日大瘥此下焦約也不吐不下則下焦何以開不令飲水則小瘦何以利大抵源清則流清者是也又劉氏子年六歲病沙石淋張以苦劑三湧之以益腎散三下之立愈一人年二十三歲病膏淋三年矣醫不能效多作虛損補以溫燥灼以針艾無少減張曰惑蠱之疾也亦曰白淫實由少腹寓熱非虛也可以湧以泄其人以時暑憚其法峻不決者三日浮屠一僧曰予以有暑病近覺頭痛張曰亦可湧願與君同之毋畏也於是湧痰三升色如黑礬汁內有死血並黃綠水又瀉積穢數行尋覺病去方其來時面無人色及治畢次日面如醉慮其暑月路遠又處數方使歸以自備云一男子病淋張令頓食鹹魚少頃大渴又令恣意飲水然後以藥治淋立通淋者無水故澀也一婦人患淋久諸藥不效其夫夜告予予按既效方治諸淋用剪金花十餘葉煎湯遂令服之明早來云病減八分矣再服而愈剪金花一名禁宮花一名金盞銀臺一名王不留行王執中資生經本草綱目葉朝議親人患血淋流下小便在盆內凝如蒟蒻久而有變如鼠形但無足耳百治不效一村醫用牛膝根煎汁日飲五服名地髓湯雖未即愈而血色漸淡久乃復舊後十年病沙石脹痛用川牛膝一兩水二盞煎一盞溫服一婦患此十年服之得效土牛膝亦可入麝香乳香尤良本草綱目薛立齋治一婦人患小便淋瀝內熱體倦以為肝火血少脾氣虛弱用八珍逍遙二散兼服月餘而小便利又用八珍湯而氣血復一婦人素善小便淋瀝不利月經不調半載矣或兩脅脈悶或小腹作痛或寒熱往來或胸乳作痛或咽喉噎塞或兩腳筋牽或肢節結核面色青黃不澤形氣日瘦左關弦洪右關弦數此鬱怒傷肝脾血虛氣滯為患朝用加味歸脾湯以補脾氣解脾郁祛肝火夕用滋腎丸生肝散滋腎水以生肝血抑肝火舒筋膜兼服月餘而愈一婦人小便淋澀小腹脹悶胸滿喘急諸藥不應以為轉筋之症用八味丸一服小便如湧而安孫文垣治祝芝岡酒後近日每行三峰採戰對景忘情之法致成血淋自仲夏至歲杪未愈便下或紅或紫中有塊如筋膜狀或如蘇木汁間有小黑子三五日一發或勞心力或久坐立亦發百治不痊診之其色白而青肌肉削甚脈左寸沉弱關尺弦細右寸略滑此必肺經有濁痰肝經有瘀血良由酒後竭力縱欲淫火交煽精欲出而強忍之致凝滯經絡流於溺道瘀血阻塞而成此症也三五日一至者盈科滿溢故耳先與丹參加茅根濃煎服其小便解後以瓦器盛之少頃即成金色黃沙乃用腎氣丸加琥珀海金沙黃柏以杜牛膝連葉搗汁熬膏為丸調理外以川芎三錢當歸七錢杜牛膝煎服臨發時以滑石甘草梢桃仁海金沙麝香為末以韭菜汁調服去其凝精敗血則新血始得歸源而病根可除矣三月全愈族侄善飲好內病血淋與滑石甘草梢海金沙琥珀山梔青蒿茅根煎膏為丸梧子大每空心及食前燈心湯送下三錢不終劑而愈後數年服補下元藥過多血淋又作小便痛極亦不能出必蹲便乃得出所出皆血塊每行必一二碗許已半月諸通利清熱之劑不應脈洪數以五靈脂蒲黃甘草梢各二錢水煎空心服二帖痛減半改用瞿麥山梔甘草各二錢茅根杜牛膝連葉車前草各三錢生地柴胡木通黃柏各一錢四帖痛全減血止惟小便了而不了以人參葛根青蒿白朮茯苓甘草白芍升麻黃柏知母而痊康侯云治暑氣在內小便血淋用白虎湯加麥冬煎屢取其效此亦有理志雅堂雜抄周密李時珍治一男子病血淋痛脹祈死李以藕汁發灰每服一錢服三日而血止痛除本草綱目深師療淋用葛上亭長折斷腹腹中有白子如小米取三二分安白版上陰乾二三日收之若有人患十年淋服三枚八九年以還服二枚服時以水如棗許著小杯中用爪研之當扁扁見於水中仰面吞之勿令近牙齒間藥雖微下喉自覺至下焦淋所有頃藥作大煩急不可堪飲干麥飯汁則藥熱止也若無干麥飯但水亦可耳老小服三分之一當下淋疾如濃血連連而去者或如指頭或青或黃不拘男女皆愈若藥不快淋不下以意節度更增服之此蟲五六月為亭長頭赤身黑七月為斑蝥九月為地膽隨時變耳同上李士材治嚴邑宰患淋經年痛如刀錐凡清火疏利之劑計三百帖病勢日甚脈之兩尺數而無力是虛火也綠泥痛無補法愈疏通則愈虛愈虛則虛火愈熾遂以八味地黃料加車前沉香人參服八劑痛減一二而頻數猶故前醫復云淋症作痛定是實火若多溫補恐數日後必將悶絕不可救矣彼疑而問李李曰若不宜溫補服藥後病勢必增今既減矣復何疑乎朝服補中益氣湯晚服八味丸逾月而疾去其九便倍用參耆十四日霍然矣杜司寇夫人淋瀝兩載靡藥不嘗卒無少效診之兩尺沉數謂有瘀血停留法當攻下因年高不敢輕投但於補養氣血之中加琥珀牛膝此等緩劑須以數十劑收功而夫人躁急求效輒欲更端遂致痼疾馮楚瞻治李參領年將六旬患淋兩載有時頻利且速有時點滴難通急痛如割肥液如脂如膏或成條紫血日夜不堪時欲自盡詢所服有一醫立通利止澀二方便頻則用止澀秘塞則用通利此輩伎倆原只如此乃服通利則頻數無度矣服止澀則結滯難通矣按其脈兩寸甚洪余皆無力獨肝腎更甚曰肝主疏泄腎主閉藏今肝腎俱病各廢乃職利則益虛其虛澀則愈增其滯惟調補肝腎自愈用八味加麥冬二錢升麻八分紅花四分重用人參煎服使清者升濁者降瘀者化中氣既足肝腎既調開闔自然得所矣後以生脈飲送八味丸服於空心以歸脾加減服於午後全安一少年勞心色欲過度患小便淋瀝脹疼且二便牽痛其脈兩寸沉微左關甚弱右關滑兩尺弦澀乃心肺之氣不足而下陷於肝腎肝腎之氣又不足所以不能疏泄閉藏中氣既虛則清陽不升中宮鬱滯蒸為濕熱滲入膀胱乃似淋非淋二便牽痛如大瘕泄也令早服六味丸加黃柏製附子使寒熱互為嚮導以去濕熱疏通鬱結以扶其元氣晚用補中益氣去陳皮柴胡加茯苓防風酒炒其渣臨晚煎服探吐遂愈張路玉治內閣文湛持夏月熱淋醫用香薷飲益元散五日不應淋澀轉甚反加心煩不寐診之見其唇赤齒燥多汗喘促不時引飲脈見左手虛數知為熱傷元氣之候與生脈散頻進代茶至夜稍安明日復苦溲便澀數然其脈已和仍用前方不時煎服調理五日而瘥太史沈韓倬患膏淋小便頻數晝夜百餘度晝則滴瀝不通時如欲解痛如火燒夜雖頻迸而所解倍常溲中如脂如涕者甚多服清熱利水藥半月餘其勢轉劇面色萎黃飲食兼退脈得弦細而數兩尺按之益堅而右關澀大少力此腎水素弱加以勞心思慮肝木乘脾所致法當先實中土使能堤水則陰火不致下溜清陽得以上升氣化通而瘀澀瘳矣或曰邪火亢極又用參耆補之得毋助長之患乎抑知陰火乘虛下陷非開提清陽不應譬之水注塞其上孔傾之涓滴不出所謂病在下取之上若清熱利水氣愈陷精愈脫而溺愈不通矣遂與補中益氣湯用人參三錢服二劑痛雖減而病者求速效或進四苓散加知母門冬沙參花粉甫一劑徹夜痛楚於是專服前方兼六味丸用紫河車熬膏代蜜調理服至五十劑參盡斤余而安俞東扶曰治淋如文垣諸案經也此案之治法權也經權合宜皆審脈以為辨審得明白病自顯然推之望聞問切素稱四診可見四件都要細審也陝客亢仁軒年壯色蒼體豐善啖患胞痹十餘年泊吳求治其脈軟大而澀澀不調不時蹲踞於地以手揉其莖囊則溲從穀道點滴而滲必以熱湯沃之始得稍通寐則有時而遺其最苦者中有結塊如橘核外裹紅絲內包黃水雜於脂膩之中此因恣飲不禁酒濕乘虛襲入髓竅而為患因令堅戒菸草火酒濕面椒蒜糟醋雞豚炙爆等味與半夏茯苓豬苓澤瀉萆薢犀角竹茹作湯四劑不愈則以不遵禁忌之故乃令堅守勿犯方與調治仍用前藥四劑勢減二三次與腎瀝湯加萆薢數服水道遂通溲亦不痛但食不甘美後以補中益氣加車前木通調之而安肥盛多濕故先與清胃豁痰而後理腎調脾侍衛金漢光年逾花甲初夏誤飲新酒致病前則淋瀝澀痛後則四痔腫突此陰虛熱陷膀胱也先與導赤散次進補中益氣勢漸向安惟孔中澀痛未除或令進益元散三服遂致遺溺不能自主授劑不應直至新秋脈漸軟弱因採腎瀝之義以羯羊腎制補骨脂羊脬制菟絲子濃煎桑根皮汁制螵蛸連進三日得終夜安寢涓滴靡遺矣閔少江年高體豐患胞痹十三年歷治罔效凡遇勞心嗔恚或飲食失宜則小便頻數滴瀝澀痛不已夜略交睫即滲漉而遺覺則阻塞如前服人參鹿茸紫河車無算然皆無礙獨犯丹皮白朮即脹痛不禁香燥之藥誤投殺人世罕知也張診之曰病名胞痹俗名尿梗病惟見於內經由膏粱積熱於上作強傷精於下濕熱乘虛聚於膀胱素問云胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕詳其文則知膀胱虛滯不能上吸肺氣肺氣不清不能下通水道所以澀滯不利得湯熱之助則小便澀滯微通其氣循經蒸發肺氣暫開則清涕得以上泄也因與腎瀝湯方服之其效頗捷原其寢則遺溺知肝虛火擾疏泄失宜所以服丹皮疏肝之藥則脹者不勝其氣之竄以擊動陰火也服白朮亦脹者不勝其味之濁以壅滯濕熱也服人參鹿茸河車無礙者虛能受熱但補而不切於治也更擬加減桑螵蛸散用羊腎湯泛丸庶有合於病情然八秩之年猶恃體豐不遠房室藥雖中竅難保其不復也與前陝客案症治略同俞東扶曰寤則淋澀寐則溺遺原與不禁有別故以胞痹症治其論藥病不合處理精義確後來葉氏處方最講此旨再觀其治黃元吉亢仁軒案病情同而治法不同用藥俱有妙解能細細參之庶不犯枳樸歸芩到手便撮之誚黃元吉年六十餘因喪明蓄妾患小便淋澀春間因顛仆昏憒遺溺此後遂不時遺溺或發或止至一陽後其症大劇晝則苦於不通非坐於熱湯則涓滴不出夜則苦於不禁其脈或時虛大或時細數而左關獨弦此腎氣大虧而為下脫之兆也乃與地黃飲子數服溺澀少可遺亦少間後與八味丸去丹皮澤瀉加鹿茸五味巴戟遠志調理而安新安富室有男子淋溺不止者漸萎黃諸醫束手孫卓三治之亦弗效偶隱几坐以手戲弄水灌後孔塞則前竅止開則可通腦後一穴為灸火至三炷愈江西通志王肯堂治外兄賀晉卿因有不如意事又當勞役之後忽小腹急痛欲溺溺中有白物如膿並血而下莖中急痛不可忍正如滯下後重之狀日夜十數行更數醫不效乃作汙血治令以牛膝四兩酒浸一宿長流水十碗煎至八碗再入桃仁一兩去皮炒紅花二錢五分當歸一兩五錢木通一兩生甘草二錢五分苧麻根二莖同煎至二碗去渣入琥珀末二錢麝香少許分作四服一日夜飲盡勢減大半按素問奇病論云病有癃者一日數十溲此不足也今瘀血雖散宜用地黃丸加菟絲杜仲益智牛膝之屬補陰之不足以杜復至因循未修治遂不得全愈或閉或通一夜數十起溺訖痛甚竟服前丸及以補腎之藥入煎劑調理而安從兄爾祝得淋疾日數十溲略帶黃服五苓散稍愈因腹中未快多服利藥三五日後忽見血星醫以八珍散治之不應詢其便後時有物如膿小勞即發診得六脈俱沉細右尤甚此中氣不足也便後膿血精內敗也經云中氣不足則溲便為之變宜補中益氣湯加順氣之藥以滋其陽六味地黃丸疏內敗之精以補其陰雄按補中益氣升陽之劑而曰滋六味滲澀互用而曰疏敗精不無語病更加五味子斂耗散牛膝通脈絡數劑而安蕭萬輿治鄭友患淋經年屢治罔效曰淋症有虛實寒熱之殊今君年未三旬元氣充實因修途勞役飲食不調復喜火酒脾受濕氣時當炎令丁火司權丙火協應故心移熱於小腸五火因而內灼上則肺燥口渴下則腎燥淋結前服八正五淋只專治淋而未知清水上源滋益肺金故不效以二陳小柴胡加龍膽草知母木通麥冬雄按此法謂之清濕火則可何嘗潤上下之燥哉一劑減數劑全瘳朱司馬六間年五旬艱嗣不慎酒色飲食起居失宜面目青黑怒則暈大便秘塞脫血小便淋血如割屢服清火通淋之劑反增劇脈沉遲兩尺兼澀此腎水枯竭不能滋生肝血遂致虛火上炎移熱二腸迫血下行因而隧道枯澀妨礙升降故每欲便疼塞難堪須用甘溫之品滋益化源補養肝木使陰血盛則津液充而淋秘自解矣以補中益氣湯去柴胡倍人參加牛膝少加肉桂及加減八味丸入人參蓯蓉遠志服月餘漸愈張云汀年近四十因暑熱往來道途多飲火酒遂成癃閉廣陵醫者多與清熱滲利之劑黃連服至三兩不能愈旋里後診之右尺洪大左尺不應指口燥渴知其三陰已傷與六味地黃湯殊未效更醫仍用車前赤茯琥珀木通瞿麥萹蓄五苓六一之類遂致一夜必便百餘次溺惟點滴少腹急痛而脹窘迫楚甚面漸黧黑此復傷少厥二陰致疏泄秘密俱失其職而太陰太陽之升降氣化亦紊也令朝服補中益氣暮服六味地黃雄按究治少厥二陰乎抑治太陰太陽耶拘守二方顢頇了事未可為訓也每方各三十劑乃痊徐靈胎曰治淋之法有通有塞要當分別有瘀血停積塞住溺管者宜先通無瘀積而虛滑者宜峻補不但煎丸各別並外治之法亦復多端宜博識而詳考之廣筆記治疝氣痛用六味地黃丸古方加北五味三兩肉桂二兩枸杞子四兩車前子米汁浸蒸三兩將糯米一斗炊飯乘熱下白酒藥並前藥料和勻如常制白酒法三兩日後漿來用上好燒酒五十斤連酒漿並糟入大甕內泥封固一月開去糟濾清酒味甘香空心或飢時隨量飲之飲多不渴張飛疇治田孟先久患膏淋溲中有塊如橘核狀外裹血膜中包黃水乃醉後入房酒濕流入腎臟所致遍服利水固精藥不應溽暑中忽然憎寒發熱喘促悶亂腰背煩疼脈見浮濡沉細是淋久陰傷暑氣襲虛之證先與生料六味加川萆薢作湯下消暑丸次用前湯送木車豬苓丸八服諸症霍然又孝廉蔡允恭嚴冬患濁小腹結硬大發寒熱巔痛自汗脈得左大右澀兩尺緊細乃風痰毒邪入犯厥陰之經與當歸四逆湯煎服覆汗而熱除即以前方去通草薑棗加蠍梢陵鯉甲麝臍丸服之令作汗數日便消痛止但濁猶未淨或令嚼生銀杏而愈世人言銀杏澀精殊不知其專滌敗濁也疝杜壬治三十七太尉忽患小腸氣痛諸醫不效每一發幾死上召杜至進藥數服無驗太尉曰我命不久致良醫不能治上召杜問所以杜對曰臣用古方皆不獲愈今自撰一方容進上遂合藥以進一服十愈八九再服全愈因名方曰救命通心散川烏頭一兩用青鹽一錢酒一盞浸一宿去皮尖焙乾川楝子一兩用巴豆二十一粒同炒候黑色去巴豆茴香半兩石燕一對土狗五枚芥子一錢六分為末每服三錢入羊石子內濕紙煨香熟夜半時用好酒半升入鹽細嚼石子以酒徐徐嚥下不得作聲其病遂去曹五家今綱目秘此方辛稼軒初自北方還朝官建康忽得疝疾重墜大如杯有道人教以取葉珠即薏苡仁用東方壁土炒黃色然後小火煮燥入砂盆內研成膏每用無灰酒調下二錢即消程沙隨病此稼軒用之大效宦遊紀聞張子和治殄寇鎮一夫病痎瘧發渴痛飲蜜漿劇傷冰水醫者莫知瀉去其濕反雜進薑附雄按粗工每蹈此弊濕為燥熱所至三焦閉溢水道不行陰道不興陰囊腫墜大於升斗張先以導水百餘丸少頃以豬腎散投之是夜瀉青赤水一斗遂失痛之所在又穎尾一夫病疝氣赤腫大痛數日不止諸藥如水投石張以導水一百五十丸令三次咽之次以通經散三錢空腹淡酒調下五更下臟腑壅積之物數行痛腫皆去不三日平復如故李審言因勞役飲水坐濕地乃濕氣下行流入脬內囊大腫痛不可忍以川楝子等藥不效求治於張曰可服泄水丸審言惑之又數日痛不可堪竟從張先以舟車丸浚川散下青綠沫十餘行痛止次服茴香丸五苓以調之三日而腫退至老更不作夫疝者乃肝病也下青沫者肝之色也王敏之病寒疝臍下結聚如黃瓜每發繞臍急痛不能忍以舟車丸豬腎散下四五行覺藥繞病三五次而下其瀉皆水也豬腎甘遂皆苦寒經言以寒治寒萬舉萬全但下後忌飲冷水及寒物宜食乾物以寒疝本是水故也即日病減八分食進一倍又數日以舟車丸百餘粒通經散四五錢服之利下後三四日又服舟車丸七八十粒豬腎散三錢乃健步如常矣一僧病疝發作冷氣上貫齒下貫腎緊如繩挽兩睪時腫而冷兩手脈細而弱斷之曰秋脈也此因金氣在上下伐肝木木畏金抑而不伸故病如是肝氣磐礴不能下榮於睪丸故其寒實非寒也木受金制傳之胃土胃為陽明故上貫齒痛非齒之病肝木者心火之母也母既不伸子亦屈伏故下冷而水化乘之經曰木鬱則達之土鬱則泄之令湧泄四次果覺氣和睪丸癢而暖此氣已入睪中也以茴香木茂之藥使常服之一月而愈霍秀才之子年十三睪丸一旁腫脹張見之曰此因驚恐得之驚之為病上行則為嘔血下則腎傷而為水腫以琥珀通經散一瀉而消散朱丹溪治鄭子敬因吃酒後飲水與水果偏腎大時作蛙聲或作痛炒枳實一兩茴香鹽炒炒梔子各三錢研煎下保和丸昌世官膀胱氣下墜如蛙聲臭橘子核炒十枚桃仁二十枚蘿蔔自然汁研下保和丸七十丸湜兄年三十左腎核腫痛此飲食中濕墜下成熱以橘核即臭橘五枚桃仁五枚細研順流水一盞煎沸熱下保和丸龔子才治一船家小腸疝氣腫痛不可忍又病兩眼腫痛眵淚隱澀兩寸脈洪數兩尺脈微此上盛下虛之症用涼藥治眼則疝痛愈增用熱藥治疝則眼痛愈盛百治不效與木香金鈴丸空心服以治下焦之虛寒以退血散臥時服以治上焦之風熱各三服均愈趙雪山因勞後五更起早感寒疝氣痛不可忍憎寒戰慄六脈微而無力以五積散加吳茱萸小茴香又與蟠蔥散俱不效後以艾灸之將患人兩腳掌相對以帶子綁住兩中趾合縫處以艾炷麥粒大灸七壯灸完痛止神效子才親家周少峰患疝氣偏墜腫痛不可忍遇秀才傳一方用黃土水和作干泥拍作大餅於火上烘熱熨痛處冷則再易立愈萬密齋治朱氏子病卵腫逾年不消成㿗疝矣問萬萬曰足厥陰肝經之脈環陰器肝之病為怒小兒性急多哭者常有此病一名氣卵常見人病此者不廢生育與壽無干曰有治法否曰有但勿求速效可也用川楝肉小茴香青皮山萸木香當歸川芎海藻三稜莪朮二味用黑牽牛同炒去牽牛不用共為末神麯為丸溫酒下更灸臍旁穴而腫消矣喻嘉言治胡翁常苦脾氣不旺邇年少腹有疝形如鵲卵數發後其形漸大而長從少腹墜入睪囊甚易返位甚難下體稍受寒即發發時必俟塊中冷氣漸轉暖熱始得縮入不然則脹於隘口不能入也近來益大如臥酒瓶於胯中半在少腹半在睪囊堅緊如石其氣迸入前後腰臍各道筋中同時俱脹上攻入胃則大吐上攻巔頂則戰慄畏寒喻診之知為地氣上攻亟以大劑參附薑桂投之一劑而愈以後但發悉用桂附速效若服十全大補則不應以半陽半陰之藥勿克勝病也凡陰邪為害不發則已其發必暴試觀天氣下降則清明地氣上升則晦塞醫遇直中陰經之病尚不知所措手況雜症乎第薑桂性熱屢服則慮其僭上舊病未除新病必起乃先以薑桂附子為小丸曝令乾透然後以參術厚為外廓俾喉胃間知有參術不知有薑桂附子及達積塊之所猛烈始露庶幾堅者削而窠囊可盡空也孫文垣侄患偏墜臍腹腰腧俱脹痛左關脈弦大鼓指小茴香甘草蒼朮益智仁防風各五分荔核橘核山楂柴胡各一錢山梔青皮各七分服後其痛如舊脈且轉數雄按疝因濕熱誤投溫燥每有此變故雖蒼朮益智亦當慎用也恐作囊癰急為解毒栝蔞五錢當歸甘草節金銀花各一錢連翹柴胡青皮各七分煎服痛定腫消因食雞魚臍腹復脹痛發熱不眠脈復弦以山楂栝蔞各二錢金銀花連翹各八分甘草節黃連當歸各五分青皮七分二帖愈李士材治尹文輝嗜火酒能飲五斤五月間入閩中溪水驟漲涉水至七里覺腹痛甚半月後右丸腫大漸如斗閩中醫者皆與肝經之劑及溫熱之品半載無功歸就診李曰嗜火酒則濕熱滿中涉大水則濕熱外束今病在右正是脾肺之濕下注睪丸以胃苓湯加梔子枳殼黃柏茴香十劑略減即以為丸服至十八斤全安駱元賓十年患疝形容枯槁李視之左脅有形其大如箕以熱手按之瀝瀝有聲甚至上攻於心悶絕良久以熱醋熏灸方醒李曰此經之所謂厥也用當歸四逆湯一月積形衰小更以八味丸間服半載余積塊盡消不復患矣盧不遠治湯某常病腹痛痛則繞臍有形甚則欲死皆謂生氣獨絕於內慮不起診之關脈近尺有滑象久痛氣羸頗乏精彩因用枸杞為君白芍茯苓肉桂吳萸佐之六劑痛止服瑞竹堂方四制枸杞丸一料竟愈此臍疝也疝當引陰原無斯症然疝者有形之痛而有所止之處故字從山不必定引陰也疝本厥陰肝疾其狀若死亦厥陰症故用溫補肝腎藥生氣自復不致內絕而瘳馮楚瞻治王刑部疝痛甚危脈之左三部弦洪而數乃陰甚不足也右關尺洪大重按有力此膏粱酒濕太過房勞真水消亡木失所養筋無所榮濕熱內攻陰寒外遏所以為疼為痛不可忍也以熟地二兩山萸山藥各二錢滋其肝腎丹皮三錢茯苓二錢澤瀉一錢五分滲其濕熱橘核三錢疏其木鬱制附一錢五分鹽酒炒黃柏一錢二分使寒熱互為嚮導由是外寒散內熱除真水生雷火息而瘳張建東秘傳治一切疝氣神方於洗浴畢濕身坐門檻上兩囊著水印一濕卵即於濕卵患左灸左患右灸右俱患則左右俱灸須避四眼又一法午月午日午時灸尤妙或小兒不須洗浴但用灰布門檻上令兒坐之亦就所印灸即愈沈序皇尊聞錄王叔權曰舍弟少戲舉重得偏墜之疾有客人為當關元兩旁相去各三寸青脈上灸七壯即愈王彥賓患小腸氣灸之亦愈資生經醫說續編頃關一男子病卒疝暴病不任倒於街衢人莫能動呼張救之張引經證之邪氣客於足厥陰之絡令人卒疝故病陰丸痛也急瀉大敦二穴其痛立已夫大敦穴者乃足厥陰之二穴也鄭亨老病疝灸之得效其法以淨草一條茅及麥稈尤妙度病人兩口角為一則折斷如此三折則折成三角如厶字樣以一角安臍中心兩角在臍之下兩傍尖盡處是穴若患在左即灸右在右則灸左兩邊俱患即兩穴皆灸艾炷如麥粒大灸十四壯或二十一壯則安也醫說續編奪命丹治遠年近日小腸疝氣偏墜搐疼臍下撮痛以致悶亂及外腎腫硬日漸滋長陰間濕癢抓搔成瘡悉治之吳茱萸一斤去枝梗四兩酒浸四兩醋浸四兩湯浸四兩童便浸各浸一宿同焙乾用澤瀉二兩去灰土上研為細末老酒煮一夜麵糊為丸如梧桐子大雄按此方似可兼治寒濕痛瀉霍亂轉筋每一服五十丸空心食前或鹽湯或醇酒送下神效不可盡述馮仲柔云頃年某倉使家傳將前方令藥局中合賣紹熙壬子冬予親曾得效時苦奔豚寒氣攻衝小腸疝氣腹內引痛神思悶亂四日只一服臟腑微動痛若失去遂安一方名星斗丸湯浸者用鹽水浸澤瀉用四兩切作粗片酒浸一宿是齋方同上一人病後飲水患左丸痛甚灸大敦適摩腰膏內用烏附子麝香將以摩其囊上抵橫骨端灸後溫帛覆之痛即止一宿腫亦消矣藥要或問同上薛立齋治一婦人小腹痞悶小便不利內熱體倦懶食用八珍湯加柴胡山梔龍膽草不數服即全愈良方疝附瘕門王肯堂曰張仲景治寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之本草衍義稱其無不應驗豈非補肝之效乎余每治病甚氣上衝心危急者以八味丸投之立應又補腎之明驗也羅謙甫治漆匠韓提控疝氣每發痛不可忍則於榻兩傍各置一枕往來伏之以受如是三年不已與丁香楝石丸三劑良愈蓋男子七疝痛不可忍者婦人瘕聚帶下皆任脈所主陰經也乃肝腎受病治法同歸於一當歸附子川楝子茴香各一兩上銼碎以好酒三升煮酒盡為度焙乾作細末每藥末一兩入丁香木香各五分全蠍十三個元胡索五錢同為細末拌勻酒糊為丸桐子大每服三十丸至百丸溫酒空心送下凡疝氣帶下皆屬於風全蠍治風之聖藥也川楝茴香皆入小腹經當歸元胡索和血止痛疝以寒邪積於小腸之間故以附子佐之丁香木香為引導也玉海藏云楊駙馬時患風氣衝心風氣即疝氣也羅謙甫云疝氣帶下皆屬於風飲食吐逆遍身枯瘦日服紫菀丸五丸至二十日瀉出肉塊如蝦蟆五六枚白膿二升愈方見於風門李靈患肥氣病肝積謂之肥氣與疝同類日服前丸五丸經一年瀉出肉鱉二枚愈馬元儀治陳子芳患痰喘發熱胸滿身痛左邊睪丸不時逆上痛不可忍診之肝脈弦急肺脈獨大關尺虛小此肝肺受邪之候也肝為木臟其化風其生火風火合邪於本位則為熱為痛乘於肺金則為痰為喘以柴胡疏肝散治之表症稍安欲速愈別用沙參二兩煎服如若相安繼轉增劇再急診寸脈鼓數關脈急疾左丸引右丸痛甚曰關脈急疾木火自旺也寸脈鼓數火刑肺金也肺為嬌臟體燥氣肅火邪入之則氣化失常金益困而木益張也法宜滋達肺金兼疏肝木以栝蔞實五錢潤燥紫菀三錢宣通半夏曲貝母清痰枳殼桔梗開鬱杏仁蘇子定喘柴胡以達之秦艽以舒之一劑減再劑安調補而愈琇按用沙參原無大謬第單用且重至二兩又無甘潤之佐則清降之力薄而速反致木火厥張云耳立齋治一男子年逾四十陰囊腫痛以熱手熨之少緩服五苓等散不應尺脈遲軟此下虛寒邪所襲而然名曰寒疝非瘡毒也以蟠蔥散治之少可更以葫蘆巴丸服之而平杜舉人名京年逾三十陰囊濕癢莖出白物如膿舉則急痛此肝疝也用龍膽瀉肝湯而愈有陰莖腫或縮或挺或癢亦以此藥治之施笠澤治錢元一患疝氣衝痛蓋有年矣每抑鬱則大作嘔吐痰涎不進飲食己未春病且浹旬診得左關弦急而鼓右關尺俱浮大而無力此命門火衰不能生木土肝木乘旺復來侮脾用葫蘆巴元胡索等疏肝之劑以治其標隨用八味丸益火之原以清陰翳間進參術補脾之藥以治其本漸安數載沉疴不三月而愈朱氏選錢國賓云黃州客陳思云負貨行至德州仕館其人素有疝氣忽然陰子漸大如斗半月臥床不起偶有道人化齋彼甚嗔怪道人曰爾病尚得我醫如何發怒遂請進見坐問根由與芡實大紅藥丸用無根涼水送下供之而出去約三日後再來看汝陳服藥腹中微響若周身氣行之狀至三日消已大半道人又至仍與前藥二丸三日一次服盡陰子如故謝銀一兩不受討紫花布道袍一件而去陳求丸方曰此藥汝不能合用紫金錠亦可以消斗大之陰子也余與同寓親見其治九日而消斗大之陰子真仙丹也蔣仲芳一日治二疝一人升上作病一人墜下作痛俱悶痛欲絕升上者與故紙三兩炒黑醜一兩生硫黃七錢俱為末鹽酒打麵糊為丸鹽酒送下墜下者與補中益氣湯加杜仲故紙肉桂炮薑香附川芎二人駭曰疝氣同也何方不同若是曰姑且試之至明日而皆愈潘惟秋間患疝氣症服肉桂小茴香荔核之類不應自用生薑泡沙糖湯服一二日稍愈遂止飲沙糖湯而愈沈初兄抄本吳橋治胡有濡父旦遞以疝作逆橋橋以其人習飲醇第以涼劑而清濕熱遂愈一日疝作適橋他出乃逆方生家人出橋舊方示之生按方而治不效頃之則小溲浸短小腹浸堅覆逆文學先生至注黃金二鎰內文學篋中文學力任之治再信而病益進短者枯堅者石矣既而橋至則病人遞出錯言橋心異之此神亂也既診曰殆矣有濡曰家大人疝遞作賴公一再劑而瘳乃今兩君子亦仿故方何卒不效橋曰此刻舟也今病得之內當在陰兩君復以陰藥投之嫌於無陽也既以陰劑陰陽失其健而不能運則壅閼矣家人偵其故則與女豎私焉橋辭歸旦中夜死文學胠篋歸金而去太函集魏玉橫曰汪氏甥素有疝症發則囊如盛二升粟憎寒壯熱或與小茴香青皮木香葫蘆巴等服之囊腫赤而痛甚勢將成癰次日仍與前藥診之脈數大無倫面赤黯亟用熟地二兩杞子一兩川楝一枚一劑而愈後與人哄巔頂著棒悶絕而蘇次日陰囊腫大如疝發時於是巔痛甚則囊痛減囊痛甚則巔痛減寒熱往來專科遞治無效蓋厥陰肝脈下絡纂上行巔故上下相連而其痛則互為消長也與前方數劑上下皆愈凡疝治之失宜過服香辛燥烈之劑遂成勞損者夥矣鮑二官六七歲時忽腹痛發熱夜則痛熱尤甚或謂風寒發散之不效又謂生冷消導之不效診之面潔白微有青氣按其虛里則築築然跳動問其痛云在少腹驗其囊則兩睪丸無有曰此疝痛也與生地甘杞沙參麥冬川楝米仁二劑全愈凡疝症雖有寒濕痰氣之殊余所愈多以此方捷如桴鼓蓋症雖不一而病屬厥陰則一也要之肝木為病大抵燥火多而寒濕絕少也余鉽兒十歲時忽蹲地以拳柱其腹宛轉不能語察其面青知疝發也亟以杞子一兩川楝一枚煎服下咽立愈小便秘朱丹溪治一人因服分利之藥太過遂致秘塞點滴不出謂其胃氣陷於下焦用補中益氣湯一服而通因前多用利藥損其腎遂致通後遺溺一夜不止急補其腎然後已凡醫之治是症者未有不用泄利之劑誰能顧其腎氣之虛哉醫說續編盛用敬治文學姚汝明內傷新愈又病食傷他醫皆用下藥病益甚小便閉中滿腹堅如石三陰受傷所致盛診之曰此不可用分理藥也理當作利宜以參耆運其氣升柴提其氣氣升則水自下矣加以益腎之劑數服霍然吳江志鍾大延治徐大理病小便秘腫脹面赤發喘眾醫皆從熱症治愈甚大延診之曰是無火也急煮附子湯一服而愈雄按亦須以脈參之錢塘有人小便常秘百方通之不效有一道人錢宗元視之反下縮小便藥俄爾遂通人皆怪之以問宗元曰以其秘故醫者驟通之則小便大至水道愈溢而小便愈不得通矣今吾縮之使水道稍寬此所以得流也此一治殊為特見北窗炙輠黃氏小便不通陳雁麓用芒硝一錢研細龍眼肉包之細嚼嚥下立愈續金陵瑣事竹鎮有人病溺不下求於乩仙判云牛膝車前子三錢共五錢同銼為粗末將來白水煎空心服之果愈居易錄龔子才治一人小便不通服涼藥過多脹滿幾死以附子理中湯加琥珀末調服立通一人小便不通已經七八日遍身手足腫滿諸藥罔效以紫蘇煎湯入大盆內令病人坐上熏蒸冷則添滾湯外用鹽炒熱熨臍上及遍身腫處良久便通腫消而愈李士材治王郡守痰火喘盛咳正甚時忽然小便不通自服車前木通茯苓澤瀉等藥小腹脹悶點滴不出李曰右寸數大是金燥不能生水之故惟用紫菀五錢麥冬三錢五味十粒人參二錢一劑而小便湧出如泉若淡滲之藥愈多則反致燥急之苦不可不察也先兄念山以謫官鬱怒之餘又當盛夏小便不通氣高而喘以自知醫服胃苓湯四帖不效李曰六脈見結此氣滯也但用枳殼八錢生薑五片急火煎服一劑稍通四劑霍然矣俞孝廉修府志勞神忽然如喪神守小便不通李診之曰寸微而尺鼓是水涸而神傷也用地黃知母各二錢人參丹參各三錢茯苓一錢五分黃柏一錢二劑減十劑乃全安馮楚瞻治王氏女年十三小便不通甚危初二三歲時乳母恐其溺床切戒之由是寤寐刻刻在心二三歲時事安能記憶雄按此真俗名尿梗病也往往起於幼時習慣自然不可謂二三歲時不能記憶也數年以來日中七八次夜中七八次習以為常漸有淋狀近來益甚或以導赤利水之劑投之初服稍應久則增劇點滴不通脈之六部洪數久按無神知為過於矜持勉強忍小便心腎久虛又服利水之劑真陰益槁臟涸津枯氣何能化以八味湯加五味麥冬取秋降白露生之意也每劑納熟地二兩連進兩服使重濁以滋之為小便張本再以其渣探吐之上竅既開下氣自通數服而愈一月後症復發其家照前方令服亦令探吐不惟不效反脹悶難堪張曰前者氣傷未甚故以滋腴之藥濟之足矣今當盛夏氣傷已甚雖有滋水良藥若無中氣運行豈能濟乎今六脈洪大而空中枯已極二劑滋潤斷不可少然必繼以助中氣之藥則中焦氣得升降前藥始能運行令連服加減八味湯二劑果脹悶益甚乃以人參一兩附子三錢濃煎溫服自胸次以至小腹漉漉有聲小便行數次而愈張隱菴治一書吏患癃閉諸治無效以補中益氣湯投之一劑而愈或問曰此症人皆以通利治之不效今以升提治而效其故何也曰君不見夫水注子乎閉其上而倒懸之點滴不能下矣去其上之閉而水自通流非其驗耶薛立齋治一婦人患小便淋瀝不通面青脅脹諸藥不應此肝經滯而血傷用山梔川芎煎服而愈一婦人小便不利小腹並水道秘悶或時腹脅脹痛此肝火用加味逍遙散加龍膽草四劑稍愈乃去膽草佐以八珍散加炒黑山梔兼服而愈鄭奠一曰木瓜乃酸澀之品世用治水腫脹誤矣時有大寮舟過金陵愛其芬馥購數百顆置之舟中舉舟人皆病溺不得出醫用通利藥罔效迎余視之聞四面皆木瓜香笑謂諸人曰撤去此物溺即出矣不必用藥也於是盡投江中傾之溺皆如舊本草備要汪訒庵曰家母舅童時病溺塞服通淋藥罔效老醫黃五聚視之曰此乃外皮竅小故溺時艱難非淋症也以牛骨為楔塞於皮端竅漸展開不藥而愈使重服通利藥得不更變他症乎乃知醫理非一端也同上一人燥熱傷下焦至小便不利當養陰當歸地黃知母黃柏牛膝茯苓生甘草白朮陳皮之類治法紹興劉駐泊汝翼云魏𮟴知明州時宅庫之妻患腹脹小便不通垂殆隨行御醫某人治此藥令服遂愈栝蔞不拘多少焙乾碾為細末每服三錢重熱酒調下不能飲者米飲調下頻進數服以通為度是齋方吳孚先治曹庶常小便不通多服分利之藥遺尿一夜不止既而仍復秘塞點滴不行此利藥太過腎氣虧極急用補中益氣湯送腎氣丸遂痊黃履素曰予家有僕婦患小便不通之症時師藥以丸節湯腹漸滿而終不通幾殆矣有草澤醫人以白蘿蔔子炒香白湯吞下數錢小便立通此予親見之者孫文垣治倪二南內人小水不禁一日二十餘脈之右寸洪而有力左寸虛右尺沉微此心腎不交也以當歸遠志之類五日而安後凡遇辛苦則發以此服之立效薛立齋治一婦人小便自遺有時不利日晡益甚此肝熱陰挺不能約制用六味丸料加白朮酒炒黑黃柏七分知母五分數劑諸症悉愈若誤用分利之劑愈損真陰必致不起矣一老婦患前症惡寒體倦四肢逆冷薛以為陽氣虛寒用補中益氣加附子三劑不應遂以參附湯四劑稍應仍以前藥而安附子計用四枚人參斤許小便不通由於氣閉若用澤瀉木通車前茯苓之類反不效宜用歸身一兩川芎五錢柴胡二錢五分升麻二錢五分一服即通年老人可以加參小便不禁附頻數遺瀝李士材治張方伯夫人患飲食不進小便不禁李曰六脈沉遲水泉不藏是無火也投以八味丸料兼進六君子加益智仁肉桂二劑減數劑瘳俞文學憂憤經旬忽然小便不禁醫皆以固脬補腎之劑投之凡一月轉甚李診之曰六脈舉之則軟按之則堅此肝腎之陰有伏熱也用丹皮茯苓各二錢甘草梢六分黃連一錢煎成調黃雞湯與服六劑而安矣適有吳門醫者曰既愈當大補之數日後仍復不禁再求治李曰肝家素有鬱熱得滋補而轉熾遂以龍膽瀉肝湯加黃雞湯服之四劑即止更以四君子加黃連山梔一月而痊張三錫治一人病風狂服甘遂等利藥太過小水不禁服桑螵蛸散未終一料而安真桑螵蛸同桑皮炒遠志菖蒲龍骨人參茯苓當歸龜板醋炙已上各一兩為末以參湯調下二錢薛立齋治一婦人患小便頻數日晡熱甚此肝脾血虛氣滯而兼濕熱也用加味逍遙散加車前子而愈一婦人患前症發熱煩躁面目赤色脈洪大而虛此血虛發躁用當歸補血湯數劑而痊一婦人久患前症泥屬於火雜用寒涼之劑虛症悉具曰此脾胃虧損而諸經病也當補中氣為主遂以六君補中二湯兼服兩月餘而愈劉大參年逾六旬形氣瘦弱小便不禁或煩數內熱口乾或咳痰喘暈此肺腎氣虛用六味丸益氣湯以滋化源彼不信反服補陰降火澀精之劑陰囊作痛或小便不利仍服前藥不兩月而愈王執中壯年寓學忽有遺瀝之患因閱方書見有用五倍子末酒調服者服之愈藥若相投豈在多品而亦無事於灸也資生經大便不通徐靈胎曰便閉之症總以腸中血枯而有伏火者為多開肺順氣等法偶或有之非盡然也安康郡太守苦風秘陳為處二仁丸杏仁去皮尖麵炒黃麻仁另研枳殼去穰麵炒為末訶子炒去核為末上用煉蜜為丸梧子大每服二三十丸溫水下未利增之乃愈薛立齋治一老婦大便欲去而難去又不堅實腹內或如故或作脹兩關尺脈浮大薛以為腸胃氣虛血弱每服十全大補湯加肉蓯蓉去後始快若間二三日不服腹內仍脹大便仍難一婦人大便秘澀諸藥不應苦不可言令飲人乳而安張子和曰頃有老人年八十歲臟腑澀滯數日不便每臨後時頭目昏眩鼻塞腰痛積漸食減縱得食便結燥如彈一日友人命食血臟葵羹油渫菠蔆菜遂頓食之日日不乏前後皆利食進神清年九十歲無疾而終圖經云菠蔆寒利腸胃芝麻油炒而食之利大便葵寬腸利小便年老之人大小便不利最為急切此亦偶得瀉法耳子和表兄病大便燥滯無他症常不敢飽食飽則大便極難結實如鐵石或三五日一如圊目前星飛鼻中血出肛門連廣腸痛痛則發昏服藥則病轉劇巴豆芫花甘遂之類皆用之過多則困瀉止則復燥如此數年遂畏藥性暴急不服但臥病待盡兩手脈息俱滑實有力以大承氣湯下之繼服神功丸麻仁丸等藥使食菠蔆菜及豬羊血作羹百餘日充肥親知駭之粗工不知燥分四種燥於外則皮膚皺揭燥於中則精血枯涸燥於上則咽鼻焦乾燥於下則便溺結秘夫燥之為病是陽明之化也水液衰少故如此然可下之當擇之巴豆可以下寒甘遂芫花可以下濕大黃朴硝可以下食內經曰辛以潤之咸以軟之周禮曰以滑養竅龔子才治一男子年六十七因怒左邊上中下三塊時動而脹痛揉之則散去心痞作嘈食則胃口覺滯夜臥不寧小便澀大便八日不通一醫以大承氣湯一醫以化滯丸一用豬膽導法一用蜜導俱不效診之六脈弦數有力此血不足氣有餘積滯壅實大黃末三錢皮硝五錢熱燒酒調服下黑糞如石數十枚如前再進下糞彈盆許遂安後以四物湯加桃仁紅花酒蒸大黃黃連梔子三稜莪朮枳殼青皮木通甘草十數劑而愈李時珍治一宗室年幾六十平生苦腸結病旬日一行甚於生產服養血潤燥藥則泥膈不快服硝黃通利藥則若罔知如此三十餘年矣診其人體肥膏粱而多憂鬱日吐酸痰碗余乃寬又多火病此乃三焦之氣壅滯有升無降津液皆化為痰飲不能下滋腸腑非血燥比也潤劑留滯硝黃徒入血分不能通氣俱為痰阻故無效也乃用牽牛末皂角膏丸與服即便通利自是但覺腸結一服就順亦不妨食且復精爽蓋牽牛能走氣分通三焦氣順則痰逐飲消上下通快矣本草綱目外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者晝夜醫用通利藥不效遣人叩李李思此乃濕熱之邪在精道壅脹隧路病在二陰之間故前阻小便後阻大便病不在大腸膀胱也乃用楝實茴香穿山甲諸藥入牽牛加倍水煎服一服而減三服而平同上張景岳治一壯年素好火酒適夏月醉則露臥不畏風寒此其食性臟氣皆有大過人者因致熱結三焦二便俱閉先以大承氣湯用大黃五七錢如石投水又用神佑丸及導法俱不能通且前後俱閉危益甚遂仍以大承氣湯加生黃二兩芒硝三錢又加牙皂二錢煎服黃昏進藥四鼓始通大便通而後小便漸利此所謂盤根錯節有非斧斤不可者若優柔不斷鮮不害矣朱翰林太夫人年近七旬偶因一跌即致寒熱醫與滋陰清火勢轉甚診之六脈無力雖頭面上身有熱而口不渴且足冷過股曰此陰虛受邪非跌之為實陰症也遂以理陰煎加人參柴胡二劑而熱退日進粥二三碗已而大便半月不通腹且漸脹咸以燥結為火欲復用涼劑張不可謂若再用清火其原必敗不可為矣經曰腎惡燥急食辛以潤之正此謂也乃以前藥更加薑附倍用人參當歸數劑而便通腹脹退日就瘥此實風秘之類未可歸功薑附琇按此症乃陰虛陽越亦類中之輕者一跌而病良有以也不知陰症二字何以插入其生平見解大可知矣李士材治蔣少宰服五加皮酒遂患大便秘結四日以來腹中脹悶服大黃一錢通後復結李曰腎氣衰少津液不充誤行疏利疏字不妥是助其火矣以八味丸料煎成加人乳一鍾白蜜五錢二劑後即通十日而愈顧文學素有風痰大便秘治風須治血乃大法也用十全大補湯加秦艽麻仁杏仁防風煨皂角仁半月而效三月以後永不再發此亦風秘之候二便不通馮楚瞻治崔姓人六脈沉微身熱四肢厥冷發狂譫語連夜不寐口渴浩飲二便俱秘絕似陽明熱症而斷為陰伏逼陽乃舍症從脈之治此陰伏於內逼陽於外因津液不行故小便秘而口乾渴非實熱也因穀食久虛故大便虛秘不通非燥結也若不急為斂納則真陰真陽並竭矣乃用熟地麥冬以壯金水炒白朮以托住中氣牛膝五味以下趨藏斂製附子以引火歸原另重煎人參沖服不三劑狂定神清思食而愈琇按此亦陰虛陽越之病甚則為類中其治法亦大醇而小疵耳至云陰伏於內逼陽於外亦與景岳案中謂為陰症同一模糊也此二案不入類中門者以世俗惟以二便為急且風秘一條人不講也胡念庵治陳鹽商年七十六矣春時患中風脫症重劑參附二百餘帖獲痊至十月大便秘結不行日登廁數十次冷汗大出面青肢厥醫用滋補劑入生大黃三錢胡深以為不可戒之曰老年脫後幸參附救全不能安養過於思慮以致津液枯竭傳送失宜何事性急以速其變若一投大黃往而不返恐難收功矣姑忍二三日勢當自解病者怪其遲緩口出怨咨之辭次日不得已用人參二兩蓯蓉一兩當歸五錢松柏仁各五錢附子三錢升麻四錢煎服外用綠礬一斤入圊桶以滾水衝入扶坐其上一刻利下而通醫林綱目琇按傷寒瘧利之後患秘結者皆由攻下散表失宜所致究其由則皆血燥為病至若風秘一條其病本由燥火生風醫者昧於風字動用風藥死者已矣其存者亦必貽後患然此尚其輕者也張路玉治楊松齡夏月感冒服發散十餘劑二便俱閉一醫用硝黃下之少腹左畔遂脹起如墩不赤不熱有時嗶嗶作聲瘍醫以敷藥治其外以解毒利水藥治其內藥未進而躁擾不寧診之六脈緊細而駛此過汗津液大傷又與苦寒攻裡致陰邪內結膀胱不化溺積不通法在不救幸胃氣有權形神未槁尚能少進粥糜姑許以治因與濟生腎氣大劑煎成入有嘴壺托起其項徐徐仰灌升許頃令轉側以鵝翎探吐即時溲便如注少腹頓平更與十全大補調理而安此症前後患者四五人或小便淋瀝或遺溺不止或形羸氣脫皆力辭不治琇按此由感症混表混攻而成秘結收入此門以備參酌孫文垣治溫南溪內人居常大便秘結面赤不思飲食頭時眩暈診之右關尺滑大有力此痰火症也用栝蔞四錢為君滑石三錢枳實二錢半夏一錢半為臣蘿蔔子薑黃各一錢為佐兩帖愈矣又教以或遇大便秘結每服當歸龍薈丸加牛膽南星一錢立應一人大小便秘數日不通用商陸搗爛敷臍上立通本草綱目一人大便秘久用烏桕木方停一寸劈破以水煎取半盞服之立愈陸養愚治沈望亭年近古稀常患脅痛用行氣藥及當歸龍薈丸即愈後患便秘服潤腸丸便雖通而飲食減胸膈不舒有時溫溫作痛若數日不服又秘結矣或以高年血不足所致投以四物湯數劑並小便亦不通三日脹急殊甚蜜導熨臍百計不解脈之沉遲而弱詢其平日大便有欲解之狀及解又潤而不燥曰此非血秘乃氣虛不能傳送所致也用補中益氣湯少以木香白豆蔻佐之二劑兩便俱通此後常服一劑不惟無秘結之患且飲食倍增脅痛亦不作矣陸祖愚治邱彥昭稟賦薄弱常有夢遺症愛食燥炒飯大便二三日一度忽受風寒仍吃燥飯且日進四餐旬日間飲食如舊而大便竟不行後復寒熱頭痛身熱不止間日一作延及二十餘日左手浮弦氣口沉實而滑知其風邪飲食俱未消散遂用葛根柴胡山楂厚朴栝蔞仁黃芩陳皮半夏之類頭疼止寒熱輕忽發黃前方去半夏陳皮厚朴加茵陳花粉木香枳實黃連二帖黃退轉而為斑色純紅前方去茵陳木通加犀角升麻煎送潤字丸二錢五分良久去燥矢七八塊斑消身微涼然胸口尚不可按前方去犀角升麻倍黃連枳實六劑便不行而小腹微滿或謂病已月餘可以議下弗之聽仍用潤字丸二錢五分薑湯服少頃去大便七八塊而胸中如故令以前方日服一劑間二日投潤字丸二錢病至七十餘日服潤字丸計五兩胸膈猶未清然病久肌肉削盡況常有遺症不宜再行消導矣枳實二錢山楂二錢人參六分附子四分連進三劑遂大便日行一次人參漸加枳實漸減數劑後食進病起服參至半斤始得復元丹溪治一婦人脾疼後患二便不通此是痰隔中焦氣聚上焦二陳加木通先服後吐渣再煎燒皂角灰為末粥清下一尼體厚病吐逆忽小便不利頭汗出立斃薛立齋治儒者王錄之素痰甚導吐之後大便燥結頭暈眼花等症尺脈浮大按之則澀此腎氣虛而兼血虛也四物送六味四劑諸症悉退仍用前丸月餘而康僉憲高如齋素唾痰服下痰藥痰去甚多大便秘結小便頻數頭暈眼花尺脈浮大按之如無謂腎家不能納氣歸源前藥復耗金水用加減八味料煎服而愈陳三農治中州王太學素多酒食病下極脹痛二便不通坐臥不能沉吟七日矣百般通利不應此濕熱之邪遏塞二陰壅脹隧路故前後不通病不在大腸膀胱也乃用韭菜子以山甲茴香楝實各一錢五分入牽牛頭末三錢水煎一服即減三服即愈乃知牽牛能達右腎命門走精隧故東垣天真丹以牽牛鹽水炒黑入佐沉香官桂杜仲破故紙治下焦陽虛也陳良甫曰一男子病風淫末疾或用快藥利之患肺痿咯膿血至大便不通而死惜哉易思蘭治一儒官仲秋末患便秘症初因小便時秘服五苓散八正散益元散俱不效一醫診得二尺俱無脈作下元陰虛水涸用八味丸治之日一服三日大便亦秘口渴咽乾煩滿不睡用脾約丸潤腸丸小便日數十次惟點滴而已大便連閉十日腹滿難禁眾議急用三一承氣湯下之服後微利隨閉又加小腹繞臍滿痛復用舟車丸遇仙丹每空心一服日利三五次裡急後重糞皆赤白如此半月日夜呻吟惟飲清米飲及茶盂許九月終易診之兩寸沉伏有力兩關洪緩無力兩尺不見易曰關尺無恙病在膈上此思慮勞神氣秘病也以越鞠湯投之香附醋炒一錢蘇梗連翹山梔川芎各六分蒼朮黃芩各八分神麯一錢桔梗四分枳殼五分甘草三分服一盂噯氣連出再一盂大小便若傾所下皆沉積之物渾身稠汗因進薑湯一盂就榻熟睡睡覺覓粥次早復診六脈無恙調理氣血數日全愈易自注曰人身之病上下表里雖有不同不過一氣為之流通耳氣之通塞均於脈息辨之今兩尺皆無眾以為如樹之無根不知今年己卯燥金司天君火在泉己土運於中正是南面以象君位君火不行兩尺不相應今兩尺隱然不見正為得卯年之令若尺脈盛於寸則為尺寸反矣經曰尺寸反者死豈八味丸所能治乎然而裡急後重赤白相雜痛則欲解有似乎滯下但滯下之脈見於兩關今關脈不浮不緊不數其非滯下明矣既非滯下而用承氣舟車遇仙等藥則元氣大傷而病愈增矣其病源在上焦氣秘而下焦不通也心脈居上兩寸之脈當浮今不浮而沉下手脈沉便知是氣氣鬱不行則升降失職是以下竅秘結二便不順吸門不開幽門不通正此謂也譬如注水之器閉其上竅則下竅不通水安從出用香附之辛以快滯氣蘇梗通表裡之竅連翹辛香升上以散六經之鬱火蒼朮神麯健脾導氣散中結於四肢炙甘草以和中少加桔梗引黃芩枳殼盪滌大腸之積山梔去三焦屈曲之火而利小腸川芎暢達肝木使上竅一通則下竅隨開表氣一順則裡氣自暢是以周身汗出二便俱利正所謂一通百通也氣秘者病之本便閉者病之標專治其本故見效速也吳孚先治曹庶常小便不通多服分利之藥遺尿一夜不止既而仍復秘塞點滴不行此利藥太過腎氣虧極急用補中益氣湯送腎氣丸遂痊孫文垣治袁洪溪以沖暑往來經略政事致發熱燥渴因過食冰浸瓜果遂成泄瀉小水短少醫與胃苓湯加利藥瀉止而小水失其常度臍下脹急立溺則點滴不出臥則流溢不竭以頻取夜壺致通宵不寐治半月精神削寢食廢診之兩寸短弱關緩大兩尺洪大此余暑未清素善飲濕熱流於下部也以益元散三錢煎香薷湯服之略無進退脈亦如昨再思之此蓋尿竅不對也膀胱者脬之室也脬中濕熱下墜立便則竅不對小水因不得出臥則脬下墜而滲出膀胱猶以竅不對涓涓流溢不能暢達故了而不了也治惟提補上中二焦元氣急用三一承氣湯下之服後微利隨秘又加小腹繞臍滿痛復用舟車丸遇仙丹每空心一服日利三五次裡急後重下皆赤白如此半月日夜呻吟惟進米飲及茶盂許診得兩寸沉伏有力兩關洪緩無力兩尺不見曰關尺無恙病在膈上此思慮勞神氣秘病也以越鞠湯投之服一盂噯氣連出再一盂大小便若傾所下皆沉積之物渾身稠汗因進薑湯一盂熟睡睡覺粥進二盞復診脈平調理氣血而愈立齋診職方陳莪齋年逾六旬先因大便不通服內疏等劑後飲食少思胸腹作脹兩脅作痛形體倦怠兩尺浮大左關短澀右關弦澀時五月此乃命門火衰不能生脾土而肺金又克肝木決其金旺之際不起後果然萬密齋治汪玉虹大便不通服通幽湯潤腸丸俱不效診其脈微氣弱乃內傷症也氣口脈浮大而軟此氣不運而血不潤氣血兩虛故也宜亟補之曰其如腹脹何曰無慮但服補中益氣湯倍加當歸五日而愈許學士治一人母年八十四忽爾腹痛頭疼噁心不食召醫數十議皆用補脾進食治風清利頭目等藥數日難愈全不入食其家憂惶許辨說前藥皆誤矣此症正是老人風秘臟腑壅滯聚於胸中則腹脹噁心不思飲食又上至於巔則頭痛神不清也若臟腑流暢諸疾悉去矣乃用紫蘇子大麻子各半合洗淨研細取汁一盞分二次煮粥兩啜而氣滯通先下結糞如胡椒者十餘枚後漸得通利不用藥而愈矣文潞公在北門曰盛夏間苦大腑不調公隨行醫官李琬本衢州市戶公不獨終始涵容之又教以醫事公病泄利琬以言動搖之又求速效以赤石脂龍骨乾薑等藥饋公公服之屢日不大便其勢甚苦初虞世共城來見公未坐定語及此事公又不喜服大黃藥虞世告曰比燥糞在直腸藥所不及請以蜜兌導之公以為然時七月中苦熱虞世冒汗為公作蜜兌是夕三用下結糞四五十枚大如胡桃色黑如橡慄公二三日間飲食已如故良方攢宮有一老人患風秘八九日不通有木匠授以此方只一服見效用不蛀皂角當中取一寸許去黑皮以沸湯半盞泡上用盞蓋定候溫服之先備少粥通後即食是齋方繆仲淳治唐震山年七十餘便燥結胸中作悶曰此血液枯槁之候用大肉蓯蓉三兩白酒浸洗去鱗甲切片白湯三碗煎一碗頓時飲盡大便通胸中快然偶一醫問疾曰此劫藥也當調補脾胃為主易以白朮厚朴茯苓陳皮病如故唐翁曰誤矣仍飲前藥立解高存之聞而叩其故繆曰肉蓯蓉峻補精血驟用反動大便藥性載甚明也廣筆記張選卿治大便不通屢驗方硃砂研如飛面五錢真蘆薈研細七錢滴好酒少許和丸每服一錢二分好酒吞下朝服暮通暮服朝通須天晴時修合為妙同上劉云密治一老人因冒雨感寒未經發汗至春初內熱煩躁胸膈緊滿十日不大便用清解二劑入口即吐其半加熟大黃利之下咽即吐去殆盡蓋因痰熱凝結胸膈是以治血分者反拒而不受也因用牽牛大黃丸緩緩服之而大便通後乃服清熱化痰藥十餘劑而漸安則較瀕湖所說老婦腸結症又進一解矣吳橋治張邦達謝邑歸年逾艾矣其貌壯碩如昔偶以信宿夢遺早呼旨酒進人參膏二匕既而大便稍實無他恙也張所善者巴深以為誤飲而釀內熱不急下且虞有他既飲大黃湯不為動猶以為熱甚至於再三腹脹膨脝駸駸石矣旬日屍寢不食不言橋診之脈隱隱將絕橋曰腎司啟閉主二溲脾居中制之必關脾而後轉運脹者故中枵而下澀誤以悍劑伐之脈有死徵不可為矣眾曰否即中氣匱乏遇下且如建瓴何不為動橋曰公等信知脾虛不任寒涼不知脾斃則寒涼無所用矣諸子跪曰誠得一劑藉手庶毋恝於人子之心曰進獨參湯當下其下亦薄於治無裨既得劑則腸鳴而溲腹脹虧三之一張乃張目問狀人人以為更生諸子問曰大黃不行而人參行何說橋曰否中權廢矣即前茅安所受命哉補中而建招搖摧堅者始為之用此亦人參用大黃非自用而能下之也顧病少間而脈不歸終於不治深者復至將攘為己功大詬諸子曰爾曹以不治治家大人無人子禮茲更一下而起復何待乎橋故避深度復爭之無益適諸子問可否乃徐應曰等死爾下則死疾不下則死遲公等自裁橋何敢與深詬愈急卒復下之不旋踵死矣太函集王生病發熱頭痛腹脹甚醫為之解散熱退而痛如故且不得前後溲又以大黃通之大便稍行小溲赤澀脹痛特甚仍以為熱結將復下之橋診曰病得之勞且內復食冷爾內則損腎勞倦食冷則損脾腎主大小溲腎損則不能轉故作濕熱而為滿藉令亟下則將亡陰脹滿有加矣危之道也王俯首叩枕曰誠如公言三者皆如見遂投人參五苓散一服得前溲再乃大通痛亦尋減病者求通後溲急橋曰公六脈沉微且數必假信宿脾氣始回脾得主濕熱則將自行毋欲速明日大溲自下調理月餘而愈同上
