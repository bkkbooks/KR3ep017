body:
  text: 卷十八舌張子和治南鄰朱老翁年六十餘歲身熱數日不已舌根腫起和舌尖亦腫腫至滿口比原舌大二倍一外科以燔針刺其舌兩旁下廉泉穴病勢轉凶將至顛巘張曰血實者宜決之以䤵針磨令鋒極尖輕砭之日砭八九次血出約一二盞如此者三次漸而血少痛減腫消夫舌者心之外候也心主血故血出則愈又曰諸痛癢瘡瘍皆屬心火燔針艾火是何義也元順帝之長公主駙馬剛噶勒藏慶王因墜馬得一奇疾兩眼黑睛俱無而舌出至胸諸醫罔知所措廣惠司卿聶濟爾乃伊囉勒琨人也嘗識此症遂剪去之頃間復生一舌亦剪之又於真舌兩邊各去一指許卻塗以藥而愈輟耕録宋度宗欲賞花一夜忽舌腫滿口蔡御醫用蒲黃乾薑末等分乾摻而愈蓋舌乃心之外候而手厥陰相火乃心之臣使蒲黃活血涼血得乾薑是陰陽相濟也芝隱方本本草綱目仙傳外科云有人偶含刀在口割舌已垂未斷一人用雞子白皮袋之糝止血藥於舌根以蠟化蜜調沖和膏敷雞子皮上三日接住乃去皮只用蜜蠟勤敷七日全安若無速效以金創藥參治之用雞子白皮但取其軟而薄護舌而透藥也本草綱目凌漢章治一男子病後舌吐凌兄亦知醫謂曰此病後近女色太早也舌者心之苗腎水竭不能制心火病在陰虛其穴在左股太陽是當以陰攻陽凌曰然如其穴針之舌吐如故凌曰此知瀉而不知補也補數劑舌漸復故明史何首庸治前鋒賴將軍舌本腫出不能縮何曰心氣亟熱也倘久則飲食不下死矣炙飲器灼之腫消再投以湯劑立愈雲南通志龔子才治一人舌腫舒出口外舌者心之苗又脾之經絡連舌本散舌下其熱當責諸心脾二經經所謂熱勝則腫也用萆麻子去殼紙裹捶出油透紙作燒捻煙燻之內服清利心脾之劑而愈不外益元合導赤一人舌青黑有刺乃熱劇也欲以舌貼土壁上稍可良由思慮過度怒氣所得為制一方名清心散服之即效赤茯苓棗仁麥冬胡麻仁黃連各一錢遠志五分木通連翹各八分甘草三分清水煎一膏粱之人患舌腫敷服皆消腫之藥舌腫勢急與刺舌尖及兩旁出紫血杯許腫消二更服犀角地黃湯二劑翌早復腫脹仍刺去紫血杯許亦消一二仍服前湯良久舌大腫又刺去黑血二杯許腫漸消忽寒熱作嘔頭痛作暈脈浮洪而數此邪雖去而元氣愈傷與補中益氣倍參耆歸術四劑而安又數劑而愈鄭秋官過飲舌本強腫語言不清此脾虛濕熱用補中益氣加神麯麥芽乾葛澤瀉而愈柴嶼青治滿少司農諱兆惠內閣侍讀同在軍機處值宿患重舌腫痛問曰曾服通經散瀉火而病不除何也答曰火有諸經豈可混治誅伐無過幸汝年少未至大害診其右關洪實胃火特甚時已薄暮清胃散一服而次早霍然薛立齊治一婦人善怒舌痛煩熱或用降火化痰藥前症益甚兩脅作脹又服流氣飲肚腹亦脹經行不止此肝虛不能藏血脾虛不能攝血而前藥復傷也用加味歸脾湯加五味子而愈學士吳北川過飲痰壅舌本強硬服降火化痰藥痰氣益甚肢體不遂薛作脾虛濕熱治之而愈二守韓宗器不慎起居舌脹如菌痰湧便祕服芩連二陳之類脈浮而數欲針出血薛謂此足三陰虧損之症且有形而不痛者陽之類也法當峻補其陰毋損其血況虛浮之脈乎遂朝補脾肺夕滋腎肝而愈後因大勞面目俱赤遍身瘙癢時已仲冬曰大熱而甚寒之不寒是無水也乃用制火壯水之劑而愈搖城金允文舌脹吐痰反服降火化痰針刺出血便祕痰甚診之左尺關洪數右寸關弦數用滋腎水生肝血益脾胃之劑諸症少愈因近火頭面赤身癢六脈弦數薛謂此水竭火升之象難免於春二月矣於次年清明日果卒大尹王汝鄰兩足發熱吐痰如湧左尺數而無力此足三陰虛彼反服四物二陳知柏之類喉舌作痛又服清熱敗毒之劑其舌如赤桃脈洪數而無力此脾肺弱腎經虧甚虛火上炎水泛而為痰也當滋化源以生腎水遂用補中益氣湯六味地黃丸而愈李莫安撫內子夜半忽不能言燭之乃舌下生一舌急取外臺一方用新真蒲黃羅細末敷之如此五七次即愈須吐去再敷百乙方有人自行被顛穿斷舌心血出不止以米醋用雞翎刷所斷處其血即止仍用真蒲杏仁去皮尖硼砂少許研為細末煉蜜調藥稀稠得所噙化而安得效方馮楚瞻治李工部一日忽發熱牙床腫爛舌起大泡白胎甚厚疼痛難忍或用清解之藥口舌腫爛益甚數夜不寐精神恍惚狼狽不堪其脈兩關尺甚微惟兩寸稍洪耳曰龍雷之火亦能焚草木豈必實熱方使口舌生瘡乎蓋脾元中氣衰弱不能按納下焦陰火得以上乘奔潰腫爛若一清胃中氣愈衰陰火愈熾急為溫中下二焦使火有所接引而退舍矣乃用白朮八錢炮姜三錢溫中為君炒麥冬三錢清上為臣牛膝三錢五味一錢下降斂納為佐附子一錢五分直暖丹田為使如是數劑精神漸復腫者消而潰者愈矣來選入一人無故舌縮不能言用芥菜子研末醋調敷頸項下即能言服清脾降火等湯再用紫雪冰片散吹之而安錢國賓治板橋李氏僕劉二與租房之婦私年餘不收其租一日主人算帳無抵劉二坐逼婦恨將劉舌咬下二寸延視根腫滿湯水不下制金瘡藥用敗龜板燒煙帶黑色一兩血竭一錢冰片三分共末糝上血痛俱止腫尚未消其人昏昏不省夢關帝示以半紅半白雞豆大藥一粒用無根水吞汝即生矣驚覺難言討筆書衆人方知自是其腫漸消可灌飲湯至於薄粥其舌長完比前大小一樣日服參耆歸術湯愈蔣仲芳治一同學年二十餘患腮腫醫以清涼散火之劑不一夜舌忽腫塞口命在須臾叩門求救診其脈微細而數大便四五日不行矣微數雖屬虛火而便結又已屬實乃用百草霜吹舌上內用酒蒸大黃五錢肉桂一錢引火下行一劑而愈咽喉李王公主患喉癰數日腫痛飲食不下才召到醫官言須針刀開口方得潰破公主聞用針刀哭不肯治痛逼水穀不入忽有一草澤醫曰某不使刀針只用筆頭蘸藥癰上霎時便潰公主喜遂令召之方兩次上藥遂潰出膿血一盞余便覺痛減兩日瘡無事今傳其方醫云乃以針系筆心中輕輕畫破腫處乃潰散耳名醫録此與舊案苑九思法同凡喉病當用針者此法甚妙故首録之元祐五年自春至秋祁黃二郡人患急喉痹十死八九速者半日一日而死黃州推官潘昌言得黑龍膏方救活數千人其方治九種喉痹用大皂角四十梃切水三斗浸一夜煎至一斗半入人參末半兩甘草末一兩煎至五升去渣入無灰酒一升釜煤二匙煎如餳入瓶封埋地中一夜每用溫酒化下一匙或掃入喉內取惡涎盡為度後噙甘草數片本草綱目孫兆治文潞公一日喉腫翰林咽喉科治之經三日愈甚上召孫治之孫曰須得相公判筆一管去筆頭水沾筆點入喉便愈孫隨手便刺相公昏僕不省人事左右皆驚愕流汗孫曰非我不救相公須臾更嘔出膿升余旬余乃平復如故見上上喜曰孫兆良醫甚有手段即前草澤醫針法孫押班治都知潘元從喉閉孫以藥半錢吹入喉中少頃吐出膿血立愈潘詣孫謝曰大急之患非公不能救救人之急非藥不能療贈金百兩願求方以濟非常之急孫曰用豬牙皂角白礬黃連各等分置新瓦上焙乾為末即授以方不受所贈萬病回春其方已見舊案竇材治一人患喉痹痰氣上攻咽喉腫塞灸天突五十壯即可進粥服姜附湯一劑即愈此治肺也一人患喉痹頤頷粗腫粥藥不下四肢逆冷六脈沉細急灸關元穴二百壯四肢方暖六脈漸生但咽喉尚腫仍令服黃藥子散吐出稠痰一合乃愈此治腎也一人患喉痹六脈細為灸關元二百壯六脈漸生一醫曰此乃熱症復以火攻是抱薪救火也遂進涼藥一劑六脈復沉咽中更腫醫計窮用尖刀於腫處刺之出血一杯而愈蓋此症忌用涼藥痰見寒則凝故用刀出其肺血而腫亦隨消也張子和治一婦人病咽喉腫塞漿粥不下數日腫不退藥既難下針亦無效以當歸荊芥甘草煎使熱漱之以冷水拔其兩手不及五六日痛減腫消飲食如故咽喉之病甚急不可妄下針藥樓全善治一男子喉痹於大溪疑即太溪穴刺出黑血半盞而愈由是言之喉痹以惡血不散故也凡治此疾暴者必先發散發散不愈次取痰不愈又次取汙血也薛立齊治一婦人咽間作痛旬余突腫如赤楊梅狀兩月後始潰而不斂遍身筋骨亦痛諸藥不應此時行楊梅瘡也先以土萆薢湯數劑而斂更以四物湯倍加土茯苓黃耆二十餘劑諸症悉愈薛立齊治甫田史侍衛患喉痹以防風通聖投之腫不能咽此症須針乃可奈牙關已閉遂刺少商穴出血口即開更以膽礬吹患處吐痰一二碗許仍投前藥而愈常見患此病者畏針不刺多斃此筆頭藏針之法為至妙也少商穴在手大指內側去爪甲角韭葉許薛立齊治於縣尹喉痹腫痛寒熱此手少陰心火足少陰相火二經為病其症最惡惟刺患處出血為上因彼畏針先以涼膈散服之藥從鼻出急乃願刺則牙關已緊不可刺遂刺少商二穴以手勒去黑血口即開乃刺喉間治以前藥及金鎖匙吹之頓退又以人參敗毒散加芩連元參牛蒡四劑而平經曰火鬱發之發謂發汗出血乃發汗之一端也涼膈散連翹大黃芒硝甘草黃芩薄荷梔子廷評張汝翰患喉痛日晡益甚此氣血虛而有熱用八珍湯而愈後每入房發熱頭痛用補中益氣湯加麥冬五味及六味丸常服後不復作一儒者三場畢忽咽喉腫閉不省人事喘促痰湧汗出如水肢體痿軟脈浮大而數此飲食勞役無度虛火上炎用補中益氣加肉桂一劑頓蘇上盛下虛者此方未可輕用李通判咽喉腫痛口舌生瘡此上焦風熱先用荊防敗毒散二劑喉痰漸愈又以元參升麻湯口舌遂愈孫文垣治侄婦下午喉腫近來痰多暈厥一日二三發頭痛面赤素未生育左脈弦大右寸關滑大有力以荊芥薄荷甘草桔梗元參殭蠶柴胡枳殼竹茹貝母水煎連進二劑其夜得睡惟背脹怔忡痰猶不清面多熱用黃芩枳殼甘草桑白皮地骨皮天花粉元參前胡半夏曲橘紅山梔調養而安張景嶽治王蓬雀年出三旬患喉痹十餘日頭面浮大喉頭粗極氣急聲啞咽腫口瘡痛楚之甚一婢倚背坐而不臥者纍日矣察其脈則細數弱微之甚問其言則聲微似不能振者所服皆芩連梔柏之類此蓋傷陰而起復為寒涼所逼致寒甚於下格陽於上水飲難入而尤畏煩熱張曰危哉少遲半日必不救矣遂與鎮陰煎以涼水頓冷徐徐使咽之一服頭頸腫痛盡消繼用五福飲之類數劑而起來宅婦年近三旬因患虛損更兼喉癬疼痛多醫罔效脈數而無力大便溏瀉所服皆清火退熱之劑而喉愈痛知其本非實火多用寒涼肚腹復不實亦格陽之類也以理陰煎及大補元煎之類出入間用不半月而喉痛減不半年而疾全愈景嶽在燕都嘗見一女子年及笄於仲秋時無病而喉竅緊澀息難出入不半日緊澀愈甚診其脈無火也問其喉無腫無痛也面清目瞪不能語其聲之細如針息之窘如線伸頸掙命不堪之狀甚可憐也據證候絶非外症能以左歸合生脈投之尚可生心疑之不得其解意謂風邪閉塞喉竅非辛溫不解散遂以二陳湯加生薑噫下愚之俗工也毫忽無效意欲用獨參湯以救其肺葉天士曰若肺氣竭絶必自汗氣喘此是閉塞關竅不通而死用人參則愈閉其氣焉得不死景嶽立言害人不淺然見其勢危若此恐滋謗怨終亦未敢下手他醫見之亦束手而己此輩寧可效耶竟一日夜而歿後又一人亦如此而歿若此二人者至今莫識其所以病此終身之疑竇殊自愧也然意其必肺氣竭絶而然倘再值此恐非獨參湯決不能救筆之以俟後之君子按丹溪云咽喉腫痛有陰虛陽氣飛越痰結在上脈必浮大重取必澀去死為近宜人參一味濃煎細細飲之如作實症治之禍如反掌觀此丹溪之學何可薄哉傳忠録之言九原有知宜滋愧矣葉天士曰鎖喉風杜撰立名也病有閉症脫症閉症者氣道閉塞關竅不通而死脫症者大汗大吐大瀉虛脫而死閉症當以開通關竅為急脫症當以補虛收斂為要即如此女之病乃閉症也夫女子善懷性執抑鬱者多年已及笄未免有難出諸口者憤悶抑鬱肝氣不得疏泄決非一日交秋令則肝氣愈斂或食生冷或受寒涼郁遏肝氣肝性促急觸而暴發上干心肺之竅口不能言無腫無痛見面色之青者知其為肝病也經云暴病暴死皆屬於火火鬱於內不能外達故似寒症關竅閉塞經絡不通脈道不行多見沉滯無火之脈此時治法惟用紫金丹以淡薑湯磨灌則關隘必開因內有麝香通竅也開口之後然後用二陳加石菖蒲鬱金枳殼香附之類降之視為脫症用參此雪上加霜耳凡治難明之症必有至理焉故不得不為之細辨景嶽白恃絶世聰明毀謗前賢今遇此等症束手無策毫無見識而竟以獨參湯議補何得謂之明理乎余在新場鎮閔介申家彼一僕婦在閔若舟家為乳母年滿歸家適屆中秋往彼候安因食梨藕生冷一時喉間鎖定不能出聲不知痛癢手足冰冷面色白而青脈息沉伏藥不能進余以前法治之而安蓋因鬱怒又食生冷而起也又裁衣費姓之女年已二十外未嫁忽然仆倒手足冰面色青無痰聲不開口脈息伏亦用紫金丹開口進藥而愈如此症者甚多凡遇不開口無痛楚忽然而起者先以開導關隘為第一著語言得出可以得生若認為虛妄用人參無有不死者附太乙紫金丹方山慈菰川文蛤各二兩紅芽大戟白檀香蘇合油各一兩五錢千金紫霜一兩飛淨明雄黃琥珀各五錢冰片麝香各三錢上十一味各研極細末再合研勻濃糯米飲杵丸如緑豆大外以飛淨辰砂為衣此方治濕瘟疫癘之邪瀰漫熏蒸神明昏亂及霍亂吐瀉痧脹腹痛水土不服嵐瘴中惡等症兼解諸毒薛一瓢云比蘇合丸而無熱較至寶丹而不涼兼太乙丹之解毒備二方之開閉洵仙品也雄按今世上所行太乙丹藥品龐雜燥熱惟風餐露宿藜藿寒濕為病者服之頗宜若一概施之誤人匪淺楊乘六治房氏子年近三十病咳嗽午後稍安醫作傷風連進芎蘇十神等劑咽喉腫痰涎上湧更醫則以為喉痹也猛用芩連苦寒之劑熱益甚喉益閉氣喘如鋸不寐不食危症悉具脈之輕按滿指兩尺更覺有力面油紅甚舌枯黑其唇焦燥生皮其氣自臍下衝上此腎水不足六味症也乃不壯水之主以制陽光反用風燥以劫其陰煽其火致痰湧咽閉復用苦寒以傷之病劇而危又何怪乎遂與都氣飲一劑喘息定而熟睡醒則腫痛痰涎已減飲食漸加繼用六味合生脈歸脾加白芍間服月餘咳嗽亦愈吳氏婦兩目赤腫上連太陽下及肩胛雜用荊防辛芷之屬赤障如膜目痛轉盛口燥唇乾喉中如煙火上衝窒塞不通利重以苦寒之劑生冷之物遂至咽喉腫閉點水難吞勢甚急脈之兩尺浮而軟兩寸洪而旺兩關緊而細舌見紫色上加微黃而胖診間聞一嫗云昨日尚吃大柿數枚今水不能下咽縱有仙丹奈喉嚨作壩何得此數語益悉腫閉之故為想一進藥之法即令老嫗取磚一塊投火煅熱夾布數層尉於氣海妙法可師頃之覺滿腹溫和試以米湯可咽矣遂與附子養榮湯服後即睡至晚腫閉如失蓋此本由肝脾虛火上衝妄用發散火得風而愈熾重以苦寒生冷致下焦益寒火不能下歸壅逼於上而為腫閉故溫補一劑而愈馮楚瞻治何太學咽喉口舌腐爛而不疼胸膈脹閉不寐不食脈之左寸關弦洪搏指右寸關沉微欲脫乃平時勞心惱怒以致內傷身熱醫誤發散乃見紅點認為麻疹更用疏解清托遂困倦益甚頰內腫硬疑為疹毒更用清涼解毒於是脹悶不堪疼痛欲絶蓋勞傷發熱原系中氣不足誤發散而榮氣逆行乃為斑點復誤清解致陰火上浮齒頰為腫又謂疹毒益進寒涼清解脾胃愈虛元氣愈損於是咽嗌腐潰成穴而不疼如物失天日照臨易為腐壞名為陰爛非若陽火衝擊為腫為痛也以熟地一兩二錢炒白朮麥冬二錢五味八分製附子一錢五分二劑脹減睡安改用人參三錢棗仁二錢熟地四錢當歸一錢五分牛膝麥冬各二錢五味六分肉桂八分薑棗煎二劑神爽思食咽喉始痛此陽和已轉如凍解而水活故知疼也外用銅青三錢煅人中白二錢牛黃一分冰片二分麝香一分研極細少許吹之涎痰湧出再吹再流不日而愈吳孚先治柯子寧患咽喉齒痛脈沉細足冷大便泄瀉此腎虛龍火飛騰欲用金匱腎氣彼疑火症恐桂附不合或以石膏連翹苦寒進之其病尤甚復求治用前方一劑減二劑痊凡咽喉初覺壅塞一時無藥以紙絞探鼻中或嗅皂角末噴嚏數次可散熱毒仍以李樹近根磨水塗喉外良愈菽園雜記金陵黃泥巷楊馬軍治咽喉拿法以中指蘸藥少許於喉中用力一捻腫處出血並痰涎隨即能下湯水絶妙即前用針刺之意藥恐僞也治法匯陸養愚曰郁仲開室人壬子年忽患咽喉阻塞湯水不入六脈平和身無寒熱但氣逆喘滿晝夜不眠雄按此瘀血阻隔之證其人必多鬱怒脈反平和者氣機窒滯而流行自緩也苟不吐出即為關格亦有阻於咽而飲水即嗆者豫與諸君俱作痰治藥到即吐強咽一口面色紫脹氣窒睛突躁亂靡寧狀如發狂嘔盡藥汁則略可投牛黃亦不納疑受暑與新汲水亦如之又與淡薑湯蘇合丸重捺內關俱無一效經七八日或云脈不病而症如是乃關格也今藥不下咽雖靈丹亦無如之何矣兩日後驀然鼻聞蝦香遂作湯與之甫吞半盞嘔出紫血數塊胸膈頓寬即飲米飲漸進稀粥守之數日不藥而愈可謂奇症書之以俟教薛立齊治一婦人産後喉痛服清熱等劑益甚此膀胱經血虛也蓋膀胱之脈上行至喉而還用八珍湯加丹皮柴胡酒炒黑黃柏二劑而愈孫真人曰咽中帖帖如有炙肉吐之不出吞之不下噙生薑片五十日愈以意逆之當是寒傷經絡氣血不和浮於咽中婦人血分受寒多積冷氣故有此症豫用破棺丹噙化頻咽之曾治數人多效蓋喉者候也喉出天氣咽者咽也咽出地氣故喉為呼吸之咽乃穀食之路其或憂思內結風冷外侵痰氣隔塞逆於喉嚨妨礙飲食久而成翻胃噎膈症者有之矣葉杏林女科樓全善曰洪武戊辰春鄉村病喉痹者甚衆蓋前年終之氣二火之邪也豫纍用甘桔湯加黃連半夏殭蠶牛蒡等劑發之挾虛者加參耆歸芍輩水漿不入者先用解毒雄黃丸醋磨化灌之喉痰出更用薑汁灌之卻用上項藥無不神效若用膽礬等酸寒點過者皆不治蓋邪郁不出故也陳自明治一男子喉痹水漿難下又一男子纏喉風痰涎湧盛與神仙追毒一粒並痊方見蟲門薛立齊治一男子咽痛而脈數以荊防敗毒散加芩連二劑少愈乃去芩連二劑而愈一男子咽喉腫閉牙關緊急針不能入先刺少商二穴出黑血口即開更針患處飲清咽利膈散一劑而愈大抵吐痰針刺皆有發散之意故效此症不用針刺多致不救一婦人咽喉腫痛大小便祕以防風通聖散一劑諸症悉退又荊防敗毒服三劑而安此症輕則荊防敗毒吹喉散重則金鑰匙及刺患處出血最效否則不救針少商二穴亦可不若刺患處之神速耳一男子咽喉腫痛脈數而實以涼膈散一劑而痛止以荊防敗毒散加牛蒡子二劑而腫退以荊防敗毒散又以甘桔荊防元參牛蒡四劑而平一男子咽喉腫閉痰涎湧甚以膽礬吹咽中吐痰碗許更以清咽利膈飲四劑而安一男子咽喉腫痛藥不能下針患處出紫血少愈以破棺丹噙之更以清咽清毒散服之而愈一男子咽喉乾燥而痛以四物湯加知柏元參四劑少愈更以人參固本丸一劑不再服一男子咽痛午後益甚脈數無力以四物加知柏荊防四劑而愈仍以前藥去荊防加元參甘桔數劑全安一弱人咽痛服涼藥或遇勞愈甚此中氣虛熱以補中益氣湯加芩連四劑而愈乃去芩連又數劑不再發常治午後痛去芩連加知母黃柏元參亦效一男子乳蛾腫痛脈浮數尚未成膿針去惡血飲荊防敗毒散二劑而消一男子乳蛾腫痛飲食不入瘡色白其膿已成針之膿出而安一男子嗌癰腫痛脈浮數更沉實飲防風通聖散一劑瀉一次勢頓退又荊防敗毒散二劑而消一男子咽喉腫痛欲針之以泄其毒畏針止服藥然藥既熟已不能下矣始急針患處出毒血更以清咽消毒藥而愈一患者其氣已絶心頭尚溫急針患處出黑血即蘇如鮑符卿喬侍衛素有此症每患皆以出血即愈大抵皆因火為患其害甚速須分緩急及膿成否若腫閉及壅塞者死在反掌之間宜用金鑰匙吹患處吐出痰涎氣得通即蘇若吐後仍閉乃是惡血或膿毒為患須即針患否則不救前人云治喉閉之火與救火同不容少待又云走馬看喉閉信夫治喉之方固多惟用針有回生之功一男子咽喉作痛痰涎上壅欲治以荊防敗毒加連翹山梔元參牛蒡彼自服甘寒降火之藥反加發熱咽愈腫痛急刺少商二穴仍以前藥加麻黃汗之諸症並退惟咽間一紫處仍痛此欲作膿以前藥去麻黃一劑膿潰而愈凡喉痛之疾治之早或勢輕者宜用荊防敗毒散以散之遲或勢重者須刺少商穴瘀血已結必刺患處亦有刺少商者咽雖利而未全消者必成膿也然去即安若有大便祕結雖輕針刺去血必當以防風通聖散攻之甘寒之劑非虛不宜用一癧婦咽間如一核所鯁咽吐不出倦怠發熱先以四七湯治之而咽利更以逍遙散又一婦所患同前兼胸膈不利肚腹膨脹飲食少思睡臥不安用分心氣飲並愈秋官葉素陰虛因怒忽喉腫寒熱頭痛項強目直小便自出此皆肝火之症肝主筋膜火主腫脹火旺則血涸筋攣則緊急頸項如拔陰挺痿痹則小便自遺遂刺患處出毒血用四物柴胡山梔元參甘草而蘇再用六味丸料以生肝血滋腎水諸症悉愈太守葉咽喉腫痛痰涎不利手足發熱喜冷飲食用清咽利膈湯二劑不應刺少商穴喉少寬痰從鼻出如膠患處出紫血稍寬五七日咳出穢膿而愈義士顧克明咽喉作痛至夜發熱此肝腎陰虛之熱用四物加酒炒黑黃柏知母麥冬五味治之而愈後因勞咽喉腫閉刺患處出血用桔梗湯吐痰而消至仲夏乾咳聲嘶作渴發熱日晡作熱用滋腎丸加減八味丸間服三月餘喜其年富謹疾得愈通府李朝用咽喉腫口舌生瘡此上焦風熱先用荊防敗毒散二劑喉痛漸愈又以元參升麻湯口舌遂愈地官黃北盤喉痛作悶飲冷大便不通此上下表裡實熱用防風通聖散治之頓愈地官胡誠甫咽喉作痛此腎經膀胱虛熱四物加知柏元參四劑少愈更以人參固本丸一劑不復發職方盧抑齊咽喉腫痛兩目矇眛小便赤色此膀胱濕熱用四苓散加知柏黃連茵陳防己治之頓愈又用六味地黃丸而痊儒者王文遠咽喉腫痛口舌生瘡勞則愈盛此脾肺氣虛膀胱有熱以補中益氣加元參酒炒知柏稍愈乃去知柏加山藥山萸乃痊一儒者腳發熱則咽喉作痛內熱口乾痰涎上湧此腎經虧損火不歸經用補中益氣加麥冬五味及加減八味丸而全愈一老人咽喉痛小便數而赤日晡尤甚此膀胱陰虛當滋化源以補中益氣加酒炒黑知柏四劑咽痛稍可乃去知柏加山萸山藥麥冬五味頓愈一男子素善飲咽喉作痛內熱作渴小便不利飲食如常此膀胱積熱用四苓散加茵陳大黃四劑諸症漸退又用清心蓮子飲而安一星士勞而入房喉痛漸閉痰涎上湧四肢乍熱此陰虛陽氣飛揚用補中益氣加附子煎灌而愈憲副姜時川癸卯冬就診右寸浮數有力口中有瘡曰此火傳於肺也當薄滋味慎起居甲辰秋復就診尺脈數而無力曰此肺金不能生腎水宜靜養以滋化源彼云今耳內及喉間不時燥痛肢體不時發熱若無根之火殞無疑矣謂劉古峽云立齊謂我之病可疑至乙巳孟春古峽謂薛曰姜公之病已如尊料遂同往視喉果腫潰脈愈洪大或用瀉火之藥反速其歿云間吳上舍年逾五十咽喉腫痛或針出血神思雖清尺脈洪數而無倫次按之微細如無曰有形而痛陽之類也當峻補其陰今反傷陰血必死已而果歿蓋此症乃腎氣虧損無根之火為上患惟加減八味丸料煎服使火歸源庶幾可救馬元儀治任採之咽痛三年不愈診其脈虛中兼澀此因勞郁傷中氣偏虛者火偏盛也火性上炎必傷及肺肺既不受脾中生生之氣反為壯火所熏灼其津液虧損不能下灌靈根可知則下焦陰火不能蟄藏並可知矣壯火虛火兩合為虐故延久不愈治法當先解鬱熱於上次納浮火於下病雖久可愈矣用紫菀乾葛杏仁蘇子前胡桔梗甘草兩劑而脈已透再用人參石斛炙草半夏曲橘紅黃連肉桂等四劑而咽痛頓除再以人參七味丸治之全愈沈氏婦體豐而多勞郁時覺喉癢如蟲行皮中經五六載不愈兩脈浮虛而沉澀此陽明氣血不榮火動生風之候也陽明之脈起於鼻交頞中下循鼻外挾口環唇循頰車上耳前其支者從大迎前下人迎循喉嚨入缺盆今者血虛風熾是諸脈不為血養而為風所淫矣風勝則干風行則動然治法不當治風而當治血蓋血足而風自息也用生地黃制首烏天冬為君以滋陽明之血秦艽白蒺藜甘菊為臣以清陽明之風佐以盧根汁蔗漿甘寒氣味以滋燥養陰調理二月而愈周子固治趙鶴皇妻病咽乾水漿不能下衆醫盡愕周叩以平生所最嗜獨鸂鶒即命烹飪進之授以七箸入口無所苦已而食進病如失丸靈山房集李襲興稱武德中出鎮潞州許人甄權以新撰明堂示豫時有刺史成君綽忽腮頷腫大如升喉中閉塞水粒不下三日矣豫屈權救之針其右手次指之端如食頃氣息即通明日飲啖如故千金翼按銅人云少商穴在手大指端內側去爪甲角如韭葉今成君綽腮頷腫大如升甄權針之立愈病狀少異功效實同李云刺指端銅人云大指端未知孰是果針少商當在大指端也姑兩存之以俟識者資生經鄭惟康主簿嘗苦喉閉雖水亦不能下咽灸三里穴而愈醫說續編吳內翰備急方云余常苦咽喉腫痛用白殭蠶直者不拘多少炒為末以生薑自然汁調服一錢匕甚效葛彥恢提舉閩中曾患喉痹五八主簿用此方治之即安一方調下二錢未通半時許再服立通吐出頑痰別將大黃一塊慢火炮熱打撲盡灰如一米厚切片以兩指大一片口含汁咽之一食頃再換一片或患人語不得及自咽不下即扶起靠斜仰坐令人呷藥在口以筆管注入鼻中男左女右藥訖隨即扶令正坐須臾吐痰涎不即扶起恐自鼻中出也吐了含咽大黃如前百乙方治急喉閉口開不得者有以黃蠟紙裹巴豆一個如患人鼻孔大小中切破急以塞鼻氣衝入喉中自破已覺通利即除去濠守王亞夫方巴豆去殼拍碎以棉裹隨左右納鼻中即吐出惡物後鼻中生小瘡亦無害同上治喉痛至危困以手用力拔頂心發亦通無發者撮頂心皮劉大夫得此方未試忽一卒苦喉痛不能言亟去其巾乃患酒禿即以意令人用力撮頂心皮遂安是齊方繆仲淳治纏喉風即喉痹也試通有驗方明礬三錢巴豆去殼七粒溶礬入巴豆燒至礬枯去巴豆研細吹入喉中流出熱涎即開廣筆記馬銘鞠治倪仲昭患喉癬邑中治喉者遍矣漸漸腐去飲食用粉面之爛者必仰口而咽每泣數行下馬曰此非風火之毒也若少年曾患黴瘡乎曰未也父母曾患黴瘡乎曰然愈三年而得我乃謂此必誤服升藥之故凡患此瘡者中寒涼輕粉之毒毒發於將瘳升藥之毒毒發於愈後所生子女毒深者且延及於孫若甥倘不以治結毒之法治之必死以甘桔湯為君少入山豆根龍膽草射干每劑用土茯苓半斤濃煎送下牛黃二分半月而痊竟不用吹藥既而云父母病時果服丸藥而痊後曾口碎非升藥而何今醫家恬然用之不曉其中毒之深故特明其說廣筆記薛立齊治杜舉人喉咽腫痛口舌生瘡先以清咽消毒散二服更以元參升麻湯而愈一男子年三十餘口舌常破如無皮狀咽喉作痛服清咽利膈散愈以理中湯用之而愈一婦人肥甚暑熱咽喉痛腫甚痰涎上壅語聲不出甚危用針刺毒血次以金鎖鑰吐去稠痰五六碗以清咽利膈湯一服腫痛少減去硝黃又服而安外科正宗蕭萬輿治王氏婦喜啖辛辣季夏病胃咽痛脈洪滑微數以甘桔湯加芩連栝蔞元參兩劑即痊都閫連擎天之內季秋患肺經風熱咽痛脈浮洪有力以金沸草湯加牛蒡倍甘草一劑而痊庠友鄭能仁孟冬患風痰上壅咽痛初治數劑增劇察其六脈浮弦無力以補中益氣湯加膽星肉桂兩劑而愈痰壅如失王氏少婦季春患肝經鬱火上升咽痛治不瘥以逍遙散加牛蒡桔梗黃芩香附二劑而痊王洪緒治一壯年新婚百日妻歸寧匝月方回值酷暑房後多扇取涼五鼓時喉痛氣逆寒熱交作問之則曰日前喉間略有微痛今則脹痛腫盛視其小舌腫如胖人母指知為心腎虛火並欲後經風風火兩閉之候若用發表虛上加虛若投寒涼風火被遏乃以前胡蘇子連翹元參赤芍浙貝甘桔煎服立愈同上無錫村氏婦年可三旬五月望日下午腹飢正取麵食舉筋忽喉痛難咽一醫以射干赤芍翹芩花粉牛蒡煎服即痰湧聲鼾詢知驟起因服涼藥增劇此陰寒無疑也但痰塞滿口難以進藥即取鵝翎蘸桐油釐許入喉一卷隨出痰升許以肉桂炮薑生甘草各五分入碗內以滾水沖浸仍頓湯中以匙抄咽一口病者即云好了連呷三四口即起說飢問飯可吃否曰食粥最宜同上蔣仲芳治一友始而牙痛既而咽腫醫投涼藥痛轉甚診其脈沉細大便一日二三次曰浮火上升也其足必冷察之果然以金匱腎氣料作湯與之服完即睡覺來病如失劉云密治一女子年五旬素因血虛生熱血化風患遍身疙瘩經年未痊久之少陽相火併於陽明而患喉痹其勢暴盛喉中陡似瘙癢作嗽氣上而嗆血泡纍纍上齶一泡大如雞卵口塞不能合氣壅上更急少頃泡盡破血射如注其口皮盡脫喉皆潰爛紅腫異常痛不可忍且滿口痰涎如羹如糊蓋熱壅於上而大傷寒氣也用養陰退陽活血祛風兼以止痛之劑緣湯難吞為末或吹或點諸症漸退然潰處肌未生痛未止因皮破致時時作嗽而血隨出乃於吹口藥中入白芨磨漿合丸如芡實日夜噙化遂愈葉天士治楊某之病陰氣走泄為虛穢濁上受則實咽喉腫痹上竅蒙閉日暮昏煩陰傷火熾肌膚柔白氣分不足醫治雖宜涼解清上但不可犯及中下連翹鬱金馬勃牛蒡竹葉心黑山梔杏仁橘紅艾某上焦之病都是氣分氣窒則上下不通而中宮遂脹熱氣蒸灼喉舌疳蝕清氣之中必佐解毒銀花二錢川貝三錢馬兜鈴五分連翹心一錢半川通草一錢白金汁一杯活水蘆根汁半杯王某咽喉痛痹發時如有物阻隔甚至痛連心下每晚加劇是陰液日枯肝臟厥陽化火風上灼法以柔劑用甘以緩其急耳細生地天冬阿膠生雞子黃元參心糯稻根鬚徐靈胎曰此症喉中必有細瘰生成不但氣分窒痹也非糝藥無功又曰凡病屬於經絡臟腑者皆煎丸之所能治一屬形體及九竅則屬有形之病實有邪氣凝結之處藥入胃中不過氣到耳安能去凝結之邪故煎丸之功不過居其半耳若欲速效必用外治之法可以應手而愈博考方書廣求祕法自能得之外治之法上古所鮮聞因其用針灸之術通神入妙何必外治此則外治之最者也後世針法不傳於是乎以藥代針而多外治之法若針灸既廢而外治之法亦不講則天下之病即使用藥的當只能愈其半耳其外症之必須外治者竟無愈理此亦醫道之一大關也後之學者須知之裴兆期治一人咽喉痛不能飲食時作時止者半歲吹喉消痰降火藥咸罔效裴診之兩寸洪大而虛尺部虛而無力兩足喜暖畏寒口喜冷飲甫下咽旋越去此下真寒上假熱也治當從其性而伏之用八味丸料加炒黑乾薑水煎入青鹽少許為嚮導冷而與之三劑而愈錫類散治爛喉疹象牙屑焙廉珠各三分飛青黛六分梅花冰片三釐壁錢二十個勿用木板上者西牛黃人手指甲男病用女女病用男各五釐共研極細末吹患處兼治乳蛾牙疳舌腐等症萊蔔菜於初冬攤瓦屋上或掛樹上任其風吹日曬雨洗霜凌直至立春前一日收下懸掛檐下有風無日處久久愈佳一切喉症煎濃湯服立愈兼治痢疾廣筆記治火上升有痰留滯喉間如有核且法宜降氣清火用蘇子研二錢橘紅三錢貝母三錢天花粉三錢茯苓三錢麥冬五錢白芍酒炒三錢黑連翹一錢五分黃柏蜜炙一錢五分五味子一錢打碎水煎加竹瀝服之喑盛用敬診道士顧本初病失音醫以厥陰傷寒治之盛至曰內傷外感無可為者某日當汗某日死既而果然人問其故曰肺屬金主聲肺散則失音且面黧黑腎氣竭也某日屬火火乘金位真陽既奪不死何待吳江縣志孫文垣治徐檢庵以正月內食新蒜炒肉又冒風寒因咳嗽喉痛聲啞此原有痰火又為外邪所束不得發越所至當潤肺化痰調氣以祛其本兼散邪解表以治其標庶痛可除而聲可復矣先與栝蔞仁橘紅桔梗甘草薄荷桑皮地骨皮葛根前胡四帖復以滾痰丸同七制化痰丸兩帖夜服諸症除而聲音亮矣此釜底抽薪法也張路玉治一西客觸寒來蘇忽然喘逆聲喑咽喉腫痛察其形體豐盛飲啖如常切其脈象浮軟按之益徑此必寒包熱邪傷犯肺絡也遂以麻杏甘石湯加半夏細辛加大劑葳蕤二服喘止聲出但呼吸尚有微喑更與二陳加枳桔葳蕤二服調理而安王惟一數年前雖有血症而年壯力強四月間忽患咳嗽服發散藥後痰中見血數口繼服滋陰藥過多遂聲颯而啞時覺胸中氣塞遷延月餘診之脈雖沉澀按之有力舉之應指且體肥色潤絶非陰虛之候蓋此之聲啞是金實不鳴非金破不鳴之比因與導痰湯加人中黃澤瀉專一滌痰為務四劑後痰中見紫血數塊其聲漸出而颯未除更以秋石兼人中黃棗肉丸服經月而聲音清朗始終未嘗用清理肺氣調養榮血也張飛疇治郭代工午日少食角黍倦怠作瀉曾用清克不效因圊跌僕即昏迷不省數日後邀診之六脈虛微欲脫右臂不能轉動聲喑無聞時有用大黃之劑者急止之曰此脾肺虛憊安能任此惟粥飲參湯庶為合宜所謂漿粥入則虛者活依言調之瀉止神寧聲音漸出而蘇能食後亦惟用獨參湯調理不藥而愈殳圭字廷肅治一婦人娠八月臥不語衆醫斂手圭曰此內經所謂胎喑也十月當不藥而愈嘉善縣志萬曆時京口名醫何繼充世業也方成童猶在家孰適鎮江道有幼子忽噤口不能言召其父診視值父遠出召者不及待令繼充往遂診曰公子無病勿藥也但多令婦人以氣呵入口中耳遂更迭呵之半晌後果能言人問故曰頃衙內多婦人而公子貌甚美秀婦人愛其美也提抱之時必多吸其口令少陽之氣乍奪第令呵以還之耳其匪夷所思類若此張氏卮言陸肖愚治範麓令郎厚味奉養而酒量極高性尤偏嗜沉鴆多怒初患吐血服犀角地黃等湯月餘不愈更增溺血咳嗽一日忽聲啞然肌肉如故飲食不減群作瘵治無一效脈之左關洪大而弦右關滑大而數乃有餘之火症非不足之瘵症也因厚味生痰醇酒助火火炎痰湧瘀於胸中所以聲啞其血之上行者怒則傷肝肝脈挾舌本而絡陰器龍雷之火一動血隨之而上逆下泄矣法宜清熱降氣化痰導血歸原十日可愈若認為瘵而以地黃二冬投之則左矣用真霞天曲山楂理胃家濕痰為君杏仁橘紅利肺竅桃仁鬱金行肝滯為臣山梔生甘草清上焦為佐滑石車前清下焦為使又用茅根煎湯煎藥數劑而血止聲清不十日諸症如失薛立齊治一膏粱之人素不慎起居忽失音不語神思昏憒痰涎上湧此腎經虛寒氣厥不能上接清陽之氣故也須用地黃飲子否則後必齧舌經曰少陰氣至則齧舌少陽氣至則齧頰不信仍用風藥後果齧舌急用前湯而安雄按今冬蔣敬堂室患頭偏左痛筋掣泛愆數日後不言不食不便小便間日一行唇焦舌黑醫投牛黃丸紫雪丹犀角竹瀝等藥漸不識人乃兄周雨禾延余視之面色青黃舌色黑膩脈來遲軟豫地黃飲子五劑而一語出識人八劑而更衣十餘劑而起矣其人春夏兩次墮胎秋間又病憂勞蓋榮陰大虛而內風陡動也一婦人忽然不語半年矣諸藥不應兩尺浮數先用六味丸料加肉桂數劑稍愈乃以地黃飲子三十餘劑而痊男子多此症亦用此方治之一婦人因怒仆地痰湧不語灌牛黃清心丸稍蘇用神仙解語丹加山梔柴胡桔梗漸愈又用六君加枳殼而痊神仙解語丹白附子石菖蒲遠志天麻全蠍羌活南星木香惟木香半兩余皆一兩辰砂為衣貴溪湖山夏公明道二郡行縣訪虞文靖公伯生於山中道臨川章伯明之醫云其子嘗忽不能言而無他苦群醫環視莫究其端難於用藥伯明視之曰此熱症也徐解之自愈又其僕人得寒熱一醫以常用之藥伯明視之曰此熱極也治之莫及矣舁還其家僕起拜辭登輿而去行未至家果及夕而斃歸日稿魏玉橫曰嚴鐵橋天姿英邁人也豪於詩酒自前夏忽患失音咳嗽時作守不藥之戒至八月初余偶過齊頭談次有小青衣持藥甌至余曰君謂不藥今乃藥乎第醫作何治所用何藥出方驗之乃前胡桔梗杏仁蘇子等傷風劑也曰君病豈宜服此世安有傷風百日者乎肝腎久病相火刑金惟集靈左歸六味為對症耳幸勿誤再就二人診則皆勸服六味後服至三四十劑忽發肛痔痔發而音復蓋肺臟之病傳大腸腑也是為佳兆惟痔痛盛劇宛轉床第月餘亦以服藥太遲且六味不宜依古方也病愈數年豪飲如故後登賢書明年遠館於閩患瘧疾既數月始得歸已成損症遂不起自失音至是凡十年年三十七惜哉宋輝章翁年六十餘素有豪飲咳嗽失音醫作傷風治轉劇余與生熟地麥冬沙參栝蔞仁杞子服二十餘劑亦發肛痔而咳嗽失音皆愈後數年以事入都于山左遇大水上至腹行水中數里初病愈其痔遇勞則發否亦時有膿水至是痔忽頓愈而咳嗽失音復作抵都治療不瘳歸而延診其脈弦澀而數語之曰初病以發痔而愈臟傳腑也為順今痔愈而病發則腑傳臟矣為逆逾數月而終徐靈胎曰久嗽失音必由藥誤麥冬五味此失音之靈丹也服之久無不失音者若至全失即使其人力如虎而走如馬半年之後無有不死若風寒痰火偶爾失音者即不治亦愈但更加以麥冬五味則弄假成真矣心胃痛喻嘉言治陸子堅從來無病因外感之餘益以飢飽內傷遂至胸膈不快胃中隱隱作痛有時得食則已有時得食轉加大便甚艱小水不暢右關之脈乍弦乍遲不得調適有似痼疾用藥得當驅之無難若歲久日增必為大患人身胃中之脈從頭而走於足者也胃中之氣一從小腸而達於膀胱一從小腸而達於大腸者也夫下行之氣濁氣也以失調之故而令濁氣亂於胸中干其清道因是窒塞不舒其始本於病時胃中津液為邪火所爍至今津液未充火勢內蘊易於上燎所以得食以壓其火則安然邪火熾則正氣消若食飲稍過則氣不能運轉其食而痛亦增是火不除則氣不復氣不復則胃中清濁混亂不肯下行而痛終不免也論症洞如觀火病屬胃之下脘而所以然之故全在胃之中脘蓋中者上下四旁之樞機中脘之氣旺盛有餘必驅下脘之氣入於大小腸從前後二陰而出惟其不足所以反受下脘之濁氣而橈括也夫至人之息以踵呼之於根吸之於蒂者也以濁氣上干之故吸入之氣艱于歸根且以痛之故而令周身之氣凝滯不行亦非細故也為訂降火生津下氣止痛一方以為常用之藥尚有進者在先收攝腎氣不使外出然後濁氣之源清而膀胱得吸引上中二焦之氣以下行想明哲之所務矣喻君實有發前人所未發之本領獨缺於峻養肝腎一著然此案末行已駸駸乎得之矣張子和治一將軍病心痛不可忍張曰此非心痛也乃胃脘當心痛也二語為此症點睛然豫更有一轉語曰非胃脘痛也乃肝木上乘於胃也內經曰歲木太過風氣流行民病胃脘當心而痛風木為病非肝而何乃與神祐丸一百餘粒病不減或問曰此胃脘有寒也宜溫補將軍數知張明瞭復求藥乃復與神祐丸二百餘粒作一服大下六七行立愈矣治法則非今人所宜一婦病數年不愈一醫用人言半分茶末一分白湯調下吐瘀血一塊而愈李樓奇方若非神手未許輕用王執中久患心脾疼服醒脾藥反脹用蓬莪麵裹煨熟研末以水與酒煎服立愈蓋此藥能破氣中之血也本草綱目王執中資生經一婦人年三十病心氣痛用小紅花為末熱酒服二錢立效又法男用酒水各半煎女用醋水各半煎摘元方本本草綱目李時珍治荊穆王妃胡氏因食蕎麥麵著怒病胃脘當心痛不可忍醫用吐下行氣化滯諸藥皆入口即吐不能奏功大便三日不通因思雷公炮炙論云心痛欲死速覓延胡乃以延胡索末三錢溫酒調下即納飲食少頃大便行三五次積滯俱下胃脘心痛豁然遂止友人言於武昌見一老僧患胃脘痛痛發瀕死其徒亦患之師死遺命必剖視吾心務去其疾果於心間得細骨一條長七八寸形如簪其徒以插瓶中供師前已數年矣有貴客來寓庵中偶殺鵝喉未斷其童取瓶中骨挑鵝喉凡染鵝血處即化矣徒因悟此理飲鵝血數日胃疾竟除薛立齊治一婦人久患心痛飲食少思諸藥到口即吐薛以為脾土虛弱用白朮一味同黃土炒去土每服一兩以米泔煎濃徐服少許數日後自能大飲用三斤余而安雄按脾弱何至作痛此蓋停飲為患也蔡按停飲之說誠然此與許學士神術丸意同但飲之微者可用若飲已盛則反益其痛以術能閉氣也黃錦芳論之甚詳宜參觀之上舍陳履學長子室素怯弱産後患疔瘡年餘不愈因執喪旬月每欲眩僕一日感氣忽患心脾高腫作疼手不可按而嘔吐不止六脈微細或見其形實誤諸痛不可補氣乃用青皮木香五味吳茱萸等藥愈甚繼復患瘧且墮胎又投理氣行血之藥病雖去元氣轉脫病家無識舉世皆然再投參耆補劑不應矣六脈如絲欲絶迎薛至診之曰形雖實而虛極反用理氣之劑損其真氣故也連投參耆歸芍朮附薑桂二劑間用八味丸五日寢食漸甘六脈全復此症若心脾疼痛時即服此等藥瘧亦不作矣龔子才治一人心胃刺痛手足稍冷出汗指甲青百藥不效以當歸二錢煎湯用水磨沉香木香烏藥枳殼調服乃止一教諭年五十一因酒食過飽胃脘作痛每食後其氣自兩肩下及胸次至胃口痛不可忍令人將手重按痛處移時忽響動一聲痛遂止如是八年肌瘦如柴診之六脈微數氣口稍大有力以神祐丸一服下之其痛如失後以參苓白朮散調理復元程沙隨在泰興時有一乳娘因食冷肉心脾脹痛不忍錢受之以陳茱萸五六十丸水一盞煎取汁去渣入官局平胃散三錢再煎熱服一服痛止再服無他云高宗嘗以此賜近臣愈疾甚多真奇方也槎庵小乘孫文垣治張二尹近川始以內傷外感服發散消導多劑致胃脘當心而痛診之六脈皆弦而弱法當補而斂之白芍五錢炙甘草三錢桂枝一錢五分香附一錢大棗三枚飴糖一合小建中加香附煎服一劑而瘳族弟應章胃脘當心而痛手不可近疑有瘀血使然延胡索五靈脂丹皮滑石川芎當歸甘草桃仁桔梗香附臨服加韭菜汁一小酒杯其夜痛止則睡飲食亦進惟大便下墜逼迫不安此瘀血已動欲下行也前劑去韭汁一帖全安吳鶴洲如夫人病胃脘痛醫者認為蟲者認為火者又有認為痰為氣為食為虛為寒者百治不效孫診之兩手大而無力皆六至曰肝脾相勝之症耳胃脘何以云脾以白芍為君惡熱而痛加黃柏此法則萬全矣白芍四錢一半生一半炒伐肝補脾為君甘草二錢一半炙一半生緩肝養脾為臣山楂為佐黑山梔五靈脂各一錢止痛為使三帖而愈吳仰元患胃脘痛則徹於背以手重按之少止痛時冷汗如雨脈澀孫曰此氣虛而痛也脈澀乃血虛此獨言氣虛以小建中湯加御米殼而愈仍是肝病李士材治宋敬夫心腹大痛傴僂不能抑自服行氣和血藥罔效其脈左滑而急其氣不能以息偶一咳攢眉欲絶為疝無疑以生薑飲粥用小茴香川楝子青木香吳茱萸木通延胡索歸身青皮一服而痛減五日而安醫通李長蘅吳門舟次忽發胃脘痛用順氣化食之藥勿效李診之曰脈沉而遲客寒犯胃也以參蘇飲加草豆蔻三錢煎熟加生薑自然汁半碗一服而減兩服而痊一人將應試八月初五心口痛甚致不能飲食李診之寸口澀而軟與大劑歸脾湯加人參三錢官桂一錢彼云痛而驟補實所不敢得毋與場期礙乎李曰第能信而服之可以無礙若投破氣之藥其礙也必矣遂服之不逾時而痛減更進一劑連飲獨參湯場事獲竣高鼓峰治一婦人胃痛勺水不入寒熱往來或從火治用芩連梔柏或從寒治用薑桂茱萸輾轉月餘形體羸瘦六脈弦數幾於斃矣高曰此肝痛也非胃脘也其病起於鬱結生火陰血受傷肝腎枯乾燥迫成痛色欲之人尤多此病醫復投以苦寒辛熱之劑胃脘重傷其能瘳乎急以滋腎生肝飲與之一晝夜盡三大劑五鼓熟寐次日痛定再用加味歸脾湯加麥冬五味十餘劑而愈按此病外間多用四磨五香六郁逍遙新病亦效久服則殺人矣又用肉桂亦效以木得桂而枯也屢發屢服則肝血燥竭少壯者多成勞衰弱者多發厥而死不可不知呂東莊治吳維師內患胃脘痛叫號幾絶體中忽熱忽寒止覺有氣逆左脅而上嘔吐酸水飲食俱出或疑停滯或疑感邪或疑寒凝或疑痰積脈之弦數重按則濡蓋火鬱肝血燥耳與以當歸白芍地黃柴胡棗仁山藥山萸丹皮山梔茯苓澤瀉頓安惟胃口猶覺稍劣用加味歸脾及滋肝補腎丸而愈高呂二案持論略同而俱用滋水生肝飲子早年亦嘗用此卻不甚應乃自創一方名一貫煎用北沙參麥冬地黃當歸杞子川楝六味出入加減投之應如桴鼓口苦燥者加酒連尤捷可統治脅痛吞酸吐酸疝瘕一切肝病薛立齊治一婦人心腹作痛久而不愈此肝火傷脾氣也用炒山梔一兩生薑五片煎服而痛止更以二陳加山梔桔梗乃不發孫文垣治周蘆汀乃眷患胃脘痛嘔吐不食者四月晝夜號呼不絶脈則兩手俱滑數故作實治曰當以清熱為先乃先與末子藥二錢令服之不一飯頃痛止而睡家人色喜曰未也此火暫息也其中痰積甚固不乘時下之勢必再作因與總管丸三錢服下腹中微痛再服二錢又睡至天明乃寤腹痛亦止大便下痰積甚多次日以二陳湯加枳實薑黃香附山梔黃連與之服後胃痛全止惟小腹略脹蓋痰積未盡也再與總管丸三錢天明又行一次痰之下如前胃脘之痛遂不發薛立齊治陳湖陸小材母久患心腹疼痛每作必胸滿嘔吐手足俱冷面赤唇麻咽乾舌燥寒熱不時月餘竟夕不安其脈洪大衆以痰火治之屢止屢作逮乙巳春發煩而甚仍用前藥反劇此寒涼損真之故內真寒而外假熱也且脈息洪弦而有怪狀乃脾氣虧損肝木乘之而然當溫補胃氣遂用補中益氣湯加半夏茯苓吳茱萸木香一服熟寐徹曉洪脈頓斂怪脈頓除諸症釋然陸養愚治陸前川素患腸風便燥冬天喜食盆柿致胃脘當心而痛醫以溫中下氣藥療其心痛痛未減而腸紅如注以寒涼潤燥之劑療其血便未通而心痛如刺脈之上部沉弱而遲下部洪滑而數此胃中冷而腸中熱也大腸屬金原喜清而惡熱喜潤而惡燥況素有腸風燥急之症因心痛而投以辛溫香燥之劑能不劇乎脾胃原喜溫而惡寒濕潤之品能不甚乎今大便不行已數日矣乃用潤字丸三錢以沉香三分衣其外濃煎薑湯送下二錢半日許又送一錢至夜半大便行極堅而不甚痛血減平日十六七少頃又便一次微痛而血亦少清晨又便溏一次微見血而竟不痛矣惟心痛未舒與臟連丸亦用沉香為衣薑湯送下以清下焦之熱而潤其燥又以附子理中料為散飴糖拌吞之使戀膈而不速下不終劑而兩症並痊矣王肯堂治韓敬堂患胸膈痛脈洪大而澀用山梔赤芍通草麥芽香附歸芎煎加薑汁竹瀝韭汁童便之類飲之而止一日勞倦忍飢痛大發亟邀王至入房問曰晨起痛甚不能待公服家兄藥下咽如刀割其痛不可忍此何意也曰得非二陳平胃紫蘇之屬乎曰然曰是則何怪乎其增病也夫勞餓而發飽逸而止如其虛也飲以十全大補湯一劑而胸痛止張三錫治一婦苦胃脘痛每發輒大吐多方不應以鹽湯探吐出積痰碗許痛良已後常作惡心知胃中有痰也以橘半枳實加木香川芎白螺殼南星海粉神麯糊為丸白湯下錢半未及一半病去如脫一老嫗急胃痛已六日諸辛燥藥歷試無驗診得左關弦急而右寸更甚其痛一來即不可當少選方定口乾面時赤知肝氣有餘而成火也乃以越鞠加吳茱萸炒黃連薑汁炒梔子二劑頓愈一婦胃脘痛凡一月右關寸俱弦而滑乃飲食不節所致投滾痰丸一服下痰及宿食三碗許節食數日調理而愈一嫗胃痛久諸藥不應六脈微小按之痛稍定知中氣虛而火鬱為患也投理中湯一服隨愈一中年人因鬱悒心下作痛一塊不移日漸羸瘦與桃仁承氣湯一服下黑物並痰碗許永不再發一人中脘大痛脈弦而滑右為甚乃食鬱也二陳平胃加山楂草豆蔻木香砂仁一服頓愈一人中脘至小腹痛不可忍已十三日香燥歷試且不得臥臥則痛頂胸上每痛急則脈不見詢之因入房後過食肉食而致遂以為陰症而投薑附因思其飲食自倍中氣損矣況在房室之後宜宿物不能運化又加燥劑太多消耗津液致成燥矢鬱滯不通所以不得臥而痛也古云胃不和則臥不安遂以枳實導滯丸三錢去黑矢碗許小腹痛減矣又與黃連枳實栝蔞麥芽厚朴山楂萊蔔子二服痛復移於小腹乃更與潤腸丸二服更衣痛除第軟倦不支投補中益氣湯調理半月而愈王叔權曰荊婦舊侍疾纍日不食因得心脾痛發則攻心腹後心痛亦應之至不可忍則與兒女別以藥飲之疼反甚若灸則遍身不勝灸矣不免令兒女各以火針微刺之不拘心腹須臾痛定即欲起矣神哉王叔權舊患心脾痛發則痛不可忍急用瓦片置炭火中燒令通紅取出投米醋中灑出以紙二三重裹之置於痛處稍止冷即再易耆舊所傳也後閲千金一有云凡心腹冷痛熬鹽一升尉或熬蠶砂燒磚石蒸尉取其溫里暖中或蒸土亦大佳始知豫家所用蓋出千金方也他日心疼甚急灸中脘數壯覺小腹兩邊有冷氣自下而上至灸處即散此灸之功也本事方載王思和論心忪非心忪也胃之大絡名曰虛里絡胸膈及兩乳間虛而有痰則動更甚須臾發一陳是其症也審若是又灸虛里矣但不若中脘為要穴云左傳巫臣以夏姬之故怨子反曰余必使汝疲於奔命以死於是子反一歲七奔命遂遇心疾而卒則又因用心而成疾矣平居當養其心使之和平疾自不作其次則當服鎮心丹之類以補養之可也若疾將作而針灸抑亦可以為次矣資生經一婦人患胸中痞急不得喘息按之則痛脈數且澀此胸痹也因與小陷胸湯二劑而愈一人年二十三歲膈有一點相引痛吸氣皮覺急此有汙血也滑石一兩桃仁五錢黃連五錢枳殼一兩甘草炙二錢為末每一錢半以蘿蔔自然汁煎熟飲之一日五六服即愈繆仲淳治高存之夫人患心口痛一日忽大發胸中有一物上升衝心三婦人用力捺之不下叫號欲絶存之曾預求救繆立此方是日急煎服之衝上者立墮下腹中作痛不升矣再服腹中痛亦消二日後以病起洗浴又忽作嘔頭痛如劈存之曰此即前症也煎前藥服之立安白芍酒炒三錢炙草五分吳茱萸湯泡三次八分茯苓二錢延胡索醋煮一錢蘇子炒研一錢五分橘紅鹽水泡一錢二分復加半夏薑汁炒一錢旋覆花一錢木通七分竹茹一錢廣筆記李季虯曰豫婦今春忽患心痛連下腹如有物上下撞痛不可忍急以手重按之痛稍定按者稍松即叫號仲淳曰此必血虛也脈之果然急投以白芍五錢炙草七分橘紅三錢炒鹽五分二劑稍定已又以牛黃蘇合丸疏其滯噯氣數次痛徐解子問故仲淳曰白芍甘草治血虛之聖藥也因久鬱氣逆故減甘草之半仲景甲己化土之論詳矣諸醫不解爾炒鹽者何曰心虛以炒鹽補之即水火既濟之意也豫懼俗師概以食積痰火療心腹之痛故疏其詳如左同上二案均是治肝之法前案兼滌飲此案養肝兼以降逆非純補虛也昔年豫過曲河適王宇泰夫人病心口痛甚日夜不眠手摸之如火豫問用何藥曰以大劑參歸補之稍定今尚未除也琇按心胃痛惟陰維虛損一症可用參歸其餘多是停痰積飲與肝火犯胃之症此案敘症既未詳悉又不云脈象如何殊屬含混曰得無有火或氣乎宇泰曰下陳皮及涼藥少許即脹悶欲死非主人精醫未有不誤者豫又存此公案以告世之不識虛實而輕執方者同上劉云密治一女子值暑月夜間甚涼患心痛從右肋下起至心前岐骨陷處並兩乳下俱痛復連背痛腰及兩膊俱骨縫脹疼惟右肋並心疼獨甚時作惡心且嘔疑夜眠受涼寒邪郁遏氣不流暢所致用散寒行氣藥不效又疑寒滯中有鬱火加散郁之品亦不效服加味煮黃丸乃頓愈薑黃三錢半雄黃三分乳香三分去油淨巴豆霜八分其為細末醋糊為丸如黍米大虛者七丸實者十一丸薑湯送下經云邪氣甚則實此婦體素虛弱而受寒邪甚則為實惟此辛熱之劑可以導之前所用藥雖亦散而不能及病也其用薑黃乳香亦有深意蓋寒傷血故耳此時珍所謂配合得宜則罔不奏功金鈴子散川楝子去核一兩延胡索一兩為末每服三錢溫酒調服水煎服亦可王晉三曰此方一泄氣分之熱一行血分之滯雷公炮炙論曰心痛欲死速覓延胡潔古復以金鈴治熱厥心痛經言諸痛皆屬於心而熱厥屬於肝逆金鈴子非但泄肝功專導去小腸膀胱之熱引心包相火下行延胡和一身上下諸痛方雖小制配合宜卻有應手取愈之功勿以淡而忽之肝胃久痛諸藥不效或腹有癥瘕此方皆驗名梅花丸孕婦慎用緑萼梅蕊三兩滑石七兩丹皮四兩制香附二兩甘松蓬莪朮各五錢茯苓三錢五分人參嫩黃耆砂仁益智各三錢遠志肉二錢五分山藥木香各一錢五分桔梗一錢甘草七分凡十六味共研細末煉白蜜十二兩搗丸如龍眼大白蠟封固每服一丸開水調下此方傳自維揚沈月枝封翁幕於姑蘇時患心腹久痛諸藥罔效得此而愈遂配合施送服者多愈但用藥甚奇其分兩之多寡亦難測識雪羹大荸薺四個海䖳漂去石灰礬性一兩水二鍾煎八分王晉三曰羹食物之味調和也雪喻其淡而無奇有清涼內浸之妙荸薺味甘海䖳味鹹性皆寒而滑利凡肝經熱厥少腹攻衝作痛諸藥不效者用以泄熱止痛捷如影響脅痛竇材治一婦人脾氣虛致積氣留於脅下兩肋常如流水多服草神丹而愈原批脾虛致積當用溫行水流脅下當行溫化王海藏治一婦人先病惡寒手足冷全不發熱脈八至兩脅微痛治者從少陽治之陽在內伏於骨髓陰在外致使發寒治當不從內外從乎中治也宜以小柴胡調之倍加薑棗許學士云沈存中良方頃在建陽醫者王琪言諸氣惟膀胱脅下痛最難治惟神祐丸能治之熙寧中豫病項骨痛諸醫皆作風治之數月不瘥乃流入於背膂又兩臂牽痛甚苦憶琪語有證乃令服之一服而瘥再發又一服立效方用木香胡椒各二錢五分巴豆十枚去皮心膜研乾蠍七枚上四味共為末湯浸蒸餅為丸如麻子大用硃砂為衣每服五丸視諸經痛用引送下心膈痛柿蒂燈心湯下腹痛柿蒂煨薑湯下血痛炒姜醋湯下腎氣脅下痛茴香酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒任下朱丹溪治一婦人脾疼帶脅痛口微干問已多年時尚秋用二陳湯加川芎乾葛青皮木通下蘆薈丸二十粒張宅張郎氣痛起自右脅時作時止脈沉而弦小便時有赤色吞酸喜嘔出食此濕痰在脾肺間而肝氣乘之小柴胡湯去黃芩加川芎白朮木通白芍滑石生薑煎湯下保和丸三十五粒一婦人氣暈兩脅胸背皆痛口乾用青皮半夏各一錢白朮黃芩川芎各三錢木通二錢五分陳皮桔梗各二錢甘草炙半錢上分六帖煎熱服又脅下有食積一條扛起加吳茱萸炒黃連孫文垣治徐三泉子每午發熱直至天明夜熱更甚右脅脹痛咳嗽則疼痛坐臥俱疼醫以瘧治罔效已二十餘日後醫謂虛投以參術痛益增診之左弦大右滑大搏指經云左右者陰陽之道路也據脈肝膽之火為痰所凝必勉強作文過思不決木火之性不得通達鬱而為痛夜甚者肝邪也初治當通調肝氣一劑可瘳誤以為瘧燥動其火補以參術閉塞其氣經云體若燔炭汗出而散今汗不出舌苔已沉香色熱鬱極矣不急救立見凶危以仲景小陷胸湯為主大栝蔞一兩黃連三錢半夏曲二錢前胡青皮各一錢水煎服夜服當歸龍薈丸微下之醫猶爭曰病久食不進精神狼狽若此寧可下乎曰病屬有餘有餘者瀉之已誤於補豈容再誤哉服後夜半痛止熱退兩帖全安虛山內人胸脅脹痛五更嘈雜則痛更甚左寸關脈洪滑孫謂此肝膽有鬱火胃中有膠痰乃有餘之病經云木鬱則達之又云通則不痛與以當歸龍薈丸一錢五分琇按既云木鬱達之卻不用達之之藥而用逆折之法火雖暫泄而木之本性亦傷矣此亦劫劑之類也大便行一次痛隨止惟聲不開卻是何故以陳皮柴胡貝母茯苓甘草白芍酒芩香附杏仁桔梗調之而安學士徐檢老體豐厚善飲致有腸風計下血不下數桶因而委頓己卯冬右脅極疼痛上至耳後夜分尤甚左右不能轉動動則痛甚飲食減面色青汗出如雨濕透衣被故不敢合睫而睡族醫皆投以香附青皮及辛散之劑痛愈甚汗愈多面愈青逆豫診之兩寸短弱左關弦而搏指右關沉滑六脈皆近七至豫曰據病在少陽經必始於怒木火之性上而不下故上衝耳後而皆痛也夜痛甚者蓋夜屬肝氣用事內經云司疏泄者肝也邪在肝膽故合目汗即大出中焦原有濕痰此語凡案必闌入而前後並不照應法當調肝清熱解毒為主毒字鶻突之至兼利小便語亦無因不可遽止汗使邪無出路逆其木火之性不惟痛加且將發腫毒而害非淺矣內經云膏粱之變足生大疔當預防之亦非此症真諦公曰何為斂劑而謂不宜豫曰當歸六黃湯內有地黃當歸耆皆滯痰閉氣之味桔梗亦非所宜經曰下虛者及怒氣上升者皆不可用故當慎也且將發腫以下皆有心穿插因以柴胡黃連為君白芍甘草天花粉為臣以前胡連翹為佐龍膽草為使服後汗雖仍舊痛即減三之一不妨睡矣仍用前藥病又減半第三日又服左右轉動如常飲食亦加豫未至公已先迎姑蘇盛氏盛公幼時窗友也家世授醫公初不急豫日引領期盛到可刈枯鏟朽也盛至診畢遂詰曾用何劑公豫劑示盛盛大叫稱謬謂當隆冬之候汗多如此陽氣大泄何以柴胡為君喉中痰既未清又何不用桔梗當歸六黃湯前賢已試之藥置而不用是舍紀律而務野戰也即以六黃湯加桔梗以進據此孫君真是神仙公雅信盛仍傾心以從速煎服之未逾時而舊病隨作色色加惡四字忮甚左右復不能轉動自戌至子醜若不能支持者語之曰服孫君藥雖未全可亦已去泰甚彼曾言二藥不可用何為輕犯而受此苦宜取孫君藥煎飲飲下即伏枕鼾睡達旦始寤抑或未必命使速豫至而叩豫曰人言隆冬汗出不當用柴胡而公用為君何旨豫曰膽與肝為表裡肝膽之火鬱而不發故痛痛極而汗汗出而痛減者是火從汗出蓋汗乃邪出之門也豫故曰汗不可斂本草云柴胡瀉肝膽火而以黃連佐之內經云木鬱則達火鬱則發言當順其性而利導之勢則易克古人治火之法輕則正治重則從其性而升之者以此蓋醫貴變通如陰虛火動而汗出者內無餘邪故以六黃湯斂而降之常治法也今內有餘邪未出遽斂降之邪無從出勢必成毒故變常而從治者使邪有出路木火之性不逆則毒不成而痛可減也公曰善哉孫君之劑奇正相生不下孫武子兵法何輕以無紀律議之願投而奏凱也豫曰公數日後瘡瘍大發兩塊且有興塊作痛此毒出之徵公於時無恐改用柴胡白芍甘草丹參苦參茯苓瞿麥車前黃柏連翹金銀花三日而痛全減汗全收左右不難轉動矣逾日公謂肌膚癢甚藟藟然似癮疹豈瘡出歟欲以藥治之豫曰可再三日兩胯果然發興塊如棋子大者數枚且痛豫已制蠟礬丸以待至是授服之瘡果遍身大發兩腿為甚一月餘而瘳公始信豫防毒之言不謬披愫交歡且作序識勝何勝云有期與終身不替云是案孫君生平得意筆也然治法非奇行文頗謬盈篇猥語滿紙忮心本不入選顧集中收彼案微悉加節略獨於此仍其原本以見一斑第亦偶然非有心吹索前人之短也劉默生治諸葛子立脅痛連腰脊不能轉側服六味加杜仲續斷不效或者以為不能轉側必因閃挫與推氣散轉劇劉診之曰脈得弦細乏力虛寒可知與生料八味丸加茴香四劑而安醫通李士材治一婦人受暑脅痛皮黃髮泡用清肝破氣之劑不效用大栝蔞一個搗爛加粉草紅花少許藥入而痛止病機沙篆薛立齊治一婦人性急吐血發熱兩脅脹痛日晡益甚此怒氣傷肝氣血俱虛也朝用逍遙散倍加炒黑山梔黃柏貝母桔梗麥冬夕以歸脾湯地黃丸而愈龔子材治一婦人口苦脅脹此肝火也用小柴胡加黃連梔子少愈以四君子湯加當歸白芍柴胡調理脾胃而瘥吳孚先治蔣氏婦善怒兩脅作痛歷所醫用補脾伐肝不應脈之左關細澀右脈無疴此肝勝則克脾脾敗則自困補尚嫌緩何以伐為乃與四物湯加阿膠玉竹棗仁枸杞令服三十劑脹減七八丸服全瘳柴嶼青治侍衛範諱弘賓太夫人吐痰脅痛飲食無味告以肝病一二十年矣率服平肝之藥凡香附鬱金等各服過數斤此二味為治肝病要藥然用之氣病則可矣用之血病則與干將莫邪無異也慎之今為我理肝氣可也柴曰肝脈已虛理無再用伐肝況腎肝同治乙癸同源自應以滋腎養肝為主先服加味逍遙散二劑即以八仙長壽丸進太夫人曰熟地膩膈恐勿堪用柴曰此方熟地直走腎家斷無膩膈且風以散之必需雨以潤之服後果驗調理數月而康按二地膩膈之說不知始自何人二地膩膈之說何嘗無之此與參耆助熱同一至理乃好用參耆者必引甘溫除大熱之語以為參耆不熱及試之陰虛之人而其弊立見蓋參耆所去之熱乃脾肺虛乏之熱非肝腎虧損之熱也今玉橫又以為二地不膩不知二地之不膩乃脾肺火燥之體非脾肺虛寒之人也矯枉者必過其正然哉文田按王氏駁正魏說真可謂平允通達致令數百年人皆畏之如虎俾舉世陰虛火盛之病至死而不敢一嘗逮已瀕危始進三數錢許已無及矣哀哉朱丹溪治楊淳三哥舊有腎疾上引乳邊及右脅痛多痰有時膈上痞塞大便必祕平時少汗脈弦甚與保和溫中各二十丸研桃仁郁李仁吞之而愈綱目陳三農治一人右脅痛引背口乾舌燥上身發熱腰以下俱冷右關尺不起此血虛氣無所附宜用溫藥行動其氣使氣有所歸水升火自降矣用乾薑肉桂各五分當歸一錢吳茱萸半分鹽水煎服上身熱退下體溫暖陽氣漸回但食難消化些元氣未復耳理脾為主養血次之胃氣一轉諸病自愈用參苓歸術各一錢薑桂各五分神麯六分陳皮四分炙甘草三分漸愈一人遇勞與飢則脅痛用八珍加牛膝木瓜山藥石斛苡仁棗仁柏子仁桃仁數服頓愈一人同此醫投平肝藥痛甚而殞謹録之以為世戒一人痛引腰脅脈弦數有力知肝火鬱結也投龍薈丸五十粒頓愈大還立齊治一男子脾胃不和服香燥行氣之劑飲食少思兩脅脹悶服行氣破血之劑致飲食不入右脅脹痛喜手按之虛症可知曰乃肝木克脾土而脾土不能生肺金也用滋化源之藥四劑諸症頓退又曰火令在邇當再補脾土以養肺金不信後復作吐膿而歿王肯堂治雲中泰文山掌教平湖因勞患兩脅滿痛清晨並飢時尤甚書來求方知其肝虛當母子兼補令用黃芩白朮當歸熟地川芎山萸山藥柏子仁之類佐以防風細辛各少許薑棗煎服不數劑而愈王客長安時聞魏昆溟吏部之變因投謁忍飢歸而脅痛無他苦也粗工以青皮枳殼之類雜投之遂致糾纏不痊可不監哉朱丹溪治壽四郎右脅痛小便赤少脈少弦不數此內有久積痰飲因為外感風寒所遏不能宣散所以作痛以龍薈丸三十五粒細嚼姜皮以熱湯下服後脅痛已安小便尚赤少再與白朮三錢陳皮白芍各二錢木通一錢半條芩一錢甘草五分姜三片煎熱飲之方提領年五十六因飲酒後受怒氣於左脅下與臍平作痛自此以後漸成小塊或起或不起起則痛痛止則伏面黃口乾無力食少吃物便噯服行氣藥轉惡風寒脈之左大於右弦澀而長大率左手重取則全弦此熱散太多以致胃氣大傷陰血下衰且與和胃湯以補胃氣滋養陰血並下保和丸助其運化俟胃稍實陰血稍充卻用消塊和胃人參三錢白朮錢半陳皮一錢白芍歸身各五分乾葛三分紅花豆大炙草二錢作一帖下保和丸二十五粒龍薈丸十五琇按此症全屬肝傷木反剋土其塊隱現不常乃虛氣也時師多以香燥辛熱治之促人年壽余治此不下數十人悉用一氣湯加川楝米仁蔞仁等不過三五劑其病如失若立齊多用加味逍遙散鼓峰云峰輩多用滋水生肝飲皆不及余法之善薛立齊治昆庠馬進伯母左胛連脅作痛遣人索治意此鬱怒傷肝脾用六君加桔梗枳殼柴胡升麻彼別用蒼朮藥益甚始請治其脈右關弦長按之軟弱左關弦洪按之澀滯乃脾土不及肝木太過因飲食之毒七情之火也遂用前藥數劑脈症悉退再加芎歸全愈此等症誤用敗毒行氣破血導痰以致不起者多矣一治男子因怒脅下作痛以小柴胡加四物加青皮桔梗枳殼治之而愈內翰李蒲汀太夫人左脅內作痛牽引胸前此肝氣不和尚未成瘡用小柴胡湯加青皮枳殼四劑少可再加芎歸治之愈張景嶽治一姻家年力正壯素飲酒常失飢傷飽偶飯後脅肋大痛自服行氣化滯等藥復用吐法盡出飲食吐後逆氣上升脅痛雖止而上壅胸膈脹痛更甚且加嘔吐張用行氣破滯等愚哉嘔痛漸止而左乳胸脅之下結聚一塊脹實拒按臍腹膈間不能下達每戌亥子醜之時脹不可當因嘔吐既已可以用下凡大黃芒硝三稜巴豆等及蘿蔔子朴硝及大蒜罨等法毫不應愈攻愈脹勢所必然因疑其脾氣受傷用補尤覺不便庸極湯水不入者二十餘日無計可施只得用手揉按其處覺肋下一點按著痛連胸腹細為揣摩正在章門穴章門為脾之募為臟之會且乳下肋間正屬虛里大絡乃胃氣所出大路而氣實通於章門因悟其日輕夜重本非有形之積而按此連彼則病在氣分無疑猶屬盲猜乃用神朮散令日服三四次兼用艾火灸章門十四壯以逐散其結滯之胃氣到底未知為肝病不三日脹果漸平食乃漸進始得保全幸矣此其症治俱奇誠所難測哉琇按張君生平於薛氏諸書似未曾寓目至脅痛由於肝脈為病至死不知良可哀也此症之愈全在一灸與厄逆病諸治不效灸虛里立止正同黃古潭治一人六月途行受熱過勞性且躁暴忽左脅痛皮膚上一片紅如碗大發水泡瘡三五點脈七至而弦夜重於晝醫作肝經鬱火治以黃連青皮香附川芎柴胡之類進一服其夜痛極且增熱次早視之皮膚上紅大如盤水泡瘡又加至三十餘粒醫教以水調白礬末敷仍以前藥加青黛龍膽草進之夜痛更甚脅中如鉤摘之狀次早視之紅已半身水泡增之百數乃載以詢黃為訂一方以大栝蔞一枚重一二兩者連皮搗爛加粉甘草二錢紅花五分雄按玉橫之一貫煎當是從此案悟出而更加周到可謂青出於藍矣進藥少頃即得睡比覺已不痛矣蓋病勢已急而時醫執尋常瀉肝正治之劑又多苦寒益資其燥故病轉增劇發水泡瘡於外者肝鬱既久不得發越仍侮所不勝故皮膚為之潰也栝蔞味甘寒經云泄其肝者緩其中且其為物柔而滑潤於郁不逆甘緩潤下又如油之洗物未嘗不潔此其所以奏功之捷也歟同上闡發栝蔞之功此案為最然猶未盡其蘊吳橋治陳泉中年兩脅極痛楚冷汗淋漓伏枕惛惛嘔逆絶勺飲者六日矣橋診之曰無傷此蓄血爾家人曰固也昔者嘔血數升即有蓄且盡矣曰蓄未盡爾盡則當瘥日暮乃投補中行血一劑飲之僅內其半中夜尸寢家人升屋而號橋曰再豫之半陽當回故寢以需來復復則敗血行矣第具人參湯待之雞鳴而蘇大汗大吐大下下則垂垂滿器如腐肝敗膋乃進參湯大汗漸止又七日乃復初或問蓄血而腹不鼓何也且昔嘔血數升其後何蓄之多也曰病得之怒而傷肝或以蹶而蓄血傷肝則血不納蓄血則道不通猶之溝澮塞流則新故皆壅矣故多也太函集汪云程年近七旬患胸脅痛轉側滋甚寒熱交作喘咳煩躁再信不能伏枕醫下之病益深橋診之六脈浮滑大而搏指曰病得之過飲且下故火上炎以清涼一服而愈太函集魏玉橫曰範康侯年弱冠患脅痛已六七年更醫既屢轉益羸瘠食少而氣餒言懶而神疲稍遠行則心下怦怦然遇勞則膈間如裂就豫診告以初時但腹脅痛醫與逍遙散暫愈再發再復不應矣醫投四磨飲亦暫愈再發再投亦不應矣又更醫用五香散越鞠丸則愈而即發自是腹中忽有塊再更醫以為痞積進青皮厚朴五靈脂延胡索之類塊益多時隱時現上下左右約六七枚如拳如掌往來牽痛近有老醫謂為虛也用當歸白芍香附鬱金之類服之了無進退豫曰似君之疾遍宇內矣誤治而斃者可勝道哉蓋古來方書於此症殊無肯綮無怪乎世之夢夢也原其誤人之始只肝無補法四字遂使千萬生靈含冤泉壤或以疏散成勞香燥成膈或以攻伐成鼓或以辛熱成癰其於變症筆難盡述幸子青年稟賦厚而未婚故僅若此否則不可言矣今據脈已細數弦澀臟氣已虧幸不數且無咳嗽夜熱猶可為也第服余劑只可希遠效而不可求近功耳與生熟地沙參麥冬杞子棗仁等劑略安至數十劑塊漸減遂以方為丸服數年益就痊可今已娶第能樽節庶無後患也蓋此症惟兩儀膏最妙然有力者始能用之方某年三十餘因析居鬩牆脅痛左脅下有塊如槃按之堅硬食下則脹痛甚不能側臥百治莫應枯瘁如柴矣偶於藥肆遇人謂之曰此病惟淳佑橋魏某能治因就診脈之弦且急曰肝舉症也肝葉左三右四血足則潤而下垂今怒火傷陰其葉燥硬故舉而不下也經曰肝病則迫胃逆咽故左葉張則支腋而不可側臥右葉張則侵脘而不能容食昧者不知投以香散則如火上添油耳與生熟地沙參麥冬蔞仁米仁杞子川楝十餘劑其病如失詹渭豐母年六十餘九月間瘧後自汗余已愈之至十一月脅痛大作醫以加味黑逍遙散治之未為誤也服一劑至夜分忽暈厥欲脫蓋柴胡白朮皆非陰虛火盛之人所宜進也黎明急余治脈之兩關俱伏兩尺極微足冷過膝面如紙灰云初起左脅痛服藥後忽移於右遂發厥厥雖止而痛劇不可轉側痛處不可按察其舌燥硬如干荔已危矣姑與生熟地杞子各五錢沙參麥冬各三錢服下痛略減前方加倍再入米仁五錢蔞仁二錢其痛乃復歸左脅能轉動矣仍服前方數劑而愈余常治數貧人感症後不能進飲食宛如百合病脈之或弦或澀按其脅或左或右或有塊無塊皆曰痛甚檢其方諸燥藥外有服柴胡至二三兩者察其舌或中干或枯燥或紫赤是皆誅伐太過傷其肝腎之害也悉以前方相其傷之輕重為劑之大小數服而愈又趙氏子年十六金氏女年十七其家皆素封病脅痛服逍遙散皆五十餘劑病益困以前方去熟地與之皆不服乃更從香燥而歿蓋地黃杞子舉世咸畏之如虎緣本草謂地黃膩而杞子熱也其殺人亦多矣言醫藥者可不慎哉陳理堂母六旬外久病脅痛每發必伏枕經旬醫所與皆香附鬱金青皮木香小茴延胡索五靈脂龍膽草之類或配六郁或偕左金而已近發則腰背脹痛嘔逆便祕口燥不眠脈則兩寸搏指兩關弦而乏韻此將成關格之候投以滋水養肺金之劑或入川楝或入川連只一二劑即愈誡以多服以杜其漸然性甚畏藥愈即止矣關格之患其將來乎此與膈症門胡氏婦病同黃錦芳治劉尚卿右脅痛咳嗽頭痛肝脈微起右脈沉滑而脾部有一小珠嗽必努力痰則清稀上有白沫挑起如藕絲不斷用附子二錢茯苓二錢半夏二錢故紙三分木香五分牛膝一錢囑其勿食膩滯等物俾水行痰消氣平而痛自止病者問痰病自何而來黃曰痰病甚多五臟各有見症在脾名濕痰其候脈緩面黃肢體沉重嗜臥不厭腹脹食滯其痰滑而易出宜二陳六君之類治之在肺名氣痰又名燥痰其候脈澀面白氣上喘灑淅惡寒悲愁不樂其痰澀而難出宜利膈清肺飲加減治之在肝名風痰脈弦面青肢脅滿悶便溺閉澀時有躁怒其痰青而多泡宜十味導痰湯千緡湯加減治之在心名熱痰脈洪面赤煩熱心痛口乾唇燥時多喜笑其痰堅而成塊宜涼膈散加苓半治之在腎名寒痰脈沉面黑小便急痛足寒而逆心多恐怖其痰有黑點而多稀宜桂苓丸八味丸加減治之至論其本則痰之化在脾而痰之本在腎如火不生土者即火不制水陽不勝陰者必水反侮土是陰中之火衰也火盛金燥則精不守舍津液枯槁則金水相殘是陰中之水衰也寒痰濕痰本脾家病然必由於腎水之虧木鬱風生本肝家病然必由於腎水之虧火盛剋金其痰在肺然必由於腎火之熾今此症痰雖在脅在胃在脾實因腎火衰微而起故用附子迅補真火以強土苓半以除脾濕木香以疏滯氣牛膝引左氣下行歸腎故紙引右氣下行歸腎氣歸則痰清矣果數劑而愈
