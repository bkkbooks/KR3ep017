body:
  text: 卷九飲食傷竇材治一人慵懶飲食即臥致宿結於中焦不能飲食四肢倦怠令灸中脘五十壯服分氣丸丁香丸即愈一人脾氣虛好食冷物不消常覺口中出敗卵臭服草神丹即愈若服全真金液亦效原注脾胃既為食所傷不可再施消克惟治以溫化則自健運矣一人暑月飲食冷物傷肺氣致咳嗽胸膈不利先服金液丹百粒泄去一行痛減三分又服五膈散而安但覺常發後五年復大發灸中府穴五百壯方有極臭下氣難聞自後永不再發世醫不審病因動云暑月熱氣傷肺一派寒涼致水氣不消變成大病原注汪頴曰一人好食燒鵝炙爆日常不缺人咸防其生癰疽後卒不病訪知其人每夜必啜煎茶一碗乃知茶能解炙爆之毒也龔子才治一人勞後吃紅柿十數枚又飲涼水數碗少頃又食熱面數碗遂心腹大痛診之六脈沉微氣口稍盛此寒熱相搏所致以附子乾薑肉桂枳實山楂神麯莪朮香附一服立止後渾身發熱又以小柴胡一劑而安一人臘月賭吃羊肉數斤被羊肉冷油凝結堵塞胸膈不下脹悶欲死諸醫束手診之六脈俱有乃用黃酒一大壇煮熱入大缸內令患人坐其中衆手輕輕亂拍胸腹背心令二人吹其耳及將熱燒酒灌之次服萬億丸遂得吐瀉而愈陶節庵治一人患病因食羊肉涉水結於胸中門人請曰此病下之不能吐之不得出當用何法治之陶曰宜食砒一錢門人未之信也乃以他藥試之百計不效卒依陶語一服而吐遂愈門人問曰砒性殺人何能治病陶曰羊血犬血大能解砒毒羊肉得砒而吐而砒得羊肉則不能殺人是以知其可愈杭州府志唐守元治一婦人食羊聞呼未及吞而應逾月病發淹及兩年唐曰此必胸有宿物家人曰兩年不愈矣曰試以我藥投之既而大吐痰塊中裹羊肉一臠遂愈平湖縣志王海藏治秦生好服天生茶及冷物成積而痼寒脈非浮非沉上下內外按舉極有力堅而不柔觸指突出膚表往來不可以至數名縱橫不可以巨細狀此陰症鼓擊脈也一身流行之火萃於胸中寒氣逼之故搏大有力與真武四逆理中等湯丸佐以白芍茴香使不潛上每日服百丸夜汗出而愈孫文垣治董潯陽年六十七有脾胃疾以過啖瓜果胸膈脹痛諸醫不愈脈之寸關弦緊曰病傷瓜果而為寒濕淫勝經云寒淫所勝治以辛溫然瓜果非麝香肉桂不能消以高良薑香附各一兩為君肉桂五錢為臣麝香一錢為佐每服二錢酒調下藥下咽胸次便寬再而知餓三服而巾櫛交接賓客如未病者馬二尹迪庵年五十五以過食鰻魚捲餅心腹脹痛醫不知吐法遽以硝黃下之大便不行脹痛愈甚又用木香檳榔丸繼又有下以大小承氣湯者十餘日病益加便既不行食亦不進小水僅點滴又服白餅子五日備急丸三日脹痛遂不可當又服甘遂芫花大戟牽牛之屬三日並小便之點滴亦無矣又灸中脘三十餘壯亦無驗孫至視其色蒼黑神藏不露聲音亮惟腹大如箕不能反側脈之兩手皆滑大兩尺尤有力曰此病初時食在膈上法當用吐素問云在上者因而越之易易也乃誤下傷脾失其健運是以愈下愈脹又以峻利益下之致展轉增劇今先用六君子湯以醒其脾加木香砂仁助其運動再用吐法吐出前藥弗慮大便不行獨慮行之不止耳計所服藥硝黃五斤巴豆白餅五六兩又加諸慓悍之劑幸而藥性未行尚可為計否則如瓶水底脫傾瀉無餘矣今傷在上中二焦下元未損故兩尺尚有神色蒼氣固根本未動尚可為也服藥後腹加大痛知藥力已至改用人參蘆防風蘆升麻桔梗各三錢煎服少頃用鵝翎探之湧出前藥約十餘碗病者曰目前光矣時巳刻也孫謂酉時大便必行宜備人參數斤以待至午刻進至寶丹一帖以溫中氣未申間腹中濁氣下注覺少寬至晚大便行一次小水略通即用參術各五錢炮薑三錢茯苓二錢木香甘草各五分陳皮一錢煎服四鼓又行一次小水亦行次日連瀉十餘次以理中為丸與煎劑兼服脹全消食漸進凡瀉七十二日服參二斤余乃愈吳九宜每早晨腹痛泄瀉者半年糞色青腹臌脹咸謂脾胃瀉為灸關元三十壯服補脾腎之藥皆不效自亦知醫謂尺寸俱無脈惟兩關沉滑大以為憂疑久瀉而六脈皆絶也孫診之曰毋恐此中焦食積痰瀉也積膠於中故尺寸隱伏不見法當下去其積而反用補誤矣以丹溪保和丸二錢加備急丸三粒五更服之巳刻下稠積半桶脹痛隨愈次日六脈齊見再以東垣木香化滯湯調理而安汪氏婦腹大如箕堅如石時或作痛雜治月餘轉脹急小水不通或用溫補下元之劑則脹急欲裂自經求盡脈之兩關洪滑鼓指按之不下乃有餘之候也症雖重可生其致病之由因母家常令女奴袖熟雞牛舌之類私授之因數食冷物積成脹滿誤作虛治宜增劇也乃用積塊丸三治而脹消積去以保和丸調理一月而愈黃履素曰余在臨江時誤用厚朴傷中氣之後偶食犬肉一塊遂覺停滯時中氣正虛不敢加山楂等藥考本草食犬肉不消煮蘆根汁飲之可消如法煎飲覺右脅下微痛次日大痛殊不可解自是日甚一日坐臥皆妨反側痛如刀割右脅下按之有物如雞子方書言右脅痛屬食積痰積有謂須攻治者有謂不宜攻必須助正以消邪者時有醫主攻治謂不攻治成痞塊余以為不然確守助正之説當痛極時不敢服藥靜以守之俟痛小定氣稍平即用六君子加木香等行氣之藥以漸調之竟得痊可若誤信攻伐不知死所矣黃公稟體虛寒故專尚溫補未可以為定論即其所用仍是半補半消之劑故能取效亦非純補者可比張景嶽治一上舍年及三旬因午刻食水煮麵角及至初更小腹下至右角間見痛遂停積不行而堅突如拳大如鵝卵其痛之劇莫可名狀察其明系面積顯而無疑然計其已入大腸此正通則不痛之症也乃與木香檳榔丸其痛如故因疑藥力之緩猶未及病及更投神授丸以瀉之又不效因謂此藥性皆寒故滯而不行也再投備急丸雖連得大瀉而堅痛毫不為減斯時也張計窮矣因潛思其由不過因面豈無所以制之今既逐之不及使非借氣以行之不可也且計面滯非大蒜不殺氣滯非木香不行又其滯深直遠非精鋭之嚮導不能達乃用火酒磨木香令其嚼生蒜一大瓣而以木香酒送之一服後覺痛稍減三四服後痛漸止而食漸進而小腹之塊仍在後至半年許始得消盡由是知欲消食滯即大黃巴豆猶有所不能及而惟宜行氣為先也且知飲食下行之道乃必由小腹下右角間而後出於廣腸此自古無言及者琇按就此觀之景嶽平生臨症遺憾多矣夫面角由胃入腸已至小腹之角豈能作痛如是而又如拳如卵耶必其人素有疝偶因麵食之濕熱發之或兼當日之房勞遂乃決張如是故推蕩之亦不應得木香火酒一派辛熱香竄而痛止耳至謂食由小腹下右角而後出廣腸謂自古無言及者更堪捧腹經謂大小腸皆盤屈十六曲則左旋右折可知豈如筒如袋而直下乎嘻張路玉治葉某停食感冒兩寸關俱澀數模糊兩尺皆沉按之益堅雖其人尚能行走而脈少衝和此必向有陳氣在少腹詢之果患寒疝數年因婉辭不用藥是夜腹滿而逝矣或問此人小恙何以知其必死曰凡人胃滿則腸虛腸滿則胃虛更實更虛其氣乃居今胸有瘕而腸有積上下俱困能保其不交攻為患乎當知厥痛入腹腳氣衝心等疾皆是陰邪相搏結郁既久則挾陰火之勢而上升若胸中元氣有權則其邪下伏今既為宿食填塞逆則上下俱滿正氣無容身之地往往有暴絶之虞所以不便用藥實未知其即死也傷寒論病人素有痞積及病傳入三陰則死謂之臟結蓋新邪與舊邪合併也幼科汪五符夏月傷食嘔吐發熱顱脹自利黃水遍體肌肉捫之如刺六脈模糊指下似有如無足脛不溫自謂陰寒服五積散一劑熱愈熾昏臥不省第三日利不止時譫語至夜尤甚或以為傷暑與香薷飲遂頭面汗出如蒸喘促不寧足冷下逆或以為大寒而脈息模糊按之殊不可得以為陽脫之候欲猛進參附或以為陰症斷無汗出如蒸之理脈雖虛而症則大熱當用人參白虎爭持未決張診之曰六脈如此而心下按之大痛舌上灰刺如芒乃食填中宮不能鼓運其脈往往如此與涼膈散下之一劑神思頓清脈亦頓起倘投參附其能免乎癸卯元夕周徐二子過石頑齋頭飲次日皆病酒不能起欲得葛花湯解醒張曰此湯雖為傷酒專劑然人稟賦各有不同周子縱飲則面熱多渴此酒氣行陽肌肉之分多渴則知熱傷胃氣豈可重令開瀉以耗津液與四君子湯去甘草加藿香木香煨葛根澤瀉下咽即愈徐子久患精滑飲則面色愈青此素常肝膽用事腎氣亦傷酒氣皆行筋骨所以上潮於面葛花胃藥用之何益與五苓散加人參倍肉桂服後食頃溲便如皂角汁而安用藥須相人體氣不可膠執成方凡病皆然不獨為傷酒説法也柴嶼青治中翰陳雯山壯熱神昏為時醫所誤者纍日勢甚危篤診得人迎脈緩自無外感惟氣口洪實舌苔甚厚重按其胸皺眉呼痛此胸中停食屢進發表相去徑庭無怪病增劇也用小承氣湯連下二次即神清熱退而安張飛疇治謝元海夏月常飲火酒致善食易飢半月後腹漸脹滿大便艱澀食亦日減醫用刻削清火俱不效左脈細數右脈澀滯此始為火助胃強而善食繼為火灼胃液而艱運艱運則食滯而脹滿脹滿則食減今宜斷食辛熱乘元氣未離祛其滯而回其液日久則費調理也用枳實導滯湯去黃連白朮加葛根一服大便通利而滯行又用健脾理氣三日後以小劑生脈加葳蕤煨葛根半月而愈張三錫治一人發熱頭痛七日不止診之左脈平和右寸關俱弦急有力乃內傷宿食為患也以二陳加枳實厚朴楂炭柴胡三劑再加黃芩頭痛除但熱不淨投枳實導滯丸百粒更衣而愈一婦每夜分即發熱天明漸止自投四物湯反加嘔惡診得左關微急而右寸關弦數有力詢之經後食梨午後遂熱起正丹溪所謂胃虛過食冷物抑遏陽氣於脾土之中此病皆因血虛而得者遂以升陽散火湯一服熱已後用四物去地黃加枳朮陳皮健脾養血調理而愈張三錫曰余初識繆仲淳時見袖中出彈丸咀嚼問之曰此得之祕傳飢者服之即飽飽者服之即飢因疏其方名資生丸余大喜之而頗不信其消食之功已於醉飽後頓服二丸徑投枕臥夙興了無停滯始信此方之神也資生丸白扁豆一兩山藥一兩五錢人參三兩白朮土炒三兩蓮肉一兩芡實一兩五錢橘紅二兩桔梗五錢炙甘草五錢白蔻仁三錢五分厚朴一兩山楂肉二兩川黃連三錢五分神麯二兩藿香五錢茯苓一兩五錢澤瀉三錢五分薏苡仁三兩麥芽一兩五錢煉蜜丸每丸二錢每服一丸醉飽後二丸王晉三曰易曰至哉坤元萬物資生取以名方因三焦五臟之生生之氣全資脾胃而輸化也蓋土居乎中而位寄乎五行三焦分受其氣於五臟故理脾胃而仍理三焦也白扁豆山藥補金中之土也人參白朮補其正土也蓮肉芡實補水中之土也橘紅桔梗甘草豆蔻運上焦之氣而使之輸也麥芽苡仁茯苓澤瀉理下焦之氣而使之化也三焦氣行五臟氣充而生勃然矣許學士云有人全不思食補脾罔效授二神丹服之頓能食此即補母法也黃曾直用菟絲子淘淨酒浸日挑數匙以酒下十日外飲啖如湯沃雪亦此理也治法匯張三錫治一人夏月食羊肉太多作渴煩躁自謂受暑用涼水調益元散躁煩愈甚診之脈雖滑不鼓指隨以鹽湯吐之得生肉碗許乃以二陳加草果肉桂厚朴山楂調理而安若用涼藥作暑治立見其斃一人飲茶過度且多憤悶腹中常漉漉有聲秋來寒熱似瘧以十棗湯料黑豆煮曬乾研末棗肉和丸芥子大以棗湯下之初服五分不動又服五分無何腹痛甚以大棗湯飲之大便五六行時蓋日晡也夜半乃大下數斗積水而積平當其下時瞑眩特甚手足厥冷絶而復蘇舉家號泣咸咎藥峻嗟乎藥可輕用哉一人過食瓜果時值夏月大瀉不止中脘大痛煩渴引飲自服天水散及香薷飲脈之右關寸俱沉伏因作停冷治香砂六君子湯加炮薑厚朴一服痛渴俱止只以胃苓調理而安龔子才治徐通府因好燒酒及五香藥酒過度患吐血唾痰六脈急數此酒毒積熱入於骨髓不受滋補以黃連解毒湯加知母貝母石膏連翹元參花粉葛根栝蔞桔梗酒蒸大黃早晚服至百日外以六味丸加解毒湯在內與前湯藥並進又百日始瘳後歸田逾年仍為酒困而卒陸祖愚治吳武祖之母少寡長齋稟性極薄因正啖糯米粉食人誤報武祖不入泮不覺驚而且悶遂成內傷或與之消導過多而中滿過甚脈之兩手斷續不勻洞瀉口開頭汗如洗元氣將脫胸中仍不可按脈不足而症有餘宜先補後攻急用附子理中湯二劑脈稍有根以枳實理中湯進之其積漸覺移動脈亦有神後以潤字丸每服五分仍以前劑送之積去身和調理而愈用藥次第可法徐小園子新婚多痰脾已受傷又加外感遂往來寒熱項強背痛頭疼表裡具在或謂瘧疾遽用截藥因而口渴多食生冷變為吐瀉與柴苓湯不效診之四肢厥逆不省人事面色青黃脈左三部與右尺隱欲脫右關滑而有力乃用參附理中加枳實厚朴山楂等三劑脈起而內傷之症才身大熱舌焦芒刺臍上下手不可按四肢濈然汗出下症悉具第用枳朴熟黃少許加鐵鏽水導之去燥矢三四塊勢未減又與枳朴楂連小柴胡加人參少許間四五日進潤字丸五分大便去一次如是八十餘日里症去六脈有神向晡時潮熱胃氣不開口乾腹滿前方去參四劑勢又大減或謂傷寒三七不解謂之壞症經云安穀者昌絶谷者亡今將百日粒食不進焉有生理況身不熱舌無苔縱晡時微熱亦是陰虛之故急宜滋陰養血開胃健脾自愈遂服藥一劑又強飲粥湯半盞及龍眼湯一杯是夜仍身體大熱心口作痛異常煩躁舌上有苔再診右關尺沉實仍用枳實黃連卷柏麥芽楂朴送潤字丸一錢五分大便一次極暢諸症頓除改用六君子方知飢飽計百三十餘日頭髮落盡年餘未得出門戶陳孟昭新正赴館偶開別室見一柩心中怦然是晚夢遺次日勉強行文薄暮啖肉面遂頭疼身熱右脅有塊如碗疼痛寒熱疑為腫毒診之謂內傷兼感不信瘍醫視之外用敷藥內服解毒之劑不效或與投補遂昏冒煩躁譫語如狂再延診脈洪數無倫此誤補故也仍作內傷飲食治之用青皮陳皮枳實厚朴山楂黃連等又以麩皮炒尉肚腹稍蘇再用潤字丸五分數服後宿垢去而痛減改用參朮歸芍麥冬陳皮茯苓甘草之類調月餘而安沈振宇患陰症似陽用溫經益元湯而愈乃病愈未幾因食饅頭羊肉等物遂胸腹脹滿痞塞不通服藥旬余不效口渴煩躁晡時更甚大便閉結凡硝黃枳朴檳楂麻仁青皮紅花歸地芩連遍服而大便不通陸曰大病須以大方治之若拘拘一二錢力量輕薄安能奏捷如元明粉檳榔必用五錢枳實生地當歸黃芩必用一兩紅花必用三錢另以山楂四五兩煎湯代水煎藥臨服必加鐵鏽水半酒杯其垢自行矣如言一劑果腹中運動響聲不絶兩時許下宿垢半桶頓覺爽利調理而痊昔有婆羅門僧東來見食麵者云此大熱何以食之又見食中有萊蔔云賴有此以解其性自此相傳食麵必啖萊蔔又小説云人有中麥面毒者夢紅裳女子悲歌有一丸萊蔔火吾宮之句醫説續編本草扁鵲云酒飲過腐腸爛胃漬髓蒸筋傷神損壽有客訪周顗顗出美酒二石顗飲石二客飲八斗次明顗無所苦酒量慣也客已死矣觀之客脅穿腸出豈非量過而犯扁鵲之戒與同上王海藏治秦生好服天生茶及冷物積而痼寒脈非沉非浮上下內外舉按極有力堅而不柔觸指突出膚表往來不可以至數名縱橫不可以巨細狀此陰證鼓擊脈也一身遊行之火萃於胸中寒氣逼之搏大有力與真武四逆理中等湯丸佐以白芍茴香酒糊丸使不僭上每百丸晝夜相接八九日服丸至半斤作汗而愈亦世罕有也陰症略例醫説續編薛立齋治一人食粽煩悶作渴大便欲去不去用消導藥不應以白酒麴炒為末溫酒調服二錢俄頃腹鳴粽下而安一人食水晶糰子過多肚腹脹痛亦治以此方而愈一人食魚鮓腹痛患痢諸藥不效用陳皮白朮等分為末陳米湯數服而愈一人每食蟹即腹痛用紫蘇濃煎湯而安一婦人停食飽悶或用人參養胃湯木香檳榔丸而泄瀉吐痰腹中成塊又與二陳黃連厚朴反加腹脹不食此胃氣虛不能消磨用補中益氣加茯苓半夏五十餘劑脾胃健而諸症痊竇材治一人因暑月食冷物以致胸腹脹悶欲死服金液丹百丸少頃加全真丹百丸即有氣下降而愈一人每飯後飲酒傷其肺氣致胸膈作脹氣促欲死服鍾乳粉五膈散而愈若重者灸中府穴亦好服涼藥則成中滿難治矣一小兒食生杏致傷脾脹悶欲死灸左命門二十壯而愈又服全真丹五十粒一人嗜茶成癖一方士令以新鞋盛茶令滿任意食盡再盛一鞋如此三度自然愈也男用女鞋女用男鞋用之果愈集酒方立齋治一男夏月入房食冰果腹痛用附子理中湯而愈有同患此者不信別用芩連二陳之類而死林觀子治一人房欲後遠涉飢渴飲新汲泉水而歸病作醫以解表消中藥與之遂冷逾膝肘外熱躁擾不定掀衣擲被謾語無倫脈寸如蛛絲余無急以人參薑附入蔥白生薑大劑浸冷灌之得睡躁定去蔥白生薑服數帖得汗肝脈亦漸和加別藥調而安朱丹溪治一丈夫因酒多下血肚疼後重成痢滑石半兩連翹黃芩木通白芍枳殼白朮各二錢甘草五分桃仁二十一枚分四帖服有人因憂愁中傷食結積在腸胃欲發吐利自冬至後暑月積傷發暴下數日不止玉函云下痢至隔年月日應期而發者此為有積宜下之止用溫脾湯尤佳如難下可佐以乾薑丸乾薑巴豆大黃人參各等分後服白朮散白朮木香附子人參各等分上細末每二錢水一盞薑三片棗一個前六分溫服一丈夫酒多病泄久不愈又自進附椒等食不進泄愈多滑石黃芩各半兩乾薑黃連樗皮粥為丸每服百丸許學士治宗室趙彥材下血面如蠟不進食蓋酒病也授紫金丹方服之終劑血止面鮮潤食亦倍常新安一士人亦如是與三百粒作一服立愈膽礬三錢黃蠟二兩大棗五十枚上以砂鍋或銀石器內用好酒三升先下礬棗慢火熬半日取出棗去皮核次下蠟再慢火熬一二時令如膏入蠟茶二兩同和丸如桐子大每服二三十丸茶酒任下孫兆治館職學士張居易嗜酒散誕不為名利拘束忽發熱頭疼俾翰林醫官治之十日愈甚諸學士共議召孫孫至脈之曰餘人皆日傷寒然此症痰也張學士好酒多痰食所傷也今痰非傷寒而右手脈甚數左手脈平和此必傷酒食而作頭疼宜用食藥五七丸俟之半日進退決矣孫遂用食藥經食久膈漸寬頭痛遂減再進利膈藥遂獲安大凡陽邪頭痛經十日豈得不變發熱而狂亂故知非傷寒乃食病之過也朱丹溪治胡孺人因吃冷粉與肉頭痛自汗膈痞小便赤用白朮三錢半陳皮一錢半木通川芎黃芩各五分薑水煎熟吞之草豆蔻丸阿魏丸保和丸各五十粒羅謙甫曰丁巳冬豫從軍回至汴梁有伶人李人愛謂豫曰大兒自今歲七月間因勞役渴飲涼茶及食冷飯覺心下痞醫投藥一服下利兩行症遂減不數日又傷冷物心腹復痞滿嘔吐噁心飲食無味且不飲食四肢困倦懶於言語復請前醫診視曰此病易為更利幾行即快矣還以無憂散對加牽牛末白湯服之至夕腹中雷鳴而作陳痛少焉既退又瀉煩渴不止飲食無度不能復禁時發昏憒再命前醫視之診其脈不能措手而退頃之冷汗如洗口鼻氣漸冷而卒矣小人悔恨無及敢以為問豫曰未嘗親見不知所以然既去或曰豫親見之果藥之罪與而非與豫曰此非藥之罪乃失其約量之過也夫藥之無據反為氣賊內經云約方猶約囊也囊滿勿約則輸泄方成勿約則神氣不俱故仲景以桂枝治外傷風邪則曰若一服汗出病瘥停後服不必盡劑大承氣湯下大實大滿則曰得更衣止後服不必盡劑其慎如此此為大戒蓋得聖人約囊之旨也治病必求其本蓋李以雜劇為戲勞神損氣而其中痛因時暑熱渴飲涼茶脾胃氣弱不能運化而作痞滿以藥下之是重困也加以不慎又損其陽虛而復下陰爭於內陽擾於外魄汗未藏四逆內起仲景所謂一逆尚引日再逆促命期如是則非失約量之過而何故內經戒云上工平氣中工亂脈下工絶氣不可不慎張子和治一佃侶好茶成癖積在左脅曰此與肥氣頗同然痎瘧不作便非肥氣雖病十年不勞一日況兩手沉細有積故然吾治無針灸之苦但用藥即可享壽盡期先以茶調散吐出宿茶數升再以木如意揃之又湧數升皆作茶色次以三花神佑丸十餘粒是夜瀉二十餘行膿水相兼燥糞瘀血雜然而下明日以除濕之劑使服十餘日諸苦悉蠲神色清瑩醫説續編浙東監憲全公每晨先飲阿刺吉十餘杯然後飲常酒至六月大發熱張奕之治用冰攤心腹上冰消後增內飲以藥三日乃愈藥要或問一富家子二十餘歲四月間病發熱求趙以德治之脈浮沉無力而虛熱往來潮作無時脈間有力洪數隨熱進退因之非外感之熱必是飲酒留熱在內今因房勞氣血之虛而病作問之果在正月每晨飲阿刺吉吃狗肉一月既得其情遂用補氣血藥加葛根以散酒毒一帖微汗反懈怠熱如故因是知氣血皆虛不禁葛根之散而然也必得雞距子方可解其毒偶得乾者少許加於藥中其熱即愈唐生者病因飲酪水及食生物下利紫黑血十餘行脾胃受寒濕毒與六神平胃散半兩加白朮三錢以利腰臍間血一服愈周子固治王經歷患身輕飄飄若行空虛中易醫凡七十人皆以為風虛與熱劑轉加周曰此酒毒也即以寒涼之劑驅之隨愈九夷山房集張子和治一酒病人頭疼身熱惡寒狀類傷寒診其脈兩手俱洪大三兩日不圊以防風通聖散約一兩水一中碗生薑二十餘片蔥二十莖豆豉一大撮同煎三沸去渣稍熱分作二服先服一多半須臾以叉股探引咽中吐出宿酒香味尚然約一兩掬頭上汗出如洗次服少半立愈內經曰火鬱發之發謂令其汗之疏散也朱丹溪治一飲酒人胸大滿發熱夜譫語類傷寒右脈不和左大與補中益氣湯去黃耆柴胡升麻加半夏以黃耆補氣柴胡升麻又升故去之服後病愈因食涼物心痛於前藥中加草豆蔻數粒愈治法立齋治曹銓因飲食汾酒肛門腫痛便祕脈實服荊防敗毒散不應用黃連內疏湯而愈張子和治蘇郡丞秦水心初有中氣虛寒之症兼以案牘叢脞應酬紛擾遂致疲倦食少肌表微熱不能治事召診始而用溫繼而用補其後每劑加參至兩許附至三錢然後飲食大進精神煥發復因湯液久而苦口則更制丸劑常服大抵不外扶陽抑陰之義忽一日諸症復發視前較甚加之自汗頭暈懶於言語亟延診首訊昔日大劑溫補煎方蓋謂丸劑緩而無濟也診畢曰症即前日之症藥非前日之藥是殆勞神動怒之後復為飲食所傷致令當納受者不納受當運化者不運化實熱滯於太陰陽明兩經此王道安所謂飲食勞倦之中仍有有餘不足今非昔比參附斷斷不可沾唇者惟宜清導消熱耳郡丞首肯遂如法治之而愈所以知秦之病者其脈左關獨大而氣口緊盛倍常左關獨大者肝主勞與怒也氣口緊盛非食而何藉若膠柱前方實實之咎其何能辭顧開一內人以傷食飽悶求治診其脈氣口初非緊盛而反得虛微察其症雖若胸次有物而神氣殊短正符東垣飲酒食勞倦之説宜補正以祛邪即用六君子健脾佐以薑桂等味助中焦腐熟水穀一二劑後腹脹寬舒君子進而小人退之機也改用補中益氣湯脾瀉即止飲食如常神氣日增聶久吾曰一侍婢停食腹痛先用消導藥略加發散一劑而痛未減因用炒鹽湯服二碗吐之其痛減半又用發散為主加消導一劑其痛立止因悟寒邪停食作痛散其寒氣則食自消而痛自止自後依此施治無不神效梁撫軍章巨云向余在甘肅齊禮堂軍門授一藥酒方謂可治聾明目黑髮駐顏余服之一月目力頓覺勝常方用蜜炙黃耆二兩當歸一兩二錢茯神二兩黨參一兩麥冬一兩茯苓一兩白朮一兩熟地一兩二錢生地一兩二錢肉桂六錢五味子八錢山萸肉一兩川芎一兩龜膠一兩羌活八錢防風一兩枸杞一兩廣皮一兩凡十八味外加紅棗七兩隨量飲之軍門云此名周公百歲酒其方得自塞上周公自言服此方四十年壽逾百歲其家三代皆服此酒相承無七十歲以下人有名醫視之曰水火既濟真是良方其制勝全在羌活一味所謂小無不入大無不通非神識神手莫能用此也余弟灌雲廣文素嗜飲中年後已成酒勞每日啜粥不過一勺顏色憔悴骨立如柴醫家望而卻走余録此方寄之灌雲素不飲燒酒乃以紹酒代之日飲數杯以次遞加半月後眠食漸進一月後遂復元比余回福州相見則清健反勝十年前而豪飲如故蓋常服此酒日約三斤已五年矣清和酒不能斷飲之人可用此法庶幾飲而無弊真生地八兩天冬四兩銀花八兩生豬脂一斤生緑豆一升柿餅一斤切碎汾酒二十斤密封浸之一月後可飲久藏不壞加減思食丸治脾胃俱虛水穀不化胸膈痞悶腹脅時脹食減嗜臥口苦無味虛羸少氣胸中有寒飲食不下反胃噁心及病後心虛不能勝穀氣食不復常並宜服之神麯炒黃麥冬麥芽炒黃各二兩烏梅四兩木瓜半兩白茯苓炒甘草各二錢半蜜丸櫻桃大每服一丸細嚼白湯送下如渴時噙化一丸徐靈胎曰此收納胃氣之方用烏梅木瓜甚巧裴兆期曰病有用藥傷而變重者甚有變症莫識而卒至危亡者不可不知昔一婦患經閉服血藥過多血不行而飲食反減又增寒熱嘔逆醫猶以為瘀血攻心倍加峻削病者忽神昏齒噤口角流涎狀類中風診其脈伏而微心下按之滿急且有聲曰此飲症也詢之乃為藥所傷非湧法不可急取桐油鵝翎探之一湧而出酸水四五升遂醒先與燥濕寬中藥次與補脾健胃俟飲啖起居如故始進通經丸血乃行一人病瘧兼旬胸滿而畏食胃氣不清故也醫不審與以補中益氣湯二服瘧反大劇易用鱉甲何首烏以截之更脹嘔不勝湯飲俱廢或疑其誤用補藥與陳皮萊蔔等湯病益加余診之六脈濡弱此濕氣滿胸膈也以蒼朮為君佐以半夏厚朴澤瀉豆仁等少加薑汁食鹽徐徐與之不食頃兀然欲吐即探引之得吐黃涎惡水甚多脈始平瘧亦漸止又一小兒甫三歲得心腹痛疾醫者處劑太重煎汁又濃更灌之乳食後反增嘔吐發寒熱而兼喘更數醫罔效漸昏沉不醒人事其家以為不可救遂勿藥以俟之自晨至昏忽聞腹中汩汩聲上下者數四遺穢汁鬥許而蘇此等病患者甚多不能悉舉總之人生以胃氣為本胃氣傷雖對病之藥皆不運化而取效反生他症今之病家醫家皆不之察凡有病輒投以藥不愈更醫以藥甚至飲食不進不思顧其生化之源而猶亂投湯藥致中氣受傷變症百出而死者不少矣可不慎哉言醫午時茶方治風寒積濕潮熱惡寒遍身疼痛頭昏目暗肚腹痛脹不思飲食山楂肉四兩麥芽四兩陳皮二兩枳殼二兩厚朴二兩紫蘇二兩香附三兩川芎一兩砂仁二兩茅蒼朮一兩檳榔一兩薄荷一兩木通二兩甘草一兩陳茶十斤烏藥二兩半夏二兩上藥俱研末各包於五月五日午時用硃砂二錢研細末水飛投入燒酒一大碗攪勻泡淋藥末使勻曬乾貯瓶內每服水煎三錢小兒酌減孕婦忌服或開水泡作茶飲亦可消張子和曰初虞世言凡渴疾未發瘡瘍便用大黃寒藥利其勢使大困火虛自勝如發瘡瘍膿血流漓而消此真格言也故巴郡太守奏三黃丸能治消渴余嘗以隔數年不愈者減去朴硝加黃連一斤大作劑以長流千里水煎五七沸放冷日呷之數百次以桂苓甘露飲白虎湯生藕節汁淡竹瀝生地黃汁相間服之大作劑料以代飲水不日而痊故消渴一症調之而不下則小潤小濡固不能殺炎上之勢下之而不調亦旋飲旋消終不能沃膈膜之干下之調之而不減滋味不戒嗜欲不節喜怒病已而復作能從此三者消渴亦不足憂矣昔有消渴者日飲數斗劉完素以生薑自然汁一盆置之密室中具罌杓於其間使其人入室從而鎖其門病人渴甚不得已而飲之飲盡渴減得內經辛以潤之之旨又內經治渴以蘭除其陳氣亦辛平之劑也劉完素之湯劑雖用此一味亦必有旁藥助之也秦運副云有人消渴引飲無度或令食韭苗其渴遂止法要日吃三五兩或炒或作羹無入鹽極效但吃得十斤即佳苦楝根取新白皮一握切焙入麝少許水二碗煎至一碗空心服之雖困倦不妨自後下蟲三四條狀蛔蟲其色真紅而渴頓止乃知消渴一症有蟲耗其精液者琇按此方神效服之屢驗鄂渚卒祐之患消渴九年服藥止而復作制蘇朴散以白芍甘草等分為末每用一錢水煎服七日頓愈古人處方殆不可曉不可以平易而忽之也經驗方陳日華本草綱目朱丹溪治徐兄年四十歲口乾小便數春末得之夏來求治診其兩手左澀右略數而不強重取似大而稍有力左稍沉略弱而不弦然澀卻多於右喜兩尺皆不甚起此由飲食味厚生熱謂之痰熱禁其味厚宜降火以清金抑肝以補脾用三消丸十粒左金阿魏丸各五粒以薑湯吞下一日六次又以四物湯加參朮陳皮生甘草五味麥冬煎服一日三次與丸藥間服一二日自覺清快小便減三之二口亦不幹止渴未除頭暈眼花坐則腰疼遂以摩腰膏治腰疼仍以四物湯用參耆減川芎加牛膝五味炒柏皮麥冬煎飲調六一散服反覺便多遂去六一散令仍服藥丸而安薛立齋治一貴人病疽疾未安而渴作一日飲水數升教服加減八味丸方諸醫大笑云此藥能止渴吾輩當不復業醫矣皆用木瓜紫蘇烏梅人參茯苓山藥等生津液之藥數劑而渴愈甚不得已用前方服三劑渴止因相信久服不特渴疾不作氣血亦壯飲食加倍強健過於少壯之年薛氏家藏此方屢用有驗竇材治一人頻飲水而渴不止曰君病是消渴也乃脾肝氣虛非內熱也其人曰前服涼藥六劑熱雖退而渴不止覺胸脅氣痞而喘竇曰前症只傷脾肺因涼藥復損傷氣海故不能健運而水停心下也急灸關元氣海各三百壯服四神丹六十日津液頻生方書皆作三焦猛熱下以涼藥殺人甚於刀劍慎之楊賁亨鄱陽人博群書精脈理每心計造方有患飢者諸醫以火症治亨久思之未得頃見堂上木凳自僕乃為濕氣所蒸致朽忽悟水能消物不獨屬火此濕消耳遂投熱劑而愈江西通志孫文垣治一書辦年過五十沉湎酒色忽患下消之症一日夜小便二十餘度清白而長味且甜少頃凝結如脂色有油光治半年無效腰膝以下軟弱載身不起飲食減半神色大瘁脈之六部皆無力經云脈至而從按之不鼓諸陽皆然法當溫補下焦以熟地黃六兩為君鹿角霜山萸肉各四兩桑螵蛸鹿膠人參白茯苓枸杞子遠志菟絲山藥各三兩為臣益智仁一兩為佐大附子桂心各七錢為使煉蜜為丸梧桐子大每早晚淡鹽湯送下七八十丸不終劑而愈或曰凡消者皆熱症也今以溫補何哉曰病由下元不足無氣升騰於上故渴而多飲以飲多小便亦多也今大補下元使陽氣充盛熏蒸於上口自不渴譬之釜蓋釜雖有水必釜底有火蓋乃潤而不幹也一人消中日夜溺七八升鹿角燒令焦為末以酒調服五分日三服漸加至方寸匕一人不時發熱日飲冰水數碗寒藥二劑熱渴益甚形體日瘦尺脈洪大而數時或無力王太僕曰熱之不熱責其無火又云倏熱往來是無火也時作時止是無水也法當補腎用加減八味丸不月而愈張路玉治趙雲舫消中善食日進膏粱數次不能敵其飢勢丙夜必進一餐食過即昏昏嗜臥或時作酸作甜或時夢交精泄或時經日不飲或時引飲不輟自言省試勞心所致前所服皆安神補心滋陰清火之劑不應察其聲音濁而多滯其形雖肥盛色蒼而肌肉綿軟其脈六部皆洪滑而數惟右關特甚兩尺亦洪滑而按之少神此腎氣不充痰濕挾陰火泛溢於中之象遂與加味導痰加蘭麝數服其勢大減次以六君子合左金枳實湯泛丸服後以六味丸去地黃加鰾膠蒺藜平調兩月愈朔客白小樓中消善食脾約便難察其形瘦而質堅診其脈數而有力時喜飲冷火酒此酒之濕熱內蘊為患遂以調胃承氣三下破其蘊熱次與滋腎丸數服滌其餘火遂全安粵客李之藩上消引飲時當三伏觸熱到吳初時自汗發熱煩渴引飲漸至溲便頻數飲即氣喘飲過即渴脈之右寸浮數動滑知為熱傷肺氣之候因以小劑白虎加人參三服勢頓減次與生脈散調理數日而痊薛廉夫子強中下消飲一溲二因新娶繼室真陰灼爍虛陽用事強陽不到恣肆益甚乃至氣急不續精滑不收背曲肩垂腰膀疼軟足膝痿弱寸步艱難糜粥到口即厭惟喜膏粱方物其脈或數大少力或弦細數疾此陰陽離決中空不能主持而隨虛火輒內輒外也與八味腎氣保元獨參調補經年更與六味地黃久服而痊邵某仲夏與婢通因客至驚恐精氣大脫即凜凜畏寒翕翕發熱畏食飲小便淋瀝不禁診之六脈弦細如絲責責如循刀刃此腎中真陽大虧之候令服生料六味稍加桂附以通陽氣咸謂夏暑不宜桂附另延醫峻用人參附子月餘飲食大進猶謂參附得力恣餌不徹遂至日食豚蹄雞鴨七八餐至夜預治熟食飽啖二次如此兩月餘形體豐滿倍常但若時時嘈雜易飢常見青衣群鬼圍繞其側再診脈其脈滑數有力而右倍於左察其形色多滯且多言多笑而語無倫次此痰食壅塞於中復加辛熱助其淫火始見陰虛未傳消中之患也不急祛除必為狂癡之患為制湧痰之劑遲疑不進未幾忽大叫發狂妄見始信言之非謬也許學士云一卒病渴日飲水斗許不食者三月心中煩悶時已十月豫謂心經有伏熱與火府丹數服越二日來謝云當日三服渴止又三服飲食如故此本治淋用以治渴可謂通變也方用生地二兩木通黃芩各一兩蜜丸桐子大每服三十丸木通湯下陸祖愚治李悅吾大便燥年五十餘患消渴症茶飲不能離口小便多大便燥殊不欲食及食後即飢病將一載精神困怠肌膚枯澀自分必死脈之沉濡而澀曰病尚可藥凡人身之津液以火而燥然必以氣化而生前醫純用清涼之品所以不效潔古云能食而渴者白虎倍加人參大作湯劑服之今不能食及食即飢當合二方加升麻佐葛根以升清陽之氣少合桂附以合從治之法每味數兩大砂鍋煎濃汁禁湯飲以此代之此病仲景謂春夏劇秋冬瘥今當盛暑病雖不減亦不劇若依法治之兼絶厚味戒嗔閉關靜養秋冬自愈幸其能守戒忌交秋即瘥至秋末全愈陸養愚治兩廣制府陳公年近古稀而多寵婢且嗜酒忽患口渴茶飲不輟而喜熱惡涼小便極多夜尤甚大便祕結必用蜜導日數次或一塊或二三塊下身軟弱食減肌削所服不過生津潤燥清涼而已脈之浮按數大而虛沉按更無力曰症當溫補不當清涼問消本熱症而用溫補何也曰經謂脈至而從按之不鼓諸陽皆然今脈數大無力正所謂從而不鼓無陽脈也以症論之口渴而喜熱飲便祕而溺偏多皆無陽症也曰將用理中參附乎曰某所言溫補在下焦而非中上二焦也經曰陽所從陰而亟起也又曰腎為生氣之原今恙由於腎水衰竭絶其生化之原陽不生則陰不長津液無所蒸以出故上渴而多飲下燥而不潤前無以約束而頻多後無以轉輸而艱祕食減肌削皆下元不足之過也曰豫未病時痿是腎竭之應既痿之後雖欲竭而無從矣彼雖不悅而心折其言遂委治之乃以八味丸料加益智仁煎人參膏糊丸每服五錢白湯送下日進三服數日溺少十日溺竟如常大便尚燥每日一次不用蜜導矣第口渴不減食尚無味以升麻一錢人參黃耆各三錢煎湯送丸藥數服口渴頓止食亦有味又十日諸症全愈薛立齋曰一男子作渴日飲水數碗冬月亦然彼用加減八味丸去肉桂服之不應一男子患此欲治以前丸彼謂肉桂性熱乃服知柏等藥渴不止背發疽而歿又一男子亦患此症日漸消瘦與前丸數服渴減半一劑而痊再劑形體復壯夫肉桂腎經藥也前症乃腎經虛火炎上無製為患用肉桂導引諸藥以補之及引虛火歸原故效又一男子腳面發痘愈而作渴以前丸治之而愈又一富商稟賦頗厚素作渴日飲水數碗面發一毒用消毒藥潰而難愈尺脈尚數渴亦不止時孟秋謂此火旺水涸之脈也須服加減八味丸以補腎水而制心火庶免疽毒之患彼不信至夏果腳背發疽脈數按之則澀而無力足竟黑腐而死一男子稟頗實乏嗣服附子等藥致作渴左足大趾患疽色紫不痛脈亦數而澀亦死大抵發背腦疽腫痛色赤水衰火旺之色尚可治若黑若紫火極似水之象也乃腎水已竭精氣已衰不治外科精要云凡病疽疾之人多有既安之後忽發渴疾而不救者十有八九疽疾將安而渴疾已作宜服加減八味丸既安之後而渴疾未見宜先服之以防其未然薛兒聞其父云一士夫病渴疾諸醫皆用渴藥纍載不痊有一名醫教食加減八味丸不半載而愈一老人冬月口舌生瘡作渴心脈洪大而實尺脈大而虛此消症也患在腎須加減八味丸補之否則後發疽難療不信乃服三黃等藥降火次年夏果發疽而歿東垣曰膈消者以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數脈訣云乾渴飲水多食亦飢虛成消中者調胃承氣湯三黃丸治之下消者煩躁引飲耳輪焦乾小便如膏脂又云焦煩水易虧此腎消也六味地黃丸治之總録所謂未傳能食者必發腦疽背瘡不能食必傳中滿鼓脹皆謂不治之症潔古老人分而治之能食而渴者白虎加人參湯不能食而渴者錢氏白朮散倍加葛根治之土中既平不復傳下消矣前人用藥厥有旨哉或曰未傳瘡疽者何也此火邪盛也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死一婦人面患毒焮痛發熱作渴脈數按之則實以涼膈散一劑少愈以消毒藥數劑而平一男子肩患疽作渴脈數有力以黃連解毒湯三劑而止更以仙方活命飲四劑而愈一男子潰瘍後而煩渴以聖愈湯二劑而寧以人參黃耆當歸地黃四劑止渴以八珍湯二十劑而愈大抵潰後有此症屬氣血不足須用參耆以補氣歸地以養血若用苦寒之劑必致有誤一男子患毒作渴右關脈數以竹葉黃耆湯治之而愈更以補中益氣湯加黃芩而痊一男子潰後口乾遇勞益甚以補中益氣湯加五味麥冬治之而愈更以黃耆六一湯而斂繆仲淳治湖州庠友張時泰正月間驟發齒痛十餘日而愈四月間焦勞過多齒痛大作醫用石膏知母等藥不效用力去齒間紫血滿口齒痛不可忍齒俱搖動矣至六七月間飲水益多小便如注狀如膏肌肉盡消至十一月身不能起冬末用黃耆地黃等藥稍能起立然善食易飢如故小便如膏亦如故今年二三月愈甚亦不服藥齒痛如故當門二齒脫落復加口渴晝夜不止此中下二消症也為立方未數劑而瘳麥冬蘆根各五兩五味地黃各三錢黃耆五錢生地六錢天冬一兩用繅絲湯十碗煎二碗不拘時服丸方於前藥中加黃柏三兩牛膝五兩沙參六兩枸杞四兩五味六兩蜜丸常服遂不復發張景嶽治省中周公山左人也年逾四旬因案牘積勞致成羸疾神困食減時多恐懼自冬祖夏通夕不寐者半年有餘而上焦無渴不嗜湯水或有所飲則沃而不行然每夜必去溺二三升莫知其所從來其半皆脂膏濁液尫羸至極自分必死診之脈猶帶緩肉亦未脫知其胃氣尚存慰以無慮乃用歸脾湯去木香及大補元煎之屬一以養陽一以養陰出入間用至三百餘劑計服人參二十斤乃得全愈此神消於上精消於下之症也可見消有陰陽不得盡言為火喻嘉言曰友人病消渴後渴少止反加躁急足膝痿弱豫主白茯苓丸方用白茯苓覆盆子黃連栝蔞根萆薢人參熟地元參各一兩石斛蛇床子各七錢五分雞䏶胵三十具微炒為末蜜丸梧桐子大食前磁石湯下三十丸內加犀角有醫曰腎病而以黃連犀角治心毋乃倒乎豫曰腎者胃之關也胃熱下傳於腎則關門大開心之陽火得以直降於腎心火灼腎燥不能濡豫用犀角黃連對治其下降之陽光寧為倒乎服之果效再服六味地黃丸加犀角而肌澤病起矣魏玉橫曰胡天敘年五旬素豪飲而多思慮自弱冠後即善病近則兩足及臂常時痹痛甚則肝腎之氣上逆或致暈厥汗出不寐齒痛齦露夜臥陽事暴舉時時夢遺面有油光揩去復爾脈之兩手俱豁大關前搏指據症脈乃二陽之發心脾今已傳為風消矣詢其小便云頗清白令以器貯逾時觀之果變稠漿面結腐皮遂恐甚告以平昔洪飲縱欲勞神數十年所服桂附純陽之藥不可勝計未知尚能愈否曰幸未至息賁但能斷飲絶欲多服養榮之劑尚可為也今病但有春夏而無秋冬非兼清肅之治不可乃與生熟地杞子麥冬沙參地骨知母黃柏黃連石膏出入增減十餘劑諸症漸平惟齒痛轉甚自制玉帶膏貼之而愈次年因診其媳産病告以前方出入常服計用石膏不下四五斤矣此則初為寒中後為熱中之變症也然初之桂附未為癰疽豈非天幸乎黃錦芳治遊晝山消渴六脈微緩而沉肺脈尤甚肝脈差起小便甚多肌肉消瘦煩渴不止此必初病時過服石膏知母花粉蔞仁貝母犀角等苦寒之藥傷其肺胃及腎以致地氣不升天氣不降宜滋陰補氣使漏卮不至下泄用當歸一錢炙耆四錢升麻三分玉竹三錢桂元十個桑螵蛸一錢龍骨一錢菟絲二錢龜板一錢木瓜四分炙草三分使其二氣交合霖雨四布則病自愈囑其日服一劑禁服苦茶後病者以洋參代人參服之甚效黃疸黃疸之病以十八日為期治十日已上宜瘥反劇為難治竇材治一人遍身皆黃小便赤色而澀灸食竇穴五十壯服薑附湯全真丹而愈沈以潛葛可久俱神醫也一日有老嫗患黃疸詣沈求治曰吾固未之能薦於葛葛延沈飲以針針其左右乳下而與沈飲者傾刻時出啓左針而左半身肉色瑩然啓右針而右半身肉如左漱石間談張子和治一男子作贅偶病疸善食而瘦四肢不舉面黃無力其婦翁欲棄之其女子不肯曰我已生二子矣更他適乎翁本農者召壻意欲作勞見其病甚每日辱詬人教之餌膽礬丸三稜丸了不關涉針灸祈禳百無一濟張見之不診而療使服湧劑去積痰宿水一斗又以瀉水丸通經散下四五十行不止命以冰水一鍾飲之立止服平胃散等間服檳榔丸五七日黃退力生蓋脾疸之症濕熱與宿谷相搏故也俗謂之金勞黃周黃劉三家各有僕病黃疸張曰僕役之職飲食寒熱風暑濕氣尋常觸冒恐難調攝虛費治功其二家留僕於張所從其餘餌一僕不離主人執役三人同服苦散以湧之又服三花神佑丸下之五日之間果二僕愈一僕不愈如其言一女子病黃遍身浮腫面如金色困乏無力不思飲餌惟喜食生物泥煤之屬先以苦劑蒸為餅丸湧痰一碗又以舟車丸通經散下五七行如墨汁更以導飲丸磨氣散數日肌肉如初趙君玉病遍身發黃往問醫者醫云君乃陽明症公等與麻知幾皆受訓於張戴人是商議吃大黃者難與論病君玉不悅歸自揣無別病乃取三花神祐丸八十粒服之不效乃悟曰豫之濕熱盛矣此藥尚不能動以舟車丸浚川散作劑大下一斗糞多結者一夕黃退君玉由此益信戴人之言孫文垣治王文川子原傷飲食又傷冷菱等物遍身黃如金色夜發熱天明則退腹痛手不可近醫擬進草藥孫曰此症乃食積釀成而黃為濕熱所致法當健脾用溫暖之劑下之草藥性寒是損脾土而益其疾也用保和丸一錢入備急丸五分作數次服之少頃瀉一次又少頃連下三次積物甚多腹痛盡止再與調中丸服一月病愈而輕健如常孫竹野途次受暑又為酒麴所傷因作吐胸膈痞悶醫以消導之劑燥動脾火口渴嘈雜躁亂不安目珠如金一身盡黃已成疸症右寸脈滑大有力用溫膽湯倍加香薷滑石葛根解暑止吐為君黃連麥冬清熱止渴為臣使濕熱散而黃自瘳也服三帖吐止食進再與五苓散加青蒿葛根滑石黃連枳實八劑而黃盡退張仲文治一婦人年六十歲病振寒戰栗足太陽寒水也呵欠噴嚏足少陽膽也口亡津液足陽明不足也心下急痛而痞手太陰受寒足太陰血滯也身熱又欲近火熱在皮膚寒在骨髓也臍下惡寒丹田有寒渾身黃及睛黃皆寒濕也餘症驗之知其為寒濕溺黃赤而黑又頻數乃寒濕盛也病來身重如山便著床枕者陰濕盛也其脈右手關尺命門弦細按之洪而弦弦急為寒加之細者北方寒水雜以緩者濕盛出黃色也脈洪大者心火受制也左手又按之至骨舉手來實者壬癸腎旺也六脈按之但空虛者下焦無陽也用藥法先宜以輕劑去其寒濕兼退其洪大之脈以理中加茯苓湯投之朱丹溪治一婦人年二十八歲發黃脈澀經水自來不行身體倦怠未曾生子用陳皮白朮木通各一兩黃芩歸頭丹皮半兩甘草一錢分作十二帖水煎食前熱服一人年二十歲因勞又冒雨得疸症腳痠心悸口苦力弱尿黃脈浮而數病在表宜解外黃耆三錢白朮蒼朮各一錢陳皮蘇葉木通各五分山梔炒二錢甘草稍五分白水煎服下保和十五丸與點抑青各十丸溫中二十丸而愈一婦人年三十面黃腳痠弱口苦喜茶月經不勻且多倦怠用黃耆甘草各三錢人參當歸白芍各一錢木通陳皮各五分白朮一分炒柏秦艽各二分一婦人年六十面黃倦甚足酸口苦脈散而大此濕傷氣也白朮半兩陳皮四錢蒼朮木通黃芩各三錢人參川芎各二錢黃柏炒一錢甘草炙五分分六帖水煎食前服王官人痞後面黃腳痠弱倦怠食飽氣急頭旋黃耆甘草木通各二分白朮一錢半夏厚朴陳皮蒼朮各一錢黃柏炒三分水煎服成庚五官面黃腳痠無力食不化腳虛而少力口苦肚脹宜補之人參木通各三分白朮一錢五分當歸白芍川芎陳皮蒼朮各五分甘草二分水煎下保和丸四十丸孫文垣治一人因冒雨勞力汗出又以冷水澡浴因發熱口渴心與背脹痛小水長而赤舌苔黃不眠目黃如金皮膚盡黃或謂年高不敢與治診得左脈浮數熱右濡弱濕皆七至濕熱相併此濕熱發黃症也病雖重年雖高猶可為以柴胡三錢太重否酒芩葛根青蒿香薷花粉各一錢人參七分甘草五分連進二劑得微汗次早即熱退其半舌稍淡潤身黃未退胸膈餘熱作煩以竹茹青蒿葛根各一錢人參麥冬花粉知母各八分白芍六分二帖熱退食進精神陡長後與補中益氣湯加青蒿麥冬花粉十帖黃盡退頓痊一人患酒疸遍身皆黃尿如柏汁目如金汗出沾衣如染胸膈痞悶口不知味四肢痠軟脈濡而數以四苓散加厚朴陳皮山楂麥芽葛根倍青蒿水煎臨服加萱草根自然汁一小杯四帖頓愈一人病後身面俱黃吐血成盆熱鬱陽明諸藥不效用螺十個水漂去泥搗爛露一夜五更取清汁服二三次血止黃愈小山怪症方本草綱目外臺祕要治三十大黃急救方用雞子一顆連殼燒灰研酢一合和之溫服鼻中蟲出為效身體極黃者不過三枚神效柴嶼青治覺羅瑪德夫人病疽醫投茵陳五苓散未效又合末藥服之肌膚白眼皆如金色轉致不思飲食右關緩弱特甚柴曰胃為水穀之海脾為倉廩之官腑臟失職濕熱滋甚今惟有調其土使能健運濕熱自去不必治疸而疸自愈矣用六君子湯加厚朴炮薑以溫中神麯麥芽以助戊己之化不數劑而全愈東垣曰戊申春一婦人六十歲病振寒戰栗太陽寒水客也呵欠噴嚏足少陽溢口亡津液足陽明不足也心下急痛而痞手足太陰受寒也故急痛太陰血滯為痞身熱近火熱在皮表寒在骨髓故振寒戰栗也臍下惡寒丹田有寒渾身黃而白睛黃寒濕也以餘症推之知其寒也溺黃赤而黑頻數寒濕盛也自病來身重如山便著床枕至陰濕盛也其診脈得左右關並尺命門中得弦而急極細雜之以洪而極緩弦急為寒加之以細者北方寒水雜以又洪大者心火受制也緩甚者濕盛出黃色也左手按之至骨舉止來實者壬癸俱旺也六脈按之俱空虛者下焦無陽也先以輕劑去其中焦寒濕兼退其洪大脈理中湯加茯苓是也水煎冰之令寒服之謂之熱因寒用假寒以對足太陽之假熱也以乾薑之辛熱以瀉真寒也故曰真對真假對假若不愈當以朮附湯冰之令寒以補下焦元氣也試效方醫説續編陸祖愚治潘巨源食量頗高恣肆大嚼因勞役失飢傷飽每患脾胃之症或嘔或瀉恬不介意後成黃疸用茵陳五苓散治之而症仍前飲食不節疸症復作人傳一方以苦藥葫蘆煮服之即效試之果然仍力疾生理後試之至再至周身熏黃肚腹如鼓而卒薛立齋治大司徒李浦汀南吏部少宰時患黃疸當用淡滲之劑公尚無嗣猶預不決曰有是病而用是藥以茵陳五苓散加芩連山梔二劑而愈至辛卯得子應天王治中遍身發黃妄言如狂苦於胸痛手不可近此中焦蓄血為患用桃仁承氣湯一劑下瘀血而愈又太守朱陽山弟下部蓄血發狂用抵當湯而愈馬元儀治沈玉格患疸症一身及面目悉黃微見黑滯煩渴腹滿脈之左弦數右空大此內傷發黃為厥陰肝木太陰脾土二臟交傷之候也夫肝鬱則生熱脾鬱則生濕濕熱交爭而煩渴腹滿發黃之症生矣至黑色兼見於面則並傷其腎汗之下之非其治也宜平肝之亢扶土之虛兼解鬱熱以清氣道除濕蒸而和中氣用人參三錢白朮二錢白芍一錢黃連山梔七分歸身丹皮茵陳秦艽各一錢柴胡七分炙草五分半夏曲一錢服三十劑愈顧奉常務遠目黃脾氣弱仲淳疏方用茵陳三錢人參三錢薏仁三錢蓮肉三錢木通八分黃連酒炒一錢山梔炒八分白朮土炒一錢石斛酒蒸三錢皆治疸之劑以事冗未服既而身目皆黃小便亦赤乃服仲淳先見飲前藥稍愈一按摩者投以草汁藥酒脾敗遂不起臨歿下瘀血數升亦蓄血症也以其年邁不絶欲故耳前方尚有茯苓二錢施靈修乃兄七年前曾患疸症服草藥愈後復發坐多氣多勞故草藥不效服田螺汁服一日夜大作寒熱因發渴小便如油眼目黃且赤手足黃紫仲淳以瘀血發黃服藥後大小便通黃及渴俱減橘紅一錢五分紅曲炒研二錢山楂五錢鬱金汁十五匙薏苡六錢木瓜三錢牛膝五分麥冬五錢車前二錢五分赤茯三錢通草五分白芍酒炒四錢竹茹二錢河水二鍾煎八分飢時服三日後加人參三錢廣筆記魏玉橫曰徐環薇年二十餘病疸服山梔茵陳五苓六一之劑將兩月不效脈之弦細而駛面目爪甲俱淡黃語言遲倦謂之曰君以黃疸求治此其餘症耳今病成勞損矣乃竦然曰誠有之近來夜臥不寧晚即發熱黎明始退咳嗽痰稀腰膝疼痛然治之當奈何曰病緣陰虛火盛肝熱久郁移其所勝故食少便溏發為黃症與酒谷諸疸為濕熱熏蒸者不同乃服苦寒滲利重傷其陰致成勞損今宜峻養肝腎俾嗽止熱退食進便調而黃自消矣與集靈膏加減十餘劑諸症漸退黃亦愈矣金魯膽年四十餘館於時醫湯靜公宅病疸諸治不效已歷數醫最後一人與草頭方四味中有六月雪余忘之矣服之增劇脈之軟無神略數外症目黃如橘面額則黃而黑暗腹大臍凸便溏食少動則氣促知為脾腎兩虧近乎女勞一症乃疸中最難治者也與熟地山藥各一兩杞子棗仁米仁各五錢彼疑太補持以問湯湯老醫也謂曰方極是第吾輩素不用此姑試之一劑減二劑又減再診脈漸起仍前方八劑全愈朱天一年二十餘喜食糖及燥炙諸餅忽病黃面目如金脈之兩關數實有力尺滑大便六七日不行小便黃澀此敦阜太過燥熱如以素瓷覆火其色必黃非濕症也與小承氣湯加當歸白芍一劑便行而瘥治黃疸方蒼耳子薄荷木通茵陳谷三錢用好陳酒一斤煎一碗沖砂仁末三錢服若小便赤若血水者加川連一錢同煎裴兆期曰凡瀉病痢病蟲病疳病水病酒病疸病於初愈時斷不可驟服滋補之藥蓋此數症以濕為本滋補之藥乃助濕熱之尤者驟服之少不致害昔當湖一孝廉余通家世好也為人偏滯多思無事而恆戚戚偶於甲午秋病疸後雖治愈而飲食未能復原則脾尚虛而濕未清也值公車北上一醫以天王保心丹數斤為贐一往舟中餌無虛日漸覺胸膈窒礙飲食日減入春而疸病復作逮歸而形容枯稿僅存皮骨其腹龐然按之如石此余往視則真氣已衰敗無餘無可措手矣越旬而歿此亦誤投滋補之一驗也赤丹又名風疸又名赤遊風又名赤瘤孫思邈曰貞觀七年三月豫在內江縣飲多至夜覺四體骨肉疼痛至曉頭痛額角有丹如彈丸腫痛至午通腫目不能開經日幾斃豫思本草蕓薹治風遊丹腫遂取葉搗敷隨手即消其驗如神亦可搗汁服之一云無葉用子研代之張子和治黃氏小兒面赤腫兩目不開以扉針刺輕砭之除兩目尖外亂刺數十針出血乃愈此法人多不肯從必治病不可謹護朱丹溪治一中年男子癰潰後發熱乾嘔背發丹熛用諸般敷貼丹熛藥乃用刀於個個丹頭出血皆不退後用半夏生薑加補劑治嘔不效遂純用參半兩歸術各一錢五分濃煎一帖嘔止二三帖丹漸緩熱漸減約五十餘帖熱始除神氣始復飽允中年五十歲風丹癢甚腹微痛咽不利面目微腫五六日不退兩寸脈滑大實右浮大左浮弦小以炒芩炒連四物枳梗甘草鼠黏紫葳各一錢防風黃耆各五分凡五六帖而安黃師文治一婦人苦風丹每酒沾唇則風丹重造而起癢刺骨殆不可活令服五積散約數服以杯酒試之如其言飲酒已丹不作德昭一婢亦苦風丹亦以此聞其説遂服五積散亦疾又師文用五積散治産瀉有奇功北窗炙輠薛立齋治一婦人素清苦因鬱怒患遊風晡熱內熱自汗盜汗月經不行口乾咽燥此鬱氣傷脾乃以歸脾湯數劑諸症稍退後兼逍遙散五十餘劑而愈一婦人患此性躁寒熱口苦脅痛耳鳴腹脹溺澀乃肝脾血虛火旺也用六君加柴胡山梔龍膽數劑更與逍遙散兼服漸愈又與六味丸逍遙散七十餘劑諸症悉退一婦人患前症誤服大麻風藥破而出水煩渴頭暈誠類風症六脈洪數心脾為甚曰風自火出此因怒火脾胃受邪血燥而作非真風症也與逍遙散六味丸以清肝火滋脾血生腎水而愈一婦人患前症久不愈食少體倦此肝脾虧損陰虛發熱也先用補中益氣湯加川芎炒梔元氣漸復更以逍遙散而瘡漸愈一婦人患赤遊風晡熱癢甚用清肝養血之劑不信乃服大麻風藥臂痛筋攣又服化痰順氣之劑四肢痿弱又一婦患前症數用風藥煎湯泡洗以致腹脹並歿一女子十五歲患瘰癧赤暈形氣倦怠此肝火血虛所致用加味逍遙散而赤暈愈用益氣湯六味地黃丸而瘰癧消一婦人身如丹毒搔破膿水淋漓熱渴頭暈日晡益甚用加味逍遙散而愈
