body:
  text: 卷二中寒萬密齋治一婦人病至十三日其家人來求藥告以病狀初苦頭痛到今十日昏睡不醒喉中痰響手足俱冷其身僵直萬思之時辛酉二月朔後平地雪尺余此婦元氣素弱必因遠行而得三陰脈從腹下走足也問之果於初三日冒雪往親戚家歸即病曰此寒邪中足少陰厥陰二經也默默喜睡者足少陰腎病也頭苦痛厥逆僵直痰響者足厥陰肝病也乃以十全大補湯去地黃白芍加細辛半夏乾薑與三劑去五日來謝曰病安矣吳孚先治一人傷寒頭痛不發熱乾嘔吐沫醫用川芎藁本不應吳曰此厥陰中寒之症乾嘔吐沫厥陰之寒上干於胃也頭痛者厥陰與督脈會於顛寒氣從經脈上攻也用人參大棗益脾以防木邪吳茱萸生薑入厥陰以散寒邪且又止嘔嘔止而頭痛自除設無頭痛又屬太陰而非厥陰矣直中病但有少陰症反發熱一人患厥陰直中四肢厥冷脈細欲絶爪甲青紫但不吐利與四逆湯至三日四肢暖甲紅髮熱脈轉實數有力此陰極陽生也使與涼劑病家疑一日寒溫各異不肯服至九日熱不退熱利下重飲水不輟再求診用白頭翁秦皮黃連黃柏各二錢一帖減二帖痊真寒症斷無飲水下痢之變按肢冷脈伏恐是陽厥至爪甲青紫則是欲戰汗也四逆湯之誤特隱而不彰耳余有凌二官案可參凌二官即熱病門之凌表侄吳孚先治汪掖蒼母忽心腹奇痛異常左右脈弦緊用二陳去甘草加肉桂乾薑木香病不減次日寒熱交作往來如瘧熱已復寒寒已復熱晝夜無度脈轉疾數前方加人參五錢附子二錢不應復增參至一兩附子至五錢脈反漸脫吳謂少陰中寒當與參附今不效畢竟病深藥淺之故時有醫者四人一欲用枳實貝母一欲用全蠍防風一欲用八味丸一欲用人參黃耆各八分肉桂四分附子三分吳曰業已泄瀉反用枳實虛極汗多反用全蠍此二人全不知病八味丸系調理之藥尚在未著參耆桂附庶幾合症但杯水車薪曷克有濟夫用藥如用兵沖堅搗厚非猛士多多不可李信之敗可鑑也用耆四兩煎湯代水人參四兩附子二兩煎膏時病人面色如妝汗出如珠六脈俱脫呼吸全無牙關緊閉幸太溪脈尚在乃以箸抉齒灌半鍾移時又進半鍾猶防脈之暴出也既而重按兩尺隱躍指端乃曰脈漸出大有起色矣復進半鍾自午至晚方眼開語出欲啜粥已而反畏寒喉痛頻索冷水或疑是火曰畏寒者真情索冷者假象少陰脈循喉嚨邪客其絡令人咽痛今寒邪由臟出經病將退耳仍前方加桔梗甘草而痛止自後每日參必一兩附必三錢調理百日而愈愈後遍體發疹挾生疙瘩奇癢異常爬搔不輟不寐汗多用六君子另將黃耆二兩煎湯煮藥十日不應汪檢準繩風疹門與閲俱系風藥並無補方曰神而明之存乎其人不可泥也仍守前方數劑霍然馬元儀治陸濟臣患症甚篤診之兩脈虛微自汗厥逆面青唇青厄逆不止此少陰真陽素虧寒邪直中之候也陰寒橫發上干清道旁逆四末甚為危厲兼以自汗不止虛陽將脫法當用桂附理中湯以消陰攝陽陽既安位則群陰畢散矣是夜連進二劑脈漸起汗漸收五六劑症始霍然吳洋治結林潘氏子始強早起有事牖下尋病作頭痛惡寒諸飲食自鼎沸中致之不盡三之一其一以為寒矣即人嘗之莫不糜爛彼口舌自如當暑衣重裘猶以為薄衆醫纍治不效乃迎洋曰病由下虛病寒氣深入固結不散法當不治即幸而可治不出三年尋以溫補劑愈之參附輒倍他藥其後復病而卒終三年太函集竇材治一人患肺傷寒別名頭疼發熱惡寒咳嗽肢節疼脈沉緊服華蓋散黃耆建中湯略解至五日昏睡譫語四肢微厥乃腎氣虛也灸關元百壯服薑附湯始汗出愈一人傷寒昏睡妄語六脈弦大竇曰脈大而昏睡定非實熱乃脈隨氣奔也強為之治用烈火灸關元穴初灸覺痛至七十壯遂昏睡不痛灸至三鼓病人開眼思飲食令服薑附湯至三日後方得元氣來復大汗出解一人患傷寒至八日脈大而緊發黃生紫斑噫氣足趾冷至腳面此太陰症也最重難治為灸命關五十壯關元二百壯服金液丹鍾乳粉四日汗出而愈一人患傷寒至六日脈弦緊身發熱自汗太陰症也先服金液丹點命關穴病人不肯灸傷寒惟太陰少陰二症傷人最速若不早灸服藥無功不信至九日瀉血而死一人傷寒至六日微發黃一醫與茵陳湯次日更深黃色遍身如梔子此太陰症誤服涼藥而致肝木侮脾為灸命關五十壯服余液丹而愈一人患傷寒初起即厥逆脈一息八九至諸醫以為必死竇曰乃陰毒也厥逆脈數斷為陰毒必有爪青吐利蜷臥等症與薑附湯一盞至半夜汗出而愈若以脈數為熱而下涼藥必死無疑中風黃帝問岐伯曰中風半身不遂如何灸答曰凡人未中風一兩月前或三五月前非時足脛上忽酸重頑痹此中風之候急灸三里絶骨四處三壯後用薄荷蔥桃柳葉煎湯淋洗驅逐風氣於瘡口中出灸瘡春較秋灸常令兩腳有瘡為妙凡人不信此法飲食不節酒色過度忽中此風言語謇澀半身不遂宜七處齊下火灸各三壯風在左灸右在右灸左百會耳前髮際肩井風市三里絶骨曲池七穴神效不能具録依法灸之無有不愈醫説續編論徐平中風不省得桃源主簿為灸臍中百壯即神闕穴多灸良凡灸先以鹽實之始蘇更數月乃不起鄭紏云有一親表中風醫者為灸五百壯而蘇後年八十餘使徐平灸三五百壯安知其不永年耶同上範子默自壬午五月間口眼喎邪灸聽會等三穴即正右手足麻無力灸百會髮際等七穴愈次年八月間氣塞涎上不能語金虎丹膩粉服至四丸半氣不通涎不下藥從鼻中出魂魄飛揚如墜江湖中頃刻欲絶灸百會風池等左右頰車共十二穴氣遂通吐涎幾一碗許繼又十餘行伏枕半月餘遂平爾後又覺意思少異於常心中憒亂即便灸百會風池等穴立效本事方云十二穴謂聽會頰車地倉百會肩顒曲池風市足三里絶骨髮際大椎風池也用之立效同上鄉里有人忽覺心腹中熱甚急投藥鋪説其狀鋪家以為此中風之候與治風藥而風不作豫中心藏之至夷陵見一太守夏中忽患熱甚不免以水灑設簟臥其上令人扇之次日忽中風數日而殂人皆咎其臥水簟上而用扇也暨到澧陽見一老婦人夏中亦患熱夜出臥廳上次日中風偶其子預合得小續命湯服之愈乃知中風由心腹中多大熱而後作也以上並資生經嶽鄂鄭中丞頃年至潁陽日食一頓熱肉便中暴風外甥盧氏為潁陽尉有此方當時便服得汗隨瘥神效其方用緊細牛蒡根取時須避風以竹刀或荊刀刮去土用生布拭淨搗絞取汁一大升和灼熱好蜜四大合溫分為兩服每服相去五六里初服得汗汗出便瘥本草同上新武義唐丞季潤名灌雲切記風中人不可便服風藥氣中人不可便服氣藥或覺有此症候急用真好麝香肉三錢乳鉢研令極細以真清麻油不拘多少調令稀薄可飲為度即令患人一服頓盡須辨菜子油不可用藥少即見效遲如牙關緊撬開灌入蘇省然後服紫湯其方用川獨活刷洗去沙土薄片切以豆淋酒煎濃汁服之纍服至一二斤無害服此二藥永無手足偏廢語言謇澀之患後見得是中風只服小續命湯之類見得是中氣只須服勻氣散自然無事也渠作漢東教官得之太守張少衛云屢試有驗季潤亦以治數人矣云麻油麝香煎五積散是齋方同上羅謙甫曰按察書史李仲寬年逾五旬至元己巳春患風症半身不遂四肢麻痹言語謇澀精神昏憒一友處一法用大黃半斤黑豆三升水一斗同煮豆熟去大黃新汲水淘淨黑豆每日服二三合則風熱自去服之過半又一友云通聖散四物湯黃連解毒湯相合服之其效尤速服月餘精神愈困又增喑啞不能言氣冷手足寒命豫診視細詢前由盡得其説診之六脈如蛛絲謂之曰夫病有表裡虛實寒熱不等藥有君臣佐使大小奇偶之制君所服藥無考憑故病愈甚今為不救君自取耳未幾而死有曹通甫外郎妻蕭氏六旬有餘孤寒無依春月忽患風疾半身不遂語言謇澀精神昏憒口眼喎邪與李仲寬症同豫刺十二經井穴接其經絡之不通又灸肩井曲池詳病時月日處藥服之減半豫曰不須服藥病將自愈明年春於張子敬郎中家見其行步如故豫嘆曰一夫人病得全者不亂服藥之力由此論之李仲寬亂服藥終於不救蕭氏貧困恬淡自如而獲安內經曰用藥無據反為氣賊聖人戒之姚雪齋舉許先生魯齋之言富貴人有二事反不如貧賤人有過惡不能匡救有病不能醫療噫其李氏之謂歟陳自明治一婦人中風牙關緊急痰涎溢出與神仙太乙丹一粒服之而愈方見蠱門宋時東京開河掘得石碑梵書大篆一時無能曉者真人林靈素逐字辨繹乃是治中風方名去風丹也詩云天生靈草無根干不在土間不在岸始因飛絮逐東風泛梗青青飄水面神仙一味去沉疴採時須在七月半選甚癱風與大風些小微風都不算豆淋酒化服三丸鐵鏷頭上也出汗其法以紫色浮萍曬乾為末煉蜜和丸彈子大每服一粒以豆淋酒化下治左癱右瘓三十六種風偏正頭風口眼喎邪大風癩風一切無名風及腳氣並打撲傷折及胎孕有傷服過百粒即為全人此方後人易名紫萍一粒丹此與豨蘞草丸相類亦惟實症可用虛者未必宜也本草綱目許叔微云範子默記祟寧中凡雨中風始則口眼喎邪次則涎潮閉塞左右共灸十二穴得氣通十二穴者謂聽會頰車地倉百會肩顒曲池風市足三里絶骨髮際大椎風池也依而用之無不效醫學綱目高評事中風頗緩張令湧之後服鐵彈丸在普濟加減方中或問張曰君常笑人中風服鐵彈丸今以用之何也張曰此收後之藥也今人用之於大勢方來之時正猶蚍蜉撼大樹不識次第故也潁長吏病口眼喎邪張療之目之斜灸以承泣口之喎灸以地倉俱效苟不效者當灸人迎夫氣虛風入而為偏上不得出下不得瀉真氣為風邪所陷宜灸內經曰陷下則灸之正謂此也所以立愈又東杞一夫亦患此脈其兩手急數而弦張甚力而實其人齒壯氣充與長吏不同蓋風火交勝乃調承氣湯六兩以水四升煎作三升分四服令稍熱啜之前後約瀉四五十行去一兩盆次以苦劑投之解毒數服以升降水火不旬日而愈王克明治廬守王安道中風噤不語他醫望而去克明曰此非湯劑可及燒地灑藥畀安道其上須臾而蘇江西通志李東垣治董監軍寒月忽覺有風氣暴僕診得六脈俱弦甚按之洪實有力其症手攣急大便閉澀面赤熱此風寒始至加於身也四肢者脾也風寒之邪傷之則筋攣本人素嗜酒內有實熱乘於腸胃之間故大便閉澀而面赤熱內則手足陽明受邪外則足太陰脾經受風寒之邪用桂枝甘草以卻寒邪而緩其急搐黃柏之苦寒以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明經不令遏絶更以桂枝辛熱入手陽明經為引用潤燥復以白芍甘草專補脾氣使不受風寒之邪而退木邪專益肺筋也加人參以補元氣為之輔佐加歸身去裡急而和血潤燥名活血通經湯桂枝二錢白芍五分余皆一錢水二鍾半煎至一鍾乘熱服之令臥暖房中近火摩搓其手乃愈宋瑞州楊某醫道盛行招者相繼郡守得危疾夜急招之楊適醉歸不能升車裹藥授介旦起盥面不見澡豆而所裹藥在焉方知其誤而郡守謝禮至矣蓋郡守得卒風證澡豆中有皂角去風也墅談荊和王妃劉氏年七十病中風不省人事牙關緊閉群醫束手李時珍尊人太醫吏目月池翁診視藥不能入口自午至子不獲已打去一齒濃煎藜蘆湯灌之少頃噫氣一聲遂吐痰而蘇調理而愈本草綱目龔子才治桑環川劉前溪年近五旬而桑多欲劉嗜酒其脈左手俱微人迎盛右脈滑大時常手足痠麻肌肉蠕動此氣血虛而風痰盛也謂三年內俱有癱瘓之患因勸其服藥謹慎以防未然桑然其言每年制搜風順氣丸此藥亦未可常服延齡固本丹各一料後果無恙劉不信縱飲無忌未及三年果中風卒倒癱瘓語澀與養榮湯加減並健步虎潛丸兼服年餘始愈萬密齋治蕭敬吾庚戍冬得風疾醫治之未盡辛亥春右肩膊抽掣唇吻隨動診之脈浮緩而澀此風邪在太陰經也右寸浮而澀肩膊動者肺病也手太陰右關脈緩唇動者脾病也足太陰以黃耆蜜炙白芍酒炒甘草炙作大劑服之問何以不用治痰之藥曰此緩而治本也蓋氣傷衛肺者衛氣之主也黃耆之甘溫以補肺白芍味酸曲直作酸酸者甲也甘草味甘稼穡作甘甘者己也所以補脾經曰諸風振掉皆屬於肝肝苦急急食甘以緩之故用甘草肝欲收酸以收之故用白芍乃守法調理至初夏而安孫文垣治吳勉齋體肥腴嗜炮炙任性縱欲年六七十極躁急一日跌傷齒恬不為意後連跌兩次將中而頻眩暈也次日晚左手足忽不能動口眼喎邪診之左洪大右緩大其色蒼黑神昏鼾呼呼長而吸短呼至口氣勃勃出不能回終日偃臥如醉人問曰此非半身不遂乎曰症甚惡不特此也半身不遂者中風已過之疾其勢仍緩亦有十餘年無恙者今才病勢便若此乃中風之漸方來且不可測與六君子加全蠍殭蠶天麻兩日無進退間作吐前藥再加竹茹兩日神始蘇欲言而舌不能掉前藥加石菖蒲遠志紅花始能進粥數口夜與正舌散同前藥飲之又三日能坐粥亦頗加言尚謇澀以筆書我左手痛甚大小便艱少又用四君子加陳皮竹茹當歸白芍紅花鉤藤天麻服三日神思大好飲食日加服彌月手痛減語言亦漸清惟大便十日一行此血少之故補養久自當瘥病人常自言吾病乃痰在膈間安得一吐為快蓋肝腎之氣上浮病者不知誤認為痰不用峻劑養陰俾龍雷之火下歸元海之過也孫曰據脈乃大虛證非痰為害不可輕吐有醫謂是病痰吐而後補可以全瘳不然必成痼疾病人欲速效決意吐之家人不能阻一吐而煩躁猶曰吐不快耳須大吐始可再吐而神昏氣促汗出如雨竟斃矣程曉川客湖州四十誕辰徵妓行酒宴樂彌月一日忽覺兩小指無力掉硬不舒且不為用口角一邊常牽引診之六脈皆滑大而數浮而不斂其體肥面色蒼紫據脈滑大為痰數為熱浮為風蓋濕生痰痰生熱熱生風也以善飲故多濕近女故真陰竭而脈浮中風之症已兆喜面色蒼紫神藏猶可治宜戒酒色以自保愛以二陳湯加滑石為君芩連為臣健脾消痰撤濕熱從小便出加膽星天麻以定風竹瀝薑汁拌曬仍以竹瀝薑汁打糊為丸引諸藥入經絡化痰又以天麻丸滋補筋骨標本兩治服二料遂十年無恙逮五十妓飲如舊酒色荒淫忘其昔之致疾也於是手指口角掉硬牽引尤甚未幾中風右體癱瘓矣歸而召診脈皆洪大不斂汗多不收呼吸氣短此下虛上竭之候蓋腎虛不能納氣歸原故汗出如雨喘而不休雖和扁無能為矣閲二十日而卒李仕材治一商人忽然昏僕遺尿手撒汗出如珠咸謂絶症既見決無生理李曰手撒脾絶遺尿腎絶法在不治惟大進參附或冀萬一遂以人參三兩耆朮附各五錢是夜服盡身體稍稍能動再以參附膏加生薑竹瀝盞許連進三日神氣漸爽後以理中補中等湯調養二百日而安唐太守多郁多思又為府事勞神昏冒痰壅口喎語澀四肢不隨時欲悲泣脈大而軟此脾肺氣虛風在經絡以補中益氣去黃耆加秦艽防風天麻半夏十劑症減二三更加竹瀝薑汁倍用人參兼與八味兩月乃愈一人自遠方歸忽然中風昏冒牙關緊閉先以牙皂末取嚏次以箸抉開灌蘇合丸二丸然後以防風散投之連進三服出汗如洗此邪自外解矣去麻黃獨活羚羊角加秦艽半夏及鉤藤薑汁十劑痰清神爽服六君子加竹瀝薑汁鉤藤兩月而瘥此治閉證之法姚太史中風昏憒語言不出面赤時笑非腎絶而笑是心臟中風也時初秋診之六脈洪大按之搏指乃至虛反有盛候也宜補中為主佐以驅風化痰方可回生而病家惶懼兩日不決乃力任之遂以大劑補中益氣加秦艽鉤藤防風竹瀝再劑而神爽加減調治五十日始愈脈證如此而以補中益氣取效設有實熱者何以辨之想其時必別有證據也黃履素曰余從弟履中年方強仕以勞心憂鬱忽然昏憒痰升遺溺眼斜視逾時不醒竟類中風灌以童便而蘇此等症候皆火挾痰而作又非三生飲可治者並薑湯亦不相宜也此當與江選薛立齋治王進士案同參趙以德治陳學士敬初因醮事跪拜間就仆倒汗注如雨診之脈大而空虛年當五十新娶少婦今又拜跪致勞故陽氣暴散急煎獨參湯連飲半日而汗止神氣稍定手足俱瘲喑而無聲遂於獨參湯中加竹瀝開上湧之痰次早悲哭一日不止因以言慰之遂笑復笑五七日無已時此哭笑為陰火動其精神魂魄之臟相併故耳正內經所謂五精相併者心火併於肺則喜肺火併於肝則悲是也稍加連柏之屬瀉其火八日笑止手動一月能走矣出醫通陸養愚治吳少參年五十新得美寵榮歸祭祖跪拜間就倒僕汗注如雨渾身壯熱人事不省或欲灌以牛黃脈之關尺浮數而空兩寸透入魚際此陰虛甚而陽亢極也若灌以牛黃則死矣急用生地自然汁一升人參一兩麥冬五錢五味子百粒濃煎灌之二三服神氣稍定汗止似睡非睡至五更時作恐懼狀如人將捕之至清晨又作盛怒狀罵詈不止至午間又大笑一二時至薄暮又悲泣自夜靜日作病家以為鬼祟此即內經所謂五精相併也並於腎則恐並於肝則怒並於心則喜並於肺則悲劉河間曰平時將息失宜腎水不足心火亢極乃顯此症夜間陰盛邪乃暫息日中陽隆遂遊行五臟而無寧時也仍用前方減人參之半旬日間或但悲笑或但罵詈恐懼人事時省時不省與之飲食盡食方止不與不思索大小便亦通至半月後始寧靜乃調養氣血百劑始愈長興林中尊年逾五旬因送按臺回覺身體倦怠頭目眩運既而頭振動搖欲語不能喉中喘逆咸與牛黃蘇合丸大小續命湯已旬日病如故脈之沉緩而弱左關尺尤甚此肝腎虛精氣暴奪之候也詢其由乃因按院嚴厲惟恐失錯煩勞之極歸而病作內經云諸風掉眩皆屬於肝劉河間曰此非外來風邪由將息失宜腎水不足心火亢甚所致又經云諸逆衝上皆屬於火今振動喘逆職是故也人至中年之際腎氣原自不足且經恐傷腎今以矜持太過損傷腎氣內經曰恐則氣下聲者氣之所發也氣下故聲不出且肝腎之脈俱挾舌本法宜壯二經之氣以治其標滋二經之血以治其本用枸杞為君以補腎天麻川芎為臣以益肝又用人參少加附子以為佐二冬以為使二劑約數兩服後諸症頓減用八味丸間服十劑全愈鄒春元心泉年未五旬患中風耳聾鼻塞二便不通四肢不隨而厥語言不出或言皆説亡故之人已灌牛黃錢許矣或曰經云脫陽者見鬼脫陰者目盲今口説亡人目無所見是見鬼與目盲也又潔古云中腑者著四肢中臟者滯九竅今手足不隨上下祕塞是臟腑兼中也且六脈弦數無倫脈訣云中風之脈遲浮吉急實大數三魂孤脈症俱危恐無生理立方人參五錢熟地一兩桂附各二錢半未服陸至脈之浮按果極急數中按稍覺和緩此猶有胃氣第兩尺重按覺空耳乃曰陰陽兼補誠治本之法也第上下祕塞之時恐不能奏效宜先通二便使濁陰降則清陽之氣得以上升然後議補經謂病發急則先標而後本先治其標後治其本咸謂病勢已危急恐不可虛緩遂將前藥灌之連進數劑俱停胸中揉之作聲而不下腹再促診脈仍前即袖中出家制神佑丸數十粒抉其口納之令灌以淡薑湯藥已下即為灸百會穴使陽氣上升又灸關元穴不使陽氣下陷一二壯目即能開眉頻蹙問痛否能點頭四肢亦少動謂之曰忍至七壯可生矣亦點頭灸將畢腹欲便既而前後俱通去垢穢極多少頃又瀉一行令急以前藥倍人參煎候及再便有暈意徐灌之自蘇此後人事漸省第手足振掉左半身不遂於大補氣血藥中少佐卻風順氣消痰之品如秦艽全蠍殭蠶烏藥星半之類調治年餘而愈蓋此症初起氣血不足為本九竅閉塞為標先通其祕者急則治其標也逮後見風症亦不足為本風症為標而專補氣血少佐風藥者緩則治其本也範溪云患口喎不正四肢拘急自汗惡風凡針灸塗貼諸風藥遍嘗不效已半年脈之左手浮緊右手洪緩此風客陽明留而不出鬱而為熱雖宜解散然邪在一經雜進諸經之藥誅伐無過徒虛其表而不能去邪故反惡風自汗而無救於口之喎也經曰胃足陽明之脈挾口環唇茲病口喎唇邪是乃陽明一經之症麻桂羌活豈所宜哉以葛根五錢升麻二錢以逐陽明固結之邪白芷二錢殭蠶一錢五分以達頭面不正之氣黃耆一錢五分桂枝五分以固周身疏漏之表桔梗一錢甘草五分載諸藥上行二劑便效數劑全愈後以養榮血實腠理少佐清熱去痰之品調理之此宜與許叔微一案合參李思瑭母年六旬體甚肥正月間忽中風卒倒不省人事口噤喉鳴手足不隨服牛黃丸小續命不效脈之浮洪而滑右手為甚緣奉養極厚形氣盛而脈有餘經云消疸擊僕偏枯痿厥氣滿發逆肥貴人則膏粱之痰也又云土太過令人四肢不舉丹溪所謂濕生痰痰生熱熱生風也當先用子和法湧吐之乃以稀涎散齏汁調灌之湧出痰涎碗許少頃又以三化湯灌之至晚瀉兩三行喉聲頓息口亦能言但人事不甚者知上下之障塞已通中宮之積滯未去也用二陳湯加枳實黃連萊蔔子木香白蔻仁每日二服數日人事漸爽腹中知飢令進稀粥大便結每日以潤字丸五分白湯點薑汁送下猶時有拘攣燥結之患知為血耗津衰以四物加秦艽黃芩甘草數十帖三月而愈陸祖愚治趙一陽年過五旬中風卒倒牙關緊閉戴眼上竄手握而四肢振掉或以稀涎散吹入鼻中吐稠痰數碗投小續命湯二劑反口開手撤眼合遺溺四肢厥逆人事昏沉喉鳴發熱脈之洪滑而歇止症已危甚勉力用方二陳加南星枳實以導其痰四物以養其血佐以牙皂薑汁竹瀝二劑痰喘漸輕六劑人事清爽改用參朮歸芍大補氣血而安李翠岩年近七旬肥盛多勞一日行至門外視一人如兩人一路如兩路一門如兩門不知從何處入遂卒然仆倒扶歸懶於言語尚能道其病狀咸以中風治之投消痰搜風十餘劑遂冷汗如雨驚惕振掉昏不知人脈左寸浮大按之無神余俱遲弱而空已神色昏沉不能言矣此屬虛脫宜培補正氣為主用四君加耆歸地芍天麻杜仲牛膝棗仁二劑汗止五劑能言語識人七八劑頓愈每劑加人參三錢二十餘劑飲食步履如常馬元儀治周某神昏不語狀如中風已半月脈之右虛微無力乃陽虛之候也胸中時滿或癡立如呆上焦之陽不用矣足膝無力轉側不能下焦之陽不用矣諸陽既微陰乃用事不行溫補陰日以長陽日以消如氣化有肅殺而無陽和物其能久乎遂與附桂理中湯大培元氣半月而神始清便乃行一月而食漸進足可履兼進八味丸調理而安馮楚瞻治張銓部先年以焦勞遂得怔忡耳鳴諸症醫以痰治湧出痰涎鬥許復用滾痰丸痰勢雖清精神內奪初秋卒倒僵仆痰湧齁鼾目竄口開手足強直自汗如雨危甚脈之六部皆豁大無倫其候欲脫刻不容緩矣乃用人參三兩白朮二兩附子五錢濃煎灌之日三劑按時而進服後脈勢漸斂身熱漸和潰汗漸收次日仍用前方日二服夜一服至三日諸症漸減僵仆不省如故此工夫未到故標症稍平而元神未復也仍照前服服後必灌濃米汁半鍾以保胃氣助藥力或有勸入風藥者曰保之不暇敢散之乎有勸加痰藥者曰保之實難敢消之乎有勸入清火者曰尤誤矣元陽欲脫挽之猶恐不及敢清之乎余之重用白朮附子者既壯人參培元之力而消痰去風息火之義已在其中若稍涉標治則虛證蜂起勢益難矣違衆勿用三日所用人參計三十五兩附子六兩白朮二十四兩至晚間忽能言語稍省人事進粥半碗而睡其齁鼾目竄諸症仍在蚤間陽分用大補心脾氣血之藥如棗仁當歸白朮白芍茯神遠志人參桂圓五味之類下午陰分用八味湯沖人參濃汁服之六七日後諸症漸平每日人參尚用四五兩後蚤間以生脈飲送八味丸加牛膝杜仲鹿茸五味子四五錢日中加減歸脾與八味湯照前煎服日漸輕強飲食倍進一月而起大凡治危篤症候全在根本調理得力自然邪無容地先哲云識得標只取本治千人無一損也談掌科年六十餘卒然暈僕痰涎湧盛不省人事頃之吐痰碗許少蘇長班用力擁之輿中挾其兩腿而歸醫與疏風清熱豁痰旬余痰涎不減煩躁倍常頭痛腿疼更甚脈之兩寸甚洪大兩尺右關甚沉微此孤陽獨亢於上弱陰不能斂納且中宮脾土亦虛陽無退藏之舍上浮顛頂為脹為疼宜壯水以制之培土以藏之補火以導之佐以滋肺清金以成秋降之令則收斂蟄藏熟地八錢為君乳炒白朮五錢為臣米炒麥冬三錢為佐製附子一錢五分為使煎成另用人參五錢熬汁沖服頭疼頓減諸症漸痊但腿痛如故蓋長班用力挾之而傷也視之五指之痕在焉此外因當外治用豬肘生精肉搗爛入肉桂細末蔥白食鹽和勻厚罨患處而安後因素患晨瀉飲食不甘令早晨空心參湯送八味丸午間食前以炒黃白朮三十兩製附子三兩共熬成膏人參細末六兩收成細丸白湯吞下三錢半月後脾胃頓強精神倍長景氏婦年近五旬中風已五六日汗出不止目直口噤遺尿無度或以為壞症脈之雖甚微而重按尚有不疾不徐自然之勢此即胃氣也乃曰遺尿本屬當時脫症故不治若多日安得不尿且坐視數日而不脫斷非絶症也投以參附湯二三劑漸蘇重服溫補而愈金教諭夏月壯熱頭疼咳嗽醫謂感冒用羌前蘇橘半枳之類未終劑頭疼如破舌強不清潰汗黏手左臂麻木神氣不堪脈洪大空緩而無力知為氣虛類中誤投發散當此疏泄之時幾成脫症與熟地一兩二錢麥冬三錢炒白朮四錢牛膝二錢四分五味子八分製附子一錢五分人參八錢另煎沖服日三劑不五日全安時有李庠生同日得病症候無異一劑發散汗出徹夜次日死矣張路玉治春榜趙明遠平時六脈微弱患中風經歲不痊診之左手三部弦大而堅知為腎臟陰傷壯火食氣之候且人迎斜內向寸又為三陽經滿溢入陽維之脈是不能無顛仆不仁之虞右手三部浮緩而氣口以上微滑乃痰湧於膈之象以清陽之位而為痰氣占據未免侵漬心主是以神識不清語言錯誤也或者以其兼口角微涎目睛恆不易轉以為邪在經絡用祛風導痰之藥不知此本腎氣不能上通於心心臟虛熱生風之症良非風燥藥所宜或者以其小便清利倍常為腎氣虛而用八味壯火之劑不知此症雖虛而虛陽伏於肝臟所以陽事易舉飲食易飢又非益火消陰藥所宜或者以其向患休息久痢大便後常有痰紅漬沫而用補中益氣不知脾氣陷於下焦者可用升舉之藥此陰虛久痢之餘有何清氣在下若用升柴升動肝腎虛陽鼓激膈上痰飲能保其不為喘脹逆滿之患乎今與河間地黃飲子助其腎通其心一舉而兩得之但不能薄滋味遠房室則藥雖中病終無益於治療也惟智者以善調攝為第一義侍衛金漢光妾中風四肢不能舉動喘鳴肩息聲如曳鋸不能著枕寢食俱廢半月餘脈之數大按久無力尺內愈虛以上皆右手寸關也至於左手關尺弦數按之漸小惟寸口數盛或時昏眩煩亂所服皆二陳導痰雜以秦艽天麻之類不應又與牛黃丸痰涎愈逆危殆益甚因以六君子或加膽星竹瀝或加黃連當歸甫四劑喘頓除再二劑飲食漸進堪就枕又四劑手足運動十餘劑後可徐行矣漢川令顧莪在夫人高年氣虛痰盛所以抑鬱忽然下體墮床舌強不語肢體不遂以是日曾食濕面醫用消導不應轉增困憊人事不省頭項腫脹診之六脈皆虛濡無力醫猶謂大便六七日不通擬用攻下張曰脈無實結何可妄攻且病人素有脾病大便常五六日一行而艱苦異常乃令先試以糜飲以流動腸胃之樞機日進六君子湯每服用人參二錢煎成頓熱分三次服四劑後大便自通再四劑自能起坐數日間可扶掖徐行因戒其左右慎防步履以病人氣虛痰盛故也呂東莊治沈凝芝內人時當就臥忽作寒熱至夜半即不能言喘急或以為感傷或以為氣逆痰結用烏藥順氣散不效診之聲如曳鋸手撤遺尿口開不能言有汗如雨曰此類中風也已傷臟不可治矣凝芝曰即無救理應用何藥曰初發即當用易簡附子散今無及矣乃自進之喘聲忽止且稍發語疑尚可救曰五臟俱絶今得參附氣少蘇耳終無濟也果三日而歿韓貽豐治司空徐元正風氣滿面浮虛口角流涎不已語含糊不能出喉兩腿沉重足趑趄不克逾戶限脈之曰此症非針不可遂呼燃燭舉手向頂門欲用針徐公及其令孫皆大惶駭云此處安可用火攻強之再三終究不允而罷後聞韓之針頗神復邀與針百會神庭腎門命門環跳風市三里湧泉諸穴道俱二十一針方針之初下也以為不知當作如何痛楚及藥爇氣氤氳不可名狀連聲讚歎以為美效積久周身之病一時頓去神針心法柴嶼青治考功吳景星太翁卒中昏憒滿面油光兩關弦緊投以附子理中湯次日心中明白面上浮光即斂調理數月而康薊州牧楊芋丙寅春五旬余卒中肢廢口不能言大小便難中府而兼中臟也初進通幽湯不應加大黃麻仁二劑始通舌稍轉動又用加減大秦艽湯數劑始能言但舌根尚硬後用地黃飲子及參耆術等兼服舌柔胃強左手足尚不能舉動此由心境不堪兼之參餌調服也今庚午秋聞其在楚已痊愈大司寇阿年已七旬偶患胃痛延治至則其勢已減其六脈平和兩尺神完氣足如此稟厚者不可多見乃以曾經口眼喎邪至今面部微有不正為患曰陽臟之脈前因心火暴盛無制遂流經絡而然惟有壯水之主以鎮陽光常服丸劑可保期頤薛立齋治靳太師夫人先胸脅脹痛後四肢不遂自汗如雨小便自遺大便不實口緊目瞤飲食頗進十餘日或以為中臟曰非也若風既中臟真氣將脫惡症已見禍在反掌安能延至十日乃候其色面目俱赤而或青診其脈左三部洪數惟肝尤甚乃知胸乳脹痛肝經血虛肝氣否塞也四肢不收肝經血虛不能養筋也自汗不止肝經血熱津液妄泄也小便自遺肝經熱甚陰挺失職也大便不實肝木熾盛克脾土也用犀角散四劑諸症頓愈又用加味逍遙散調理而安後因鬱怒前症復作兼發熱吐嘔飲食少思月經不止此木盛剋土而脾不能攝血也用加味歸脾為主佐以逍遙散而愈後每遇怒或睡中手搐搦復用前藥愈大參朱云溪母於九月忽仆地痰壅不省人事唇口喎邪左目緊小或用痰血之劑其勢稍緩至次年四月初其病復作仍進前藥勢亦漸緩至六月終病乃大作小便自遺或謂風中於臟以為不治診之左關洪弦而數此屬肝火血燥也遂用六味丸加五味麥冬芎歸一劑而飲食頓進小便頓調隨用補中益氣加茯苓山梔鉤藤丹皮而安至十月復以傷食腹痛作瀉左目仍小兩關尺脈弦洪鼓指以六君加木香吳茱升麻柴胡一劑而痛瀉俱緩以六君加肉果故紙一劑諸脈頓平痛瀉俱止夫左關弦洪由肝火血燥故左目燥小右關弦洪由肝邪乘脾故唇喎口邪腹痛作瀉二尺鼓指由元氣下陷設以目緊口喎誤作中風投以風藥以腹痛泄瀉誤作積滯投以峻攻復耗元氣為害甚矣以陽虛惡寒圍火過熱致增痰喘誤服寒劑而卒一婦人因怒仆地語言謇澀口眼喎邪四肢拘急汗出遺溺六脈洪大肝脈尤甚皆由肝火熾盛蓋肝主小便因熱甚而自遺也經云肝虛者善溺用加味逍遙散加鉤藤及六味丸尋愈亦可入氣厥一婦人經行口眼喎邪痰涎壅盛此血虛而肝火動用加味逍遙散加丹皮治之尋愈後因飲食停滯日吐痰涎此脾氣虛不能攝涎歸經也用六君子二十餘劑而安一婦人因怒口眼喎邪痰涎上湧口噤發搐此脾肺氣虛而肝木旺用六君子加木香鉤藤柴胡治之漸愈又用加味歸脾湯調理而安一婦人元氣素虛勞則體麻發熱痰氣上攻或用烏藥順氣散祛風化痰丸之類肢體痿軟痰涎自出面色痿黃形體倦怠而脾肺二脈虛甚此氣虛而類風朝用補中益氣湯夕用十全大補湯漸愈又用加味歸脾湯調理尋愈一婦人口眼喎邪四肢拘急痰涎不利而惡風寒其脈浮緊此風寒客於手足陽明二經先用省風湯二劑後用秦艽升麻而愈王海藏云某黃門卒中風病發時服紫菀丸泄出惡膿四升赤黃水一升一肉蟲如亂髮愈方見癆風門姚僧垣治大將軍樂平公竇集暴感風疾精神瞀亂無所知覺諸醫先視者皆云已不可救僧垣後至曰困則困矣終當不死若專以見付當為治之其家欣然請受方術僧垣為合湯散所患即瘳大將軍永世公叱伏列椿時苦痢疾而不廢朝謁燕公嘗問僧垣曰樂平永世俱有痼疾若永世差輕對曰夫患有淺深時有克殺樂平雖困終當保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹嘆異之周書高祖親戍東征至河陰遇疾口不能言臉垂覆目不復瞻視一足短縮又不得行僧垣以為諸臟俱病不可並治軍中之要莫先於語乃處方進藥帝遂得言次又治目目疾便愈末乃治足足疾亦瘳比至華州帝已痊復同上李季虯曰豫乙卯春正月三日忽患口角歪邪右目及右耳根俱痛右頰浮腫仲淳曰此內熱生風及痰也治痰先清火清火先養陰最忌燥劑蘇子橘紅天冬花粉鮮沙參甘菊花各三錢貝母白芍各四錢麥冬五錢甘草七分天麻一錢連翹二錢加竹瀝童便各半杯霞天膏四五錢日服二劑初四至初九日加生地三錢初十加牛膝四錢黃柏二錢十三日去連翹加石斛三錢五分五味子七分扁豆二錢乾葛八分十八日去連翹天麻乾葛扁豆加蓮肉四十粒二十二日定方天冬甘菊沙參各三錢麥冬生地牛膝各五錢炙草一錢貝母蘇子橘紅花粉各二錢棗仁六錢五味八分蓮肉四十粒二月十二日定方天冬茯苓貝母沙參各三錢麥冬棗仁牛膝各五錢蘇子橘紅甘菊各二錢五分黃柏甘草各一錢五分花粉玄參各二錢五味七分生地白芍各四錢蓮肉六十粒十日後去花粉後又去玄參加石斛三錢至五月盡病始痊愈前方中曾加參二錢服二劑反覺浮大上升即去之先時合成丸藥病中仲淳以為可服方用人參十兩乳浸飯上蒸五味子十兩蜜蒸烘乾山萸八兩沙蒺藜十二兩半炒為末一半打糊和藥巴戟天八兩以甘菊花枸杞子同酒浸蒸曬乾蓮鬚六兩枸杞子十二兩川牛膝十兩酒蒸天冬六兩蓮肉十二兩炒白茯苓八兩黃柏四兩蜜炙砂仁二兩生地十二兩鹿角霜十二兩酥拌炒如飛面鹿茸六兩菟絲子末八兩甘菊花六兩煉蜜和蒺藜糊和丸桐子大每服六錢空心飢時各一服淡鹽湯送下過百日後更定丸方黑芝麻三斤桑葉酒拌蒸曬三斤何首烏九蒸九曬三斤蒼朮黑豆拌蒸三次二斤牛膝如蒸蒼朮法二斤甘菊花二斤大生地三斤天冬酒蒸二斤柏子仁二斤枸杞子二斤沈明生治潘子芬軀幹魁梧素無恙然室多姬妾且縱飲皆致疾之媒也乙巳夏忽患類中風項強胸滿不良於行説舉足即覺首重而欲仆地或知其嗜酒及內病由上盛下虛即用參附峻補治久轉劇診之六部沉滑有力殊非腎家不足之象然病人舍補而別商則紛然辨難棄不用矣因語之曰病本不足更無可疑但補虛而不去病甚於攻克也今當分途治之湯劑以補虛吾立方而君自制服丸劑以去病則有家祕神方未可明告奉饋服之兩旬必奏殊功潘以刻期甚邇欣然見從煎方以六君理中加減而不用附子別制大劑消痰丸服十日而項強若失陸續去痰積稠黏甚多潘惟恐其虛復生猶豫乃謂之曰大便雖行神氣日旺況有參術以培補養脾元何慮之有去痰莫如盡此之謂也勉其盡劑果越兩月而步履復康矣黃錦芳治曹姓兒年十餘歲脈伏不見牙關緊急口不能言手足俱厥口紅而燥大便數日不解手足牽引不伸並有痛楚不可著手之象知其素有內熱被暴風寒邪束其筋骨不急為之裡外雙解無以救其卒暴之厄用吹藥以開其關舉方用麻黃防風各一錢細辛三分牙皂一錢桂枝二錢以解其外杏仁十粒烏藥一錢枳實八分川厚朴二錢黃連五分大黃三錢以通其內服二劑手足頗活大便未行口有臭氣舌有燥胎脈微見身有潮熱原方加乾葛黃芩服之厥退手足皆熱大便頓解而愈徐靈胎曰今之患中風偏痱等病者百無一愈十死其九非其症不治皆醫者誤之也凡古聖定病之名必指其實名曰中風則其病屬風可知既為風病則主病之方必以治風為本故仲景侯氏黑散風引湯防己地黃湯及唐人大小續命湯皆多風藥而因症增減蓋以風入經絡則內風與外風相煽以致痰火一時壅塞惟宜先驅其風繼清痰火而後調其氣血則經脈可以漸通今人一見中風等症即用人參熟地附子肉桂等純補溫熱之品將風火痰熱盡行補住輕者變重重者即死或有元氣未傷而感邪淺者亦必遷延時日以成偏枯永廢之人此非醫者誤之耶或云邪之所湊其氣必虛故補正即所以驅邪此大謬也惟其正虛而邪湊尤當急驅其邪以衛其正若更補其邪氣則正氣益不能支矣即使正氣全虛不能托邪於外亦宜於驅風藥中少加扶正之品以助驅邪之力未有純用溫補者譬之盜賊入室定當先驅盜賊而後固其牆垣未有盜賊未去而先固其牆垣者或云補藥托邪猶之增家人以御盜也是又不然蓋服純補之藥斷無專補正不補邪者之理非若家人之專於御盜也是不但不驅盜並助盜矣況治病之法凡久病屬虛驟病屬實所謂虛謂正氣虛也所謂實者謂邪實也中風乃急暴之症其為邪實無疑天下未有行動如常忽然大虛而僕者豈可不以實邪治之哉其中或有陰虛陽虛感熱感寒之別則於治風方中隨所現之症加減之漢唐諸法俱在可取而觀也故凡中風之類苟無中臟之絶症未有不可治者余友人患此症者遵余治法病一二十年而今尚無恙者甚多惟服熱藥者無一存者矣徐靈胎曰病有一定之傳變有無定之傳變一定之傳變如傷寒太陽傳陽明及金匱見肝之病知肝傳脾之類又如痞病變臌血虛變浮腫之類醫者可預知而防之無定之傳變或其人本體先有受傷之處或天時不和又感時行之氣或調理失宜更生他病則無病不可變醫者不能預知而為防者也總之人有一病皆當加意謹慎否則病後增病則正虛而感益重病亦變危矣至於既傳之後則標本緩急先後分合用藥必兩處兼顧而又不雜不亂則諸病亦可漸次平復否則新病日增無所底止矣至於藥誤之處正復多端或過於寒涼而成寒中之病或過服溫燥而成熱中之病或過於攻伐而元氣大虛或過於滋潤而脾氣不實不可勝舉近日害人最深者大病之後邪未全退又不察病氣所傷何處即用附子肉桂熟地麥冬人參白朮五味萸肉之類將邪火盡行補澀始若相安久之氣逆痰升脹滿昏沉如中風之狀邪氣與元氣相併諸藥無效而死醫家病家猶以為病後大虛症所致而不知乃邪氣固結而然也余見甚多可不深戒尤在涇曰中風者風從外入天地之邪氣也類中風者風自內生肝臟之厥氣也肝之生氣暴而病速肝氣既厥諸氣從之諸液又從之諸氣化火諸液化痰輻湊上焦流溢經絡如風雨之驟至如潮汐之驟湧而不可當也豈特如景嶽所謂氣血虛敗而已哉昔賢於此症或云火或云痰或云氣虛誠俱有之余惜其終屬模糊而未肯綮也熱風熱化為風也患人頭目昏眩口痛鼻燥熱氣出微惡風時時有熱是也是雖辛涼不能解之孟詵説患熱風人宜食牛乳謂其氣味甘寒而性濡潤能使肌熱除而風自熄求之草木蘆根蔗漿梨汁之屬性味相似亦內經風淫於內治以甘寒之旨也肝陽化風逆行脾胃之分液聚成痰流走肝膽之絡左體麻痹心膈痞悶所由來也而風火性皆上行故又有火升氣逆鼻衄等症此得之飢飽勞郁積久而成非一朝一夕之故矣治法清肝之火健脾之氣非旦夕可圖也羚羊角橘紅白朮枳實天麻半夏茯苓甘草麥冬張石頑治一人汗出偏沮脈來不柔時自歇止肝陽有餘而胃陰不足於是稠痰濁火擾動於中壅滯於外目前雖尚安和然古人治未病不治已病智者見微知著自當加意調攝為佳人參石斛南棗半夏茯苓炙草麥冬丹皮小麥黃履素曰三生飲施於中風之寒證妙矣或有虛火沖逆熱痰壅塞以致昏瞶顛仆者狀類中風烏附非所宜服立齋治王進士虛火妄動挾痰而作急灌童溺神思便爽案見江選豫從弟履中年方強仕以勞心憂鬱忽然昏瞶痰升遺溺眼斜視逾時不醒竟類中風灌以童便而蘇此等皆火挾痰而作斷非三生飲可投並薑湯亦不相宜雄按不但三生飲不可服雖當歸枸杞之類亦不宜用余治顧聽泉案可參同一卒然昏瞶而所因不同須細審之太平廣記載梁新見一朝士診之曰風痰已深請速歸去其朝士復見鄚州高醫治趙鄂診之言疾危與梁説同惟云只有一法請啖沙梨不限多少咀嚼不及絞汁而飲到家旬日依法治之而愈此亦降火消痰之驗也雄按資生經亦云凡中風由心腹中多大熱而作也徐靈胎曰天下卒死之人甚多其故不一內中可救者十之七八不可救者僅十之二三惟一時不得良醫故皆枉死耳夫人內外無病飲食行動如常而忽然死者其臟腑經絡本無受病之處卒然感犯外邪如惡風穢氣鬼邪毒厲等物閉塞氣道一時不能轉動則大氣阻絶昏悶迷惑久而不通愈聚愈塞如繫繩於頸氣絶則死矣若醫者知其所犯何故以法治之通其氣驅其邪則立愈矣又有痰涎壅盛阻遏氣道而死者通氣降痰則蘇此所謂痰厥之類也以前諸項良醫皆能治之惟臟絶之症則不治其人或勞心思慮或酒食不節或房欲過度或惱怒不常五臟之內精竭神衰惟一線真元未斷行動如常偶有感觸其元氣一時斷絶氣脫神離少頃即死既不可救又不及救則卒死之最急而不可治者也至於暴遇鬼神適逢冤譴此又怪異之事不在疾病之內矣定風酒補血息風凡病虛風病者飲之輒愈且藥味和平衰年者頻服甚有裨益而無流弊真妙方也天冬麥冬熟地川芎五加皮牛膝秦艽各五錢川桂枝三錢絹袋盛之汾酒二十斤淨白蜜赤沙糖陳米醋各一斤攪勻浸以瓷壇豆腐皮封口壓以巨磚煮三炷香取起埋土中七日可飲矣至寶丹治中惡氣絶中風不語中諸物毒熱役煩躁氣喘吐逆難産悶亂死胎不下以上並用童便一合生薑自然汁四五滴和溫化下三丸至五丸神效又治心肺積熱嘔吐邪氣攻心大腸風祕神魂恍惚頭目昏眩口乾不眠傷寒狂語並皆治之又治小兒諸癇急驚心熱卒中客忤不得眠煩躁風涎搐搦每二歲兒服二丸人參湯徐靈胎曰此安神定魄必備之方真神丹也暹羅犀角鎊硃砂研水飛觀音面者佳雄黃研水飛琥珀研水飛玳瑁鎊各一兩牛黃五錢麝香研龍腦研各一錢金銀各五十張水安息香一兩無灰酒熬膏如無以旱息香代之上將生犀玳瑁為末入余藥研勻將安息香膏重湯煮凝後入諸藥搜和成劑丸如桐子大參湯化下三丸至五丸本事方中人參南膽星天竺黃王晉三曰此治心臟神昏從表透里之方也犀角玳瑁牛黃琥珀以有靈之品內通心竅硃砂雄黃金銀箔以重墜之藥安鎮心神佐以龍腦麝香安息香搜剔幽隱諸竅故熱入心包絡舌絳神昏者以此丹入寒涼湯藥中用之能驅陰起陽立展神明有非他藥之可能及若病起頭痛而後神昏不語者此肝虛魄升於頂當用龍骨牡蠣救逆以降之又非至寶丹所能蘇也葉天士治呂某案曰陽邪襲經絡而為偏痱血中必熱艾灸反助絡熱病劇廢食清涼固是正治然柔劑不致傷血且有息風功能犀角羚羊角生地元參連翹橘紅膽星石菖蒲徐靈胎曰方論俱佳華岫云曰凡肢體拘攣半身不遂口眼歪斜舌強言謇此本體先虛風陽挾痰火壅塞以致營衛脈絡失和治法急則先開關繼則益氣充血盈脈絡通利則病可痊愈徐靈胎曰此數語是總訣厥孫兆杜壬同診仁宗最寵貴妃一日食次忽仆倒遍身卒冷急奏上上乃急召孫杜既至奏曰不妨此乃氣厥爾少頃吐即覆蘇也御坐良久果吐而蘇上問因何以得知二人並奏曰此貴妃方因憂怨氣上逆與食相併故如此吐即氣透故復蘇也上問妃有何事如此妃對曰陛下無嗣臣妾不能為陛下生皇嗣所以自怨氣忽上逆至驚動聖駕上曰朕亦自責乃勞汝致病耶因嘉獎孫杜之能良久曰二卿今之非良醫也耶醫學綱目於敖青衣為崔侍御所得忽暴死梁革曰此非死乃尸厥也刺心及臍下數處衣以單衣臥床上縛其手足置微火於床下稍蘇以蔥粥灌之青衣遂活徐應秋云凡病尸厥呼之不應脈伏者死脈反大者死竇材治一人因大惱悲傷得病晝則安靜夜則煩悶不進飲食左手無脈右手沉細世醫以死症論之竇曰此腎厥病也因寒氣客肝腎二經灸中脘五十壯關元五百壯每日服金液丹四神丹至七日左手脈生少頃大便下青白膿數升許全安此由真氣大衰非藥能治惟艾火灸之原注此症非灸法不愈非丹藥不效二者人多不能行醫人僅用泛常藥以治其何能生一婦人産後發昏兩目澀面上發麻牙關緊急兩手拘攣竇曰此胃氣閉也亦由肝氣上逆胃氣結而成厥胃脈挾口環唇出於齒縫故見此症令灸中脘五十壯即日愈原注若産後血厥倉公白微湯一婦人時時死去已二日矣凡醫作風治之不效竇與灸中脘五十壯而愈此即尸厥張子和治一人痰厥不知人牙關緊急諸藥不能下候死而已張見之問侍病者曰口中曾有涎否曰有遂先以防風藜蘆煎湯調瓜蒂末灌之口中不能下乃取長蛤甲磨去刃以紙裹其尖灌於右鼻竅中嘓然下咽有聲復灌其左竅亦然曰可治矣良久涎不出遂以砒石一錢又投之鼻中忽偃然仰面似覺有痛斯須作噦吐膠涎數升頗腥砒石尋常勿用以其病大非此莫能用動然無瓜蒂亦不可便用宜消息之大凡中風痰塞往往止斷為風專求風藥靈寶至寶誤人多矣故劉河間治風舍風不論先論二火也常仲明之妻每遇冬寒兩手熱痛張曰四肢者諸陽之本也當夏時散越而不痛及乎秋冬收斂則痛以三花神祐丸大下之熱遂去此熱氣厥也張叟年六十餘病熱厥頭痛以其用湧藥時已一月間矣加之以火其人先利年高身困出門見日而僕不知人家人驚惶欲揉撲之張曰大不可擾續與西瓜涼水蜜雪少頃而蘇蓋病大年高湧泄則脈易亂身體內有炎火外有太陽是以跌僕若更擾之便不救矣惟安神定思以涼水投之待之以靜靜便屬水自然無事臨症者當諳練也常明仲之子自四歲得風痰疾至十五歲轉甚每月發一兩次發必頭痛痛則擊數百拳出黃緑涎一兩盞方已比年發益頻目見黑花發則昏不知人厥也三四日方蘇諸醫皆用南星半夏化痰之藥終無一效偶遇張於濦水之南鄉以雙解散發汗次以苦劑吐痰病去八九續以分消劑平調自春至秋方獲全愈莊一生治金壇庠友張逢甫內人方食時觸暴怒忽仆地氣遂絶一醫用皂角灰吹鼻中不嚏用湯藥灌之不受延至午夜謂必不治醫遂告去急叩莊過視之六脈尚有獨氣口沉伏細尋之滑甚曰肝木之氣逆衝入胃胃中素有痰致痰夾食閉住胃口氣不得行而暴絶也但歷時久湯藥不入矣急宜吐之可活所謂木鬱則達之亟令覆其身垂首向床下以鵝翎蘸桐油啓齒探入喉中展捎引吐出痰與食才一口氣便稍通再探吐至兩三口便覺油臭以手推拒但不能言莊曰無妨矣知其體怯不宜多吐急煎枳橘推蕩之藥灌之盡劑而蘇後以平肝和胃藥調理數劑復故此因暴怒怒則氣上逆痰因氣壅故現斯症耳所謂尸厥也治厥往往有誤豫故表其症以示後來云廣筆記季虯曰太學朱方仲內人稟賦極弱兼之作勞善怒內熱怔忡膽虛氣怯已三四年矣壬申夏忽發厥冒痰氣上升則兩目上竄手足發搐不省人事初時一日一發三四日後則連發不止日夜幾百次牛黃竹瀝遍嘗不效豫計已窮意欲用參附峻補因其時常口渴大便不通不敢輕投適一友至極贊其決謂非附不可強用附子二錢人參六錢作一劑投下午後進藥黃昏發大熱煩躁渴甚不兩日斃矣此固非用附子而然第症候決不宜用僥幸之想毋漫試也同上張意田乙酉歲治一人忽患泄瀉數次僵仆不省神昏目瞪肉瞤口噤狀若中風脈之沉弦而緩手足不冷身強無汗鼻色青兩頤紅此肝鬱之復也用童便慈蔥熱服稍醒繼以羌活防風柴胡鉤藤香附梔子之屬次用天麻白朮湯加歸芍丹梔而愈或問肝鬱之復其故云何曰運氣不和則體虛人得之本年陽明燥金司天金運臨酉為不及草木晚榮因去冬晴陽無雪冬不潛藏初春乘其未藏而草木反得早榮矣燥金主肅殺木雖達而金勝之故近日梅未標而吐華密霰悽風交亂其側木氣鬱極則必思復經所謂偃木飛沙筋骨掉眩風熱之氣陡然上逆是為清厥今其脈沉弦而緩乃風木之熱象因審量天時用童便慈蔥使之速降濁陰透轉清陽則神氣自清用羌防等以舒風木香附梔子解汗而清鬱火再用天麻白朮湯加歸芍丹梔培土清火暢肝木以成春雖不能斡旋造化亦庶幾不背天時也已李東垣治中書某腳膝尻腰皆冷脈沉數有力用黃柏滋腎丸再服而愈汪石山治一人卒厥暴死不知人先因微寒數發熱面色萎黃六脈沉弦而細知為中氣久郁所致與人參七氣湯一服藥未熱而暴絶汪令一人緊抱以口接其氣徐以熱薑湯灌之禁止喧鬧移動否則氣絶不返矣有頃果蘇溫養半月而安不特此症為然凡中風中氣中寒暴厥俱不得妄動以斷其氣內經明言氣復返則生若不諳而擾亂之使其氣不得復以致夭枉者多矣俱不得妄動是要法遇卒暴病者病家醫士皆宜知此蓋暴病多火擾之則正氣散而死也豫女年十八忽暴厥家人不知此群集喧鬨又扶挾而徙之他所致蘇而復絶救無及矣今録張汪二案五內猶摧傷也盛用敬治一婦卒厥昏昏若醉夢手足筋牽盛診之六脈俱脫忽有麻衣者在側問其人則病者之壻也問其服妻之服也問其妻子死僅半月死以産後症忽悟曰此病必憂鬱所致以木香流氣飲投之一服而瘥吳江縣志陸怡華亭人善醫汴人段氏客比鄰一夕溘死怡取馬櫪去底置大釜上界死者納之蒸以蔥藥及旦皮腐而氣復江南通志孫文垣治丁耀川長姐常患暈厥諸風掉眩俱屬於肝吐痰碗許乃蘇痰因火動一月三五發後又口渴五更倒飽二字新腸鳴腹疼泄瀉小水短澀咳嗽皆肝火為患脈之兩寸濡弱兩關滑大此中焦痰積所致也卻是標病先與二陳湯加蒼朮山楂麥芽以健脾為臣以白芍止痛為君以滑石澤瀉引濕熱從小便出為佐黃芩為裨佐張致十帖二陰之痛俱止前未敘明改以六味知柏牛膝而愈按此女之病稟母氣也豫常見父母有肝病者其子女亦多有之茲病厥亦肝病也其母病甚在二陰見鬱症門白仰云令眷每觸怒即暈厥必閉門合目靜坐不令人在旁可見此病不宜擾之手足皆冷汗出如雨氣息俱微越一時許蘇如常原以項瘰癧多服女醫斑貓等毒藥致脾胃損元氣虧也年三十八未嘗生育欲睡則腿必捶敲即睡則心常驚跳經將行小腹先疼二日色紫有塊以上無非肝病惟肌肉飲食如常人脾胃不病診之兩寸短弱左關大而有力右關滑左尺滑右尺沉微據脈肺氣虛肝木實胃土實胃中有痰之症也木熱則流脂斷無肝火盛而無痰者不必責諸胃也用六君子湯加丹參酒連青皮外與真珠母丸及獨活湯調理而安二方出醫學綱目龔子才治劉司寇患卒倒不省人事口眼相引手足戰掉一醫作風治一醫以痰火治俱罔效診之六脈沉數氣口緊此非風非痰乃氣夾食也其家人始悟曰適正食之際被惱怒所觸遂致如此用行氣香蘇散加木香青皮山楂即愈萬病回春喻嘉言治吳添官生母時多暴怒致經行復止入秋以來漸覺氣逆上厥如畏舟船之狀動則暈去久久臥於床中時若天翻地覆不能強起百治不效因用人參三五分略寧片刻最後服至五錢一劑日費數金至家財盡費病轉凶危大熱引飲腦間如刀劈食少瀉多已治木矣喻診之謂可救蓋怒甚則血菀於上而氣不返於下者名曰厥巔疾厥者逆也巔者高也氣與血俱逆於高巔故動輒眩暈也又上盛下虛者過在足少陽足少陽膽也膽之穴皆絡於腦鬱怒之火上攻於腦得補而熾其痛如劈同為厥巔之疾也風火相煽故振搖而蒸熱木土相凌故艱食而多瀉也於是會內經鐵落鎮墜之意以代赭石龍膽草蘆薈黃連之屬降其上逆之氣以蜀漆丹皮赤芍之屬行其上菀之血以牡蠣龍骨五味之屬斂其浮遊之神最要在每劑中入生豬膽汁二枚蓋以少陽熱熾膽汁必干亟以同類之物濟之資其持危扶顛之用病者藥入口便若神返其舍忘其苦口連進數十劑熱退身涼食進瀉止能起行數步然尚覺身輕如葉不能久支因恐藥味太苦不宜多服減去豬膽及蘆薈等藥加入當歸一錢人參三分薑棗為引平調數日全愈李士材治晏給諫夫人先患胸腹痛次日卒然暈倒手足厥逆時有醫者以牛黃丸磨就將服矣診之六脈皆伏惟氣口稍動此食滿胸中陰陽否隔升降不通故脈伏而氣口獨見也取陳皮砂仁各一兩薑八錢鹽三錢煎湯以指探吐得宿食五六腕六脈盡見矣左關弦大胸腹痛甚知為大怒所傷也以木香青皮橘紅白朮香附煎服兩劑痛止更以六君子加木香烏藥調理十餘日方瘥一人年五旬荒於酒色忽頭痛發熱醫以羌活湯散之汗出不止昏暈不省李為灸關元十壯而醒四君子加薑桂日三劑至三日少康因勞怒復發厥用好參一兩熟附三錢煨薑十片煎服稍醒但一轉側即厥一日之間計厥七次服參三兩至明日以羊肉羹糯米粥與之尚厥二三次至五日而厥定乃泣而問曰可再生否曰脈有根蒂但元氣虛極非數載調攝不能康也幸其恪信堅守兩月之間服參四斤三年之內煎劑六百帖丸藥七十斤方得步履如初親友衆多議論雜出此最病家大忌若非病人信任之端倘久而見疑服藥必怠未有獲生者也張路玉治顧允祥之內暴怒傷食喘脹逆滿怒則氣上醫者誤認風邪而與表藥遂昏憒目瞪不語呼之不省鼓動肝邪痰盛而厥診之其脈六部澀伏知為痰因氣閉所致本當因勢利導探吐以通其竅緣病家畏其吐劇遂與導痰湯加菖蒲遠志一啜便能言語更與前藥加檳榔鐵落得下而安黃履素曰凡人精神極壯實者偶患痰厥可服牛黃丸立愈余姐丈周公美一日忽神呆目頓頃之痰湧手揚足擲有類中風不服藥次日自愈此等稟賦百無一二楊太史夫人忽然暈倒醫以中風之藥治之不效李診之左關弦急右關滑大而軟本因元氣不足又因怒後食停先以理氣消食藥進之下黑矢數枚急以六君子加薑汁服四劑而後暈止更以人參五錢耆朮半夏各三錢茯苓歸身各二錢加減調理兩月而愈薛立齋治一婦人因怒發搐嘔吐痰涎口噤昏憒氣口脈大於人迎此氣滯而食厥用平胃散加茯苓半夏木香治之而蘇更以六君子湯加木香漸愈乃去木香又二十餘劑而痊陸養愚治許省南忽得暴疾如中風狀口不能言目不識人四肢不舉服蘇合牛黃丸不效或與小續命湯反增喘急壯熱手足厥逆或以六脈沉微擬用附子理中湯診之兩寸似有似無兩關尺難以求索此由氣壅逆而然非不足而欲脫也按其胸即眉為之皺按其腹即體為之舉詢其由因日間煩冗無暇吃飯至晚陪客畢即病發曰飢極過飽此食中也昏憒不語脈伏皆飲食填塞清道所致四肢不舉經謂土太過之病也初時一吐即已今已三日上中下俱受病當吐下消導並行以分殺其勢乃先以生薑淡鹽湯探之湧痰涎湯水數碗少頃神思少清診之寸關逼逼而來又以稜莪檳枳橘曲木香白豆蔻仁萊蔔子煎送潤字丸五錢下三四行勢大減再診關尺俱見且沉實有力第胸腹按之猶痛再以前方煎送潤字丸二錢四日後方與稀粥改用二陳少佐歸芍以養榮血參術以扶胃氣木香蔻仁以寬其未盡之痞旬日而安陸肖愚治潘碧泉之妻年近五旬因大怒後忽然倒僕牙關緊急脈之兩寸關滑大兩尺沉無以稀涎散齊水調撬牙灌之吐痰盆許少頃而蘇第人事尚未清爽再診寸關稍平兩尺已起以二陳加貝母黃連香附數劑而安陸祖愚治郁仲開勞心之後復感怒氣清晨篦頭未畢忽然昏暈四肢厥逆口目不閉喉聲如鋸二便不利脈之左三部弦滑而數右三部沉實有力此痰厥也先用牛黃丸薑湯化開加牛黃一分連灌四五丸再用陳皮貝母花粉膽星黃芩黃連枳實栝蔞前胡桔梗皂莢薑汁竹瀝頓服湧去稠痰二三碗前方去皂莢陳皮加青皮二劑行二次其老痰俱從便出症頓減後用健脾清火養血消痰之劑調理而安鄭顯夫年六十餘因大怒遂昏僕四肢不用余以怒則火起於肝以致手足厥陰二經之氣閉而不行故神昏無知怒甚則傷其筋絡弛縱不收故手足不用急以連柏瀉其上逆之火香附降其肝氣一二日神智漸清後以調氣血壯筋骨之劑補之數日而安藥要或問醫説續編朱丹溪治呂宗信有積塊足冷至膝用大承氣湯加減下之其塊厥皆愈積塊易知足冷為實熱之厥人或未知入厥門吳洋治里人病歸自浙四肢厥冷六脈若無尸寢旬余水漿不入衆醫以為死矣洋至曰此熱厥也乃就浴室貯盤水水皆新汲架板片臥病人於其上以青布羃四體挹水沃之即以水蘸病者唇病者欲得水甚遂盡其量而飲之乃瘥太函集吳橋過章祁有人遮道告曰汪一洋年五十餘溲血後發熱畢召諸醫或以為傷寒劑以發散或以為痢後虛損劑以補中久之譫語昏迷四肢厥冷蓋不食者旬日矣其家絶望以待盡願一診之吳曰此熱厥也吾能活之豫以石膏黃連湯一服而蘇再而間五服而愈同上魏玉橫曰鮑淥飲妹病厥昏不知人目閉鼻煽年壽環口皆青手足時時抽掣自夜分至巳牌湯水不入脈之大小無倫次謂此肺金大虛肝火上逆火極似風之候唯獨參湯可愈他藥不必受也參已煎或沮之遂不敢與一醫用菖蒲遠志以開心氣茯神棗仁以安神麥冬貝母以清痰辰砂鐵鏽水以鎮墜奈藥從左灌入即從右流出絶不下咽群視束手時已過晡再視之則面額間漸變黑色令急灌參湯猶可活乃以茶匙注之至六七匙喉間汩然有聲已下咽矣察其牙關漸開再以米飲一盞和參湯灌下遂目開身動面額青黑之氣豁然消去徐飲薄粥一甌起坐而愈後嘗復厥但不甚唯與地黃沙參麥冬杞子即瘥顧氏女年十六臁有瘡三陰之病其素也以歲暮勞於女工脅痛發咳嗽吐痰一醫與廣牛荊防香砂枳桔等三四劑覺中脘有物如拳上頂食不能下又一老醫謂此痰也其盛盈斗必須去乃已其方與前方同增蒼朮厚朴竹瀝薑汁服二劑病益劇延治開歲之二日也比至則日死矣無庸診也詢死幾時曰天黎明忽目閉口張挺臥僵直呼喚不應湯水不入詢其胸腹如何其母按之曰猶暖遂入診已無脈面死白殺青牙齦迸紫血亦已凝沍令曳其四肢尚軟謂本屬元虛勞役而病誤行燥散傷其肺金致肝木挾痰食上逆又加酷暴之品遂令水涸木枯而厥冒第痰食之厥可一吐而醒此陰亡陽越之厥惟有令魂升魄降而已今生氣未絶姑以熟地二兩杞子一兩沙參麥冬各五錢急煎徐灌但慮其不下咽耳下咽即活乃如言次日延診告以初時藥不能下以簪撬灌久之入咽有聲今起坐耳前方減半入蔞仁二錢八劑全愈後數年出嫁不得於姑脅痛不臥一醫令以木香為末調服姑不許服竟一厥而終黃錦芳治李某四肢厥逆怦怦惡寒肌冷如冰黃視其面雖慘淡而內實煩滿脈雖沉伏而肝脈有力此熱厥也用黃芩一錢黃連五分柴胡八分枳殼八分厚朴一錢大黃二錢烏梅一個青皮五分檳榔八分細辛二分服後厥回通身大熱改用平藥而愈
