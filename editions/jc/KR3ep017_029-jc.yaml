body:
  text: 卷二十九小兒科受驚竇材治一小兒因觀神戲受驚時時悲啼不食如醉已九十日危甚令灸巨闕穴五十壯即知人事曰適間心上有如火滾下即好服鎮心丸而愈萬密齋治一小兒年五歲夢中驚哭抱其母叫怕此因被驚嚇得之為制一方用人參麥冬茯神黃連棗仁柏子仁炙甘草為末山藥粉糊丸黍米大每服二十五丸燈草湯下未盡劑而安此即葉氏所謂清火兼安神之法龔子才治一小兒五歲因看會見裝鬼臉被驚嚇兩眼黑睛翻向里白睛翻向外視物微覺一線諸醫束手龔視之曰此兒曾經出痘疹否對曰未曰俟出痘疹可治逾月痘疹盛行其兒似有將出之機因延治以棉胭脂水泡出汁慢火熬成膏塗兒兩眼胞上下一日塗兩次直至痘疹靨後其眼復舊未曾發明其故吳孚先治一小兒先天薄弱膽氣甚少六歲時在塾中見師以戒方在渠背後責同學生驚而受病不時驚叫叫必左腳提起震地一聲五六年矣百治不效吳曰肝喜驚呼肝氣虧損極矣然腎為肝母心為肝子用補肝腎並鎮心安神之藥五十餘劑丸藥三料而愈楊士瀛云小兒口噤不開豬乳飲之良月內胎驚同硃砂牛乳少許抹口甚妙此法良家方書未知用予傳之東宮吳觀察子病此用之有效本草綱目馮楚瞻治張氏兒周歲臥低坑睡中墜下毫無傷損嘻笑如故但自後右手足癱軟不舉手不能握足不能立脈則洪大久按無力知為先天不足復於睡中驚觸氣血不周行之故與熟地四錢麥冬一錢五分炒白朮二錢四分牛膝二錢五味子四分製附子五分煎小半鍾入人參汁二三分沖服六劑手足輕強精神更倍陸養愚治陳雲穀子年十四四月終自館中歸偶戲水旁一人在後曰師來也因驚撲水頭面俱濕回家夜間身熱頭痛至晨煩躁不安胡言亂語及問之欲言而不能出聲或謂六脈浮緊此傷寒也表氣鬱冒致裡氣不舒故煩亂宜大汗之用五積散令密屋重覆汗出透衾明日手足搐搦項背強直氣出不納自汗不語又投抱龍丸鉤藤散不效脈之兩手浮數而散關尺沉弱而澀此因驚恐肝腎受傷經曰驚則氣亂胡言亂語氣亂故也語不能出者氣下故也初時以平肝鎮心之中少佐以壯氣血之品病當自愈乃誤以為傷寒大發其汗汗多則亡陽變而為痙強直搐搦蓋痙症也經曰陽氣者精則養神柔則養筋今陽氣竭血無所附以養筋故不柔和也陽氣盡浮於外故氣不納而自汗不語急用大料參耆為君以救垂絕之陽四物為臣入天麻以養肝經之血棗仁五味為佐以收耗散之神甘草麥冬為使以徹浮游之火二劑頓減復以硃砂安神丸間服旬日而安汗即血也汗多則傷陰肝失所養故變為痙今反以為亡陽故泥於大汗亡陽之舊說也萬密齋治胡鳳厓子痘後傷食成疳肌瘦發穗一醫治之已效別生一病似癇非癇晝則安靜夜則夢寐間抱其乳母叫云我怕我怕如人捕之之狀詢其由兒性畏藥醫來灌服必將針火恐嚇之蓋恐則傷腎又腎藏志虛則神志不寧而心驚寤則神棲於心寐則神棲於腎脾為往來出入之門戶以補脾為主安神次之補脾肥兒丸安神丸調理半月而安此恐也非驚也附見於此未嘗不可第不可誤認為驚以其法矇混施治耳英山大尹吳清溪子病驚風皆作風治之不效曰非風也乃因驚得之風從肝治驚從心治不識病源如何有效乃取至聖保命丹治之搐止矣驚從膽治子和之論甚明非從心也馬元儀治一童子讀書見其師因恐致病從朔日起昏憒不知人事七日乃蘇群作驚治延久不瘥曰此恐也非驚也或問驚恐何以別之曰驚從外來恐從內起恐則傷腎腎傷於恐真水受虧龍火泛越擾亂神明復遇朔日謂之重陽真陰更為之用至七日而陰氣來復然後龍歸窟宅如風雲散而天氣清明也治而壯水之主以鎮陽光以六味地黃湯補其真陰加遠志以通神明肉桂導龍火歸源服此後竟不作小兒急驚因聞大聲或驚而發搐搐止如故此熱生於心身熱面赤引飲口中氣熱二便黃赤甚則發搐蓋熱甚生風陽盛而陰虛也宜利驚丸除其痰熱不可用巴豆之藥葉天士曰驚則氣亂雖大驚未可竟以收復神氣為主當察色審症有痰者清痰安神有火者清火安神不可單用補劑須活法處治為妙驚風萬密齋治徐道淑子病驚風先請張醫治之不效萬至病已七日發搐無時痰鳴氣急勢甚危按治驚之法先降其痰次止其搐後補其虛一言以蔽之惟治其火而已乃用河間涼膈散改朴硝為馬牙水煎成湯入青礞石末調服之痰下喘止隨用瀉青丸導赤散二方相合作湯服之而搐止餘熱未除張主小柴胡湯竹葉湯涼驚丸皆不然之乃用四君子湯加炒黑乾薑一服身涼徐問故曰大凡小兒肝常有餘脾常不足肝主風搐搦氣逆皆屬於肝經曰太過則乘其所勝而侮所不勝故肝木旺則乘脾土侮肺金夫肝火名曰龍雷水不能制寒不能勝故以炒乾姜合參朮甘草之甘溫以補為瀉而愈也按治法仍以寒涼折其標以甘溫固其本若據後半云云豈不打成兩橛羅田令朱女未周歲病驚風萬用瀉青丸是丸治驚風之秘方也服之而搐轉甚蓋喉間有痰藥末頗粗為頑痰裹住黏滯不行之故乃煎作湯用薄棉紙濾去滓一服而愈瀉青丸羌活大黃川芎山梔仁龍膽草當歸防風蜜丸芡實大每服半丸竹葉湯入沙糖化下雄按用藥之法不可不相其機而投之也以此推之則熟地泥膈之說亦為痰盛者言也豈可概謂其非耶羅田曾教諭子病驚風先請一醫繼召萬同治醫主小續命湯多辛燥之藥必反助火邪而病益甚不如通聖散為愈服未盡劑而安治風病者宜三服此張世魯子病驚風已十七日矣目右視而眨音札目動也口右張而動手足向右掣引舌上黑苔勢甚危急令急取薄荷濃煎湯洗其舌謂之曰若黑苔去而舌紅則病可治否則不可治也洗之黑苔盡去以瀉青湯作大劑服之口眼俱定手口不掣以涼驚丸至聖保命丹調理十日而安聞氏子六歲病驚風延萬至則悶死治凶具矣視其形色未變與神仙太乙丹半粒挖口灌之立蘇方見蠱門留都金二守女患驚風甚危諸醫皆勿救自用活絡丹一丸即愈外科蘆揮陳三農治一小兒急驚雙眸突出舌吐三寸角弓反張兒科望而卻走曰此風火相扇風痰上湧而然用稀涎散齏汁調服吐痰涎數口目舌俱收後三日復如前症以腸胃膠痰尚未下也以神效丸薑湯化下去膠痰二三升愈曾世榮治總管楊侯幼子四歲臘月患驚風搐掣諸醫調治前症俱解但神昏不食四肢微冷已五日矣前醫用醒脾治陽之藥不一而召曾診六脈獨脾脈沉滑餘脈微緩脾脈沉而滑者此積蘊在脾乃為脾約當主大便不利非陰厥也彼曰然遂用瀉黃散加大黃水煎並三服神氣清而飲食進隨獲安可此隆冬用大黃之功也用藥如用兵當用豈容自已如五月渡瀘雪夜平蔡何待秋高馬肥而後為之若拘以四時取用則兵藥無成功矣幼幼心書大德戊戌夏曾因幹出郭至五里外有夫婦二人抱子而哭於道旁問之答曰入城探親三歲孩兒忽得驚風不省人事觀其面色青黯目閉神昏診之六脈全無按太衝脈沉而微有曾顧謂曰毋慮此子可救但左右竟無人家遂於路側拾得破碗半邊有姜一小塊細嚼捻汁碗中用五苓散蘇合香丸寬氣飲澆水調和灌下十數次漸覺氣回聲出目開自此蘇同上衡州同知官胡省齋因其子驚風曾治之愈問曰五苓散何以愈斯疾乎曰此劑內用茯苓可以安此心之神用澤瀉導小便小腸利而心氣通木得桂而枯是能抑肝之氣而風自止所以多主驚風施之他症亦皆有說胡深然之此其善用五苓散者歟同上汪表聖次子兩歲偶感風邪發熱身顫角弓反張日服此藥蓋驚風金石風痰之品及羌防膽星全蠍之品昏沉欲絕蓋不知小兒氣血未旺不耐風寒才犯之即發痙病但助其氣血即風除神爽一用此等藥治則風門大開榮衛無主舊病未去新病益增安望生理予與五味異功散加柴胡二分桂枝一分附子一分連服二劑而瘥慈幼篇此與喻嘉言之論同雄按用藥分兩可謂方成知約陳自明治一小兒昏憒六日不省驚風發搐諸藥不效手足尚溫謂其父母曰吾能活之與之針湧泉二穴足心良久而蘇喜而稱謝曰此病得之傷食宿食成痰痰壅作搐今病雖愈宿痰未去恐他日再作當制丸藥以除其根不然神氣漸昏必成癇也乃謂為牟利不信次年八月果成痰迷之病二便不知水火不避復求治因制一方以黃連山梔瀉其浮越之火膽星白附子炮以去其壅積之痰茯神遠志石菖蒲硃砂以安其神麝香以利其心竅用獖豬心中血和神麯糊為丸如黍米大燈心湯下調理半年不復發矣又與之灸風池腦後風府兩旁曲池兩肘外曲處三里曲池之下六穴而安因驚風成癇龔子才治一小兒瘛瘲啼叫額間青黑此驚風肝木乘脾腹中作痛也先用六君子湯加木香柴胡鉤藤鉤啼叫漸緩更加當歸二劑而安一小兒沉困發熱驚搐不乳視其脈紋如亂魚骨此風熱急驚之症也先用抱龍丸少許卻風化痰後用六君子湯加柴胡壯脾平肝遂熱退驚定而愈周必大二老堂雜誌云開元錢最治小兒急驚以水磨服少許神效余意小兒心受熱而發驚肝生風而發搐蓋木邪侮土用金制木之義耳似亦有理續醫說王叔權云澧陽有士人之子驚風后頂腫醫以半夏南星為細末新水調敷而愈若灸則宜灸前頂等穴云資生經薛立齋治舉人杜克宏子發熱抽搐口噤痰湧此肝膽經實火之症即急驚風先用瀉青丸一服又用六味丸二服諸症頓退乃以小柴胡湯加芎歸山梔鉤藤而安卻用補中益氣湯而愈冬官朱小溪子項間結核面色萎黃肌體消瘦咬牙抽搐頭搖目札此肝木克脾土也用六君子湯九味蘆薈丸治之而愈儒者王文遠子患瘰癧痰盛發搐服金石香燥之藥手足筋攣此肝血復傷而致急驚風也遂用加味小柴胡加鉤藤山梔芎歸一劑又以六味丸料加五味麥冬煎服而安奚氏女六歲忽然發驚目動咬牙或睡中驚搐痰涎湧盛乃肝木剋制脾土不能攝涎而上湧也當滋腎水生肝血則風自除痰自消遂用六味丸而愈薛鎧立齋父治一小兒七歲患急風將愈而發熱驚悸或用祛風化痰之劑更加驚搐吐痰喘嗽腹膨少食惡寒又用抱龍丸等加大便似痢寒熱往來殊類風症視之以為脾氣虧損諸經無所資養而然用四君子湯少用升麻柴胡以升補陽氣而愈萬密齋曰一小兒驚風后右手強硬五指拳曲不能舉物兼口角涎流語言謇澀此脾有濕痰脾不足而肝木乘之不可治也高鼓峰治呂坦人子生甫數月忽急驚風抽搐直視發熱不乳醫以抱龍丸及羌活防風薄荷殭蠶等作煎調服坦人商於高高曰誤矣此脾土虛而肝木盛也急用五味異功散補脾加煨姜制肝進之少頃熟睡微汗熱退而乳慢驚小兒慢驚因病後或吐瀉或藥餌傷損脾胃而肢體逆冷口鼻氣微手足瘛瘲昏睡露睛此脾虛生風無陽之症也小兒初生吐熱吐哯身體強直手足抽掣目反直視是胎驚風症也清驚散治小兒痙厥瘛瘲陳膽星九分飛辰砂一分研細以竹瀝小半杯生薑汁一小匙和勻再用麥冬一錢橘紅八分薄荷尖一分煎湯調服醫鏡云俗云急驚風乃痰火閉也小兒或感風寒或積乳食皆能生痰痰積則化火或受暑熱亦生火失於清解則火升而痰亦升痰火上壅閉其肺竅則諸竅皆開其證目直氣喘昏悶不醒且火甚則肝燥筋急為搐搦掣顫反張竄視而八候生焉總由閉結肝風內動而成非驚嚇也當其拘攣弓仰之時不可用力緊抱但以手扶聽其自抽自止庶不傷經絡而成廢人初起宜通關散開其嚏得嚏則醒次以竹瀝或梨汁萊菔汁和入石菖蒲汁灌之火降痰平則病自已愈後宜清熱養陰勿投溫補抱龍丸琥珀五錢辰砂三錢雄黃七錢麻油煎十二時再用水蘿蔔汁煮膽星二兩一錢殭蠶四錢炒去嘴足全蠍三錢研末用石榴一枚剜共以無灰酒調末填入蓋定坐文火上徐徐攪動成膏取出冷定用牛黃一錢麝香五分天竺黃七錢赤茯苓一兩上各為末蒸餅為丸金箔為衣燈心薄荷湯送下王晉三曰此方集肝經之藥為複方初無深意一方加人參二錢培植正氣以御肝風紫河車三錢五分即蚤休草切片黑穭豆制能伏牛黃丹朱砂之毒並可治驚祛風二味卻有妙義當纂入方中孫文垣治侄孫女周歲發慢驚眼開手拳目不動移腳趾微動自囟門後遍身如火喉中痰聲口中痰沫腹脹下氣大便亦先行以牛黃丸蘇合丸進之不效後與藥皆從痰沫流出通關散吹鼻無嚏自申至戌不醒面色素青白氣稟甚弱因婢女抱之失跌受驚發熱此驚氣乘虛而入法在不治姑以人參三錢薑汁拌炒煎湯頻頻用匙挑入口中初三四匙皆不受又與五六匙得一二匙下咽便覺痰聲少緩因頻頻與之喉中氣轉目能動再以六君子湯加天麻石菖蒲殭蠶澤瀉薄荷煎服乃略啼吮乳次日咳嗽語聲不出小水短少以辰砂益元散一錢燈心湯調下熱退聲出改以四君子湯加陳皮五味麥冬桑白皮桔梗杏仁薄荷一帖全愈馮楚瞻治黃氏兒甫五月忽發抽掣竄引角弓反張一夜五次發則二便並出額汗如雨勢甚危篤馮視之亡陽之勢俱備矣詢其由因常生重舌屢服五福化毒丹服後必瀉數次即愈蓋陽虛肆進苦寒脾陽下元虧極肝木無養挾火上乘脾土益傷虛風乃發以人參白朮各一錢熟附四分煎服服後安然靜睡下午復發隨服隨安數帖而愈吳孚先治一小兒吐瀉後失於調治忽痰涎上湧面色青白似搐不搐右手脈沉遲而弱關紋隱隱手足微冷此慢驚也不速治即成慢脾莫救用白朮人參甘草黃耆半夏炒冬瓜仁炮薑制附而安龔子才治一小兒目內色青發搐目上視叫哭不已或用牛黃清心丸不愈反咬牙頓悶小便自遺此肝經血虛甚故耳用補中益氣湯及六味丸而瘥一小兒潮熱手足發搐痰涎上湧手足指冷左腮自申酉時青中隱白此肝經虛弱肺金所勝而潮搐脾土虛弱而足冷也用補中益氣湯以補脾肺六味丸以補肝腎而愈蓋病氣有餘當認為元氣不足若用瀉金伐肝清熱化痰則誤矣一小兒嘔吐不食手足搐搦痰涎上湧手足指冷額黑唇青此腎水勝心火也用五味異功散加木香炮姜頓安乃去炮姜再劑而愈亦是脾虛之症立齋治太平王職坊子患瘧疾恪用化痰之劑虛症悉至殊類驚風曰小便頻數肝經陰虛也兩目連札肝經風熱矣作嘔懶食胃氣虛弱也泄瀉後重脾氣虛弱也用補中益氣湯六味地黃丸而痊大君劉應昌子患瘰癧恪服化痰之劑又服祛風至寶丹致與前症同亦用二方而愈葉弘士之子歲半慢驚服金石藥乃風痰之劑昏悶七日指紋直抵三關醫辭不治予投以加減補脾湯立愈慈幼篇陳文中治尚書洪端明子始生未及三個月腹脹滿足肚冷囟門高急上氣涎潮四肢搐搦同坐眾官皆言死症洪公曰我在前死了七八個兒子皆是這般症候此兒子足見難醫枉廢生受亦不召醫視之或告陳因往視而謂之曰小官人此症候不死尚可救活洪公曰此兒必死毋勞用計眾官皆曰陳君高明既有救療之心勸洪公從說乃用油珠膏一服次用長生丸一服便下黃稠黏涎約半盞內有白奶塊如小豆大十餘塊是風痰結聚乳奶一併便下後用前胡厚朴散加附子兩片二服而愈病源方論淮西戴運使小娘子始生周歲腹中氣響痰涎壅閉手足抽掣欲與芎蠍散斡取痰涎運使曰兒子小恐難依此施治陳曰前制參劉菊坡小兒始生五個月因作搐乃服芎蠍散斡去痰涎次服油珠膏即愈菊坡贈一跋於卷末今運使小娘子因驚嚇蓄冷氣於喉厭間傳入肝膽其氣上不能升下不能降血與氣俱不能流轉故致痰涎壅閉而作搐也若不能依此施治小娘子必將不起遂以芎蠍散一服更用手法斡去喉厭寒痰約有半盞次用油珠膏二服後用補脾益真湯三服再用前胡厚朴散長生丸各二服而愈同上萬密齋治一小兒二歲發搐已死家人痛哭乃阻之曰此兒面色未脫手足未冷乃氣結痰湧而悶絕非真死也取艾作小炷灸兩手中衝穴火方及肉而醒大哭父母皆喜遂用家傳治驚方以雄黃解毒丸十五丸利其痰涼驚丸二十五丸去其熱合之煎薄荷湯送下須臾利下痰涎而搐止矣一兒發搐痰湧有醫用白餅子下之不退凡三下病益深合目昏睡不哭不乳喉中氣鳴上氣喘促大便時下萬曰五臟氣絕不可治轉下之過也彼醫曰白餅子錢氏下痰神方也萬曰盡信書不如無書錢氏小兒皆出於門人附會之事也虞天民謂錢乙書出於門人閻孝忠所集非錢氏本意蓋人之有痰猶木之有津時令大熱草木流津痰自熱生此明證也痰猶水也附氣自行過顯在山豈水之性哉乃搏激使之也今痰隨火上不知降火而反下之損其胃氣胃氣既敗五臟俱損故目不開者肝絕也昏睡不語者脾絕也啼聲不出者心絕也喘促痰響者肺絕也便尿遺失者腎絕也果不可治而死雄按論痰中肯巴中有儒醫者治病多奇方惟性太執不知變通時有兩小兒發搐萬謂急驚當用涼血導赤散瀉青丸是也彼謂驚風者肝火鬱遏而成也火鬱則發之論極是小續命湯是也方大謬人不能決兩從之萬所治者一日而安彼治者死悔無及也一兒發搐先取善推法者推之止而後發病益危甚萬曰推法者乃針灸按摩之遺意也經曰無刺大虛人推掐之法壯實者可用之如怯弱者其氣不行推則有汗反傷元氣也其家不信萬曰不死必成癇半月後果死一兒發搐因用推法萬曰病成癇矣推法者乃發表之意痰聚在心不得出也幸初成癇當可治若久則為終身痼疾不可治也立方用黃連五錢硃砂二錢五分白甘遂三分膽星一錢為末米糊為丸獖豬心血杵勻丸芡實大每服一丸燈草煎湯化下夜服三日服一遂安一兒發搐醫以二陳湯薑汁竹瀝治之不效萬視其外候三關青氣兩頰赤色目常直視指如捻物曰此得之外感未與發散熱入於裡錢氏曰肝有熱則目直視得心熱則發搐又曰頰赤而目直視必作驚風小兒肝常有餘又乘木旺之時當與瀉肝若二陳湯陳皮半夏生薑之辛皆助肝之物經曰以辛補之所以無效乃用瀉青丸瀉肝木之有餘導赤散以瀉心經之火一服而搐即止因其胎稟素怯脾胃且弱恐後作搐便成癇疾又與琥珀丸常服而安一小兒周歲發熱而搐以瀉青丸投之不效乃問其發搐之狀其母曰搐過後只好睡以乳與之則飲不與則不思醒時則戲作貓兒聲見人則笑不發搐便是好了萬曰醫要識症藥要對症怪底前藥之不效也以導赤散服之一劑而安其父問故曰心臟屬火其聲為笑火生於寅屬虎貓者虎之類也貓聲而笑知非肝病乃心病也故以導赤散瀉其心火而安可稱絕世聰明一兒發搐五日不醒藥石難入萬針其三里合谷人中而醒父母喜曰吾兒未出痘疹願結拜為父乞調養之萬曰曩用針時針下無氣此稟賦不足也如調數年後出痘可保無事若在近年不敢許次年果以痘疹死張子和治一小兒病手足搐搦張曰心火勝也勿持其手當聽之此由乳母保抱太急所致乃令掃淨地以水灑之待其干令復灑之令極濕俯臥兒於地上良久渾身轉側泥涴皆滿矣仍以水洗之少頃而瘥子和曰小兒風熱驚搐乃常病也當搦時切戒抱捉手足握持太急必半身不遂也氣血偏勝必痹其一臂漸成細瘦至老難治當其搐時置一竹簟鋪之涼地使兒寢其上待其搐風力行遍經絡搐極自止不至傷人予嘗診一兒見其左掌拳曲詢其由乃小時患驚搐為母抱持太急病愈手遂不能伸舒按此症若初得以大劑肝腎陰劑與之必能伸舒如故惜世無知者葛茂林治少師楊公子當暑而驚眩已絕且移之木矣葛趨而入曰無傷也亟出之公曰兒已噤矣奈何劑也葛曰予無劑也所恃者天上云耳云生而悽悽欲雨陰氣舒而陽郁消吾以清利物煮水而蒸於下其可瘳乎果如其法而疾愈迨暮兒復戲於庭矣杭州府志薛立齋治一小兒三歲因驚搐搦發熱痰盛久服抱龍丸等藥反致面色或赤或青此心肝二經血虛風熱生痰不足之象也用六味丸滋腎水生肝血用六君柴胡升麻調補脾胃而安高鼓峰治徐彥為子甫四歲盛夏發熱驚搐不已腰曲目直小便短赤面無神色醫作傷寒不應高視之曰火燥生風風淫末疾非傷寒也用滋水清肝飲盡一劑而汗解便利熱退高曰瘧至矣立用五味異功散補脾加麥冬五味生脈清暑十餘劑而愈陸肖愚治鞠氏子年十一向因水土不便泄瀉瘦弱四月終旬蒸熱淫雨忽患頭面大腫手足身體亦微腫或謂風熱與蘇葉羌防升麻柴葛等汗大泄既而痰湧吐逆語言不倫身強直手足振掉又謂急驚風用抱龍鎮心等丸不效脈之浮緩而弱此因脾虛土不勝水且濕氣盛行內濕與外濕相感而作腫治而健脾滲濕乃反發汗致升動其臟腑之痰涎漏泄其經絡之津液宜其變症若此也因用六君子湯加歸芍投之一劑而吐止數劑而僵直振掉除又數劑精神復加澤瀉倍茯苓數十劑下腫消瀉止薛立齋治憲幕顧斐齋元孫二周項結核兩臂反張索敗毒果系前症遂與六味丸一服清晨灌之午後肢體如常一兒兩目札動手足發搐數服天麻防風丸之類以祛風化痰前症不愈其痰益甚得飲食諸症稍愈視其準頭及左頰色青黃曰脾主涎此肝木製脾土不能統攝其涎非痰盛也遂用六君子湯加升麻柴胡鉤藤二劑飲食漸進諸症漸愈又用補中益氣而安萬密齋治一小兒痰壅發搐氣促而喘而礞石滾痰丸桑白皮煎湯碾碎調服之喘定痰下搐亦止矣一小兒七月發搐無時昏睡不醒不哭不乳掐之札之不痛㗜之鼻不嚏灌藥不入曰此真搐也不可治矣密齋父治一小兒滿月後發搐以至聖保命丹治之而安喻嘉言治門人王生表兄沙無翼之子縱啖生硬冷物一夕吐食暴僵不省人事醫以驚風藥治之渾身壯熱面若裝朱眼吊唇掀下利沾汙診畢謂曰此慢脾風候也脾氣素傷更以金石藥重傷今已將絕故顯若垂危症本有法可救但須七日方醒恐信不篤而更醫無識反得諉罪生謗王生堅請監督其家且以代勞且以壯膽於是用烏蠍四君子湯每日灌一大劑每劑用人參一錢渠家雖暗慌然見面赤退而色轉明潤便瀉止而動移輕活似有欲言不言之意亦自隱忍至第六晚忽覺手足不寧揭去衣被始極詆人參之害王生先自張皇任其轉請他醫才用牛黃少許從前危症復出面上一團死氣但大便不瀉耳重服理脾藥又五日方蘇楊乘六治孫氏子慢脾症痰涎湧盛咳嗽身熱抽搐自汗嗜臥露睛撮空手振屢進補脾逐風消痰之劑不應楊曰此症風自內出本無可逐痰因虛動亦不必消只補脾土諸症自退今面白睛散舌滑白天柱已倒虛上加寒非炮薑桂附何以追已去之陽而蘇垂絕之氣哉乃寫參附養榮方與之且囑之曰如以稚幼純陽無補陽之法無挽回矣一劑症減三劑全除次用五味異功散加煨薑白芍而痊薛立齋云一小兒常患停食數服克伐消導之劑以致脾胃虛甚患吐瀉慢脾風而卒萬密齋治一兒脾胃素弱病瀉以理中丸服之瀉未止口內生瘡或謂前藥性熱助火復以冷藥與之身微熱睡則揚睛曰此慢脾風矣脾胃本虛瀉利益虛口中生瘡者脾虛熱也誤服冷藥則中氣益損昏睡不乳虛損之極也當急作調元湯倍加人參服之調理半月而愈馬銘鞠治華叔蟾乃郎慢脾風五六日愈愈甫三四日即過多飲食連浴兩宵復痰壅沉迷面目俱浮胸腫滿嘔吐乳食不進魚弓反張二便交秘有欲進以牛黃丸者馬曰下咽死矣此病後虛症也然參且勿用用麥冬三錢枇杷葉三片貝母二錢半桑皮錢半杏仁一錢藿香一錢鮮糖球一枚蒼朮人乳炒八分橘紅一錢二分加燈心煎臨服入薑汁服逾時小便隨利腹即寬諸症悉退盡劑竟愈汪元津子年五歲傷食成瘧瘧後發搐乃脾虛病也萬曰凡治驚風必用瀉青丸導赤散雖良工不能廢其繩墨也今此症不可瀉宜用調元湯琥珀抱龍丸如言服之而搐止但目不能開昏昏喜睡蓋脾虛極矣脾主困故喜睡目之上下胞屬脾脾虛故不能開也仍以調元湯補其虛琥珀抱龍丸安其神脾喜樂命平日所與作伴嬉戲者環列床前取鼓鈸諸器擊之或歌或舞以引之設法亦善病兒之目乍開乍閉以漸而蘇不喜睡矣風癇萬密齋治汪前川子年四歲七月病驚搐醫以拿法掐止之八月連發二次仍用掐法九月又發萬曰痰聚成驚驚久成癇幼科拿法即古之按摩法也病在榮衛者可用之使榮衛之氣行亦發散之意病在臟腑則不能去矣久則痰塞心竅不亟治必成痼疾古所謂五癇者自此得之因立方以黃連瀉心中之邪熱為君枳實半夏去胸中之積痰為臣硃砂寒水石之墜以安其神為佐甘遂逐上焦之痰飲麝香以利竅為使神麯作糊丸如龍眼大每服一丸用獖豬心銅刀批開納丸其中縛煮待心熟取丸和心服之並飲其湯名曰斷癇丸服豬心五個乃愈陳氏子二歲病驚風失治成癇每月一發來求藥萬用六子散末分三色巧於點染一色青黛相和名安魂散青入肝肝臟魂寅卯時屬木竹葉煎湯下一色硃砂相和名寧神散赤入心心藏神巳午時屬火燈心湯下一色入輕粉少許名定魄散白入肺肺藏魄申酉時屬金薄荷湯下調理半年而安大凡癇病初得之者十療八九如過二三年後者不可治矣時醫有用吐法者有用滾痰丸下之者徒損胃氣百無一效有以壽星丸治之者一杯之水豈能減車薪之火哉萬婿李中庵九歲時得癇病嘗昏僕口眼俱合手足不動喉無痰聲但僵臥如醉人知其為心病也乃用東垣安神丸去地黃加茯神遠志石菖蒲以通其心竅南星珍珠末鐵華粉以墜其痰湯浸蒸餅丸如黍米大凡用鎮墜藥及治上焦病者丸皆宜細燈心湯下調治一年而愈萬之季男七八歲時得癇病發則面先青慘目定口中有痰如嚼物狀昏僕一食頃乃蘇因教其母但見面青目定時即以鵝翎探吐其痰亦是一法如法而行前後吐痰二升許癇竟不發如此調理三年而安大抵癇病皆痰也雖有五獸之名豬羊雞犬牛是也巢氏之說後人多非之各隨其臟詳見錢氏方中凡氣實者控涎丹氣虛者斷癇丸愈後以琥珀抱龍丸調之未有不安者但年深者不可治也三因方控涎用甘遂大戟白芥子等分末煮糊丸薛立齋治一小兒患驚癇吐痰困倦半餉而蘇諸藥不效年至十三而頻發用肥厚紫河車生研爛入人參當歸末搗丸桐子大每服三十五丸日進三五服乳化下一月漸愈又佐以八珍湯全愈雄按紫河車可以羊腎代之一兒七歲患驚癇令其恣食人乳後發漸疏而輕至十四復發用乳不效亦用河車丸數具而愈常用加減八味丸而安後至二十三歲後發而手足厥冷仍用前法佐以八味丸十全大補湯而痊又治數小兒皆以補中益氣湯六君子湯六味八味等丸相間用之皆得全愈馮楚瞻治汪氏兒九歲因驚癇屢發抽掣語言不清勢甚危篤脈之堅弦久按無力詢其由痘疹後跣足行走忽腳面浮腫疑為草露之毒服清涼解毒數劑漸腫至腿又服五子五皮飲數劑忽一日僵仆卒倒乃成驚癇之疾曰此痘後氣血大虛所以腳腫誤服清涼乃腫至腿復加滲利削伐至虛火上乘無故卒倒猶大人中風症也惟宜峻補氣血佐以舒筋活絡之藥乃用當歸白朮白芍煨天麻熟地茯苓牛膝銀花秦艽熟附子之類三四帖後其勢稍緩以前方沖人參湯調理二月而安萬密齋治一兒四歲病驚痰湧針其湧泉穴而醒自後不發謂曰未服豁痰之藥恐發癇也不信未半年似痰迷飲食便溺皆不知時復昏倒果成癇矣問其發時能自知乎曰目昏即發乃與錢氏安神丸加膽草服之教其父曰病將發時急掐兩手合谷如此調理一月而安一小兒十歲久得癇疾診之兩目渾白無有睛光語言謇澀舉動癡迷辭不可治另延醫治之竟無成功黃州守萬魯庵子病癇見其容貌俊偉性格聰明謂曰可治乃與琥珀抱龍丸方使自制服之發熱張子和治高巡檢之子八歲病熱醫者皆謂傷冷以熱藥攻之欲飲水禁而不與內水涸竭煩躁轉生前後皆閉口鼻俱干寒熱往來咳嗽時作遍身無汗又欲灸之張責其母曰重裀厚被暖炕紅爐兒已不勝其熱矣尚可灸乎先令服人參柴胡飲子連進數服下爛魚腸之類臭氣異常渴欲飲水聽其所欲而冰雪涼水連進數杯節次又下三四十行大熱方去又與牛黃通隔丸復下十餘行兒方大痊前後約五十餘行略無所困冰雪水飲至一斛倘灸之當何如哉呂東莊治吳尹明子十歲患夜熱二年餘頷下忽腫硬如石面黃時時鼻衄如注脈之沉鬱之氣獨見陽關曰病敦阜也右關主脾胃沉鬱乃實熱症敦阜字狡示人以不易知也用石膏藿香葉梔子防風黃連甘草等頜腫漸軟面黃復正繼用茯苓枇杷葉元參枳殼山梔茵陳石斛天麥門冬生熟地黃飲甘露飲也重加黃連而衄血夜熱悉除陸養愚治李邑宰子年十一於六月夜間忽發熱微汗頭微痛或謂傷暑與香薷飲冷服病更甚且喘嗽痰又謂脈氣浮數火熱上炎以芩連知母花粉清之喘咳不絕飲食不思睡臥不安脈之弦緊左倍於右面赤戴陽此風寒外束宜發散之或謂如此炎天且身常有汗何以宜表曰正因風寒傷其衛陽之氣令外之陽氣拒而不得入故汗微微而不止內之陽氣伏而不得出故身翕翕而壯熱若解散其邪則外者得入內者得出自汗止身涼矣用乾葛為君蘇葉防風為臣前胡白芷川芎為佐桔梗杏仁甘草為使熱服微覆汗大泄少頃喘嗽吐熱頓減二劑全愈薛立齋治儒者薛衡甫子年七歲身弱羸發熱面黃皆以為內傷瘀血欲下之謂乃脾臟受傷投以六君子湯加煨姜兩服飲食頓進數服諸證全愈萬密齋治一兒發熱日晡猶甚或作瘧作潮熱治俱不效曰此胃虛有宿食也謂瘧疾則寒熱有發有止謂潮熱則發有時如水之潮過即退次日依時再發此兒身常溫然至申酉時發故知是宿食發熱也或曰有所據乎曰出仲景傷寒正理論陽明病證云潮熱者實也宜下之以三化丸下之而愈一兒驚風時熱不退有議用小柴胡湯者有欲用竹葉湯者有欲用涼驚丸者曰大驚之後脾胃已虛宜溫補之三方寒涼不可用也乃與理中湯用炒乾姜一劑熱除三府張公子初冬三日發熱又二日熱益甚目上直視口多妄言或作風治無效至二十七日診之曰病勢將退但肺熱未除耳問何故曰三關黃潤兩目睛精明此病當愈也惟正面戴陽喘氣上息此肺虛熱耳與小阿膠散咸阻之幸不聽一劑喘止熱退欲食而安萬密齋治黃學儀子病熱不退其父治之已八日不效全叩之全密齋名曰日夜發熱小便赤大便難再叩藥曰先與胃苓丸庸手今與涼驚丸全曰不效宜矣其父曰汝能已此病乎全對曰此名風熱乃肝病宜用瀉青丸熱即退矣黃氏相招即令全往如法治之五日而愈然則今之小兒宜養胃矣羌活大黃芎藭山梔膽草當歸防風余氏子病熱諸醫汗之下之和解之皆不效以虛熱也用調元湯加炒乾姜未盡劑而熱除密齋長男幼多病一日病瘧後潮熱日益瘦先父母憂之全曰此疳氣也用小柴胡加鱉甲當歸川芎陳皮青皮為丸服之愈馮楚瞻治李氏兒八歲病熱旬余發散和解苦寒之劑備嘗無效勢日危篤診之形肉枯槁牙齒堆垢厚而色焦黑唇舌燥烈耳聾目盲遍身疼痛壯熱無汗譫語煩躁脈之沉微欲脫陰寒之候也此釜底無火鍋蓋乾躁之象上之假熱由於下之真寒也乃重用人參熟地少加附子壯水益火服後夜半思食次日其脈更虛但神氣小清爽乃倍進前藥三四劑後漸瘳不十劑全愈姜居安治一貴官攜家過沛抵沙河稚子病居安告之曰請勿驚但得沙一斗病即愈官如其指布沙舟中令兒臥其上久之兒手足能動不數時而病良已貴官問故曰小兒純陽當春月而衣被皆湖棉過於熱故得涼氣而解江南通志馮楚瞻治洪氏兒未及一周時當暑熱壯熱多日神氣困倦唇舌焦燥飲乳作吐五心亦熱如烙脈洪數而弦醫與發散消導數劑復疑麻疹更為托表馮曰久熱傷陰陰已竭矣復加托表陽外越矣若不急為斂納何以續陰陽於垂絕哉乃用熟地四錢麥冬一錢五分牛膝一錢二分五味子一分製附子四分一劑熱退次日加炒黃白朮一錢六分另煎人參沖服愈張景岳仲男生於五月於本年初秋忽感寒發熱脈微緊數知其臟氣屬陰不敢清解遂與芎蘇羌芷細辛生薑之屬冀散其寒一劑熱不退反大瀉二日不止繼之以喘愈瀉則愈喘見其表裡俱劇乃用人參二錢生薑五片煎汁半盞未敢驟進恐加喘也與二三茶匙呼吸仍舊乃與三四匙息稍舒遂與半小鐘覺有應遂自午及酉完此一劑適一醫至曰誤矣焉有大喘可用參者速宜抱龍丸解之張但唯唯仍用人參二錢五分如前煎湯自酉至子盡其劑氣息已平酣睡瀉止而熱亦退矣所以知其然者觀其因瀉反喘豈非中虛設有實邪自當喘隨瀉減向使易以清利中氣脫而死矣必反咎用參之誤也孰是孰非何從辨哉此醫之所以難為而易為也因紀此見溫中散寒之功其妙有如此者按是症或是小兒變蒸之熱誤用峻表傷其元氣以致喘利幸服獨參挽回後之所云亦過後詳載耳葉天士曰五月至新秋僅兩月耳嬰兒不能言語六脈難憑初秋暑邪尚熾感而發熱當用清暑之藥乃孟浪投以辛溫發表純陽柔嫩之軀當暑傷元氣之時肺氣焉得不耗散乎肺與大腸相表裡肺氣虛注其大腸而作瀉肺氣耗散則喘作此辛溫發表之誤也故用參補其肺氣而愈乃不省其藥誤反云治病之妙何憒憒若此竟云人參可以冶發熱恐誤後人故不得不為之辨白一兒感冷惡寒大熱用發藥則汗出熱退過一二日復熱大便秘必里未解也服四順清涼飲利一行熱退隔日又熱小便赤服導赤飲熱退過三日又熱庸劣者幾無措手矣診其脈脈已和既發汗又利小便其氣已虛陽氣無所歸皆見於表所以熱以六神散和其胃氣加烏梅一枚令微有酸味收其陽氣歸內服此全愈無名氏又一兒有積熱表裡俱熱頰赤口乾小便赤大便焦黃用四順飲利動臟腑熱乃去既而復熱里解而表未解也發散微汗熱乃去隔日又熱此無他表裡俱虛氣不歸元而陽浮於外所以再熱實非熱症也只以六神散入粳米煎和其胃氣則寒氣歸內身體自涼同上二案表裡變化潮熱者時間發熱過時即退日依時而發此欲發驚也壯熱者常熱不已甚則發癇也風熱者身熱而口中氣熱乃風邪外感也溫熱者肢體微熱也發熱而不欲飲水者胃氣虛熱也發熱而飲水作渴喜冷飲食者胃氣實熱也嘔吐萬密齋治教諭熊文村子二歲病嘔吐更數醫不效食故入口即吐出萬視之曰病可治也問用何方曰理中湯曰服多劑矣不效奈何曰如在內經乃陰盛格陽之病寒因熱用伏其所主先其所因則效矣乃作一劑取獖豬膽汁童便各半和藥炒乾煎而服之即仲景白通湯入人尿豬膽汁之法吐立止後稱渴以湯飲之復作吐萬曰凡嘔家多渴者胃脘之津液干也當得一二時吐止胃氣回津液生渴自止矣令將前藥渣再煎服之仍禁其飲食半日而安熊問同是理中湯前用之不效今用之而效何也曰公子胃寒而吐當以熱藥治之乃寒盛於中投之熱劑兩情不得故不效也今以理中為治寒之主用豬膽汁之苦寒小便之鹹寒為佐以從其格拒之寒藥下於咽而寒相得入於胃陰體漸弱陽性乃發其始則同其終則異故曰伏其所主先其所因也此軒岐之秘旨啟元子之奧義張長沙之良法也后王民肅子半載嘔吐不納乳昏睡仰臥而努其身有作慢風之候亦以理中末三分用水一杯煎至半杯入膽汁童便各一匙攪勻徐徐灌之而瘥鄭氏女患嘔吐萬視其症乃傷食吐乳也家人云無乃用理中湯去甘草加丁香藿香不效又作膽汁童便法亦不效四日後吐出飯半碗詢其家人曰此兒數日不食何得有此始吾言傷食語固云無故治不見效遂取脾積丸投之取下惡糞如靛乃五日前所食雞子黃也所吐之飯即其時所食也壅塞腸胃格拒飲食所以作吐下之即愈一兒自滿月後常吐乳父母憂之諸醫不能止一日問萬萬曰嘔吐者非常有之病也今常吐乳非病也然小兒賴乳以生頻吐非所宜也其間有母氣壯乳多縱兒飽足飽則傷胃所食之乳湧而出此名溢乳如瓶之注水滿而溢也宜損節之更服肥兒丸兒之初生筋骨軟弱為乳母者常懷抱護持可也不然則左右傾側其乳流出此名哯乳如瓶之側其水流出也能緊護持則不吐也有胃弱也不能受乳以變之吐出無時所吐不多此名哺露如瓶之漏不能容受也當補其脾胃助其變化可也亦以肥兒丸主治自愈通達之論養子者宜知之龔子才治小兒傷食嘔吐服克伐之藥嘔中見血用清熱涼血之藥又大便下血唇色白而或青問其故龔曰此脾土虧損肝木所乘而然也今空心用補中益氣湯食後用異功散以調補中氣使涎血各歸其原而愈薛立齋治一小兒每飲食失節或外經所忤即吐瀉發搐服鎮驚化痰等藥而愈後發搐益甚飲食不進雖參術之劑到口即嘔乃用白朮和土炒黃用米泔煎數沸不時灌半匙仍嘔次日灌之微嘔再日灌之欲嘔此後每服二三匙漸加至半杯不嘔乃濃煎服而愈葉天士觀立齋治吐瀉者以脾胃為主並不參入歸地此乃認清門路之治非張景岳所能及也一小兒停食服通利之劑作嘔腹脹此脾胃復傷也用補中益氣湯而愈萬密齋治一兒初生即吐或欲用錢氏木瓜丸曰不可小兒初生胃氣甚微或有乳多過飽而吐者當緩緩與之或因浴時客寒犯胃而吐者當用乳汁一杯用薑蔥同煎少與服之或因惡露泄水停在腹中而吐者宜以炙草煎湯而吐去之奈何用木瓜丸以鐵粉檳榔之重劑犯其胃中初生中和之氣耶故常語人曰錢氏小兒方非先生親筆乃門人附會之說也大還治一小兒生方九日即嘔吐腹脹作脾氣虛寒用半夏陳皮薑汁卜子丁香藿香砂仁各少許煎飲半酒盞而愈泄瀉有小兒病虛滑食略化大便日十餘次四肢柴瘦腹大食訖又飢此疾正是大腸移熱於胃善食而瘦又謂之食㑊症時五六月間脈洪大按之則絕今六脈既單洪則夏之氣獨見按之絕則無胃氣也經曰夏脈洪洪多胃氣少曰病但洪無胃氣曰死夏以胃氣為本治療過於失時不逾旬果卒衍義滑伯仁治胡元望之女生始六月病泄瀉不已與灸百會穴愈滁州趙使君云其女年甫周歲忽苦臟腑泄瀉每所下如雞子黃者半盆許數日之間幾至百行漸作驚風症有一士大夫教以鍾乳粉二錢以棗肉和搜令取意食之不然以濃煎棗湯調鍾乳服亦可以小兒只用一錢已平復矣傳方者云他日或作小瘡瘍不足慮兒子清輝年三歲過鎮江時病久瀉危甚用此法服至半兩遂安亦不生瘡是齋方萬密齋治孫監司女五歲病瀉諸治不效萬視之曰瀉久傷陰津液不足故熱發而渴也渴飲湯水多則脾受熱而瀉益不止腎益燥而渴轉甚法當專補脾胃則瀉渴止而津液生熱自除矣用參朮苓草加木香藿香乾葛作大劑煎湯戒勿飲水以湯代之未半日進兩劑因思肺為津液之主肺金大燥不能生水故渴不止乃加法制天花粉葛根等分只一服其夜渴減瀉亦少次日仍用前方渴瀉俱止問何不用仍服白朮散萬因以己意告之後誤啖菱病喘而面目浮腫以錢氏異功散加藿葉紫蘇一服而腫去喘止胡三溪子多病三歲病瀉諸治不效萬視之曰此傷食瀉也夫瀉有三症熱瀉者糞色黃而渴冷瀉者糞色青而不渴食積瀉者屎酸臭而腹痛或渴或不渴此子之疾所下酸臭用丁香脾積丸一服而愈三溪曰巴豆下積而止渴何也曰本草云巴豆未瀉者能令人瀉已瀉者能令人止積去瀉止自然之理也萬石泉子此人亦是兒醫病瀉自作理中訶子豆蔻與之不效延萬治渠書一牛字安凳上蓋治愈當以牛為謝也即以其字卜之牛下橫一凳乃生字也曰予到令郎之病即愈矣與以陳氏肉豆蔻丸合胃苓丸車前草煎湯下一服而瀉止石泉欲再進一服曰腸胃嬌嫩不得已用藥中病即止不可過也越三日身發紅斑狀如錦文石泉頗究心傷寒謂瀉後發斑與陽明症下之太早熱氣乘虛入胃之症同宜服化斑湯但石膏性寒瀉後脾虛恐不可用萬曰有是病則投是藥何不可者請用之未盡而斑退身涼觀此則前之巴蔻丸未免有太熱之弊胡東郊子一歲六月中病瀉治不效瀉下頻並黃白而後重發熱而渴時天甚暑皮膚燥而無汗發稀成穗萬曰此熱瀉成疳矣瀉下頻並後重者裡熱也糞黃者脾熱之色也白者乳汁不化猶邪熱不殺穀也口渴皮膚乾燥發成穗者津液枯也乃用四物湯合黃連香薷飲令乳母服之以解其暑毒初用四君子湯調六一散與兒服之解其熱次用四君子湯合黃芩芍藥湯以止其瀉三用白朮散以止其渴四用白朮散加升麻以舉其下陷之氣五用白朮散加烏梅肉以收其滑泄之氣皆不效其母託人相問萬曰五法不中病術將窮矣只有一法以黃連木香訶子肉豆蔻乾蟾使君子肉砂仁等分為末粟糊丸陳倉米炒熟地煎湯下服三日滿頭出熱瘡乃小癤身有微汗渴瀉俱止五治均是良法所以不效者以滑泄久湯藥過而不留也故終以丸藥收功喻氏治瀉必煮藥令如糜粥即此意也萬之子甫周歲六月病瀉時萬出外舅甘以藥調之不效加以大熱而渴萬聞馳歸問用何藥曰理中丸因知其犯時禁也用熱遠熱乃制玉露散澄水調服而愈徐氏子歲半六月病瀉甘治之不效大熱大渴煩躁不安萬往視問向服何藥甘曰玉露散初服瀉已止因熱未除再與之復泄矣今五日病益甚教用理中湯加熟附子治之如服下越加煩躁再進一劑即愈若不煩躁不可治也萬歸半日後甘攜酒來問前者甥病泄用理中丸不效師教以用玉露散果愈今者此病用玉露散不效師教以理中湯加熟附止之何也萬曰理中丸之止瀉補中氣之藥也前者甥之病汝用理中丸與病相違故不效得玉露散以解暑故遂愈今之此病汝用玉露散是也中病即止不可再服因用之太過犯臟禁也脾喜溫而惡寒故以理中湯加熟附救之甘曰又謂理中湯後加煩躁者可治否則不可治何也曰夏至一陰生坤乃六月之卦易曰坤為地陰內而陽外坤屬土喜暖而惡寒玉露散雖治暑瀉之藥其性寒過劑則脾土反傷陰盛於內陽脫於外吾見其兒面赤目張口閉唇燥大熱大渴此脫症也故用理中熟附以扶陽抑陰不加煩躁則脾為死陰不可救矣若加煩躁則胃氣猶存但藥敵而然再進一服則陽勝陰退而安矣此段議論極精宜識之胡氏子夏月病瀉醫用理中以理中氣五苓以利小便豆蔻丸以止瀉皆不效萬視其發熱昏睡腸鳴下利水穀不化曰此傷風泄瀉也經曰春傷於風夏生飧泄飧泄者謂水穀不化也初病時宜用黃芩芍藥湯加羌活防風發散之劑今病久中氣弱矣用建中加白朮茯苓服三劑而愈薛立齋治一小兒瀉而大便熱赤小便澀少此熱蘊於內也先以四苓散加炒黃連一劑其熱稍退又用七味白朮散去木香二劑熱渴頓止後以四君子升麻調理而痊一兒九歲食炙爆之物作瀉飲冷諸藥不應肌體消瘦飲食少思用黃連一兩酒炒焦為末入人參末四兩粥丸小豆大每服四十五丸不拘時白湯下服訖漸愈又用五味異功散加升麻服月餘而痊後不禁厚味復作飲冷服肥兒丸異功散而愈龔子才治一兒久瀉兼脫肛小腹重墮四肢浮腫面色萎黃時或兼青諸藥入口即吐審乳母憂鬱傷脾大便不實先用補中益氣湯五味異功散及四神丸調治其母不兩月子母俱痊治兒病先察其母極是要著喻嘉言治沈氏子因痘後食物不節病瀉泄久脾虛病瘧遂兩腹痛脹大三年來消導無算脹瀉如初更服參苓白朮稍效旋覆如初病本腹脹更兼腸澼腸澼者大腸之氣空洞易走胃中傳下之物總不停蓄澼出無度腥水不臭十中五死五生之症也今則病加四逆矣暮熱朝涼一逆也大渴引飲二逆也氣喘不能仰睡三逆也多汗煩躁不寧四逆也蓋初瘧時寒熱交作猶是陰陽互戰迨瀉久亡陰乃為夜熱至引外水以自救醫不清其源重以香燥破氣之藥助火劫陰於是汗喘煩躁並作治亦難矣強求用藥乃以清燥潤肺為主阿膠地黃門冬等類同蜜熬膏三斤此兒三年為藥所苦得此甘味稱為糖也日爭十餘次服之半月藥盡遂愈另制理脾末藥善後全安馮楚瞻治一兒滑泄半載肌肉瘦削脾胃之藥備嘗無效此久利不已脾胃之中氣固虛而腎家之元氣更虛閉藏之司失職當不事脾而事腎可也以八味丸用人參炒老米同煎湯化服不一月全愈張子和曰予嘗告陳敬之若小兒病緩急無藥不如不用庸醫宜湯浸蒸餅令軟丸作白丸紿其妻妾以為真藥使兒服之以聽天命最為上藥歲在丙戌群兒皆病泄瀉但用藥者多死蓋醫者不達濕熱之理以溫燥行之故惟敬之不與藥用余之言病兒獨存雄按句句名言張三錫治一稚子久瀉以參苓白朮散加黃連豆蔻少許作丸用燈心湯化下十數丸效萬密齋治一兒病瀉大渴不止醫與五苓散玉露散皆不效病益困腮妍唇紅曰不可治也泄瀉大渴者水去谷少津液不足故也法當用白朮散補其津液乃服五苓玉露滲利之劑重亡津液脾胃轉虛訣云大渴不止止而又渴者死泄瀉不止精神不好者死不信二日後發搐而死汪城南子病瀉十餘日不止或以胃苓丸一粒丹服之不效乃與豆蔻丸五十胃苓丸五十陳倉米煎湯下一劑而止矣小兒吐乳瀉黃傷熱乳也吐乳瀉青傷冷乳也皆當下之吐瀉昏倦睡不露睛者胃實熱也吐痰涎及綠水者胃虛冷也初生下吐因穢惡下咽故也凡初生急須拭淨口中否則啼聲一發穢物下致生諸病拭去穢物出痘必稀葉天士曰藿亂吐瀉必挾外之暑溫穢惡之邪與內傷食物而起宜藿香正氣散加減治之不可用張景岳新方亂投吐瀉萬密齋治一小兒周歲吐瀉並作時天大寒醫用理中胃苓丸服之不效萬曰此表裡有寒邪未得發散也取益黃散與之其夜得大汗而止一女歲半亦吐瀉並作此傷食也前有外感風邪故用益黃散溫散其表裡之寒此只傷食用胃苓丸一粒丹陳壁土湯下調其脾胃消其食積而吐瀉俱止一兒暴吐瀉上下所出皆乳不化用理中丸服之效一兒暴吐瀉上下所出皆黃水中有乳片用二陳湯加黃連薑汁炒煎服效或問二病同而治之異者何也曰所出之乳不化者胃有寒也故以理中丸急溫之所出乳片不化者胃有邪熱邪熱不殺穀宜半夏黃連以解之此病同異治法也張景岳季子生於燕地及白露時甫半周偶感寒吐瀉大作即用溫胃和脾之藥不效隨用理中等劑亦不效三日後加人參三錢及薑桂吳茱萸肉豆蔻之類亦不效至四五日則隨乳隨吐其半而瀉其半腹中已無所留矣不得已用人參五六錢制附薑桂各一二錢下咽即吐一滴不存而所下之乳潔白無氣猶是乳也其形氣之危已萬無生理度其寒氣犯胃舍參薑桂附之屬何以為治既乃悟其胃虛已極藥之氣味略有不投則隨拒而出且附子味鹹亦能作嘔必其故也必得甘辣可口之藥庶胃氣可安乃用胡椒三錢搗碎煨姜一兩水二鍾煎八分另用人參二兩水二鍾煎一鍾以茶匙挑合二湯以配其味凡用參湯之十加椒薑湯之一其味甘而辣正得可口之宜遂溫至熱湯中徐徐挑與之經一時許皆嚥下自後乳藥皆安但瀉仍未止計半日已盡二兩之參矣參盡後忽躁擾呻吟煩劇之甚家人皆謂熱藥內燒所致因思藥果不對何以初甚相安此必數日不食胃氣新復倉廩空虛飢甚則然也取粥示之果張皇欲得其狀甚急乃與一小盞一呷而盡又欲之遂與半碗猶不足又與半碗始寂然安臥次日復加制附得瀉止全愈原其受病之深用藥雖當氣味不投猶弗獲效至其因飢發躁使非解悟妄用清涼一劑則全功盡棄而仍歸罪於用參姜者矣葉天士曰半歲之嬰兒如此大劑薑桂等熱藥加之胡椒三錢人參二兩雖屬寒侵不必如此大劑也幸而得生乃粥之功經云五虛者死粥漿則生若竟講用熱藥補劑腸胃何堪消受景岳將自己三子以證用熱藥大補之效使後人信彼之說立齋雖喜用溫補未有若此之甚也業幼科者不可執此法以誤人薛立齋治一小兒數歲每停食輒服峻利之劑後患肚腹膨脹或嘔吐泄瀉先用六君子湯諸症漸愈又用補中益氣湯胃氣漸復韶州醫者劉從周論小兒吐瀉發搐覺有痰者但服五苓散入生薑半夏煎服吐了痰瀉亦止驚自退百乙方瘧葉天士曰瘧因暑發居多方書雖有痰食寒熱瘴癘之互異幼稚之瘧都因脾胃受病然氣怯神弱初病驚癇厥逆為多在夏秋之時斷不可認為驚癇大凡瘧症須分十二經與咳症相等若幼科庸俗但以小柴胡去參或香薷葛根之屬不知柴胡動肝陰葛根竭胃汁致變屢矣幼科純陽暑為熱氣症必熱多煩渴邪自肺受者桂枝白虎湯二進必愈其有冷食不運有足太陰脾病見症初用正氣或用辛溫如草果生薑半夏之屬方書謂草果治太陰獨勝之寒知母治陽明獨勝之熱瘧久色奪唇白汗多餒弱必用四獸飲即六君加草果薑棗烏梅陰虛內熱必用鱉甲首烏知母便漸溏者忌用久瘧榮傷寒勝加桂姜擬初中末瘧門用藥於下初病暑風濕熱瘧藥胸膈痞悶枳殼桔梗杏仁厚朴四味最宜栝蔞皮山梔子香豆豉頭痛宜辛涼輕劑連翹薄荷赤芍羚羊角蔓荊子滑石重則用石膏口渴用花粉煩渴用竹葉石膏湯熱甚則用黃連黃芩山梔夏季牙痛屬濕羌防辛溫宜忌宜用木防己蠶砂暑熱邪傷初在氣分日多不解漸入血分反渴不多飲唇舌絳赤芩連膏知不應必用血藥量佐清氣熱一味足矣輕則用青蒿丹皮汗多忌犀角竹葉心元參鮮生地細生地木通淡竹葉若熱久痞結瀉心湯選用又夏月熱久傷血最多蓄血一證譫語昏狂看法以小便清長者大便必黑為是桃仁承氣湯為要藥幼稚瘧久面腫腹膨泄瀉不欲食或囊腫或跗腫必用東垣益氣以升陽倘脾消敗前方不應用理中湯或錢氏益黃散得效二三日須投五苓散一二日再與異功散參苓白朮之類必全好徐忠可注金匱有云幼兒未進穀食者患瘧久不止用冰糖濃湯余試果驗瘧多用烏梅以酸泄木安土之意用常山草果乃劫其太陰之寒以常山極走使二邪不相併之謂用人參生薑曰露姜飲一以固元一以散邪取通神明去穢惡之意總之久瘧氣餒凡壯膽氣皆可止瘧未必真有瘧鬼又瘧邪既久深入血分或結瘧母鱉甲煎丸設用煎方活血通絡可矣萬密齋治一兒歲半病瘧二日一發久不愈黃瘦面浮腫腹脹用平瘧養脾丸治之愈人參白朮茯苓甘草當歸川芎陳皮半夏蒼朮厚朴柴胡黃芩豬苓澤瀉草果常山青皮辣桂鱉甲各等分於五日或三元八節天月德日修合酒煮曲糊丸麻子大陳皮湯下一兒病瘧醫用截瘧藥內有砒丹三截之遂成疳瘧其父懊恨前藥之誤萬用平瘧養脾丸治瘧集聖丸治疳調理一月而愈集聖丸蘆薈五靈脂夜明砂縮砂橘皮青皮蓬朮木香黃連使君子蝦蟆豬膽和藥入膏為末一兒病瘧一日一發萬用家傳斬鬼丹截之止三日後一發再截之值三四日又發其父怪而問之時六七月棗熟疑其必啖生棗故止而復發也問之果然乃禁之先用胃苓丸調理三日平胃蒼陳樸草合以五苓茯豬朮澤桂名胃苓丸更以斬鬼截之遂愈五月五日午時用黃丹研獨頭大蒜研如泥同杵眾手為丸隨人大小發日五更取長流水面東下汪氏子七歲病瘧三年諸醫不效萬視其外候面色白山根帶青腹大而堅此久瘧成癖癖為潮熱當與補脾消癖瘧熱自除恨無九肋鱉甲耳汪求得之因立一方用人參白朮青皮陳皮三稜莪朮木香砂仁當歸川芎黃連柴胡鱉甲為末神麯糊丸炒米煎水日三服調理五十餘日而安李氏七歲女先患外感後變瘧因用截藥變作痢至冬痢雖止瘧益甚萬視其外候大骨高起大肉陷下發稀目陷面黃鼻燥不思飲食唯啖蓮肉乃內傷脾虛疳勞症也醫皆謂不可治萬云可治也至春必愈用集聖丸一料次年二月果安王氏子病瘧三日一發用胃苓丸合小柴胡湯方作丸服之初三日一發又間日一發後一日一發初發於午後漸移於辰刻問曰連日服藥瘧發轉頻何也曰此瘧將退之漸也蓋瘧三日一發者邪氣深難已一日一發者瘧氣淺易愈午後發者邪在陰分難已午前發者邪在陽分易愈今自三日移至一日自陰分移至陽分故云將退之漸也時有丁醫聞其說笑曰那得許多議論吾有秘方治瘧如神遂求治之不知其所用何物自此仍三日一發發以酉時至次日巳後始退萬仍為調理一月而愈孫文垣治丁氏子才二歲患瘧母上壅咳嗽每午後發熱至子丑時乃退終日啼哭不止鵝口白屑神氣大弱又痘後遍身瘡疥未愈諸醫有灸之者有刺之者有以膏藥貼之者種種施之不應孫曰乳下嬰孩臟腑脆薄不可亂攻亂補參耆足以增其咳灸刺適以驚其神安能取效教以白朮鱉甲各一錢五分青蒿麥芽陳皮各八分烏梅一個貝母知母各六分甘草三分八帖全愈水鑑仙人治百日兒瘧歌云瘧是邪風寒熱攻直須術治免成空常山刻作形人狀釘在孩兒生氣宮如金生人金生在巳即釘巳上木生人釘亥上火生人釘寅上水生人釘申上也常山乃截瘧之藥萬密齋外孫未周歲因傷寒髮間日瘧在子丑時發則搐搦咬牙呻吟大便黃綠努而出以口吮母口得乳即止瘧後汗出心下跳腹中鳴頂微熱未十日成疳矣面色㿠白囟陷發疏兒漸羸瘦此先受暑濕暑則為瘧濕則為痰又傷飲食脾土衰而肝木旺瘧曰食瘧疳曰食疳用加減當歸龍薈丸加味參苓白朮散其母用四物湯加柴胡升麻麥冬木通酒芩桔梗各五分薄荷七分燈草水煎服一兒病瘧醫以柴胡湯投之不效乃用平瘧養脾丸而愈一女先驚後瘧瘧久成疳用集聖丸調理一月而安一兒先瘧後驚用調元湯琥珀抱龍丸而痊一兒久瘧成癖因癖生熱或三五日內一發發則餘日不止常在申酉時但不寒顫又微惡寒即發熱熱亦不甚發過不渴不頭痛用消癖丸平瘧養脾丸間服半年而愈馬元儀治金氏子寒熱如瘧兩脈弦虛無力脈弦為風發脈虛為氣少正虛則外風得以襲入乃為寒熱不當與氣實有餘者同治乃用補正散邪一法用人參桂枝乾薑肉桂半夏廣皮炙草等調理數月而安痢萬密齋侄七歲久痢不已為制丸劑治之丸者緩也以治久病也用錢氏異功散合香連丸為主加豬苓澤瀉車前子以利其小便神麯麥芽以消其積滯訶子肉豆蔻炒乾姜以止痢合之曰和中丸約二兩許服之未盡而痢止此為家秘治久痢不止方也汪某年六十生一子三歲病痢醫下之太過脾胃受傷中氣下陷又一醫以豆蔻香連合粟殼等止之痢益甚後重而少物萬視之曰老年之子胎稟已弱下之太過而下陷法當舉之陳藥未盡劫澀之劑亦不可用也乃以錢氏異功散加香連歸芍山藥蓮肉神麯糊丸服之旬日痢止元氣未復也令以前藥調之適有人曰吾有阿魏治痢甚效即以五分作丸五粒令兒服之人以為不可服也汪曰今早服一丸飲後服一丸服後熟睡未醒萬曰痢止矣何必服藥此藥太峻元氣被傷恐非正睡也試呼之不應推之不知入視白眼張露氣已絕矣詳記之以為輕妄用藥之戒聶久吾兒周歲余因乳少粥飯成積又多面食致積痢先水瀉後膿血時以斷乳飲食少進睡不閉目肛如竹筒指紋已過命關症極重乃用清熱消積等藥以茶匙緩緩灌之覺精神極困時另以人參麥冬煎湯少少與之以保元氣如是數日痢漸止但其肉削如柴調養半年始復舊萬密齋治孫撫軍女五月病痢至七月未愈萬至病亟矣用人參茯苓甘草當歸白芍黃芩車前陳皮各等分炒乾姜少許煎服略瘥五日大安孫問諸醫皆用木香黃連今乃不用所用皆非治痢之藥而效者何也曰此乃河間黃芩芍藥湯方也所謂調其氣則後重除養其血而痢止之方也祝道士子長七歲病痢半年不愈萬與一方用人參白朮茯苓甘草黃耆桔梗木香黃連訶子肉豆蔻車前炒乾薑澤瀉神麯當歸麥芽白芍為末水面丸米飲下一月而安名和中丸一女十歲患痢久不止脈洪數或曰下痢脈宜小今脈洪數恐難治萬曰無妨玉涵經曰欲識童男並童女決在寸關並尺裡自然緊數甚分明都緣未喪精華氣此童女脈如是胃氣尚強不久自愈果數日痢漸止張縣尹女半歲病赤白痢甚苦萬用黃連一錢木香五分石蓮肉五分陳皮七分炒乾姜二分為末神麯丸黍米大陳米湯下而安張景岳治都閫錢旭陽長男年及兩周季夏間以生果傷脾先瀉後痢自善醫知其生冷所傷乃與參朮薑桂溫脾等藥不效漸至唇生瘡乃謀之張曰此兒明為生冷所傷而不利溫藥奈何張曰此因瀉傷陰兼之辛辣遽入而虛火上炎耳非易以附子不能令火歸元也因用二劑而唇口瘡痛咽腫倍甚何不用熱藥冷服及加人尿豬膽汁等法外見於頭面之間病更劇復詢曰用藥不投如此豈真因濕生熱耶張診之曰上之脈息下之所出皆非真熱本屬陰虛今熱之不效雖在可疑然究其所歸意者藥猶未及乎錢曰尚有一證大喜熱飲人所不能入口者便安然吞之雖喉中腫痛若此弗顧也此殆真寒之驗乎張曰是矣是矣遂復加附子一錢五分及薑桂肉果人參熟地之屬其瀉漸止其喉口等症亦不日全收矣疑似間難辨如此治者可不慎哉葉天士曰大凡脾胃之症不宜補腎腎藥味厚凝滯不能行運況吐瀉之症尤不宜也景岳往往於脾胃症而用歸地自稱神妙不可信為實然喻嘉言治葉氏幼男病痢噤口發熱嘔噦連聲診其關脈上湧而無根再診其足脈亦上湧而無根曰此作噤口痢症乃胃氣將絕之症也噤口痢者虛熱在胃壅遏不宣故不思食治宜補虛清熱兩法此因苦寒之藥所傷不能容食惟有溫補一法而已以理中湯連進二劑不一時下十餘行葉恐誤求更方喻曰吾意在先救胃氣之絕原不治痢即治痢人之大小腸盤疊腹中甚遠雖神丹不能遽變其屎今藉藥力催之速下正為美事焉可疑之遂與前藥連服二日人事大轉思食不噦四日後只便糟粕以補中益氣調理旬日全愈此可見小兒之痢縱啖傷胃者多內有積熱者少尤不宜用痢疾門中通套治法也陳慶長知縣名祖永云頃守官南康其子年十歲患噤口痢水漿不入者數日惟能進藥同官家有方書載一治法試用之一服而痢稍疏三服遂索粥飲頓食半盞許自是痢止而安其法用乾山藥一半炒黃色一半生用研為細末米湯飲下一人有小女患痢脫肛叔權傳得一方用草茶葉一握姜七片煎令服而愈然不知其方所自來也後閱蘇文始知生薑㕮咀煎茶乃東坡治文潞公痢方也陳良甫云甲子夏秋間僕處一趙經略廳有侄孫年九歲病痢甚重召小方脈未至遂令僕診之六脈平細以證觀之是血痢其實非也只是血水而已僕云記得調中湯治狀云夏月初秋忽有暴寒折於盛暑熱結於四肢則壯熱頭痛寒傷於胃則下痢或血或水或赤壯熱冥悶脈數宜服此遂令去大黃服之而愈姚公遠幼小子病痢一醫誤下之遂以純血氣喘身熱不思食仲淳至亟以人參四五錢石蓮子白芍升麻橘紅草石蠶扁豆滑石炙草一劑喘平血止又數劑痢止臨別囑公遠曰兒百日內不出痘則生以下多元氣未復故也未幾即痘果殤家弟稚端幼病痢甚日夜數十次服數劑即愈人參三錢吳茱萸泡七次一錢川黃連薑汁炒一錢後二味飯上蒸水煎至八分溫服如不受以藥一匙間米湯一匙漸漸飲之胃氣漸復如頭痛發熱加石膏六錢乾葛一錢別調六一散四錢冷水服瘧痢陸祖愚治張登之男年十四患瘧截早變成痢疾痞滿晡熱眼胞紅腫而痛所下紅白相間日夜三四十次或與消積溫補斂澀俱不效而轉劇脈之左手弦數右關沉實右寸浮滑此瘧疾失表又內傷飲食風熱泊於腸胃而為病也先用山楂枳實芩連木通澤瀉小柴胡甘草並下香連丸服丸藥兩許煎藥四劑遂積減胃開調理旬日但下淡白積一二次又數日大便實矣忽一日仍不思飲食日行二三次十餘次粒米不進計大便數十行蓋連日粥食過多而復傷也今積滯已行腸中潤滑無所慮矣仍用小柴胡歸芍知苓楂橘之類宿垢盡行胃氣仍復乃加減前方人參術調理而安萬密齋治李氏女初病瘧又病痢發熱少食日啖蓮肉五六枚乃與集聖丸而愈
