body:
  text: 卷三痙痙症詩曰強直反如弓神昏似中風痰流唇口動瘛瘲與癇同許叔微治一人項強筋急不可轉側自午後發黃昏時定此肝腎二臟受風也謂此必先從足起少陰之筋自足至項筋者肝之合日中至黃昏陽中之陰肺也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣絶而肝氣弱肝腎二臟受邪故發於此時用宣州木瓜二個取蓋去瓤沒藥二兩乳香二錢半二味入木瓜縛定飯上蒸三四次爛研成膏每用三錢入生地黃汁半盞無灰酒二盞暖化溫服及都梁丸服之而愈易思蘭治宗室毅齋年五十二素樂酒色九月初忽倒地昏不知人若中風狀目閉氣粗手足厥冷身體強硬牙關緊閉有以為中風者有以為中氣中痰者用烏藥順氣散等藥俱不效有作夾陰治者用附子理中湯愈加痰響五日後召易診六脈沉細緊滑愈按愈有力曰問此何病曰寒濕相搏痙病也痙屬膀胱當用羌活勝濕湯主之先用稀涎散一匕吐痰一二碗昏憒即醒隨進勝濕湯六劑全愈以八味丸調理一月精神復常其兄宏道問曰病無掉眩知非中風然與中風中痰夾陰似亦無異何以獨以痙名之夫痙緣寒濕而成吾宗室之家過於厚暖有之寒濕何由而得易曰運氣所為體虛者得之本年癸酉戊癸化火癸乃不及之火也經曰歲火不及寒水侮之至季夏土氣太旺土為火子子為母復仇土挾制水七月八月主氣是濕客氣是水又從寒水之氣水方得令不服土製是以寒濕相搏太陽氣鬱而不行其症主脊背項強卒難回顧腰似折項似拔乃膀胱經痙病也宏道曰痙緣濕而成烏藥順氣等藥行氣導痰去濕者也附子理中去寒者也何以不效用勝濕湯何以速效易曰識病之要貴在認得脈體形症用藥之法全在理會經絡運氣脈症相應藥有引經毋伐天和必先歲氣何慮不速效耶夫脈之六部俱沉細緊滑沉屬裡細為濕此句可疑脈訣以濡為濕並無以細為濕之説緊為寒中又有力而滑此寒濕有餘而相搏也若虛脈之症但緊細而不滑諸醫以為中風風脈當浮今不浮而沉且無眩掉等症豈是中風以為中氣中痰痰氣之脈不緊今脈緊而體強直亦非中氣中痰故斷為痙病前用烏藥附子理中湯去寒不能去濕去濕不能去寒又不用引經藥何以取效勝濕湯藁本羌活乃太陽之主藥通利一身百節防風蔓荊能勝上下之濕獨活散少陰腎經之寒寒濕既散病有不瘳者乎張路玉治吳江郭邑侯公子患柔痙用桂枝湯及六味地黃湯咸加蠍尾服之而愈朱丹溪治王秀濕熱大作腳痛手筋拘攣足乏力生地當歸川芎白朮各二錢蒼朮一錢甘草炙三分木通五分煎湯下大補丸三十丸大補丸須炒暖張子和治新寨馬叟年五十九因秋欠稅官杖六十得驚氣成風搐已三年矣病大發則手足顫掉不得持物食則令人代哺口目張睖唇舌嚼爛抖擻之狀如線引傀儡每發市人皆聚觀夜臥發熱衣被盡去傾産求醫致破其家而病益堅叟之子邑中舊小吏也以訊張張曰此病甚易治若隆暑時不過一湧再湧奪則愈矣今以秋寒可汗之如未已更刺俞穴必愈先以通聖散汗之繼服湧劑出痰三四升如雞黃成塊狀如湯熱叟以手顫不能自探妻與代探咽嗌腫傷昏憒如醉約一二時許尋稍省又下數行立覺足輕顫減熱亦不作足亦能走手能巾櫛自持匙箸未至三湧病去如濯病後但覺極寒張曰當以食補之久則自退蓋大疾之去衛氣未復故宜以散風導氣之藥切不可以熱劑溫之恐反成他病也琇按是症本因驚而得尤不能無郁也蓋驚入心受之則顛癇今心不受而反傳之肝而為瘛瘲亦母救其子之義也肝病則乘其所勝於是生風生痰怪症莫測治以上湧下泄乃發而兼奪之理並行不悖張案於此症尤為合法黃如一村翁兩手搐搦喘如曳鋸冬月不能覆被名醫張某之舞陽道經黃如不及用藥針其人大指後中注穴上曰自肘以上皆無病惟兩手搐搦左氏所謂風淫末疾者此也或刺後溪手太陽穴也屈小指握紋盡處是穴也完顏氏病搐先右臂並左足約搐六七十數兩目直視昏憒不識人幾月余求治先逐其寒痰三四升次用導水禹功散泄二十餘行次服通聖散辛涼之劑不數日而瘥薛立齋治一婦人素有內熱月經不調經行後四肢不能伸臥床半載或用風濕痰火之劑數日而不見效其脈浮緩按之則滑名曰痙症屬風寒所乘用加味逍遙散加肉桂防風四劑頓愈更以八珍湯調理兩月餘而瘥一婦人素經行後期因勞怒四肢不能屈名曰瘲症此血虛而風熱所乘先用八珍湯加鉤藤柴胡漸愈更佐以加味逍遙散調理而痊一婦人素有火忽然昏憒瘛瘲抽搐善伸數欠四肢筋攣痰涎上升此肺金燥甚血液衰少而然也用清燥湯六味湯丸兼服尋愈薛立齋治一婦人因怒經事淋瀝半月方歇遇怒其經即至甚則口噤筋攣鼻血頭痛痰涎搐搦瞳子上視此肝火熾甚以小柴胡湯加熟地山梔鉤藤治之後不復發一婦人素陰虛患遍身瘙癢誤服祛風之藥口噤抽搐肝脈洪數薛曰肝血為陰為水肝氣為陽為火此乃肝經血虛火盛耳宜助陰血抑肝火用四物麥冬五味鉤藤炙草調理而痊一婦人發瘈遺溺自汗面赤或時面青飲食如故肝脈弦緊此肝經血燥風熱痙症也肝經屬木其色青入心則赤法當滋陰血清肝火遂用加味逍遙散不數劑諸症悉退而安許叔微云同官歙丞張德操常言其內子昔患筋攣腳不得屈伸逾年動則令人抱持求醫於泗水楊吉老云此筋病宜服下三方一年而愈春夏服養血地黃丸熟地蔓荊山萸狗脊地膚子白朮乾漆蠐螬天雄車前萆薢山藥澤瀉牛膝秋服羚羊湯羚羊角附子獨活白芍防風川芎冬服烏頭湯大烏頭細辛川椒甘草秦艽附子官桂白芍乾薑茯苓防風當歸獨活馬元儀治章氏婦患頭身振搖手足瘛瘲諸治不效診之兩脈浮虛兼澀浮為氣虛澀為血傷得憂思勞郁陽明損甚也蓋陽明胃為氣血之海主束筋骨而利機關若氣血不充則筋脈失養而動惕不寧仲景云發汗則動經身為振振者茯苓桂枝白朮甘草湯主之凡汗傷津液猶足擾動經脈況氣血內涸乎但彼有外邪搏飲當滌飲散邪俾津液四布以滋養筋經筋脈此屬勞郁所傷必峻補陽明使氣血內盛以充灌周身令服參乳兩月而安立齋治一人感冒後發痙不醒人事磨傷膂肉三寸許一塊此膀胱經必有濕熱診其脈果數謂此死肉最毒宜速去之否則延潰良肉多致不救遂取之果不知疼痛因痙不止疑為去肉所觸謂此風熱未已彼不聽另用乳沒之劑愈甚復以祛風消毒藥敷貼查春田飲以祛風涼血降火化痰之劑而愈金工部載陽傷寒後亦患此甚危亦取去死肉以神效當歸膏敷貼以內疏黃連湯飲之狂言愈盛其脈愈大更以涼膈散二劑又以四物湯加芩連數劑而愈凡患瘡者責效太迫服一二劑未應輒改服他藥反致有誤不思病者有輕重治有緩急而概欲責效於二三劑之間難矣況瘡瘍一症其所來症深毒久有形症在肌肉潰損較之感冒無形之疾不同安可旦夕取效患者審之吳橋治程嗣思體肥白瘍藥過當腠理皆疏始覺汗多久而益甚一發則汗下如雨厥逆反張口噤目瞪痰喘並作良久氣反小便不禁瞑不能言旬日益深日十數作諸醫謝去橋至而按諸方則曰經云汗多亡陽此柔痙也諸君失之矣乃重用參耆次附桂芍藥次龍骨牡蠣飲之半劑而寢家人以為死矣將升屋而號橋曰藥中病而行得寢乃復非死也亟為粥湯待之頃之呻吟呼粥湯少進再劑而愈三月而復初太函集頭暈竇材治一人頭風發則旋暈嘔吐數日不食為針風府穴向左耳入三寸去來留十三呼病人頭內覺麻熱方令吸氣出針服附子半夏湯永不發華他針曹操頭風亦針此穴立愈但此穴入針人即昏倒其法向右耳橫下針則不傷大筋而無暈乃千金妙法也此針法奇妙須與高手針家議之方得無誤龔子材診熊槐二官年六十餘身體胖大其下手即得五至一止乃驚曰君休矣渠曰連日微覺頭暈別無恙也何故出此願實教焉龔曰越十日用藥相哂而退少頃間中痰求救於龔知其必不可治令以香油灌之即醒逾十日果卒張路玉治董司業夫人體雖不甚豐而恆有眩暈之疾診其六脈皆帶微弦而氣口尤甚蓋緣性多鬱怒怒則飲食不思而為眩暈矣豈平常體肥多濕之痰可比例乎為疏六君子方水泛為丸服之以培中土中土健運當無敷化不及留結為痰而成眩暈之慮所謂治病必求其本也朔客梁姓者邀診時當夏日裸坐盤餐倍於常人形偉氣壯熱汗淋漓於頭頂間診時不言所以切其六脈沉實不似有病之候惟兩寸略顯微數之象但切其左則以右掌抵額切其右則以左掌抵額知其肥盛多濕而夏暑久在舟中時火鼓激其痰而眩暈也詢之果然因與導痰湯加黃柏澤瀉茅朮厚朴二服而安吳友良年逾古稀頭目眩暈乃弟周維素擅岐黃與補中益氣數服始用人參一錢加至三錢遂痞滿不食坐不得臥三晝夜喃喃不休上盛下虛之症服補中益氣其害如此診時見其面赤進退不常左頰聶聶瞤動其六脈皆促或七八至一歇或三四至一歇詢其平昔起居云至五十即絶欲自保飲啖且強此壯火爍陰兼肝風上擾之兆與生料六味除去萸肉入鉤藤大劑煎服是夜即得酣寢其後或加炙鱉甲或加龍齒或加棗仁有時妄動怒火達旦不寧連宵不已則以秋石湯送靈砂丹應如桴鼓盛夏酷暑則以大劑生脈散代茶後與六味全料調理至秋而安陸養愚治陳巽源室向有頭眩之症不藥亦止八月中旬偶作勞煩悶飲酒數杯坐月下更余方寢便覺微熱不安次早忽眼黑頭旋且微痛如在風雲中發比平時較劇醫謂脈得浮數此熱極生風也用芩連山梔等以清之二劑眩暈不減而頭痛如破上身如火而欲厚覆又謂無痰不作暈再以清火之品合二陳湯二劑亦不效脈之左手浮弦而緊右手浮數而弱且寸強尺微右脈乃正氣之虛左脈乃邪氣之實尺微寸強邪在上也此必乘虛感邪中於上焦所致經曰筋骨血氣之精而與脈併為目系上屬於腦後出於項中故邪中於項因逢其之虛其入深則隨目系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣今作勞以致煩悶非虛乎月下坐至更余頭項之間能不為霧露之陰所中乎法當驅上焦之邪補中焦之氣而徐議消痰清火則自愈矣因先用參蘇飲加藁本二劑頭痛頓止眩亦少瘥再以補中益氣佐以二陳芩連數劑而安張路玉治繆封君偶因小憤遂眩暈痞悶三日來服豁痰利氣藥不應反覺疲倦飲食日減下元乏力診之六脈似覺有餘指下略無沖和之氣氣口獨滯不調時大時小兩尺俱濡大少力此素多痰濕漸漬於水土二經加以剝削之劑屢犯中氣疲倦少食殆所必致法當先調中氣輸運水穀之精微然後徐圖補下元為疏六君子湯加當歸調營血庶無陽無以化之虞龔子材治大學士高中玄患頭目眩暈耳鳴眼黑如在風雲中目中溜火或與清火化痰或與滋補氣血俱罔效診之六脈洪數此火動生痰以酒蒸大黃三錢為末茶下一服而愈火降則痰自清矣薛立齋治一婦人頭暈吐痰用化痰理氣藥肢體痠麻服祛風化痰藥肢體常麻手足或冷或熱此脾土虛而不能生肺金用補中益氣加茯苓半夏炮薑二十餘劑而愈後因怒吐痰自服清氣化痰丸飲食不進吐痰甚多胸脅脹滿教用六君子倍加參術少加木香數劑而愈陶天爵妾媵素多時患頭暈疼甚勞則肢體痿軟筋骨作痛殊類風症以為腎虛不能納氣歸源用加減八味丸而痊後因房勞氣惱頭暈項強耳下作痛此肝火之症仍用前藥滋腎水生肝血制風火而愈張飛疇治一婦胸滿身熱六脈弦數無力形色倦怠渴不甚飲云自遊虎邱暈船吐後汗出發熱頭痛服發散四劑胸膈愈膨聞穀氣則嘔眩熱不退醫禁粥食已半月日惟飲清茶三四甌今周身骨肉痛楚轉側眩暈嘔噦曰當風汗嘔外感有之已經發散矣吐則飲食已去消克則更傷脾脾虛故脹甚脾絶穀氣則嘔土受木克則暈宜勿藥惟與米粥繼進粥食使脾土有主更議可也守其言竟不藥而愈立齋云上舍顧桐石會飲周上舍第問余曰向孟有涯陳東谷俱為無嗣納寵已而得疾皆頭暈吐痰並用蘇合香丸惟孟得生何也曰二症因腎虛不能納氣而為頭暈不能制水而為痰涎陳專服攻痰行氣孟專服益火補氣故耳後余他往桐石房勞過度亦患前症或用清氣化痰愈甚顧曰我病是腎虛不能納氣歸源治者不悟而歿惜哉昌平守王天成頭暈惡寒形體倦怠得食稍愈勞而益甚寸關脈浮此脾肺虛弱用補中益氣加蔓荊子而愈後因勞役發熱惡寒譫言不寐得食稍安用補中益氣而痊大尹祝支山因怒頭暈拗內筋攣時或寒熱日晡熱甚此肝火筋攣氣虛頭暈用八珍湯加柴胡山梔丹皮二十餘劑而愈琇按肝火亦作頭暈不定屬之氣虛也經云諸風掉眩皆屬於肝肝之脈上絡顛頂余嘗以一氣湯加吳萸炒黃連二三劑即愈朱丹溪治一男子年七十九歲頭目昏眩而重手足無力吐痰口口相續左手脈散大而緩右手緩而大大不及於左重按皆無力飲食略減而微渴大便三四日一行衆人皆與風藥朱曰服此藥至春深必死此皆大虛症當以補藥大劑服之衆慍而去乃教用人參黃耆當歸白芍白朮陳皮濃煎作湯下連柏丸三十粒如此者服一年半而精力如少壯時連柏丸冬加乾薑少許餘三時皆依本法連柏皆薑汁炒為細末又以薑汁煮湖為丸琇按此症大補而佐以連柏妙不可言矣蓋一眼注定肝腎二經以連清肝火柏清腎火者也既慮其寒重以薑汁製之可謂盡善然不若竟用地黃杞子如左歸加減尤為善中之善也陳自明治一婦人苦頭風作暈數年服太乙丹一粒吐痰碗許遂不再發方見蟲門馮楚瞻治金紹老夫人因歲事積勞忽眩暈不省妄有見聞語言雜亂診其脈細數無倫真陰真陽並虧已極乘此初起既可挽回愈久愈虛愈虛愈脫矣用全真一氣湯日進二劑每劑人參八錢不十日而全瘳錢國賓治陳叔明幼年多讀抱學貧居自甘清淡有品士也至三旬外一見日光即覺昏暈漸至見光昏暈遂坐於帳凡有隙處莫敢窺如是二十年矣諸藥遍嘗親友憐其品行時以升斗周之與診乃陽虛陰極之症須返本還元之藥可治也用首經人乳臍帶胎髮秋石煉蜜丸如芡實大硃砂為衣三更時服下一丸月餘更愈適錢有此丸因與之也徐靈胎曰眩暈清火養肝固為正治但陽氣上升至於身體不能自主此非浮火之比古人必用金石鎮墜之品余初至郡中治病是時喜用唐人方葉天士先生見之謂人曰有吳江秀才徐某在外治病頗有心思但藥味甚雜此乃無師傳授之故已後先生得宋板外臺祕要讀之復謂人曰我前謂徐生立方無本誰知俱出外臺可知學問無窮讀書不可輕量也先生之服善如此猶見古風所謂藥味雜即指金石品也麻木王損庵治大理卿韓珠泉遍身麻木不能舉動以神效黃耆湯加減授之用黃耆一兩二錢參芍各六錢他稱是一服減半彼欲速效遂並二服為一服服之旬日其病如失論以元氣未復宜靜養完固而後可出渠不能從盛夏遽出見朝謁客勞煩纍日忽馬上欲墜僕從者扶歸邀診視辭不治數日歿嗚呼行百里者半於九十可不戒哉治法匯張路玉治沈步云解組後以素稟多痰恆有麻木之患為疏六君子湯服之頗驗而性不喜藥入秋以來漸覺肢體不遂脈之得軟滑中有微之象仍以前方去陳皮加歸耆巴戟平調半月而安然此症首重樽節方可保全毋徒恃藥力為也巴慈明婦産後眩暈心悸神魂離散若失臟腑之狀開眼則遍體麻木如在雲霧之中必緊閉其目似覺少可晝日煩躁夜則安靜服四物等則嘔逆不食薑附等則躁擾不寧其脈虛大而數按之則散舉之應指此心火浮散之象因艱産受驚痰飲乘虛襲入心包絡中留伏膈上有入無出致綿延不已蓋目開則諸竅皆開痰火堵塞心竅所以神識無主目閉則諸竅皆閉痰火潛伏不行故得稍安與東垣所云閣眼則陽氣不行之麻迥別況晝甚夜輕明是上焦陽位之病與理痰清火之劑諸症漸寧然或因驚恚或因飲食不時舉廢此伏匿膈上之痰無從搜滌也乘發時用獨參湯下紫雪開通膈膜仍與前藥調補半年而愈黃履素曰餘年四十七時忽患小指麻軟時作時止每夏愈而冬甚素聞指麻當防中風因講求預防之法有言宜卻風化痰者其説大謬有言宜順氣活血者謂氣行則痰自消血活則風自滅其言近是及讀薛氏醫案治蔣州判中滿吐痰頭暈指麻云中滿者脾氣虧損也痰盛者脾氣不能運也頭暈者脾氣不能升也指麻者脾氣不能用也遂以補中益氣湯加茯苓半夏以補脾土用八味地黃丸以補土母而愈後惑於乾坤生氣方云凡人手指麻軟三年後有中風之疾可服搜風天麻二丸以預防之乃朝餌暮服以致大便不禁飲食不進而歿夫預防之理當養氣血節飲食戒七情遠帷幕可也若服前丸以預防適所以招風取中也讀之怏然遂確守其法蓋於今十有三年矣陸養愚治丁慕云患麻木左手足不能舉惡風或時自汗服小續命十劑不效或謂風症宜大汗之小續命湯參以補養氣血之品故不效耳因倍風藥減參芍輩二劑汗如雨反覺一身盡痛遊走不定並左手足不能舉昏沉厥逆甚危診之陽脈弦細而數陰脈遲澀而空謂此雖似風然昔人云麻者氣虛木者血虛手足不任者脾虛具此三虛止宜調養氣血則風症自除小續命正以風藥過倍血藥殊少何反倍風藥而去參芍宜其劇矣仲景云大法夏宜汗以陽氣在外也春月陽尚稚初出地下大汗之使衛氣亟奪而失守營血不隨所以遍身走痛昏沉厥逆皆氣血垂絶之象也急用大料十全大補湯濃煎灌之少蘇為灸風池百會肩井曲池間使三里六穴各數壯以防中臟之危自此諸症漸減飲食漸進第大便常結痞悶微熱此汗多津液不足故下不去則上不舒以潤字丸五分日二服便行猶燥以八物倍歸加麥冬知母以潤之少佐檳榔木香豆仁以調其氣可不必自後每燥結服潤字丸五分甚則一錢月餘全愈張文叔傳木香丸續命丹二方戊辰春中書左丞張仲謙患半身不遂麻木太醫劉子益與服之汗大出一服而愈故録寶鑑羅有治張案在江選李東垣治杜意逵患左手右腿麻木右手大指次指亦常麻木至腕已三四年矣諸醫不效求治曰麻者氣之虛也真氣弱不能流通至填塞經絡四肢俱虛故生麻木不仁與一藥決三日效遂制人參益氣湯服二日手心便覺熱手指中間如氣脹滿至三日後又覺兩手指中間如手擦傍觸之曰真氣遍至矣遂於兩手指甲傍各以三稜針一刺之微見血如黍黏許則痹自息矣後再與調理而愈繆仲淳治顧仲恭心腎不交先因失意久郁及平日勞心致心血耗散去歲十月晨起尚未離床忽左足五指麻冷倏已至膝便不省人事良久而蘇乍醒乍迷一日夜十餘次醫者咸云痰厥繆云純是虛火服丸藥一劑今春體覺稍健至四月後丸藥不繼而房事稍過至六月初十偶出門前症復發扶歸良久方醒是日止發一次過六日天雨稍感寒氣前症又發二次現今兩足無力畏寒甚自腹以上不畏寒繆曰人之五臟各有致病之由謹而察之自不爽也夫志氣不遂則心病房勞不節則腎病心腎交病則陰陽將離離則大病必作以二臟不交故也法當清熱補心降氣豁痰以治其上益精強腎滋陰增志以治其下則病本必拔以心藏神腎藏精與志故也平居應獨處曠野與道流韻士討論離欲道之根極性命之源使心境清寧暫離愛染則情念不起真精自固陰陽互攝而形神調適矣湯方貝母三錢茯苓三錢遠志一錢五分棗仁五錢蘇子二錢石斛三錢麥冬五錢甘草炙五分木瓜三錢牛膝八錢石菖蒲一錢入牛黃末一分天竺黃一分竹瀝一杯臨臥飢時各一服三劑後加人參五錢枇杷葉三片霞天膏五錢丸方遠志天冬麥冬茯神茯苓各六兩棗仁八兩生地八兩杜仲四兩白芍六兩甘草炙三兩五錢黃柏六兩牛膝十兩五味六兩蜜丸空心及臨臥服五六錢石斛湯加竹瀝送下溫病雄按凡屬外淫皆為感證茲篇雖首列傷寒瘟疫二門而風溫與濕溫缺然乃於傷風之前列感證一篇未免含混蓋魏君於外感疏也朱丹溪治一人因感寒倦怠不食半月後發熱惡寒遍身痛脈浮大按之豁然此虛極受寒以人參為君黃耆歸芍為臣蒼朮陳皮通草為使大劑服五劑大汗而愈沈明先治丁惠書秋得感寒停食之症入夜輒寒熱如瘧竟夕作嘔病數發醫亦數更體弱不勝昏沉垂殆矣或謂晝靜夜劇由於陽氣陷入陰中嘔穢聲長明是諸逆衝上屬火不惟不可溫直應用寒不惟不可補更宜攻伐竟投三黃等味一劑知二劑減三四劑其嘔若失神情始蘇但嘔止而胸膈脹繼作或疑寒涼傷胃之故沈曰食雖消而火未歸原猶留連膈上王太僕云寒之不寒責其無水當求其屬以衰之乃改用純甘壯水之劑益以牛膝車前使熱從水道發泄果氣順脹消膻中清廓而安此伏熱將發適遇感寒停食外郁內阻火不得泄遂成寒熱嘔逆若果因感寒停食斷無用三黃得愈之理聶久吾曰豫壬辰春初在京會試天寒夜坐久感寒頭痛服疏散藥未經出汗其頭痛數日不止卻無他症或謂感寒甚輕已五六日豈復有外邪殆勞神內虛理宜補之勸服補中益氣湯二劑不知外邪未散補藥助邪為害遂至神氣漸昏飲食少進晚間厄逆不止如是者數日乃延醫用前胡桔梗貝母麥冬連翹香附廣陳皮甘草數劑而愈豫生平少病茲外感未清而輕用補身受其害若此因悟外感內傷並外感兼內傷與內傷挾外感諸治蓋原於此因述之以志折肱之意云雄按初冬翁笠漁患外感醫知其素多勞倦也用補中益氣法治之病日劇更醫知其有食滯以承氣法下之連得黑矢熱尚不退與養陰數帖病不減且不食不便不渴懶言顴面時紅強飲即吐醫謂將成損矣所親孫貽堂拉余診之脈澀而數神呆靜臥溲少胎黃乃邪在氣分窒滯不行之象投葦莖合蔥豉加梔子羚羊栝蔞旋覆桔梗黃芩以開肺一劑而遍身赤斑神氣爽悟繼去芩桔羚蔥加雪羹花粉銀花石斛蘭葉以清胃數帖而下醬矢二十餘次始胎退脈和知飢而愈陸養愚治邱全谷年方剛九月間忽身微熱頭微痛心神恍惚有時似夢非夢自言自語醫謂輕傷寒也當發散之用解表二劑汗不出熱反甚妄言見鬼前醫因無汗欲再表病家疑之又延一醫因妄言見鬼謂熱已傳裡欲下之而大便之去未久不能決陸脈之輕按浮數而微重按澀而弱微數者陽氣不足也澀弱者陰血不足也此陰陽俱虛之候不可汗尤不可下主表者曰汗既不出何謂陽虛曰此症雖有外邪因內損甚氣餒不能逼邪外出而作汗法當補其正氣則汗自得而邪自去矣若再發之徒竭其陽而手足厥逆之症見矣其主下者曰仲景云身熱譫語者有燥矢也何不可下曰經謂譫語者氣虛獨言也此症初止自言自語因發散重虛其陽所以妄言見鬼即難經所謂脫陽者見鬼也王海藏曰傷寒之脈浮之損小沉之損小或時悲笑或時太息語言錯亂失次世疑作譫語狂言者非也神不守舍者耳遂用補中益氣湯加附子薑棗煎服一日二劑至晚汗濈濈而來清晨身竟涼頭不痛第人事未甚省此陽氣少復陰氣未至耳仍用前湯吞六味丸旬日猶未精采調理月餘而愈蓋此人因房室之後而繼以勞也韋汝經春初肆業於蕭寺其房屋新創不甚謹密天寒夜坐至一二更倦怠倚幾而睡洎醒身覺寒甚頭微痛天明自服參蘇飲二劑未得汗他無所苦但頭痛數日不止或謂其體弱必攻苦勞神上氣不足而痛也令以補中益氣湯倍人參服之便覺神昏悶胸膈不舒從早至夕粒米不進晚發熱厄逆睡臥不安醫以脈帶數是火也用知貝芩連竹茹輩投之反遍身壯熱厄逆不止亟診之面赤戴陽鬱冒嘔厄左脈浮數而弦右脈尚和乃曰病輕藥誤耳不汗而劇得汗即解矣乃以火鬱湯倍麻黃強覆大汗之至晚諸症如失明日索藥曰昨見幾上尚有補中益氣湯一帖服此足矣琇按補中益氣湯為東垣治內傷外感之第一方後人讀其書者鮮不奉為科律然不知近代病人類多陰分不足上盛下虛者十居九焉即遇內傷外感之症投入輒增劇非此方之謬要知時代稟賦各殊耳陸麗京曰陰虛人誤服補中益氣往往暴脫司命者其審諸朱睛川內先感風邪後傷飲食發熱頭疼中脘痞悶醫以牛黃散下之瀉兩三行而熱不減痞亦不寬兩服瀉兩三行熱不減而痞更甚又醫曰瀉而熱不減者虛熱也通而脹不減者虛痞也乃用人參白朮黃耆甘草補之初服無進退至四劑神昏不省人事手足厥冷舌有黑苔脈浮數而空喜面不黑黯猶可救乃以枳實五錢黃連三錢人參七分麥冬一錢五味子十粒燈心煎湯下二劑人事稍清六脈略有神熱亦減半又二劑熱仍劇大便五日不下姑以潤字丸三錢下之便通而熱退自此一日不服人參則自汗力不能支三日不投潤字丸則便閉而熱發直至人參服過一斤潤字丸數兩而後愈陸肖愚治鄒氏子年十八新婚感冒症似傷寒或以九味羌活湯投之加嘔吐一二日不止改用藿香正氣散吐少止而倦乏食即飽悶腹中漉漉有聲四肢微厥小便赤短大便或溏或祕口渴而不喜飲晝輕夜重煩悶有主調氣者清火者滋陰者皆不效而滋陰猶為不宜脈寸關沉緩而細弱尺脈頗和曰此得之勞煩傷氣非得之使內傷陰也用四君子湯加棗仁豆蔻仁木香薑棗數劑如故乃倍加人參加熟附子五分而胸膈寬飲食進二十劑全愈陸方伯年近古稀因仲冬天氣有非時之熱患時氣咳嗽醫以芎蘇散汗之汗出不止咳嗽連綿不絶飲食不進昏憒經旬脈之浮大無力以五十動脈法按之二三十動間覺常有止意曰此高年勞倦即有微邪止宜扶正氣以勝之豈可妄汗今雖昏憒喘急尚可圖安第壽算恐不出三年外耳用補氣養榮湯加棗仁以助參術斂汗又加枇杷葉桑白皮蘇子石斛以降氣定喘二劑汗止四劑咳亦減矣服至五十劑而安後報訃果不出三年藜按補氣養榮湯系人參白朮歸身白芍川芎茯苓木香白豆蔻陸祖愚治朱明宇子歸年二十未出痘疹患痰症類傷寒脈之右手氣口洪滑而數左三部沉實蒸蒸內熱五六日不大便腹滿氣喘用黃連枳實山楂厚朴花粉前胡桔梗栝蔞生薑兩服後通身發斑或謂疹子或云石痘乃用炒黑麻黃柴芍荊防甘草牛蒡蟬蛻黃芩薄荷等味服後即痰聲如鋸氣不轉舒譫語發狂不時昏暈又用薑汁竹瀝牛黃通天散探嚏吐濃痰數口方醒仍灌前藥又復昏暈如是三日細斑轉而成片嘔血數碗後聞已死陸往唁之身雖冷而脈未絶即以牛黃竹瀝灌下少頃手足微動又灌一丸有呻吟聲四肢微溫兩額紅色脈大起反覺洪數而滑陸謂此時不宜純攻純補用人參栝蔞枳實黃連黃芩大黃元明粉徐徐溫服用麵皮尉腹上約兩時腹痛異常即下燥矢十餘塊白痰稠積若干再用獨參湯灌下以防其脫六脈弱甚四肢厥冷口不能言精神恍惚用參附歸芍苓術之類元氣復飲食進調理月餘而愈五年後陸往閩中其病復作嘔血數番莫能救藜按此非痰乃溫病也熱盛於肺故現症如此乃以枳朴羌桔傷其陰故發為斑疹又以麻黃等辛溫之劑發之火得風而愈熾故痰隨氣上而昏暈也下之太驟元氣必傷不得不轉用參附以救誤後半治法均未中肯觀孟英治翁笠漁案是何等手眼知前人於溫病治法尚疏矣王敬溪年五十六先富後貧心事多郁七月間恣食羊肉酒面當風而臥內傷外感相兼或與發散頭不疼身微熱惟胸腹不快或與疏通便通溲利而痞滿如故或與溫胃或與消導月餘其症依然診之左脈浮弦而弱右脈浮滑有力或議下之陸曰此症內傷雖重於外感然有痞滿而無實堅且舌無苔口不渴脈雖有力而浮尚帶表症焉可下耶宜用小柴胡和之俟實堅脈沉而下之方為萬全自此半月症猶未減又半月脈沉便結乃以潤字丸五錢三次吞服去垢穢若干內有羊肉數塊始知飢餓改用健脾調理之劑又月餘而痊張意田治一人戊寅三月間發熱胸悶不食大便不通小便不利身重汗少心悸而驚豫疏散消食藥症不減更加譫語叫喊診其脈弦緩乃時行外感值少陽司天之令少陽症雖少其機顯然脈弦發熱者少陽本象也胸悶不食者逆於少陽之樞分也少陽三焦內合心包不解則煩而驚甚則陽明胃氣不和而譫語少陽循身之側樞機不利則身重而不能轉側三焦失職則小便不利津液不下則大便不通此症宜以傷寒例八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之如法治之服後果愈陸祖愚治曾邑宰因隆冬出入勞頓感冒發熱骨痛而體極倦怠氣難布息脈之左弦右緩與疏氣養榮湯二劑病者見用歸芍謂傷寒何以遽投滋補陸曰此家傳治類傷寒之方毫無差池不必疑也服後其病如失潘衷弦母年六十餘平時多郁多火因勞傷感冒次早仍然飲食晡時遂發寒熱頭疼骨痛嘔吐酸水冷汗心痛一醫知其平日多郁多火乃引經云諸嘔吐酸皆屬於熱投以清涼其痰愈甚吐蛔數條脈之兩關緊盛兩尺虛空乃風寒飲食之故用橘半枳桔楂朴藿芷桂枝薑砂服後症少減次日復傷飲食症仍劇夜不得臥先用烏梅丸三錢以安蛔隨用檳榔青皮枳實厚朴山楂陳皮半夏炮薑藿香黃連薑砂之類寬其中又用麵皮炒尉中脘旬日後用小承氣湯加元明粉去燥矢二次調理半月而愈照葉天士法只於此方中加大黃數錢便可速愈不必費如許轉折汪敬泉子年十六稟賦薄弱病十餘日他醫不效診之外症身熱如炙昏倦舌上黃黑苔尚有津液胸不可按日瀉黑水十餘次六脈細數重按有神而氣口獨有力氣口脈盛傷於食也曰此雖起於不足而內傷甚重宜先消後補用小陷胸加減症不減夜間躁煩暫投麥冬棗仁山梔豆豉之類稍安而熱與痛不減瀉已止遂與潤字丸一錢少頃又催一錢去燥矢三四枚而虛煩之症又見仍用安神滋補之劑略轉而舌苔未退明知宿垢未清元氣弱甚不敢急攻乃消補間進調理兩月胸腹始暢又月餘乃安吳文學季鴻體弱多郁偶患內傷外感先則過汗後則下早竟成結胸表症未退而下之乃成結胸今云過汗豈表症猶未盡耶診之胸不可按身熱如火肢冷如冰不寐譫語恍惚如見鬼狀已二十餘日矣脈則兩寸關空虛兩尺微有根蒂乃以培植元氣中稍加消導之品療之十日後胸膈已柔其熱盡在下焦繞臍硬痛時轉矢氣舌苔有刺而尺脈漸覺有神乃用潤字丸三錢以歸尾枳實黃連山楂元明粉為煎藥送之去燥矢甚多乃用四君四物兼安神之劑調理而瘳表兄費祖修初夏勞倦怒氣復兼風寒飲食診之左手浮弦氣口緊盛曰兩手脈俱挾邪病方進也不信次日漸頭痛身熱胸膈飽悶項強骨疼醫與丸藥數錢服之遂瀉不止轉加飽悶惡寒再求診知其表症俱在而遂下之竟成結胸矣與五積散二劑表症已除減去芎芷麻桂等又二劑胸寬瀉止改用歸芍六君子湯十餘劑方用潤字丸一錢薑湯送下連進三服所去甚多飲食漸進調理四十餘日而痊張靖山子年十五稟賦薄弱患內傷外感醫治半月矣視其面赤唇焦舌苔白燥身熱欲得近衣手臂不敢袒露反引手入被診之六脈鼓擊而大乃用人參知母五味當歸白芍一服甜睡半晌一醫再診謂陽明經病改用柴葛解肌遂大劇再求診則面如土色呻吟自汗四肢厥逆六脈蝦遊急以人參一兩附子三錢灌之隨服隨醒次早大便一次仍前虛脫又以人參一兩二錢附子三錢耆術各二錢入童便服之得以挽回董蔚如侄飽飧麵食樹下納涼困倦熟寢遂頭痛身熱骨節煩疼胸腹否塞醫以丸藥下之表症未除胸滿兼痛又行表汗頭痛減胸痛更甚或消導或推逐其痛漸下而未得舒暢幾兩月診得六脈澀數面容白黃舌苔灰黑而潤按其胸腹柔軟臍下堅硬晡時微熱夜半始退小水自利大便不通此蓄血症也乃用桃仁承氣湯服後滿腹攪刺煩躁欲死其父母哭泣詈罵不可堪至夜半下黑糞汙血若干遂腹寬神爽改用調理之劑而痊葉能甫七月患內傷外感之症或用煎劑解表丸藥攻裡遂瀉數次而胸悶口乾潮熱譫語舌上黑苔手足厥冷脈之左三部沉細而澀右寸關沉滑尺脈空虛此陽症見陰脈也若再一瀉必然不治乃用陳皮甘草山楂柴胡木通澤瀉厚朴炮薑先溫消分利三劑後竟不瀉矣但兩手俱沉實改用黃連枳實山楂黃芩厚朴栝蔞五六劑忽轉矢氣投潤字丸二錢少頃去燥矢三二次前症悉除遂投養血健脾之藥調理一月而安附潤字丸方橘紅一兩杏仁二兩牙皂一兩前胡天花粉枳實山楂肉各二兩甘草三錢檳榔七錢半夏一兩生大黃十二兩水泛為丸易思蘭治王孫章湖壯年七月間秋收忙迫飢食二雞子酒數杯時因惱怒至暮風雨大作又當風沐浴夜半身熱寒戰腰背脊強胸滿腹痛醫用五積散發汗身涼戰止惟頭額肚腹大熱又服柴芩湯半月不愈大便欲去不去每出些須即時作痛又用大黃下三五行病仍不減反加胃寒吐逆飲食入口即吐吐時頭汗如雨至頸而還四肢或厥冷或發熱大便一日二三次小便如常飲食不進者四十餘日亦不知飢形瘦日甚診之左手三部俱平和無恙惟大腸與脾胃脈俱沉緊按之則大時一結堅牢有力推之不動按之不移曰此氣裹食積也下之則愈先以紫霜丸二十一粒溫水送下二時不動又進七丸約人行三五里腹始鳴下如血餅者五六塊血水五七升隨腹飢索食以清米飲薑汁炒鹽少許一二杯與之神氣頓生次日復診右寸關脈豁然如左以平胃合二陳湯日服一劑復用補中益氣湯加麥冬砂仁侵晨服六味丸調理一月而愈其父洪山問曰吾兒病外感內傷兼有醫用汗藥已愈但胸腹痛甚及下後反增胃寒見食即吐是下非所宜矣何以復下而愈易曰有見於脈耳左手三部和平是無外症右手寸關沉緊而結堅牢不動不移脈訣云下手脈沉便知是氣沉而有力者為積沉緊為寒為痛自脈斷之陽明當有堅積也書又云食積發熱夜熱晝涼頭額肚腹最甚胃中積熱蒸蒸頭汗至頸而還自外症觀之陽明有積甚明矣洪山曰先生論積固當何以前用小承氣反加胸悶不食耶易曰此病先因氣裹飲食後復外感風寒當日若用香蘇散一劑有紫蘇葉散去表寒有香附陳皮內行氣滯表解食消豈不兩全乃用五積散雖有麻黃散寒而當歸等藥又補住食積故胸腹愈痛至於大小承氣尤為未當小承氣去胃中之邪熱大承氣去陽明之燥糞此症非邪熱燥糞蓋邪熱燥糞乃寒自表入里積熱之毒搏結陽明大腸中原有之糞成塊成燥必遇大黃之寒而邪熱始散得朴硝之咸而堅積始熔此大小承氣之治也此症乃有形之物自外得之者且雞蛋性冷而滯食時遇惱為氣所裹又加以沐浴受寒氣與食在內寒邪在外包裹堅固其勢有不易消者夫欲解散寒邪消化食積非溫熱之藥不可食得熱則行得冷則凝今不用溫熱反以寒涼治之則寒勢愈滋食積愈堅胸膈愈滿矣紫霜丸有巴豆霜之大熱以化寒凝杏仁之辛熱以破痰氣代赭石赤石脂之重墜以鎮定臟腑真氣兼之巴霜之氣走而不守何慮堅不化積不除耶張令韶治孝廉項恂如秋患傷寒用發散二劑愈甚又二劑神昏不語大熱診之六脈已脫急用人參耆術各一兩附子三錢薑桂各二錢午後脈漸出更進六七劑而病如故更加舌腫唇爛渴飲湯水不絶如何猶不入熟地曰病是此病藥是此藥服之反甚得無誤乎細審不瘥又數劑仍如故十餘日總不能言其子終懇治曰藥已至矣病終不轉殆死症也更用八味丸全料濃煎六碗冰冷與之一日夜服盡舌腫即消能語識人每日用藥一劑粥食數碗佐之以火肉白鯗蝦魚之類大便不行聽之將一月腹始脹食後更甚乃以參苓耆朮薑桂附煎湯去渣加大黃二錢服後額上微汗出手足躁擾不安此正氣虛極也又與大料溫補一劑遂安臥夜間下宿垢半桶飲食如故後用溫補百餘劑而愈共食人參五斤余附子三十餘枚後稍失調理便發熱脫落下頦直至次年夏間始康健錢太庵同道也五月間患傷寒十餘日熱不退泄瀉一二次或用炮薑白朮等而瀉止忽發狂譫語大渴改用荊芥防風蟬蛻紅花筍尖連翹等更加昏譫欲飲冷水脈之散大斑色淡而隱隱不明曰此手少陰心之脈也由勞心過度真火虛極神氣外浮故現此假症不可以斑治少頃必發狂遂用人參耆術各三兩茯苓麥冬附子各六錢五味子三錢分為三劑煎未就果發狂人不能制服一劑如故再劑稍定三劑遂睡次日復進藥如初神清渴止斑亦不見連進二十餘劑每日晡尚有譫語數句幸粥食進而大便不行忽一日心中開亮如開窗見日然譫語遂已乃曰先生所云手少陰心病果然也或問何以不用薑桂而止用附子曰乾薑入太陰肉桂入厥陰附子入少陰今病乃少陰君火衰微故宜用附子也又少陰下水上火而主神機出入凡病足少陰腎水者雖凶易愈病手少陰心火者治得其法間有生者否則十無一生何也心藏神腎藏精精者有形神者無形治有形易治無形難也陳纘先長媳上年患虛寒之症調治之而愈次年七月間又患發熱惡寒之症診之其脈虛用桂枝薑白朮等一劑次日更大熱矣張曰余亦意其大熱也脈之如初乃曰咽喉腫痛固屬火熱亦有虛寒者吾不慮其腫痛而慮其大吐不止也可多請高明治之不愈再來召我彼見勢危即遍延諸公皆曰人雖虛弱而見證如此固不可太涼然熱藥豈可用乎俱用甘桔山梔麥冬之類隨服隨吐藥俱不受病轉劇復召張張曰諸公之論極是但此病卻不然也初豫所以辭者一則再用熱藥恐不信二則必有識此病能用溫補者何必功自吾出也遂用人參三錢桔梗一錢五分甘草柴胡桂枝乾薑附子炮薑各一錢下咽不吐少頃大寒戰覆以重綿不解更與二服復大熱數刻隨大汗如雨睡覺而痛腫俱消後用薑附耆參術二十餘劑而愈呂東莊治蔡氏婦病感症初服疏表降火清痰之劑半月愈甚胸脹滿痛用溫膽湯及花粉栝蔞痰反急用理中加肉桂延胡二陳枳殼痛結不可忍醫謂調補不應技窮矣呂謂調補固如是耶即理中湯入破氣之藥已能益痛至甘草一味若蛔動者便非所宜故仲景安蛔散去甘草加椒梅也病人果向多蛔症凡病吐蛔多由肝火煎厥乃厥陰病故名蛔厥非結也乃仍以理中湯去甘草加白芍三錢木香五分痛減半脈之細數甚口渴欲飲水不能咽進湯輒吐手足時熱面時熱額嬌紅不定體如燔炭此邪火內沸怒木乘火五陽之火隨之上燔下爍其陰龍雷飛越以藥激之陽格於外伏陰互結而致辭繁而多疵病遂以大八味丸作引與之曰得汗病已黃昏服藥即少睡面紅即退為白頃乃索被曰俟之大汗至矣及三鼓煩亂異常至黎明診之脈緊數至八九曰汗已泊矣而虛不能發也急煎人參一兩用耆朮歸芍五味甘草為佐飲之汗大至曰未也次日再服汗又大至如雨諸症頓愈或曰前之甘草不宜服今兩劑俱重用何也曰初胃中氣血攻竭空虛寒凝故蛔發而痛得甘則蛔愈昂上故不可今得濡潤之藥胃氣衝和蛔頭下伏雖濃煎與之無害也法可執一哉沈凝芝側室病傷寒壯熱不止疏散之愈甚神情昏憒不寐呂診之曰此感症也然起於勞倦不當重虛其虛即投以參術等得汗神情頓清次用地黃飲子下黑矢熟寐惟熱未盡退前方加炙草一錢即安繼以滋腎養榮等藥調理復初呂姊壻勞仲虎初夏勞倦又感寒熱口苦醫用重藥發散之後用楂朴枳半花粉栝蔞攻其中熱益苦呂用滋水清金神稍清次日脈之浮洪而數語甚遽而收輕手指時作微脹曰此皆虛象也邪未嘗入陽明而先攻之傷其元氣邪反隨而入陽明矣重虛其虛愈不能鼓邪外出今雖稍定夜必發譫語當急以人參救之適篋中所帶不多只用人參五錢黃耆一兩次日家人言夜來甚狂亂不安似不可救曰無妨參力不足故耳時鼓峰在邑拉之同往曰汗已至矣何慮為乃曰無庸疑吾輩在此坐一刻待其汗至而別何如衆在猶豫間因出酒食過午舉杯未盡內出報曰汗大發矣是夜熱退身涼痰喘悉平繼用調土之藥而起林觀子治一人頭痛身熱體痛傷寒證也然舌乾燥好沉睡診之脈豁大無倫次知其勞於房欲復感邪也與補中益氣湯入人參一錢五分服之得汗熱減三日內進八劑漸起食粥而安初服彼甚疑之見藥入口必小汗漐漐周身和暢始信而服之傷寒折衷劉云密曰豫於癸巳春因老人氣虛而春每有暴寒時或冒之欲疏散而氣益虛遽投參耆而微汗邪更不去將以補益為疏散而用之又未能卻邪乃用荔枝肉肥厚者五枚煮酒一盅服之頗效又壬寅冬癸卯春豫時因微寒胸膈稍滯鼻塞不暢用荔枝浸酒每日一杯蘇葉陳皮十分之二服之數杯後無不捷效是則丹溪所謂能散無形質之滯氣誠不虛也吳孚先治魏司馬伕人感冒發熱頭痛項強遍身拘急脈浮緊醫用羌防芎蘇等發散毫無汗意曰浮則緊矣獨不按其沉則澀乎且左部尤甚灼見陰虛血不足不能作汗也即以前方加當歸熟地血藥使云蒸而雨自降一劑汗如雨表症悉除馮楚膽治常侍衛據云得之感冒醫以發散繼用涼解已五六十劑粒米不進每日惟飲涼水而已下身寒冷而木漸至胸腹皆冷而實手足面目肌肉痛癢不知言語無音難以布息按其脈沉微欲脫令以人參一兩附子三錢早晚各一服服後倘暫有煩躁無慮也既而果然二三日間漸即相安脈少起肢體之冷亦非若前之徹骨矣乃以附子理中湯去甘草以胸腹實滿也早晚各一劑以溫米湯壓之數日後冷減神氣稍清早晨仍服前方午後以濃參汁沖服去丹皮加牛膝杜仲之八味湯又數日骨節疼痛不堪曰此陽回冰解之象也無復慮矣復以八味加鹿茸虎脛牛膝杜仲為丸以加減十全大補湯送之兩月後言語始有聲三四月後始能步履年餘始能鞍馬常患腹痛後服溫暖之劑始愈杜中堂子年十九夏月病感脈之時而洪弦尺弱時而弦細尺緊乍寒乍熱脈隨寒熱而變也兩耳下腫痛足亦微腫飲食即吐靜則吐少減動則吐更甚詢其病由因偶雨冰雹駭而出視背上受寒發散和解不效繼用清熱之劑內有黃芩山梔服後即發嘔矣蓋暑天感寒中表之氣不固可知況先天薄弱膏粱嬌養只宜溫中調理寒邪自散計不出此致寒鬱火升兩耳之下漸腫及頰又誤以為實火濟以寒涼釜底之火既浮中宮之陽復損尚堪延納飲食乎今欲溫中開胃則耳頰之疼痛為礙欲滋陰培本則中焦之道路不通計惟有峻補真陽以達於下重滋真陰以繼其中初服八味加牛膝麥冬五味作大劑沖人參濃汁服下即吐改用人參炮薑附子為末以焦白朮為膏略入薑汁和勻為丸少少參湯吞服幸不吐頃之腹痛大便知其氣下行吐可止矣次日仍以昨煎方大劑沖人參湯飲之日用參兩餘出入加減漸愈後以地黃歸脾二湯間服遂瘳李士材治一人勞神之後心躁大熱頭痛時作時止醫者禁其飲食與之解表見四日熱不退欲與攻裡診之曰脈不浮緊安得表耶又不沉實安得里耶惟心部大而澀此勞心而虛煩乃類傷寒非真傷寒也若禁飲食則餓絶矣便以粥與之兼進歸脾湯五日而安張路玉治陳太倉夫人素患虛羸骨蒸經閉少食偶風熱咳嗽誤進滋陰清肺二劑遂昏熱痞悶異常凡素患虛損人忽有外感宜細審之診之人迎虛數氣口濡細寸口瞥瞥兩尺摶指此肝血與胃氣皆虛復感風熱之狀與更減蔥白豆豉湯一服熱除痞止但咳嗽頭痛微汗更與小劑保元湯而安王氏子於四月間患感冒昏熱喘脹便閉腹中雷鳴服硝黃不應脈之氣口弦滑按之則芤其腹脹滿按之則濡此痰濕挾瘀濁陰固閉之候與黃龍湯去芒硝易桂芩半夏木香下瘀垢甚多因宿有五更咳嗽更以小劑異功加細辛潤之大抵腹中奔響之症雖有內實當下必無燥結所以不用芒硝而用木香芩半也用人參者藉以資助胃氣行其藥力則大黃輩得以振破敵之功非謂虛而兼補也當知黃龍湯中用參則硝黃之力愈鋭用者慎之錢順所素有內傷因勞力感寒發熱頭痛表散數劑胸膈痞悶不安以大黃下之痞悶益甚更一醫用消克破氣藥過傷胃氣遂厥逆昏憒勢漸危脈六部微細如蛛絲舌上焦黑燥涸異常此熱傷陰血不急下之真陰立稿救無及矣因以生地黃連湯去黃芩防風加人中黃麥冬酒大黃另以生地黃一兩酒浸搗汁和服半夜下燥矢六七枚天明覆下一次乃與生脈散二帖以後竟不服藥日進糜粥調養而大便數日不行魄門迸迫如火令用導法通之更與異功散調理而安楊乘六治沈氏婦感症身熱口苦脅痛頭眩或投以表劑發散身熱益甚舌黑唇焦口渴煩躁手足腫痛大便艱澀小便短赤寢食俱廢脈之浮數無序乃肝鬱致感因發散太過血少陰虛而火燥生風也以滋水清肝飲倍熟地一劑諸症悉退次用歸脾湯去木香加白芍丹皮調理而愈逾年産後復因勞力致感乃恐蹈前轍不敢發散一味養陰以致大便不實飲食不進氣促如喘晝夜不眠閣眼即見一白髮老嫗坐立面前胸中戰跳恍惚不寧仍邀診曰脫陽者見鬼非真有鬼也蓋陽氣大虧則神不守舍其所見者即其不守舍之元神也所以男病必見男形女病必見女形且虧在某臟則某色獨見脈之浮細如絲沉則緩大無力面色㿠白眼光散大舌乾而嫩且白滑此中虛挾感逼以寒涼致陽氣益虛而陰氣乘之耳乃與參附養榮湯倍棗仁白芍五味服後則老嫗不見而熟睡矣繼用補中益氣加白芍五味數劑全愈簡某病感症發熱飽悶神思昏沉不更衣者八日矣諸醫投發表攻中不效且益甚脈之滑而有力面壅熱通紅氣粗舌苔黃厚而燥按其胸微痛此感症兼食俗名停食傷寒是也乃用逍遙散加熟地二兩或曰如許發熱又兼飽脹何堪復用補藥曰此乃發表攻裡之劑用之以代麻桂硝黃者也此法固妙要當用於發表攻中之後第服此則汗至而便通熱自退脹自除矣一劑淋漓汗下二劑下黑矢十餘枚諸症悉愈或問其旨曰此症初起本一逍遙合小柴胡發汗開肌助脾消食則愈矣乃風燥混表腸胃乾枯宿物燥結愈不能出仍用逍遙散重加熟地養陰使陰水外溢則汗自至陰氣下潤則便自通也繼用六君歸芍而愈吳某病感症先微寒繼壯熱頭眩噁心吐沫不絶脹悶懶言氣難布息四肢麻木痠痛腰痛如折寢食俱廢大便祕結醫與消暑解表消食益熱益脹不時昏絶脈左手沉細右手緩大皆無力面㿠白舌苔嫩且白滑知其多欲陽虛致感也與養榮湯加附子或疑熱甚兼脹而投溫補何也曰但服此諸症自退若再用芩連枳朴則真誤事矣一劑即臥醒則大叫冷甚比及半時汗出如雨再劑胸寬食進便通熱退又以兩腿外臁瘡腫爛臭濃水淋漓痛癢俱甚一切膏丹洗帖不愈已六七年問治當何法曰病有內外源無彼此此因陽氣素虧不能下達毒氣時墜不肯上升故也第以前方作丸久服則陽分充足氣血溫和而毒氣自出瘡口自收矣如言兩月而愈潘某自京回南勞頓感寒發熱時作微寒發散數劑熱漸熾改用清火養陰數劑熱轉甚比到家舌苔已由白而黃由黃而焦乾燥裂黑如炭色神思昏沉手足振掉撮空自汗危症蝟集矣醫見其熱勢謂寒之不寒是無水也與六味飲不應見其舌色謂攻伐太過胃陰乾枯也投左歸飲又不應脈之左寸關大而緩舌浮胖謂症乃陽虛火衰非陰虛火旺也蓋陰虛火旺者其舌必堅斂蒼老今雖焦黑乾燥而見胖嫩且服六味左歸而症反加反加二字毋乃太過其為陽虛無疑矣以養榮湯用人參五錢加附子三錢一劑熟睡竟夜次早舌上苔盡脫變為紅潤而嫩矣原方減人參二錢附子一錢五分四劑回陽作汗而愈戴氏子年二十四病感症寒熱或用發散譫語發狂又以苦寒下之危症蜂起又有用二冬二地石斛黃芩者五六劑益狂悖不安診之面白無神舌滑無苔脈細緊無力知其臟寒真陽欲脫以養榮湯用人參五錢加附子三錢又知其為旁議所阻也囑其午後至申察病人足冷至膝則亥子之交不可言矣已而果然乃自戌至亥始盡劑子時後由腰至足漸溫五鼓進粥半甌而熟睡矣又十餘劑諸症悉愈未半月忽右足大指彎筋縮而痛外科以乳香沒藥敷之痛劇呼叫再診之乃因思慮傷脾不能榮養本經筋脈所以筋彎燥病也以歸脾去木香加白芍數帖愈陸氏子病感症發熱咳嗽氣短如喘發散轉甚痰湧如潮譫妄撮空脈之輕按滿指重按則空面色㿠白眼眶寬大神水散漫舌苔嫩黃中間焦燥兩手振掉症由氣虛致感誤用峻表致陰被劫而將亡陽無附而欲脫非救陰攝陽不能挽也乃用左歸去茯苓加人參五味大劑濃煎服訖即睡六時許方寤則身涼嗽止喘定痰消繼以生金滋水飲一劑養榮湯四劑全瘳又其母孀居臥病不起二載矣或作溫或作痿治之不效並乞診之脈大而無力面色萎黃舌胖而滑詢其飲食不思略食即飽夢中常見鬼神醒則胸中戰跳此命門火衰元神虛憊脾土不生以致四肢無力不能運動也亦用養榮湯煎送八味丸不一月而瘳沈某病感症身熱自汗或乍寒倦臥懶言手足心熱日輕夜重或與發散愈熾口渴譫語煩躁便祕又雜進寒涼解毒等劑勢垂危脈之洪大而數按之不鼓面色淺紅遊移不定舌黑而潤手足厥冷此假熱也與八味飲加人參諸醫以火症悉具力爭參桂附不可食曰外雖似實熱內甚虛寒初誤發散令精液傷而口渴便祕煩躁譫妄復用寒涼重陰下逼致龍雷之火不安其宅非人參附桂何以挽回公等不信但以附子作餅熱貼臍上時許便覺稍安矣外試法妙試之果然乃進藥不及一時面紅立退譫妄煩躁悉除次用生金滋水補中益氣調理而愈未半月其父亦病感症危甚楊驗其舌黑而枯滿舌遍裂人字紋曰脈不必診也驚問故曰此腎氣湊心亦八味症也誤用芩連無救矣蓋昨一日夜果服芩連兩許問何以知之曰舌上明明現出耳姑求一診以冀萬一曰脈隱而難憑不若舌之顯而可據也何必診逾日果歿諸某年五十四冬杪勞力致感冒頭痛發熱時作微寒緣混表太過只口乾便祕壯熱不退復用苦寒瀉火頭汗如油下頷脫落口角流涎鼾聲如鋸語言錯亂甚至循衣摸床撮空諸惡畢備脈之洪大躁疾重按全無舌糙刺如沙皮焦黃如烘糕並舌底俱乾燥斂束如荔枝肉而滿舌卻甚胖壯日進稀糊碗許大便半月未行乃曰若論外象百無一治幸脾氣不瀉胃氣不絶尚有生理第服藥後神得收斂而睡脈得靜細而沉乃佳遂以大劑養榮湯重加附子與之服訖果睡脈亦和四劑舌轉紅潤惡症悉退頻進稀粥惟交陰分尚有微熱咸疑陽藥助火欲去耆朮桂附曰勞傷脾肺氣虛發熱非甘溫不能除方嫌火力不及不能蒸土回陽推出邪氣耳俟其力到地氣升而為云則天氣降而為雨頃刻為清涼世界矣守方十二劑始戰汗汗後身冷如冰問之不應推之不理或問其故曰此病既到今日斷然不死不過汗後虧其外衛之陽故身倦懶言無氣以動子刻自平復已而果然次日欲便扶至圊虛坐努責數日忽小水癃閉點滴不能出小腹脹痛不可言此因大便彌月不行腸胃所積已多今頻加努責將宿物推迸大腸致壅塞膀胱所以癃閉不出也須以輕清之劑升降之則小水自利立煎補中益氣與飲頃刻即通大便亦潤繼以養榮作丸用補中益氣湯煎送之兩月而健馬元儀治沈某發熱惡寒頭身俱痛燥渴譫語脈之洪數而澀此外感而病危者以五志過極陰氣素虧邪復乘之重傷其陰而火熱愈甚也先與解肌一劑惡寒已而熱未除譫語轉增神魂飛越蓋肝藏血而舍魂心藏脈而舍神木火太過不獨自傷且賊真陰之氣以肝腎為母子其氣相通也心本制於腎而亦傷腎者臟邪暴甚反侮所不勝也法當養肝之陰使不誅求於腎而水自充抑心之陽使不擾亂乎腎而水以安用生地知母甘草茯神丹參貝母花粉等一劑知三劑已調理而安丁某經病二十餘日脈之左手弦數兼澀右手澀結少神發熱神昏譫語胸中滿結拒按舌苔黑刺面色枯瘁時有咳嗽日晡愈甚此肝木內鼓心火上炎肺金失養而胃土無滋也用栝蔞枳實半夏曲蘆根汁紫菀杏仁蘇子等服後臥片時神氣頓清右脈亦透但澀象不減重按少神舌上苔刺去而復生此津液元氣虛竭之甚轉用人參三錢生首烏一兩知母生地川連蘆汁兩劑脈澀減症漸安但胎未盡去中脘滯悶前方加枳實楂肉一劑頓已次用滋陰補虛之品二劑諸症悉退左脈尚和右脈轉浮而數微熱發疹此正氣來復餘邪盡從外達也與荊炭牛蒡乾葛防風杏仁桔梗蘇子薄荷清透之品二劑後再用益元散滋陰潤燥調理而愈一婦人四旬外頭痛發熱口乾便祕不眠已月餘矣此邪風外煽實熱內燔表裡邪結之候也前所用藥亦是發表攻裡而不愈者藥不勝病耳今上下分消表裡交治而於攻發之中仍用溫養斯汗不傷於過下不傷於峻也用荊防薄荷麻黃輕陽發表使邪從汗而散於上大黃芒硝梔子滑石通幽利水使邪從便而泄於下黃芩連翹清其上白芍甘草和其中桔梗石膏開其肺川芎歸芍養其肝一劑而減三劑而安安氏子年二十初得惡寒發熱身痛症診得內傷之脈而顯陽微之象曰此病枝葉未害根本先撥乃陽虛受邪症也若誤行表劑則孤陽飛越而危殆立至當用參術等大培元氣以攝虛陽加桂枝透表以散外邪不信越四日發熱不休自汗不止神氣外揚或且欲用柴胡解表之劑乃曰此症似太陽而得少陰之脈當是平素下虛故真陽上越耳遂定參耆建中湯而別或復謂外邪初入太陽表散即愈若徒進參耆適助邪而滋患也越三日症變危篤再診脈幾微欲絶汗出如雨昏沉欲絶此非大劑溫補不能挽回以人參六兩合附桂理中湯連進三劑汗漸收脈微續神氣尚未安和也復用人參三兩附子五錢方得陽氣內充餘邪盡從外達兩頤透發漸調而安琇按是症固屬虛而原有邪熱或與表散未嘗無功至汗出脈復第以大劑養陰其危立已乃久用桂附遂致發頤尚得為善治乎哉魏玉橫治楊氏子年二十許四月初以啖面過飽午睡覺即身熱頭痛醫與消散至七日而愈兩日後因食水圓復病仍與消運不應乃以小承氣下之連下糞水二次皆無燥矢更醫與厚朴山楂陳皮枳殼之類穀芽用至兩許月餘病不減而股肉盡落枯瘠如柴不食日進米湯數盞寒熱往來小便亦少最後一醫教用膽汁導之膽入而糞不出又用油燭探之燭化而糞亦不出其膽汁與燭油凝注下部楚不可堪呼叫之慘四鄰為動時已四十餘日方治木邀診以決早晚察其脈弦而迢迢尚有神氣其聲尚明亮按其腹不拒至臍下若有物築築然振手解衣視之狀如百錢梗起其父曰此必宿食不下而然曰非也糞穢在腸豈能跳動此緣誤下誤消傷其本元肝腎之氣不藏亙亙奔突經所云動氣是也幸屬少年尚可治熟地一兩五錢肉蓯蓉五錢甘杞子一兩麥冬當歸各三錢三劑下黑燥矢尺余者二膽油俱去號呼頓息始得睡再按之則若百錢者仍在再與前劑不減令辦參數錢勉措十金僅得錢五煎調前藥服下則泯然立能進食惟寒熱每日一作知非本病必臥室湫隘天氣暴暑乘虛感瘧也且勿亟治仍與前方減半數日後飲食大增乃以常山二錢火酒炒透五更煎服寒熱亦瘥湯某年四十餘新秋病感冒醫屢發散至七八日無汗脈弦數且長身重頭眩尿少而赤鼻乾不眠微熱而渴此邪漸入里腎陰不足肝脾血燥表之則不能作汗下之必成壞症既非少陽無容和解問欲飲水乎曰甚欲不敢飲命與一大碗猶覺未足再與一小盞令且勿藥逾二時許汗大至身冷如冰亟再診之脈虛細而弦小腹旁跳躍振手此動氣也緣多服表散令汗出邪去而虛症見矣與生地杞子等峻養肝腎一劑平三劑全愈陳士華兄武生也隨鄉試伊邇日與朋友練習技勇忽感冒醫治月餘不效脈之弦大而澀外症不發熱大便祕小便少兩額深紫若胭脂腰痛口乾不欲食所服藥類皆燥散之品此少陰不足勞傷外感治之失宜熱邪內陷法當內托令其汗出自愈用熟地生地杞子各三錢蔞仁二錢黃芩二錢石斛三錢傍晚服下黃昏胸膈脹悶欲絶躁擾異常其家大懟以為用補必死矣怒持藥甌擲之門外環視涕泣一更後忽大汗如雨衣被沾濕汗止即索粥連進兩盞已而酣睡達旦明晨延診脈已圓滑頰赤亦退第困乏無力耳因問夜來脹悶汗出之故曰病因前藥劫其津液外邪乘虛內結今以大劑甘潤投之即借其熱結之力蒸鬱勃發乃一湧而汗出邪散此所謂內托之法也令以前方再服四劑病即起矣如言而愈李韞玉母年逾四旬素有脅痛肝火之病深秋感冒醫與表散數劑熱猶未退以不大便投大黃丸元明粉下之遂脅痛大作暈厥欲脫更醫治以人參附子乾薑肉桂等藥厥止復煩躁汗時出不眠小便赤澀醫恐虛脫日投參朮薑桂每汗出則加五味黃耆龍骨以斂之又時時欲利則加補骨脂肉豆蔻以固之如是四十餘日已服參數兩病益進而食不進診之脈躁數時大時小微有寒熱舌黑而強鼻煤溢出額頰唇口如墨小便惟滴點兩手索刺如柴第神氣不昏語音猶亮此由表邪未清誤下邪陷入里且傷其真陰致肝急而厥又誤投辛熱固澀熱邪與熱藥鬱結臟腑今幸元氣尚存猶可活也治法仍當汗下否則邪何由去或訝曰是症仍可再用攻表乎曰不可第可用不攻表之藥下耳疏方以生地杞子各五錢麥冬二錢沙參三錢蔞仁一錢五分黃芩一錢或謂前醫深恐泄瀉今所用皆一派寒滑服之必利下無疑將弗服又或曰前醫治經月餘且辭不治曷進此以窺進退服一劑果利數行然病人殊不困遂日進一劑四日則利下頻數日夜十餘次所下穢惡不堪青紅黑白而黃者絶少腹痛後重唯飲食漸進舌本漸柔鼻煤漸退小便漸長仍前方加熟地五錢黃連五分夜乃汗出其汗亦極臭穢半月汗乃止利漸減乃加生熟地一兩減黃連增白芍甘草凡五十餘劑病始瘥計服蔞仁斤許姚氏婦年逾四旬素有胃痛疾蓋肝火上逆也夏月患感冒發熱頭痛眩暈不眠善嘔初服發散未減改以二陳左金治嘔嘔未愈而腰連小腹痛不可忍議為邪入厥陰症將危殆欲用四逆回陽之劑診之脈數而弦手見紅疹面殊清白舌兩旁及尖皆紫色中則微黃口乾不甚喜飲斷為肝膽之火熾甚遇暴寒折之不得宣泄乃上衝胃絡作嘔故頭偏甚於左紅疹見於四末者木鬱則乘脾也其初與逍遙自愈乃用燥散之劑更擾其陽而傷其陰是以腰腹窘痛症本厥陰然非傳經亦非直中也今標屬陽明宜用竹葉石膏湯入杞子一兩飲下嘔止腰腹之痛亦除惟頭痛仍在改與逍遙湯加川芎當歸時方黴雨至夜半忽霹靂一聲病人覺四肢痛脹異常此少陽之郁本諸外淫因雷復得發越也已而頭痛如失次日診之脈既和平與四物去川芎加女貞石斛平調而愈余表甥嘗病疫因熱深厥深一名醫亦與四物湯幸病人自知為熱症不之服用小柴胡白虎湯合進而愈宋復華兄俞氏姊初夏病感天癸即來病隨愈蓋熱隨血去也越七日遇端節食雞子五枚酒二杯又進飲半甌臨窗少坐少頃即頭痛發熱次日前醫詢知病源以山楂三錢穀芽三錢葛根三錢其他消散大約稱是連進三劑勢將大劇余至則前醫已在與一鄰醫議處方診之已昏不知人面色死青呆白目閉口張氣出手撒呼之不應脈如沸羹重按則無症已敗矣幸未大汗令人以手按其心下亦不拒知其病初愈臟腑餘熱未清食入腸胃一時不能運化又感微邪遂如復症使勿藥則展轉自愈乃誤以大劑消散投元虛血弱之人鼓動其火反致身熱不退猶以為藥力未至再進三進至陰陽脫離如是叩其今日將用何方則云總是雞子五枚硬飯半甌為患既消散不應惟有承氣一方下之而已曰承氣固是第真元已奪恐宿食未下而遽脫奈何乃曰正為此耳曰余有一方且弗顧其病但服之令病人目開口閉神氣稍回再為調治如何二醫欣然齊諾乃用熟地一兩五錢當歸五錢炮薑八分囑其急煎服遲則不及第得藥下咽則活矣抵暮來告病人不知飲藥以匙挑灌數口喉間汩汩有聲遂全盞與之少頃果目開口閉能轉側似大有生機求再往診曰無庸但以前方再銼一劑並前渣濃煎與服可也明日視之神氣清明脈亦圓穩第稱口燥舌乾小便短澀夜臥不寧就前方去炮薑加沙參麥冬一服汗出遍身能進粥矣再以前方加減而愈孫文垣治族侄元素春溫頭疼發熱左脈弦大右洪大以小柴胡合白虎湯投之二帖而愈乃因食復發斑色紫神昏身重不能轉動合目鼾睡如醉人形狀面赤發熱舌苔外黃內黑有芒刺脈六部俱浮洪以三黃石膏湯加枳實鱉甲進之稍得微汗大便如有臭糞次日開目能言用小柴胡湯加山梔枳實鱉甲白芍調理而愈又治侄君孝三月患頭項痛腰脊強身如被杖臍腹亦痛口渴不寐六脈浮數醫以為陰虛為之滋陰降火三投而三劇反加嘔惡又與疏通熱不退下午煩亂方和宇視之以為外感擬進人參敗毒散前醫力爭謂陰虛不可再汗仍用四物加柴胡葛根薄荷黃芩知母而熱如焚神且昏冒矣孫診之六脈浮弦鼓指曰此春溫也方脈良是因復加內傷故病劇滋陰藥壅塞且引邪入陰分宜乎熱加而躁悶也法當清解兼消以二陳湯加羌活防風麥芽山楂服之得微汗熱減其半惟下午作潮熱大便未行腰臍痛不止改用小柴胡湯加葛根白芍青皮黃連山楂熱少退大便行腰臍痛減但不知飢再以柴胡甘草青皮枳實麥芽知母黃芩白芍投之諸症悉平惟體倦乏力加人參扁豆薏苡去柴胡青皮調養而愈程好吾季春患兩太陽痛胸脅稍痛口渴便瀉左脈浮弦而數中按有力右關滑大此春溫也豫柴胡前胡葛根粉草青皮黃芩知母桔梗半夏曲石膏夜半後得微汗因起大便感風續又發熱口渴煩躁用石膏三錢知母柴胡各二錢葛根黃芩各一錢粉草桔梗各五分竹葉二十片兩進而汗出熱解諸症悉平四肢尚倦口微干語言乏力以生脈湯加薏苡石斛甘草白芍黃芩調養如愈僕貴春溫頭痛身熱面赤舌心焦燥用石膏柴胡葛根甘草黃芩知母天花粉白芍服之舌不焦黑矣進粥太早半夜復熱中脘硬痛與大柴胡湯一帖汗出津津大便行二次腹痛不止乃以小承氣湯調下元明粉一錢又行二次熱不退而痛全減旋作鼻衄改用石膏丹皮生地甘草山梔升麻黃芩赤芍一帖而熱散衄止孫元素婦春溫後經水適至餘熱不退口渴胸脅痛耳聾脈左弦數右滑大而數用小柴胡加石膏知母桔梗枳殼栝蔞半夏曲服之熱渴如故改用柴胡二錢人參甘草天花粉黃芩各七分白芍紅花當歸丹皮知母各八分調理而瘳徐君育素稟陰虛多火且多脾約便血證十月間便患冬溫發熱咽痛醫用麻黃杏仁半夏枳橘之類遂喘逆倚息不得臥聲颯如啞頭面赤熱手足逆冷張脈之左手關寸虛大微數此熱傷手太陰氣分也與葳蕤甘草等藥不應為制豬膚湯一甌令隔湯燉熱不時挑服三日聲清終劑而痛如失鄭墨林內素有便紅懷妊七月正肺經養胎時而患冬溫咳嗽咽痛如刺下血如崩脈較平時覺小弱而數此熱傷手太陰血分也與黃連阿膠湯二劑血止後去黃連加葳蕤桔梗人中黃四劑而安萬氏牛黃清心丸西牛黃二分五釐鏡面硃砂一錢五分生黃連五錢黃芩三錢山梔三錢鬱金二錢上為末蒸餅糊丸如黍大每服七八丸王晉三曰喻嘉言治中風門云熱阻關竅湯劑中調入牛黃清心丸但古有數方其義各別若治溫邪內陷包絡神昏者惟萬氏之方為妙蓋溫熱入於心包絡邪在表矣草木之香僅能達表不能透里必藉牛黃幽香物性乃能內透包絡與神明相合然猶配合之品佐使咸宜萬氏用芩連山梔以瀉心火鬱金以通心氣辰砂以鎮心神合之牛黃相使之妙是丸調入犀角羚羊角金汁甘草或人中黃連薄荷等湯劑中定建奇功尤在涇曰溫邪之發陰必先傷設有當行解散者必兼滋陰之品於其中昔人於蔥豉湯內加童便於梔豉湯內加地黃麥冬亦此意也黃錦芳治林國柱患風溫汗出倦怠鼻鼾語難嗜臥不休微惡寒而不甚或欲用清暑益氣湯黃曰此熱擾腎之症幸胃氣尚存可用滋陰之藥以救之若誤用清暑益氣則熱得參耆而益盛火得升柴而益熾直視失溲與瘛瘲等症必相繼而出矣用熟地三錢山藥二錢丹皮一錢龜板一錢防風一錢阿膠一錢桂枝二錢一劑而神清四劑而諸症悉除
