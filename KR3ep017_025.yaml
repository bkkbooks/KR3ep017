body:
  text: 卷二十五産後産難劉復真治府判女産死將殮取紅花濃煎扶女於橙上以綿帛醮湯罨之隨以澆帛上以器盛之又暖又淋久而蘇醒遂産一男蓋遇嚴冬血凝不行得溫便産也回生丹方不知起自何人或云長葛孫一奎始得之異人傳授乃催生之聖藥也錦紋大黃一斤為末蘇木三兩打碎用河水五碗煎汁三碗聽用大黑豆三升水浸取殼用絹袋盛殼同豆煮熟去豆不用將殼曬乾其汁留用紅花三兩炒黃色入好酒三四碗煎三滾去渣取汁聽用陳米醋九斤將大黃末入淨鍋下米酷三斤文火熬之以長木筋不住手攪之成膏再加醋三斤熬之又加醋三斤次第加畢然後下黑豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黃膏取入瓦盆盛之大黃鍋粑亦剷下入後藥同磨人參當歸酒洗川芎香附醋炒延胡索酒炒蒼朮米泔浸炒蒲黃隔紙炒茯苓桃仁去皮尖各一兩牛膝酒洗五錢炙甘草地榆酒洗川羌活橘紅白芍酒炒各五錢木瓜青皮去穰炒各三錢乳香沒藥各二錢益母草三兩木香四錢白朮米泔浸炒三錢烏藥二兩五錢良薑四錢馬鞭草五錢秋葵子三錢大熟地一兩三稜酒浸透紙裹煨五錢五靈脂醋煮化焙乾研細五錢山萸肉酒浸蒸搗五錢以上三十味並煎黑豆殼共曬為末入石臼內以大黃膏拌勻再下熟蜜一斤共搗千杵為丸重二錢七八分陰乾不可火烘藥蠟為殼護之用時去蠟方中人參或作真潞參二兩裴兆期治一婦坐草已過三日胞水盡行不得下寢變瞑眩無知牙關緊閉手足無氣以動裴視之曰此痰涎壅塞胃口也蓋胃口為真氣運行之樞所病者真氣本滯又經連日困頓飢飽難調穀食疏而湯飲雜勢必釀作痰涎以閉胃口則真氣益滯而不行觀其瞑眩無知若中風狀可徵也以半夏為君蒼朮澤瀉茯苓為臣人參黃連厚朴橘紅白蔻仁薑汁為佐使急煎俾飲一服而蘇再服而産是豈蒼朮黃連等藥能催生哉蓋方之能對病而取驗者自有所以對病取驗之理在不可專執本草中主治而曰某藥定是治某病某病定是用某藥而已也薛立齊云荊婦孟冬分娩艱難勞傷元氣産子已死用油紙燃燒斷臍帶藉其氣以暖之俄頃忽作聲此兒後無傷食作瀉之症可見前法之功不誣世用刀斷臍帶母子致危者竟不知其由矣且穩婆又喜平日常施小惠得其用心兼以安慰母懷故無虞耳一穩婆云我止有一女正分娩時適當巡街御史行牌取我視其室分娩女因驚嚇未産而死後見御史更以威顏分付逮視産母胎雖順而頭偏在一邊若以手入推正可順保生因畏其威不敢施手但回稟云此是天生天化非人力所能立俟其母子俱死張子和治一婦人年二十餘臨産召穩婆三人其二嫗極拽婦之臂其一媼頭抵婦之腹更以兩手扳其腰極力為之胎死於腹良久乃下兒亦如血乃穩媼殺之也豈知瓜熟自落何必如此乎其婦因之經脈斷閉腹如刀剜大渴不止小便祕絶主病者禁水不與飲口舌枯燥牙齒黧黑臭不可聞飲食不下昏憒欲死張先以冰雪水恣意飲之約二升許病緩渴止近時專科及庸手遇産後一以燥熱溫補為事殺人如麻閲此宜知變通矣次以舟車丸通經散前後五六服下數十行食大通仍以桂苓甘露飲六一散柴胡飲子等調之半月獲安雄按知變通者甚少一婦人臨産召村媼數人侍焉先産一臂出嫗不測輕重拽之臂為之斷子死腹中其母面青聲微汗漿漿不絶時微喘張曰命在須臾針藥無及急取稱鉤續以壯繩以膏塗其鉤令其母分兩足向外偃坐左右各一人腳前立定次以鉤其死胎命一壯力婦人倒身拽出死胎下敗血五七升其母昏暈不省待少頃以冰水灌之漸咽二日大醒食進次日四物湯調理數日方愈張常曰産後無他事因侍嫗非其人轉為害耳凌漢章治吳江婦臨産胎不下者三日呼號求死凌針刺其心針出兒應手下主人大喜問故曰此抱心生也針痛則舒取兒掌視之有針痕明史按此二案與宋史龐安時案倣佛大抵醫既有名人益附會如近時吳門有享盛名者俚人時向余道其神驗皆古人案中所載若以蟹治漆毒以土坑治香氣不一而足所謂俗語不實流為丹青者是也立齊治前太僕卿張君季媳年輕體壯孕必八個月而生産必數日艱苦而下兒生必周而夭再孕再産再夭皆同乃謂後當生宜相聞明年又八個月坐草三日不下忽憶前言飛輿相召中途逢驅車者云迎其父母作永訣計比至已夜分矣診之脈未離經人余殘喘穩婆在傍問之曰兒頭已抵産門不得出耳乃急令安臥且戒勿擾與安胎藥明晨主人出笑而不言問之曰好矣曰昨言兒頭已抵産門今若何曰不見矣大笑而別後過百二十日計十二月足生男今八歲矣始知前此皆生生取出以體壯年輕幸保母命耳達生篇太學戴時濟弟媳一産三男母子俱殞一猶在腹今又婢孕其腹膨亨頗患之比産先令安臥與加味川芎湯每隔半日而産積日半生三子俱無恙同上陳氏婦産九日夜不下一息僅存聞有兔腦丸踵門求藥問之亦曰頭逼産門不得出諭令安臥再來取藥強而後去繼與芎歸湯明日生下母子兩全按此皆産母用力逼令橫在腹中豈有人倒懸十日而尚得生者乎同上一婦産兒手出不得入穩婆礪刃以須急令安臥與大劑芎歸湯徐徐托手入明早生下母子兩全右臂紫黑數月而後消同上孫文垣治侄元素內人難産夜半叩門起問何狀曰産已及門不能下用力則胸膈間有物上衝痛不可忍思頃之曰此必雙胎胞以分為一上一下也及戶者在下欲出在上者以用力而上衝故胸膈痛也勢亦險矣治法必安上而下者乃可用力以産也即取益元散一兩與之令以紫蘇湯送下藥甫進胸膈痛止不逾時産二女母亦無恙或問曰益元散非産科急劑何能取效如是曰紫蘇安胎下氣滑石滑以利氣亦催生上品蓋醫者意也茲亦以意裁取之耳此法方書無載記之以備採用妊娠案中治竹匠婦嘗以此方安胎雄按攣生之胎其包有三種分娩時極意審察庶不誤事一種分胞者即此案所云是也然亦有雖是分胞而外復另有一總胞者名曰雙胎卻有三胞也一種連胞者産必駢肩而下其包如鈔馬袋形至此案治法雖與竹匠婦同而尤為中肯也馮楚膽之媳向患吐血夜熱之症自受妊以來八味丸加牛膝五味日服勿間此其孫所以百日內生癘症之由也案見小兒胎毒門及臨盆胞水已下而數日未産脈之洪數而帶堅象此陰道枯槁已極何能流通生育乎投以補養氣血催生之藥脈候如故知為群藥功力不專乃單以熟地三兩濃煎日進三次脈始洪緩而軟但坐蓐數日子母俱困胎氣毫無運動下達之意衆疑胎死矣再以人參五錢煎湯一鍾細刮肉桂之最佳者錢許調服之連進三劑乃生一婦産難五日後精神已竭六脈沉微奄奄一息腹中毫不覺動下部腫極知母子俱困何能健運而出乃與參耆歸芍薑桂白朮牛膝溫暖調補氣血之劑下咽少頃腹中運動疼痛而産母子俱活歙有神醫嘗路遇舁櫬中有血流出醫曰此尚活可治也開視則彌月婦人顏色未改以針針其心遂産一男手有針孔母子俱無恙其子至今尚存張氏卮言張所望治婦人産一子忽叫痛欲絶舉家驚愕莫措所望診之曰腹內尚存一子未下投一丹而子下母遂蘇錢塘縣志雄按此候極宜審慎蓋雙生有駢肩而下者有逾數日而下者甚有過旬余而再産者張文仲治一婦人橫産先出手諸般符藥不效乃以艾灸其婦人右腳小指頭三壯炷如小麥大下火立産醫說高道者不知何許人也得長桑君禁方當明初挾技遊銀陽一日值柩於途詢之乃孕婦喪也道者驗其遺衣血曰此猶未死耳啓棺視之一針遂蘇俗驚道者能起死人以比秦越人江西通志陸祖愚治高濟亭室胎前惡阻或以清涼調治既而內傷飲食消導太過元氣甚弱胎動欲産臨盆三日夜方得分娩疲憊昏冒不知人事診之遍身冷汗口鼻之氣有出無入寸關無脈兩尺如絲不及服藥令壯盛婦女對口接其出入之氣俟其氣之入而呵之次用人參歸身熟地各一兩熟附四錢煎服加童便一酒杯徐徐灌之四肢溫和人事清爽連進三劑便能飲食此時若不先用接氣之法必俟藥熟不幾氣絶耶萬密齊治朱宅一婦女李氏常苦難産形頗壯性急少食此氣滯也與一方枳殼甘草香附為主當歸川芎白朮陳皮佐之至八九個月內每月服三帖後生三子甚快葉杏林治一婦分娩甚易易至四十外下血去多玉門不開與加味川芎湯一劑更以活水無憂散斤許煎熟時時飲之以助其血而産産婦坐草時取路傍舊草鞋一隻名千里馬用鼻絡小耳繩洗淨燒灰童便和溫酒調服如得左足者男右足者女覆者兒死側者有驚自然之理也似非切要之藥催生極驗得效方沈堯封曰千里馬得人身最下之氣佐以童便之趨下酒性之行血故用之良驗王執中雲一貴人內子産後暴卒急呼其母為辦後事母至為灸會陰及三陰交穴數壯而蘇母蓋名醫女也資生經魏玉橫曰余素不信陰陽家言因召工牮屋或謂年月不利不聽時荊婦娠身已九月及産一穩婆甚青年見勢不順乃託故亟歸易其姑至視之曰此非可望生下欲全母命非臠而出不可余亟令安臥勿怖以熟地四兩杞子二兩當歸一兩煎百餘沸先飲一鍾再煎再飲不及時許一女已死乃臍帶綰於項間所致幸母無恙穩婆詫異而去婦人良方云凡有孕婦之家不宜造作修治良有以也凌表侄婦年二十餘暑月臨蓐自旦及暮不得産體素弱屢發暈迷悶時師診之以為挾痧不可服參漸危急延余視無他乃腎氣不能作強肝虛不能疏泄又血液枯涸致胎不易下耳與熟地二兩杞子一兩當歸五錢曰服下即産矣已而果然次日覺惡露行少飲砂糖老薑湯血行甚湧專科以炮薑白朮棗仁茯神當歸白芍等不效反加自汗口苦小便熱澀煩躁不眠再延診曰但以余前方加棗仁當歸愈矣一劑而安余此方催生則用當歸止崩則用棗仁甚者杞地俱倍之凡治百餘婦人無不神驗無力之家可代人參亦無後患古今諸方無出其上者胞衣不下薛立齊治一産婦胞衣不下胸腹脹痛手不敢近用滾酒下失笑散一劑惡露胞衣並下一産婦胞衣不下腹作痛手按痛稍減此氣虛而不能送出戶也用無憂散而下前症常詢諸穩婆云宜服益母草丸或就以産婦頭髮入口作嘔胎衣自出其胎衣不下者必死授與前法甚效呂東莊治陳氏婦半産胎衣不下連服行血催衣之藥四劑點血不行胸痛瞀亂呂視之曰此脾失職也先與黃耆一兩下咽而瞀亂頓減時有以準繩女科中惡露不下及胞衣不下方書一本進者上注某方經驗某方試效以示曰中有可用否曰一無可用遂用大劑人參白朮白芍黃耆歸身茯苓甘草等藥一服而惡露漸至皆驚歎曰古方數十無一可用準繩一書真可廢也呂曰惡是何言也王損庵醫之海岱也讀書者自不察耳若惟以惡阻惡阻二字豈可用耶及胞衣不下條中求合吾方宜其謬也試以血崩及下血條中求之吾方可見矣蓋此病本氣血太虧而致半産脾失統血之職水湮土崩沖決將至故生瞀亂不為之修築而反加穿鑿是愈虛也吾正憂血之不不止其不合又何怪焉曰今從子法可得免乎曰不能也穿鑿過當所決之水已離故道狂瀾壅積勢無所歸故必崩急服吾藥第可固其堤使不致蕩沒耳至第三日診尺內動甚曰今夜子時以前必崩矣因留方戒之曰血至即服至黃昏果發如言得無恙方即補中益氣加參耆各二兩也次用調補脾腎之藥而愈胞衣二字卻不重醒俞東扶曰惡露不下用參朮歸附等藥而下者生平經手頗多然必脈象細耎口不燥渴內不煩熱方為合治此案不言脈象但曰脾失其職諒此婦平昔怯弱以致胎墜且連服行血催衣藥四帖寧不反其道以治之耶薛立齊治一婦人産後面赤五心煩熱敗血入胞胞衣不下有冷汗思但去其敗血其衣自下遂用黑豆二合炒透然後燒紅鐵稱錘同豆淬酒將豆淋酒化下益母二丸胞衣從血而出餘症盡平陳良甫云有人親戚婦人産後胞衣不下血脹迷悶不記人事告之曰死矣僕曰某收得趙大觀文局中真花蕊石散在笥中漫以一帖贈之以童便灌之藥下即蘇胞衣與惡物旋即隨下遂無恙良方魏玉橫曰施介繁室人年三十餘忽有孕又攣生産後頗健能食雞啖飯數日來漸發熱脹滿診之脈浮按滑疾沉按結澀詢至惡露已一日不行謂為瘀也宜通之乃可與生地牛膝益母紅花桃仁泥當歸尾丹參瓦楞子畏不敢服延專科曰此年過壯而初産育氣血俱傷屬虛也與焦朮炮薑歸芍茯神棗仁等一劑熱益甚再劑遂譫語更一專科其說同其藥仿又二劑日夜不眠昏狂不省人事時忽高聲歌唱與傷寒陽明失下無異再延診曰産數日惡露即停雖執途人而語之亦必知為瘀滯若欲其生亟進前方可耳不得已乃服黃昏進藥至夜分惡露行黎明復下一物已焦黑乃胞衣也蓋産時穩婆只收其一謂二人同胞不知其一猶在腹也遂貽患乃爾胞衣去惡血行其病如失然豫初亦不知其為胞未下也醫誠難哉雄按攣生之胞有分有合穩婆須有識見庶不貽誤隱疾薛立齊治一産婦陰脫便閉下墜形氣倦甚用十全大補湯而上因怒仍脫重墜寒熱小便淋瀝用補中益氣湯加山梔龍膽草一劑重墜減而小便利仍用前湯去二味倍加升麻參耆而愈一産婦陰脫重痛小便淋漓此因元氣甚虛而肝火旺也用補中益氣湯加山梔車前子四劑而肝症悉退仍用前藥去二味加茯苓小便利又用十全大補湯而腫痛墜漸消一産婦元氣充實初産玉門不閉腫焮作痛小便不利薛謂肝經濕熱壅滯欲以加味逍遙散加車前子牛膝治之不信乃服十全大補湯腫痛益甚仍用前藥更加澤瀉一劑而安一産婦陰脫腫痛脈又滑數欲作膿也薛用十全大補湯四劑膿成又數劑而膿潰但小便頻數而患處重墜痛盛此因元氣虛弱而下陷也又用補中益氣湯數劑而安一産婦素有肝火患陰蝕疳瘡內潰癢痛如蟲行狀食少熱渴小水淋瀝用加味逍遙散加味歸脾湯兼服間以蘆薈丸外以鶴蝨草煎洗而愈龔子材治一産婦陰門痛極不可忍教用桃仁去皮尖研如泥塗之即已散其瘀也一婦産後陰戶極癢令以食鹽一兩塗之即瘳去風熱也一婦産後陰腫大用吳茱萸煎湯洗立愈辛以散之也薛立齊治一婦胞衣不下努力太過致子宮脫出如豬肚狀令用溫湯治之即以手捺子宮去其惡露仰臥徐徐推入而安一婦脫肛用補中益氣加歸脾各百餘劑而愈後因分娩後復脫仍以前藥各二百餘劑始愈拙哉李時珍治一婦産後子腸不收用萆麻仁搗膏貼其丹田一夜而上但用此膏病愈即宜揭去其提拔之力最猛也又用催生下胎用塗腳底亦宜即時洗去孫文垣治一僕婦因産難子宮墜出戶外半月不收艱於坐臥有醫令服補中益氣百帖需參二斤可愈乃聽之孫謂此必産時受寒血凝滯不能收斂雖名陰脫未必盡由氣虛下陷也觀其善飯大小便如常可知矣授以一法價廉功省三五日可愈用未經水石灰幹一塊重二三斤者又以韭菜二三斤煎湯置盆中將干灰投入灰開湯沸俟沸聲盡乃濾去灰乘熱坐盆上先熏後洗即以熱韭於患處揉挪蓋石灰能散寒消瘀韭菜亦行氣消瘀一日洗一次三日果消軟收入按子宮子腸有墜下損傷者有終身不能上如帶綬者要皆初時治之不得其法耳瘀滯南濠陳鰲妻新産五六日患腹痛惡寒發熱醫曰此元氣太虛正合丹溪云産後當大補氣血遂用人參大劑入口痛劇面黑髮喘而死殊不知丹溪以産後當以大補氣血為主治有雜症以末治之今陳氏之妻因瘀血未盡而惡寒發熱不先去其瘀血驟施大補是失丹溪主末二字之意矣主末者即標本之謂也續醫說丹溪之言本有語病不須與之回護吳孚先治楊氏婦産後一月半身以下忽腫脹臍突小便不通或以五皮飲加車前牛膝治之不效吳曰先經斷而後腫脹名曰血分分去聲且按小腹有塊如拳知敗血尚結於胞門非溫無以化之以薑桂佐行瘀之劑下血如黑漆數升便利腫消孫文垣治溫氏婦産後五十餘日右脅脹痛手不可近非虛痛可知赤白帶下多如膿發熱便祕診之曰此惡露未盡血化為膿宜急治之也常見數婦病此治之不善積久為毒有成腸癰者有內成毒從腰俞出者皆瘀血為患也急用澤蘭葉山楂五靈脂消惡露為君川芎當歸茯苓白芍為臣益母為佐香附青皮為使外與當歸龍薈丸潤大便使熱從之去服後次日腹脅皆寬痛亦止又食葷與雞子復作痛但不如前之盛與保和丸用山楂煎湯送下三錢遂愈若用行氣等藥則引惡血入四肢發為癰毒故産後以去惡露為要著潘印川子室年二十五因難産傷力繼以生女拂意後又女死悲戚即時暈厥洎醒神思眯眛手足瘛瘲目上視孫至因瘛瘲不能診脈細詢之自産後惡露絶無時有女醫在傍與人參大嚼及獨參湯並粥雜進蓋參與粥皆壅塞膈上故神昏瘛瘲不已也教以手探喉中乃隨手吐出痰飲粥食盈盆瘛瘲方定以川芎山楂澤蘭葉陳皮半夏茯苓香附進之稍得睡不虞女醫又私與補藥子丑時陡然狂亂人皆異之目為神附禱禳無已曰此惡露不盡乃蓄血如見鬼之症非真有神物相附也此時何不明言女醫之失徐以正言叱之即緘默繼以清魂散加滑石童便與之天明小便乃行狂亂皆定既而女醫欲要功又以藥進則狂亂如前再與川芎一錢五分當歸四錢澤蘭益母各一錢臨服加童便連進二帖不效此必胸中有痰作滯故藥力不行即用前劑大加山楂惡露稍行神思即清靜睡片時手足微動或以掌批其面或以手捶其胸昏亂不息診其脈近虛早間面紅而光申酉時面白此血行火退當補矣與人參川芎澤蘭各一錢當歸山楂各二錢茯苓陳皮各八分卷荷葉一片煎熟調琥珀末五分服半時許噯氣二聲此清陽升而濁陰降矣自是惡露微行大便亦利飲食漸進而安細閲是案其得肯綮處全在知惡露未行及誤服人參兩著至其用藥亦只見症治症而已雄按此證總不宜用川芎而方方用之是白璧之瑕也至於噯氣謂為清陽升而濁陰降則誤矣其症既因痰阻瘀滯氣窒不行故用多方通降而得愈則是濁陰降而清陽始升也何可顛倒其詞哉俞東扶曰此條前半段法治不難蓋得其參粥雜進之病情自有消瘀及消痰食之方法但探吐法尤捷耳蓄血如見鬼知者亦多後半段惡露稍行神思即靜略睡片時昏亂不息仍是蓄血形狀乃於輕劑消瘀之中復用人參並不以前會誤用而畏蹈故轍此為高手其講脈與面色極是但産後譫語昏狂有純因於痰者又不可不知高鼓峰治一婦人産後惡露不盡至六七日鮮血奔注發熱口渴脅痛狂叫飲食不進或用四物湯調理或用山楂青皮延胡黃芩等藥卒無一效脈之洪大而數此惡露未盡留泊血海凡新化之血皆迷失故道不去蓄血瘀則以妄為常曷以御之遂以醋製大黃一兩生地黃一兩桃仁泥五錢乾漆三錢濃煎飲之或曰産後大虛藥毋過峻否曰生者自生去者自去何虛之有第急飲之果熟寐半夜次早下黑血塊數升諸症如失矣復用補中益氣而安雄按此鼓峰傑出之案然乾漆可刪愈後亦不宜遽投補中益氣湯薛立齊治一産婦患惡露不下服峻獷之劑惡露隨下久而昏憒以手護其腹薛曰此脾氣復傷作痛故用手護也虛痛喜按以人參理中湯加肉桂二劑補之而愈按産後惡露不下有二一則瘀滯宜行一則血虛宜補豫常治數人皆二三日而止察其人果虛一以大劑養榮而愈陸肖愚治謝四府如夫人分娩旬余忽臂下微微作痛或謂血虛用大料芎歸十劑而痛不減又謂血當補氣陽生則陰長加參耆五六劑而痛益劇脈之六部沉弦而左關尺更緊詢之止左邊近肛門一點痛耳問痛處熱否曰極熱曰此氣血不足而痛也乃産後敗血凝滯於肝經臀乃肝經所絡之地凝而注之不急治久必成毒當行血海之瘀滯解經絡之蘊結庶可消耳不信更醫仍以八物湯投之一日痛處頓腫又與寒涼解毒之品致瘡口不收大便作滯飲食不進肌肉半削再診脈微細如蛛絲按之猶覺有神曰今宜大補矣乃用四君子加耆桂附數劑瀉止食進又加當歸熟地約十劑成痂而愈一産婦患惡露不行瘀塞溺道小便不利遍身浮腫喘急不得臥用牛膝膏治之愈丹皮大黃當歸桂心桃仁蒲黃元胡香附瞿麥川芎麝香先用土牛膝三兩水五碗煎減半入上藥煎孫文垣治陳達庵之媳産半月而腿疼專科曰虛與八珍湯十日疼益盛疼處益熱非虛可知謂曰慎勿認虛認風此産後敗血凝滯血海流於經絡不急治則瘀無從出久必化膿成毒或為腸癰今腿疼是其候也不信復延專科曰風也但丹溪云産後當大補氣血雖有它症從末治投十全大補痛轉劇大發寒熱小腹近胯紅腫出膿外科又與收口太早腰俞復發一毒痛腫寒熱如初十日後大潰膿而不收口精神萎頓肌肉陡削飲食不進噁心惡寒奄奄一息診之六脈濡大無力清水無膿曰勢亟矣速為保脾與人參白朮各五錢甘草乾薑附子各一錢黃耆三錢白芷桂心各五分外科曰白朮作膿恐不可服曰膿不死人飲食不進則死人也四帖神氣回飲食進症減膿成改用參苓白朮散調理一月而安朱丹溪治一婦人年十八難産七日産後大便瀉口渴氣喘面紅有紫斑小腹脹痛小便不通用牛膝桃仁當歸紅花木通滑石甘草白朮陳皮茯苓煎湯調益母膏不減後以杜牛膝煎濃汁一碗飲之至一更許大利下血一桶小便通而愈心法雄按此症余每以當歸龍薈丸投之立效繆仲淳治莊斂之次女産後惡露未淨至夜發熱脾胃卻弱腰腹大痛時師謂産後氣血俱虛投以人參當歸諸補劑轉劇咸慮其成蓐勞也診之謂不數帖即痊矣用白芍扁豆杜仲各三錢紅曲蘇子車前各二錢萸肉麥冬青蒿各四錢橘紅乾葛各錢半炙草八分牛膝五錢黑豆八錢澤蘭一錢十劑而惡露淨發熱已腹痛亦止但腰痛未盡除脾胃尚未健改用白芍山楂橘紅麥芽石斛扁豆沙參各三錢砂仁杜仲萸肉各一錢五味一錢炙草五分牛膝五錢蓮肉四十粒十餘劑脾胃亦健而全愈李天培治王正權室人産後十餘日患寒熱腹痛目赤而澀羞明疼痛診之脈沉而澀詢其惡露未盡知停瘀為患以當歸川芎桃仁紅花甘菊生地丹皮銀花連翹蟬蛻清火行瘀驅風等劑六帖而痊薛立齊治一婦産後四肢浮腫寒熱往來蓋因敗血流入經絡滲入四肢氣喘咳嗽胸膈不利口吐酸水兩脅疼痛遂用旋覆花湯微汗漸解頻服小調經散用澤蘭根煎湯調下腫氣漸消未選入一産婦腹痛或用抵當湯敗血已下前症益甚小腹重墜似欲去後此脾氣虛而下陷用補中益氣加炮姜溫補脾氣重墜如失又用六君子湯而安歸脾湯調理而愈同上癥瘕薛立齊治一産婦腹中似有一塊或時作痛而轉動按之不痛便非實積面色萎黃痛則㿠白脈浮而澀此肝氣虛而血弱也不信乃服破血行氣痛益盛轉動無常又認為血鱉專用破血祛逐之藥痛攻兩脅肚腹尤甚益信為鱉確服下蟲等藥去血甚多形氣愈虛肢節間各結小核隱於肉裡以為鱉子畏藥而走於外薛云肝臟血而養諸筋此因肝血復損筋涸而攣結耳蓋肢節胸項皆屬肝膽部分養其脾土補金水以滋肝血則筋自舒遂用八珍湯逍遙散歸脾湯加減調治而愈一産婦小腹作痛有塊脈芤而澀以四物加元胡索紅花桃仁牛膝木香治之而愈血崩薛立齊治一産婦血崩小腹脹痛用破氣行血之劑其血崩如湧四肢不收惡寒嘔吐大便頻瀉用六君炮姜四劑稍愈又十全大補三十餘劑全安一産婦血崩因怒其血如湧仆地口噤目斜手足抽搐此肝經血耗生風用六味丸料一劑諸症悉退但食少晡熱佐以四君柴胡丹皮而愈孫文垣治黃氏婦産未彌月醉犯房事血來如崩發熱頭暈大小便俱熱六脈洪大以竹茹蒲黃白芍各一錢香附茯苓側柏葉各七分甘草炮薑艾葉各三分血止大半腰猶脹痛下午胸膈飽悶改以川芎五分當歸茯苓補骨脂蒲黃香附各八分薑炭甘草各一分陳皮七分人參一錢而愈呂東莊治從子在公婦半産惡露稀少胸腹脹甚脈之濡數當重用參耆不然必崩因力艱未服已而果崩潰不止下血塊如掌如碗者無數神氣昏憒兩足厥冷至小腹兩手厥冷至肩額鼻俱如冰頭上汗如油旋拭旋出按其脈至骨不得見乃投大劑補中益氣湯加人參一兩未效如無一兩之參單服補中益氣湯則立脫矣不可不知急用人參一兩附子一兩炮姜二錢濃煎灌之至暮漸減戒曰俟其手足溫即停藥至三鼓手足盡溫崩亦止家人忘戒又煎前藥進之比曉視之脈已出而無倫痰忽上湧點水不能飲入口即嘔吐並獨參湯不能下曰過劑所致也即投生地黃五錢熟地黃一兩當歸白芍枸杞各三錢甘草一錢濃煎與飲病者意參飲尚吐況藥乎不肯服乃強之曰試少飲必不吐進半甌殊安遂全與之盡藥而痰無半點神氣頓清矣午後體發熱曰此血虛熱恆理也後用十全大補調理而痊雄按人參雖重幸不即脫而治法大謬能掉頭設法其聰明有過人處也張飛疇治陳子厚媳八月間因産不順去血過多産後惡露稀少服益母湯不行身熱汗血産科用發散行血更劇自用蕉糖酒一碗遂周身絡脈棰楚難堪惡露大下面赤戴眼出汗如浴但言心痛不可名狀即殺血心痛也此去血過多心失其養故痛肝主筋為藏血之地肝失其榮故脈絡棰楚不堪且汗為産後之大禁非急用人參恐難挽也用四君合保元湯加白芍五味一劑汗止因其譫語如祟疑為瘀血未盡更欲通利曰音怯無神此屬鄭聲且腹不瘀痛瘀從何有此神氣散亂不收之故前方入棗仁龍齒諸症悉平後服獨參湯至彌月而安薛立齊治一産婦月經不調內熱燥渴服寒涼之劑其血如崩腹腫痛寒熱作嘔少食用六君子二十餘劑諸症悉愈以加味逍遙散調理而安一産婦月經年餘不通內熱晡熱服分氣丸經行不止惡寒作渴食少倦怠胸滿氣塞朝用加味逍遙散夕用四君子湯月許諸症悉愈佐以八珍湯兼服兩月而愈馬元儀治金氏婦産後一月血來不已厥逆自汗不止或與養血補陰不效診之兩尺空大無神曰褚氏有云血雖陰類運之其陽和乎今厥逆自汗脈大無根為脾腎之真陽內弱故血無所附而溢所謂陽虛陰必走也法當大補真陽以攝虛陰若養血補陰恐血未必生而轉傷陽氣則陰血愈不守矣以人參三兩白朮一兩附子三錢茯苓炙甘草各一錢一劑知二劑已數劑精神勝常矣繆仲淳治賀函伯乃正小産後陰血暴崩作暈噁心牙齦浮腫喉嚨作痛日夜叫號不絶曰此因失血過多陰氣暴虧陽無所附火空則發故炎上胸中覺煩熱所謂上盛下虛之候也法當降氣氣降則火自降矣火降則氣歸元而上焦不煩熱齒齦腫消喉嚨痛止陽交於陰而諸病自已耳用蘇子研青蒿子各二錢半麥冬白芍鱉甲牛膝生地枸杞各四錢五味五分棗仁五錢續斷橘紅各二錢枇杷葉三片河水煎加童便一大杯鬱金汁十二匙空心服時進童便一杯魏玉橫曰竹溪夫人年三十餘産後自巳至酉血暴下如注呵缺連連遂目閉口張面色青慘白悴汗出不止髮根盡濕六脈全無勢欲脫矣其初亦以童便灌之韭醋熏之殊不應乃用熟地二兩杞子棗仁各一兩令煎湯候藥至投入不待稠濃即徐徐灌之才盡一鍾汗止目開口閉漸知人事再與之血止而睡醒後進粥次日仍以前方令日服一劑四日全瘳當其亟豫診也時方與人會飲擲杯而往疏方而返坐有業醫者數人詢其症咸曰猶與藥乎用何方曰與某某咸詫笑曰吾真買乾魚放生也咎將誰任余笑而不言宋申甫室人妊數月時長夏歸寧母家召醫診之以為經阻也投破瘀辛熱之劑四帖遂半産血行如瀉亟余診至則大汗淋漓脈將脫矣伏几上去床數步不能就寢以血行之猛也時惟親戚之朱某在乃囑其母煮水待藥煎百餘沸即與服再煎再與不及稠濃也急偕朱就近鋪買熟地四兩杞子棗仁各二兩如法服立瘥張建東室人年三十餘妊娠五月素有肝病偶不快鄰醫與荊防廣半香砂鬱金元胡之類五劑遂見紅腰腹酸墜氣促面紅診之脈不接續曰胎已難保第與滋養三陰以防其崩耳其産必在子夜若待崩而延診服藥恐緩不及事先疏方與之熟地二兩杞子一兩棗仁一兩令察其面若加赤氣若加喘血必暴下宜急飲之至時一一如言果獲無事次日就前方減半入人參一錢二劑而痊後數年復孕因肝虛發厥余用生地杞子之劑不敢服遂致變症百出産後上咳下利余與杞子生地沙參麥冬病少退次日仍前方告以必用蔞仁乃可以服參朮薑附既多熱鬱甚非此莫能解也遂不復邀後聞其日進參耆朮附卒致不起人之生死豈皆命乎血迷張子和治一婦産後第六日血迷用涼膈散二兩四物湯三兩朴硝一兩都作一服大下紫黑水其人至今肥健即末句推之則其人素常肥健可知故可用如此藥柴嶼青治侍御李符千大令媳半産大汗發暈昏不知人即血迷也他醫立方俱不敢服符千乃徒步邀視先令其以韭葉斤許搗爛用好醋炒之乘熱熏鼻少蘇用清魂散加童便黃酒服之調理旬日而安薛立齊治一婦因産後飲酒惡露甚多患血暈口出酒氣此血得酒熱而妄行虛而作暈也以佛手散加煨乾葛二錢二劑而痊酒性慓悍入月及産後不宜飲恐致前症産室人衆氣熱喧嚷亦致此症雄按此證宜清血導下芎歸宜慎葛根雖解酒亦嫌升散一劑而痊殊難盡信梅師治産後余血不盡上衝心胸悶腹痛以藕汁二升飲之愈薛立齊治一産婦患惡露上攻昏憒口噤冷汗不止手足厥逆用六君子加附子一錢以回其陽二劑頓蘇又以十全大補湯養其氣血而安一産婦患前症手不敢近腹用失笑散一服下瘀血而愈次日腹痛下利用十全大補而安一産婦患前症用大黃等藥其血雖下復患頭痛發熱惡寒次日昏憒自以兩手堅護其腹不得診脈視其面色青白此脾虛寒而痛也用六君子加薑桂而痛止又用八珍加薑桂調理而安王執中曰産後血暈寒熱往來或血搶心惡疾也豫閲食物本草見有用鹿角燒為末酒調服日夜數服驗者偶家有婦人患此令服此神效因教他人婦服皆驗但以産後未可飲酒以童子小便調服耳忌服利藥資生經沈堯封曰産後去血過多眩暈昏冒者宜重用阿膠水化略加童便服之血去不多者宜奪命散沒藥去油二錢血竭一錢共研末分兩服糖酒調下一錢某姓婦産後發暈兩日不醒産後惡露甚少暈時惡露已斷其夫向鄰家討琥珀散一服約重二錢許酒調灌下即醒其藥之色與香俱似沒藥大約即是此方也呂姓婦分娩次日患血暈略醒一刻又目閉頭傾一日數十發其惡露産時不少今亦不斷脈大左關弦硬用酒化阿膠一兩沖童便服是夜暈少減而頭汗少出腹痛有形寒戰如瘧戰已發熱更甚投沒藥血竭奪命散二錢酒調服寒熱腹痛發暈頓除惟通身汗出此氣血已通而現虛象也用黃耆五錢炒歸身二錢甘草一錢炒棗仁三錢炒小麥五錢大棗三個煎服汗止而安雄按惡露雖少而胸腹無苦者不可亂投破瘀之藥今秋周鶴亭室新産眩暈自汗懶言目不能開脈虛弦浮大詢其惡露雖無而脘腹無患投以牡蠣石英鱉甲琥珀丹參甘草紅棗小麥之劑覆杯即減數日霍然此蓋血虛有素即娩則榮陰下奪陽氣不潛設泥新産瘀沖之常例而不細參脈證則殺人之事矣血虛楊乘六治許氏婦産後動怒寒熱往來脅痛口苦肝火病其狀如瘧蓋膽為肝腑肝病則膽亦病矣漸次發熱晡熱醫云風證混加表散腹左忽增一塊匾大如掌日夜作痛或疑寒凝或疑食滯或疑瘀蓄或疑痞積雜治之病益甚食減肌瘦脈之右關弦洪左關弦數面色黑瘦舌色淡黃而干症乃怒氣傷肝經血少而燥痛也蓋肝居胃左本藏血者也血足則其葉軟而下垂血虧則其葉硬而橫舉內與胃相磨外與肌相逼能不隱而痛乎凡性躁多怒者往往患此而婦女尤多庸妄不知誤用香燥削克之劑枉殺者不知凡幾良可嘆也以滋水清肝飲四劑塊消痛止繼用歸脾湯去木香加白芍丹皮山梔間服十餘劑而痊必用歸脾收場吾知其守而未化也許氏婦産後發熱或時作寒頭痛體倦醫與疏邪降火煩渴不食楊診之其脈浮取似數重按則芤左手尤甚唇舌皆白面無血色用十全大補湯加炮姜或曰如此大熱而用薑桂何也曰陽在外為陰之衛陰在內為陽之守兩相依附者也今産後陰血大虧虛陽無附浮散於外而為熱非引浮散之陽歸於柔陰其熱不退卻不盡然故用溫補血氣之劑欲其補以收之也又曰薑桂味辛而散何云補以收之耶曰桂逢陽藥固能汗散若逢血藥即為溫行姜之為用生則開肌發汗熟則溫中散寒至炮黑則入血且能引氣藥以入血分而生新血故以大補為主以之為佐使陰得陽生則熱自除耳四劑果熱退身涼十餘劑諸症悉愈凡産後症多屬陰虛血少第以二地二冬杞子一切養榮之劑無不立愈若氣血兼補雜以薑附剛劑非擔延時日即貽病者後患臨症者宜審之雄按魏氏獨擅此長至論産後卻是最為貼切柴嶼青治錢嶼沙官侍御時其夫人産後三日惡露甚少面色唇燥口乾身熱與前案唇舌皆白面無血色同擬用參嶼沙以産後不宜用補為疑柴曰果有外感自別有治法今症屬不足舍此必致貽患不可用參之說此不知醫者及女流之說也遂投人參當歸散加好桂一錢次日口潤生津調理半月而痊陸祖愚治聶巡司子婦産後百餘日大腸燥結虛火上衝便血腸鳴腹滿短氣內外皆熱半月不能進飲食或與養血清火愈甚診得兩脈浮洪而數按之無神脾腎兩脈更覺空虛乃産後元氣耗散真陰不足而非實熱也用八味丸清晨淡鹽湯送下三錢用四君加歸芍麥冬知母蓮肉作煎劑數服諸症少緩後以補中益氣加白芍麥冬一月瘳馬元儀治陸氏婦産未一月因起居微觸便血三日遂徹夜不寐此新産去血過多虛而益虛也凡有所觸必傷其肝肝傷而血溢則氣亦不守矣氣虛血弱心神無養故目為之不瞑又與歸脾大劑用參至一兩加鹿茸三錢兩月而愈論是而方未盡協魏玉橫曰許竹溪室人産後數日發熱自汗面赤頭痛惡食不眠惡露雖極少而淡腹時脹痛脈則洪大而數曰此血虛也腹脹面赤其勢欲崩宜峻補或問故曰面赤者陽上越也腹脹者陰下陷也陽上飛則陰下走勢所必然以熟地一兩杞子棗仁各五錢一劑次日小腹之右忽有一塊如槃且硬按之痛甚於是疑為瘀而誤補欲更張幸病人素服豫藥姑再延診曰其塊驟起即大如槃雖瘀滯亦無如是之甚也此正肝脾失血燥而怒張得補猶然否則厥而崩矣今脈大漸斂面赤漸退非藥之誤乃藥之輕也令前方加倍再入炒白芍五錢炙甘草一錢一服塊漸平再服塊如失前方減半數劑諸症全安此症若作瘀治斷無幸矣肉線出一婦産後水道中下肉線一條長三四尺動之則痛欲絶先服失笑散數帖次以帶皮姜三斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前姜熏之冷則尉之六日夜縮其大半二六日即盡入再服失笑散芎歸湯調理之如肉線斷則不可治矣惡露多産後惡露過多不止用伏龍肝二兩煎湯澄清煬入阿膠一兩服之如不應加人參方出沈堯封女科輯要感症陸肖愚治吳敬之室年二十餘産前已有感冒分娩三日後因責婢離床時正冬月覺身上懍栗遂身熱頭痛或用參蘇飲發其汗頭痛止而身熱不除遂以産後當大補氣血數劑而煩熱日甚又擬用補中益氣湯脈之兩手雖弱而左猶帶浮右已見數曰脈虛正産後之平脈但左手猶浮知表邪未散右手見數欲傳裡之候也宜急解其表微通其里少緩則有承氣之患矣用柴葛桔梗黃芩花粉甘草山楂一劑而煩熱減二劑而身涼以清氣養榮湯調之雄按左手帶浮是産後血虛右手數是為客邪未解馬元儀治陸氏婦産後惡寒雖重茵厚被不除屢補不效將行桂附矣診之兩手脈沉伏面赤口燥胸滿此非産後新虛乃胎前伏邪也屢用參術則邪愈結而正愈阻肌表惡寒者邪熱內郁逼陰於外也口乾面赤胸滿者邪氣挾火挾食上凌清道也仍宜一表一里治之用葛根防風蘇梗枳殼桔梗杏仁蘇子薄荷一服而表症已右關尺轉見滑實隨用大黃五錢元明粉三錢甘草一錢一服下積穢甚多復發疹發頤此表裡兩和餘邪畢達之徵也再與辛涼解之透之劑而安此症邪伏於內久而不宣用清陽泄表苦寒達下兩泄之猶發疹發頤而乃妄行溫補將謂脈伏惡寒為陽虛之候耶其亦不審病機甚矣雄按在産後能知伏邪而用一表一里之治洵是高手更能不犯蘇防葛桔可免後來發頤之患矣王氏婦産後一月神氣昏倦上氣喘促胸中滿痛咳嗽發熱百治無效診之兩脈沉澀兼結此胎前已有伏邪兼産後氣血兩虛邪益內結法宜表裡兩和使邪從外達氣從內泄病自愈矣以桂枝柴胡蘇梗枳殼半夏曲蘿蔔子杏仁廣皮透邪達滯之劑頓安脈已稍舒或投參地歸芍斂滯之品遂徹夜靡寧如喪神守此邪結於中補之生變也乃用桂枝炮薑黃連枳實厚朴廣皮等一劑而胸滿中痛除復用蔞仁柴胡桂枝半夏枳殼杏仁蘇子桔梗再劑而表熱喘咳平但大便不行此久病津液失養也加生首烏一兩便行餘邪盡去然正氣大虧再與滋補氣血之劑而安李季虯治魏季嘗令正産後飲食不節復感風寒遂致發熱譫語喘咳氣逆惡露絶不至勢甚急迫謂症皆系外來客邪尚屬可救設正氣虛脫現諸症者必無幸矣何以見之以脈氣浮大有力故也用大劑疏風消食之劑二劑便霍然先是有用白朮芎歸等補藥者幾為所誤廣筆記張意田治一婦産後患病已及半載咸作勞損治且云陰虧已極勢難痊愈張連診五次確知此症服小柴胡湯法必當應奈群議紛紜以參柴非治陰虧之藥又言肺熱咳嗽大忌人參因立案爭之幸病家見信一服而寒熱大作三服之後寒熱退而咳嗽平十服全愈案云診得六脈皆數右寸脈大而軟關尺兩部沉候弦急左寸洪數關部三候皆虛數尺中空大夫右寸軟大肺氣虛也關尺沉候弦急關主中州尺司火位沉里也弦肝脈也此因中氣虛而木邪犯位木氣動而火從之也左寸洪數心經虛火也關中虛數肝無血養也尺中空大腎水虛也是脈本屬陰虛而寒邪乘之留連不已以至於此今所見症五更發熱者寅卯木旺之時肝火挾邪隨時而動也上午寒熱得汗熱減者邪稍泄而勢稍緩也咳嗽之聲結而不暢此久嗽傷肺肺氣虛而邪不得越也胸腹時脹而微鳴此肝木犯脾肝主脹者也合脈與症是為虛中挾實不得樞轉外出之候也大全曰産後血氣虛弱飲食未平不滿百日將養失所風冷客於氣血顏容憔悴飲食難消感於肺故咳嗽口乾遂覺頭昏百節疼痛榮衛受邪氣通於肝流注臟腑須臾頻發咳嗽無汗寒熱如瘧蓐勞之候往往如此景嶽云虛弱之人外邪初感不為解散而作內傷或用清涼或用滋補以致寒邪鬱伏久留不解而寒熱往來或為咳嗽其症全似勞損欲辨之者察其表裡病情或身有疼痛而微汗則熱退無汗則復熱或大聲咳嗽脈雖弦緊而不甚數即病至一兩月而邪猶未解此似損非損症毋再誤也今此症實類此當用小柴胡湯轉動樞機藉少陽之生氣由內而外自下而上則陰陽和而伏邪解散矣去半夏加牛膝半夏能啓陰氣産後陰虧而兼口燥故去之胸腹時脹脾陰多郁宜加牛膝以導之藥病相當自應如桴鼓也雄按今春余荊人娩子頗艱至三朝忽渾身麻冷俄即壯熱大渴汗出不解耳鳴目淚舌絳無津胎色黃燥腹痛拒按脘悶不飢惡露仍行小溲極熱按脈弦滑右甚是胎前吸受溫邪而痰熱素盛氣機窒滯血去陰傷故見證如是之劇也豫元參丹參白薇知母花粉竹茹豆卷旋覆桑葉等服之熱即退而脈不減且不飢仍豫是藥越二日後麻冷而復熱舌較潤胎稍薄知治已中窾尚嫌力薄也前方加石菖蒲枳實楝實蔞仁投之熱亦退即退並吐膠痰數碗略進稀糜間一日又發寒熱或疑為瘧或云産時用力勞傷或慮將成蓐損議論紛紛豫置若罔聞仍主前藥熱果漸短渴亦甚減逾日寒熱猶來確守原方至十一朝始解黑燥矢而諸恙悉解且漸進谷計服此方已十大劑矣繼惟粥食調養竟不與藥戚友聞之莫不駭異然非獨斷獨行斷艱奏續設泥初産而用生化行瘀或視為瘧而以柴胡桂溫散則必驟變即知為陰虛熱感而與四物等養血亦必邪氣糾纏延為蓐損季冬孫晝三仲媳因兒女過多不欲産乳胎前屢用下胎藥不應娩後三朝亦發寒熱兼以痛瀉無溺瀉出者皆黑色醫視為瘀豫回生丹等藥已漸愈惟寒熱間作未已至八朝延余診之右寸關大而乏韻且有靜中一躍之象及視其神氣頗安胎色薄黃略思粥食診視甫畢前醫適來余謂脈甚不佳恐有猝變彼診之云較昨已大和矣必無害也余唯唯而退主人似訝余之太無能也勉強送余出門余復謂曰元氣太傷不可再服峻藥也聞夜間寒熱復來腹痛又作仍以回生丹下之越日而殞來天培治潘氏婦季夏産後二十餘日患寒熱便血惡露未淨而專科與香薷飲四劑服後反嘔吐頭眩腹痛自汗噁心發熱氣促發斑色微紅兩頰淡紅診之左脈如絲右脈沉細此虛而兼感嘔吐傷胃肝木乘相火刑金肺氣受傷上下拒格之症也治宜活血滋陰行氣舒脾散氣降逆托裡化斑之劑用牛膝茯苓杞子當歸紅花黃耆川芎木香香附廣皮半夏曲生薑一劑諸症大減六脈和緩但微嗽眩暈心跳胸膈不舒此邪去正虛所致也前方去川芎木香牛膝加茯神丹參杏仁貝母二劑前症盡除惟心跳頭暈改用歸脾湯去人參木香加防黨參杞子白芍調理而愈感暑孫文垣治一婦人年十六初産女艱苦二日偶感暑邪繼食麵餅時師不察竟以參術投之即大熱譫語口渴汗出如洗暑症多汗氣喘暑傷氣泄瀉瀉皆黃水無屎協熱下利日夜無度小水短少飲食不進症甚危惡時六月初旬女科見熱不退乃投黃連黃芩白芍之劑諸症更甚又以參術大劑肉果乾薑等止瀉一日計用參二兩四錢瀉益頻熱益劇喘汗轉加譫語不徹口醫各束手謝曰汗出如油喘而不休死症也又汗出而熱不退瀉而熱不止譫語神昏産後脈洪大法皆犯逆無生路矣惟附子理中湯庶僥幸萬一孫診之六脈亂而無緒七八至獨右關堅硬食積因思暑月汗出乃常事但暑邪麵食瘀血皆未銷熔補劑太驟致蓄血如見鬼若消瘀去積解暑猶可生也用益元散六錢解暑清熱止瀉利水為君糖球子即山楂三錢為臣紅曲澤蘭各一錢五分消瘀安魂為佐橘紅半夏曲茯苓理脾為使三稜五分消前參術決其壅滯為先鋒飲下即略睡譫語竟止連進二劑瀉半減次日仍用前方其下漸減大便止二次有黃屎矣惡露行黑血數枚次日診之脈始有緒神亦收斂進粥一盞前方去三稜紅曲加扁豆大便一次所下皆黑屎熱盡退改用六君子加益元散青蒿扁豆香附酒芍炮姜調理而安三稜亦消瘀之品耳略消參術之壅滯則山楂已足矣非三稜事也雄按炮姜是蛇足矣易思蘭治石城王福謙之妃癸酉年六月受孕偶患泄瀉醫用淡滲之藥止之自後每月瀉三五日有作脾瀉者用參苓白朮散之類二三服亦止然每月必瀉五七次至次年三月生産後連瀉半月日夜八九次諸藥不效驚惶無措召易診之兩寸尺俱平和惟兩關洪大有力曰此暑病也以黃連香薷飲治之一劑減半再劑全愈惟肝脈未退又用通元二八丹調理半月後平復陸祖愚治李丹山子室自來元氣不足産後六七日正當酷暑而臥房在樓忽頭疼氣喘昏悶體若燔炭沉沉昏去或以為傷寒令門窗盡閉帳幔重圍用二陳羌活防芎蘇一劑口乾唇裂喘急欲絶診之六脈浮洪而散乃冒暑而非感寒宜涼解而不宜溫散令取井水灑地鋪以蘆席移病人臥其上飲以香薷飲遂微汗而蘇再用清暑益元湯四劑而起雄按論證甚超用藥可議何不用益元散西瓜汁等物沈明生治劉舜泉孫媳夏月産後暈厥不知人事或謂惡露上攻所致投去瘀清魂等劑瘀不行暈厥益甚又作痰治食治皆不效沈至回翔諦審笑曰吾得之矣此暑熱乘虛而入急宜清暑非黃連不可或謂血得冷則凝今惡露未去若投寒涼是速其斃也沈笑曰有不諱吾任之藥甫入口厥蘇暈止再進而惡露行蓋産時樓小人多炎敲之際益助其熱乍虛之體觸之豈能不病經云暑傷心又云心主血為熱冒而暈厥此中暑而非惡露明矣或曰舍症從時理固然矣然血熱則行冷則凝亦古訓也今用寒涼而惡露反去何也曰熱行冷瘀以血喻水道其常耳子獨不觀失血者有用溫緩藥而得止則瘀血者豈無用苦寒而得行豈造化之微權逆從之妙理也安可執乎雄按病雖因暑而惡露不行必佐清痰之品斷非單以黃連治之也諸讀者須默會之火熱易思蘭治一婦産後半月餘胃中有清水作逆而吐以為胃寒令煮雞倍用椒姜初覺相宜凡內熱虛火之人初服辛熱之藥亦有小效至三五日清水愈多以薑椒煎湯時時飲之近一月口氣漸冷四肢發厥晝夜作逆腹中冷氣難堪有時戰栗用四君子湯人參一錢至二錢初服少安久則不應又加炮姜亦不效衆議用附子理中湯庸俗必趨之道易診之六脈俱無以食指覆按尺部中指無名指之後診法妙脈來實數有力左右皆同發言壯厲一氣可說三五句唇焦頰赤大便五六日一次小便赤少此實熱症也詢之其俗産後以食胡椒炒雞為補此婦日食三次半月後遂得此疾乃用三黃湯治之連進四盞六脈俱現姜椒湯不欲食矣又進四盞身不戰栗清水減半服四日口中熱氣上升滿口舌尖俱發黃小粟瘡大便八日不通以四苓合涼膈散空心一服至午不動又以甘草煎湯調元明粉五錢熱服一時許腹中微鳴吐出酸水一二碗大便連去二次又復元明粉五錢下燥矢十數枚後以四苓三黃山梔枳殼調理全愈主人曰荊人之病醫皆以為虛而用薑附先生一診而遂用大劑三黃湯更加元明粉寒涼之劑以通之不以産為掣肘公何見也易曰脈症明顯不詳察耳脈法云極大極微最宜斟酌凡診脈遇極大無力者須防陽氣浮散於外若極微之脈久久尋而得之手指稍稍加力按之至骨愈堅牢者不可認作虛寒今脈左右三部初按悉無再以食指按其尺部中指無名指按其尺後脈來實數有力所謂伏匿脈是也此乃陽匿於下亢之極矣又大便祕結小便赤少唇焦頰赤氣壯言高自脈與症視之其為實熱明矣若果虛寒脈當浮大無力何以實數有力症當氣息微弱何以言貌壯強其口氣冷吐清水四肢厥時戰栗者正熱極似水陽遏陰浮之義也戰栗則熱入血室熱極則生風矣熱在肝腎不在心經故言語真誠而不妄也其致病之由本於食椒雞過多胡椒性味辛熱能散寒逐敗雞屬巽而入肝性溫能活滯血而養新血雞可常食椒性大熱有毒不可過多多則熱毒積於腸胃而諸怪症作矣至於服薑椒而反現寒症者正古云服黃連多而反熱者服薑附多而反寒之謂也用三黃者黃連味苦入心苦能下泄如天氣下降自能引地氣上升黃芩利大腸之熱毒黃柏生腎水以制火甘草稍解諸藥之毒元明粉軟堅四苓散合涼膈散清利大小便此藥一服故口舌生瘡其毒自口而出雖不補産後之虛然內邪既去則正氣自昌而虛弱者充實矣是不補之中而有大補者在也按此為火極似水乃物極必反之候凡患此為燥熱溫補所殺者多矣哀哉許學士云記一婦人産後護密閣內更生火睡久及醒則昏昏如醉不省人事其家驚惶許用荊芥佐以交解散云服之即睡睡之必以左手搔頭覺必醒矣蓋為火所逼也魏玉橫曰沈協蘭室人善病自頗知醫最重景嶽全書數年來所服多溫補之劑約桂附幾各半斤近以産後惡露淋漓赤白時下咳嗽日甚小便自遺脈之右手鼓指兩關弦數右尺弱面有紅光舌當中無胎胸多冷氣喜熱飲稍涼則不快所服乃壽脾煎加薑桂等乃列案與之曰病本三陰不足久服溫補則氣分偏勝遂至綿延不已其誤在便溏氣冷又喜熱飲認為脾胃虛寒不知火盛下迫則作瀉上衝則反冷鬱於中則得辛熱而暫散此理方書多未論及今以産後去血血益虛則火益盛面有紅光火炎上也惡露赤白肝脾熱也咳嗽便遺肺虛肝盛腎不祕密也辛溫燥烈宜急遠之方用生熟地杞子沙參麥冬叉斛初猶畏麥冬之寒以二錢太重只用六分數劑後覺相宜漸加至一錢五分十餘劑便不喜熱飲症漸平又加蔞仁二十餘劑每日大便下青黑雜物而辛氣滿房戶蓋桂姜之熱久迫回腸因榮氣漸充乃勢不能容而下出也若再投溫補其害可勝言哉書此以為偏服溫補者戒楊氏二婦妯娌也其姒新産發熱頭暈不能起坐坐則欲僕惡露紅白兩乳壅腫子戶旁腫如雞卵痛甚勢將成癰專科與炮薑白朮荊芥桂枝等更嘔惡不寐脈之弦數六至有餘乃與生地杞子地丁麥冬當歸銀花甘草黃連蔞仁六劑全愈其娣産彌月耳聾頭及乳腹常痛帶下綿綿每浴湯中搖漾如線子戶亦腫痛醫與香燥轉甚亦用前方加減而愈又朱朗齊之妹産後赤白淋瀝口乾咽痛前方去地丁當歸加白芍四帖全安其初楊姒所生兒食乳即吐自母服藥後亦不嘔矣凡此皆少厥二陰陰虛火盛之病若謂産後而用辛溫是殺之也惡寒吳洋治汪伯玉嬸杜冬舉仲子會病喑且痿四肢汗溢而甚惡寒歷春夏滋深挾纊擁絮猶栗栗曰物極則反吾且極之病由遞産而虛勢重不可亟反激而後反其易為力哉於是補以參耆斂以桂枝固以龍骨牡蠣經年寒猶故也汪以為言洋曰毋謂徐徐及瓜而後可治又明年夏先期一月而診之曰藥力告盈其可以已則以盤水沃青巾者二以石水浮瓜者三謂汪曰洋無戲言通言語撤衣衾其在今日乃命女僕奉盤水進杜難之手語曰吾病産後宜不可水洋曰無害第以兩手按青巾試之病者曰宜然後乃沃兩巾尋漱以盂水已復飲之既削瓜而使啖其半於是汗止聲出單衣如常先是溪南吳千婦病與杜同洋治以向法效太涵集雄按此先救其表而後清其里也然及瓜而後可治雖醫者有此眼力恐病者無此耐性何喘沈堯封曰産後喘有閉脫二症下血過多者是脫症喉中氣促命在須臾方書雖有參蘇飲一方恐不及待惡露不快者是閉症投奪命丹可定如不應當作痰治此皆急症更有一種緩者樓全善所云産後喘者多死有産二月洗浴即氣喘坐不得臥者五月惡露得暖稍下用丹皮桃仁桂枝茯苓乾薑枳實厚朴桑皮紫蘇五味栝蔞煎服即臥其疾如失作汙血感寒治也按此亦是痰症所以能持久痰滯陽經所以惡寒方中著力在栝蔞厚朴枳實桂枝茯苓乾薑五味數味余皆多贅樓全善治一婦産後洗浴即氣喘但坐而不得臥已五日惡風得暖稍寬兩關脈動尺寸俱虛百藥不效用牡丹皮桃仁桂枝茯苓乾薑枳殼桑白皮紫蘇五味子蔞仁服之即寬二三服即臥其疾如失蓋作汗出感寒治之也治法匯雄按寸脈既虛何以用枳朴尺脈既虛何以用丹皮桃仁若謂惡露不行案中胡不敘及薛立齊治一産婦喘促自汗手足俱冷常以手護腹此陽氣虛脫也用人參附子湯四劑愈繆仲淳曰己丑豫婦産後五日食冷物怒傷脾作瀉乃微嗽又三日泄不止手足冷發喘床亦動搖神飛揚不守一醫投以人參五錢附子五錢療之如故漸加參至三兩附子三錢一劑霍然起廣筆記繆仲淳治於中甫夫人産後氣喘投以人參五錢蘇木麥冬各三錢一劑愈咳嗽薛立齊治一婦咳嗽見風則喘急惡寒頭痛自汗口噤痰盛薛謂脾肺氣虛腠理不密用補中益氣加肉桂數劑而安一産婦咳而腹滿不食涕唾面腫氣逆此病在胃而關於肺用異功散而愈孫文垣治贊皇令堂産後左脅痛盛此脅痛緣肺實而氣機不利咳嗽痰不易出內熱氣壅不能伏枕與以瓜蔞仁六錢桑白皮蘇子杏仁半夏桔梗枳殼各一錢水煎服之氣定喘除外與保和丸及七制化痰丸而安繆仲淳治施靈修乃正産後發寒熱咳嗽不止因本元虛弱誤用薑桂勢甚劇二句宜細玩之用鱉甲白芍牛膝生地各四錢山楂麥冬益母草各五錢橘紅當歸各二錢青蒿杜仲各二錢五分棗仁八錢遠志五味各一錢茯神三錢竹葉十三片數劑輒定方亦太雜聶久吾治一婦年四十餘因産過多身熱日夜不止午後益盛肌肉瘦削經水不行諸醫無效與花粉山藥百合香附麥冬各八錢天冬五分地骨皮當歸二母各六分生地生炒用四分白芍生炒三分前胡四分茯苓七分生甘草三分姜一薄片龍眼三個服十餘劑而身熱已退又加桔梗四分酒炒芩連各六分二十四劑而安嘔附霍亂陳霞山治一婦産後傷食致胃虛不納穀四十餘日聞穀氣藥氣俱嘔以參苓白朮炒曲各一錢陳皮藿香各五分炙甘草三分砂仁五分陳米一合用沸湯二碗泡伏龍肝末澄清汁煎藥服而安薛立齊治一産婦患腹脹滿悶嘔吐因敗血散於脾胃不能運化所致或用抵當疑是抵聖湯敗血已下前症益甚小腹重墜似欲去後薛謂脾氣虛而下陷用補中益氣湯加炮姜溫補脾氣重墜如失又用六君子湯而安一産婦停食霍亂用藿香正氣散之類已愈後胸腹膨脹飲食稍過即嘔吐或作泄瀉此脾胃虛極用六君子湯加木香治之漸愈後因飲食失調兼恚怒患霍亂胸腹大痛手足逆冷用附子散又用八味丸以補土母而康設泥痛無補法而用辛散或用平補之劑必致不起泄瀉陸養愚治臧舜田內人脾胃素常不實産後因怒大便泄瀉或以胃苓湯加歸芍投之勢日甚且汗出氣喘脈氣散大或謂此非産後泄瀉所宜宜勿藥陸曰脈雖大而按之不甚空尚有一二分生意用人參理中湯加訶子肉果已煎矣忽傳人事已不省再診之浮按虛數沉按如絲手足逆厥或謂今夜決不能延乃辭去陸令前藥急以加附子一錢一劑汗止瀉減再劑病減七分去附子加歸芍數劑起王憺如治一産婦彌月瀉年餘不愈六脈沉遲此元氣下陷寒濕太甚症也然湯藥猶濕也以濕治濕可乎遂用參耆苓朮肉蔻升麻防風甘草用豬肚一枚入蓮肉一斤好酒煮爛搗和為丸日進而安陳三農治一婦産後滑泄勺水粒米不容即時瀉下半月餘矣六脈濡而弱此産時勞力傷脾也若用湯藥恐滋胃濕遂以參苓白朮散加肉桂生薑棗肉為丸服愈雄按今秋石北涯仲媳胎前患泄瀉娩後瀉如漏水不分遍數惡露不行專科束手余視其脈左弦數右大而不空口苦不飢小溲全無以白頭翁湯合伏龍肝丸治之一劑而減三啜而瘳薛立齊治一産婦大便不實飲食少思五更或清晨遺屎此中氣虛寒脾腎不足用補中益氣送四神丸而痊張子和治李德卿妻因産後病泄年餘四肢瘦乏皆斷為死症張曰兩手脈皆微小乃利病之生脈況洞泄屬肝經肝木剋土而成此病亦是腸澼澼者腸中有積水也先以舟車丸四十五粒又以無憂散三四錢下四五行又進導飲丸渴則調以五苓散再與胃風湯調之半月而能行一月而安健小便不禁薛立齊治一産婦人小便頻數時忽寒戰乃屬脾肺虛弱用補中益氣湯加山藥為主佐以桑螵蛸散而安一産婦患前症吐痰發熱日晡作渴此膀胱陰虛用補中益氣湯佐以六味丸而愈又患痢後小便頻數手足俱冷屬陽氣虛寒用前湯及八味丸而瘳一産婦小便不禁二年不愈或面色青赤或黃白此肝脾氣血虛熱用加味逍遙散為主漸愈佐以六味丸而痊後因怒小便自遺大便不實左目頓緊面色頓赤仍用前散佐六君子湯以清肝火生肝血培土而瘳一産婦小水淋瀝或時自出用分利降火之劑二年不愈以為肺腎氣虛用補中益氣及六味丸而痊大便祕結薛立齊治一産婦大便祕結小腹脹痛用大黃等藥致吐瀉不食腹痛胸結痞用六君子湯加木香炮姜治之而愈孫文垣治沈三石夫人産三日腹不暢女科為下之大瀉五六次遂發熱噁心又用溫膽湯止吐小柴胡退熱數劑食吐不止粒米不進又用八珍湯加童便昏憒耳聾眼合口渴腸鳴發熱噁心耳聾口渴多似感症然此實誤下虛之所致所謂變症蜂起也眼胞上下及手足背皆浮腫診之六脈皆數曰脈數所主其邪為熱其症為虛與十全大補湯加炮姜夜半稍清爽進一盂始得開目言語次日午以藥不接且言語過多復昏時不知人事翌日以人參白朮各三錢炮薑茯苓陳皮各一錢甘草五分服訖體微汗遍身痱痤熱退神爽下午藥又不接且動怒昏昧如前六脈散亂無倫狀如解索痱痤亦沒亟以人參白朮各五錢炙甘草炮薑製附子各一錢連進二帖是夜熟睡惟呼吸之氣尚促屢進皆效後之腫毒自非實症也次日脈轉數下午發熱不退環跳穴邊發一毒如碗大紅腫微痛女科復贊曰向之發熱噁心皆此所致薑附溫補誤也須急進寒涼解毒之劑孫曰此乃胃中虛火遊行無制大虛之症非毒也若用寒涼速其死耳經云壯者氣行則愈怯者著而或病惟大補庶可萬全三石然之仍與前劑日夕二帖參術皆用七錢服後痱痤即起毒散無蹤熱亦退再以參苓白朮散調理而安是症皆由誤下致變幻百出可不慎哉按是症多由産後血津虛耗及平素多火內熱之人常有之雖日數過甚亦無所害即欲通之惟大劑二冬二地歸杞蓯蓉不過一二服即行矣彼桃杏麻柏及膽蜜之治猶下乘也若硝黃肆用誠庸醫也薛立齊治一婦産後大小便不通諸藥不應將危矣令飲牛乳一日稍通三日而痊人乳尤善人乳膩滯不如牛乳之無弊瘧陸肖愚治陳振宇女年二十七産後患間日瘧已月餘寒熱雖不甚而身體倦怠飲食減少脈之左手平和右手弱而無力與補中益氣湯二劑覺胸膈飽悶遂歸咎人參更醫仍用青皮飲二陳湯等寒熱反甚用截藥或止數日復至延至數月肉削骨立再診之其脈微弱已甚曰前日人參兩許可愈今非至斤不能奏效矣用十全大補湯二劑仍覺悶疑之曰直服至不脹悶愈矣更倍參投之遂飲食日增服數十劑方起下痢薛立齊治一産婦食雞子腹中作痛面色青黃服平胃二陳更下痢腹脹用流氣飲子又小腹一塊不時上攻飲食愈少此脾胃虛寒肝木克侮所致用補中益氣加木香吳茱萸漸愈又用八珍湯兼服調理而安雄按塊既上攻無論虛實豈可再服升柴龔子材治一産婦血痢小便不通臍腹疼痛以馬齒莧搗爛取汁三大合煎沸下蜜一合調勻頓服即愈薛立齊治一産婦屎後下血諸藥不應飲食少思肢體怠倦此中氣虛弱用補中益氣湯加吳茱萸炒黃連五分四劑頓止但怔忡少寐盜汗用歸脾湯治之而愈孫文垣治族女小産後二十日矣患赤痢一日十餘次怯寒惡食小腹脹痛診之右寸滑大知其虛中有熱蓋緣惡露未盡故小腹脹痛專科泥丹溪産後大補氣血之語遂概施之因而作痢乃翁曰病尚怯寒何云有熱曰惡寒非寒反是熱症蓋火極似水也時師多昧此旨飲藥後當知之以白芍當歸滑石為君桃仁酒連酒芩為臣木香桂枝檳榔為佐青皮為使服下果去黑瘀血甚多小腹頓寬惟口乾小水少噁心怕飲食體倦仍裡急後重人參川芎白芍各一錢當歸一錢五分酒連陳皮各六分木香二分外與清寧丸服下熱除痢減十之八矣但大便不實噁心虛弱以四君子湯加酒芍陳皮木香肉果酒連當歸養之而平陸養愚治李尚田乃正産後患痢延及年餘肢肌羸瘦面色黧黑咸以不可為矣脈之兩手皆微小而右關尺之間尚覺有力如珠舌中常起黑苔曰微小乃久痢生脈脈滑胎黑必沉積在腸久而未去也若大下之病當愈李謂初病亦常服通利今飲食不進者數月矣安得所積乎因檢前方大都紐於産後大補氣血為主即用消導多雜參耆歸芍補不成補消不成消致元氣日衰積滯日固至收斂溫澀宜其劇也乃以潤字丸一兩分三服令一日夜服盡下紫黑如膏數缶許口渴甚煎生脈散作茶飲之胃漸開又以潤字丸日服一錢每日下稠積缶許十日後方用補養一月而痊張路玉診大兵船上一婦胎前下痢産後三日不止惡露不行發熱喘脹法在不救服藥一劑反加厄逆診之其脈三至一代欲辭不治因前醫被留不與排解必致大傷體面乃曰此症雖危尚有一線生機必從長計議庶可圖治彼聞言始放其醫而求藥遂與盞一枚錢數文令買砂糖熬枯白湯調服既可治痢又能下瘀且不傷元氣急與之服彼欣然而去醫得脫而遁至大兵去乃歸雄按存心可敬薛立齊治一産婦痢未至滿月因食冷物及酒冷熱與血攻擊滯下純血纏墜極痛其脈大無力口乾用黃芩芍藥湯三服而安孕産痘徐仲光曰一孕婦正痘養漿時墜胎血去多昏憒乃伏陷而死一孕婦症同前以黃耆二兩五錢人參當歸各一兩阿膠五錢甘草艾黑姜各三錢附子一錢治之而愈一孕婦漿期正産痘順以保元湯加川芎當歸荊芥山楂益母草而愈一孕婦痘漿足不易痂面赤晡熱此脾虛血少也以安胎飲加參而愈一孕婦痘勻朗灰白熱甚墜胎昏憒冷嘔此胃氣虛寒也以保元湯加炮薑白朮肉桂而愈一産婦痘不易透疲倦血去不止此氣血兩虧也治以芎歸參薑益母升麻血止痘起又以補中益氣而愈一孕婦出痘以安胎飲調理而愈又有胎痛甚者以砂仁炒黑研末酒下一錢即愈一産婦出痘漿不足灰白身熱肢冷寒戰咬牙煩躁溏泄此脾胃虛也以異功散治之而愈亦有去血不止藥不效者倒靨而死一婦産後痘順痰盛清解之益甚此陰虛不能制陽也以六味地黃丸料加當歸麥冬而愈一婦痘甫愈而強以房事疤變色成勞而死一産婦痘不易發煩躁譫狂此毒重壅遏以芎歸連紫升蒡甘芍蟬蛻治之而愈萬密齊治程氏女年二十出痘時娠五月矣診其脈男胎也惟以清熱解毒和中安胎為主用黃芩白朮為君人參生甘草當歸生地白芍紫蘇為佐自初出至成漿無他苦乃聞家中被盜遄歸醫與藥一服胎墮果男也再延診痘變灰白平塌成倒陷矣乃里虛故也詢所用方乃獨聖散曰山甲麝香皆墮胎藥胎虛氣血益虛瘡毒內陷不可為矣三日卒朱應我治一趙姓宦家孕婦二十五歲胎已五月忽痘朱視之點尚未盛至四五日背上痘如蛇皮略無空地乳以下至小腹亦如蛇皮其翁與夫皆決不治朱細察之正額面部並頸至胸堂皆粒粒圓綻紅白分明啓手臂腳腿視之喜其如面與身許以可治至七八日忽牙憂不已神昏不知人事但被其羞余皆赤露每日任其飲水一小桶如黃連解毒湯浩飲亦不計其數時屆五月天氣譫妄不安朱令以土填地板上鋪席在土上置之臥而兩邊仍以桶盛水逼之以涼氣夜則舁之於床如此調理至十八日而愈此症治至九日覺漿滯不行知用涼劑多更以獨味麻黃一兩加入其漿倏至妙哉此法屢用而屢奏神功者也十八日別囑其夫曰欲保胎當服養氣血藥數劑不信後四十餘日胎墮婦亦無恙遇此等症後補斷不可少也一汪姓孕婦方三月而痘朱至已四日不知他醫所用何藥主人問曰婦人何為來桃紅血水朱以主人堅信他醫默言不對越一日血餅大至主人始忙急叩朱朱以痘點細而朗可以收功與以安胎散用阿膠珠三錢黃芩三錢砂仁白朮歸身芍藥等藥又因腹脹加木香三分以行滯氣一服而血止胎安主人嘆以為神朱曰必三四劑胎始無恙主人懈越三日血又來腹又脹而胎墮矣母痘則安全無恙可見藥力之多少所繫不小也一少婦孕三月而痘醫見面部稀少而口許輕朱視之標雖少而血氣尚混頂不見起水珠視舌則又紫赤色曰此痘必添難保無虞主人與醫皆不解朱曰舌乃心苗胎絡上系手少陰舌紫黑則血分有毒安得不墮果三四日痘添而布滿六日血來而胎墮矣急以黃芩白芍朮阿膠等藥養血痘微長稍有漿色畢竟血氣受虧雖服補血劑四肢胸背尚起水泡又急以補脾滲濕藥山藥榴皮薏苡等進三五劑至十四五日方長膿水而收功可見孕婦之痘稍有疑難極難保胎不墮慎之類風薛立齊治一産婦患虛極生風或用諸補劑四肢逆冷自汗泄瀉腸鳴腹痛薛以陽氣虛寒用六君子薑附各加至五錢不應以參附各一兩始應良久不應仍腸鳴腹痛後灸關元百餘壯及服十全大補湯方效一産婦患中風盜汗自泄發熱晡熱面色黃白四肢畏冷此氣血俱虛用八珍湯不應更用十全大補加味歸脾二湯始應後因勞怒發厥昏憒左目牽緊兩唇抽動小便自遺薛謂肝火熾盛用十全大補加鉤藤山梔而安再用十全大補湯辰砂遠志丸而愈一婦人産後睡久及醒則昏昏如醉不省人事用荊芥穗微焙為末每服三錢豆淋酒調服或童便服此華他愈風散也又名舉卿古拜散醫用此及交解散當歸荊芥穗等分每服三錢水酒煎云服後當睡必以左手搔頭用之果然此病多因怒極傷肝或怒氣內郁或坐草受風而成急宜服此便可立待本草綱目王肯堂治一婦産後七日為將息失宜腠理不密偶因風寒所侵身熱頭痛兩眼反視手足瘛瘲名曰蓐風用前方其疾即愈古人珍此祕方隱括其名曰舉卿古拜散蓋用韻之切語舉卿為荊古拜為芥曾公談録謂之再生丹亦神之也續醫說薛氏謂前症如此用不應者急用大補氣血為主吳交山治一婦産後因虛牙關緊急半身不遂失音以續命湯煮飲數服而安醫宗粹言薛立齊治一産婦中風不省人事言語妄甚惡風寒喜熱飲形氣倦怠脈虛浮無力薛謂氣血虛寒用十全大補湯二十餘劑不應又二十餘劑稍緩乃漸加附子至一錢服數劑諸症減一二又二十餘劑十退三四乃去附子五分數劑諸症頓退而安後又發仍用前藥加附子三五分而愈一産婦不語用七珍散而愈後復不語內熱晡熱肢體倦怠飲食不進用加味歸脾湯為主佐以七珍散而愈後因怒不語口噤腰背反張手足發搐或小便見血面色或青或黃或時兼赤白面青肝之本色也黃者脾氣虛也赤者心血虛也用八珍湯加鉤藤茯苓遠志漸愈又用加味歸脾湯而痊一産婦狀如腳氣發熱瞀悶搐掣驚悸或用獨活寄生湯而痊後復作服之其汗如水更加口噤吐痰乃用十全大補湯培養血氣漸愈後飲食日少肌體日瘦吐痰如湧此命門火衰脾土虛寒用八味丸加歸脾湯諸症漸退肌肉漸生蕭萬如治陳昌之內首胎恃壯當風澡體即病發熱如燎口眼喎斜喘嘔有沫面目青黃心腹膨脹揚手舞足脈見弦數不鼓曰此肝虛自招風也非表病也急以姜附丸灌下仍用當歸四逆湯加入吳茱萸兩劑諸症如失來天培治馬氏婦二十餘歲産後九日患腹痛筋攣抽掣不可忍惡露不絶脈沉細而緊視其面色青黃不澤此肝經血少而兼寒也與歸芍六君加炮姜一劑腹痛雖未止而筋攣稍緩另延專科以廣半鉤藤木香威靈仙等腹痛益甚且血崩不止更加發熱神昏再求治以耆朮歸地山藥苓萆艾葉阿膠薑附耆朮地俱至兩外一劑而腹痛抽掣止再劑而崩亦痊用歸脾調理而愈痙薛立齊治一産婦勤於女工忽仆地牙關緊急痰喘氣粗四肢不遂此氣血弱虛而發痙朝用補中益氣湯加茯苓半夏夕用八珍湯加半夏各二十餘劑不應此氣血之未復藥之未及也仍用前二湯又二十五劑尋愈雄按藥不精切故不能收捷效一婦産後惡寒發熱他醫治以小柴胡致汗出譫語煩熱作渴四肢抽搐用十全大補湯益甚其脈洪大重按則無此藥力未及也遂加附子服四劑愈一産婦筋攣臂軟肌肉掣動此氣血俱虛而自熱也用十全大補湯而安一産婦因勞兩臂不能屈服蘇合香丸肢體軟痿汗出如水薛謂前藥辛香耗散真氣腠理虛而津液妄泄也先用十全大補湯加五味子補實腠理收斂真氣汗頓止又佐以四君子調補元氣漸愈用逍遙散大補湯調理而痊一産婦先胸脅乳內脹痛後因怒口噤吐痰臂不能伸小便自遺左三部脈弦此肝經血虛而風火所致不能養肝先用加味逍遙散治之臂能屈伸又以補肝散六味丸而諸症悉愈一産婦患兒枕腹痛或用驅逐之劑昏憒口噤手足發搐此血氣虛極之變症也用八珍湯加炮姜二錢四劑未應又以十全大補湯加炮姜一錢二劑而蘇沈堯封云丁丑三月練塘金虞第四媳産後變症先是於上年十月生産甚健至十二月初旬面上浮腫驅風不應加麻黃三帖通身脹腫小便不利更用五皮雜治反加臍凸更用玉桂五苓小便略通脹亦稍減續用桂附八味其腫漸消惟右手足不減忽一日口眼歪斜右手足不舉舌不能言因作血虛治變為俯不得仰數日後吐黑血盈盂吐後俯仰自如旬余復不得仰又吐黑血而定投以消瘀忽然口閉目開如脫狀其母一夜煎人參三錢灌之得醒醒來索飯吃一小碗近日又厥灌人參不醒已三晝夜矣余遂往診右手無脈因腫極不以為怪左脈浮取亦無重按則如循刀刃余曰此是實症停參可治遂用膽星半夏石菖蒲橘紅天蠶地龍紫草水煎入竹瀝薑汁一劑知再劑手足能舉十三劑能出外房診脈諸病悉退惟舌音未清仍用前方而愈金問奇病之源余曰人身臟腑接壤懷胎後腹中遂增一物臟腑之機括為之不靈五液聚為痰飲故胎前病痰滯居半千金半夏茯苓湯所以神也至産時痰涎與惡血齊出方得無病若血下而痰飲不下則諸病叢生故産後理血不應六神湯為要藥此證初起不過痰飲阻滯氣道作腫血本無病用五苓腎氣腫減者痰滯氣道得熱暫開故也久投不已血分過熱致吐血兩次至若半身不遂口眼歪斜舌絡不靈俱是痰滯經絡之證即厥亦是痰迷所致並非虛脫故消痰通絡病自漸愈何奇之有又曰震澤一婦産後十餘日延我師金大文診視余從焉接述新産時症似虛脫服溫補藥數劑近日變一怪證左邊冷右邊熱一身四肢盡然前後中分冷則如水熱則如炭鼻亦如之舌色左白右黑師問曰此是何症用何方治余曰書未曾載不知應用何方師曰奇證當於無方之書求之經云左右者陰陽之道路也陰陽者水火之徵兆也敗血阻住陰陽升降道路不能旋轉陽盛處自熱陰盛處自冷所以偏熱偏寒用澤蘭山楂肉劉寄奴蘇木桃仁琥珀等藥兩劑病減半繼服不應遂更醫雜以致不起由今思之此證不但血阻必兼痰滯我師見及阻住陰陽升降道路已經識出病源但跳不出消瘀圈子耳倘通瘀不應即兼化痰或者如前案金婦得起未可知也痛痹張三錫治一婦月中著惱素體厚多痰臂痛移走兩足且腫以為虛治服參歸痛益甚噁心迷悶作郁痰治二陳越鞠加秦艽丹皮二服稍減大便四五日不去矣投搜風丸後用化痰舒氣二陳二朮酒芩酒柏木通澤瀉香附調理而愈陸養愚治凌繹泉夫人妊將七月忽兩足軟痿不能履地分娩後頓愈一月後仍作且胸脅痛夜分發熱或以四物入牛膝木瓜虎骨鹿膠或作或止後以脾主四肢與參術脹痛悶絶仍用養血之品無進退經年診之詢其飲食如常肌肉如故足脛浮腫胸脅揉按則微痛否則痞悶其脈沉緩而滑此濕痰積於胸流於四肢故痛而緩宜乎滋陰不減補氣增劇也用二陳湯加蒼朮威靈仙黃柏白芥子數劑痛定熱除加苡仁十劑步履如故薛立齊治一産婦身腹作痛發熱不食煩躁不寐盜汗脅痛服解散祛血之藥不時昏憒六脈洪大無力用補中益氣加炮薑半夏一劑頓退二三又劑飲食甘美但背強而痛用八珍散十全大補湯調理而安一産婦遍身頭頂作痛發熱不食脈浮緊此風寒之症也用五積散一劑汗出而愈但倦怠發熱此邪氣去而真氣虛也用八珍湯調理而愈周慎齊治一婦産後受濕遍身疼痛衆以風藥治之遂致臥床不起手足漸細此産後氣血虛而風藥愈損氣血故也治宜大補氣血用參耆各錢半防己五分煎服愈一産婦遍身痛坐不得臥已經兩月痰多食減衆治不效以參歸各一兩木香一錢為末酒煎分為九次服之愈馬元儀治卜氏妾産後胸中作痛痛甚則迫切不能支至欲求死諸治不效延至五月病轉危急診其脈兩手弦澀少神不能轉側不得言語曰胸中者陽氣所治之部今為陰邪所入陰與陽搏所以作痛前醫破氣不應轉而和血又轉而溫補又轉而鎮逆不知陰陽相結補之則無益攻之則愈結若鎮墮之益足以抑遏生陽而阻滯邪氣惟交通一法足盡開陽入陰通上徹下之妙使陰治於下陽治於上太虛之府曠然何胸痛之有哉用人參三錢肉桂一錢合仲景黃連湯一劑痛減二三劑頓釋次進加桂理中湯數劑全愈接是症即胸痹是也故入痛痹門繆仲淳治王善長夫人産後腿痛不能行立久之飲食不進困憊之極診之曰此脾陰不足之候脾主四肢陰不足故病下體向所飲藥雖多皆燥苦之劑不能益陰用石斛木瓜牛膝白芍棗仁為主生地枸杞茯苓黃柏為臣甘草車前為使一劑輒效四劑而起來天培治潘履端內年約四旬患頭身手足麻木疼痛産後感風不能節勞致風入經絡而成痛風之症也詢之果以前歲産後而起以歸身紅花養血鉤藤秦艽通絡黃芩銀花清火羌活走百節川芎理頭痛菖蒲利腸消滿甘草緩痛姜皮達肌膚通腠理服二劑而頭痛愈腹脹減惟發熱身疼未除更心神恍惚不寐脈稍和此表症稍退裡熱未清改用生地歸芍柴胡地骨皮續斷鉤藤半夏曲枳殼棗仁建蓮二劑而諸症痊惟兩膝內腫痛扶杖而行此風入三陰而將愈矣前方減柴胡地骨皮半夏曲枳殼加丹皮赤芍紅花威靈仙清風藤防己牛膝五加皮生甘草又三四劑全愈薛立齊治人産婦六月多汗人倦不敢袒被故汗出被裡冷則浸漬得風濕身疼痛遂以羌活續斷湯數服愈未選入頭痛薛立齊治一産婦頭痛日用補中益氣湯不缺已三年矣稍勞則惡寒發熱為陽氣虛以前湯加附子一錢數劑遂不發一婦人産後頭疼面青二年矣日服四物等藥薛謂腎水不能生肝木而血虛用六味丸加五味子兩月而痊繆仲淳治黃桂峰乃正産後頭痛大便祕用生料五積散一劑不效令加歸身一兩一服大便通頭疼立止薛立齊治一膏粱之婦産後月經不調唇裂內熱每焮作服寒涼之劑後不時出水薛用加味清胃散而愈後值春令兼怒唇口腫脹寒熱作嘔痰盛少食用小柴胡加山梔茯苓桔梗諸症頓退但內熱仍作乃以加味逍遙散調理而安喑沈明生治袁令默女素稟不足分娩後體倦發熱醫者以其弱齡瘦質且遵丹溪産後當大補之法遂以參耆進之病益甚診之脈浮而澀此不惟有瘀血且有風寒在內夫瘀血未盡外邪初感均有用參之誡是以補之無功耳遂用解表散瘀之劑三四服後熱除胸爽然倦怠如故曰參耆之用此其時矣而袁懲噎廢食因循勿與越至四五日忽舌喑不語或用茯神棗仁或用南半薑橘或用芩連皆不效復延治察其神情雖不能語然每對食物輒注目以視得食則神稍旺更衣則神即疲且脈空而大經云脾之脈連舌本散舌下心之別脈系舌本今火土兩虛醫藥雜亂經又云言而微終日乃復言者此奪氣也況經月不語乎不惟用參且應用附矣服五六日諸症悉愈夫病機者間不容髮有昨宜用攻而今宜用補旦宜用熱而夕宜用涼惟視其機之所在以法合病耳故是症也不用補之害與驟補之害同失其機甚矣機之難也病乳薛立齊治一婦産後勞役忽乳汁如湧昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯數劑而安若婦人氣血方盛乳房作脹或無兒飲脹痛憎寒發熱用麥芽二三兩炒熟水煎服立消其耗散氣血如此何脾胃虛弱飲食不消方中多用之邪張隱菴治一婦産後乳上發癰腫脹將半月周身如針刺飲食不進診之六脈沉緊有力左乳則腫連胸脅用麻黃葛根荊芥防風杏仁甘草石膏溫服取汗遂愈金匱云産後婦人喜中風經云開闔不得寒氣從之榮氣不從逆於肉理乃生癰腫此係風寒內壅火熱內閉榮衛不調所致衆以涼藥治熱不知開闔之故今毛竅一開氣機旋轉榮衛流行而腫痛解矣經云食氣入胃散精於肝病屬陽明厥陰二經是以飲食不進今經氣疏通自能食矣孰謂瘍醫可不知經乎薛立齊治一婦人産次子而無乳服下乳藥但作脹曰人乳氣血所化今脹而無乳是氣血竭而津液亡也當補其氣血自然有乳乃與八珍湯倍參術少加肉桂二十餘劑乳遂生後因勞役復竭夫其初産有乳再産而無其氣血只給一産耳其衰可知王肯堂治一娠婦患乳腫不散八月用火針取膿用十全大補湯外敷鐵箍散不效反加喘悶九月産一女潰勢愈大兩乳旁爛盡延及胸腋膿水稠黏出膿六七升略無斂勢十一月乃用解毒和中平劑外滲生肌散龍骨寒水石等膿出不止流濺所及即腫泡潰膿兩旁紫黑瘡口十數胸前脅下皆腫痛不可動側其勢可畏此産後毒氣乘虛而熾令服黃耆解毒歸參和血生血為臣升麻葛根漏蘆為足陽明本經藥連翹防風散結疏經蔞仁蒡子解毒去腫角刺引膿白芷排膿長肌川芎桂炒黃柏為引每劑入酒一杯送白玉霜丸疏膿解毒時膿水稠黏不可遽用收澀之劑理宜追之乃制青霞散外糝明日膿水頓稀痛定穢減始有向安之勢至正月皆生新肉有紫腫處俱用蔥尉法隨手消散但近脅足少陽分尚未斂乃加柴胡一錢青皮三分及倍川芎膿水將淨即用搜膿散糝之元宵後遂全安凡治癰疽須審經絡部分今所患正在足陽明之分少侵足少陽經分俗醫不復省別一概用藥藥無嚮導終歸罔功甚可嘆也是症得生全在膿水稠黏其人必能食故可治也琇按乳病全是肝火上逆入胃大絡不降而成即肝木侮胃之病近治鮑淥飲夫人素有血虛肝病忽一日憎寒壯熱頭痛口苦乳腫痛不堪尉吮俱無效豫用生地杞子當歸各五錢麥冬蔞仁各二錢丹皮赤芍各一錢五分地丁銀花各三錢二劑即愈凡用此方最效者不可枚舉矣朱丹溪治一婦人産後患乳癰用香白芷連翹甘草節當歸赤芍青皮荊芥穗各半兩貝母花粉桔梗各一錢栝蔞半個作一帖水煎半飢半飽服細細呷之有熱加柴胡黃芩忌酒肉椒料敷藥用南星寒水石皂角白芷川貝草烏大黃七味為膏醋調鵝翎掃敷腫痛效治法陳良甫曰余荊布因産前食素得痰瘦弱産後乳脈不行已七十日服諸藥無效嬰兒甚苦偶有人送赤豆一斗遂如常煮赤豆粥食之當夜乳脈通行因閲本草赤小豆能通奶乳謾載之王洪緒曰産後兩乳伸長形勢如雞腸垂過小腹痛難刻忍此名乳懸急用芎歸各一斤內取各四兩水煎時服以所餘斤半於産婦面前放一棹下放火爐將芎歸入爐慢燒令婦伏於棹上口鼻及乳皆吸烟氣便可縮上如未愈取萆麻子一粒冰水磨塗一縮即洗去但用此藥恐異日再産必復發不救故膏藥不可以萆麻煎入倘貼孕婢下身瘡癤即致小産再貼即致命巴豆萆麻之害如此不可輕用也何廉訪郡伯云此症以女人臭裹腳布扎敷即收上曾用有效亦古方也腰脅痛薛立齊治一産婦腰痛腹脹善噫諸藥皆嘔薛以為脾虛弱用白朮一味炒黃每劑一兩米泔浸時飲匙許四劑後漸安服百餘劑而愈一産婦因怒兩脅脹痛吐血甚多發熱惡寒胸脅脹痛此氣血俱虛用八珍湯加柴胡丹皮炮姜而血頓止又用十全大補湯而寒熱退此病非用姜辛溫助脾肺以行藥勢不惟無以施其功而反補其脹耳雄按亦須參之以脈始可用也王時亨室産後腰間腫痛兩脅尤甚此由瘀血滯於經絡而然也不早治必作骨疽遂與桃仁湯二劑稍愈更用沒藥丸數劑而痊亦有惡血未盡臍腹刺痛或流注於四肢或注股內疼如錐刺或兩股腫痛此由冷熱不調或思慮動作氣所壅遏血蓄經絡而然宜沒藥丸治之亦有經血不行而腫痛者宜當歸丸治之凡惡血停滯為患匪輕治之稍緩則流注以為骨疽多致不救腹痛衍義治一婦人産當寒月臍腹脹滿痛不可按百治不效或作瘀血將用抵當湯曰非其治也此脾虛寒邪客於子門也以羊肉四兩當歸川芎陳皮各五錢姜一兩煎服二三次而安周慎齊治一産婦腹脹痛服敗血去瘀之藥致小腹脹痛硬入大腹用薑桂吳茱萸蓽茇數劑而愈同上一産婦患小腹痛或作嘔或昏憒此脾氣虛寒用人參理中湯漸愈又以補中益氣湯加茯苓半夏全愈後復作痛而兼喘仍用補中益氣湯培補脾肺而遂瘥良方一産婦小腹作痛小便不利內熱晡熱形體倦怠用加味逍遙散以清肝火生肝血用補中益氣湯補脾胃升陽氣而痊同上朱丹溪治馮宅婦産後發熱腹中痛有塊自汗惡寒曾服黑神散用白朮白芍各三錢滑石五錢黃芩丹皮各二錢五分人參川芎歸尾陳皮荊芥乾薑各一錢甘草些須薛立齊治一婦産後小腹作痛有塊脈芤而澀以四物加元胡紅花桃仁牛膝木香治之而愈周於文母産後月餘腹中作痛不已甚至噁心不食惡寒發熱服藥不效有人教用荔枝四兩連核殼燒灰存性稱准四兩好酒煎服或作幾次服下亦無不可按此係平陽事也其地産後每食老薑湯或服姜醋以其山水寒冷故也如少飲則為患不小雄按此不獨東甌為然而廣東尤盛亦習俗使然耳貧苦之家或無大害席豐履厚者多傷損而死不悟也浮腫薛立齊治一産婦飲食少思服消導之劑四肢浮腫薛謂中氣不足朝用補中益氣湯夕用六君子湯而愈後因怒腹脹誤服沉香化氣丸吐瀉不止飲食不進小便不利肚腹四肢浮腫用金匱加減腎氣丸而愈一産婦泄瀉四肢面目浮腫喘促惡寒此脾氣虛寒用六君子加姜而泄瀉愈又用補中益氣而脾胃健杜壬治一婦産後忽患浮腫衆作水氣治不效曰水氣必咳嗽小便不利今便利而不作嗽獨手足寒乃血臟虛寒氣塞不通故生浮腫也治宜益和血氣後服丹皮散愈張子和治曹典史妻産後憂恚抱氣渾身腫繞陰器皆腫肝經所絡大小便如常其脈浮而大此風水腫也先以齏水潦其痰以火助之發汗次以舟車丸浚川散瀉數行後四五日方用苦劑湧訖用舟車丸通經散行十餘行又六日舟車浚川復下之末後用水煮桃紅丸四十餘丸不一月如故前後湧者二瀉凡四約百餘行當時議者以為倒布袋法耳病再來則必死不知此乃內經治郁之玄旨但愈後慎房室等事況風水不同水無復來之理虛汗薛立齊治一産婦略聞音響其汗如水而昏憒諸藥到口即嘔薛以為脾氣虛敗用參附末為細丸時噙三五粒隨液咽下乃漸加至錢許卻服參附湯而安一産婦盜汗不止遂至廢寐神思疲甚口乾引飲薛謂血虛有熱用當歸補血湯以代茶又以當歸六黃湯內黃芩連柏炒黑倍加人參五味子二劑而愈繆仲淳治於中甫夫人産後氣喘投以人參蘇木麥冬各五錢一劑愈五日後忽自汗無間晝夜畏聞響聲飲熱茶湯即汗遍體投以人參黃耆各五錢加歸身生地二劑不效即令停藥金壇俗忌未彌月不得診視乃遍檢方書至證治要訣治汗門內有凡服固表藥不效者法當補心汗者心之液也灑然曰是矣病人素稟有火氣非不足也産後陰血暴亡故心無所養而病汗亟以棗仁一兩炒為君生地白芍麥冬五味枸杞牛膝杜仲歸身阿膠牡蠣龍眼肉大劑與之至三十二劑罔效於懼曰得無不起乎曰非也前投參耆不應而遽止之者以參耆為氣分藥劑且大其不應者必與症不合也茲得其症復可惑乎蓋陰血也難成易虧者也不可責效旦夕乃投前劑至四十二帖忽得睡汗漸收睡愈熟至四日夜醒而霍然顏色逾常血足則色華也琇謂能於方中加炒焦黃連三五分則數劑可愈雄按還須去歸身效始速馮楚瞻治一産婦因頭汗甚多延診余無他苦診之雖洪而緩曰頭汗過多諸症謂之亡陽然産後陰氣太虛正喜其亡陽與陰齊等此薛氏之謂可勿藥而愈也病家疑之別延一醫峻用參耆溫補遂暴注下瀉完穀不化益認陽虛重用參附炮姜其瀉愈甚不數日其肉盡削精神困頓復延診六脈洪弦甚數此真陰竭矣何能挽救蓋産後頭汗乃陰虛虛火上蒸孤陽上迫津液不能閉藏誤作陽虛重加溫補燥熱之氣暴注下趨而為完穀不化乃火性急速不及變化而出也重以溫熱焚灼勢必窮極尚何藥之可救哉雄按薛氏此言不通已極魏氏謂其不能養陰余謂良由泥於産後宜溫補故不敢用壯水養陰之法也案中正喜亡陽與陰齊等薛氏謂可勿藥而愈此正薛氏生平不能峻用養陰之缺處也豫嘗過此症以重劑生熟地白芍杞子麥冬棗仁察其有火則少加芩連不過二三劑愈矣馮君論此症雖了了而不與藥使病家屬之庸手而敗亦守而未化之過也何嘗了了不過習於溫補遇此等症便茫然無所措手耳虛損雄按此證最多何以僅採溫補數案薛立齊治大尹俞君之內産後發熱晡熱吐血便血兼盜汗小便頻胸脅脹痛肚腹痞悶此諸臟虛損也症當固本為善自恃知醫用降火之劑更加瀉利腸鳴嘔吐不食腹痛足冷始信薛言診其脈或浮洪或沉細或如無大虛之脈類多如此其面或青黃或赤白此虛寒假熱之狀時雖仲夏當舍時從症先用六君子加炮薑肉桂數劑胃氣漸復諸症漸退更佐以十全大補湯半載全愈儒者楊敬之內人患症同前但唾痰涎或用溫補化痰之劑不應面色黧黑兩尺浮大按之微細此因命門火衰不能生脾土脾土不能生諸臟而為患也用八味丸補土之母而痊一婦人産後血竭朝寒暮熱肚腹作脹而痛按之不痛以為血氣俱虛用八珍之類治更加發熱煩躁仍用當歸補血湯熱躁漸止用八珍麥冬五味子氣血漸復一産婦朝寒多熱或不時寒熱久不愈用六君補中益氣兼服百餘帖而安沈堯封治鄒氏婦産後便泄用參附溫補未效新城吳敬一診云虛寒而兼下陷用補中益氣加熟地茯苓桂附應手取效以是觀之方論內言下虛而不可升提不盡然也陸氏婦産後發疹細而成粒不稀不密用荊芥蟬蛻鼠黏等藥一劑頭面俱透越一日漸有回意忽大便溏泄數次覺神氣不寧問其所苦曰熱曰渴語言皆如抖出脈虛細數有七至沈師金大文診之曰此陽脫症也屬少陰用生附子三錢水洗略浸切片焙水炒米色炮乾薑八分炒甘草一錢炒白芍一錢五分水煎沖童便一調羹青魚膽汁四小茶匙因無豬膽故以此代之服畢即睡覺來熱渴俱除續用黃耆建中湯加丹參蘇木二劑而安産後惡血不行余血滲入大腸洞泄不禁或下青黑物的奇散極驗荊芥大者四五穗於盞內燃火燒成灰不得犯油火入麝香少許研勻沸湯一兩呷調下此藥雖微能愈大病慎勿忽視又千金膠蠟湯治産後利黃蠟二棋子大阿膠二錢當歸二錢半黃連三錢黃柏一錢陳米半升煎湯煎藥服裴兆期治一婦産後發熱不止汗多語錯六脈洪大而虛六晝夜不合眼一閣眼則飄飄如入雲中投以參耆歸朮丹皮童便及炒黑乾薑之類不驗反增頭眩耳鳴噁心嘈雜欲嘔不嘔裴翻然曰此非氣血大虧乃痰涎壅盛也更方用半夏三錢天麻二錢茯苓橘紅白蔻仁厚朴黃連枳實各一錢竹茹三錢鐵鏽水煎服二劑氣爽神清身涼脈靜繼以人參大補丸日進二服以培胃中元氣月餘全愈産後虛弱豆腐漿一碗衝入打散雞子一枚再加豆腐皮一張龍眼肉十四枚白沙糖一兩同滾透五更空心服産後失調往往延成勞損而貧戶醫藥無資富家又每為藥誤此方甘平和緩補血滋陰貧富皆宜允為妙劑驚悸薛立齊治一産婦驚悸二度服琥珀地黃丸局方地香散隨效再患服之其症益甚而脈浮大按之如無發熱惡寒此血氣俱虛薛用十全大補加味歸脾二湯各百餘劑而愈後遇驚恐勞怒復作仍用前藥而安吳孚先治王氏婦産數日惡露已盡身體虛弱遇回祿舁出神驚散亂身翩翩如在雲端專科用元明紅花等味反增煩劇汗瀉交作六脈虛弱如無用六君子加黃耆炮薑制附棗仁鉤藤龍骨川斷五味始服症減繼則神清每日參一兩或二兩二十劑而安高鼓峰治用晦室人患産後驚悸初起時見筐中棉絮念將所生兒入棉絮中不幾悶死遂作驚恐憂患之狀後凡有所觸意中以為不耐即憂患不止或一端執想數日才已飲食不進面少精采服諸補心養血藥無一效高脈之曰孩時得毋因齒病致大驚否用晦向室人問之曰十歲時果曾病齒治齒者用刀鉗之幾受驚而死子何能識之也解曰脈法當如是耳不精於象數鈐法之學者不能也此語不必少時以驚受損傷其君火心包氣散痰得留之今産後火虛痰因虛動疾端見矣夫心為君主主明則下安國乃大昌故凡七情皆由心起今心虛甚痰邪侵擾思慮亦因之多變況喜樂氣之陽也憂患驚恐氣之陰也陽虛則陰得乘之又兒為其所愛氣虛痰入則愛不得正因愛而過為防護之惟恐不至遂因而生憂矣今先用歸脾養榮八味等類五十大劑待其氣血完備然後攻之病可得而去而病不再發矣先補後攻法如言治之果愈張路玉治汪督學媳産後病虛無氣灑灑然如驚時咳青黑結痰欲咳則心中憺憺大動渾身麻木心神不知所之偶聞聲響則頭面哄熱微汗神魂如飛越狀屢用補養之藥罔效虛羸轉劇診之脈浮微弦而芤獨左寸厥厥動搖此必胎前先傷風熱坐草時併力過甚痰血隨氣上逆衝過膜膈而流入心包也朝用異功散加童便煅焠蛤粉以清理痰氣夕用大劑獨參湯下來復丹以搜滌痰積蓋痰在膈膜之上非焰硝無以透之血在膈膜之上非五靈脂無以浚之然非藉人參相反之性不能激之使出也服數日神識漸寧形神漸旺改用歸脾湯加龍齒沉香調理而安薛立齊治一産婦惡露淋瀝體倦面黃食少惡寒朝夜不寐驚悸汗出此脾經虛熱用加味歸脾湯而痊後因怒脅脹作嘔食少用六君加柴胡治之而痊繆仲淳治王六媳乃正産後驚悸聞聲輒死非用力抱持則虛煩欲絶如是纍月曰此心脾肝三經俱虛也用人參棗仁茯神遠志白芍石斛甘草麥冬五味丹砂為丸以龍眼湯吞彌月而愈顛狂薛立齊治一産婦患顛狂或用大澤蘭湯而愈後又怔忡妄言其痰甚多用茯神散補其心虛頓愈又用八珍散加遠志茯神養其氣遂瘥一産婦亦患此用化痰安神等藥病益甚神思消鑠薛以為心脾氣血不足用大劑參朮芎歸茯神棗仁四斤余而安乃以歸脾湯五十帖而愈一産婦形體甚倦時發譫語用柏子仁散稍愈又用加味歸脾湯而愈又因怒狂言脅痛小便下血用加味逍遙散以清肝火養肝血頓瘥又佐以加味歸脾湯而安魏玉橫治一婦産後數日日晡壯熱大汗狂言妄語不可禁制晨則了了診之六脈弦長不便不食此臨盆去血過多肝失其養燥而生火遂入胃之大絡非如敗血上衝之候也若屬敗血則晝夜熱狂矣與熟地甘杞子各一兩麥冬五錢一劑減二劑瘥丁潤兄室素有吞酸症孕八九月心腹大痛時時眩暈欲絶與大益氣湯十餘帖全愈臨盆胞水先去三日而復産自汗譫妄專科與炮薑附子數帖遂發狂耳聾更醫以茯苓車前半夏浮麥等多帖無效診時已彌月脈弦急如蛇行此精血皆奪之候亟與地黃杞子麥冬沙參一帖脈稍和症稍減仍召前醫謂不必服湯劑矣與丸子令服二三日發厥而終此與前症大同一生一死謂非誤治可乎繆仲淳治張璇浦乃正産六朝發狂持刀殺人陰血暴崩肝火炎故也令先飲童便一甌少止再服龍齒澤蘭生地歸身半夏牛膝茯神遠志棗仁大劑仍加童便頓服而止施笠澤治庠友唐仲宣乃正産後驚悸恍惚語言錯亂此産後心虛敗血停積上干包絡致病若此先用佛手散加石菖蒲五靈脂劉寄奴薑黃等藥以除敗血後以歸脾調理而愈至明年五月復産復病前症遍延諸醫施仍書前方一醫訝曰寄奴蒲黃等藥從何來邪仲宣疑不復用至是冬施偶同李士材過大洪橋忽遇仲宣喜而迎曰內人自乳子後或歌曲嗔笑狂妄不常向服安神清心之劑不效夜來幾自縊矣今偶值二子豈天賜邪幸為診之遂偕往診之六脈沉澀曰瘀血挾痰久且益堅非前藥所能療用歸尾桃仁煎湯下滾痰丸二服每服三錢下去惡物復用鎮驚鎮肝調理而愈馮楚瞻治一産婦後兩月忽患顛疾久不愈或連日不食或一食倍進或數日不寐或間宿不寤脈乍洪乍小左寸兩尺常弱消痰鎮心俱不效夫諸躁狂擾火之病也二陰一陽火之原也主智閉藏腎之用也産後未久少陰虛也以八味加牛膝五味大劑冷服其所食鴨肉豬肘入肉桂同煮調治數日乃一日稍輕一日如故此心脾亦不足脾主信而為病也朝服加味人參湯夕服歸脾湯去黃耆木香加白芍麥冬五味肉桂服後漸安月餘全愈見鬼薛立齊治一産婦乍見鬼神或用調經散益甚痰涎上湧朝寒暮熱乃朝用八珍散夕用加味歸脾湯各五十餘劑而愈盛用敬治金棠妻半産病數月日厥者數次見鬼自頂而出自口而入或曰脈澀而弦血少有痰鬼自頂門出此元神出也出而不進者死出而復入可活也藥之去痰碗許尋愈吳江縣志用敬即啓東之孫琇按半産亦多氣血兩虧與正産同治陳良甫治五羊洪運使天錫子舍孺人産後語言顛倒言語不已如有神靈服諸藥無效召診之六脈和平以奪命散兩服而愈沈堯封曰産後發狂譫語惡露不來者是血瘀宜無極丸惡露仍通者是痰迷宜六神湯半夏曲橘紅膽星石菖蒲茯神旋覆花各一錢水煎服一成衣婦産後半月餘發狂打罵不休其夫鎖之磨上余附無極丸六錢分兩服酒下服畢即愈越四五日後發又與六服後不復發一丁姓婦産後神昏譫語如狂惡露仍通赤不過多醫者議攻議補不一金尚陶前輩後至診畢曰待我用一平淡藥吃下去看遂疏六神湯方一劑神氣清四劑霍然甲戍春錢香梅如君産後微熱痞悶時時譫語惡露不斷用理血藥不應改用六神湯四劑病去如失産後喜笑不休一老嫗云乃産後被侍者挾落腰子使然用烏梅肉二個煎湯服立效嘉興錢鄰哉曾目睹之
