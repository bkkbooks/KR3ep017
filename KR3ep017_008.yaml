body:
  text: 卷八痢陳良甫治一婦人病痢疾越四十日服諸藥不愈召診之六脈沉弱大凡下痢之脈宜沉宜弱但服十全大補湯薑棗煎成加白蜜半匙再煎數沸服之而愈良方醫說續編一婦人泄瀉不止似痢非痢似血非血其色如濁酒診之則六脈沉絶衆醫用熱藥及丹藥服之則發煩悶乃先用敗毒加陳米煎次用胃風湯加粟米愈泊宅編云姚祐自殿監遷八座母夫人病痢諸藥不效令李昂筮軌革有真人指靈草之語一日登對上訝其色瘁具以實奏詔賜一散子數服而愈仍喻只炒椿子熟末米飲下薛立齊治司馬王荊山患痢後重服枳殼檳榔之類後重益甚食少腹痛此脾傷而虛寒也用六君子加木香炮姜而愈祠部李宜散患血痢胸腹膨脹大便欲去不去肢體殊倦以為脾胃虛弱不能攝血歸源用補中益氣湯加茯苓半夏治之漸愈後因怒前症復作左關脈弦浮按之微弱此肝氣虛不能藏血用六味治之而愈朱丹溪治一老人年七十面白脈弦數獨胃脈沉滑因飲白酒作痢下淡血水圊後腹痛小便不利裡急後重參術為君甘草滑石檳榔木香蒼朮為佐下保和丸二十五丸次日前症俱減獨小便不利以益元散服之而愈平治會萃寧皇患痢召曾醫不記名入視曾診御畢方奏病症未有所處慈明立御榻後有旨呼曾防禦官家吃得感應丸否曾連呼吃得吃得慈明又諭須是多把與官家曾承教旨對以須進二百丸遂止曾時坐韓黨被譴痢止遂於元降秩上更曾三秩後寧皇不豫久謂左右曰惟曾某知我性急召入診訖嗚咽不勝上曰想是脈兒不好也曾出自診其脈謂家人曰我脈亦不好先寧皇一夕而逝四朝聞見録葉紹翁竇材治一人休息痢已半年元氣將脫六脈將絶十分危篤為灸命關三百壯關元三百壯六脈已平痢已止兩脅刺痛再服草神丹霹靂湯方愈一月後大便二日一次矣一人病休息痢竇令灸命關二百壯病愈二日變注下一時五七次命服霹靂湯二服立止後四肢浮腫乃脾虛欲成水脹也又灸關元二百壯服金液丹十兩一月而愈曾魯公痢血百餘日國醫不能療陳應之用鹽水梅肉一枚研爛合蠟茶入醋服之一啜而安大中丞梁莊肅公亦痢血應之用烏梅胡黃連灶下土等分為末茶調服蓋血得酸則斂得寒則止得苦則澀故也醫說本草綱目宋張叔潛知劍州時其閣下病血痢一醫用平胃散一兩入川續斷末二錢水煎服即愈紹興壬子會稽時行痢疾叔潛之子以方傳人往往有驗小兒痢尤效本草綱目劉禹錫傳信方云豫曾苦赤白下痢諸藥服遍久不瘥惟久痢故可用後方轉為白膿令孤將軍傳方用訶黎勒三枚兩炮一生並取皮末之以沸漿水一合服之若止水痢加一錢匕甘草末謂加甘草末錢也若微有膿血及血多加三七亦加甘草本草綱目胡大卿一僕患痢五色已半年遇杭州一道人教用大熟栝蔞一個煅存性出火毒為末作一服溫酒服之遂愈本事方同上張子和曰一男子病膿血惡痢痛不可忍有實熱之毒忽見水浸甜瓜心酷喜之連皮食數枚膿血皆已人言下痢無正治是何言也只知痢是虛冷溫之澀之截之此外無術矣豈知風暑火濕燥寒六者皆為痢此水蜜甜瓜所以效也潘塤曰豫蔓孫年十二一日內外熱如火頭眩醫以為外感汗之不解既而腹痛小水不行又以為內傷下之不愈後四五日變赤痢晝夜無度小水點滴腹連膀胱脹悶醫乃專用痢藥而病益劇心切憂之詢之家人曾食何物以曾飲冰水告豫曰病坐此矣醫投四苓六一不應豫曰陰氣結於上陽氣陷於下膀胱有上口無下口氣不能化而出也須用膀胱本經藥溫以散之升以舉之衆醫不敢豫用溫中丸天水散加乾薑茴香升柴煎服一二帖小便行三帖痢止而愈諸記室李時珍治華老年五十餘病下痢腹痛垂死已備棺木用延胡索三錢為末米飲服之病即減十之五調理而安本草綱目薛立齊治一人痢後嘔嗤脈洪大按之虛細作渴引飲諸藥到口不納作脾胃虛寒不能司納以參朮炮姜等分飯丸米飲不時送下服至三兩聞藥不嘔以六君子加炮姜調理而安王嶦如治一人痢如豆汁日夜百餘次群醫投以清涼下墜之藥愈危六脈沉弱此脾虛受濕也以補中益氣湯加羌防蒼朮二三劑愈王又逸治一人痢後腳軟難行曰久痢傷氣下多亡陰氣血俱虛不能榮養其筋骨也用八珍湯加牛膝杜仲木瓜薏仁而愈陳三農治一婦患痢所服皆清涼克伐之藥致脾胃虛弱血無所統日下數升遇有所觸其下益甚欲補血恐脾愈寒欲引血歸經而血去殆盡遂用陽生陰長之義以益氣湯溫養中氣而漸安一士勤於舉業夏末患裡急泄白膿衆以痢治曰非也此積勞傷脾脾氣下陷即東垣所謂飲食不節起居不時上升精華之氣反下陷云云也用補中益氣湯二劑而安龔子才治劉司寇年近七十患痢膿血腹痛諸藥弗效診之六脈微數此肥甘太過內有積熱當服酒蒸大黃一兩清利之劉曰吾衰老恐不勝用滋補平和乃可因再四引喻始勉從之逾日而愈尤在涇曰痢之為病氣閉於下而火復迫之是以腹痛裡急糟粕不出而便腸垢也其源皆由於暑濕與瘧病俱發於夏秋蓋傷於經絡則成瘧而入於腸臟則為痢也經絡之邪可散而愈故治宜辛苦溫之藥腸臟之熱非清不愈故治宜辛苦寒之藥亦發表不太熱攻裡不太寒之意河間之主用清寒蓋亦有見於此張景嶽不審痢病之所從來而以五臟五行為說謂惟心可言火其餘均不可言火此但足資辨論而已豈足補於治要哉痢與泄瀉其病不同其治亦異泄瀉多起寒濕寒則宜溫濕則宜燥也痢病多成濕熱熱則宜清濕則可利也雖泄瀉亦有熱症然畢竟寒多於熱痢病亦多寒症然畢竟熱多於寒是以泄瀉經久必傷胃陽而腫脹喘滿之變生痢病經久必損脾陰而虛煩痿廢之病起痢病兜澀太早濕熱流注多成痛痹泄瀉疏利或過中虛不復多作脾勞此余所親歷非臆說也或曰熱則清而寒則溫是已均是濕也或從利或從燥何歟曰寒濕者寒從濕生故宜溫燥暖其中濕熱者濕從熱化故宜甘淡利其下且燥性多熱利藥多寒便利則熱亦自去中溫則寒與俱消寒濕必本中虛不可更行滲利濕熱鬱多成毒不宜益以溫燥也一人下痢小腹急痛大便欲去不去以脾胃氣虛而下陷也用補中益氣送八味丸二劑而愈此等症候因利藥致損元氣肢體腫脹而死者不可枚舉一人患痢後重自知醫用黃芩芍藥湯後重甚飲食少思腹寒肢冷龔以為脾胃虧損用六君子湯加木香炮姜二劑而愈趙養葵治四明徐陽泰體素豐多火善渴雖盛寒床頭必置茗碗或一夕盡數甌又時苦喘急質之趙趙言此屬鬱火症常令服茱連丸無恙也丁巳夏徐避暑檀州酷甚朝夕坐水盤間或飲冷香薷湯自負清暑良劑孟秋痢大作始三晝夜下百許次紅白相雜絶無渣滓腹脹悶絞不可言或謂宜下以大黃趙勿顧也竟用參朮薑桂漸愈猶白積不止服感應丸而痊後少嘗蟹復瀉下萎頓仍服八味湯及補中重加薑桂而愈寒涼太過用參朮薑桂以救其偏是矣八味之投奚為乎此養葵之所以為養葵也夫一人之身歷一歲之間黃連苦茗不輟口而今病以純熱瘥向若投大黃下之不知何狀又病咳嗽時喘逆不眠用逍遙立安又患便血不止服補中黑姜立斷不再劑喻嘉言治張仲儀初得痢疾三五行即診之行動如常然得內傷之脈而挾少陰之邪曰此症宜一表一里但表藥中多用一參里藥中多用附子方可無患若用痢疾門諸藥必危之道也張以平日深信徑取前藥不疑然病勢尚未著也及日西忽發大熱身重如巨石頭在枕上兩人始能扶動人事沉困急服完表裡二劑次早診視即能起身出房再與參附二帖全愈若不辨症用痢疾門中藥何曾有此等治法乎周信川年七十三平素體堅秋月病痢久而不愈至冬月成休息痢一日夜十餘行面目浮腫肌膚晦黑脈之沉數有力謂曰此陽邪陷入於陰也吾以法治之可愈以人參敗毒散煎好用厚被圍椅上坐定置火其下更以布卷置椅褥上殿定肛門使內氣不得下定內氣提掇在人豈可以物塞定其說未免荒謬雄按提掇雖在人以外殿亦可少助其力然後以前藥滾熱與服良久又進前藥遂覺皮間有津津微汗再溉以滾湯教令努力忍便此卻有理前藥滾熱與服良久又進前藥遂覺皮間有津津微汗再溉以滾湯教令努力忍便不可畏熱不得移身如此約二時之久皮間津潤未乾病者心躁畏熱忍不可忍始令連被臥於床上是晚止下痢二次後用補中益氣湯一日夜止下三次不旬日全愈蓋內陷之邪欲提之轉從表出不以急流挽舟之法施之其趨下之勢何所底哉聞王星宰患久痢諸藥不效蘇郡老醫進以人參敗毒散其勢差減大有生機但少此一段斡旋之法竟無成功故凡遇陽邪陷入陰分如久瘧久痢久熱等症皆當識此意使其里邪久久透出表外方為合法若急而速則恐才出又入徒傷其正耳按休息痢多緣誤治而成或兜澀太早或有表症而驟下之古人多以感應丸為治法至良也茲用人參敗毒亦治之近理者至以布蛋殿其肛謂內氣不下走亦好奇之過耳嘗閲道書見內丹將成欲過關時必以物殿其穀道夾其外腎以防靈丹之外泄喻氏貫通三教其意未必不取諸此魏君之論亦不免少見多怪朱孔陽年二十五形體清瘦素享安逸夏月因構訟奔走日中暑濕合內郁之火而成痢疾日夜一二百次不能起床以粗紙鋪茵上頻頻易置但飲水而不進食其痛甚厲肛門如火烙揚手擲足躁擾無奈脈之弦緊徑急不為指撓曰此症一團毒火蘊結腸胃其勢如焚救焚須在頃刻若二三日外腸胃朽腐矣乃用大黃四兩黃連甘草各二兩入大砂鍋內煎隨滾隨服服下人事少寧片時少頃仍前躁擾一日夜服至二十餘碗大黃俱已煎化黃連甘草俱煎至無汁次日脈勢少和知病可愈但用煎法不用急藥改用生地麥冬各四兩另研生汁以花粉丹皮赤芍甘草各一兩煎成和汁大碗咽之以其來勢暴烈一身津液從之奔竭待利止生津則枯槁難回矣今脈勢既減則火邪已退不治痢而痢自止豈可泥潤滯之藥而不急用乎服之果痢止但遺些少氣沫耳略進腐漿米汁調養旬余始能消穀亦見胃氣之存留一線者不可少此焦頭爛額之客也浦君藝病痢初起有表邪未散誤用參術固表使邪氣深入又誤服黃連涼解大黃推蕩治經月餘胃氣不運下痢日夜百餘行一夕嘔出從前黃連藥汁三五碗嘔至三五次後胃與腸遂打成一家內中幽門闌門洞開無阻不但粥飲直出即人參濃膏才吞入喉已汩汩從腸奔下用大劑四君子湯煎調赤石脂禹餘糧二末連連與服服後勢少衰但腹中痛不可忍浦曰前此痢雖多然尚不痛服此藥而痛增未可服矣喻曰此正所謂通則不痛痛則不通之說也不痛則危痛則安何可不痛耶仍以前藥再進俟勢已大減才用四君子倍茯苓十餘劑全安李士材治孫瀟湘夫人下痢四十日口乾發熱飲食不進腹中脹悶完穀不化尚有謂邪熱不殺穀者計用香連枳殼豆蔻厚朴等三十餘劑絶粒五日命在須臾診之脈大而數按之豁然詢得腹痛而喜手按小便清利此火衰不能生土內真寒而外假熱也亟煎服附子理中湯冰水與服一劑而痛止六劑而熱退食進兼服八味丸二十餘日霍然起矣許郡侯女痢疾腹痛脈微而軟李曰此氣虛不能運化精微其窘迫後重者乃下陷耳用升陽散火湯二劑繼用補中益氣湯十劑而愈喻嘉言治陳汝明病痢發熱如蒸昏沉不食脈數大空虛尺倍洪盛此內有濕熱與時令外熱相合欲成痢症尚不自覺又犯房勞而為驟寒所乘以故發熱身重不食昏沉皆少陰腎經外感少陰受邪原要下利清白此因腸中濕熱已蒸成敗濁之形故色雖變而下利則同也與麻黃附子細辛湯一劑少散外邪得汗後熱即微減再用附子理中湯二劑熱退身輕能食改用黃連理中湯丸服至旬日全安葉茂卿幼男病痢噤口發熱十餘日嘔噦連聲不絶關脈尺脈俱上湧而無根喻曰此非噤口乃胃氣將絶之症也噤口痢虛熱在胃壅遏不宣治宜補虛清熱此因苦寒所傷不能容食惟有清補一法而已連投理中湯二劑不一時痢下十餘行葉疑藥誤喻曰吾意先救其胃氣之絶今腹中瘀積藉藥力催之速下正為美事焉可疑之服二日人事大轉四日後止便糟粕以補中益氣調理旬日而安可見小兒之痢縱啖傷胃者多內有積熱者少尤不可輕用痢疾門中通套治法也一婦人痢疾一月諸藥無功李診之曰氣血兩虛但當大補痢門藥品一切停廢以十全大補連投十劑兼進補中益氣加薑桂二十餘劑而安張兵尊秋間患痢凡香連枳朴等劑用之兩月而病不衰李診之滑而有力失下故也用香連歸芍陳皮枳殼加大黃三錢下穢物頗多診其脈尚有力仍用前方出積滯如魚腸者約數碗調理十餘日而痊毛撫軍痢如魚腦腸鳴切痛聞食則嘔所服皆苓連木香菖蒲藿香橘紅芍藥而已後有進四君子湯者疑而未服診得脈雖洪大按之無力候至左尺倍覺濡軟此命門火衰不能生土亟須參附可以回陽因問但用參術可得愈否李曰若無桂附雖進參術無益於病且脾土太虛虛則補母非補火乎遂用人參五錢熟附一錢五分炮姜一錢白朮三錢連進三劑吐止食粥再以補中益氣加薑附四劑後即能視事吳又可治張德甫年二十患噤口痢晝夜無度肢體僅有皮骨痢雖減毫無進穀食以人參二錢煎湯入口不一時身忽浮腫如吹氣球自後飲食漸進浮腫漸消腫間已生肌肉矣高鼓峰治朱殿臣病痢日逾百餘次身發熱飲食不進所用皆檳榔大黃之屬高曰此破氣利血藥也治滯下當調氣不當破氣當和血不當利血以當歸白芍生地黃芩木香等數大劑飲之三日而愈馮楚瞻治王姓人久患重痢延診時當六月自腹至陰囊皆重綿厚裹稍薄則痛甚其兩足心又覺熱甚則重扇始可飲食不思甚危困脈之寸強關尺並弱曰此中氣久虛氣不升降陰陽阻隔似痢非痢誤用香連苦寒之劑以致抑遏陽氣於九地之下而中宮藏陽納氣之所反已空虛且久痢陰陽兩亡故足心之熱陰虛所致腹中之寒陽虛所由中宮之陽宜溫而補下陷之陽宜清而升理難並行今但先去其中寒之阻隔則鬱遏下極之火自能上升大用附子理中湯加五味子以斂之論證甚佳擬方亦合但加五味似無著落二三劑後腹寒足熱俱減六七乃以歸脾湯加肉桂五味煎湯送八味丸而愈陳秀才患紅白痢甚密診之兩寸略洪兩尺左關甚弱舌有黑苔此肝不能疏泄腎不能閉藏宜痢之重密矣且真陰虧極於下真津燥槁於上水乘火位故赤舌變黑也若服黃連適增其害乃果有以香連進者服後痢更無度復延馮與八味湯大料用人參沖服漸得輕可調理月餘而安楊乘六治沈某病痢裡急後重日夜百餘次發熱口渴體倦懶言蜷臥少食小便不利或用痢門清熱消滯套藥數劑轉甚脈之緩大無力面色嫩白舌苔微黃此挾虛感寒不可以痢疾正治之也乃用補中益氣加白芍炮姜一劑而急重漸緩痛痢隨減再劑身涼食進諸症悉愈蔡某病痢臍腹絞痛裡急後重日夜無度自知醫所服皆培腎燥脾之劑補澀太早遂成休息幸不誤事但病根不斷每周時或五七次遷延三載形肉漸脫力不能支楊診之脈附骨而緊左尺尤甚面㿠白舌淡嫩且胖且滑此寒積在大腸底諸藥不能到故經年纍月痢無止息也今脾腎大虧須服養榮八味各數十帖待其氣血充足然後以蠟丸巴豆一枚大如龍眼空心服以熱水送之則藥到積所乃化其積自除矣如法治之果不再發用蠟丸巴豆以治寒積之痢亦古人之成法但前既云所服皆培腎燥脾之劑後復云脾腎太虛須服養榮八味數十帖豈三載之培補猶嫌未至耶後人醫案其偏駁不醇類如此姚某痢疾腹痛後重膿血並見日夜無度或用利氣涼血清火解毒一切消克之劑病不減而解出斷腸一段長半尺許延楊診迷病情用藥次第並詢斷腸之故思之良久曰決無此事夫腸者起自胃之下口歷幽門闌門以至肛門大小相連若中既斷矣何能自出肛門耶且腸既出於昨日則上下斷絶已久何至今日便中膿血仍相續不絶耳蓋腸中滑膩稠黏如脂如膏黏貼腸上之一層其形外圓中空有似乎腸而實非腸也試撥之必腐矣果然診其脈細數而弦按之勒指舌如鏡而脈無神此木氣太甚胃氣將絶無救矣數日果歿易思蘭治省亭殿下七月病痢始服通利次行和解又次滋補月餘轉甚每日行數次肚腹絞痛但泄氣而便不多起則腰痛屈曲難伸胸膈脹滿若有物礙噯氣連聲四肢厥逆喘息不定診之兩寸沉大右寸更有力右關沉緊左關弦長而洪喜兩尺沉微來去一樣曰此神勞氣滯之病也以暢中湯進之制香附八分蒼朮一錢神麯三錢五分撫芎七分黃芩八分枳殼三分蘇梗五分甘草三分姜一片棗二個服後兀兀欲吐冷氣上升噯氣數十口即大便去穢汙頗多胸次舒暢腹中覺飢自午至酉止去一次四肢不厥肩背輕快六脈平復但心內怔忡頭目昏眩飲食無味用六君子湯加香附砂仁二劑胃氣漸平眩暈怔忡乍止乍作又以補中益氣湯加蔓荊子茯神棗仁黃柏半月乃全愈此證脈兩寸俱沉左寸沉者心火鬱於下乃神勞也右寸沉而有力者肺主氣與大腸為表裡七月肺金當令之時脈宜浮短今不浮而沉因思則氣結不得循環失其升降之常惟走大腸順逆氣滯而下陷故作裡急後重有似於痢實非痢也醫或謂四肢厥逆大腸久滑當用附子溫之或謂內有宿積作痛當用硝黃下之皆非治法夫肺脈不浮而沉是金不得令也金不得令則不能制木故肝脈不弦細而弦洪不當旺而反旺木來侮土脾氣轉結於內不能運故四肢逆而厥冷所謂熱深厥亦深也熱厥者上不過肘下不過膝脈伏有力可驗也既然熱厥豈可復用附子大熱之劑經曰心藏神多念則神勞脾藏意多思則氣結氣結故腹痛下痢若復加以寒涼之劑其結愈甚所以硝黃亦不可用惟以辛涼之劑散之有香附辛溫以快肺氣蘇梗疏通諸竅神麯舒脾氣而化脾積蒼朮燥濕引脾氣散於四肢撫芎暢達肝氣黃芩枳殼蕩滌大腸加甘草以和中使氣升而循環經絡積去而大腸通快又何腹痛之不減而厥逆之不除哉張路玉治項鳴先尊堂下痢血色如莧汁服消克苦寒芩連大黃之類愈甚不時發熱痞悶六脈瞥瞥虛大右關獨顯弦象按之則芤此氣虛不能統血之候與補中益氣加炮薑肉桂四帖而安郭然明之室患五色痢日夜數十次兼帶下如崩誤服黃連大黃十餘劑隔塞不通口噤不食者半月餘至夜必大發熱燥渴六脈弦細而疾此足三陰俱虛之候與理中加桂苓木香烏梅以調其胃次與加減八味湯導其陰火而全安某刑部高年久痢色如莧汁服芩連白芍之類二十餘劑漸加厄逆六脈弦細如絲與理中加丁香肉桂疑不服仍啜前藥數日病愈甚而驟然索粥諸醫皆以能食為慶張再診則脈至如循刀刃真臟脈也此中氣告竭求救於食除中症也與傷寒之例同不可為矣褚某尊堂深秋久痢噤口不食者半月餘但飲開水及瓜汁啜後必嘔脹腸鳴絞痛不已煩渴悶亂至夜轉劇所下皆膿血日夜百餘次小水涓滴不通六脈皆弦細乏力驗其積沫皆瘀淡色晦詢其所服皆芩連檳朴之類所見諸症俱逆幸久痢脈弱尚宜溫補用理中加桂苓紫菀調之服後小便即通得稍寐數日糜粥漸進痢亦漸減更與理中倍參伏龍肝湯泛丸調理而痊陳進士觸熱錦旋抵家即患河魚腹疾半月以來攻克不效遂噤口粒米不入且因都門久食煤火肩背發脹不赤不疼陷伏不起發厄神昏診之六脈弦細欲絶面有戴陽之色所下瘀晦如爛魚腸腦症雖危幸脈無旺氣氣無喘促體無躁擾可進溫補但得補而癰腫焮發便可無虞遂疏保元湯每服人參三錢黃耆二錢甘草肉桂各一錢伏龍肝湯代水煎服一啜而稀糜稍進兩啜而後重稍輕三啜而癰毒墳起瘍醫敷治其外囑守前方十餘劑而安韓晉度春捷錦旋患腹痛泄瀉下血或用香連丸遂飲食艱進少腹急結雖小便癃閉而不喜湯飲面色萎黃日夜去血五十餘度診之氣口沉細而緊所下之血瘀晦如莧菜汁與理中湯加肉桂二錢一劑溺通小腹即寬再劑血減食進四劑泄瀉止三四次去後微有白膿與補中益氣加炮姜四劑而愈張飛疇治朱元臣子患五色痢胸膈脹滿粥食不進服藥罔效另延兩醫一用大黃一用人參不能決求診之曰用大黃者因其脹滿脈大也用人參者因其痢久不食也痢久不食大黃斷斷難施膈滿作脹人參亦難遽投擬伏龍肝為君專溫土臟用以濃煎代茶煎焦朮茯苓甘草廣藿香木香炒烏梅一劑痢減食進再劑而止遂不藥調理而安柴嶼青治解元周讓谷在安撫張西銘京寓時半年久痢不止或用參耆赤茯粟殼肉果不效夜起六七次日間不計其數膿血雜下已頻於殆始求治以久痢亡陰不宜再用赤茯利水亦非兜澀之所能止且久痢寒積在大腸底現今兩脈稍緊欲用蠟豆丸衆皆不敢不得已勉用補中益氣加茱萸制川附一劑而減後兼用八味丸而愈張三錫治一人患痢發寒熱頭痛左脈浮緊而右脈滑大乃內傷挾外感也先用敗毒散加薑蔥一服表症悉除但中脘作脹悶後重不已以平胃散加枳殼木香檳榔山楂二服脹悶移於小腹投木香檳榔丸三錢下黏硬之物而愈一婦病痢自投承氣湯二服不應診之左脈浮而帶弦右三部俱沉關脈略滑必鬱悶中食所致病家云素多惱怒遂以厚朴蒼朮香附撫芎舒郁山楂檳榔橘皮木香理氣白芍調中三服愈一人痢初愈遂飲燒酒雜進肉面胸口脹滿發寒熱右脈弦滑倍常知飲食酒毒為患也病後中氣未復火邪尚存多食自難傳化燒酒復助其毒勢在不救今食填胸中得吐乃有生意經云在上者因而越之是也不信自服巴豆丸藥下咽去血升許而殂一人夏月遠行飲酒致下痢皆純血日夜無度心下脹不食脈三部俱弦滑而數先與山楂枳實檳榔橘紅香連以和其中次與木香檳榔丸以導其滯脹悶已除下血愈甚遂以四物用生地條芩茱連丹皮二劑血止一半再加地榆三服已一人下痢脹痛自服大黃丸一時痛轉甚手足俱冷脈沉伏知寒涼用早也投炮姜理中湯加厚朴蒼朮山楂一服外用炒鹽尉之下膈周時即定後用香連白芍厚朴枳殼等調理而痊一人患痢二月不愈穢汙在床六脈弦而弱投補中益氣湯加酒炒白芍八帖始止二十帖而痊一人病痢日久不止四肢俱腫而脈細小尚可救與參苓白朮散加肉豆蔻少許作湯服愈一婦病久痢食時身熱左脈浮數右脈滑數詢其飲食雖病未減至劇始不能食與倉廩湯先去其熱後以枳朮人參陳皮楂曲又二服腹中漸寬後重不止乃以調中益氣湯下木香檳榔丸二服下穢物碗許愈陸養愚治一人因路途感冒頭微痛身微熱飲食如故數日後患水泄小便赤澀自服胃苓湯二劑泄不止而反見積又服芩連白芍木香檳榔輩二劑亦不效診之兩手浮弦沉按澀數此因表氣不舒致令裡氣不順偶值脾胃不調而作泄也乃以五積散微加白蔻仁木香二劑大汗而諸症悉愈董潯陽素有酒積因而患痢雖奉養豐而稟賦厚而清涼消導過多今痢已少瘥而大便猶滯小便短數黃赤身時熱上壅頭面鼻塞耳聾眼昏口燥脈之浮大而數按之而駛或謂芩連滑石但可清下焦之火當以涼膈散清上焦以佐之且謂脈尚洪盛未可議補陸曰公平日脈頂指洪盛以今日較之已弱極矣凡九竅不利由於陽氣上盛而致則當清瀉若由於腸胃之所生則當補斂今瀉痢久數用清涼消導之劑腸胃有不虛乎夫中焦氣血不足多致虛火上炎下迫用人參白朮補氣為君當歸白芍養血為佐五味麥冬棗仁斂耗散之氣以為臣甘草茯苓緩以滲之以為使待上焦既清而後提其下陷之陽則便實溺清而通暢矣服二劑之後再以補中益氣加減服之全愈陸肖愚治吳南邱八月間醉飽後御內明日患痢晝夜百餘次赤白相間其狀如爛肉腹中溫溫作痛四肢厥冷脈之緩大無力兩尺脈尤弱謂此症即宜補塞先書人參肉果二味其子大駭謂無積不成痢豈有隔一二日間即用補塞者不得已姑與調氣養榮湯服之病無進退更醫遂投以芩連檳榔木香等藥腹痛如劙足厥如冰冷汗氣促食入即從大便而出色尚未變再亟診身體不能轉側大便如流猶幸脈與神氣未變因用大料人參附子理中湯加肉桂肉果服之一劑痛減數劑足溫泄瀉少止後用人參至二斤始起鬚髮盡落鞠二府九月間赤痢腹痛裡急後重或用芩連檳榔白芍滑石一劑痛覺增二劑痛更甚乃謂醫曰通則不痛汝為我用大黃下之醫唯唯幸其公子力爭不可診之面赤戴陽唇若塗朱舌白滑無苔所下有瘀血如豆大者數十枚如淡黃而溏其脈浮按微數而大沉按遲而無力曰此痛乃寒也當以溫熱解之蓋脈無熱象大而無力者為虛寒痢赤為熱色晦而便溏者為虛寒用白芍五錢醇酒炒數次薑炭二錢炙甘草桂附各一錢木香五分棗二枚一劑痛減能即臥二劑痛止改加升麻參耆數劑而後重瀉痢併除矣朱丹溪治青田人下痢紅紫血下墜逼迫不渴不熱用白朮白芍各一兩陳皮枳殼歸身滑石各半兩甘草炙二錢桃仁三十六個分八帖下實腸丸三十粒許叔向曰陳侍郎經中庚戌秋過儀真求診初不覺有疾及診視肝脈沉弦附骨重取則牢豫曰病在左脅有血積必發痛陳曰誠如是前某守九江被召冒暑泛長江暨抵行朝積血一塊大如杯旬日如碗大痛發則不可忍故急請公視以歸耳奈何豫曰積痢不強止故積血結於臍脅下非抵當丸不可渠疑而不肯服次年竟以此終鄭奠一治江南臬司多公患噤口痢粒米不進令服牛乳久之而瘥陸祖愚診吳翔高年近七旬秋初患痢起於醉飽房勞診之容顏黯滯六脈弦緊此形症不足脈候有餘明是陽亢陰微須用參附挽回否則不出三日滿座鬨然醫者從而和之乃投以鼎串之藥燒熱草頭令病人聞吸以開胃氣次早痢果減六七漸進薄粥談笑吟詩大有起色閲二日而訃音至矣陳三農治一婦久痢不止口乾發熱飲食不進猶服香連等藥完穀不化尚謂邪熱不殺穀欲進芩連數日不食勢正危迫診之脈大而數按之極微詢之小便仍利腹痛喜手按此火衰不能生土內真寒而外假熱也小便利則不熱可知腹喜按則虛寒立辨亟進附子理中湯待冷與服一劑而痛止連服數劑而愈撫州銅客病痢甚危懸五十金酬醫太學生倪士實授一方用當歸末阿魏丸調白湯送下三服而愈續金陵瑣事胡竹亭授一治痢方用黃花地丁草搗取自然汁一酒杯加蜂蜜少許服之神驗薛立齊治崔司空年逾六旬患痢赤白裡急後重此濕熱壅滯用芍藥湯內加大黃二錢一劑減半又劑全愈惟急重未止此脾氣下陷用補中益氣送香連丸而愈馬元儀治一人年逾古稀下痢膿血調治半年不愈脈之左見弦澀右關尺微濡按之則幾微欲絶此脾腎俱虛之候也脾主轉輸腎主二陰二臟不治將何恃為健運蟄藏之本耶病久年高所喜發言清越神氣明爽雖危可治用人參三兩熟附三錢服後三四時許覺周身肌肉脹不可忍疑藥之過急召診則右關尺俱透按之有根曰脈透者氣充於內也肌脹者氣達於表也前方少減附子連進五劑痢減半糞微溏再服症減七八但小便少微渴與五苓散減桂加參小便如泉再以補中益氣調理兩月而安系純用陽藥之過後之口微渴亦由於此得茯苓豬苓等引參力下降故小便即利病雖愈非正治也凌伯尹患痢兩月不止百治益甚診之右關尺虛而結滯胸中有塊突起如拳水漿不得下咽是噤口矣曰此症屢經誤治邪未得除而胃氣已傷客邪乘虛結於心下與痰飲相搏而成痞水不得下咽者土虛不能勝水且以寒飲內格而不入也與半夏瀉心湯二劑結塊漸平再劑而症減七八漸進粥飲蓋外邪挾內飲相結其留連膠固有非一表一里所能盡者攻之則正愈傷補之則痞益甚然舍此則治法何從而施乃用人參大棗以安胃氣之虛而加炮薑半夏黃芩黃連以滌痰治邪而成傾痞之用正如良吏治民威惠兼著而治功成矣包瑞溪學憲傳治血痢痛甚方白芷酒炒五錢此一味仲淳加入者枳殼槐花同炒去槐花五錢升麻醋炒七分真川連薑汁炒五錢滑石末三錢乳香沒藥各七分五釐山楂肉三錢甘草五分試之神效廣筆記黃聚川年兄太夫人年八十餘偶患痢胸膈脹絶粒數日豫以升麻人參黃連蓮肉方投之參用至一兩諸子駭甚再問豫曰遲則不救一劑啜粥再劑腹中響一泄痢即止今年九十餘尚健也同上陳赤石督學因校士過勞感冒遂滯下純血醫皆難之陳刺史曰此非繆仲淳莫能療也使者旁午得之吳門一日夜馳之武林診知其所由遂用人參五錢升麻七分炙甘草紅曲各錢半烏梅二枚川連三錢白芍二錢蓮肉二十粒煎調滑石末五錢二劑而愈督學曰痢止矣心搖搖不能閲卷奈何仲淳曰此勞心太過暑因客之耳加竹葉乾葛棗仁一劑遂平同上庚子秋華氏妹歸寧忽痢日夜幾百行身熱發嘔一嘔數十聲不絶吳醫爭欲下之且曰補即死矣時仲淳以先王母病留湖濱憐其促治後事甚亟曰既以知危何不以藥試之服如金丸一味黃連薑汁和丸因思飲豫固守仲淳前方以人參炒白芍扁豆升麻滑石炙草橘紅煎下如金丸二劑勢稍定更數服愈華水部至今感服同上一少年貴介暑月中出外飲食失宜兼以暑熱遂患滯下途次無藥病偶自止歸家腹痛不已遍嘗諸醫之藥藥入口痛愈甚亦不思飲仲淳視之曰此濕熱耳其父曰醫亦以濕熱治之而轉劇問投何藥曰蒼朮黃連厚朴枳殼陳皮等仲淳曰誤也術性溫而燥善閉氣故滯下家忌之郎君陰虛人也尤非所宜更以滑石一兩為細末丹皮汁煮之別以白芍酒炒五錢炙草二錢炒黑乾薑五分水煎調服依方服之須臾小便如注痛立止同上秦公藩病痢醫誤投澀藥一劑痢止濕熱無自而出遍攻肢體骨節間以致項強目赤肩臂腕膝足脛俱發腫痛甚不能轉側仲淳疏方寄之用白芍石斛牛膝木瓜黃柏苡仁炙草車前茯苓痛雖止尚不能轉側更用蒺藜菊花首烏胡麻黃柏炙草復逾年愈其始病時一醫稍投參術痛極欲死此係本症陰虛有火又加濕熱暑濕交攻故現此症名痢風陰虛有火故不受補又不宜燥惟微寒清平之劑調之久之自愈同上姚公遠幼子病痢醫誤下之遂下純血喘身熱不思食繆以人參四五錢石蓮子白芍升麻橘紅甘草滑石殭蠶白扁豆同上立齊治一小兒患痢驟用澀藥致大腸經分作痛與扁豆滑石末炙甘草投之一劑喘平血止又數劑痢止囑曰兒百日不出痘則生以下多元氣未復故也未幾即毒流於隧道之中以四物湯加桃仁酒芩紅花升麻枳殼陳皮甘草治漸愈因年幼胃弱竟至不起又一患者亦用澀藥環跳穴作痛與前藥去升麻陳皮甘草加蒼朮黃柏柴胡青皮生薑十餘劑少可更刺委中出黑血而愈如手蘸熱水拍腿上有泡起挑去亦可不若刺穴尤速效也委中在膝腕中央橫紋中動脈便是仲淳之弟稚端幼病痢日夜數十次用人參三錢吳茱萸湯泡七次一錢川黃連薑汁炒一錢後二味飯上蒸煎服如受以藥一匙間米湯一匙漸漸飲之如頭疼發熱加寒水石六錢乾葛一錢別調六一散四錢冷水服數劑即愈虞元靜房中人方孕五月患滯下腹痛日下數次用川黃連四錢白芍三錢黃芩三錢白扁豆二錢蓮子四十粒橘紅一錢五分枳殼三錢紅曲二錢乾葛一錢五分升麻五分炙甘草一錢烏梅一枚甫飲一鍾即覺藥行即解一次痛亦隨止滯下全愈韓戶部左臂患一紫泡根畔赤腫脈大而芤謂芤主失血或積血韓曰血痢未瘳以芍藥湯二劑更以人參敗毒散二劑瘡痢並愈沈明生治吳君一媳患痢四十餘日食少倦怠原醫以日久困憊當從補治無復可疑延診謂其染患以來膏粱未嘗一日去口則舊積未除新積復起形雖虛而症固實也日雖久而積固新也治法應與初症同先進導滯丸二服嗣用補消兼進仍囑其清虛調養後果全愈由此觀之初中末三法有難盡拘而望聞切之外不可廢問且吳俗有飽不死痢疾一語恣啖肥甘惟恐弗及何異藉寇兵而資盜糧耶蔓延日久馴致證實形虛欲補形則礙其證欲攻實則慮其虛始也求其多食而終至於不能食良可憫也因志之以戒夫世之患痢而不慎口腹者章素文母秋間患滯下脈與症本皆輕淺乃過於慎重泥高年不可寒涼之說更醫至再亦惟將順主人致令綿延不已最後延診力矯前非竟以黃連主治得瘥時有童鳴佩章石交也亦久痢亟以沈薦且言治此恙者莫過於沈而沈之善用亦莫過於黃連一味耳即診即告曰是診非附子弗痊章訝之謂童利下之色與夫作痛溺澀日期近遠頗與前症相類何用藥水火如是曰辨症不多岐但須一矢破的童之滯下並證皆似乎熱而詢其每欲圊時必先腰痛一語而得病根矣夫腰為腎主二便乃胃家北門鎖鑰之司也虛則不能閉藏是以每欲更衣輒先作痛非與腹部之痛隨利減者可同日而語向皆用寒涼蕩滌主治疾何瘥於是先以理中補中相合為劑嗣以八味丸益火之原果得奏續嗟夫症同治異孰謂可概施一法也哉雄按腰痛固為腎虛之證據然須辨別陰陽不可概以桂附為主藥也今秋王雨蒼室患此兩旬延余視之腰痛腹墜溲少口乾煩躁面紅知飢不寐脈至弦數左甚而痢不赤白略無糞色相兼及至更衣又極艱澀且無痢色相雜溫補宣通皆無小效稍佐升清胸即痞塞詢其月事因痢愆期余謂能食便堅腑氣無滯陰虛肝旺管液旁流與蓯蓉杞子烏鰂鮑魚阿膠秦皮黃柏柏子仁白頭翁銀花投劑即減繼加熟地歸身龜板鹿角而愈吳有聲云壬寅秋豫病痢而劇郡治逾月氣息奄奄色毀骨瘠望者卻走明生先生至診視之則曰是何中暑之深也家人疑之謂豫安坐書齊足不出戶奚暑之乘先生決之於指斷之於心遂投以涼劑一服即有效不數日而全愈蓋豫夏間曾制地黃以酒漬之每日必出諸酒而曝之烈日之中至夕仍返而漬之於酒如是者幾一月豫愚甚以為地黃之精神盡在酒也取而飲之而不知炎威之毒漸蓄於酒者早已入余之肺腸此家人所不知即豫亦未悟逮病愈而推之始得而先生獨知其中暑之深則其視病可不謂神焉者哉聶久吾曰痢為險惡之症生死攸關然古今治法多罕十全豫以經驗既多漸悟病機乃自制此方所向輒效遂刊布廣施全活甚衆第服者藻須地道尤不可任意加減耳方用川黃連條芩生白芍山楂肉各五錢陳枳殼炒檳榔厚朴薑汁炒青皮各八分當歸甘草地榆各五分紅花酒洗三分南木香二分桃仁泥一錢水二碗煎一碗空心溫服渣再煎此方或紅或白或紅白相兼裡急後重身熱腹痛者俱可服其有便純血便如塵水大孔如竹筒等惡症古謂不治者急服此亦可救但遲緩則毒壞臟腑為難救耳其有噤口者毒在胃口也此藥煎一劑分五六次緩緩服之令胃口毒氣漸開服完一劑後不惟藥可進而飲食亦漸可進矣不必另用他藥也單白無紅者去地榆桃仁加去白陳皮四分木香用三分滯澀甚者加酒炒大黃二錢服一二劑仍除之此方用之於三五日神效旬日內外亦效惟半月外則當加減如後黃連條芩白芍三味生用各四分酒炒各六分山楂肉一錢厚朴陳皮青皮檳榔各四分甘草生熟各一分半地榆醋炒當歸各五分桃仁泥六分紅花六分木香二分如延至月餘覺脾胃虛滑者則用酒炒苓連白芍各六分陳皮厚朴木香各三分醋炒地榆四分紅花二分當歸人參白朮熟甘草各五分以上方法用無不效間有不效者必其初投參術等補劑太早補塞邪熱在內久而正氣已虛邪氣猶盛欲補而澀之則助邪欲清而疏之則愈滑遂致不救豫嘗治一公子一仕宦皆早投溫補不可挽回故表而出之以戒後人魏玉橫曰張龍文年三十來九月患痢至十二月未瘥已無腹痛後重服補中益氣則不及至圊且下轉數延豫治與熟地杞子白芍棗仁米仁等初甚逆膈脹而痢且五色幸彼能守藥弗更張再進而痢遞減矣洎歲暮已向愈脈之兩關滑大重按則弦戒之曰藥未可停恐立春後病再發已而果然其鄰醫就余方加補骨脂砂仁木香廣皮之類與之了不應且昏睡而多汗至四月中再求診則以前方加沙參麥冬蔞仁黃芩未二十劑而痊後環跳穴及趾踵痛流注無定所狀如痢後風仍以前方加知柏川連數劑而安濮氏子住湧金門外甚貧窘患久痢脫肛諸治不效乃入城就豫診雖相去二三里途中必數登廁肛既不收行步殊苦與補中益氣湯加熟地一兩炮姜一錢服二劑竟愈範秀才年近七旬戊子二月患寒熱原有痢病至是胸脅少腹無不痛楚下痢紅白一名醫治之有年其邀余診蓋乘便耳其脈弦數所喜者滑詢其小便短赤此純屬肝火下迫似痢而非痢也必多服香竄又值君火司天少陽當令於是乘其所勝而侮其所不勝所下皆太陰血津陽明脂膏也與生女貞沙參麥冬川連蔞仁一劑已愈其半而名醫曰七十之年可服黃連之苦寒蔞仁之滑泄乎今下痢而不與調氣健脾而反用滋陰潤肺此何治邪範乃拘儒復聽之治又一月將斃矣再延診仍前方加杞子白芍甘草數劑痢止痛除而愈痢原有傷燥而致者魏君所治皆其證也裴兆期治其母年七十時於除夕忽病痢痢之頻不可以數計神昏不語發熱面赤氣奔迫而脈洪大以虛痢下頻而滑無裡急後重之症以人參蓮肉各一兩砂仁一錢濃煎頻服至五日痢減神清遂素食矣自此日用補中益氣湯加桂附少許至四十餘劑始得飲啖神情俱如故一士人冬月患痢晝夜百餘次裡急後重噁心不能食腹中按之硬痛脈細數無倫手足面鼻俱清冷投以人參一兩桂附乾薑各一錢不食頃已再進竟不見溫補之驗後倍加掛附二劑手足漸溫噁心漸止飲食亦漸進特痢未減更以人參為君之大補脾丸加入桂附俾旦晚服之以扶胃氣而加飲食此治本之第一要圖也半月中約服人參八九兩附子三枚脈始洪長有力口復燥渴而思冷飲是陰已化陽仍用大黃黃連檳榔芍藥之類滌去腸中宿垢後以加減參苓散作丸與之遂愈葉天士治徐某夏季痢症多是濕熱食積初起宜分消其邪但肌柔白嫩乃氣虛之質且性情畏藥只宜少與勿過檳榔汁青皮陳皮厚朴川連黃芩木香炒黑山楂又診濕熱下痢必用苦辛寒為治粟殼澀腸止瀉久痢成方當此熱邪未清宣通斯滯可去因色白氣弱未敢峻攻耳厚朴黃芩川連木香汁山楂肉炒銀花麥芽王某案痢疾古稱滯下乃是濕熱氣薄腸胃阻閉氣分故利仍不爽河間丹溪僉用清熱導氣者為此黃芩川連草決明炒黑山楂肉生白芍石蓮丹皮廣木香汁顧某得湯飲腹中漉漉自痢稀水平昔酒客留濕濕熱內蘊腸胃凝積不爽東垣清暑益氣亦為濕熱傷氣而設但脾胃久病仍能納食當苦味堅陰芳香理脾生茅朮四兩炒黑黃柏二兩炒黑地榆二兩豬苓一兩半澤瀉一兩半水泛丸服三錢徐靈胎曰此挾飲之痢方極靈妙治紅白痢忌用川連宜用車前草炒研二錢檳榔山楂陳皮滑石甘草各一錢紅曲三錢枳實炒一錢澤瀉炒二錢燈心一撮廣木香六分煨共為末每服三錢烏藥煎湯沖服一人陰虛發熱下痢赤白至夜煩渴不寧或用涼血攻積藥而死一人陰虛發熱下痢五色胸中常覺飢狀得食則脹或用補中益氣湯而死一人陰虛發熱下痢不食郭友三用豬苓湯黃連阿膠湯而痊張飛疇曰世患陰虛下痢者頗多未有不發熱不煩渴不畏食不見紅不夜甚者蓋陰氣內亡勢必虛陽外擾故治陰虛之痢涼血死攻積死補氣亦死惟清解熱毒兼滋陰血庶可保全此用仲景少陰例中救熱存陰之法與金匱治産後下痢虛極用白頭翁加甘草阿膠湯不殊也廣筆記曰凡治滯下與大腸滑泄自利不同滑泄自利不止有可澀之道故古人有間用粟殼訶子以止之者若夫滯下本屬濕熱澀滯不行法宜疏利藥忌兜澀大腸者肺之腑也大腸既有濕熱留滯則肺家亦必有熱肺乃華蓋之臟經曰脾氣散精上歸於肺通調水道下輸膀胱是肺氣喜通利惡閉澀故古人藥性中每云利肺氣其意概可見矣倘誤用澀藥使濕氣無所宣泄肺氣不得下降非惟滯下增劇而濕熱熏蒸上干乎肺則脹悶氣逆不得眠不思食諸證至矣外有時行疫痢一症往往夏末初秋沿門闔境患此其症大都發熱頭痛口渴煩躁下痢溺澀甚者一日夜行百次或兼發斑疹勢甚危迫世醫妄指為漏底殊不知此是時氣使然治法當清熱解毒表散為急如升麻葛根柴胡黃連黃芩之類或熱甚渴甚前藥中可加寒水石更有別證以意加減切忌下行破氣收澀如大黃芒硝檳榔枳實烏梅粟殼等犯此者多致不救治毒痢及發疹時疹毒下痢方鮮金銀藤數兩煎濃汁三大碗入地榆五錢川黃連槐花濕拌炒四錢黃柏二錢黃芩二錢白芍酒炒三錢炙甘草二錢緑升麻醋炒六分同煎至一碗調飛過滑石末五錢不拘時服瘧痢李易安金石録後序言其夫趙明誠因途中奔馳冒暑至行在旅邸病痁豫聞信驚怛念渠性素急病痁患熱必服寒涼藥病可憂遂解舟下一日夜行三百里比至果大服柴胡黃芩瘧且痢遂以不起柴芩自是少陽藥用之不當便能為患然藥不對病雖甘草茯苓亦足殺人也萬密齊治汪氏媳病瘧且痢用小柴胡合桂枝湯加當歸陳皮二十餘劑瘧愈隨以黃芩芍藥湯加人參治痢不效再思之悟曰此病得之內傷名為白蠱乃用升陽除濕防風湯一劑而安陸肖愚治王笠云八月間患瘧服藥已愈後飲食不調大便瀉而變痢一日夜約一二十行皆積滯無糞腹痛後重身熱夜不安醫以芩連木香檳榔等藥投之益甚脈之左手浮弦而弱右手沉數而微曰此瘧之餘邪也當解經絡中邪熱則大便自固乃以機要防風芍藥黃芩湯加柴胡二劑身熱腹痛頓止後以調氣養榮湯數劑精神如故孫文垣治董潯老家馬廚七月初旬患病二十餘日勢轉劇詢其症曰大發寒熱寒至不憚入灶熱至不憚入井痢兼紅白日夜八十餘行腹痛惡心汗多神氣倦甚問其脈曰脈不吉下痢脈洪大者死細微者生今洪大逆也孫曰痢固忌洪大寒熱亦非細微所宜其中必有故往診其脈察其症果如所言面色微紅汗淋淋下究病所由起謂客來衆廚間燥熱食瓜果菱藕過多晚又過飲接內寢於檐下次日即寒熱腹痛因而下痢與人參白朮石膏滑石各五錢知母炮姜各三錢大附子炙甘草各二錢大劑煎之飲訖即睡或問曰服後何狀為佳曰倘得一睡則陰陽和和則汗可斂寒熱嘔惡可止也夜來痢減半汗吐全無脈亦斂矣再用人參石膏白朮白芍滑石各三錢炮薑肉桂知母各二錢炙甘草附子各一錢服後瘧止痢又減半飲食漸進神氣漸復改用酒芍五錢人參白朮滑石各二錢甘草陳皮炮薑肉桂各一錢三劑痢全止而痊或問寒熱均投此何症而劑何名也笑曰此滑公所謂混沌湯也經云夏傷於暑秋必瘧痢白虎湯益元散主之瓜果寒涼傷其中氣酒後御內損其下元附子理中湯正所以溫中補下者經又云實者邪氣實也故以白虎益元應之虛者正氣虛也故以理中湯應之若以寒熱均用為疑則仲景附子甘草瀉心湯既用大黃黃連又用乾薑附子此何說哉蓋假對假真對真也孫文垣治臧茗泉脈左弦數右寸弱關大重按則滑右尺微原以瘧後復傷飲食大便瀉而變痢日夜只五六行皆積滯無糞腹疼後重難堪午未後發熱天明始退此夏傷於暑秋成瘧痢也其熱仍瘧之餘邪當先解散然後以補劑投之則痢自愈矣與神授香連丸一服腹中腸鳴須臾大便行較前更多且有糞下改以白芍四錢澤瀉黃連各一錢滑石二錢甘草桂枝木香各四分山楂七分兩日後與補中益氣湯加木香黃連白芍調理半月而瘥張路玉治故友子觸疫瘧之氣染患月餘不止左右乏人失於調理致愈而復發加以五液注下瘧痢兼作水穀不入者半月餘乃攜歸齊中日與補中益氣兼理中六君萸桂之屬將養半月而愈李士材治一士冒暑勞苦患血痢危甚用黃連當歸烏梅滑石各五錢香薷三錢甘草一錢而愈症治大合醫案陸祖愚治姚可儀祖母年七十精力過人勤勞不倦忽於夏月怒後感冒風涼兼傷飲食頭疼骨痛寒熱大作寒則重衾熱則冷飲或以其年高病重攻補兼施遂腹痛譫語煩躁脈之洪弦而緊謂高年而脈乃如是病正進也須雙解表裡之邪遂用柴葛二陳枳桔楂朴芩蘇加生薑二劑表症稍減腹仍痛下痢紅白裡急後重日夜去積三十餘次脈亦未減乃用潤字丸一錢香連丸和服日夜三服兩日後痢減半惟臍之上下痞滿又用檳榔青皮木香澤瀉木通芩連滑石之類五六劑方得燥矢與積同去病又減二三仍用香連丸二錢日進二服數日積除痢止改投大補氣血之劑調理月餘而安韓延年長子初患咳嗽已久至七月患瘧復變痢瘧仍未止或以尺脈短澀投養陰清補之劑診之擬加參附前醫不以為然後更數醫仍不外溫補止塞出入加減服參及四斤病雖減而元氣猶未復如故高麗醫人治疾用藥只一味兩味至三味則極多矣未有至四味者蓋藥惟性專則達二則調四則參與制再多則相牽而不能奏功偶傳治痢二方甚簡而驗今録於此治痢止二味色白者患寒其說未是用生薑一兩細茶五錢色赤者患熱用細茶一兩生薑五錢赤白雜者薑茶各五錢青皮三錢陳皮二錢酒一碗河水一碗煎至一碗溫服即愈李日華六研齊偶筆魏玉橫曰汪紹兄室人年五十餘新秋患淋祕小愈即勿藥初冬即自汗兩日遂寒熱成胎瘧醫略與消散不效將半月復增滯下腹痛後重日一二十行因見其脈如蛛絲聲微氣乏疑屬虛寒乃用二陳湯香砂蒼朴溫胃燥脾之劑十餘日舌苔盡黑多汗不眠遂辭去診之脈果沉微語殊輕怯然小便熱短胸膈痞悶瘧則熱多於寒痢則紅少於白此伏氣所發陳莝鬱積大腑為病也在金匱法宜下之但其稟賦甚弱三陰素虧不可峻治且前所服類皆溫燥故令積滯不行宜以潤滑甘寒之品導之用生地杞子麥冬蔞仁當歸木通白芍黃芩枳殼桔梗數劑覺去宿垢甚多又數劑而痢止瘧仍間日一作加痰嗽甚頻此腸胃既通餘熱挾虛火上竄也前方去枳殼當歸木通加沙參熟地地骨首烏之屬十餘劑黑苔始盡而寒熱除又數劑痰嗽亦止後因勞瘧復作用補中益氣去人參內熟地一兩一劑而愈愈後左關尺仍細弱向若峻下必生變矣當病甚時一專科與木香白朮炮薑補骨脂等亦幸而未服痢後風孫文垣治程氏子年十五夏月患痢醫治彌月痢止而筋骨腫痛痛處發熱晝輕夜重肌肉消飲食減有作白虎歷節風治者有作鶴膝鼓槌風治者痛甚診之脈皆細澀曰此痢後風也蓋由治痢不善以致寒濕穢瘀凝滯經絡日久血氣為痛所傷此症虛虛實實極難認處方亦不易欲補虛則腫愈劇欲疏通則痛愈甚惟局方大防風湯可用防風熟地黃耆人參白芍當歸杜仲各一錢白朮一錢五分羌活牛膝甘草茴香各五分川芎七分加姜三片服三十帖而安陳三農治一士痢後腰腿攣痛不能俯仰此腎虛風寒濕所乘也用獨活寄生湯二劑愈
