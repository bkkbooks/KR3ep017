body:
  text: 卷四傷風孫文垣治王祖泉乃眷朝飯後稍寒惡風發熱傷風惡風遍身疼痛汗大出不止傷風則有汗口中熱腹中不知飢小水短肺金不利而汗多也六脈皆澀營衛不和投以白芍五錢白朮二錢桂枝黃芩各一錢甘草八分二帖汗止寒熱除去白朮加當歸身痛亦愈費一吾弟婦遍身痛發熱汗大出昏昏如醉臥不能起孫診之兩寸短弱六脈皆數而無力此勞倦之餘故汗大走也身痛發熱不僅傷風黃耆三錢白芍四錢甘草一錢五分桂皮八分當歸一錢石斛二錢與前藥俱就建中加減孫於雜症多用此方一帖熱除痛汗皆止惟倦不能起前方加人參陳皮兩帖而痊一婦人先傷風發熱咳嗽二月乃分娩熱尚未退食雞汁肉等太早嗽熱愈盛已八日矣胸膈脹痛頭痛口渴大便祕肺氣壅而血液燥也咳出之痰色黑而臭小水短少脅下扯痛氣逆而喘不得臥左脅不能著席汗出不止症甚危以栝蔞五錢蘇子一錢枳殼酒芩各六分前胡桔梗各五分甘草三分薑三片制方甚妙服之胸膈之痛減半喘少定再進藥大便用蜜導下就方加減服之熱盡退諸症尋愈胡鏡陽尊堂年七十二脾泄十五年不愈近加吐紅咳嗽痰多不易出肺金壅滯可知申酉時潮熱胸膈壅塞不能就枕飲食大減且惡風終日坐幔中諸醫謂發熱吐紅法當寒涼脾泄多年氣虛老邁法當溫補二症矛盾難於投劑身熱脈大又血家所忌束於無策皆辭去孫診之兩手脈皆浮洪而數皆帶滑據脈洪數為熱滑為痰浮為風邪在表以傷風故惡風法當清解可無恙也謂二病矛盾者暗於先後也夫脾泄已久未嘗為害新病熱熾宜當速去所謂急則治標俟邪祛後補脾未晚且潮熱為風邪所致之熱非陰虛火動之熱吐血乃當汗不汗之血非陰虛火動之血經云奪血者無汗奪汗者無血當汗不汗邪鼓血動但得表解斯熱退血止矣胡曰昔老母過錢塘遇風濤受驚因發熱咳嗽血出痰多今以公言質之誠由風邪起病也用蘇子麻黃薄荷解表為君枳殼桔梗桑白皮栝蔞紫菀貝母消痰治嗽為臣酒芩甘草為佐二帖五更微汗而熱退胸膈不壅嗽亦少減血止大半始進粥次日減麻黃加茯苓夜服七制化痰丸嗽亦減半自是不惡風而去幔矣前方減枳殼加苡仁調理而安黃履素曰豫弱冠患傷風不謹床第每晨起即鼻中流涕竟日痰不絶口留連月餘遂見痰中縷血遺害無窮諺云傷風不醒結成勞蓋金水二臟情關子母金傷則不能生水子瀉則其母愈虛水不能制火火乘金而金益敗此虛嗽之症所由成耳信乎傷風雖小病最不可不慎者故補脾保腎乃養生家第一義而肺病極宜斷色欲相關相應捷於影響也又曰豫臨場慮不耐風寒合玉屏風散服之反自汗津津不止蓋防風與黃耆各等分之謬也本草云黃耆得防風其功愈大用黃耆七分配防風三分斯得之矣凡傷風未經和解此方斷不可服慎之喻嘉言治石開曉傷風咳嗽未嘗發熱自覺急迫欲死呼吸不能相續診之見其頭面赤紅躁擾不歇脈大而空謂曰此證頗奇全似傷寒戴陽症何以傷風小恙亦有之急宜用人參附子等溫補下元以收回陽氣不然子丑時一身大汗脫陽而死矣渠不以為然及日落陽不用事愈慌亂不能少支忙服前藥服後稍寧片刻又為床側添同寢一人逼出其汗如雨再服一劑汗止身安咳嗽俱不作詢其所由云連服麻黃藥四帖遂爾躁急欲死然後知傷風亦有戴陽症與傷寒無別總因其人平素下虛是以真陽易於上走矣傷風而服麻黃至四劑即壯實人亦不能無害矧下虛者哉雄按原有一種雖似風實非傷風乃下元根久虧腎水泛濫以為痰浮陽沖激而成嗽也今夏余偶診高石泉之脈左關尺浮弦而空因謂其仲郎雋生曰令尊之脈甚可慮也既而無恙逮雋生舉於鄉計偕有日而石泉陡患傷風馮某為之解散次日便瀉多次黃某為之分清第三日痰升氣逆自覺唇腫不能吸飲速余視之唇何嘗腫而舌色晦黯無津脈似蛛絲欲絶乃陰脫於下陽越於上也藥不能追已而果逝洪張伯孝廉令堂病同此餘一視而決其不治蓋雖似傷風而脈先虛促難尋也旬日果敗皆十二月春前事也聞許吉齋山長秋分後傷風數日而亡諒亦此類耳盧不遠治嚴忍公內人病發熱無汗傷風亦多無汗嘔吐不止脈反沉弱傷風脈當浮今沉故曰反人皆以為少陰症盧脈之沉弱中獨右關表弦而中滑蓋風邪挾胃中水飲停積所致用乾葛半夏吳萸黃連急煎緩服嘔吐遂止而熱轉盛復診視脈勢欲浮命其進粥皆不敢再三強之呷濃米飲半杯遂有汗而熱平再進薄粥汗多而熱退乃問曰風寒之邪世俗大禁飲食今啜粥而熱退何也曰風之與寒原自有別世蓋溷之耳仲景桂枝湯治風服已啜粥古人之精義也蓋風者木也木剋土脾胃受之仲景治法妙在不治風木但令濕土氣行而風木之邪自散今熱轉盛而脈勢欲浮是風邪欲散也非穀氣揚溢則胃力孱弱汗何從來是借桂枝之義以除風邪之不能汗者按傷寒及感症日久津液既枯不能行汗得大三才一氣湯一服乃蒸變為汗而愈矣若多服風藥及香燥等藥人必大作脹一二時許然後來蘇後賢以此為內托之奇豫謂仍是仲景啜粥法耳後人安能越古人之範圍哉吳孚先治盧敬庵暑月感寒服羌防發散汗出已愈後復感冒又用發散旋愈旋感前藥不應吳曰屢散不愈肺氣已虛徒攻表而不救表風邪乘虛而入無已時矣方用君黃耆五錢實肺氣以固衛佐防風一錢助耆力以祛邪玉屏風散如是則舊邪無所容而新邪無可入也二帖而痊愚謂傷風一症殊非小恙有寒燠不時衣被失節而成者此必鼻塞聲重咳嗽多痰在元氣平和之人即弗藥自愈若在腎水素虧肝火自旺者不過因一時風寒所束遂作乾咳喉痛此外邪本輕內傷實重醫者不察肆行表散致鼓風木之火上炎反令發熱頭痛繼又寒熱往來益與清解不至十劑肝腎與肺傷損無遺久者周年近者百日溘然逝矣而世俗談者咸以傷風不醒便成勞為言噫彼勞者豈真由傷風而成也耶愚哉言也當易之曰傷風誤表必成勞耳雄按損由外感而成者甚多雍干間歙人吳澄字師朗著不居集一書專論外損自成一家惜用藥未盡善耳柴嶼青曰乙丑新正張妹壻家人之壻董四患傷風來寓求診即決其不治內人曰彼少年粗人傷風小病何遽若此柴曰脈象已敗不可為也後果然此必肝腎大傷之候也張三錫治一人傷風自汗發熱不止自以為虛服補中益氣湯熱轉劇診之脈弦而長實有力與升麻葛根湯倍白芍加桂枝少許一劑汗止熱退治法匯一人瀉而左脈浮急自汗鼻塞乃傷風作瀉也與五苓散加防風白芷升麻葛根薑蔥煎服同上陸肖愚治吳遜齋夫人年六旬外素有脾泄之症三月間患咳嗽吐血痰多而咯之不易出日潮熱胸膈支結不能就枕畏風寒或以脈數吐紅身熱咳嗽皆血虛火盛也與養血清涼泄未已而痰壅益加更醫以高年久瀉用六君子瀉未已而痰壅殊甚二醫商治一以吐血不宜身熱脈大一以泄瀉不宜身熱脈大俱辭不治脈之左寸關浮洪右寸關滑數兩尺弱此表邪不清也蓋脾泄乃宿疾吐血乃表氣之郁矣詢之果受風數日後而病作用炒黑麻黃蘇葉前胡解表為君杏仁蘇子陳皮利氣為臣桑皮片芩花粉石膏清熱為佐甘草桔梗散膈和中為使二劑後微汗症頓減去麻黃蘇葉石膏加白芍茯苓二劑症如失與丸方治其脾瀉人參白朮茯苓為君白芍霞天曲為臣炙草乾薑砂仁為佐棗肉神麯糊丸以為使服數旬而痊陸祖愚治陳理刑因勞頓後頭疼鼻塞咳嗽胸膈不利咽乾身熱行動即有微汗有痰不能咯出兩寸浮弦而數左關弦緊右關弦滑兩尺平和先用疏解和氣二劑繼入養血二劑二三日間諸症頓愈薛立齋治一婦人素清苦勤於女工因感風邪自用表散之劑反朝寒暮熱自汗盜汗形氣甚虛其脈或浮洪或微細其面或青白或萎黃此邪去而氣血愈虛也用十全大補湯三十餘劑漸愈又用加味逍遙散兼治半載而痊琇按傷風誤表多成勞損觀此可鑑林觀子治一婦人浴後被風遂自汗出身熱然無頭痛體痛惡風諸症旬日來雜治皆不效其胸以上痞隔漸至湯飲到喉而止脈之關以上微浮此瓜蒂散症也其人素虛與桔梗蘆二兩煎服到咽一吐悉涎濁酸穢之物又與一服再得吐始快然熱除調理數日而安毛氏子傷風喘嗽復以飲食起居失調遷延轉劇診之面色枯白夢泄不禁飲食減少喘嗽發熱兩脈虛微知其喘為真氣上脫熱為陽氣外散不與陰氣純虛者同面色枯白脾肺氣虛而不榮也飲食減少脾胃氣弱而不化也夢泄不禁腎臟氣衰而不固也此皆本氣為病用人參二錢黃耆三錢肉桂五分炙草五分茯苓一錢半曲一錢橘紅八分服數劑喘漸平熱漸退隨與大造膏調理飲食進而神旺如初朱翰文偶患風寒小疾或以麻黃大發其汗汗出不止遂致語言短怯神氣不收面色枯白時有寒熱已瀕危診其兩脈微澀而虛虛則氣少澀則陰傷此元氣津液兩傷之候也傷風小症何遽至此蓋以麻黃辛甘氣溫為傷寒發汗重劑今不當用而用之不特劫其津液外亡並元氣亦因而脫矣治法宜陰陽兩補用人參制首烏茯苓白芍丹皮甘草廣皮半夏曲等三劑脈象有神諸症漸已漸加耆術而安與喻嘉言案合參劉云密曰丁酉臘人病頭痛惡風鼻出清涕兼以咳嗽痰甚一時多患此用冬時傷風之劑而愈者固多然殊治者亦不少蓋是年君火在泉終之氣乃君火客氣為主氣寒水所勝經曰主勝客者逆夫火乃氣之主雖不同於傷寒之邪入經然寒氣已逆而上行反居火位火氣不得達矣所以雖同於風投以風劑如羌活輩則反劇蓋耗氣而火愈虛也至於桂枝湯之有白芍固不得當即桂枝僅泄表實而不能如麻黃能透水中之真陽以出也故愚先治其標用乾薑理中湯佐五苓散退寒痰寒水之上逆乃治其本用麻黃湯去杏仁佐以乾薑人參川芎半夏微微取汗守此方因病進退而稍加減之皆未脫麻黃但有補劑不取汗矣病者乃得霍然聶久吾曰一友以醫自負稟性素熱慣服涼藥在京朝覲因傷風久咳求治於豫豫曰咳因風寒必先除寒邪而後可以清熱先用桑杏麻黃防風等藥彼自是己見以為素不用燥藥單用梔芩花粉等涼劑服多一日聲啞不出復求治乃戒之曰公能任吾意用藥勿參己見則聲可立出若必自用不敢與聞彼不得已而聽豫因與加味三拗湯一劑畢而聲出矣杏仁二錢五分生甘草五分羌活桔梗各八分防風一錢生薑三錢水煎帶熱服魏玉橫治孫敦夫女十歲許冬日感冒微嗽專科與發散太過反致身熱不退更醫投六君子加炮薑五味一劑熱退矣而咳嗽轉甚下利頻並裡急後重中有白膿醫以熱退為藥對症再與之則面赤口燥惡食不眠余適診其大父因求視脈之虛而駛曰四劑可愈然必少衄血與生熟地杞子各四錢天麥冬蔞仁各錢半乃詫曰今病已泄瀉又從而滑利之寧不增劇乎余笑曰第服之病自減乃始進半鍾覺咳嗽稍瘥遂連進三劑果愈四五再以前方加酒芩酒芍各一錢不二劑衄血一小盞全安或問故曰兒稟素弱所病即俗名火傷風也不治亦愈乃以荊防廣半芎蘇前桔諸燥藥鼓動三焦之火至陽擾而熱盛後醫謂虛是矣宜以甘寒潤澤與之則症自平乃用六君燥補加以炮薑之辛溫五味之酸斂藉人參之力而熱退其內燔之火盡入於肺若傷寒傳裡然肺熱甚則下迫大腸而為痢矣其中白膿乃燥金壅熱所化與痢疾正同茲但養其榮氣潤燥清熱病自愈也又問何以知其當衄曰初時下痢則火從下泄痢止餘熱反走諸絡而上溢否則炮薑五味之性何由稍釋其衄也亦猶傷寒陽明熱邪得紅汗而解矣尤在涇曰評熱病論云勞風法在肺下其為病也強上冥視唾出若涕惡風而振寒治之奈何曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出清黃涕其狀如膿大如彈丸從口中或鼻中出不出則傷肺傷肺者死矣讀此可悟傷風不解成勞之故勞風者既勞而又受風也勞則火起於上而風又乘之風火相搏氣湊於上故云法在肺下也肺主氣而司呼吸風熱在肺其液必結其氣必壅是以俯仰皆不順利故曰當救俯仰也救俯仰者即利肺氣散邪氣之謂乎然邪氣之散與否在乎正氣之盛與衰若陽氣旺而精氣引者三日次五日又次七日則青黃之涕從咳而出出則風熱俱出而肺無恙矣設不出則風火留積於肺中而肺傷肺傷則喘咳聲嘶漸及五臟而虛勞之病成矣今人治勞日用滋養而不少益者非以邪氣未出之故歟而久留之邪補之固無益清之亦不解虛勞病之所以難治也徐靈胎曰凡人偶感風寒頭痛發熱咳嗽涕出俗謂之傷風非傷寒論中所云之傷風乃時行之雜感也人皆忽之不知此乃至難治之疾生死之所關也蓋傷風之疾由皮毛以入於肺肺為嬌臟寒熱皆所不宜太寒則邪氣凝而不出太熱則火爍金而動血太潤則生痰飲太燥則耗精液太泄則汗出而陽虛太澀則氣閉而邪結並有視為微疾不避風寒不慎飲食經年纍月病機日深或成血症或成肺痿或成哮喘或成怯弱比比皆然誤治之害不可勝數諺云傷風不解變成勞至言也然則治之何如一驅風蘇葉荊芥之類二消痰半夏象貝之類三降氣蘇子前胡之類四和營衛桂枝白芍之類五潤津液蔞仁元參之類六養血當歸阿膠之類七清火黃芩山梔之類八理肺桑皮大力子之類八者隨其症之輕重而加減之更加以避風寒戒辛酸則庶幾漸愈否則必成大病又加以升提辛燥之品如桔梗乾薑之類不效即加以酸收如五味子之類則必見血既見血隨用熟地麥冬以實其肺即成勞而死四十年以來我見以千計矣傷哉張路玉治薑如農長媳患風熱咳嗽無痰灼熱自汗而懷妊七月先曾服和解清肺藥二十餘劑其咳轉劇胎漸不安診之六脈皆濡大無力右手寸關獨盛而澀曰此熱傷肺氣也反與和解藥逼汗出致肺氣益燥而咳逆愈甚不得已復用苦寒折之則火轉鬱伏而不散也遂用大劑葳蕤及川芎杏仁白薇甘草取葳蕤湯之半更以當歸桔梗五味黃耆益氣生津因以斂肺二劑汗止咳減胎亦向安更加生訶子皮一劑而痊鬱金岩勞役後傷風自汗胸滿痰結咳出青黃涕大如彈丸此即內經所謂勞風法在肺下也與茯苓桂枝白朮甘草湯加薑汁竹瀝二劑而安又治宋襄之女素常多郁乾咳春間感冒風邪咳逆愈甚以小建中湯用蜜煎生薑加蜜煎橘皮外邪即解而咳不止次以逍遙散仍用蜜煎薑橘更與異功散用蜜制白朮薑橘而安吳佩玉女傷風咳嗽自用疏風潤肺之藥轉加嘔渴咽痛診之六脈浮滑應指作半夏散與之三啜而病如失或問咳嗽咽痛而渴舉世咸禁燥劑而用半夏即效何也曰治病必求其本此症風寒邪挾飲上攻之暴迫故用半夏桂枝以開通經絡迅掃痰涎兼甘草之和脾胃以救津液風痰散而營衛通則咽痛燥渴自己設用清潤滋其痰濕經絡愈困津液愈結燥渴咽痛愈無寧宇矣近世治風寒咳嗽雖用表藥必兼桑皮黃芩花粉甚則知柏之類少年得之必種吐血虛損之根中年以後得之多成痰火喘咳之患初時元氣未衰邪熱暫伏似覺稍可久之真氣漸傷轉服轉甚及見吐血則不問何經臟腑屬火屬傷血之散結色之晦鮮瘀之有無概以犀角地黃寒涼止截之劑投之致血蓄成根向後或兩月一月一發雖日服前藥不應矣嘗見一人患項腫發熱延傷寒家視之則曰大頭傷寒以表藥發之並頭亦脹確然大頭無疑矣病家以其治之益甚另延雜症家視之則曰濕熱痰火以里藥攻之則頭與項前左半皆消但項後右側偏腫則又確乎非大頭而為雜症矣病家以腫在偏旁疑為癰毒更延癰疽家視之則曰對口偏疽以托裡兼敷外藥治之則氣血益滯熱不得泄郁遏竟成潰瘍頭本一病也治之迥異證亦屢遷可見病隨藥變之不誣耳暑許叔微治一人頭痛身熱心煩燥渴診其脈大而虛授以白虎湯數服愈仲景云脈虛身熱得之傷暑又云其脈弦細芤遲何也素問曰寒傷形熱傷氣蓋傷氣不傷形則氣消而脈虛弱所謂弦細芤遲者皆虛脈也仲景以弦為陰朱龐亦云中暑脈微細則虛可知癸丑年故人王彥龍作毗陵倉官季夏時胸項多汗兩足逆冷且譫語醫者不曉雜進藥已經旬日診之其脈關前濡關後數曰當作濕溫治之蓋先暑後受濕暑濕相搏是名濕溫先以白虎加人參湯次白虎加蒼朮湯頭痛漸退足漸溫汗漸止三日愈此名賊邪誤用藥有死之理有人難曰何名賊邪曰難經云五邪有實邪虛邪正邪微邪賊邪從後來者曰虛邪從前來者曰實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪假令心病中暑為正邪中濕得之為賊邪五邪之中最逆也難經曰濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也故經曰暑濕相搏名曰濕溫是謂賊邪也不特此豫素有停飲之疾往往至暑月汗兩足漐漐未嘗干每服此藥二三盞即愈張子和治小鄭年十五田中中暑頭痛困臥不起以雙解散汗之又以米泔湯投之未解晚又以三花神祐丸大下之遂愈張子和治張叟年七十一暑月田中因飢困傷暑食飲不進時時嘔吐口中常流痰水腹脅作痛醫者概用平胃散理中丸導氣丸不效又加針灸皆云胃冷乃問張張曰痰屬胃胃熱不收故流痰水以公年高不敢上湧乃使以一箸探之不藥而吐痰涎一升次用黃連清心散導飲丸玉露散以調之飲食加進惟大便祕以生薑大棗煎調胃承氣湯一兩奪之遂愈萬密齋治縣丞李天泉六月中暑腹痛渠有婢妾醫謂病寒進理中湯一劑痛止乃發熱一身骨節盡痛又進十神湯發汗熱退身不痛矣萬候之李稱病愈觀其面色帶赤知病未解請脈之洪滑而數色脈相對經曰大則病進今汗後脈猶洪數病方進也而彼自稱愈萬未去食頃而病作矣滿腹急痛狀如奔豚上下左右舉手按摩亟延萬至曰汝先診脈不言而去知我病也幸急救我萬曰無傷乃進建中湯一服而痛定次日有省祭官萬朴來問疾朴善醫診之且駭且顧李亦疑懼萬診之謂朴曰汝怪其脈之促止乎蓋心下怔忡故脈如是耳李即應曰我心下跳亂不寧即命取藥方用人參麥冬甘草白芍生地五味獖豬心煮湯煎一服心跳止脈不促矣蓋心惡熱用熱治熱向服理中十神俱犯禁故病復作也李少華知醫六月得暑病服九味羌活湯一劑汗出不解謂藥劑少發汗不透復作大劑服之汗大泄而熱轉甚連進三劑病益亟如癡如狂舌強言語謇澀手足掣動小便不利莖中痛以手捏之才下一二滴不食唯能飲水萬脈之微弱而遲或問病可治否曰壞病也醫之過耳心惡熱壯火食氣方今盛夏火氣正壯而重發其汗汗之過多則傷心心藏神如狂如癡者神氣亂也非蓄血舌內應乎心汗多則血虛不能榮舌故強不能言也手中掣動者汗多筋惕肉瞤也非中風渴飲水汗多津液涸也非陽明發渴小便不利者心移熱於小腸小腸移熱於膀胱津液少而氣不化故莖中痛連五劑而愈未載所用何方殊嫌疏漏汪懷江中暑復傷食一醫用五積燥熱之劑陽氣外散陰津內竭陽強陰弱皮膚燥而無汗當先養其陰而後制其陽使汗出而表和遂以涼膈散去大黃芒硝加知母石膏淡豉竹葉一服微汗出而身潤矣方議下之又一醫至稱是陰虛火動不可下也用四物湯加炒乾薑觸動陽明之火齒縫出血足冷成陽厥矣乃復用涼膈散服之利三行而病愈龔子才治一婦人暑月因廚房熱極遂出當風處脫衣乘涼即頭痛發熱惡寒身痛醫誤以為傷寒用附子理中湯一服下咽立時不語口中無氣唇口青紫心頭微溫診之六脈洪大而數此熱症誤用熱藥令以燒酒噴其胸將鏡撲之更以新汲水和蜜用雞翎沃入其口數次少頃患人即伸舌探水以益元湯灌下即活李士材治張邑尊令郎六月間未申時暈絶不知人更余未醒此得之生冷太過也皂角末吹鼻中無嚏舉家驚惶教以皂角灰存性新汲水灌之更取沉檀焚之俾香氣滿室以達其竅至子後方蘇服十味香薷飲而安吳孚先治一人奔馳烈日下忽患頭疼發熱或時煩躁汗大出大渴引飲喘急乏氣服香薷飲尤甚此暑症也然受暑有陽有陰道途勞役之人所受者炎熱名曰傷暑亭館安逸得之為中暑也香薷飲只宜於陰暑若陽暑服之反為害矣與人參白虎湯而愈董仁仲當暑天納涼飲冷忽頭疼發熱霍亂吐瀉煩躁口渴舌苔白滑此陰暑也得之過於寒涼致周身陽氣為陰邪所遏宜香薷之辛熱發越陽氣散水和脾四劑而愈藜按此夏月感寒之症乃指為陰暑而以傷暑者為陽暑治雖不誤而稱名實謬上條亦然一芻蕘婦夏月貪涼飲冷胸如有一團之火凡冷水涼茶入咽覺從火團上分流而下目則羞明畏火口鼻間頻出火氣診之六脈俱陰舌苔紫青而滑吳曰此寒格反見熱化也與乾薑肉桂溫散少加黃連為嚮導移時覺胸中之火頓化清涼而愈孫文垣治弟淑南額痛遍身疼口乾舌苔黃厚左脈浮大六部俱數時當仲秋初旬以小柴胡合白虎湯加羌活熱不退下午用六神通解散以蔥湯調服三錢熱稍退至半夜後又復熱額痛顛頂尤甚舌根黃且焦黑小水赤痛煩躁不睡遍身又痛此三陽合病暑症也次日以小柴胡湯大加石膏為君藁本白芷竹葉粳米生薑大棗少頃汗出至足必至足乃為正汗熱始盡退猶煩躁不睡仍以小柴胡湯加桂枝山梔竹茹竹葉飲下遂愈張路玉治內兄顧九玉大暑中患胸痞顱脹脈得虛大而濡氣口獨顯滑象此濕熱泛濫於膈上也與清暑益氣二劑顱脹止而胸痞不除與半夏瀉心湯減炮薑去大棗加枳實一服而愈範文學治孫振麟於大暑中患厥冷自利六脈弦細芤遲按之欲絶舌色淡白中心黑潤無苔口鼻氣息微冷陽縮入腹精滑如水問其所起之由因臥地晝寢受寒是夜連走精二度忽覺顱脹如山坐起暈倒四肢厥逆腹痛自利胸中兀兀欲吐口中喃喃妄言與濕溫之症不殊醫者誤以為停食感冒與發散消導二劑服後胸前頭項汗出如流背上愈加畏寒下體如冷水一日昏憒數次此陰寒挾暑入中手足少陰之候緣腎中真陽虛極所以不能發熱遂擬四逆加人參湯方中用人參一兩熟附三錢炮薑二錢炙甘草二錢晝夜兼進三日中連進六劑決定第四日寅刻回陽是日悉屏薑附改用保元方用人參五錢黃耆三錢炙甘草二錢麥冬二錢五味子一錢清肅膈上之虛陽四劑食進改用生料六味加麥冬五味每服用熟地八錢以救下焦將竭之水使陰平陽祕精神乃治申叔斾觸熱過梁溪歸而眩暈麻瞀發熱便祕服黃連香薷不應用涼膈散便通或時昏眩不省或時四肢清冷而晡時為甚診之脈弦細而芤此暑傷心包陽氣鬱伏所以有似陰寒也與生脈合保元清理肺胃則包絡自寧矣柴嶼青治陳忍之患病醫以溫散之藥投之遂至徹夜不能閣眼時見鬼物兩脈沉伏症屬受暑用加減清暑益氣湯去參苓一劑熱減六脈俱現洪大再服六一散數劑而病退惟夜間尚不能熟睡遂以滋補安神之劑調理而安壬戌夏五營繕朱載常早間入署輿中嘔吐昏憒遺尿醫以中風治開附子理中湯加殭蠶後又以兩脈鼓指危篤已極參附尚少恐難挽回柴曰此暑風也脈無死象力保無事伊同寓水部錢築岩不信急煎前藥將進幸禾中朱汝能進以六一散一服神氣稍定錢雖不知醫固知六一散之與理中冰炭因停前藥次日遂以黃連香薷飲加羌活治之調理數日而康陸祖愚治陳元甫七月間因構訟事忍飢食冷粥數碗少頃即吐出自此茶飲皆吐頭痛身熱咽喉不利昏冒口中常流痰液醫知為中暑用冷香薷飲投之隨吐又以井水調益元散投之亦吐昏沉益甚脈之陽部洪數無倫陰部沉微無力此邪在上焦在上者因而越之此宜湧吐者也蓋飢餓之時胃中空虛暑熱之氣乘虛而入於胃胃熱極而以寒冷之水飲投之冷熱相反所以水入即吐即口中流涎亦胃熱上溢之故也因用沸湯入鹽少許虀汁數匙乘熱灌之至二三碗不吐至一時許方大吐水飲與痰涎同出約盆許即以生脈散投之人事清爽諸症頓減又合四物調理而安張紹甫治一人暑熱患頭痛身熱昏睡大渴引飲衆以感冒治不效診之脈大而虛曰此暑疾也即令撤幔開窗前後左右各置涼水頓覺清爽仍令二童食以西瓜取其便連飲四五鍾即愈治法精妙張為諸生時萬曆戌子夏患暑症勢極氣索瞀然自昏憒庸醫以為內傷或以為勞役中折幾不自持醫者汪韞玉適在旁蹙然曰心煩面垢此暑症也聞者皆駭其名豫於瞀中微解依之服益元散二劑而蘇仍調以蘇薷飲數劑而愈張紹甫名鳳逵著暑熱全書天啓年間刊本李旡垢治朱竹垞夫人馮氏病熱七日不汗又七日又不汗逾二旬矣諸醫皆云傷寒不可治請辦喪具朱乃邀李徒步登閣診視旡垢笑曰君夫人所居閣四面俱木圍之木生火觸暑脈伏耳臟腑無他恙也亟以甘瓜井水投之可不藥而愈從其言越宿而餔粥糜再宿主中饋如故曝書亭集文選姚海山中暑頭痛發熱氣高而喘肢體怠倦兩手麻木胃熱傷元氣用人參益氣湯頓安又用補中益氣湯加麥冬五味而痊昔有人暑月深藏不出因客至坐於窗下忽似倦怠自作補中湯服之反劇醫問其由連進香薷飲兩服而安萬密齋養生四要馬元儀治陸太史時值秋暑偶發熱頭痛診得脈大而虛謂中氣大虛非補不克彼云傷暑小恙況飲食不甚減起居不甚衰何虛之有但清暑調中去邪即已何用補為乃勉與清暑益氣而別明晨復診脈之大者變為虛微發熱如故曰今日不惟用補更當用溫宜亟服之遲則生變矣遂用理中湯服下少頃出汗如湧泉午後復診兩脈虛微特甚汗如貫珠乃連進人參四兩附子兩許日夜約用人參十兩附子四兩汗止精藏漸調而愈任邱裴在澗棄家逃禪持戒茹素遍遊五嶽足迹幾遍天下偶客金壇寓西禪寺僧舍酷暑坐臥水樓日持準提咒三千念佛號三萬未是俊物忽患頭痛如斧劈身熱發躁口乾日飲冷水斗余渴猶未解自分必死莊斂之憐其旅病時過視疾一日急走倉頭召斂之永訣以攜來書畫玩器盡授斂之揖而言曰未嘗得道兄其為我收藏吾死後切勿用世俗禮葬我惟以兩缸盛吾尸其中以三尺地埋之耳斂之涕泗填胸束手無策促繆仲淳診之余此時遊梁溪陽羡間斂之命余僕克勤相追歸視其脈知系受暑為疏竹葉石膏湯不二劑熱渴俱止幾十劑病始退旋加健脾藥十餘帖而安廣筆記來天培治蔡氏女病經六七日時七月初旬發熱頭痛胸滿腹痛煩躁口渴目閉神昏時有獨語脈浮細而數按之模糊問曾手足抽掣乎曰然曰此俗所謂暑風傷寒也用香薷青蒿羌防枳桔秦艽鉤藤菖蒲半夏曲藿香柴胡黃連一劑症減神清脈亦和前方去羌活菖蒲枳桔香薷加廣皮厚朴花粉丹皮一劑漸安惟熱未盡退此津液不生之故耳改用生地麥冬茯苓花粉黃芩石斛廣皮穀芽半夏曲又二劑全痊沈明生治王明甫長夏神昏不語伏枕信宿午前往視曰脈虛身熱此中暑耳非風也曷不用參其長君曰早間一友因用參而轉加煩悶問用幾何曰五分曰宜其轉甚也當四倍之乃克有濟耳乃愕眙不信因曉之曰凡參少用則壅滯今病正臺東垣避暑於深堂大廈得之者屬陰且古人用清暑益氣人參白虎生脈散等方皆中暑門中要劑俱有人參又何慮之有乃殊不信復理喻再三乃終不信欲辭去而阻於暴雨強留午餐因再謂曷不就此時如議進藥脫有不安可用法立解也於是勉從以進猶惴惴焉惟恐增脹既而殊寧靜逾時神思少清間吐一二語始用參不疑調治浹旬竟得全愈陳子佩治一人八月間發熱譫語不食又不大便諸醫皆以為傷寒始而表繼而下俱不應延至五十餘日投以人參熱稍減參少則又復熱於是益疑其虛也峻補之然不食不便如故診之六脈平和絶無死狀謂傷寒無五十日不便不食而不死之理聞病者夏月治喪往來奔走必是中暑無疑誤以傷寒治之又投以人參補劑暑得補而愈不解故至此耳當以六一散以涼水調服病者欲之雖多不妨服已即睡睡醒即便便後思食數日而愈吳橋治吳鴻臚妻年三十形故肥當暑而飧如常詰朝不起啓視之瞑目昏憒口舌唇吻皆色深黑痰如鼓韝有聲勺飲不能下咽即千金藥無所用逆橋至六脈浮濡謂鴻臚曰是本風痰兼中暑故爾即以厚朴香薷飲灌牛黃丸輒能下痰聲必殺更進少頃黑色退而為黟薄暮色如羊肝詰朝但微紫於是加補劑五日始張目能言逾日如故太函集章虛谷治周小梅室六月中感暑邪身熱五日始延李先生服疏散一劑次日病更甚更醫聞得大便數日不解即用大黃數錢鮮生地尤重用柴胡厚朴等服之便下兩次病人自覺爽快惟晡時發冷黃昏發熱至天明方休徹夜不寐章診之詢知病由曰暑為火濕合化濕系陰邪遏熱不達李先生用疏散則濕開熱透並不錯誤乃反誤投下劑使邪陷入陰故夜熱而晝不熱則病勢重矣邪既入陰欲其轉陽甚難只可轉其樞機兼從陰分清其邪熱乃用草果蒼朮厚朴醒脾開濕透膜原柴胡以轉少陰之樞青蒿鱉甲知母黃柏清陰分之熱服兩日不效其脈虛軟無力口甚渴飲茶不絶腹滿大小便皆不利粒米不進稍飲米湯口即作酸此中氣大傷乃於前方去知母加參又服兩日小便稍利諸症不減脈軟少神不進穀食已十二日矣再延數日胃氣絶則不可救因其脾腎兩傷元氣無權三焦氣化失職邪反內閉蓋腎傷無開闔之力則便阻脾傷而轉運不前則腹滿陽既委頓則津液不生故渴甚非用附子乾薑大助其陽則邪終不化乃用黨參草果蒼朮厚朴附子乾薑生薑烏梅白芍稍加黃連服兩日腹滿減而便下溏糞如膠漿略進稀粥又服兩日腹滿消而粥食大進小溲亦長惟夜熱如故冷則無矣此濕已化但有熱邪乃於前方去附子烏梅加知母三錢生石膏五錢服兩日熱全退即用清補調理而安藜按此證誤下之後熱去濕留徒傷其脾胃究竟濕中之熱亦未能盡去脾胃既傷值午後陽衰之時故發冷熱陷濕中擾其營氣故發熱夜不成寐濕熱阻滯氣機則津液不生故口渴斯時宜用滲淡之品加芳香醒脾之藥病可立愈乃以燥劑劫之又增入寒涼藥益傷其脾故不效繼乃大用辛燥以劫之脾氣得辛燥之藥而有權濕為剛燥所劫而胥化故仍以寒藥收功此將差就錯之治未可以為準則也方中烏梅白芍尤為無謂先生自謂從烏梅丸變化而來亦欺人之語蕭山何某夏月不爽自謂受暑食西瓜一枚又服涼藥數帖後無所苦惟胃不開每日強飲薄粥一二鍾甚無味尚行動自如小便淡黃大便乾多日不解胸腹無脹悶面色如常舌光紅而無苔酷似胃陰不足但不喜湯飲脈則浮中皆無按之至骨縈縈如蛛絲醫者猶欲進涼藥曰此證固非邪火亦非胃陰不足乃元陽大虧之症幸小便淡黃大便堅固腎氣堅為有根再服涼藥必死遂用附子理中湯去朮加當歸桂枝以養營數劑毫無效驗又去桂枝加肉桂吳萸黃耆連服十餘劑依然如故又進前藥十餘劑仍復如前細思其小便通大便乾則腎元未絶何以胃總不開令停藥四五日亦只如是乃屏去熱藥重用鹿角膠佐以枸杞當歸參耆蓯蓉廣陳等濕潤養陽十劑肺脈稍和飲食略加又十劑胃始開便始通其人反軟弱不能起坐又養半月始得下床一人面白體盛夏月患暑服涼解兩帖而愈以邪輕故也旬日復感自服蘇合丸覆被髮汗津液大泄熱邪內陷又兼少年多欲脈空數無根章曰蘇合丸辛溫走竄治寒尚可溫暑大忌勉進甘涼薄味之藥養陰和陽四五日脈稍轉而尺部甚空身熱不退夜則譫語天明則清舌有薄苔邊淡黃中白滑每日飲粥二三碗十餘日病不增減藥稍疏利則委頓不堪稍補助則邪熱愈熾一日因換床即大汗口開眼閉欲脫用熟地一兩二錢附子四錢厚朴二錢合二陳湯如數煎一大碗黃昏時服一半即熟寐二更醒後又服一半亦無所覺子後仍譫語天明則清脈稍有神而加數舌苔中心亦黃附子之故胸腹仍寬能進粥食乃用白虎湯加細生地等連服數日脈漸好粥稍加惟身熱不退夜仍譫語左關脈獨滯且沉因思晝清夜昏為熱入血室血室厥陰所主故左關獨滯仲聖有刺期門之法是邪結血分也今不明刺法乃用歸鬚赤芍新絳青蒿鱉甲柴胡黃芩細生地之類五六服全然不效此時已一月有二日矣因病家篤信不獲辭徹夜思之未得其理忽記來復丹方中有靈脂專入厥陰暑濕濁邪與傷寒不同故前藥不效靈脂以濁攻濁兼有硝黃直達至陰助本元以祛邪必當奏功遂於前方去柴胡送來復丹一錢夜即安睡無譫語連進三服身熱即退忽解小便甚長色深碧稠如膠漿病家驚詢章曰此病根除矣因其少年多欲濕之邪乘虛陷入肝腎故與傷寒之熱入血室病同而邪不同故藥力不能勝邪則不效此來復丹以濁攻濁所以神效也後進補藥而愈濕薛立齋治一婦肥胖頭目眩暈肢體麻木腿足痿軟自汗身重其脈滑數按之沉緩此濕熱乘虛也用清燥羌活二湯漸愈更佐以加味逍遙散全安趙養葵治一人宦遊京師病腿腫發熱不能履地衆以為腿癰延趙視之扶掖而出趙曰非癰也以補中益氣湯加羌活防風各一錢此開鬼門例一服如失次日乘馬來謝趙養葵自患睪丸一枚腫如鴨卵遂以濕症治之不效細思之數日前從定海小船回有濕布風帆在坐下比上岸始覺以意逆之此感寒濕在腎丸也乃用六味地黃此潔淨府例加柴胡肉桂吳萸各一錢獨活五分一服熱退再服腫消後有患偏墜者此方多效亦惟寒濕者宜之若厥陰燥火鬱結者不宜服此去吳茱萸肉桂加黃柏則得之矣何不可服之有司命者其審諸孫文垣治沈大官左膝腫痛不能起止者半年大便瀉三次脈之弦緊曰此脾虛濕熱凝於經絡流於下部也腫屬濕痛屬火用蒼朮黃柏苡仁為君澤瀉豬苓五加皮為臣炙甘草防風桂枝為佐木通為使四帖痛減腫消泄瀉亦止改用蒼耳子五加皮苡仁當歸枸杞杜仲丹參黃柏烏藥葉酒糊為丸調理月餘步履如故吳孚先治一人風濕骨節掣痛不能屈伸遍身俱腫醫用麻黃湯發汗汗大出而腫不退吳曰前方未嘗謬也但宜微汗之今過汗風去而濕未除故不愈也説本仲景桂枝湯症與胃苓湯二帖而瘳張子和治李文卿兩膝臏屈伸有聲剝剝然或以為骨鳴張曰非也骨不戛焉能鳴此筋濕也濕則筋急有獨緩者緩者不鳴急者鳴也若用藥一湧一瀉上下去其水水去則自無聲矣從其言既而果愈朱丹溪治朱秀衣久坐受濕能飲酒下血以苦澀藥兜之遂成腫疾而肚足皆腫口渴中滿無力脈澀而短乃血為濕氣所傷法當行濕順氣清熱化積用滑石一錢五分白朮五分木通七分厚朴五分乾葛五分蒼朮三分蘇葉七片水煎次第下保和丸與溫中丸各五十丸馮官人因內有濕積兼時令濕熱右腿少陽分發爛瘡如掌大癢甚兩手脈洪緩略數面目手足俱虛腫膈中午前痞悶午後腫到兩足則膈寬茯苓木通蒼朮犀角枳殼炒各五分陳皮連翹白朮各一錢甘草二分加薑汁煎服朱恕八哥肚腫因濕氣起能飲酒自五月左脅有塊兩足時腫白朮三稜醋炒木通陳皮赤茯苓海金沙厚朴各五分甘草二分肉桂三分煎湯下保和丸三十溫中丸三十抑青丸十丸張三錫治一人體厚自覺遍身沉重難於轉側兩膝時痛腫不紅不硬六脈濡弱天陰更甚作濕鬱治加減羌活勝濕湯不十劑愈許叔微治王彥龍季夏時病胸脅多汗兩足逆冷譫語醫者不曉雜進藥已旬日診之脈關前濡關後數曰當濕溫治之先以白虎加人參湯次白虎加蒼朮湯頭痛漸退足漸溫汗漸止三日愈此名賊邪誤用藥有死之理有人難曰何名賊邪曰難經五邪假令心病中暑為正邪中濕得之為賊邪心先受暑而濕邪乘之水剋火從所不勝斯謂之賊邪五邪中之最逆也又曰濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也故曰暑濕相搏名曰濕溫是謂賊邪也不特此豫素有停飲之疾每至暑月汗兩足漐漐未嘗干每服此藥二三盞即愈薛立齋治張縣丞年逾五十兩腿腫脹或生㾦㿔小便頻而少聲如甕出服五皮等散不應掌醫院銀臺李先生疑為瘡毒令請薛治診其脈右關沉緩此脾氣虛濕氣流注而然非瘡毒也河間云諸濕腫滿皆屬於土按之不起皆屬於濕遂投以五苓散加木香蒼朮亦不應意至陰之地關節之間濕氣凝滯且水性下流脾氣既虛安能運散若非辛溫之藥開通腠理使行經活血則邪氣不能發散遂以五積散二劑勢退大半更以六君子湯加木香升麻柴胡苡仁兩月餘而愈設使前藥不應更投峻劑虛虛之禍不免矣高兵部連日飲酒陰莖並囊濕癢服滋陰藥不應謂前陰者肝經絡脈也陰器縱挺而出素有濕繼以酒為濕熱合於下部引而竭之遂以龍膽瀉肝湯及清震湯治之而愈若服此藥不應宜補肝湯或四生散治之趙大用兩臂腫痛服托裡藥日甚謂腫屬濕痛屬火此濕熱流注經絡也以人參敗毒散加威靈仙酒芩南星數劑漸愈更以四物湯加蒼朮黃柏二十餘劑而消又一婦下體腫痛亦與人參敗毒散加威靈仙黃柏蒼朮數服痛減更以四物湯加黃柏紅花防己蒼朮澤瀉三十餘劑亦消葉巡檢兩腿作痛每痛時即以濕布拓之少愈月餘痛甚夜痛尤劇丹溪云血熱極已自沸騰或涉冷或就濕取涼熱血得寒濁凝澀所以作痛夜痛甚氣行於陰也苟痛以冷折之即前所謂取涼之症也以五積散二劑頓愈更以四物湯加黃柏蒼朮牛膝木瓜三十餘劑而消夫濕痰濁血注於僻道若非流濕推陳致新不能瘳也如用藥蒸罨或用涼藥敷貼或用寒藥降火反成敗症矣一男子腿痛筋攣遍身痠軟一道人與痰藥及托裡藥期三日可痊皆不應此非瘡毒乃濕熱為患也以人參敗毒散加蒼朮黃柏檳榔木瓜治之少愈更以清燥湯二十帖而痊夫內有濕熱外有風寒當泄不當補反用甘溫之劑必不效矣張意田治一人時症已二十餘日涼解不愈大便自利不欲飲食舌赤燥硬神清肌削晡際寒熱似瘧無汗診之六脈不浮不沉惟大而緩脅肋邊有痛處按之在肝位此濕溫病不解結於肝部故寒熱如瘧胃中津液耗涸則舌燥而赤是邪熱留於心胃也用玉女煎加犀角蒼朮木通一服舌生津液脅痛亦減即於原方加柴胡數服漸瘳更以補陰全愈王宇泰曰昔人治濕溫通身皆潤足冷至膝下腹滿不省人事六脈皆弱而急問所服皆陰病類此非受病重藥能重病耳以五苓合白虎十餘劑少蘇更與清燥湯調理而安未選入端州太守吳淞岩病幾四十日矣延診告以初時噁心倦怠食減便溏既而夜不寐躁而數起起而復臥凌晨必嘔痰數升或以為暑而用香薷六一或以為濕而用萆薢五苓或以為瘴而用平胃或以為痰而用二陳遍嘗無效漸加煩渴與腎氣丸及生脈飲服之轉劇脈之濡而緩右關為甚據脈與症濕熱無疑何諸治罔效因思病人素喜肥甘又飲酒食麵其脾胃如土在雨中沾漬既久值夏令乃蒸鬱而發故非滲利分清可愈亦非風行燥發可瘳唯聖朮煎一味白朮重兩許酒煎從而治之必應令如法服之再以菟絲子五錢煎飲代茶服至一旬漸瘥半月全愈張路玉治沈汝楫子夏月兩膝脛至腳痛極僵挺不能屈者十餘日或用敷治之法不效其脈軟大而數令拭去敷藥與當歸拈痛湯二劑汗出而愈熱病滕曇恭豫章南昌人也年五歲母患熱病思食寒瓜土俗所不産曇恭歷訪不得俄遇一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺還以與母舉室驚異尋訪桑門莫知所在南史唐武宗有心熱病百醫不效青城山邢道人以紫花梨絞汁而進疾遂愈後復求之苦無此梨常山忽有一株因緘實以進帝多食之煩躁頓解醫説續編張子和治常仲明之妻每遇冬寒兩手熱痛曰四肢者諸陽之本也當夏時散越而不痛及乎秋冬收斂則痛要言不煩以三花神祐丸大下之熱遂去李東垣治節使趙君年幾七旬病身體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌強難言聲嗄不鳴診得左寸脈洪大而有力是邪熱客於經絡之中也蓋手之三陽從手表上行於頭陰伏於陰陽並於陽勢甚熾焉故邪熱妄行流散於周身而為熱麻胃熱蟲動蟲動則廉泉開故涎下熱傷元氣而為股膝無力飲食入胃慓悍之氣不尋常度故多汗心火盛則妄喜笑脾胃熱則消穀善飢肺金衰則聲不鳴仲景云微數之脈慎不可灸焦骨傷筋血難復也君奉養以膏梁之味無故而加以火焫之毒熱傷經絡而為此病明矣內經云熱濕所勝治以苦寒佐以甘瀉之以酸收之當以黃柏知母之苦寒為君以瀉火邪壯筋堅骨黃耆生甘草之甘寒瀉熱實表據此耆草可云甘寒五味子味酸止汗補肺氣之不足以為臣炙甘草當歸之甘辛和血潤燥升麻柴胡之苦平少陽陽明二經自地升天以苦發之者也以為佐㕮咀同煎清汁服之更繆刺四肢以瀉諸陽之本使十二經相接而瀉火邪不旬日良愈遂名其方曰清神補氣湯試效方張子和曰余向日從軍於江匯上一舟子病余診之乃五實也余自幼讀醫經嘗記此五實之症竟未之遇也既見其人竊私料之此不可以常法治乃作大劑下之殊不動搖計竭智窮無如之何忽憶桃花萼丸頓下七八十丸連瀉二百餘行與前藥相兼而下其人昏困數日方已蓋大疾已去自然臥憩不如此則病無由衰也徐以調和胃氣之藥饘粥日加自爾平復也五實者脈盛皮熱腹脹前後不通瞀悶也蔣仲芳治蕭氏婦年二十餘素虛弱患熱病將一月一夕忽厥竹瀝生薑燈心湯灌之下咽少頃微動細察之腹痛甚問其大便云二十日不食亦不行矣以大黃一兩芒硝五錢桃仁當歸各三錢與之衆駭曰素有弱症且病久何能堪此曰更有法在強與之遂去黑物半桶即用人參五錢煎湯補之蓋因素弱急下後不得不進補也調理月餘而愈今連生三子此諸醫因其虛而不治其實之誤也樞密副使耶律斜軫妻有沉疴易數醫不能治耶律敵魯視之曰心有蓄熱非藥石所能及當以意療因其聵聒之使狂用泄其毒則可治於是令大擊鉦鼓於前翌日果狂叫呼怒罵力亟而止遂愈遼史又見儲記上洋劉公遠至洞庭山治病病者已氣絶劉曰無恐當即活也但某今夜必欲觀劇又所演必劇武者從之遂令以氈縟裹病人置場上已而鉦鼓喧咈則病者欠伸復蘇矣張氏卮言觀其治法與前案頗同則為病亦必倣佛萬密齋治胡應龍五月患熱病治半月未愈脈弦數鼻衄三四日一作左脅痛不能側臥先以炒山梔一個婦人發同燒存性吹入鼻中而衄止再以當歸龍蒼丸方作湯一劑而脅痛即止再診其脈弦而浮數曰當以汗解蓋衛氣不共營氣諧和者也當用桂枝湯以治其陽今乃營氣不共衛氣諧和則當用黃連解毒湯合白虎以治其陰使營衛和則得汗而愈也乃以二湯合煎飲之先告之曰當戰汗勿驚也連進二劑果汗而愈也胡龍嘉六月病熱身壯熱自汗出大渴喜裸體診其脈弦大而虛萬為制一方小柴胡人參白虎湯內摘知母甘草梔子豉湯內摘淡豆豉共五味淡竹葉煎名三合湯一劑而愈繆仲淳治辛衡陽銓部熱病病在陽明頭痛壯熱渴甚且嘔鼻乾燥不能眠診其脈洪大而實仲淳故問醫師曰陽明症也曰然問投何藥曰葛根湯仲淳曰非也曰葛根湯非陽明經藥乎曰陽明之藥表劑有二一為葛根一為白虎不嘔吐而解表用葛根湯今吐甚是陽明之氣逆升也葛根升散故用之不宜宜白虎湯加麥冬竹葉名竹葉石膏湯石膏辛能解肌鎮墜下胃家痰熱肌解熱散則不嘔而煩躁壯熱皆解矣遂用大劑與之且戒其仲君曰虜荊非六十萬人不可李信二十萬則奔還矣又囑曰此時投藥五鼓瘥天明投藥朝餐瘥已而果然或謂嘔甚不用半夏何也仲淳曰半夏有三禁渴家汗家血家是也病人渴甚而嘔是陽明邪熱熾盛劫其津液故渴邪火上升故嘔半夏辛苦溫而燥且有毒定非所宜又疑其不用甘草曰嘔家忌甘仲景法也龔子才治一婦人夏間病熱初用平調氣血兼清熱和解之劑二三服不應熱愈甚舌上焦黑膈間有火漱水不咽診之兩手皆虛微而右手微甚六七日內譫語撮空循衣摸床惡症俱見後用四物湯加黃耆人參白朮陳皮麥冬知母熟附子服之一二時汗出熱退次日復熱再服仍退又次日復發知其虛劇也遂連服十劑皆加附子而安藜按熱病內亦間有此種症不可不知喻嘉言治王玉原昔年感症治之不善一身津液盡為邪熱所鑠究竟十年餘熱未盡去右耳之竅常閉今夏復病感纏綿五十多日面足浮腫臥寐不寧耳間氣往外觸蓋新熱與舊熱相合狼狽為患是以難於去體醫者不察其情治之茫不中窾延至秋深金寒水冷病方自退然淺者可因時而自退深者未由遽退也喻曰面足浮腫者肺金之氣為熱所壅失其清肅下行之權也面腫可云足腫則不確終是陰虛血不配氣耳臥寢不寧者胃中之津液乾枯不能榮其魂魄也話殊牽強亦由陰虛肝火浮入胞絡也耳間火氣撞出者久閉之竅氣來不覺今病體虛羸中無阻隔氣逆上衝始知之也總不外陰虛二字外病雖愈而飲食藥餌之內調者尚居其半特挈二事大意為凡病感者明善後之法焉蓋人當感後身中之元氣已虛身中之邪熱未退於此而補虛則熱不可除於此而清熱則虛不能任即一半補虛一半清熱終屬模糊不得要領然舍補虛清熱外更無別法當細察之補虛有二法一補脾一補胃如瘧痢後飲食不能運化宜補其脾如傷寒後胃中津液久耗新者未生宜補其胃二者有霄壤之殊也清熱有二法初病時之熱為實熱宜用苦寒藥清之大病後之熱為虛熱宜用甘寒藥清之此説極透徹二者亦霄壤之殊也人身天真之氣全在胃口津液不足即是虛生津液即是補虛雄按千古名言故以生津之藥合甘寒瀉熱之藥而治感後之虛熱如麥冬生地丹皮人參梨汁竹瀝之屬皆為合法仲景每用天水散以清虛熱正取滑石甘草一甘一寒之義也雄按肺主一身之氣而皮毛者肺之合也感症後氣復而血虛足腫者固有之而餘熱不清肺氣雍滯者則尤多也又胃熱未清則津液不復經云胃不和則臥不安也又耳閉宜清肺與耳鳴宜滋陰者有間天水散以清虛熱正取滑石甘草一甘一寒之義也設誤投參耆苓術補脾之藥為補寧不並邪熱而補之乎至於飲食之補但取其氣不取其味如五穀之氣以養之五菜之氣以充之每食之間便覺津液汗透將身中蘊蓄之邪熱以漸運出於毛孔何其快哉人皆不知此理急於用肥甘之味以補之目下雖精采健旺可喜不思油膩阻滯經絡邪熱不能外出久之充養完固愈無出期矣前哲有鑑於此寧食淡茹蔬使體暫虛而熱易出乃為貴耳前醫藥中以浮腫屬脾用苓術為治致餘熱糾纏不已總由補虛清熱之旨未明故詳及之琇按寓意草中多有發前人所未發處至於支離牽強處亦復不少如此案謂感冒後以甘寒清熱最得肯綮然以補脾補胃立論便爾模糊雄按脾胃分別論治誠開萬古之群蒙也葉天士深得力於此而為靈胎潤安所折服者但當云氣虛者補氣血虛者補血凡瘧痢後飲食不運多氣虛宜氣分藥如參耆苓之類凡感症後津液不充多血虛宜地冬梨竹之屬以感症多餘熱未清也何等明快然猶未免於偏又魏氏痢後瘧後之論亦頗精確常見痢以下多而亡陰瘧以汗多而耗液飲食難運多由相火盛真氣衰非大劑二冬二地投之多見纏綿不已也至其論面足浮腫臥寐不寧尤屬隔靴搔癢陸養愚治凌比部藻泉暑月榮歸煩勞過度夜間頭痛如破內熱如火不寐汗多小水短赤舌上黃苔右脅脹痛有謂頭痛身熱宜散者有謂煩勞之後宜補者診之見其身熱喘急語言間氣乏不足以息脈浮數按之不甚有力曰此熱傷元氣也乃以河間桂苓甘露飲加人參一錢服之片時汗止熱減喘定能言再與一劑昏倦思睡次早脈浮桉已平沉按弦而有力此浮熱已除內熱未盡故脅腹尚微痛也與當歸龍蒼丸一錢五分空腹服之至下午進粥逾時便通而色黑痛即減後以參麥散調理而安陸肖愚治史洞庭室四月間患頭痛發熱脈洪數見於氣口用清解藥二劑大約柴葛梔芩之類一醫謂頭痛身熱乃太陽症而遽用柴葛不引邪入陽明少陽乎汗未得而遽用梔芩寒涼之品表邪何由而解不將傳裡乎以正傷寒論未嘗不是用大青龍湯二劑病家止服一劑夜間遍身如煆口渴咽乾已有譫語矣明日又以為非傷寒乃痛風也觀前説其人亦頗閲書而臨症則鹵莽不堪殆福薄而氣浮歟抑識淺而意易移歟用羌活獨活首烏牛膝等二劑乃登高而歌棄衣而走罵詈不避親疏再求診乃令數婦人縶之謂洞庭曰此陽症也擾之益劇當以言寬諭之果如言而止因先用糖水法灌之勢便緩隨以白虎加元明粉芩連蔞仁犀角數劑而罵詈止時或妄言知大便久不去也以潤字丸三錢投之夜出燥矢約二十枚然譫語猶未全止仍進前湯又以丸藥二錢投之出燥矢數枚溏便少許又三日方思粥飲以清氣養榮湯調理之呂東莊治吳華崖館童夏月隨役湖上感熱症下痢膿血身如燔炭因是熱症否則下痢身熱為不治矣曰此陽明病也不當作痢治視其舌必黑而燥夜必譫語果如所言診之則脈已散亂忽有忽無狀類蝦遊不可治也吳強之不得已用熟地一兩生地麥冬當歸白芍甘草枸杞佐之戒曰汗至乃活夜來熱不減譫語益狂悖但血痢不下耳服藥後見微汗少頃即止診之脈已接續分明洪數鼓指曰今生矣仍前方去生地加棗仁山藥丹皮山萸加減無當甚連服六帖其家以昏熱甚每日求更方令姑忍定以活人還汝再診脈始斂而圓乃曰今當為汝去之用四順清涼飲加熟地一兩大黃五錢下黑矢數十枚諸症頓愈越二日薄暮忽復狂譫發熱喘急口渴此欲回陽作汗也與白朮一兩黃耆一兩乾薑三錢甘草一錢歸芍各三錢盡劑汗如注酣臥至曉病霍然而愈琇按先補而下再補而汗治法固善然此症在初時數劑能與天水瀉心並行定不致如許決張楊乘六族弟患熱症六七日不解口渴便祕發狂逾牆上屋赤身馳驟譫妄罵詈不避親疏覆蓋盡去不欲近衣如是者五日矣時楊以歲試自苕上歸尚未抵岸病人曰救人星至矣問是誰曰云峰大兄回來也頃之楊果至家人咸以為奇視之良久見其面若無神兩目瞪視其言動甚壯徑有力意以胃中熱甚上乘於心心為熱冒故神昏而狂妄耳不然何口渴便祕白虎涼膈等症悉具耶及診其脈豁大無倫重按則空驗其舌黃上加黑而滋潤不燥乃知其症由陰盛於內逼陽於外雖壯徑有力乃外假熱而內真寒也其陽氣大虧神不守舍元神飛越故先遇人於未至之前遂以養榮湯加附子倍棗仁五味白芍濃煎與之一劑狂妄悉除神疲力倦熟睡周時方寤渴止食進而便通矣繼用補中益氣加白芍五味而痊琇按傷寒門張令韶治一婦譫妄發狂以聲重且長斷為實熱下之而愈此案亦壯徑有力斷為虛寒補之而愈第張案則脈伏全無為熱厥也此則脈空豁無倫為陽越也故臨症者尤不可執一端以為準的也朱湘波母病熱症痰盛喘急煩躁口渴喉中如煙火上攻兩唇焦裂足心如烙小便頻數董安於擬用十全大補煎送八味丸朱以時方盛暑又系火症不敢服招楊商之切其脈洪大而數無倫按之虛軟面色遊紅舌上生刺且斂束如荔枝曰此腎虛火不歸經脈從而病反者也當舍時舍症從脈以治之方用八味飲合生脈散倍加參地附子朱見方論與董合乃出所擬方示揚楊曰天熱症熱非有灼見何敢用此無庸疑也乃濃煎探冷與飲而愈李氏婦年六十餘患熱症胸痛悶神昏沉氣粗便祕發散消導增甚脈之滑數重按有力面色壅熱通紅滿舌黃苔中間焦黑此食滯中宮賁門壅塞太陰之氣阻而不運陽明之氣抑而不伸鬱而為火也以大劑疏肝益腎湯倍熟地與之當晚下黑矢數十塊諸症大減次日再診脈見浮洪舌上焦燥黃苔盡脫而其色反黑如炭問曰症減而舌反黑何也曰嚮者食滯便祕上下竅不通火悶不舒其焰不能上達今與以純陰之劑使便得通則壅塞之火隨便泄去而餘火未盡者復炎而上行故舌反黑耳前方加棗仁當歸山梔以滋水清肝舌黑退再以生金滋水及六君子加當歸白芍全愈朱氏媼患熱證痞悶眼赤羞明遍身瘡腫大便燥結小水痛澀聞聲則惕然而驚醫與解毒清火導赤十餘劑火益甚不食不眠脈之浮分鼓指沉則緩大兩關洪軟而遲知其外症悉假火也與參附養榮湯不敢服楊曰此症本為憂慮所傷致三陰虧損又為寒涼所迫致虛火遊行衝於上則兩目赤澀流於下則二便艱難乘於外則遍身瘡腫寒於中則胸膈痞悶故其標則似實熱其本則甚虛寒也若果系實熱何以聞響則驚寒涼頻進而反甚耶藥下咽即臥至五更大叫餓甚自寅及巳連進粥三次大便潤而小水長諸症悉退原方去附子十餘劑全瘳張飛疇治一婦人寡居五月間忽壯熱多汗煩渴耳聾脅痛醫用柴葛桂枝等劑其熱彌甚汗出不止胸滿昏沉時時噫氣診之右脈數大左脈少神舌苔微黑此伏氣自少陽發出故耳聾脅痛法當用白虎清解反行發表升越其邪是以熱渴轉甚汗出多故左脈無神胃液耗故昏悶胸滿其噫氣者平素多郁之故今元氣已虛伏邪未解與涼膈去硝黃易栝蔞根丹皮竹葉一服熱減得睡但汗不止倦難轉側或時欲嘔此虛也以生脈加棗仁茯神白芍扶元斂陰兼進飲粥以扶胃氣渴止汗斂而脈轉虛微欲絶此正氣得補而虛火漸息之真脈也復與四君歸地而痊柴嶼青治陳勾山輿人梁大患疹身熱譫語口渴遺尿服藥增劇求治兩脈沉伏意其疹尚未透擬用消毒飲子不信勢已瀕危復求診脈尚如故探其舌燥裂生刺且面垢唇焦始信為伏暑即伏氣也發於陽明故現以上諸症實熱之症急投白虎湯二劑病解而脈始洪矣故臨症者脈既難憑尤當察其舌也王節齋常治一僕人病熱口渴唇乾譫語診其脈細而遲用四君子湯加黃耆當歸白芍熟附子進一服熱愈甚狂言狂走或曰附子差矣診其脈如舊仍增附子進一大服遂汗出而熱退脈還四至矣陳三農治一人身大熱兩目出火口舌乾燥手足欲以水浸狂詈不避親疏脈豁大服黃連解毒湯益甚此心之脾胃病而心氣耗散故耳遂用炒黑乾薑一兩人參三錢白朮一錢不用甘草者恐生者瀉心氣炙者緩中致脾胃中火邪不得發散也三味煎服不逾時引被自蓋戰汗出而愈夫乾薑微炒溫中炒黑涼腎止瀉張路玉治童姓者伏氣發於盛暑診時大發躁擾脈皆洪盛而躁其婦云大渴索水二日不敢與飲故發狂亂因令速與連進二盞稍寧少頃復索又與一大盞放盞通身大汗安睡熱除不煩湯藥而愈同時有西客二人亦患此症皆與水而安薛立齋治一男子盛暑發熱胸背作痛飲湯自汗用發表之藥神憒譫語大便不實吐痰甚多用十全大補一劑頓退又用補中益氣加炮薑二劑而愈王肯堂治余云衢太史形氣充壯飲啖兼入辛卯夏六月患熱病肢體不甚熱時或揚手擲足如躁擾狀昏憒不知人事時發一二語不了了而非譫語也脈微細如欲絶有謂是陰症宜溫者有謂當下者時座師陸葵日先生與曾植齋馮琢庵二太史皆取決於王王謂是陽病見陰脈法在不治然素稟如此又值酷暑外熾過啖酒醴肉炙宜狂熱如焚不大便七日矣姑以大柴胡湯下之時用熟大黃二錢而太醫王雷庵力爭以為太少不若用大承氣王曰如此脈症豈宜峻下待大柴胡不應而後用調胃承氣再不應後用小承氣以及大承氣未晚也服藥大便即行脈已出手足溫矣乃謂雷庵曰設用大承氣寧免噬臍之悔哉繼以黃連解毒數劑而平七月初遂與陸先生同典試南京不復發矣明年王請告歸里偶得劉河間傷寒直格論讀之中有云蓄熱內甚脈須疾數以其極熱蓄甚而脈道不利致脈沉細欲絶俗未明造化之理反謂傳為寒極陰毒者或始得之陽熱暴甚而便有此症候者或兩感熱甚者通宜解毒加大承氣湯下之下後熱少退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以致身冷脈微而昏冒將死者若急下之則殘陰暴絶而死蓋陽氣竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽積熱漸以宣散則心胸再暖脈漸以生然後撫卷而嘆曰古人先得我心矣余太史所患正失下熱極以致身冷脈微而昏冒欲絶也下與不下大下與微下死生在呼吸間不容髮嗚呼可不慎哉宜表而出之以為世鑑馬元儀治馮太史因客邸無聊挾妓為樂值內虛之際又苦暑熱因而晝夜發熱煩渴引飲焦躁不寧脈之細數而急尺帶弦神氣不清此房勞過度真陰受虧陽往乘之也且煩渴身熱神昏火邪內擾外淫已極當此盛夏火炎土燥垂絶之陰其足以供燔灼者幾何若不急救其陰大事去矣用生首烏二兩為君以救肝腎之陰佐以黃連知母柴胡黃芩枳殼半夏曲橘紅杏仁化痰之品一劑而神氣清再劑而大便解熱減大半再與人參制首烏鱉甲丹皮白芍甘草調和陰陽之劑而熱退又以人參逍遙散而安張意田治甬江焦姓人七月間患壯熱舌赤少腹滿悶小便自利目赤發狂已三十餘日初服解散繼則攻下俱得微汗而病終不解診之脈至沉微重按疾急夫表症仍在脈反沉微者邪陷入於陰也重按急疾者陰不勝其陽則脈流轉疾並乃狂矣此隨經瘀血結於少陰也宜服抵當湯乃自為制虻蟲水蛭加桃仁大黃煎服服後下血無算隨用熟地一味搗爛煎汁時時飲之以救陰液候其通暢用人參附子炙草漸漸服之以固真元共服熟地二斤余人參半斤附子四兩漸得平復施笠澤治孝廉唐後坡長公病寒熱面赤頭齒大痛診之脈洪而數此熱症也當用白虎湯每劑石膏一兩一劑而頭痛齒痛俱已寒熱亦除但脈尚搏指曰須仍前再進一劑不然兩日後定發斑矣乃疑而謀之專科曰是何斗膽也石膏豈堪重劑乎置不服半月後復求治云兩日後果發斑斑十日不退退後猶灼熱曰曲突徙薪其有功乎投柴苓芍藥湯一劑而熱退後用參術調理而痊友人章深之病心經熱口燥唇乾百藥不效有教以犀角磨服者如其言飲兩碗許症頓除遊宦紀聞宋張世楠魏玉璜治表侄凌二官年二十餘丙子患熱症初愈醫即與四君乾薑巴戟諸氣分溫補藥久之益覺憔瘦狀若顛狂當食而怒則齧盞折筋不可遏抑所服丸藥則人參養榮也沉綿年許其母問豫豫曰此餘症未清遽投溫補所致與甘露飲方令服十餘劑遂痊甲申夏復患熱症嘔惡不眠至七日擬用白虎湯以先日服犀角地黃而吐疑為寒不敢服延一盧姓醫至診其脈伏按其腹痛謂此疝症非外感也脈已全無危險甚矣姑與回陽脈復乃佳所用葫蘆巴吳茱萸肉桂乾薑木香小茴香丁香青皮橘核等約重三兩餘令急煎服蓋是日夜半當戰汗故脈伏而厥痛彼不審以為寒症也乃用此方黃昏服下即躁擾煩渴揚手擲足譫語無倫汗竟不出蓋陰液為燥熱所劫不能蒸發矣侵晨再亟診脈已出且洪數而目大眥及年壽間皆迸出血珠鼻煤唇焦舌漸黑小便全無令以鮮地黃四兩搗汁一茶杯與之飲下即熟睡片時醒仍躁擾再與白虎湯加鮮地黃二兩煎服熱漸退神漸清次日漸進粥二白睛赤如鳩目繼而口鼻大發瘡瘍改與大劑甘露飲二十餘日始便黑糞甚夥猶時時煩擾服前方五十餘日忽大汗自頂至足汗極臭自是全瘳陸暗生曰鼻者肺之竅大腸者肺之府童年攻苦心氣有餘心血必耗血衰火旺金受其刑故上下結燥用二冬滋金清火以治其標火燥有餘元氣必不充足脫肛出血皆元氣不能統攝也故用生地引人參以培天一生氣之原以治其本否則必不免童勞之患矣徐靈胎曰世有姦醫利人之財取效於一時不顧人之生死者謂之劫劑劫劑者以重藥奪截邪氣也夫邪之中人不能使之一時即出必漸消漸托而後盡焉今欲一日見效勢必用猛厲之藥與邪相爭或用峻補之藥遏抑邪氣藥猛厲則邪氣漸伏而正亦傷並進補則正氣驟發而邪氣內陷一時似乎有效及至藥力盡而邪復來元氣已大壞矣如病者身熱甚不散其熱而以沉寒之藥遏之腹痛甚不求其因而以香燥之藥御之瀉痢甚不去其積而以收斂之藥塞之之類此峻厲之法也若邪盛而投以大劑參附一時陽氣大旺病必潛藏自然神氣略定越一二日元氣與邪相併反助邪而肆其毒為禍尤烈此峻補之法也此等害人之術姦醫以此欺人而騙財者十之五庸醫不知而效尤以害人者亦十之五為醫者不可不自省病家亦不可不察也內府祕授青麟丸方用綿紋大黃十斤先以淘米泔浸半日切片曬乾再入無灰酒浸三日取出曬大半乾第一次用側柏葉墊甑底將大黃鋪上蒸一炷香久取起曬乾以後每次俱用側柏葉墊底起甑走氣不用第二次用緑豆熬濃汁將大黃拌透蒸一炷香取出曬乾第三次用大麥熬濃汁拌透照前蒸曬第四次用黑料豆熬濃汁拌透第五次用槐條葉熬濃汁拌透第六次用桑葉第七次用桃葉第八次用車前草第九次用厚朴第十次用陳皮十一次用半夏十二次用白朮十三次用香附十四次用黃芩以上俱如前煎湯浸透蒸曬第十五次用無灰酒拌透蒸三炷香取出曬透研極細末每大黃一斤入黃牛乳二兩藕汁二兩梨汁二兩童便二兩如無童便以煉蜜二兩代之外加煉蜜六兩搗和為丸如梧子大每服二錢治一切熱症
