body:
  text: 卷二十六痘證諸家痘瘡方論讀前人之書當知其立言之意苟讀其書而不知其意求通於用不可得也痘瘡之論錢氏為詳歷舉源流經絡分明表裡虛實開陳其施治之法而又證以論辨之言深得著書垂教之體學者讀而用之如求方圓於規矩較平直於準繩引而伸之觸類而長之可為無窮之應用也今人不知致病之因不求立方之意倉猝之際據症檢方漫爾一試設有不應並其書而廢之不思之甚也近因局方之教久行素問之學不講抱疾談醫者類皆喜熱惡寒喜補而惡解利忽得陳氏方論皆燥熱補劑其辭確文簡歡然用之翕然信之遂以為錢氏不及陳氏遠矣或曰子以為陳氏方不足歟曰陳氏方誠一偏之論然亦可謂善求病情者矣其意大率歸重太陰一經蓋以手太陰屬肺主皮毛足太陰屬脾主肌肉肺金惡寒而易於感脾土惡濕而無物不受觀其用丁香官桂所以治肺之寒也用附朮半夏所以治脾之濕也使其肺果有寒脾果有濕而兼有虛量而與之中病即止何傷之有哉今也不然徒見其瘡之出遲者身熱者泄瀉者驚悸者氣急者渴而思飲者不問寒熱虛實率投木香異功等散間有偶中隨手獲效設或誤投禍不旋踵何者古人用藥制方有嚮導有監製有輔佐有因用錢氏方固未嘗廢細辛丁香白朮參耆率有監製輔佐之藥不專務於溫補也然其用寒冷者多而於輔助一法略開端緒未曾深及癡人之前不可説夢錢氏之慮至矣亦將以候達者擴充廣而用之雖渴者用溫藥癢塌者用補藥自陳氏發之回出前輩然其多用桂附丁香等燥熱恐未為適中也何者桂附丁香輩當有寒而虛者固是的當虛而未必寒者其為害當何如陳氏立方之時必有夾寒而痘瘡者其用燥熱補之固其宜也今未夾寒而用一偏之方寧不過於熱乎豫嘗會諸家之粹求其意而用之實未敢據其成方也王節齋曰近時小兒痘瘡多用陳文中木香異功散殊不知彼時立方時為運氣在寒水司天時令又值嚴冬大寒為因寒鬱遏痘瘡不紅綻故用辛熱之劑發之今人不分時令寒熱一概施治誤人多矣又曰丹溪痘瘡治法最為明備近世通用陳文中異功等方乃一偏之術若痘瘡虛怯淡白癢塌此屬虛寒宜用陳文中方若發熱壯盛齊湧紫色燥癢此屬熱毒宜涼血解毒自陳文中方盛行後屬虛寒者率得生屬熱毒者悉不救痘是胎毒古人治法只是解毒然氣血虛則毒氣不出反不能成漿故陳文中之法亦千載妙訣補前人之所未備者但溫補之法既行而解毒之旨遂隱故救得一邊又害一邊今必詳究丹溪二法通用斯無弊也魏直曰痘漿數日隔頂漿滯不行或風寒所阻者宜用水楊葉無葉用枝五斤流水一大釜煎湯溫浴之如冷添湯良久照見纍起有暈絲者漿行也如不滿再浴之力弱者只洗頭面手足如屢浴不起者氣血敗矣不可再浴始出及癢塌者皆不可浴痘不行漿乃氣澀血滯腠理固密或風寒外阻而然浴令暖氣透達和暢鬱蒸氣血通徹漿自貫滿功非淺也若內服助血氣藥藉此發之其效尤速直見一嫗用此有驗即得其方行之百發百中慎毋忽也古無此法故詳注之水楊乃草也非楊柳之楊人家有小兒出痘者宜先收取否則一時難覓安慶張氏傳種痘法云已三世其法先收稀痘漿貯小瓷瓶遇欲種者録小兒生辰焚香致几上隨將黃豆一粒敷以藥按方位埋土中取所貯漿染衣衣小兒黃豆三日萌芽小兒頭髮熱五日豆長兒痘亦發十日而萎兒病隨愈自言必驗福山戍卒遇一醉虎縛獻王大將軍轅門將軍剖肉分贈郡紳云小兒食之可以稀痘李捷用頭生雞子三五枚浸廁坑內五七日取出煮熟與食數日再食一枚永不出痘徐都司得於淅人之方朱丹溪治一叟發熱而昏倦其脈大而似數與參耆歸朮陳皮大料二十劑而痘出又二十劑而膿泡成身無完膚又六十劑而安痘症有二一曰血熱毒盛一曰氣虛毒盛氣虛者可以徐補血熱毒盛者勢必亟一發熱便口渴面赤氣喘狂躁譫語此其證也一見點即宜涼血解毒急磨犀角汁多飲之十可療四五稍遲難救矣又有血熱兼氣虛者初發先服涼血解毒之劑五六朝後可以併力補氣助漿若初時不早涼血則毒不解延至六七朝勢必以參耆助漿漿必不來反流毒火又有血熱毒盛似氣虛者初熱放點神思昏亂足冷痘色白如水窠惟有唇腫口渴辨其火症醫者反以氣虛治之十無一生廣筆記葉天士曰論痘首推錢仲陽陳文中二家錢用寒涼陳用溫熱確乎相左丹溪祖錢非陳分解毒和中安表為要以犀角地黃湯為主方舉世宗之莫敢異議後之萬氏以脾胃為主魏氏以保元為主皆從二家脫化費建中救偏悉以石膏大黃徐靈胎曰最不通胡氏輒投汗下松江東地多宗秦鏡明京口江寧咸推管柳保赤吾蘇悉遵翁仲仁金鏡録可謂家喻戶曉者其所長在乎看不在乎治看法精確有可以前知之巧妙後之翟氏聶氏深以氣血盈虧解毒化毒分晰闡揚錢陳底蘊超出諸家因分別太多讀者目眩心憒不若翁仲仁芻蕘悅口也然眼目之功須宗翁氏而匯治講究參之諸家可矣徐靈胎曰痘症因時而變不但歷代不同隔數十年亦有小變錢仲陽時所説痘症痘形與今大不相同其方亦迥別神而明之必合曆代之言而參觀之也大凡發熱三日而後見點是其常即以熱勢參詳見症定其吉凶翁仲仁金鏡録甚明茲不復贅傷寒邪由外入痘子熱從內起但時邪引動而出與傷寒兩途周歲小兒初熱即現驚搐昏迷之狀最多世俗謂驚痘最好此言未必盡然方書云先驚後痘者生先痘後驚者死頻頻驚厥最多悶痘蓋痘由腎至肝至心脾及肺自里至外自深至淺未發之前痘熱先已內動目現水晶光芒腎熱也水生木而入肝木生火而入心火生土而入脾土生金而入肺其先天痘毒從至陰以達陽全藉身中元氣領載充長以化毒為漿徐靈胎曰豈可先用惡藥傷元漿必膿厚蒼老而始結痂毒已外泄元氣內返斯無變症周歲以內身小元弱常有熱一日即止亦有順痘但須看神氣靜躁熱勢輕重見點徐徐而出既出即長熱緩安乳便是好症若神氣雖安熱亦不盛痘點雖不多形呆色鈍或作頭耎足弱脈懈不束筋骨隱隱嘆息或短氣如喘或嘔或瀉徐靈胎曰皆由氣血不足毒氣不能外發之故最多悶症徐靈胎曰句句真傳若二三日間痘苗已長色亦頗好竟夜終日煩躁不止最妨隱處發疔及發斑夾疹等症一發熱煩躁標點雖見熱躁愈加細詢無忽再參兼症為六氣鬱遏者從時氣治為內傷停滯者從里症治亦有表裡兩解者亦有下奪者但下法寒涼之中必須活血理氣防其凝澀冰伏徐靈胎曰此乃痘中兼症非明於內外科者不能初起必三次而出熱止即齊其增點亦有陸續發出者須看顏色靈活生氣頃刻轉機變化為要察形辨症治法用藥表藥活血疏肌次則涼血解毒實熱便閉者微下之虛弱氣怯者忌進疏解寒涼間有虛寒弱稚初發身不大熱四肢皆冷吐乳瀉乳痘點不長聞聲悠悠欲絶望色慘淡無形恰在一二朝間余見程氏女年甫半齡布痘極多痘形耎色淡白前痘迭見近地幼科僉用荊防蒡蟬紅花楂肉木通胡荽筍尖之屬方雖寫而示以凶危延余診視余曰毒重氣虛法在不治但身無熱見症虛寒不因厲氣表邪焉用表藥考萬氏始終以脾胃為主以理中湯加丁桂與服徐靈胎曰前症皆虛寒之體此等藥其效如神一劑肢暖嘔止再服利緩痘起再用參歸鹿茸二服以錢氏異功散而愈凡看痘先論兒體強弱辨肌色如色白多氣虛色蒼多血熱形象尫羸有宿病或渴乳肌柔白嫩者痘必鮮明蒼黑皮粗者色必暗晦羸瘦病質色燥形枯必須辨明依期長養內症安和病軀出痘即平順無逆亦難調理歌訣云形體羸瘦骨如柴肌肉枯焦神思衰遍體鋪排如此痘縱能漿足亦堪嗟一初見腰痛足耎不能起立者死此毒伏於腎一初見腰腹脹胸高續增喘噦者死一初見目睛呆瞪或暗無光或黑白高低皆屬緊悶症一初見痘煩躁不止即防疔斑疔必現於隱處多死一初見痘痘不續發斑色深紫漸變藍黑亦六日內死一初見痘紫斑漸起痘反隱伏此名紫斑白悶一初見痘痘斑間雜若似灑珠點墨必死以上皆論初見看法以定凶危發齊熱退後皆無諸惡症翁仲仁云三日四日痘出當齊點至足心勢方安靜若論幼小之兒氣血易周常有未及三日而發齊者年長之體四日以外猶有增發者痘子稀少數不盈百不必點至足心仲仁大意謂發齊安靜無慮變症然須辨明痘形痘色是何等呈色身體強壯痘屬上中方可許其無慮倘幼小弱質或病後或帶別病而後布痘未可見痘好浪許再以冬夏氣候審詳可以百千無誤今世用方初見宜解肌疏表通套法荊芥四日不用防風三日不用前胡四日不用牛蒡子四日不用紫草二三日便滑忌木通紅花甘草赤芍天蠶楂肉川芎連翹桔梗廣皮蟬蛻三四日不宜用方書中未見點用升麻葛根湯徐靈胎曰此是開宗第一方今人不用伍氏方法見點忌升麻後人謂葛根表疏亦忌此輕揚升表通套藥若里症急須兩解伍氏方一二日用羌防透肌湯今人不用惡其辛溫氣雄也一二日壯熱氣促煩渴便祕痘粒不發仲仁云若非風寒壅遏定是氣虛不振愚謂近世布痘每盛發於君相風木燥金司令蓋非火不發也火鬱發之升陽散火是已但前症若裡熱甚重煎灼脂液徐靈胎曰必有此二句後方方可用苟非苦寒下奪佐以升表不能治也費建中方頗為中的石膏大黃連翹赤芍青皮腹痛用楂肉紫草木通丹皮辛涼入血犀角辛涼通血發齊後用黃連凡寒涼清火解毒必佐活血疏暢恐凝滯氣血也實熱便祕通用涼膈散防風通聖散前胡枳殼湯四順清涼飲痘四日發足伍氏遵古方用牛蒡子熟末三分用荸薺汁酒釀燉熱調勻臨服刺入生雞冠血十餘滴與服毒輕者即起光潤之色世皆宗之發齊已四五日用涼血解毒湯藥伍氏名四聖飲非扁鵲原方徐靈胎曰方極平穩生地連翹銀花紅花甘草天蟲桔梗紫草徐靈胎曰純是涼血之品血熱加丹皮犀角火盛加黃連石膏羚羊角有斑加金汁元參頭面不起加川芎雞冠血咽喉痛加射干玄參山豆根狂亂躁擾加地龍汁毒重血凝加豬尾血冰片近世涼血解毒多用地丁銀花湯煎藥凡看痘初起要根盤其痘易長綻倘光瘦不肥多險成漿之後務要根盤即花一線圈紅緊附頂滿滾圓是為毒化若頂陷頂皺根盤黯僵其毒與氣血交凝實宜攻虛宜補實火宜清攻不宜早看來火色大赤痘形色濕潤方可攻托否則搔擦立至干剝毒陷不治虛有氣虛血虛之分血虛為熱氣虛為寒但虛熱與實熱不同虛熱用滋清方藥痘頂屬氣根盤屬血氣領血載毒得煅煉化漿凡體強質實者多火以清涼之劑火解漿成誤補則癰癰者壅也其氣虛血弱色必淡白形不雄偉或頂陷或皮皺內症則噁心少食便溏年少未進穀食者腸胃薄劣最多虛症七日以來元氣用事不能勝毒使之外出多有內陷致變者余最究心是症調之應手取效魏氏保元湯聶氏參歸鹿茸湯陳氏木香異功散腸滑不禁用七味豆蔻丸白朮散理中湯多獲奇效甚者必用三服徐靈胎曰用補之方盡於此矣大凡兒肌白嫩者多虛症蒼黑者多實火雖為大概亦屬至要白嫩發痘色必鮮豔勿謂便是善症蒼黑髮痘色必暗晦勿便許為凶總以神氣安靜顏色日換形象漸長便吉六七日伍氏內托散生黃耆甘草陳皮川芎當歸防風白糯米天蟲角刺銀花血熱者不用耆芎歸表虛者去天蟲角刺血熱仍用丹皮地黃紫草連翹羚羊豬尾雞冠雞鳴散達表之藥豬尾膏通里之藥保元湯人參黃耆炙草加川芎當歸名芎歸保元虛寒加肉桂升頂加鹿茸氣滯正氣加廣皮厚朴瀉加木香肉果質弱加坎氣河車嘔逆加丁香厚朴參歸鹿茸湯人參當歸鹿茸黃耆龍眼肉炙草木香散人參木香丁香桂心大腹皮青皮訶子半夏甘草前胡赤苓異功散人參木香官桂廣皮當歸茯苓丁香附子肉果厚朴半夏白朮豆蔻丸肉果枯礬訶子龍骨赤石脂木香砂仁白朮散四君加藿香木香七八九日頻用清涼痘火色既退漿不能透或有半漿頂有箬笠之形不克充灌今人多用桑蟲漿生用雞冠血生用同酒漿和服倘攻起少頃後呆滯者須用補托伍氏攻發藥用老人牙煅研極細加麝香少許每服二三分名黑靈丹上天蟲乃疏表風藥山甲乃攻經隧風藥一味為末酒漿服曰獨勝散凡蟲蟻皆攻無血者走氣有血者走血飛者升地行者降凡漿足聲音啞者不妨驟喘痰升者大忌徐靈胎曰喉中痘足聲亦啞翁仲仁云挫喉聲啞漿行飽滿亦無妨蓋痘漿因熱氣以煉成必升騰以達頭面肺位最高熱上蒸迫肺先受損是以聲出不揚倘喘急扶肚抬胸乃火毒歸肺必不治矣火毒歸肺幼科每用珠子牛黃膏連三服多不效余遵孫真人葦莖湯或仲景葶藶大棗湯間有效者肺氣壅遏苦寒直下已過病所故無效徐靈胎曰真屬妙談須參之方書以六七日以前寒戰屬氣虛六七日以前咬牙屬胃熱六七日以後咬牙屬血虛亦屬定論八九日癢塌咬牙痘不起漿或灰白或涸或癟危險極矣速速溫補亦可望生翁仲仁云塌陷咬牙便實聲清猶可治聲清則上無熱壅痰聚便實則腑陽未至盡泄所以溫補得效耳木香散異功散八九日順痘漿色蒼黃毒氣悉化亦云垂成須謹防護持搔損流膿裂血倘正氣大泄毒從虛陷常有不治之患斯時預囑伴母勿懈使痂靨乾結肌肉完固便是全功若痘已破碎聲不啞者毒不陷也無妨徐靈胎曰祕訣伍氏方用芍藥湯炒白芍薏仁茯苓地骨皮銀花百合山藥建蓮十一二日漸次成痂之際極好之症必有咳嗽或夜暮身熱世俗幼科僉云毒氣未盡概投苦寒多有胃減廢食釀成痘勞童怯者吾嘗論痘自腎臟骨髓之中由肝主筋心主血脈脾主肌肉肺主皮毛從內之外毒乃渙釋收疤之時真氣歸里肺合皮毛是為未傳處位高體清肅從前灌脹成痂蒸迫之氣受虧已極氣泄為咳矣況投利濕下注藥而結痂其上焦已經轉燥若毒仍留伏焉能收靨此斷斷然也再論幼稚陽常有餘陰未充長布痘至於結痂一身脂液大損其陰氣告匱可知故暮夜屬陰時為煩為熱者正內經云陰虛生內熱也西郊吳氏女年甫四歲痘系順症幼科調治至漿滿成痂之日忽發煩躁夜熱不寐晨起安然醫用保元及錢氏五味異功散加芍藥與服熱躁益加又更一醫曰毒氣未盡乃誤補之故用桑蟲漿暨涼解藥服後躁甚而添泄瀉邀余診視睹漿痂形色詢平素起居時日當午即用六味地黃湯徐靈胎曰所謂養陰之法一服而安此二條人多忽而不究故辨及之若旬朝後嗽大法以甘寒生津胃藥蔗漿麥冬沙參緑豆皮地骨皮甘草玉竹甜杏仁解餘毒藥全以不傷胃氣為主若用芩連必須酒製翟聶二氏辨之詳矣平和無奇斷不敗事徐靈胎曰名言如三豆飲之屬若金銀花一味本草稱解毒不寒余見脾胃虛弱者多服即瀉伍氏用連翹飲子亦取平和痘毒癰瘍熱症十有七八虛寒十有二三甚至骨出腐敗亦有愈者但外科大忌用火煉升藥其診看之法亦如瘍毒須分陰陽耳痘疳濕盛生熱強者用苦寒清降以苦能去濕也若阻咽廢食以及穿腮破頰者難治年長出痘男女欲已動其初即視膝痛腰痠咽喉窒痛欲閉苦辛寒藥必不效驗宜甘鹹寒滋水制火佐以解毒六七日來痛勢日緩聶氏有參麥清補方余每用錢氏六味加龜膠元參秋石獲效者甚多若漿不肯起頻吐黏涎者凶凡惡痘凶危瞬刻如諸悶症不過三五日已發而縮其危最速總在七日內再若矇頭鎖喉懸鏡纏腰蜘窠蠶種等為十惡症其袁氏十八惡症今人未嘗齒及如此等痘治之無益徒招怨尤更有糖沙夾斑十朝危期又根枝雖好布於歲內幼小之兒必八九風波不治半漿毒陷之變必斃於十一二四之期若能食者十救一二痘至八九旬日外無漿則里毒不化必嗆啞瘙癢痰潮不食眼開條款難以盡言危期速矣常有忽然連串片片之痘裂水形如松脂桃膠外露轉眼堆聚內症漸安變凶轉吉更有旬朝內外干板涸如焦鍋巴狀毫無生氣忽從地角承漿諸處裂縫流臭水漸升頭額堆腫高厚若糊臉名曰發臭毒泄即當補托遲則氣脫徐靈胎曰祕訣小兒痘痘之為症嬰兒之大劫也自漢以前無有元朔中武帝使使至回鶻因傳染入中國其氣腥穢難近惟大貴而賢者則間出墨痘此絶無而僅有者也崑山朱𦮕靖公名希周幼時出痘顆顆皆黑若束一帶於腰間者諸醫皆謂不治有一醫能識之謂朱翁曰令嗣之症無妨也然願與公約我有弱女痘痊後欲得令嗣入贅翁許之後遂贅焉醫固富凡膏火之費悉以資之後公中弘治丙辰狀元官至禮部尚書為禮樂名臣卒年九十四諡𦮕靖張達泉治顏銓部為兒時中痘已死達泉視之曰未死也急掘地作坑置兒其中取新水數桶用紙蘸之重貼其身上少頃有細煙起兒手微動達泉喜曰生矣復以水沃之氣蓬蓬上蒸大啼數聲取起再進以藥不數日愈王敏治千戶申志年二十忽瞑眩譫語體熱而咳衆醫以傷寒治敏曰痘也與升均湯而瘡出葛茂林診汪比部子年二十五矣忽患痘汪故知醫以為無恙也葛視怫然逮五日而足七日而靨亦怫然至十四日而痂落汪信其無虞葛曰災其在彌月乎至期而其子晏然汪置酒高會若以誚葛者葛視其子之足底有泡結瘢膚內曰籲其殆哉逮是日而暴歿汪以為神問其故葛曰夫痘構形之餘穢也苟有纖芒未盡亦無生理是疾初發自腎而我知其不能暢是以必死既而流注於足底焉以故發之緩而必至是日也汪歎服沈好問治沈勤云義女年十歲幼子痘女抱兒出診沈曰兒無傷女即出惡痘矣若呼頭及骨痛宜服糞清如其言而愈唐守元治園花祝氏兒患痘症遍身血迸無罅唐搗藥塗其身糝藥茵蓐上捲起倒豎床前閣家啼駭唐叱曰若輩勿驚此名蛇殼痘必用逆乃得脫已而皮膚解裂如蛇蛻然遂愈關家女阿觀年八歲出痘甚多惡沈曰諸醫云何對曰死症不必藥矣沈曰兒一身死痘然有一生痘尚可生令取五年抱雛母雞用藥入雞腹外以糯蒸雞令食盡視之右手關脈痘二粒明豔如珠女果生江魯陶子一歲痘止三顆見額上耳後唇旁沈曰兒痘部位心腎脾三經逆傳土剋水水剋火宜攻不宜補攻則毒散補則臟腑相戕治至十四日痘明潤將成矣沈曰以石膏治之恐胃土傷腎水也俗醫憐兒小謬投以參沈見之驚曰服參耶不過二十一矣兒卒死許季明幼子痘沈曰順症也不必補小兒純陽陽盛必克陰許不從痘愈譏沈為妄沈曰兒且死許益不悅至十二日兒熟睡視之絶矣潘氏云一女病發熱腰痛手足厥逆目如昏悶形症極惡疑是痘候時暑月急取屠家豬血倍用龍腦冰片也和服得睡須臾一身瘡出而安若非此方則橫夭矣本草綱目括蒼陳坡云分教三山日其孫方三歲發熱七日痘出而倒靨色黑唇白冰冷一士教以用狗蠅七枚擂細和醅酒少許調服移時紅潤如常又其次女痘後毒上攻遂成內障一醫者用蛇蛻一具洗淨焙燥天花粉等分細末之入羊肝內麻皮縛定用米泔熟煮切食之旬日而愈居易録狗蠅夏月極多易得冬月則藏於耳中扶溝趙神仙傳起死回生散治痘瘡至七八日忽然變色黑收入腹內遍身抓破吭喘死在須臾服此從新另發出立可回生方用四物湯加升麻紅花上陷加白芷下陷加牛膝遍身黑陷加麻黃象糞微炒如一歲用二錢大則用至三五錢右銼一劑半水半酒煎服從新發出腳下有黑疔至七八日用針挑去以太乙膏貼之即拔去毒連進二三服朱丹溪治一子七歲痘將出未出之際腹泄數行其泄色黑不髮根窠三日後癢抓出即黑水口渴其根窠如水疥狀不紅澤不起發食少脈浮數有力按之虛遂用參耆歸朮陳皮肉豆蔻為君炙甘草訶子桂為使水煎熟好酒些少咽下癢立止食立進根窠紅澤而起發二服全愈龔子才治一女痘出至脹滿將貫膿時忽紫黑抓破流血此屬熱毒太盛乃用皮硝不拘多少入花椒一撮煎水用青布蘸搭患處頻頻良久即起脹如舊孫文垣治鄭都諫長君四歲患痘稠密煩躁醫皆謂熱盛不退形枯色紫頂有焦勢症逆不可為孫至細審之見兩太陽圓淨神氣蒼厚可生在此謂當急為涼血解毒用赤芍生地各三錢紫草二錢連翹黃芩貝母山楂木通各一錢蟬蛻甘草各五分藥成劑而衆止之曰麻要清涼痘要溫今乃獨主寒涼保元之謂何孫曰用藥貴對症保元湯溫矣必血活熱清而後可用今血熱毒盛而用溫劑是火熾添油也衆曰若慮毒未解吾苕酵法甚佳用桑蟲雞血酒調服之痘即立起孫曰此法亦可用於清解後火未退而用是以毒攻毒其勢愈熾鄭遂命煎服其減去山楂貝母從衆議也次日痘色明潤焦頂盡退血亦漸活惟嘔噦搶喉衆謂藥所致孫曰此火毒未盡也宜進竹茹湯乃大譁鄭弟檢痘疹全書用竹茹以證乃已藥進而噦止至八日泄瀉發癢乃以保元湯加白芍術大加首烏一帖瀉癢止至十四日天庭兩顴皆回漿作靨惟兩頤未回泄瀉不止逾半日口開頂軟四肢盡癟腹又脹已成內攻舉家啼泣孫亦茫然不遑為計太息出門鄭弟把袂相送揖別頃聞衣間痘臭語之曰君聞臭乎曰聞孫曰似有生意急還起之因思頤乃腎經部位獨不回漿者腎元虛也峻補乃可使活先以紫河車一錢用酒調服服後即睡繼以人參一兩黃耆菟絲各三錢作大劑服之一日夜服人參一兩八錢再視之其結靨之下復灌一線黃漿蓋贈痘也遂調理而愈此症如不收功則向之指斥寒涼及戒用竹茹者皆可藉口矣此氣虛血熱而胃氣不暢也於涼血劑中少用葛根以暢胃氣則焦頂立化更參用參耆以補氣則其痘立長此豫友趙功甫法也目睹其用藥輒應手見效孫君尚未達此旨故不免多費周折耳喻嘉言診顧諟明子種痘即請視其痘苗淡紅磊落中含水色明潤可愛且顆粒稀疏他醫已先誇為狀元痘昌未知也躊躇良久明告曰此痘熱尚未遏頭重頸軟神躁心煩便泄青白全是一團時氣外感兼帶內虛若用痘門通套藥必危之道也必得一二劑先退其外感則痘不治自痊若遲二三日緩無及矣彼不聽而以蝦魚雞筍發痘之物雜投誤上加誤適所以速其亡耳才至六日而壞正應感症壞期若痘既美即有意外變症亦在一月半月矣越二日次男即發熱布痘仍挾時氣外感仍用前醫仍六日而壞馮楚瞻治蔣總憲之孫痘不甚密但先天甚弱壯熱潰汗不止四五日來痘反退縮平陷昏睡驚惕馮曰壯熱者陽在外也潰汗者陰外泄陽不斂也宜滋陰養陽補中則痘不發而自起矣以熟地八錢乳炒白朮三錢牛膝八錢麥冬二錢五味四分上肉桂六分煎服不逾時熟睡身涼汗收神爽痘起思食而愈胡氏子患痘初起甚危一老醫斷其必死延馮同治見其方寒涼大甚所以伏而不出有喘急腹脹諸症也先以酒釀雞冠血調下獨勝散一服解其冰伏之勢喘熱俱減痘有出勢其醫以必不救為爭馮曰毋若是以重主人之憂望為同事吉則君之功凶則某之事彼猶不然其父惟日夜痛哭勉留調治十愈八九主人仍不樂蓋渠每日診視諄諄斷以不起時日直至結痂全愈主人乃喜迎於色悔聽蠱惑幾至敗事馮楚瞻五兒稟賦素弱年四歲出痘發熱一二日便神氣困倦汗出如雨已見痘因汗多陽虛一切疏解屏不用三日外汗出不止清利甚頻所見之痘反隱隱退縮未出者則窅如也以人參炒白朮各三錢炙甘草八分固中為君天蠶三錢角刺一錢炒甲片六分攻托為臣以川芎八分升提而兼辛發肉桂六分溫經而兼外達為佐四日汗瀉小減出見少長未出者見形仍用前方加當歸大棗煎服五日起脹者少有膿色後出者亦有起脹之勢但面上之痘淡紅無光彩身背之痘紫陷不潤澤知由氣血兩虛兼血滯而然只以溫補氣血為主前方加黃耆山藥黏米圓肉煎服六日痘色紅活但皮薄而亮膿色清稀四肢水泡知氣血弱而脾土更虛也乃用保元湯加桂人參五錢滋補元氣為君生耆二錢充補衛氣為臣炙甘草六分緩中補土黏米一撮內壯胃氣外釀膿漿為佐肉桂宣通血脈補托為使七日膿色大長以和平養長之劑而痂吳孚先治一兒患痘至出齊後忽變灰白七八日毫無漿路更兼便溏不思飲食勢極危用人參鹿茸制附肉桂木香桑蟲人牙穿山甲角刺防風桔梗糯米以黃耆二兩煎湯煮藥一帖有漿腳二帖起脹三帖漿足矣一兒十三歲痘出稠密至八九日將貫膿時粒粒陷入成窠或以木香異功散陷伏愈甚視其痘色紅紫而體氣不弱曰此血氣欲行漿為毒氣壅遏故痘頂陷伏宜速清毒血氣自行緩則有變用當歸生地白芍紫草牛蒡連翹桔梗甘草山楂黃耆加酒炒芩連人參三分一劑而陷立起再劑而漿充滿矣一兒年十四痘出身熱三四日後出才隱隱數點忽發譫狂或以涼藥解毒診之六脈緩弱痘色淡白曰此至虛似實也緣氣血虛弱送毒不出故發譫狂與實熱發狂者迥別投以溫中補氣之藥痘出遍身譫狂頓止王履素曰余孫孟溥出痘起發貫漿俱如法惟回漿太早九朝左臂發一痘毒醫通用清熱解毒之藥不四劑而寒戰咬牙之症作矣皆泥於痘毒不敢用參術止用歸耆而兼解毒余謂痘後氣血俱虛復以寒藥敗脾故見斯症陽氣已虛甚即有歸耆亦何能濟況尚兼清解乎必無幸矣保嬰撮要寒戰咬牙門用十全大補湯即痘毒門初發時只用仙方活命飲一二劑旋用托裡散助其元氣則未成可消已成可潰設使氣血不充則不膿不潰難以收拾於是斷以己意服十全湯三劑而寒戰止再數劑而咬牙定及延瘍醫妙手外治其毒內服參耆歸芍不輟凡匝月而愈當寒戰症作臂腫方焮用藥頗多疑慮人參且不敢多用而況白朮至於桂更無敢用至三分者余嘆曰立齋斷不誤遂決用大劑參術加桂至五六分而諸症皆瘳矣立齋之誤亦多矣未可以此為據也周懷第四兒生四十餘日即出痘其初頭上並身上不過三四點身不甚熱飲乳如常醫謂痘極少當不滿百粒周未然之即令禁風調理再二日遂多甚頭上胸腹腰背手足俱稠密至額上面上及陰囊俱一片純紅不分顆粒臍內甚多因腫大突出舌上亦多形如白粟膿漿布滿醫又謂兒小痘多且有不順諸症此必不可為矣因視其痘色紅活頗能飲乳宜可調治第慮其氣血不支以參耆炙草煎濃汁時與乳相間飲之五六日後頭上多有膿漿間有水泡身上及手足則水泡大半膿泡僅小半耳謂其氣血有限理所宜然所慮額上面上一片純紅者忽有一二次變黑因大驚以為逆候也然察兒精神及飲乳略無困憊至三更陰囊下亦轉黑結痂因悟其非惡候乃兒小血氣易於周浹七日後即收靨耳至八日寅卯時自上至下俱結痂至時結完九日自上至下俱痂落至晚落完既而遍身發大熱此毒未盡發是以速收速落將發癰也急宜解毒以大連翹飲濃煎汁每用半酒杯以茶匙緩緩挑服一日夜服三酒杯而熱退可無癰患矣其鼻上有痂封固以蜜密潤之用銀耳挖挑開以出其氣純紅處膿水未乾以黃柏黃連甘草地骨皮五倍子為細末糝之陰囊流清水用棉繭散糝之皆愈此氣至而血不至也欠此養血一著故毒不盡解留為後患周次女六歲出痘發熱甚緩至二日面與手微有痘影數點熱至第四日其點仍舊且帶白色困倦嗜臥不思飲食醫視之謂痘輕少不滿百粒周心甚疑謂痘既少兒當精神清爽飲食如常今困倦嗜臥不思飲食痘影淡白此必氣血虛弱送痘不出故也乃以溫中益氣湯托之一帖而皮下隱隱欲出者甚多二劑而痘出大半一日夜盡四劑而遍身出齊稠密特甚緣數日前曾患發熱嘔吐稍傷胃氣故必待溫中托裡而痘方出故也若不察其虛不逐毒出外必致內攻之患矣周妹年二十三妊三四月偶受驚恐時歸寧不數日而半産又不數日而發熱二日而痘出頗多至四五日出齊甚稠密色淡白而嘔吐醫見稟氣怯弱半産後痘出又多皆不敢施治周曰豈有坐而待斃者乎遂以參朮陳皮等安和胃氣止其吐嘔而痘色亦稍紅活因喜曰此可溫補而愈也以參耆歸芍炙草丁桂木香等大劑投之覺痘色轉紅活若半日不藥則又轉淡白於是一日夜必盡兩大劑至貫膿時惡露尚未盡乃曰此注漏卮也即於前方中去官桂木香入炒黑乾薑蜜炒升麻柴胡各一錢二分阿膠艾葉各八分二劑而惡露止前方除此五味頻與之膿漿充滿至二十餘日乃收靨計服藥四十餘帖每劑用參耆各三錢丁桂各一錢他藥稱是豈區區常格之所能盡哉痘後又患眼腫翳頗盛服清毒撥翳湯數十劑而愈周表侄孫十歲出痘極稠密頸項尤多俗名鎖頸又有暴脹賊痘數粒在各處其痘初出帶紫黑色醫謂斷不可治周視之已六日余矣尚無些少膿漿或者猶欲解毒周曰此但膿漿充滿便可生且至此時尚何毒之可解也兒素嬌不肯服藥而喜飲酒尚能飲酒非逆症可知周曰此時正宜飲酒遂與參歸鹿茸湯一大劑令濃煎汁以好酒相半和勻頻飲之自申至辰服完一劑其頭面各處已膿漿大半矣至午刻忽溏泄二次知其內虛脾弱也以參朮散投之稀粥內服二三錢泄止再服參歸鹿茸湯一帖遂充滿矣痂後餘毒頗盛大便祕澀用大連翹飲加酒炒大黃一錢二分數劑而安一幼兒三歲出痘將靨時泄不止諸藥不效周以七味豆蔻丸數十粒與之亦不能止其丸從大便而出知其虛滑甚也仍以前方教以米飲浸軟研如泥和粥少許食之泄止痘靨而安服法精妙一幼女年六歲出痘其症虛弱先服補藥已多結痂後忽泄不止服異功散加訶蔻不效醫將以七味豆蔻丸與之周謂此女一向服補藥何一旦虛滑若是因審其大便時多努力且所下又少而色黃此必毒氣流注而然也遂以加味四苓散與之一服泄止後因大便燥結復入檳榔青皮炒枳殼等味數劑而安徐靈胎曰今天下之醫法失傳者莫如痘疹痘之源藏於臟腑骨脈而發於天時所謂本於臟腑骨脈者凡人生受生之初陰陽二氣交感成形其始因火而動則必有渣滓未融之處伏於臟腑骨脈之中此痘之本源也然外無感召則伏而不出及天地寒暑陰陽之氣沴戾日積與人身之臟腑氣血相應則其毒隨之而越此發於天時者也而天時有五運六氣之殊標本勝復之異氣體既稟受不同感發又隨時各別則治法必能通乎造化之理而補救之此至精至微之術也奈何以寒涼發之毒藥劫之哉夫痘之源不外乎氣血也然內經云火鬱則發之其遇天時炎熱火甚易發者清解固宜若冬春之際氣為寒束則不起發發而精血不充則無漿漿而精血不繼即不靨則溫散補養之法缺一不可豈得概用寒涼至其用蚯蚓桑蟲全蠍等毒藥為禍尤烈夫以毒攻毒者謂毒氣內陷一時不能托出則借其力以透發之此皆危篤之症千百中不得一者乃視為常用之藥則無毒者反益其毒矣病家因其能知此死期故死而不怨孰知服彼之藥無有不死非其識見之高何能用藥之靈也故症之生死全賴氣血當清火解毒者則清火解毒當培養氣血者則溫托滋補斯不失一矣嗚呼謬説流傳起於明季至今尤甚惟以寒藥數品按日定方不效則繼以毒藥如此而已夫以至變至微之病而立至定至粗之法故世俗以為痘科最易不知殺人亦最多也又曰種痘之法乃仙傳也有九善焉凡物欲其聚惟痘不欲其聚痘未出而強之使出其毒不聚一也凡物欲其多痘欲其少強之出必少二也凡物欲其大痘欲其小強之出必小三也不感時痘之戾氣四也擇天地溫和之日五也擇小兒無他病之時六也其痘苗皆取種出無毒之善種七也又痘必漿成十分而後毒不陷種痘之漿五分以上即無害八也凡痘必十二朝成靨並有延至一月者種痘則九朝已回九也其有種而死者深用悔恨不知種而死者則自出斷無不死之理不必悔也至於種出危險之痘或生痘毒此則醫家不能用藥之故種痘之人更能略知治痘之法則尤為十全矣朱應我治一兒六歲熱二日初報點頭即傾倒視之點無大形影其父母皆以為此子決不得生朱許以七日可愈為其面色清淡無神的是氣虛不振故不出也用麻黃重劑一服隨即用薑蔥酒搗胡荽擦之此二月天時也被覆而坐之火上至黃昏即用人參補之夜半視之已朗朗然報出矣更成尖圓之點計服人參兩餘而愈小兒痘後開眼內有星翳用杭州胭脂泡水復以底鋪水上用新筆在紙上蘸水一日怫三次三日即愈痘一趙中書郎二十歲痘朱四日內視之面部油光喉凹下至胸下鳩尾如小兒涎衣狀一片紅丹潤至兩腋前頸上腹上則朗綻朱曰油光症元陽大泄胸膛之丹居華蓋之地此險中帶逆症也藥之至五日後面部油光者有漿勢也胸前丹俱起粟珠帶漿色獨背上紫色未退舌有微苔他醫定大下朱曰此症元陽已泄於面只可重用潤藥不可用硝黃攻之用當歸五七錢一劑佐以枳殼諸涼血藥於五六日小灌之期一醫用人參黃耆肉桂鹿膠下午則神昏譫妄兩齒相鬥聲聞徹耳七八日皆然仍用大清涼四劑九日漿似大行而鬥齒諸症亦少靜覺眼眶稍陷神稍倦於清涼中略用人參五分以助元氣眼不合而有淚鼻不封而有涕面部漸成蒼老之色而胸前丹地則漿水成袋兩臂兩腿亦有漿袋至十一日夜忽大渴連飲荼十三四碗此引水自救之意也微用清補延至十二朝症漸平後即去參單以養血清火藥扶至十七八朝而愈此人新娶元氣未免削薄故清涼中略帶補耳此症至八九日陰囊根上忽失血杯許朱曰此血一出可當發毒後果如所言若壞症則此血又大泄腎元矣何以能生朱應我治其堂弟年四十歲患痘二日視之面浮白點如㾦成片遍身紫細點如麻成片朱曰此症死生在定標時開則生不開則危急用犀角飲並破氣血藥大料飲之每日三劑至四日天庭地角忽開朗如星散惟兩顴仍不開啓身視之亦開朗特紫色太甚腰下更平塌如痣生意雖有尚瀕死地急以大黃下之犀角照原料不少減所下僅溏尚不大通以其原有吐紅之疾秉體虛弱不堪大劑剝削只得用酒熟大黃薄滌之第五日下泄多且如粟塊六日早視之兩顴忽星散而朗身痘亦朗綻面部大有放白起水之勢七日勢充而漿至矣止大黃犀角只用涼血清火之劑奈胸背兩臂仍枯滯紫焦而不動又急用犀角四五錢飲之忽胸前及兩臂手腕痘有起頂放水白之光根腳如石榴樣紅豔可愛朱曰屆九日漿水必至矣仍用犀角藥下午漿至十日遍身水漿充滿而來無何十二朝收靨遍身無一硬殼止見破裂漿水不流者起泡已破者見赤肉病者大懼朱曰漿有七八分紅根盡化此醒漿收也延至十六七朝頭額復瘟疤而漿起胸前亦起原破裂者皆有疕殼頭額所瘟於六日出蛆並卵袋破處亦蛆漿水臭爛是微有生氣可醫但脾胃不強口舌生瘡此餘毒尚未清也十九朝前全以清涼扶之而已此症初決為血熱異常到底不可補益病者平素虛弱恐不其然至後節次用清涼則安一停犀角等藥即發大熱第三日發狂用牛黃琥珀等而安六日停犀角不安七八日重用犀角又安十七八日少進耆術又不安況腰以下自腿至脛十七八日猶然紫黯而灌漿皮且有皺紋摺數此痘難治一至於此夫大險症未有眼不合鼻不封而可以灌漿者此症九日前眼止合一日鼻則不封何以能灌八分之漿畢竟不結靨而醒漿破潰眼復微合鼻反大封十八夜因嗔怒十九日少見鼻血此不善調攝之過也晝夜泄六七次神氣不爽飲食減少小水一夕七八次不得已進補中益氣湯人參用至數錢以回生意此清後用補乃正法也此乃二十日期越一日稍思食辰後大便仍條軟午後食略增急去補中益氣中之升柴配之以八物料仍不減黃連參止用三四分為其養血以令氣之不發越而為火此陰陽調燮之妙理也又因七八日來腰背倦臥而不能伸腳膝屈軟而不能步未扶之起頓覺能坐能移亦見引導藥力之妙又二十四日夜半先寒戰隨發熱宛如瘧狀如此者四夜或止或發此是痘作於六月時未免夾溽暑之寒熱至五日下午汗流至腹朱曰暑氣解矣此夜必不發熱果然其實數日內小柴胡加人參天冬知母五味間加香薷故得愈也按此痘六月初二日見至七月半豫南行囑曰原痘甚危此時股肉脫飲食少元氣未復必保養年餘方可安枕別去五十日九月初至家一見驚曰弟何脫形至此急離臥內調藥餌或可延也詎豫又遠行病者家務不放間書史不放手忽於夜半時竟死矣大都痘犯大危後來不善調攝未有能保全者此症痊後房中過百日安得不就枕席之事所以一百二十日之關不能逃也原評朱應我治一鄭姓婦見點面部不甚稠止頦下有紅色一小片至四日面部軟萎遍身夾丹丹中微微細點朱曰此丹不能退後必大灌清水定然外剝醫雖用參耆面部不放白頦下至身通行皮卷破裂九日而逝此丹症之最酷者也一戚室庠友子三十餘歲患痘一醫視標以為極順可勿藥其宗有醫以為險甚主人信先醫不信宗醫治五日延朱決之至則視其面部根頂不分痘地不分淡白一色且有油光況口張不闔唇不蓋齒此危症也所取者面粒疏朗可數兼之胸前甚少而頸亦稀耳啓四肢視之則挨簇中夾丹兩臂陽面之丹自曲骨上下約長三四寸闊寸許兩股陽面之丹自臀橫紋起直至腳肚下約長二尺許且背如通紅之氈條幸兩臂陰面兩股陰面尚有子粒而不甚稠論顏色則面淡白頸胸粒白而根不紅丹內瑣細如堆粟丹外紫地一片即陰面之痘皆點粒下有紫暈一圈細看如此形色即欲謝歸奈主母乃朱同宗女強留之為其二三日前舌有小血泡吮之始平詢大便數日不行遍身皆紫色權以大黃下二三度繼以犀角地黃湯兼芩連投之隨手輒效九日面部頸胸漿皆至背及四肢亦見漿色而丹處有似水白主人益信為順症十一日丹處漿水成袋忽忽破流而皮脫去矣面部及胸結厚殼可觀是日粥入而嘔痰與水不多食且艱阻朱與宗醫商扶脾方進之痘者自計飲乳雇乳母及內人似小兒吮法主人以為妙術日落時忽譫語一二句夜半更甚小便尿血數點十二日早視之昏譫尚知人事叩之則應但精神疲弱不支因數日便閉冀便通或可止譫用蜜導法不應於補脾藥內重用當歸僅少溏泄而大便亦有血主人始懼時朱有他行然不知小便之血胡為而來細詢之知痘者平日極好色此時原有契友伴臥言未吮乳先痘者言好卻好恐泄精又主母來看令婢坐榻前服事友另坐從壁隙窺之見主母偶離痘者矇朧問何人婢者應即推去被而以兩手摟婢如是則前少婦吮乳時未必不動念精變血而來固如是乎細思粥入而嘔逆食入幾何蜜導而不通藥潤而無益此痘中關格之症氣血已不流通安望成功夫血熱故成丹丹豔故成剝此丹甚剝甚之不多見者也又面腫退而眼開者其常也此痘洗眼以令其開猶然上胞不支而緊合視其黑珠則似明似昧此亦神將脫之症也又痘者每日飲雨前細茶不已禁之不聽後竟粥入而嘔逆未必非茶飲之過別後聞舌短者已兩日危甚後忽漸轉能飲食宗醫仍調以清劑延至十八日而食大進可漸生矣細思此痘面頸胸點少可數即臂內股內皆有子粒至背如紅氈臂外股外皆夾丹無縫從未有陰陽分界有如此稀密之不同者也內症則嘔逆在上阻滯失血在下神昏舌短外剝甚酷此死多生少之症得生可為萬幸又細思此症之生畢竟面部稀疏有漿即四肢及背如此酷烈猶有保全於瀕死之時古云痘全以正面為主信哉至十九日聞其左眼流膿珠子凸出右眼障滿則壞矣從來外剝不至內攻內攻者甚罕此症得生亦千百之一二云朱應我治一人二十三歲痘出六日延朱視之舌上黑色罩滿黑疔在舌尖之裡如圓眼核大面部有子粒而朗身亦布勻而腳色尚不紫黯急磨生犀角二三錢入黃連解毒湯內加石膏竹葉燈心日大料三劑舌黑色盡退疔盡消平紅潤如常飲食亦進至第八日正面漿五六分而胸背漿亦來朱以戚痘促歸遂付之他醫至十二朝夜煩躁呢喃延至十三朝而失尿遺屎之症頓生十四朝始復迎朱至視之則已倒靨碎鋪似爐灰色挺臥如尸口自言手自撒胸背漿水清兩手腕至臂皆軟鱉無神痘粒比前似加稠密蓋腫腿臂瘦而痘落下故見密也朱辭不治後聞他醫見其遺屎即進人參三錢又見其譫妄即進犀角三錢此醫者手忙腳亂而主人不知也延至十六朝而逝此雖醫者之無法然實疔之痘從來未有如此之酷烈者故伏毒甚深醫治一錯豈不關人性命哉朱丹溪治一叟發熱而昏倦其脈大而似數與參耆歸朮陳皮大料二十劑而痘出又二十劑而膿泡成身無完膚又六十劑而安報痘徐仲光一兒痘出二三點於左右目胞下至五朝復煩躁發熱睡臥不寧其痘頂平闊大根紅有神乃感受痘之癘氣先發於外也若是正痘既少必尖突而無前症矣用升麻葛根湯二帖痘果復出勻朗紅綻前症悉平一兒未熱先敷一點於唇上又一兒未熱先敷一點於左頰一點於右額頂平闊大俱五日身熱而復出痘勻朗而順漿足收痂但報痘潰而不斂延至十四日而愈一女先先見痘點於承漿頂平闊大四日發熱痘復出稀朗紅綻而順但報痘腫連頦下膿成毒化而愈一兒先見一點於眉心至六日漸平塌如圍棋子大灰白無神癢破煩熱痘復出勻朗紅綻為順但眉心屬命門相火痘毒先發於此相火受傷諸處雖順恐為獨陰不化也漿倒靨肢冷喘脹搐搦九日死一兒未熟先標點於腰間又一兒未熟熱先見點於頸項又有先見點於心窩或先見點於喉中者俱五六日而復出痘勻朗紅綻惟母痘平塌灰白無神痘漿雖滿忽倒靨喘脹而卒一兒初標于山根形粗肥咸謂稀疏可必至三朝壯熱狂亂母痘塌陷頤頦隱隱徐謂山根屬脾雖粗肥形似饅頭乃毒乘脾胃以人牙散入羌活散郁湯治之痘齊出稠密陷痘復起用補中益氣湯漿足結痂痘色乾紅少潤唇口裂血腹脹便祕溺澀用滋養清解之劑便通安枕又口齦發疳用清胃解毒湯加連翹萬密齋治朱大尹公子九歲發熱嘔吐曰痘也謂已出過痘迹故在曰此水痘瘢非正痘瘢也又謂為傷食曰痘疹發熱與傷寒傷食相似傷寒發熱則面紅手足微溫傷食發熱則面黃手足壯熱痘疹發熱男則面黃體涼女則面赤腮燥其足俱涼今公子身熱面黃足涼乃痘也經云痘乃胎毒五臟各具一症發熱呵欠驚悸心也項急煩悶肝也咳嗽噴嚏肺也吐瀉昏睡脾也耳涼體涼足涼腎也今脾胃素弱毒乘虛故發在脾今但見嘔吐一症熱才三日姑俟明日再議次日以燈視之皮下隱隱紅點而唇邊已報痘矣然順症也問服何藥曰痘無病不宜服藥但適其寒溫調其飲食期十三日安後果然雄按金玉之言也索希文子年十三發熱腹痛煩渴或作傷食治轉盛曰此痘也腹痛者痘氣內攻也煩渴者神不得安津液干也法當解毒托裡不可緩也不信五日後痘齊湧出未及起發乾枯內陷而卒雄按幼科每以發表為家常便飯因而僨事者多矣胡元溪子未痘問萬萬曰兒五嶽端正三關明潤骨堅肉實神俊氣清出痘必疏驗小兒痘瘡法後發熱作搐曰此佳兆也以辰砂散投之搐止痘出曰凡痘瘡起脹未有頭面不腫者此症顆粒緊小必不大腫期十二日而安果然萬子邦孝四歲發熱卒驚而絶其母大哭曰此痘疹也乃掐合谷得蘇與導赤散瀉青散一服搐止痘出甚密幸無他病十三日而靨後又出疹而愈李氏子痘三四粒未起發而隱身亦無熱氣色昏黯精神倦怠謂此症必重曰已出二三粒收矣曰不然痘出雖有輕重未有不成膿結痂者前者試痘其症為逆身無熱伏在內也數日作大熱痘齊湧出身無空膚用參耆芎歸甘草節以養氣血荊防木通青皮牛蒡連翹銀花酒芩山梔桔梗以解毒作大劑日一服至十三日後遍身潰爛不即收靨改用十全大補去桂加白芷防風外用敗草散貼襯前後十餘日而安王氏子二歲發熱出紅點一二粒額紋青氣面上赤光此險痘也先出者名試痘中氣不足毒氣隱伏故出不快也以調元湯加防風木香服之後其痘旋出喜無他症十三日而安陳文中雲淮東趙制乾子年十五歲身壯熱哽氣醫謂傷食與感應丸一服瀉二行仍壯熱又一醫言傷寒與小柴胡湯加枳殼其身不壯熱口乾足冷豫曰始初身壯熱哽氣便是痘瘡之症口乾足冷者感應丸瀉致裡虛也身不熱者柴胡解得表熱也若加喘渴則脾肺虛而不救矣以木香散加丁香官桂各半錢二日進五服第三日瘡出第四日成膿疱口微渴人參白朮散一服又木香散一服十三日痂落而愈費建中治韓太史孫周歲忽身熱而如烙昏迷不醒似驚非驚而有痘象卻屬火里苗症非輕緩之所能治者以大黃錢許石膏黃連佐以清透達表之劑連二服痘見勢亦減半至三日頗稀朗自起至終無甚風波而愈向非早為之計有不可知之變也李捷用頭生雞子三五枚浸廁坑內五七日取出煮熟與食數日再食一枚永不出痘徐都司得於浙人之方順流丹治痘症險逆當歸川芎升麻甘草各六兩銼粗末於臘月八日取東流清水七大碗去渣將藥汁盛新砂鍋內再選明淨辰砂四兩盛細絹袋內以線扎口懸系藥汁中約離鍋底一指以桑柴慢火煮至汁盡取出研細末瓷瓶收貯好用糯米半斤淘淨控乾水氣再以鹽滷和淨黃土乾溼得所包米為團放炭火內煅令通紅速即取出冷定劈開揀米粒色黃者研細末別盛瓷瓶收藏凡小兒一歲足者用辰砂米末各一分分數依歲遞加不可舛錯白蜜一茶匙米湯半杯醇酒三匙共二末調勻以茶匙徐徐喂服未出者免出已見點者必稀陷下者片時即起合藥一料可救數百人惟合時須靜室中焚香勿令雞犬陰宦孝服殘病疾穢病人見珍之慎之黑痘房玄齡痘懼黑色如龍眼大一老僧見之驚歎曰萬龍含珠今得見矣邱瓊山七歲痘亦遍身俱黑父憂哭一漁父燭之躍然曰紫垣中輔弼宿落於此田舍翁家取筆書輔弼二字於子背上而去昔有一兒痘形俱黑色在日中視之則黑以燈照之真紅映內偶遇一僧不服藥以保元湯浴之即轉紅活後至臺輔一黑痘圓明光澤至漿時色如紫葡萄根圍血暈微黃色名為紫袍金帶萬密齋治王氏子出痘起發時漸變黑已蔓延一身矣或謂痘變黑歸腎不治曰黑痘有二症一則乾枯變黑者此名倒陷乃邪火大熾真水已竭故曰歸腎不治一則痘色變黑不至干塌此疫毒之氣所謂火發而熏昧者也今此正類乃用當歸梢生地赤芍紅花以涼血黃耆人參甘草以瀉火補元氣酒炒芩連牛蒡連翹升麻以解毒荊防以疏表每劑入燒人糞一錢連進十三劑色轉紅膿成而靨李氏子痘起發時變黑而干自發熱至今未大便曰此熱甚於內宜急解之制一方麻黃酒蜜拌炒黑紅花子紫草人中黃連翹酒蒸大黃燒人糞煎服外用膽導法取下燥矢痘轉紅活後以四物湯去川芎加紫草木通枳殼生甘草調理而愈黑痘多由疔毒今入此門者恐人誤認也徐氏子十三歲痘成膿漿將靨或謂變黑歸腎不可治視其痘磊落膿漿飽滿神識清爽言語清亮惟大便五日未通此裡實熱蒸故潰爛其色蒼黑亦正色也但解里即靨矣與四順清涼飲一帖下燥矢二十餘枚隨靨而安白痘徐仲光治一小兒初標於右太陽乍涼乍熱色白腳塌瑣碎細密初時發表即用桂枝白芍以斂之其根腳平塌不起用震蟄丹酒漿桑蟲以發之五朝吐尚不止用藿香薑炒黃連以安之六朝吐嘔雖止猶然乾枯少潤白芷黃耆山甲以酵之七朝痘漿不行仍用前藥加人參八分別飲荸薺汁酒漿連用二日痘漿始灌正面而胸四肢猶是生痘咳嗽聲啞時值八朝勢急矣幸飲食肯進大便不瀉用人參黃耆麥冬陳皮甘草川芎當歸紅花白芍前胡桔梗兼調燒人屎催蟄丹三四分顛作良久而漿行遍身矣彼時頭面俱已平干至此復根生紅暈旁發贈痘塌者疏而枯者潤矣後因痰嗽特甚聲啞未開改用山豆根知母貝母麥冬黃耆牛蒡連翹陳皮歸芍甘草日用柳條纏綿攪口去盡喉中白糝別用燒人屎山豆根硼砂牙硝硃砂冰片膽星青黛為末與服三四日咳止聲出而愈萬密齋治汪氏子痘將靨灰白潰爛神昏不醒曰無傷但守三日收靨矣問不藥何以能痊曰瘡白者乃熱太過而白如果熟潰爛之狀非虛也神昏者乃邪盡正回否極泰來之兆非昏瞀也再俟三日則正氣復而痊矣果然嬌紅痘徐仲光治一兒患痘五朝勻朗綻突但嬌紅嫩豔乃脾胃氣弱也至漿滿而不蒼老猶防泄瀉癢塌之患治以黃土水煎保元湯下參苓白朮散扶脾土固可免下陷奈俗醫因期在發漿之始恐參苓滲濕但以保元調理至八朝溏瀉四五次繼而倒靨煩躁二六而逝常驗此痘多至十二日而卒亦有於十四日而卒者一兒痘症類前按法治之九朝漿清而靨結如麩幸能食便調發癰毒而愈一兒患痘五朝嬌紅嫩豔或謂晃痘不能蒼老結痂視之見其肌色白嫩則皮薄嬌紅可謂無虞以保元湯加官桂白朮調理而愈一女周歲患痘嬌紅初時嘔吐溏瀉身體諸處勻朗夭豔惟繞口四角稠密一片初朝用前胡桔梗殭蠶陳皮甘草川芎木通山楂羌活二朝用前方去羌活陳皮加防風紅花連翹乾葛三朝用桔梗川芎殭蠶當歸陳皮甘草山楂前胡紅花丹皮連翹生地四朝用山藥茯苓歸身川芎甘草白芷蜂房殭蠶桔梗陳皮人參四分五朝如前方只加參六分六朝黃耆當歸茯苓白朮白芷川芎蜂房桔梗甘草人參六分夜服桑蟲酒漿七朝人參九分黃耆白芷當歸川芎甘草山甲官桂二分至夜作瀉眼開嗆嘔先吐白沫喘脹交作隨用前方加人參一錢肉果五分砂仁三粒附子三分白朮黃耆各一錢煎服昏沉痰鋸顛作良久約二三個時辰大汗周身聲音始出即與乳吃痘轉明亮平塌頓起行漿八朝用參耆芷朮紅花殭蠶歸芎陳皮甘草官桂肉果二分漿足瀉止九朝用人參錢二分芷朮山藥桂殭蠶甘草肉果白附子二分頭面胸腹脹滿惟兩小腿半漿血靨十朝參芷當歸白芍陳皮甘草五味薏仁山藥茯苓以後用平補之劑調理而愈萬密齋治胡氏子未痘先兩頰赤燥曰傷寒論云面色緣緣赤者陽明熱也若不預解至出痘時此處必甚稠密而赤貫串難靨以升麻葛根湯加防風牛蒡連翹三服而紅色盡去痘出亦疏汪氏子五歲痘盛密且紅豔此險症氣實血熱可治也用當歸梢赤芍生地荊防甘桔連翹牛蒡青皮桔梗楂肉調理十五日而靨費建中治臧氏子痘甚密而充肥色不幹滯但紅豔身太熱以清熱解毒湯二劑五日便行一次未思飲食次日漿即老紅暈焮赤又三日便不行慮成火褐症急宜潤之使毒鬆利前方加生地滑石兩許更加黃芩藥未成而燥癢急進之去宿垢極臭硬即清爽熟睡紅盤漸淡漸收飲食大進以忍冬解毒湯而愈
