body:
  text: 卷二十八小兒科瘄疹雄按麻也痧也疹也瘄也各處方言不同也其實一也何以分瘄疹為兩篇殊屬未當今歸併作一類孫文垣治僕子孫守以麻即瘄子咳嗽無痰上唇厚體腫熱大便燥聲啞燥火為患以麥冬知母栝蔞甘草白芍桑皮是症宜去白芍桑皮入牛蒡桔梗地骨皮石斛枳殼服後嗽減其七乃去栝蔞枳殼以其大便已溏加生地當歸苡仁調理而安此症加生地合否當酌之程氏子七歲中麻西吳呼為瘄子姑蘇呼為痧子一月餘矣發熱如故咳嗽聲啞肌削骨立頭髮盡禿衆醫束手孫見之曰若謂此兒不可治耶此麻後虛熱成疳以大蘆薈丸與之可萬全也病家初不余問者謂非幼科專門也不知此特大方家餘事耳可改韓詩曰餘事作兒科然方脈不知兒科者必非良手為製藥與之未盡服而瘳呂東莊治錢氏子五歲病瘄泄瀉兒醫謂瘄最宜於瀉不復顧忌以清火為急寒涼縱進著眼在縱字病勢殊劇呂視之面色兩觀刺紅虛陽上浮時咬牙喘急上盛口渴甚飲水不絶陰虛液燥脈洪緩如平壯人曰脾急矣速投人參當歸黃耆陳皮甘草茯苓木香以救之一劑覺安或阻之曰誤矣小兒有專門豈可令腐儒治之吾所聞瘄病以發散清涼解毒為主今半身瘄潮熱未退而用溫補必不救矣無真知而參未議最能誤人知者慎之其家懼遂不敢再服間三日其父復來見曰諸症復如故如何呂曰豈有是理哉君戲我耳曰日來實不服君藥乃述其故呂曰君試急歸兒天柱骨倒矣別去頃之馳至曰果如公言奈何急服前方何如呂曰前方救虛也今加寒矣非桂附不能挽也曰顴紅口渴喘急飲水俱是熱症而公獨云虛寒何也曰陰竭於內陽散於外而寒涼復逼之也陽無所歸內真寒而外假熱此立齊所發內經微旨非深究精蘊者不能信也乃歸而違衆服之一劑而天柱直二劑而喘渴止三劑起行嬉戲戶外此由苦寒過劑故處方如是非一切小兒皆可桂附也馮楚瞻治沈氏兒發熱數日見麻疹才一日面上盡沒神氣困極蛔從口出不一而足數日不食下瀉上喘唇口焦裂五心壯熱手足指尖皆冷脈細數無倫兩尺更弱咸謂疹毒歸臟胃熱故蛔連出也不知神氣欲脫五臟俱困脾虛不能納穀蟲無所食又兼虛火熏蒸臟腑燥熱蟲不安而出耳況諸斑疹多由內傷失調脾胃不足以榮是以陽氣逆行陰覆於外血盛氣壯則色紅而焮發血虛氣弱則色白而隱伏有何毒之輕重乎面上退縮者陽虛不能升發也喘促者氣難續也唇焦者脾津耗竭也五心壯熱者陰虧火爍也泄瀉不食者真火衰而脾不運也寸關細數尺弱者氣虛血虛虛火上浮而不藏也急則治標緩則治本今者之急本氣欲脫也倘謂麻疹餘毒解利清托恐神氣先盡矣乃以熟地六錢丹皮一錢麥冬三錢牛膝二錢制附六分一劑假熱全消真虛畢露神氣更倦此陰已少復當補氣以助其發生前方另煎人參二錢沖服神氣漸復喘促全安飲粥微嘔乃胃氣久虛之故也再用前方加炒黃白朮二錢去丹參參湯沖服四劑全愈愚按此與呂症大同小異要是百中一二未可執為程法也大抵麻疹之發本諸肺胃治之但宜松透一切寒燥寒熱之劑不可入也余嘗遇表散過甚綿延不已者一以生地杞子地骨麥冬蔞仁沙參等味三四劑必嗽止熱退而安高士宗長男六歲次男三歲於元旦次日發熱見疹即用以清解透發之劑次日略增十數點究不暢心以長男七月而生先天怯弱問其胸腹寬否曰飢甚口味何如曰淡甚因知其虛遂投耆朮參草桂枝紅花一二劑次日透發遍身熱稍退而性情猶煩躁夜發熱頻咳嗽至一月而安由見點之初過服表劑虛其經脈故也由此成疳勞者多矣次男幼稚致問不能以上冬痰喘服麻杏桂枝石膏一劑而愈謂其稟質略強知其疹必不寒凝毒甚因其蘇麻前杏黃芩石膏藥大錯紅點不增又與紫蘇蔥薑芫荽等溫之尉之疹總不出所謂不知經候混攻混表是也同道俱云舍透法並無別法如此等藥豈但透發而已至五六日吐蛔或曰此熱極生蟲可服牛黃散牛黃散即大黃末也一服而痰喘止神氣稍平卻自是不能言矣計無所施針百會穴開其瘄門服牛黃分許及諸單方觀其形症急則亂投藥餌實不能生友人張衛生曰此大虛大寒症也今既無言又不能食恐無濟矣勉投參附究無挽回經曰一逆尚引日再逆促命期為醫者可不鑑諸汪氏子出瘄已三日服前胡杏仁麻黃石膏藥一二劑疹出二十餘點不能再增心胸煩悶乞高診高曰若再攻發則敗矣急與芎歸耆朮桂苓紅花一劑而熱退身安凡治疹調其氣血和其經絡寒涼攻發概致不用則屢試屢效也亦非定論蓋鑑前車而矯枉過正也吳題先子甫二歲出瘄兒醫攻發不透高視之知其虛也曰若但發瘄瘄斷不出必至不保惟有溫補之劑益其臟腑安其腸胃助其氣血方可語無筋節則胸無卷軸可知遂與耆朮薑桂歸芍苓銀花紅花諸味一劑而安次日即用原方加人參一錢又連服獨參湯而愈夏氏子出瘄色點俱紫神氣不寧高曰此症大凶治須得法連看二次皆用溫散藥次早其家人走告曰口吐涎蟲另有藥否曰昨二劑俱服否曰尚存一劑因與附子八分令加入煎服自此遂無音耗心竊惑之越三載至其家猶懷鬼胎見其子長大因問昔年出瘄吐蛔何由得愈曰服藥後因無力相延仗天覆庇得以漸愈語亦虛活以上皆醫藥真傳高案徐仲光治一兒身熱喘脹以內傷外感治之不效視其背隱隱赤色乃疹也以疹黃湯表發雖出而頭面不足隨沒而死雄按此證未始不由初治所誤一兒疹身熱似痘候遍身報點沈虛明黃錦云皆以為虛也時黃綺藝年十二歲未知醫往視獨以為疹其父詬之綺藝曰兒聞父言疹為肺胃風熱今兩鼻流涕已非疹乎已而果然後長遂為明醫是以鼻涕作疹者則早得其要領也一兒疹出紫色便嗽噦瀉不食用解毒飲挑痧法治之而後愈雄按識見之超本乎天分一兒疹出紫色便祕溺澀煩躁悶亂急以大柴胡湯利之而愈一兒疹不易透知為風寒所遏用桂枝湯加葛根麻黃前胡升發之又厚用被裹之再以大劑防風湯熏於床下而愈此亦可用芫荽防風湯浴頭面手足又苧蘸芫荽酒戛之疹證以照顧咽喉為要務麻黃葛根升麻等藥最宜慎用一兒身熱頭痛骨痛咳嗽氣急嘔噦不食乃傷寒而兼出疹也以百祥散十神解毒湯治之愈若此症治之少緩疹雖透必變紫黑悶亂喘脹而死一兒疹出腹飽便祕乃內傷所發也乃承氣湯下之愈一兒疹正出而恣食停滯腹飽便祕壯熱譫語急以大黃栝蔞枳實厚朴黃連甘草等藥利之而尚喘嗽脈遲肢冷以附子理中湯又歸芍六君湯治之而愈一兒表散後疹出隱隱肌肉間成片又為風熱所郁渾身變青紫煩躁悶亂喘脹欲出不出急用麻黃桂枝湯加葛根以升發之得冷汗微出而愈一兒疹半出壯熱煩躁喘脹悶亂乃出不透而內攻也急以麻黃甘草桔梗前胡葛根荊芥牛蒡枳殼升發之疹出二三番得盡透而愈一兒疹隱不振頭面不出面色青白喘脹悶亂右寸脈微此正氣虛也不能升毒急用麻黃桂枝湯加人參一錢防風芫荽湯浴治之而愈一兒疹盡出壯熱祕結喘脹譫語此毒壅猶不盡透也急以黃連栝蔞枳殼石膏桑皮知母人中黃等藥治之愈一兒汗出疹透猶喘不止亦邪壅也急以炒黑麻黃加石膏杏仁甘草治之而愈一兒疹時咳嗽喘急用大小無比散五分至一錢即喘定而睡醒後神安此熱從小便而解也一兒仲春出疹用涼藥食生梨寒鬱而沒喘悶面青肢冷聲啞昏暈急以麻黃葛根湯葛根柴胡甘草桔梗紫蘇生薑等發之再復以被取汗而愈一兒疹發不出喘嗽煩躁悶亂繆仲淳治西河柳五錢麥冬三錢五分牛蒡三錢五分蟬蛻荊芥薄荷知母各一錢竹葉三十片甚者加石膏五錢冬米或三黃等治之而愈一兄疹雖出而喘反甚乃驟用麻黃燥烈之藥火甚而肺火熱也宜清金潤肺以甘草桔梗前胡牛蒡杏仁元參知母黃芩花粉治之而愈賀知忍少子疹不透極重其家不知尚以肉飯與之仲淳急以西河柳兩許石膏一兩五錢知母五錢元參貝母各三錢竹葉七十片作二劑服而疹盡現遍身皆赤連服四服疹盡出而煩躁猶不止再以石膏三兩知母西河柳各二兩麥冬三兩黃芩黃柏黃連各五錢竹葉三十片濃煎與服遂定而瘥雄按葉天士吳鞠通皆言西河柳非瘄疹所宜而繆氏每與石膏並用則不嫌其溫升太過矣殆即仲聖以麻黃與石膏同用之意也一兒寒月出疹不透喘脹悶亂躁煩用去節麻黃蜜和酒拌炒一錢葛根麥冬貝母前胡知母荊芥元參甘草西河柳一服而疹立透隨愈一新婚出疹痰嗽不已咸謂餘毒用清解而痰愈多午後咳甚此陰虛火熾而潮熱也用六味地黃丸加知母麥冬治之愈一新婚婦出疹其症如前用六味地黃丸料加當歸治之而愈一孕婦疹不出極熱悶亂喘脹用清熱安胎藥而熱愈甚危劇子母難全此懷胎內熱故法當下其胎則疹熱解而母命可保矣以表散兼墮胎藥治之而愈此種治實原謬妄疹不過肺胃之熱喘脹亦肺家本症何必下其胎而始可治乎一孕婦出疹小腹痛而漏血此熱甚動胎以升麻葛根湯加荊芥紫蘇黃芩當歸白朮川芎砂仁橘紅阿膠治之血止而安一孕婦出疹觸動其胎胎墮而去血過多疹雖沒而煩躁悶悶昏絶乃血脫故也當兼益氣用理中湯而蘇又用人參一兩當歸阿膠炮薑荊芥艾葉治之而愈既知血脫卻偏要益氣古人此種甚多實不可解一孕婦出疹熱極墮胎而難産用魚膠三寸燒存性麝香一分共酒服立産遇此症最為難治更有橫生者用魚膠一尺如前法治雖疹而子不活一産婦疹不易出熱甚而去血不止乃血氣不足不能逐毒出外也用麻黃葛根湯加人參荊芥白芷當歸阿膠治之而愈一婦疹後輕咳朝涼暮熱面色少神肌瘦唇赤咸以氣血不足用八珍湯治之細訊其夫知其不慎房室用六味地黃丸合生脈散與服又囑絶欲百日而瘳此亦影響揣摩之談大抵疹後肺陰大傷水絶上源故顯此候得六味滋潤之力故遂愈以非正治肺家之藥故取效遲也柴嶼青治候補汪某年二十餘因感時氣出疹過服石膏等劑身熱泄瀉兩耳皆聾絶不思食脈之兩尺微弱舌上乾燥毫無津液本屬陰虧況大寒之劑不但傷陽亦且傷陰用麥冬五錢滋陰以清虛熱陳皮以和胃氣加西河柳一錢以清疹毒次日熱微瀉止舌亦覺潤惟左寸脈微洪加小生地二錢木通一錢菊葉一錢三日熱退思食因是月應選身軟耳聾慮不能過堂掣籤謂已平復十九日當投補劑定可痊愈後果如言竟得赴選此案可法蓋灼知病源故不以八珍十全籠統塞責也萬密齊治吳道松四肢病疹或治之三日疹不出煩躁甚欲用荊防敗毒散曰此皆發熱之藥無解毒之用況天大熱又無時令之藥一二味在內則陽愈勝陰愈虧陰陽不和此疹之所以不出也以東垣涼膈散加元參升麻一服疹出三日起議論極是但涼膈重劑非熱毒甚亦難輕用至用升麻於涼膈劑中則有相濟之妙而無過升之弊矣甘氏子發熱疹三日不出身涼神倦坐臥不寧此毒不外出毒火內伏也故煩而坐臥不安用升麻葛根湯加麻黃石膏以發之一服疹盡出色白不紅此血虛也用四物湯加防風一服色紅而愈楊氏子疹後痢下鮮血用當歸梢生地白芍條芩炒黃連炒人參甘草枳殼烏梅而愈凡出疹利血者此方皆效錢乙診睦親宮中十大王瘡疹云曰瘡疹始終出未有他證不可下但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之鼠黏子湯之類如瘡發後不多出即加藥如一日一帖即加至二貼加藥不出即大發之升麻葛根羌活防風獨活麻黃桂枝之類如發後不多及脈平無症即瘡本稀不可更發也有大熱者當利小便小熱者當解毒利小便四聖散之類若不快勿攻勿下止用抱龍丸治之若有大熱能食者大黃下一二行即止若黑紫干陷者百祥丸下之不黑慎勿下身熱煩躁腹滿而喘大小便澀面赤悶亂大吐此當利小便不瘥者宜宣風散下之也若五七日痂不焦是內熱氣蒸於皮中故瘡不得焦痂也宜宣風散導之用生犀角磨汁解之使熱不生必著痂也此條議論有極是者有未盡協者分別觀之可也睦親宮十太尉瘡疹衆醫治之王曰疹未出屬何臟腑一醫言胃氣熱一醫言傷寒不退一醫言在母腹中有毒屬何臟也醫曰在脾胃錢氏曰何以驚悸皆無所對錢氏曰夫胎在腹月至六七則已成形食母腹中穢液入兒五臟食至十月即穢液滿胃至生時兒口猶不潔産母以手拭淨則無疾病俗以黃連汞粉下其邪穢之糞此亦由不潔餘氣入兒臟中本先因微寒又遇風寒邪氣相搏而痘疹成也未出欲作之時熱動五臟則五臟之證先見初欲病時先呵缺煩悶驚悸乍涼乍熱手足冷面腮頰赤燥咳嗽噴嚏此五臟症俱見也呵缺煩悶者肝也時發驚悸者心也乍涼乍熱手足冷者脾也面腮頰赤燥咳嗽噴嚏者肺也惟腎無候以在腑下不能食故也凡瘡疹乃五臟毒若出歸一症汗水泡心為斑脾為疹腎雖無症其後惡者疹變倒靨而黑陷則歸腎也此由不慎風冷而不能食內虛所致也今太尉疹子無他症當用平和藥為治因用抱龍丸數服愈海藏云本先因微寒入一句並由不慎風冷而不能食內虛一句勿認作寒症用抱龍丸即知斑疹之多熱也吳橋治侄孫始孩纍日發熱蒸蒸驚搐惛憒衆醫不知所以橋曰麻也寒邪外乘閉而不出是呱呱耳飲藥已數中氣乃傷藥不足恃也當置沸湯一瓶撤其蓋令保母抱子坐湯側稍擁被圍之湯氣自遠熏蒸少飲藥內托麻出而解後汪氏子病如子亦用此法並效薛立齊治一小兒患疹作痛發熱煩渴欲服清涼飲下之診其脈不實舉指不數此邪在經絡也不可下遂用解毒防風湯二劑而愈此症小兒多患之須審在表在裡及邪之微甚而治之王海藏曰前人云首尾俱不可下者何也曰首不可下者謂斑未見於表下則邪氣不得伸越此脈症有表而無里故禁首不可下也尾不可下者謂斑毒已顯於外內無根蒂大便不實無一切里症下則斑逆陷故禁尾不可下也一兒作癢發熱以消毒犀角飲一劑作吐瀉此邪氣上下俱出也毒自解少頃吐瀉俱止其症果消吐瀉後脈見七至此小兒和平之脈也邪已盡矣不須治果愈潔古云斑疹之病其為症各異發焮腫於外者屬少陽三焦相火也謂之斑小紅行皮膚之中不出者屬少陰君火也謂之疹凡顯斑疹若自吐瀉者慎勿亂治而多吉謂邪火上下皆出也斑疹並出小兒雖禁是以別生他症也首尾不可下大抵安理之藥多發表之藥少祕則微疏之令邪氣不擁並令其次第出使兒易見也身溫暖者順身涼者逆沈明生治沈翰臣婦咳嗽發熱或認為不足遂用六味地黃湯以滋陰分既而咳逆更劇診之脈浮且數風熱干乎肺家宜用疏表之劑服下遍身發出紅疹二劑咳瘥緩而仍未透更用辛涼等味以清表熱仍嗽復作瀉不已咸歸咎寒涼沈笑曰非也肺受風邪邪變為熱經云邪並於陽則陽熱而陰虛始則疹在欲出未出之際火上炎於手太陰而作嗽今則疹在欲收未收之時熱下移於手陽明而作瀉是屬斑疹家常候何足怪乎行且止矣果越兩日而嗽寧瀉止身涼疹退按斑疹之候雖異斑疹之治略同是歲丁未濕土司天而春夏之交燥旱殊甚蓋猶襲乎昨歲燥金在泉之餘氣耳是以初當涼解而不利乎溫散次當寒潤而不利於溫補六味地黃丸之屬雖若相宜然質濁味厚不惟不能達表抑且錮蔽外邪施諸疹退而餘熱未清之時稍為近理今初熱始嗽輒為用之是非滋陰乃滋害也況以丸為湯已非古人本意而專投泛用尤乘病變之機自來善用六味者何曾善用止可謂之濫用無過薛立齊假使九原可作視近日之湯法盛行能無掩口葫蘆哉痧疹者手太陰肺足陽明胃二經之火熱也小兒居多大人亦時有之殆時氣溫疫之類其症類多咳嗽多嚏眼中多淚多泄瀉多痰多熱多渴多煩悶甚則躁亂咽痛唇焦神昏是其候也治法當以清涼發散為主藥用辛寒甘寒苦寒以升發之惟忌酸收最宜辛散誤施溫補禍不施踵辛散如荊芥穗乾葛西河柳石膏麻黃鼠黏子清涼如元參栝蔞根薄荷竹葉青黛甘寒如麥冬生甘草蔗漿苦寒如黃芩黃連黃柏貝母連翹皆應用之物也量症輕重製劑大小中病即已無太過焉痧疹乃肺胃熱邪所致初發時多咳嗽宜清熱透毒不得止咳疹後咳嗽但用貝母栝蔞根甘草麥冬苦梗元參薄荷以清餘熱消痰壅則自愈慎勿用五味子收斂之劑多喘喘者熱邪擁於肺也慎勿用定喘藥惟應大劑竹葉石膏加西河柳兩許元參薄荷各二錢如冬天寒甚疹毒為寒氣鬱於內不得透出者加蜜酒炒麻黃一劑立止凡熱勢甚者即用白虎湯加西河柳切忌過用升麻服之必喘多泄瀉慎勿止瀉惟用黃連升麻乾葛甘草則瀉自止藜按此卻未妥瀉乃肺移熱於大腸仍以清肺為主疹家不忌瀉瀉則陽明之熱邪得解是亦表裡分消之義也疹後泄瀉及便膿血皆由熱邪內陷故也大忌止澀仍用升麻乾葛白芍甘草扁豆黃連便膿血則加滑石必自愈疹後牙疳最急外用雄黃牛糞先煅存性研極細加真冰片一分研勻吹之內用連翹荊芥穗元參乾葛升麻藜按二味宜再酌黃連甘草生地煎好加犀角汁二三十匙調服緩則不可救藥疹後元氣不復脾胃虛弱宜用白芍炙草為君蓮肉扁豆山藥青黛麥冬龍眼肉為臣多服必漸愈慎勿輕用參術疹後生瘡不已餘毒未盡也用金銀花連翹荊芥穗元參甘草生地鱉蝨胡麻黃連木通濃煎飲之良廣筆記葉天士曰痧屬陽肺經邪初起必從表治症見頭痛喘急咳嗽氣粗口惡一日二日即發者輕三五日者重陽病七日外隱伏不透邪反內攻喘不止必腹痛祕悶危矣治法宜苦辛清熱涼膈去硝黃方書謂足陽明胃疹如雲布密或大顆如痘但無根盤方書謂手太陰肺疹但有點粒無片片者用辛散解肌冬月無汗壯熱喘急用麻黃杏如華蓋散三拗湯夏月無汗用辛涼解肌葛根前胡薄荷防風香薷牛蒡桔梗木通之屬古人以表邪口渴即加葛根以其升陽明胃津熱甚煩渴用石膏辛寒解肌無汗忌用凡瘡疹辛涼為宜用連翹辛涼翹出衆草能升能清最利幼科能解小兒六經諸熱春令發疹從風溫夏季從暑風暑蓄濕秋令從熱爍燥氣冬月從風寒疹宜通泄瀉為順下痢五色者亦無妨惟二便不利者最多凶症治法大忌止瀉疹本六氣客邪風寒暑濕必從火化疹既外發世人皆云邪透孰謂出沒之際升必有降勝必有復常有疹外發內熱不除致咽啞齦腐喘急腹脹下痢不食煩躁昏沉竟以告斃者皆屬裡症不清致變須分三焦受邪屬多或兼別病纍瘁須細體認上焦藥用清涼中焦藥用苦辛寒下焦藥用咸徐靈胎曰當用清滌內邪之法上焦藥氣味宜輕以肺主氣皮毛屬肺之合外邪宜辛勝里甚宜苦勝若不煩渴病日多邪郁不清可淡滲以泄氣分徐靈胎曰葉氏用藥專重氣味此語本之內經即神農本草亦首列之但終當深知其藥專治其病各有功能然後再於其中擇氣味之合者而用之方得內經本草之旨茲徒知其氣味則終無主見也中焦藥疹火在中為陽明燥化多氣多血用藥味苦寒為宜若日多胃津消爍苦則助燥劫津甘寒宜用下焦藥鹹苦為主若熱毒下注成痢不必咸以軟堅但取苦味堅陰燥濕古人以疹為經腑之病忌溫燥澀補所謂痘宜溫暖疹宜清涼也然常有氣弱體虛表散寒涼非法淹淹釀成損怯此但陰傷為多救陰必扶持胃汁氣衰者亦有之當益氣稚年陽體純剛之藥忌用幼科方書歌括曰赤疹遇清涼而消白疹得溫暖而解此溫字即後人酒釀柳木粗草紙木綿紗之屬徐靈胎曰不是此溫法雖不可不和然近年用者多無益徐靈胎曰小兒外治之法最多疳疹濕盛熱蒸口舌咽喉疳蝕若不速治有穿腮破頰咽閉喘促告斃矣治之宜早外治另有專方若湯方法必輕淡能解上病或清散亦可疹痢乃熱毒內陷與傷寒協熱邪盡則痢止同清忌升提忌補澀輕則分利宣通重則苦寒解毒初生滑氏云小兒三歲以內看男左女右手虎口三關紋色紫熱紅傷寒青驚風白疳病黃色淡紅乃平常小恙其筋文宜藏不宜暴露若見黑色則為危險再脈紋見下截風關為輕中截氣關為重上截命關尤重耳直透三關為大危葉天士曰嬰兒肌肉柔脆不耐風寒六腑五臟氣弱乳汁難化內外二因之病自多然有非風寒竟敢外感不停滯已屬內傷其故何與嘗思人在氣交之中春夏地氣之升秋冬天令之降呼去吸入當時消息間有穢濁吸入即是三焦受邪過暮原直行中道必發熱煩躁倘幼醫但執前藥消導表散清火通便病輕或有幸成病重必然顛覆錢仲陽云糞履不可近襁褓小兒余言非無據矣四十年來治效頗多略述其概云春溫一症由冬令收藏未固昔人以冬寒內伏藏於少陰入春發於少陽以春木內應肝膽也寒邪深伏已經化熱昔賢以黃芩湯為主方苦寒直寢裡熱熱伏於陰苦味堅陰乃正治也知溫邪忌散不與暴感門同法若因外邪先受引動在裡伏熱必先辛涼以解新邪繼進苦寒以清裡熱況熱乃無形之氣幼醫多用消滯攻治有形胃汁先涸陰液劫盡者多矣備用方黃芩湯涼膈散蔥豉湯新邪引動伏邪清心涼膈散服之亦愈風者春月受風其氣已溫經謂春氣病在頭治在上焦肺位最高邪必先傷此手太陰氣分先病失治則入手厥陰心包絡血分亦傷蓋足經順傳如太陽傳陽明人皆知之肺病先治逆傳心包絡幼科多不知者俗醫見身熱咳喘不知肺病在上之旨矣妄用大黃大苦沉降丸藥致脾胃陽和傷極陡變驚癇莫救者多矣風溫肺病治在上焦夫風溫春溫忌汗初病投劑宜用辛涼若雜入消導發散不但與肺病無涉劫盡胃汁肺乏津液上供頭目清竅徒為熱氣熏蒸鼻乾如煤目瞑或上竄無淚或熱深肢厥或狂躁溺澀胸高氣促皆是肺氣不宣化之徵斯時若以肺藥少加一味清降使藥力不致直趨腸中而上痹可開諸竅自爽無如城市庸醫僉云結胸皆用連蔞柴枳苦寒直降致閉塞愈甚若此症初因發熱喘嗽首用辛涼清通上焦如薄荷連翹牛蒡象貝桑葉沙參梔皮蔞皮花粉若色蒼熱勝煩渴用石膏竹葉辛寒清散疹症亦當宗此若日數漸多邪不得解芩連涼膈亦可選用至熱邪逆入膻中神昏目瞑鼻竅無涕淚諸竅欲閉其勢危急必用至寶丹或牛黃清心丸病減後餘熱只甘寒清養胃陰足矣春日暴暖急冷先受溫邪繼為冷束咳嗽痰喘最多辛解燥濕只用一劑大忌絶谷若甚者晝夜豎抱勿倒三四日夫輕為咳重為喘喘急則鼻掀胸挺備用方葦莖湯涼心涼膈散涼膈散瀉白散葶藶大棗湯白虎湯至寶丹清心牛黃丸竹葉石膏湯喻氏清燥救肺湯夏為熱病然夏至以前時令未為大熱故經以先夏至為病溫後夏至為病暑二熱之病幼醫易眩夏暑發自陽明古人以白虎湯為主方後賢劉河間創議迥出諸家謂溫熱時邪當分三焦投藥以苦辛寒為主長夏濕令暑必兼濕暑傷氣分濕亦傷氣汗則耗氣傷陽胃汁大受劫爍變病由此甚多發泄司令里真甚虛張用逵云暑病首用辛涼繼用甘寒再用酸泄酸斂不必用下可稱要言不煩矣夏令受熱昏迷若驚此為暑厥即熱氣閉塞孔竅所致其邪入絡與中絡同法牛黃至寶丹芳香利竅可效神蘇以後用清涼血分如連翹心竹葉心元參細生地鮮生地二冬之屬此症初起大忌風藥初病暑熱傷氣竹葉石膏湯或清肺輕劑大凡熱深厥深四肢逆冷但看面垢齒燥二便不通或瀉不爽為是大忌誤認傷寒也秋深初涼稚年發熱咳嗽證與春月風溫異但溫乃漸熱之稱涼即漸冷之意春月為病猶冬藏固閉之餘秋令感傷恰值夏月發泄之後徐靈胎曰通人之言其體質之虛實不同但溫自上受燥自上傷理亦相等均是肺氣受病世人誤認暴感寒混投三陽發散津之屬僅一二劑亦可更有粗工亦知熱病與瀉白散加芩連之屬不知愈苦助燥必增他變當以清涼甘潤之方氣燥自平而愈慎勿用苦燥劫爍胃汁秋燥一症氣分先受治肺為急若延綿數十日之久病必入血分又非輕浮肺藥可醫須審體質症端古謂治病當活潑潑地為盤走珠耳翁姓子方數月秋燥潮熱咳嗽如瘧幼科用發散藥二日不效忙令禁乳徐靈胎曰不禁可更醫用瀉白散加芩連二日晝夜煩熱喘而不咳下痢黏膩藥後竟痢藥水延余診之余曰稚年以乳食為命餓則胃虛氣餒肺氣更不爽矣與玉竹甘草炒廣皮竹葉心一劑熱緩繼與粳米南棗廣皮甘草沙參二劑與乳少進令夜抱勿倒三日痊愈深秋入冬暴冷折陽外感發熱頭痛身痛嘔惡必從太陽若渴能飲水者裡熱見症即非純以表散傷寒每以風傷衛用桂枝法寒傷榮用麻黃法小兒肌疏易汗難任麻桂辛溫表邪太陽治用輕則紫蘇防風一二味身痛用羌活然不過一劑傷風症亦肺病為多前杏枳桔之屬辛勝即是汗藥其蔥豉湯乃通用要方若肢冷寒戰嘔吐自利或身無熱即從中寒里症三陰須分但小兒科太陰中寒最多厥陰間有若冬令應寒氣候溫暖當藏反泄即能致病名曰冬溫溫為欲熱之漸非比寒症得汗而解若涉表邪一二裡熱必由七八生癮疹丹痧非徒風寒或外受之邪與里邪相搏亦令入於經絡或飲醇厚味裡熱熾烈而衛氣不與榮分相和或不正直入內侵即有腹痛下痢諸症其治法按症必以里症為主稍由清散誤用辛溫禍不旋踵矣錢氏直訣云心主驚實則叫哭發熱飲水而搐虛則臥而悸動不安又視其睡口中氣昏或合面睡及上竄咬牙皆心熱也若心氣實則喜仰臥肝主風實則目直大叫呵缺項急煩悶虛則咬牙呵缺肝熱則手尋衣領及亂捻物肚熱飲水喘悶目赤發搐肝有風則目連札得心熱則發搐或筋脈牽繫而直視風甚則身反張強直不搐心不受熱也當補腎治肝脾主困實則困睡身熱飲水虛則吐瀉生風面白腹痛口中氣冷不思飲食或吐清水或呵缺多睡者脾氣虛而欲發驚也肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣肺熱則手掐眉目鼻面肺盛復感風寒則胸滿氣急喘嗽上氣肺臟怯則唇白悶亂氣粗喘促哽氣者難治肺虛甚也腎主虛無實也惟瘡疹腎實則變黑陷茲胎稟虛怯神氣不足目無睛光面白顱解此皆難育不壽或更加色欲變症百出愈難救療或目畏明下竄者蓋骨重而身縮也咬牙者腎水虛而不能制心火也以上辨五臟虛實寒熱喜汗者厚衣臥而額汗出也盜汗者肌肉虛而睡中汗出也胃虛汗者上至項下至臍也六陽虛汗者上至頭下至項難治夜啼者小兒筋骨血脈未成而多哭脾臟冷而痛也當與溫中藥或花大膏主之若虛怯為冷所乘則唇青驚啼者邪氣乘心也當以安神丸主之若浴後拭臍不幹風入作瘡令兒撮口甚者是脾虛也若頻撮口是氣不和也並舌熱者胃臟微熱令舌絡牽緊時時舒熱或飲水者脾胃虛而津液少也黃面慣肌瘦五心煩熱者疳積也大便未已而弄舌者凶解顱者生下囟門不合也長必多愁少笑目白睛多面色㿠白或體消瘦皆腎虛胎肥者生下豐厚目睛粉紅大便乾難時出涎水胎熱者生下有血色時叫哭身熱淡黃目睛多赤大便色黃急欲食乳並用浴體法主之胎怯者生下面白肌肉瘦弱大便白水身無血色哽氣多噦亦用浴體法急欲乳不能食者此風邪由臍而蘊熱心脾致舌厚唇燥不能吮乳也龜胸龜背者由兒初生下風客於脊入於骨髓致成龜背若肺熱脹滿攻於胸膈即成龜胸並用龜尿點其骨節自愈取尿法用青蓮葉安龜在上用鏡照之其尿自出失音吐瀉或大便後雖有聲而不能言又能咽物者非失音此腎怯不能上接於陽也凡口噤不止則失音語遲長大不行行則腳軟齒久不生生則不固發久不生生則不黑皆胎弱以上五臟雜症主治徐靈胎曰幼科古人謂之啞科以其不能言而不知病之所在也此特其一端耳幼科之病如變蒸胎驚之類與成人異者不可勝舉非茲婦人之與男子異者止經産數端也古人所以另立專科其說精詳明備自初生以致成童其病名不啻以百計其治法立方種種各別又婦人之與男子病相同者治亦相同茲小兒之與成人即病相同者治亦迥異如傷食之症反有用巴豆硼砂者其餘諸症皆用金石峻厲之藥特分兩極少耳此古人真傳也後世不敢用而以草木和平之藥治之往往遷延而死此醫者失傳之故至於調攝之法病家能知之者千不得一蓋小兒純陽之體最宜清涼今人非太暖即太飽而其尤害者則在於有病之後而數與之乳乳之為物得熱則堅紉為綿絮況兒有病則食乳甚稀乳久不食則愈充滿一與之吮則迅疾踴出較平日之下咽更多前乳未消新乳復充填積胃口化為頑痰痰火相結諸脈皆閉而死矣譬如常人平日食飯幾何當病危之時其食與平日不減安有不死者哉然囑病家云乳不可食則尋相詬曰乳猶水也食之何害況兒虛如此全賴乳養茲復禁乳則餓死矣不但不肯信反將醫者詬罵其餘之不當食而食與當食而反不與之食種種失宜不可枚舉醫者豈能坐守之使事之合節耶況明理之醫能知調養之法者亦百不得一故小兒之所以難治非盡不能言之故也保嬰湯治小兒諸病陳米清胃黃土養脾嫩竹葉清熱萊蔔子化積薄荷葉去風燈心降火麥芽運食上七味隨證所主者多用其餘次之每服不過三錢袋盛煮湯任意喝飲如便燥者調入白蜜少許小兒之病多起於乳食不節此湯調養脾胃故可隨症損益以應諸病若夏月泄瀉尤為妙方即痘疹後調理亦宜准此不可以平淡而忽之而從事溫補致釀別症也雄按小兒以脾胃為後天根本乳食不節脾胃漸傷吐瀉乃作久則脾土虛弱肝木乘之糞色漸青面部萎白帶青手足微搐無力神氣懨懨不振而慢脾成矣江筆花醫鏡云時俗所謂慢驚風即木侮土是也初起宜異功散甚者加木香玉桂若肢冷唇白息微元微欲脫也急用附子理中湯尚可挽回然變之速者用藥稍緩即不濟事未可概視為慢也雄按福幼編專論此症若果系此證應用此藥乃謂執一方而可通治泄瀉其禍可勝言哉天一丸治小兒百病燈心十斤以米粉漿染曬乾研末入水澄之浮者為燈心取出曬乾入藥用二兩五錢沉者為末米粉不用赤白茯苓去皮苗用茯神各五兩滑石水飛五兩豬苓去皮二兩澤瀉去蘆三兩五味各為細末以潞參熬膏和丸龍眼大辰砂為衣金箔包裹每服一丸隨證用引調服韓天爵云小兒生理向上本天一生水之妙故治病以小水通利為捷徑也程世光治憲王誕長子初生胎不吮乳程曰此明難産兒傷氣也持人參煎湯灌半匙即吮江西通志一舟工生子脆而無皮程令取土數升糝其體即成肌同上文太原王相公始生冷無氣母驚謂已死有鄰嫗徐氏者反復諦視良久笑曰此俗名臥胞生吾能治之當活活則當貴但不免多病纍阿母耳趣使治之其法用左手掬兒右手摑其背余時嚏下而醒後六歲中痘公母嘗下樓謁巫見一白衣人長丈許閉立凝視若有所言母驚僕樓下以為不詳然竟無恙眉公見聞録兒生墮地不啼擊水瓢迫貓令叫即啼又俗稱不啼兒為悶寂生旁人呼其父名父應兒即啼物理小識有舟人生子身無全膚人莫能曉適吳門葛可久出醫衆告之可久就岸令作一坎置兒其中以細土隔衾覆之且戒勿動久之可久回啓衾視之已生膚矣蓋母懷娠舟中日久不登岸失受土氣故也按危得效方云宜速用白早米粉干撲候生皮方止小兒初生不飲乳及不小便用蔥白一寸四破之以乳汁銀石器煎灌之立效得效方小兒初生下遍身如魚泡又如水晶碎則成水流滲用密陀僧研絹羅內羅過干糝仍服蘇合香丸同上牙疳萬密齊孫周歲生走馬疳用尿桶底白垽刮下新瓦上火焙乾五分五倍子內蟲灰三分鼠婦焙乾三分枯白礬一錢共研末先用蠟茶葉浸米泔水洗淨以藥敷之神效名曰十不二散朱丹溪治走馬牙疳蠶蛻紙燒灰存性入麝香少許蜜和敷患處加白礬尤妙此外治法走馬牙疳最為梟毒須用大承氣加川連胡黃連雄黃菩荑等大下之全瀉去黑矢然後改用涼血解毒之劑外用針砭爛肉與好肉交關處全出惡血再以搽牙藥敷之庶可望愈若專恃外治未有不致誤事者方書皆未言及亦一大缺略也臍風萬密齊治斗門子初生五日不乳噴嚏昏睡萬視之曰此臍風病也一名馬牙疳小兒凡當一月之內尤急乃視其口中上齶有白胞如珠大者三四個用銀針挑去之斗門憐惜之情見於面去之未盡次日猶不乳有老嫗語以臍風之害乃速萬再治且問臍風之病云何萬曰其病不可治者三臍腹腫脹大小便不通者名曰鎖肚口緊不開不語不啼者時作搐者名曰噤風環口青色口唇緊撮名曰撮口令郎初病未至困也復以手法去其白泡而安又曰當用何藥萬曰數日之兒安能任藥雖有古方不敢用也曰然則奈何萬曰無害矣此病蓋初生時洗浴之後臍乾未落不謹視之為兒尿所侵及為風寒濕熱所侵之故宜急治之但見噴嚏多啼少乳即視其口中上齶有白泡子成聚是其候也隨以手法刮去之以軟帛拭淨其血則臍風不發矣若不知此則其泡流入腹中或為鎖肚為噤風為撮口雖有神丹不能救也鄭請詳記之以為育嬰之訓赤丹即遊風萬密齊治一小兒腿如霞遊走不定先以麻油塗患處砭出惡血其毒即散用九味解毒散一劑而愈一小兒患赤丹外勢雖輕內苦便祕此患在臟也服大連翹飲敷神功散而瘥又大連翹飲歌訣曰連翹荊芥通車芍歸活風柴蟬共甘等分梔芩還減半煎須紫草正相堪文田按三方均出明代許綾嬰童百問萬密齊曰一小兒丹發於臉眼中紅腫手不可近三日死立齊治一小兒遍身皆赤砭之投解藥即愈一小兒遍身亦亦不從砭治致毒氣入腹遂不救此症乃惡毒熱血蘊蓄於命門遇相火而合起也如霞片者須砭去惡血為善如腫起赤色遊走不定者宜先以生麻油塗患處砭之以泄其毒凡從四肢起入腹者不治雖云丹有數種治有數法無如砭之為善常見患稍重者不用砭法俱不救莊斂之子未及三月乳母不善於養盛暑中擁衾令臥忽患丹毒遍遊四肢漸延背腹倉皇求告豫曰兒方數月奈何苦之以藥急以犀角絞梨汁磨服問故曰犀角能解心熱而梨汁更能豁痰且味甘則兒易服別疏方用荊芥穗牛蒡生地丹皮元參花粉薄荷竹葉麥冬生甘草連翹貝母生蒲黃令煎與乳母服之乳汁即湯液矣依法治之一日夜赤漸淡越日丹盡退後卒以乳母不戒患驚風而殤廣筆記載靈心妙手可以為師馬名鞠傳治下部火丹用蠶砂山梔黃連黃芩黃柏大黃石膏共末水調敷上立效切勿用芭蕉根又方用黃連末蜜和雞子清調服馬雲若遇抱頭火丹必砭去惡血方效每用此法治人其不肯砭者多誤事同上立齊治吳刑部靜之子甫周歲患丹毒延及遍身如血染用瓷鋒擊刺遍身出黑血以神功散塗之查春田用大黃連翹飲而愈又王國戚子未彌月陰囊患此如前治之而愈金氏子不欲刺毒入腹而死河間云丹從四肢起入腹者不治豫嘗刺毒未入腹者無不效一小兒患赤遊風先用羌活白芷散二劑又用加味逍遙散而愈後傷風熱起疙瘩搔破出水或用大麻風藥十指拳攣膿水浸淫先用秦艽地黃湯手指如常又用易老祛風丸而瘡亦愈胎毒萬密齊長孫生下遍身生瘡疥因制一方用烏稍蛇酒浸去皮骨取淨肉焙乾一錢苦參酒浸切片曬乾取末一錢半白蒺藜炒去刺一錢半三味為末酒糊丸如粟米大每服十五丸竹葉煎湯下蟲疥滅跡不再發矣一小兒身生蟲疥醫用藥搽之瘡盡沒腹脹而喘求藥於萬曰幸未發搐尚可治也乃與雄黃解毒丸竹葉燈心煎湯下利黃涎瘡復出而安或問曰蟲疥不可搽乎曰蟲疥者胎毒也宜用解毒之藥使毒散於外不可妄用搽藥逼之使反於內也搽瘡之藥必用砒霜水銀以殺蟲藥毒之氣乘虛入里誤兒性命宜慎之雄按大人瘡疥亦有此證一彌月小兒先於口內生瘡後延於身年餘不愈以土茯苓為末乳汁調服月餘而愈一兒生下一月後遍身蟲疥浸淫濕爛其皮如脫日夜啼忽一日其瘡盡隱發搐而死馮楚瞻治其孫因母久患陰虛夜熱之症生下百餘日遍體癩瘡未必非其母妊時久服八味所致案見難産門以生地丹皮當歸赤芍萆薢首烏銀花連翹土貝甘草鱉蝨胡麻土茯苓木通節大劑乳母日夜進服數十劑後濕熱下趨兩足潰爛清水淋漓指甲皆脫乳母旁人近者無不傳染此先天熱毒之氣已盡出外矣後於耳後結一大毒此陰虛無根之火凝聚也以八味加牛膝五味煎湯數劑高腫膿而愈自後津液衰涸瘡靨乾枯或愈或發防其內攻乃以羊肉四兩煎湯入生黃耆四錢當歸二錢銀花三錢炒升麻四分姜三片棗二枚煎與服不及十劑足瘡全愈升於頭項再服頭瘡亦痊雄按又用八味以致潰後津枯劉禹錫傳信方云頃在武陵生子蓐內便有熱瘡塗諸藥無益而日益劇蔓延半身號啼不乳不睡用雞子五枚煮熟去白取黃亂髮煎乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參末糝之果神效本草綱目孫文垣治一兒耳後生一毒腫痛遍身生大泡瘡憎寒發熱與金銀花當歸尾甘草赤芍連翹殭蠶牛蒡元參兩劑而消薛立齊治一小兒自脫胎時兩目赤腫或作癢或生翳此胎內之肝火也用蘆薈六味二丸而愈萬密齊治一兒五歲每至春時則遍身生膿泡瘡此胎毒也戒用搽藥恐粉砒之毒乘虛入腹以胡麻復之而愈萬州李四守生子五歲遍身濕疥一旦盡干萬曰瘡出驚止始無憂也連更數醫不能治立齊治梁閣老孫甫周歲項患胎毒俟其有膿刺之膿出碗許乳食如常用托裡藥月餘而愈靳閣老子亦患此待膿自出幾至不救吾鄉徐內翰子患痘毒及時針刺毒不內侵數日而愈小兒血氣弱膿成不針鮮不斃矣乳病張子和治一小兒寐而不寤諸醫作睡驚治之或欲以艾火灸之或以大驚丸及水銀餅子治之其父曰此子平日無疾何驟有驚乎以問張診其兩手脈皆平和曰若驚風之脈當洪大而強令則平和非驚風也乃竊訊其乳母爾三日前曾飲醉酒否遽然笑曰夫人以煮酒見餉酒味甚美三飲一罌而睡陳酒味甘而戀膈酒氣滿乳兒亦醉也乃銼甘草葛花砂仁貫仲煎汁飲之立醒萬密齊治本縣胡正衢子二月發熱不乳萬視之雖似變蒸非變蒸也時乳母皆肥健者必因傷乳發熱也令損之次日熱退而安李立之治一嬰兒忽患喑求治立之令以襟里小兒乘高投之地兒不覺大驚發聲能言問之曰此乳搐心也非藥石所能療其術之高大率類此杭州府志一小兒吐乳便黃身有微熱萬曰此傷熱乳也吐作腥氣今已成積母曰未食熱物乃密語其父曰必傷交你得之矣問何為交你曰父母交感之後以乳哺兒此淫火之邪忤兒脾胃正氣也不治之必成癖矣蓋淫火者肝火也病則發搐癖者脾病也積不消則為癖矣宜瀉肝補脾乃與瀉火胃苓丸服之而愈御史陳公忽小兒閉目口不出聲手足俱軟急延醫治之獨盂友荊一見便云公子無病乃飲酒乳過多沉醉耳濃煎六安茶飲數匙便醒御史撫掌大笑曰得之矣可謂良醫王三峰子二歲多病萬視之曰此乳少病也王曰兒乳極多萬不應遂行既而其母驗其乳媼果無乳也詢之夜則嚼飯以哺之或啖以粑果夜則貯水以飲之復求治曰欲使即換乳母則兒認慣不可換也若不使有乳婦人哺之則疾終難治也不若仍與舊母養之擇一少壯有乳者夜則相伴以乳哺之久而慣熟自相親矣王曰有乳無乳治法異乎曰有乳之疳得之傷乳乃飽病也宜集勝丸無乳之疳得之失乳乃飢病也宜肥兒丸調理一月而安陸養愚治姚明水兒甫一歲其母無乳乃以糕餅棗柿哺之遂患疳積痢上則口舌腐爛下則膿血相雜治療半載肉削如柴飲食少進醫謂上疳下痢睡不閉目肛門如竹筒指紋已過命關不可為矣診之形脫而神在以一指按其脈上浮數而微下沉微而數其肛似外脫而非竹筒也此上越者不降下陷者不升若升其元陽降其邪火猶可生也先與補中益氣湯二錢以提其不足之陽又濃煎生脈散俟冷時時以匙挑灌之間以孩兒茶冰片青黛人中白吹之二日而安旬日全安薛立齊治一小兒目睛緩視大便臭穢乃乳傷脾胃所致用四君子加木香藿香治之而安變蒸萬密齊治楚臬之子九月發熱恐是痘疹召萬往視之非痘乃變蒸也曰何以辨之萬曰以日計之當有變蒸之期以症察之亦無痘疹之候曰痘症云何萬曰痘者五臟之液毒也故每臟各見一症呵缺驚悸心也項急煩悶肝也咳嗽噴嚏肺也吐瀉昏睡脾也身體皆涼腎也今公子無之知非痘乃變蒸將退也次日果安喉舌滯頤葉天士曰夏季秋熱小兒泄瀉或初愈未愈滿口皆生疳蝕阻塞咽喉致危者此皆在裡濕盛生熱熱氣蒸灼津液不升濕熱偏傷氣分治在上焦或佐淡滲世俗常刮西瓜翠衣治疳取其輕揚滲利也吳孚先治一小兒咽喉忽腫脹痛甚米飲湯水不下危甚吳曰此名鎖喉風以銀針刺少商然谷二穴出血其喉即寬與之茶即下咽無苦飲食遂進一小兒不時舌出以清涼藥治之不愈吳曰此名弄舌與吐舌不同薛新甫曰吐舌者脾經實熱而舌長出也弄舌者脾經虛熱時舒時斂也照新甫成方用異功散加鉤藤而愈四君子加陳皮謂之異功巢氏云小兒滯頤者涎流出而漬必於頤間也此由脾冷涎多故也脾之液為涎脾胃虛冷不能收制其津液故出於頤也張氏溫脾丹主之一法百藥煎含咽其涎自不出亦截法也黃散亦治此症溫脾散亦可東垣十書萬密齊外孫滿口生瘡咽喉唇舌皆是為制方用柏連一錢硃砂白礬五分鼠婦焙乾三分共研細敷之立效乃奇方也一兒患口舌生瘡所搽所服皆芩連知柏之類無效曰心熱所致苦入心反助其熱宜無效乃作洗心散與之一服而安大黃麻黃白朮當歸白芍荊芥薄荷甘草等分水煎服更用柏連散搽之仍用苦矣一兒舌上生瘡口唇破裂吮乳不得日夜啼哭求治用洗心散入竹葉煎服以解其裡熱外用柏連散搽之效蔣仲芳治一小兒初患舌碎既而遍身發熱或謂傷風停食與發散消導曰無益也服後果熱愈而湯水難入乃以黃連五錢疑是分煎湯徐徐與之終劑而愈問故曰若先身熱而後舌碎則因風食發熱所致今先舌碎知其心火亢甚加之身熱是內熱極而火外行耳喑蔣仲芳治一小兒二三歲身熱驚悸易醫六七俱無寸效一日忽作鴉聲少頃其音已啞魚口開張視之欲哭狀惟眉頭稍皺終無音出因以指探其口中唇乾舌燥曰心熱欲言而不能果有之乎即以黃連黃芩石膏麥冬五味山梔元參花粉知母甘草薄荷燈心竹葉等銼一大劑煎成薄膏頻頻與之一晝夜而鴉聲復出又一日而音始全自後用此法活人無數大便三四日不行者加元明粉二三錢尤驗驚悸者加金子同煎嗟乎世遇啞驚風俱棄之而不治孰知唇乾舌燥終屬陽症此法甚善故記之傷寒喻嘉言治袁仲卿子因捉彭蜞僕水中家人救出少頃大熱呻吟或與鎮驚清熱丸散二日遂昏迷不醒胸高三寸頸軟頭傾氣垂絶無生理矣診其脈止存蛛絲過指全無以湯二匙入口微有吞意曰外症之重不足懼但脈已無根不可救也一醫云鼻如煙煤肺氣已絶縱有神丹亦將奈何因思此兒受症何至此極請主人及客稍遠待某一人獨坐靜籌其故病危之家親朋滿座議論紛紜徒亂人意不可不知良久曰得之矣凡驚風一症乃前人鑿空妄談後之小兒受其害者不知凡幾昔與幼科爭論殊無證據後見方中行傷寒條辨後附痙書一冊顓言其事始知昔賢先得我心如此症因驚而得其實跌僕水中感冷濕之氣為外感發熱之病其食物在胃中者因而不化當比夾食傷寒例用五積散治之醫者不明以金石冷藥鎮墜外邪深入臟腑神識因而不清其食停胃中者得寒涼而不運所進之藥皆在胃口之上不能透入何以上云鎮墜深入臟腑轉積轉多以致胸高而突宜以理中湯運轉前藥倘得症減脈出再從傷寒門用藥尚有生理或謂鼻如煙煤肺氣已絶而用理中得無重其絶乎曰所以獨坐沉思者正為此耳蓋煙煤不過大腸燥結之徵若果肺絶當汗出大喘何得身熱無汗又何得胸高而氣不逼且鼻準有微潤耶此所以望其生也遂以理中湯一盞灌入口中大爆一口前藥一齊俱出胸突頓平頸亦稍硬但脈仍不出人亦不蘇此食尚未動關竅阻塞之故再灌前湯些少熱漸退症漸減乃從傷寒下例以元明粉一味化水連灌三次是夜下黑矢甚多次早忽然一聲云我要酒吃此後尚不知人事以生津藥頻灌一日而蘇雄按此用理中必加枳實所云鎮墜之藥性皆重降藥雖停於胃口邪則不能外解而深入矣龔子才治一小兒八歲患傷寒頭痛身疼發熱口乾面赤無汗或以傷寒治之不效已旬日與龍腦安神丸一服其汗如雨即安一小兒沉默昏倦肢冷驚悸其紋如弓之向里此屬胃氣虛而外感寒邪也先用惺惺散以解外邪諸症悉愈但手足逆冷又用六君子調補元氣而安一小兒傷寒嘔吐發熱服消導清熱之劑飲食已消熱未退用六君升麻柴胡四劑而痊高鼓峰治吳維師子甫十歲發熱口渴胸腹悶痛曰少陽陽明症也用加味小柴胡湯是夜發暈逾一二時吳驚甚曰無傷也但此病不傳瘧必傳痢逾三日熱退果少腹痛先解黑矢無數隨後更膿血而痢矣連用當歸解毒丸五六劑而痢除繼以六君子湯調理而安得小柴胡湯暈甚熱動發厥也小柴胡既不足以和之則其形氣必發而後愈發於少陽則為瘧發於陽明則為痢也馬元儀治張伯卿子年十二患傷寒譫語發熱不知人事已五六日幼科屢治不應漸至目直神昏診之兩脈弦急拒指因驚後飲食與痰留結不解壅遏為病胃氣生熱津液內亡而譫語陽明之脈絡於目經盛則絡亦盛故目直視也實熱在胃惟用承氣調之使壅滯之氣悉反衝和則津液得存而二病自去矣加服抱龍丸以豁痰治驚服後便行二三次熱勢大減明日全愈蔣仲芳治陳壽田伯弟年十一歲傷寒病起幾至二百日粒米不入食即脹滿諸藥不愈惟日以人參三錢煎飲而已視之骨瘦如柴六脈沉細似宜參術然按其心胸小腹硬塊已滿著手即痛曰憑脈則難用下藥不下亦無生理遂用當歸元明粉各三錢灑蒸大黃二錢杏仁麻仁蘇子桃仁俱炒為末各一錢白芍川芎桔梗各七分水煎服服後即去黑塊二三十中脘硬處下有寸許然已虛極明日去大黃元明粉加人參二錢服一劑後日復用首方又去黑塊一二十兩方間服半月黑塊始盡而愈感症總制石公子年甫十齡丁丑六月患感冒風暑寒熱頭疼幼科已用葛根加羌防解表矣後復寒熱不減氣喘腹脹醫者用消導加小柴胡湯不應神昏喘急時或泄瀉似痢腹痛不知名為何疾也診之已二十餘日脈數無力神昏氣亂按其腹時脹時痛觀其神時靜時躁手足或冷或熱虛汗不已此外邪初感者為藥而解久積者未曾清理加之飲食失調元氣欲脫致外邪內陷今以救本為急用理中湯加桂附痛瀉頓減手足亦溫然熱不退小便赤澀用金匱腎氣湯二服小便方利而寒熱愈加此元氣漸回症候復現朝用六君子湯加柴葛神麯乾薑夜用六味湯加參桂旬日後寒冷拘攣目上竄咬牙呻吟咸以為無救矣陳曰此名寒戰正氣將回積邪欲出乃吉兆也自未至酉始大汗如雨手足軟弱不語熟睡天明方能言然虛症日出潮熱汗出則用補中湯合建中加附子不寐則用歸脾湯元氣弱則用十全大補湯腹痛滑瀉則用理中六君湯如是調理三月方瘳此條用藥俱不盡合法玩葉天士溫熱論自知蔣仲芳治一小兒在水閣風雨卒至又驚又寒後四肢厥冷漸至遍身惟心口稍暖此冷風入骨症冷至心窩則死用理中湯加附子一錢數服而寒退聶久吾治司毛理之次子年十一夜間忽發大熱頭痛身又痛咸以為病暑也及問其由細察其脈乃感寒耳謂必須發汁其家以現在多汗為疑曰此汗不當數必用藥發汗方可除病遂與一大劑令其熱服出汗至天明諸症盡退再與清解數服而安羌防各六分陳草各三分芎芷各四分赤芍五分香薷乾葛各一錢二分蒼朮蘇葉香附各八分姜三片傷風薛立齊治一小兒傷風咳嗽發熱服解表之劑更加喘促出汗以為脾肺氣虛欲用補中益氣湯加五味子補之不信乃服二陳桑皮杏仁枳桔之劑前症益甚又加發搐痰壅仍用前方加鉤藤鉤而愈陳文中治太師賈平章子宣機三歲頭熱目赤痰齁不已醫言風熱盛痰涎作陳曰因脾肺虛而風冷寒痰所作又一醫言熱即生風冷即生氣陳曰不然三冬盛寒冷則生風九夏炎熱熱則生氣蓋風者百病之長也若寒得之而謂之風寒若熱得之而謂之風熱若燥得之而謂之風燥若濕得之而謂之風濕此非獨熱而生風也如暗風破傷風臍風慢驚風及風癇驚癇食癇等症而皆作搐非但熱而生風也宣機病始於頭熱目赤便以涼藥餌之致寒涼氣客於喉厭之間與津液相搏又生痰齁症其喉厭寒痰冷氣壅塞不通故頭熱目赤無由得愈治法當斡去喉厭間寒痰令氣得通其病可愈遂投芎蠍散一服用手斡去寒痰冷涎四五口次以油珠膏一服而愈曾世榮治衡州萬戶張侯寓屯田日長子三歲六月得患不語手足倦縮已經二旬日曾至諸醫議論不一觀外形面垢有熱氣促流涎口眼喎斜不省人事次則手足俱冷而倦縮身背反張診六脈沉按而緊獨心肝脈虛而細數餘脈緩弱曰面垢色脈細數此因中暑感風前賢所謂暑風者是也手足冷縮而不伸或服寒劑太過寒之使然若手足溫其效自速乃以治暑法分陰陽順中氣五苓散加寬氣飲薑汁沸湯調下三服其症稍慢次疏風和榮衛百解散加荊芥人參當歸水姜煎投隨以溫灰湯燒洗手足藥一服洗一次至八九次手足溫則血活活則筋舒舒則手足運動如常餘熱未除消暑清心飲主之聲音不全二聖散取效調理惟用萬安飲恰九日前症俱減張侯曰此子更生端藉藥力不敢忘也因筆漫記後有是症仿此活人亦快心矣立齊治一小兒傷風鼻塞流涕服藥過重發搐呵缺頓悶汗出氣喘久不愈其母因勞役瘀熱用補中益氣湯時以五七滴藥汁與兒飲之母子並愈一小兒傷風發搐痰盛喘急謂此脾肺氣虛腠理不密而外邪所乘用六君加柴胡升麻桑皮杏仁一劑痰喘悉退又一劑去桑杏加鉤藤而安乃用異功散數劑不復發此證若不補脾胃實腠理導治痰邪鮮有不誤暑繆仲淳治高存之次子童時夏月身熱十晝夜止飲白虎湯諸醫汗之不解以麻仁丸下之熱如故繆診曰此傷暑也白虎湯是其本方因誤汗下虛甚加人參三錢一劑微汗瞑眩少頃熱解更疏一方防其瘧痢乃用人參二錢兼健脾清暑導滯之劑未幾瘧作如方飲之瘧止痢又作存之不得已於生脈散中加益元散飲之兒尫羸甚痢少減數日後仲淳復至語之故曰生脈益元散得之矣不診而諦視兒問靡甘否曰甘繆曰病去矣存之問故曰視兒目光炯炯且飲食味甘是精神已王胃氣轉矣尋果脫然起臧玉涵子歲半盛夏咳嗽七日因浴受驚又傷食大熱倦頓三日不敢與藥目翳唇焦舌乾仲淳曰此暑病也當與白虎湯曰腹瀉石膏無害乎曰先以天水散探之服二錢少頃藥夾痰而吐微汗身涼黃昏復熱又以天水散二錢不效仲淳曰其為暑症無疑當以白虎湯加人參因兒患肺熱且止再診之曰暑邪客於皮膚分肉有熱無寒是為疸瘧斷當用白虎湯連服二劑不效鼻露眼開口不納氣勢甚急危曰此症氣不足勝邪也刺瘧論云凡瘧先時一食頃乃可治過時則失之也又云無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗意者服藥不得時耶將前藥並劑煎露一宿雞鳴溫服之病頓失不須調補精神漸復以此知察病望氣及服藥之貴及時也蔣千宮第五子一歲傷暑發熱服此藥驚風之帖十餘日驚搐危殆又進臘丸等死去矣豫察其誤中於藥以補脾湯加減治之立愈慈幼篇傷食陸道仙治一兒多食果腹脹醫罔效先取桂麝瑞香三味為丸服之立愈平湖縣志龔子才治一小兒食粽後咬牙欲吐頃刻腹脹昏憒鼻青黃赤此脾土傷而心肝動食積發厥也先令以雞翎探吐出酸物頓醒節其飲食勿藥而愈一小兒好吃粽成腹脹痛用白酒麴末同黃連末為丸服之而愈一小兒因停食脹痛服峻利藥後患瘧日晡而作此元氣下陷以補中益氣湯治之而愈高鼓峰治吳章成弟八歲發熱悶亂大便不通醫作感冒治高曰此得之傷食因發散太過遂成虛熱兼風藥燥血故不便耳名言當玩先以六味飲加肉蓯蓉三錢飲之下黑矢數十枚繼以補中益氣湯數劑而諸症悉除薛立齊治一小兒傷食發熱面赤或用養胃湯加枳實黃連山楂治之更加腹脹午後發熱按其腹不痛此飲食雖化脾胃復傷用六君子湯數劑而愈一小兒傷食發熱嘔吐面赤服消導清熱之劑飲食已消熱赤如故曰此胃經虛熱耳用四君子湯加升麻柴胡各二分四帖而痊一小兒傷食發熱面赤抽搐嘔吐氣喘吐痰以飲食傷脾發熱肺氣虛弱所致耳用六君子湯加炒黑黃連山梔各二分愈一小兒飲食停滯服消導之劑曰此脾胃氣虛不能克化也法當調補為善若數用克伐之劑脾氣益傷飲食愈停矣已而腹內又結一塊寒熱潮熱食少作渴大便不實用四君子湯飲食漸增又用補中益氣湯而愈萬密齊治孫監司女病後誤食菱角傷脾面腫而喘用錢氏異功散加藿香葉以去脾經之濕紫蘇葉以去肺經之風一劑而安外甥女有食積脾虛病痘後又傷食甚瘦腹脹不喜食用胃苓丸方加枳實炒神麯麥芽青皮作丸服之一兒因傷食腹痛脹醫下之而愈又傷食腹脹醫再下之曰非其治也誤殺此兒果半年而死或問故曰凡飽食傷胃而脹宜消導之脾虛不能消食而脹宜補之以助其傳化醫者不察乃一下再下致腹大無紋臍突背平脾腎皆傷不死何俟王閒一子周歲因食豬肉受傷肢體瘦削使人求藥問其詳乃食積疳此有餘病也與脾積丸五粒教以豬肉湯吞下果下一塊如小指大涎沫裹之而出頓安馬銘鞠治華氏子連食冷鴨子二枚午間又縱恣飲食更余病發上不吐下不瀉胸腹脹滿目閉氣喘身熱按其胸腹則雙手來護曰食也鴨子黃閉氣得水則化今尚在胃口急索大棗數枚煎湯入砂仁錢許以通其氣兒渴頓飲碗許氣漸通目開手足亦漸流動再煎飲之夜半吐瀉交作次日而愈立齊治楊錦衣子十歲腹脹痛服消導藥不應彼以為毒請診其脈右關沉伏此食積也河間云食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後與氣快然衰皆脾病也審之果因食粽得此以白酒麴熱酒服而愈張子和曰舞水一富家有二子長者年十三幼者年十一好頓食紫櫻一二斤每歲須食半月後一二年幼者發肺癰長者發肺痿相繼而死張常嘆曰人之死生命耶天耶古人有詩爽口味多終作疾真格言也天生百果所以養人非害人也然而富貴之家失教縱欲遂至於是吳振公次女四歲傷食吐瀉發熱發顫豫謂此女多食瓜果致臟氣不行釀成濕熱既經吐瀉濕去熱留臟腑之中無陰相養故變成風象為定參朮半夏砂仁乾薑厚朴歸苓一方某醫謂弱齡女子豈得服參術遂易他藥服至五日人事昏沉頭偏睛露復延治以溫中補脾救之立蘇慈幼篇
