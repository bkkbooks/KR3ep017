body:
  text: 卷十九腹痛周漢卿治永康人腹疾傴僂行卿解衣視之氣衝起腹間者二其大如臂刺其一砉然鳴又刺其一亦如之加以按摩疾遂愈明史薛立齊治一婦人小腹脹滿小水不利或胸乳作痛或脅肋作脹或氣逆心吻薛以為肝火而血滯傷脾用四物柴胡青皮延胡索木香而愈一婦人久患腹痛去瘀血方止已而腹大痛諸藥不納薛以脾胃之氣虛寒用參朮炮姜丸如黍每日數粒津咽下後以二味濃煎漸呷而愈通府趙孟威云其妹小腹痛服附子理中湯附子服過八十餘粒此乃沉寒痼冷之甚不多有者又壬午仲冬金臺一男子患腹痛誤服乾薑理中丸即時口鼻出血煩躁發狂入井而死二條俱見薛公案龔子才治一婦人臍腹疼痛不省人事只一劑立止人不知者云是心氣痛誤矣方用白芍藥五靈脂木通去皮三味等分每服五錢水醋各半煎至七分去渣溫服此瘕痛也李北川仲夏患腹痛吐瀉兩手足捫之則熱按之則冷外假熱內真寒之證其脈輕診則浮大重診則微細外假熱內真寒之脈此陰寒之證也急服附子理中湯不應仍服至四劑而愈汪石山治大坑方細形瘦年三十餘忽病腹痛磊塊起落如波浪然晝輕夜重病在血分可知醫用木香磨服及服六君子湯皆不驗診其脈浮緩弦小重按似澀曰此血病也前藥作氣治謬矣彼謂血則有形發時有塊磊痛減則消而無跡非氣而何此難亦不可少蓋不知有形者血積也無形者血滯也滯視積略輕耳安得作氣論邪若然則前藥胡為不驗遂用四物湯加三稜蓬朮乳香沒藥服之其痛遂脫然本傳孫文垣治嚴印老長媳患腹痛有小塊纍纍然腹覺冷甚兩寸關皆滑數兩尺沉微此脾氣弱而飲食不消又當秋令濕淫之候不利亦瀉宜預防之與白朮蒼朮茯苓甘草白蔻仁木香半夏陳皮澤瀉煎服其夜果瀉一度次早又瀉一度小腹仍痛且裡急後重蓋其稟賦素虛當補中兼消兼利白芍藥三錢桂心一錢甘草人參茯苓澤瀉陳皮白朮各八分升麻葛根各六分服後脈皆軟弱不滑纍塊亦消改以人參黃耆白芍各二錢炙甘草陳皮澤瀉葛根柴胡茯苓各一錢調理而安張道南內人以飲食忤於氣因腹痛不飲食五日矣兩寸關弦尺滑孫曰此上焦氣虛下有鬱滯以薑黃青皮為君山楂檳榔當歸杏仁烏藥枳殼為臣柴胡木香為佐吳萸為使此症氣虛輕而鬱滯重故治法如此否則未通其鬱先傷其氣可若何即調理善後之方亦仍以通鬱滯為重不然用小建中湯何嘗有此等加減法耶服後氣稍順然後用蔥二斤煎湯浴洗腰腹即將熟蔥擦摩使氣通透鬱滯外治法洗畢即安臥少頃其夜大便通先下皆黑硬結塊後皆清水此積滯行而正氣虛也以建中湯加山楂茯苓澤瀉柴胡香附姜連調理而痊李士材治一婦人鬱怒之餘胸腹脹痛先服消痰順氣化食之劑不效更以人參補之亦不效診之六脈弦而數此內有鬱熱為寒涼飲食壅之而痛用黃連三錢梔子一錢五分橘紅白豆蔻各二錢鉤藤木香各八分官桂二錢加薑汁半鍾三劑痛止四劑復加乾薑人參而霍然焦太史當臍切痛作食氣療之無效李診之曰當臍者少陰腎之部位也況脈沉而弱與氣食何干非徒無益反害真元以八味丸料煎飲不十日而痊胡京卿少腹作痛連於兩脅服疏肝之劑一月以來日甚一日李診之左關尺俱沉遲治以理中湯加吳茱萸柴嶼青治廣撫諱蘇昌將赴瀋陽京兆任時伊嫂腹疼吐酸日夜轉側呼號已治木求一診以決之其脈微緊受寒所致並非危症何用驚惶若此蘇云昨服藥稍定以方就政並屬定方柴見前方系附子理中湯頗合是症遂不另立王海藏治姬提領因疾服涼劑數日遂病臍腹下大痛幾至於死與薑附等劑雖稍蘇痛不已隨於本方內倍白芍服之愈綱目陸肖愚治尤少溪年近六十性急多怒因食冷粽四枚遂患腹痛並脅亦痛醫用平胃散加枳實黃連不效彼亦知其家潤字丸方以五錢分三服令一日內服之大便已瀉而痛乃未止謂通則不痛今通而仍痛藥力淺而積未盡也再以五錢令一日服之大便數十行皆清水而痛反增劇號叫不已飲食不進面色青紫勢危極陸脈之弦細沉弱右關弦而有力曰虛中有實消則元氣即脫補則腹痛尚劇因用理中湯料五錢配枳實五錢一日二劑始下堅積缶許是夜痛大減明日減枳實之半又二劑而腹痛全愈第脅間尚微痛去枳實加青皮吳茱萸數劑而痊後以調氣養榮湯理之張三錫治一人腹痛而瀉口乾面時赤乃食積也與木香檳榔丸一服去硬物愈一酒客每日腹痛瀉黃沫知積熱也投芩連厚朴炒梔子木通澤瀉赤苓二劑少可復以酒蒸大黃為丸酒下二錢凡三服遂不發一婦人小腹塊痛醫作陰治投熱劑不應又有作燥矢治者硝黃潤腸丸等藥屢用不減詢之七日前作寒起遂腹痛左三部皆弦小無力右寸關俱弦滑必起於外感內傷挾氣下早故食滯不下每疼則下黃水止作無時下傷氣液故作渴遂以炒白芍藥茯苓保脾木香青皮疏氣炒山楂清塊中之火當歸潤燥陳皮甘草和中小水不利加澤瀉升麻車前二劑黃水雖少痛塊不減用蔥豉尉法復投二劑二便大去而安陳良甫治家提幹內人病心腹脹痛衆投木香檳榔大腹白芍薑桂之類病益甚診之六脈弦緊而和不似病脈但診之兩手如火以此知其熱也衆問治法曰大凡心腹刺痛不可便作虛冷治之或曰非冷而何熱即生風冷即生氣是也曰不然難經云虛則癢實則痛又仲景曰腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯家云荊布素來質弱曰有可辨處遇痛時使一婢按之若痛止是虛寒症也若按之轉甚手不可近叫喚異常日此實熱無可疑者當用大柴胡湯治之衆皆不許乃與責狀而投之八服愈良方朱丹溪治一婦上腹大痛連及兩肋以香附末湯調而安羅謙甫治副使覃郎中年四十九歲至正丙寅春病臍腹冷痛完穀不化足胻寒而逆皮膚不仁精神困弱診其脈沉細而微遂投以大熱甘辛之劑及灸氣海百壯三里二穴各三七壯陽輔各二七壯三日後以蔥尉灸瘡皆不發復灸前穴依前壯數亦不發十日後瘡亦更不作膿瘡口皆干癸丑歲豫隨朝承應冬屯於卓多地面學針於竇子聲先生因論穴竇曰凡用針者氣不至而不效灸之亦不發大抵本氣空虛不能作膿失其所養故也雄按此是名言更加不慎邪氣加之病必不退異日因語針科呼教授亦以為然戊辰春副使除益州府判到任未幾時患風疾半身麻木自汗惡風妄喜笑又多健忘語言微澀醫以續命湯復發其汗津液重渴其症愈甚因求醫還家日久神氣昏憒形容羸瘦飲食無味便溺遺矢扶而後起屢易醫藥皆不能效因思內經云陽氣者若天與日失其所則折壽而不彰今因此病而知子聲先生之言矣或曰副使肥甘足於口輕暖足於體使令足於前所言無不如意君言失其所養何也豫曰汝言所以養之正所以害之務快於心精神耗散血氣空虛因致此疾靈樞云人年十歲五臟始定血氣始通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅血氣盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏華容頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣始衰皮膚已枯八十歲肺氣衰魂魄散離故言善誤九十歲腎氣焦臟枯經脈空虛百歲五臟俱虛神氣皆去形骸獨居而終矣蓋精神有限嗜欲無窮輕喪性命一失難復其覃氏之謂歟朱丹溪治一人痛當臍綿綿不已脈弦伏無力因作挾陰治理中加肉桂八分附子三分煎冷服隨愈薛立齊治羅給事小腹急痛大便欲去不去此脾腎氣虛而下陷也用補中益氣送八味丸二劑而愈此等症候因利藥致損元氣肢體腫脹而死者不可枚舉副郎李孟卿常患腹痛每治以補中益湯加山梔即愈一日因怒腹痛脈弦緊以前湯吞左金丸二十粒而愈一婦人心腹痛諸藥不應用炒黑山梔桔梗治之而愈傅青主治一婦妒惡夫有所昵忽患腹痛輾轉地上不可忍其夫求治先生令持敝瓦釜置婦床前搗千杵服之立止此移易性情之法不問藥餌張子和之後此術不傳久矣劉紹文九疇古文一婦人少腹痛百藥不效一醫用杉木節童便煎服下血而愈醫學綱目汪訒庵嘗病腹中啾唧經兩月有友人見招飲以蘆稷燒酒一醉而積疴暢然蘆稷最能和中煎湯溫服治霍亂如神華他傳有人病腹中半切痛十餘日中鬚眉墮落他曰是脾半腐可刳腹養活也使飲藥令臥或即麻沸散也破腹就視脾果半腐壞以刀斷之刮去惡肉以膏敷之飲之以藥百日平復雄按此事果實法亦不傳似可不選趙從先治保義郎頓公苦冷疾時方盛暑俾就屋開三天窗於日光下射處使頓仰臥操艾遍鋪腹上約數斤移時日光透臍腹不可忍俄而腹中雷鳴下瀉口鼻間皆濃艾氣乃止明日復為之如是一月疾良已乃令滿百二十日宿疴如洗壯健如少年時趙曰此孫真人祕訣也世人但知灼艾而不知點穴又不審虛實徒受痛楚損耗氣力日者太陽真火艾既遍腹徐徐照射入腹之功極大五六七月最佳若秋冬間當以厚艾鋪腹蒙以棉衣以尉斗盛炭火慢尉之以聞濃艾氣為度亦其次也繆仲淳治高存之長郎患腹痛問曰按之痛更甚否曰按之則痛緩曰此虛症也即以人參等藥飲之數劑不愈但藥入口則痛止其痛每以卯時發得藥即安至午痛復發又進再煎而安近晚再發又進三劑而安睡則不復發矣如是者月餘存之疑之更他醫藥則痛愈甚藥入痛不止矣以是服繆方不疑一年後漸愈服藥六百劑全瘳雄按治法已善而六百劑始瘳者方未盡善也人參三錢白芍三錢甘草一錢麥冬三錢當歸二錢橘紅一錢五分木瓜一錢又重定方加萸肉二錢黃柏一錢五分鱉甲二錢枸杞三錢又以飲食少時噁心去當歸黃柏加牛膝三錢秦艽一錢五分棗仁三錢石斛二錢延胡索一錢廣筆記包海亭夫人患腹痛連少腹上連心日夜靡間百藥不效診其脈兩寸關俱伏獨兩尺實大按之愈甚詢知其起於暴怒風木鬱於地中投以芎藭上柴胡中升麻下下咽噯氣數十聲痛立已已而作喘曰是升之大驟也以四磨湯與之遂平同上蔣仲芳治吳氏母年六十餘患腹痛日瀉四五行已三四年遍治不效診之兩尺沉緊曰內有沉積也用熟大黃三錢入本病藥中煎服一帖而痛如失沈抄本示吉曰毛方來忽患真寒症腹痛自汗四肢厥冷諸醫束手豫用回陽湯急救而痊吳石虹曰症暫愈後必下膿血則危矣數日後果下痢如魚腦全無臭氣投參附不應忽思三物桃花湯仲景法也為丸與之三四服愈沈效兄抄本徐靈胎曰腹痛久者必有積滯必用消積丸藥以漸除之但用煎方不足以愈久病也腰痛陶弘景曰相傳有人患腰腳弱往栗樹下食數升便能起行此是補腎之義然應生啖若服餌則宜蒸暴之按蘇子由詩曰老去自添腰腳病山翁服栗舊傳方客來為說晨興晚三咽徐收白玉漿此深得食栗之訣也本草綱目竇材治一老人腰腳痛不能行步令灸關元三百壯更服金液丹強健如前琇按竇氏之法惟沉寒痼冷者宜之有此痼疾即有此蠻治亦未可盡廢時誤用則受禍最最烈矣張仲文傳神仙灸法療腰重痛不可轉側起坐艱難及冷痹腳筋牽急不可屈伸灸曲踿兩紋頭左右腳四處各三壯每灸一腳二火齊下艾炷才燒至肉初覺痛便用二人兩邊齊吹至火滅午時著灸至人定以來臟腑自動一二行或轉動如雷聲其疾立愈此法神效卒不可量也綱目張子和治趙進道病腰痛歲余不除診其兩手脈沉實有加以通經散下五七行次以杜仲去粗皮細切炒斷絲為細末每服三錢豬腰子一枚薄批五六片先以椒姜淹去腥水摻藥在內裹以荷葉外以濕紙數重封以文武火燒熟臨臥細嚼溫酒送下每旦以無比山藥丸一服遂數日而愈琇按此子和用補藥法也其精切簡當視後世之用補者何如張子和女僮冬間自途來面赤如火至㶏陽病腰胯大痛裡急後重痛則見鬼神張曰此少陽經也在身側為相火使服舟車丸通經散瀉至數盆病猶未瘥人皆怪之以為有祟張大怒曰驢鬼也復令服調胃承氣湯二兩加牽牛頭末二兩同煎服之大下數十行約一二缶方舍其杖策但發渴恣其飲水西瓜梨柿等張曰凡治火莫若冰水天地之至陰也約飲水一二桶猶覺微痛乃刺其陽陵穴以伸其滯足少陽膽經之穴也自是方寧女僮自言此病每一歲須瀉五七次今年不曾瀉故如是也常仲明悟其言以身有濕病故一歲亦瀉十餘行病始已此可與智者言難與愚者論也凡泄瀉症極多一人六十餘病腰尻脊胯俱痛數載不愈晝靜夜躁大痛往來痛作必令人以手捶擊至五更雞鳴則漸減向曙則痛止左右及病者皆作鬼神陰譴百方禱祝無驗淹延歲月肉瘦皮枯飲食減少暴怒日增惟候一死張診其兩手脈沉滯堅徑力如張緪謂之曰病雖瘦難於食然腰尻脊胯皆痛者必大便堅燥其左右曰有五七日或八九日見燥糞一塊如小彈丸結硬不可言曾令人剜取之僵下一兩塊渾身躁癢皮膚皺揭枯澀如麩片既得病之虛實隨用大承氣湯以薑棗煎之加牽牛頭末二錢不敢言是瀉劑蓋病者聞暖則悅聞寒則懼說補則從說瀉則逆此弊非一日也雄按可謂洞明世事練達人情而況一齊人傳之衆楚人咻之乎及煎服使稍熱咽之從少纍多纍至三日天且晚臟腑下泄四五行約半盆以燈視之皆燥糞痹塊及瘀血雜臟穢不可近須臾痛減九分昏睡如常人至明日將夕始覺飢而索粥溫良與之又困睡一二日其病盡去次令飲食調養日服導飲丸甘露散滑利便溺之藥四十餘日乃復蓋虛結與閉雖久猶可解而決去腰脊胯痛者足少陽膽經之所過也難經曰諸痛為實又痛隨利減不利則痛何由去故凡燥症皆三陽病也病者既痊壽乃八十歲衛德新因之析津冬月飲寒冒冷病腰常直不能屈伸兩足沉重難於行步途中以床舁程程問醫皆云腎虛用蓯蓉巴戟附子鹿茸大便反祕潮熱上周將經歲矣乃乞拯張曰此十日之效耳衛曰一月亦非遲張曰足太陽經血多病則腰似折膕如結腨如裂太陽所致為屈伸不利況腰者腎之府也身中之大關節今既強直而不利宜咸以軟之頓服則和柔矣難經曰強力入房則腎傷而髓枯枯則高骨乃壞而不用與此正同今君之症太陽為寒所遏血墜下滯腰間也原缺五字必有積血非腎虛也節次以藥之下可數百行去血一二斗次以九曲玲瓏灶蒸之汗出三五次而愈初蒸時至五日問曰腹中鳴否曰末也至六日覺鳴七日而起已能揖人張曰病有熱者勿蒸蒸則損人目也饒之城中某病腎虛腰痛沙隨先生以其尊人所傳宋誼叔方用杜仲酒浸透炙乾搗羅為末無灰酒調下如方制之三服而愈槎庵小乘薛立齊治一婦人腰痛三年矣每痛必頭暈目緊薛以為肝脾氣虛用補肝散而愈三年後因勞役患頭暈兼噁心用補中益氣湯加茯苓半夏蔓荊子而愈一婦人苦腰痛數年不愈薛用白朮一味大劑服不三日而痊乃胃氣虛之症故用白朮也一婦人先腰胯作痛後兩腿亦痛薛以為足三陰虛寒外邪所傷用小續命湯及獨活寄生湯或作或止所用飲食極熱腹中方快薛曰邪氣去而元氣虛寒也診其脈果沉細用養腎散漸愈又用十補丸而痊一婦人所患同前但發熱作渴喜冷飲食脈洪數按之遲澀薛以為血虛有熱用羚羊角散去檳榔加白朮茯苓數劑更用加味逍遙散而痊一婦人患前症時或膝腿作痛脈浮數按之遲緩此元氣虛而風濕所乘用獨活寄生湯頓愈又用八珍湯而安一婦人因怒患前症寒熱往來口苦不食晡熱內熱薛以為肝火血虛先用小柴胡山梔頓愈又用加味逍遙散瘳一婦人患前症寒熱頭痛殊類傷寒此寒邪之症用檳榔敗毒而安又用補中益氣湯調理而愈龔子才治一人跌後腰痛用定痛等藥不效氣血日衰面耳黧色龔曰腰為腎之府雖曰閃傷實腎經虛弱所致也遂用杜仲補骨脂五味子山楂蓯蓉山藥空心服又以六君當歸白朮神麯各二錢食遠服不月而瘥張路玉曾治沈雲步媳常有腰痛帶下之疾或時勞動則日晡便有微熱診其兩尺皆弦而右寸關虛虛濡少力此手足太陰氣衰敷化之令不及也合用異功散加當歸丹皮調補胃中榮氣兼杜仲以壯關節澤瀉以利州都則腰痛帶下受其益矣江蘇總藩張公嚴冬腰腹重痛甲夜延診候脈得沉沉滑而駛遂與導痰兼五苓之制一劑而腹痛止三啜而腰胯馳縱自如未嘗用腰痛之藥沉為熱在裡滑為痰故消導分利而愈盧不遠治陳孟杼父六月中受寒尚淹淹未甚也至次年二月忽小腹與腰急痛即令人緊挽外腎稍松便欲死與羌活黃柏茯苓肉桂等劑令刮委中痛止而足軟至五月天熱身發紫瘢有汗至足乃愈此乃腸腑病也經曰小腸病者腰脊控睪而痛以羌活入小腸故痛隨愈其足軟未瘳者原以寒邪鬱火故需夏時則火力全而血脈之邪始去所以瘢出足汗百骸暢美寒淨而火遂融通也吳孚先治尹瑞之腰痛異常從目內眥進藥而愈或問之曰是乃精明穴也在目內眥紅肉中其脈行足太陽經於腰背下應足少陰通於心腹腰背之痛從精明進藥良有奇驗古來神聖有從耳進藥者病愈而耳聾針之則愈矣蘇頌治一女子忽得小腹中痛月經初來便覺腰間切痛連脊間如刀刺錐刺痛不可忍衆醫不別謂是鬼祟妄服諸藥終無所益其疾轉增審察前狀相當即用積雪草藥夏五月正放花時即採曝乾搗節為糝每服二方寸和好醋二小合平旦空腹頓服之每旦一服以知為度天寶單行方本草綱目張三錫治一人瘦弱性復嗜酒致腰及雨脛痛不可忍作腎虛治不應診之左脈濡細而數乃血虛受熱也遂以四物湯加生地知柏牛膝肉桂少許二劑知十劑已一人因太勞又過飲酒致濕熱乘入客於經絡腰痛夜更甚不得俯仰脈濡而弱先與拈痛去參術二劑稍愈遂改用四物湯加杜仲牛膝獨活肉桂頓瘳一人脈症同上服拈痛漸減一人改用附桂遂攻出一癰出膿大補始消一人肥盛而肢節痛腰更甚脈沉濡而滑知濕痰也與二陳湯加南星二朮二活秦艽防風十劑愈一人因墜馬後腰痛不止日輕夜重瘀血諦矣與四物去地黃加肉桂桃仁泥蘇木四服大便下黑而痊王叔權曰舍弟腰疼出入甚艱余用火針微微頻刺腎腧則行履如故初不灸也屢有人腰背傴僂來覓點灸豫意其是筋病使然為點陽陵泉令歸灸即愈筋會陽陵泉也然則腰疼又不可專泥腎腧不灸其他穴也陳三農治一士精神倦怠腰膝異痛不可忍或謂腎主腰膝乃用桂附之劑延兩月覺四肢痿軟腰膝寒冷遂恣服熱藥了無疑懼診伏於下及重按之振指有力此陽盛格陰乃火熱過極反見勝己之化以黃柏三錢膽草二錢芩連梔子各一錢五分加生薑七片為之嚮導乘熱頓飲移時便覺腰間暢快三劑而痛若失立齊治一婦人患腰痛腳弱弛長不能動履以人參敗毒散加蒼朮黃柏澤瀉而愈一人體厚腰間常冷與腎著湯加星半夏術三服而愈朱鶴山老年久患腰痛用茯苓三錢枸杞三錢生地二錢麥冬五錢人參二錢陳皮三錢白朮三錢河水二鍾煎八分日服一劑強健再生子八十未艾廣筆記繆仲淳治錢晉吾文學腰痛甚診之氣鬱兼有瘀血停滯投以牛膝五錢當歸二錢五分炙甘草一錢蘇梗一錢五加皮一錢橘紅二錢制香附二錢續斷二錢水二鍾煎八分飢時加童便一大杯服二劑全愈同上繆之外祖李思塘少年患腰痛至不能坐立諸醫以補腎藥療之不效朱遠齊者湖明醫也用潤字號丸藥下之去黑糞數升蓋濕痰乘虛流入腎中作苦痰去方以補藥滋腎不逾月起惜其方傳者不真同上李季虯曰先安人因女亡忽患腰痛轉側艱苦至不能張口授食投以鹿角膠不愈以濕痰療之亦不效遍走使延仲淳曰此非腎虛也如腎虛不能至今日矣用白芍藥制香附各三錢橘紅白芷肉桂各二錢炙甘草一錢乳香沒藥各七分半燈心同研細臨服下之一劑腰脫然覺遍體疼仲淳曰愈矣再煎滓服立起豫駭問故仲淳曰此在素問木鬱則達之顧諸君不識耳廣筆記薛治一男子年四十餘患腰痛服流氣飲寄生湯不應熱手尉之少可蓋脈沉弦腎虛所致以補腎丸愈之張景嶽治董翁年六旬資稟素壯因嗜火酒致濕熱聚於太陽膀胱忽病腰痛不可忍至求自盡診六脈皆甚洪滑且小水不通而膀胱脹急遂以大分清飲倍加黃柏龍膽草一劑小便頓下腰痛如失劉宏闢曰一女病腰痛醫以杜仲補骨脂等治之不效診其脈浮細緩澀知為風寒入於血脈耳與當歸四逆湯劑盡痛瘥同年周六謙患腰痛牽及兩胯每酉戍亥三時則發余時則否脈沉而澀豫以此湯少加附子二劑而愈次日前醫來深詆此湯之謬復進杜仲等藥腰痛如故怪而問之曰或又服他藥耶己以實對令其再服四逆湯一帖愈錢國賓治榆林張參戎體厚力大素善騎射壯時縱欲水敗火虧腰胯如折其脈寸關浮大兩尺若有若無不可以揖非人扶不起已三年筋骨皆冷以六味丸加河車膏龜鹿膠參歸桂附補其真元腎命年餘方能步又五年卒魏玉橫曰陸茂才父年七十素有肝病偶於春分日玉皇山頂燒香玉皇之高為湖上衆山之最晨而往晡而歸足力可云健矣至夜忽腰大痛不可轉側或以為勞傷兼感冒宜先表散與羌活秦艽等一劑痛益劇脈之弦硬三五不調二便俱祕面黯囊縮日夜不得眠曰此肝腎大傷疏泄太過症頻危矣豈可再投風藥以養青湯加牛膝當歸痛略減二便仍祕且嘔惡發厄地氣不得下行而反上攻也前方重用熟地外以田螺獨蒜搗爛系臍下二便既行嘔厄遂止痛忽移入少腹控引睪丸前方杞子至二兩再入白芍甘草數劑漸瘥乃畏藥停數日覺復甚又與數劑而安裴兆期治一人腰痛用杜仲山萸當歸續斷之類久而彌甚就質於裴裴細審之其人飲食減少時發噁心嘔吐乃胃中濕痰之候也且其痛臥重而行輕每臥欲起則腰胯重墜不能轉側必將身徐徐擺動始克強起而行逮行久反漸覺舒和此蓋濕痰乘氣靜而陷於腰胯之間故作痛乘氣動而流散於腰胯之外故漸舒和若腎虛則臥而逸痛必當輕行而勞痛必當重何以如是之相反耶初與小胃丹五十粒連下宿水四五行繼以二陳湯去甘草加蒼朮澤瀉砂仁三劑痛頓減隨與蒼朮為君之大補脾丸服未旬余痛即如失前陰朱丹溪治吳江王氏子年三十歲忽陰挺長腫而痛脈數而沉實用朴硝荊芥湯浸洗又用三一承氣湯大下之愈本草綱目姚蒙字以正巡撫鄒來學嘗使視脈蒙既敘病源因曰公根器別有一竅出汗水來學大驚曰此隱疾何由知蒙曰以脈得之左關滑而緩肝第四葉有漏洞下相通來學改容謝雄按左關候肝是矣何以滑緩主漏洞而斷其在某葉此皆史乘誇美之詞何必選耶薛立齊治一婦人陰中腫悶小便澀滯兩脅作痛內熱晡熱月經不調時或寒熱此因肝脾鬱怒元氣下陷濕熱壅滯朝用歸脾湯加柴胡升麻解鬱結補脾氣升元氣夕用加味逍遙清肝火生肝血除濕熱各數劑諸症悉愈又用四君芍歸丹皮調補肝脾而經水如期一婦人陰中寒冷小便黃澀內熱外寒口苦脅脹此因肝經濕熱用龍膽湯祛利濕熱用加味逍遙散調補氣血而安一婦人所患同前更寒熱嘔吐兩眼腫痛先用小柴胡加山梔一劑寒熱嘔吐頓止次用龍膽瀉肝湯一劑腫痛頓消一婦人陰中寒冷小便寒清腹中亦冷飲食少思大便不實下元虛寒治以八味丸月餘飲食漸加大便漸實又月餘諸症悉愈一婦人陰腫下墜悶痛出水胸腹不利小便頻數內熱晡熱口苦耳鳴此肝脾火症用小柴胡車前膽草苓朮升麻二劑少愈又用加味逍遙散加升麻數帖漸愈乃以加味歸脾加升麻柴胡並補中益氣湯加山梔數劑頓愈仍用加味逍遙散加味歸脾二藥調理全愈一婦人患前症熱痛或用寒涼敗毒藥飲食不入時欲作嘔小便重墜此脾胃復損元氣下陷先用補中益氣加炮姜二劑重墜頓愈又加茯苓半夏二十餘劑而愈乃以歸脾湯少加柴胡升麻並用六味地黃丸而康孫文垣治一婦當暑月小便不利而痛玉戶腫又便血發熱左脈弦數右寸短弱此肺氣不足肝火大熾蓋肝為血海又主疏泄二便玉戶為肝經所絡之地治當疏決肝經壅滯脾氣暢則新血得以歸經熱解則小水可以通而腫亦可消矣以滑石三錢桃仁當歸白芍各一錢柴胡黃連人參各八分川芎六分甘草桂枝白芷各三分四劑而瘳馬鳳林內子有隱疾每月汛行子戶傍輒生一腫毒脹而不痛過三五日以銀簪燒紅針破出白膿盞許而消不必膏藥亦無疤痕初用針刺近則以指掐之膿即出但汛行即發上下左右無定所第不離子戶於今八年內外科歷治不效且致不孕孫曰此中焦濕痰隨經水下流壅於子戶也經下而痰凝則化為膿本來非毒故不痛怪病之謂痰用白螺螄殼火煅存性為君南星半夏為臣柴胡甘草為佐曲糊為丸令早晚服之未終劑而汛行不腫次年俞東扶曰孫公穎悟殊不可及原非毒故不痛亦格致名言即孕一婦有隱疾其夫二造門而不言繼至欲言而面赭孫開喻之乃俯首曰言之無任主臣先生長春諒無哂山妻子戶中突生一物初長可三寸今則五寸許矣狀如堅筋色赤大可拱把脹而且痛不便起止憎寒壯熱寢食俱減赧於言欲求自盡逡巡百日矣孫曰乃陰挺症也厥陰肝經之脈女子下系庭孔濕熱則陰挺猶木有濕熱而生菌也畢竟縱不熱則挺收為是與以龍膽瀉肝湯及蝟皮散當歸黃芩牡蠣蝟皮赤芍為末每用二錢空心服米飲湯調下去後數月來報云前症果痊茲為汛期一月不至敢問曰此有身也彼疑疾甫愈未必能孕謂曰前恙乃肝經有餘之症肝為血海女子血盛則孕胎據血盛當先期今汛逾期實孕耳非病也後果足月生子尚某言昔在粵東與郡司李某交善後李沒某妻售濠畔街宅與尚仍分院而居兩家往來如親串然一日李妻私語尚夫人有女及笄而病病者甚異欲求尚診之而難於言夫人告尚曰與李君夙交好言之何傷李妻乃言女初患腹痛久之溲溺甚艱溲內有物能游泳或二或三似有鱗鬣者取視之乃比目魚半體也身微黑止有一目其背白置水中果如所云試診之乃肝氣久郁所致投以琉肝之劑而愈李河南人居易録一寡婦患陰中癢不可告人漸至委頓此婦平日虔奉大士忽有尼僧來與藥一包曰以此洗之數洗而愈其藥乃蛇床子吳茱萸苦參也採蘭雜志何首烏本名夜交藤因何首烏服而得名何首烏者順州南河縣人祖能嗣本名田兒生而閹弱年五十八無妻醉臥野中見田中藤兩本異生苗蔓相交久久而解解合三四田兒心異之掘根持問鄉人無能識者遂曝乾搗末酒服七日而思人道百日而舊病皆愈十年而生數男後改名能嗣又與子庭服皆壽一百六十首烏服藥一百三十歲唐元和七年曾文象遇茅山老人遂傳其事李翱因著方録云此偶遇靈異之品故其效如此亦理之所有何廉昉郡伯精於醫理嘗言親見數人獲成形首烏服之果有烏須延年之效又曾在河南購得潞參重十二兩在陝中購得當歸重斤余者其效皆異尋常又曾親至西陵山中採沙參其大如兒臂剝之外邊黑皮其中潔白如玉嚼食一莖甘芳鮮脆頭目便覺清泰此皆生於深山窮谷之中得天地之靈氣故其效非尋常可及特無緣者不能遇耳甘泉蕞殘録富家子唐靖瘡發於陰至爛人道周守真曰病得之欲泄而不可泄也治法宜內服龍膽瀉肝湯外以甘草末糝之延壽書有人陰冷漸漸入內陰囊腫滿晝夜痛悶不已用上好川椒為末帛包裹囊如不覺熱炒熱更烘內煎大薊湯汁服妙陰冷兩丸如冰出汗兩腳痿弱宜補肝湯千金方王節齊曰男子陰痿不起古方多雲命門火衰祖氣虛弱固有之矣然亦有鬱火盛而致痿者經云壯火食氣譬如人在夏暑而倦怠遇冬寒而堅強豫嘗親見腎經鬱火而有此症令服黃柏知母清腎火之藥而效故須審察不可遍認為火衰薛立齊治一婦人吐痰發熱遍身作痛小便頻數陰中作癢日晡熱甚曰此脾肝氣血虛氣滯而兼濕熱也用加味逍遙散加車前子而愈馬元儀治尤悔侄患陰莖作痛痛甚而憤遂昏迷不醒幾閲月診其兩脈浮虛而澀浮為氣虛澀為精傷故令作痛陰陽兩虛之候得之憂思勞鬱而傷中也經云潤宗筋者又陽氣精則養神柔則養筋今悒鬱勞倦氣血兩傷故令作痛以當歸補血湯加人參炙甘草調養氣血桂心秦艽紅花宣通血脈一劑而痛止復診兩脈沉微連進大劑參附諸症已平惟徹夜不寐用歸脾湯調理而安有人陰腫醫以赤土塗之令服八味丸而愈一兒陰腫醫亦以赤土塗之愈若久病而陰腫病已不可救宜速灸水分穴蓋水分能分水穀水穀不分故陰腫他處亦腫也尤宜急服禹餘糧云既效方陳良甫家婢患陰蝕就瘡醫家療不瘥蝕處作兩瘡深半寸良甫於涓子方中撿得甘草湯方仍以自處蚺蛇膽散不經七日瘡乃平復甚效凡救十八人手下即活遇斯疾者請流布而傳之葛氏云比見人患莖頭腫攻下瘡欲斷者以豬肉湯漬洗之並用黃連黃柏末塗之又方蜜煎甘草末塗之千金方立齊治一婦人陰內膿水淋漓或癢或痛狀似蟲行診之少陰脈滑此陰中有瘡也名曰䘌由神思煩郁胃氣虛弱氣血凝滯所致與升麻白芷黃連木通當歸川芎白朮茯苓柴胡煎服用拓腫湯熏洗更搽蒲黃水銀兩月餘而愈或有胞絡虛風邪乘陰血氣相搏令氣否塞致陰腫痛當以菖蒲治之更以枳實炒熱帛裹尉之冷則再炒或有子臟虛冷氣下衝致陰脫出謂之下脫或因産弩力而脫者以當歸散治之久不愈者以補中益氣湯倍加升麻柴胡升舉之蘄閣老子陰莖腫痛服五苓散等藥不應診其脈左關弦數此肝經濕熱而成以小柴胡湯送蘆薈丸一服勢去三四再服頓愈一婦人陰器腫痛小水澀滯遇晚寒熱交作此肝經濕熱為患徐靈胎曰此濕熱輕病以龍膽瀉肝湯二服小水通利又以四物湯兼小柴胡加花粉木通山梔服之而愈外科正宗以下共選六案來入一婦人無故發熱月餘忽陰中突出一物如雞冠一片此肝鬱脾虛所致以補中益氣湯加青皮梔芩柴胡甘草外以白芷蒼朮紫蘇煎湯每日熏洗十餘日其患漸小乃用前湯倍參術月餘而安徐靈胎曰所用諸方皆浮泛不切全無法度雖有小益總非切病之治此風自立齊開之後遂不可挽回矣此醫術之一變也一婦人陰中作癢遇夜五心煩熱作渴不寐此思慮太過致心腎不交以四物湯加龍膽草山梔知母黃連以銀杏散納入陰中三日其癢漸止又朝以八味丸午用歸脾湯加銀柴胡茵陳月餘而愈一婦人陰器半邊腫痛身發寒熱口乾便祕脈實有力以內疏黃連湯一劑大便通利口乾乃止惟腫痛尤甚此濕毒結聚欲為膿也以四物湯加角刺澤瀉二劑膿熟脹痛又以透膿散一服出臭膿鍾許痛止以八珍湯加丹皮澤瀉十餘劑而安一婦人肝經風濕下流陰器浮腫癢甚至抓出血不痛以消風散加苦參膽草澤瀉木通山梔外以蛇床子湯熏洗擦搽銀杏散十餘劑癢止腫消而愈一婦人孀居十餘載陰器作癢生蟲含忍不言後陰器蝕爛已蝕內臟尫羸發熱作渴脈洪而數詢其癢痛日久陰器黑腐小水不禁內臟已壞不可用藥彼苦求治曰癢者蟲也痛者損也先用鯽魚數枚以香料糝炙魚熟以絲棉薄裹納入陰中夾之良久取出紅蟲長者一寸短者五六分細如絲線約二十餘條置溫湯中搖擺片時方死彼家歡悅以為可治曰再取再有生化無窮強投養血諸藥終竟不應而死錢國賓曰浙湖戴氏生女五歲胎生雙陰溺從上出下戶亦流其母病延診以私語言及余曰此女天生雙陰也不聞稜嚴經云五種不男之人即此類也長大經行生子如常以上竅為正彼此勿疑撫養待配陰寬肥皂子浸去黑皮用其白肉加白芨五倍子蛇床子石榴皮甘松三奈龍骨煎濃湯日日熏洗寬而冷者加石硫黃煎陰挺飛礬六兩桃仁一兩五味子雄黃各五錢銅緑四錢末之煉蜜丸每丸重四錢即以方內雄黃為衣坐入玉門即愈甚者不過二次雄按余癸卯秋視康侯副轉之疾脈滑數而右歇左促且肝部間有雀啄氣口又兼解索面色熏黃頭汗自出呼吸粗促似不接續坐臥無須臾之寧便溺澀滯渾濁極臭心下堅硬拒按形如覆碗舌色邊紫黃殊不甚燥口濁甜膩不能飲食閣眼即氣升欲喘煩躁不能自持胸中懊憹欲死此濕熱誤補氣機阻塞津液為之凝滯而成痰飲也宜用溫膽湯加薤白蔞仁通其胸中之陽合小陷胸為治飲痞之妙法參以梔豉泄其久郁之恝以除懊憹佐以蘭草滌其陳腐之氣而醒脾胃連投二劑各恙皆減脈亦略和病者欲速連服大黃丸二次承氣湯半帖豫聞急止之曰進補固非妄攻亦誤此症濕蒸為熱灼液成痰以上下分消為是不比熱邪傳腑可一蕩而愈也越日下部漸腫此犯攻痞太速之戒也以前法加黃芩合瀉心意再配雪羹投之痞漸消痰漸吐而自腹至足以及腎囊腫勢日加擬用河間桂苓甘露飲意或主崇土勝濕之說餘力持不可乃復進前日藥一劑次日痰中見血甚多此濕熱熏蒸自氣及營也以知柏生地犀角鱉甲白芍苡仁貝母石斛茅根麥冬滑石梔子藕汁童便投之而止逾數日又吐且肢冷自汗心餒畏脫閣家皇皇或議投歸脾余堅執前議仍投前藥二劑血果止余思血之復吐由於氣分之邪擾及營分今欲清氣道之邪必先去其邪所依附之痰因投滾痰丸三錢得下泄一次病者云四十日來未有之通暢也連投數日始解膠痰黑矢多遍而小便亦漸清長寢食漸安惟下部之腫如故或議用實脾行水之法余曰諦審脈症病不在脾況善飢便燥口濁溺多方患其轉消症亟投甘潤之不遑惡可滲利傷陰補燥劫液耶腫勢之來良由濕熱所釀之痰飲即誤補而痞塞中焦復妄攻以流竄墜絡所謂不能一蕩而蠲勢必旁趨四射者也會又咳痰帶血而精神飲食如常與甘露飲加藕汁童便四劑而止咳嗽亦安於是專治其下部之腫以固本加知柏貝母花粉旋覆花橘絡絲瓜筋羚羊角楝實蔥須大豆卷黃芩薏苡仁竹瀝出入為劑二三帖腫處癢甚搔之水出如汗而作蔥氣六七日後兩腿反乾瘦燥痛腎囊亦隨之而消矣蓋寒濕則傷陽熱濕則傷陰血流皆陰也大用甘潤尚且腫消後干痛咽燥設投燥脾利水當何如哉善後之法宜滋養血液少佐竹瀝以搜絡中未淨之痰庶免為異日之纍如法服之竟無消渴之變而愈鶴膝風朱丹溪治一丈人年七十歲患腳膝病稍腫此血虛而挾濕熱也用生地歸頭白芍蒼朮炒柏川芎桂木通水煎食前熱服一男子年近三十滋味素厚性多焦怒秋間髀樞左右一點發痛延及膝骭晝靜夜劇痛處惡寒或渴或不渴或痞或不痞醫多用風藥兼補血次年春其膝漸漸腫痛愈甚食減形羸至春末膝腫如桃不可屈伸診其脈左弦大頗實寸澀甚右皆數大知其小便必數而短遂作飲食痰積在太陰經治之炒柏一兩生甘草梢犀角屑蒼朮鹽各三錢川芎二錢陳皮牛膝木通白芷白芍各五錢遇暄熱加條芩三錢為細末每三錢重與生薑自然汁同研細以水蕩起煎令沸帶熱食前飲之一晝夜四次與至半月後數脈漸減痛漸輕去犀角加牛膝敗龜板半兩當歸半兩如前服又與半月腫漸減食漸進不惡寒惟腳膝痠軟未能久立久行去蒼朮黃芩時當夏熱加炒柏至一兩半依本方內加牛膝春夏用莖葉冬用根梗取汁用之效尤速須斷酒肉濕面胡椒當仲夏加生地半兩冬加茱萸桂枝鎮江外科史姓者曾治一人鶴膝風以蝦蟆用碗鋒略破腹有縫不可穿縛置患處跳動移時受毒輒死如前再易一枚不過三枚愈戒庵漫筆李詡孫文垣治程紹溪中年患鶴膝風兩腿及腿肚內外臁肉盡削兩膝腫大乃酒後縱欲所致且四肢膿疥淫濕醃臢自分必死家人以病久醫藥破家不復求治孫以鄰人之親往診左寸關浮數右寸短弱兩尺脈沉微曰此氣虛血熱之候法當大補壯其筋骨猶可冀生第非百日不見功蓋補血無速效必漸而濡之關節通利骨正筋柔腿肉自生初以龜板苡仁各三錢蒼耳子五加皮頭二蠶砂節節香各一錢當歸人參黃耆蒼朮杜仲黃柏各八分紅花八分十劑而瘡疥漸稀精神稍長再以苡仁五加皮龜板各二錢節節香蒼耳子地黃丹參蒼朮黃柏首烏各一錢人參當歸各八分紅花木通各五分三十劑可倚杖而行腿肉漸生瘡疥盡愈膝腫消去其六後以虎潛丸加鹿角膠首烏狗脊節節香牛膝用龜膠為丸服三月腿肉復完而愈薛立齊治韓廷儀先患風症用疏風化痰養血之藥而痊其腿膝骨肉內發熱作痛服十味固本丸天麻丸益甚兩尺脈數而無力謂此腎水虛不能生肝木虛火內動而作非風邪所致也不信又服羌活愈風丹之類四肢痿軟遍身麻木痰涎上湧神思不清曰此皆脾氣虧損不能榮養周身又不能攝涎歸源先用六君子芎歸木香數劑以助五臟生化之氣以榮養周身而諸症漸愈乃朝以補中益氣湯培養脾肺夕以六味丸滋補肝腎如此三月而安一婦人久鬱怒膝腫胸脅不利內熱寒熱經候不調遍身痠痛此胃氣虧損先用補中益氣湯加半夏茯苓三十餘劑胃氣漸醒又用大風湯與歸脾湯膝腫漸消用加味逍遙散大風湯全消又用八珍湯加丹皮調理而安一婦人患前症腫痛寒熱先用大風一劑又用加味逍遙散四劑月餘腫痛漸退惑於速效另服劫風敗毒虛症蜂起仍由用大防風為主佐以十全大補而消又服大補湯兩月而全愈一婦人患前症兩拗中腿股筋牽作痛內熱寒熱此肝火氣滯之症先用加味小柴胡湯四劑後以加味逍遙散為主佐以大防風湯而消又患痢後兩膝腫痛寒熱往來用十全大補湯為主佐以防風湯而消一婦人患前症雖潰而腫不消朝寒暮熱飲食不思經水三四月一至此肝脾氣血俱虛也用補中益氣加味歸脾二湯各三十餘劑腫漸消而寒熱止又佐以大防風月餘而能步履再月餘經行如期又服六味丸八珍湯三月而愈一男子腿筋弛長月餘兩膝腫痛此陰虛濕熱所乘也用六味丸為主佐以八珍湯加牛膝杜仲間以補中益氣湯三月餘而消通府劉國威先筋攣骨痛右膝漫腫用化痰消毒之劑腫痛益甚食少體倦加祛風消毒等藥寒熱作嘔大便不實用二陳除濕之類腫起色赤內痛如錐診其脈滑而無力此膿已成元氣虛而不能潰也用十全大補湯四劑佐以大防風湯一劑而潰又百餘劑而愈一男子腿痛膝腫脈浮按之弦緊此肝腎虛弱也用大防風湯二劑已退彼惑於附子有毒乃服治瘍之藥日漸消瘦虛症漸至復求治曰倦怠消瘦脾腎衰而不能營運也小便不禁膀胱虛而不能約制也燥熱虛痞胃氣弱而不能化也恍惚健忘精神衰而昏亂也惡症蜂集辭之後果歿一男子患腿痛膝微腫輕診則浮按之弦緊此鶴膝風也與大防風湯二劑已退二三彼謂附子有毒乃服敗毒藥日漸消瘦復求治薛謂今飲食不為肌膚水穀不能運化精微灌溉臟腑周身百脈神將何依夫氣短而促真氣損也怠惰嗜臥脾氣虛也小便不禁膀胱不藏也時有躁熱心下虛痞胃氣不能上榮也恍惚健忘神明亂也不治後果然此症多患於不足之人故以加減小續命大防風二湯有效若服攻毒藥必誤一婦人膝腫痛遇寒痛益甚月餘不愈諸藥不應脈弦緊此寒邪深伏於內也用大防風湯及火龍膏治之而消大抵此症雖云腫有淺深感有輕重其所受皆因真氣虛弱邪氣得以深襲若真氣壯實邪氣焉能為患也故附骨癰疽及鶴膝風症虛者多患之前人用附子者以補溫腎氣而又能行藥勢散寒邪也亦有體虛之人秋夏露臥為冷氣所襲寒熱伏結多成此症不能轉動乍寒乍熱而無汗按之痛應骨者是也若經久下消極陰生陽寒化為熱而潰也若被賊風所傷患處不甚熱而灑淅惡寒不時汗出尉之痛止須大防風湯及火龍膏治之若失治為彎弓曲偏枯硬如石謂之石疽若熱暖積日不潰肉色紫赤皮肉俱爛名綬疽其始末皆宜服前湯欲其驅散寒邪以補虛托裡也一人患鶴膝風五年敷藥三日即愈王心涵傳乳香沒藥各一錢五分地骨皮三錢無名異五錢麝香一分各為末車前草搗汁入老酒少許調敷患處廣筆記立齊治一男子左膝腫大三月不潰謂體虛之人風邪襲於骨節使氣滯而不行故膝愈大而腿愈細名曰鶴膝風遂以大防風湯三十餘劑而消張上舍亦患此伏枕半載流膿三月彼云初服大防風湯去附子一錢服三十餘劑少愈乃去附子五錢服至三十餘劑將愈乃去附子更以三十餘劑而愈蓋桂附當用而不用則無力也王汝道膝腿腫筋骨痛服十宣散不應脈沉細以五積散二劑而痛止更以十宣散去桔梗加牛膝杜仲三十餘劑膿潰而愈此寒氣之腫八風之變也腳氣蘇頌曰火氣腳氣最為急症有人患此以袋盛赤小豆朝夕踐踏輾轉之久久遂愈本草綱目今人多誤為相思子其實即食豆赤黯而緊小者耳其紅大者不入藥竇材治一人患腳痛兩胻骨連腰日夜痛不可忍為灸湧泉穴五十壯服金液丹五日全愈一女子患腳氣忽手足遍身拘攣疼痛六脈沉大乃胃氣盛也服宣風丸三十粒泄去而愈張文定嘗苦腳疾無藥可療一日遊相國寺有賣藥者得緑豆兩粒服之遂愈琅琊代醉編劉敬叔云滎陽鄭醉之字道子為尚書左僕射女腳患攣癖就王僕醫僕陽請水澆之余澆庭中枯樹既生女腳亦瘥樵書初編鄱陽周順治一士人腳弱病方書羅列積藥如山而疾益甚令屏去但用杉木為桶濯足及令排樟腦兩股間以腳䙀系足定月餘而安健如故南方多此疾不可不知遁齊間覽葉天士治一婦人血少氣多大便後腳痛而麻用當歸白芍白朮青皮地黃川芎甘草桃仁煎服薛立齊治一婦兩臁赤痛寒熱口苦嘔吐懶飲食面色青黃此肝木乘脾土用小柴胡湯加山梔升麻茯苓二劑頓愈又用六君子湯加柴胡山梔即愈一婦人飲食勞役兩臁兼腿疼痛或時寒熱薛以為脾虛濕下陷用補中益氣湯加山楂茯苓半夏治之而痊後復作用六君湯加柴胡山梔全愈一婦人經行後寒熱晡熱兩腿作痛此肝經血虛也用加味逍遙散加山梔治之而愈後因勞日晡內熱或用四物黃柏知母之類前症益甚更加食少作泄薛以為元氣下陷前藥復傷先用六君子湯加補骨脂二劑調補脾胃而瀉止食進又用補中益氣湯升舉元氣而痊一婦人年三十有七早孀居兩腿骨作痛晡熱體倦月經不調或發寒熱數年矣一日頸項兩側結核兩脅脹痛此係肝經鬱火而成也先用小柴胡湯合四物數劑肝症頓愈又用加味逍遙散加澤蘭乳香沒藥三十劑血症漸痊再用加味逍遙散藥年餘而安一孀婦兩腿作痛或用除濕化痰等藥遍身作痛而無定處薛曰此血症也不信仍服流氣飲之類而歿一放出宮人年四十餘臀腿肉股作痛晡熱口乾月經不調此係肝經血少不能養經絡而然也宜用加味逍遙散加澤蘭葉五十餘劑諸症稍變又以歸脾湯兼服二百餘劑而痊一放出宮人臀腿腫痛內熱晡熱惡寒體倦咳嗽胸痞月經過期而少彼以為氣毒流注服清熱理氣之劑益甚薛曰此乃肝經瘀血停留所致蓋肝經上貫膈布脅肋循喉嚨下循膕內臁繞陰器抵少腹主治之法當補其所不勝而制其所勝而已補者脾制者肝也經曰虛則補之實則瀉之此定法也彼不信仍服前藥遂致不起薛立齊治一儒者兩足發熱腳跟作痛用六味丸及四物湯加麥冬五味玄參治之而愈後因勞役發熱惡寒作渴煩躁用當歸補血湯而安一婦人下體腫痛用人參敗毒散加蒼朮黃柏威靈仙痛減又以四物湯加蒼朮黃柏防風紅花澤瀉而安一人足熱口乾吐痰頭暈服四物湯加黃連黃柏飲食即減痰熱益甚用十全大補湯加麥冬五味山藥山萸而愈吳孚先治褚仁甫病足腫虛弱無力頗能食醫與二妙散加米仁木瓜牛膝防風之類愈服愈憊此脾虛濕熱下陷法當補脾升舉誤用下行之劑故愈下陷也凡診是症須審右寸不數並能食否如數又不能食則是痿症宜清肺熱不可不知即痿不可作痹治是也張路玉治褚廷嘉患腳氣痼疾恆服腎氣丸不徹六七年來宿患懇除之乃匯取朮附桂附耆附參附等法兼採八風散中菊花鱉甲湯中鱉甲貝齒羚羊犀角風引湯中獨活防己竹瀝湯中薑汁竹瀝為丸共襄祛風逐濕之功服後必蒸蒸汗出不終劑而數年之症頓愈沈汝楫子夏月兩膝脛至腳痛極僵挺不能屈者十餘日或用敷治之法不效其脈軟大而數令拭去敷藥與當歸拈痛湯二劑汗出而愈陸養愚治邵完吾左臀尖腫痛引至膝膕行動不便坐臥亦艱治療半年無效肌肉盡削診之沉弱似緩按之遲遲兩尺沉數曰此由元氣虛弱寒濕乘之胃氣不升陰火伏慝於下當壯元升陽導濕清熱則痛自止用補中益氣湯加蒼朮黃柏豬苓澤瀉桂附少許十劑其痛頓釋後去桂附五苓倍人參歸身月餘肌肉漸生張三錫治一人素有腳氣每發則引腰痛不可俯仰其人雄飲明是濕熱脈濡而數投拈痛湯八帖漸減遂以捉虎丹酒下二丸空心服凡三服腿腕出黑汗不再發陳三農治一人熱從腳起入腹視其形體實作濕鬱熱成之疾治之以潛行散加牛膝防己丸服之而即愈一婦積勞病兩足如火燒即惡寒壯熱頭痛眩暈齒痛齒浮安臥片時少減日二三發此氣血俱虛虛火妄動所致以十全大補湯加五味四劑而愈朱丹溪治一婦人腳疼怕冷夜劇日輕用生地白芍歸尾各五錢炒黃柏黃芩白朮五分四帖水煎帶熱服一婦人腳叉骨痛用蒼朮白朮陳皮白芍各三錢木通二錢甘草五分二服送大補丸五十粒儒者章立之左股作痛用清熱滲濕之藥色赤腫脹痛連腰脅腿足無力此足三陰虛用補中益氣六味地黃兩月餘元氣漸復諸症漸退喜其慎疾年許而痊府庠鍾之英兩腿生瘡色黯如錢似癬者三四癢痛相循膿水淋漓晡熱內熱口乾面黧此腎虛之症用加味六味丸數日而愈此症若用祛風散毒之劑以致誤人多矣一男子素遺精腳跟作痛口乾作渴大便乾燥午後熱甚用補中益氣加白芍元參及六味丸而愈周都憲兩腿作痛形體清癯肝脈弦數都屬有餘之症用龍膽瀉肝湯治之愈一婦人兩腿作痛不能伸展脈弦緊按之則澀先以五積散二劑痛少止又一劑而止更以神應養真而能屈伸一男子腿痛每痛則痰盛或作嘈雜脈滑而數以二陳湯加升麻二朮澤瀉羌活南星治之而安一男子素有腳氣脅下作痛發熱頭暈嘔吐腿痹不仁服消毒護心等藥不應左關脈緊右關脈弦此亦是腳氣也以半夏杜經湯治之而愈一男子腳軟腫痛發熱飲冷大小便祕右關脈數乃是陽明經濕熱流注也以大黃左經湯治之而愈一男子臁脛兼踝腳皆焮痛治以加味敗毒而愈一男子兩腿腫痛脈滑而緩此濕痰所致也先以五苓散加蒼朮黃柏二劑少愈更以二陳二朮檳榔紫蘇羌活獨活牛膝黃柏而瘥夫濕痰之症必先以行氣利濕健中為主若氣和則痰自消而濕亦無所容矣一婦人兩腿作痛脈澀而數此血虛兼濕熱先以蒼朮黃柏知母龍膽草茯苓防風防己羌活數劑腫痛漸愈又以四物湯加二朮黃柏牛膝木瓜月餘而愈一婦人腳脛腫痛發寒熱脈浮數此三陽經濕熱下注為患尚在表用加味敗毒散治之不應乃瘀血凝結藥不能及也於患處砭去瘀血乃用前藥二劑頓退以當歸拈痛湯四劑而愈楊大受云腳氣是為壅疾治法宜宣通之使氣不能成壅也壅既成而甚者砭去惡血而去其重熱經云蓄則腫熱砭泄之後以藥治之一婦人兩腿痛遇寒則筋攣脈弦而緊此寒邪之症以五積散對四物湯數劑痛止更以四物湯加木瓜牛膝枳殼數月餘而愈一男子腿腫筋攣不能動履以交加散二劑而愈一婦人患腿痛不能伸屈遇風寒痛益甚諸藥不應甚苦先用活絡丹一丸頓退又服而瘳次年復痛仍服一丸頓退大半更以獨活寄生湯四劑而愈一男子素有腳氣又患附骨疽作痛服活絡丹一丸二症並瘥上舍俞魯用素有疝不能愈因患腿痛亦用一丸不惟腿患有效而疝亦得愈矣夫病深伏在內非此藥莫能通達但近代始有此藥引風入骨如油入面之說故後人多不肯服大抵有是病宜用是藥豈可泥於此乎一男素有腿痛飲酒過傷痛益甚倦怠脈弱以六君子湯加山楂神麯蒼朮芎歸升柴而愈一老人素善飲腿常疼痛脈洪而緩先以當歸拈痛飲候濕熱少退後用六君子湯加蒼朮黃柏澤瀉治之而痊一男子每飲食稍過胸膈痞悶或吞酸兩腿作痛用導引丸二服頓愈更以六君子湯加神麯麥芽蒼朮二十餘劑遂不復作河間云若飲食自倍脾胃乃傷則胃氣不能施行脾氣不能自布故下流乘其肝胃之虛以致足腫加之房事不節陽虛陰盛遂成腳氣亦有內傷飲食脾胃之氣有虧不能上升則下注為腳氣者宜用東垣開結導引丸開導引水運化脾氣如脾虛濕氣壅遏通致面目發腫或痛者宜用導滯通經湯以疏導之一婦人患腿兼足脛彎攣痛服發散藥愈甚尺脈弦緊此肝腎虛弱風濕內侵也以獨活寄生湯治之痛止更以神應養真丹而弗攣矣王執中舊有腳氣疾遇春則足稍腫夏中尤甚至冬漸消偶夏間依素問注所說三里穴之所在以溫針微刺之翌日腫消其神效有如此者繆刺且爾況於灸乎有此疾者不可不知千金謂腳氣宜針灸藥三者並用史載之謂不許其灸指迷方云若覺悶熱不得灸之凡灸腳氣三里絶骨為要而以愛護為第一王舊有此疾不履濕則數歲不作若履濕則頻作自後嘗忌履濕凡有水濕不敢著鞋踐之或立潤地亦不敢久須頻移足而後無患此亦愛護之第二義也有達官久患腳氣多服八味丸愈亦以腳氣衝心惟此藥能治有人舊患腳弱且瘦削後灸三里絶骨而腳如故益知王君針灸圖所謂絶骨治腳疾神效信然也同官以腳腫灸承山一穴瘡即干一穴數月不愈不曉所謂亦將攝失宜耶是未可知也王執中母氏常久病夏中腳忽腫舊傳夏不理足不敢著艾謾以針置火中令熱於三里穴刺之微見血凡數次其腫如去執中素患腳痛腫見此奇效亦以火針刺之翌日腫亦消後常灸凡治此當先三里而後之陽蹺等穴也王執中患腳氣趾縫爛每以茶末摻之愈他日復腫而爛用茶末不效漸腫至腳背上以為腳氣使然竊憂之策仗而後敢行偶賣藥僧者見之云可取床薦下塵摻之如其言而愈此物不值一錢而能愈可憂之疾其可忽哉一人筋動於足大趾漸漸上來至大腿近腰結了奉養且厚因酒食作此是熱傷血四物湯加酒黃芩紅花蒼朮南星愈宜是丹溪忠州太守陳逢厚傳云渠前知坊州回署中取涼食瓜至秋忽然右腰腿痛連及膝脛曲折不能適經月右腳艱於舉動凡治腰腳藥服之無效兒子云安刊曹偶在商然助教處得養腎散方服之才一服移刻舉身麻痹不數刻間腳遂屈伸再一服即康寧又坊州監酒某年幾四十虛損兩腳不能行步試與此藥初進二錢大腿麻木遂能起立再服二錢大小趾拇皆麻迤邐可能行三服馳走如舊太室居士得此方幹道己丑歲在鄂州都幕府曰宋判院審言久病腳膝緩弱不能行步傳之數日來謝此疾經年無藥不服得方次日即合二服見效五服良愈今有力能拜起矣後數日又云因浴遍身去薄皮如糊肌骨遂瑩其效如神其方用全蠍半兩天麻三錢蒼朮一兩去黑皮草烏頭二錢去皮腳生用黑附子二錢炮去皮臍上為細末拌勻如腎氣豆淋酒調一大錢豆用黑大豆能除去腳筋骨疼痛其效如神藥氣所至麻痹少時須臾疾隨藥氣頓愈金山長老於張顯學甘露寺齊會上說此方渠舊患腳氣曾於天台一僧處傳方用木瓜蒸艾服之漸安從來往金山日日登陟腳更輕快又一堂衆處得此方合服頗覺輕健勝前方云破故紙炒舶上茴香酒浸一宿炒葫蘆巴炒牛膝酒浸一宿肉蓯蓉酒浸一宿川續斷揀淨生用杜仲去粗皮薑汁製一晝夜炒令絲斷黃色用各四兩同為細末上用艾四兩去枝梗稱以大木瓜四個切作合子去盡瓤以艾實之用麻線扎定蒸三次爛研和藥為丸如梧桐子大每服五七十丸溫酒鹽湯食後服申屠府判傳腳氣流注四肢手指腫痛不可屈伸四物湯去地黃加附子入姜煎服如常法遇疾作時服之必愈是齊云腳氣上攻流注四肢結成腫核不散赤熱焮痛及治一切腫痛用甘遂為細末以水調敷腫處又濃煎甘草一服服之其腫痛即散二物本相反須兩人買各處安頓切不可相和清流廳子韓詠苦此一服病去七八再服而愈云得之牛馬牙人醫者之意正取其相反故以甘遂敷其外而以甘草引於內所以取效如磁石引針之義也並集成立齊治余舉人第及年二十腿膝腫痛不能伸屈服托裡藥反甚以人參敗毒散加檳榔木瓜柴胡紫蘇蒼朮黃柏而愈黃錦芳治李某腳氣痛不可以著手燒熱異常且陰囊燥裂癢不可當左手脈極弦極數右手稍遜飲食如故但不時懸飢夜則煩躁不寧二便不甚疏通此內火發動而外為風邪所郁也不可用辛燥追風逐濕之藥宜大瀉肝膽則腳痛自定用瀉青湯投之取其內有膽草等瀉厥陰之火防風除外受之風大黃除腸胃內閉之熱一服而減再服便通而愈令服六味丸滋陰以善其後雷作楫臟體素寒兼又嗜酒以致少陰真火藉酒上游而腳底反無火護一遇寒襲即不能點地乾隆甲申春因腳筋掣痛或令服老貫草致腳痛不能動黃視之其腳冷而暖要用熱手緊按方定飲食不入時吐冷涎取薑汁炒半夏重加桂附仙茅乳香沒藥杜仲續斷等藥大劑煎服而愈王洪緒治鶴膝方用新鮮白芷酒煎成膏每日以陳酒送服再取三錢塗患處至消乃止或內服陽和湯外以白芥子為粉酒釀調塗亦自消足跟腫痛薛立齊治通府黃廷用飲食起居失宜兩足發熱口吐痰自用二陳四物並甚兩尺數而無力此腎虛之症也不信仍服前藥足跟熱癢以為瘡毒又服導濕之劑赤腫大熱外用敷藥破而出水久而不愈及用追毒丹瘡實如桃始信薛言滋其化源半載得瘥一男子素不慎起居內熱引飲食作渴體倦兩足熱後足跟作痛或用消熱除濕之劑更加發腫又服敗毒之藥焮赤痛甚恪用祛毒消熱潰烈翻張狀如赤榴熱痛如錐內熱晡熱此因足三陰虧損朝用十全大補夕用加減八味丸外敷當歸膏兩月餘而愈其服消毒等藥而歿者不能枚舉薛立劑治一婦人素血虛因大勞兩足發熱晡熱月經過期或用四物芩連飲食少思胸痞吐痰用二陳枳實黃連大便不實吐痰無度足跟作痛曰足熱晡熱月經過期肝脾血虛也胸痞吐痰飲食不思脾胃氣虛也蓋胃為五臟之根本胃氣一虛諸虛悉至先用補中益氣加茯苓半夏脾胃漸健乃佐以六味丸不兩月而痊一婦人勞則足跟熱痛作陰血虛用八珍湯而痊後遍身瘙癢服風藥發熱抽搐肝脈洪數此肝家血虛火盛生風以天竺黃膽星為丸用四物麥冬五味芩連炙草山梔柴胡煎送而愈一婦人兩足發熱足跟作痛日晡熱甚此肝腎血虛用逍遙散六味丸五十餘劑諸症愈朱丹溪治一人足跟痛有血熱用四物湯加黃柏知母牛膝之類治法匯一膏粱之人兩腳發熱作渴左尺脈數而無力謂此足三陰虧損防患疽不信反服清熱化痰之藥更加晡熱頭暈又服四物知柏日晡熱甚飲食漸少而發疽乃用補中益氣六味地黃百餘而愈其不信以致不起者多矣一治腳汗用楊花著鞋中或加綿絮入在內尤佳百乙方治遠行腳腫痛方用之可行千里輕便甚妙防風細辛烏藥等各為細末摻在鞋內如著草鞋即以水微濕過然後摻藥一法以蚯蚓塗腫處高擱起腳一夕即愈醫說續編立齊治楊錦衣腳跟生瘡如豆大痛甚狀似傷寒謂獵人被兔咬腳跟成瘡淫蝕為終身之疾若人腳跟患瘡亦終不愈因名兔齧也遂以還少丹治之少可次因納寵作痛反服攻毒藥致血氣愈弱腿膝痿軟而死蓋足跟乃二蹺發源之處腎經所由之地若其瘡口不合則蹺氣不能發生腎氣由此而泄必將為終身之疾況彼瘡先得於虛復不知戒雖大補氣血猶恐不及況服攻毒悍藥以戕賊之乎王大國治南昌司理胡慎三左足患癰直穿腳底醫已數易日甚一日病楚幾絶國至命急去敷藥止服湯劑司理曰湯劑豈能生肌耶國曰願限半月全愈服至三四日瘡口漸合司理大喜才二十日肌肉已滿江西通志柴嶼青治李學士向山長男孝廉忽患兩足湧泉穴中俱有隱隱一青圈旋即破口出水疼痛異常延醫治之俱不識其症診之兩尺極微弱症屬少陰不足所致遂定十全大補湯乃以年少畏服力勸之服二十劑而愈
