body:
  text: 卷三十六白癜風附紫癜風薛立齋治一男子常咳嗽腿患白癜風皮膚搔起白屑服消風散一類癢益甚起赤暈各砭出血赤暈開消而癢愈甚服遇仙丹之類成瘡出水殊類大麻風咳嗽吐痰面色皎白時或萎黃此脾肺二經虛熱之症先用五味異功散治之虛熱稍退又用地黃清肺飲肺氣漸清又用八珍湯六味丸而尋愈後又咳嗽痰喘患處作癢用參蘇飲二劑散其風邪又用五味異功散加桔梗補其肺氣而痊二年後咳嗽作渴飲水脈洪大左尺為甚用加減八味丸補腎水而痊一男子素不慎房勞常患足三陰虧損治愈後兩腿腕患紫癜風延於兩腿作癢各砭出血癢處日甚服消風等藥患處微腫延及上體兩眼昏澀謂腎臟風先用四生散四服後用易老祛風丸月餘再用地黃丸兩月餘而痊後飲食起居失宜肢體色赤服二丸隨愈一男子患白癜風過飲或勞役患處色赤作癢服消風散之類頓起赤暈遍身皆癢砭出血服祛風藥患處出血恪服遇仙丹患處愈焮元氣日虛先用九味蘆薈丸九味羌活湯諸症頓愈用加味逍遙散加味四物湯乃痊一婦人患白癜風誤以為大麻風服蛇酒等藥患處焮腫經水兩三月一行曰此肝血傷而內風也誤服風藥必筋脈拘急不信仍作風治果身起白屑四肢拳攣始信先用八珍湯四劑又用四君子湯二劑月餘乃用四君子湯又用八珍湯二劑又月餘諸症漸退元氣漸復又以四君子湯為主以逍遙散為佐將兩月瘡靨脫落又月餘而愈斑瘡唐王燾云比歲有病天行發斑瘡頭面及身須臾周匝狀如火燒瘡皆帶白漿水隨破隨生不治數日必死治後瘡瘢黯一歲方滅此惡毒之氣所為以水煮升麻綿沾洗之若酒煮彌佳但躁痛不可忍也又云建武中南陽擊虜初呼為虜瘡諸醫參詳療之方取好蜜摩瘡上以蜜煎升麻數拭之外臺秘要繆仲淳治顧奉常女臂患紫雲風用稀薟蒼耳雄黃末之醇漆為丸或疑漆有毒競沮之然竟以此藥收功制漆用生蟹黃攪和可化作水入藥廣筆記一婦人患斑症作癢脈浮數以人參敗毒散二劑少愈更以消風散四劑而安又用柴胡清肝散而愈一婦人患斑症癢痛大便秘結脈沉實以四物湯加芩連大黃槐花治之而便利用四物二連湯而瘡愈矣一婦人患斑作癢脈浮以消風散四劑而愈一婦人患斑作癢脈浮數以人參敗毒散二劑少愈更以消風散四劑而安一男子患斑色赤紫焮痛發熱喜冷脈沉實以防風通聖散一劑頓退又以荊防敗毒散加芩連四劑而愈舉人陸世明會試途中勞役胸患斑焮赤作痛頭痛發熱形倦少食大便或溏或結小便赤澀此勞傷元氣而虛火內動投補中益氣湯一劑頓退再劑而痊又數劑而平復一室女年十四天癸未至身發赤斑癢痛左關脈弦數此因肝火血熱以小柴胡湯加山梔生地丹皮治之而愈若因怒而致者亦宜治以前藥一男子面起赤暈時或發腫臂手亦然搔起白屑服癘風藥內熱體倦脈大而虛此因元氣虛而陰血復傷用六味丸補中益氣湯而愈一婦人身如丹毒搔破如癘熱渴頭暈日晡益重此屬肝經風熱血燥用加味逍遙散而愈一婦人身如丹毒搔破淋漓熱渴頭暈日晡益甚用逍遙散加炒山梔陳皮而愈又用八珍柴胡山梔丹皮而痊一婦人患前症誤服大麻風藥破而出水煩渴頭暈誠類風症六脈洪數心肝脾為甚曰風自火出此因怒動肝火血燥而生風耳非真風症也與逍遙散六味丸以清肝火滋脾血生腎水而痊一婦人患前症搔破久不愈食少體倦此肝脾虧損陰虛發熱也先用補中益氣湯加川芎炒梔元氣漸復更以逍遙而瘡愈一婦人患赤遊風晡熱癢甚用清肝養血之劑不信乃服大麻風藥臂痛筋攣又服化痰順氣之劑四肢痿弱又一婦患前症數服風藥煎湯泡洗以致腹脹並歿一女子月經先期先發赤暈微腫作癢若遇氣惱赤癢益甚服祛風之藥患處更腫砭出紫血甚多其癢愈作謂肝火血燥風藥復傷血而為患也先用加味逍遙散清肝火益肝血赤腫少止用地黃丸滋腎水生肝木各五十餘帖而痊後因惱怒經水不止發熱作渴患處赤癢先用加味小柴胡湯二劑諸症頓止又用加味逍遙散而安天泡瘡其症屬元氣不足邪氣所乘亦有傳染而患主在肝腎二經故多在下體發起楊梅下疳略同薛立齋治一儒者患天泡色焮赤作痛大便秘而不實服祛風散毒等藥舌痛口乾脈浮而數此邪氣去而陰虛所致用六味丸料加山梔當歸四劑脈症頓退又用八珍湯加山梔丹皮瘡色漸白後用四君加歸耆而愈一儒者患天泡誤服祛風消毒之藥復傷元氣因勞役過度內熱口乾齒齦作痛右關脈洪數而虛此脾胃受傷而火動用清胃散之類而愈一儒者患天泡或成粒或成片或出水脾肺脈俱洪數此風邪所傷先用荊防敗毒散加萆薢鉤藤數劑漸愈但口內乾熱用四物加山梔鉤藤銀花甘草節而愈後遍身瘙癢內熱口乾佐以六味丸而瘥一商人每勞役飲酒後則遍身生瘡服祛風敗毒之劑面目胸背臂脅結一塊如桃慄凹凸癢痛膿水淋漓氣血虛甚寒熱往來作渴痰湧此濕熱壅盛元氣虛而不能愈也外敷當歸膏內服補陰八珍加萆薢五錢並換肌消毒散加乾葛鉤藤各一錢二十餘劑諸症漸退仍以前藥為主佐以調理之劑兩月餘氣血復而瘡愈一男子焮腫痛發熱服祛風清熱藥愈熾診其脈沉實乃邪在內也用防風通聖散一劑頓愈又防風敗毒散二劑而安夫此症雖屬風熱當審在表裡無誤矣一小兒患此症焮痛發熱脈浮數挑去毒水以黃柏滑石末敷之更飲荊防敗毒散二劑而愈一小兒患此症焮赤發熱以黃柏滑石末敷之飲大連翹湯二劑少愈更以金銀花散而痊毛閣老孫年十餘歲背側患水泡瘡數顆發熱脈數此肺胃經風熱所致名曰天泡瘡遂以荊防敗毒散加芩連服之外去毒水以金黃散敷之又四劑而愈楊文魁腹患此症及腰背焮痛飲冷脈數按之愈大乃表裡俱熱也以防風通聖散一劑更敷金黃散勢減大半再以荊防敗毒散二劑而痊瘀血腹痛立齋曰予於壬申年被重車碾傷悶瞀良久復甦胸滿如築氣息不通隨飲熱童便一碗胸寬氣利惟小腹作痛吾鄉徐銀臺東濠先生與復元活血湯一劑便血數升許痛腫悉退更服養氣血藥而痊大凡損傷不問壯弱及有無瘀血停積俱宜服熱童便以酒佐之推陳致新其功甚大若脅脹或作痛或發熱煩躁口乾喜冷惟飲熱童便一甌勝服他藥不動臟腑不傷氣血萬無一失嘗詢諸營操軍常有墮馬傷者何以愈之俱曰惟服熱童便即愈此其屢試之驗亦明矣戊辰年公事居庸關見覆車被傷者七人仆地呻吟一人未蘇俱令以熱童便灌之皆得無事又凡腫或傷損者以蔥搗爛熱罨之尤妙治一人仲秋夜歸墜馬腹內作痛飲酒數杯翌早大便自下瘀血即安此元氣充實挾酒勢而行散也一男子跌傷腹痛作渴食梨子二枚益甚大便不通血欲逆上用當歸承氣湯加桃仁瘀血下而瘥此因元氣不足瘀血得寒而凝聚也故產婦金瘡不宜食此一男子盂冬墜梯腹停瘀血用大黃等藥而其血不下更加胸膈脹腫喘促短氣用肉桂木香末各三錢溫酒調服即下黑血及前所服之藥而蘇此因寒凝滯而不行故用辛溫之劑散之一老人墜馬腹作痛以復元通氣散用童便調進二服少愈更以四物湯加柴胡桃仁紅花四劑而安一男子墜馬傷作痛以桃仁承氣湯加蘇木紅花下之頓愈更以四物湯加花粉柴胡二劑而愈脾傷腹痛附血虛脅脹血瘀脅脹陳侍御墜馬腿痛作嘔服下藥一劑胸腹脹痛按之即止惟倦怠少氣診其脈細而澀曰非瘀血也乃痛傷氣血復因藥損脾氣而然耳投養脾胃生氣血之藥而愈李進士季夏傷手出血不止發熱作渴兩脅作脹按之即止此血虛也用八珍加軟柴胡花粉治之而愈更用養氣血之藥調理而痊孫文垣治桂亭兄壯年原有濕熱痰積年逾艾偶墜轎跌傷背脅外敷內攻而愈越十五年左脅痛手不可近左脈弦數堅勁搏指小腹亦痛知為舊瘀及痰積作祟以青皮赤芍黃連當歸尾各一錢桃仁錢半大黃二錢滑石三錢臨服調元明粉一錢服下吐痰碗余大便僅行一次左胯及腿膝皆痛臥不安小腹痛甚此瘀血欲行未能也再與前方加減便三次皆沉香色稠黏瘀物腹痛除胯痛仍在再與加減便行四次所下紫黑如筋膜者甚夥諸症悉減因食雞湯牛肉腹痛復重此余積未盡欲再下之恐年高不任曰藥力已到積已動行而後補庶無反顧之憂仍以前藥去大黃調元明粉下二次瘀物如前之半諸痛俱平用人參白芍甘草陳皮山楂桂心當歸半夏調理半月而愈一男子跌僕皮膚不破兩脅作脹發熱口乾自汗類風症令先飲童便一甌煩渴頓止隨進復元活血湯倍用柴胡青皮一劑脹痛悉愈再劑而安發明經云夫從高墜下惡血流於內不分十二經絡聖人俱作風中肝經留於脅下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脅下蓋肝主血故也甚痛則必有自汗但人汗出皆為風症諸痛皆屬於肝木況敗血凝滯從其所屬入於肝也從高墜下逆其所行之血氣非肝而何以破血行經藥治之一男子墜馬兩脅作痛以復元活血湯二劑頓止更以小柴胡加當歸桃仁二劑而安血虛煩躁附亡血出汗亡血昏憒吳給事墜馬傷首出血過多發熱煩躁肉瞤筋惕或欲投破傷風藥曰此血虛火動所致當峻補其血為善遂用聖愈湯二劑即安又養氣血而瘥一男子損臂出血過多又下之致煩熱不止瘀肉不腐以聖愈湯四劑少安以八珍湯加五味子麥冬而安更以六君子湯加芎歸黃耆四劑而潰又二十餘劑而斂大抵此症須分所患輕重有無瘀血及元氣虛實不可概下蓋恐有傷氣血難以潰斂常治先以童便和酒飲之或加紅花蘇木其功甚捷若概用攻利之劑鮮有不誤凡瘡愈之遲速在血氣之虛實故也張進士季秋墜馬亡血過多出汗煩躁翌日其汗自止熱躁益甚口噤手顫此陰血虛陽火乘之而汗出為寒氣收斂腠理故汗不得出火不得泄怫鬱內甚而益增他症也凡一切病火盛而汗出者若驟斂之反增他症乃用四物加柴胡黃芩山梔四劑少止又用四物參耆軟柴胡五味麥冬治之而痊一婦人孟冬傷足亡血頭汗內熱作渴短氣煩躁不時昏憒其脈洪大按之微弱此陰血虛於下孤陽炎於上故發厥而頭出汗也以四物合小柴胡湯一劑汗即止以四物去川芎加參耆麥冬五味炙草少用肉桂四劑諸症悉去又三十餘劑血氣復而愈一男子孟夏折腿出血過多其初眩暈眼花後則昏憒此陰血傷損陽火熾甚制金不能平木木旺生風所致急灌童便更用人參當歸各五錢荊芥川芎柴胡白芍白朮各二錢山梔黃芩桔梗各一錢甘草五分服之隨爽又用四物參耆各三錢生地柴胡各一錢四劑煩躁悉去濕痰作痛附肝火作痛血虛作痛大宗伯沈立齋盂冬閃腰作痛胸間痰氣不利以枳殼青皮柴胡升麻木香茴香當歸川芎赤芍神麯紅花四劑而瘥但飲食不甘微有潮熱以參耆白朮陳皮白芍各一錢歸身二錢川芎八錢軟柴胡地骨皮炙草各五分十餘劑而康劉尚寶體臂閃作痛服透骨丹反致肢節俱痛下體益甚以二陳南星羌活防風牛膝木瓜蒼朮黃芩黃柏治之身痛遂安以前藥再加歸尾赤芍桔梗治之而痊鄭吏部素有濕痰孟冬墜馬服辛熱破血之藥遍身作痛發熱口乾脈大而滑此熱劑激動痰火為患耳治以清燥湯去人參當歸黃耆加黃芩山梔半夏黃柏熱痛頓去患處少愈更用二陳羌活桔梗蒼朮黃柏薑製生地當歸遂痊楊司天骨已入骨台患處仍痛服藥不應肝脈洪大而急此肝火盛而作痛也用小柴胡湯加山梔黃連二劑痛止用四物山梔知柏調理而康一婦人磕臂出血骨痛熱渴煩悶頭暈日晡益甚此陰虛內熱之症用八珍湯加丹皮麥冬五味骨碎補肉桂及地黃丸治之悉愈去桂加牛膝續斷二十餘劑而瘡愈骨傷作痛附氣虛血滯氣虛不潰一小兒足傷作痛肉色不變傷在骨也頻用炒蔥熨之五更用和血定痛丸間用健胃生氣血之劑數日後服地黃丸三月餘而瘥一小兒臂骨出𩨽接入腫痛發熱服流氣等藥益甚飲食少思以蔥熨之其痛即止以六君黃耆柴胡桔梗續斷骨碎補治之飲食進而痛腫消又用補中益氣加麥冬五味治之氣血和而熱退愈矣戴給事墜馬腿腫痛而色黯食少倦怠此元氣虛弱不能運散瘀血而然耳遂用補中益氣去升麻柴胡加木瓜茯苓白芍白朮治之而愈少宗伯劉五清臁傷一塊微痛少食用六君子湯倍加當歸黃耆其痛漸止月餘瘀血內痼而不潰彼以為痊此陽氣虛極須用調補不從至來春頭暈痰涎壅塞服清氣化痰病勢愈盛脈洪大而微細此或輕取重取之分欲以參耆歸朮附子之類補之不信至秋初旬因怒昏潰而厥雄按瘀之內痼未始非初治失佐流通之品所致也氣虛壅腫附瘀血腫痛筋傷壅腫一婦人患臂腕腫大已三月手臂日細肌瘦惡寒食少短氣脈息細微屬形病俱虛也遂投補中益氣加肉桂引諸藥以行至臂再加貝母香附以解久病之郁間服和血定痛丸以蔥熨之腫消二三因怒患處仍脹胸膈兩脅微痛以前湯更加木香山梔半夏桔梗服之少可復因驚不寐少食盜汗以歸脾湯加五味麥冬二十餘劑而安腫消三四手臂漸肥但經水過期而少此心脾之血尚未充足而然也乃用八珍加五味麥冬丹皮遠志香附貝母桔梗四十餘劑諸症悉愈後因怒發熱譫語經水如湧此怒動肝火以小柴胡湯加生地二錢一劑遂止以四物加柴胡調理而康州守陳克明子閃右臂腕腫痛肉色不變久服流氣等藥加寒熱少食舌乾作渴曰傷損等症腫不消色不變此氣虛而不能愈當助脾胃壯氣血為主如法治之不二月形氣漸充腫漸消半載諸症悉退體臂如常一小兒閃腿腕壅腫形氣怯弱欲治以補氣血為主佐以行散之劑不信乃內服流氣飲外敷寒涼藥加寒熱體倦曰發寒熱脈息洪大氣血虛極也治之無功後肉潰瀝盡氣血而亡一男子閃傷右腿壅腫作痛謂急砭去滯血以補元氣庶無後患不信乃外敷大黃等藥內服流氣飲後湧出穢膿碗許其膿不止乃復請治視其腿細而脈大作渴發熱辭不治後果歿窗友王汝道環跳穴處閃傷瘀血腫痛發熱作渴遂砭去瘀血知其下焦素有虛火用八珍加知柏牛膝骨碎補四劑頓止用十全大補少加知柏麥冬五味三十餘劑而愈李考功子十四歲腳碗閃傷腫而色夭日出青膿少許肝脈微澀此肝經受傷氣血虛而不能潰難消之症急止克伐之劑不信乃雜用流氣等藥後果筋爛而死雄按此名蹬筋毒潰後最難收功初起宜以燒酒於患處蘸拍數百下後以韭菜杵爛罨之日日如此以散為度甚效且簡易也若經外科每致不救肺火衄血附肝火出血胃火作嘔張地官墜馬傷腿服草烏藥致衄血咳嗽臂痛目黃口渴齒痛小便短少此因燥劑傷肺與大腸而致用生地黃黃芩連知柏山梔山藥甘草以潤肺燥而生腎水小便頓長諸症並止以山藥五味麥冬參耆芎歸知柏黃芩炙草以滋陰血養元氣而瘡斂俞進士折腿骨已接三月尚發熱出血不止正體醫治不應左關脈洪數此肝火熾甚血得熱而妄行也遂投小柴胡湯加山梔白芍生地防風血止熱退又用八珍五味麥冬治之瘡口即愈田宗伯侄仲秋因怒跌僕遍身作痛發熱衄血肝脈弦洪曰久衄脈弦洪乃肝火盛而制金也至春則肝木茂盛而自焚或戕賊脾土非易治之症當滋腎水以生肝木益脾土以生肺金乃雜用瀉肝火等劑歿於仲春之月一婦人因怒仆地傷面出血痰盛昏憒牙關緊急曰此怒動肝火氣逆拂鬱神明昏冒而卒倒也兩手脈洪而無倫次以小柴胡湯加黃連山梔芎歸桂橘紅茯苓薑汁而蘇一膏粱之人跌腿青腫作痛服辛熱之劑反發熱作喘患處益痛口乾唇揭此膏粱之人內多積熱更服辛熱之劑益其胃火而使然也頻飲童便以清胃散加山梔黃芩甘草治之頓止患處以蔥熨之腫即消散陰虛作喘附陰虛發熱氣血虛熱舉人杜克宏墜馬服下血藥反作喘日益甚此血虛所致而然非瘀血為患遂以四物加參耆五味麥冬治之其喘頓止又用補中益氣加五味麥冬而愈此症果系瘀血蒸熏於肺而喘宜活血行血不可下若面黑胸脹或膈痛作喘當用人參一兩蘇木二兩作一劑水煎急服緩則不治產婦多有此疾楊進士傷手指焮痛發熱服寒涼之藥致飲食頓減患處不潰用托裡養血之藥食進而潰後因勞每日晡發熱此陰虛而內熱也以四物軟柴胡地骨皮乃退更用養血氣之藥而瘡斂一男子墜馬腹有瘀血服藥下之致發熱盜汗自汗脈浮澀以為重劑過傷氣血所致投以十全大補湯益甚時或譫語此藥力未及而然也以前藥加炮附子五分服之即睡覺來頓安再劑而痊陽氣脫陷附膽經血少腎經虛怯梁閣老侄跌傷腿外敷大黃等藥內服破血之劑遂致內潰為針出穢膿三碗許虛症悉具用大補之劑兩月餘稍能步履因勞心手撒眼閃汗出如水或欲用祛風之劑曰此氣血尚未充足而然也急以艾炒熱頻熨肚臍此法羅謙父嘗用之並氣海穴處又以人參四兩炮附子五錢煎灌良久臂少動又灌一劑眼開能言但氣不能接續乃以參耆歸術四味共一斤附子五錢水煎成徐徐服之元氣漸復飲食已進乃去附子服之而瘡愈一女子年十七閃右臂微腫作痛寅申時發熱決其膽經血虛火盛經水果先期而至先以四物合小柴胡湯四劑熱退更加以四物湯加香附地骨皮山梔各五分芩連炙草各二分二十餘劑其腫亦消乃去黃連山梔又五十餘劑經水調而元氣充矣儒者王清之跌腰作痛用定痛等藥不愈氣血日衰面耳黧色曰腰為腎之府雖曰閃傷實腎經虛弱所致遂用杜仲補骨脂五味山萸蓯蓉山藥空心服又以六君當歸白朮神麯各二錢食遠服不月而瘥一三歲兒閃腰作痛服流氣等藥半載不愈此稟腎氣不足不治之症也後果歿痛傷胃嘔附氣遏肉死一婦人指傷背俱腫微嘔少食彼以為毒氣內攻診視其脈沉細此痛傷胃氣所致也遂刺出膿碗許先以六君子藿香當歸而食進繼以八珍黃耆白芷桔梗月餘而愈一男子修傷足趾色黑不痛而欲脫此因陽氣虛不能運達於患處也急去之速服補劑以壯元氣否則死肉延足必不救矣不信果爛上脛而死一女子數歲嚴寒上京兩足受凍不仁用湯泡潰至春十趾俱爛牽連未落先用托裡之劑助其陽氣自潰脫得保其生此因寒邪遏絕運氣不至又加熱湯泡潰故死而不痛也常見人嚴寒而出凍傷其耳不知癢若以手觸之其耳即落當以暖處良久或熱手熨之無恙若以火烘湯泡其耳即死至春必潰落矣北方寒氣損人若此可不察之涼藥遏經云間曹子容為室人中風灌藥誤咬去指半節焮痛寒熱外敷大黃等內服清熱敗毒患處不痛不潰膿清寒熱愈甚此因涼藥遏絕隧道而然也遂敷玉龍膏以散寒氣更服六君子湯以壯脾胃數日後患處微痛腫處漸消此陽氣運達患處也果出稠膿不數日半指潰脫更服托裡藥而斂上舍王天爵傷足焮腫內熱作渴外敷內服皆寒涼敗毒患處益腫而不潰且惡寒少食欲作嘔吐此氣血俱虛又因寒藥凝結隧道傷損胃氣以致前症耳遂用香砂六君子歸芎炮姜外症悉退惟體倦晡熱飲食不甘以補中益氣湯加地骨皮五味麥冬治之而愈州守王廷用傷指即用帛裹之瘀血內潰焮痛至手謂宜解患處以出瘀血更用推陳致新之劑不信而敷涼藥雖少止次日復作又敷之數日後手心背俱潰出瘀穢膿水尚服敗毒之劑氣血益虛色黯膿清飲食少思仍請治投以壯脾胃氣血之劑由是膿水漸稠而愈錢國賓曰甲子春余舟泊清江浦時徵遼官兵沙船兩岸打閘水急索斷頭目王元跌倒頭向地腳朝天正對石椿腦蓋骨圓圓如鍾大竟離頭墜地去人丈許眾兵圍看余見而呼曰某知接骨今病者破腦魂魄驚散怕人不敢歸竅汝等在此此人立死矣且暫散診其脈洪浮腦骨雖墜腦膜未破可救先安腦骨急取舟中接骨藥散於周圍內用四物湯加桃仁大黃各一錢紅花五分恐血攻心移病者於無風之室令倚勿睡睡則血上至半日始甦醒次日能飲食日日與接骨藥一劑十日而痊接骨神方土鱉蟲四十九個酒炙黃暴死人骨一兩螃蟹煆黃五錢象蝨十個半兩錢十個煆紅醋淬取末自然銅三錢煆紅醋淬乳香沒藥各三錢木香二錢麝香五分為末每服七分熱酒調下照量加酒以行藥力服後骨中自響輕者數服重者十餘服接骨如故杖傷分症三十條張子和治一男子被杖瘡痛焮發毒氣入里驚涎堵塞牙噤不開粥藥不下前後月餘百治無功甘分於死先以三聖散吐青痰驚涎約半大缶次以利膈丸百餘粒下臭惡燥糞又一大缶復煎通聖散數錢熱服之更以酸辣蔥醋湯發其汗斯須汗吐交出其人活矣此法可以救冤人鄭金曜有杖丹一方用水蛭為末和朴硝少許以水調敷瘡上屢施於人良驗志雅堂雜抄崇禎庚辰黃公石齋解公石帆葉公潤山被杖士夫皆謀蚺蛇膽愚謂此大寒令人絕嗣不如三七無名異地龍蠟丸酒服則杖不知痛如不即得則白蠟一兩䗪蟲一枚酒服亦妙壬午則熊公魚山姜公卿墅復以直言受杖遣人急白如須用之中州集曰貞祐中高琪柄國士夫被棰辱醫家以酒下地龍散投以蠟丸則受杖失痛範中歌曰嚼蠟誰知味最長一杯卯酒地龍香年來紙價長安貴不重新詩重藥方偶書及此為之一嘆痕痏青腫用萊菔搗爛敷之即消或用綠豆粉調敷客中間集薛立齋治文刑部用晦伏闕諫南巡受杖瘀血已散壞肉不潰用托裡之藥稍潰而膿清此血氣虛也非大劑參耆不能補文君亦善醫以為恐腹滿強之飲食稍思遂加大補劑飲食日進肉潰膿稠而愈嘗治江翰林姚王鄭三吏部李薑陳三禮部南吳二刑部皆與文同事者先散其瘀血漸用排膿托裡之藥俱愈夫叫號則傷氣忍痛則傷血此氣血之虛明矣況脾主肌肉脾氣受傷飲食必減血一冰則肌肉不旺故必理脾脾健肉自生若非參朮歸耆之類培養脾土則肌肉何由而生然又須分病人虛實及有無瘀血停積蓋打撲墜墮皮肉不破肚腹作痛者必有瘀血在內宜以復元活血湯攻之老弱者四物湯加紅花桃仁穿山甲補而行之若血去多而煩躁此血虛也名曰亡血以獨參湯補之有損傷稍輕別無瘀血等症但瘀痛不止者惟和血氣調經脈其痛自止更以養血氣健脾胃無有不效亦有傷痛胃氣作嘔或不飲食者以四君子湯加藿香砂仁當歸治之若有瘀血不先消散而加補劑則成實實之禍設無瘀血而妄行攻利則致虛虛之禍夏鳳北京人因杖瘡臀膝通潰膿瘀未出時發昏憒此膿毒內作而然也急與開之昏憒愈盛此虛也以八珍湯一服少可數服死肉自腐頓取之令用豬蹄湯洗淨以神效當歸膏塗貼再以十全大補湯兩月而愈若更投破血之帖則危矣大抵杖瘡一症皆瘀血為患治療淺者砭之深者針之更以活血流氣藥和之內潰者開之有腐肉取之以壯胃生血藥托之可保無虞有傷筋骨而作痛者以沒藥降聖丹治之若牙關緊急或腰背反張者以玉真散治之並效薛立齋治一人杖後兩脅脹悶欲咳不欬口覺血腥遍身臀腿脹痛倦怠不食煩躁脈大此血脫煩躁也與童便酒及砭患處出死血糜肉甚多忽發熱煩躁汗出投以獨參湯三劑少止又用補氣血清肝火之藥數劑飲食少進後用獨參湯間服諸症悉退飲食頓加但不能多寐以歸脾湯加山梔竹茹四劑而熟睡因勞心遂煩渴自汗脈大無力以當歸補血湯二劑而安又以十全大補去川芎加麥冬五味牡丹地骨麻黃根炒浮麥數劑而汗止死肉且潰又二十餘劑而新肉生一人煩躁面赤口乾作渴脈洪大按之如無此血虛發躁也以當歸補血湯二劑即止後日晡發熱更以四物加柴胡牡丹地骨知柏治之熱退而瘡斂東垣云發熱惡寒大渴不止其脈大無力者非白虎湯症此血虛發躁宜用當歸補血湯治之斐先生云肌熱躁熱目赤面紅其脈洪大而虛此血虛也若誤服白虎湯輕則危重則斃一人杖後頭額出汗熱渴氣短煩躁骨痛瘀血不潰此氣虛血熱也遂割去之出血服芩連之藥益甚其脈洪大而微此氣血俱虛邪火熾甚所致以四物加參耆朮草少用柴胡炒芩二劑頭汗頓止又加麥冬五味肉桂二劑諸症悉退後用參耆歸朮炒芍熟地麥冬五味十餘劑瘀血潰而膿水稠矣但新肉不生以前藥倍用白朮而斂一人杖後瘀血流注腰脅兩足俱黑此瘀泛注也隨飲童便酒砭出瘀血糜肉投以小柴胡湯去半夏加山梔芩連骨碎補以清肝火用八珍茯苓以壯脾胃死肉潰而新肉生後瘡復潰得靜調治年餘而痊一人瘀血攻注陰囊潰而成漏膿水清稀所服皆寒涼之劑診其肝脈短澀餘脈浮而無力此肝木受肺金剋制又元氣虛不能收斂遂用壯脾胃生氣血之方元氣少復後終歿於金旺之日一人傷處腫痛發熱作渴汗出此瘀血作痛也先砭去惡穢以通壅塞後用四物柴芩山梔丹皮骨碎補以清肝火而愈一人傷處揉散惟腫不消此瘀血在內宜急砭之不從乃以蘿蔔自然汁調山梔末敷之破處則以膏貼之更服活血之劑而瘥數年後但遇天陰仍作癢痛始知不砭之失一人杖後臀腿黑腫而皮不破但脹痛重墜皆以為內無瘀血惟敷涼藥可以止痛診其尺脈澀而結此因體肥肉厚瘀血蓄深刺去即愈否則肉潰有爛筋傷骨之患乃入針四寸漂黑血數升腫痛遂止是日發熱惡寒煩渴頭痛此氣血俱虛而然也以十全大補之劑遂愈一人杖後瘀血內脹焮痛發熱口乾作渴飲食不甘四肢倦怠此肝火作痛也脾土受制故患此症喜其稟實年壯第用降火清肝活血之劑而愈一人杖後患處脹痛悲哀忿怒此肝火忿怒也厥陽之火為七情激之而然耳遂砭去瘀血以小柴胡湯加山梔黃連桔梗而安後用生肝血養脾氣之藥瘡潰而斂一人杖後患處腫脹痛發熱欲吐嘔兩脅熱脹肝脈洪大此肝火脅脹也但令飲童便並小柴胡湯加黃連山梔歸尾紅花諸症果退此症若左關脈浮而無力以手按其腹反不脹者此血虛而肝脹也當以四物參苓青皮甘草之類治之若左關脈洪而有力胸脅脹痛按之亦痛者此怒氣傷肝之症也以小柴胡芎歸青皮白芍桔梗枳殼主之蓋此症不必論其受責之輕重問其患處去血之曾否但被人扭按甚重努力恚怒以傷其氣瘀血歸肝多致前症甚則胸脅脹滿氣隧不通或血溢口鼻多致不救一人受杖愈後口苦腰脅脹痛服補腎行氣等藥不效按其肝脈浮而無力此肝膽虛症也用參耆芎歸地黃白朮麥冬五味治之而愈一人杖後服四物桃仁紅花大黃等劑以逐瘀血腹反痛更服一劑痛益甚此血虛腹痛也宜溫補之劑遂以歸身白朮參耆炙草二劑痛即止一人杖後瘀血已去飲食少思死肉未潰又用托裡之藥膿稍潰而清此血虛不潰也非大補不可彼不從乃強與大補之劑飲食進而死肉潰但少寐以歸脾湯加山梔二劑而愈因勞心煩躁作渴脈浮洪大以當歸補血湯二劑而安一人受刑太重外皮傷破瘀血如注內肉糜爛黯腫上引胸背下至足趾昏憒不食此寒凝不潰也隨以黑羊皮熱貼患處灌以童便酒薄粥更以清肝活血調血健脾之劑神思稍蘇始言遍身強痛又用大劑養血補氣之藥腫消食進時仲冬瘀血凝結不能潰膿又用大補之劑壯其陽氣其膿方熟遂砭去洞見其骨塗當歸膏及服前藥百餘劑肌肉漸生一人杖後而傷虛潰甚以內有熱毒欲用涼藥此脾虛不斂也非歸朮參耆之類培養脾土則肌肉何由而生豈可復用寒涼克伐之藥重揖氣血耶遂用前藥而愈一人杖後腹脹嘔吐眩暈筋骨痛此血虛筋攣也用柴胡黃芩山梔紫蘇杏仁枳殼桔梗川芎當歸赤芍紅花桃仁四劑而定後又出血過多昏憒目黑用十全大補等藥而蘇時肌肉潰爛膿水淋漓筋攣骨痛切其脈浮而澀沉而弱皆因氣血耗損不能養筋筋虛不能束骨遂用養氣血之藥治之而愈一人杖瘡愈後失於調理頭目不清此腎虛氣逆也服祛風化痰藥反眩暈服牛黃清心丸又肚腹瘀痛杖痕腫癢發熱作渴飲食不思痰氣上升以為杖瘡餘毒復作診之左尺脈洪大按之如無此腎經不足不能歸源遂用人參黃耆茯苓陳皮當歸川芎熟地山藥山萸五味麥冬炙草服之尋愈後因勞熱渴頭痛倦怠少食用補中益氣加麥冬五味而痊一人受杖愈後腿作痛意膿血過多瘡雖愈肝經血尚未充而濕熱乘肝也遂以八珍加牛膝木瓜蒼朮黃柏防己炙草以祛濕熱養陰血痛漸止乃去防己黃柏服之遂瘳一人杖後瘀血失砭脹痛煩渴縱飲涼童便脹頓止以蘿蔔細搗塗之血漸散已而患處作癢仍塗之癢止後口乾作渴小腹引陰莖作痛小便如淋時出白津此肝經鬱火也遂以小柴胡湯加大黃黃連山梔飲之諸症悉退再用養血藥而安夫小腹引陰莖作痛等症往往誤認為寒症投以熱藥則諸竅出血或二便不通以及危殆輕亦損其目矣凡肝鬱病誤用熱藥皆貽大患一人杖後痛甚發熱嘔吐少食胸膈痞滿用行氣破血之劑益甚口乾作渴大便不調患處色黯此痛傷胃嘔也遂以四君當歸炒芩軟柴胡藿香二劑諸症漸愈又用大補之劑潰之而瘳一人杖後發熱焮痛服寒涼藥更加口乾作渴肚腹亦痛自以為瘀血欲下之按其肚腹不痛脈微細而遲飲食惡寒而嘔此涼藥傷胃也急用六君加白芍當歸炮附子各一錢服之前症益甚反加譫語面赤意其藥力未至耳前藥再加附子五分非明眼不能服之即睡覺來諸病頓退而安一人杖後瘀血雖去飲食形氣如故但熱渴焮痛膈間有痰以小柴胡湯加花粉貝母桔梗山梔二劑少愈又加生地歸尾黃芩柴胡山梔花粉而愈凡治百餘人其受杖血氣不損者惟此一人耳治者審之一人杖後誤服行氣之劑胸痞氣促食少體倦色黯膿清此形氣俱虛之症也先用六君桔梗二劑胸膈氣和後用補中益氣去升麻加茯苓半夏五味麥冬治之元氣漸復而愈若用前劑戕伐元氣多致不救一人去其患處瘀血用四物柴胡紅花治之焮痛頓止但寒熱口乾飲食少思用四物白朮茯苓柴胡黃芩花粉四劑寒熱即退用六君芎歸藿香而飲食進腐肉雖潰膿水漸稠誤服下藥一鍾連瀉四次患處色黯喜其脈不洪數乃以十全大補倍加肉桂麥冬五味數劑肉色紅活新肉漸生喜在壯年易於調理又月餘而愈否則不救凡杖瘡跌撲之症患處如有瘀血止宜砭去服壯元氣之藥蓋其氣血已損切不可再用行氣下血之藥復損脾胃則運氣愈難榮達於下而反為敗症怯弱者多致夭枉一人受杖腫痛敷寒涼之藥欲內消瘀血反致臀腿俱冷瘀血並胸腹痞悶急去所敷之藥以熱的童便酒洗患處服六君木香肉桂四劑瘀血解乃刺之更以壯脾胃養氣血得痊愈蓋氣血得溫則行得寒則凝寒極生熱變化為膿腐潰深大血氣既敗肌肉無由而生欲望其生難矣一人杖後發熱煩躁宜用四物黃芩紅花軟柴胡山梔子花粉煩熱已清瘀血深蓄欲針出之不從忽牙關緊急患處作痛始針去膿血即安也用托裡養血新肉漸長忽患處瘙癢此風熱也用祛風消毒之劑而痊有一人杖後臀腿脹痛發熱煩躁刺去死血脹痛少寬熱躁愈甚此血脫邪火旺而然也急宜用獨參湯以補之少愈又以健脾養氣血藥以治之而腐漸潰遂愈大抵有此症則宜預為調補以顧收斂切勿使伐其氣與血不行補益遂致不能收斂也一人仲夏受杖傷手腰背發脹牙關緊急脈浮而散此表症也遂用羌活防風湯一劑即解此症若在秋冬腠理致密之時須用麻黃之類以發汗此乃暴傷氣血不損治法也一人杖處略破而患痛脈洪大而實此里症也用大芎黃湯一劑大便微行一次悉退若投表藥必死宜急分表裡虛實而治之庶無誤也一人杖後寒熱口乾用四物參耆白朮軟柴炒芩麥冬五味四劑少退欲砭去瘀血不從後怔忡不寐飲食少思牙關牽緊頭目瘀痛惡寒發熱此膿內焮類破傷風也遂砭去之即安以八珍棗仁麥冬五味五十劑前症漸愈又用前藥及獨參湯瘀血潰後因勞又寐盜汗以歸脾湯加麥冬五味遠志而痊後牙關脹悶面目焮赤又似破傷風仍以為虛用八珍等藥亦安一人杖後腹脹喘促作渴寒熱臀腿糜爛與死肉相加和如皮囊盛糊用童便煎四物桃仁紅花柴胡黃芩麥冬花粉之類頓退彼用黑羊皮貼之益甚後砭去膿血甚多氣息奄奄唇口微動牙關急緊患處色黯或欲用破傷風藥曰此氣血虛而變症也用參耆芎歸白朮並獨參湯人乳元氣復而諸症愈乃用十全大補調理而安此症若膿瘀內焮者宜針之若潰後口噤遺尿類破傷風等症者乃氣血虛極也急用大補之劑若素多痰患風症者宜清痰降火若因怒而見風症者宜清肝降火若不慎房勞忽患前症此由腎水不足心火熾甚宜滋陰補氣血為主若誤作風症治之即死一人受杖內潰針出膿三五碗遂用大補之劑翌日熱甚汗出足冷口噤腰背反張眾欲投發散之劑曰此氣血虛極而變痙也若作風治誤矣用十全大補等藥而愈此症或傷寒汗下過度與產婦潰瘍氣血虧損所致但當調補氣血為善若服克伐之劑多致不救一人杖後兩月餘瘡口未完因怒發痙瘡口出血此怒動肝火而為患耳用柴胡芩連山梔防風桔梗天麻鉤藤甘草治之頓愈劉宗厚云痙有屬風火之熱而作者有因七情怒氣而作者亦有濕熱內盛痰涎壅遏經絡而作者惟宜補虛降火敦土平木清痰去濕一男子杖瘡瘀血不腐以大補之劑漸腐更以托裡健脾藥而斂一男子風入杖瘡牙關緊急以玉真散一服少愈再服而安小渠袁三因強寇入家傷其兩胻外臁作瘡數年不已濃汁常涓涓然但飲冷則瘡間冷水浸淫而出延為濕瘡求治張曰爾牛焦常有綠水二三升涎數掬袁曰何也張曰當被盜時驚氣入腹驚則傷膽病在少陽經也兼兩外臁皆少陽之部此膽之甲木受邪甲木色青當有綠水少陽在中焦如漚既伏驚涎在中焦飲冷水咽為驚涎所阻水隨經而旁入瘡故飲水則瘡中水出乃上湧寒痰汗如流水次下綠水果二三升一夕而痂干真可怪也王涇以高宗疾奉御無狀鞭背都市流遠方後歸自言不曾受杖嘗袒而示某以背完瑩無症初不解其如何也後見他醫言杖皆有瘢惟噬膚之初敷以金箔則瘢立消意金木之性相制耳程史載岳珂金瘡蜀志關雲長常為流矢所中貫其左臂瘡雖愈每至陰雨骨常疼痛醫曰矢鏃有毒入骨當破臂刮骨去毒乃除云長便伸臂令劈時方請諸將飲食相對臂血流離盈於盤器而割炙飲酒言笑自若隋末高開道被箭鏃入骨命一工拔之不得開道問之云畏王痛開道斬之更命一醫云我能拔之以一小斧當刺下瘡際用小棒打入骨一寸以鉗拔之開道飲啖自若賜醫工絹三百匹槎庵小乘七釐散專治金瘡跌打損傷骨斷筋折血流不止先以藥七釐燒酒沖服復用藥以燒酒調敷傷處瘡口大則干糝之定痛止血立時見效上硃砂一錢二分水飛淨麝香一分二釐冰片一分二釐乳香一錢五分紅花一錢五分明沒藥一錢五分血竭一兩兒茶二錢四分於五月五日午時為極細末密貯每服七釐不可多服劉涓子于丹陽郊外較射忽有一物高二丈許因射而中之走如電激聲若風雨夜不敢進明日率數十人尋其蹤跡至山下見一小兒問曰何往答曰主人昨夜為劉涓子所射取水以洗瘡因問主人是誰答曰是黃父鬼乃將小兒還未幾聞搗聲遙見三人一人臥一人閱書一人搗藥即齊聲叫突而前三人並走遺一帙癰疽方一臼藥時涓子得之從宋武帝北征有被瘡者以藥塗之隨手而愈涓子用方為治千無一失演為十卷號鬼遺方龔慶先鬼遺方敘宋元泰中青州劉𢣺射一鹿剖五臟拾青草塞之蹶然而起𢣺怪而拔草復倒如此三度𢣺錄此草種之多主傷折俗呼劉𢣺草亦曰天名精此草亦寄奴之類槎庵小乘琇按前劉涓子及此則皆脫胎宋祖荻洲事要其藥皆寄奴也斐昊旻山行有山蜘蛛垂絲如疋布將及旻旻引弓射殺之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止南部新書夏侯鄆為閬州有人額上有箭痕問之云從馬侍中徵田悅中箭侍中與一藥乃用巴豆微炒同蜣蜋搗塗斯須痛定微癢待極癢不可忍乃撼動拔之拔之立出後以生肌藥敷之乃愈因以方付鄆云凡諸瘡皆可療後鄆至洪州逆旅主人妻患瘡呻吟用此立愈本草綱目受箭鏃不出者以蜣蜋巴豆同塗癢不可當以雄磁石挾之即出象牙牡鼠肝腦慄屑烏雞尾灰白梅仁瓜仁齒齧和黑蝨皆能出箭頭又針線在肉者張子和儒門事親方端午取莨菪作丸黃丹衣之置臍而箭頭自出劉薦叔曰近日行伍惟以干莧菜與沙糖塗之能出箭頭與鉛砲子此常驗者則古方所未載也昔有人肩胛中瘡血如湧出醫用原蠶沙為細末敷之血立止一云用真降香煆存性為末貼之尤效吹劍續醫續錄記王肯堂云余近得一金瘡方大有神效功在三日長肌肉以黃牛膽煆存性為細末敷之此實一奇方也續醫說布智爾從太祖徵回回身中數矢血流滿體悶僕幾絕太祖命取一牛剖其腹納之牛腹中浸熱血中移時遂蘇又李庭從巴延攻郢州炮傷左脅矢貫於胸幾絕巴延命剖水牛腹納其中良久而蘇何孟春云予在職方間各邊將無知此術者非讀元史弗知也故書於此以備緩急本草綱目孫法宗苦頭瘡夜有女人至曰我天使也事不關善人使者誤及耳但取牛糞煮敷之即驗如其言果愈宋書本草綱目張禧身中十八矢一矢貫腹悶絕世祖即取血竭遣人往療之元史蒙古中有墨爾根綽爾濟者精岐黃有正白旗先鋒鄂碩與蒙古戰中流矢殆甚濟為拔鏃敷以藥遂愈又都統吳拜交戰時身被三十餘矢已昏絕濟令剖白槖駝腹置拜其中遂蘇又黃冠苗君稷之徒臂屈不伸濟先以熱鑊熏蒸次用斧椎其骨手捏有聲使骨穴對好即愈余文節公常撫軍宦遊筆記薛衣道人祝巢夫名堯民洛陽諸生也少以文名明亡遂棄置舉藝為醫自號薛衣道人得仙傳瘍醫凡諸惡瘡敷其藥少許即愈人或有斷脛折臂者請治之無不完好若刳腹洗腸破腦濯髓則如華佗之神里有被賊斷頭者頭已殊其子知其神謂家人曰祝巢夫仙人也速為我請來家人曰郎君何妄也頸不連項矣彼即有返魂丹烏能合既離之形骸哉其子因強之既至祝撫其胸曰頭雖斷身尚有暖氣暖氣者生氣也有生氣尚可以治急以銀針紉其頭於項既合塗以末藥一刀圭熨以炭火少頃煎人參湯雜以他藥啟其齒灌之須臾則鼻微有息矣復以熱酒灌之逾一晝夜則出聲矣呼其子而語之矣乃進以糜粥又一晝夜則可舉手足矣七日而創合半月而如故舉家作謝願產之半酬之堯民不受後入終南山修道不知所終無子其術不傳虞初新志陳定九薛立齋治大尹劉國信金瘡出血發熱煩躁屬陰虛為患用聖愈湯治之虛火熄而血歸經矣梁閣老侄金瘡腫痛出血不止寒熱口乾此氣虛血無所附而血不歸經也用補中益氣五味麥冬主之陽氣復而愈舉人余時正金瘡焮痛出血不止惡寒發熱用敗毒等藥愈甚此亡血過多氣無所附而然耳遂以四物加知柏軟柴胡參五味麥冬治之即愈淮西總管趙領衛名寓殿岩密之子云取箭鏃法仇防禦方張循王屢求不得因奏之德壽宣取以賜之有奇效以天水牛一個獨角者尤緊以小瓶盛之用碙砂一錢細研水少許化開浸天水牛自然成水上以藥水滴箭鏃處當自出也是齋方凡刀刃傷用石灰不以多少端午日午時取百草搗汁濾過和作餅子入韭菜汁尤妙陰乾遇有傷即以末糝之如腸胃出桑白皮縫罨之帛系吳內翰父少保守南雄州有刀傷人腸潰者以此藥治之全二人之命一方只用韭汁和石灰端午日合又治刀刃傷用五倍子為末干貼神效亦名小血竭同上回回田地有年七八十歲老人自願捨身濟眾者絕不飲食惟澡身啖蜜經月便溺皆蜜既死國人殮以石棺仍滿用蜜浸鐫志歲月於棺蓋瘞之俟百年後啟封將蜜取下凡人損折肢體食少許立愈雖彼中亦不多得俗曰蜜人番言木乃伊輟耕錄杭州赤山之陰日宵箕泉黃大癡所嘗結廬處其徒弟沈生狎近側一女道姑同門有欲白之於師沈懼引廚刀自割勢幾死眾救得活而瘡口流血經月餘不合偶問諸閹奴教以毀所割勢搗粉酒服如其言不數日而瘥同上閩萬夫長陳君臨陣為刀砟其面瘡已愈而痏與鼻不能合甚惡時時仰泣曰吾面無完膚生何以見妻子死何以見父母乎乃拜項彥章求治項命壯士按其面膚肉盡熱腐施之以法即面赤如頳盤左右賀曰復故也九靈山房集湯火傷薛立齋治一男子孟冬火傷臂作痛喘咳發熱此火毒刑肺金之症用人參平肺散治之喘咳乃止因勞又惡寒發熱此氣血虛也以八珍湯加枳梗白芷治之而退再加薄桂三分以助藥勢溫氣血壞肉潰之而愈如若初起焮赤作痛用神效當歸膏敷之輕者自愈重者自腐生肌神效或用側柏葉末蠟油調敷亦效若發熱作渴小便赤色其脈洪數而實者用四物茯苓木通生甘草炒黃連脈雖洪數而虛者用八珍若患處不潰而色黯者四君芎歸黃耆之類若死肉已潰而不生肌者用四君黃耆當歸炮姜若愈後而惡寒陽氣未復也急用十全大補湯切勿用寒涼反傷脾胃一男子因醉被湯傷腿潰爛發熱作渴飲水脈洪數而有力此火毒為患用生地當歸芩連木通葛根甘草十餘劑諸症漸退卻用參耆朮草芎歸芍藥白芷木瓜新肉將完因勞忽寒熱此氣血虛而然也仍用參耆之藥加五味棗仁而安又月餘而瘡斂一男子火傷兩臂焮痛大小便不利此火毒傳於下焦用生地當歸白芍黃連木通山梔赤苓甘草一帖二便清利其痛亦止乃以四物參耆白芷甘草而壞肉去又數劑而新肉生一婦人湯傷胸大潰兩月不斂脈大而無力口乾發熱日晡益甚此陰血虛火毒乘之而為患耳用四物湯加柴胡丹皮熱退身涼更用逍遙散加陳皮以養陰血壯脾胃腐肉去而新肉生凡湯燙火燒痛不可忍或潰爛或惡瘡用松樹皮剝下陰乾為細末入輕粉少許生油調稀敷如敷不住紗絹帛縛定即生痂神妙不可言然宜預先合下以備急自剝落而薄者尤妙李莫安撫方用牛皮膠入少湯於火上溶稠狗毛剪碎以膠和毛攤軟帛封之直至痂脫不痛吳內翰家婢夜炊米釜翻傷腿膝以夜不敢曰比曉已潰爛用此治之而愈百乙方立齋治馮氏子患火瘡驟用涼藥敷貼更加腹脹不食以人參敗毒散加木通山梔治之外用柏葉炒為末麻油調搽漸愈嘗用煮犬汁上浮脂調銀硃塗之更效若用涼藥逼火毒入內多致不救王洪緒治一婦小腿經燙醫用冰片研雪水敷之不一刻腿腫如斗痛極難忍曰幸在小腿若腰腹間遏毒入內難挽回矣以地榆研細調油拂上半刻痛止再拂數次全愈一使女炭火燙足背爛一孔以伏龍肝散乳調敷不三日而愈一孩被滾湯澆腹因痛抓破皮麻油拂上一次痛止以地榆末干糝破處次日肌生未破者全愈錢國賓曰余欲之遂昌宿旅次聞隔房人呼痛夜不安枕次日問店主對曰小价提滾水一桶上樓與客洗面其子拿盆後上舊桶底脫滾水灌子之頭今腫如斗面目皆平七日不食矣余即往視滿室皆臭用夏枯草一斤為末以香油調腫處厚厚敷上即時止痛止臭三日消腫八日痂落切忌食醬料面有黑斑店主如言藥治而愈後余回其子叩謝竹木刺傷曾氏榮曰元貞乙未春有王千戶來自廣西安船河下一子僅二周患頭痛服藥針灸不效召曾診視色脈俱好惟額上微紅以手法驗之大哭淚下其母怒而見詰曾亦置之勿論但究心以病為事再問當時得病之因千戶云初在靜江時大風吹篷撲著便不快曾曰此疾若令細揣頭上便知其症彼諾之遂遣家人出外探親其父自抱曾揣之果有小筏簽刺在囟上皮下即篷簽也以酥油潤透用鑷摘出痛定即安若以匹婦饒舌而退則及幼之心不溥矣後之醫流倘見嬰兒色脈好而病者用藥不應必有他故宜細心推原切勿拘泥可也幼幼心書富次律云治竹木刺出聖惠方曾用救一莊僕極妙其人有一腳心刺痛楚瀕死黃昏敷藥痛尤甚至四更視之刺已出遂安用烏羊糞爛搗水和罨傷處厚敷之為佳百乙方蟲獸傷張薦員外住劍南張延賞判官忽被蜘蛛咬頭上一宿咬處有二度赤色細如筋繞項上從胸前下至心經兩宿頭腫瘀大如升碗肚漸腫幾至不救張公出錢五百千並薦家財又數百千募能療者忽一人應召云可治張公甚不信之欲驗其方其人云不諳方但療人性命耳遂取大藍汁一碗以蜘蛛投之至汁而死又取藍汁加麝香雄黃更以蛛投之隨化為水張公因甚異之遂令點於咬處兩日悉平非小瘡而愈本草綱目字林云睩聽形如蜥蜴出魏興居樹上見人則跳來齧之齧已還樹垂頭聽哭聲乃去即千歲蝮也其狀頭尾一般大如搗衣杵俗名合木蛇長一二尺談野翁方名斫木蛇又名望板歸救之用嫩黃荊葉搗爛敷之本草綱目處士劉易隱居王屋山嘗於齋中見一蜂冒於蛛網蛛搏之為蜂所螫墜地俄頃蜘蛛鼓腹欲裂徐行入草齧芋根微破以瘡就齧處磨之良久腹漸消輕躁如故自後人有被蜂螫者芋根敷之則愈筆談蚯蚓糞能治蜂螫余少時摘黃柑為蜂所毒急以井泉調蚯蚓糞塗之立止聞之昔人納涼檐際見有蜂為蜘蛛所罥蛛出取蜂受螫而墮少蘇爬沙牆角以後足抵蚯蚓糞掩其傷須臾健行卒啖其蜂於網信乎物亦有知也沈存中筆談亦記一事與此相類但謂以芋梗耳姑識之客中間間集麻知幾村行為犬所齧舁至家頸腫如罐堅若鐵石毒氣入里嘔不下食頭痛而重往問戴人女僮曰痛隨利減以檳榔丸下之見兩行不瘥適戴人自舞陽回問麻曰脛腫如此足之二陰三陽可行乎麻曰俱不可行戴人曰當大下之乃命臨夜臥服舟車丸百五十粒通經散三四錢比至夜半去十四行腫立消作胡桃紋反細於不傷之脛囑其慎勿貼膏紙當令毒氣出流膿血水又一日恐毒氣未盡又服舟車丸百餘粒浚川散三四錢見六行病人曰十四行易當六行反難何也曰病盛則勝藥病衰則不勝其藥也六日其膿水盡又囑其膿水行時不畏風盡後畏風也乃以愈風餅子日三服之又二日方與生肌散一敷之而成痂嗚呼用藥有多寡便差別相懸向使不見戴人則利減之言非也以此知醫之難用醫尤難戴人即張子和凡瘋狗毒蛇咬傷者只以人糞塗傷處新糞尤佳諸藥不及此楮記室出檐曝偶談江懷禪師為驢咬下鼻一僧用發入罐子鹽泥固濟煆過為末急以鼻蘸灰綴定以軟絹縛定效用此擦落耳鼻亦效醫學綱目薛立齋治一男子被犬傷痛甚噁心令急吮去毒血隔蒜灸患處數壯痛即止更貼太乙膏服玉真散而愈一男子瘋犬所傷牙關緊閉不省人事急針患處出毒血更隔蒜灸良久而醒用太乙膏封貼用玉真散二服少愈更以解數散二服而痊若患重者先須以蘇合香丸灌之後進湯藥針灸經云外邱穴治猘犬即瘋犬所傷發寒熱速灸三壯更灸患處立愈春末夏初狂犬咬人過百日得安終身禁犬肉蠶蛹食此則發不可救也宜先去惡血灸咬處十壯明日以後灸一壯百日乃止忌酒七日搗韭汁飲一二盞又方治狂犬傷令人吮去惡血灸百壯神效治蛇入七竅急以艾灸蛇尾又法以刀破蛇尾少許入花椒七粒蛇自出即用雄黃硃砂末煎人參湯調灌之內毒即解山居人被蛇傷急用溺洗咬處拭乾以艾灸之立效又方用獨頭大蒜切片置患處以艾於蒜上灸之每三壯換蒜多灸為妙立齋治陳鑑居庸關人蠍螫手瘀痛徹心頃刻焮痛至腋寒熱拘急頭痛惡心此邪正二氣相搏而然以飛龍奪命丹塗患處及服止痛之藥俱不應乃以隔蒜灸法灸之遂愈薛母及薛皆嘗被螫如前灸之痛即止薛母又嘗為蜈蚣傷指亦用前法而愈凡蜈蚣毒之類所傷依此療之並效本草謂蒜療瘡毒有回生之功一獵戶腿被狼咬痛甚治以乳香定痛散不應思至陰之下血氣凝結藥力難達令隔蒜灸至五十餘壯瘀痛悉去仍以托裡藥及膏藥貼之而愈王生被狂犬傷腿頃間焮痛至股翌日牙關緊急以玉真散治之不應亦隔蒜灸三十餘壯而蘇仍以玉真散及托裡消毒藥而愈立齋父嘗睡間有蟲入耳痛瞀將姜擦貓鼻尿自出取尿滴耳內蟲即出而愈又百戶張錦自謂耳內生瘡不時作痛痛而欲死痛止如故診其脈皆安靜謂非瘡也話間忽痛作度其有蟲入耳令回急取貓尿滴耳果出一臭蟲遂不復痛或用麻油滴之則蟲死難出或用炒芝麻枕之則蟲亦出但不及貓尿之速也此案耳門亦收之非重出也恐患此者不知是蟲便翻閱耳華佗傳彭城夫人夜之廁躉螫其手呻吟無賴佗令溫湯近熱漬手其中卒可得寐但旁人數為易湯湯冷令暖之其旦即愈三國志一僧為蛇傷一腳潰爛百藥不愈一遊僧以新水數斗洗淨腐敗見白筋挹干以白芷末入膽礬麝香少許糝之惡水湧出日日如此一月平復奇疾方蘇韜光寓婺女城外魁星館有人書一方於壁間曰此方治諸蟲咬神效韜光屢以救人皆驗其方用貝母為末酒調令病者量飲之飲不得即止頃之酒自傷處為水流出水盡為度卻以貝母塞瘡口即愈雖傷已死但有微氣可以下藥者即活神效不可言集成崇寧末年隴西兵士暑月中在倅廳下跣立足下為蚯蚓所中遂不救後數日又有人被其毒博識者教以先飲鹽湯一杯次日鹽湯浸足乃愈譚氏方治蜘蛛咬遍身瘡子以蔥一枚去尖頭作孔將蚯蚓入蔥葉中緊捏兩頭勿泄氣搖動即化為水水點咬處瘥本草孫真人以武德中六月得蠼螋尿疾經五六日覺心悶不住以他法治不愈又有人教畫地作蠼螋形以刀仔細細盡取蠼螋腹中土就以唾和成泥塗之再塗即愈方知天下萬物相感莫曉其由矣千金方立齋治一男子犬傷青腫作痛以蘿蔔汁調梔子末敷之以四物湯加柴胡黃芩花粉穿山甲二劑少愈更以托裡散加生地柴胡紅花數劑而潰再以托裡健脾藥而愈馬銘鞠傳治蜈蚣傷方蜒蝣塗上其痛立止屢試神效又一法用舊竹筋火中將頭上燒黑取下少許研細敷患處立愈廣筆記破傷風雄按史搢臣云冒風者曰破傷風染濕者曰破傷濕今但列傷風而不及傷濕猶有缺漏也官使明光祖向任統制官被重傷患破傷風牙關緊急口噤不開口面喎斜肢體弛緩用土虺蛇一條去頭尾腸皮骨醋炙地龍五條去泥醋炙天南星八錢重一枚炮上為末醋炙麵糊為丸綠豆大每服三丸五七丸生薑酒下仍食稀蔥白粥取汗即瘥普濟方本草綱目萬密齋治一婦人年四十餘形黑而瘠性躁急先患左腿發內癰潰後起坐萬曰瘡口未合當禁風其婦自恃強健不聽忽一日眩僕目貶口喎身反張手足攣曲亟求治曰此破傷風痓病也用桂枝湯加熟附子黃耆防風一劑而病減再服十全大補湯三劑而安胡念庵曰一人因拔髭一莖忽然腫起不食有友人詢余余曰此破傷風也速灸為妙醫乃認作髭疔治以寒涼不數日發痙而死醫林指月有男子年六十一腳腫生瘡忽食豬肉不安醫以藥利之稍愈時出外中風汗出頭面暴腫起紫黑色多唾耳輪上有浮泡小瘡黃汁出乃與小續命湯加羌活一倍服之遂愈醫說續篇薛立齋云一男子背瘡未斂以膏藥剪孔貼之患破傷風症而歿此先失於內補外邪集其虛耳余見此症貼膏藥剪孔欲其通氣而反患破傷風搽斂藥生肌欲其收口而助其餘毒以致歿者多矣可不慎哉一男子風襲瘡口牙關緊急腰背反張以玉真散一服而愈仍以托裡藥而斂薛立齋治一婦人臀癰將愈患破傷風發熱搐搦脈浮數以當歸地黃湯治之不信乃服發散敗毒藥果甚始信服數劑而痊是症須分表裡別虛實不可概治原病式云破傷風因瘡熱甚鬱結榮衛不得宣通怫熱遍身故多白痂是時瘡口閉塞氣難通泄熱甚則生風也不已則表傳於裡但有風熱微甚兼化故殊異矣大法風熱躁甚怫屈在表而裡氣尚平者善伸數欠筋脈拘急時或惡寒或筋惕而搐脈浮數而弦者宜以辛熱治風之藥開衛結滯是與怫屈而以麻黃湯辛熱發者同也凡用辛熱宜以寒藥佐之免至藥中病而風熱轉甚也如治傷寒發熱用麻黃桂枝加黃芩石膏知母之類是也或以甘草滑石蔥豉寒藥發散之妙若表不已漸入里里又未甚而脈在肌內者宜以退風熱開結滯之寒藥調之或微加治風辛熱亦得猶風寒半表半裡以小柴胡和解之意也若裡熱已甚舌強口噤項背反張驚惕搐搦涎唾稠黏胸腹滿塞或便溺閉結或時汗出脈洪數而弦此由風熱屈甚於里而表熱稍罷則腠理疏泄而心火熱甚故汗出也法宜除風散結寒藥下之後以退風熱開屈滯之寒藥調之熱除結散則風自愈矣凡治此宜按摩導引及以藥斡開牙關勿令口噤使粥藥不得下也治破傷風及金刃傷打撲傷損方名玉真散本事必用兩方皆有但人不知張叔潛知府云此方極奇居官不可闕是齋宰清流日以授直廳醫救欲死者數人奇甚用天南星防風二味等分為末破傷風以藥敷貼瘡口然後以溫酒調下一錢如牙關緊急角弓反張用藥二錢童子小便調下或因鬥毆相打內有傷損以藥二錢溫酒下打傷至死但心頭微溫以童小便灌下二錢並進三服天南星為防風所制服下不麻是齋方按衛生寶鑑以此方兼治狂犬所傷並諸犬咬神效
