body:
  text: 卷六惡寒戴原禮治松江諸仲文盛夏畏寒常御重纊飲食必令極熱始下咽微溫即吐他醫投以胡椒煮伏雌之法日啖雞者三病更劇戴曰脈數而大且不弱劉守真云火極似水此之謂也椒發三陰之火雞能助痰只益其病耳乃以大承氣湯下之晝夜行二十餘度頓減纊之半後以黃連導痰湯加竹瀝飲之竟瘳兩浙名賢録李士材治吳文邃眩暈三載雖戰栗惡寒而不喜飲熱湯五月向火數妾擁帷帳屢服薑桂不效脈浮之細小沉之堅搏是鬱火內伏不得宣越也用金花湯加柴胡甘草生薑乘熱飲之移時而惡寒減再劑而撤火爐逾月而起更以人參湯進六味丸兩月安全張路玉治謝某七月間病瘧因服芩知石膏輩稍間數日後因小便精大泄遂腦痛如破惡寒振振欲劈地醫用八味六君子三倍參附而寒不除繼用大建中每服人參三錢熟附二錢其寒益甚至正月診之脈僅三至弦小而兩寸俱伏但舉指忽覺流利其症雖身襲重裘大畏隙風如箭而不喜近火或時重時輕口鼻氣息全冷胸中時覺上衝小腹堅滿塊壘如石大便堅硬欲了不了小便短數時白時黃陽道雖痿而緩縱不收氣色憔悴而不晦暗此症本屬陽虛因用參附過多壯火不能化陰遂鬱伏土中反致真陰耗竭論證不清法當升發其陽先與火鬱湯六服繼進升陽散火補中益氣肢體微汗口鼻氣溫脈復五至後服六味丸生脈散異功散調理全康張子和治一婦身冷脈微喜食沸熱粥飲六月重衣以狐帽蒙其首猶覺寒泄注不止常服薑附硫黃燥熱之劑僅得平和稍用寒涼其病轉增三年不愈診其兩手脈皆如絙繩有力一息六七至脈訣曰六數七極熱生多乃以涼布搭心次以新汲水淋其病處婦乃叫殺人不由病者令人持之復以冷水淋至三四十桶大戰汗出昏困一二日而向之所惡皆除此法華元化已曾用惜無知者周貞字子固玉田隱者治衛立體得寒病雖盛夏必襲重裘擁火坐密室中他醫投以烏附轉劇曰此熱極似寒非真寒也用硝黃大寒之劑而愈醫説續編抱一翁治一人泄瀉惡寒見風輒僕日臥密室坐火蒙氈出語伊伊如嬰兒氣象似沉寒痼冷屢進薑附益甚診之脈濡弱而微數濡者濕也數者脾伏火也乃脾伏火邪濕熱下流非寒也法當升陽散火以逐其濕熱治以柴胡升麻羌活澤瀉等劑繼以神芎丸滑石大黃牽牛連芎薄四五劑而氈去次日遂安薛立齋治一人雖盛暑喜擁火四肢常欲沸湯浸之喜食辛辣熱湯面赤吐痰一似實火吐甚則宿食亦出曰食入反出是脾胃虛寒也用四君子湯薑附而愈一士人患惡寒右尺獨滑尺滑者濕熱下陷也惡寒者因積勞傷脾胃氣下陷穀氣不得升發無陽以護榮衛也用補中益氣湯加肉桂二劑而愈此殆陽陷入陰之證非濕熱也龔子才治一婦人六月惡寒之極雖穿棉襖亦不覺熱此火極似水也六脈洪數小水赤少以皮硝五錢溫水化服而愈薛立齋治一婦人內熱作渴大便祕結畏惡風寒手足逆冷此內真熱而外假寒先用黃連解毒湯後用六味地黃丸而愈朱丹溪治晉胡君錫年三十一形肥大面色蒼厚其家富足專嗜口味兩年前得消渴病醫與寒涼藥得安有人教以病後須用滋補令其專用黃雌雞因此食至千餘隻漸有膈滿嘔吐之病醫者意為胃寒遂與以附子沉香之藥百餘帖嘔病除此謂劫之而愈反致病重世不知此以為治驗古今受其害者可勝數哉月餘天氣大熱忽惡風冷足亦怕地氣遂堆粳尺許厚上鋪以簟糊以重紙方敢坐臥而兩手不能執筆口鼻皆無氣以呼吸欲言無力行十餘步便困倦脈皆浮大而虛僅得四至此內有濕痰因服燥熱藥遂成氣耗血散當此夏令自合便死因其色之蒼厚神氣尚全可以安穀遂以人參黃耆白朮熬膏煎淡五味子湯以竹瀝調飲之三日諸病皆愈令其頓絶肉味二月後康健如舊又以雞湯下飯一月後胸腹膨滿甚自煎二陳湯加附子豆蔻飲之頓安問調理藥教以勿藥並斷肉飲自愈寒熱汪石山治汪世昌形肥色紫年逾三十秋間病惡寒發熱頭痛自汗噁心咯痰惡食醫以瘧治診之脈浮濡而緩右寸略弦曰非瘧也此必過勞傷酒所致飲以清暑益氣湯四五服而愈易思蘭治一春元下第歸得寒熱病每日申酉二時初微寒繼作大熱而煩躁甚如狂過此二時平復無恙惟小便赤黃而澀往時一有心事夜即夢遺每日空心用鹽飲燒酒數杯醫者以為病瘧用清脾飲柴苓湯並截藥俱不效六脈惟左尺浮中沉取之皆洪數有力餘部皆平曰此潮熱病也以加減補中益氣治之日進一服三日病漸退復用六味地黃丸兼前藥調理一月而安或問寒熱而不以瘧治何也曰此非瘧乃潮熱也潮者如水之潮依期而至八法流注云申酉二時屬膀胱與腎此病專屬二經水衰火旺當申酉時火動於中故發熱而躁躁屬腎若瘧疾肝部必弦今不然惟左尺獨現火象此因平日斫喪太過腎水虧損陰火旺熾加之鹽飲燒酒引入腎經故小便赤黃而澀也又曰此非陰虛火動乎曰陰虛之熱自午至亥發熱不間今惟申酉時熱熱止便涼與陰虛不同又曰或亦嘗用補中益氣而不效何也曰加減之法或未同耳豫之去升柴加丹皮澤瀉黃柏者丹皮瀉膀胱澤瀉瀉腎火黃柏為君以生腎水水旺則火衰而寒熱退矣用六味丸者亦取有丹皮澤瀉耳如不知此仍用升柴乃以肝脾之藥治腎所以不效也孫文垣治李坦渠子婦十月寒熱起一日一發咳嗽心痛腰亦痛次年正月望後始間日一發肌肉大減喉疼汗出如雨白帶如注飲食減少百治汗不止脈之右手軟弱左手散亂此汗多而脈不斂病至此危矣經云火熱似瘧此之謂歟以黃耆二錢白芍一錢五分甘草阿膠各一錢鱉甲三錢桂枝五分烏梅一個水煎服其汗止再診脈已斂神氣亦回前方加何首烏石斛牡蠣寒熱亦不發飲食少加駸駸然有幽谷回春之象喻嘉言治吳吉長內新秋病灑淅惡寒寒已發熱漸生咳嗽然病未甚也服表散藥不愈體日尫羸延至初冬飲以參術補劑轉覺厭厭欲絶食飲不思有咳無聲瀉痢不止危甚醫議以人參五錢附子三錢加入薑桂白朮等作一劑服以止瀉補虛而收背水之捷病家無措延喻診畢未及交語前醫至即令疏方喻飄然而出蓋以渠見既訛難與言耳前醫既去乃曰是症總由誤藥所致始先皮毛間灑淅惡寒發熱肺金為時令之燥所傷也用表散已為非法至用參術補之則肺氣閉錮而咳嗽之聲不揚胸腹脹飽不思飲食肺中之熱無處可宣急奔大腸食入不待運化而即出食不入則腸中之垢汙亦隨氣奔而出是以瀉痢無休也今以潤肺之藥兼潤其腸則源流俱清寒熱咳嗽泄瀉一齊俱止矣服四劑必安不足慮也方用黃芩地骨皮甘草杏仁阿膠一劑瀉即少止四劑寒熱俱除再數劑咳嗽亦愈設與若輩商之彼方執參附為是能相從乎又鄉中王氏婦秋月亦病寒熱服參術後厭厭一息但無咳嗽十餘日不進粒米亦無大便時時暈去不省人事其夫來寓詳述其證求發補劑乃以大黃芒硝石膏甘草四味為粗末與之彼不能辨歸而煎服其婦云此藥甚咸夫喜曰咸果補藥遂將二劑連服頃之腹中弩痛下結糞數塊絶而復蘇進粥二盞前病已如失矣凡此素有定見於中始無炫惑書之為臨症者廣其識焉高鼓峰治程氏子每日至辰時大寒午時大熱熱即厥兩目直視不能出聲頦脫涎水從口角湧出日流數升至丑時始汗解飲食不進昏冒欲絶診之皆誅伐太過所至也投以補脾之藥不即效延他醫用柴胡南星半夏等勢轉劇復延診值醫者在座詢之曰此何症也而用前藥曰子不識乎此肝瘧也肝瘧令人色蒼蒼然太息其狀若死高笑曰據子述經言當得通脈四逆矣何用前藥某誠不識此為何病但知虛甚耳請先救人然後治病何如曰子用何藥曰大劑參附庶可挽回彼力爭參附不便乃漫應曰謹奉教始洋洋色喜而別是夜用人參一兩黃耆二兩炮薑三錢比曉熟地桂附並進次日辰時病不復發矣此緣勞役過度寒熱往來醫認為瘧且時當秋令一味發散寒涼重虛其虛展轉相因肝脾大敗非峻補氣血何由得生夫病由人生人將死矣而乃妄牽經義強合病情及至處方又乖成法自誤誤人至死不覺悲夫呂仲嘉內人在室十四歲時寒熱往來逮後適仲嘉又十餘年寒熱如故或作瘧治或作虛治尫羸枯削幾於骨立高診之曰此非瘧非虛乃血風症耳以五加皮散加熟地二兩每劑共藥五六兩許水二升濃煎一升每日進一劑如是者二十劑寒熱頓除馮楚瞻治徐山公患似瘧非瘧醫以柴胡湯連進數劑漸至不省人事口噤僵臥咸謂無生理曰此陽虛作寒陰虛作熱誤當瘧治必死也以重劑熟地白朮五味牛膝麥冬製附子另煎人參一兩沖服三日而蘇後用溫補而愈吳孚先治小姨病寒熱如瘧語言譫妄如見鬼狀有指為熱入血室者然證與長沙所論三條了不相合診得右寸浮滑知為風痰膠固肺臟故灑淅寒熱痰迷心竅故語言譫妄宜發表利氣自愈用二陳湯加蘇防前葛枳桔桑杏數劑微汗而痊有一師尼乍寒乍熱面赤心煩或時自汗惡風體倦大小柴胡雜進其病益劇診視脈無寒邪但厥陰脈弦長而出魚際治以抑陰地黃丸而愈薛立齋治一婦人因夫久出經商發寒熱月經旬日方止服降火涼血藥內熱益甚自汗盈盈月經頻數曰內熱自汗乃脾氣虛熱也非血不歸脾也用歸脾湯六味丸而愈一室女久患寒熱月經失期以小柴胡湯加生地治之少愈更以生地黃丸而痊柴胡秦艽各半兩生地二兩酒濕杵膏赤芍一兩為末蜜丸每三十丸烏梅湯下日三服易思蘭治一男子病寒熱衆作瘧治年餘不愈又以為勞瘧虛瘧用鱉甲散補中益氣湯俱不效脈左右三部俱浮大無力形瘦色黑飲食不美知為陰虛發熱病也早進六味丸晚服補陰丸七日後飲食漸美寒熱減半又服一斤未一月全愈蓋此似瘧非瘧乃陰虛之候也凡正瘧則寒熱雖參差而有準今寒熱往來或一日一次二次且寒而不厥身熱如火熱退又無汗兼之形瘦色黑怔忡不寐口渴便祕豈可謂瘧乎且瘧脈當弦諸虛損脈亦多弦發則弦而大退則弦而小今浮大無力早晚相同誠陰血不足陽火有餘火發於外則為熱火鬱於中則為寒形瘦者火之消爍也色黑者火極似水也怔忡不睡者心血虧損也肝火浮入胞絡者多飲食不美口渴便祕者火熾於上下也但生腎水養血滋陰陰血充則火自降寒熱退而病瘳矣立齋治一婦人久患寒熱服清脾飲之類胸膈飽脹飲食減少用調中益氣加茯苓半夏炮薑各一錢二劑而痊朱丹溪治趙孺人夜間發寒後便熱醜寅時退起來口渴食少無味穀不化腹痛而泄倦怠或遇事煩躁赤眼氣壅又不耐風寒亦惡熱白朮歸身各二錢白芍陳皮各一錢人參黃耆各五分炒柏炙草炒芩丹皮木通縮砂各三分煎下保和丸實腸丸各三十丸呂十四孺人怒氣後寒熱咳嗽食少淋泄縮砂甘草各三分人參五分白朮錢半連翹陳皮茯苓各一錢薑二片同煎一婦人年五十餘形實喜作勞性急味厚喜火食夏卻患熱惡寒發熱更無休時衣被雖厚常凜然兩脈皆澀朱作雜合邪治之遂以四物湯加陳皮以人參白朮為君生甘草黃柏為佐多入薑汁吞通神丸三十丸回金抑青各二十丸阿魏十丸煎三帖而得睡第五帖而身和第七帖通身微汗諸症皆除華他傳有婦人長病多年世謂寒熱注病者冬十一月中他令坐石槽中平旦用寒水汲灌云當滿百始七八灌寒戰欲死灌者懼欲止他令滿數將至八十灌熱氣如蒸出囂囂高二三尺滿百灌他乃使燃火溫床厚覆良久汗始出著粉汗燥便愈三國志馬元儀治張某寒熱數日痛嘔逆胸滿身疼左脈弦澀關尺虛微此中氣虛寒胸中之氣不化而為滿胃中之陽不布而為嘔衛外之陽不固而為痛以四君子補脾胃之虛炮薑附子肉桂補陽氣而除邪少加黃連以為引導一劑脈起再劑痛止得睡不數劑而霍然顧允諧寒熱日作胸滿不舒自汗不止已數日或用柴胡黃芩兩解之法不愈診其脈右三部虛微左三部弦澀望其色枯白不澤脈微為陽微弦為虛風由正氣不足虛邪外襲而成寒熱治宜補中益氣即有胸滿亦是陽虛不布非氣實而然也況自汗者陽虛不能衛外故也面色不華者氣血虧損無以上榮於面也遂與理中湯理其中氣加桂枝以祛虛邪後倍加參附不數劑而愈唐氏子患寒熱彌月不瘥胸中有塊高突按之則痛時見厥逆兼多自汗診其脈右三部虛微按之如絲此症實脈虛邪實正衰之候也攻之則礙虛補之則助邪然用補則正氣旺而邪自去若任攻則邪氣去而正獨全者鮮矣用人參二錢扶正養正為主佐以炙甘草和平益氣以卻虛邪炮薑黃連半夏以開痞而散結肉桂以固其本桂枝以越其邪制方井井有條可以為法二劑寒熱減兩脈起加人參以助中焦運化而痛漸平再用桂附理中湯調理而愈一婦人患寒熱半月兩脈浮虛按之則豁然空兩寸倍甚曰脈見空豁寒熱不時面色不華者氣血不榮也語言錯亂者神明失養也與歸脾湯加黃連肉桂各七分令其心腎內交服後脈漸有神改用人參三兩黃耆三兩歸身一兩炙草二錢生地五錢遠志二錢棗仁三錢杞子五錢大劑補氣養榮數劑寒熱止神氣清令早服七味丸下午進歸脾大造膏百日而愈李東垣治中書左丞姚公茂上熱下寒用既濟解毒湯良愈未選入來天培治馬振昌室年約五旬夏間忽患寒熱頭痛每未申時起至寅卯時退頭暈胸胃嘈雜或作暑風治益甚不能飲食無汗氣急懶言診之六脈沉細兩關微弦此勞倦傷脾中氣不足外感寒邪內傷生冷清陽不升氣虛不能達也與補中益氣湯加炮薑半夏一劑汗出熱短嘈雜漸已繼以歸脾湯加半夏桂枝白豆仁寒熱除飲食進調理而愈也馬氏嫗年七旬八月忽病寒熱噁心頭疼身痛心跳不眠嘔吐不食展轉呻吟診之兩關弦而緊餘脈細小以為脾氣虛寒肝氣上逆與薑附理中湯加白芍和肝二劑漸瘳朱丹溪治一人天明時發微寒便熱至晚病盛於陽兩腋汗出手足熱甚四肢為諸陽之本則胸滿拘急大便實而能食邪熱可知似勞怯病者虛損之甚亦作寒熱脈不數但弦細而沉此張子和謂為有積之脈詢之因怒氣而得但用大柴胡湯惟胸背拘急不除後用二陳湯加羌活防風紅花黃芩治之汪石山治一人形短蒼白平素喜飲五月間忽發寒熱醫作寒治燥渴益甚時常啖梨嘔吐痰多每次或至碗許飲食少進頭痛暈悶大便不通小便如常或一夜不安或一日連發二次或二日三日一發或連發數日平素兩關脈亦浮洪先令服獨參湯二三帖嘔吐少止寒熱暫住三日他醫曰渴甚脈洪熱之極矣乃用獨參以助其熱非殺之而何及往視脈皆浮洪近數曰此非瘧而亦非熱也脈洪者陰虛陽無所附孤陽將欲飛越故脈見此其病屬虛非屬熱也渴甚者胃虛精少不上朝於口亦非熱也蓋年逾六十血氣已衰加以瘧藥性皆燥烈又當壯火食氣之時老人何以堪此然則邪重劑輕非參所能獨治遂以參耆各七錢歸身麥冬各一錢陳皮七分甘草五分水煎每次溫服一酒杯服至六七帖痰止病除而食進大便旬余不通增之以蜜仍令服三十餘帖以斷病根續後脈亦收斂而緩非復向之鼓擊而駛矣霍亂張子和曰泰和間余見陳下廣濟禪院其主僧病霍亂一方士用附子一枚及兩者乾薑一兩泡水一碗同煎放冷服之服訖則嘔血而死頃合流鎮李彥直中夜忽作吐瀉自取理中丸服之醫者至以為有食積以巴豆下之三五丸藥亦不動至明而死可不哀哉遂平李仲安攜一僕一佃客至偃城夜宿邵輔之書齋中是夜僕逃仲安覺其逸也騎馬與佃客往臨潁急追之時當七月天大熱炎風如箭埃塵漫天至辰時而還曾不及三時往退百二十里既不獲其人復宿於邵氏齋忽夜間聞呻吟之聲但言救我不知其誰也爇火尋之乃仲安之佃客也上吐下瀉目上視而不下胸脅痛不可動搖口欠而脫臼四肢厥冷此正風濕暍三者俱合之症也其壻曾聞其言乃取六一散以新汲水銼生薑調之頓服半升其人復吐乃再調半升令徐服之良久方息至明又飲數服遂能起調養三日平復雄按此證近世屢行然多在夏熱亢旱之年今秋江浙盛行死者甚衆余診治者無不活詢其病前有無影響或曰五心煩熱者數日矣或曰身中殊不自覺但視物皆作紅色已而病即陡起大端倪若此伏暑可知七月中旬治一陳嫗年已七旬吐瀉轉筋肢冷音颯脈伏無溺口渴汗多腹痛胎黃自欲投井豫以白虎合三黃加木瓜威靈仙略佐細辛少許兼以西瓜汁恣飲即日而瘳一李姓婦人患此更兼溺血如注頭痛如劈脈甚弦駛心悸畏驚余謂雖屬暑邪肝陽熾極以犀角梔子柏葉茅根石斛滑石竹茹銀花生苡仁為大劑和入藕汁送下當歸龍薈丸三錢而霍亂即止專治血分旬日亦痊若此二法即余前論中亦未之及也張甲僑居司徒蔡謨家遠出數宿謨晝眠夢甲云暴病心腹疼腹滿不得吐而死所病乾霍亂可治而人莫知其藥故死耳但以蜘蛛生斷其腳吞之則愈耳謨覺探之果死其後乾霍亂者試用輒瘥客中間集出幽明録孫文垣治程氏子先醉酒後御色次早四肢冷胃脘痛極脈僅得四至或以鬱火為治投以寒涼痛更甚三日前所食之西瓜吐出未化乃翁以為陰症傷寒欲用附子理中湯不決逆孫治之視其面色青慘叫痛而聲不揚坐臥煩亂此是霍亂兼蛔厥之症也先當止痛安蛔後理霍亂可免死也遲則誤事矣急用五靈脂醋炒三錢蒼朮一錢五分烏梅三個川椒炮薑梅心各五分水煎飲下痛減大半下午以大腹皮藿香半夏陳皮山楂五靈脂茯苓兩帖全安沈繼庵內人患發熱頭痛遍身痛乾嘔口渴胸膈脹悶坐臥不安醫與參蘇飲其乾嘔愈甚又加煩躁孫診之則右手洪大倍於左左浮數曰乾霍亂也以霍香正氣散去白朮桔梗加入白扁豆香薷一帖吐止惟口渴額痛尚未除以石膏香薷滑石各五錢橘紅藿香葛根各二錢檳榔木瓜各一錢甘草五分薑三片一帖而愈柴嶼青治瀋陽少宗伯德福夏月抽筋吐瀉用六和湯而愈秋間過府署致謝之再診其脈弦洪異常謂宜合丸劑調養彼謂病已可不信因謂京兆吳穎庵曰德公脈氣不佳不預行服藥脈已先時而見明年春夏可慮至期暴脫急著人相邀已無及矣凡吐瀉轉筋者其肝脈必弦洪未必平素有病也陳三農治一婦暑月方飯後即飲水而睡睡中心腹痛極肢冷上過肘膝欲吐利而不得吐利絞痛垂死六脈俱伏令以藿香正氣散煎湯吐之一吐減半再吐而安矣局方藿香正氣散朴陳桔半草芷苓藿腹皮蘇葉陸祖如治陳敬橋母四旬外身軀肥胖暑月多啖生冷夜半腹痛上不得吐下不得瀉或與藿香正氣散入口即吐不得下咽診之左三部沉緊而細右寸關沉實有力面色紫脹四肢厥冷昏不知人牙關緊閉此寒氣太重中焦氣滯不得克化先用烏梅擦牙俟開即投抱一丸三釐腹中鳴響去垢穢若干四肢溫暖面色如常然昏昏似醉懶於言語恐元氣大削遂用歸芍川芎茯苓豆蔻木香陳皮木通等四劑全愈王宇泰治一老人暑月霍亂昏冒不知人脈七八至洪大無力頭熱如火足寒如冰半身不遂牙關緊急此年高氣弱不任暑氣陽不維陰即瀉陰不維陽即吐陰陽不相維則既吐且瀉也正值暑氣極盛之時非甘辛大寒之劑不能瀉其暑熱墜其陽焰而安其神明遂以甘露飲甘辛大寒泄熱補氣加茯苓以分陰陽雪水調灌即愈治一婦患吐瀉十餘日水粒不入發熱煩躁欲去衣服六脈浮洪重按全無用六君子加藿香砂仁附子冷服諸症悉愈薛立齋治進士李通甫之內冬間開衣箱其內衣裳乃夏月所曬者開時覺為暑氣所侵良久患霍亂足趾跟俱轉筋甚惡自分必死用香薷飲一劑急煎下咽即愈儀部李北川仲夏患腹痛吐瀉兩手足捫之則熱按之則冷其脈輕診則浮大重診則微細此陰寒症也急服附子理中湯不應仍服至四劑而愈包瑞溪學憲傳繆仲淳傷暑霍亂神方絲瓜葉一斤白霜梅肉一枚並核中仁同研極爛新汲水調服入口立瘥廣筆記馬銘鞠傳霍亂方用粟米連殼搗碎煎湯服下後立愈屢試神效梁溪顧聖符傳治霍亂方取扁豆葉搗汁一碗飲之立愈繆仲淳治高存之家僕婦患霍亂以砂仁一兩炒研鹽一撮沸湯調冷服一劑愈傷冷物者加吳茱萸四錢瘴陳三農治制府王姓感冒瘴氣寒熱胸膈飽悶頭疼眩暈噁心脈數而洪用藿香正氣散加厚朴檳榔羌活防風蘇葉一劑而寒熱退頭不疼減去羌蘇防風加草豆蔻半夏枳殼噁心脹悶發熱俱愈梧州方姓脈弦而數頭疼身痛噁心飽悶發熱用羌防芎蘇藿朴二陳蒼朮甘草檳榔二服而愈因飽脹未全退加草豆蔻草果方愈此頭疼噁心飽服所以異於感冒乃瘴氣也端州李別駕鑲藍旗人年四十餘能騎射署雷州府時善搏虎不避風雨寒暑涉溪陟嶺染瘴已深其所感風寒暑熱不一而足且久客半載甫歸本署未暇休息遂往省謝謁上臺可謂勞於公事忘於己躬其如積邪所感猝然皆發醫者紛沓據云略為解散已進補劑而邪氣大作寒熱神昏譫語脈空數無根神氣散亂補瀉兼施而議論紛然矣招陳往視脈已如水上萍刻刻欲脫寒熱間作蓋受病既深精氣兩虛邪氣正熾難以措手擬用五積散加附子人參去麻黃而易羌活已言明不治之症不忍坐視勉盡愚誠立方有難色不欲下藥之語遂置不用越一宿復拉往視脈症殆甚因見案頭昨藥尚存遂堅辭而出後聞以陰瘧陽虛而用金匱腎氣湯加參者有以為虛症似瘧當用補中湯而加參附者三劑而神昏氣喘虛汗如雨足冷而脫矣不知此症初實受瘴氣屢感深寒今則乘虛而發語云傷寒偏死下虛人況瘴氣而風寒暑濕備感者乎正紅旗孫兄粵東轉運高公令親也高扎云舍親孫某患不起之症非某不治亦作善之一端時因余創育嬰局於廣省故云然也往診其脈空豁恍恍不定重按無根神昏譫語寒熱大作加之咳嗽痰喘轉側不能寐晝夜惟伏几呻吟且胸膈脹悶足冷惡寒詢之夏秋積勞寒暑皆受一月以前初感頭風身痛憎寒惡熱咳嗽或用桔梗杏仁乾葛羌活汗而不解復用桑皮前胡蘇子半夏貝母知母黃芩亦不應寒熱更甚又用小柴胡加山梔元參薄荷咳嗽更甚不知此症夏秋暑濕風寒兼感而發尚未得汗何能解散遂用五積散二劑汗出如淋咳嗽亦減可伏枕矣惟寒熱未退病久元氣已虧氣上喘小便如油短數其火從下而上上盛下虛用金匱腎氣丸二服氣平便順然潮熱如故時有囈語昏冒午後用參附六君子湯朝與腎氣丸經月汗止神清凡用參附共斤許又服還少丹加河車桂附鹿膠及十全大補湯五十餘日元氣始復飲食如常此與李別駕同一病形脈雖少異一以信藥而生一以不信藥而殞噫戊寅十一月高鹺使公子患似痢非痢紅多白少惡寒微熱脈滑而數詢知自夏秋以來由川北隨任之粵久積暑濕感冒而發用平胃加羌防蘇藿一劑而寒熱退再劑加檳榔木香而瘳或問痢忌燥藥今用蒼朮而愈何也曰常人痢疾因暑令火熱之氣而得燥藥乃天時之所忌是以不可擅用今以積濕之病發於隆冬外感乃得力要藥也所謂治病而搜其源者一七可瘳故醫無執方病無執藥云梁溪棋師周西侯之弟開銅山於英德其山下有水人浣衣則垢膩皆去相與為奇以其近便炊釁皆用之未幾人皆黃胖身軟腹脹而無力飲食倍進寒熱間作善啖雞豕諸肉則胃腹少安在廠同事斃者不一因來省求治用平胃正氣治其病後以益氣六君補其受毒水克削之愆而安此即粵西太平柳州南寧毒水瘴之一斑也一時開山同病還省數人有似瘧非瘧如驛官之僕陳某者醫以瘧視不及月餘而疾篤因勢急方求診脈已弦緊而數飲食不進陳曰若欲治何不在一月之前病雖甚而元氣猶在今精神殆盡雖有婆心無藥可施奈之何哉閲一載驛官復有甥陳姓亦以開山病歸仍犯毒水所得似痢非痢寒熱間作醫以香連朴硝大黃行藥消導日益尫羸易醫曰可以進補用白朮五分陳皮二分茯苓四分病無退進召陳診猶謂飲食尚可料不致大變脈之恍然不定重按已絶人將謝世而飲食猶能此所謂行尸之疾邪火浮載真精告竭矣辭之閲二日而卒新安程聖林長子年十六精血充足飲食倍進丁丑春從父到廣年餘患似痢非痢足腫便赤此受暑濕瘴氣之病半年前曾視其脈數逾六至每言於其父此有積疾非壽徵也即欲急治已屬難能人皆以為謬未幾而發此疾醫用寒如大黃黃柏黃芩朴硝消導如枳實檳榔厚朴山楂草蔻補如參耆八珍熱如桂附薑茱兼投備進時陳奉制府之招留滯端州兩月歸而往視不可為矣噫洞庭賀澤民按察雲南時分巡騰衝等處討賊因染瘴癘腰股發熱有監生殺犬煮饋之令空心恣食飲酒數杯即去溺溲少頃清利其脹漸退蓋犬肉能治瘴也客坐新聞治瘴法宜溫中固下升降陰陽及灸中脘氣海三里或灸大指及第五指皆能止熱若用大柴胡湯及麻黃金沸草散青龍湯膠柱鼓瑟鮮不敗矣又中瘴失語俗呼為中草子移時血凝立死法當用針刺頭額及上唇仍以楮葉擦其舌令血出徐以藥解其內熱立效居易録出赤雅漳水界有一水號烏腳溪涉者足皆如墨數十里間水不可飲飲則病瘴梅龍圖儀嘗沿履至漳州素多病豫憂瘴癘為害至烏腳溪使數人肩荷之以物蒙身恐為毒水所沾兢惕過甚行至中流忽墮水中至於沒項乃出之舉體黑如崑崙奴自此宿病盡除頓覺康健説頤江南溪有溪毒病發時如重傷寒識之者取小筆管內鼻中以指彈之三五下即出黑血良久即愈不然即不救録異記行路時但見前後山間有氣如虹或白即是瘴氣急以身伏於地下用口含土候其氣散乃起則無傷蓋其氣浮空而過不著於地也若有檳榔及蒜服之亦可漱石間談瘴疾吐下皆不可治治之法惟灸中脘氣海三里三處並灸大指再用針多刺額及上唇令多出血又以楮葉擦舌令出血然後用藥解楮葉之毒內熱即除瘴毒自消矣粵擁友人言粵西某縣瘴殊甚縣令赴任即死無逾三月者一丞至任歷十餘年家口染疾死亡殆盡此丞久無恙無他術獨嗜燒酒終日沉醉而已粵擁周公謹云香附四兩去黑皮微炒片子薑黃湯浸一宿洗淨二兩甘草四兩炒研細末入鹽點服闢嵐瘴之氣極妙志雅堂雜録王珍張衡馬均冒重霧行一人無恙一人病一人死問其故曰我飲酒病者食死者空腹博物志嘔吐杜壬治安業坊閻家老婦人患嘔吐請石秀才醫曰胃冷而嘔下理中丸至百餘丸其病不愈石疑之杜至曰藥病相投何必多疑石曰何故藥相投而病不愈杜曰藥力未及更進五十丸必愈果如其言石於是師法於杜醫學綱目王普侍郎病嘔飲食皆不得進召孫兆治數日亦不愈後復召杜杜曰治嘔愈嘔此胃風也遂用川烏一兩淨洗去皮臍不去尖以漿一碗煮乾每個作兩片復用漿水一碗煮盡更作四片細嚼一片以少溫水下少頃嘔遂止痛即少息杜遂問曰尋常好吃何物曰好吃甘甜之物杜曰是甘甜乃膏梁之物積久成熱因而生風非一朝一夕之故也王服其説同上毛公弼有一女嘗苦嘔吐求龐安常醫與之藥曰嘔吐疾易愈但此女子能不嫁則此病不作若有娠而嘔作不可為矣公弼既還家以其女嫁歸沙溪張氏年餘而孕果以嘔疾死曾達臣獨醒雜志臧中立毗陵人客鄞崇寧中徽宗後病甚中立應詔以布衣麻履見命之入診出問何證中立對曰脾脈極虛殆嘔瀉之疾作楚和藥以進且曰服此得睡為效至夜半果粥食不一月獲安賜歸詔出官帑豫地築室南湖以居焉寧波府志許學士政和中治一宗人病傷寒得汗身涼數日忽嘔吐藥食不下醫用丁香藿香滑石等下咽即吐許曰此證汗後餘熱留胃脘正宜竹茹湯用之即愈薛立齋治府庠沈姬文母患脾虛中滿痰嗽發熱又食濕面冷茶吞酸嘔吐絶食誤服芩連青皮等藥益加寒熱口乾流涎不收聞食則嘔數日矣迎治曰脾主涎以脾虛不能約制也欲用人參安胃散惑於衆論以為胃經實火宿食治之病日增劇忽思冬瓜食如指甲一塊頓發嘔吐酸水不止仍服前藥愈劇復邀視之則神脫脈絶瀕死矣惟目睛尚動曰寒淫於內治以辛熱然藥不能下矣急用鹽艾附子炒熱尉臍腹以散寒回陽又令沈以口氣補接母口之氣又以附子作餅熱貼臍間救急妙法時許神氣少蘇以參朮附子為末仍以是藥加陳皮煎膏為丸如粟米大納五七粒於口隨津液咽下即不嘔二日後加至十粒諸病少退口涎不止五日後漸服前劑一二匙胃氣少復乃思粥飲復投以參術等藥溫補脾胃五十餘劑而後愈明醫雜著婦人良方一人湯藥入口即吐出六脈洪大有力此因地道不通故氣厥上行而食物難入耳不更衣已十餘日服承氣等湯俱不納曰祕結日久湧逆勢盛故也止沸莫若抽薪遂用蜜導去燥糞數升嘔吐即止調以養血清火之劑而安章虛谷治一七十歲老人數年前患瘧病根未除每至夏秋則發自去冬至丁亥春忽病嘔吐戰振筋脈掣痛愈後屢發或見其小便黃赤大便乾少面有紅光謂是肝鬱化火火逆犯作嘔胃陰不足故小便黃赤大便乾少也章診之脈虛澀少神舌苔白腐而厚此中焦虛寒濁陰聚胃也以薑製半夏為君佐參苓附子乾薑生薑桂枝芍藥烏梅草果仁一劑即甚效繼去烏梅加厚朴連進十餘劑每劑附子用至三錢胃口開而病愈周慎齋治一人飲食如常每遇子時作吐大便祕結其人必苦慮憂思脾氣鬱結幽門不通宜扶脾開竅為主遂以參苓白朮以蒼朮伴炒炙甘草各一錢煮附子烏藥三分水煎服愈周慎齋治一士鬱熱嘔吐用竹茹山梔各三錢陳皮茯苓各二錢甘草一錢煎成加薑汁五匙熱服而愈大還陸養愚治李糧廳因飯後勞攘下午飲酒數杯遂覺臍下小腹作痛升至胃脘即嘔嘔訖痛止少頃又從下痛上復嘔嘔訖痛緩自後痛嘔益頻自疑中毒以淡鹽湯虀汁探吐之一無所出醫投以藿香正氣散不效其脈浮按細數稍重即伏沉按甚堅曰此飲食過飽急遽所至與潤字丸百十顆令以淡薑湯服之少頃連瀉數行而愈龔子才治梁太守女患頭暈嘔吐聞藥即嘔諸醫束手令以伏龍肝為末水丸塞兩鼻孔用保中湯藿香梗白朮各一錢陳皮半夏茯苓各八分土炒黃連土炒黃芩薑汁炒山梔各一錢砂仁三分甘草二分生薑三片以長流水入潔淨泥土擾瀝取地漿水煎湯探冷頓服而安萬病回春信陵府桂臺殿下夫人善怒怒即嘔吐胸膈不利煩躁不寧腹痛便祕食下即吐已八日心慌喘急危甚診之六脈虛微此血虛胃弱氣鬱痰火也與二陳湯加薑連酒芩炒梔當歸酒芍香附竹茹白朮入薑汁竹瀝二服而安張景嶽治吳參軍因食蘑菰至大吐大瀉醫謂速宜解毒以黃連黑豆桔梗甘草枳實之屬連進而病益甚胸腹大脹氣喘水飲不入延張診投以人參白朮甘草乾薑附子茯苓之類彼疑曰腹脹氣急口乾如此安敢服此耶閲日愈劇再求治與藥如前且疑且畏含淚吞之一劑而嘔少止二劑而脹少衰隨大加熟地以兼救其瀉亡之陰前後凡二十餘劑復元如故蓋蘑菰之為物必産於深坑枯井或沉寒極陰之處其得陰氣最盛故肥白且嫩也今中其陰寒之毒而復加黃連之寒其解毒云何茲用薑附以解其寒毒人參熟地以培其所傷之元氣此疾之所以愈也金氏少婦素任性每多胸脅痛肝火及嘔吐等證隨調隨愈後於秋盡時前證復作而嘔吐更甚病及兩日甚至厥脫不省肝火衆謂湯飲不入無策可施一醫云惟用獨參湯庶幾萬一張診之其脈亂數且煩熱躁擾意非陽明之火何以急劇若此乃問其欲冷水否彼點頭遂與以半鍾惟此不吐且猶有不足之狀乃復與一鍾覺稍安因以太清飲投之有謂此非傷寒又值秋盡能堪此乎不與辨及藥下咽即就枕酣睡半日不復嘔矣復以滋陰輕清等劑調理而愈大都嘔吐多屬胃寒而復有火證若此者此病火證極多張偏於溫補故有此説經曰諸逆衝上皆屬於火即此是也多屬胃寒又是何説自後凡見嘔吐其有聲勢湧猛脈見洪數症多煩熱者皆以此法愈之以多屬胃寒及自後二字觀之張生平於此誤亦不少矣蓋此症良由肝火上逆故暴急如此而曰陽明之火其孟浪可知張路玉治曾余弟婦患嘔逆不食者月餘服寬膈理氣二十餘劑幾至絶粒而痞脹異常診之脈得虛大而數按仲景脈法云大則為虛此胃中陽氣大虛而濁陰填塞於膈上也因取連理湯方用人參三錢服之四劑而痞止食進後與異功散調理而康稽紹胸中有寒疾每酒後苦唾服葳蕤得愈草似竹取根花葉陰乾昔華他入山見仙人所服以告樊阿服之壽百歲也本草有婦人病吐逆大小便不通煩亂四肢冷漸無脈息凡一日半與大承氣湯兩劑至夜半漸得大便通脈漸生翼日乃安此關格之病極難治醫者當謹慎也經曰關則吐逆格則小便不通如此亦有不得大便者衍義醫説續編張子和治柏亭王論夫本因喪子憂抑不思飲食醫者不察以為胃冷去寒之劑盡用病變嘔逆而瘦求治於張一再湧泄而愈歸家忘其禁忌病復作大小便俱祕臍腹撮痛嘔吐不食十日大小便不通十三日復問張張令先食葵羹波菱菜豬羊血以潤燥開結次以導飲丸二百餘粒大下結糞又令恣意飲冰數升繼以搜風丸桂苓白朮散調之食後服導飲丸三十餘粒不數日前後皆通痛止嘔定張臨別又留潤腸丸以防復結又留滌腸散大便祕則用之凡服大黃牽牛四十餘日方瘳論夫自嘆曰向使又服向日熱藥已非今日人矣一僧問張云腸者暢也不暢何以得愈按子和之醫大抵以此法行之耳丹溪云凡病人欲吐者切不可下之逆故也縱使二便後祕可行疏通亦中病而止然後養其氣血潤其腸胃庶乎標本之治乃羸瘠之人服大黃牽牛四十餘日方瘳豈理也哉違聖人之法以欺後世恐非子和之筆也孟子謂盡信書不如無書學者詳之醫學續編原評薛立齋治一婦人少作嘔口吐涎痰面黃腹痛月經不調手足逆冷此內外俱寒之證遂以六君加附子木香治之而愈一男子食少胸滿手足逆冷飲食畏寒發熱吐痰時欲作嘔自用清氣化痰之劑臍腹愈脹呼吸不利吐痰嘔食小便淋瀝又用五苓散之類小便不利諸證益甚曰此脾土虛寒無火之證故食入不消而反出非氣膈所致逆用八味丸補中益氣湯加半夏茯苓薑桂旬日乃愈一婦人因勞役發熱倦怠唾痰欲嘔或以為火證用清熱化痰等藥反大便不實無氣以動此寒涼復傷中氣形病俱虛用參耆朮草麥冬五味陳皮附子治之而痊後復勞經水數日不止衆以為附子之熱所致用四物芩連槐花之類涼而止之前證愈甚更加胸膈痞滿飲食日少仍用前方去門冬更加茯苓半夏炮薑數劑漸愈又用當歸芍藥湯而經止但四肢逆冷飲食難化不時大熱此命門真火衰脾土虛寒之假熱也用八味丸半載而痊又服六味丸三載而生子宋理宗嘔吐不止召楊吉老治之問用何方曰辛熱藥也帝曰服之不效吉老奏曰熱藥冷服藥成放井中良久澄冷進服一啜而吐止萬密齋幼科發揮立齋治一病噁心少食服解毒藥愈嘔此胃氣虛也以六君子湯加生薑治之而安戴氏元禮云如噁心者無聲無物欲吐不吐欲嘔不嘔雖曰噁心非心經之病皆在胃口上宜用生薑蓋能開胸豁痰也施笠澤治鄒翁患嘔吐遍身疼不能轉側醫為療其嘔吐矣然眠食猶未安也診之曰風入於經其脈乃凝留結不散寒痰中停四末不掉三焦不行亟疏其風亟調其經氣和血平轉側自能先用蘇合丸以通其氣隨用導痰湯加桂枝沉香白芍一劑即熟睡覺而展轉自如再用六君子加沉香數劑而安馬元儀治袁某患小腹厥氣上衝即吐得飲則吐愈甚諸治不效診之兩脈虛澀右尺獨見弦急曰人身中清氣本乎上而反陷下則為注為泄濁氣本乎下而反逆上則為嘔吐今病正在下而不在上也下焦之濁氣上騰則胸中之陽氣不布故飲入於胃在上壅而不下達耳經云雲霧不清則上應白露不下非地道下通濁氣何由而降嘔吐何由而止以調胃承氣湯一劑下宿穢甚多繼培中氣而愈張司馬子婦患胸中滿結作痛飲入則嘔湧出痰涎多成五色已數月或主攻克或主補虛卒無一效至七月中病轉危迫診之兩關尺虛微少神體倦神煩胸中結痛按之愈甚此正氣內傷陰邪內結攻之則傷其正補之則滯其邪當以仲景臟結法治之用黃連湯加桂枝一劑嘔吐頓除再劑胸中滿痛亦釋次用理中湯加桂枝數劑而安張景嶽曰沈姓者業醫年近四旬極勞碌因㿗疝下墜欲提上升用鹽湯吐法遂吐不止湯水不受如此一日夜復大便下黑血一二碗脈微如毛欲絶此蓋吐傷胃氣脾虛之極兼以鹽湯走血血不能攝從便而下令速用人參薑附等以回垂絶之陽忽一醫至曰諸逆衝上皆屬於火大便下血亦因火也尚堪參附乎宜速飲童便則嘔可愈而血亦止矣病者然之及童便下咽即嘔極不堪而斃琇按疝下墜本由肝木厥張乃復激之上騰致脾胃俱傷而下血不死何俟童便固非即參附亦未為是也馮楚瞻治蔣公子精神素弱吐血陰虧調理初愈忽又夢遺大吐不已六脈沉微曰夢遺俗名走陽矣大吐不止陽亦傷矣急以附子理中湯去甘草投之到口即吐又以白通之類皆苦不受沉困數日上不能入下不能出適有進西洋藥酒一方神治關格吐逆之證方用紅豆蔻去殼肉蔻麵裹煨用粗紙包壓去油白豆蔻高良薑切片焙肉桂去粗皮公丁香各研細末五分用上白糖霜四兩水一飯碗入銅鍋內煎化再入雞子清二個煎十餘沸入乾燒酒一斤離火置穩便處將藥末入鍋內打勻以火點著燒酒片刻隨即蓋鍋火滅用羅濾去渣入瓷瓶內冷水拔去火氣飲之內皆辛熱純陽之藥能破格陽之陰又燒酒力猛辛烈直透丹田令照方修治飲之即不吐矣遂以參附峻補之藥陸續漸進調理而痊琇按馮氏生平多尚溫補如此證吐血陰虛之後夢遺而吐多由龍雷之火下迫上奔以辛熱治其標則可若守而不化則後患不可測也孫奉職治趙儀女忽吐逆大小便不通煩亂四肢漸冷無脈凡一日半大承氣湯一劑至夜半漸得大便通脈漸和翌日乃安此關格之病極為難治垂死而活者惟此一人盧復曰生平聞銅腥臭即噁心入口鮮不吐者雖參湯與茶久在銅銚中者亦然常思銅青固發吐藥惟我何獨畏之甚久未晰此疑辛亥夏臥病聞銅臭而嘔吐自反為木形人色常青畏金故於銅臭為相忤因而思子和吐論中發吐之藥四十有六種嘗讀而未能解也遂將以五形五色定人而施之若木形人畏金腥而吐則火形人畏咸腐水類而吐矣然畏者必惡因其惡以激其怒則用力少而成功多餘三形可例見噫豈惟吐藥為然而下而汗寧不可乎沈抄聶久吾曰庚寅季春別駕夏公至新興寺放飢谷豫備酒飯款之正飲間忽然腹痛其痛從臍下小腹起痛至胃脘即嘔嘔訖痛止半時許又從下痛止復嘔嘔訖痛止如是者數次醫作寒治用藿香砂仁等藥不效至申刻豫覺是內熱作痛熱氣上衝而嘔必須利之然煎劑不可服恐反增嘔急制牽牛大黃丸服至數錢利數次而脫然愈矣黑牽牛四兩半炒半生磨取頭末一兩二錢三稜莪朮醋炒各六錢為末濃米湯為丸梧子大服三錢未利再服二錢不俟二三時見效魏玉橫治鮑淥飲年二十餘以夏月肩輿反歙途次受熱鼻衄盈盆愈後偶啖梨遂得吐證蓋肝火而胃寒也百治無效聞道吐字則應聲而嘔以故家人咸戒之後至吳門就葉氏診以其脈沉細令服附子理中湯人參薑附俱用三錢服後出門行及半里覺頭重目眩急歸寓及門而僕幸其尊人雅諳藥性謂必中附毒亟煎甘草湯灌之良久乃蘇後去附子仍服三劑吐轉劇再往診仍令服前方遂不敢試改就薛氏告以故薛用六君子湯服四劑無驗再求診適薛他往薛壻令照方加益智仁一錢再服亦不應又求診於孫某其方用甘草八錢不下咽即吐因不復求治而返偶以冬月送殯感寒增咳纏綿至夏余偶訪之則病劇詢知為向患吐近復二便俱祕已七八日不食惟渴飲茶水更醫數人或令以艾灸臍俱不應請診之見其面色青悴脈弦伏而寸上溢謂此緣脾陰大虧木火熾盛又因久嗽肺虛肝無所畏遂下乘脾而上侮胃致成關格觀此論則前胃寒二字殊無著落盡此症本由肝火沖胃胃中熱極梨之甘寒不足以勝其熱反激動其猖狂之熱非胃寒也幸脈不數易已也宜先平肝俾不上衝而吐止斯肺得下降而便行令以黃連肉桂各五分隔湯蒸服飲下覺吐稍止即能食糕數塊然二便脹不可支令以大田螺一枚獨蒜一枚搗攔罨于丹田以物系之不逾時二便俱行所下皆青色遂霍然而愈時甲戌五月二十七日也後與六味加減入沙參麥冬等咳嗽亦止向後常服養榮之劑吐不作矣雄按甲戌乾隆十九年也其時天士已歿一瓢尚在所云葉氏或天士之後人乎葉太史古渠在上江學幕中患吐證久不愈凡學使按臨之郡必召其名醫診治兩年餘更醫十數病日甚歲暮旋里或與二陳加左金吳萸川連俱用五六分服下少頃吐血碗許脈之不數第兩寸俱上魚際左尺微不應指彼欲言病源及所服方藥余曰悉知之矣第服余方五十劑乃得痊計熟地當用三斤許乃訝然莫喻問所患究何病曰彼上江名醫不過謂病痰飲耳所用方不過用四君六君已耳遂拍案笑曰一皆如言但非痰飲何以多酸苦涎沫今飲食日減何以反重用熟地曰此證由於腎虛肝失其養木燥生火上逆胃絡肺金亦衰飲食入胃不能散布通調致津液停蓄脘中遇火上衝則飲食必吐而出也四君二陳香砂類皆香燥之品以之為治猶抱薪救火反助之燃必滋水生木潤肺養金庶可獲效第陰藥性緩病既久非多劑不瘳也用熟地杞子沙參麥冬石斛等出入加減初服吐自若十劑外吐遞減食漸增果至五十劑而愈倪首善年未二十稟賦甚弱早婚得吐病或與二陳五香等劑轉甚有用桂附者服一劑覺不安乃止有教單食豬油者初頗效後亦不應脈之虛弦略數與生熟地沙參麥冬川連蔞仁四劑後去連又三十餘劑而痊高氏女七八歲時即病頭痛而嘔或酸或苦百治不效其父詢余余曰此肝火上逆耳與生地杞子沙參麥冬二三劑即愈後及笄於春盡病復作其父已歿乃兄延數醫治之所用皆二陳六郁香砂丁桂之類經半年面殺青股無肉其母泣令延余仍以前方每劑內熟地一兩二十餘劑乃愈金氏婦患吐證蓋十餘年矣所服香燥不可勝計後左脅漸痛有塊經水不行脈澀數善怒延診辭不治延不已勉與六味加減服之頗有驗然一怒即發越半年而卒福建羅二尹悔齋久病足痿於去年春嘗嘔而頭汗大出醫療無效乃不藥數月漸可隨於夏間又患不眠治亦無效至秋後乃痊今年春因公事寓杭求針科治足疾又為灸中脘氣海等穴十餘壯步稍良而嘔證大作食入即吐絶粒數日又不眠服薑附萸桂二朮二陳等覺有煙辣之氣上衝診之六脈大如箸頭兩寸皆溢出魚際舌瘦小伸之極尖且舌顫黃苔邊紅癟額色赭石鼻色熏焦小便清白大便常五日一行謂此營氣大虧肝腎之火上逆胃絡則嘔吐浮入心胞則不眠與養心湯加川連牛膝米仁囑其驗小便黃則病退一劑即不嘔能食小便果黃色二劑得眠舌苔淡紅癟消唯兩脅如有物動輒牽引加山梔川楝二劑左脅之物即墜下又加枇杷葉熟地蔞仁去山梔川楝黃連牛膝二劑右脅之物亦墜下脈亦稍斂大便二日一行以行期甚迫囑其照方服至舌不顫乃可或足疾再甚慎進風燥之劑所以云者知其針之得瀉而暫愈耳章虛谷治一七十歲老人數年前患瘧病根未除每至夏秋則發自去冬至丁亥春忽病嘔吐戰振筋脈掣痛愈後屢發或見小便黃赤大便乾少面有紅光謂是肝鬱化火火逆犯胃作嘔胃陰不足故小便黃赤大便乾少也章診之脈虛澀少神舌苔白腐而厚此中焦虛寒濁陰聚胃也以薑製半夏為君佐參苓附子乾薑生薑桂枝芍藥烏梅草果仁一劑即甚效繼去烏梅加厚朴連進十餘劑每劑附子用至三錢胃口開而病亦愈反胃常熟一富人病反胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一杯與之飲罷便覺胸快次早入寺乃夢中所見僧常以此湯待賓故易名曰甘露飲用干餳糖六兩生薑四兩二味合搗作餅或焙或曬入炙甘草末二兩鹽少許點湯服之豫在臨汀療一小吏旋愈切勿忽之繼洪淡療方本草綱目金山周禪師得正胃散方於異人用白水牛喉一條去兩頭節並筋膜脂肉煎如阿膠黑片收之臨時旋炙用米醋一盞浸之微火炙乾淬之再炙再淬醋盡為度研末厚紙包收或遇陰濕時微火烘之再收遇此疾每服一錢食前陳米飲調下輕者一服立效凡反胃吐食藥物不下結腸三五日至七八日大便不通如此者必死用此方十痊八九君子收之可濟人命也普濟方本草綱目天順間有周岐鳳者身兼百技溺意方術既死友人偶召乩周至運乩如飛頃刻數百言乃長詩也後一段云朗吟堂前夜欲闌丹方寫與期平安菊莊老人此老病翻胃病實由胃寒枇杷葉兮白豆蔻紫蘇子兮用莫謬良薑官桂用些須厚朴陳皮看功奏半夏檳榔赤茯苓沉香丁香皆用輕白芥藿香吐聖藥杵頭粳兮尋至誠三片生薑兩枚棗切切分明向君道人參乃是佐使者食前一服沉疴好蓋菊莊患此病用示以方也第菊莊未知何許人余詩不録祝子志怪薛立齋治一婦人患反胃胸脅脹悶或小便不利或時作痛小便澀滯曰此肝火血虛也當清肝火生肝血養脾土生肺金以薛言為迂別服利氣化痰等劑前證益劇虛證蜂起乃用加味逍遙散加味歸脾湯一服尋愈一婦人患反胃吐痰甚多手足常冷飲食少思曰此肝脾鬱怒兼命門火衰不信另服化痰利氣之劑胸腹愈脹又服峻利疏導之劑薛曰非其治也必變脾虛發腫之證急服金匱加減腎氣庶有可救仍不信反服沉香化氣等丸果發腫而故汪石山治李一之年近四十病反食與近鄰二人脈病頗同汪曰二人者皆急於名利惟一之心寬可治遂以八珍湯減地黃加藿香為末用蜜韭汁調服而愈其二人逾年果歿張路玉治湯伯乾子年及三旬患嘔吐經年每食後半日許吐出原物全不穢腐大便二三日一行仍不燥結渴不喜飲小便時白時黃屢用六君子附子理中六味丸皆罔效日瀕於危診之兩尺弦細而沉兩寸皆澀而大此腎臟真陽大虧不能溫養脾土之故遂以崔氏八味丸與之或謂附子已服過二枚六味亦曾服過恐八味未能奏效也張曰不然此證本屬腎虛反以薑附白朮伐其腎水轉耗真陰至於六味雖曰補腎而陰藥性滯無陽則陰無以生必於水中補火斯為合法服之不終劑而愈張三錫曰治反胃用新水一大碗留半碗將半碗水內細細澆香油鋪滿水面然後將益元散一帖輕輕鋪滿香油麵上須臾自然沉水底此即陰陽升降之道也方即靈活可法用治實症當有效但香油卻最容易引吐用者審之用匙擾勻服卻將所留水半碗蕩藥碗漱口令淨吐既止卻進丹溪涼膈散通其二便未效再進一帖益元及涼膈即效也此方極驗王叔權曰有人久患反胃豫與震靈丹服更令服七氣湯遂立能食若加以炷艾尤佳有老婦患反胃飲食至晚即吐出見其氣繞臍而轉豫為點水分氣海並夾臍邊兩穴他醫只灸水分氣海即愈神效資生經浙省平章南征閲越還病反胃醫以為可治朱先生診其脈告曰公之病不可言也即出獨告其左右曰此病得之驚後而使內火木之邪相挾氣傷液亡腸胃枯損食雖入而不化食既不化五臟皆無所稟去此十日當死果如其言越遊集醫説續編薛立齋治一婦人患反胃胸膈痞悶得去後或泄氣稍寬此屬脾氣鬱結而虛弱也當調補為善不信乃別用二陳枳實黃連之類不應又用香燥破氣時師類多出此前證益甚形氣愈虛用歸脾湯治半載而痊許學士治一婦人年四十餘久患翻胃面目黃黑歷三十餘年醫不能效脾腧諸穴燒灸交遍其病愈甚服此藥頓然全愈服至一月遂去其根方名附子散用附子一枚極大者坐於磚上四面煮火漸漸逼熟淬入生薑自然汁中再用火逼再焠約盡生薑汁半碗焙乾入丁香二錢每服二錢水一盞粟米少許同煎七分不過三服瘥王海藏云趙侍郎先食後吐目無所見耳無所聞服紫菀丸五十日瀉出青蛇五七條四寸許惡膿三升愈方見癘風門蕭萬與曰崇禎戊寅歲余客汴梁為一郡王宮人治産後發厄證因言及先王壯齡時患瘧痢反胃遍治不瘥自料無生理一草醫亦精於脈者連投五劑用大黃七兩始能食此亦常有之症吾鄉有患痢者醫以大黃四兩下之見者皆驚愣然服之痢反減數服而愈使此等證遇讀立齋景嶽書者詎有生理乎再投十餘劑計服大黃斤許前證漸愈後日服痰藥滾痰丸兩旬方得全痊越年餘連生五子壽至九十三歲而薨如此稟賦亦所不概見者
