body:
  text: 卷二十三經水徐靈胎曰婦人之疾與男子無異惟經期胎産之疾不同且多癥瘕之疾其所以多癥瘕之故亦以經帶胎産之血易於凝滯故較之男子為多故古人名婦科謂之帶下醫以其病總屬於帶下也凡治婦人先明衝任之脈衝脈起於氣街在毛際兩旁並少陰之經挾臍上行至胸中而散任脈起於中極之下臍下四寸以上毛際循腹裡上關元又云衝任皆起於胞中上循背裡為經脈之海此皆血之所從生而胎之所由系也明於衝任之故則本原洞悉而後其所生之病千條萬緒可以知其所從起更參合古人所用之方而神明變化之則每症必有傳受不概治以男子泛用之藥自能所治輒效矣至如世俗相傳之說如産前宜涼産後宜溫等論夫胎前宜涼理或有之若産後宜溫則脫血之後陰氣大傷孤陽獨熾又瘀血未淨結為蘊熱乃反用薑桂等藥我見時醫以此殺人無數觀仲景於産後之疾以石膏白薇竹茹等藥治之無不神效或云産後瘀血得寒則凝得熱則行此大謬也凡瘀血結凝因熱而凝者得寒降而解因寒而凝者得熱降而解如桃仁承氣湯非寒散而何未聞此湯能凝血也蓋産後瘀血熱結為多熱瘀成塊更益以熱則煉成乾血永無解散之日其重者陰涸而即死輕者或堅痞褥勞等疾惟實見真屬寒氣所結之瘀則宜用溫散故凡治病之法不本於古聖而反宗後人之邪說皆足以害人諸科皆然不獨婦科也裴兆期治一婦頭眩耳鳴肉瞤筋惕恍惚不得寐乍作乍止半載矣後乃阻經四月小腹如懷孕狀醫疑其妊而安之忽一日下紫黑血少許始知為經閉改用通經藥數劑腹不減反增噁心嘔噦粥飲下咽旋即越出咽喉焦痛舌黑無津醫不知何故裴診之六脈弦細而滑兩關尤甚曰頑痰閉滯血海壅瘀月事乃阻耳其脈細而滑者痰脈也頭眩耳鳴恍惚者痰證也嘔吐不食者痰客中焦也舌黑無津咽喉焦痛者痰生熱也經謂治病必求其本今病本於痰必以治痰為首務遂投滾痰丸八十粒不動再投七十粒小腹微痛次日又服如數小腹痛不可忍將夜半下如豬肝者四五塊每塊幾盈尺更下如破絮脂膜者無數又纍纍若石榴子紅白攢綴連絡而下者不啻二三斗小腹頓平痛亦如失最異者吐痰碗許俱如緑草汁色口角流涎不斷如琴絃之堅丹溪謂怪病是痰十居八九良然時胸次未平飲食少進用橘紅茯苓各一錢枳實黃連半夏曲各八分水煎入薑汁二匙竹瀝半酒杯二劑後以六君子湯加減更服加味潤下丸調理百餘日而愈逾年生一子沈堯封曰素問云二陽之病發心脾有不得隱曲女子不月其傳為息賁者死不治二陽指陽明經言不指臟腑言二陽之病發心脾者陽明為多血之經血乃水穀之精氣藉心火煅煉而成憂愁思慮傷心困及其子不嗜飲食血無以資生陽明病矣經云前陰總宗筋之所會會於氣衝而陽明為之長故陽明病則陽事衰而不得隱曲也太衝為血海並陽明之經而行故陽明病則衝脈衰而女子不月也又寇宗奭曰童年情竇早開積想在心月水先閉蓋憂愁思慮則傷心心傷則血耗竭故經水閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作則水氣竭故四肢干木氣不充故多怒髮鬢焦筋痿五臟以次傳遍故不卒死然終死也比於諸證最為難治按此條亦從金匱虛字內分出但所願不遂相火必熾非補水無以制之六味地黃丸湯補陰瀉陽固是妙法然脾虛食減尚嫌地黃膩膈炒枯可也不然以女貞子易之雄按此證最難治六味礙脾歸脾助火惟薛一瓢滋榮養液膏加小麥大棗遠志庶幾合法一瓢又有心脾雙補丸亦可酌用滋榮養液膏方女貞子廣陳皮干桑葉大熟地旱蓮草白芍藥黑芝麻枸杞子甘菊花當歸身黑穭豆玉竹南燭葉白茯神沙菀蒺藜炙甘草以上十六味前十四味各四兩後二味各二兩天泉水桑柴火熬膏收入真阿膠三兩煉淨白蜜三兩瓷瓶收貯每日卯時挑服五六錢開水送下心脾雙補丸方人參元參五味子遠志肉麥冬茯神酸棗仁柏子仁於潛朮川貝母生甘草苦桔梗丹參生地川黃連制香附上為末用桂圓肉熬膏代蜜搗丸如彈子大硃砂為衣每晨嚼服一丸開水送下沈堯封治一婦熱多寒少譫語夜甚經水來三日病發而止本家亦知熱入血室用小柴胡數帖病增舌色黃燥上下齒俱是乾血沈用生地丹皮麥冬等藥不應藥入則乾嘔脈象弱而不大因思弱脈多火胃液乾燥所以作嘔遂用白虎湯加生地麥冬二劑熱退神清惟二十餘日不大便與麻仁丸三服得便而安一室女發熱經水來醫用表散藥增劇譫語夜甚投小柴胡湯不應夜起如狂或疑蓄血投涼血消瘀藥亦不應左關脈弦硬鼓指詢知病從怒起因用膽草黃芩山梔丹皮羚羊角蘆薈甘草歸身等藥一劑知四劑愈張儀表令愛發熱經水來昏夜譫語如見鬼狀投小柴胡湯增劇詢其病情云醒時下體惡寒即憒時亦嘗牽被斂衣因語此證平素必患帶下且完姻未久隱曲之事未免過當復值經水過多精血兩虧陰陽並竭其惡寒發熱由陰陽相乘所致非外感邪熱深入也投發散清熱證同亡陽傷寒論云亡陽則譫語內經云脫陽者見鬼是也用腎氣丸早晚各二錢神氣即清隨以蓯蓉易桂附數劑全愈參香八珍膏丹參去頭尾酒洗蒸熟四制香附各四錢熟地炙黃耆白芍酒炒蒸熟白朮白歸身酒炒茯苓各三兩八味熬膏每服三錢開水調下薛一瓢曰此女方調理方之首選也氣味和平功能相稱虛人可以久服青附金丹治婦女癥瘕青皮四兩用硝石五錢化水浸香附四兩童便浸鬱金二兩用生礬五錢化水浸丹參二兩薑汁浸四味研細末醋丸麻子大曬乾灑上阿膠水搖令光澤再用人參當歸川芎各一兩白朮茯苓製半夏各二兩陳皮炙草各五錢研極細末以米飲泛在光澤小丸上作外廓曬乾每服三錢開水下此薛一瓢方緣虛弱人患癥瘕痃癖有形之病不可任施攻下故用此為緩消之計其妙在以六君芎歸為外廓使藥入胃將不知有攻削之味而胃氣不傷逮其漸化則對症之藥已至病所俾病去而正不傷誠女科要方也五香丸治同上五靈脂一斤香附一斤水浸一日黑牽牛白牽牛各取頭末二兩上四味一半微火炒熟一半生用共研細末和勻醋糊為丸萊蔔子大每服七八分或一錢臨臥薑湯下次早再一服即愈孕婦忌服小兒減半五靈脂破瘀生新香附調氣舒郁牽牛開結行痰逐飲通水合為消症散癖之方不為不峻然每服錢計用治實證尚為善藥即痰積食積氣滯成症蠱膈腫脹實痢初起審屬痞聚在腹有形攻痛之證皆可治之虛人或以六君子加歸芍作煎劑送服亦可王氏云一婦人有女年十五請診言女年十四時經水自下乃忽斷其母甚恐怖師曰此女為是夫人親女非也若親女者當相為說之婦人因答言是自女爾師曰所以問者無他夫人年十四時亦以經水下所以女至此而斷是為避年勿怪後當自下東垣十書張子和曰一婦人年二十餘歲病經閉不行寒熱往來咳嗽潮熱庸醫禁切無物可食一日當暑出門忽見賣涼粉者冰水和飲大為一食頓覺神清骨健數月經水自下雄按世人但知血寒則凝而不知血熱則結也滑伯仁治龍君澤室人暑月中病經事沉滯寒熱自汗咳嗽有痰體瘦癢臍腹刺痛脈弦數六至有餘曰此二陽病也素問云二陽之病發心脾女子得之則不月二陽陽明也陽明為金為燥化今其所以不月者因其所遭也陽明本為燥金適遭於暑暑火也以火爍金則愈燥矣血者水類金為化源宜月事沉滯不來也他醫方制歸茸桂附丸以溫經而未進滑曰夫血得寒則止得溫則行熱則搏搏則燥復加燥藥血益干則病必甚亟令卻之更以當歸柴胡飲子為清金瀉火流濕潤燥三五進而經事通余病悉除龍君曰微生幾為人所誤也薛立齊診一室女年十七癧久不愈天癸未通發熱咳嗽飲食少思欲用通經丸薛曰此蓋因稟氣不足陰血未充故耳但養氣血益津液其經自行彼惑於速效仍用之薛曰非其治也此乃慓悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛後果經血妄行飲食愈少遂致不救一婦人素有胃火或用涼胃散而安後因勞役燥渴內熱肌肉消瘦月經不行薛謂此胃火消鑠陰血用逍遙散加丹皮炒梔以清胃熱用八珍湯加茯苓遠志以養脾血而經自行矣一癧婦少寐經水兩月餘一至誤服通經丸展轉無寐午前惡寒午後發熱薛以為思慮虧損脾血用歸脾湯作丸午前六君送下午後以逍遙散送下兩月餘得寐半載經行如期年餘而瘡愈龔子才治魏憲副妻患逆經吐血不止六脈微澀有力此血虛火盛也以四物去熟地用生地共二兩加酒蒸大黃一錢錢刻本作兩疑誤同煎入童便服之服後血止而經通徐憲副妾患經閉人皆疑有孕七八月來漸覺黃瘦腹中左右塊如鼓發熱面赤不思飲食診之六脈微澀此血枯氣鬱也以四物湯加香附丹皮白朮之類白朮何以加入十數服又加桃仁紅花數服下血塊多許乃愈孫文垣治吳北海內人每月經期之前四肢纍纍發塊紅紫脹痛不思飲食胃脘亦常痛肝火上逆經水多不及期而至肝火下迫脈之兩手皆駛以症參觀肝脾二經鬱火也蓋肝主怒脾主思多思多怒隱而不發鬱滯於中故臨經纍纍發紅腫於四肢也脾主四肢以青皮香附柴胡川芎烏藥白芍丹參元胡索鬱金酒炒黃連梔子治之而愈青皮烏藥宜酌用潘氏媳因經水不行醫投安胎之劑越七日經忽暴至內有血塊筋膜如手大者一二塊昏冒困憊其脈右關洪滑左寸洪數兩尺皆洪大夜分咬牙亂語狀如熱入血室手心熱口噤手足皆冷心胸脹悶不快面色青孫曰此濁痰流滯血海以誤服安胎之劑益加其滯由血去多故神魂無定痰迷心竅故神昏亂語急為調氣開痰安神養血可生也即以溫膽湯加石菖蒲酒芩天麻棗仁丹皮與服其夜子丑時咬牙亂語皆減半仍與前藥每帖加竹茹五錢臨睡又與黑虎丹數粒諸症悉愈或問病每盛於夜半何也曰此心包絡與膽經有痰熱故也專治此兩經痰既消神魂自安矣程好吾子婦腹中微疼經行不暢喉痛四肢麻木作脹不知飢餓孫診之右脈洪大如豌豆以川芎香附麥芽山楂烏梅甘草桔梗酒芩防風荊芥白朮茯苓四劑而安次月經水大行十日不止以黃耆阿膠蒲黃各一錢白芍二錢甘草三分一帖而安此後但覺濁氣下墜屁從子戶中出即陰吹病以補中益氣湯用酒炒黃連調養而平胡氏女及笄後患吐血每吐碗余下午倦怠夜分潮熱嘔惡不食便祕時師謂陰虛火動投滋陰之劑反加飽悶背心脹痛脈之兩寸洪大兩尺弱知其有瘀血凝滯致新血不得歸經故滿而倒溢也先以龍薈丸通之更以石膏橘紅半夏神麯黃連茜根竹茹枳殼各一錢茯苓八分甘草三分服後大便行三次吐止食進後用二陳湯加滑石丹參丹皮茜根白芍香附二十帖經調而愈此吐血亦經逆也當與龔子才治魏憲副妾案參閲雄按今春余治朱生甫五令媳患證與此略同醫皆作損治廣服滋陰之藥反咳嗽便溏臥床已匝月矣余用沙參丹參竹茹石斛滑石茜根海螵蛸桃仁絲瓜絡葦莖茅根蛤殼治之愈矣喻嘉言治楊季登長女及笄經閉年餘發熱食少肌削多汗而成勞怯醫見汗多誤謂虛也投以參術其血愈錮喻診時見汗出如蒸籠氣水謂曰此症可療處全在有汗蓋經血內閉止有從皮毛透出一路以汗亦血也設無汗而血不流則皮毛乾槁而死矣宜用極苦之藥以引其血入內俾下通於衝脈則熱退經行而汗自止非補藥所能效也以龍薈丸日進三次月餘經止汗熱稍輕前丸日進一次又一月大至淋漓五日症全瘳矣王肯堂治一婦寡居鬱結成疾經事不行體熱如炙忽吐血若泉湧或用止血藥不效令以茆花根搗汁濃磨沉香服至五錢許日以釅醋貯瓶內火上炙熱氣熏兩鼻孔血始得降下吐血不復作經事乃行此亦逆經症雄按沉香豈可服至五錢不若以童便桃仁醋製大黃下之呂東莊治曹遠思內人月水不至四月矣腹痛不止飲食少進醫作胎病治呂曰此鬱血也然氣稟怯弱當補而行之用八珍湯三大劑果下血塊升許腹痛猶未除也以大劑養榮等藥調理而痛除食進與立齊一案略同黃履素曰豫媳申氏多鬱怒忽患不月腹漸大疑有妊醫者視之亦以為妊也十餘月弗産諸症漸見乃始疑之醫者亦以為蓄血之症時有欲下之者衆議以為體弱不能勝止可暗消於是久用行血調血之劑而不敢用下血之藥竟勿效厥後醫藥雜投遂致不起一日偶閲震澤紀聞載盛啓東治宮妃一案大為悔悼案載江篁南名醫類案血門南山婦人年三十八於九月二十三日月經行比前過後十日得草藥以敗血海為下胎之謀數服血下因此腹痛小腹下有塊如碗大不可按湯尉則痛稍定大小便抽痛小便澀大便略下少赤積垢食不進口略渴發熱此胃氣為草藥所敗加以受傷之血妄行而不得泄所以為病砂仁甘草川芎黃芩各三分滑石一錢五分牛膝二錢桃仁七粒水酒煎服黃師文治子才婢子得面熱病每一面熱至赤且癢悶絶曰此經候來時嘗為火所逼也問之曰無之已而思曰昨者經候來適為孺人黏衣服傴僂曝日中其昏如烈火炙以孺人趣其物不敢已由是面遂熱黃曰是也以四物湯加防風獲瘥孫文垣治一婦經不行者三月大便瀉腹脹嘈雜吐酸水時下白帶常噁心自謂有孕脈之曰此脾經有濕熱心經有瘀血也與二陳湯加白朮澤瀉豬苓酒連茱萸滑石麥芽山楂瀉止脹寬經行腰腹作痛以川芎三錢當歸五錢香附丹參桃仁各一錢服之口中吐黑血甚多且有如膿者改用四物湯加丹皮丹參桃仁紅花滑石調理而痊從孫婦程氏年甫三旬産五次今則經閉不行者八年肌肉則豐肥於昔飲食又倍於昔精采則豔美於昔腹柔不堅略無所謂病者或用四物湯元胡丹皮之劑千餘服矣至三稜莪朮乾漆桃仁蘇木之類遍嘗不應診之六脈緩大有力曰此脾濕生痰脂滿子宮徒行血活血破血無益也以平胃散加滑石桃仁黃連薑黃丹參南星半夏作丸服之半年而經行次年生子後又連生一子一女雄按此等證如脈平和者不必服藥薛立齊治一婦人性善怒發熱經水非過期則不及肢體倦怠飲食少思而顫振此脾氣不足肝經血少而火盛也午前以調中益氣湯加茯苓貝母送六味丸午後以逍遙散送六味丸兩月餘而愈一婦人年五十內熱晡熱經水兩三月一至此血虛有熱用逍遙散加山茱萸治之而愈後有痰作渴或小便不調或頭暈白帶用六味而安琇按五十之年經宜止矣此不當在經水血虛之門或五字乃四字之訛耳一婦人月經不調晡熱內熱飲食少思肌體消瘦小便頻數或用清熱生血之劑月經不行四肢浮腫小便淋瀝朝用金匱加減腎氣丸夕用歸脾湯漸愈又用八珍湯兩月全愈陸養愚治董龍山夫人胸膈不舒大便不實或時去血或時去積經期或先或後或多或少參差作痛養血健脾俱不效飲食既少肌肉亦瘦晚不能食食則飽脹不能安臥脈之沉弦而滑右關尤甚曰沉為氣滯弦為留飲滑為痰凝經之不調便之不實腹之脹痛皆痰積為之也乃合清氣化痰丸二陳湯送下數劑大便去痰積若干遂不脹不疼改用六君子湯數劑而大便堅後以調氣養榮湯間服經調而孕施鳳岡室人素嗜五辛三孕皆不育年三十即月事不行將及二載胸腹作痛行走無定或數日一發或一日二三發服養血行血之藥身體時熱肌膚漸瘦或謂補血不補氣無陽則獨陰不生用參耆白朮肉桂芎歸數劑痰中見血便燥兼血脈之兩手舉按皆數左關散而弦右關數而實兩尺數而沉澀曰此血虛不待言然脈症皆火象也惟清其熱則血得所養而經自行矣或謂寒則凝熱則行今以清火療血閉何也曰寒凝熱行者蓋謂無大病者言之也經不云乎二陽之病發心脾有不得隱曲女子不月其傳為風消傳為息賁者死王太僕曰二陽胃與大腸也二經有熱心脾受之以致消肌爍肉上氣喘逆今病者素嗜辛辣豈非腸胃有熱乎今已移之心脾月久不行肌肉消削是傳為風消幸不喘咳未至息賁耳復投溫熱是抱薪救火經所謂贊其復翼其勝也法當先清脾胃積熱使心氣下降績以養血滋陰濟之則水泉通而流不絶也用三黃湯加山梔丹皮生地白芍十劑痰紅便血俱減更以前方加芎歸十劑而月事通矣後以六味丸料加知柏紫河車一具服之即孕陸祖愚治吳君採室平日血虛有火生一女已七歲不再孕忽經候兩月不行以為孕也偶胸腹不快投安胎養血之劑反小肚作痛經行如崩去血多而痛不止足膝逆冷氣短奄奄或以為小産用芎歸元胡薑桂等血不止而痛愈甚咽喉燥痛吞吐有妨脈之沉細而實按之有力用炒蓮白芍丹皮花粉當歸炒梔楂肉阿膠煎令徐徐吞下次早喉腹之痛俱愈足膝反溫暖後用歸芍參苓地黃丹皮木香以行其滯而漸愈一婦經後凝血成塊在左泄瀉不止完穀不化血塊暴下如注臭穢難堪經候不調脾胃因而下損且經漏不止前陰之氣血已脫泄瀉不止後陰之氣血下陷總是熱症而下焦久脫亦化於寒矣瀉寒以熱瀉濕以燥宜大升大舉以助肝木生髮升長遂以柴胡升麻各五分炙草陳皮歸身黃耆各一錢人參神麯各錢半白朮二錢黃芩少許進二帖水煎熱服而愈一婦經水不調未來先痛行後又痛用人參炙草川芎肉桂丹皮酒洗各五錢白朮茯苓各一兩半當歸酒洗白芍酒炒益母草酒洗蜜拌各一兩白芷木香各三錢糊丸一婦人經前作痛且有白帶用十全大補湯加元胡索益母草木香而安張路玉治薛氏婦每經行必先作瀉二三日其脈左關尺弦細如絲右關上小駛而滑服薑桂萸附則大渴泄瀉轉劇服苓澤車前則目暗如盲此肝血虛寒而脾胃有伏火也俟經將行作瀉時朝用理中加黃連作湯服五六劑暮與加減八味丸加紫石英作丸常服不終劑而數年之疾頓除立齊治一婦人晡熱肢體瘦倦食少無味月經不行或鼻衄或血崩半載矣或用順氣清熱止血等劑不應更加寒熱且時欲作嘔此為鬱怒虧損脾胃虛火錯經妄行而然耳遂朝用補中益氣湯夕用六味地黃丸各數帖半載而痊一婦人素沉靜晡熱內熱月經不調後每一二月或齒縫或舌下或咽間出血碗許如此年餘服清熱涼血調理之藥益甚此肝脾氣鬱血熱上行先用加味歸脾湯後用加味逍遙散攝血歸源而經自調前症頓愈陳自明治一婦人月經過期不至腹內作痛服破血行氣之劑不效與神仙追毒丸一粒服之而瘥方見蠱門立齊治一婦人因經水多服澀藥止之致腹作痛以失笑散二服而瘳五靈脂蒲黃俱炒等分每服二三錢醋一合熬成膏入水一盞煎七分食前熱服又用加味逍遙散數劑而經調一婦人經水不調兩月一至或三月一至四肢微腫飲食少思日晡發熱此脾土氣血皆虛也須先用壯脾胃養氣血之劑飲食進則浮腫自消氣血充則經自調矣彼以為緩乃用峻劑先通月經果腹疼瀉不止致遍身浮腫飲食愈少歿於木旺之月褚氏云月水不通久則血結於內生塊變為血瘕亦作血症血水相併壅塞不通脾胃虛弱變為水腫所以然者脾候身之肌肉象於土土主克於水水血既並脾氣衰弱不能克消致水氣流溢浸漬肌肉故腫滿也觀此豈宜用克伐之劑有女人月事退出皆作禽獸之形欲來傷人先將綿塞陰戶乃頓服沒藥末一兩白湯調下即愈奇疾方朱丹溪治一婦人積痰經不行夜則譫妄以栝蔞子一錢黃連半錢吳茱萸十粒桃仁五個紅曲末些少砂仁三錢山楂一錢上末之以生薑研炊餅丸治法一婦人陰虛經脈久不通小便短澀身體疼痛以四物湯加蒼朮牛膝陳皮生甘草又用蒼莎丸加蒼耳酒芍為丸煎前湯送下同上一婦人兩月經不行腹痛發熱但行血涼血經行自愈用四物湯加黃芩紅花桃仁香附元胡索之類同上一婦人寡居經事久不行腹滿少食小腹時痛形弱身熱當歸酒浸熟地姜炒香附各一錢白芍川芎陳皮各七分半黃柏炒知母炒厚朴薑製元胡索半錢白朮二錢生甘草大腹皮各三錢紅花豆酒浸桃仁九個上㕮咀水煎同上陳良甫治羅姓女人每遇經行時則臍與小腹下痛不可忍服藥無效以桂枝桃仁湯愈自後再發一投而瘥桂枝白芍生地黃各二錢桃仁七枚去皮尖甘草一錢姜水煎大全良方立齊治一婦人性沉多慮月經不行胸滿少食或作脹或吞酸以為中氣虛寒用補中益氣加砂仁香附煨姜二劑胸膈和而飲食進更以六君加芎歸貝母桔梗生薑大棗數劑脾胃健而經自調矣一婦人因怒傷不思飲食發熱倦怠骨肉痠疼羸瘦而黃經水積漸不行頸間結核以逍遙散八珍湯治之少可彼自誤服水蛭等藥血氣愈虛遂致不起良甫云憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水閉火既受病不能榮養其子故不嗜食子虛則金氣虧故咳咳則水氣絶木氣不充故四肢干又云經候微少漸漸不通手足骨肉煩痛日漸羸瘦潮熱其脈微數此由氣虛血弱陽往乘之少水不能滅盛火故火逼水涸亡津液當養血益陰用柏子丸澤蘭湯為主勿遽通之錢國實曰吳江黃啓元妻劉氏生平潔淨自十七行經每年一度生二子一女又武林陳氏媳每季行經一次七年方受一胎生二子二女皆嘗診治之此婦稟賦之異非按月而行之徐孟陽母葉氏八九經仍不斷體厚無病然甚憂之以問錢錢曰經云陰生於陽陽之數七故婦人七七經斷無子汝母稟厚之極經出理之外矣後壽至九九而終雄按余治許培之大母年逾七秋泛水仍行亦血氣充盈而非病也後壽亦逾大耋錢國賓云余遊蘭溪時逢端陽友人宴於花園談及邑中篾匠孫二之妻年三十生四子一女自來無經余以戲言未信適婦貨籃至客皆笑曰此婦是也余即問之婦云不知經為何物夫婦人經候經者常也候者候一月之陰陽也若潮候應乎天時真氣相與流通所以女子二七天癸至月水如期凡女人受孕經止者平日所生氣血以養積而為經血熱則經早血少則經遲血盛則七七仍經血衰則五七外經止受孕則所生氣血皆以養胎胎生血上為乳乳止血下為經元門採真退經為乳兩說則經乳一耳經本於腎旺於衝任二脈沖為血海任為胞胎此婦無經者乃衝脈與人稟賦不同任脈與人乳子則一樣素問曰人之心偏則作事不定人之下眼眶窄則膽小五臟各有稟賦外候以此理推自明嘗觀書云人之道根深厚者其元關堅固男子則不易輸泄女子則月事行此皆久修苦煉之徒功行未成復生人道而仗宿世修養之力故稟賦之厚不與常人同此說最為有理錢公反復說究未指明其所以然殊為可笑蔣仲芳治姚生婦年二十五其月事或半年或三月方得一至溫補調治二載轉劇診之脈來微澀外症口乾唇燥手足心熱曰後期古法主寒然其兼症熱也因熱耗血血少故後期耳遂用大劑生地當歸為主佐以條芩山梔白芍川芎丹皮澤蘭知母鱉甲六劑後則經准一月後而孕矣雄按古法難執豈經遲一證為然乎醫者宜究心焉魏玉橫曰徐德滋女年近二十素有脅痛肝病常時月事先期而至近忽逾數日脈之兩關躁疾兩寸上溢察其面有如疹者數十點其色或青或紫詢其身亦有至舌上亦有數點絶類陽氣熱症然並無頭痛寒熱且能進飯二甌良由肝火內熾上乘肺胃而然與生地杞子麥冬丹皮山梔當歸生芍甘草元參令服一劑次日晡後始至見其偃臥上半俯著床沿嘔血盆許詢之則自巳牌血出如湧既而心下若有一塊上攻故必偃伏以床沿抵住稍可否則上頂悶絶脈之若有若無意其經水過期乘肝火上逆而出即俗之倒經是也然其急暴如此兼之地氣上攻其症危矣非大劑純陰何以挽回與熟地二兩杞子一兩令連進二服服下即能仰臥血止脈回次日忽咳嗽無痰此肺金燥而肝火未平也前方減半加麥冬沙參蔞仁生地八劑而愈愈後面上之疹乃消舌上之疹褪下如痘靨云又顧卜周內人失血奄奄垂斃亦以前藥數劑而愈雄按水火風皆地氣也薑附白通治地中水氣上逆以陽剛之品掃除濁陰也此症風動火升故以純陰之品鎮息為治也範氏女年及笄矣忽病夜臥小便自遺晨起昏昏如醉神氣與人了不相當晡後漸清爽皮膚癮疹胸膈迷悶食亦少初起覺咽痛頭暈已十餘日矣診之脈弦小而數此屬血虛火盛詢其天癸云何則自前月大行去血甚多至七日乃已謂為肝木過盛克脾侮胃乘肺而然克脾則脾不攝血故經水去多侮胃則胃之絡溢故脹悶食減乘肺則肺熱故癮疹咽痛又肝藏魂肺藏魄二臟不和是以小便自遺而神氣昏昧也與生地杞子羚羊角黑山梔麥冬蔞仁黃連丹皮沙參牛蒡之屬出入加減六帖而安後經水數月不行則以前者去血過多也仍用生地杞子當歸白芍丹皮麥冬少加紅花八劑而月事下熱入血室孫文垣治李氏婦胸脅大腹作痛譫語如狂寅卯辰三時稍輕午後及夜痛甚病在血分原有痰火頭疼牙疼之疾又因經行三日後頭痛發寒熱醫以瘧治因大惡熱三四人交扇之以兩手浸冷水中口含水而不咽鼻有微衄熱在經絡又常自悲自哭如狂痛時欲奔竄劇則咬人蛔厥小水直下不固肝熱喉哽哽吞藥不下脈之左弦數右關洪滑曰此熱入血室也誤服治瘧剛燥之劑擾動痰火以致標本交作其胸脅痛者病屬少陽也劇則咬人者蟲行求食而不得故常覺喉中哽哽然也以小柴胡湯加桃仁丹皮而譫狂減次日與安蛔湯痛止飲食進而愈矣元素侄婦春溫後經水適止餘熱不退口中甚渴胸脅痛而耳重聽少陽脈左弦數右滑大而數小柴胡加石膏知母桔梗枳殼葛根栝蔞半夏神麯服下熱渴如舊改用柴胡二錢人參甘草天花粉黃芩小柴胡湯去半夏加天花粉以血家忌半夏也白芍紅花當歸丹皮知母各八分調理而瘳此症無譫妄發狂然以涼解不應必用諸血藥乃應則仍是熱入血室者矣雄按本方渴者去半夏加栝蔞根不但為血家所忌也況此證並非血虛而仍用行血之藥乎繆仲淳治張璇浦內人患熱入血室發狂欲殺人醫以傷寒治之煎藥未服邀繆往繆曰誤矣覆其藥投一劑而安先與童便心主熱邪從血分上乘於心故發狂先與童便引熱下行最為元解繼與涼血行血安心神藥遂定朱氏婦經行一月不止每黃昏先寒後熱遍身疼痛胸膈脹悶必得大喊叫嘶用手探吐痰涎乃寬且渴甚此痰飲瘧疾今飲食不進夜如見鬼者乃熱入血室也用小柴胡加生地丹皮桃仁兩帖後以白朮三錢陳皮麥芽各一錢烏梅一個姜三片水煎服之寒熱止諸症皆安陸養愚治臧堯山夫人向有頭風症八月間患腹痛日輕夜重痛作昏憒語言不倫唇口燥裂而不欲湯飲已十日或投香燥行氣益甚身熱如火飢不能食脈之沉數而弦詢之適經行時感冒自發寒熱頭大痛平日服川芎茶調散今服之頭痛稍止而身熱更甚遂變為腹痛再問經行如常否謂比平素覺微快曰此必熱入血室也或謂此傷寒症乎曰豈必傷寒而後熱入血室哉凡病未有無客熱者況初得之感冒因頭痛而以茶調散遏之熱無從泄遇經行血室空虛熱乘虛而入因以成瘀血瘀下焦飲食不進而作痛亦勢使然也用小柴胡以清其勢丹皮紅花桃仁以去瘀人參麥冬生津止渴二劑神清痛減能食日服二劑兩日後送潤字丸一錢大便去硬血數枚痛全愈減桃仁紅花加歸芍調理而安薛立齊治一婦人多怒手背患瘡出血至夜發熱妄語服清心涼血藥不應乃熱入血室而然也遂以加味小柴胡湯二劑血止而熱亦清矣崩漏薛立齊治一婦人性急每怒非太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之症肝自病則外症見土受克則內症作先以四物加白朮茯苓柴胡梔子炒龍膽清肺養血次用四君加柴胡白芍神麯吳茱萸炒黃連以培土製肝漸愈惟月經不止是血分有熱脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣湯加酒芍兼服而愈一婦人懷抱不舒腹脹少寐飲食素少痰涎上湧月經頻數薛曰脾統血而主涎此鬱悶傷脾不能攝血歸源耳用補中益氣濟生歸脾而愈一婦人血崩兼心痛三年矣諸藥不應每痛甚虛症悉具面色萎黃薛曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參術倍之三十餘劑稍愈百餘劑乃全愈大尹王天成之內久患崩自服四物涼血之劑或作或輟因怒發熱其血不止服前藥不應乃主降火更加脅腹大痛手足俱冷薛曰此脾胃虛寒所致先用附子理中湯體熱痛止又用濟生歸脾補中益氣二湯崩血漸愈若泥痛無補法則誤矣錦衣楊永興之內患血崩過服寒涼之劑其症益甚更加肚腹悶痞飲食不入發熱煩躁脈洪大而虛薛曰此脾經氣血虛而發躁也當急用八珍湯加炮姜以溫補之緩則不救不信仍服止血降火之劑虛症蜂起始信其言緩不及治矣一婦人因怒崩血久不已面青黃而或赤此肝木製脾土而血虛用小柴胡合四物清肝火生肝血又用歸脾補中二湯益脾氣生肝血而瘥此症若因肝氣風熱而血不寧者防風為丸以兼症之藥煎送或肝經火動而血不寧者炒條芩為丸以兼症之藥送下若瘀血為患用五靈脂為末燒鐵器焠酒調服無不效者周暉內人病血大崩諸醫皆危之劉春齊用當歸一兩荊芥一兩酒一鍾水一鍾煎服立止如神續金陵瑣事易思蘭治一婦患崩晝夜十餘次每次去血升許用止血藥愈甚臥床月餘羸瘦食少面青爪黑氣促痰喘診之心脈平和肝脈弦大時一結肺脈沉而大且有力脾胃脈沉澀兩尺沉而無力曰此氣鬱病也詢之果因午餐小婢忤意發怒構疾隨以四神散與之蘇梗五分甘草三分撫芎三分白芷五分加當歸二分白朮三分神麯三分香附一錢烏藥一錢服藥半盂未及一時頓覺神爽易曰未也明曰子時分指甲變桃紅色方可救至期甲色過紅復診之左三部如前肺脈微起脾胃雖沉緩而不澀二尺仍舊謂其家曰午時血當大崩毋得驚惶以駭病者至期果然下紫黑血塊數枚自此遂止後用壯真五和丸醋炒香附二兩烏藥一兩漢防己五錢歸身二兩酒炒白芍二兩熟地四兩續斷四兩甘草五錢秦艽一兩藿香一兩白茯苓一兩山藥二兩砂仁五錢蜜丸調理月餘全愈次年生子或問曰崩血症也諸醫用血藥不效公用氣藥而愈何也易曰崩雖在血其源在氣氣有一息不運則血有一息不行欲治其血先調其氣或曰是固然矣然嘗見有調氣而血不愈者有不調氣而治血亦愈者何也易曰此所因不同也有因血而病氣者有因氣而病血者能以脈症辨之而氣血之先後定矣如人有稟來血弱者有偶傷力失血者假使血虛氣必盛陰虛火必熾其症咳血咯血便血作渴日晡潮熱五心煩熱甚則咽喉腫痛此因血而氣病者也治宜養陰降火而以氣藥兼之此症右肺主氣時值正秋肺氣當令脈宜浮短今反沉大失其令矣大者火也沉者氣也沉而且大是血鬱而不運也肝木至秋當微弱今反弦大而結肝木結者血積於內也此病原因怒氣傷肝肝火鬱結血不歸經而妄行乃因氣而病血也惟其所因氣而所以治氣為先也夫血活則紅血凝則黑爪甲黑者血凝而不散也今用藥以行其氣至子時一陽初動氣行則血行肝血一行其血即活斯黑變紅矣至午時一陰復生肝乃乙木乙木生於午肝氣得令邪不能容故積血於此時盡出積出則氣運血行而病已矣藥不在多貴得其宜四神散雖數味常藥然以香附行氣為之君烏藥助香附行氣為之臣蘇梗通十二經之關竅白芷化腐血生新血為佐加當歸引氣入心而生新血撫芎引氣入肝舒肝之鬱而去舊納新神麯引氣入脾暢脾結而統新血白朮健脾胃而和中氣為使以行氣為主活血輔之此活血先調氣之法也吳孚先治俞氏婦血淋念載已成痼疾因幼孫出痘危險忽下血兩晝夜不止汗瀉交作暈數次思慮恐懼三陰並傷也脈向弦大而革者忽變而數疾欲脫奄奄一息用人參黃耆各一兩制附炮薑棗仁各三錢五味龍骨各一錢或疑附子太熱且謂何不用血藥曰血脫補氣古人精義謂有形之血不能速生幾微之氣所當急固又脾胃氣血俱喜溫而惡寒薑附宜服也二劑脈漸轉前方加歸芍等藥血症已除然脈氣不和非三年調攝未易復也自後參耆不輟計服補劑六百餘帖膏丸數料而起並宿疾亦瘳一婦半月前小産繼以血崩舌硬心搖汗出發潤日夜俱熱耳閉不聞目視不見身浮浮如在舟車六脈細數欲脫用人參二兩黃耆二兩白朮一兩熟地二兩當歸五錢炮薑制附棗仁各三錢龍骨一錢五分一劑頓減二劑精神爽慧陸養愚治玉笠雲母年四十九經事已止半年一日忽暴崩不止昏暈厥逆脈之兩手沉微如絲急以八珍湯加附子薑炭灌之半時方醒連進二大劑乃止十之七八至十劑後方能止後數月復崩亦昏暈或以犀角地黃湯加藕節阿膠之屬不止脈仍沉弱以附子乾薑鹿茸俱燒存性同釜底墨酒調服之即止後以六味加四物料服之約二斤一年不作次年八月間又暴至昏暈更久脈之如舊仍以八物湯加附子連進二劑昏暈自晡至晚未蘇咸謂必死診之決其必蘇蓋氣血暴脫一時補力未能與胃氣相迎耳或投以牛黃丸至半夜人事稍省而血尚未止明早陸診後仍銼八味湯少加薑附二劑或適至云昨夜之蘇乃牛黃丸之功公實不知也向日屢服參附致屢崩今人事既省斷宜順氣行瘀去其病本豈可復蹈前轍曰昨早投大補之藥即不服牛黃丸亦蘇此等脈症急宜續投參耆少緩恐成不救況可更以他藥乎或乃怫然而去曰讀父書而坑趙卒天下每多此人陸令先服煎劑隨制存性附子等灰午後人事更爽進粥晚投末藥一服夜間血少止明日又湯散並投血遂止再服煎湯十劑而瘳立齊治一婦人飲食因怒忽患血崩四肢逆冷抽搐口噤如發痙然吐痰如湧灌以二陳柴胡山梔枳殼吐出酸味神思稍醒藥止次日進薄粥少許但乳脅脹痛此悉屬肝火熾盛致脾氣不能運化先用六君柴胡山梔鉤藤諸症頓退惟四肢不遂血崩如初或又為肝火未息欲投清肝涼血之劑此肝脾氣血俱弱先用補中益氣湯培其脾土而血氣歸經又用四物參朮柴胡養肝筋而四肢便利余見異症名要一婦人月經淋漓無期作鬱怒傷肝脾虛火動而血不歸經乃肝不能藏脾不能攝也當清肝火補脾氣與歸脾湯逍遙散二藥四劑而愈一婦人因怒經事淋瀝半月方竭遇怒其經即至甚則口噤筋攣頭痛痰喘抽搦上視作肝火熾盛以小柴胡加鉤藤黃連熟地山梔而愈王執中治皮匠妻患血崩兩月飲食不進與鎮靈丹服少減而未斷因檢得耆域方如聖散用棕櫚烏梅乾薑各一兩令燒存性為末每服二錢食前烏梅湯調下合一劑與服而疾平患甚者不過三服資生經有巡捕之妻年逾五十因傷寒而血崩與膠艾四物湯一服漸愈後因勞復大作與鎮靈丹十五丸而止或無此丹燒鹿角存性為末酒調服亦佳屢驗同上陳良甫治一婦人崩漏暴下諸醫投薑附桂等藥服之愈甚診之六脈緊數遂用金華散兼局方龍腦雞蘇丸數服即安本事單用黃芩者亦此意也良方一親戚婦人年四十五經年病崩漏不止面黃肌瘦發黃枯槁語言聲嘶服諸藥無效診之六脈微濡問服何藥云凡是當歸川芎澀血諸品丹藥服之皆不作效遂合清濟方伏龍肝散兼白礬丸服之愈同上繆仲淳治董清山夫人患血崩由於中年鬱怒百藥不效用大劑參耆令覓胎髮百餘丸火煅入藥服久之漸愈煅發用小砂罐鹽泥煉極熟將發入罐中封固陰乾以炭火圍之俟黑煙將盡即起若青煙出發枯不可用矣非細心人不可任蓋火候不可過也王肯堂曰徐朝奉傳其內人有血崩症服諸藥不效用香附炒為末每服二錢米飲調下服後遂痊未選入一親戚黃卿內子凌夫人忽苦血崩百藥不效用五靈脂一味不拘多少炒令煙盡研末每服一錢溫酒調下旋服遂安蔣仲芳治毛氏婦經來淋瀝不已已經三月涼血止血之藥服至五六十劑罔效而口乾唇燥愈甚脈來微澀詢其大便必瀉果然即以四君子湯加熟附炮薑熟地血餘二劑而止蓋寒客於中火浮於上脾虛而不攝血故淋瀝不已也聶久吾婦年三十九生子月內調養未善次年春其經兩月餘不行一日忽暴至不止一二飯久即昏暈不省人事急用十全大補湯去桂倍加參耆又加熟附子炒乾姜各一錢灌之蘇省後連服二大帖遂止其七八又十餘日共服二十餘劑乃得全止次年春崩又大作比前尤甚昏暈更久又服前方三十餘帖尚未全安後用鹿茸炒燒存性研末酒調二錢服數次而血止繼服峻補丸藥幸年餘不發然病根未除次年中秋忽又暴至前方連服二大帖血流如水湧吐冷痰至日晡昏暈初更而氣絶惟胸次微溫至三更用灶心土研細水調灌一二酒杯冷痰少開遂飲滾湯一盞蘇省漸安豈初發時服大補二劑能令生意不絶耶後又服峻補之劑而血止因思三年之內嘗服峻補丸藥矣而其病仍大作者何也或謂補血太過是以積而成崩或謂不宜用桂附等熱藥推動其血遂至於崩此說極是惜聶君未及明抑知土虛不固然後山崩今既血崩則是血大虛且血氣相依附氣虛甚則降令多升令少是以不能攝血致血不歸經而妄下不惟大補血而尤當大補氣也前丸方雖峻補不合攙入香附益母砂仁元胡等損氣之品乃令病根不除而屢作也因純用補氣血藥一料而神氣爽健二料而病根除次年遂孕而生第八兒矣既云血太虛忽又轉雲氣太虛總為要用桂附故支離其詞可見所傳之派不清雖絶世聰明無往而不誤也魏玉橫曰劉氏媼年七十病血行如壯年月事久之淋漓不斷兩月餘耳鳴心跳頭暈目眩惡食罕眠奄奄就斃醫者不一有與歸脾補中者六味四物者十全八珍者諸治未為無見然服歸脾補中則上膈脹而面腫似不宜於補氣服六味四物則少腹脹而足腫似不宜於補血服八珍十全則中脘脹而氣急似氣血兼補又不宜延診先告以不宜用補以症皆緣補而增也脈之沉小而澀兩關尤甚且無神曰此肝脾兩傷之候也以七旬之年兩月之病非補何以能瘳第余之補異乎人之補無慮也與熟地二兩以一兩炒炭杞子一兩白芍炒棗仁炒各五錢酒連三分四劑而淋漓止去連四劑而腫脹消諸症亦愈姚氏婦早寡年三十餘因月事暴至遂崩漏不止勢甚猛脈之兩寸上溢兩尺甚弱據脈不可與補中益氣據症又不可不暫升提以挽其下陷先與熟地杞子白芍棗仁重劑服之果不應急以萆麻仁十數粒去殼研入麝一分捏作餅子用緑雲膏貼臍上再服前藥血去漸緩少頃再服藥覺血不行即令揭去之又服數劑全愈裴兆期治一富室婦崩暈交作已三逾日諸醫治法不外阿膠地黃當歸白朮山藥人參及止崩暈之藥益劇裴診之六脈小而堅右關細滑有力且多厄厄欲吐之狀心下按之硬滿而痛飲食不進大便不通此正與王節齊夫人崩暈證相類受病在腸胃無疑法當先行腸胃中積滯使真氣流行脾得健運而統血則崩自止暈自寧矣遂屏去諸藥先用導滯丸一服不動再一服大便始通神少清而崩亦可止改服開胃醒脾藥崩暈頓減繼服大補脾丸甫半月飲啖起居如故若泥血病而專用血藥其與刻舟求劍者何以異張飛疇治郭孝聞室暑月經行時涼臥風中先下淋漓加以惱怒跌哭遂崩脫不止小腹中如線下垂貫心掣痛常發熱頭痛遍體煩疼服止血藥不應而進參耆忽昏憒不省崩脫愈甚深夜忽遽邀往脈得弦大而芤獨左寸尤滑知衝任二脈受病明是風入胞門所致久之風從木化血愈傷而火愈熾非旋覆花湯金鈴子散兼進不能清其風熱降其逆氣也況此症多有火淫血室濕結子戶及鬱結傷脾怒動肝火及驚恐失跌種種不同若用通套升發補斂之藥烏能獲效哉遂如法治之而愈婦人崩中下血多因溫熱傷脾胃而致蓋脾統血傷則失守也醫不知其脾濕而化與固脫之劑血雖止而濕轉郁矣是以崩中之後多成脹滿黃病醫多不能識此沈堯封曰崩症熱多寒少若血大至色赤者是熱非寒倘色紫黑出絡而凝其中有陽虛一症經云陽氣者衛外而為固也榮行脈中衛行脈外脈外之陽虛失於護衛則脈中之榮血漏泄既出經絡脈凝而不流漸漸變紫變黑然必須少腹惡寒方可投溫一婦血崩日服人參阿膠血不止用地榆二錢生地四錢生白芍三錢川黃連五分黃芩一錢五分炒甘草八分蓮鬚一錢丹皮一錢五分黑梔子一錢生牡蠣二錢煎服即效因其帶多偶以苦參易芩血復至用芩即止去連血又至加連即止又一婦患崩月餘發暈幾脫是方加參一錢服之即定十劑而安一婦患崩年五旬投人參阿膠不效一二日用黃連五分甚不相安一醫云是氣病用酒炒香附歸芍丹皮黃芩牡蠣棗仁黑荊芥各二錢鬱金一錢五分橘皮一錢上沉香磨沖三分柴胡五分棕櫚炭八分煎服一劑崩止去柴胡棕櫚荊芥數劑食進後加白朮為散服之作脹減去即安一崩症少腹惡寒用桂附八味丸收全效毛達可婦人邁年驟然血海大崩不止名曰倒經用膠紅飲神效其方陳阿膠米粉拌炒成珠一兩全當歸一兩紅花八錢冬瓜子五錢以天泉水煎服一劑即止如猶發熱再以六安茶葉三錢煎服一次身熱即退後用六君子湯加歸芍調理而安昔當中丞幕友王遇伯之母年逾七旬偶患此症諸藥不應李廉訪治運轉此方投之即愈葉天士云初崩宜通久崩宜塞即此義也豫每治老嫗倒經極多神應後見少婦大崩不止屢服大料補劑不效血流反多昏暈幾危豫取此方減去紅花一半投之立效如法調理康復如常帶下朱丹溪治陶遵外姑年七十形瘦善啖患白帶食前薑湯吞大補丸五十丸一二次午膳後及臥睡時各與小胃丹十五丸愈胡安人白帶下月經甚多食少倦怠面黃經中血塊有如筋膜者與參術等補血氣調脾胃後諸症皆除退惟帶不止以樗皮丸主之薛立齊治一婦帶下四肢無力薛曰四肢者土也此脾胃虛弱濕痰下注以補中益氣濟生歸脾二藥治之而愈雄按濕痰何以不治孫文垣治吳湧瀾母年六十餘久患白帶歷治不效變為白崩診得右寸滑左寸弱兩關濡兩尺軟弱據脈心腎俱不足中焦有濕古云崩中日久為淋帶漏下多時骨髓枯今白物下多氣血日敗法當燥脾兼補心腎以既濟丹補其心腎以斷下丸燥中宮之濕則萬全矣果未終劑而愈一僧治蔡大尹內人崩中赤白帶下用暮頭回一把酒水各半盞童便半盞新紅花一捻煎七分臥時服日近一服久則三服愈董炳集驗方一婦人小腹痞脹小便時下白帶小水淋瀝此肝經濕熱下注用龍膽瀉肝湯而愈一女人赤帶腰痛以四君子加乾薑肉桂地榆而愈男子腰痛亦效一婦人赤白濁腰痛四君子加當歸杜仲續斷乾薑地榆而愈王海藏云李知府妻梅氏帶下病七年血崩不止骨痿著床日服紫菀丸五丸十丸十五丸服下膿血五升黃水一升肉塊如雞子狀始愈方見瘀血門王教授云有來覓赤白帶藥者豫以震靈丹與之震靈丹能活血溫中故也以其神效故書於此但有孕不可服若灸帶脈穴尤奇資生經一婦人白帶兼病痛風半夏茯苓川芎陳皮甘草蒼朮米泔浸黃柏酒洗曬乾炒南星牛膝酒洗煎服同上蕭萬輿治龔氏妾年三十娩未百日恣啖生冷嘔吐臍痛病白帶月餘行經衝任冒寒發熱煩渴赤帶頻下脈沉遲無力此內真寒而外假熱症也用四物二陳加炮薑肉桂木香少佐升麻丸服月餘而愈一寡婦年三旬時或憎寒發熱通宵不寐時或白晝昏睡喃喃獨語遇勞肢體厥冷每用薑蔥解表遂致熱停脾胃乘虛下注而患赤帶脈沉伏重按搏指以為相火蘊結外假寒而內真熱也用四物加黃連龍膽炒梔知母茯苓木通投八劑諸症悉安來天培治一婦年四旬外苦於白帶朝夕常流不止已十餘日矣外症頭暈腰痛診其脈澀此肝腎陰虧氣虛下陷所致法宜以十劑中澀可去脫之劑治之否則因循慮成弱症矣以六味飲去萸肉澤瀉加牡蠣龍骨川續斷肉桂杜仲白芍鹿角膠不數劑而瘳雄按今秋許蘭嶼室患腰腹左痛諸藥罔瘳黃某詢其泛愆進腎氣湯多劑痛益劇痛甚則白帶如注猶曰虛寒已極藥不能勝附桂日增痛無停晷病家謂服此大補而無功已絶望矣陳雪舫薦余診之左關尺弦數無倫形消舌赤夜不成眠與龜板烏鰂蓯蓉楝實枸杞黃柏歸身白薇竹茹絲瓜絡蒲桃干藕一劑即安數劑後加熟地阿膠補之泛行而愈一閨女年十五歲夏間患白帶月餘更兼腹痛診之六脈俱弦細而數按之中指下時一沉此屬脾氣下陷肝臟濕熱為患用升麻柴胡蒼朮白朮茯苓半夏廣皮甘草黃柏黃芩二劑而霍然沈堯封曰帶下有主風冷入於脬絡者巢元方孫思邈嚴用和楊仁齊婁全善諸人是也有主濕熱者劉河間張潔古張戴人羅周彥諸人是也有主脾虛氣虛者趙養葵薛立齊諸人是也有主濕痰者朱丹溪是也有主脾虛腎虛者張景嶽馮兆張是也又有主木鬱地中者方約之繆仲淳是也其所下之物嚴主血不化而成張主血積日久而成劉主熱極則津液日出其治法有用大辛熱者有用大苦寒者有用大攻伐者有用大填補者雖立論制方各有意義然其所下之物究竟不知為何物惟丹溪云婦人帶下與男子夢遺同顯然指著女精言千古疑竇一言道破但精滑一症所因不同惜其所制之方囿於痰火二字中耳由是言之白帶即同白濁赤帶即同赤濁此皆滑膩如精者至若狀如米泔或臭水不黏者此乃脾家之物氣虛下陷然高年亦有患此者非精氣之病不可混治雄按帶下一症濕熱下注者為實精液不守者為虛體強氣旺之人不甚為害惟乾燥則病甚蓋榮津枯槁即是虛勞凡泛愆而帶盛者內熱逼液而不及化赤也並帶而枯燥全無者則為乾血勞之候矣匯而觀之精也液也痰也濕也血也皆可由任脈下行而為帶然有虛寒有虛熱有實熱三者之分治遺精亦然而虛寒證較少故葉天士治帶必以黃柏為佐也又任脈虛而帶下不攝者往往投滋補而不應余以海螵蛸一味為粉廣魚鰾煮爛杵丸緑豆大淡菜湯下久服無不收功真妙法也交腸交腸症男子亦有張路玉治詹石匠妻産後五六日惡露不行腹脹喘滿大便從前陰而出省其故平日酷嗜烟酒所産之兒身軟無骨因而驚駭遂患此症以芎歸湯加莪朮肉桂炒黑山楂一服惡露通而二便如常陸聖祥之女方四歲新秋患血痢而稀糞出於前陰作冷熱不調食積治與五苓散服香連丸二劑而愈錢吉甫女年十三體肥痰盛因鄰家被盜發熱頭痛嘔逆面青六脈弦促而便溺易位此因驚而氣亂痰襲竅端所致也與四七湯下礞石滾痰丸開通痰氣而安喻嘉言治姜宜人得奇症簡本草經疏治交腸用五苓散之說以為神祕喻曰交腸一症大小二便易位而出若交腸然古用五苓治之專為通前陰而設也若此症閉在後陰二便俱從前陰而出擬之交腸誠有似是而非者況交腸乃暴病驟然而氣亂於中此症乃久病以漸而血枯於內有毫釐千里之別原夫疾之所始始於憂思傷脾脾傷則不能統血而錯出下行有若崩漏實名脫營宜大補急固乃誤以涼血清火為治脫出轉多於是手陽明之血亦漸消亡故血盡然後氣亂氣亂然後水穀舍故趨新並歸一路大腸枯槁幽門驟閉飲食至此無庸泌別遂清濁並走前陰勢必大腸復通令渣滓率由故道斯為得耳與五苓一方有何干涉況五苓之劫陰又為亡血家所深戒乎向診時嘗問病中多哭泣否答曰時時泣下乃知臟燥者多泣大腸方廢而不用也交腸云乎哉今大腸之脈纍纍而現於指可虞之時其來春棗葉生乎棗葉生而言果驗按此仍是交腸症惟與驟然氣亂者不同耳愚擬治之之法宜集靈膏重用人參以補肺而潤之蓋肺與大腸相表裡而主氣又肺者相傳之官治節出焉肺得養斯大腸之燥可清又得枸杞二冬以滋其失血之槁然後故道可復而清濁自分矣薛立齊治一産婦小便出糞名大小腸交乃氣血俱虛失行故道先用六君子湯二劑又用五苓散二劑而痊婦人良方作先用五苓散二劑而愈又用補中益氣湯而安沈明生治葉惟和室月夜探親其母留之食時春寒猶峭歸途即覺肌寒懍懍次早復當窗梳櫛重感於邪無熱惡寒胸膈䐜悶一醫見其肌表無熱竟作食傷太陰主治遽用大黃下之不特不更衣反致水道閉澀尤可異者白物腥穢如膏淋之狀從大腸來綿錦不絶漸至肌體萎弱骨立難支診之脈沉而澀虛寒可知計惟有溫中益元之法然慮大便尚結小水未行或有增滿之患遂先用五苓散倍加肉桂一服而水道果通再服而宿垢並下嗣用附子理中湯三四劑後白物漸止更以十全大補調理一月而安夫白淫白沃載在靈蘭之典皆指前竅中來今乃轉移於後何也蓋此病始終是一寒症初因食在胃脘之上火衰不能熟腐而反下之太早則有形之物不能即降而無形之寒抑遏於闌門之際遂致清濁混淆涓涓不息似乎淋帶而實非淋帶也今先以五苓分利陰陽而倍肉桂使寒隨溺泄上下宣通繼以理中之劑撤其餘邪鼓其陽氣令脾土濕燥而濁流有制宜其效如桴鼓也夫始用行大便之藥大便不行並致小便赤澀今用利小便之藥小便即利並致大便亦通其得失為何如哉董魏如曰膀胱有下口而無上口下口則通乎宗筋宗筋本為精道而溺亦同出乎此則宗筋雖一口其內實精道溺道之兩口也故膀胱雖繫於腸旁而與腸不相通乃論交腸症者俱謂闌門不清以致清濁混亂故大小便易位而出夫闌門為大小腸交接之門戶雖曰不清而二便各有所出之道路又焉能遽易其位而出竊謂交腸一症乃屎出前陰溺出後孔之候溺出後孔者水氣併入大腸自闌門不能泌別清濁可以闌門不清為論若屎出前陰者乃腸膀並破之候非腸穿則屎從何竇而出膀胱不破則屎從何竇而入要必腸穿膀破而後屎溺得以易位而出又必破損之處其竇貼連而後得出入不爽也嘗驗諸獸之膀胱皆附於大腸之募與廣腸下連故腸膀一通而便可易位否則難乎其為交矣余治交腸症四五人皆得於險産之後其為腸膀破損不言可喻余輿人朱姓者年三十餘素患血疝年發二三次遇寒則發服溫降藥隨已其發必攻痛腹肋甚則攻胸乃嘔血三兩口此手足厥陰之候習以為常忽冬月遇寒陡發囊腫如石時屆歲終服藥一二劑歸家度歲正月初疝症愈而囊癰竟成不數日大潰囊中流糞大便不行肚腹兩角連串腫赤覆成肚角癰三五日而潰亦屎膿並出一囊一腹連串洞穿者六人雖羸瘦而語言自若飲食如常夫睪囊之系上連廣腸系損而及腸膜破而屎出此方書所已載也若腹癰潰而屎出是必大小二腸先結癰而內潰故復由外癰而出否則腹癰雖穿而腸不破屎亦何從而出乎此症之潰在正月七日至三月十七日始不食十八日屎從口出三日乃死始知腸斷即死腸破未即死也故交腸囊癰二證多有愈者求子建平孝王妃姬侍皆麗無子擇良家未笄女入御又無子問尚書褚澄曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實後交合則交而孕孕而育育而為子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人媒至宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也褚氏遺書朱丹溪曰肥盛婦人不能孕育者以其身中脂膜閉塞子宮而致經事不行可用導痰湯之類瘦怯婦人不能孕育者以子宮無血精氣不聚故也可用四物湯養血養陰等藥余侄女形氣俱實以得子之遲服神仙聚寶丹背上發癰疽症候甚危豫診其脈散大而澀急以加減四物湯百餘帖補其陰血幸其質厚易於收救質之薄者悔將何及龔子材治劉小亭年四十無子陽事痿弱精如冰冷求診兩寸脈洪兩尺沉微無力此真元衰憊平素斫喪過度所致以固本健陽丹加人參附子枸杞覆盆子各二兩制一料服盡覺下元溫暖如前又制一料服至半料而止果孕生一子後傳之於劉柏亭劉敏庵服之俱得子汪石山治一婦人形肥色淡紫年幾三十艱於育子脈之兩尺皆沉微法當補血以形言之肥人氣虛亦當補氣遂令多服八物湯仍以補陰丸加參耆空腹吞之三月餘有孕復為診之兩尺如舊以理論之孕不當有昔人云脈難盡憑殆此類與薛立齊治儒者錢思習子室年三十餘無嗣月經淋瀝無期夫婦異處幾年矣思習欲為娶妾以謀諸薛薛意此鬱怒傷肝脾虛火動而血不歸經乃肝不能藏脾不能攝也當清肝火補脾氣遂與加味歸脾逍遙二藥四劑送至其家仍告其姑曰服此病自愈而當受胎妾可無娶也果病愈次年生子后妃不妒忌而百斯男獨中山靖王飲酒好內生子百十二人世稱全鹿丸為周文王所定常服之故生子衆多豈中山靖王亦常服是丸者耶何生子之多於文王也張氏麗言馮楚瞻治金紹老晨瀉不已就診按其脈兩寸關俱沉弱無力兩尺沉微更甚曰少年得此不惟難愈更恐嗣育之間多女少男矣適許某至亦索診其脈亦然各道連生數女而無子令以八味去丹皮澤瀉加補骨脂三兩菟絲子四兩五味子二兩早晚食前各服五錢後各生子矣精要云久服令人肥健多子信然吳孚先治蔡孝廉年已五旬苦乏嗣遍求種子方備嘗十載無一驗診得右尺神旺真火本自不衰惟左尺虛弱乃真水乾涸也宜補陰配陽與六味地黃丸加元武膠越二年果得一子萬密齊曰嘗見男子陰痿者多致無子不可不慮也惟其求嗣之急易為庸醫之惑或以附子蛇床故紙為內補或以蟾酥阿芙蓉為外助陽事未興內熱已作玉莖雖徑頑木無用以致終身無子或有夭歿者吾見此輩無辜而受醫藥之害遍訪諸方無越此者出以示人名曰壯陽丹熟地黃四兩巴戟去心破故紙炒各二兩仙靈脾一兩桑螵蛸真者鹽焙陽起石煅另研水飛各半兩上六味合陰之數研末煉蜜丸如桐子大每三十丸空心只一服溫酒下不可恃此自恣也戒之雄按用石藥弊滋甚矣生地四兩熟地四兩天冬四兩麥冬四兩當歸二兩枸杞一兩仙靈脾八兩制碎絹袋盛浸大罈酒內隔湯煮從卯至酉取出埋地下七日夫婦日共飲五六杯婦人經水不準者即准而受孕此方刻鄒南皋仁文書院集驗方中吳銀臺徐光祿俱云往往得驗因復記而筆之李日章六硯齊筆記雄按此集靈膏方也吳橋治胡翳卿胡喜詼諧故與橋習胡以久不宜子請壯陽方橋診曰公寸脈洪尺中沉澀火炎而不降水涸而不升水火不交是曰未濟法宜滋陰補腎庶幾相濟相生使復壯陽則火益炎而水益涸咳血嘔血將不可謀殆矣胡大笑曰吾五十而善飯不異丁年何病徒以陽痿滑精願得方藥壯之且吾服滋陰藥如奉漏卮無益橋曰技止此爾胡後遇國人老而舉子者得壯陽方至留都亟服之咳而失音已復咳血久之肉削大溲浸動則遣使逆橋橋謝不暇病深請告歸即召橋嘆曰不用公言至此矣幸脈不數聲不喑骨不蒸血不咳獨大溲日三四行爾橋曰否否夫數者喑者蒸者咳者則陽火未息猶可鼓而行之今熄矣即爐韝無及也無何而絶馮楚瞻曰五臟之精華輪歸於腎故經曰五臟盛乃能瀉是五臟各有精隨所用而灌注於腎豈止腎所藏而已哉然精生於血血少精何以生夫心主血故曰無子責乎心發白責乎腎是以重嗣育者不獨補腎尤宜養心不但養心更宜調和五臟使五臟精氣常盛而後腎家之充溢裕如也設四臟燥槁不榮將何物以輸歸於腎而為嗣緒之本乎余故制養心育脾和肝清肺滋腎補榮益衛膏滋丸與八味丸兼服一補先天之不足一助後天之發生將見血氣日長螽斯衍慶自可必也方用嫩黃耆四兩蜜水拌炒同人參補氣以為君當歸身酒拌炒三兩養血宣血調和榮分以為臣酸棗仁炒熟搗碎五兩寧心益肝兼養脾土以為臣熟地六兩滋水潤燥與白朮同用則白朮補脾氣熟地滋脾陰亦以為臣於潛白朮人乳拌透曬乾炒黃四兩專補脾元以為臣遠志肉用甘草濃汁煮去辣水二兩養心神生脾土下濟腎氣使真精藏固用以為佐麥冬同老米炒燥去米三兩保護肺金以濟白朮之燥用以為佐白芍蜜酒拌炒二兩四錢甘寒入脾酸斂入肝既佐當歸以和肝榮復佐白朮以養脾陰用以為佐杜仲酒拌炒三兩接引諸藥深達至陰之所川續斷酒拌炒三兩熟地補腎精杜仲補腎氣續斷專調理於骨節筋絡之間用以為使川牛膝酒拌蒸三兩焙乾引諸藥強壯下元用以為使蓮子三斤清水煮汁三十餘碗去渣入前藥煎取頭二汁去渣熬膏以人參二兩茯苓茯神各三兩研細末和前膏為丸臨臥白湯送下四錢沈堯封曰求子全賴氣血充足虛衰即無子故薛立齊云至要處在審男女尺脈若右尺脈細或虛大無力用八味丸左尺洪大按之無力用六味丸兩尺俱微細或浮大用十補丸此遵內經而察脈用方可謂善矣然此特言其本體虛而不受胎者也若本體不虛而不受胎者必有他病繆仲淳主風冷乘襲子宮朱丹溪主衝任伏熱張子和主胸中實痰丹溪於肥盛婦人主脂膜塞胞陳良甫於二三十年全不産育者胞中必有積血主以蕩胞湯諸賢所論不同要皆理之所有宜察脈辨證施治蕩胞湯在千金為婦人求子第一方孫真人鄭重之雄按蕩胞湯雖有深意其藥太峻未可輕用惟保胎神佑丸善舒氣鬱緩消積血不但為保胎之良藥亦是調經易孕之仙丹每日七丸頻服甚效余歷用有驗因附録之白茯苓二兩於潛術米泔浸一日黃土炒香一兩益母草淨葉去梗一兩真沒藥瓦上焙乾去油三錢上為末蜜丸桐子大每服七丸白滾水下若胎動一日可服三五次不可多服一丸至囑
