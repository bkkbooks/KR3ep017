front:
  text: 附柳州遺稿序魏君柳州詩名嶺雲集者友人鮑君以文刻以行世集甫出人爭傳誦遂一遊嶺表越歲歸優遊里中者十餘年而柳州辭世鮑君與胡君滄來項君金門復刻其手所自訂後集以辨首之語屬余讀卒業愀然嘆曰柳州生平成就所造甚為難耳柳州少孤貧無遺資乃於街市間勤十指操作自給既而佐生於質庫中幾二十年盡勞所職至夜篝燈讀書為同事所憎乃展卷默誦復以燈光逼射為詬於是卷局坐帳中翳其光而閲膏盡為度向無師授自以堅思力探苦索積學既久由漸而致豁然貫通家本業醫兼攻其先人所遺歧黃書亦臻奧窔辭歸懸壺取資以俯蓄妻子暇則取市扇需畫者應其請得資以助不足當其畫時手一扇於前置一卷於左勞憊益甚乃能自拔於庸雜儕偶中成大雅材之詩人同事筆硯吟哦輩排突直出其上據壇執耳莫敢枝梧及壯歲將過向之積勞漸發疾漸不可治年逾五旬而終嗚呼柳州學既成人皆羡之慕之舉為一時作手豈知其從艱瘁中來如此其甚哉今其詩具在吾不敢謂於今之負重名者優劣若何於古作者詩品位置若何然展帙案取吾儕倫類中推云軼倫超群亦平心之論也嗚呼讀書不勝功名仰屋而思㺦猭行而覓索句於杳渺無何有之處自矜得意雖工亦何可藉賴世不笑其狂必笑其拙耳而柳州終身抱此癖貧困不振終不自悔人各有嗜難為不相謀者道也乾隆丁酉仲冬臨江鄉人吳穎芳序
  hash: sha256:cee42d56c5174b1847e777fd93d35377a3fbe772dca972b782aa8235cca5a386
