body:
  text: 續名醫類案卷三十三外科腸癰華他傳軍吏李成若咳嗽晝夜不寤時吐膿血以問他他言君病腸癰咳之所吐非從肺來也與君散兩錢當吐二升余膿血吐訖自養一月可小起好自將愛一年便健十八歲當一小發服此散亦行復瘥若不得此藥故當死復與兩錢散成得藥去五六歲親中人有疾如成者謂成曰卿今強健我欲死何忍無急弆藥松之按古語以藏為弆以待不祥先持貸我我瘥為卿從華他更索成與之已故致譙適他見收匆匆不忍從求後閲十八年成病竟發無藥可服以至於死三國志薛立齋治金臺院僉憲年逾五十腹內隱痛小便如淋皮膚錯縱而脈滑數此腸癰也脈滑數則膿已成遂以廣東牛皮膠溶化送太乙膏下膿升許更以排膿托裡藥及蠟礬丸而愈孫文垣治染匠婦腹痛兩年或以為寒為熱為氣為血為蟲為積治不效或與膏藥大如斗貼之痛益劇欲去揭之牢黏不可揭臥舟中數人扶之不起往診見其面色蒼黑兩手枯燥如柴六脈皆洪數腹痛脈洪數內癰可知其得生亦賴此問其痛之所在解衣指示痛有定處始知膏藥牢黏叩其不能起步之由乃左腳不可動動則痛應於心察其色脈皆非死候此必腸癰左腳不能舉動是其徵也俗名縮腳腸癰與榮衛反魂湯加金銀花為君四帖酒水各半煎服一帖痛稍減二帖下臭膿半桶病全減膏藥亦不揭自落四帖完其婦與匠來謝並求善後之方龔子才治一婦人腹痛如錐每痛欲死不可著手六脈洪數此腸癰也用穿山甲炒白芷貝母殭蠶大黃合一大劑水煎服膿血從小便處出而愈李士材治吳光祿夫人患腹滿而痛喘急異常飲食不進或用理氣利水之劑二十日不效診之脈大而數右尺為甚令人按腹手不可近曰此大腸癰也脈數為膿已成用黃耆角刺白芷之類加葵根一兩煎一碗頓服之未申痛甚至夜半膿血大下昏暈不支即與獨參湯稍安更與十全大補兩月而愈周漢卿治義烏陳氏子腹有塊捫之如罌漢卿曰此腸癰也用大針灼而刺之入三寸許膿隨針迸出有聲愈明史薛立齋診秀水卜封君善飲腹痛便瀉服分利化痰等劑不應其脈滑數膚皮甲錯謂此酒毒致腸癰而潰敗也辭不治仍服煎劑果便膿而歿孫某治一女子腹痛百方不效脈滑數時作熱腹微急孫曰痛病脈當沉細今滑數腸癰也以雲母膏一兩為丸如梧子大以牛皮膠溶入酒中並水吞之餉時服盡下膿血愈外科心法薛立齋治通府張廷用患腸癰兩月餘矣時出白膿體倦惡寒此邪氣去而中氣虛也用托裡散兼益氣湯徐徐呷之又令以豬肚肺煮爛取其湯調米粉煮時呷半盞後漸調理而痊一男子小腹痛而堅硬小便數汗時出脈遲緊以大黃湯一劑下瘀合許以薏苡仁湯四劑而安苡仁栝蔞各三錢丹皮桃仁各二錢一男子患腸癰膿已成用雲母膏一服下膿升許更以排膿托裡藥而愈後因不守禁忌以致不救一人患腸癰傴僂痛不能伸有道人教以飲純黃犬血二碗和白酒服其人遂飲至四碗次日下膿血盡而瘳廣筆記腸風臟毒孫文垣治潘大司馬常有腸風之症八月丁祭學博饋鹿血食之血暴下用槐角子五錢黃連枳殼地榆貫衆各三錢一服而止潘善其方書之黏壁間遇有便血者依方服之無不立效陳鹿塘原有腸風臟毒之症大便燥結數日不能一行痛苦殊甚此胃寒腸熱也其脈兩寸皆數兩關弦而無力兩尺洪滑而左尤甚久治不效因憶東垣有云大腸喜清而惡熱脾胃喜溫而惡寒以胃屬土腸屬金也乃制一方專以腸風臟毒藥為主外以養血之藥裹之使不傷胃氣蓋藥先入胃後入大腸入胃時裹藥未化及入大腸則裹藥化而君藥始見庶幾兩不相妨因以九製大黃二兩槐花三兩木耳二兩郁李仁皂角子象牙屑條芩各一兩血餘升麻荊芥穗各五錢共為末煉蜜為丸赤豆大外以四物加蒲黃各一兩為衣米飲送下空心及下午各二錢血果止大便不燥飲食日加而愈王祖泉大便裡急後重腹痛日夜下紫稠黏三四十度作痢治三月不效肌瘦懶食眼合懶開悉以為不治脈之六部濡弱所下之色甚晦狀如芋苗汁曰此非痢乃臟毒下血也醫説中人參樗皮散正與此對即制與之其夜果減半終劑全愈方以人參樗根白皮各二兩為末空心米飲調二錢忌肉汁生菜魚腥湯封君簡庵血分熱甚以善飲致腸風且心腎不交以四物湯加棗仁側柏葉槐花連翹蜜為丸服之即愈吳孚先治張東銘素患痔疾兼後重之症似痢非痢登圊窘迫行步如跨馬狀坐亦作楚六脈偏盛稍覺無神知為氣血虛而挾濕熱用芎歸芩連生地槐角楂肉升麻加人參二兩為丸彼去參服之不效復入參服半料已全愈張子和曰一男子臟毒下血當六月熱不可堪自分必死忽思蜜水猛舍性命飲一大盞痛止血住汝南節度副使完顏君寶病臟毒下衃血發渴寒熱往來延及六載日漸瘦弱無力面黃如染張診其兩手脈沉而身涼內經寒以為榮氣在故生可治先以七宣丸下五七行次以黃連解毒湯加當歸赤芍地榆散同煎服之一月而愈方勺泊宅編云外兄劉掾病臟毒下血凡半月自分必死得一方只以乾柿燒灰飯服二錢遂愈又王璆百一方云曾通判子病下血十年亦用此方一服而愈為丸為散皆可本草綱目薛立齋治一男子臟毒下血服涼血敗毒藥不惟血不能止且飲食少思肢體愈倦脈數按之則澀先以補中益氣湯數劑少止更以六君子湯加升麻炮薑四劑而止乃去炮薑加芎歸月餘脾胃亦愈常治積熱或風熱下血者先以敗毒散散之胃寒氣弱者用四君子湯或參苓白朮散補之並效一男子臟毒下血脾氣素弱用六君子湯加芎歸枳殼地榆槐花治之而愈後因謀事血復下諸藥不應意思慮傷脾所致投歸脾湯四劑而痊大抵此症所致之由不一當究其因而治之丹溪云芎歸湯一劑又調血之上品熱加茯苓槐花冷加茯苓木香此則自根自本之論也雖然精氣血出於穀氣惟大腸下血以胃藥收功以四君子湯參耆白朮散以枳殼散小烏沉湯和之胃氣一回血自循經絡矣腸風者邪氣外入隨感隨見臟毒者蘊積毒久而始見又云人惟坐臥風溫醉飽房勞生冷停寒酒面積熱以致榮血失道滲入大腸此腸風臟毒之所作也挾熱下血清而色鮮腹中有痛挾冷下血濁而色黯腹內略痛清則為腸風濁則為臟毒有先便而後血者其來也遠有先血而後便者其來也近世俗屎前屎後之説非也治法大要先當解散腸胃風邪熱則敗毒散冷則換金正氣散加芎歸後隨其冷熱治之劉河間云起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則便血腸胃之絡傷則溢血腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣又內經云腸癖下膿血脈弦絶者死滑大者生血溢身熱者死身涼者生諸方皆謂風熱侵於大腸而然若飲食有節起居有時腸胃不虛邪氣從何而入王執中雲何教授湯簿有腸風疾積年不愈取脊端窮骨名龜尾當中一灸除根湯簿因傳此方後觀灸經此穴療小兒脫肛瀉血蓋岐伯灸小兒法也後人因之以灸大人腸風瀉血耳蓋大人小兒之病初不異故也五痔便血失屎回氣灸百壯在脊窮骨上赤下白處痔附脫肛孫文垣治周文川肛上生一腫毒月餘膿潰矣但少動則出鮮血不止大便結燥胸膈飽悶飲食不思脈之兩寸短弱關弦尺洪滑此氣虛血熱陷於下部宜補而升提不然痔漏將作可慮也黃耆二錢歸身地榆槐花枳殼各一錢升麻秦艽各七分荊芥穗五分甘草三分服後胸膈寬惟口苦甚前方加酒連連翹各五分而愈高仰山內人痔血裡急後重飲食入腹大便即行晝夜五六度五更咳嗽痰齁肌肉脫口作渴由服涼血之劑過多致脾氣虛不能統血也脈之六部皆軟弱無力以六君子湯加荊芥穗秦艽陳皮炮薑四帖而飲食進血全止嗽亦定減炮薑倍加何首烏又四帖遂數年不發徐檢老發寒熱臀近肛硬處生一毒紅腫而痛坐臥為難外科以鑱針點開插藥線於內塗以爛藥使膿血急潰又與敷生肌藥使易收口受謝而去未半月硬處之旁又紅腫痛寒熱交作召前醫治法如前受謝以去遞醫遞患幾半年矣診之面色青慘脈皆濡弱手足如冰飲食減半究所服則槐角生地黃柏之屬曰此痔癰非痔漏也痔漏當用挂線以五灰膏點之可愈今腫硬無定處離肛門且遠其初只可大補氣血即有毒亦宜托出一膿而愈此王道之治不勝於針刀萬萬哉乃內用寒涼外用收口動輒挂線致凝滯流注愈而屢發非稟厚氣強六旬餘人安能當此與十全大補四帖飲食加手足暖大便艱澀向潤之而不行者今亦通利再以首烏四兩人參枸杞當歸黃耆熟地各二兩槐角秦艽各一兩蜜丸服之腫處出少膿全瘳徐喜而謔曰豫非孫君諸外科視此臀為金穴矣呵呵醫學博士齊德之云豫讀養生必效方見干義傳僧覺海少年患痔疾其行業比冰霜此緣飽食久坐知痔疾者不必酒色過度矣故素問云因而飽食筋脈橫解腸癖為痔治之故不同也三神丸枳殼皂角五倍蜜丸每服二三十丸精義黃履素曰豫中年患痔點洗都不效惟白蘿蔔煎湯頻洗差佳近讀環中集載冬瓜皮同朴硝煎洗翻花痔立愈又曰以蘿蔔代冬瓜亦效冬瓜未之試蘿蔔已驗矣薛立齋治儒者楊舉元素陰虛勞則體肢倦怠兩足發熱服清熱等藥熱至腰膝大便澀滯飲食過多則瀉至年餘作渴吐痰患痔出膿仍不節勞則忽惡寒發熱後患癰膿水不止氣血虛甚乃用六味丸補中益氣湯滋養化源喜其慎疾年餘而痊陳自明治一男子患痔未成膿苦痛大便難與神仙太乙丹一錠去後二次痛即止不日而消見蠱門薛立齋治一男子患痔大便燥結焮痛作渴脈數按之則熱以秦艽蒼朮湯二帖少愈更以四物湯加芩連槐花枳殼四劑而愈一男子素不慎酒色患痔焮腫肛門墜痛兼下血大便乾燥脈洪大按之則澀以當歸郁李仁湯加桃仁四劑少愈更以四物湯加紅花桃仁條芩槐花數帖而愈大抵醉飽入房則筋脈橫解或精氣脫滯脈絡一虛酒食之毒乘虛流注或淫極強固精氣遂傳大腸以致木乘火熱而毀金或食厚味過多必成斯疾夫受病者燥氣也為病者濕熱也宜以瀉火和血潤燥疏風之劑治之若破而不愈即成漏矣有串臀者有串陰者有穿腸者有穢從瘡口而出者形雖不同治法頗似其腸頭腫成塊者濕熱也作痛者風也大便燥結者火也潰而為膿者熱勝血也當各推其所因而治之一男子患痔成漏每登廁則痛以秦艽防風湯加條芩芎歸一帖即痊如肛門下脫作痛良久加以大黃汁枳殼四劑而愈以四物加升麻芩連荊防不復作一男子患痔漏每登廁則肛門下脫作痛良久方止以秦艽防風湯數劑少愈乃去大黃加黃耆川芎白芍而痛止更以補中益氣湯二十餘帖再不脫一婦人患痔腫焮痛甚以四物湯加芩連桃仁紅花丹皮四帖少止又數帖而愈一婦人素患痔漏每因熱則下血數滴以四物湯加黃連治之即愈後為大勞瘡腫痛經水不止脈洪大按之無力此勞傷血氣血動而然也用八珍湯加芩連蒲黃二劑而止後去蒲黃芩連加地骨皮數劑而安丹溪云婦人崩中者由臟腑傷損衝任二脈血氣俱虛故也二脈為脈經之海血氣之行外循經絡內經臟腑若血氣調適經下依時若勞動過極臟腑俱傷衝任之氣虛不能約制其經血故忽然而下謂之崩中暴下治宜大補氣血之藥舉養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自正矣一男子有痔漏每發如廁肛脫良久方上診其脈細而微用補中益氣湯三十餘劑遂不再作丹溪曰脫肛屬氣熱氣虛血虛血熱氣虛者補氣參耆芎歸升麻血虛者四物湯血熱者涼血四物湯加黃柏肺與大腸為表裡故肺臟蘊熱則肛門閉結肺臟虛寒則肛門脫出故婦人産育用力小兒久痢均致此病治之必須溫補肺臟腸胃久則自然收矣雄按此症必見此脈始可用此藥臨安曹五方黃院薦引為高宗取痔得效後封曹官至察使用好信石色黃明者三錢打如豆大明礬一兩為末好黃丹水飛炒紫色五錢蠍梢七個淨水瓦上焙乾研末草烏緊實光滑者去皮生研末一錢右用紫泥罐先將炭火煆放冷拭淨先下明礬燒令沸次下信入礬內拌勻文武火煆候沸再攪勻看罐通紅煙起為度將罐掇下待冷取研末方入草烏黃丹蠍梢三味再同研極細末瓷罐內收貯如欲敷藥先以甘草煎湯或蔥椒煎湯洗淨患處然後用生麻油調前藥以鵝毛掃藥痔上每日敷藥三次必去黃水如膠汁然痔頭漸消看痔病年深淺年遠者不出十日可取盡日近者俱化黃水連根去盡更搽生好肉藥名如神千金方李防禦方五痔者貧富男女皆有之富者酒色財氣貧者擔輕負重飢露早行皆在心肝二經喜則傷心怒則傷肝喜怒無常風血浸於大腸到穀道無出路結積成塊出血生乳各有形相婦人因經後傷冷月事傷風余血在心經血流於大腸小兒因利後或母腹中受熱也先用水澄膏護其內鬱金白芨各一兩或加黃連右二味為末如內痔候登廁翻出在外用溫湯洗淨不須坐側臥於床即出用蜜水調令得中篾挑塗穀道四邊好肉上留痔在外以紙蓋藥上良久方用枯藥搽痔上用筆蘸溫水於紙上不令藥干及四散枯藥用好白礬四兩生信石二錢半硃砂一錢生研極細右各研為細末先用砒入紫泥罐次用白礬末蓋之用火煆令煙斷其砒盡隨煙去止借砒氣於礬中耳用礬為細末看痔頭大小取礬末在掌中更入硃砂少許以唾調稀用篦頭塗痔上周遍一日三上候看痔頭顏色焦黑為度至夜有黃水出切勿他疑水盡為妙至中夜上藥一遍來日依然藥三次有小痛不妨換藥時以碗盛新水或溫湯在邊用筆輕洗痔上舊藥更上新藥仍用護肉藥次用荊芥湯洗之三兩日後黃水出將盡卻於藥中增硃砂減白礬則藥力即緩三兩日方可增減漸漸取之庶不驚人全在用藥人看痔頭轉色增減厚薄敷藥方是活法此藥只是借砒信耳又有硃砂解之一方士將此二方在京治人多效致富一富商因驗以百金求得之録於豫豫雖未用傳人無不言效但枯藥趙宜真鍊師以刊於青囊雜纂如神千金方未見刊傳大抵今人言能取痔者皆此方也恐氣血虛或內邪者還當兼治其內庶不有失二條皆外科發揮薛立齋治一男子痔瘡腫痛便血尤甚脈洪且澀經云因而飽食筋脈橫解腸澼為痔蓋風氣通於肝肝生風風生熱風客則淫氣傷精而成斯疾遂與黃連當歸黃耆生地防風枳殼白芷柴胡槐花地榆甘草治之漸愈次以黃連丸而瘥一男子患痔脈浮鼓午後發熱作痛以八珍湯加黃耆柴胡地骨皮治之稍可彼欲速效用劫藥蝕之痛甚絶食而歿凡用枯藥者宜先治其內內愈而後可治其外也夫瘡之潰斂氣血使然也脈浮鼓日晡痛此氣血虛也丹溪云瘡口不合大劑參耆朮歸芎補之外以附子餅灸之更以補藥作膏貼之一男子年逾四十有痔漏大便不實服五苓散愈加泄瀉飲食少思此非濕毒乃腸脾胃虛也當以理中湯治之不信乃服五苓散愈甚乃以理中湯及二神丸月餘而平李逵因痔瘡怯弱以補中益氣湯少加芩連枳殼治之稍愈後因怒加甚時仲冬脈得洪大謂脈不應病此乃腎水不足火來乘之藥不能治果歿於火旺之月常見患痔者腎脈不足俱難治劉商有痔肛門脫出此濕熱下注真氣不能升舉診其脈果虛遂以四君子湯加黃芩芎歸蒼朮黃柏升麻柴胡服之更以五倍子煎湯熏洗彼以為緩乃用砒霜等毒藥蝕之而歿劫藥特治其末且能伐真元鮮不害人慎之徐生因痔氣血愈虛飲食不甘小便不禁夜或遺精此氣虛兼濕熱而然非瘡故也以補中益氣湯加茱萸山藥五味兼還少丹治之而愈一男子患痔漏膿出大便諸藥不應診其脈頗實令用豬腰一個切開入黑牽牛末五分線扎以荷葉包煨熟空心細嚼溫鹽酒送下數服頓退更以托裡藥而愈即煨腎散朱丹溪治一人肛門生癤後不收口針窮三孔穴邊血膿用黃耆條芩連翹秦艽右末之神麯丸服治法豫庚子除夕痔作時官舍合肥難得醫者取官局釣腸丸一百二十粒分為二服熱酒並服之中夜腹間微痛下少結屎旦起已安治證具載本方所以作效速者以服多故耳百乙方蔥青內刮取涎對停入蜜調勻先以木鱉子煎湯熏洗然後敷藥其冷如冰唐仲舉云常有一吏人苦此渠族弟親合與之早飯前敷午後以榜紙來謝拜於庭下疾已安矣鄭器先用之親曾得效其法鳩尾骨尖少偃處即是穴麥粒大艾炷灸七壯或十四壯甚者二十一壯上瘡發即安可除根本並百乙方薛立齋治一人痔漏口乾胃脈弱此中氣不足津液短少不能上潤而然以黃耆六一湯七味白朮散治之或曰諸痛癢瘡皆屬心火遂服苦寒之藥大便不禁而歿夫諸痛癢皆屬心火言其常也始熱終寒則反常也可泥此而不察乎許叔微治一人腸風脫肛不收有血下用皂角三莖槌碎水一碗揉令皂角消盡用絹二重濾去清汁數分將脫肛腸浸在藥中其腸自收不用手托如大腸收了更用湯蕩其脫肛上令皂角氣行則不再作三次蕩愈龔子才治小兒脫肛因久患瀉利所致宜用蔥湯熏洗令軟送上或以五倍子末敷而托入又以五倍子煎湯洗亦可又以鱉頭燒存性香油調敷一云此物煙燻之久自收又以東壁土泡湯先熏後洗亦效蘇東坡與程正甫書云凡痔疾宜斷酒肉與鹽酪醬菜厚味及粳米飯惟宜食淡面一味及以九蒸胡麻即黑芝麻同煎去皮茯苓少入白蜜為麵食之日久氣力不衰百病自去而痔漸退此乃長生要訣但易知而難行耳江夏鐵佛寺蔡和尚病肛門痔痛不可忍有人教用木鱉仁帶潤者雌雄各五個乳細作七丸碗覆溫處勿令乾每以一丸唾化開貼痔上其痛即止一夜一丸自消也後用治數人皆效瀕湖集酒方張子和治趙君玉常病痔鳳眼草刺蝟皮槐根貍首之類皆用之或以乾薑作末塗豬肉炙食之大便燥結不利且瘤疑痿後數日因病黃大涌瀉數次不言痔作矣徐靈胎曰脫肛多由濁氣下降濕痰毒火合併為害故腫痛異常此實症也必清其大腸之火而用外治之藥以收之無不立愈其有虛人病後清氣下陷則用補中益氣以提之乃十不得一者也若不論何因俱用升提收斂之法肛門之痰火濁氣將升提而置之何地耶且脫肛之疾屬實者多又用溫燥更非所宜漏瘡薛立齋治一男子臂患漏口乾發熱喜膿不清稀脈來遲緩以豆豉餅灸及服八珍湯加麥冬五味子軟柴胡地骨皮三月餘而愈後因不慎房勞復潰膿清脈大辭不治果歿河間云因病致虛則為輕蓋病勢尚淺元氣未虛也至病初愈而勞復飲食勞倦或房勞七情六欲陽瘁陰弱加致羸損此因虛致損則為重病勢已過元氣已索之故也一男子年逾二十稟弱左腿外側患毒三月方潰膿水清稀肌肉不生以十全大補湯加牛膝二十餘帖漸已更以豆豉餅灸之月餘而痊又一媼左臂結核年餘方潰膿清不斂一男子患貼骨癰腿細短軟瘡口不合俱飲十全大補湯外用附子餅及貼補藥膏調護得宜百帖而愈大凡不足之症宜大補之兼灸以接補陽氣祛散寒邪為上京師董賜年逾四十胸患瘡成漏日出膿碗許喜飲食如常以十全大補湯加貝母遠志白蘞續斷灸以附子餅膿漸少謹調護歲余而愈一男子患漏時值陰寒忽惡寒右手脈有而似無此胃氣虛而不任風寒也以四君子湯加炮薑肉桂二劑少止又四劑而安姚應鳳治鄭孝廉患流注穿漏垂死應鳳曰氣從下泄難以奏功乃取藥作糜周身封以敗楮隙肩井穴吸之而愈褪管方人手指甲炙黃象牙屑穿山甲炙黃各研細乳香沒藥俱炙硃砂水飛舊羊角燈底須十年外者打碎麩炒為極細末各三錢合勻再研以黃蠟化和丸如椒大初服五丸逐日加一丸服至十日外又每日減一丸退至五丸再逐日加一丸如此周而復始每日空心陳酒下管漸褪出褪盡為度臀癰薛立齋治一弱人臀癰膿成不潰以十全大補湯數劑始托起乃針之又二十餘劑而愈此症弱人宜補氣血為要一人臀癰焮腫痛甚此邪毒壅滯用活命飲隔蒜灸而消後因飲食勞倦腫痛復作寒熱頭痛此元氣虛而未能復也與補中益氣湯頻用蔥尉法兩月而愈昆庠吳轉之父患此內潰又脹發熱口乾飲食少思此脾虛弱也先用六君子加芎歸耆數帖而潰又用十全大補湯倍加參耆五十餘劑而愈一男子臀癰硬痛發熱此膀胱氣虛而濕熱壅滯用內托羌活湯二劑熱痛悉退後用托裡消毒散而潰又用托裡散四十餘劑而斂一男子臀癰腫硬作痛尺脈浮緊按之無力以內托羌活湯一劑痛止以金銀花散四劑膿潰而愈一男子臀癰腫硬痛甚隔蒜灸之更服仙方活命飲二劑痛止腫消以托裡消毒散加黃柏蒼朮羌活瘡頭潰而愈一男子臀癰作膿而痛以仙方活命飲二劑痛止更以托裡消毒散膿潰而瘥一男子臀癰不作膿飲食少思先用六君子湯加芎歸黃耆飲食漸進更以托裡消毒散膿潰而愈一男子臀癰潰而膿清不斂以豆豉餅灸之更飲十全大補湯兩月餘而痊凡瘡不作膿或不潰或潰而不斂皆氣血之虛也若膿清稀尤其虛甚也一男子臀癰膿水不止肌肉漸瘦飲食少思胃脈見弦以六君子湯加藿香當歸數劑飲食漸進以十全大補湯及豆豉餅灸之兩月餘而斂薛立齋治一弱人臀漫腫色不變脈滑數而無力此臀癰也膿將成尚在內欲治以托裡藥待發出而用針彼欲內消服攻伐藥愈虛復求治仍投前藥托出針之以大補藥而愈凡瘡毒氣已結不起者但可補其血氣使膿速成而針去不可論內消之法膿成又當辨其生熟淺深而針之若大按之乃痛者膿深也小按之便痛者膿淺也按之不甚痛者未成膿也按之即復起者有膿也按之不復起者無膿也若腫高而軟者發於血脈腫下而堅者發於筋骨色相不變發於骨髓也此條舊案已收因無後段發明故録之一男子臀癰腐潰肌肉不生用藥敷之四沿反硬診之脈澀而弱此氣血不能榮於患處故敷涼藥反硬乃氣血受寒凝結而非毒也用大補藥愈矣一人患臀癰用五爪龍連枝搗汁酒漉服日進四五次膿從大便出未成膿者內消如有頭以渣敷上立散治魚口極效廣筆記曹文部文兆年逾四十髀胛患毒已半月餘頭甚多狀如粟許內痛如癩飲食不思怯甚脈歇止此元氣虛疽蓄於內也非灸不可遂灸二十五壯以六君子湯加藿香當歸數劑瘡勢漸起內痛頓去胃脈漸至但色尚紫瘀肉不潰此陽氣尚虛也燃桑柴灸之以補接陽氣解散其毒仍以前藥加參耆歸桂色赤膿稠瘀肉漸腐取去兩月餘而愈夫邪氣沉伏真氣怯弱不能起發須火灸而兼大補投以常藥待其自潰鮮有不誤者沈侍御患臀腫痛小便不利彼謂關格症以艾蒸臍大便赤不利以降火分利之藥治之不應診其脈數膿成此癰患也遂針之出膿數碗許大便即利五日陰囊腫脹小便不行仍針之參連歸術之藥猶緩俾服獨參湯至二斤氣稍復又服獨參湯兼以托裡藥兩月餘而平大抵瘡瘍膿血之泄先補氣血為主雖他病當從末治滕千兵年逾五十臀患癰膿熟不開攻通大肛膿從大便而出辭不能治果斃丹溪云臀居小腹之後陰中之陰也道遠位僻血亦罕周中年後尤慮患此況膿成不刺欲不亡得乎囊癰薛立齋治一男子囊癰未作膿而腫痛以加味龍膽瀉肝湯二劑少愈更以四物湯加木通知母黃柏而愈一男子囊癰焮腫痛甚小便澀發熱脈數以龍膽瀉肝湯倍用車前子木通茯苓四劑勢去其半仍以前湯止加黃柏金銀花四劑又減二三便利如常惟一處不消此欲成膿也再用前湯加金銀花白芷角刺六帖微腫痛脈滑數乃膿已成令針之腫痛悉退投滋陰托裡藥及紫蘇末敷之愈一膏粱之客陰囊腫脹小便不利此中焦積熱乘虛下注先用龍膽瀉肝湯加黃柏牛膝四劑漸愈後用補陰八珍湯加柴胡山梔而愈後不守禁忌前症復作仍用補陰八珍湯補中益氣湯六味丸而痊又因勞倦發熱自用四物湯知柏之類虛症悉具瘡口大開五臟氣血俱虛也朝用補中益氣夕用六君加當歸各五十餘帖瘡口始斂又用六味丸調理而愈知州黃汝道先晡熱發熱肢體倦怠入房則腿足痠軟足心熱至腿膝六脈洪數兩尺為甚此足三陰虛欲滋補化源彼反服苦寒降火之劑後陰囊腫脹以疝治之腫脹益甚形氣愈虛服溫補之劑腫痛上攻小便不利兩尺脈洪按之虛甚曰此囊癰也因氣血虛而不能潰先用補中益氣湯加山藥山萸車前柴胡山梔一劑腫脹頓消隨用六味丸料加車前牛膝柴胡山梔一帖小便漸通乃用活命飲與前二藥消息間用至二十餘劑囊裂出穢膿甚多乃用托裡消毒散六劑膿穢清又用托裡散數劑膿水漸少更用補陰托裡散及十全大補五十餘劑而痊府庠李達卿素腎虛發熱久服知柏之類形體漸瘦遺精白濁晡熱吐痰此腎水虧損虛火內熾用補中益氣之類加五味麥冬前症將愈又別用清熱涼血之劑飲食少思唾痰不止此脾虛復損不能攝涎歸源仍用前湯加茯苓半夏而愈後入房頭暈吐痰腰骨作痛大小便牽痛此精已耗而復竭所致危殆之症也遂朝用前湯加麥冬五味夕用六味丸料加五味萆薢五十餘帖諸症頓退後又入房陰囊陰莖作痛別用淡滲之劑陰囊內潰乃用補陰托裡之劑出膿甚多喜腫消痛止竟不善調養致大便不通小便如淋痰涎上湧此腎虛之症復作矣誠為可慮有保其可生者用礞石滾痰丸牛黃清心丸之類吐痰愈加曰非惟無益保其生而反促其危矣辭不治果歿一男子患囊癰腫痛發熱以小柴胡湯加黃連青皮四劑少愈更以加減龍膽瀉肝湯而愈一男子囊癰膿熱作脹致小便不利令急針之以小柴胡湯加黃柏白芷銀花四劑少愈更以托裡消毒散數劑而痊一男子囊腫狀如水晶時痛時癢出水小腹按之作水聲小便頻數脈遲緩此醉後飲水入房汗出遇風寒濕毒氣聚於囊為患名水疝也先以導水丸二服腹水已去小便如常再飲胃苓散倍苓術更用針引去聚水而痊一男子患囊癰久而不斂以十全大補湯加五味子麥冬灸以豆豉餅月餘而平一弱人囊癰腫痛未成膿小便赤澀以炙甘草青皮木通黃柏當歸麥冬四劑少愈以清心蓮子飲而消一男子患囊癰病勢已甚脈洪大可畏用前湯二劑腫少退以仙方活命飲二劑痛少止脈之滑數乃膿已成須針之否則囊皆潰不信遂更他醫果大潰睪丸懸挂復求治診之脈將靜以八珍湯加黃耆知柏山梔更敷紫蘇末數日而痊此症勢雖可畏多得保全患者勿懼一弱人患囊癰膿熟脹痛大小便祕結針之膿出三碗許即鼾睡覺而神思少健但針後雖敷解毒藥亦潰盡矣故用托裡藥三十餘劑始痊大抵此症屬陰道虧濕熱不利所致故滋陰除濕為要常治腫痛小便祕澀者用除濕為主滋陰佐之腫痛退便利和者除濕滋陰相兼治之欲其成膿用托裡為主滋陰佐之膿成即針之仍用托裡滋陰濕毒已盡專用托裡如膿清或多或斂遲者用大補之劑及豆豉餅或附子餅灸之如盧武選封君年逾五十患此瘡口年餘不斂診之微有濕熱以龍膽瀉肝湯治之濕熱悉退乃以托裡藥及豆豉餅灸之而愈次年復患濕熱頗盛仍用前湯四劑而退又以滋陰藥而消若潰後虛而不補少壯者成漏老弱者不治膿清作渴脈大者亦不治朱丹溪曰癰疽入囊者豫嘗治數人悉以濕熱入肝經施治而用補陰佐之雖膿潰皮脫睪丸懸挂皆不死外科心法薛立齋治胡同知年逾五十陰囊腫痛得熱愈甚服蟠蔥散等藥不應肝脈數此囊癰也乃肝經濕熱所致膿已成急針之以龍膽瀉肝湯脈症悉退更以托裡滋陰藥外搽杉木灰紫蘇末月餘而愈此症雖潰盡無害患者審之柏道官六十餘陰囊已潰痛不可忍腎丸露出與以龍膽瀉肝湯服之及敷前末不應竟此濕氣熾甚先以槐花酒一碗仍投前藥少愈更以托裡加滋陰藥月餘而乎設以前藥不應加之峻利未有不損中氣以致敗者也聘士陳時用沈汝和患此悉用前藥而愈竇材治一人忽遍身拘急來日陰囊連莖大腫如斗六脈沉緊此陰疽也幸未服解毒涼藥若服之則莖與睪丸必皆爛去而死急令服救生湯五錢又一服全安懸癰薛立齋治一弱人穀道前結核如大豆許勞則腫痛先以十全大補湯去桂枝加車前麥冬酒炒黃柏知母少愈更服制甘草漸愈即國老膏仍以四物車前之類而消一男子患懸癰焮腫發熱以龍膽瀉肝湯二劑及制甘草四劑而潰再用滋陰之劑而愈若膿未成以蔥炒熟敷上冷則易之隔蒜灸之亦可數日不消或不潰或潰而不斂以十全大補湯加柴胡為主間服制甘草並效若不保守必成漏矣一男子患懸癰服坎離丸及四物知柏之類不應脈浮洪按之微細以為足三陰之虛用托裡散及補陰八珍湯愈又用六味丸補中益氣湯調補化源半年而痊大凡瘡瘍等症若腎經火氣亢盛致陰水不能生化而患陰虛發熱者宜用坎離丸取其苦寒能化水中之火令火氣衰而水自生若陽氣衰弱致陰水不能生化而患陰虛發熱者宜用六味丸取其酸溫能生火中之水使陽氣旺而陰自生況此症屬腎經精氣虧損者十有八九屬腎經陽氣亢盛者十無一二然江南之人患此者多屬脾經陰血虧損元氣下陷須用補中益氣湯升補陽氣使陽生而陰長若嗜欲過多虧損真陰者宜用六味丸補腎經元氣以生精血仍用補中益氣湯以培脾肺之生氣而滋腎水經云陰虛者脾虛也但多認為腎經火症用黃柏知母之類復傷脾肺絶其化源反致不起惜哉通府張敬之患懸癰久不愈日晡熱甚作煩渴而喘或用四物湯知柏之類病益甚肢體倦少食大便不實小便頻數問何故曰此肺虛之症前藥復傷而然遂用補中益氣加茯苓半夏數劑飲食漸進症漸減更加麥冬五味調理乃痊經曰脾屬太陰為陰土而主生血故東垣云脾虛元氣下陷發熱煩渴肢體倦怠等症用補中益氣湯以升補氣而生陰血若誤認為腎虛火盛而用四物知柏之類反傷脾胃生氣是虛其虛矣況知柏乃瀉陽損陰之劑若非膀胱陽火盛而不能生陰水以致發熱者不可用也魏玉橫治江云溪兄初春患痔即令服一氣湯加減不信致臥月餘後遂成管冬月復患懸癰初時如大豆半月來大如雞卵按之甚痛行動有妨幸未服藥脈之惟左關尺略大而微此膿尚未成也仍與一氣湯加減大生地麥冬北沙參甘杞子生米仁蔞仁丹皮地丁等令服八劑二劑知四劑消其半八劑完而全愈薛立齋治尚寶鮑希傳足發熱服四物知母黃柏之類年餘患懸癰唾痰作渴飲湯其熱至膝更加芩連二陳熱痰益甚問故曰此足三陰虧損水泛為痰寒涼之劑傷胃而甚耳遂朝用補中益氣夕用六味丸間佐以當歸補血湯半載乃愈上舍劉克新懸癰潰後作痛發熱口乾小便赤色自用清熱消毒之藥不應左尺洪數此陽氣盛而陰氣虛也先用四物湯加知母等諸劑瀉其陽氣使陰自生數劑諸症漸愈後用益氣湯地黃丸補脾肺滋腎水而愈一儒者患懸癰小便赤澀勞則足軟腫痛發熱口乾舌燥體倦日晡益盛此氣血虛而未能潰也遂用八珍加麥冬山藥倍用制甘草數劑諸症悉退但患處腫痛此膿內焮也又五劑膿自湧出又五十餘劑而瘡口將完又因勞役且停藥寒熱作渴膿多腫痛用補中益氣湯加炒梔二劑少愈又以八珍湯加麥冬五味百餘劑腫痛悉去喜其慎起居節飲食常服補劑而安但勞則膿出一二滴後惑於他言內用降火外用追蝕必其收斂致患處大潰幾至不起仍補而愈一男子懸癰腫痛小便赤澀以加減龍膽瀉肝湯加制甘草二劑少愈以參耆歸朮知柏制甘草四劑而潰更以四物湯加知柏參耆制甘草而愈一男子患懸癰膿清不斂內有一核以十全大補湯加青皮柴胡制甘草更以豆豉餅灸之核消而斂一男子患懸癰久而不斂脈大而無力以十全大補湯加五味麥冬灸以豆豉餅月餘而愈一老人患懸癰年餘不斂診其脈尚有濕熱以龍膽瀉肝湯二劑濕退乃以托裡藥及豆豉餅灸之而愈一男子患此症腫痛發熱以小柴胡湯加黃連青皮四劑少愈更以加減龍膽瀉肝湯而消一男子患懸癰膿不潰脹痛小便不利急針之尿膿皆利更以小柴胡湯加黃柏白芷金銀花四劑痛止以托裡消毒四劑而愈常見患者多不肯用針待其自破殊不知緊要之地若一有膿宜灸針之使毒外發不致內潰故前人云凡瘡若不針烙毒結無從而解膿瘀無從而泄又云宜開戶以逐之今之患者反謂地部緊要而不用針何其悖哉一男子懸癰膿熟不潰脈數無力此氣血俱虛也欲治以滋陰益血之劑更針之使膿外泄彼不從仍用降火散毒藥致元氣愈虛瘡勢益甚後潰不斂竟致不救夫懸癰之症原系肝腎二經陰虛雖一於補尤多不治況膿成而又克伐不死何俟常治初起腫痛或小便赤澀先以制甘草一二劑及隔蒜灸更飲龍膽瀉肝湯若發熱腫痛者以小柴胡湯加車前黃柏芎歸膿已成即針之已潰者用八珍湯加制甘草柴胡梢酒炒知柏小便澀而脈有力者仍用龍膽瀉肝湯加制甘草小便澀而無力者用清心蓮子飲加制甘草膿清不斂者用大補之劑間以豆豉餅灸之久而不斂者用附子餅灸之並效薛立齋治一男子患懸癰焮痛發寒熱以小柴胡湯加制甘草二劑少退又用制甘草四劑而消大抵此症屬陰虛故不足之人多患之寒涼之藥不可過用恐傷胃氣惟制甘草一藥不損氣血不動臟腑其功甚捷最宜用之不可忽也馬銘鞠治談公武患跨馬癰外勢不腫毒內攻膿多瘡口甚小突出如指大一塊觸之痛不可忍多飲寒劑敷涼藥毒內攻胃氣俱損令盡去圍藥洗淨瘡口但用一膏藥以護其風用大劑黃耆山藥生地白芷牛膝米仁銀花雜以健脾藥十餘劑膿盡再數劑肉長突出者平矣後服六味丸斤許精神始復廣筆記薛立齋治黃吏部穀道前患毒焮痛寒熱此肝經血虛濕熱所致名曰懸癰屬陰虛症先以制甘草二服頓退用以四物加車前子青皮甘草節酒製知柏數服而消一男子歲逾五十患懸癰膿清肝腎脈弱此不慎酒色濕熱壅滯也然膿清脈弱老年值此甚難收斂況穀道前任脈發源之地肝經宗筋之所辭不治後果死嘗治此癰惟澗水制甘草有效已破者兼十全大補湯為要法柴嶼青以省覲舟行舟人患騎馬癰哀號痛楚憐而治之先用大歸湯十餘劑外貼回生膏日令其以藥水勤洗繼惟十全大補湯因貧人若無力購參攜有扁黨參給以半斤始備藥又用玉蟾生肌散人參末敷患處調理月餘而愈痃癖一名便癰一名便毒一名㾦子一名血疝又俗名石米瘡左為魚口右為便毒生於兩胯合縫之間結腫名曰橫痃又名外疝薛立齋治一婦人拗中赤腫脹痛此膿內作用托裡消毒散加柴胡數劑潰而膿清寒熱乃氣血復虛用托裡散而寒熱止用十全大補百餘劑而痊一婦人腹拗腫痛小水不利或時胸乳作痛脅腹作脹此肝火氣滯四物加柴胡青皮元胡索木香而愈一婦人拗中作痛小腹痞悶小便不利內熱體倦飲食少思此肝火內動脾胃受傷也用加味歸脾湯柴胡清肝散而安一婦人拗中腫脹小腹作痛服下血之劑其痛益甚更吐瀉少食此肝脾復傷用六君子湯加升麻柴胡而愈薛立齋治一婦人兩拗腫痛腹內一塊不時上攻月經不調大便不利此肝脾氣滯而血傷以四君加芎歸柴胡山梔而愈後因鬱怒前症復作兼胸滿腹脹盜汗此肝木甚而傷脾土也用加味歸脾湯下蘆薈丸而痊一婦人小腹內作痛或痞悶兩拗腫痛內熱寒熱胸膈不利飲食不甘形體日瘦此肝氣滯而氣傷也朝用補中益氣湯夕用蘆薈丸漸愈更用六味丸全愈一婦人兩拗腫痛小腹痞脹白帶時下寒熱往來小水淋瀝此肝氣滯而血病用龍膽瀉肝湯漸愈又用加味逍遙散六味地黃丸全愈一婦人患前症胸脅脹悶或小水不利或時腹痛此肝火氣病先用龍膽瀉肝湯以清肝熱又用加味逍遙散以生肝血六味地黃丸以滋腎水而愈一婦人患前症內熱作渴飲食不甘肢體倦怠陰中作梗小便赤澀此脾經鬱結肝經濕熱用加味歸脾湯而愈後因怒氣復作小腹脹痛用小柴胡加山梔芎歸痛止又用加味逍遙散而愈一婦人小腹痞悶溺澀內熱體倦懶食此肝火動而脾血傷也用八珍加柴胡山梔膽草而安一婦人陰中如梗兩拗腫痛寒熱不食小便頻數小腹重墜此肝脾鬱怒所致先以補中益氣加茯苓山梔車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾鬱而愈一婦人小腹內如有所結兩拗並玉門俱腫小便淋漓經候不調內熱作渴飲食少思腹內如雞卵而漸大脈洪數而虛左關尤甚屬肝膽鬱結之症也用加味歸脾湯肝火退而脾土健間以逍遙散下蘆薈丸而愈一男子患便毒焮腫作痛大小便祕脈有力以玉燭散二劑頓退更以龍膽瀉肝湯四劑而愈一男子便毒已潰而痛不止小便祕澀此肝火未解也以小柴胡加黃柏知母芎歸痛止便利更以托裡當歸湯而瘡斂若毒未解而痛不止者須用活命飲春元凌待之虛而服克伐藥幾致危殆用托裡健脾藥而愈秀才王文遠因勞苦之後患此服小柴胡湯及表症散後用托裡藥膿成針之而旬日愈又胡判官膿清脈弱以大補藥已愈因新婚而復發自用連翹清毒散致瀉利不止竟至不救可見此症屬不足者多矣非補不可大凡便毒屬肝經初起堅硬肝主筋故也五七日後赤軟膿成故也若尚堅硬乃元氣不能腐化往往人見堅硬只欲內消反服攻散藥多致虛虛之禍前此治者即其驗也魏玉橫治宋復華兄因勞頓患左拗腫硬漸如鵝卵或與發散轉甚已半月足冷過膝面赤手亦冷惡寒夜熱口苦食懈脈之弦數曰此肝虛火甚也與生地杞子沙參麥冬丹皮蔞仁歸身紅花間入川楝川連羚羊牛蒡數劑寒熱退又十劑其腫硬及諸症漸愈惟余小塊如豆大未消彼以要務奔走勞碌復腫數日大如李其色赤而軟已成膿再與前藥即自潰而愈此症俗名一石米瘡言百日後可愈也即遇先輩如立齋其治法或未能如是余非能有過古人第知為肝腎病則不雜入他藥耳薛立齋治一婦人素清苦因鬱怒患前症或用散毒寒涼之藥反晡熱內熱自汗盜汗月經不行口乾咽燥此鬱氣傷脾因藥復損先以當歸湯數劑後兼逍遙散五十餘劑而愈陳自明治一男子患便毒堅硬與神仙太乙丹一粒即服之去後二次痛止不日而消方見蟲門薛立齋治一男子患此未作膿小便祕澀以八珍三劑少愈以小柴胡湯加澤瀉山梔木通二劑而消一男子患此症腫痛發寒熱以荊防敗毒散二劑而止以雙解散二劑而愈一男子患此症膿未成覺大痛服消毒托裡內疏藥不應診之脈洪大毒尚在以仙方活命飲一劑痛止又一劑而消一男子患此症腫痛日晡發熱以小柴胡湯加青皮花粉四劑痛止熱退以神效栝蔞散四劑而消一男子患此症腫而不潰以參耆歸朮白芷皂角刺柴胡甘草節數服而潰以八珍湯加柴胡數劑而愈一男子患此症潰而腫不消且不斂診之脈浮而澀以豆豉餅灸之更以十全大補湯月餘而愈一男子患此症潰而痛不止諸藥不應診之脈大按之則數乃毒未解也以仙方活命飲而止又二劑而斂一男子患此症服克伐之藥以求內消致瀉利不食以二神丸先止其瀉以十全大補倍加白朮茯苓數劑而消大抵此症多患於勞役之人亦有內蘊熱毒而生者須辨虛實及成膿否不可妄投藥餌常見治此症者概用大黃之類下之以求內消或膿成令膿從大便出鮮有見其痊也人多欲內消者蓋恐收口之難也若補養血氣不旬日而收矣何難之有若膿既成豈有可消之理如再用克伐之劑反為難治一男子不慎房勞患此腫痛以雙解散一服通之其痛即止更以補中益氣湯數劑而膿針之以八珍湯加五味子麥冬柴胡三十餘劑而愈大抵便癰者血疝也俗呼為便毒言於不便處腫毒故為便癰也乃足厥陰肝之經絡及衝任督脈亦屬肝之旁絡且氣血流通之道今壅而腫痛此則熱毒所致宜先疏導其滯更以托裡之劑此臨症制宜之法也一老婦患此症腫痛膿尚未成小便澀肝脈數以加減龍膽瀉肝湯加山梔黃柏四劑而消張德俊灸便毒親曾取效云屢以灸他人皆驗以細草或軟篦一莖隨所患左右手量中指自手掌盡處橫紋量起通三節至指盡處為則不量指甲集斷卻將此草於手腕橫紋量起引草向臂當中草盡處即是穴麥粒大灸三壯腫散痛止即時安百乙方繆仲淳親試治便毒甚驗棉地榆四兩白酒三碗煎一碗空心服雖腫者亦愈加穿山甲同患處者三片土炒引經更妙廣筆記又方棉地榆四兩粉甘草一兩金銀花一兩白芷三錢皂角刺二錢五分水煎服黃履素曰余家有女流患便癰兩拗腫痛不能起瘍醫用敗毒藥十餘帖以圍藥逼之出膿腫痛愈甚豫查薛氏外科樞要此症皆因鬱怒傷肝得之治用加味歸脾湯加味逍遙散間服遂依用之不三劑腫痛減半六劑而起孫文垣治吳翁年七十有三偶墜馬左脅作痛隨治而愈後半年忽左胯腫痛憎寒作熱諸治罔效或作疝氣投荔核大小茴香川楝橘核之類痛不可忍至欲引繩自絶診之六脈浮而洪數左尺尤甚驗痛處紅腫如匏按之烙手此便毒也非因近色而得蓋胯屬厥陰肝經肝為血海乃昔時墜馬惡血消之未盡蓄於經絡化而為膿年高氣虛又為香燥克伐故痛且劇今其色青中隱黑膿成久矣乃令外科針之出青黑膿五六碗此俗名一石米瘡也乃用托裡十宣散又加參耆每帖三錢後加至五錢一日兩進兩月而愈腿癰薛立齋治一男子年逾二十稟弱左腿外側患毒三月方潰膿水清稀肌肉不生以十全大補湯加牛膝二十餘劑漸愈更以豆豉餅灸之月餘而痊滁州於侍御髀胛患毒痛甚服消毒藥其勢未減即以槐花酒一服其症大去再以托裡消毒而愈丁蘭年二十餘股內患毒日久欲求內消診其脈滑數知膿已成且氣血虛不潰遂刺之膿出作痛以八珍湯治之少可但膿水清稀更以十全大補湯加炮薑附子五分數劑漸愈仍服十全大補湯三十餘劑而痊一僧患股內腫一塊不痛不潰治以托藥二十餘劑膿成刺之作痛謂腫而不潰潰而反痛此氣血虛甚也宜峻補之彼云痛無補法曰正氣不足不可不補補之則氣化而痛邪自除遂以參耆歸地白朮治之兩月而平一男子腿內患癰漫腫作痛四肢厥逆咽喉閉塞發寒熱諸治不效乃邪郁筋絡而然也用五香連翹湯一劑諸症少退又服之大便行二次諸症悉退而愈薛立齋治一男子先腿痛後四肢皆痛遊走不定至夜益甚服除敗毒之劑不應其脈滑甚兼濕痰濁血為患以二陳湯加蒼朮羌活桃仁紅花牛膝草烏治之而愈凡濕痰濕熱及死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和焉能得愈上舍李通甫腿患瘡作痛少食作嘔惡寒此痛傷胃氣用六君子湯加當歸四劑疼痛少止飲食加進又以十宣散加白朮茯苓陳皮數劑膿成針而出之又以前散去防風白芷數劑而痊一老人腿患癰自潰忽發昏瞀脈細而微此氣血虛極也以大補之劑而蘇一男子患腿痛而不焮腫大小便利調和用托裡榮衛湯數劑而消一男子內股患毒腫硬痛甚不作膿隔蒜灸五十餘壯勢退七八以仙方活命飲四劑而膿成用十宣散六劑膿潰而愈凡瘡或大痛或不痛麻木灸最良一男子腿內側患癰未作膿而腫痛以內托黃耆柴胡二劑少愈又二劑而消一男子腿外側患癰漫腫大痛以托裡黃耆酒煎湯二劑少可更以托裡散數劑潰之而愈一婦人腿癰久而不愈瘡口紫陷膿水清稀以為虛彼不信乃服攻毒之劑虛症蜂起復求治令灸以附子餅服十全大補湯百餘劑而愈凡瘡腫膿清不斂者再或陷下皆氣血虛極也最宜大補否則成敗症若更患他症尤難治療一男子腿癰內潰針之膿出四五碗惡寒畏食診脈如絲此陽氣微也以四君子湯加炮附子一錢服之寒少止又四劑而止以六君子湯加桂數劑飲食頓進乃以十全大補湯及附子餅兩月而愈一男子患腿癰兼筋攣痛脈弦緊用五積散加黃柏柴胡蒼朮治之而痊一男子腿痛兼筋攣骨痛脈弦緊以大防風湯二劑攣少愈又二劑而腫消但內一處尚作痛脈不緊此寒邪已去乃所滯瘀濁之物欲作膿故痛不止用托裡藥數劑腫發起脈滑數乃膿已成矣針之用十全大補湯月餘而安一男子右腿赤腫焮痛脈沉數用當歸拈痛湯四肢反痛乃濕毒壅遏又況下部藥難達非藥不對症也遂砭患處去毒血仍用前藥一劑頓減又四劑而消丹溪診東陽李兄子年逾三十形瘦膚厚連得憂患又因作勞過於色忽足腿外側臁上紅腫其大如栗一醫問其大府堅實與承氣湯兩帖不效又一醫教以大黃硃砂生粉草麒麟竭又二三帖半月後召視之曰脈實大事去矣後果歿馬銘鞠治江都尹子九歲患腿癰治彌月勢漸盛按之堅如石幸兒氣厚可內消用牛膝米仁地榆生地牛蒡銀花連翹甘草初劑加利藥微利之即稍寬後兩劑加汗藥微汗之勢益寬至數劑取穿山甲末五錢半入煎半調藥送下兒善飲令一醉自此頓消半月地下行矣初一醫欲開刀遇馬中止凡外科宜以開刀為戒廣筆記薛立齋治一男子患腿癰膿已成針之出二碗許飲以托裡藥一劑大發熱更以聖愈湯二劑而止翌日惡寒不食脈細如絲以人參一兩熟附子三片薑棗煎再服而愈但少食不寐更與大補黃耆湯而平一男子腿腫發熱畏寒以補中益氣湯治之彼以為緩乃服芩連等藥熱愈甚復請治與人參養榮湯二十餘劑而潰更以參耆歸朮炙草肉桂又月餘而斂夫火之為病當分虛實芩連苦寒能瀉心肺有餘之火若老弱或飲食勞倦而發者此為不足當以甘溫之劑治之未嘗有實熱而畏寒虛熱而喜寒者琇按二語卻未然此其驗也陸封公養質患腿癰醫用忍冬花角刺連翹白芷貝母花粉陳皮乳香沒藥治之不效仲淳即前方加棉地榆炙甘草紫花地丁服三四劑愈臁瘡附爛腿薛立齋治一婦人患臁瘡因步履勞動復惡寒發熱倦怠懶食而瘡出血此元氣虛而不能攝血歸經也用補中益氣湯而愈陶九成曰辛酉夏余足瘍發於外臁初甚微其後浸淫涉秋徂冬不良於行凡敷膏濯之劑嘗試略盡痛癢雜作大妨應酬一日友人俞和父過見怪其蹣跚舉以告之和父笑曰吾能三日已此疾法當先以淡齏水滌瘡口浥干次用局方駐車丸研極細加乳香少許干糝之無不立效如其説用之數日良愈蓋駐車丸本治血痢滯下而此瘡亦由氣血凝滯所成也齊東野語張子和治小渠袁三因被盜受驚僕傷其兩胻外臁作瘡數年不已膿水常涓涓然但飲冷則瘡間冷水浸淫而出延為濕瘡張曰爾中焦當有緑水二三升涎數掬袁曰何也曰當被盜時感驚氣入腹驚則膽傷足少陽經也兼兩外臁皆少陽之部此膽之甲木受邪甲木色青當有緑水少陽在中焦如漚既伏驚涎在中焦飲冷水咽為驚涎所阻水隨經而旁入瘡中故飲水則瘡中水出乃上湧寒痰汗如流水次下緑水果二三升一夕而痂干矣薛立齋治一室女年十七腿外臁忽腫起一紅點作癢搔破日日鮮血如注及飛出小蟲甚多審其由每先寒熱兩耳下或結核蓋外臁耳下俱屬膽經膽為肝之腑肝主風熱生蟲血得風而妄行肝火旺而血出其肝膽陰陽俱虛矣凡病虛則補其母用六味丸滋腎水以生肝木四物加柴胡山梔鉤藤生肝血以抑風熱而痊陳湖陸懋誠素因陰虛過飲入房發熱腿痛似臁瘡用發表之劑兩腿腫黯熱氣如霧欲發痙脈皆洪數兩尺尤大此屬足三陰虛酒濕所乘元氣損而邪益甚耳用十全大補加山藥山萸附子一劑脈症頓退去附子又二劑全愈李絳記武元衡相國在西川且苦脛瘡焮痛不可堪百醫無效及到京城呼供奉石礞等數人療治無益有廳吏上此方用之便瘥其方云療多年惡瘡百方不瘥或痛焮走注不已者並爛搗馬齒莧敷上不過三兩度愈李絳兵部手集章宇泰傳治臁瘡方六郎乳母試之神效松香一兩輕粉三錢乳香五錢細茶五錢四味共打成膏先將蔥頭花椒煎湯熏洗淨用布攤膏厚貼患處以絹縛定黃水流盡爛肉生肌廣筆記陳儀部年逾五十兩臁生瘡日久不愈飲食失節或勞苦或服滲利消毒之劑愈甚脾脈大而無力此脾虛而無濕熱也以補中益氣湯數劑少愈更以六君子湯加蒼朮升麻神麯治之而愈嘗治下部生瘡焮痛或發寒熱或腳氣腫痛以人參敗毒散加檳榔蘇木蒼朮黃柏並效久不愈者以四生散治之愈後以補腎丸補之庶不再發矣王洪緒治馬悠也右足背連小腿轉彎處初因湯毒而成爛腿三十餘年其腫如斗孔可容拳有時出血以布團填塞否則空痛時年七十有四令以老蟾破腹身刺數孔以肚雜填患孔蟾身覆之早晚煎蔥椒湯溫洗一次以蟾易貼用醒消丸早晚二服三日後取地丁大力鮮草搗爛填孔外貼烏金膏日服醒消丸其四圍硬塊出水處以嫩膏加五味散敷其發癢者以白花膏貼內有硬塊如石者以生商陸搗爛塗孔內出血時先以參三七末糝之然後填藥如此二十餘日腫退癢止塊平黑肉漸紅活孔亦收淺止以草填日以五寶散糝仍貼烏金膏因老人精神不衰飲食不減始終不用補而收功蔣仲芳治胡明甫年五十餘患臁瘡三載沿皮瘙癢微腫色紫黑用膏藥蓋之則流水鞋襪盡濕去膏藥即又燥烈癢痛難忍此濕熱下流也人但知燥濕清熱解毒而不知濕熱之原從脾家下陷耳遂用補中益氣湯升舉其氣更加黃柏清熱蒼朮燥濕茯苓澤瀉利水蓋治濕不利小便非其治也外用陳石灰調側柏汁以燥濕散瘀清熱稍加火酒為從治敷之明日瘡干數日而愈外治法妙脫疽謂疔生於足趾或足消而自脫故名亦有發於手指者名炷節疔重者腐指節輕者筋彎一男子足趾患脫疽焮痛色赤發熱隔蒜灸之更以人參敗毒散去桔梗加金銀花白芷大黃痛止又十宣散去桔梗官桂加花粉數劑而痊一男子足趾患脫疽色紫不痛隔蒜灸五十餘壯尚不知痛又明灸百壯始痛更投仙方活命飲四劑乃以托裡藥潰而愈心法中韓判官症同灸同乃以敗毒散加銀花白芷而愈矣一男子足趾不大痛色赤而腫令隔蒜灸至痛止以人參敗毒散去桔梗加金銀花白芷大黃而潰更加以仙方活命飲而痊此症形勢雖小其惡甚大須隔蒜灸之不痛者宜用灸之庶得少殺其毒蓋因膏粱厚味酒面炙爆積毒所致或不慎房勞腎水枯竭或服丹石補藥致有先渴而後患者有先患而後渴者皆腎水涸不能制火故也初發而色黑者不治赤者水未涸尚可若失解其毒以致肉死色黑者急斬去之緩則黑延上足必死此患不同腫潰惟隔蒜灸有效亦有色作痛而自潰者元氣未脫易治夫至陰之下血氣難到毒不易腐藥力又不易達況所用皆攻痛之藥未免先於腸胃又不能攻敵其毒故隔蒜灸並割去最為良法故孫真人云在指則截在肉則割即此意也一男子腳背患此症赤腫作痛令隔蒜灸三十餘壯痛止以仙方活命飲四劑而潰以托裡消毒藥而愈一男子足趾患此症色赤焮痛作渴隔蒜灸數壯服仙方活命飲三劑而潰更服托裡藥及加減八味丸潰脫而愈一男子足趾患此症色黑不痛令明灸三十餘壯而痛喜飲食如常謂急割去速服補劑彼不信延上遂致不救一男子腳背患此症色黯而不腫痛煩躁大渴尺脈大而澀此精氣已絶不治後果然楊太僕年逾四十左足大趾赤腫焮痛此脾經積毒下注而然乃脫疽也喜色赤而痛以人參敗毒散去人參桔梗加銀花白芷大黃二劑更以栝蔞銀花甘草節四劑頓退再以十宣散去桔梗加銀花防己數劑而愈一膏粱人年逾五十患此症色紫黑腳焮痛孫真人云脫疽之症急斬去之毒延心腹必不治色黑不痛者亦不治喜其飲食如故動息自寧為瘡瘍善症也尚可治遂以連翹消毒散六劑更以銀花甘草節栝蔞二十餘劑患趾潰脫再以芎歸地連翹銀花白芷二十餘劑而愈一芻蕘左足趾患一泡麻木色赤次日趾黑五日足黑冷不知疼痛脈沉細此脾胃受毒所致以飛龍奪命丹一服翌日令割去足上死黑肉割後骨始痛可救遂以十全大補湯治之而愈蓋黑肉乃毒氣之盛而拒截榮氣所致況至陰之下氣血難達經云風淫末疾即此是也向若攻伐之則邪氣愈盛乘虛上侵必不救海山驕淫益無度強並民居田宅婦女竟占山東之半陸宣子者山東名醫也有富室妾足小趾生瘡狀類細米瘡頭早白根如熟棗臟腑挈挈欲墜聞平湖名延之視曰此粟米瘡也與人面瘡等七日毒上升遍體腐爛成黑水死矣君欲生之當急斷其趾斷之愈海山亦生是瘡囑宣子視宣子仍前言海山大怒欲殺之楚人丁維章以外科有名出入禁內海山邀之至告以宣子語且曰公視我瘡無恙吾必殺之維章熟視曰殺我可也何尤宣子今已過三日毒上升矣公欲活耶斷膝尚可海山瞋目曰其然三問應聲如響海山喟然曰我命在公矣顧左右取截刀伸足曰斬左右戰栗海怒罵使斬遂斷一腿維章手提海山發倚柱坐海山面黃氣絶維章曰可速召前醫者宣子至視其地一腿尚自起跳躍黑血淋漓命取人參一斤濃煎灌其口少頃海山蘇顧其足曰嗟乎刖足刑已重矣何辜而刖膝幸公治我我自今後庶幾可以無後患閲四十九日而右膝毒發復生人面瘡醫曰不可再活矣海山不數日死凡所奪民家産皆散去其兄乃乞食如初多骨疽薛立齋治舉人於廷器腿患流注年餘出腐骨少許午前畏寒午後發熱口乾唾痰小便頻數以為足三陰虧損朝用補中益氣湯夕用六味地黃丸料加歸耆五味各三十餘劑外灸豆豉餅諸症漸愈又以十全大補之類喜其慎疾而愈薛立齋治一儒者患附骨疽失於調補瘡口不斂日出清膿少許已而常出三腐骨其脈但數而無邪此氣血虛瘡結膿管而不能愈紝以烏金膏日服十全大補湯而愈上舍王廷璋患前症三年未愈肢體消瘦飲食難化手足並冷大便不通手足陰冷此陽氣虛寒用補中益氣湯八味丸及灸其患處而愈一男子臂患流注出腐骨三塊尚不斂發熱作渴脈浮大而澀乃氣血俱損須多服生氣血之劑庶可保全彼惑於火尚未盡仍用涼藥內服外敷幾危始求治其形甚瘁其脈愈虛先以六君子湯加芎歸月餘飲食漸進以八珍湯加肉桂三十餘劑瘡色乃赤更以十全大補湯外以附子餅灸之僅年而痊醫林集要云骨疽乃流注之敗症也如用涼藥則內傷其脾外冰其血脾主肌肉脾氣受傷飲食必減肌肉不生血為脈絡血受冰則氣血不旺而愈滯宜用理脾健脾則肉自生而氣自運行矣又有白虎飛留連周期或展轉數歲冷毒朽骨出盡自愈若附骨腐者可痊正骨腐則為終身廢疾矣有毒自手足或頭面腫起或兼疼痛上至頸項骨節去處如瘍癧貫珠此風濕流注之症也宜以加減小續命湯及獨活寄生湯治之有兩膝腫痛起或至遍身骨節疼痛者此風濕痹又名歷節風宜用附子八物湯治之又有結核在項腋或兩乳旁或兩胯軟肉處名曰𤷍癧癰屬冷症也又有小兒宿痰失道致結核於頸項臂膊胸背之處亦冷症也俱用熱藥敷貼以上諸症皆緣於腎腎主骨腎虛則骨冷而為患也所謂骨疽皆起於腎亦以其根於此也故用大附子以補腎氣腎熱則骨有生氣而疽不附骨矣聖書云患腫潰久不時出細骨用桐油調密陀僧如膏絹攤貼妙附骨疽王肯堂治一人患附骨疽膿熟不能泄潰而入腹精神昏憒粥藥不入醫無所措診之脈細如蛛絲氣息奄奄曰無傷也用針刺其腹膿大泄然皆清稀若蟹吐沫在法為透膜不治用參耆附子加厥陰行經之藥大劑飲之又服八味丸食大進米升余肉數臠旬日而平所可治者潰瘍之脈決實者死細微者生病脈相合故可治也刺腹者膿不泄必內攻按之知其瘡深即刺無害所以不透膜八味補腎腎氣旺而上升胃口開而納食凡泄膿既多刀圭之藥其何能濟遷延遲久且有他患故進開胃之藥多食肉以補之肌乃速生此治潰瘍之大法一男子腿根環跳穴患痛徹骨外皮如故脈數而滯滑此附骨疽膿將成也用托裡藥六劑腫起作痛脈滑數其膿已成針之出碗許更加補劑月餘而瘳一男子患附骨疽腫硬發熱骨痛筋攣脈數而沉用當歸拈痛湯而愈張景嶽治一人年三十餘素多勞忽患環跳痠痛數月後大股漸腫曰此附骨也當速治與活命飲二帖未效而腫益甚因混投清火解毒遂致嘔惡發熱飲食不進勢甚危復求治與參耆內托散大加炮薑數劑而嘔止食進其腫軟熟知其膿成針之膿不多復與九味異功煎遂大潰且瓣瓣出膿潰者五六處腿肉盡去止存皮骨矣潰後復嘔發熱不食以十全大補湯九味異功散相間與之熱漸退食漸進然足筋短縮但可豎膝仰臥左右挨緊毫不能動動則痛極自分已成廢人凡用十全大補三十餘劑人參三斤乃肉生筋舒如故一人年近三旬素不節欲忽環跳穴痠痛月餘張曰此最可畏恐生癰毒不信或謂筋骨痛常事耳不過風熱使然與散風清火藥至半年後果微腫復求治曰速用托補以救根本尚不遲也又不信謀之瘍醫曰豈有腫瘍未潰遽可溫補耶復用清火消毒之劑及大潰而危再延視則脈症俱敗悔無及矣一膏粱子年三旬素耽酒色亦患前症令早服藥執拗不從及腫而膿成令速針之不肯偏信庸流敷以苦寒解毒之藥不知膿已成猶何毒之可解但有愈久愈深直待自潰元氣盡去不可收拾耳立齋治地官孟鄉環跳穴患疽內服外敷皆敗毒寒劑因痛極刺之膿瘀大瀉瘡口開張其色紫黯右關脈浮大此胃氣復傷不能榮於患處也以豆豉餅六君子加藿香砂仁炮薑數劑由是胃氣醒而飲食進患處暖而肌肉漸生再以十全大補湯而愈大君都承慶患附骨疽內痛如錐外色不變勢不可消喜其未用寒削止因痛傷胃氣而不思飲食用六君子湯治之飲食少進更以十全大補二十餘劑而膿成針去仍以大補湯倍用參耆歸術加麥冬五味遠志貝母數服膿漸止而瘡亦愈一儒者左腿微腫肉色如故飲食少思此真氣虛而溫邪內襲也蓋諸氣皆秉於胃法當助胃壯氣遂用六君子加藿香木香當歸數劑飲食漸進更以十全大補元氣復而愈一儒者兩腿腫痛肉色不變惡寒發熱飲食少思肢體倦怠脾氣不足濕痰下注也以補中益氣加半夏茯苓白芍二劑寒熱退而腫痛消又十餘劑脾胃壯而形體健一男子因負重飲食失節胸間作痛誤認為瘡毒服大黃等藥右腿股腫肉色如故頭痛惡寒喘渴發熱脈洪大而無力此勞傷元氣藥損胃氣而然耳用補中益氣湯四劑又用十全大補湯數劑喜其年少而愈薛立齋治一婦人患附骨疽久而不斂致腿細軟脈來遲緩即以十全大補湯加牛膝杜仲及附子餅灸之兩月餘而愈凡膿潰之後脈滯遲緩者易愈以其有胃氣故也脈來細而沉時直者裡虛欲變症也若煩痛尚未痊也洪實粗散者難療以其正氣虛而邪氣實也一婦人環跳穴作痛肉色不變脈緊數此附骨疽也膿未成用內托黃耆酒煎湯加青皮龍膽草山梔數劑而消一婦人患附骨疽久不愈膿水不絶皮膚瘙癢四肢痿軟以為虛欲補之彼惑為風疾遂服祛風藥竟致不起陳無擇云人身有皮毛血脈筋膜肌肉骨髓以成其形內則有心肝脾肺腎以主之若隨情妄用喜怒勞逸致內臟精血虛耗使皮血筋骨肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外所因痿則內臟不足所致也山西曹主簿年逾四十夏間患附骨疽服托裡藥而愈至秋飲食少思痰氣壅盛口舌生瘡用八味丸治之而愈一老人腿患附骨疽腫硬大按方痛口乾脈弱腫聚不潰飲食少思謂腫下而堅者發於筋骨皮色不變者發於骨髓遂以參耆等藥托之三十餘劑膿雖熟不穿謂藥力雖達必須針刺不聽至旬日方刺之湧出清膿五六碗許然衰老之人氣血不足養毒又久竟不治大抵瘡疽日不退宜托之有膿刺之有腐肉取之虛則補之此十全之功也王上舍患附骨疽畏針不開臂膝通潰脈數發渴煩躁時嗽飲食少思齊氏曰瘡瘍煩躁時嗽腹痛渴甚或瀉利無度此惡症也膿出之後若脈洪數難治微澀遲緩易治遂刺之膿出四五碗許即服大劑參耆歸術翌日脈稍斂更以八珍湯加五味麥冬肉桂白蘞三十餘劑脈緩膿稠三月而愈王洪緒治附骨疽方用白芥子搗粉酒釀調塗或以大戟甘遂二末白蜜調敷內服陽和湯每日一劑四五日可消消後或服子龍丸或服小金丹以杜後患大忌開刀開則成縮腳損疾
