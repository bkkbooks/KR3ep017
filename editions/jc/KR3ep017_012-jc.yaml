body:
  text: 卷十二吐血孫文垣治程兩峰與乃侄有芥蒂偶飲侄家歸覺腹中滿嘔噦不寧次日面目皆黃惡寒發熱醫作瘧治五心加熱下午潮熱煩躁且鼻衄腹痛大便黑如墨吐黑血如爛豬肺者碗許狀如中蠱心疑乃侄毒之召醫率見其目珠如金面若熏橘腹大有塊如碟且堅硬兩足浮腫四肢冷小水赤飲食不思皆辭不藥舉家號泣欲爭哄診之其脈左澀右滑滑主痰飲澀主有瘀血所吐下皆瘀之驗非蠱也彼謂平生頗謹疾曰怒則傷肝甚則嘔血不嘔則瘀於經絡滿而溢也彼乃悟用當歸尾三錢赤芍丹皮川芎各一錢五分元胡索五靈脂桃仁各一錢滑石茜根各二錢煎飲下黑物甚多腹仍痛塊未軟前方加青皮山楂酒蒸大黃服之大便三次所去皆痰與瘀自此腹減塊消黃退足尚腫改用六君子加泡薑茜根滑石青蒿而愈蕭萬輿表侄媳脾胃素熱因冒風邪目澀鼻乾自用薑湯連三晨咯血數口又恣飲藕湯益增煩脹夫所謂外感者從外而入必令從外而出薑湯獨力既難奏效藕湯涼澀復閉外邪用解表劑入芩連花粉一劑而愈姜子社少婦潮熱喘咳經水澀少每鬱則膈脹拒食偶啖辛熱咯血口乾脈弦滑微數蓋甫笄陰血未充五火易動因循不治亦能成瘵以六味加黃芩炙草知母麥冬阿膠為丸服至月餘諸症如失孫文垣治汪希明年弱冠性躁素有痰火舊曾吐血醫用收澀之劑太早至瘀流滯經絡且為灸肺腧膏肓咳不能唾又誤作風邪投發散之劑不思火盛得風其勢愈熾血從口鼻噴出勢如湧泉診之六脈洪數身熱而煩又時當三伏內外之火夾攻非釜底抽薪之法難奪其上湧之勢乃以三製大黃三錢石膏五錢黃連茜根滑石各二錢女貞一錢急煎飲之大便微行二次血來少緩即用石膏滑石冬青子各三錢旱蓮草茜根各二錢黃連山梔貝母各二錢茅根五錢煎服血乃止後遇大便燥結進當歸龍薈丸咳嗽則與二冬二母栝蔞白芍黃芩茅根黃連茜草之類全瘳夫病有六不灸火盛者不灸此由誤灸幾殞書之以為好灸者戒臧六老上吐血下瀉血胸膈背心皆脹原因腦怒又傷犬肉故發熱而渴醫者皆作陰虛火動為之滋陰降火病愈甚診之兩關俱洪滑有力此肝脾二經有餘症也此怒甚傷肝之嘔血並下泄胸背脹痛瘀血使然脾為犬肉所傷故不能統血今誤用苦寒之劑是以脾愈傷而上焦血愈滯惟調氣健脾兼之消導則萬全矣六老曰人皆謂勞怯故發熱吐紅血上吐陽絡傷也血下行陰絡傷也陰陽俱傷法當不治今謂非陰虛何也曰脈數無力者為陰虛今洪滑有力凡陰虛之熱發於申酉間夜半而退如潮汛然謂之潮熱今熱不分晝夜安得謂之陰虛乃與山楂香附枳實調氣消導為君丹參丹皮桃仁滑石茅根化瘀為臣黃連蘆根解犬肉之熱為佐四帖胸背寬血吐止惟腹中不舒仍以前藥同丹溪保和丸與之四帖下黑穢半桶而愈辨症分明陸養愚治少司馬陸北川原有痰火因感怒後觸大怒夜熱咳嗽見紅先服童便數鍾血止嗽亦不甚清晨復吐血甚多而嗽亦頻醫謂年高濃於房事投滋陰降火犀角地黃湯及六味加知柏之類已五日喘急倚息不眠畏寒特甚脈之兩寸關浮洪而滑兩尺稍沉數曰此感冒未經解散今將入里蓋初以童便陰涼遏之致外感內郁二火皆無所泄故逆而衝上也脈實症實終屬有餘之邪今尚畏寒表症猶在而喘急衝逆陽明之熱尤甚宜合攻之解散在經之邪肅清胃府之熱則諸症自釋因用乾葛石膏為君桑皮前胡蘇子杏仁薄荷黃芩為佐炙細甘草木通為使二劑減十之七寸關已平尺尚洪乃以前劑加元明粉三錢一劑出稠穢甚多諸症全愈矣陸肖愚治妻兄費光宇七月間薄暮歸家飲酒數杯心口便覺不快隨吐吐後出痰沫盆許繼之以血碗余頭眩眼黑遍身汗出如雨漸發熱但可靜臥稍動即吐吐即有血口極渴而湯飲不敢進或與藥亦吐而血隨湧出脈之數大無倫按之則虛面如煙塵曰此勞心而兼傷暑熱也血由吐出吐因動發令無動以井水調辰砂益元散徐飲之約水一礶藥八九錢遂睡半日方醒人事清爽熱退吐止但倦甚以生脈散調理數日而愈雄按生脈散未妥鐘鳴宇苦志螢窗忽吐血碗許醫以芩連梔柏生地白芍輩投之一帖而止後數日喉中復有血腥似有洶湧之意又投前劑亦一帖而止自此漸發熱咳嗽痰紅又以吐血為陰虛火旺以滋陰清火療之逾兩月不減而大便不潔面黃帶青喘促聲啞不能仰臥胸膈痛應於背脈之兩寸不起兩關尺沉遲曰寸脈不起上焦有痛也關脈沉遲中下有寒也用元胡索紅花蘇木茅根丹皮紫菀桑皮貝母枇杷葉大料濃煎徐徐服之又以白朮乾薑茯苓澤瀉好陳米為丸日三服煎藥僅二劑而喘痛減又二劑而聲稍清丸藥約二錢而瀉止十日俱瘳以補氣養榮湯調理之閔巽峰性躁急素有痰火三月間患吐血醫以澀藥止之血止而喉常有腥氣至六月醫令乘伏天灸之曰自此永不發矣忽一日血從口鼻噴出勢如泉湧脈之六部皆洪大而稍數乃用芩連石膏丹皮紅花犀角等藥進二劑不甚減以潤字料合桃仁丸之頓服五錢少頃又進三錢五更連下數行出稠痰瘀血缶許身涼血止得稍睡以前湯加生地數劑又去犀角紅花加天麥冬花粉便結則用前丸調理五十日血全止半年復故潘碧泉女年十八經行有拂意事悲忿極血行一日即止後患吐血每吐碗許日晡潮熱飲食不思大便不通醫以犀角地黃湯投之心下痞脹嘔吐或痰或血或酸水胸脅亦時時脹痛脈之洪大而弦此有瘀血也舊者凝滯則新者漸積故溢而妄行法宜通其瘀血則自歸經矣以潤字丸配桃仁紅花合丸之日進三服另以調氣養榮湯間投之去瘀垢甚多熱退經行吐血即止陸祖愚治俞姓人素性急躁善怒一日忽吐血七八碗身熱氣喘腹脹滿終夜不寐飲食不進自用滋陰止血藥而愈甚脈之六部俱如彈石將及七至右關更勁腹上一搽血即噴出此有餘之症也乃與小陷胸湯二劑加鐵鏽水明日減半大便第七八日不行必下之方愈以潤字丸加桃仁合丸之書其帖曰止血丸服之夜下瘀血宿垢半桶而吐血頓止矣吳實子年十六患吐血面色萎黃形容憔悴泄瀉肢腫向有遺精近來更甚六脈虛數或服清涼之劑紅減而發熱作嘔腫瀉更甚誠所謂以寒涼治百無一生也乃與開胃溫中健脾養血之劑月餘便實腫消熱退食進後用六味丸加知柏杜仲枸杞牡蠣麥冬五更吞服又與煎藥五十餘劑諸症脫然滁州題使君云其族娣為尼住新淦一寺忽苦暴吐血發寒熱欲作勞氣而未成醫者不肯治偶一士大夫說用童便調下花蕊石散不數日而愈此後亦多有人服得效是齋方醫說續編花蕊石一斤上色硫黃四兩和勻先用泥封固瓦罐一個入二藥仍封固瓦罐候乾如急用以焙籠內炙乾用炭煅炙去火次日取水細研每服一錢童便熱酒下並治胎衣不下及瘀血內積及大小便不通如神良方喻嘉言治黃湛侯素有失血症一日晨起至書房陡暴一口傾血一盆喉間氣湧神思飄蕩壯熱如蒸頸筋粗勁診其脈尺中甚亂曰此昨晚大犯房勞自不用命也因出驗血見色如太陽之紅其僕云此血如宰豬後半之血其來甚遠不謂癡人有此確喻君以僕為癡不知君更癡於僕也或曰喻不癡而何以為醫再至寢室謂曰少陰之脈縈舌本少陰者腎也今腎中之血洶湧而出舌本已硬無法可以救急因諦思良久曰只得一法不得已用丸藥一服墜安元氣若得氣轉丹田尚可緩圖因煎人參濃湯下黑錫丹三十粒喉間汩汩有聲漸下入腹少頃舌柔能言但聲不出亟用潤下之劑以煎前藥遂以阿膠一味重兩許溶化分三次熱服溉以熱湯半日服盡身熱漸退頸筋漸消進粥與補腎藥連服五日聲出喉清人事向安但每日尚出深紅之血盞許因時令大熱遵內經熱淫血溢治以鹹寒之旨於補腎藥中多加秋石服之遂愈劉筠枝長男病失血歲二三發後所出漸多咳嗽發熱食減肌消夏秋間復發寒熱如瘧每夜達曙得微汗始解後寒熱稍減病轉下利服以參術胸膈迷悶喉音窒塞服茯苓山藥及收制紅鉛末下黑血塊數升胸喉頓舒面容亦轉乃翁神之以為竹破竹補之法也即用桂附二劑於是下利一晝夜十數行飲食難入神識不清診之脾脈大而浮腎脈小而亂肺脈沉而伏命疏方並問何症曰此症患在亡陰反用峻藥之劑行期在立冬後三日以今許之不過信宿無以方為也經云暴病非陽久病非陰則數年失血其為陽盛陰虛無疑況食減而血不生漸至肌削而血日槁虛者益虛盛者益盛勢必陰火大熾上炎而傷肺金咳嗽生痰清肅下行之令盡失由是腎水無母氣以生不足以蔭養百體肌肉瘦損每申酉時灑淅惡寒轉而熱至天明微汗始退正如夏日炎蒸非雨不解身中之象明明有春夏無秋冬治宜亟使金寒水冷以殺其勢乃因下利而用參術不知肺熱已極止有從皮毛透出一路今補而不宣勢必移於大腸傳為腸澼矣至飲紅鉛下黑血者蓋陽分之血隨清氣行者久已嘔出其陰分之血隨濁氣行至胸中為膜原所蔽久瘀膈間者得經水陰分下出之血引之而走下竅聲應氣求之妙也久積暫寬面色稍轉言笑稍適者得其下之之力非得其補之力也乃平日預蓄此藥必為方士所惑見為真陽大藥遂放膽加用桂附致盡劫其陰惜此時未得止之之劑今則兩尺脈亂火燔而泉竭脾胃脈浮下多陰亡陽無所附肺脈沉伏金氣縮斂不行神識不清魄已先喪矣寧可挽回哉張景岳治倪孝廉年逾四旬素以思慮傷脾時有嘔吐之症過勞即發服理陰煎溫胃飲之屬即愈近於暑末時因連日交際致勞心脾遂上為吐血下為瀉血俱大如手片或紫或紅其多可畏醫謂因勞而火起心脾兼之暑令二火相濟所以致此乃與犀角地黃童便知母之屬兩劑其吐愈甚脈益緊數困憊垂危乃云脈症俱逆不可為也診之則形勢俱劇用人參熟地乾薑甘草四味大劑與之初服如舊次服覺嘔吐稍止脈亦略有生意再加炮薑附子各二錢人參熟地各一兩白朮四錢炙甘草一錢茯苓二錢黃昏與服竟得大睡覺而血嘔皆止遂以溫補調理旬日復健如此脈症由勞倦傷脾而氣虛不能攝血時當火令而症非火也誤用寒涼脾敗而死矣後有史姓等數人皆同此症悉以六味回陽飲活之葉天士曰嘔吐之症不講參術同用而用熟地乾薑豈能見效又曰幸加白朮凡嘔吐乃脾胃之病不用白朮茯苓廣皮而以歸地為治其見效亦偶然耳又曰勞傷脾胃而吐血寒涼固不可用熱藥亦不宜用恐其助火咳嗽也惟歸脾四君六君加減治之最為萬妥如景岳之六味回陽飲自稱其妙亦紙上空言未能見之實事勞字之義兩火上炎豈非有火乎但宜溫養不可寒涼故經云勞者溫之溫存以養使氣自充非講熱藥以溫養也李士材治張鳴之吐血兩年面色萎黃潮熱嗽咳膈有微痛脈數而沉且搏痛不可按而甚於夜分是堅血積蓄非大下之不可又以久病未敢峻利用鬱金降真歸地山甲蓬朮人參下血如漆者數次而痛減月餘復病此病重而藥輕也乃以大黃乾漆蓬朮人參下血如漆者數次而痛減月餘復病此病重而藥輕也乃以大黃乾薑蓬朮鬱金山甲肉桂歸尾桃仁虻蟲為丸每日早起服參耆之劑午後服丸藥錢許十日血積大下數次而安此案出醫方章氏子吐血發熱遺精盜汗形肉衰削先有醫戒之勿服人參若誤服無藥可救治勿效延李診曰此脾脈氣虛之候非大劑參耆不可病家曰前醫戒之甚嚴而君用之甚多何相懸也李曰此醫能任決效否曰不能也李曰請易參五斤毋掣其肘期於三月可以報績彼信而從遂用六君間補中益氣及七味丸療之日輕一日果如所約林上舍多郁且有暴怒吐血甚多倦怠異常李以六君子納參一兩乾薑一錢木香八分四日而血止後因怒氣血復大作李先與平肝繼當大補然後得脈所謂早見非時之脈當其時不能再見矣果如期而歿董元宰少妾吐血蒸嗽先用清火繼用補中俱不效李脈之兩尺沉實曰少腹按之必痛詢之果然此怒後蓄血經年不行乃為蒸熱熱甚而吐血陰傷之甚也乃與四物湯加鬱金桃仁穿山甲大黃少許下黑血升余少腹痛仍在更以前藥加大黃三錢煎服又下黑血塊及如桃膠蜆肉者三四升腹痛乃止虛倦異常與獨參湯飲之三日而血減六七服十全大補湯百餘日而痊唐主政勞心太過因食河鮮吐血有痰喉間如梗日晡煩熱喜其六脈不數惟左寸澀而細右關大而軟思慮傷心脾也以歸脾湯大料加丹參麥冬生地二十劑症減六七兼服六味丸三月遂不復發馮氏女發熱咳嗽已半年十月間吐鮮血甚多一日之內不過食粥一盞大肉消陷大便溏泄沉困臥床脈來七至李曰法在不救人所共知若能惟余是聽不為旁撓可救十中之一每帖用人參五錢桂附各一錢耆術三錢歸芍二錢陳皮一錢一日三帖進七八帖及壯水丸三斤而後起又三月飲食如常盧不遠云千金方用藥動輒數斤習見吾儕不過兩許令人不敢動手看立齋案又進一步庚子孫孝廉吐血十日夜危坐不敢交睫否則血奔射出以六味丸料加安魂藥煎服而愈此火象也以潤下劑平之病熱熾烈豈杯水可救倘有識見放膽用藥多多益善矣芷園臆草盧不遠臘月十七日圍爐露坐大半夜次日爪甲盡折先自十月間暴怒頓足叫呼氣喘食頃茲復火為寒鬱漸覺神思昏瞀至二十七夜因房後患腹痛惡寒泄瀉平旦且止至暮復作明日又止至開正五日意為腎瀉服四神丸一大劑瀉痛竟止早間肛右有核其痛漸近尾閭暮痛不可反側次暮以水化熊膽塗之立覺涼氣直上肺左痛漸緩火毒悉內竄矣中夜吐痰痰內見血一二點辰時痔出白膿竟可起坐十一日早方話頃血從咳至作意引定煎六味丸料服夜半睡覺血即上湧如潮喘聲如鋸進童便及六味煎藥氣稍定才聞薑湯氣血即隨湧平旦始緩夜再發如前寐則背心蒸熱醒即血來咽喉如截斷一湧盈掬心急躁亂欲多語言聲一響而血遊至至十三早議下莫敢應至晚勢急似無生理乃用瀉心配血藥下之不應時方寒沍用水調大黃末服轉欲去衣被啜芩連苦寒如甘旨至五更強進清米飲藥力忽轉解黑糞瘀穢不可近凡三次血來少平十五寅時立春以建蓮濃煎呷之甚美少間足心汗出次及手心背心一日安和暮又吐鮮血數口以赤小豆連翹合瀉心方法服之覺上身氣即開臍以下不動而悶汗出似前者三日血亦漸減二十外大便如青泥次下如鐵彈者二三枚血方淨盡溯病之由以火鬱誤認腎虛服四神丸致禍幾死良醫自病猶爾矧其他耶此正諺云盧醫不自醫馮楚瞻治楊某吐血之後大渴不止兩寸甚洪關尺甚弱此陰血暴亡臟腑失養津液槁燥陰火上炎名為血竭也以熟地三兩麥冬五錢五味子一錢附子二錢濃煎二碗代茶飲之日三劑渴止而寸脈和平若作胃火妄用石膏梔子芩連反激陰火上炎益增躁煩喘乏患矣喻嘉言曰津液結則病津液竭則死故救病而不知救津液者真庸工也吳孚先治何氏女患吐血咳嗽食減便難六脈兼數左部尤甚醫用四物湯加黃芩知母吳曰歸芎辛竄吐血不宜芩母苦寒傷脾咳嗽在所禁用乃與米仁玉竹白芍枸杞麥冬沙參川續斷建蓮百合二十劑稍緩五十劑漸瘳林西仲春間吐血醫用苦寒過劑口胃不開大便不實脈之左關沉弦右關弦數得之勞神傷脾而後鬱怒也宜歸脾湯合逍遙散加蓮實為丸補脾開鬱乃愈王監司妾吐血既久猶進苦寒脈芤帶數不思飲食大便微溏此涼劑太過陰陽兩損也人參蓮肉山藥麥冬五味白芍兼左歸丸而愈黑虎丹治一切吐血衄血諸失血之症便血血淡以黃柏易黃芩亦名清炎散荊黃黃芩各等分炒極黑為末每服三錢丹參湯調下丹參色赤氣輕能於氣分中生血去瘀賢於四物遠矣此方活人甚多血止後單服丹參半載永不復發每月參一斤合陳細茶半斤用以代茶服不可間斷張路玉治湯刑部年八十二痰中見血服諸寧咳止血藥不應脈得氣口芤大兩尺微緊面色微黃屢咳痰不得出咳甚方有黃色黏痰此精氣神三者並虧兼傷於熱耗其津液而咳動肺胃之血也因其平時多火不受溫補遂以六味丸合生脈散加葳蕤煎膏服之取金水相生源流俱澤不必用痰血藥而痰血自除也錢曙昭久咳吐血四五日不止不時哄熱面赤或時成盆成碗或時吐粉紅色痰夜熱自汗一夕吐出一團與魚腸無異雜於血紅中薄暮驟湧不已神昏欲脫灌童便亦不止因思瘀結之物既去正宜峻補遂進獨參湯稍定緣脈數疾無力略加肉桂炮薑童便少許因勢利導以斂虛陽之逆一夜盡參二兩明晨勢稍定血亦不來糜粥漸進脈色漸和改用六味丸作湯調補真陰半月而愈張飛疇治蘇氏子新婚後暴吐血數升命煎人參五錢入童便與服明日醫謂人參補截瘀血難以輕用議進生地山梔牛膝等味張曰六脈虛微而數無瘀可知血脫益氣先正成法若謂人參補瘀獨不思血得寒則凝反無後患耶今神魂莫主轉側昏暈非峻用人參何以固其元氣之脫乎遂進參一兩二服頓安次與四君保元六味間服後以烏骨雞丸調理而痊楊乘六治汪文遠病血症午後發熱倦怠嗜臥四肢痠軟五心煩熱或用涼血清火之藥兩月餘益劇更醫曰弱症已成不可為矣診之察其面黃而瘦舌黃而滑右寸關大而緩左寸關細而緊兩尺俱洪而旺據症合色與脈乃脾肺氣虛下陷不能攝血歸經也其胸中必噁心漾漾其血色必鮮血而淡詢之曰然遂以補中益氣倍參耆朮草加白芍五味炮姜與之曰第服此血自止身自涼諸症自退矣服至四劑果如所言繼用養榮加附子作丸早晚兩次每服五錢兩月而愈孫炳章患吐血咳嗽發熱飲食不思怔忡不寐健忘驚悸肌肉漸減肚臍右側有塊作痛或用消瘀理血滋陰清肺等劑俱不應病甚劇其家疑藥誤脈之左寸芤大右關結滯兩尺洪盛面色白中泛紅舌色淡黃不燥不滑症乃思郁傷脾不能統血歸經至陰虛發熱血燥作痛其塊必不闊而長不橫而豎形若鐮刀非瘀亦非痞乃痹氣而居胃旁者也血盈則潤而軟血少則躁而痛凡郁甚與思慮重者類多患此內經所謂二陽之病發心脾男子則隱曲不利女子則月事不來正此病也其傳為風消為息賁者不治今肌肉雖減氣猶未急亟救三陰症尚可痊乃用歸脾湯去木香加白芍五味送都氣丸兩月而愈柴嶼青治甘州太守高棠溪在瀋陽工部時忽吐血醫教用涼藥止血之藥及診其兩脈安靖曰君教讀心勞偶動相火血隨而升者服止血藥則遺惡不淺力勸其勿藥次日口吐淡血三日即止然後調理數劑永不後發丁酉春韋法海少女患痰嗽四十餘日不能臥臥即兩脅發脹惟背擁枕蓐趺坐而已且吐血成碗醫與消痰止血藥不效診之兩脈洪滑曰此肺脹也弗止血當活血遂用四物湯加桃仁青皮訶子竹瀝因瀋陽無竹改用栝蔞服下即血止安睡調理數月而痊戶部正郎李紫垣咳嗽身熱吐血不止屢治增劇檢其方均止血補血重劑脈之兩手尚和緩惟右尺關洪大乃脾胃風熱為藥所瘀以致發熱臥床遂用清理脾胃之劑數日後身涼熱減調養一月而安大凡諸見血症脈貴沉細設見洪大後必難治前症洪大乃因補藥壅瘀而然原非本脈故得收功總之血症初起別無外邪者先應消血佐以潤下之劑使敗血下行後用止血藥以杜其根服補血藥以復其元庶無後患倘因內傷暴血不止或勞力過度其血妄行出如泉湧口鼻皆流須臾不救則死是又不拘前例急用人參一二兩為細末入飛羅面一錢新汲水調如稀糊不拘時啜或服獨參湯亦可蓋有形之血不能速生無形之氣所當亟固若真陰失守虛陽泛上亦大吐血須用八味六味湯固其真陰則又不可早用人參也嘗見患此症者甚多若不辨別六經脈症任意混治貽害不淺故不憚瑣瑣言之呂東莊治從子園丁吐血求診視其血鮮紅中間有紫小血塊脈之澀濡色白問胸中作惡否曰然時頗作痛直上至背曰知之矣用桃仁泥三錢紅花三錢合理中湯加桂一錢戒之曰頻服之必有黑血大至待黑盡而鮮者來乃再來告丁如言吐痰積數升胸痛即平復來求診則脈圓實矣與以理腎養榮之劑復用填補命門丸子一料全愈辛丑夏薛在嘉興屠內翰第遇星士張谷谷談命時出中庭吐血一二口云久有此症遇勞即作余意此勞傷脾氣其血必散視之果然於補中益氣加麥冬五味山藥熟地茯神遠志服之而愈翌早請見云每服四物黃連山梔之類血益多而倦益甚得公一匕血頓止神思如故何也曰脾統血肺主氣此勞傷脾肺致血妄行故用前藥健脾肺之氣而虛血歸原耳此案醫貫採為論立齋治一男子鰥居數年素苦勞則吐血發熱煩躁服犀角地黃湯氣高而喘前病益甚更白濁遺精形體倦怠飲食少思脈洪大舉按有力服十全大補加麥冬五味山茱萸山藥而愈儒者楊啟元素勤苦吐血發痙不知人事此脾胃虛損用十全大補湯及加減八味丸而痙愈再用歸脾湯而血止一男子咳嗽吐血熱渴痰盛盜汗遺精用地黃丸料加麥冬五味治之而愈後因勞怒忽吐紫血塊先用花蕊石散又用獨參湯漸愈後勞則咳嗽吐血一二塊脾肺腎三部皆洪數用補中益氣六味地黃全愈一婦人素勤苦冬初咳嗽吐痰發熱久而吐血盜汗經水兩月或三月一至遍身作痛或用清熱化痰等劑口噤筋攣乃用加減八味丸及補中益氣加門冬五味山藥治之年餘而痊李東垣治鄭仲本年二十三歲因心痛服丹附等藥得上氣兩脅急迫胸膈不快常時嗽咯出血病形漸瘦大便燥而難脈弦數夜間略熱食稍減因於燈籠草和節麻黃細末以白朮桔梗木通甘草湯下十餘服病減半又於通聖散去石膏為丸以桃仁湯下之朱丹溪治一婦人年五十六歲夏吐紅痰有一二聲咳人參陳皮茯苓各一錢白朮錢半防風桔梗各五分乾薑三分甘草一分煎二之一入藕汁二大蛤再煎帶熱下三黃丸吳丞相沖卿忽吐血孫兆用水澄蚌粉研細入辰砂少許米飲調下二錢日三服遂安兆秘此方吳以術得之韓子功方用硃砂一錢真蚌粉五分醫說續編張子和治岳八郎常日嗜酒偶大飲醉吐血近一年身黃如橘昏憒發作數日不醒漿粥不下強直如厥兩手脈皆沉細張曰脈沉細者病在裡也中有積聚用舟車丸百餘粒浚川散五六錢大下十餘行狀如葵葉汁中燥糞氣穢異常忽開兩目伸腕問左右曰我緣何至此左右曰你吐血後數日不醒張治之乃醒自是五六日必瀉凡四五次其血方止但時咳一二聲潮熱未退以涼膈散加桔梗當歸各稱二兩水一大盂加老竹葉入蜜少許同煎去滓時時呷之聞與人參白虎湯不一月復故李氏範初病嗽血以調胃承氣湯一兩加當歸使服之不動再以舟車丸五六十粒過三四行又嘔血一碗琇按若庸工則必疑不再宿又與舟車丸百餘粒通經散三四錢大下之過十餘行已愈過半仍以黃連解毒湯加當歸煎服之次以草莖納鼻中出血半升臨晚又以益腎散利數行乃愈何伯庸治邵某者吐血數斗而僕氣已絕矣何見其血色曰未死也以獨參湯灌之而愈雲南通志朱丹溪治一男子家貧而多勞十一月得寒病時吐三兩口血六脈緊澀一日食減中痞醫投溫膽湯枳桔湯三日後發微熱口乾不渴口中有痰此感寒也詢之云因十日前霜中曾三四次渡溪水心下有悲泣事腹亦飢遂以小建中湯去白芍加桔梗陳皮半夏四帖而安秀州進士陸寧忽得疾吐血不止氣促驚顫狂躁跳躍雙目直視至深夜欲拔戶而出如是雨夜諸醫遍用古方極治不瘳舉家哀訴所供觀音夢投一方當歸根末用益智一兩生米二錢青皮半兩調服覺取筆記明日療治病愈辛志薛立齋治一婦人素性急患肝風之症常服搜風順氣丸秦艽湯之類後大怒吐血唇口牽緊小便頻數或時自遺此肝火旺而血妄行遂用小柴胡湯加山梔丹皮漸愈一年之後又大怒吐血誤用降火祛風化痰之劑大便頻數胸中少食用清氣化痰之劑嘔而不食頭暈口乾不時吐痰用導痰降火之類痰如湧出四肢常冷薛曰嘔而不食胃氣虛弱也頭暈口乾中氣不能上升也痰出如湧脾氣不能攝涎也四肢逆冷脾氣不能運行也用補中益氣加茯苓半夏治之諸症漸愈又用加味歸脾湯兼服而安一老婦每吐血先飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利此肝肺之症用逍遙散加山梔茯神遠志木香而愈後鬱結吐紫血每先作倦怠煩熱以前藥加炒黑黃連三分吳茱萸二分頓服復因怒吐血甚多燥渴垂死此血脫也法當補氣乃用人參一兩茯苓當歸各三錢陳皮炮黑乾薑各二錢炙甘草木香各一錢一劑頓止又用加味歸脾湯調理而痊一女子懷抱素郁胸滿食少吐血面赤用六味丸及歸脾加山梔貝母白芍而愈一婦人為哭母吐血咳嗽發熱盜汗經水不行此悲傷肺思傷脾朝服補中益氣丸桔梗貝母知母夕用歸脾湯送六味丸而愈陳良甫治一婦人月經不利忽妄行嘔血察其形脈如常用四生丸即安生荷葉生艾葉生柏葉生地黃一男子飽食負重而吐血用前湯及青餅子而愈世治吐血並用竹茹地黃藕汁亦不可泥如陽乘於陰血得熱則必流散經水沸溢理宜涼解大黃犀角之類如陰乘於陽所謂天寒地凍水凝成冰須當溫散乾薑肉桂之類陳日華云先公紹興初常遊福青靈石寺主僧留飲食將竟侍者赴堂齋罷來侍立見桌子上不穩急罄折扳之舉首即吐血蓋食飽拗破肺也明年再到寺問去年吐血者無恙否主僧言服得四生丸遂愈自得此方屢救人有效薛意前症乃內熱暴患用之有效若人病久本元不足須補脾以滋化源否則虛火上炎金反受克獲生鮮矣僕常治一人吐血診其脈肝部強氣口濡此因怒極而得之遂用蘇合香丸和雞蘇丸即效易思蘭治吳大司馬甲戌季春臥病兩月發熱咳嗽痰喘氣急胸膈痞滿手足面目俱浮腫眾惟清金寧咳又以胃脾久虛發腫用利水兼補劑病益甚診其脈左寸浮而無力右關弦張推之於外內見洪大而芤侵過寸部一分左尺沉弱無力右寸沉而帶芤氣口脈按之緊而且牢時或一駛右關中和無力右尺穩穩不動夫心乃一身之主腎為性命之原二脈不動雖危不妨惟以右寸並氣口斷之寸口沉而芤非痰乃血也書云弦駛而緊沉細而牢六部見之皆為積聚今氣口緊而駛此積血在肺胃間壅滯其氣氣滯則血凝乃積血症也時值季春地氣上升因用越法治之進以暢胃豁痰湯蘇梗桔梗蒼朮各四分香附貝母各五分連翹三分前胡撫芎赤芍各六分辰時服藥至午未時氣急小便全無將暮吐紫黑血二三升臭不可聞症頓減八九六脈豁然曰半夜時當有汗可預防之無令太過至期果然脈氣和平惟咳嗽常有二三聲以桔枳二陳湯加香附歸尾茜根茅根童便調治三日上部之疾全愈但脾腎之脈無力飲食少味四肢倦怠再用六味丸早晚百丸午以補中益氣湯加麥冬酒連調其中半月後氣體充實而痊凡血在肝脾當用血藥血在肺胃宜用氣藥開提其氣解散其鬱以引經藥道之血隨氣升自然越出而安矣至於辰時服藥而午時小便全無者隨藥氣上升而不降非津液竭也又至半夜而汗出蓋汗為心液心屬火為陽陽氣至子時發動陽動則汗出所謂一通則百通也次年冬公總漕河因閱新堤步行數十里勞神過度汗透重裘衣濕身涼飲薑汁熱酒十餘杯當即頭眩目昏胸滿燥渴大吐鮮血四五口一老醫以卻藥止之三日後胸膈氣滿左脅悶痛飲食漸少午後燥熱嗽咳連聲半月後面目手足腫脹有進滋陰降火之劑者有進補脾消食之劑左脅益痛難以轉側此蓋前病復作也但昔之積在肺胃今之積在左脅昔病在春地氣上升當用吐法今乃寒冬天地收藏豈敢輕伐天和須先以疏導之劑通其經絡後以盪滌之藥逐血下行徐徐調和榮衛可也面目浮腫非水腫也乃血病氣無所附氣浮於外矣只去其血積則氣自歸經而腫即消矣不信乃日服去水消腫之劑泄去真陰小便全無虛煩作燥氣喘痰塞不月而歿殮時口中湧出紫血數升眾始謂所言不誣瑞昌王孫鎮國將軍久患腹痛諸藥不效飲燒酒數杯頓止時孟夏診其脈左寸沉大有力此積血症也不信至仲冬其疾大作面紅目碧眼胞浮神亂氣促腹痛飲燒酒亦不止其脈與初診無異惟人迎氣口洪滑浸上知其有欲吐之意投以鹽湯一盞遂大吐吐出血餅大如杯者如棗慄者各數十兼有白飯清水瘀血如筆管者二三條吐訖胸中寬快仍不服藥次日黎明口臭氣塞四肢厥冷昏不知人胸間微熱而已復診幸兩尺猶存根本尚在急以燈火爆曲池虎口中脘氣海病者略知痛即令人扶坐勿令睡倒隨進獨參湯二服手足微溫繼用人參五錢附子二錢作理中湯日與飲之六脈微見過七日方開眼識人小便始通即以補中益氣湯六味地黃丸兼服之半月而瘥是症診得肝脈弦大而堅者血有餘也時或一駛血積而不行也肺脈浮大金受火邪氣弱不能運血也脾脈微澀脾主思思則氣結土不能生金也既吐之後血猶有餘氣愈不足故宜人參助氣白朮健脾附子助陽乾薑暖血甘草和中開通經絡流行血氣也陸晦庵曰昔余患吐血暴湧如潮七八日不止諸醫莫救有云間沈四雅寓吳中延治慨然擔當方用人參三兩附子一兩肉桂一錢舉家驚惶未敢輕用越二日其血益甚更請視脈求其改用稍緩之方彼云病勢較前更劇前方正宜改定始克有濟更加人參至五兩附子至二兩家人愈驚彼曰喘嘔脫血數日不止且頭面哄熱下體厥冷正陽欲脫亡之兆命在呼吸若今日不進來日不可為矣家人懇裁參附堅執不允諭放膽煎服坐候成功家人見其如此料可無虞遂依方求服彼欣然出熟附子二十餘塊授咀面稱二兩同參五兩煎成入童便地黃汁一大碗調肉桂末冷服少頃下體至足微汗便得熟睡睡覺血止喘定周身柔和漸漸轉側因饋十二金求其收功不受加至二十金始受一醫見其收功心甚疑駭病人居恆常服參兩許今雖五兩止前數沸猶可當之至血症用附子二兩從古未聞因密訪其製藥者云慣用附子汁收入甘草其附已經煎過十餘次雖用二兩不抵未煎者二三錢始知方士之術如此出張氏醫通馬元儀治表侄婦胸滿不舒蓋得之悒鬱傷津而陽不化也醫者不察遽投大劑辛香開痞之藥遂至吐血盈盆三日不止已瀕於危或與涼血滋陰之劑連進無功脈之右關尺搏擊礙指此症非受病魔乃受藥魔也夫積鬱之體津液素傷又藥熱與胃熱相合為虐血得熱則妄行但圖涼血滋陰其何能濟經云熱淫於內治以苦寒苦能勝辛寒能勝熱所謂不重醫病而重醫藥者是也急令煎九製大黃與之諸症頓平調理而愈戴叔能曰予得血病服藥者經年朱碧山視之曰此陰虛證也徐補之則愈急止則大害從之用其法不二月而愈九靈山房集立齋治一婦人性急躁瘰癧後吐血發熱兩脅脹痛日晡為甚以為怒氣傷肝氣血俱虛遂朝用逍遙散倍加炒黑山梔黃柏貝母桔梗麥冬五味夕用歸脾湯送地黃丸諸症並愈繆仲淳治王司丞遜之患吐血診之云多服童便自愈別去貽書門人張選卿曰遜之旋已勿藥矣但相公年尊右手脈弱甚此非細故可致意遜之預為計時文肅公尚無恙不兩月而遜之疾瘳文肅一病不起蕭萬輿治陳克輝英年氣盛連宵痛飲復啖炙爆數日胃口嘈雜嘔血碗許六脈洪緩有神無別症投以犀角地黃湯入芩連花粉三劑仍令恣飲藕湯而愈馮思才內年五旬偶因外事忤意怒火激血上越日吐數盆脈洪緩投以逍遙散去朮加黃連山梔丹皮四劑而愈連蜚天素弱攻苦便赤夢遺燈宵競逐偶觸事忤意遂患吐血痰嗽甚多初服降火清金之劑不瘥至二十一日診之兩寸洪大虛闊關尺浮弦無力曰血症本非難治但元氣虛脫上浮肝腎皆得克脈幸不數煩久服參耆之劑方得平服若用苦寒必致不起用加減八珍湯彼疑參難療血及二十四日增劇投以前劑四貼血止經旬潮熱亦退惟脈未復每多言痰嗽不止少勞夢遺頓作此心脾不交陰陽虛極服丸劑七斤余湯藥八十餘劑而愈陳子珍亦患前症治數月不痊診之與蜚天病源同疑投參朮熟地性溫參術助火仍服苦寒清金之劑經年漸愈至次夏忽嘔血不止又用止寒之劑致腸結脹痛逾旬延瘍醫令其針刺肛門潰濃數盂而歿沈明生治孫子南媳賦質瘦薄脈息遲微春末患吐紅以為脾虛不能攝血投歸脾數劑而止慮後復作索丸方調理仍以歸脾料合大造丸中數味與之復四五日後偶值一知醫者談及乃駭曰諸見血為熱惡可用參耆河車溫補耶血雖止不日當復來矣延診因亟令停服進以花粉知母之屬五六劑後血忽大來勢甚危篤此友遂斂手不治以為熱毒已深噬臍無及子南晨詣慍形於色咎以輕用河車而盛稱此友先識初不言曾服涼藥且欲責效於師必愈乃已沈自訟曰既系熱症何前之溫補如鼓應桴今只增河車一味豈遂為厲如是且斤許藥中干河車僅用五錢其中地黃龜板滋陰之藥反居大半才服四五日每服二錢積而計之河車不過兩許耳遂不復致辨往診其脈較前轉微乃笑曰無傷也仍當大補耳其家咸以為怪然以為繫鈴解鈴姑聽之因以歸脾料倍用參耆一劑而熟睡再劑而紅止於是始悟血之復來由於寒涼速之也因嘆曰醫道實難矣某固不敢自居識者然舍症從脈得之先哲格言血脫益氣亦非妄逞臆見今人胸中每持一勝算見前人用涼輒曰此寒症也宜用熱見前人用熱則火症也應用涼因攻之不靈從而投補因補者不效隨復用攻立意翻新初無定見安得主人病人一一精醫察理而不為簧鼓動搖哉在前人蒙謗之害甚微在病者受誤之害甚鉅此張景岳不失人情之論所由作也顧德生令郎患吐血咸以其髫齡秀質暱於帷房陰虛火動所致日進二冬二地之屬時沈初寓吳門與顧有傾蓋懼雖心識其非然投分日淺且制於一齊眾楚之勢難以口舌爭也乃貽書曰經云陰虛生內熱熱逼血而錯經妄行丹溪云血隨氣上是陽盛陰虛有升無降湧出上竅法當補陰抑陽又云精神困倦大吐不止是氣虛不能攝血東垣云甘溫能除大熱熱除而血自歸經又云血脫補氣陽生陰長之理細究前言或言清潤或言溫補均系先賢成法以愚管見當以法合病不當以病合法如或血症初得所吐不多口燥唇乾未投涼藥宜從火治補陰益陽之法也若失血有日所去過多氣短神衰已投涼劑宜從虛治血脫益氣之法也今病逾兩旬不為暴矣去血盈斗不為少矣而紅尚未止者何也良由失血既久陽虛無依如浪子迷途不知返駕若再從事清理則虛火愈熾血從何而歸經急須補養心脾方可無慮勿以參為助火而坐失機宜也其後惑於他歧終致不起聶久吾曰一友春間考試多飲燒酒咳嗽吐痰每晨出痰血數十多口求診已定方雖用清涼而制炒又兼滋補適一醫至見其火盛用桃仁承氣湯下之又用涼藥二劑乃生芩連梔柏之類彼求速效欲用其方有疑之者特問予予曰驟下之若誤恐不可為無已姑用其涼湯試之彼竟以二劑一日服之至夜分咳嗽不止吐紅滿地於是用予方四十餘劑又每日用雪梨汁一甌頓溫服逾兩旬而咳與紅悉愈矣夫清涼一也或服之轉劇或服之而瘳何也蓋火性急疾亟攻之則其勢愈炎緩治之則其邪漸息此情理之常而庸庸者不知也其方二冬二母梔柏芩連丹皮生地花粉元參前胡桔梗香附枳實側柏葉生甘草生薑一片水一碗煎入八分溫服諸藥炒制亦與眾同魏玉橫曰關太孺人年七十七久患脅痛左半不能臥食少不眠十月間忽吐血數口進童便不應或與之小劑生地山梔茅根茜草之類亦不應或謂有瘀用方與前相仿診之右關弦略數左右寸俱鼓指曰凡吐血屬瘀者多雜紫黑成塊今所去皆散漫不凝蓋由肝木失養燥而生火值亥月木生之時不能藏蟄反騰而上衝擊胃絡致陽明之火氾濫而出也雖在寒月必使加黃連於養榮之劑以抑之使其下降潛伏自無痛沸之患矣用生熟地沙參麥冬山藥杞子入連三分酒炒焦數服血止食進又十劑全愈第此病屬在年高病久非大劑兩儀膏真元不易復元也徐宇治年未三十先患舌瘡數年不愈仲秋忽嘔血每日或一碗或一杯或十數口脈之兩手皆豁大狀如慈蔥重按則澀而略數此木性久橫遇金旺之時抑不得遂故使脅痛而有塊其少腹之氣上衝而作咳嗽咽痛者龍雷挾火以仇金也其手足常冷者土受木侮而作厥也究其根源良由水不足而又遇燥令非生金滋水何以馴而擾之生地杞子沙參麥冬元參蔞仁七八劑脈漸斂症漸瘳又內熟地一兩數劑並瘡亦愈矣僕甘年未四十虯然一胡素有血症立夏忽吐血數盆面色青慘寒熱往來夜熱尤甚咳嗽連聲而抬肩倚息顛頂左半筋抽掣痛不可忍此厥陰怒火上衝胃絡也胃為多氣多血之府且其人多胡則血必多故暴去如許而脈不躁大也與生地杞子各一兩沙參五錢麥冬三錢蔞仁二錢數帖諸症悉愈愈後面青不減謂肝木久傷宜多服前劑以滋養之否則根荄枯悴無以發生也不聽從至亥月木生之後病果作反謂前者服重補將病補住故復發更醫數人至次年雨水而歿葉天士曰一人吐血曰春溫嗽痰固屬時邪氣質有厚薄不可概以辛散且在知識發動之年陰分自不足以致咳嗆吐血當以甘寒潤降以肅金鮮枇杷葉甜杏仁南沙參川貝母甜水梨甘蔗漿徐靈胎曰此為正治此藥最宜留心汪某年七十天明至午嗽甚痰血春暖陽浮是腎虛不能藏咳音濁不爽先議輕清治氣分之熱桑葉花粉黑梔皮桔梗甘草橘紅徐靈胎曰桔梗升提凡咳症血症非降納不可此品卻與相反用之無不受害其故由於仲景治少陰喉症用甘桔湯遂以桔梗為清肺降火之品不知仲景之方乃專以甘草治少陰犯肺之火恐甘草留入中宮不能留於上焦故少用桔梗以載甘草存留上焦後人不知竟以為咳嗽之要藥豈不大謬故桔梗同清火疏痰之藥猶無大害若同辛燥等藥用之無不氣逆痰升涎潮血湧余目視甚多而藥者無一人能悟自宋以來無不盡然不獨今也此老亦隨俗不察耳一人脈特數舌心灰咳痰有血頻嘔絡傷致血隨熱氣上出仍理氣分桑葉花粉苡仁川貝母黃芩茯苓徐靈胎曰咳而嘔者毋專治肺當降納胃氣也江某積瘀在絡動絡血逆今年六月初時令暴熱熱氣吸入首先犯肺氣熱血湧強降其血血藥皆屬呆滯而清空熱氣仍矇蔽於頭髓空靈之所諸竅痹塞鼻窒瘜肉出入之氣都從口出顯然肺氣鬱蒸致腦髓熱蒸脂液自下古稱爍物消物莫如火但清寒直泄中下清空之病仍然名言議以氣分輕揚無取外散專治內通妙想醫工遇此法則每每忽而失察連翹牛蒡子通草桑葉鮮荷葉汁青菊花葉臨服入生石膏末煎一沸一人年二十三以毒藥熏瘡火氣逼射肺金遂咳嗆痰血咽乾胸悶診脈尺浮下焦陰氣不藏最慮病延及下即有虛損之患姑以輕藥暫清上焦以解火氣杏仁三錢綠豆皮三錢冬瓜皮三錢苡仁三錢川貝錢半馬兜鈴七分嚴某年四十三脈數澀小結痰血經年屢發仍能納食應酬此非精血損怯由乎五志過動相火內寄肝膽操持鬱勃皆令動灼致絡血上滲混入痰火必靜養數月方安否則木水劫灼胃傷減食病由是日加矣丹皮薄荷梗菊花葉黑梔子淡黃芩生白芍鬱金川貝母藜按此神志之病固非藥餌所能勝然靜以制動潤以滋液亦用藥之規則也喻氏制滋液救焚湯以治夫關格之症本無治法喻氏之方亦為徒設竊擬藉以治此症頗為酌對至方中之五味人參則臨症酌其去取可也生地二錢取汁麥冬二錢取汁人參一錢五分人參拌蒸炙甘草一錢真阿膠一錢胡麻仁一錢炒研柏子仁七分炒五味子四分紫石英一錢寒水石一錢滑石一錢生犀角汁三分薑汁二茶匙上除四汁及阿膠用泉水四茶杯緩煎至一杯半去渣入四汁及阿膠再上火略煎至膠烊化斟出調牛黃細末五釐日中分二三次熱服葉天士曰凡咳血之脈右堅者又在氣分系震動胃絡所致宜薄味調養胃陰生扁豆茯神北沙參苡仁等類左堅者乃肝腎陰傷所致宜地黃阿膠枸杞五味等類脈弦脅痛者宜蘇子桃仁降香鬱金等類成盤碗者葛可久花蕊石散仲景大黃黃連瀉心湯一症而條分縷晰此再加分別則臨症有據矣鄒某年二十四向有失血是真陰不旺夏至陰生伏天陽越於表陰伏於裡理宜然矣無如心神易動暗吸腎陰絡脈聚血陽觸乃溢陰伏不固隨陽奔騰自述下有衝突逆氣血湧如泉蓋任脈為擔任之職失其擔任衝陽上衝莫制皆腎精肝血不主內守陽翔為血溢陽墜為陰遺腰痛足脛畏冷何一非精奪下損現證經言精不足者補之以味藥味宜取質靜填補重著歸下莫見血以投涼莫因嗽以理肺若此治法元海得以立基衝陽不來犯上然損非旬日可復須寒暑更遷凝然不動自日逐安適調攝未暇縷悉也人參三錢熟地炒鬆成灰四錢冷水洗一次鮮河車膏一錢和服茯苓錢半炒黑枸杞子錢半北五味一錢沙苑蒺藜一錢半紫石英五錢生研徐靈胎曰以五味易牡蠣則無弊矣蔣某年六十二宿傷怒勞血溢紫塊先以降氣導血蘇子降香末桃仁黑山梔金釵石斛製大黃徐靈胎曰葉氏治血病其議論大端不信古而用藥全然不知其大犯在用麥冬五味玉竹沙參夫麥冬乃補肺之重劑肺氣虛極氣不能續則用之以補肺氣如麥門冬湯竹葉石膏湯是也蓋防其窒膩耳若吐血咳嗽乃肺家痰火盤踞之病豈宜峻補從此無愈日矣至五味之酸一味收斂仲景用之以治上氣咳逆肺脈不合之症然必與乾薑同用以辛散寒邪從無獨用者今吐血之嗽火邪入肺痰凝血壅惟恐其不散不降乃反欲其痰火收住肺中不放一毫去路是何法也其沙參玉竹之補肺大略相近嗚呼此之不明後世永無吐血不死之人矣舉世盡然今為尤甚傷哉又曰古時虛勞與吐血確是二病虛勞是虛寒症以溫補為主吐血之症不一大約原陰虛火旺者為多葉氏亦言之鑿鑿但有時仍以建中湯為治則又誤以仲景虛勞治法混入吐血門中終是胸無定見也五十年前吐血者極少諸前輩無不以服補肺藥為戒所以死者絕少目今吐血者十人而五不服藥者無不生服麥冬五味者無不死此雖時令使然而藥誤亦不少也可不畏哉廣筆記曰今之療吐血者大患有二一則專用寒涼如芩連山梔知柏之類往往傷脾作瀉以致不救一則專用人參肺熱還傷肺則咳嗽愈甚亦有用參而愈者此是氣虛喘嗽與陰虛火熾者不同然亦百不一二也仲淳立論專以白芍藥炙甘草制肝枇杷葉麥冬薄荷葉橘紅貝母清肺薏苡仁淮山藥養脾韭菜降香蘇子下氣青蒿鱉甲銀柴胡丹皮地骨皮補陰清熱炒棗仁白茯神山萸肉枸杞補腎屢試輒驗然陰無乍長之法非多服不效病家欲速其功醫者張皇無主百藥雜試以致殞身覆轍相尋不悟悲夫鬱金治吐血聖藥患無真者耳藜按所指二弊極為明透苦寒之弊人皆知戒無敢犯者惟溫補一途凡以名醫自負及古今方書無不以此為主殺人無算毫不知悟偶遇陽虛之疾治以溫補而愈遂認影作身列為醫案嘵嘵辨論以為治血症之法理應如此不知血症之能服參耆者愈之甚易殊不勞先生之暢發高論也論中所列藥品亦極平穩惟韭菜山萸枸杞尚宜斟酌用之張飛疇治鄒孔昭昆仲俱患喘咳吐血肩息不得臥孔昭之脈尺部雖弦而寸關卻和平此火迫肺脈又兼感客邪審其所吐之血多帶痰水知必從胃而出先與小建中加丹皮和其榮衛續與異功去朮加山藥丹皮靈砂丹收攝泛火則肺胃自清遂愈千昭之脈關尺皆弦細如循刀刃血色正赤如凝朱為少陰守藏之血辭不治又治費仲雪久患膈塞嘔逆中脘覺痛如刺不時痰中帶血六脈沉細如絲自謂六陰之脈及按至神門別有一脈上至陽谿迢迢應指知胃氣未竭尚可久延其女不過咳血一二次尚能梳洗出入診得純弦細數此胃氣已竭安有復生之理亦辭不治藜按觀此數案知諸公於陰虛火炎之虛勞皆棄之不治而其所謂用建中異功及歸耆麥術等藥而愈者皆陽虛之症而非陰虧火炎之症也遍覽方書所列虛勞諸治法未嘗不燦然可觀於陰虛火炎之症亦未嘗混同立論而其究必歸於補陽蓋未嘗於此中身親閱歷故所談皆捕風捉影也以余所見陰虛火炎之症其脈無不細數而弦皆醫者醫書所謂不治之症然調治得宜亦有愈者其治法大約以脾胃為主而難處在不能用參術故非積以歲月不可迨至陰氣漸回弦細之脈漸減可用參術大補時而其病已愈矣徐靈胎曰五十年前吐血者絕少今則年多一年其證本皆可愈而多不治者藥誤之也蓋血證因傷風咳嗽而起者十之七八因虛勞傷損者十之二三乃醫者概以熟地人參麥冬五味等滋補酸斂之藥將風痰瘀俱收拾肺管令其咳嗽不止元氣震動津液化痰不死何待凡風寒補住必成勞病無人不知今竟無一人知之矣蓋吐血而嗽者當清肺降氣略佐補陰之品其不嗽者乃喉中之絡破故血從絡出並不必服藥其甚者只取補絡之藥以填損處自可除根即不服藥亦能自愈歷試不爽但病者進以不服藥之說則雖或面從背後必非笑隨之進以熟地麥冬人參五味等藥則甘心就死前者死矣後者復然豈非命乎黃錦芳治劉某咳血有年時發時止審其血雖色紅不黑而半雜白飲望其色雖紅而不白而卻倏忽不定察其氣息雖奔迫上急但靜坐則平動作則劇聽其聲音則暴迫不響詢其飲食則陰潤之物不敢習進先服之藥類多清潤初服似效再服即覺不宜偶服柿餅遂覺冷氣沁心診其脈左右二關俱弦數擊指而卻無力用苡仁三錢麥冬五分下氣為君龍骨首烏阿膠各一錢養肝為臣牛膝錢半引氣及血歸左附子五分五味子五粒引火及氣歸右用厚朴廣皮以除脾胃痰濕服二劑氣平大半左關數脈亦減但脾肺脈仍鼓指未平是肺之寒脾之濕尚未除也去五味麥冬加廣皮厚朴以疏脾枳殼桔梗以開肺咳嗽即止但日間勞動則復發病者問善後之圖黃曰是病諸經虛損先宜息氣凝神節勞欲以立其基次宜節飲食以保其脾終宜調寒溫以補其肺然後隨病症之虛實寒熱用藥餌以調其偏大約症見肝燥咳紅脈見左關獨數非用首烏阿膠不能潤肝氣上逆非用龍骨不能鎮肺氣隨濕上湧非用苡仁不能瀉肝氣燥而不收非用牛膝車前不能使氣歸陰下朝於左火衰氣浮非用附子五味不能使陽陰下行於右至或脾濕痰湧不思飲食則當重陳皮厚朴以疏之或加半夏以降之肺有感冒而見胸痹微用枳殼桔梗以開之蓋重用則恐其腎氣上浮也若更見哮喘則又當用麻黃杏仁使血歸經而不上溢但總不宜過潤過清致傷脾胃俾流為嘔吐泄瀉之症又不宜礙肝礙氣使血隨氣湧而致不可救也衄血竇材治一人患衄血日夜有數升諸藥不效竇為針關元穴入二寸留二刻呼問病人曰針下覺熱否曰熱矣乃令吸氣出針其血立止一法治鼻衄與腦衄神方用赤金打成一戒指帶左手無名指上如發作時將戒指捏緊箍住則衄止矣醫林指月趙汝隆治一官病齒衄日流血數升諸醫束手隆摘苦蒿令細嚼立愈雲南通志李嗣立治趙季修赴龍泉知縣單騎速行時值盛暑未幾患鼻衄日出血升許李教服藕汁生地黃膏方趙雲某往年因赴銓曹聽選省前急走數回心緒不寧感熱驟得鼻衄之症尋扣臨安一名醫服藥遂痊謝以五萬錢臨別時醫再三囑云恐後時疾作萬勿輕信醫者服生地黃藕汁之藥冰冷脾胃無服可生半月易醫無效李乃就此方隱其藥味俾服之三日疾愈趙問曰此藥如是靈驗得非與臨安醫之藥同乎李笑曰即前所獻之方也趙嘆曰前醫設為譎謀幾誤性命微君調治吾其鬼矣續醫說龔子才治一人年近五旬素稟弱怯患衄血長流五晝夜百藥不止脈洪數無力此去血過多虛損之極以八物湯加熟附子等分又加真茜草五錢水煎頻服連進二劑其血遂止又依前方去茜草調理十數劑而愈李時珍治一婦人衄血一晝夜不止諸治不效令搗蒜敷足心即時遂愈汪石山治陳銳面黑形瘦年三十餘患鼻衄發熱惡寒消穀善飢疲倦或自汗嘔血汪診之脈細且數約有六至曰丹溪論瘦黑者鼻衄者脈數者參耆皆所當禁固也然不可執為定論脈經云數脈所主其邪為熱其症為虛宜人參三錢生甘草陳皮黃柏白朮歸身生地山梔生白芍遞為佐使服之果安張路玉治朱聖卿鼻衄如崩三日不止較往時所發最劇服犀角地黃湯柏葉石膏丹梔之屬轉盛第四日邀診脈迫急如循刀刃此陰火上乘載血於上得寒涼之藥傷其胃中清陽之氣所以脈變弦緊與生料六味加五味子作湯另加肉桂三錢飛羅麵糊分三丸用煎藥調下甫入咽其血頓止少頃口鼻去血塊數枚全愈自此數年之後永不再發楊乘六治施鳴玉衄血如注三日半不止凡止衄方法並無一應氣息欲絕脈之虛大而緩面色萎黃舌嫩黃而胖知其四肢疲軟渾身倦怠懶於言語動輒嗜臥者匪朝伊夕也詢之果然而衄起之故緣自鍾溪歸家一路逆風操舟盡力不及達岸即衄至今第四日矣曰病人中氣大虧本不足以攝血復因勞力太甚重傷胃絡胃絡陽絡也陽絡傷則血出上竅胃脈絡鼻所以血出鼻孔也乃用補中益氣湯加炒黑乾薑一劑而衄止去乾薑加白芍五味子數劑而從前諸症漸除呂東莊治一張姓者好學深思士也年十八冬杪得齒衄及手足心熱恍惚不寧合目愈甚盜汗胸前出如油間或夢遺或不夢而遺伊叔錄脈症求方呂曰脈不敢憑據所示症乃三焦胞絡火遊行也試用後方連翹黃芩麥冬生地丹皮丹參茯苓石斛滑石辰砂甘草白豆蔻等二劑而愈及明年用功急迫至夏其症復作或云皆不足症用溫補腎經及澀精等劑服之日劇又進溫補腎經丸料斤許愈劇至不能立立則足底刺痛或謂為虐症矣乃求診呂曰體雖尫羸而面色憔悴之中精神猶在問所服藥出示方曰生藥鋪矣何得不凶且少年樸實人何必用溫補曰手足心熱奈何曰勞心之人大抵如是曰夢泄奈何曰夢泄人人各殊此乃心腎不交所致與夫盜汗恍惚症皆三焦胞絡之火行遊而然藥宜清涼遂仍前方去滑石豆仁辰砂加升麻五錢燈草十餘莖又用麥冬生地滑石石斛茯苓白芍丹參神麯辰砂作丸守服而愈真通人之論可為執方治病者作頂門針王執中母氏忽患鼻衄急取藥服凡昔與人服有甚效者皆不效因閱集效方云口鼻出血不止名腦衄灸上星五十壯尚疑頭上不宜多灸只灸七壯而止次日復作再灸十一灸而愈有人鼻常出膿血執中教灸囟會亦愈則知囟會上星皆治鼻衄之上法也醫者不可不知資生經一婦人鬱結而患前症用加味歸脾湯其血漸止飲食漸進用加味逍遙散元氣漸復寒熱漸止後因怒仍衄寒熱往來用小柴胡湯加芎歸丹皮而愈一婦人因勞衄血服涼藥之劑更致便血或以血下為順仍用治血薛曰此因脾氣下陷而從當升補脾氣庶使血歸其經不信果血益甚乃朝用補中益氣湯夕用加味歸脾湯而愈此症用寒涼止血不補脾肺而死者多矣馬元儀治陸太史母患衄血不已兩脈浮大而數重按無神面赤煩躁口乾發熱心悸恍惚群作陽明火熱陰虛內動之症治旬日轉盛此因憂思悒鬱致傷陽氣陽氣既傷陰血無主上逆則衄下奪則便當作中虛挾寒治用附子理中湯內益人參至三兩眾阻之明日復診脈象散失較之浮數為更天淵乃謂眾曰症既非實以補養為主然氣血俱要而補氣則在補血之先陰陽並需養陽在滋陰之後是以非助火而益水不如是不得其平也令進前方不得已減去人參二兩服至第九日衄血便血俱止後以歸脾湯調理而愈譙知閣熙載壬子年病衄血用燈草數枚以百沸湯煮逐枚漉出乘熱安頂上冷即易之遂愈百乙方此即灸上星囟會之意蘇滔光云其母夫人常衄血盈盆百藥不效用好麻油紙捻紝鼻中頃之打嚏即愈此方甚奇同上楊子縣吏陳某當臘月鼻衄至正月凡十三日始定其脈實而數治當下導與桃仁承氣湯去積瘀次服既濟湯而愈蓋此人過食煎炙飲醇酒皆積熱所致也白雲集醫旨緒餘曰有侄女十歲因傷齒動搖以苧麻摘之血出不止一日夜積十一盆用末藥止之少頃復從口出診其脈皆洪大有力以三製大黃末二錢枳殼湯少加童便調下去黑糞數枚其血頓止未入選一男子每齒根出血盈盆一月一發百藥不效知其飲酒投前藥一服而安是知此疾多陽明熱甚所致緣衝任二脈皆附陽明而陽明一經氣血俱多故一發如潮湧急則治其標也投以釜底抽薪之法應手而愈竇漢卿曰一人齒根邊津津血不止苦竹茹四兩醋煮含漱吐之而愈一人舌上忽出血有穴如簪孔大赤小豆一升杵碎水三碗和搗取汁每服一盞不拘時服用槐花末糝上而愈良方但用槐花末糝名曰舌衄沈明生治給諫姜如農長君勉中患衄不已去血盈斗一月後衄止復患囊癰六脈如絲精神困憊始猶健飲漸至饘粥不入先後醫友但云虛而當補莫測病根所在於是參耆不效桂附隨之愈補而形愈虛愈溫而氣愈弱最後沈至時居冬至矣據脈與症亦謂當溫無疑獨念桂附太熱姑用補中益氣嘗之毫無進退忽悟吾亦踵其誤矣夫食雖不入而大便秘結症類虛寒而口渴喜飲蓋衄血之來本因邪火上熾乃遽用血脫益氣之法衄雖止而熱不下發為囊癰既潰瘍科又泥寒藥不能收口之戒亦務溫補周旋左右者目擊病人尫羸又聞眾口稱虛強令進食以久臥床蓐之體恣啖肥甘不為運化是以藥食並壅內熱外寒此病中之病初非衄與癰所致宜其愈補而愈不靈也先哲云脈浮者穀不化又云大實有羸狀誤補益疾其斯之謂與遂力主清潤疏解以硝黃為前茅而大便立通以芩芍為後勁而飲食漸進如絲之脈一錢添長久冷之軀一陽來復不惟衄血不作且令瘡口易收孰謂從脈可以舍症不思而得病情哉向非翻然易轍轉敗為功人惟知補之不效而已又安知效之不在補也此事難知如此吳橋治文學於學易舉孝廉病衄其衄汩汩然七晝夜不止甚則急如湧泉眾醫濟以寒涼不效急以大承氣湯下之亦不行橋曰孝廉故以酒豪積熱在胃投以石膏半劑愈之眾醫請曰積熱宜寒則吾劑寒之者至矣公何獨得之石膏橋曰治病必須合經病在是經乃宜是藥石膏則陽明胃經藥也安得以雜投取效哉太函集聶久吾治葉氏子年十五患衄血治不效詢其症自九歲起其初每年不過五七次每次流數茶匙至十一歲則每月一次每次流半酒盞十二歲則兩月三次每次流一酒杯十三歲則每月兩次流半茶鍾十四歲則每月或兩次流大半碗今十五歲則八九日一次每次流盈碗矣瘦削骨立夜間身熱危困極矣諸醫所用皆清熱涼血之劑十劑衄減四五三十劑減七八四十劑則兩月一次每次不過數點五十劑全安而肌肉豐矣後或有時少作以前方一劑立愈地芍芎歸二冬知柏芩連首烏花粉丹皮香附甘草龍眼肉水煮調好發灰五分食遠服聶方輕極每品不過五七分魏玉橫曰楊氏子年二十餘歲病鼻衄如湧有令以黑山梔末吹者有令以濕草紙熨腦門者有令以熱酒浸腳者憧憧擾擾一日夜不得止令覓有乳婦人以乳對鼻孔擠乳乳入必止止後候鼻血乾燥宜穵去之如法立愈郭氏兒七歲病咳嗽夜熱時時鼻衄衄之盛常在半夜兒醫端與疏散涼解食減則又與香燥消運日益就憊延診見其面目略腫年壽環口隱起青氣按其乳旁期門虛里之間突突跳築謂此稟賦薄弱頑耍過勞傷其肝腎木上侮金故其衄多出於左鼻孔乃內傷非外感也與養青湯數帖少減再加熟地地骨皮蔞仁四帖全愈下血張子和曰樂彥剛病下血醫者以藥下之默默而死其子企見張而問曰日吾父之死竟無人知是何症張曰病銼其心也心主行血故被銼則血不禁若血溢身熱者死火數七七日故死治不當下下之不滿數企曰四日死何謂病銼心張曰智不足而強謀力不足而強與心安得不銼也樂初與邢爭屋不勝遂得此病企由是大服拜而學醫王礪恆治張大復腸血下注痛不可忍胸腹滯悶痛極血濡縷著褌襪間唼唼有聲曰此欲脫也然色鮮當不害亟取貝母一兩令細研為末分作十劑酒少許嚥下三舐而注者減色昏黑又三舐之息矣後作寒熱十日而愈後數年復發血止則左脅腫痛有聲汩汩然達於腹又數日汩汩聲稍達於背乃用沉香酒磨飲之不三日減筆談汪龍溪手札云去年得下血疾半年有餘今春誤食胡桃胡桃能下血則知胡桃當忌也珊瑚綱龔子才治一人血痢及下血不止以六味丸加地榆阿膠炒黃連黃芩生地而愈孫文垣治董龍山夫人年三十五病便血日二三下腹不疼諸醫治三年不效診之左脈沉澀右脈漏出關外診不應病謂血既久下且當益其氣而升提之以探其病乃用補中益氣加阿膠地榆側柏葉服八劑血不下者半月偶因勞血復下再索前藥乃謂之曰夫人之病必有瘀血積於經隧前藥因脈難憑故以升提兼補兼澀者以探虛實耳今得病情法當下以除其根董曰便血三年雖二三下而月泛不爽且至五日如此尚有停蓄耶曰以此而知其必有瘀也經曰不塞不流不行不止今之瘀實由塞之故也行則不塞古人治痢必先下之亦此意也用桃仁承氣湯加丹皮五靈脂荷葉蒂水煎夜服之五更下黑瘀半桶復索下藥曰姑以理脾藥養之病根已動俟五日再下未晚至期復用下劑又去黑瘀如前者半繼以補中益氣湯參苓白朮散調理全愈吳孚先治賴思誠大便下血已十有六月諸醫無功診得右寸實數大便如常是實熱在肺傳於大腸與黃芩花粉山梔麥冬桔梗清其肺熱不數日其病如失前治不效者俱就腸中消息故耳李士材治學憲黃貞父下血甚多面色萎黃發熱倦怠盜汗遺精診之曰脾虛不能統血腎虛不能閉藏法當以補中益氣五帖並而進之十日汗止二十日血止再以六味間服一月而安盧不遠云戊申秋坐分水王元極家堂上有人從外來望其色黃而內深青問元極乃族兄也問何病云惟便血余謂春來病必甚春分法當死至己酉二月果歿或問曰君未嘗診候何問之而遽斷知之且在半年之先也予曰脈者形之機色者氣之兆嘗讀倉公舍人奴案故心識其脾傷之色至春土不勝木法當死然舍人奴以四月死者尚肥而王之體已瘦耳又曰半年之前豈無方可治乎曰君不聞扁鵲之言乎越人非能生死人也當生者越人能使之起耳且疾之所在有四曰絡曰經曰腑曰臟絡經及腑病尚屬半死而臟病則絕不可活況其人臟色已外顯又烏能治哉陸養愚治姚天池室素有腸紅症服山梔丹皮芩連涼血之劑即止近因惱怒飲食遂患痞滿按之急痛大便不行醫以丸藥下之大便已通按之不痛而胸膈仍不舒飲食不進再以行氣藥投之痞脹不減而便血大作三四日不止又以涼血藥投之血不止而反增嘔惡身體微熱旬日間肌肉削其半脈之人迎沉而澀氣口弦而急夫沉澀者血失也弦急者肝盛也肝盛則脾虛而痞滿下血之症並作矣用參朮歸芍耆草枯薑阿膠數劑血止脹寬飲食漸進去枯姜加熟地調理月餘而痊呂東莊治孫子川久患下血病症夏末忽滯下口渴不思飲食坐臥不寧身體日夜發熱肛門下墜周圍腫痛遍身軟弱身子羸瘦行走懶怠始則腹內悶痛繼而體熱脈洪數曰若論滯下則諸症皆死候也然今在下血之後則未可盡責之滯下當變法治之先用白朮茯苓山藥神麯苡仁陳皮甘草等藥強其中以統血次用黃連澤瀉黃芩丹皮等藥以解鬱積之熱後用熟地歸芍等以復其陰次第進之乃痊薛立齋治一婦人下血不已面色瘦黃四肢長冷此中氣下陷用補中益氣湯送四神丸數服而愈光祿張淑人下血煩躁作渴大便重墜後去稍緩用三黃湯加大黃至四兩方應後又用三黃湯二十餘劑而愈此等元氣百中一二韓地官之內脾胃素弱因飲食停滯服克伐之劑自汗身冷氣短喘急腹痛便血或用滋補劑皆不應乃用人參炮附子各五錢二劑稍應卻用六君子每劑加炮附子三錢四劑漸安又用前湯每加附子一錢數劑乃痊一婦人因怒胸痞飲食少思服消導利氣之藥痰喘胸滿大便下血用補中益氣加茯苓半夏炮姜四劑諸症頓愈又用八珍加柴胡炒梔全愈通府薛允俯下血服犀角地黃湯等藥其血愈多形體消瘦發熱食少裡急後重此脾氣下陷用補中益氣加炮姜一劑而愈一男子便血每春間尤甚且兼腹痛以除溫和血湯治之而愈薛立齋治一男子素有溫熱便血以槐花散治之而愈一婦人糞後下血面色萎黃耳鳴嗜臥飲食不甘服涼血藥愈甚診之右關脈浮而弱以加味四君子湯加升麻柴胡數劑脾氣已醒兼進黃連丸數劑而愈大凡下血服涼血藥不應必因中虛氣不能攝血非補中升陽之藥不能應切忌寒涼之劑亦有傷濕熱之食成腸澼而下膿血者宜苦寒之劑以內疏之脈弦絕澀者難治滑大柔和者易治也一男子糞後下血諸藥久不愈甚危診之乃濕熱用黃連丸二服頓止數服而痊一男子糞後下血久而不愈中氣不足以補中益氣湯數劑更以黃連散數服血止又服前湯月餘不再作馬元儀治汪氏婦患便血症時適澡浴忽下血不已遂汗出躁煩心悸恍惚轉側不安診得兩脈虛澀虛為氣虛澀為陰傷人身陽根於陰陰近於陽兩相維倚者也今陰血暴虛陽無偶必致外越陽越則陰愈無主其能內固乎當急固其氣氣充則不治血而血自守矣先以參附理中湯繼以歸脾湯及大造丸平補氣血而安入理深談蔣氏婦便血久不愈脈右虛微左弦搏此郁傷肝肝病傳脾二經營血不守以人參逍遙散和肝益脾二劑右脈稍透症減一二欲速愈請用苦寒曰肝脾兩經為相勝之臟木旺則土虛用苦寒之劑則重損其脾惟此方益土之元可以柔木養肝之陰可以安土遂守前方三十餘劑而痊陸氏續集驗方治下血不已量臍心與脊骨平於脊骨上灸七壯即止如再發即再灸七壯永除根目睹數人有效余常用此灸人腸風皆除根神效無比然亦須按此骨突痠疼方灸之不痛則不灸也但便血本因腸風腸風即腸痔不可分為三或分三治之非也醫說續編雄按便血腸痔豈可不分盧州郭醫云趙俊臣帥合肥日其胥司馬機宜患酒毒下血多至升斗服四物湯每料加炒焦槐花二兩如常法煎服而愈同上王嗣康為蔡昭先處厚朴煎治積年下血韓縣尉云乃尊左藏服之作效上用厚朴五兩用生薑五兩同搗開於銀石器內炒令紫色上為一兩大麥蘖神麯二味各一兩同炒紫色上炒為末白水麵糊為丸如梧桐子大疾作空心米飲下一百丸平時三五十丸嗣康云腸胃本無血元氣虛腸薄自榮衛滲入今用厚朴厚腸胃神麯麥蘖消酒食於術導水血自不作也醫說續編雄按腸胃本無血一言詢為卓見立齋治張刑部德和便血數年舌下筋紫午後唇下赤胃肺脈洪謂大腸之脈散舌下大腸有熱故舌下筋紫又便血胃脈環口繞承漿唇下即承漿也午後陰火旺故承漿發赤蓋胃為本肺為標乃標本有熱也遂以防風通聖散為丸治之而愈後每睡忽驚跳而起不自知其故如是者年餘腦發一毒焮痛左尺脈數此膀胱積熱而然以黃連消毒散數劑少愈次以金銀花栝蔞甘草節當歸服月餘而平此肝經血虛而燥也患此者頗多以其不甚為害故醫亦莫之知耳南昌鄭思濟傳便紅方或因酒毒發者先用川黃連去須切片酒炒細末每服三錢空心白酒調下忌葷腥一月服連末後必腹痛去血愈多復用白芍一兩白朮五錢甘草三錢同炒揀開先用白芍煎湯服腹痛自止後以白朮甘草同煎服遂愈又一法以粳米三分糯米三分煮粥空腹服遂愈此無他補胃氣則陽明調所以便紅自除也廣筆記制方精妙蕭萬輿治陳克元年二十八元氣虛寒面青白肢體頻冷嘔痰飽脹小便清利患大便下血數月不出脈沉伏如無重按著骨方見蠕動曰脈症相符此臟氣虛寒血脫也以十全大補湯去川芎白芍加熟附子炮姜少佐升麻服四劑便血頓止若以此屬熱妄投寒劑必無生矣朱孝廉明恥面色青黃初為感寒過飲薑湯患內熱脫血服芩連寒劑即愈後因勞復發再服不納惟靜養兩旬方瘥近因驚復作仍倦怠增劇脈之六部皆沉緩濡弱曰始受辛熱投以苦寒宜乎即愈但熱氣既消而廣腸血竅尚未斂血故遇勞即發夫勞則傷脾脾傷則不能統血致下陷循故竅而出此因於勞非由於熱也今屢發而元氣愈虛惟至靜固中之劑庶可耳以熟地為君參耆歸術為臣丹皮炙草知母茯苓阿膠為佐引用升柴為丸與服仍兼飲加減歸脾湯月餘諸症如失虛寒積熱之外又有此一症但既云至靜固中之劑則當歸丹皮似尚未合法彭予白病脫血久不痊因積勞所致萬以為勞傷脾肺即腎家伎巧亦為之竭曰得無遇事過時而失食熱升燎於首面乎曰正苦此耳屢服芩連清火之劑漫不應脈之六部沉緩與六味加肉桂人參五味子丸服不數月沉痾頓痊乙丑歲蕭寓楚中時適有僕婦每患便血投以臟連丸隨服隨愈劉友善屬文病便血服香連丸經歲不愈飲食如常冬娶婦輟藥卻愈次夏患痢且能健啖起居不倦投香連丸四劑至夜發厥而死此症全屬肝火於此可見大都此積服寒涼脾氣漸傷又娶親後精血日耗元氣不支故遇血即僕理可知也禍非旦夕有由來矣錢國賓治戴思云妻得病年餘大便下血如腐或紫或紅身體昏暈久病虛且損矣其脈浮滑沉滯脾部更甚細思血脈病久當見芤虛數澀此痰脈也以導痰湯加九製大黃二三服愈蔣仲芳治徐萬壽年二十餘七月中下血不止遍醫不效至十月初屢次昏暈事急矣診之右寸獨得洪數是必實熱在肺傳於大腸也用麥冬花粉桔梗元參黃芩山梔五味沙參服數劑而愈近見一症寒熱微渴胸滿微煩小便利大便稀而少狀如雞糞其色黑蔣謂大便黑者血之瘀稀者中之寒血瘀間寒積在下焦不得不下遂用當歸活血湯加熟大黃溫而行之下盡黑物而愈蓋瘀血在下兼熱者多兼寒者少故古人未有陳案此又出古法之外也吳橋治婺源令君入府城乃病溲血晝夜凡百行溲皆純血咳逆絕食且昏沉醫者以為新病也請宣之姚令君曰不然公止中道宿就近召吳醫乃可橋暮至六脈沉微乃曰明府下元極虛誤下且不救甲夜進溫補之劑熟寐至夜分覺乃啜粥湯病去十七八驚自語曰何速也試再診之曰明府無憂脈歸矣再劑而起三劑乃歸太函集程氏兄弟並溲血兄瘥弟劇則以弟逆橋入中庭必由兄室見兄在室煩亂其言支離戶外徐視之死氣黲黲弟婦速橋未入則弟自房內號咷橋作而嘆曰異哉兩君子俱死矣然瘥者顧急則予望而知之劇者顧緩則予聞而知之長君色有死徵次君聲有餘響故也既而診之兄脈將絕病得之內重以誤下傷陰家人以為然病者始病而內以故里急厚重乘之族醫遞為之下急重乃通今絕水漿四肢逆冷法曰下痢煩躁者死語言錯亂者死四肢厥冷者死水漿不入者死四端皆在不治中者兄死診其弟病視乃兄為輕或當小愈第多嗜多怒亦必不終旬日溲血平尋以過飽淫怒傷脾未幾卒太函集聶久吾表侄年三十初咳紅服滋養清涼而愈忽大便下血血在下為順勿遽止之半月後用新制臟連丸與服之愈川連為末酒拌入豬大腸韭菜蓋蒸爛搗勻曬乾仍為末每連一兩入側柏葉當歸末各二錢和勻米糊為丸梧子大空心溫酒或白湯下二錢五分魏玉橫曰趙正為室人年近四旬便血面黃肢腫凡補氣補血及氣血兩補升提固澀涼血溫中之劑莫不備嘗而歸脾為多均罕驗方書謂糞前血其來近糞後血其來遠今則二者皆有脈之關前盛關後衰且弦且數曰此非脾不統血也乃肝木挾火上乘於胃血因之上逆以病人肺氣強不為嘔血反側溢入於大腸而為便血故有時血先注渣滓後注則便前有血有時渣滓先注血後注則便後有血有時渣滓前後與血俱注則便前後俱有血蓋陽明為多氣多血之府血去雖多而不甚困也第峻養其肝使不挾火上逆血自止矣與生地黃熟地炭白芍棗仁杞子各五錢炙甘草酒黃芩各五分川楝肉一錢八劑全安一少年素有便血自言觸穢腹痛經日不止因覓土醫刺委中穴出血如注是即大發寒熱頭痛如搗腹脅滿痛不能轉側譫語如鬼狀一館中師以大柴胡下之而愈愈後不時寒熱咳嗽服滋陰清肺之藥兩月而其咳嗽愈甚近日飲食多進大便作瀉而兼下血左右關尺皆弦細而數張飛疇曰此必刺委中時感冒風寒因其人素有便血邪乘虛入而為熱入血室如陽明病下血譫語之例用大柴胡得愈者是偶中痛隨利減之效原非正治所以愈後不時寒熱咳嗽脾胃清陽之氣下陷而肺失通調輸化之氣也斯時不與調補脾胃反與清肺則脾氣愈傷不能統血而為下脫泄瀉之患虛損已成雖可久復生恐難為力矣溺血薛立齋治一婦人小便出血服四物蒲黃之類更加發熱吐痰加芩連之類又飲食少思虛症蜂起肝脈弦而數脾脈延而緩此因肝氣風熱為沉陰之脾傷不能統攝其血發生諸症然也用補中益氣湯六味地黃而痊陸養愚治費右塘室性執多怒初夏忽患小水不利陰中腫痛月又溺血發熱時疫症盛行醫與解肌發表不效脈之左關沉弦而數右寸浮數而短曰此由心火過旺時又火令肺金受傷失降下之權故小水不利足厥陰肝脈合纂間繞纂後陰器為肝經所絡之地木氣有餘而寡於畏故壅腫而痛用人參麥冬知母五味滋肺經而還其輸布之職黃連柴胡白朮滑石青皮丹皮青黛瀉肝火而絕其壅滯之氣數劑而諸症痊雄按人參五味未妥張路玉治徐中翰夫人溺血兩月不止平時勞心善怒有時惱怒則膈塞氣塞諸治不效又進香薷飲一服診之兩手關尺俱弦而少力兩寸稍大而虛遂疏異功煎方令其久服可保無虞若有惱怒間進沉香降氣散一切涼血滋陰咸宜遠之別後更醫究不出參術收功耳一徽商夏月過飲燒酒溺血或用辰砂益氣散不效服六味湯亦不效張用導赤散三啜而愈有文學宋孝先年七十餘溺血點滴澀痛諸藥不效服生六味亦不應云是壯歲鰥居絕欲太早之故令以綠豆浸濕搗絞取汁微溫日服一碗煮熟即不應也內弟顧元叔溺血溺孔不時痠疼溺則周身麻木頭旋眼黑而手足心常見發熱痠麻尤甚脈來弦細而數兩尺搏堅與生料六味或加牛膝或加門冬服之輒效但不時舉發以六味合生脈用河車熬膏代蜜丸服而痊薛立齋治一婦人因怒尿血內熱作渴寒熱來往胸乳間作脹飲食少思肝脈弦弱此肝經血虛而熱也用加味逍遙散六味地黃丸兼服漸愈又用八珍湯加柴胡丹皮山梔而痊馬元儀治顧遜昭患溺血已三月或屢與升補不應診其右脈虛澀無神左關獨弦莖中作痛下多血塊形色憔悴又多噯氣此肝脾積熱之候也肝熱則陰火不寧而陰血自動以血為肝臟所藏而三焦之火又寄養於肝也故溺血莖中作痛等症作矣脾熱則濕氣內擁而生氣不伸以脾為濕土之化而三焦之氣又運行於脾也故時時噯氣形色憔悴之候生矣法當益肝之陰則火自息利脾之濕則氣自和用生地白芍黃芩萆薢丹皮甘草車前調理半載痛定濁止而安陳總領云余頃在章貢時年二十六忽小便後出血數點不勝驚駭旋卻不疼如是一月若不飲酒則血少終不能止偶有鄉兵告以市醫張康者常療此疾遂呼之來供一器藥云是草藥添小蜜解以水兩服而愈既厚酬之遂詢其藥名乃鏡面草一名螺靨草其色青翠所在石階縫中有之良方王執中雲人有患小便出血者教酒與水煎苦賣菜根服即愈立齋治一婦人尿血陰中作痛服清心蓮子飲不應服八正散愈盛以發灰醋湯調服少愈更以斑龍丸而平錢國賓治廣靈王初右足拐外患毒長八寸橫四寸溺血如婦人之經二月一來自長流至點滴約兩銅盤日夜方止昏迷臥床薑湯半月始生病已二載歷治罔效每臨溺期府中怖甚脈沉細無力右手少強經云男子久病右手脈盛者可治因立法內治升提藥榮行脈中衛行脈外氣引血行自歸經絡而止外用雄黃兒茶乳香沒藥血竭各三錢麝香五分硃砂二錢百草霜一錢五分共末以真蘄艾作條安綿紙上散藥一錢搓成捻子長八寸以麻油蘸透在無風處側臥患處朝上燃捻離瘡尺二許覺熱遠些如冷近些日熏二次一捻作三次用內外分治溺血竟止其瘡四月亦痊
