body:
  text: 卷三十二外科發背精要論背疽其源有五一天行二瘦弱三怒氣四腎氣虛五飲冷酒食炙爆服丹藥元末嘉興桐鄉縣後朱村徐通判素慕洞賓朝夕供禮一日疽發於背勢垂危猶扶起禮之如昔偶見淨水盂下白紙視之有詩云紛紛墓土黃金盾片片花飛白玉芝君主一斤臣四兩調和服下即平夷意其仙方然不知何物為黃金白玉乃召仙以大黃白芷為問仙曰然服之果驗後以之醫人無不效徐無子方竟傳婿沈氏至今沈以此治生數百里來貨藥者無虛日族大而分數十家惟嫡枝居大椿樹下者藥乃驗沈子嘗從吾友俞院判學嘗聞其藥今加穿山甲當歸鬚金銀花矣然大黃既多以下為主不問陰陽之毒而投之恐亦有害者然源源往醫又獨於椿樹下者驗豈非天固與之乎七修類編京師萬勝門生員王超忽覺背上如有瘡隱倩人看之已如盞大其頭無數或教往梁門裡外科金龜兒張家買藥張視顰眉曰此瘡甚惡非藥所能治只有灼艾一法庶可冀望萬分然恐費力乃撮艾與之曰且歸試灸瘡上只怕不疼直待灸疼方可療耳灼火十餘殊不知痛妻守之而哭至第十三壯始大痛四旁惡肉卷爛隨手墮地即以稍愈再詣張謝張付藥數帖日安則知癰疽發於背脅其捷法莫如灸也類編王敏診一人發背不起醫言起則治矣敏曰是擊指脈即起亦不治眾劫以艾疽起如粟眾曰無傷矣竟三日死姑蘇志治發背腦疽一切惡瘡初覺時採獨科蒼耳一根連葉帶子細銼不犯鐵器用砂鍋熬水二大碗熬及一半瘡在上徐徐飯後服之吐出候吐定再服以盡為度瘡在下空心服瘡自破出膿更不潰爛瘡上別以膏藥敷之此方京兆張伯玉家榜不傳人後昆仲皆登第人謂善報元遺山續夷堅志大凡石類多主癰疽世傳麥飯石膏治發背瘡甚效乃中嶽山人呂子華秘方裴員外啖之以名第河南尹脅之以重刑呂寧絕榮望守死不傳其方取此石碎如棋子炭火燒赤投米醋中浸之如此十次研末篩細入乳缽內用數人更碾五七日要細膩如面四兩鹿角一具要生取連腦骨者其自脫者不堪用每二三寸截之炭火燒令煙盡即止為末研細二兩白蘞生研末二兩用三年米醋入銀石器內煎令魚目沸旋旋入藥在內竹杖子不住攪熬一二時久稀稠得所傾在盆內待冷以紙蓋收勿令塵入用時以鵝翎拂膏於腫上四圍赤處盡塗之中留錢大泄氣如未有膿即內消已作頭即撮小已潰即排膿如湍水如病久肌肉爛落見出筋骨者即塗細布上貼之干即易逐日瘡口收斂但中膈不穴者即無不瘥已潰者用藥時先以豬蹄湯洗去膿血用帛挹干乃用藥其瘡切忌手觸動嫩肉仍不可以口氣吹風及腋氣月經有孕人見之合藥亦忌此等初時一日一洗一換十日後二日一換此藥拯細方有效若不細塗之即極痛也此方千金月令已有之但不及此詳細耳本草綱目馮楚瞻治蔣司農向來脈氣寸強尺弱故服八味丸已有年矣此等脈多陰虛火上炎之候服八味丸者多貽後患然過勞藥力不能勝其妄動之火鼻衄大作調理雖愈而口渴殊甚飲湯水如甘露然即數十杯不足滿其欲也此即消渴久成癰疽勸服大劑壯水佐以引火歸原之餌則水升火降消渴自除變症可弭乃忽之雖服數劑渴略減藥即停至初夏背上忽隱隱痛癢漸甚而肉硬半月餘痛極重及診之當脊少偏半寸外不腫肉分堅實如碗大矣曰久渴不治陰水日虧陰火日熾書所以有腦疽背疽之兆也亟為托出陽分使毒氣勿致逗遛內陷為要乃外用大黃二兩芙蓉葉赤芍各一兩白蘞白芨各五錢為末雞子清調敷毒四圍內則重滋陰水加熟地山藥土貝角刺天蟲甲片生甘草連翹金銀花之類及腫既成乃早吞八味丸五六錢以培先天之水火食遠服參耆歸芍朮草銀花甲片天蟲角刺白芷之類以助後天之氣血外以太乙膏加男發蓖麻子乳香沒藥煎膏貼之以呼毒氣外出不旬日紅腫消痛重減瘡已焮高已有膿勢乃一外科改弦易轍幾至內潰再亟治仍用前法煎藥加肉桂錢許仍高腫紅活竟如些小之毒潰膿而愈高鼓峰治一鄉人患發背上距風府下連腎俞通塊腫起肌肉青冷堅硬如鐵飲食俱廢不省人事醫猶用解毒藥脈之六部細數氣血大虧毒將內陷矣急用養榮湯加附子炮姜三大帖而胃氣開十劑而堅硬者散去十之八九只左邊如茶鍾大焮紅作腫戒之曰切莫箍藥及刀針氣血溫和毒當自出箍則反遲非時而刺收口難矣彼以不任痛竟受刺出血曰當倍前藥急服以收口為度仍戒以節嗜欲慎飲食兼服還少丹八味丸而愈朱丹溪曰予見吳兄厚味氣鬱而形實性重年近六十患背疽醫與他藥皆不行惟香附末飲之甚快始終只此一味腫潰恃此以安此等體實千百而一見者也名獨勝散惟氣滯血凝實症宜之樓氏婦早寡善飲啖形肥偉性沉毒年六十六七月間生背疽近正脊醫遂橫直裂開取血雜以五香十宣散與酒飲之月餘未嘗議其寡居之郁酒肉之毒執著之滯時令之熱迨至於平陷淹延兩三月而不救江陵府紫極觀掘得石碑載此凡人發背欲結未結赤紅腫痛先以濕紙覆其上立視候其紙先干處則是結癰頭也取大蒜切成片如當三錢厚安頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛時住不痛者灸至痛時方住早覺早灸為上如有頭似麻豆大者不須用濕紙覆法若有十數頭聚而在一處生者即用大蒜頭搗膏作薄餅鋪頭上聚艾於餅上燒之一二日十灸十活三四日六七活五六日三四活王蘧發背方序云元祐三年夏四月官京師疽發於背召國醫治之逾日勢益甚得徐州蕭縣人張生以艾火加瘡上自旦及暮凡一百五十壯知痛方已明日鑷去黑痂膿盡潰肉裡皆紅亦不復痛始別以膏藥貼之日一易焉易時旋剪去黑爛肉許瘡乃平是歲秋夏間京師士大夫病疽者七人余獨生此雖司命自然固有定數不知其方遂至不幸者以人意論之可為慨然於是撰次前後所得方模板以施庶幾古人濟眾之意此即當頭灸法但不用蒜耳史源母氏背胛間微癢視之有赤半寸許方有白粒如粟黍乃急著艾灸其赤隨消二七壯而止信宿復覺微痛視之有赤下流長二寸闊如韭葉舉家皆以前灸為悔或云等慈寺尼智全者前病瘡甚大得灸而愈奔問之全曰劇時昏不知但小師輩言範八奉議守定灸八百餘壯方蘇約艾一篩耳亟歸白之見從始以艾作炷如銀杏大灸其上十數殊不知痛乃截四旁赤引其炷減四之三皆覺痛七壯後覺癢每一壯燼則赤隨縮入灸至二十餘壯赤暈收退病者不憚遂以艾作團大灸其上漸加至雞黃大約四十團方覺痛視火焦處已寸余蓋灸之遲而初發處肉已壞壞肉成隔直至好肉方痛四旁知痛肉未壞也病者六夜不寐至是食粥安寐至晚視之瘡如覆一甑突高三西寸上有百數小竅色正黑突然高者毒氣出外而聚也百數小竅毒未聚而浮攻肌膚也色正黑者皮與肉俱壞也非灸火出其毒於壞肉之裡則五臟逼矣薛立齋治王通府患背發十餘日勢危脈大先與槐花酒二服殺退其勢更以敗毒散二劑再以托裡藥數劑漸漬又用桑柴燃灸患處每日灸良久仍以膏藥貼之灸至數次膿潰腐脫以托裡藥加白朮陳皮月餘而愈劉大尹發背六七日滿背腫痛勢甚危與隔蒜灸百壯飲槐花酒二碗即睡覺與托裡消毒藥十去五六令以桑枝灸患處而潰數日愈凡灸及飲槐花酒則托裡之效甚速一園丁患發背甚危令取金銀藤五六兩搗爛入熱酒一鍾絞取酒汁溫服渣罨患處四五服而平彼用此藥治瘡足以養家棄園業諸書云金銀花治瘡瘍未成者即散已成者即潰有回生之功太監劉關患發背腫痛色紫診其脈息沉數陳良甫云脈數發熱而痛者發於陽也且瘡瘍赤甚則紫即火極似水也詢之嘗服丹藥半載乃積溫成熱所致耳遂以內疏黃連湯再服消平更用排膿消毒藥及豬蹄湯太乙膏而愈經曰色與脈當相參應治之者在明亢害承製之理陰陽變化之機焉耳一男子年逾五十患發背色紫腫痛外皮將潰寐食不安神思甚疲用桑柴灸患處出黑血即鼾睡覺而諸症如失服仙方活命飲二帖又灸一次膿血皆出更進二劑腫痛大退又服托裡消毒散數帖而斂夫瘡毒熾甚未宜峻劑攻之但年老血氣衰弱況又發在肌表若專於攻毒則胃先損必反誤事吳江申僉憲患背疽堅硬脈沉實乃毒在內用宣毒散大黃五錢煨白芷五錢水煎食前服一劑大小便下汙物再服而消此方乃宣通攻毒之劑脈沉實便秘者其功甚大琇按即首條黃金白玉方薛用之而不詳其出處大尹陳國信素陰虛患背疽用參耆大補而不斂內熱發熱舌燥唇裂小便少頻數口乾飲湯嘔吐瀉利耳閉目盲仰首眩暈脈浮大而數薛曰瘡口不斂脾土敗也舌燥唇裂腎水枯也小便頻數肺氣衰也內熱發熱虛火上炎也口乾飲湯真寒之象也嘔吐瀉利真火衰敗也耳閉目盲肝木枯散也仰首眩暈腎氣絕也辭不治後果歿琇按不拘內外病凡陰虛者服參耆諸氣分藥非惟無益而反害之據此症純屬三陰虧竭若初時解用二地二冬杞子歸芍之輩猶可挽也吳庠史邦直之內仲夏患背疽死肉不潰發熱痛甚作嘔少食口乾飲湯脈洪大按之如無此內真寒而外假熱當舍時從症先用六君加炮薑肉桂四劑飲食頓進復用十全大補湯仍加薑桂之類五十餘帖而死肉潰又五十餘劑而新肉生斯人血氣充盛而瘡易起易斂使醫者逆知預為托裡必無此患雄按十全大補必毒火盡除而後可用南儀部賀朝卿升山西少參別時見其唇鼻青黑且時搔背問其故曰有小瘡耳與視之果疽也此脾胃敗壞為不治之症薛素與善悲其途次不便殯殮遂托其僚友張東沙輩強留之勉與大補但出紫血虛極也或謂毒熾不能為膿乃服攻毒藥一鍾以致嘔逆脈脫果卒於南都京兆柴黼庵仲夏背發色黯微腫發熱煩躁痰涎自出小腹陰實手足逆冷右關浮澀兩尺微細曰此虛寒之症也王太僕云大熱而不熱是無火也決不能起懇求治之用大溫補藥一帖流涎雖止患處不起終不能效憲副屠九峰孟春患此色黯漫腫作渴便數尺脈洪數此腎水乾涸當歿於火旺之際不信更用苦寒之藥復傷元氣以促其歿一男子不慎房勞背胛腫高三寸許闊經尺余自汗盜汗內熱發熱口乾飲湯脈浮大按之弱澀此陰虛氣節為患用十全大補加五味麥冬山萸山藥四劑諸症悉退後乃別用流氣飲一帖虛症悉具腫硬如石仍以前藥六劑始得愈一儒者背腫一塊按之則軟肉色如故飲食如常勞則吐痰體倦此脾氣虛而痰滯用補中益氣加茯苓半夏少加羌活外用陰陽散以薑汁調搽而消後因勞頭暈作嘔仍以前藥去羌活加生薑蔓荊子而愈節推王器之背患疽瘡頭如黍焮痛背重脈沉而實此毒在內服黃連內疏湯二劑少退更與仙方活命飲而愈舉人劉華甫焮腫作痛脈浮而數此毒蓄於經絡用內托復煎散二劑而焮腫作痛用仙方活命飲四劑而腫痛止更用托裡藥而愈一儒者患背疽腫焮痛甚此熱毒蘊結而熾盛用隔蒜灸而痛止服仙方活命飲而腫消更與托裡藥而潰愈一男子患背疽腐肉雖潰而新肉不生此毒氣解而脾胃之氣虛也用六君子加芎歸五味黃耆漸愈用十全大補湯全愈一男子背患疽腫痛赤暈尺余背如負石其勢當峻攻其脈又不宜遂用針砭赤處出紫血碗許腫痛頓退更用神功散及仙方活命飲二劑瘡口及砭處出血水而消一男子背患疽肉腐膿清肌肉不生此邪去而氣血俱虛也用十全大補湯月餘而斂通府張廷儀背患疽作嘔焮痛大便秘結口乾作渴此內蘊熱毒用竹葉石膏湯二劑諸症頓退用托裡消毒散四畔腫消用仙方活命飲瘡亦尋愈一男子背瘡潰而瘀血不散此陽氣虛弱也用參耆歸術峻補更以桑枝灸又用托裡散加肉桂瘡口自斂補接陽氣之法也一男子背瘡漫腫微痛食少體倦此症屬形病俱虛法當補元氣為主彼不信乃用攻毒之劑中央肉黯五寸許惡症悉具復求治曰此胃氣虛寒而變症作矣當急溫補脾胃則惡症自退黯肉自生仍不信乃割死肉祛惡症遂至不起水部曹文兆背胛患之半月餘瘡頭如粟且多內痛如刺其脈歇止此元氣虛而疽蓄於內非灸不可遂灼二三十壯飲以六君加藿香服數劑瘡勢漸退內痛頓去胃脈漸至但瘡色紫瘀肉不潰此陽氣虛也燃桑枝灸患處以解散其毒補接陽氣仍以前藥加參耆歸桂色赤膿稠瘀肉漸腐兩月而愈夫邪氣沉伏真氣怯弱不能起發須灸而兼大補若投以常藥待其自潰鮮有不誤者黃汝耘患發背用生肌散太早益潰大便泄瀉其脈微緩此脾胃虛也用二神丸以止其瀉次用大補藥以固其本更用豬蹄湯洗患處用黃耆末以塗其外喜其初起曾用艾灸毒不內攻兩月而愈許鴻臚發背十餘日腫硬木悶肉色不變脈沉而實此毒在內先以黃連內疏湯更以消毒托裡藥其毒始發奈欲速愈急用生肌藥患處如負石身如火焮遂致不起李氏云龍游有患背疽者大潰五臟僅隔膜耳自謂必死用鯽魚去腸實以羯羊糞烘焦為末干糝之瘡口自收此出洪氏方屢用有效故附於此復候膿少欲生肌肉時用之耳陳自明外科精要江陰舉人陳鳴岐寓京患背疽用大補之劑而愈翌日欲回先期設席作謝對談如常是晚得家信大拂其意惱怒發熱作渴食梨子少許至夜半連瀉數次早促薛視脈已脫矣竟至不起夫梨者利也疏利下行之物凡脾胃虛寒產婦金瘡者皆當忌之所云大補之劑必參耆也大瘡之後陰氣大傷不聞有善後之圖以致卒然致變乃歸咎於食梨何其善於諉罪耶琇按其人瘍初愈元氣未復困怒而動厥陽之火致發熱作渴其肝木之蹶張不待言矣木盛剋土非嘔即瀉少許梨子何遽云爾陳自明治一男子患發背瘡頭如粟重如負石以神仙太乙丹內服外塗後去三四次每去肛門如炙不日而瘳一婦人患此症腫痛發熱睡語脈大用清心湯一劑而安以金銀花甘草天花粉當歸栝蔞黃耆數劑漸潰更以托裡藥而愈方最平穩一男子患此症已愈惟一眼翻出胬肉如血即名翻花瘡三月不愈乃傷風寒也以生豬脂調藜蘆末塗之即愈亦有胬出五寸許者尤宜用此藥也烏梅塗之亦效但緩硫磺亦可一男子背患毒焮痛飲冷發熱多汗便秘譫語以破棺丹二丸而寧以金銀花散四劑膿成開之更用托裡藥而愈一婦人患此症膿成脹痛不安針之投托里消毒藥即愈大抵發背之症雖發熱瘀痛形勢高大煩渴不寧脈若有力飲食頗進可保無虞其膿一潰諸症悉退多有因膿不得外泄以致疼痛若用敗毒寒涼攻之反致誤事若有膿即針之膿一出苦楚即止膿未成而熱毒作痛者用解毒之藥亦有腐潰尺余者若無惡症投以大補之劑肉最易生亦無所妨惟忌腫不高色不赤不焮痛脈無力不飲食腫不潰腐不爛膿水清或多而不止肌肉不生屬元氣虛也皆難治宜峻補之其或膿血既泄腫痛尤甚膿水腥臭煩躁時嗽腹痛渴甚瀉利無度小便如淋乃惡症也皆不治徐靈胎曰峻補必兼托毒亦不全在參附一弱婦患此症外皮雖腐內膿不潰脹痛煩熱不安謂宜急開之膿一出毒即解痛即止諸症自退待其自潰不惟疼痛潰爛愈深彼不從待將旬日膿尚未出人已痛疲矣雖針之終不能收斂竟至不起一男子患此症潰而瘀肉不腐欲取之更以峻補一婦素弱未成膿大痛發熱謂須隔蒜灸以拔其毒令自消皆不從俱致不救常治不問日期陰陽腫痛或不痛或痛甚但不潰者即與灸之隨手取消勢未定者先用箍藥圍之若用烏金膏或援生膏貼患處數點尤好若頭痛拘急乃表症先服人參敗毒散一二帖如焮痛發熱脈數者用金銀花散或槐花酒神效托裡散如疼痛腫硬脈實者以清涼飲仙方活命飲苦參丸腫硬木悶疼痛發熱煩躁飲冷便秘脈沉實者內疏黃連湯或清涼飲大便已利欲其作膿用仙方活命飲托裡散蠟礬丸外用神異膏如飲食少思或不甘美用六君子湯加藿香連進三五劑更用雄黃解毒散洗患處每日用烏金膏塗瘡口處俟有瘡口即用紙作燃蘸烏金膏紝入瘡內若有膿為脂膜間隔不出或作脹痛者宜用針引之腐肉堵塞者去之若瘀肉腐動用豬蹄湯洗如膿稠或痛飲食如常瘀肉自腐用消毒與托裡藥相兼服之仍用前二膏塗貼若腐肉已離好肉宜速去之如膿不稠不稀微有疼痛飲食不甘瘀肉腐遲更用桑柴灸之亦用托裡藥若瘀肉不腐或膿清稀不焮痛者即服大補之劑亦用桑木灸之以補接陽氣解散郁毒常觀患疽稍重未成膿者不用蒜灸之法及毒熟不開或待腐肉自去多致不救大抵氣血壯實或毒少輕者可假藥力或自腐潰怯弱之人熱毒中隔內外不通不行針灸藥無全功矣然此症若膿已成宜急開之否則重者潰通臟腑腐爛筋骨輕者延潰良肉難於收功因而不斂者多矣一男子年逾五十患此症已五日焮腫大痛赤暈尺余重如負石勢熾甚當峻攻察其脈又不宜遂先砭赤處出黑血碗許腫痛頓退背重頓去更敷神功散及服仙方活命飲二劑瘡口及砭處出血水而消大抵瘡毒勢甚若用攻劑怯弱之人必損元氣因而變症者眾矣一婦人患此症半月餘尚不起發不作膿痛甚脈弱隔蒜灸二十餘壯而止更服托裡藥漸潰膿清而瘀肉不腐以大補藥及桑柴灸之漸腐取之尋愈常治一日至四五日未成膿而痛者灸之不痛不痛者灸之至痛若灸而不痛或麻木者明灸之毒氣自然隨火而散腫硬不作膿焮痛或不痛或微痛瘡頭如黍者灸之尤效亦有數日色尚未赤腫尚不起痛不甚膿不作者尤宜多灸勿拘日期更服甘溫托裡藥切忌寒涼之劑或瘀內不腐亦用桑木灸之若脈數發熱而痛者發於陽也可治脈不數不發痛者發於陰也難治不痛最惡不可視為常疾此症不可不痛不可大痛煩悶者不治大抵發背腦疽大疔懸癰脫疽腳發之類皆由膏粱厚味盡力房勞七情六慾或丹石補藥精虛氣鬱所致非獨因榮衛凝滯而生也必灸之以拔其毒更辨其因及察邪在臟腑之異虛實之殊而治庶無誤也一男子患此症初生如粟悶痛煩渴便秘脈數實此毒在臟也謂宜急疏去之以絕其源使毒不致外侵彼以為小恙乃服尋常之藥後大潰而歿一老婦患此症初生三日頭皆如粟腫硬木悶煩躁至六日其頭甚多脈大按之沉細為隔蒜灸及托裡漸起發尚不潰又數劑內外雖腐惟筋所隔膿不得出致脹痛不安謂須開之彼不從後雖自穿毒已攻深矣亦歿大抵發背之患其名雖多惟陰陽二症為要若發一頭或二頭焮赤腫高頭起疼痛發熱為癰屬陽易治若初起一頭如黍不腫不赤悶痛煩躁大渴便秘睡語咬牙四五日間其頭不計數其瘡口各含一粟形似蓮蓬故命蓮蓬髮積日不潰按之流血至八九日或數日其頭成片所含之物俱出通結一衣揭去又結其口共爛為一瘡其膿內攻色紫黯為疽屬陰難治脈洪滑者尚可沉細尤難如此惡症惟隔蒜灸及塗烏金膏有效凡人背近脊並脾皮里有筋一層患此處者外皮雖破其筋難潰以致內膿不出令人脹痛苦楚氣血轉虛變症百出若待自潰多致不救必須開之兼以托裡常治此症以利刀剪之尚不能去似此堅物待其自潰不亦反傷非血氣壯實者未見其能自潰也一男子年逾五十患此色紫腫痛外皮將潰寐食不安神思甚疲用桑柴灸患處出黑血即鼾睡覺而諸症如失服仙方活命飲二劑又灸一次膿血皆出更二劑腫痛大退又服托裡消毒散數劑而斂夫瘡勢熾甚宜用峻劑攻之但年老血氣衰弱況又發在肌表若專於攻毒則胃氣先損反致誤事一婦人患此症發熱作痛專服降火敗毒藥潰後尤甚煩躁時嗽小便如淋皆惡症辭不治果死大抵瘡瘍之症五善之中見一二善症可治七惡之內見一二惡症者難治若虛中見惡症者不救實中無惡症者自愈此症雖云屬火未有不由陰虛而致者故經云督脈經虛從腦而出膀胱經虛從背而出豈可專泥於火趙太守患此腫堅不澤瘡頭如粟脈洪大按之則澀經云骨髓不枯臟腑不敗者可治然腫硬色夭堅如牛領之皮脈更澀此精氣已絕矣不治亦死圖經云薜荔治背癰頃年寓宜興懸張鎮有一老舉人教村學年七十餘忽一日患發背村中無醫藥急取薜荔研爛絞汁和蜜飲數升以其渣敷瘡上後以他藥敷貼遂愈醫者云其本蓋得薜荔之力乃知圖經所載不妄本草郭戶為予言鄉里有善治發背癰疽者於瘡上灸之多至二三百壯無有不愈但作艾炷小則人人不畏灸灸多則效矣蓋得此法也然亦不必泥此近有一醫以治外科得名有人發背瘡大如碗有數孔醫亦無藥可治只此艾遍敷在瘡上灸之久而方痛以瘡上皆死肉故不覺疼也旋以藥調治之愈蓋出於意表也百乙方治發背初作取水蛭置腫上飲血腹脹自落別換新者脹蛭以新水養之即活矣吳內翰備急方云其侄祖仁一日忽覺背瘡赤腫如碗大急用此治之至晚遂安百乙方昔嚴州一通判忘其名母病發背祈禱備至夜夢呂真人服青衣告之曰公極孝故來相告以方更遲一日不可療矣通判公急市藥治之即愈用栝蔞五個取子細研乳香五塊如棗子大亦細研加白沙蜜一斤同煎成膏每服二三錢溫酒化下大治發背諸惡瘡日進二服無不立效楊王得此方家人凡百瘡毒依此治之立效遂合以施人無不驗者漏瘡惡核並皆治之此即鄭府朱保義所說神妙方是也醫說續編立齋治張錦衣年逾四十患發背心脈洪數勢危劇經云心脈洪數乃心火熾甚諸症癢瘡瘍皆屬心火心主血心氣滯則血不行故生癰也騎竹馬灸穴是心脈所由之地急灸之以瀉心火隔蒜灸以拔其毒再以托裡消毒果愈鄭大理伯興髀骨患疽背左右各一竟背重如負石兩臂如墜瘡頭皆大如豆許其隱於皮膚如粟者不計其數瘡色黯而不起已七十口乾作渴診之脾胃脈甚虛彼云昨日所進粥食今尚不消作酸意此難治之症因與素善者籌其治法以隔蒜灸二十餘壯其背與臂動覺少便隨用六君子湯加薑汁炒山梔及吳茱萸連服數劑吞酸遂止飲食少進但口乾瘡仍不起色亦不赤亦無膿復如法灸二十餘壯背臂頓便瘡遂發其時適秋又投大補之劑及生脈散以代茶飲留都鄭中翰仲夏患發背已半月瘡頭十餘枚皆如粟許漫腫堅硬根如大盤背重如負石即隔蒜灸五十餘壯其背頓輕彼因輕愈不守禁忌三日後大作瘡不起發喜得痛用活命散四劑勢少退用香砂六君子湯四劑飲食少進彼恃知醫自用敗毒藥數劑飲食益少口流涎沫若不自知此脾虛之甚也每用托裡藥內參耆各三錢彼密自揀去大半後雖用大補藥加薑桂亦不應遂令其子以參耆各一斤歸術各半斤乾薑桂附各一兩煎膏一罐三日飲盡涎頓止腐頓潰食頓進再用托裡健脾藥腐肉自脫而愈徐靈胎曰大症潰後精血大虧自宜溫補但瘡口未全愈必有兼外科之症或膿清不厚或寒熱未止或火毒未清或胃口未和或新肉未生或毒痰內積種種病症若一味峻補與外症不相照顧則餘毒未清反能增病必須審度其虛實或全屬虛寒然後擇取對症之藥幾味成方如不問外症之有無而一概以內科溫補之全方治之則其中必有不對症之藥反能有害不但不知內科並外科之理亦不知也薛立齋之用內科方盡如此不值一笑也張侍御背患瘡三枚皆如粟彼以為小毒服清熱化痰之藥外用涼藥敷貼數日尚不起色黯不焮腹中氣不得出入其勢甚可畏連用活命飲二劑氣雖利膿清稀瘡不起欲用補劑彼泥於素有痰火不受參術之補因其固執陽以敗毒之劑與視之而陰以參耆歸術各五錢薑桂各二錢服二劑背覺熱腫起腐肉得潰方信余言始明用大補藥乃愈南都聘士葉公玉表兄聶姓者患發背時六月腐肉已去瘡口尺余色赤而焮發熱不食欲嘔不嘔服十宣散等藥自謂不起請決之其脈輕診則浮而數重診則弱而澀此潰後之正脈然瘡口開張血氣虛也欲嘔而不嘔脾胃虛也色赤焮腫虛火之象也尚可治遂與十全大補湯加酒炒知柏五味麥冬及飲童便飲食頓進肌肉頓生服至八劑瘡口收如粟許又惑於人言又服消毒藥二劑以為消餘毒反發熱昏憒急進前藥又二十餘劑乃愈後兩月因作善事一晝夜不睡至勞發熱似睡不睡與前藥二劑愈加發熱飲食不進惟飲熱湯後以前藥加附子一錢二劑愈五味能收斂毒氣不可輕用石武選廉伯患發背內服防風通聖散外敷涼藥汗出不止飲食不進且不寐瘡盈尺色黯而堅硬按之不痛氣息奄奄此陽氣已脫脈息如無急隔蒜灸時許背頓輕四圍高不知痛中央肉六寸許一塊已死服香砂六君子湯一劑翌日復灸一次痛處死肉得解令砭去薛歸後又為他醫所惑未砭其血復凝又敷辛溫活血藥翌日依言砭之出黑血二盞許背強頓去以前藥加薑桂服一鍾即鼾睡覺來肢體少健但飲食仍不思吞酸仍有瘡仍不痛彼以為陰毒乃如此赤曰此血氣虛極寒邪淫於內無陽營於患處故肌肉死也非陰毒若陽氣一回胃氣即省死肉即潰可保無虞矣以前藥二劑各加薑桂附子二錢服之略進米飲精神復舊患處覺熱脈略有力此陽氣略回矣是日他醫謂瘡瘍屬火症況今暑令乃敷芙蓉根等涼藥即進粥二碗服消毒藥死肉即潰意芙蓉乃寒涼之藥與脾胃何益飲食即時而進消毒乃卒散之劑與陽氣何補死肉即時而潰此蓋前桂附之功至而脾胃之氣省故飲食陽氣旺死肉腐也苟虛寒之人若內無辛熱回陽之藥輒用寒涼攻毒之劑豈可得而生耶若以為火令屬陽之症內有熱而用辛溫大補之劑豈不致死而反生耶殊不知此乃舍時從症之治法也吞酸乃伏邪未出之故一男子患發背膿始潰腫未消已十七日脈微而靜曰膿毒未盡脈先弱此元氣虛宜補之否則後必生變彼惑於人言乃服敗毒藥腐肉雖潰瘡口不完忽腹中似痛後去白垢肛門裡急復求治曰此裡虛然非痢非毒當溫補脾胃為善因諸瘍醫皆以為毒未盡仍服敗毒藥而死賀少參朝儀背胛患疽大如豆粒根畔木悶不腫肉色如常曰氣虛毒甚之症雖用大補劑亦不能收斂先用活命飲二劑背強少和又二劑疽少赤用大補劑瘡出黑血杯許繼有鮮血微有清膿曰可見氣血虛極矣他醫以為屬氣血有餘之症密用攻毒一鍾即嘔逆腹內陰冷而死少司寇周玉岩背患疽在胛已四日瘡頭如粟重如負石堅硬不起自以為小恙外敷涼藥內服連翹消毒散去後四次形體倦怠自汗盜汗口乾無寐曰瘡不宜硬色不宜黯周曰初起時赤而軟自煎二藥以致如此曰凡瘡外如麻內如瓜毒結於內非小患也脈輕診如數按之則微未潰脈先弱主後難斂因與卿雅不能辭遂隔蒜灸二十餘壯乃知痛又十餘壯背覺少和服六君子湯加黃耆藿香當歸麻黃根浮麥二劑渴止汗少斂瘡色仍黯堅硬又服辛溫活血之藥瘡起至渴止汗斂所結死血得散良久汗復出口復干又複數劑外皮雖潰清膿尚未潰通於內膿欲走別處彼用藥圍之曰裡虛而膿不能潰於外圍藥逼毒入內至十二日脈浮按之如無再用前藥一劑加薑桂服之即安寐又二日脈忽脫再於前藥加附子七分服二劑乃曰背今日始屬吾也形體亦健頗有生意因先日有言難以收斂屢更醫雜用清熱解毒及敷涼藥遂至裡虛元氣下陷去後如痢用治痢消毒藥而死初起不宜用涼藥以遏抑邪氣令不得出今犯此禁故其病益加明是陰血大虧津液耗竭乃不救其陰專補其陽以致生變尚不悟而巧為卸過如此為醫安有長進之日雄按凡遇重證醫者不知竭力圖維輒出危言以致病家張皇屢屢更醫而竟無成功者多矣此症隔蒜艾灸用六君子湯以救外敷內服苦寒之失至過熱之品圍藥之法均宜詳參姜舉人患發背十日正腐潰作渴喜熱湯飲此中氣虛不能充津液而口乾宜預補之否則不能收斂後瘡口故不收猶以毒為末盡用敗毒藥兩月瘡口不完清利腹痛又服清涼之藥而死王序班患發背元氣虛弱用托裡藥而始起用大補藥而始潰彼惑他議敷涼藥致腹內不和裡急後重去後如痢大孔作痛曰此裡虛非痢仍用敗毒治痢藥而死一男子四十餘歲患發背未潰即作渴脈數腫高色紫面赤小便如膏以加減八味丸料加酒炒知柏為丸每日空心並食前以童便送下百丸用八珍湯加五味麥冬黃耆酒炒知母赤小豆食遠煎服逐日又以童便代茶飲之渴止瘡潰而愈吾治得生者此人耳五味不可妄用汪夫人患發背用敷藥冷眉胸內欲嘔急令洗去用托裡藥尋愈又劉太宰紫岩太夫人患發背元氣不足用托裡藥而起王安人發背正潰時欲速效俱敷草藥即日而死劉大尹年將五十陸路赴京兼喪其妻發背盈尺中六寸許不痛發熱口乾惡寒自汗少食大便不禁且氣促脈浮大按之空虛用補中益氣湯加半夏茯苓四劑又隔蒜灸之彼云背重已去形氣少健但吞酸前日所進飲食覺仍在腹又以前藥加薑桂服二帖飲食少進吞酸已止始得睡瘡且不痛不潰疑為陰症曰此陽氣虛不能榮於患處故所患肉死而不痛不潰也若胃氣回飲食進死肉即潰矣仍服前藥六劑飲食漸進患處漸潰脈有力曰此陽氣回矣後惑於他醫云必服飛龍奪命丹出汗為善遂進一服汗大出三日不止復請治曰汗多亡陽無能為也強曰諸書云汗之則瘡已豈遂為患後果死東垣曰瘡瘍因風熱鬱於下其人多怒其瘡色赤腫高結硬而痛左關脈洪緩而強是邪客於血脈之上皮膚之間故發其汗而通其榮衛則邪氣去矣謙甫治瘡瘍冬月脈浮緊按之洪緩乃寒覆皮毛郁遏經絡熱不得升聚而赤腫蓋冬月乃因寒氣收斂皮膚緻密腠理汗不得出而設也況發汗乃陰盛陽虛邪不能自出必得陽氣泄汗乃出是助陽退陰之意也且前症未潰其氣血既虛潰後氣血愈虛凡瘡雖宜汗然元氣虛者不宜況所見之症俱屬不足豈可汗耶口乾者渴之漸也何以用半夏茯苓晉都機房紀姓者背瘡胃氣虛用溫補藥而飲食進大補藥而瘡腐愈後患腿痛用養血化痰之劑少止彼嫌功緩他醫以為濕熱服麻黃左經湯一劑汗出不止曰必發痙而死已而果然王德之患發背脈浮數按之則澀大便五六日不行腹不加脹曰邪在表不在裡但因氣血虛飲食少故大便不行非熱結也宜生氣血為主彼泥積毒在內用大黃之藥下之遂連瀉三四次更加發熱來日又服一劑瀉遂不止飲食不化呃逆不絕手足皆冷診之脈已脫辭不治其子曰瀉之能為害乎曰服利藥而利不止者死不當瀉而瀉令人開腸洞泄不禁者死下多亡陰者死曰瘡瘍乃積毒在臟若不驅逐其毒何以得解曰瘡瘍雖積毒在臟腑治法當先助胃氣使根本堅固參以行經活血時宜之藥非專用大黃也今病在表而反以峻利之劑重奪其陰可乎哉故曰表病里和而反下之則中氣虛表邪乘虛而入由是變症百出雖云脈浮數邪在表屬外因當用內托復煎散其中黃芩蒼朮亦不敢用脈沉實邪在內屬內因當用內疏黃連湯其中大黃檳榔亦不敢用況浮數澀三脈皆主氣血俱虛邪既在表而反用峻利之劑重瀉其里誅伐無故不死何俟一縣尹背瘡竟背腐潰色黯重若負石危甚飲食頗進用紅桃散色漸赤負漸輕再用而肌生更用托裡藥而愈蓋此大毒症非峻藥莫能治內用砒故用攻毒有效平氏室患發背以托裡消毒藥二十餘劑而潰因怒頓吐血五六碗許氣弱脈細此氣血虛極也遂令服獨參膏斤許稍緩更以參耆歸朮陳皮炙草三十餘劑瘡口漸合設投以犀角地黃湯沉寒之藥鮮有不誤徐符卿年逾四十患發背五日不起肉色不變脈弱少食大便不實但以疽未潰脈先弱難於收斂用托裡消毒二劑方起發彼惑一嫗言貼膏藥服攻毒劑反甚背如負石復請治遂以隔蒜灸三十餘壯云背不覺重但癢痛未知更以托裡藥知癢痛膿清仍以前藥倍加參耆佐以薑桂膿稍稠又為人惑外用豬腰子貼抽膿血內服硝黃劑遂流血五六碗許連瀉十行腹內如冰飲食不進不得已連診之脈遽脫已不可為矣蓋其症屬大虛不足之甚雖一於溫補猶恐不救況用攻伐之劑不死何俟顧浩室年逾四十患發背治以托裡藥而潰忽嘔而瘡痛胃脈弦緊彼以為餘毒內攻東垣云嘔吐無時手足厥冷臟腑之虛也丹溪云潰後發嘔不食者濕氣侵於內也又云膿出而反痛者虛也今胃脈弦緊木乘土位是虛明矣欲以六君子湯加酒芍砂仁藿香治之彼自服護心散嘔愈甚仍用前藥更以補氣血藥兩月而愈大抵濕氣內侵或感穢氣而作嘔必喜溫而脈弱熱毒內攻而作嘔者必喜涼而脈數必須辨認明白鄭揮使年逾五十患發背形症俱虛用托裡藥而潰但有腐肉當去彼懼不肯延至旬日則好肉皆敗矣雖投大劑毒甚竟不救古人謂壞肉惡於狼虎毒於蜂螫緩去之則戕賊性命信哉張宜人年逾六十患發背三日肉色不變頭如粟許肩背加重寒熱飲冷脈洪數陳良甫云外如麻里如瓜齊氏云憎寒壯熱所患必深又曰肉色不變發於內也以人參敗毒散二劑乃隔蒜灸五十餘壯毒始發背始輕再用托裡藥漸潰氣血虛甚而作渴參耆歸地等藥渴亦止彼欲速自用草藥罨患處毒氣復入遂不救嘗見老弱者患此瘡頭不起或堅如牛領之皮多不待潰而死有潰後氣血不能培養者亦死凡瘡初潰毒正發越宜用膏藥吸之參耆等藥托之若反以藥遏之使毒氣內攻者必不救王太守宜人患發背膿熟不開昏悶不食此毒入內也斷不治強之針膿碗許稍蘇須臾竟亡大抵血氣壯實膿自湧出老弱之人血氣枯槁必須迎而奪之順而取之若毒結四肢砭刺少緩腐潰深大亦難收斂痛結於頰項胸腹緊要之地不問壯弱急宜針刺否則難治郭職方名璉患背瘡潰陷色紫舌卷謂下陷色紫主陽氣脫舌卷囊縮肝氣絕遂辭之經曰舌卷囊縮此筋先死庚日篤辛日死果至立秋日而歿姚應鳳治撫軍喻思恂駐師溫州拒海賊劉香受降有日毒發背間劇甚應鳳至刲腐肉二大器洞見五臟隨敷以丹藥越二日癰平開轅門坐受降撫喻喜深德之仁和縣誌王洪緒治木瀆譚姓婦患背瘡如碗初起色白近已轉紅痛甚時值三伏與陽和湯或曰暑天何用麻桂熱劑曰此陰症也又云患色轉紅陰已回陽乃立令煎服不一時痛止連進四服症減其七餘三分有膿不痛而潰五日收功錢國賓治湖州三官廟僧大乘發背長二尺闊八寸深寸許中間如蜂窩二百餘頭流膿痛極欲死乃半身發也此僧素喜爆炙多動肝氣其脈浮洪可救以新槐子一合生白礬一錢盛錫壺內沖滾水二三碗再以壺燉水內煮十數滾令味盡出陸續飲之至五七壺痛止外用綠膏藥取松香一斤五兩燒酒五斤微火煮乾為度傾冷水內以手捻成松子百次去水酒濕氣用全蠍二十一個蜈蚣二十條真蟾酥五錢乳香沒藥各三錢銅綠八錢各另研方以松香化開入香油少許試老嫩成膏待松香冷定方入細藥攪勻盛瓷罐內隔水燉攤一日一換每次下腐肉一層生肌如石榴子二十日收口此膏妙在一長齊平不比別膏自周圍長至豆大難收口也凡冤業大毒一切通治內外治法俱有巧思治發背膏藥方滴乳香箬包燒紅磚壓去油四兩淨沒藥四兩制同上白色兒茶上好銀硃鮮紅血竭杭州定粉上好黃丹各四兩上好銅綠三錢以上俱各碾至無渣為度篩極細末和勻瓷瓶密貯臨用照患之大小用夾連四油紙一塊以針多刺小孔每張以藥末五錢麻油調攤紙上再用油紙一塊蓋上周圍用線將二紙合縫一處貼患上即止痛化腐生新過三日將膏揭開煎蔥湯將患洗淨軟絹拭乾將膏藥翻過用針照前刺小孔貼之無火之人內服十全大補湯有火者減去肉桂薑棗兼以飲食滋補無不取效治發背初起方遠志肉甘草汁煮去骨五錢甘草一錢五分鮮甘菊花葉一兩貝母三錢鮮忍冬藤五錢紫花地丁五錢連翹一錢白芨三錢又托裡敗毒散綿黃耆鹽水炒三錢或五錢或八錢一兩水炙甘草節二錢可加至四五錢赤芍二錢金銀花三錢茜草江西出細如燈心者三錢何首烏五錢白殭蠶炙研六分白芨二錢五分皂角刺一錢貝母二錢天花粉三錢穿山甲土炒研一錢鼠黏子炒研一錢蟬蛻去翼足一錢先用夏枯草五兩河水五大碗煎三碗入前藥同煎至一碗不拘時服陰症去後五味加人參三錢麥冬五錢又潰後服方人參三錢麥冬五錢綿黃耆蜜炒五錢或一兩炙甘草二錢五味子蜜拌蒸一錢白芍酒炒三錢金銀花三錢山藥炒三錢水煎服潰瘍忌術腫瘍忌當歸廣筆記肺癰肺痿薛立齋治一婦人素血虛發熱咳嗽服痰火之劑後吐膿血面赤脈數其熱甚危此膿成而氣血虛也用八珍湯補元氣桔梗湯治之而愈一婦人感冒風寒或用發表之劑反咳嗽喘急飲食少思胸膈不利大便不通右寸關浮數欲用疏通之劑薛曰此因脾土虧損不能生肺金若更利之復耗津液必患肺癰矣不信仍利之虛症悉至後果吐膿乃朝用補中益氣湯夕用桔梗湯各數劑吐膿漸止又朝仍用前湯夕用十全大補湯各五十劑喜其善調理獲愈一婦人咳嗽吐痰胸膈作痛右寸關浮滑項下牽強此脾胃積熱之痰非癰患也以二陳山梔白朮桔梗治之而安一婦人素血虛內熱時咳甲辰孟冬兩尺浮洪以脾不健請治曰防患肺症丙午孟春果咳嗽左右寸脈洪數肺癰也膿已成右寸脈仍洪數乃心火克肺金夏令可憂用壯水健脾之劑稍愈彼遽自忽不自調攝果歿於夏令喻嘉言治施眉蒼肺痿喘嗽吐清痰肢體軟痿不能舉動脈來虛數以蛤蚧二十枚酒浸酥炙人參黑參各十兩蜜丸時時噙化不終劑而痊出張氏醫通張路玉治陸去非肺痿聲颯吐痰午後發熱自汗左脈弦細右脈虛濡平昔勞心耽色所致先與生脈散合保元湯次與異功散加黃耆並薑棗與都氣丸晨夕間進調補半月熱除痰止月餘方得聲清孫起伯肺脹服耗氣藥過多脈浮大而重按豁然飲食不入幸得溺清便堅金土未憊與局方七氣丸每劑用人參三錢肉桂半夏曲炙甘草各一錢生薑四片四劑霍然蓋肺脹實症居多此脈虛大當不以尋常論也一尼患肺脹喘鳴肩息服下氣止嗽藥不應漸至胸腹脹滿脈得氣口弦細而澀此必勞力氣上誤飲冷水傷肺肺氣不能收斂所致也遂與越婢湯減麻黃加細辛葶藶大瀉肺氣而安一酒客嚴冬醉臥渴飲冷茶肺脹喘咳脈得氣口沉緊搏指與小青龍去白芍加葶藶半夏一劑而痊則知肺脹喘滿當以葶藶為嚮導也非實症未可輕投孫文垣治初陽侄婦先時咳嗽諸治無功嗽急則吐用碧玉散二錢白湯調下立止半年後咳嗽胸背隱隱疼痛常內熱吐出桃紅膿甚多且腥穢右脅並乳脹痛診之脈洪數大便燥肌骨瘦立此肺癰症也用貝母茜根白芍各一錢知母麥冬山梔紫菀各八分桑皮當歸丹皮杏仁各七分苡仁一錢五分甘草葶藶各五分服之甚安但稍停即發或云肺竅中痰積瘀血尚多未能即去宜緩圖之候膿盡當愈孫謂丹溪雖有此言亦不可執設不以藥消化之必俟其自已恐歲月深而有他變且中年之人何能當此莫若清熱潤肺消痰化瘀久服或早愈也或又謂久嗽傷肺宜補每補必增熱加痛加咳而膿轉多仍依法治之二年良愈喻嘉言治陸令儀母平日持齋腸胃素槁天癸已絕復淋瀝不止治之久痊值秋月燥金太過濕蟲不生人多病咳而血虛津槁之軀受傷獨猛胸脅緊張上氣喘急臥寐不寧咳動則大痛痰中帶血而腥食不易入聲不易出寒熱交作申酉二時燥金用事諸苦倍增脈時大時小時牢伏時弦緊服清肺藥無進退告以肺癰將成高年難任以葶藶大棗瀉肺湯先通肺氣之壅即覺氣稍平食少入痰稍易出身稍可側大有生機喻曰未也因見來勢太急不得已取快一時暫開者易至復閉迨復閉則前法不可再用矣今乘其暫開多方以圖必在六十日後交立冬節方是愈期蓋身中之燥與時令之燥膠結不解必俟燥金退氣肺金乃寧後六十日間屢危屢安大率皆用活法斡旋緣病不可補而脾虛又不能生肺肺燥喜潤而脾滯又難於運食今日脾虛不思飲食則於清肺中少加參術以補脾明日肺燥熱盛咳嗽則於清肺中少加阿膠以潤燥日復一日扶至立冬之午刻病者忽自云內中光景大覺清爽可得生矣奇哉天時之燥去而肺金之燥遂下傳大腸五六日不一大便略一潤腸旋即解散正以客邪易去耳至小雪節康健加餐倍於曩昔蓋胃中空虛已久勢必復其容受之常方為全愈也薛立齋治一男子神勞冬月患咳嗽服解毒之藥自以為便曰此因肺氣虛弱腠理不密而外邪所感也當急補其母是治本也始服六君子湯內去參術反加紫蘇枳殼之類以致元氣亦虛生肺癰而歿一武職因飲食起居失宜咳嗽吐痰用化痰止嗽之藥時仲夏左尺洪數而無力胸滿面赤吐痰腥臭自汗曰腎虛水泛為痰而反重亡津液得非肺癰乎不信仍服前藥翌日吐膿脈數右寸為甚用桔梗湯一劑脈數與膿頓減又二劑將愈佐以六味而痊一男子咳嗽喘急發熱煩躁面赤咽痛脈洪大用黃連解毒湯二劑少退更以梔子湯四劑而安此肺癰將成未成之候薛立齋治一男子患肺痿咳嗽喘急吐痰腥臭胸滿咽乾脈洪數用人參平肺散六劑及飲童便諸症悉退更以紫菀茸湯而愈童便雖云治虛火常治瘡瘍焮腫疼痛發熱作渴及肺痿肺癰發熱口渴者尤效一僕年逾三十嗽久不愈病久故可用澀氣壅不利睡臥不安咯吐膿血甚覺可畏其主已棄之矣與寧肺散一服少愈又服而止大半乃以寧肺散湯數劑而痊所以有是病必用是藥若以前散性澀而不用何以得愈上舍毛體仁素陰虛春初咳嗽胸中隱痛腎脈洪數肺脈數而時不見曰內當結癰先用六味地黃丸料一劑服之翌日來謂曰昨得良劑嗽愈六七務求一方到監調理曰陰虛火炎患癰之症第因元氣虛弱未能發出因其易忽薛不能治乃別用降火化痰等劑愈甚月餘復請診之脈洪滑而數曰膿已成矣當請常治之者同論針之且免內潰之患仍不決又月餘請視他醫已先開瘡孔偏上兜膿不出仍內潰脈愈洪大曰脈洪滑而數其舌青黯內臟已壞無能為也後果然一男子咳嗽兩脅脹滿咽乾口燥咳唾腥臭以桔梗湯四劑而唾膿以排膿散數服而止乃以補陰排膿之劑而瘳一男子咳而膿不止脈不退諸藥不應甚危用柘黃丸一服少愈再服即退數服而痊柘黃一兩為末百齒霜即梳垢二錢用糊為丸如梧桐子大每服三五丸米飲下柘黃乃柘樹所生者其色黃狀似靈芝江南最多北方鮮有一婦人吐膿五心煩熱口渴胸悶以四順散三劑少止以排膿散數服而安排膿散黃耆白芷五味人參四順散貝母紫菀桔梗各一錢半夏甘草各七分作一劑水煎食遠服一男子因勞咳嗽不止項強而痛脈微緊而數此肺癰也尚未成膿欲用托裡益氣藥彼不信仍服發散藥致血氣愈虛吐膿不止竟不救經曰肺內主氣外司皮毛若肺氣虛則腠理不密皮毛不澤肺受傷則皮毛錯縱故患癰痿腸癰者必致皮毛如此以其氣不榮養而然也亦有服表藥見邪不解而仍用發表殊不知邪不解者非邪不能解多因腠理不密而邪復入也專用發表則腠理愈虛邪愈易入反為敗症矣宜診其脈邪在表者止當和解而實腠理乘虛復入者亦當和解兼實腠理故用托裡益氣之藥若小便赤色為肺熱所傳短少為肺氣虛蓋肺為母腎為子母虛不能生子故也亦有小便頻者亦為肺虛不能約制耳一男子面白神勞咳嗽胸臆隱痛其脈滑數以為肺癰欲用桔梗湯不信服敗毒散致咳嗽愈甚吐痰腥臭始悟仍服前湯四劑咳嗽少定又以四順散四劑而脈靜更以托裡藥數劑而愈大抵勞傷血氣則腠理不密風邪乘肺風熱相搏蘊結不散必致喘咳又因汗下過度則津液重亡遂成斯症若寸脈數而虛者為肺癰數而實者為肺疽脈微緊而數者未有膿也緊甚而數者已有膿也唾膿而止脈短而面白者易治膿不止脈洪大而面赤色者不治使其治早可救膿成則無及矣金匱方論熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從消渴小便利數或從便難人被下藥快利重亡津液故寸口脈數其人燥咳胸中隱隱時痛脈反滑數此為肺癰咳吐膿血脈數虛者為肺痿數實者為肺癰一童子氣稟不足患肺癰吐膿腥臭皮毛枯槁脈浮按之澀更無力用鍾乳粉湯治之一男子患之形症皆同惟咽喉時或作癢痰多脅痛難於睡臥用紫菀茸湯治之而病愈一弱人咳膿日晡發熱夜間盜汗脈浮數而緊用人參五味子湯數劑而愈以菀茸湯月餘而痊一男子患肺痿咳嗽喘急吐痰腥臭胸滿咽乾脈洪數用人參平肺散六劑及飲童便諸症悉退更以紫菀茸湯而愈童便雖云專治虛火常治瘡瘍腫焮疼痛發熱作渴及肺痿肺癰發熱口渴者尤效一婦人患肺痿咳嗽吐痰腥臭日晡發熱脈數無力用地骨皮治之熱止更用人參養肺湯月餘而安一男子前病肺癰後又患咳嗽頭眩吐沫飲食少思小便頻數服解毒散化痰藥不應診之脾肺二脈虛甚謂暈眩唾涎屬脾氣不能上升小便無度乃肺氣不得下降尚未成膿耳投以加味理中湯四劑諸症已退大半更用鍾乳粉湯而安河間曰金匱云肺痿屬熱如咳嗽肺癟聲啞聲嘶咯血此屬陰虛熱甚然也本論治肺痿吐涎沫而不咳者其人不渴必遺尿小便數以上虛不能制下故也此為肺中冷必眩多涎唾用甘草乾薑此屬寒也脈痿涎唾多心中溫溫液液者用炙甘草湯此補虛勞也亦與補陰虛火熱不同是皆宜分治故肺痿又有寒熱之異也趙以德治一婦人年二十餘患肺癰胸膺間患一竅口中所咳膿血與竅相應而出以人參黃耆當歸補氣血劑加退熱排膿等藥服之不一月而安藥要或問治肺癰目擊神效其法用百年芥菜滷久窨地中者數匙立起此滷嘉興府城中大家多藏之廣筆記魚腥草不住口食之治肺癰吐膿血神方也正名蕺草兼治魚口雄按此方可治鴉片煙癮薛立齋治陸司廳子仁春間咳嗽吐痰腥穢胸滿氣促皮膚縱項強脈數此肺疽也蓋肺系在項肺傷則系傷故牽引不能轉側肺者氣之本其華在毛其充在皮肺傷不能攝氣故脅脹氣促而皮膚縱東垣云肺瘡之脈微緊而數者未有膿也緊甚而數者已有膿也其脈來緊數則膿已成遂以人參黃耆當歸川芎白芷貝母麥冬蔞仁桔梗防風甘草兼以蠟礬丸及太乙膏治之膿盡脈澀而愈至冬脈複數經云飲食勞倦則傷脾脾傷不能生肺金形寒飲冷則傷肺肺傷不能生腎水腎水不足則心火熾盛故脈來洪數經云冬見心脈而不治後果歿於火旺之月凡肺疽愈而復作多不治余常治三人一間三年兩間一年皆復作而歿周國用年逾三十患咳嗽項強氣促右寸脈數此肺疽也東垣云風中於胃呼氣不入熱攻於榮吸氣不出風傷皮毛熱傷血脈風熱相搏血氣稽留於肺變成瘡疽診其脈數而虛者肺痿也數而實者肺疽也今診脈滑此疽膿已成以排膿托裡之藥及蠟礬丸治之脈漸澀而愈錦衣李大器亦患此吐膿面赤脈大謂肺病脈宜澀面宜白今脈大面赤火剋金也不可治果歿一男子年逾四十喘咳脅痛胸滿氣促右寸脈大此風熱蘊於肺也尚未成瘡屬有餘之症意欲以瀉白散治之彼謂肺氣素怯不然之乃服補藥喘咳愈甚兩月後復請視之汗出如油喘而不休此肺氣已絕不治果歿夫肺氣充實二語贅邪何從襲邪氣既入則宜去之故用瀉白散所以瀉肺氣之邪也邪氣既去則真自實矣姚應鳳治某叟患脹滿諸醫多雲隔症應鳳曰此肺癰耳令病者閉目取一大盤水向病者項上傾之病者陡大驚亟舉刀直刺心坎瀉膿血數碗而愈人問之應鳳曰心尖下垂水潑而驚驚則心系提吾刀可入也仁和縣誌沈夫人患嗽血晝夜不休應鳳曰肺慮痿不慮潰今潰至第三葉尚可生也先投洗肺湯已令食豬肺數十斤遂愈王洪緒曰諸患易識獨肺中患毒難覺凡兩腳骨疼痛者或腳骨不痛而舌下生如細豆一粒者再心口直上內作微疼及咳嗽口乾咽燥皆肺中生毒之候也即用甘草桔梗各三錢煎服服後如覺少安肺之患毒無疑矣以犀黃丸十服服完全愈此是預識先治百無一死者余每見此症吐膿膿色皆白故稱肺疽用犀黃丸治無不效或用陳年鹽菜滷每早取半杯滾豆漿沖服服後胸中一塊塞上塞下數次方能吐出連吐惡膿日服至愈患此症者終身戒食鴨蛋白鯗紅蘿蔔著甲魚石首魚食則復發不救千金葦莖湯葦莖二斤薏苡仁半斤桃仁五十枚瓜瓣半斤以水五斗先煮葦莖得五升去渣內諸藥煮取二升服一升再服當吐如膿王晉三曰是方也推作者之意病在膈上越之使吐也蓋肺癰由於氣血混一榮衛不分以二味涼其氣二味行其血分清榮衛之氣因勢湧越誠為先著其瓜瓣當用絲瓜者良時珍曰絲瓜經絡貫串房隔聯屬能通人脈絡臟腑消腫化痰治諸血病與桃仁有相須之理苡仁下氣葦莖上升一升一降激而行其氣血則肉之未敗者不致成膿癰之已潰者能令吐出矣今時用嫩葦根性寒滌熱冬瓜瓣性急趨下合之二仁變成潤下之方藉以治肺癰其義頗善徐靈胎曰此治肺癰之主方也徐靈胎曰古之醫者無分內外又學有根柢故能無病不識後世內外科既分則顯然為內症者內科治之顯然為外症者外科治之其有病在腹中內外未顯然者則各執一說各擬一方歷試諸藥皆無效驗輕者變重重者即殞矣此等症不特外科當知之即內科亦不可不辨分真確知非己責即勿施治毋致臨危束手而後委他人也腹內之癰有數症有肺癰有肝癰有胃脘癰有小腸癰有大腸癰有膀胱癰惟肺癰咳吐腥痰人猶易辨余者或以為痞結或以為瘀血或以為寒痰或以為食積醫藥雜投及至成膿治已無及並有不及成膿而死者病者醫者始終不知何以致死比比然也今先辨明痞結瘀血寒痰食積之狀凡痞結瘀血必有所因且由漸而成寒痰則痛止無定又必另現痰症食積則必有受傷之日且三五日後大便通即散惟外症則痛有常所而遷延益甚金匱云諸脈浮數應當發熱而反灑淅惡寒若有痛處當發其癰以手按腫上熱者有膿不熱者無膿此數句乃內癰真諦也又云腸癰之為病身甲錯腹皮急按之濡如腫狀腹無積聚身無熱是也若肝癰則脅內隱隱痛日久亦吐膿血小腸癰與大腸癰相似而位略高膀胱癰則痛在少腹之下近毛際著皮即痛小便亦艱而痛胃脘癰則有虛實二種其實者易消若成膿必大吐膿血而愈惟虛症則多不治先胃中痛脹久而心下漸高其堅如石或有寒熱飲食不進按之尤痛形體枯瘦此乃思慮傷脾之症不待癰成即死故凡腹中有一定痛處惡寒倦臥不能食者皆當審察防成內癰慎毋因循求治於不明之人以致久而膿潰自傷其生也腹癰薛立齋治上舍周一元腹患癰三月不愈膿水清稀朝寒暮熱服四物知柏之類食少作瀉痰涎上湧服二陳枳實之類痰涎愈甚胸膈痞悶問故曰朝寒暮熱血氣虛也食少作瀉脾腎虛也悉因真氣虛而邪氣實也當先壯其胃氣使諸臟有所稟而邪自退矣乃遂用六君子黃耆當歸數劑諸症漸退又用十全大補湯肌肉漸斂更用補中益氣調理而愈從侄孫年十四而畢姻乙巳春年二十四腹中作痛用大黃等藥二劑下血甚多胸腹脹滿痰喘發熱又服破氣降火藥一劑汗出如水手足如冰薛歸診之左關洪數右關尤甚乃腹癰也雖能收斂至夏必變而成瘵症用參耆各一兩歸術各五錢陳皮茯苓各三錢炙草炮姜各一錢二劑諸症稍退腹始微赤按之覺痛又二劑作痛又二劑腫痛脈滑數針出膿瘀更用大補湯精神飲食如故因遺精患處色黯用前藥加五味山萸山藥骨脂吳萸等劑瘡口漸斂瘵症悉具其脈非洪大而數即微細如無惟專服獨參湯人乳汁少復良久仍脫曰當備後事以俟火旺乃禱鬼神巫者歷言往事如見更示以方藥皆峻利之劑且言保其必生敬信服之後果歿經曰拘於鬼神者不可與言至德而況又輕信方藥於邪妄之人耶書此以警後患薛立齋治一男子腹患癰腫硬不潰乃陽氣虛弱嘔吐少食乃胃氣虛寒法當溫補脾胃假如腫赤痛甚煩躁脈實而嘔為有餘當下之腫硬不潰脈弱而嘔為不足當補之若痛傷胃氣或感寒邪穢氣而嘔者雖腫瘍猶當助胃壯氣彼信不真仍服攻伐藥而嘔甚復請治脈微弱而發熱曰熱而脈反靜脫血脈反實汗後脈反躁者皆為逆也辭不治果歿秋官錢可容腹患癰焮腫煩渴作痛飲冷大便不通脈沉數實此熱毒蘊於內清熱用消毒散加大黃二錢一劑諸症悉退但形氣頓虛用托裡消毒散去銀花白芷倍加參耆歸術而安毛礪安側室肚患癰月餘矣色黯不腫內痛作嘔飲食不入四肢逆冷其脈或脫絕或浮大雜用定痛敗毒之藥曰此氣血俱虛而作痛內決無膿不治之症也強用大溫補之藥二劑痛止色赤飲食少進謂但可延日而已人皆以為有膿復強針之又用大補之劑始生清膿少許眾仍以為毒結於內用攻膿保其必生殊不知乃速其死耳惜哉一男子腹患癰腫硬木悶煩熱便秘脈數而實以黃連內疏湯一劑少愈以黃連解毒散二劑頓退更以金銀花散四劑瘡頭出水而消一男年逾三十患腹癰腫脈數喜冷齊氏云瘡瘍腫起堅硬瘡疽之實也河間云腫硬木悶喜飲冷邪氣在內也遂用清涼飲倍用大黃三劑稍緩次以四物湯加芩連山梔木通四劑而遂潰更以十宣散去參耆肉桂加金銀花天花粉漸愈彼欲速效自服溫補之劑致腹俱腫小便不利仍以清涼飲治之膿潰數碗再以托裡藥治之愈東垣云瘡疽之發其受有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒藥則是皮毛始受之邪引入骨髓受之內者法當疏利以寒劑反用溫補托裡則是骨髓之病上徹毛皮表裡通潰共為一瘡助邪為毒苦楚百倍輕則幾殆重則死矣一男子素好酒色小腹患毒脈弱微痛欲求內消謂當助胃壯氣兼行經活血藥佐之可消不宜用敗毒等藥彼欲速效乃自用之病熱果盛瘡亦不潰飲食少思迨兩月餘復請治診其脈愈弱盜汗不止聚腫不潰肌寒肉冷自汗色脫此氣血俱虛也故不能發腫成膿以十全大補湯三十餘服遂成膿刺之反加煩躁脈此亡陽也以聖愈湯服二劑仍用前藥百帖愈劉貴患腹癰焮痛煩躁作嘔脈實河間云瘡瘍者火之屬須分內外以治其本若脈沉實者先當疏其內以絕其源又曰嘔噦以煩脈沉而實腫硬木悶或皮肉不變邪氣在內宜內疏黃連湯治之今作嘔脈實毒在內也遂用前湯通利二三行諸症悉退更以連翹消毒散而愈一人患腹癰膿熟開遲脈微細膿出後瘡口微膿如蟹吐沫此內潰透膜也凡瘡瘍透膜十無一生雖以大補藥治之亦不能救此可為待膿自出之戒也黃師文云男子服建中湯婦人服四物湯往往十七八得但時為之損益耳有男病小腹一大癰其諸弟侮之曰今日用建中湯否師文曰服建中湯俄而癰潰蓋小腹癰本虛其熱毒乘虛而入建中湯既補虛而黃耆且潰膿也北窗炙輠腰疽薛立齋治府庠彭碧溪患腰疽服寒涼敗毒之藥色黯不痛瘡頭如鋪黍背重不能安寢耳瞶目白面赤無神小便頻澀作渴迷悶氣粗短促脈浮數重按如無先用滋水之藥一劑少頃便利渴止背即輕爽乃砭出瘀血以艾半斤許明灸患處外敷烏金膏內服參耆歸朮肉桂等藥至數劑元氣稍復自疑肉桂辛熱一日不用手足並冷大便不禁仍用肉桂及補骨脂二錢肉豆蔻一錢大便復常其肉漸潰更用當歸膏以生肌肉八珍湯以補氣血而愈錦衣傅允承母年逾七十腰生一㿔作癢異常脈浮數反惡寒曰此瘡瘍症也未潰而先弱何以收斂況大便不通則真氣已竭治之無功因懇請不得已用六君加藿香神麯數劑飲食漸進大便始通更用峻補之劑潰而膿清作渴再用參耆歸地麥冬五味渴止彼喜曰可無虞矣曰尚難收斂先日之言也彼疑遂速他醫卒致不起舉人顧東溪久作渴六月初腰患疽不慎起居瘡潰尺許色黯敗臭小便如淋唇裂口刺七月終請治左尺洪數左關浮澀謂先渴而患疽者乃腎水乾涸虛火上炎多致不起今膿水敗臭色黯不痛瘡口張大乃脾氣敗而肌肉死也小便如淋痰壅喘促口乾舌裂乃脾肺敗而腎水絕也左尺洪數腎無所生也左關浮澀肺克肝也況當金旺之際危殆速矣二日後果歿蓋此症發於兩月方歿者乃元氣虛不能收斂也若預為調補使氣血無虧亦有得生者一男子腰患毒膿熟不潰針之膿大泄反加煩躁以聖愈散湯四劑而寧更以人參養榮湯加麥冬五味兩月而愈此人後患濕氣遂為痼疾凡瘡膿血去多瘡口難合尤當補益務使氣血平復否則更患他症必難治療慎之一男子腰中患疽發而不潰其氣血止能發起不能培養為膿也投大補藥數劑而潰又數劑膿出尚清乃服參耆歸術膏斤余膿少稠數斤膿漸稠肌肉頓生大凡癰疽藉血氣為主若患而不起或潰而不腐或不收斂及膿少或清皆氣血之虛也宜大補之最忌攻伐之劑亦有膿反多者乃氣血不能禁止故也若潰後發熱作渴脈大而膿愈多屬真氣虛而邪氣實也俱不治常見血氣充實之人患瘡皆腫高色赤易腐潰而膿且稠又易於收斂怯弱之人多不起發不腐潰又難於收斂若不審察而妄投攻劑虛虛之禍不免矣若患後當調養若瘰癧流注之症尤當補益也否則更患他症必難於措治慎之有人腰間生一毒癰紅腫未破皮痛不可忍俯躬而行一人取新殺牡豬肝切片如瘡貼上外以布纏定一對晝其病良已肝色變黑臭不可近棄之地犬不食下有小指大一點尚硬乃肝少未貼滿所致竟亦無他薛立齋治崑山張舉人元忠盂秋患腰疽瘡頭如大豆粒根大三寸許微腫略赤虛症悉具用桑枝灸患處服活命飲一劑腫起色赤飲食仍少用香砂六君子湯四劑食漸進後用大補藥膿雖成而不潰乃每劑加附子一片二劑後膿自湧出旬日而愈陸氏女初嫁患腰痛不腫脈沉滑神思倦怠此為內發七情之火飲食之毒所致以托裡藥一劑下瘀膿升許陳良甫曰瘡未潰內陷面青唇黑者不治果歿王洪緒治一人患腰疽根盤圍闊二尺余前連腹後接背不紅不腫不痛不軟按之如木王舉方用炮薑肉桂他醫以為暑月安可用此熱劑改服攻托清涼閱五日病者神昏無主復延診患仍不痛色如隔宿豬肝言語不清飲食不進王曰過今晚商治是夜即斃又一人患此服以陽和湯次日覺鬆又一帖疽消小半趕合犀黃丸與陽和湯輪轉間服五日而愈陽和湯方熟地一兩麻黃五分鹿角膠三錢白芥子二錢肉桂一錢甘草一錢炮薑炭五分此方麻黃得熟地不發表熟地有麻黃不凝膈神用在斯主治骨槽風流注陰疽脫骨疽鶴膝風乳岩結核石疽附骨疽及漫腫無頭平塌白陷一切陰凝等證犀黃丸方乳香一兩沒藥一兩麝香一錢五分牛黃三分共為末用飯搗丸每服三錢陳酒送上部臨臥服下部空心服主治一切陰疽大毒
