body:
  text: 卷五疫王宇泰曰聖散子方因東坡先生作序由是天下神之宋末辛未年永嘉瘟疫服此方被害者不可勝紀余閱葉石林避暑錄云宣和間此藥盛行於京師太學生信之尤篤殺人無數醫頓廢之昔坡翁謫居黃州時其地瀕江多濕而黃之居人所感者或因中濕而病或因雨水浸淫而得所以服此藥而多效是以通行於世遺禍於無窮也弘治癸丑年吳中疫癘大作吳邑令孫磐令醫人修合聖散子遍地街衢並以其方刊行病者服之十無一生率皆狂躁昏瞀而卒噫孫公之意本以活人殊不知聖散子方中有附子良薑吳茱萸豆蔻麻黃藿香等劑皆性味燥熱反助火邪不死何待若不辨陰陽二症一概施治殺人利於刀劍有能廣此說以告人亦仁者之一端也續醫說張子和曰元光春京師翰林應泰李屏山得瘟疫症頭痛身熱口乾小便赤澀渠素嗜飲醫者便與酒症丸兼巴豆利十餘行次日頭痛諸病仍存醫者不識復以辛溫之劑解之加之臥於暖炕強食蔥醋湯圖獲一汗豈知種種客熱疊發並作目黃斑生潮熱吐泄大喘大滿後雖用承氣下之已無及矣至今議者紛紜終不知熱藥之過往往歸罪於承氣湯用承氣湯者不知其病已危猶復用藥學不明故也良可罪也然議者不歸罪於酒症丸亦可責也夫瘟症在表不可下況巴豆丸乎巴豆不已況復發以辛熱之劑乎彼隨眾譭譽者皆妄議者也文田按巴豆下之陰之傷已極重以大黃下而獨能生陰乎此證似當以綠豆解巴豆之毒加存陰之品庶有濟耳然子和不足以論此宋寶慶二年丙戍冬十一月耶律文正王從元太祖下靈武諸將爭掠子女玉帛王獨取書籍數部大黃兩駝而已既而軍中病疫得大黃可愈所活幾萬人輟耕錄文田按兵卒多飲酒食肉勞汗又多溫疫一行必遽傳陽明胃腑此大黃所以往無不利也王氏刪此案非是職方外紀云哥阿島曩國患疫有名醫名依卜加得不以藥石令城內外遍舉大火燒一晝夜火息而病亦愈矣蓋疫為邪氣所侵火氣猛烈能蕩諸邪邪氣盡而疫愈亦至理也樵書初編此法惟徼外可旋文田按此冬月寒疫非溫疫也王氏知溫之能為疫獨不知冬月亦有寒疫耶宜其妄刪此案也邱汝誠因訪友聞鄰家哭聲問何故曰鄰某甲得時疾邱令汲水置大桶中以簾橫其人於上病遂愈揮塵新談文田按此溫疫證由中暍而得者也蘇韜光侍郎云予作清流縣宰縣倅申屠行父之子婦患時疫三十餘日已成壞症予令服奪命散又名復脈湯人參一兩水二鍾緊火煎一鍾以井水浸冷服之少頃鼻梁有汗出脈復立瘥凡傷寒時疫不問陰陽老幼誤服藥餌困重垂危脈沉伏不省人事七日以後皆可服之百不失一本草綱目仁和縣誌此陰傷而陽亦將脫故以復脈得效是時人參亦可用矣但云七日以後皆可服則昧醫理之言王氏率意擬刪亦未為當吳嗣昌治浙督趙清獻公名臣常遘危疫吳獨排眾議投冰水立蘇之公尊禮若神曰君其不朽孫文垣治一老妓三日患頭痛身熱口渴水瀉不止身重不能反側日漸昏沉耳聾眼合譫語諸醫有主補中益氣者有主附子理中者煎成未服孫診之六脈洪大面色內紅外黑口唇乾燥舌心黑苔不省人事曰此疫症也法當清解急以小白湯進之猶可生也益氣理中殺之矣安可用問小白何湯也曰小柴胡合白虎湯即是或曰泄瀉如此石膏可用乎曰此協熱下利當早服之既服至夜半神氣甦醒惟小水不利熱渴未退師仲景法渴而身熱小水不利者當利其小便乃以辰砂六一散二兩燈心湯調服之兩帖而瘳藜按此陽明少陽合病用白虎柴胡是矣但仲景柴胡湯條內原有渴者去半夏加栝蔞根之法曷不遵而用之此亦三陽合病之類一白虎湯足以了之兼用小柴胡原不甚謬但柴胡半夏究嫌升燥故熱渴而小水不利待六一散之清熱而後解非因其利小便也讀者勿因其依傍仲景遂為所惑張淨宇發熱腹疼泄瀉口渴嘔吐不止有認寒者有認熱者有認傷寒者孫診之曰此時疫瀉也以二陳湯倍白朮加青蒿葛根酒芩白芍豬苓澤瀉滑石一劑而安一僕病身如火爍頭痛如破小水赤口渴鼻乾不得眠胸膈膨脹飢不能食六脈弦而數孫與竹葉石膏湯加知母枳殼白芷葛根青蒿一帖而熱痛減半胸膈亦寬惟口渴小水短澀睡臥不安又與化瘟丹三錢井水化下渴止少得睡頭暈腳軟喘急與四物湯加青蒿酒芩苡仁木瓜服之全愈一僕病與前相似醫與藥乃大吐大瀉熱增益頭痛不可當煩躁口渴鼻乾嘔吐小水短澀已十四日甚危孫詢所服藥乃藿香正氣散砂仁厚朴山楂大耗元氣之品時五月火令當權之疫當以甘寒之劑治之何可以辛熱香竄益其火而枯其津也急投人參白虎湯加竹茹葛根青蒿升麻一帖熱除再帖頭痛止諸症盡去後連治數人皆如此蓋天行之疫一方多有先以甘寒清解之劑投之熱退用四物湯調養陰血稍加清熱之品而青蒿之功居勝治疫症盡此數語吳某婦先感風邪後傷飲食發熱頭痛腹脹醫與巴豆丸瀉之熱如初又以大黃重瀉之熱亦如初再後者謂瀉而熱不退者為虛大用參耆術補之四日神氣昏沉不省人事孫診之左脈弦數右關尺沉數有力舌尖沉香色舌根焦黑芒刺語言不清蓋不知饑饉之餘疫氣為癘妄下妄補誤成壞疫危且殆矣姑以柴胡知母各三錢石膏六錢枳實花粉各五分甘草黃芩麥冬各一錢山梔生地各七分人參六分竹葉三十片姜三分水煎飲至中夜後人事稍清微有汗舌柔和次日前方去生地加白芍舌心焦黑盡退大便五日未行身尚痛咳嗽與七制化痰丸二帖再以石膏二錢麥冬貝母各一錢前胡枳殼黃芩梔子各六分甘草三分桑皮八分全安程氏婦乃夫歿於疫病七日疫即至大熱頭疼口渴胸脅並痛醫與小柴胡湯夜忽夢夫交泄而覺冷汗淫淫四肢如解神昏譫語面如土色舌若焦煤強硬孫診之六脈沉弦而數大小便俱秘此亦陰陽易類也疫後有是危已極矣與生脈湯加柴胡黃芩桂枝甘草煎成將乃夫昔穿褲襠燒灰調下兩劑而神醒體溫汗斂舌柔焦退前方加棗仁竹茹四肢能運動乃進粥湯子女妯娌婢僕凡六人次第而病均以六神通解散解汗而安一婦人發熱頭痛醫與九味羌活湯十神湯不效加口渴舌黑如煤又醫與如神白虎湯竹葉石膏湯亦不效加泄瀉不止人事昏沉四肢厥冷呼吸氣微米粒不進者十四日具含斂矣孫診之脈細如蛛絲曰此疫症也合生脈理中二湯飲之連進二帖夜半神氣稍蘇飲粥湯半盞次早六脈漸見喜曰脈絕微續者生可無虞矣仍與前藥至晚瀉止口不渴舌煤退精神爽再用人參白朮各五錢炮薑炙草各二錢麥冬二錢五味十五粒仍是理中生脈不拘時服數日全愈此即壞症也前醫涼散過當故以溫補奏功吳球泉內人痢疾後感寒月水適至壯熱頭微疼口渴遍身疼胸膈飽悶煩躁耳聾大便瀉舌白苔脈七八至亂而無序脈躁多凶第此為熱鬱之極而然躁極而靜鬱極而通後之伏而戰汗勢也亦理也孫曰此三陽合病春瘟症也且投三陽藥服之挑察微應再為區處以柴胡三錢葛根白芍各二錢枳實桔梗酒芩竹茹各一錢天花粉八分炙甘草桂枝各五分服後遍身如冰面與四肢尤甚六脈俱無脈雙伏或單伏而四肢厥冷欲戰汗也宜熟記舉家及醫者皆嘆為故矣孫曰非死候也蓋夜半陰極陽生熱欲作汗譬之天將雨必六合晦冥諸醫咸匿笑四鼓後果戰而汗出衣被皆濕肢體漸溫神思清爽且索粥唯耳尚聾腹中大響脈近六至改以柴苓湯加烏梅兩帖而愈族孫醉後房事已起而小溲即臍下作痛水瀉腸鳴一日十餘度發熱頭痛醫與理中湯一帖反加嘔逆煩躁口渴孫診之左脈弦大右洪大俱七至不食不眠面赤唇燥舌苔黃厚自雲房勞後陰症傷寒小腹痛且漏底乃笑曰春溫症也族人交口謂的屬陰症故嘔吐水瀉不可因其面赤便認為陽幸加察焉咸擬理中湯再加附子肉桂庶可保全房勞外感視為陰症而與熱藥殺人多矣當與喻嘉言治黃長人一案同參喻案見傷寒門孫曰桂枝下咽陽盛即斃陰陽寒熱之間辨之不真死生反掌茲當舍症從脈也即症而論發熱頭痛病非陰症以溫膽湯加薑汁炒黃連柴胡乾葛二帖令當夜飲盡俾不他傳因畏竹茹黃連只進一服嘔逆止餘症悉在次日脈之洪大搏指與白虎湯加竹茹兩帖亦令服完因畏石膏只進一服瀉止小腹仍痛又次日脈洪長堅硬邪已入腑非桃仁承氣不可覿面煎服連飲二劑下黑燥矢五六枚痛熱俱減再診六脈皆緩弱以四君子湯加白芍黃連香附調養數日而愈程兄腮頰紅腫嘔惡惡寒發熱不食下午煩躁口苦不寐此俗名鸕鷀瘟是也乃少陽陽明二經之症法當清解以柴胡貫眾各一錢乾薑竹茹半夏曲各一錢黃連枳殼各七分甘草四分一帖而減二帖而安喻嘉言治錢仲昭患時氣外感三五日發熱頭疼服表汗藥疼止熱不清口乾唇裂因而下之遍身紅斑神昏譫語食飲不入大便復秘小便熱赤脈見緊小而急曰此症前因誤治陽明胃經表裡不清邪熱在內如火燎原津液盡干以故神昏譫妄若斑轉紫黑即刻死矣目今本是難救但其面色不枯聲音尚朗乃平日保養腎水有餘如旱田之側有下泉未竭故神雖昏亂而小水仍通乃陰氣未絕之徵尚可治之不用表裡單單隻一和法取七方中小方而氣味甘寒者用之惟如神白虎湯一方足以療此蓋中州元氣已離大劑急劑復劑俱不敢用而虛熱內熾必甘寒氣味方可和之耳但方雖宜小而服則宜頻如飢人本欲得食不得不漸漸與之必一晝夜頻進五七劑為浸灌之法庶幾邪熱以漸而解元氣以漸而生也若小其劑復曠其日縱用藥得當亦無及矣如法治之更一晝夜熱退神清脈和食進其斑自化金鑑春日病瘟誤治二旬釀成極重死症壯熱不退譫語無倫皮膚枯澀胸膛板結舌卷唇焦身倦足冷二便略通半渴不渴面上一團黑滯前醫所用之藥不過汗下和溫之法絕無一效喻曰此症與兩感傷寒無異但彼日傳二經三日傳經已盡即死不死者又三日再傳一周定死矣此春溫症不傳經故雖邪氣留連不退亦必多延幾日待元氣竭絕乃死觀其陰症陽疾兩下混在一區治陽則礙陰治陰則礙陽然法曰發表攻裡本自不同又謂活法在人神而明之未嘗教人執定勿藥也吾有一法即以仲景表裡二方為治雖未經試驗吾天機勃勃自動若有生變化行鬼神之意必可效也於是以麻黃附子細辛湯兩解其在表陰陽之邪果然皮間透汗而熱全清再以附子瀉心湯兩解其在裡陰陽之邪果然胸前柔活而人事明瞭諸症俱退次日即食粥以後竟不需藥只在此二劑而起一生於九死快哉此案後學宜反復詳玩之盧不遠治永嘉王龍友望其色黯紫舌本深紅知其次日當病果發熱越三日其叔培竹欲歸將發診其脈沉而散盧極力挽留謂龍友雖病而脈有神理君雖未病而邪實深入病於中路將奈何至次晚大吐脈隨脫藥以人參三錢脈復有以棗仁等劑投之者其熱轉盛十四日脈八至舌短神昏盧謂今晚非用下必然胃爛因用芩連大黃一劑次日遂愈蓋疫為癘氣人受之多從口鼻入因人色力盛衰以為輕重審色與脈可以先知又疫者瘟熱病之沿漫也其病之因由寒鬱火故其色紫紫為水剋火之色也火病之發應心之苗故舌色深紅杜清碧謂之將瘟舌而脈體須浮浮脈象火病發必順若沉則邪深入里勢必暴焚河間多用下法下之中空而火性自平矣如當下而失時必胃爛而死吳又可治朱海疇年四十五歲患疫得下症四肢不舉身臥如塑目閉口張舌上苔刺問其所苦不能答因問其子兩三日所服何藥云承氣湯三劑每劑投大黃一錢許不效更無他策惟待日而已診得脈尚有神下症悉具藥淺病深也先投大黃一兩五錢目有時而稍動再投舌刺無芒口漸開能言三劑舌苔稍去神思稍爽四日服柴胡清燥湯五日復生芒刺煩熱又加再下之七日又投承氣湯養榮湯肢體自能稍動計半月共服大黃十二兩而愈又數日始進糜粥調理兩月平復凡治千人所遇此等不過三四人而已姑存案以備參酌耳施幼升賣卜頗行年四旬秉賦肥甚六月患時疫口燥舌乾苔刺如鋒不時太息咽喉腫痛心腹脹滿按之痛甚渴思冰水日晡益甚小便赤澀得涓滴則痛甚此當下之症也緣通身肌表如冰指甲青黑六脈如絲尋之則有少按則無醫者不究里症熱極但引陶氏全生集以為陽症但手足厥逆若冷過手肘膝便是陰症今已通身冰冷比之冷過肘膝更甚宜其謂陰症一也且陶氏論陰陽二症全在脈之有力無力中分今已脈微欲絕按之如無比之無力更甚宜其為陰症二也陰症而得至陰之脈又何說焉遂投附子理中湯末延吳至以脈證相參表裡比較此陽症之最重者因內熱之極氣道壅閉下症悉具但嫌下之晚耳因內熱之極至周身冰冷此體厥也六脈如無者群龍無首之象症亦危矣急投大承氣湯囑其緩緩下之脈至厥回便得生矣其妻以一曰陰症一曰陽症天地懸絕疑而不服更一醫指言陰毒須灸丹田又三醫續之皆言陰症妻乃惶惑病者自言何不卜之神明遂卜得從陰則吉從陽則凶更惑於醫之議陰症俱多乃進附子湯下咽如火煩躁之極嘆曰吾已矣藥之誤也言未已轉劇不逾時竟殞吳江沈氏婦少寡多鬱怒而有吐血症歲三四發吐後即已三月間小發熱頭疼身痛不惡寒而微渴次日舊病大發吐血逾常更加眩暈手振煩躁飲食不進且熱加重醫但見吐血以為舊病不知其時疫也以發熱為陰虛頭疼身痛為血虛不知吐血前一日已發熱頭痛非吐血後所加也眾議用補問吳可否吳曰失血補虛權宜則可今兼時疫非昔比也於是用人參二錢茯苓歸芍佐之兩服後虛症咸退熱減六七醫者病者皆謂用參得效欲速進吳禁之不止遂覺心胸煩懣腹中不和求噦不得終夜不寐蓋虛邪得補而退實邪得補而劇也因少與承氣微利之而愈按此病設不用利藥靜養數日亦愈以其人大便一二日一解則知地氣自通邪氣在內日從胃氣下趨故自愈也嚴氏婦年三十時疫後脈症俱平飲食漸進忽然肢體浮腫別無所苦此即氣復也蓋大病後血未成氣暴復血乃氣之依歸氣無所依故為浮腫嗣後飲食漸加浮腫漸消若投行氣利水藥則謬矣據所云則養血之劑宜投也一人感疫發熱煩渴思飲冰水醫者禁服生冷甚嚴病者苦索不與遂致兩目火併咽喉焦燥晝夜不寐目中見鬼病人困劇自謂得冷水一滴下咽雖死無恨於是乘隙匍匐竊取井水一盆置之枕旁飲一杯目頓清亮二杯鬼物潛消三杯咽喉聲出四杯筋骨舒暢不覺熟睡俄而大汗如雨衣被濕透脫然而愈蓋其人瘦而多火素稟陽藏醫與升散不能作汗則病轉劇今得冷飲表裡和潤自然汗解矣張路玉治洪氏女初冬發熱頭痛胸滿不食已服發散消導四劑至六日周身痛楚腹中疼痛不時奔響屢欲圊而不行口鼻上唇忽起黑色成片光亮如漆與玳瑁無異醫駭辭去張診之喘汗脈促神氣昏憒雖症脈俱危喜其黑色四圍有紅暈鮮澤若痘瘡之根腳緊附如線他處肉色不變許以可治先與葛根黃芩黃連加犀角連翹荊防紫荊人中黃解其肌表毒邪俟其黑色發透乃以涼膈散加人中黃紫荊烏犀微下二次又與犀角地黃湯加人中黃之類調理半月而安此症書所不載唯龐安常有玳瑁瘟之名而治法未備人罕能識先是一人患此瀕危口耳鼻孔皆流鮮血亦不能救大抵黑色枯焦不澤四圍無紅暈而灰白色黯者皆不可救其黑必先從口鼻至顴頰目胞兩耳及手臂足脛甚則胸腹俱黑從未見於額上肩背陽位也陳瑞之七月間患時疫初發獨熱無寒或連熱二三日或暫可一日半日熱時煩渴無汗熱止則汗出如漉自言房勞後乘涼所致服過十味香薷九味羌活柴胡枳桔等十餘劑煩渴壯熱愈甚張診之六脈皆洪盛搏指舌苔焦枯唇口剝裂大便五六日不通雖云病起於陰實則熱邪亢極胃腑剝腐之象急與涼膈加黃連石膏人中黃得下三次熱勢頓減明晚復發熱煩渴與白虎加人中黃黃連熱渴俱止兩日後左頰發頤一睟時即平而氣急神昏此元氣下陷之故仍與白虎加人參犀角連翹頤復焮發與犀角連翹升柴甘桔牛蒡馬勃二服右頤又發一毒高腫赤亮瘍醫調治四十日而安同時患此者頗多良由時師不明此為濕土之邪初起失於攻下概用發散和解引邪氾濫而發頤毒多有腫發綿延以及膺脅肘臂如流注潰腐者縱用攻下解毒皆不可救不可以發頤為小症而忽之一北人患時疫寒熱不止舌苔黃潤用大柴胡下之煩悶神昏雜進人參白虎補中益氣熱勢轉劇頻與芩連知母不應張診之左脈弦數而勁右脈再倍於左周身俱發紅斑惟中脘斑色皎白諸醫莫審白斑之由因喻之曰良由過服苦寒之劑中焦陽氣失職故也法當通達其斑兼通氣化無慮斑色不轉也遂用犀角連翹山梔人中黃晝夜連進二服二便齊行而斑化熱退神清食進起坐徐行矣其昆季同時俱染其氣並進蔥白香豉人中黃連翹薄荷之類皆隨手愈黃以寬風溫十餘日壯熱神昏語言難出自利溏黑舌苔黑燥唇焦鼻煤先誤用發散消導數劑煩渴彌甚恣飲不輟此本伏氣鬱發更遇於風遂成風溫風溫脈氣本浮以熱邪久伏少陰從火化發出太陽即是兩感幸年壯質強已逾三日六日之期症雖危殆良由風藥性升鼓激周身元氣皆化為火傷耗真陰少陰之脈不能內藏所以反浮古人原無治法惟少陰例中則有救熱存陰承氣下之一症可惜此以迅掃久伏之邪審其鼻息不鼾知水之上源未絕無慮其直視失溲也喻嘉言治錢仲昭亦以其腎水未竭故傷寒多死下虛人非虛語也酌用涼膈散加人中黃生地急救垂絕之陰服後下溏黑三次舌苔未潤煩躁不減更與大劑涼膈大黃加至二兩兼黃連犀角三下方得熱除於是專以生津止渴大劑投之舌苔方去津回渴止而愈按喻嘉言治金鑑類兩感其論症與此略同第金則舌卷足冷身蜷而便略通此則舌黑唇焦鼻煤而利溏黑故金則以麻黃附子細辛及附子瀉心此則專用涼膈其治法不同如此楊乘六治一人病疫大熱大渴唇焦目赤兩顴嬌紅語言謬妄神思昏沉手冷過肘足冷過膝其舌黑滑而胖其脈洪大而空曰此戴陽症也外熱內寒雖身熱如烙不離覆蓋口渴引飲不耐寒涼面色雖紅卻嬌嫩而遊移不定舌苔雖黑卻浮胖而滋潤不枯症類白虎然白虎症未有厥冷上過肘下過膝者遂以大劑八味飲加人參濃煎數碗探冷與服諸症乃退繼以理中附子六君歸芍調理而愈先有用白虎者幸未服之張學海業醫以疲於臨症染時疫微寒壯熱頭痛昏沉服發散藥數劑目直耳聾病熱增劇口渴便秘改用瀉火清胃解毒等劑熱尤熾油汗如珠譫語撮空惡候悉具楊診之其脈洪大躁疾而空其舌乾燥焦黃而胖時滿座皆醫也僉擬白虎承氣楊以養榮湯用參附各三錢與之曰服此後當得睡睡醒則諸脈俱靜諸病俱退而舌變嫩紅滑潤矣第無撓旁議翌日復診果如所言蓋病有真假憑諸脈脈有真假憑諸舌如系實症則脈必洪大躁疾而重按愈有力如系實火則舌必乾燥焦黃而斂束且堅卓豈有重按全無滿舌俱胖尚得謂之實症也哉仍用原方減去參附一半守服數劑而愈陸養愚治費西村患時疫頭疼身熱口渴氣喘下午熱潮更甚或以藿香正氣散投之煩躁特甚舌心焦黑譫語發斑又與柴苓湯更加嘔噦且自汗不止脈之浮數而微曰此少陽陽明合病之虛熱也用白虎湯加人參黃耆葛根柴胡燈心竹葉熱減十分之七汗亦稍止後以人參麥冬五味黃芩山梔甘草二劑斑亦漸退陳好古患兩太陽痛左脅作疼口渴大便瀉水小便短赤面色如塵陸診之滑大而數右關為甚時春末夏初曰此疫症也陳怒瘟病之名辭去或以胃苓湯投之煩渴異常語言錯亂再求診脈仍前症似危急然細參症候不過熱鬱之極故煩亂神昏耳其瀉者因表氣不舒故里氣不固也用白虎合解肌湯二劑而定又二劑而起藜按肺移熱於大腸故瀉非裡氣不固也丁程川之寵患疫而死半月後丁自病頭痛身熱口渴煩躁或與小柴胡湯忽夜夢與亡寵交接驚覺而精已泄汗出如雨不能轉側神昏譫語亟招陸診之其脈微細如絲面色如泥四肢厥冷幸未過肘膝而陽事尚自翹然令剪其亡寵舊裩襠燒灰以附子理中湯調灌之兩劑神清陽亦收斂後以人參麥冬五味白芍黃連棗仁知母黃柏調理而安文田按此柴胡擾動肝邪故搖撼腎精以致不守柴嶼青治吳氏婦患疫家人謂因怒而致醫遂用沉香烏藥代赭等藥兼用表劑二十餘日胸膈脹悶壯熱不休脈之左手稍平右三部洪數此疫症邪熱入腑表散徒傷衛氣病亦不解乃連進瓜蒂散二劑吐去涎痰察其邪尚未衰又與小承氣二劑下宿垢數行而熱漸退調理至十餘日脈始平復繆仲淳治史鶴亭太史丁亥春患瘟疫頭疼身熱口渴吐白沫胃熱晝夜不休醫誤謂太史初罷官歸妄投解鬱行氣藥不效又與四物湯益甚諸醫謝去謂其必死迎繆至病二十餘日家人具以前方告繆曰誤矣瘟疫者四時不正傷寒之謂發於春故謂之瘟疫不解又不下使邪熱彌留腸胃間幸元氣未盡故不死亟索淡豆豉約二合許炒香麥冬一兩許知母數錢石膏兩許一劑大汗而解時大便尚未通史問故曰昨汗如雨邪盡矣第久病津液未回故大便不通腸胃燥非有邪也今可食甘蔗三二株兼多飲麥冬湯不三日去燥糞六十餘塊而愈張鳳逵萬曆丁未三月間寓京師吏部劉蒲亭病劇求治已備後事譫語抹衣不寐者七八日矣御醫院吳思泉名醫也偕數醫治之張診脈只關脈洪大其餘皆伏乃書方竹葉石膏湯咸驚曰吳等已煎附子理中湯何冰炭如是張詰之吳曰陽症陰脈故用附子張曰兩關洪大此陽脈也其餘經為火所伏非陰脈也一劑譫語抹衣即止熟寐片時再診之洪者平而伏者起矣又用辛涼藥調理全愈元時江西泰和縣瘟疫大作有醫者視病中夜而歸忽遇神人騎馬導從而來醫知非人拜伏於地神至前叱曰汝何人也答曰某醫人也神曰汝今醫病用何藥答曰隨病冷熱輕重用藥治之神曰不然天醫類用香蘇散好醫如其言試之皆效香附炒去皮紫蘇各二兩陳皮甘草各一錢上為粗末每服三錢水一盞煎七分去渣熱服不拘時日三服戒葷腥酒肉無不應效又記云昔城中大疫有白髮老人教一富家人修合香蘇散施城中病者皆愈其後疫鬼作人問其富人家富人一實告鬼相顧曰此老教三人矣遂稽顙而退同上則皆萬密齋保命歌括文田按此亦寒疫證醫者喬姓奉呂仙甚謹一夕夢呂告之曰水上浮萍甚能愈疾多貯之喬乃收積至十車旦暮大疫喬藥中每加萍一撮無不立愈其門如市遂獲重貲他醫效之都不驗云間雜誌無名氏錢國賓治管船王元暴病頭痛身熱倦臥懶動不惡寒只畏熱舌紅肌黃二便不利六脈浮洪視其症脈瘟病也用清涼發散之劑八日罔效再四審之心胸腹脅俱無他症口渴飲水欲向外臥令人移出解衣視其前後心間有黑點數十如疙蚤斑知為羊毛瘟也用小針於黑處一挖即出毛一莖凡取數百莖乃少安日食西瓜十一個數日乃愈用藥不誤而不能取效則必反復審視以求其不效之故始克有濟若不效即遽易方數易之後必致迷誤此案可為審病之法文田按熱在胃腑而求之肌表之間安得見效此白虎證也凡善治溫病者以汗解其次以疹解其次以斑解至於斑點發黑此陰傷於辛散之故也而隨俗指為羊毛瘟豈非庸醫乎吳橋治朝有濡壯年偶以訟系士師歸家數日而發熱醫以為痰火治之旬日而病益危橋診之六脈隱見不常且舉身紫斑發矣耳聾口噤目上視循衣摸床昏瞀絕食者五日語所親曰疫也即以寒水下辰砂六一散稍飲輒少安尋授柴胡石膏犀角湯一再服而病去其大半七日愈太函集楊玉衡曰乙亥丙子丁丑之間吾邑連歉瘟氣盛行用賠賑散治愈無算方用白殭蠶酒炒二錢蟬蛻一錢廣薑黃去皮三分生大黃四錢共為末每服一錢八分二釐五毫用黃酒一杯蜂蜜五錢調勻冷服中病即止因易其名曰升降散蓋取殭蠶蟬蛻升陽中之清陽薑黃大黃降陰中之濁陰一升一降內外通和而雜氣之流毒頓息矣煉蜜為丸名太極丸服法同劉兆平年八旬患瘟病表裡大熱氣噴如火舌黃口燥譫語發狂脈洪長滑數楊用河間雙解散治之大汗不止舉家驚惶復飲一服汗止但本證未退改制增損雙解散白殭蠶酒炒三錢全蟬蛻十二枚廣薑黃七分防風薄荷葉荊芥穗當歸白芍黃連連翹梔子各一錢黃芩桔梗各二錢石膏六錢滑石三錢甘草一錢酒浸大黃二錢芒硝二錢水煎去渣沖芒硝入蜜三匙黃酒半杯和勻冷服兩劑而痊因悟麻黃春夏時不可輕用也楊玉衡名璇著有寒溫條辨孫文垣治何明吾時疫食復大便不通嘔惡內熱昏憒或作夢語循衣摸床此熱在心包絡以竹茹麥冬知母山梔各一錢陳皮半夏曲酸棗仁枳實各八分甘草三分服之夜半人事稍清餘熱未散用石膏三錢知母二錢竹茹麥冬生棗仁各一錢天花粉陳皮各七分枳實麥芽半夏曲各六分大便行而熱退鮑五保患時疫耳聾身熱口渴大便五日不行人事不清竹葉黃芩柴胡半夏曲甘草枳殼天花粉知母煎服而熱渴更甚大便行而瀉手攣縮不能伸且發呃咳嗽改用柴胡石膏竹茹人參甘草麥冬半夏曲橘紅黃芩黃連一服而呃止瀉除諸症悉愈朱氏子頭痛身熱口渴氣促申酉時潮熱更甚舌心焦黑遍身紫斑語言不清發呃耳聾誤進藿香正氣散加嘔逆水瀉又服柴苓湯嘔益甚熱轉劇六脈洪數此少陽陽明合病之疫用石膏五錢知母柴胡各三錢黃芩一錢五分半夏曲麥冬竹茹橘紅葛根各一錢粉草枳實各五分服下熱退其七舌不燥再以柴胡半夏曲白芍竹茹各一錢石膏三錢麥冬知母各一錢五分黃連甘草人參各五分飲之而斑退諸症悉平江右熊二官疫後食復額痛口渴譫語神昏面青舌黑鼻中停灰不省人事小水短少勢已危急以小柴胡湯去半夏加石膏知母當歸山梔豆豉枳實與之一帖得微汗熱退大半次日以柴胡滑石甘草知母石膏人參桔梗黃芩花粉與之舌黑退人事清飲食進而愈程竹坡室年過六十染疫頭疼口渴舌苔前黃燥後紫黑身熱沉重人事昏憒語言錯亂小水短澀嘔逆煩躁耳聾胸脅痛時五月初旬也脈左浮而弦數右洪長而數邪在少陽陽明二經即以柴胡石膏為君知母麥冬天花粉竹茹為臣黃連為佐甘草枳殼桔梗為使二帖得微汗熱退神清因驟進葷粥又大熱譫語昏沉此食復也以小柴胡加山梔子枳實淡豆豉鱉甲四帖復得汗熱退神清仍口渴躁煩以生脈湯加黃連香薷竹茹竹葉而安程元祖春瘟食復人事昏沉內熱口渴舌如焦煤脅痛耳聾身熱如火僵硬不能轉脈數左數右洪大而數以柴胡石膏各五錢黃芩知母葛根各二錢山梔子枳實各三錢甘草五分進三帖額上微汗腹中雷鳴大便行三次皆清水熱仍不退右寸稍軟前方加人參七分又二帖汗出熱退身仍僵口仍渴耳仍聾瀉亦不止汗亦不收勺粒不進者已十三日以人參麥冬白芍石斛各一錢五味子十一粒當歸八分桂枝三分黃柏甘草各五分投之左脈已弱咳嗽人事漸爽粥飲稍進瀉止稍可轉身大有生氣以四物湯加苡仁甘草陳皮白朮石斛百合貝母調理一月而瘳金溪令臧太夫人勞倦後多食魚蝦偶發寒熱三日不退第四日左耳前後及頰車皆紅腫第五日右邊赤腫第六日腫及滿頭紅大如斗眼合無縫昏憒譫語粒米不進者八日六部脈洪長而數此大頭疫也乃陽明少陽二經壅熱所致高年不敢用硝黃惟宜輕清解散之劑使因微汗而解以貫眾石膏各六錢柴胡葛根各三錢赤芍天花粉各二錢甘草一錢黑豆四十九粒日進二帖脈始減半第九日方進粥飲前藥除石膏又四帖而安一僕發熱頭疼口渴腹痛小便赤大便瀉日夜不睡者六日孫診之曰據脈汗後浮數熱不減乃疫症也以滑石三錢青蒿葛根白芷片芩各一錢半炙甘草升麻各五分一帖即得睡熱減半頭疼除惟小水赤頭暈腳膝無力此病後血虛之故以四物湯加青蒿酒芩苡仁服之而安雍正癸丑疫氣流行撫吳使者囑葉天士制方救之葉曰時毒癘氣必應司天癸丑濕土氣化運行後天太陽寒水濕寒合德挾中運之火流行氣交陽光不治疫氣大行故凡人之脾胃虛者乃應其癘氣邪從口鼻皮毛而入病從濕化者發熱目黃胸滿丹疹泄瀉當察其舌色或淡白或舌心乾焦者濕邪猶在氣分甘露消毒丹治之若壯熱旬日不解神昏譫語斑疹當察其舌絳干光圓硬津涸液枯是寒從火化邪已入營矣用神犀丹治之甘露消毒丹方飛滑石十五兩淡黃芩十兩茵陳十一兩藿香四兩連翹四兩石菖蒲六兩白蔻仁四兩薄荷四兩木通五兩射干四兩川貝母五兩生曬研末每服三錢開水調下或神麵糊丸如彈子大開水化服亦可神犀丹方犀角尖六兩生地一斤熬膏香豆豉八兩熬膏連翹十兩黃芩六兩板藍根九兩銀花一斤金汁十兩元參七兩花粉四兩石菖蒲六兩紫草四兩即用生地香豉金汁搗丸每丸三錢重開水磨服二方活人甚眾時比之普濟消毒飲云雄按普濟解毒飲乃濕溫時疫之主方神犀丹乃溫熱暑疫之主方也若初病即覺神情躁亂而舌赤口乾者是溫暑直入營分酷熱之時陰虛之體及新產婦人最易患此急用神犀丹多可挽回切勿拘泥日數誤投別藥以致僨事兼治痘麻毒重挾帶紫斑及麻痘後餘毒內熾口糜咽腐目赤神煩瘲等症方中銀花有鮮者搗汁用尤良如無金汁可用人中黃四兩研入無板藍根以飛淨青黛代之燥喻嘉言治葉茂卿子出痘未大成漿其殼甚薄兩月後尚有著肉不脫者一夕腹痛大叫而絕令取梨汁入溫湯灌之少蘇頃復痛絕灌之又蘇遂以黃芩二兩煎湯和梨汁與服痛止令制膏子藥頻服不聽其後忽肚大無倫一夕痛叫小腸突出臍外五寸交組各二寸半如竹節壺頂狀莖物絞折長八九寸明亮如燈籠此實未經聞見以阿膠黃芩二味日進十餘劑三日後始得小水五日後水道清利臍收腫縮而愈門人駭問答曰夫人一身之氣全關於肺肺清則氣行肺濁則氣壅肺主皮毛痘不成漿肺熱而津不行也殼著於肉名曰甲錯甲錯者多生肺癰癰者壅也豈非肺氣壅而然歟腹痛叫絕者壅之甚也壅甚則並水道亦閉是以其氣橫行於臍中而小腸且為突出至於外腎弛長尤其剩事耳用黃芩阿膠清肺之熱潤肺之燥治其源也氣行而壅自通源清而流自清矣緣病已極中之極惟單味多用可以下行取效故立方甚平而奏功甚捷耳試以格物之學為子廣之凡禽畜之類有肺者有尿無肺者無尿故水道不利而成腫滿以清肺為急肺主通調水道又水出高原故謂之化源此義前人闡發不到後之以五苓五皮八正等方治水者總之未悟此旨至於車水放塘種種劫奪膀胱之劑則殺人之事矣可不審哉附兩儀膏方大生地一斤玉竹二斤水二十斤熬一時久取出搗爛再入水十斤熬至無味去楂合前汁熬膏入白蜜半斤收之加入生薑自然汁同熬亦好每服一匙開水調下大能潤燥補虛清心潤肺兼治消渴趙我完次子秋月肺氣不能下行兩足腫潰而小水全無肺氣敗者多此二症臍中之痛不可名狀以手揉左則痛攻於右揉右則痛攻於左當臍揉熨則滿臍俱痛叫喊不絕利水藥服數十劑不效用敷臍法及單服琥珀末兩許亦不效診時彌留已極無可救藥矣傷哉雄按觀此則感後餘熱在肺而為足腫者未可概視為氣復陰虛而投補血之藥也呂東莊治徽人江仲璉冒寒發熱火為寒邪所郁兩頷臃腫如升子大狀類雷頭風俗名豬頭風臂膊磊塊無數不食不便狂躁發渴診其脈浮數無序醫作傷寒發毒治呂曰誤矣此燥逐風生也用大劑疏肝益腎湯熟地加至三兩五劑而腫退便解十劑而熱除食進再用補中益氣湯加麥冬五味而痊陸肖愚治李安吾侄年十三大腸燥結不時脫肛鼻中結塊不時出血平日喜讀書病由辛苦而得每勞則發久治不效診之骨瘦如柴面紅身熱其脈細數曰此天稟火燥之症若破身後即成勞怯矣宜急治之戒厚味節誦讀庶可療也用天麥冬各一斤生地半斤人參四兩即加減三才膏也服一料其發甚稀至三料將一年全愈萬密齋治一女子年十四歲病驚風后右手大指次指屈而不能伸或用羌活防風天麻全蠍殭蠶蟬蛻諸風藥治之病益甚曰手足不隨血虛也伸而不能屈者筋弛長也屈而不能伸者筋短束也皆血虛不能養筋之症也手大指者太陰肺經之所主次指者陽明大腸之所主皆屬燥金此血燥之病也一切風藥助風生燥致血轉虛而病轉甚用黃耆人參天麥門冬生熟地黃當歸各等分官桂減半為引經橫行手指之端共為末蜜丸芡實大每一丸食後湯化下馬元儀治周君開病經一月口燥咽乾胸滿不能飲食二便俱閉診其脈虛而且澀此少陰客熱腎經虛燥也腎開竅於二陰腎陰既虧竅不滑澤所以二便俱閉少陰之脈循喉嚨挾舌本腎熱則經絡亦熱所以口燥咽乾腎者胃之關也關門不利胃氣亦為之阻所以胸滿不能飲食當用仲景豬膚湯治之夫豬水畜也其氣先入腎膚味鹹能解少陰客熱故以為君加白蜜以潤燥除煩白粉以補虛益氣二劑熱去燥除便調食進而愈薛立齋治周上舍脾胃虛服養胃湯枳朮丸初有效而久反虛口舌生瘡勞則愈盛服敗毒藥則嘔吐此中氣虛寒也以理中湯治之少愈更以補中益氣湯加半夏茯苓月餘而平夫養胃湯香燥之藥也若飲食停滯或寒滯中州服之則燥開胃氣宿滯消化少為近理使久服則津液愈燥胃氣愈虛況胃氣本虛而用之豈不反甚其病哉薛立齋治一人兩掌至秋皮厚皴裂起白屑內熱體倦此肝脾血燥故秋金用事之時而作用加味逍遙散加川芎熟地三十餘劑而愈再用六味丸加五味麥冬服之半載後手足指縫背腿腕皮厚色白搔之則木久服前藥方愈一婦人素晡熱月經不調先手心赤癢至秋兩掌皮厚皴裂時起白皮此皆肝脾血燥用加味逍遙散加荊芥鉤藤鉤川芎熟地五十餘劑又用歸脾湯二十餘劑乃服六味丸而不再發蔣仲芳治表弟婦韓貞女幼年守節勤孝清苦茹素誦經以故氣血素少面色不榮乙巳春忽冒風寒胸腹䐜脹入夏則胸脅刺痛背如負石百治無效至秋末冬初則覺腸細如線粒米入胃左盤右旋其行如飛窄滯異常痛苦難狀遇節氣則病劇診之右脈疾左脈澀曰疾者氣燥澀者血虛血虛則津液干而腸胃收小宜其窄澀也氣燥則其行速速則米粒不能安宜其如飛也遂用當歸五錢酒炮白芍二錢川芎一錢以補血為君惟其緊寬以七分腹皮惟其澀利以一錢滑石惟其干潤以二錢蘇子惟其疾緩以二分甘草四劑後諸病漸減至五六十劑榮氣始通膏子丸藥調養年餘方有起色火易思蘭治一婦人患渾身倦怠呵欠口乾飲冷一月不食強之食數粒而已有以血虛治之者有以氣弱治之者有知為火而不知火之原者用藥雜亂愈治愈病自夏至冬覺微瘥次年夏諸病復作甚於前肌消骨露診得三焦脈洪大侵上脾肺二脈微沉余皆和平曰此肺火病也以梔子湯飲之梔子湯用山梔仁薑汁浸一宿曬乾炒黑研極細末用人參二分麥冬一錢烏梅二個沖湯調梔仁末二茶匙服進二服即知飢而喜食旬月氣體充實如常後因久病不孕眾皆以為血虛而用參耆為君大補之劑胸膈飽脹飲食頓減至三月餘經始通下黑穢不堪或行或止不得通利治以順氣養榮湯十劑順氣養榮湯當歸八分南芎六分生地一錢二分酒炒白芍一錢陳皮六分甘草五分醋炒香附一錢烏藥五分薑汁炒山梔五分蘇梗五分酒炒黃芩八分枳殼五分青皮五分因大便燥結加黃芩枳殼煎服一月內即有孕夫火與氣不兩立怠倦者火耗其精神也呵欠者火鬱而不伸也其夫曰荊人之恙自處子時至今二十載矣百治不效君獨以火治而效何也曰尊壺之脈左三部和平無恙惟右寸微沉右尺洪大侵上此三焦之火升上而侮金也口乾飲冷者火熾於上也飲食不進者火格於中也肌消骨露者火氣消爍也不治其火血氣何由而平故用黑梔去三焦屈曲之火人參麥冬收肺中不足之金烏梅酸以收之火勢既降金體自堅矣至經水過期而多其色紅紫肝脈有力乃氣滯血實也用參耆補之則氣愈滯血愈實安能得孕故以調氣為主佐以養血氣順血行經事依期而妊娠有準矣前以降火為先今以調氣為主治法不同病源則一蓋氣有餘即是火其病歸於氣鬱而已鬱氣一舒火邪自退得其病本斯隨手取效也孫文垣治孫君錫頭痛胸背脹飲食下膈即吐諸逆衝上皆屬於火咳嗽不住口痰濁如膿大便燥結脈之右寸獨洪大皆金受火克之候以二陳湯加竹茹滑石石膏黃連麥冬連進四劑夜與益元散兼服益元能清六腑之火然不宜於大便燥結之人嗽吐俱止惟痰濁如膿色且腥氣觸人此將作肺癰改用丹皮麥冬山梔甘草貝母枳殼桑白皮紫菀知母當歸生地桔梗四劑全愈易思蘭治一士人素眈詩文夜分忘寢勞神過度忽身熱煩渴自汗惡寒四肢微冷飲食少減初以為外感先發散後和解不應又用補中益氣湯加參二錢逾月諸症仍前一日午後忽發熱耳聾不知人事恍惚譫語或謂少陽症也宜小柴胡和之易診之六脈皆洪大而無力曰非少陽症乃勞神過度虛火症也不信遂以小柴胡去半夏加花粉知母易謂服此必熱愈甚當有如狂症作已而胸如火炙刀刺發狂欲走飲冷水一盞始定復求治以人乳並人參湯與之當日進四服濃睡四五時病減半次日又進四服六脈歸經沉細有力終夜安寐諸症悉退或曰是症人謂傷寒公作虛火何也曰傷寒自表達里六日傳遍經絡復傳至二十一日外雖有餘症亦從雜病論今病已二月豈可以傷寒論乎況少陽之脈弦長有力今浮洪滿指而無力豈少陽脈乎蓋平日勞神過分心血久虧脾肝亦損陽氣獨盛氣即火也經云壯火食氣火與元氣不兩立於是水涸火勝之病作矣傷寒云乎哉夫小柴胡乃治少陽實症今陰虛病而以此瀉之則元氣愈虧陰火愈熾故知其當發狂也又補中益氣湯補陽者也陰虛而補陽陽愈盛而陰愈虛所以不效今用人乳者以真血補真水又以人參導引散於諸經以濟其火與他藥不同故見效尤速也龔子才治管藩相夫人每至半夜不睡口乾煩渴吐黏痰必欲茶水漱口舌上赤黑皮厚胸痞嘈雜飲食少思脈之兩寸洪數兩尺空虛右氣口盛此上盛下虛血虛氣鬱而有火也以四物湯加生地黃連麥冬知母貝母花粉元參梔子桔梗枳實青皮甘草數劑奏功又以六味丸加生地麥冬知母元參花粉貝母五味黃連一料全安陳三農治一士人素好滋補之劑久之致口舌乾燥腦後作痛神思不爽飲食減少食肉則瀉六脈實大作實火治以知柏連梔赤芍甘草一劑而胸次爽豁痛瀉俱止再劑飲食倍加精神頓長諸症悉愈書此以為無病好補之戒陸養愚治董龍山妾每小腹氣上衝則熱壅頭面臥不能寐身戰慄日中發熱無常至四鼓五鼓其熱更甚熱時腹中有塊升起經期參前而淋漓數日飲食過於平時而肌肉消瘦或作陰虛發熱治之數月不效脈之數而弦左尺為甚曰此肝膽病也膽主決斷謀慮不決則木氣鬱而成火故於少陽初動之時其熱更甚也因膽之氣既鬱而成火則肝之血亦滯而成瘕瘕非血不聚非火不升今塊之上升熱之上壅即經所謂諸逆衝上皆屬於火也第初病止在無形之氣但調其氣而火自息今兼在有形之血必先去瘀令有形消而無形可調也適在經行之際乃以女金丹連服去瘀塊甚多後以達氣養榮湯盡其舊以生其新數劑諸症漸愈再用檳榔加人參數劑而肌肉漸長矣張路玉治張太史虛火症精氣下脫虛火上逆怔忡失血脈之右關氣口獨顯弦象左尺微數余皆微細搏指蓋陰火內伏也緣勞心太過精氣滑脫加以怵惕恐懼怔忡驚悸醫峻用人參桂附初稍可交春復劇如前仍用參附導火歸元固斂精氣之藥轉劇凡陰虛病初服桂附有小效久服則陰竭而脫余目擊者十人矣稍用心則心系牽引掣痛痛連脊骨對心處或時病引膺脅或時顛頂如掀或時臂股爪甲皆隱隱作痛怔忡之狀如碓杵如繩牽如簸物如繃絹如以竹擊空控引頭中如失腦髓夢寐不寧達旦倦怠睡去便欲失精精去則神魂飛越觀其氣色鮮澤言談亹亹總屬真元下脫虛陽上擾之候其人本病三陰虛損誤以參附熱補遂致變症峰起細推脈症其初雖屬陽氣虛脫著此一語便於此道未徹而過餌辛溫之劑致陽亢而反耗真陰當此急而轉關以救垂絕之陰庶可挽回前過為疏二方煎用保元合四君丸用六味合生脈此時卻用二地二冬沙參杞子少加川連蔞仁養陰兼解鬱之法俟元氣大復然後議補乃為合法六味生脈留為後勁若保元四君則仍魯衛之政耳服及兩月諸症稍平但倦怠力微因自檢方書得補中益氣湯為夏月當用之劑於中加入桂附二味一啜即喉痛聲喑用補中益氣者宜著眼復邀診見其面顏精彩聲音忽喑莫解其故詢之知為升柴桂附擾動虛陽所致即以前方倍生脈服之半月後聲音漸復日漸向安但衣被過暖便咽乾痰結稍涼則背微惡寒或熱飲則大汗時怔忡走精此皆宿昔過用桂附內伏之熱所致也適石門董某謂其伏火未清非芩連不能解散自仲春至初夏純服苦寒亦大庸手初甚覺爽朗至初夏反覺精神散亂氣不收攝後仍用六味合生脈經歲服之以化桂附餘毒云雄按此真閱歷之言三十年來余見不知若干人矣其奈世人之不悔悟何內翰孟端士之母虛火不時上升自汗不止心神恍惚欲食不能食欲臥不能臥口苦小便難溺則灑淅頭暈凡醫每用一藥輒增一病用白朮則窒塞脹滿用橘皮則喘息怔忡用遠志則煩擾哄熱用木香則腹熱咽乾用黃耆則迷悶不食用枳殼則喘咳氣乏用門冬則小便不禁用肉桂則顱脹咳逆用補骨脂則後重燥結用知柏則小腹枯癟用芩梔則臍下引急用香薷則耳鳴目眩時時欲人扶掖而走用大黃則臍下築築少腹愈覺收引遂畏藥如蠍惟日用人參錢許入粥飲和服聊藉支撐交春虛火倍劇火氣一升則周身大汗神氣駸駸欲脫惟倦極少寐則汗不出而神氣稍寧覺後少頃火氣復升汗亦隨至較之盜汗迥殊診之其脈微數而左尺與左寸倍於他部氣口按之似有似無此本平時思慮傷脾脾陰受困而厥陽之火盡歸於心擾其百脈致病病名百合此症惟仲景金匱言之甚詳原云諸藥不能治所以每服一藥輒增一病惟百合地黃湯為之專藥奈病久中氣虧乏復經藥誤而成壞病姑用生脈散加百合茯苓龍齒以安其神稍兼茱連以折其勢數劑少安即令勿藥以養胃氣但令日用鮮百合煮湯服之交秋天氣下降火氣漸伏可保無虞迨至仲秋果勿藥而愈喻嘉言治吳添官因母久病初愈自患腹痛徹夜叫喊不絕小水全無知為火鬱之病以茱連加元胡索投之始安又因傷食反復病至二十餘日肌肉瘦削眼胞下陷適遭家難症變壯熱目紅腮腫全似外感有餘之候知其為激動真火上焚令服六味加知柏二十餘劑其火始退後遍身瘡痍黃腫燥火反類熱腹中急欲得食不能少耐片時鎮日哭煩臟燥者多哭泣慰之曰旬日後腹稍充氣稍固即不哭煩矣服二冬膏而全瘳朱丹溪治一人小腹下常唧唧如蟹聲作陰火處治用敗龜板用酥炙鹽酒炙亦得側柏用酒九蒸九焙黃柏知母俱酒炒川芎酒製當歸酒浸上各等分酒糊丸每服八十丸淡鹽湯送下陸祖愚治陳符卿夫人素有痰火症每遇經行一日覺澀滯二日即洶湧三日大下如崩昏暈幾絕嘗善怒發即咽喉乾燥氣出如火痰湧胸塞不能轉舒其平日辛燥之品如陳枳前術及芎歸之類稍用即暈眩氣絕不足以息及寒涼稍過即大便作泄病作時日進粥數十碗不覺飽脈之左三部弦細而駛右脈數而稍充曰此血虛甚故狂火偏旺如此而氣原非有餘也此時養血則血一時不能充補氣則浮火無由熄莫若分上下為治入人參於滋陰藥中為丸引陽入陰以扶生氣之原所以治其本也再用清涼以為煎劑助陰抑陽以制浮游之火所以治其標也煎丸間服而愈丸方人參二地二冬知柏阿膠杜仲煎方花粉元參二母芩苓地芍麥冬甘草燈心隨症加減如精神困倦略加人參如咽喉火盛加黃連或炒山梔連翹如有痰或胸膈痞滿加山楂蔞仁去地黃麥冬甘草如清涼太過脾氣受傷則去苦寒加山藥木通澤瀉炙草人參如遇經水將行亦忌苦寒惟活血補血為主如氣滯小腹或脹或痛加丹皮山楂丹參甚則加元胡少許如月水去多腰脅骨節痠痛用生熟地杜仲續斷山萸白芍丹參黑荊芥阿膠童便或經行不止倍阿膠並炒黑蒲黃經畢仍大補血分此調理之梗概也夫天地之間陽常有餘陰常不足人身之中氣常有餘血常不足氣有餘便是火血不足則陰虛三十以前精神氣血日漸旺盛三十以後日漸衰微語曰陰陽水火猶權衡也一高則一下一盛則一衰又曰火與元氣不兩立故凡火盛之症必先陰虛而後元氣亦弱也朱丹溪治一人夜間發熱早晨退五心煩熱無休六脈沉數此鬱火也用升陽散火湯熱退以四物加知柏佐以乾薑調理而安東垣治一人惡熱目赤煩渴引飲脈七八至按之則散此無根之火也用薑附加人參服之愈劉彥純治一人不能食而熱自汗氣短不食而熱脾陰弱也自汗氣短肺氣虛也以甘寒之劑補氣瀉火而安琇按治法只從壯火食氣四字得之薛立齋治一婦人口苦脅脹此肝火之症也用小柴胡加山梔黃連少愈更以四君子加白芍當歸柴胡補脾胃而痊一婦人每怒口苦發熱晡熱此肝火盛而血傷也以小柴胡合四物湯二劑以清火而生血更以四物加柴胡白朮茯苓丹皮生血健脾而愈薛立齋治一婦人每怒則口苦兼辣胸痛脅脹乳內或時如刺此肝肺之火也用小柴胡加山梔青皮芎歸桑皮而安後又勞怒口復苦經水頓至此血得熱而妄行用四物加炒芩炒梔膽草一劑而血止更以加味逍遙散而愈張路玉治徐君玉素稟陰虛多火且有脾約便血症十月間患冬溫發熱咽痛里醫用麻杏橘半枳實之屬遂喘逆倚息不得臥聲颯如啞頭面赤熱手足逆冷右手寸關虛大微數此熱傷手太陰氣分也與葳蕤甘草等藥不應為制豬膚湯一甌命隔湯頓熱不時挑服三日聲清終劑病如失朱丹溪治施卜年四十因炙火太多病腸內下血糞肚痛今痛自止善嘔清水食不下宜清胃口之熱黃芩甘草茯神各五分陳皮地黃各一錢連翹白朮各一錢五分生薑三片楊乘六治姚又曾病感症二字在此案卻不必泥外涼內熱肢冷口渴痞悶昏沉語言譫妄不食不便婦人產後血虛火盛者尤多此症不必有所感也醫作肝經鬱火治用逍遙加生地薄荷兩劑益煩躁不安脈沉伏按之至骨則細數有加面黑滯舌黃燥乃火遏陽明胃陰不能充拓所以脈與症皆內顯陽徵外呈陰象也或問症既火遏法宜疏散乃服前劑轉劇何也曰逍遙中柴胡薄荷風藥也單走肝膽若陽明病用之則火得風而益熾矣第用左歸飲去茯苓以滋胃陰加生地當歸以清胃火症自平耳如言病減數劑而痊後數年病復如前醫見身涼脈細用左歸飲加附子則神亂氣昏狂擾不寧即前方去附子加花粉一劑而安乃去花粉數劑而愈龔子才治一人頭痛發熱眩暈喘急痰涎湧盛小便頻數口乾引飲遍舌生刺縮斂如荔枝下唇焦裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼茶少解已瀕於死脈洪大無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補脈證如此何所見而斷為腎經虛火既用十全大補獲效則脈證間自必確有憑據乃並不明言其故豈不貽誤後人耶加山萸澤瀉丹皮山藥麥冬五味附子服一盅必須冷服熟睡良久脈症略減三四再以八味丸服之諸症悉退後戒冷物而痊薛立齋治李閣老序庵有門生饋坎離丸喜而服之曰前丸乃黃柏知母恐非所宜服者內經有云壯火食氣少火生氣今公之肝腎二脈數而無力宜滋化源不宜瀉火傷氣也不信服將兩月脾氣漸弱發熱愈甚小便澀滯兩拗腫痛公以為瘡毒曰此肝腎二經虧損虛火所致耳當滋補二經為善遂朝用補中益氣湯夕用六味地黃丸諸症悉愈嘗見脾胃虛弱肝腎陰虛而發熱者悉服十味固本丸與黃柏知母之類反泄真陽令人無子可不慎哉一男子口舌糜爛津液短少眼目赤小便數痰涎壅盛腳膝無力或冷或午後腳熱勞而愈盛數年不愈服加減八味丸而痊一男子咳嗽喘急發熱煩躁面赤咽痛脈洪大用黃連解毒湯二劑少退更以梔子湯四劑而愈蔣仲芳治楚中一商性急而嗜煙閱三日五心發熱咳嗽大作百藥不愈診之六脈俱洪火症也莫非煙毒乎其人亦悟曰吸菸則嗽愈甚遂以麥冬知母山梔花粉黃芩蘇子甘草蔞仁枇杷葉煎成去渣入砂糖一兩和服四劑而愈此無外感而火熱傷津之嗽故治法如此聶久吾曰子稟素弱神雖強而精弱脾腎兩虛即節欲猶然二十前後常服參術等補脾僅免於病至三十後脾胃稍可頗覺上膈有熱時齒痛口舌痛每服清上藥輒愈亦不為大害也至乙未春夏自察脈覺兩尺弱而寸關亦不旺疑下虛水不能制火宜補下滋水以制之若但清上非治本也商之饒姓老醫亦以為然遂以人參當歸熟地茯苓五味酸棗肉巴戟故紙肉蓯蓉鹿膠仙茅遠志棗仁天麥冬枸杞菟絲之類以山藥末酒糊為丸服至二三月上膈虛火盡除口齒等病不復作自後滋補丸藥服無虛日迄今二十餘年無虛火者滋水制火之功也可與虛門黃履素案合參
