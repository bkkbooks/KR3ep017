body:
  text: 卷二十二蠱有人行蠱毒以病人若欲知其姓名者以敗鼓皮燒作末飲服方寸匕須臾自呼蠱家姓名可語之令呼喚將去則愈治之亦有方醫學綱目干寶外姊夫蔣士先得疾下血言中蠱家人密以囊荷置其席下士先忽大笑曰蠱我者張小也乃收小小至並令解之士先獲瘳世以此物為治蠱之良方蘘音穰蘘荷草名本草無本草通志略出閩槦梅師方云凡中蠱毒或下血如鵝肝或吐血或心腹切痛如有物咬不即治之食人五臟即死欲知是蠱但令病人吐水沉者是浮者非也用敗鼓皮燒灰服方寸匕須臾自呼蠱主姓名本草綱目夷方有蠱毒之害須袖中嘗帶當歸遇飲食訖即咀嚼少許若有毒則即時嘔吐無不安然矣漱石閒談生甘草五錢煎汁半杯溫飲之入咽即吐初中蠱毒入腹未久其蟲未生得吐即出矣如恐未盡再煎五錢服之加麻黃半盞更妙食不輟醋蠱不入肚又肘後方云馬兜鈴藤能逐蠱從小便出用至十兩水一斗酒二升煮三升分三服不瘥更服上人呼為三百兩銀藥大蜘蛛一個研爛生蜂蜜半盞和服蠱畏蜘蛛故用蜘蛛治蠱而蜘蛛有毒又用蜂蜜制之此方獨治金蠶蠱蠱毒在上則服升麻吐之在腹服鬱金下之或合升麻鬱金服之不吐即下李侍郎燾初為雷郡推官鞠獄得此方活人甚多範石湖集新州郡境有藥人呼為吉財解諸毒及蠱神用無比昔人有嘗至雷州途中遇毒而貌頗異自謂即斃得吉財數寸飲之一吐而愈俗云昔有遇毒者其奴吉財得是藥因以奴名名之實草根也類芍藥凡人遇毒夜中潛取二三寸或銼或磨少加甘草詰旦煎飲之得吐即愈俗傳將服是藥不欲顯言故曰潛取或云昔有里媼病蠱其子為小胥邑宰命以吉財飲之暮乃具藥及旦其母謂曰吾夢人告我若飲是且死亟去之即僕於地其子又告縣尹縣尹固令飲之果愈豈中蠱者亦有神若二堅哉投荒雜録吉利草類石斛根類芍藥吳黃武中李俁以罪徙合浦入境遇蠱其奴吉利取此草解之遂以為名即前之吉財也常撫軍安己酉歲秉鉞西臬讞案有為蠱斃命者獄已定因檢卷閲之緣養蠱婦女覘富室貿易遠歸知其必攜財倩鄰媼詣其家初作問候狀後乘機藏蠱於指彈之立斃事主疑而執之送諸官究得其實據供婦女初嫁時已隨附十九蠱嫁後與伊夫又害六人後增至二十五蠱矣其所害六人施察出確證者三挖土得尸骸者二其一即犯事之家豫怪之而未信次日提婦女復親鞫之歷歷不諱因令呈所養蠱視之出初一竹筒空然無所有女稟法堂聽政之所邪祟不敢入必咒祭司戶而後可如是則果現乃蠕蠕赤蠱耳遂令以足踐踏之泥水吏曰卻未滅令婦女呼之蠱仍在筒中依然如前數於是訪所以絶之法用石函入蠱蟲封以印紙投於江蠱乃滅蓋蠱之為害甚毒有謂刺蝟能捕蠱蟲使無遺匿殊不知蠱之為類不一其最毒者雖刀斷石碎火焚土埋而蠱依然不滅依附婦女中人立死死後財物為蠱搬運以利養蠱者每害一人則增一蠱或云其人被害魄即附而為蠱宦遊筆記雄按雖非醫案足廣見聞陳自明云兩廣山谷間有草曰胡蔓又曰斷腸亦有感蛇毒致生惡菌名為定年藥有淫婦與北人交好者別時陰以藥置飲食中仍解之曰子必某時來若依期而至彼復以藥解之若過期不往必死故謂之定年藥如服神仙追毒丸一粒其病即瘥五倍子三兩山茨菰二兩麝香三錢千金子去油一兩紅芽大戟一兩半各為末用糯米煮濃飲為丸分為四十粒每服一粒用井花水或薄荷湯磨服利一二次用粥止之此丸能解一切毒一名太乙丹紫金丹一名神仙太乙丹一名玉樞丹又名神仙解毒萬病丹宜於端午重陽七夕合之須潔淨之所尤忌一切衝犯雄按胡蔓又名野葛又名雷公藤浙東亦有之土人用以殺菜蟲遂呼為蟲藥余在婺每聞輕生者服之輒死獄訟頻興禁之不止似比定年藥之毒尤烈也蛇菌殺人亦速恐蟲藥非此二物所造然皆可以玉樞丹救之諸蟲賈誼新書云楚惠王食寒葅得蛭恐監食當死遂吞之腹有疾而不能食令尹曰天道無親惟德是輔王有仁德病不為傷王病果愈王充論衡云蛭乃食血之蟲楚王殆有積血之病故食蛭而病愈也陶弘景曰楚王食寒葅見蛭食之果能去結積雖曰陰祐亦是物性兼然本草綱目唐時京盛醫人吳元禎治一婦人從夫南京還曾誤食一蟲常疑之由是致疾頻治不減請吳醫之吳揣知所患乃擇主人姨奶中謹密一人預戒之曰今以藥探吐以盆盂盛之當吐時但言有一小蝦蟆走去然切不可令病人知之是誑紿也奶僕如約此疾頃除北夢瑣言元載不飲酒人強之辭以鼻聞酒氣即醉人謂可治取針挑載鼻尖出一小青蟲曰此猶魔也聞酒即畏之去此無患是日載酒一斗五日倍之清賞録孫兆治向大王宮中有一宮人七太尉所寵也忽患一疾凡噁心則吐蟲數條後仍頻作七太尉甚愍之纍治不瘥每用殺蟲藥則吐蟲愈多諸醫殆遍召孫診之孫曰六脈皆細非蟲脈也今雖吐出乃臟寒而蟲不安移居上膈因而吐出復用殺蟲之藥為藥所苦不能自安所以吐出愈多也孫遂用藥不三五錢皆一色丸子蟲遂不吐明日再召孫至六脈漸大進前藥其病不作後求方乃硫黃附子各一兩並末糯米糊為丸每三十丸米飲下綱目此張景嶽治蟲用溫臟丸之藍本也但大寒大熱蟲俱不安亦未可執一竇材治一婦人病腹脹諸藥不效令解腹視之其皮黃色光如鏡面乃蟯瘕也先炙牛肉一片令食後用生麻油調輕粉五分服之取下下蟯蟲一合如線如須狀後服安蟲散而愈張子和曰汴梁諸匠氏有木匠趙作頭鐵匠杜作頭行次失路迷至大宅乞宿主人不納曰家中有人重病不敢納君杜作頭紿曰此趙公乃汴梁太醫之家今蒙上司見召迷路至此蓋病者當愈而遇此公也主人然而入良久復出將邀二人入室與之食已主人起請曰煩太醫看病何如趙見而笑曰一藥可愈二人竊議曰來時所攜熟藥寄他車上此中實無奈何杜曰此甚易耳潛出門得牛糞一塊作三十粒下以溫水少頃病人覺胸中如蟲行一湧而出狀若小蜣蜋一二升以手探之又約一升頓覺病去明日主人出謝曰百歲老人未嘗見此神效之藥也禮餞二人遂歸此二子小人也欲苟一時之宿遂以穢物治人亦偶得吐法耳周漢卿治武城人病胃痛奮擲乞死漢卿納藥於鼻俄噴赤蟲寸許口眼悉具痛旋止明史鍾大延治一僧嗜鹽每食斤許衆醫雖知為蟲然服藥輒痛悶欲絶大延曰是蟲不受藥也當有以餌之以鹽筍乾用藥煮仍加以鹽令服越數日果嘔蟲數斤許而愈寧波府志雄按此則誘之以所好也治病皆宜如此而治蟲尤宜李明甫東陽人善醫尤妙針法義烏令病心痛垂死明甫視之曰有蟲在肺下藥所不及惟砭乃可然非易也謬謂於背上點穴密取水以噀之令方驚而針已入曰蟲已死矣既而腹大痛下黑水數升蟲亦去遂愈兩淅名賢録尹蓬頭者傳稱騎鐵鶴仙蓋異人也一貴人閨女弱病形容俱變醫人束手無藥可愈母鐘愛不能捨偶邀視之曰有癆蟲尚可醫請用何藥曰藥力不能治只消與我同宿一夜便好也母信其仙術決無戲言白之於父父大怒云胡說豈有公侯家女與一風道士同宿之理後見女殊無生意母又涕泣言之懇切不已從之尹令紙糊一室室不許留孔設一榻不用障令女去其袒衣用手摩足心極熱如火抵女陰戶東西而睡戒女云喉中有蟲出可急叫我女不能閣眼而尹鼻息如雷天將明女報蟲從口中飛出尹四顧覓之不見曰從何處鑽去不能除根定要害一人也蓋乳母不放心因開一孔窺之蟲出女口已入乳母之腹也天明父母視之女之顏色已變尹大笑而去後數月女方擇壻而乳母死矣續金陵瑣事馮益齊給諫每發言腹中輒有聲應之此應聲蟲病也遂告病卜居南京楊守極用小藍煎飲之即吐出其蟲續金陵瑣事郭茂倩嫂金華君産七日不食始言頭痛頭痛已又心痛作即而目睛痛如割如刺更作更止相去無瞬息間每頭痛甚欲取大石壓良久漸定心痛作則以十指抓壁血流滿掌痛定目復痛又以兩手自剜取之如是十日不已衆醫無計進黑龍丹半粒疾少間中夜再服下瞑目寢如平昔至平旦下一行約三升許如蝗蟲子疾減半巳刻又行如前則霍然頓愈矣綱目孫文垣治一婦人心痛唇紅痛則大發熱頭痛少頃出汗脈大小不一蟲脈曰此蟲痛之症痛吐白沫可徵也凡心腹痛而唇紅吐白沫者多屬蟲症檳榔川椒各二錢杏仁一錢五分石菖蒲一錢烏梅七個太多炮薑草豆仁陳皮各五分山梔一錢一劑痛減半再服痛全愈閔蜃樓乃政體肥性躁患痛風手不能櫛沐足不能步履痛處略腫呻吟喊叫此風木生蟲也凡治七越月不減孫診之曰濕痰凝滯經絡作痛也猜錯了醫作血虛投以補劑宜其不愈乃用二陳湯加烏藥葉蒼朮殭蠶海桐皮南星服至六帖遂不肯藥強之曰醫以療痛今反加痛吾何藥焉時巳申刻知其驕蹇性成亦不再強改以芫花醋炒過三分海金沙一錢為末白湯調下仿更衣丸意至晚瀉一次下稠痰半盞足痛減大半稍能動止初更後忽腹中大痛促進診行至後堂家人出曰病者卒矣曰此必痛厥非竟死也臨症者不可不知且視之至則冷汗淋漓兀坐溺器面青息斷診之手冷如冰六脈俱在但沉伏耳知為痛極使然用薑湯灌之乃蘇徐語侍女適來腹中痛甚火氣迸出肛門如焚大響一聲不知瀉下何物視之乃血鰍一條長六寸余鱗目悉具尚能遊動衆問如何曰此蛔物也得下幸耳但此劑實為行痰初不如其有蟲如是蓋芫花乃殺蟲之品故偶中亦疾人之福也次日手足皆能動仍以二陳湯加苡仁紅花五加皮四帖脫然雄按病變萬端病機百出天下事莫難於醫葉潤齊年近四十心膈嘈雜好啖肉尤好啖雞一日不可缺缺即身浮力倦神魂無措必急得乃大嚼入腹腹又大痛痛極則吐酸水稠涎然後稍定少頃又思啖矣其痛苦之態喊叫之聲聞見酸鼻而彼則甘心焉或勸其勿啖肉謂久病脾虛肉入難化故作楚也曰吾豈不知蓋痛甚苦尚能熬若嘈雜則遍身淫淫蘇蘇左右無可奈何手足無所把捉頃刻不能自存有逾於死也孫診之六脈大小不等觀其色唇紅面黃曰據色脈乃蟲病也先與雄黃丸一服以膩粉五分使君子末一錢用雞子打餅五更空心飼之方可録辰下長蟯十條內有二大者長足有咫自首貫尾皆紅下午又下小蟲百餘自此不嗜肉而嘈雜良愈龔子才治一婦年四旬心胃刺痛時痛時止蟲痛不思飲食食即吐手足厥冷胸中痞悶口乾作渴曰此胃中有蟲也以二陳湯加檳榔枳實烏梅花椒黑薑苦楝根皮生薑煎一服下蟲一大碗而愈孫一奎在吳下時有吳生談震者博雅士也一日偶談及鼓脹吳乃詰豫曰鼓有蟲否乎豫卒不敢應俯思久之對曰或有之本事方云臍腹四肢悉腫者為水只腹脹而四肢不腫者為蠱注曰蠱即鼓脹也由是參之古人曾以鼓蠱同名矣且蠱以三蟲為首豈無旨哉蓋鼓脹即今雲氣虛中滿是也以其外堅中空有似於鼓故以名之彼蠱症者中實有物積聚既久理或有之吳曰子誠敏也豫堂嫂病鼓三載腹大如箕時或脹痛四肢瘦削三吳名劑歷嘗不瘳吳俗死者多用火葬燒至腹忽響聲如炮人皆駭然乃見蟲從腹中爆出高三丈許燒所之天為昏俄爾墜地細視之皆蛔也不下千萬數大者長尺余蟲腹中復生小蟲多者十五六條蟲在人腹中蕃息如此曷不令人脹而死哉惜諸書未有言及者豫後至淮陰有王卿官者其子年十六新娶後腹脹大按之有塊形如稍瓜發熱晝夜不退已年半矣醫惟以發熱消脹之劑投之其脹愈甚喉中兩耳俱瘡診其脈滑數望其唇則紅其腹則痛又多嗜肥甘腹痛而唇紅好啖者皆屬蟲因思凡腹痛者唇色必淡不嗜飲食今其若此得非蟲乎遂與阿魏積氣丸服之下蟲數十大者數條小者亦三四條蟲下則熱漸減腹漸消三下而愈益信前聞之不虛也景嶽全書雄按前條龔氏案不思飲食亦蟲證也病情變幻莫執一端李士材治侯給諫腹中嘈痛按其左肱手不可近凡飲食到口喉間若有一物接之者然曰脈大而數腹痛嘔涎面色萎黃此虛而有濕濕熱相兼蟲乃生焉當用人參湯送檳榔丸以下蟲積蟲若不去雖服補湯竟何益乎病家畏謹之甚不敢輕投終莫能起何不改用平善殺蟲之劑張遠公三年久嗽服藥無效委命待盡姑乞診之問曰飢時胸中痛否曰大痛視其上唇白點如粞者十餘處此蟲齧其肺也用百部膏一味加烏梅檳榔與服不十日而痛若失咳頓止令其家人從淨桶中覓之有寸白蟲四十餘條自此永不復發立齊案云上唇白點蟲蝕上部下唇白點蟲蝕下部王海藏云有楊時者因患風氣衝心飲食吐逆遍身枯瘦日服萬病紫菀丸至二十日瀉出肉塊蝦蟆五六枚白膿二升愈又趙侍郎先食後吐目無所見耳無所聞亦服萬病紫菀丸瀉出青蛇五七條下惡膿三四升方愈紫菀丸即厚朴丸加羌活獨活防風是也厚朴蜀椒川烏頭紫菀吳茱萸菖蒲柴胡桔梗茯苓官桂皂角乾薑人參黃連巴豆霜雄按必有的實證據始可投之益昌伶人劉清嘯昵一娼名曰花翠年逾笄病好食生米否則終日不樂至憔悴萎黃不思飲食惠民局監趙尹用蒼朮米泔水浸一夜銼焙為末蒸餅丸梧子大每服五十丸食前米飲下日三服兩旬而愈蓋生米留滯腸胃受濕則谷不磨至生蟲蒼朮能去濕溫消穀也楊氏藏經驗本草綱目戴元禮奉太祖命往治燕王患瘕見他醫所用藥良是念何以不效乃問王何嗜曰嗜生芹元禮曰得之矣投一劑夜暴下皆細蝗也明史葛可久治一人患腹痛脈之謂其家曰腹有肉龜視熟寐吾針之勿令患者知知則龜藏矣患者問故家人誑曰醫云寒氣凝結多飲醇酒自散矣患者喜引觴劇飲沉酣而臥家人亟報葛以針刺其患處病者驚寤俾以藥餌須萸有物下儼如龜形厥首有穴蓋針所中也病遂愈黃日升蓬窗類記雄按俟寐而針固是治法至於一診而知其為龜一針而恰中龜首未免神其說矣杭州府通判王某河間人病腹脹服藥不效夢人語云鬼蒺藜可治王覓取煎飲飲之痛不可忍俄頃洞泄迸出一蟲長丈餘尋愈覽余漫抄山野人好齧蝨在腹生蟲為蝨症用敗梳敗篦各一枚各破作兩分以一分燒研以一分用水五升煮取一升調服即下出張路玉曰近有女子咳逆腹痛後忽喜呼叫初是呀呷連聲漸至咿唔不已變易不常或如母雞聲或如水哇鳴或如舟人打號每作數十聲日發十餘次忍之則胸中悶悶不安此為叫蟲即應聲蟲之類也復有一人忽發熱痞滿後常兀兀欲吐吐中必有蟲數枚狀如蝦形跳躍不已諸治不應或令服銅緑湧之不過二三度遂絶不復見矣黃履素曰人陰毛中生蝨名八角子貼伏毛根最癢惱人相傳此蟲不醫延及頭髦眉毛其人當死治法以生銀杏搗爛敷合毛上隔宿其蟲盡死有少年曾患此此法神效有友為豫言生此蟲者運會將否之兆豫患此之後抱病十餘年備嘗苦楚其言果驗蟲之類能入耳者不獨蚰蜒凡蟲皆然有人患腦痛為蟲所食或教以桃葉作枕一夕蟲自鼻出形如甕嘴人莫能識其名脀齊聞覓有人患腳瘡冬月頓然無事夏月臭爛痛不可言遇一道人云爾因行草上惹蛇交遺瀝瘡中有蛇兒冬伏夏出故也以生蝦蟆搗敷之日三換凡三日一小蛇自瘡中出以鐵鉗取之其病遂愈托青集說醫說至順辛未上埠一婦人就山林中探筍歸覺手黏如飴一時不暇洗盥既剝筍殼又以齒齧之由是成症産蛇而死蓋受蛇遺之毒也靜齊至止直記孔行素張子和治酒官楊仲臣病必氣痛此人常好飲酒初飲三二杯必奔走跛懶兩足三五十次其酒稍散方能復席飲至前量一醉必五七次至明嘔青黃水數日後變魚腥臭六七日始安張曰宜湧乃吐蟲一條赤黃色長六七寸口目鼻皆全兩目膜䐽狀如蛇類以鹽淹干示人張子和曰豫昔過夏邑西有婦人病脹如鼓飲食乍進乍退寒熱更作而時嘔吐且三年矣巫覡符咒無所不至惟俟一死會十月農隙田夫聚獵一犬殺死磔於大樹根盤遺腥在其上病婦偶至樹根頓覺昏憒眩瞀不知人枕於根側口中蟲出其狀如蛇口眼皆具以舌舐其遺腥其人驚見長蛇兩袖裹其手按蟲頭極力出之且兩尺余重幾斤剖而視之以示諸人其婦遂愈蟲亦無名此正與華元化治法同亦偶中吐法耳小校畢聯元偃師人忽得奇疾左股痛不可忍呻吟纍日有僧詣門乞食問其所苦曰此肉鰻也早治可活今病深矣因刺其膝出小蛇十餘條僧持之余逾數日蛇復湧出竟死焉三岡識略陸肖愚治陳曙光患飢必食肉方解否則遍腹淫走身體如在空中每食肉初一臠必滿心如箭攢作痛至數臠方定少則頻飢多則不能克化而作瀉醫治半年飢削骨立脈之六部皆弱而浮沉大小遲數不等面黃而帶青紋曰此患蟲也可立拯之令購使君子肉半斤豬精肉半斤同煮俟肉極熟去使君子入膩粉一錢令連汁頓食之初食亦如箭攢食後半日不飢至五更下盆許皆蟲有全者有半爛者間有活動者宿疾頓除乃以參苓白朮等調理禁其一年勿食肉遂全安浦南一人少時每向溪邊執蚌三旬外患腸痛痛時幾不欲生發必三四日偶一僧過其門聞其叫號出藥七丸大如菜子用白湯送下少頃下蟲二三十作紅白色其形如蚌旋愈後二年死云間雜志無名氏薛立齊治一男子患腹痛熱則痛甚諸藥不應半年後腹加腫脹面色萎黃診其脈不洪滑非癰也詢之云始於渴甚俯飲澗水意其誤吞水蛭而然令取河泥為丸空心用水送下百丸果下水蛭而愈又一子因跌溝中腹作痛服積驚等藥不應亦依前症療之一婦人於壁上取雞翎卷耳適蜈蚣生子在翎上帶入耳中生小蜈蚣穿腦內且癢百藥莫效夢神人傳一方令炒雞肉熱置一器內留一小孔蓋上令病者以耳受之雞氣熏入蜈蚣悉攢雞肉上其病乃立愈廣筆記錢國賓治周氏子業儒年二十腳常腫生黃泡數十水出即愈及昏厥之症不時常發偶家宴忽然仆地延診按諸經脈不動獨腎濡數或亂或靜因思濡生濕也數主熱也亂主蟲動也靜蟲伏也腳掌生瘡屬腎也是腎經濕熱生蟲蟲氣上攻昏厥以雄黃丸巴霜鬱金大黃各五分煉蜜為丸緑豆大雄黃為衣薑湯送十五丸以薑湯再灌蟲化如膠黑汁解於露地數堆後用冷米湯補之恐防再舉又食棐子一二升遂不復發濟寧店主女年十八勞病三載體瘦神昏疾日重矣視其形神憔悴眼露光芒六脈雜亂細問起居女曰腹中常隱隱痛喜食糖果及看面生白點方知是蟲也非勞也與雄黃丸十粒檳榔湯送下至午不動又催五丸腹中大響下蟲百餘形如土鱉上有魚鱗下有黑嘴四足能動此女昏暈半日方醒飲以薄粥用人參當歸檳榔紫蘇赤茯苓各一錢丁香五個烏梅一個數服除蟲之根又以調理方而別錢案苕中唐國學子年十八骨立修長而乏肌肉面白筋青小腹近脅微痛醫莫知其證脈乍長乍短蟲之候也筋青暴露肝之病也小腹近脅肝之地也遂知肝內濕熱生蟲薄蝕久矣以煅存性肥皂一兩蘆薈一錢共研為細末每日糖湯調下一錢蝕蟲受藥便於露地日日一堆蟲化膠厚青苔二十五日蟲盡服參耆歸術收功兩月身體大壯同上蔣仲芳曰姚軼指婦年二十餘骨蒸潮熱乾咳口乾百治無效遇一方士曰肺中有蟲今當盛夏正可引出即用童子雞一隻去毛雜煮熟貯漆盤中以盤蓋半開半閉俟病者睡著以半開處置病人鼻邊覺來即將盤蓋蓋緊侵晨用水一大桶置盤中揭開視其雞上小蟲有翅者二三百即傾在長流水中第二夜用雞引之又去蟲七八十蟲盡而病愈至今無恙豫意雞喜食蟲故蟲亦喜食雞正如蜈蚣與雞相仇之意煮熟者取其香盛夏則蟲四散睡著不動則蟲聞香易出付之長流水者欲其去而水不來也後試他人亦驗然其要處不可令病人先知恐蟲亦知而避去耳王宇泰曰汪仲嘉謂余曰公知王節齊所以死乎曰不知也汪曰節齊為四川參政時得心腹痛疾醫療之百方不衰日甚一日聞峨眉有道者善醫然不可至也節齊親至山拼輿從徒步詣之道者望見即驚曰病深矣既坐問公於服餌有生用氣血之物焙制未徹者乎曰有之常服補陰丸數十餘年矣中用龜甲酒炙而入之曰是矣宜亟歸屈其指曰猶可將及家也節齊遽投檄歸至吳閶輒便下赤色小龜無數是夕卒於舟中王曰本草稱龜甲所主大率破癥瘕已瘧痔陰蝕漏下赤白不言補心腎服之反有害醫暇卮言程云來雄按龜鱉甲等但宜入煎劑如入丸須熬膠代蜜用始無弊也蛔證孫文垣治馬迪庵內人原以飲食過傷又為風寒外襲或以內傷外感治之致五更發熱盛於陽分唇燥胸中衝跳不已手足皆冷熱厥脈兩寸俱滑數寸盛是火上衝曰此奇痰症也杜撰以小陷胸湯加白芍蘿蔔子前胡酒芩二帖次早大便行下蛔蟲八條卻不見有奇痰胸中既不沖跳但覺力怯再診之兩寸減半尺脈稍起以二陳湯加白芍酒芩調理後四帖加當歸全愈雄按伏痰挾火上衝而胸中跳動者亦有其證余嘗治蔣左侯室人之病以雪羹和竹瀝調紫雪而瘳焉證雖非奇痰其論未可厚非琇按此由發熱過散則擾動其火上衝胸跳蛔亦不安而動輒以小陷胸湯投之則黃連之苦寒能降火蔞仁之甘寒能清火枳實之峻削能攻下病去厥止蛔亦從而下行其力怯良由攻之猛耳非真有奇痰為病也孫君生平專以痰揣病其不經處類多如此雄按蛔因熱動以致胸跳熱降蛔下則病自安孫君之治固為幸中魏氏之評亦有未當張景嶽治王氏少婦年未二旬素喜瓜果生冷常病心腹痛每發必數日不食後數年發必吐蛔初吐尚少既而日多每吐必一二十條每發必旬日不食醫者但知攻蟲旋去旋有百藥不瘳察其脈症因知其傷於生冷致脾胃虛寒陰濕氣聚故為是症使不溫胃養脾以杜寒濕生化之源蟲去復生終無濟也乃制溫臟丸與之藥未完而病愈後仍耽生冷果舊病復作與前藥而安原注凡治蟲之法但察以別無疳熱等症者悉以溫補脾胃為主雄按議論超卓然因於熱者較多也中毒唐崔鉉鎮渚宮有富商船居中夜暴亡逮曉氣猶未絶鄰房有武陵醫工梁新聞之乃與診視曰此乃食毒也三兩日中曾外食耶僕伕曰主翁少出訪亦不食於他人梁曰尋常嗜食何物僕伕曰好食竹雞曰竹雞吃半夏必半夏毒也命搗姜捩汁折齒而灌由是而蘇崔聞而異之召至乃安慰稱獎資以僕馬勸入京致書於朝士聲大振仕至尚藥奉御有一朝士詣之常曰何不早見示風疾已深請速歸處置家事委順而已朝士聞而慌遽告退策馬而歸時有鄜州馬醫趙鄂者新到京都於通衢自榜姓名云攻醫術此朝士下馬告之趙亦言疾危與梁生之說同謂曰即有一法請官人急吃消梨不限多少咀嚼不及捩汁而飲或希萬一此朝士又策馬而歸以書筒質消梨馬上旋齕行到家旬日惟吃消梨頓覺爽朗其恙不作卻訪趙生感謝又詣奉御且言得趙生所教梁驚異且曰大國必有一人相繼者遂召趙生資以僕馬錢帛廣為延譽官至太僕卿北夢瑣言見見筠齊漫録雄按梨甘寒而清風熱即此可知治中風之肯綮矣至崔之好賢慷慨梁之服善穎悟趙之學識精深朝士之知恩感德皆非今人所能及也紹興十九年三月有客自番禺至舟中士人攜一僕僕病腳弱不能行舟師憫之曰吾有一藥治此病如神餌之而瘥者不可勝計當以相與既賽廟畢飲胙頗醉乃入山求得藥漬酒授病者令天未明服之如其言藥入口即呻吟云腸胃極痛如刀割截遲明而死士人以咎舟師恚隨即取昨日所餘漬自漬酒服之不逾時亦死蓋山多斷腸草人食之輒死而舟師所取藥為根蔓所纏結醉不暇擇徑投酒中是以及於禍則知草藥不可妄服也洗冤録出中志見醫說雄按斷腸草即胡蔓也觀此則蠱門定年藥未必即此物也黃啓東治分巡檢事戚公過縣晨興欲發疾作不語呼黃視之黃曰脈與證不應乃詢其左右云夜烹食雞黃曰此必食即就寢有蜈蚣過其鼻口中毒耳為處劑投之立蘇戚猶未信乃更置烹雞寢處果有蜈蚣三枚自榻頂下湖廣通志雄按雖未明載藥治不可為案而醫者勘病於脈證不應處不可不審問慎思也且可使飲食之人有所鑑戒盛啓東明初為御醫晨值御藥房忽昏眩欲死募人療之莫能應一草澤醫人應之一服而愈帝問狀其人曰盛空心入藥房猝中藥毒能和解諸藥者甘草也帝問盛果空心入乃厚賜草澤醫人明史雄按御藥房所貯豈盡大毒之品審如是則藥肆中人將何以處之凌漢章歸安人為諸生棄去北遊泰山古廟前遇病人氣垂絶凌嗟嘆久之一道人忽曰汝欲生之乎曰然道人針其左股立蘇曰此人毒氣內攻非死也毒散自生耳因授凌針術治疾無不效明史雄按雖未明言所中何毒所針何穴然毒散自生理固有之醫者不可不知隅反也張鄮西言一巡按過山中見水下有大木耳一叢甚嫩好以為天花菜取歸煮食之盡一盤即入臥房明日巳牌時未起書吏倒門而入止見白骨一副其人盡化為水流滿床下至山中生木耳處尋得一蛇大如桶殺之戒庵漫筆李詡陸放翁老學庵筆記云族子相少服菟絲子十數年所服至多飲食倍常血氣充盛覺背腫赤焮乃大疽也適四月金銀花開乃取花依良方所載法服之計已數斤背腫盡消以是知非獨金石之藥不可妄服即菟絲亦能致疾也按是人或過於酒色或傷於鬱怒遂致此證未必盡由服菟絲也然藥物亦多致偏勝之患辛未冬德興西南磨石窯居民避兵其中兵入來攻窯中五百人悉為煙火熏死內一李師迷悶中摸索得一凍蘆蔔嚼之汁一咽而蘇更與其兄兄亦活五百人因此皆得命蘆蔔細物治人之功乃如此中流失船一壺千金真不虛語河中人趙才卿又言炭煙燻人往往致死臨臥削蘆蔔一片著火中即煙氣不能毒人如無蘆蔔時預暴乾為細末以備急用亦可續夷堅志嘉靖四十三年陝西遊僧武如香挾妖術至昌黎縣民張柱家見其妻美設飯間呼其全家同坐將紅散入飯內食之少頃舉家昏迷任其姦淫復將魘法吹入柱耳中柱發狂惑見舉家妖鬼盡行殺死凡一十六人並無血跡官司執柱囚之十餘日柱吐痰二碗許問其故乃知所殺者皆其父母兄嫂妻子姊侄也柱與如香皆論死世宗命榜示天下觀此妖藥亦是莨菪之流耳唐安祿山誘奚契丹飲以莨菪醉酒而坑之本草綱目王思中治海鹽彭氏巨室也其媳方婚而病煩悶欲絶諸醫莫知所為思中診治令盡去帷幔窗櫺並房中竹器密求蟹炙脆研入藥中服之頓愈吳江縣志此中漆毒之致也雄按此亦偶中而愈未必竟是漆毒姚福庚己編云太倉民家得三足鱉命婦烹食畢入臥少頃形化為血水止存發耳鄰人疑其婦謀害訟之官時知縣黃延宣鞠問不決乃取三足鱉令婦如前烹治取死囚食之入獄亦化如前人遂辨其獄按爾雅三足鱉名能又山海經云從水多三足鱉食之無蠱近亦有人誤食而無恙者何哉本草綱目吉安朱氏有為子腹痛人教以取楝樹東南根煎湯者其子初不肯服其父撻之既入口少頃而絶蓋出土面之根能殺人朱氏不考古之誤也今醫家用桑白皮本草云出土者亦能殺人可不慎哉靜齊至止直記孔行素邱傑年十四遭母喪以熟菜有味不嘗於口歲余忽夢母曰汝啖生菜遇蝦蟆毒靈床前有三丸藥下蝌蚪子三升無恙騪栗暇筆姚應鳳治一人婦身痛左臂似有系之者應鳳曰君食肉中鼠毒右臂生鼠用刀決之有小鼠墜地而逸錢塘縣志龔子才治一男子倏然低頭往暗處藏身不言問亦不答食俱背人竊啖人見之則食不下諸人以為中邪用三牲祭之其物經宿乃妻食之病亦如是諸醫莫知必中鼠涎有大毒也以吳茱萸塞入貓口貓涎自出將茱萸令夫婦服之悉愈一藥室家人正銼藥忽仆地不省人事諸人以為中風痰厥龔曰此非病也以藥氣熏蒸中於藥毒令以甘草煎湯灌之立醒興盛啓東證治同雄按此所切者必毒烈之藥況切藥必低頭而視故毒能吸入與盛證有真僞之殊一婦人以燒酒貯錫壺內經旬取服止飲一小杯即醉悶不省人事衆莫能識其證龔曰此中鉛毒也令以陳壁土攪水澄清入甘草煎湯灌之即醒吳孚先治一人長夏無故四肢厥冷神昏不語或作陰證或作厥熱或作中風或作痰治俱不效吳診之消息再四問前者曾食何物其家人曰前日晚間曾食豬肺乃恍然令以忍冬花二兩煎湯灌之乃瘳蓋所食乃瘟豬肺也有人好食豆腐中毒不能治更醫至中途遇作腐人家相爭因妻誤將萊蔔湯置鍋中腐便不成醫得其說以萊蔔湯下藥而愈醫說續編唐李寶臣為妓人置堇音靳即烏頭也於液寶臣飲之即喑三日死又唐武后置堇於食賀蘭氏服之暴死同上劉立之治一老婦人病腰痛已歷年諸藥不效劉診之云病雖危殆然一夕可安主人訝焉乃請其藥答曰不須藥用鉛粉二三十兩壯士五人大鈴五七枚足矣於是主家悉備劉命撤床幔帳移置屋中以米飲和粉置病婦腰周回令其舒臥壯士一人負鈴繞床急走使其聲不絶人倦即易之至夜半夜其婦稍能自起立既而腰痛頓釋舉家拜云師神醫也願聞其意劉云此病因服水銀所致水銀滯腰窖間不能出故疼不已今用鉛粉粉乃水銀所化為金之母取金音以母呼子母子合德出投粉中則病愈矣醫史醫說續編雄按治法神矣何以知其服水銀竟不敘明是曷故也如其煉餌當入丹石毒門如其誤服不能病至歷年明太祖制曰醫人王允堅賣藥為生錦衣衛監犯廚子王宗自知罪不可逃慮恐刃加於頸令家人買毒藥允堅即時賣與隱飲中入外監門力士楊受財放入內監門力士郭觀保驗出外監者慌忙反說內監者易其藥朕鞫之觀保曰彼往賣藥王允堅家買者朕令王允堅拿至乃黑藥一丸因授與王允堅自吞服之久毒不作朕知易藥矣謂允堅曰前堅此藥何顏色允堅曰紅丸曰幾枚對曰三枚噫毒本三丸色赤今止一丸色且黑何也於是急遣人取至黑赤色隨令王允堅吞服本人持藥在手顏色為之變其態憂驚猶豫未吞督之乃服既服後隨謂之曰此藥以何料成曰砒霜巴豆飯黏為丸硃砂為衣曰服後何時人喪曰半晝語既允堅淚墮朕謂曰爾所以淒涼者畏死如此乎曰一子見軍一子在外故悲焉嗚呼其王允堅初賣毒藥毒人及其自服也藥方入腹眷戀之狀畏死之情一時發見嗚呼愚哉至此而若此亦何濟哉然終不以此藥致本人之死何故若督令服此藥而死是藥之也解而後刑之法也隨問允堅此毒還可解乎曰可何物可曰涼水生豆汁熟豆湯可朕謂曰此解不速余何速解曰糞清插涼水糞清用多少曰一雞子於是遣人取至候毒作方與解之少頃允堅身不自寧手搔上下摩腹四顧張皇朕謂曰毒何爾患曰五臟不寧心熱氣升曰此毒身死傷何經絡允堅對曰五臟先壞命絶矣身墨黑謂曰幾時可解何時不解曰三時候不解朕見毒作令人與之解本人痛利數番其毒潔然人復如初明日梟首以正其罪嗚呼昔者古人制藥惟積陰騭以生人今之貨藥者惟務生理不施陰騭少有逆其意沽名恐詐者有之即時毒害者有之圖利而賣與人傷生者有之噫如此不才者犯法遭刑而殺身亡家非止一人而已京市貨藥者往往不戒蹈襲前非將奈之何此誥一出所在貨藥之人聽朕言者推己以及人永為多福不然此刑此犯有不可逃者三編周櫟園曰癸未冬親串有從余遊都門者其人謹願生平絶跡北里突生天疱不解所自豫忽悟其故解之曰君質弱常服紫河車京師四方雜集患天疱瘡者甚夥所服藥中安知無天疱衣胞此瘡能延子孫氣味所沖尚能中人生子多無皮膚衣胞尤為毒氣所歸君之患必緣於此衆人皆以為然夫忍於殤人之子以自裨蓋仁者尚不為況未必有功而適以滋害如此可不知所戒原注江南皆以胞衣為人所食者兒多不育惟京都不甚論書影雄按舉此類推則胞衣無毒者鮮矣余臨證幾三十年矣從未用過此藥或病家欲用則以羊腎代之溫補有情功較勝焉附質大方以為然否陳自明治二男子剝自死牛即日遍身患紫疱不計其數已而俱潰各灌神仙毒丸一錢一吐瀉而蘇一藥不下者死方見蠱門雄按此丸解諸毒殺諸蟲皆極神妙吳內翰備急方云全椒醫高照一子無賴父笞之遂服砒霜自毒大渴腹脹欲裂余教令服此藥以水調隨所欲飲與之不數碗即利而安其方用白扁豆曬乾為細末新汲水調下二三錢匕凡中毒及附子烏頭河豚之類一切藥毒皆可治用多年壁土熱湯泡攪之令濁少頃乘熱去腳取飲不省人事灌之甚妙北夢瑣言有人為野菌所毒而笑者煎魚椹汁服之即愈或云楓樹菌食之令人多笑來安縣李主薄弦云度云白塔寨丁未春有二卒一候兵同食河豚既醉燒子並食之遂皆中毒人急以告巡檢二卒已困殆倉卒無藥用或人之說獨以麻油灌之油既多大吐毒物盡出腹間頓寬以此竟無恙集成朱丹溪解中毒藥方用五倍子二兩重研細用無灰酒溫調服毒在上即吐在下即瀉醫說續編一人吃水銀僵死微有喘息肢體如冰聞葛可久善治奇疾往候之可久視之曰得白金二百兩可治病家謝以貧故不能重酬可久笑曰欲得白金煮湯治耳已而叩富者乃得之且囑之曰以之煎熱湯浴體如手足動當來告我有頃手足引動往告之復謂曰眼動及能起坐悉告我一如其言乃取川椒二斤置溲桶中坐病人其上久之病脫出其水銀已入椒矣蓋銀湯能動水銀而不滯川椒能來水銀而聚之籲人謂可久之術良惜乎不多傳也酉陽雜俎云椒可以來水銀於此可徵矣醫說續編可與劉某治案同參繆仲淳曰莊斂之平日素壯實善啖丁巳四月忽患泄瀉凡藥粥蔬菜入喉覺如針刺下咽即辣因而滿腹絞辣隨覺腹中有氣先從左升次即右升氤氳遍腹即欲如廁彈響大泄糞門恍如火灼一陳甫畢一陳繼之更番逾時方得離廁諦視所下皆清水盈器白脂上浮所飲食俱不化而出甚至夢中大便了不收攝諸醫或云停滯或云受暑或云中寒百藥雜投竟如沃石約月餘大肉盡脫束手待斃余仲夏末偶過金壇診其脈洪大而數知為火熱所生病為疏一方用川楝三錢白芍五錢橘紅二錢車前扁豆茯苓石斛各三錢炙草一錢囑其煎成將井水浸冷加童便一杯始服臨別囑其此方勿以示人恐時師見之大笑不已也若為軀命計須堅信服之耳彼卻衆醫恪服藥方入喉恍如飲薄荷汁隱隱沁入心脾腹中似別成一清涼世界甫一劑夜臥達旦洞瀉頓止連服三劑大便已實前泄時凡飲食溫者下咽遂覺氣升即欲大解一切俱以冷進為快至是覺噁心畏冷得溫乃安曰此火退之徵也前方加人參二錢半蓮肉四十粒紅面一錢五分黃耆三錢升麻五分黃連減半五六劑後去升麻又三十餘劑瀉久止而脾氣困頓不知飢飽且少飲茶湯覺脹滿急脹如欲寸裂曰此大瀉之後下多亡陰也法宜用補倘用香燥取快暫時元氣受傷必成鼓脹不可為矣為疏丸方用人參五兩白芍六兩炙甘草一兩五味六兩黃耆五兩萸肉五兩山藥五兩熟地八兩牛膝六兩紫河車二具蜜丸空心飢時各一服並日進前湯方或時去黃連幾三年始知飢而嗜食體亦漸豐矣其病初平勸其絶欲因出妾得盡發家人祕謀乃知向之暴泄由中巴豆毒本草中巴豆毒者黃連冷水解之余用大劑黃連冷服正為對治時師即信為火用連芩不過七八分至錢許止矣況一月之瀉敢用連至三錢乎此余所以祝其勿出以示人之故也廣筆記敘服巴豆之狀如繪凡嘗過服此藥者詢此證候便可知其為中巴豆毒矣黃連為解巴豆毒之要藥以其一寒一熱互相制伏也雄按初方最炒若謂下多之陰忌用香燥亦是卓見第不知飢飽傷在胃陰以津液既為巴豆所傷復經洞瀉之奪丸方太嫌膩滯以致三年始愈而更藉苦降之藥收功也余治斂之泄止後恐其元氣下陷急宜升舉用升麻以提之初不知其為中毒也乃因用升麻太早致濁氣混於上焦胸中時覺似辣非辣似嘈非嘈迷悶萬狀有時滴酒入腹或啖一切辛溫者更冤苦不勝莊一生知其故曰此病在上焦湯液入口即下注恐未易奏功宜以噙化丸治之用貝母五錢苦參一兩真龍腦薄荷葉二錢沉香四錢人參五錢為極細末蜜丸彈子大午食後臨臥時各噙化一丸甫四丸胸中恍如有物推下三年所苦一朝若失同上丹石毒劉表在荊州與王粲登障山見一岡不生百草粲曰此必古冢其人在世服生礬石熱蒸出外故草木焦枯鑿看果礬石滿墓堂客齊隨筆按仲宣元識若此何仲景預告以眉發脫落而不之信耶事見舊按第文太略洪容齊云豫仲兄文安公鎮金陵因秋暑減食當塗醫湯三益教以服礬石圓已而飲啖日進遂加意服之越十月而毒作鼻衄血鬥余自是數日不止竟至津液皆竭逮於捐館偶見前語使人追痛因書之以戒來者同上按陰虛火盛之人初服桂附薑萸等燥熱剛藥始則甚得其力所謂劫治也昧不知止久而決裂莫可挽回余目擊其敝者數十人矣此亦與初服礬石圓而飲啖日進同也毛公弼守泗洲泄痢久不愈及罷官歸遂謁龐安常求治安常診之曰此丹石毒作非痢也乃煮葵菜一釜令公弼食之且云當有所下明日安常規之曰毒未去問食幾何曰才進兩盂安常曰某煮此藥銖兩升合自有制度不盡不可如是再煮強令進之已乃洞泄爛斑五色安常視之曰此丹毒也疾去矣但年高人久痢又乍去丹毒腳當弱不可復餌他藥因贈牛膝酒兩瓶飲盡遂強如初獨醒雜言曾達臣雄按葵菜善解毒小兒食之稀痘虞都巡者曾達臣先人同僚也自言常服石燕其法取雄者十枚煅以火透紅則出而漬酒中候冷復煆既煆復漬如是者無算度干酒一升乃取屑之每早作以二錢匕擦齒上漱咽以酒虞時年五十服此藥二年膚髮甚澤才如三十許人自謂服藥之功一日勿覺熱氣貫兩目睛突出痛不堪忍而死因人服金石藥鮮有不為其所毒者同上臨川周推官平生孱弱多服丹砂烏附藥晚年發背疽醫悉歸罪丹石服解毒藥不效瘍醫老祝脈之曰此乃極症正當多服伏火丹砂及三建湯乃用小劑試之復作大劑三日後用膏敷貼半月而瘡平凡服三建湯一百五十服齊東野語見本草綱目意其人必詖陰之體故耐大熱之劑張路玉治孫古修誤服伏火丹砂中毒察其本元素虧近因虛火上炎舌下腫脹延及兩頤醫用苦寒清熱太過神思不寧藥中每服加丹砂五錢甫進一劑覺胸中有物觸者數次請政於醫復出丹砂視之色黑而晦丹爐中伏火砂也醫令易砂更服四劑日夜煩躁不寧背時灑淅惡寒頭面烘熱大汗脛膝逆冷如冰忽忽氣逆欲絶張診之六脈澀數模糊次驗唇舌俱色如汗泥而腫厚濕滑若系熱極似陰必無濕滑之理若系寒犯三陰必無反厚之理惟酒食內蘊徽醬色現則有之審其二便調適胸腹柔和決無食停胃腑之理以脈合症洵為陰受熱鬱最急者恐其喘汗欲脫乃以生脈六味合劑以救肺腎一服神稍安汗稍斂再進人事稍知稀粥稍進猶未言及伏火砂也見其舌沿稍轉微紅而氣微足冷如故前方入桂心五分五味數粒服後足稍溫和氣稍接續語稍有次方詳述伏火砂之誤前方減去地黃桂心五味入棗仁秋石人中黃專解丹砂之毒三服舌轉微紅雖未鮮潔而伏毒漸解緣兩尺弦細乃去人中黃仍用地黃以填補下元數日之間或去人中黃用地黃或去地黃而用人中黃隨脈證更迭出入二味不兼用者恐人中黃味甘戀膈載地黃之膩不能速達下元下元雖虧調補藥中寧用鹿茸河車而不入桂附者慮其鼓舞丹砂之餘烈也羅謙甫曰僧閻仲章服火煉丹砂二粒項出小瘡腫痛不任牙癢不能嚼物服涼膈散半斤始緩以飲酒輒發藥以寒涼之劑則緩終身不愈何橫涇好色平居進熱劑偶與方靈谷對奕呼小童取一釐散來童誤聽為七釐也何時拈子布算不及觀遽服之是夕卒於書齊後十餘年孫理庵倩居其室偶至書齊見一人仰臥榻上問之答曰我何橫涇也孫大駭疾走不十日卒云間雜志無名氏秀州張生本郡中虞侯其妻遇神人自稱皮場大王授以癰疽異方一冊且誨以手法遂用醫著俗呼張小娘子又轉以教厥夫吳人韋縣丞祖母章子厚妾也年七十疽發於背邀治之張先潰其瘡以盞貯所泄膿穢澄滓視之其凝處紅如丹砂謂丞曰此服丹藥毒所致也丞怒曰老人平生尚不服一暖藥況于丹乎何妄言若是病人聞之亟呼曰其說是也我少在汝家時每相公餌服大丹必使我輩伴服一粒積久數多故貯蓄毒根今不可悔矣張謝去母竟以是終李日華六研齊筆記陳良甫治一富室男子鼻血不止六脈洪數究竟云服丹藥太過遂用黃連黃芩大黃為末水煎服愈調服亦可良方無錫華氏年六十患背瘡潰發大如旋盤而色赤想是平日多服金石藥毒發所致問之果然因令浸晨飲羊血三五升始用退熱解毒生氣血之劑熁以生肌膏半月後肌生膿少豫因歸令服此藥百餘帖方可全安一月後復來招往視其瘡皮肉已堅厚如常但食少無力因問前日之藥服幾何曰瘡將平遂止不服脈之沉微甚因知其氣血只可供給瘡平而已真氣則已竭不可治即古人所謂死於瘡結痂之後果不出半月而死此膿出後之虛若因虛而發癰疽者亦然藥要或問張忠定公安道居南都煉丹一爐養火數十年丹成不敢服時張芻聖民守南都羸瘠殊甚聞有此丹堅求餌之安道云不敢吝也但此丹服火之久不有大功必有大毒不可遽服聖民求之甚力乃以一粒如粟大以與之且戒宜韜藏慎勿輕餌聖民得之即吞焉不數日便血不止五臟皆糜潰而下竟死云張邦基墨莊漫録士大夫服丹砂死者前此固不一余所目擊林彥振平日充實飲啖兼人居吳下每以強自誇有醫周公輔言得宋道方煉丹砂祕術可延年而無後害道方拱州良醫也彥振信之服三年疽發於腦始見髮際如粟越兩日項頷與胸背略平十日死方疾亟時醫使人以帛漬所漬膿血濯之水中澄其下略有丹砂蓋積於中與毒俱出也謝任伯平日聞人蓄伏火丹砂不問其方必求服惟恐不盡去歲亦發腦疽有人與之語見其疾將作俄傾覺形神頓異而任伯猶未之覺既覺如風雨經夕死十年間親見此兩人可以為戒矣避暑録葉夢得少蘊吳興吳景淵刑部服硫黃人罕有知者其後二十年子橐為華亭市易官發背而卒乃知流毒傳氣尚及其子可不戒哉泊宅編葉天士曰新場鎮有升綢緞鋪湖州沈里千之子號赤文年二十讀書作文明敏過人其父母甚愛之將畢姻令全鹿丸一料少年四人分服之自冬至春忽患渾身作痛有如痛風漸漸腹中作痛有形之塊纍纍於腸肌肉削瘦飲食不進延劉公原瞿治之乃父一聞消導清火之藥畏懼不用惟以參術投之七月初旬余至葉坤生家道經其門乃父邀進問余言小兒晚間大便去黑糞如拳大一塊目下遍身如火欲飲井水不知何故余進診視脈息數大身體骨立渴喜冷飲視其所下之塊黑而堅硬意為瘀血結成適閔介申家有酒蒸大黃丸用二錢下黑塊不計其數用水浸之胖如黑豆詢其所以乃全鹿丸未化也始知為藥所誤不數日熱極而死同服三少年一患喉痹而死一患肛門毒而死一患吐血咳嗽而死此皆無病而喜服溫補藥之害也録此以勸世人不必好補而服藥邪祟舒氏子為素衣女子所憑掩捕不得意緒恍惚如癡家人具狀請符於朱彥誠法師朱讀狀大駭曰必鱗介之精邪毒入脾肝里病深矣非符水可療當躬往治之乃假巨鑊煎油二十斤焚符檄拘之乃大白鱉也鑊油正沸自投其中糜爛而死朱戒其家俟油冷以斧破鱉剖骨並肉曝日中須極干入人參茯苓龍骨末成丸托為補藥命病者晨夕餌之勿使知之如其言丸盡病愈豔異編宋人王纂精針石元嘉中縣人張方女日暮宿廣陵廟門下夜有物假作其壻來女因被魅惑而病纂為治之下一針有獺從女被內走出病因而愈劉叔異苑顧歡隱於會稽素有道有病風邪者以問歡歡曰君家有書乎曰惟有孝經而已歡曰可取仲尼居置病人枕邊恭敬之當自瘥如言果愈問其故曰善禳惡正勝邪此病者所以瘥也吳均齊春秋北史雄按顧伊人孝廉室病鬼諸醫束手木文和尚於病榻前焚香讀中庸三復而瘳而世之號為儒者反虔奉釋經道典豈不悖耶黃帝灸法療神邪鬼魅及顛狂病語不擇尊卑灸上唇裡面中央肉弦上一壯如小麥大又用鋼刀將唇裡面弦上割令其斷更佳也秦承祖灸孤鬼神邪及顛狂諸般醫治不瘥者以並手兩大拇指用軟絲繩急縛之灸三壯其炷著四處半在甲上半在肉上四處盡一處不燒其病不能得愈神效不可量小兒胎癇灸癇一依此法灸一壯炷如小麥大李士材治章氏女在閣時昏暈不知人蘇合丸灌醒後狂言妄語喃喃不休左脈七至大而無倫右脈三至微而難見兩手如出兩人此祟憑之脈也線帶系定二大拇指以艾炷灸兩甲界鬼哭穴至七壯鬼即哀詞求去服調氣平胃散加桃奴數日而祟絶喻嘉言治楊季登次女病多汗食減肌削診時手間筋掣肉顫身倦氣怯曰此大驚大虛之候宜從溫補於補劑中多加茯神棗仁十餘劑全不應因思症非外感也非內傷也非雜症也虛汗振掉不寧能受補藥而病無增減且閨中處子素無家難其神情渾似喪敗之餘此曷故也忽悟曰此必邪祟之病而其父何以不言往診問其面色曰時赤時黃因謂此症必有邪祟吾有神藥可以驅之季登才曰此女每夕睡去口流白沫戰栗而絶以薑湯安神藥灌方蘇挑燈侍寢防之亦不能止因見用安神藥甚當兼恐壻家傳聞故不敢明告也曰何不早言吾一劑可愈乃以犀角羚羊角龍齒虎威骨牡蠣粉角為霜人參黃耆等藥合末以羊肉半斤煎取濃汁三盞盡調其末令以一次服之果得安寢竟不再發相傳以為神異蓋以祟附於身與人之神氣交持亦逼處不安無隙可出故用諸多靈物之遺形引以羊肉之膻俾邪祟轉附骨角移徒大便而出仿上古遺精變氣祝由遺事而充其義耳又熊去疾髫齡患一奇症食飲如常但脈細神呆氣奪色夭乃翁曰此何病也喻曰病名殗殜左傳所謂近女室晦即是此病彼因近女又遭室晦故不可為令郎受室晦而未近女是可為也即前方少加牛黃丸服旬日而安今壬午去疾已舉孝廉矣狐之迷人先用口向女子陰戶一展其人即昏迷不省或男子則向陽物一展亦令昏迷方用真桐油抹於陰戶陽物上其狐即大嘔而去妙不可言祕之本草綱目朱丹溪治一婦人如癇或作或輟恍惚不省人事一日略蘇醒診視忽聞床上有香氣繼又無所知識朱曰氣因血虛亦從而虛邪因虛入理或有之遂以秦承祖灸鬼法灸治病者哀告曰我自去我自去我自去即愈徐秋夫療鬼穴凡有病著鬼邪須針鬼穴鬼去病除其應如神一針石名鬼官人中是也針入三分二針名鬼信少商是也針入三分三針名鬼節隱白是也針入三分四針名鬼心大陵是也針入三分五針名鬼路行間是也針入三分六針名鬼枕風府是也針入三分七針名鬼關頰車是也針入三分八針名鬼門承漿是也針入三分九針名鬼臂間使是也針入五分十針名鬼額正髮際是也針入二分十一針名鬼會正統是也針入一分十二針名鬼額陽陵是也針入三分十三針名鬼身異名舌縫是也針入舌縫中間一分出紫血治身腫難言心經邪熱微出血便效陳自明治一女子為邪所交腹作痞與太乙丹一錠服之隨下惡物其邪仍至又服半錠每夜更爇二三錠使煙氣盈屋遂不再至方見蠱門雄按太乙丹即紫金錠非今世之太乙丹也金劍峰之子患妖症吐舌數寸許每以足居上首居下顛倒而行劍峰偶送一道士出門復入中堂目見一婦人在戶內走入屏風中乃碎屏風火之魅不復見而其子亦瘥云間雜志蔡石戶抱病三年耳中日聞鬼嘯凡有所往鬼必相隨初甚悕久之習聞殊不為怪病愈鬼嘯亦息同上臨海章安鎮有蔡木匠者一夕手持斧斤自外道遊東山東山衆所殯葬之處蔡沉醉中將謂抵家捫其棺曰是我榻也寢其上夜半酒醒天且昏黑不可前未免坐以待旦忽聞一人高叫棺中應云喚我何事彼云某家女病損症蓋其後園葛大哥淫之耳卻請法師捉鬼我與你同行一看如何棺中雲我有客至不可去蔡明日詣主人曰娘子之疾我能愈之主人驚喜許以厚謝因問屋後種葛否曰然蔡遍地翻掘見內一根甚巨且有血煮啖女子病即痊輟耕録雄按此三則皆志怪耳非醫案也唐同州刺史孟詵云婦人夢與鬼交者鹿角末三指一撮和清酒服即出鬼精又古今録驗療妖魅貓鬼病人不肯言鬼方鹿角屑搗散以水服方寸匕即言實也本草王教授云有婦人患赤白帶淋得豫針灸經初為灸氣海穴未效次日為灸帶脈穴有鬼附患身云昨日灸亦好只灸我未著今灸著我我今去矣可為酒食祭我其家如其言祭之其病如失此實事也豫初怪其事因思晉景公膏肓之病蓋有二鬼焉以其虛勞甚矣鬼得乘虛而居之今此婦人之疾亦有鬼者豈其用心而虛損故有此疾鬼亦乘虛而居之歟灸既著穴其鬼不得不去雖不祭之可也自此有來覓灸者必為按此穴莫不應手痠痛豫知是正穴也令歸灸之無有不愈其穴在兩脅季肋之下一寸八分有此疾者速宜灸之婦人患此疾而喪生者甚多切不可忽若更灸百會尤佳此疾多因用心使然故也資生經何伯庸診西山道者素無疾病寢不能興曰六脈純陰為鬼所盜當午刻死竟如其言又嘗為劉某診曰尺脈有怪徵後嗣其有厄乎是夕其孫果溺水厄雲南志錢國賓治土橋張林巡司書役也其妻勞怯已三年服藥無效臥床不起矣脈沉大至滑數十至中一鼓或隱或見形色蒼脫所居暗室曰此非勞怯乃陰邪之症但不知名非藥可治先當移房再穰解之更語其母以好言相問見何鬼祟婦只不答及移室褥上有毛數莖長寸半許逆露狐交即延道士及掛天師符印禳退至夜多人圍繞邪來反更頻煩因迫問婦曰但覺冷風吹面身即寒禁胸如石壓則昏不知人矣因再求救為思久之猛悟人交陽交也狐交舌交也密語其夫少製毒藥無聞六耳塗陰戶四圍狐來果中毒而死乃元狐間生白毛肥壯多肉林乃剝其皮而剁之其婦服藥經年乃可蘇合香丸治傳尸骨蒸殗殜肺痿痊忤鬼氣卒心痛霍亂吐痢時氣瘴瘧赤白暴利瘀血月閉痃癖疔腫驚癇等疾蘇合香白者良研一兩安息香無灰酒煮去砂二兩暹羅犀角鎊研冰片研各一兩麝香勿經火另研一兩香附炒木香熏陸香另研沉香另研極細丁香白朮各一兩上十一味為末逐一配勻量加煉蜜和劑分作五十丸另以硃砂一兩水飛為衣蠟護臨用剖開井水生薑湯溫酒皆可化下原方尚有白檀香蓽茇訶子局方裁去之因其太澀燥耳徐靈胎曰此辟邪驅穢之聖方惟冰麝太多宜減大半王晉三曰蘇合香能通十二經絡三百六十五竅故君之以名其方與安息相須能內通臟腑龍腦辛散輕浮走竄經絡與麝香相須能內入骨髓犀角入心沉香入腎木香入脾香附入肝熏陸香入肺復以丁香入胃者以胃亦為一臟也用白朮健脾者欲令諸香留頓於脾使轉輸於各臟也諸臟皆用辛香陽藥以通之獨心經用硃砂寒以通之者以心為火臟不受辛熱散氣之品當反佐之以治其寒阻關竅乃寒因寒用也徐靈胎曰人之受邪也必有受之之處有以召之則應者斯至矣夫人精神完固則外邪不敢侵惟其所以御之之具有虧則侮之者斯集凡疾病有為鬼神所憑者其愚魯者以為鬼神實能禍人其明理者以為病情如此必無鬼神二者皆非也夫鬼神猶風寒暑濕之邪耳衛氣虛則受寒榮氣虛則受熱神氣虛則受鬼蓋人之神屬陽陽衰則鬼憑之內經有五臟之病則見五色之鬼難經云脫陽者見鬼故經穴中有鬼床鬼室等穴此諸穴者皆賴神氣以充塞之若神氣有虧則鬼神得而憑之猶之風寒之能傷人也故治寒者壯其陽治熱者養其陰治鬼者充其神而已其或有因痰因思因驚者則當求其本而治之故明理之士必事事窮其故乃能無所惑而有據否則執一端之見而昧事理之實均屬瞶瞶矣其外更有觸犯鬼神之病則祈禱可愈至於冤譴之鬼則有數端有自作之孽深仇不能解者有祖宗貽纍者有過誤害人者其事皆鑿鑿可徵似儒者所不道然見於經史如公子彭生伯有之類甚多目睹者亦不少此則非藥石祈禱所能免奇疾穆吏部深者山東濟南人壬辰進士罷官里居忽患異疾耳中聞車馬之聲則疾大作一日聞耳內議曰今日且遨遊郊垌即有裝馱驢馬鱗次而出其恙頓除至晚復聞遊者回馱馬盡返耳則所苦如故屢治不痊一日忽灑然若失敝帚軒語一人臥於床四肢不能動只進得食好大言說吃物謂之失說物望病治法如說食豬肉時便云爾吃豬肉一頓病者聞之即喜遂置肉令病人見之要卻不與吃乃失他物望也當自睡涎出自愈萬病回春有富家子年十七八病遍體肌肉拆裂召黃子厚治子厚偕門生四五輩往診視各以所見陳論皆未當子厚乃屏人詰病者曰童幼時曾近女色犯天真乎曰當十三四曾近之子厚曰得其說矣褚澄云精未通而御女則四體有不滿之處後來有難狀之疾在法為不可療後果惡汗淋漉痛楚而死其論抑或未然江南逆旅中一老婦啖物不知飽余德占以炊餅啖之盡一竹簀猶稱飢不已日飯一石米郁滄浪抹擦醴泉主簿蔡繩豫友也亦得飢疾食稍遲則頓僕悶絶繩有美行博學有文為時文人竟以飢死無能知其絶者每為哀傷琇按此恐即中消病也豫嘗至候潮門外觀潮見一人丐食者一手掌倍大五指各長尺余但伸而不能屈嘆其賦形之奇其人曰豫病也曩業織縑足以糊口客夏病傷寒當發汗時此手在被外獨不汗病愈而此手痛不已漸痛漸長以至於此今手不能作故乞食耳同上邱汝誠治一女子缺伸臂不下邱命其母裸女上身以單裙著之曰俟吾揭簾即去下裳母如命邱揚聲而入女羞縮臂即復故揮塵新談陸道光治一兒染奇症四肢堅不屈光曰此非藥可療舉傘覆之繞床焚安息沉檀兒即平復少間又發屑沉香飲之遂瘳平湖縣志高陽民家子方十餘歲忽臂上生宿瘤痛癢不可忍醫皆不辨何症一日忽自潰中有圓卵墜出尋化為石劉工部霖以一金售之治膈病如神池北偶談江寧有蕭生者食香菌則死又有王生者飲茶則死必二三日始蘇醫無能識其故者志於此俟明醫或知之居易録桐城友人姚文燮字經三順治己亥進士詩畫皆有名年六十餘忽病不識字即其姓名亦不自知醫不知為何症也竟以是終按夢溪筆記松滋令姜愚者忽不識字者數年後稍復舊信奇疾也同上劉進士祖向言潁州一少年為邪所侵疾入膏肓家人謂不可活置之路傍忽一道士過之自言善醫命取鐵錘重數十斤錘病者頭面父母泣謂病已至此鐵錘下首立碎矣道士笑曰無傷也錘下病者若無所知輒有一美婦人長二尺許自口中躍出而滅凡百錘口出百婦人大小形狀如一少年立愈道士亦不復見池北偶談宋元嘉末有長廣人病瘥即能食卻不得臥每飯輒覺其身增長數日頭遂出屋時假究為刺史令人度之已長三丈後復漸縮如舊乃死異苑醫書言瘦人驟肥肥人驟瘦皆不久同年薛為學登進士時體甚肥及為御史忽爾瘦削未幾公幹鄖陽一夕而歿聞歿時身軀縮如十餘歲小兒此尤可異也覽余漫抄雄按此疾或因服丹石熱藥所致陶九成云都下一兒患頭痛不可忍有回回醫官用刀割開割上取一小蟹硬如石尚能活動頃焉方死痛亦遄止當求得蟹至今藏之輟耕録宋史載呂夏卿舉進士歷知制誥典滁州年五十二得奇疾身體縮小卒時才如小兒菽園雜記載御史薛為學身體甚肥忽爾瘦削一疾而歿歿時縮小如十餘歲兒自得語雄按梁應來云葛秋生姑丈病瘵卒身首漸小名縮骨勞余謂自古無此病名不知何人創立附識以質大雅至竇材謂宜服丹附藥最屬不經廣陵有田婦患泄瀉下惡如油鄰童以紙捻蘸捻與油無異醫不能療孫滋九先生聞而往視令買補中益氣湯十劑天王補心丸四兩以煎劑下丸服訖而愈衆醫問之曰人驚恐則氣下大腸脹損所致此婦必受驚後得此疾也問之果力作於場見幼子匍匐赴火驚而急救得免遂得此疾此方書所未載奇疾方錢國賓治鎮江錢青藜中年無病一日足跟偶響聽之有聲自覺怪異數月漸響至頭竟如雷聲醫者說症名不一七年懷生死之憂矣錢過京口甘露寺尋蒼耳草治毒會於涼亭偶言此症以骨雷告之邀至家候其脈五部皆和獨腎芤大舉之始見按之似無乃腎敗也自下響者足少陰腎經之脈起於小指之下斜走足心出然谷之下循內踝後別入跟中以上腨內出膕內臁上股入後臁貫脊且腎主骨腎虛則髓空髓空則鳴所以骨響白腳之頭即雷從地起響於天上也以六味丸加紫河車膏虎骨膏豬髓枸杞杜仲方示之彼謝曰公論破七年之迷良方起終身之病矣長揖而別至次年冬錢復之京口問已全愈癸亥冬山海關天行時疫病者頭痛發熱噁心口渴神昏欲寐四肢不舉其肉推之則一堆平之則如故醫有作傷寒者有作時氣者投以發散藥無不加重死者數百時督師閣部孫及贊畫各傷一僕至乙丑春錢之關門謁太師談次問及曰此症天行時疫名肉行也人肉屬土土燥則崩土濕則流其邪感於血脈肌肉不比傷寒所治也古今醫集不載止於官邸便方見此異症一款因人血枯而感天時不正之氣當大補血用首烏枸杞歸地等味少加羌活風藥足以應病矣若經發散立死無疑雄按土濕則流深中肯綮何以不用治濕熱之藥湖州塢阿二織絲人也偶燃兩膊紅十餘條其紅條頭粗尾尖腹大長尺許闊尺許此青蛇氣異毒也急治之不然蛇形入腹而死或生大小腿如頭向上攻入腹者亦死以針挑破頭尾使其不走流出惡血又研明雄黃唾調搽患處內服清涼敗毒散防風荊芥白芷羌活黃連黃芩連翹金銀花槐子甘草當歸生地各一錢二三帖雄按此即世稱蛇纏症之甚者浙東人名曰纏身龍吳橋治呂廷充年二十五得奇疾作則衆竅氣坌出瞑而垂絶家人為之閉口鼻塞兩耳掘小溲抵大溲乃稍回氣蒸蒸出毛孔中良久始定逆橋治橋曰病得之內而受驚陰陽兩脫橋不能往第以大溫補劑投之持方藥歸三月而愈太函集金節年如廷始病潮熱夢遺面赤而咳血醫而少間已而奇疾作作則如束薪熱湧泉由脛及股直達如貫梨傾耳而聽轆轆有聲至則堅疆不仁膚革如木石噴嚏不得通水漿不入良久忽發一嘆身柔緩如常以月計之凡六七作諸醫斂手橋視之脈數而浮不任按病得之荒淫不節以致陰虛火炎此其甚也為之正治則以一杯而熄輿薪無已則從治之主以甘溫佐以清涼可也日一劑皆有驗迄於旬日而新疾平其父以故疾未除則挾一方士自九華至乃悉屏前藥曰烹一鴨餉之葅以人參和以大棗無何火症復作中膈膨脹乃復逆橋診之則六脈浮取加弦弦為木旺蓋以啖鴨而傷脾氣故肝木乘虛而克之將變為中滿矣急以為溫補劑治之兩月乃安同上飛尸即鬼疰薛立齊治錦衣楊汞興舉家避眚有僕沉醉失避既而神思昏昧遍身青傷令煎金銀藤湯灌之即愈一婦人忽昏憒發譫語自云為前謀賴某人銀兩某神責我將你起解到城隍理問兩腳踝膝腎處皆青腫痛不可忍口稱苦楚次日方蘇痛尚不止用金銀藤兩餘水煎服即愈一婦人入古墓患前症以紫金錠灌之即蘇通政餘子華太常汪用之皆因往吊而卒死喪家雄按余治邵氏子屠氏女皆以送殯患此並以蘇合丸愈之謝士泰刪繁方治尸疰或見尸或聞哭聲者取死人席棄路上者一虎口長三寸水三升煮一升服立效按此即用死人枕之遺意也本草綱目庚申豫家一婦人夢中見二蒼頭一前一後手中持一物前者云到也未後應云到也擊下爆然有聲遂魘覺後心一點痛不可忍昏悶一時許豫忽憶神精丹有此一症取三粒令服之少頃已無病矣云服藥覺痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中乃治中風之要藥但近世少曾青磁石為難合耳醫學綱目竇材治一婦人因心氣不足夜夜有少年人附著其體診之六脈皆無病令灸上脘穴五十壯至夜鬼來離床五尺不能近服姜附湯鎮心丹五日而愈一貴人妻為鬼所著百法不效有一法師書天醫符奏玉帝亦不效竇令服睡聖散三錢灸巨闕穴五十壯又灸石門穴三百壯至二百壯病人開眼如故服姜附湯鎮心丹而愈一婦人病虛勞真氣將脫為鬼所著竇用大艾火灸關元彼難忍痛乃令服睡聖散三錢復灸至一百五十壯而醒又服又灸至三百壯鬼邪去勞病亦瘥越民高十二歉歲無食挈妻兒至德清雇妻於秀州倉德李深家為乳媼高得錢還越而死李僕許八隨直在秀以官歸德清及再來之日媼患恍惚譫語作厥夫聲責罵故妻不為資薦李問何以得至此曰我隨許僕船便是以得來李命巫遂未至謾燒蒼朮煙燻燎鬼遽云我怕煙氣不敢更留遂無語媼病亦瘥今人沖惡者必爇術蓋邪鬼所畏也類編出醫說李行簡外甥女適葛氏而寡次嫁朱訓忽得疾如中風狀山人曹居白視之曰此邪病也乃出針刺其足腫上二寸許至一茶久婦人醒曰疾平矣始言每疾作時夢故夫引行山林中今早夢如前而故夫為棘刺刺足脛間不可脫惶惶宛轉乘間乃得歸曹笑曰適所刺者八邪穴也脞說詐病張景嶽向寓榆關客邸一友忽黃昏叩門張皇甚問之則所狎之妓忽得急症勢在垂危倘遭其厄禍不可解因求救隨往視之見其口吐白沫僵仆於地口鼻四肢俱冷氣息如絶狀殊駭人及診之則氣口和平與症不應沉思久之復診脈如故始悟其詐也乃以仲景法試之遂大聲言曰此病危矣使非火攻必不可活非用如棗如栗之艾亦不可活又非灸人中眉心小腹數處亦不可活吾寓有艾可速取來然火灸尚遲姑先與一藥倘能咽咽後稍有聲息則生意已復即不灸亦可若口不咽或咽後無聲速灸可也即與一藥囑其服後即來報我彼聞言已驚惟恐大艾著體藥到即咽少頃即哼聲出則徐動徐起矣次日問其由乃知為吃醋而然也曲中奸狡有如是者景嶽在都時有金吾蓄二妾其一則燕姬也有母隨之一日二妾相競燕姬理屈若母助其跳踉遂致氣厥若死乃令一婢抱持而坐自暮達晨絶無蘇意延治初入室見其肉厚色黑面青目瞑手撒息微診其脈則伏渺若脫亦意其危也而治法難施溫補則慮其氣逆未散開導則慮其脈絶難勝躊躇間乃請復診則以十指交叉抱腹仰坦婢懷因疑其前已撒手今能反手豈他人之所為乎及診之似有嫌拒意拽之不能動乃出其不意猛拽之則頓脫有聲力強且徑此非欲脫真病明矣因思其脈若此或以肉厚氣滯此北人稟賦多有之也或以兩腋緊夾此奸人狡詐亦有之也若其面青色微則怒氣使然自不足怪識見既定因聲言其危使聞灸法遂先投一劑下咽即活金吾因詢其病真耶假耶若假何以竟夕如是且形症畢肖若真何以藥下即瘳抑果藥之元祕乎曰元祕乃在言耳不過借藥為名但使彼懼病即去矣經曰憂可勝怒正此謂也然其狡詐一至於此使非再診亦幾為所誑可不審哉一士子為臣家所毆遂臥病旬日吐血盈盆因喧傳人命連及多人延醫數輩見其危劇之狀皆束手遠避防為所纍也最後張見之察其色則絶無窘苦之況診其脈則皆和緩如常始而疑繼而悟乃潛語之曰他可欺也余不可欺也此爾之血耶家禽之血耶其人愕然浼豫勿言遂與調和銜感而罷一鄰婦以妒妾詬誶與夫反目因而病劇咬牙瞪眼僵厥不蘇若命在呼吸間者其夫驚惶無措其妾幾遭不堪求張救之則脈非其病遂用前法治之愈後其夫感謝而不知為其所愚也若此二人則又人事中之常態使不有以鑑別則此中變而有以假病而延成真病者有以小忿延成大禍者故並記之以資聞見針灸刺砭九針形鑱針平半寸長一寸六分其頭大末鋭其病熱在頭身宜此圓針其身圓鋒如卵形長一寸六分肉分氣滿宜此匙針鋒如黍粟之鋭長三寸五分脈氣虛少宜此鋒針兩三隅長一寸六分瀉熱出血發泄痼病宜此䤵針一名鈹針末如劍鋒廣二寸半長四寸破癰腫出膿血圓利針尖如毫且圓且利中身微大長一寸六分調陰陽去暴痹毫針法象毫尖如蚊芒長三寸六分調經絡去病疾長針鋒如刺長十寸痹深居骨解腰脊節腠之間者宜此燔針一名焠針長四寸風虛合於骨解皮膚之間者宜此禁刺病與相逆者皆不可刺大渴大飽大飢新內大怒大勞大醉大驚大風大雨大寒大熱大虛大困大竭濃雲色脈不順大患危疾漉漉之汗渾渾之脈身熱甚陰陽交爭五行刑制如心病遇癸日余仿此望不補晦不瀉弦不奪朔不濟禁針穴腦戶囟會神庭絡卻玉枕角孫顱囟承泣承靈神道靈臺膻中水分神闕會陰橫骨氣衝箕門承筋青靈三陽絡手五里凡二十二穴合谷三陰交二穴孕婦不宜針石門女子忌之如針之令無子雲門鳩尾缺盆客主人四穴不宜針深肩井此穴針深令人悶倒三里補之禁灸穴承光啞門風府天柱素窖臨泣睛明攢竹迎香禾窖絲竹空白環腧顴窖頭維下闕脊中肩貞心腧天之牖人迎乳中周榮天府中衝陽關陽池隱白漏谷地五會陰陵泉條口犢陰市伏兔髀關委中殷門申脈承扶凡四十五穴傷寒灸之可否內經云脈之所見邪之所在脈沉者邪氣在內脈浮者邪氣在表世醫只知脈之說不知病症之禁忌若表見寒症身汗出身常偎縮栗而寒不渴欲覆厚衣常惡寒手足厥皮膚乾枯其脈必沉細而遲但有一二症皆宜灸之陽氣下陷故也若身熱惡熱時見躁作或面赤面黃咽乾嗌乾口乾舌上黃赤時渴咽嗌痛皆熱在外也但有一二症皆不可灸其脈必浮數或但數亦不可灸灸之菑害立生若有鼻不聞香臭鼻流清涕眼臉時癢或缺或嚏惡寒其脈必沉是脈症相應也或輕手得弦緊者是陰伏其陽也雖面赤宜灸之不可拘於面色赤而禁之也劉純辨傷寒五十九刺五十九刺者為頭上五行以克越諸陽之熱也大杼膺腧缺盆背腧此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髀骨委中髓空此八者以瀉四肢之熱也針灸用針八法用針八法者迎隨一也轉針二也手指三也轉針頭四也虛實五也陰陽六也提按七也呼吸八也補瀉損益虛實在此八法針用五門分主客針用五門者井滎腧經合也春刺井夏刺滎秋刺經冬刺合季月刺腧以有五門一月亦同一日亦有五門同年賓客為邪氣主人乃正氣知者刺之無不效也定針象木針刺可曲可斜可直可正故定數以象木性之曲直也口藏比火凡用針先以針含口內令溫調補榮衛以火性炎上即升降旋轉左右而下也常山閻氏曰口溫針暖不惟滑利而少痛亦借己之和氣與患人榮衛無寒溫之爭便得相從若不先溫針暖與血氣相逆寒溫交爭而成瘡者多矣灸刺分午前卯後離左酉南午前卯後者乃卯辰巳三時也陽中之老陽可灸刺萬病之虛寒離左酉南者乃午未申三時也陽中之少陰可灸刺萬病之煩躁重蒸之勞熱而瀉之灸以吹之灸時丈夫用室女婦人用童男吹之呵之反作清涼之氣也呵吹者灸之瀉法也接氣通經法凡欲取偏枯久患榮衛諸疾多是愈而復作者始由氣不接而其經不通流雖有暫時之快客氣勝真病當未愈也當此乃令上接而下引呼吸多少經脈長短各有定數立法手三陽而九呼過經四寸手三陰接而七呼過經五寸足之三陽接而一十四呼過經四寸足之三陰接而一十二呼過經五寸重者倍之吸亦同數此接氣通經呼吸長短之法也閻廣明灸分陰陽上下多少凡灸當先陽後陰言從頭面向左而漸下次後從頭向右而漸下先上後下明堂云先灸於上後灸於下先灸於少後灸於多皆宜審之王執中醫科即叔權針灸須藥千金云病有須針者即針刺以補瀉之不宜針者直爾灸之然灸之大法其孔穴與針無忌即下白針或溫針訖乃灸之此為良醫其腳氣一病最宜針灸並施若針而不灸灸而不針非良醫也針灸而藥藥而不針灸亦非良醫也但恨下里間知針者鮮爾所以學者須解用針灸溫針白針皆須妙解知針知藥固是良醫此言針灸與藥之相須也今人或但知針而不知灸知灸而不知針或惟用藥而不知針灸者皆犯孫真人所戒也今世所謂醫者則但知有藥而已針灸則未嘗過而問焉人或告之則曰是外科也業貴精不貴雜也否則曰富貴之家未必肯針灸也皆自文其過耳吾故詳著千金之說以示人云避人神說千金云欲行針灸先知行年宜忌及人神所在不與禁忌相應即可故男忌除女忌破男忌戊女忌己有日神忌有每月忌有十二時忌有四季人神有十二部人神又有所謂血支血忌之類凡醫者不能知此避忌若逢病人厄會男女氣怯下手至困通神達士豈拘此哉若遇急卒暴患不拘此法許希亦云若病卒暴宜急灸療亦不拘此一日之間止忌一時是也又云癰疽疔腫喉痹客忤尤為急凡作湯藥不可避凶日覺病須臾即宜便治又云凡人卒暴得風或中時氣凡百所苦須臾灸療漸久後皆難愈此論甚當夫急難之際命在須臾若必待吉日而後治已淪於鬼録矣此所以不可拘避忌也惟平居治病於未形選天德月德等日服藥針灸可也論灸灸有補瀉不可輕議大率沉結寒冷之症施之為宜蓋陰寒濕氣凝留血脈湯劑尉引不能獨治方是時惟火艾足以爍其勢豈非火能運行陽氣驅逐陰邪其效有速於藥石者即老壯不同強弱異稟灼治之法夫豈一端故多有逾於數百壯少或止於三五七九之數要皆詳審而行之若夫陽病灸之則為大逆是以論傷寒者謂微數之脈既汗之後脈浮熱甚三者悉不可灸惟少陰皆惡寒吐利脈不足與夫脈從手足厥之類三者為可灸焉通明乎此觸類以往又安有灸焫之妄也故曰不須灸而強與之灸者令人火邪入腹干錯五臟重其煩躁須灸而不與之灸使冷結重凝久而彌固氣上衝心無地消散可不鑑哉論刺其病攣痹其治宜微針形樂志苦病生於脈治以灸刺明九針之用經絡補瀉之法也故榮衛異刺以分血氣之虛實井榮異刺以分五行之子母募腧異刺以分背腹之陰陽春夏異刺以分人氣之淺深大抵虛補實瀉無過不及之傷以輔其平者刺法之大要也然有病勢未深可刺而即愈者所謂病之始起可刺而已或痹不仁腫痛可灸刺而去之是也有病傳諸經必上下俱刺者所謂刺熱刺瘧病甚為五十九刺是也然刺之為言同於擊刺之刺以為利也害在其中黃帝謂徐人安靜手巧而心審諦者可使行針艾張機謂針能殺生人不能起死人凡以用之不可不慎也況九針異體取病有殊十二節異法用有輕重必明日月星辰四時八正之在天寒暑燥濕經水盈虛之在地肥瘠壯弱虛實盛衰之在人然後呼吸補瀉出入迎隨惟意之從豈特知募腧部分皮肉筋骸飢飽勞逸而已哉故曰見微得過用之不殆雄按方閲此篇適聞陳漢題令媳為關琴楚之女孫患疾赴越就陳某治之針入而血流不止須臾而逝益見仲聖之言為不誣也論砭石上古針法垂布於天下制砭石有小大者乃隨病所宜用石代針一曰針石二曰砭石三曰鑱石其實一也破堅決肉砭射腫熱者則決之以砭石良由邪氣暴戾則微針不能及況又病有氣血盛實逆於肉裡蓄結癰腫之類非砭石則不能射之此所謂血實宜決之又形樂志樂病生於內者治之以砭石東方之民多病癰瘍其治宜砭石砭石之來始自於此扁鵲有云病在脈血者治之以砭石是故一切腫疾悉宜鐮割足小指下橫紋間腫在左則割左在右則割右血少出則瘥以至疔腫癰瘍丹毒瘭疽代指㾫病氣痛流腫之類皆須出血者急以砭石砭之大抵砭石之用其法必瀉若在冬時人氣閉塞則用藥而少針石所謂少針石者非癰疽之謂也癰疽不得頃時回苟緩於針石則毒氣內攻腐壞筋骨穿通臟腑矣治石疔瘡則忌瓦礫磚石之類治刀鐮疔瘡則忌鐵刀傷割若是者可以藥治也素問又曰人病頸癰或石治之或針灸治之而皆已此蓋同病異治也夫癰疽之氣弱者宜針開除去之氣盛血聚者宜石而瀉之若然則砭石九針之用各有所利善治血脈之變癰疽之病者當審輕重而制之並聖濟總録自王執中下色診洛陽孫伯英因誣獄妻子被系逃於故人是夜覺胃脅痛託故人求藥故人曰有名醫張戴人在焉當與公同往時戴人酒未醒強呼之故人曰吾有一親人病欲求診戴人隔窗望見伯英曰此公伏大驚恐故人曰何以知之戴人曰面青脫色膽受怖也後會赦乃出方告戴人儒門事親華他傳鹽瀆嚴昕與數人共候他適至他謂昕曰君身中佳否昕曰自如常他曰君有急病見於面莫多飲酒坐畢歸行數里昕卒頭眩墮車人扶將還載歸家中一宿死三國志有士人病顏面青而光其氣哽哽錢乙曰肝乘肺此逆候也若秋得之可治今春不可治其家祈哀強之與藥明日曰吾藥再瀉肝而不少卻三補肺而益虛又加唇白法當三日死然安穀者過期不安穀者不及期今倘能粥五日而絶宋史亦仿倉公傳汪石山曰伏經脈最難求如積熱之久脈反沉細而外症又寒苟非兼望聞問切何可得也世俗諱言試醫醫復諱情妄臆而豪貴婦女往往不得望聞豈不大錯
