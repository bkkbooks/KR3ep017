body:
  text: 卷十七目孫兆治國婆婆患眼冷淚眼科官治二三年不效上召孫孫至曰臣非眼科但有藥耳容進方用石決明一兩赤小豆兩半半夏五錢生斑蝥二十一粒炒去頭足木賊五錢為末薑汁丸如桐子大每服二十丸薑湯下方進聖旨下眼科詳定奏曰此方與眼科甚不相涉斑蝥有毒恐傷臟腑不敢用令再取聖旨國婆婆聞之曰眼科醫官不惟不能亦不願使我治也但合此藥總傷無怨上聞之孫自進藥服經十餘日愈八分二十日全愈時眼科並降兩官孫賞錢三十萬雄按眼科雖降官其言未可為非婆婆眼雖愈其方未可為訓學者勿盡信書也竇材治家中女婢忽二目失明視之又無暈翳細思此女年少精氣未衰何緣得此症良由性急多怒有傷肝臟故經脈不調所致遂與密蒙花散一料如舊光明矣張子和治女僮目忽暴盲不見物此相火也太陽陽明血氣俱盛乃刺其鼻中攢竹穴與頂前五穴大出血目立明李民範目常赤至戊子年火運君火司天其年病目者往往暴盲火運災烈故也李是年目大發張以瓜蒂散湧之赤立消不數日又大發其病之來也先以左目內眥赤發牽睛狀如鋪麻左之右次銳眥發赤左之右赤貫瞳子再湧之又退凡五次亦五次皆湧之又刺其手中出血及頭上鼻中皆出血上下中外皆奪方能戰退然不敢觀書及見日張云當候秋涼再攻則愈火方旺而在皮膚雖攻其里無益也秋涼則熱漸入里方可擒也惟宜暗處閉目以養其神水暗與靜屬水明與動屬火所以不宜見日也蓋李因初愈後曾冒暑出門故痛連發不愈如此湧泄之後不可常攻使服鼠黏子以退翳方在別集中趙君玉目暴赤腫點洗不退偶思張語曰凡病在上者皆宜吐乃以茶調散湧之一湧赤腫消散君玉嘆曰法之妙其迅如此乃知法不遠人人自遠法耳王之一子十餘歲目赤多淚眾工無效張曰此兒病目還當得之母腹中被驚其父曰妊娠時在臨清被圍乃令服瓜蒂散加鬱金上湧而下泄各去涎沫數升人皆笑之其母亦曰兒腹中無病何吐瀉如此至明日其目耀然爽明其日又與頭上出血及眉上鼻中皆出血吐時次用通經散二錢舟車丸七十粒自吐卻少半又以通經散一錢投之明日又以舟車丸三十粒投之下十八行病更不作士人趙仲溫赴試病兩目赤腫睛翳不能識路大痛不任欲自尋死一日與同儕釋悶坐於茗肆中忽鉤窗脫鉤而下正中溫額上髮際裂三四寸紫血流數升血止目快能通路而歸來日能辨屋脊次見瓦溝不數日復故此不藥不針誤出血而愈夫出血者乃發汗之一端也亦偶合出血法耳一小兒名德孫眼發赤其母買銅綠欲洗兒目煎熟家人誤與兒飲之須臾大吐吐訖立開婁全善男目珠至夜疼連眉稜骨及頭半邊腫痛用黃連膏點之反甚諸藥不效灸厥陰少陽疼隨止半日又作月餘以夏枯草二兩香附二兩甘草四錢為末每服錢半清茶調下咽疼減半四五服良愈一男子所患與前症皆同但黑睛有白翳二點諸藥不效亦以此藥與東垣選奇湯加四物及黃連煎間服並灸厥陰少陽而安王海藏妻侄女形肥笄年時得目疾每月或二月一發發則紅腫難開如此者三年服除風散熱等劑左目反有頑翳從銳眥遮瞳人右目亦有翳從下而上經云從內走外者少陽病從下上者陽明病此少陽陽明二經有積滯者也脈短滑而實鼓還則似短澀潔古云短為積滯遏抑臟腑宜下之遂用溫白丸減川芎附子之二多加龍膽草黃連如東垣五積法從二丸加起每日加一服加至大利然後減丸又從二丸減起忽一日於利中下黑血塊若干如黑豆大而堅硬從此漸痊而翳盡去以上三則皆醫學綱目盧州知錄彭大辦在臨安暴得眼赤後生翳一僧用蘭香子本名羅勒又名香果又名醫子草洗曬每納一粒入眥內閉目少頃連膜而出一方為末點之李時珍嘗取子試之水中亦脹大蓋此子得濕即脹故能染惹眵淚浮膜耳然目中不可著一塵此子可納三五顆亦不妨礙亦一異也本草綱目張大復云予目初眇有教服三花五子丸者或云緩甚寧益於用乎遂止揚州張鬥岳謂予淮僧某者久眇晳然問之則服三花五子丸也此古本所載耳而修合之法稍異則效不效應焉比歸請以相與予病且老無事於方然願得之以濟同病者張信士通劍術其言多不妄筆談張三丰真人治目疾碧雲膏臘月取羯羊膽十餘枚以蜜裝滿紙套籠住懸檐下待霜出掃下點之神效即二百味草花膏另一製法兗州朱秀才忽不見物朝夕拜天因夢神傳方用好焰硝一兩銅器熔化入飛過黃丹二分片腦二分銅匙急抄入罐內收之每點少許即愈張三丰仙方宋丞相言黃典史病外障翳夢神傳一方用太陰玄精石陰陽火煅石決明各一兩蕤仁黃連各二兩羊子肝七個竹刀切曬為末粟飯丸梧子大每臥時茶服二十丸服至七日烙頂心以助藥力一月而愈朱氏集驗方魏全家富母忽然失明王子貞卜之曰明年三月一日從東來衣青者療之必愈至時候見一人著青綢襦遂邀為重設飲食其人曰僕不解醫但解作犁耳為主人作之乃持斧就舍求犁轅見桑曲枝臨井上遂斫下其母兩眼煥然見物此曲枝桑蓋井之所致朝野僉載王璽集要詩云赤眼之餘翳忽生草中鵝不食為名塞於鼻中頻頻換三日之間復舊明又倪惟德原機啟微方用鵝不食草本名石胡荽曬乾二錢青黛川芎各一錢為細末噙水一口每以米許㗜入鼻內淚出為度一方去青黛本草綱目經驗方治目障翳以熊膽少許淨水略調開盡去筋膜塵土入冰片一二片或淚癢則加生薑汁些少時以銅筋點之絕奇赤眼可用余家二老婢俱以此效熊膽善闢塵試之之法淨一器塵其上投膽一粒許則凝塵豁然而開同上朱丹溪治飛絲入目紅腫如眯痛澀不開鼻流清涕用墨膿磨以新筆塗入目中閉目少時以手張開其絲自成一塊看在眼白上卻用綿輕輕拭去即愈如未盡再治又飛絲入目用頭垢點入目中即出神效又眯目病此彥良記之七十餘更無眼疾延壽書有人年八十餘眸子瞭然夜讀蠅頭字云別無服藥但自小不食畜獸肝人以本草羊肝明目疑之余曰羊肝明目性也以食百草故他肝不然畜獸臨宰之時忿氣聚於肝肝主血不宜於明目矣延壽書陳坡次女痘後餘毒上攻遂成內障遍試諸藥半月不驗後得老醫一方用蛇蛻一具淨洗焙燥又花粉等分細末之以羊子肝破開入藥在內麻皮縛定用泔水煮熟切食之凡旬余而愈其後程甥亦用此效槎庵小乘萬密齋治孫撫軍淮海患目疾因宦學政時多閱卷而得今每閱文案則眼珠脹痛用八珍湯為主人參茯苓炙甘草酒洗當歸酒炒白芍酒炒生地黃去白朮以其燥也川芎以其竄也加麥冬五味子柏子仁棗仁黃連減半共十一味孫曰何不用菊花蔓荊子曰凡目疾有外因內因由風熱得之為外因宜發散所謂火鬱則發之也由久視傷血得之為內因宜以養血為主所謂目得血而能視也服十數劑全愈孫文垣治吳小峰與弟小川俱病目專科治之益甚其目始紅腫次加太陽痛繼以白星翳疊出脈之小峰濡緩而大兩目血縷入貫瞳人薄暮則痛虛小川則洪大鼓指黑珠有浮翳膜隱澀難開大小便皆不利實故於小峰用補先以清肝散與之夏枯草五錢香附四錢甘草錢半細茶五分以撤其痛治標藥兩進而痛止方法與前婁全善案同繼用人參茯苓熟地杞子桂心牛膝破故紙白蒺藜丹皮治本則桂紙蒺藜當酌用於小川用瀉內用瀉肝湯及當歸龍薈丸外用象牙冰片末點之凡點眼藥研須極細七日全愈經云實者正治虛者從治小川之症惟厥陰肝火熾盛肝常有餘有餘者瀉之正治也小峰則下虛又為怒所激怒則火起於肝肝為藏血之地故血絲貫瞳人而薄暮作痛故先用清肝散以去其痛再用甘溫補下元之虛俾火得歸原此從治也若用苦寒降火之劑恐血凝而痛加且火激而愈熾矣侄孫眼紅腫脹或以苦寒治時疾之劑與之眼愈腫且增兩太陽痛再加石膏病不減且遍身脹悶寢食俱廢脈之弦大無力乃用蔓荊子桑白皮柴胡香附夏枯草甘草芽茶一帖痛定兩帖腫消四帖全愈一女孩右目紅腫腹中飽乃能開飢則不能開此疳積寒症也以夏枯草二錢甘草穀精各一錢香附一錢五分煎服四帖而安孫氏婦年過四旬眼赤腫太陽痛大便三日不行經水四日未止諸治不效右目內眥突生一白泡垂與鼻齊大二寸余專科見而卻走以為奇疾時眩暈不能少動動則嘔吐益劇孫脈之兩寸關俱滑大有力兩尺沉微此中焦有痰肝膽有火為怒所觸而然經云諸風掉眩皆屬於肝諸逆衝上皆屬於火蓋無痰不作暈也卻未然其白泡乃火性急速怒氣加之氣乘於絡上而不下故暴脹垂下也古壯士一怒目眥裂與此理同治當抑肝木鎮痰火先用薑汁益元丸以壓火止吐再以二陳湯加酒連酒芩天麻滑石吳萸竹茹枳實一帖吐止稍能運動仍以二陳湯加芩連菊精草夏枯草香附苡仁吳茱萸四劑赤腫消白泡斂經止而愈俞東扶曰此案見證甚怪治法甚穩因知醫病只要明理毋庸立異也呂東莊治吳綺厓弟患左目痛連腦醫以頭風治之不解初時發寒熱後遂壯熱不止呂診之曰火伏於內風燥泉涸木乃折矣非得汗不解也或曰汗須用發表藥獨非風燥乎且發汗藥須擁被悶臥乃得身熱甚苦此奈何難得妙呂曰庸醫發汗皆屬強逼故須擁被悶臥然而汗不可得也說破此輩伎倆正是教人苦心今藥非此類雖薄衾舒體時雨自至豈能阻遏哉語欠圓活乃用龍腦白朮飲子必逍遙無疑夜分大汗淋漓次日頭目爽然矣龍腦白朮飲子無從考覈有謂即趙氏加減逍遙散未知是否原注雄按議論超妙而所用之方仍是風劑似與泉涸二字失照應矣吳孚先治一人目痛取竹葉一片刺鼻之迎香穴出血而痊鼻內迎香穴乃手足陽明交經也治法本張子和王宗蒼目珠紅赤驚悸腸鳴色夭不澤左手浮空右關尺重按無力吳曰此肝腎交虛不能制遊行之火非肺家實火也朝服加味歸脾湯夕服八味丸不一月白珠紅退脈漸沖和矣楊賁亨治一貴人患內障性暴躁時時持鏡自照計日責效數醫不愈召楊診曰公目疾可自愈第服藥過多毒已流入左股旦夕間當發毒竊為公憂之既去貴人日夕視左股撫摩惟恐其發也久之目漸愈而毒不作貴人以楊言不驗召詰之對曰醫者意也公性躁欲速每持鏡自照心之所屬無時不在於目則火上炎目何由愈故詭言令公凝神於足則火自降目自愈矣雄按此移情妙法醫能隅反勝用逍遙越曲諸方矣兵行詭道惟醫亦然貴人曰良醫也厚禮而遣之筠齋漫錄江西通志載此大略範武子嘗患目痛就張處度求方處度因嘲之曰古方宋陽裡子少得其術以授魯東門伯魯東門伯以授左邱明及漢杜子夏鄭康成魏高堂隆晉左太衝凡此諸賢並有目疾相傳此方云一減思慮二專內視三簡外觀四旦晚起五夜早眠熬以神火下於氣海蘊於胸中然後納諸方寸修之一時近能數其目睫遠視尺棰之餘長服不已洞見牆壁之外非但明目乃亦延年同上黃履素曰予少時神氣不足患目每用目少過輒酸澀無光者累日博考方書多雲六味地黃丸可治目予連服二三料目疾轉甚改用別方補腎氣血之藥始得少愈後讀醫學鉤元有目病不宜服六味丸辨謂澤瀉茯苓滲水山茱萸不宜於目山萸味酸肝開竅於目經云肝病者毋多食酸凡肝腎病皆不宜些三味不惟目也言之甚詳以予驗之此論良是然從今思之目病有屬血虛亦有屬氣虛者予血固不足氣則尤虛薛立齋治兩目緊澀不能瞻視以為元氣下陷用補中益氣湯倍加參耆而愈予悔往時不多服前湯而專事於補腎養血致久不痊迨四十後以指麻多服前湯原無意於治目而目光漸充始信往時之誤予幼時患風弦爛眼甚受其累百藥罔效遇一陳姓醫士於長安邸授予白末藥令敷於眼眥患處隨敷隨愈取效如神不肯傳方予略訪之云有吐蛔在內吐蛔者小兒口中吐出蛔蟲收干候用其中想更有制就蘆甘石配之者真奇方也張三錫治一人病目久不能治涼藥盡試不應診之兩手微弱命服八珍加麥冬一月如舊乃知飲食不運腸胃枯澀發落皮皺噎膈淋閉等症目昏耳聾悉由氣液血脈榮衛衰少不能升降出入虛火阻滯而然故元府閉則小便淋濁火炎上則目視昏花有如隔簾視物之象也丹溪東垣治目昏用參耆補養氣血久靡不獲效以氣血旺則元府得利升降清明也一人目赤黑珠傍暗赤成瘡耳中癢作腎臟風治用四生散每作三二服即愈時稱為聖散聖惠方白附子黃耆獨活沙苑蒺藜也一人拳毛倒睫用木鱉子一個去殼為末綿裹塞鼻中左塞右右塞左一二夜其睫自分治法匯陸肖愚治孫憲副夫人因怒氣患兩目赤痛兩太陽亦痛治及半月赤痛益劇且腫大如桃經行數日不止大便數日不行飲食不進頭眩吐逆脈之左弦右滑上下俱陽分有餘曰相火寄位於肝膽怒氣觸之其發如龍雷不可逆折病雖上劇而下緩然實因下而逆於上也用醋炒柴胡青皮吳茱萸炒黃連鹽水炒黃柏酒炒黃芩白芍丹皮青黛竹茹為煎劑以抑青丸合龍薈丸一日夜煎丸各二服遂減大半第大便未行經血未止煎劑仍前以抑青丸合潤字丸投之便行極澀進粥安睡明日諸症俱愈後以清氣養榮湯調理之一老人年八十四夜能細書詢之云得一奇方每年九月二十三日桑葉洗目一次永絕昏暗宜五月五日六月六日立冬日採者佳倪新溪母陶氏哭子喪失明已十一年忽一人踵門曰吾能療瞽時其孫上成均宗黨會餞俱在其人曰諸君但少留此視之發囊出針針其目兩眥目頓能見物撫其孫頂曰吾久不睹汝今成人矣新溪德之手百金謝其人不受而去眾以為神云間雜誌九江有夫毆其婦致雙睛突出適有兵過其門令勿動取手巾水濕盛睛旋轉使其系不亂然後納入即以濕巾裹住令三日勿開其婦性急閉二日遂解巾眼好如故但遇風寒常發痛云解早之故也奇疾方王帶存抄輯晉顧含養嫂失明嘗藥視膳不冠不食嫂目疾須用蚺蛇膽含計盡不得有一童子以一合授含開乃蚺蛇膽也童子出門化為青鳥而去嫂目遂瘥晉書王叔權云即執中也予遊學會稽早觀書辰牌方食久之患目澀倦遊而歸同舍遺以鹽精數次揩目而疾除鹽精且爾則青鹽之治目固也古方用青鹽揩牙因掬在手洗目而目明鹽精乃鹽倉地下之精英資生經唐丞相李恭公扈從在蜀中日患眼或澀或生翳膜或即疼痛或見黑花如豆大累累數日不斷或見如飛蟲翅羽百方治之不效僧智深云相公此病緣受風毒夫五臟實則瀉其子虛則補其母母能令子實子能令母虛腎是肝之母今腎受風毒故令肝虛肝虛則目中恍惚五臟亦然腳氣消中消渴諸風等皆由腎虛也此僧深得經旨雖未能暢發所以終是唐人高手諸說紛紛徒亂人意耳地黃丸悉主之用生地黃熟地黃各一斤石斛防風皆去蘆枳殼炒去穰牛膝酒浸杏仁去皮尖各四兩上為細末不犯鐵器煉蜜丸如桐子大空心以豆淋酒下五十丸豆淋酒法黑豆半升淨揀簸炒令煙出以酒三升浸之不用黑豆用此酒煮獨活即是紫湯百乙方陸景淵之子患爛弦風眼兩眥皆痛淚漬兩頰皆即成瘡百藥不效因理故書得此方試點之須臾藥淚俱下循瘡中流出其間有小蟲自此遂愈甚妙黃連一兩淡竹葉一兩柏樹皮乾用一兩而半濕用二兩上三味㕮咀以水二升煎至五合稍冷用滴目眥及洗爛處日三四用同上咒偷針眼已結赤腫未成膿者神驗取患人衣衫角以手緊捻定於所患眼大眥上搵之每一搵即念一聲移甚底移橛眼如此一氣念七過搵七遍訖隨身就手捻令緊打一結結定自然便退直候眼安方解切在志誠不須令病人知咒語或欲自移亦甚可同上朱丹溪治一人病眼至春夏便發當作郁治用黃芩酒浸南星薑製香附蒼朮俱童便浸連翹各二兩山梔炒一兩川芎童便浸一兩半陳皮酒浸草龍膽酒蒸卜子青黛各半兩柴胡三錢為末神麯糊丸服之旬月而愈治法華川陳明遠患瞽十齡百藥屢嘗而不見效自分為殘人松陽周漢卿視之曰是醫翳雖在內尚可治用針從眥入睛背卷其翳下之目歘然辦五色陳以為神續粹趙良仁云丹溪先生嘗用參膏治一老人目暴不明昏暗如夜正靈樞謂氣脫者目不明是也余亦曾治一士人患頭風連左目壅痛從戴人法於百會上星出血皆不效遂在頭偏左之足太陽所過第二行與上星對平按之甚痛處出血立愈由是而言針之與藥必切中病所藥與邪對然後可愈前人之方不過立規矩耳藥要或問繆仲淳從父病後眼花服此立愈蓋肝腎二經虛也真甘枸杞一斤去蒂真懷生地黃一斤極肥大者酒洗淨河水砂鍋內熬膏以無味為度去渣重湯煮滴水成珠便成膏也每膏一斤入煉蜜六兩空心白湯化下廣筆記黃學諭潛白患風淚眼每出則流淚盈頰繆仲淳疏一方寄之穀精草為君蒺藜和枸杞之屬佐之羊肝為丸不終劑愈同上薛立齋治一男子眼赤癢痛時或羞明下淚耳內作癢服諸藥不效氣血日虛飲食日減而癢亦盛此脾腎風熱上攻也以四生散白附子黃耆獨活沙苑蒺藜酒調四服而愈又一人頭目暈眩風膚瘙癢搔破成瘡以八風散治之亦愈張石頑治澄和尚患眼疾二年服祛風清熱藥過多致耳鳴嘈嘈不止大便艱苦燥結近左眼上有微翳見燈火則大如斗見月光則小如螢張曰此水虧而陰火用事也月乃陰精腎水內涸不能氾濫其光故視之甚小燈本燃膏之焰專擾乎陰不能勝其灼爍故見之甚大合脈參證知為平日勞傷心脾火土二臟過燥並傷腎水真陰也遂疏天王補心丹與之他如徐中翰燕及見日光則昏眯如蒙見燈火則精彩倍常此平昔恆勞心腎上盛下虛所致上盛則五志聚於心胞暗侮其君下虛則相火失職不能司明察之令得燈燭相助故精彩勝常此與嬰兒胎寒夜啼見火則止之義不殊專事眼科者能悉此義否立齋曰世傳眼眥初生小泡視其背上即有細紅點如瘡以針刺破眼時即瘥故名偷針實解太陽經結熱也人每試之有驗張子顏少卿晚年常目光閃閃然中有白衣人如佛相者子顏信之彌謹乃不食肉不飲酒然體瘠而多病矣一日求汪壽卿診卿一見大驚不復言但投以大丸數十小丸千餘粒囑曰此十日內服之當盡卻以示報既如約視所見白衣人變黃而光無所見矣乃欲得肉食欲思飲酒又明日黃亦不見竟氣象異他日矣乃詣壽卿以告卿曰吾固知之矣公脾初受病為肺所乘心脾之母也公既多疑心氣不固自然有睹吾以大丸實其脾小丸補其心肺為脾之子既不能勝其母而病自愈矣道山清詁未選入沈存中雲予為河北察訪使時病目赤四十餘日黑睛傍黯赤成瘡晝夜作楚百治不效郎官邱革相見問予病目如此曾耳中癢否若耳中癢即是腎家風有四生散療腎風每作二三服即瘥閭里號為聖散子予傳其方合服之午後一服臨臥一服目反大痛至二更乃能眠及覺目赤稍散不復痛矣更進三四服遂平安如舊是時孫和甫學士帥鎮陽聞予說大喜曰吾固知所以治目矣向久病目嘗見呂吉甫參政日頃目病久不瘥服透冰丹乃瘥如其言修合一劑試服了二三十服目遂愈乃知透冰丹亦療腎風耳未選入龔子才治一人兩目作痛服降火祛風之藥兩目如緋熱倦殊甚用十全大補湯數劑諸症悉退後服補中益氣湯兼六味丸而愈復因勞後目澀體倦仍取十全大補而痊一人目赤不明服祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節以補中益氣湯加茯神棗仁山藥五味頓愈又勞役復甚用十全大補兼前藥而痊前日與歐陽叔弼晁無咎張文潛同在戒壇予病目昏將以熱水洗之文潛曰目忌點洗目有病當存之齒有病當勞之雄按此治目疾之妙法蓮華經也庸人自擾宜乎盲矣不可固也又記魯直語云治目當如治民治齒當如治軍治民當如曹參之治齊治軍當如商鞅之治秦頗有理故追錄之東坡志林相公崔公慎由廉察浙西左目眥生贅如息肉欲蔽瞳人悶極諸醫方無驗譚簡見曰此立可去但能安神不撓獨斷於中則必效矣崔公曰如約雖妻子必不使知譚又曰須用九日睛明亭午於靜處療之若其日果能遂心無憂矣是時月初也至六七日間忽陰雨甚譚生極有憂色至八九大開霽問崔公飲酒多少崔曰量雖至小亦可引滿譚大喜是日於使宅北樓請飲酒數杯端坐無思俄而譚以手微捫所患曰殊小事耳初覺似拔之雖痛亦可忍又聞動剪刀聲乃白崔曰此地稍暗請移往中庭坐既定聞櫛然有聲先是譚請好綿數兩染縫至是以絳綿拭病處兼敷以藥遂不甚痛請開眼看所贅肉大如小子指堅如干筋遂命投之江中後數日詔徵入秉鈞因語錄唐趙璘魏玉橫曰金封翁年近七旬病暈厥即類中風也小愈後眼花不良於步或教以一味白蒺藜水泛為丸每早晚服四錢既可祛風又能明目且價廉而工省才服數日覺口咽苦燥再服遂陡然失明重以鬱怒暈厥復作目閉不語汗出如珠延診脈已散亂姑以熟地二兩杞子一兩煎服一時醫至不敢主方欲就中加附子一錢謂重劑純陰宜少入陽藥余曰此症外間多用參附湯有致筋枯皮黑人未死而半身先死者以衰微之陰被劫也雄按此真閱歷之言余亦目擊多人矣今症屬三陰虧竭五志之火上炎故卒然暈厥且病人以誤服白蒺藜之燥失明而病作寧可再服附子醫乃默然去二味服下神氣漸蘇乃減半入沙參麥冬沙苑蒺藜而愈今常服之兩年許能辨瓷器花色矣後復更醫不知何病而卒盧玉川年六旬外久病脅痛凡一切香竄古方莫不遍嘗後一醫與丸方以葫蘆巴為君余多伐肝之品服之脅痛果暫愈既而一目失明猶不謂藥之誤也再服則兩目俱損脅痛轉甚延診以大劑生熟地杞子女貞沙參麥冬蔞仁與之一服即愈始悟向藥之非然目中黑水神光枯竭已久不能復矣一人年二十左右求診無他病惟日入則兩目無所見此即諺語所謂雀盲是也其脈惟左關大左尺極微語之曰君得毋新婚乎曰然與生地杞子牛膝甘菊沙參麥冬女貞四劑而愈因戒其房幃撙節否則再發成廢人矣方懋春內人患喑荊防二味為時師治喑所不可缺者服四劑不慮其芳香燥烈競致兩目赤腫眵淚成障也已逾月漸次失明診之兩寸上溢且弦數令前方加當歸白芍數服而愈其侄亦同此患時已瞳人迸出不及藥矣消障救睛散石斛錢半生研羚羊角一錢草決明一錢連翹錢半白蒺藜一錢龍膽草五分酒炒灰甘菊八分木賊草五分漢防己一錢茺蔚子一錢水二盅煎八分食遠服王晉三曰白睛胬肉狀若魚胞世人咸用外點鉤割殊非正治余因制此方以石蟹為君性大寒而燥去濕恝消胬肉如鼓應桴堪稱仙品佐以羚羊角之精靈熄肝風散惡血草決明療青盲去白膜連翹瀉客熱散結氣專泄大小眥之熱酒炒龍膽草退濕熱之郁翳白蒺藜散風破血木賊防己療風勝濕甘菊化風茺蔚行血諸藥皆入肝經仍能上行於肺用之屢驗尤在涇曰目赤腫痛人知降火而不知活血所以多不得力只用四物湯內地黃用生芍藥用赤加蒸大黃赤茯苓薄荷葉治之甚妙此戴復庵法也余謂目赤腫痛人知活血而不知治痰脾胃壅滯積熱生痰積痰生熱輾轉相因氣衝頭目昏痛不已者須用半夏石菖蒲黃芩枳實茯苓陳皮微兼菊花白蒺藜之屬治之耳許叔微治一男子年二十歲因瘡毒後腎經熱右耳聽事不明每心中拂意則覺重虛鳴疼痛地黃湯生地枳殼羌活桑白皮磁石甘草防風黃芩木通上為粗末每服四錢水煎日二三服不拘時候綱目朱丹溪治馮官人左耳鳴此因勞得之法當補陰而鎮墜之黃耆人參當歸陳皮茯苓升麻酒柏防風甘草白芍食前熱飲飲了去眠一覺綱目其方則似補氣而升舉之非補陰鎮墜也薛立齋治一人耳內不時作痛痛時欲死痛止如故六脈皆安非瘡也語間忽作度其有蟲令急取貓尿滴耳果出一臭蟲遂不復痛或用麻油滴之則蟲死難出或用炒芝麻枕之蟲亦出但不及貓尿之速也取貓尿法用生薑擦貓鼻其尿自出趙養葵治一小兒患耳膿醫以藥治之經年累月不效殊不知此腎疳也用六味丸加桑螵蛸服之愈吳孚先治張司馬素有火症兩耳腫痛系少陽風熱勸延針灸科刺聽會合谷臨泣尋愈柴嶼青治汪謹堂夫人兩耳蟬鳴昕夕不歇服過人參熟地四兩無少效柴曰腎開竅於耳心亦寄竅於耳治耳必責之腎固矣但診得兩尺尚屬有神決非腎虛左寸亦平緩無疴惟右寸關洪大此肺胃兩部風熱所壅而致遂不治病而治脈雄按鼻塞治心耳聾治肺非僅治脈也用清解之劑不數服而右耳已愈再服數劑兩耳全愈因思耳目口鼻雖於五臟各有分屬而內實相通治病惟以切脈為憑夫固有治在此而效在彼者全在一心之圓機活法也李元淳尚書在河陽日蚰蜒入耳無計可為腦悶有聲至以頭擊門柱奏狀危困御醫療之不驗忽有人獻方用胡麻油作餅枕臥須臾自出乃愈圖經本草綱目江湖記聞云有人壁蝨入耳頭痛不可忍百藥不效用稻稈灰煎水灌入即死而出也又萵草搗汁滴入亦能出百蟲入耳本草綱目薛立齋治一婦人耳內或耳後頂側作痛寒熱口苦月經不調此肝膽經火兼傷脾胃用四君加柴胡升麻黃耆白芍而愈後因勞役怒氣嘔吐脅脹用六君子湯加山梔柴胡而安一婦人耳內外腫痛胸脅不利寒熱往來小便不調此肝火傷血先用龍膽瀉肝湯四劑諸症頓退又用加味逍遙散而愈又因怒復作用小柴胡湯而痊一婦人經行後因勞怒發寒熱耳作痛以經行為血虛用八珍湯加柴胡怒氣為肝火用加味逍遙散勞役為氣傷用補中益氣湯加山梔而愈一婦人素鬱怒耳內作痛腫焮寒熱面色青黃經行則變赤用加味歸脾湯加味逍遙散而愈一婦人懷抱素郁因怒耳作腫痛經行不止發寒發熱面色青赤肝脈弦數此久郁傷脾暴怒傷肝先用加味小柴胡湯隨用加味逍遙散而痊一婦人因怒發熱每經行兩耳出膿兩太陽作痛胸脅乳房脹痛或寒熱往來或小便頻數或小腹脹悶皆屬肝火血虛先用梔子清肝散二劑又用加味逍遙散數劑諸症悉退乃以補中益氣而痊喻嘉言議王大司馬耳鳴症曰人之陽氣走上竅而下入於陰位則有溺泄腹鳴之患陰氣走下竅而上入於陽位則有窒塞耳鳴之患故人當五十以外腎氣漸衰於下每每從上逆腎開竅於耳而以肝木為之子是以謀慮鬱怒之火一動即疏泄母氣而陰氣從之上逆與聾病相去天淵聾病者竅中另有一膜遮閉外氣不得內入故以開竅為主方書所用菖蒲麝香及外填內攻等法皆為此而設耳鳴乃陰氣衝至上竅亦隔一膜不能越出竅外止於竅中薄薄有聲如蛙鼓蟬鳴外入之聲為內聲所混聽之不清若氣稍不逆上則聽稍清氣全不逆上則聽全清矣治此之法以重用磁石為主以其重能達下性主下吸又能制肝木之上吸也用地黃龜膠群陰之藥輔之更用五味山萸之酸以收之令陰氣自旺於本宮不上觸於陽竅然後清清朗朗聲入即通無壅礙也方書指為少陽膽厥陰肝二經熱多所致然少陽之氣能步走上竅皆絡於巔頂無觸筋沖耳之理不當與厥陰混同立說通聖散一方汗下兼用乃治壯火之法惟滾痰九少壯用之多有效者以黃芩大黃沉香之苦最能下氣而礞石之重墜與磁石之用相仿也高年之人腎水已竭真火易露故腎中之氣易出難收況有厥陰之子為之挹取乎然則壯水之主以制陽光如盞中添油燈焰自小豈非良治哉一婦人耳內腫痛出水寒熱口苦腫連頸項飲食少思此肝火甚也用小柴胡湯加山梔丹皮稍愈又加味逍遙散漸愈用八珍湯加柴胡丹皮山梔調補肝脾全愈一婦人耳內腫痛胸脅不利寒熱往來小便不調此肝經發熱也用龍膽瀉肝湯四劑諸症頓退用加味逍遙散而愈又因怒復作用柴胡清肝散而痊一婦人耳內不時脹痛內熱口乾勞則頭暈吐痰下帶此肝脾氣虛也朝用補中益氣夕用加味逍遙散而痊一寡婦耳內外作痛不時寒熱脈上魚際此血虛之症用小柴胡加生地以抑其血而愈又項間結核如貫珠寒熱晡熱用加味歸脾湯加味逍遙散調補肝脾而愈一婦人耳內外或作痛或赤腫或寒熱月經旬日而止潮熱內熱自汗盜汗此肝脾氣血俱虛而有熱用歸脾湯六味丸而愈一婦人性急或耳內作痛或耳外赤腫發熱脅脹日晡益甚此怒氣傷肝氣血俱虛朝用加味逍遙散加黃柏桔梗夕用歸脾湯送地黃丸而愈一孀婦耳內外作痛或項側結核內熱晡熱月經不調吐痰少食胸膈不利此鬱怒傷肝朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血而愈一女子耳下腫赤寒熱口苦月經不調小腹內結一塊此肝火氣滯而血凝也先用小柴胡加山梔川芎丹皮又用柴胡清肝散而痊一婦人耳腫痛發寒熱與荊防敗毒散四劑表症悉退以散腫潰堅湯數劑腫消大半再以神效栝蔞散四劑而平一男子肝經風熱耳下腫痛發熱脈浮數以薄荷丹治之愈薄荷皂角連翹三稜首烏蔓荊豆豉荊芥一男子每怒耳下腫或脅作痛以小柴胡湯加青皮木香紅花桃仁四劑而愈一婦人耳鳴內熱經行不調肢體倦怠飲食無味以肝脾虛熱用四君加柴胡山梔丹皮甘草而愈一男子耳內出膿或痛或癢服聰耳益氣湯不應服防風通聖散愈甚以補腎丸治之而愈魏玉橫曰朱餘二女中表姊妹也年十六七朱則耳痛常發癮疹因感冒痛暴甚耳門連頂皆腫以養青湯加黃芩羚羊蔞仁二劑而愈余則耳痛常流膿水因患瘄醫與荊防發之遂出血不止膈間嘈辣前方去羚羊加知母赤芍二劑血止數劑膿水乾二人脈皆關弦寸鼓乃腎與肝膽之火也余某早失怙恃困苦顛連年十四就西溪吳氏質庫食力值冬月查盤提唱勞劇忽右耳暴痛不可忍如刺如錐約一日夜內起一疱迸出黃水涓滴不絕數日乃干第水出則痛減水乾則痛除自後過勞即發其痛至欲求死如是者年必數次偶問一醫彼見少年得此謂由暴怒傷肝瘀血為患教服抵當丸不知此屬勞傷肝腎龍雷之火上攻而然幸合藥時肆中無虻蟲水蛭竟因循不服後年二十餘右耳漸聾病遂不作蓋此中經絡枯絕火亦不能透達也雄按余亦十四歲失怙而廢書服賈雖困苦備嘗而尚不致有疾者以母氏主持家事也讀此既感少境之與先生相類又憾學術空疏不能起老母之危疴涕淚交流為之淹卷葉天士治丁某腎開竅於耳心亦寄竅於耳心腎兩虧肝陽亢逆故陰精走泄陽不行依是以耳鳴時閉但病在心腎其原實由於郁鬱則肝陽獨亢膽火上炎清晨服丸藥以補心腎午服湯藥以清少陽以膽經亦終於耳也水煮熟地四兩麥冬一兩半龜板二兩牡蠣兩半白芍兩半北五味一兩建蓮兩半磁石一兩茯神兩半沉香五錢辰砂五錢為衣煎方夏枯草二錢丹皮一錢生地三錢山梔一錢女貞子三錢赤茯錢半生甘草四分徐靈胎曰方極清和可喜耳聾之法多端大端不過清上鎮下二條此案方極穩當至於外治之法及虛寒等症亦不可不知也鼻張子和治常仲明嘗於炎暑時風快處披露肌膚為風所賊三日鼻窒雖坐於暖處少通終不大解使服通聖散入生薑蔥根豆豉同煎三兩服大發汗鼻立通矣此由傷風而得有人患鼻中有瘜肉垂出鼻外不聞香臭用瓜蒂細辛等分為細末以綿包如豆許塞鼻中須臾鼻即通瘜肉化為黃水點滴至盡三四日愈又聖惠方用陳瓜蒂以羊脂和敷上日三次效醫學綱目薛立齋治一男子面白鼻流清涕不聞香臭三年矣此肺氣虛也用補中益氣湯加山梔麥冬而愈陳都憲夫人患鼻疳爛通鼻孔用鹿角一兩白礬一兩瓦上煅過人頭髮五錢燈火上燒過為末用花椒湯洗淨糝藥疳上三四次即愈如不收口瓦松燒灰存性研末干糝之即收一人酒齄鼻紅赤用金花丸晚服芩連梔柏大黃桔梗白葛粉井水為丸用六味地黃丸全料加當歸二兩苦參四兩空心服不兩月而愈孫文垣治吳儀制尚卿弱冠時病鼻塞不能噴嚏四年且衄寒月更甚口渴咽喉邊有痰核脈之右寸關洪滑此肺經痰火症也與前胡秦艽葛根薄荷石膏天花粉元參貝母山梔甘草白藥子桔梗丹皮四帖而衄止夜與牛黃三清丸數粒噙之鼻氣即通利能嗅噙未旬日全愈一婦人方妙齡表虛易感風寒致成鼻淵流清涕不止便覺頭暈兩太陽常痛且多噴嚏脈之兩寸洪大用秦艽酒芩桑白皮馬兜鈴各八分白芍一錢滑石石膏各二錢枳殼蔓荊子各五分甘草三分四帖而愈病鼻赤者乃陽明胃經火上炎一方只食鹽一味研細每晨起撮少許擦齒噙水蕩漱旋吐掌中掬以洗面行之月餘而鼻色復舊且有益於齒蘇談吳孚先治一人患鼻淵十載乃脾肺氣虛下陷須用補中益氣湯百劑方愈不信用白芷防風辛荑川芎等味病轉甚復求治與前方百帖而痊丹溪治一中年人右鼻管流濁且臭脈弦小右寸滑左寸澀灸上星三里合谷次以酒芩二兩蒼朮半夏各一兩辛荑川芎白芷石膏人參葛根各五錢分七帖服之全愈乃痰鬱火熱之症也大還一人鼻中流臭黃水腦亦痛名控腦痧有蟲食腦中用絲瓜藤近根三五尺許燒存性為細末酒調服即愈又灸法囟會在鼻中直上入髮際二寸再容豆是穴通天在囟會上一寸兩旁各一寸灸七壯隨鼻左右灸常見灸後去臭肉一塊從鼻中出臭不可言而愈有人卒食物從鼻中縮入腦中介介痛不得出以牛脂或羊脂如指頭大內鼻中以鼻吸入須臾脂消物逐脂出也治法匯孫文垣治從侄中叔以暑月赴南雍一日假出索茶飲之輒從左鼻逆流而出入腹者十之三治幾一月即粥飯亦多鼻出矣服藥漸加噁心頭暈肌削四肢無力診畢詢醫作何症投何劑曰僉謂此疾書所不載治法無稽或云胃火或云諸逆上衝皆屬肝火所用非黃連解毒即三黃石膏及諸苦寒之劑自以多飲火因酒動理或為然然竟無效曰治病貴辨經絡之貫通與臟腑之出入豈拘拘徒守方書而已哉經云咽喉者水穀之道路氣之所以上下者也頏顙者分氣之所泄也人之涕出不收者頏顙不開也此症亦類是耳頏顙不開故氧上而不下會厭弱而不能掩其氣喉夫鼻乾氣喉相通惟不掩故飲食逆從鼻竅而出不見常人偶氣逆則飲食從噴嚏出乎今右脈緩弱無力氣虛明矣經云形寒飲冷則傷肺脾胃喜溫而惡寒因多服寒涼所以噁心頭暈肌削也蓋肺屬金而主氣金氣旺則收斂下降氣下降則飲食自不逆矣六君子湯加辛荑桑白皮苡仁沉香一進而勢緩三進而止大半七劑全安王執中母氏久病鼻乾有冷氣問諸醫者醫者亦不曉但云疾病去自愈既而病去亦不愈也後因灸絕骨而漸愈執中亦常患此偶絕骨微疼而著艾鼻乾亦失去初不知是灸絕骨之力後閱千金方有此症始知鼻乾之去因灸絕骨也若鼻涕多宜灸囟會前頂大人小兒之病初無異焉許知可自停飲食已必嚏服棗膏丸而愈本事方孫氏姑鼻不聞香臭有年矣後因他病友人繆仲淳為處方每服用桑皮至七八錢服久而鼻塞忽然通矣魏玉橫曰沈晉培年三十許患鼻淵黃濁如膿時醫以為風熱上淫於腦與薄荷辛荑川芎蒼耳白芷蔓荊古方治之不效反增左邊頭痛所下涕亦惟左鼻孔多就診曰此肝火上炎為疾耳與生熟地杞子沙參麥冬十餘劑而愈是症由傷風用力去涕而得者易愈若因火盛而成必由水虧而致蓋肝脈上絡巔頂督脈會腦為髓海為龍火鬱蒸故膿濁腥穢源源而下有若淵然久之督脈之髓亦隨輸泄致成勞損者有之醫學自立齋以前宋元明初諸公未詳肝腎之治至國朝諸老亦漸講明然多雜耆朮桂附惟集靈膏一方最善治法匯載之但云吳中一醫用之所向神效是亦知其然而未知其所以然也故守兔園一冊其覆餗多矣一瞽者徐姓年三十來鼻淵年餘醫亦與辛散服之覺反甚遂堅守不藥之戒此古人心靜自能消息病情故不為庸所誤後遇予教服集靈膏十餘帖而愈一費氏子年二十餘亦患此症時師與辛荑蒼耳芎芷荊薄之屬至百二十劑後就診於予兩手脈神氣索然告以不可治矣果月餘而歿廣筆記曰經云膽移熱於腦則為鼻淵夫髓者至精之物為水之屬腦者至陽之物清氣所居今為濁氣邪熱所幹遂下臭濁之汁是火能消物腦有所傷也治法先宜清肅上焦氣道繼以鎮墜心火補養水源此其大略耳藥多取夫辛涼者辛為金而入肺有清肅之義故每用以引散上焦之邪如薄荷荊芥甘菊連翹升麻鼠黏子天麻之屬鎮墜心火補養水源如犀角人參天冬麥冬五味硃砂甘草山藥生地茯苓丹皮之屬然須兼理肺肝蓋鼻乃肺竅而為腦氣宣通之路又治乎上焦而行清肅之令膽為春升少陽之氣與厥陰為表裡而上屬於腦載人有云膽與三焦尋火治內經謂膽熱由肝義亦明矣理肺用桑皮鼠黏桔梗二冬花粉竹瀝清肝膽以柴胡白芍羚羊角竹茹棗仁川芎或者謂世人多用辛溫辛熱之藥取效此義何居蓋辛熱甘溫多能宣通發散故病之微者亦能奏效此從治劫法非不易常經明者察之口張子和治相臺監酒岳成之病瘧滑泄日夜不止腸鳴而口瘡俗呼為心勞口瘡三年不愈令以長流水同薑棗煎五苓散五七錢空心使服之以治其下以宣黃連與白茯苓去皮二味各等分為末以白麵糊為丸食後溫水下三五十丸以治其上百日而愈作濕火治一男子病口瘡數年上至口中至咽嗌下至胃脘皆痛不敢食熱物一湧一泄一汗病去其九次服黃連解毒湯不旬日皆釋作實火治一男子年二十餘病口中氣出臭如發廁雖親戚莫肯與對語張曰肺金本主腥乃金為火所煉火主焦臭故如是也久則成腐腐者腎也此熱極則反兼水化也病在上宜湧之先以茶調散湧之去其七分夜用舟車丸浚川散下五行比旦而斷嗚呼人有病口臭而終其身者世說以為肺系偏而與胃相通故臭妄論也立齋治廷評曲汝為口內如無皮狀或咽喉作痛喜熱飲食此中氣真寒而外虛熱也用加減八味丸而愈虛寒一人胃弱痰盛口舌生瘡服滾痰丸愈甚反瀉不止惡食倦怠此胃氣被傷也與香砂六君子湯數劑少可再以補中益氣湯加半夏茯苓而愈立齋治一男子口臭牙齦赤爛腿膝痿軟或用黃柏等藥益甚時或口咸此腎經虛熱以六味丸悉愈虛熱孫文垣治汪東之手談過勞口中生瘡凡進大苦大寒之劑十餘日瘡益甚延及於喉藥食難進脈之六部俱豁大無力有專科欲敷口疳藥令以荊芥湯洗而引之攪出稠涎二三碗傾於地偶二雞爭啄之立斃其毒如此亦症之奇者乃囑其用藥只可吹入喉中必俟喉全好然後敷舌舌好再敷口唇毋得概敷令毒無出路反攻入喉則誤事矣謂其父曰此虛陽口瘡也非附子理中湯不可救曰瘡乃熱症況上身已熱又天時酷暑大熱之劑其敢進乎曰此陰盛格陽之症誤服寒涼激之試探兩足必冷按之果然遂與人參白朮各三錢大附子炮薑炙甘草各一錢水煎冷服服後即酣睡達旦次早能食粥半盞足膝漸暖藥仍如舊適散步午歸見舉家號慟曰本熱病誤服熱藥今舌腫大塞滿口中不能言語不可為矣駭其驟變再脈之則六脈斂而有神面色亦和獨舌脹大心知為寒涼敷藥所致也乃詰之曰今日可用敷藥否曰已二次矣令急取官桂研末五錢以生薑自然汁調塗舌上塗訖則涕淚流出口內涎垂舌頓消去即令取粥與食使壓之庶虛火不再升蓋舌滿脹者乃敷藥寒涼閉其毒氣毒無從出故耳以桂調薑汁塗之辛散之義也黃師文父病口瘡師文治之不愈心訝之乃密訪諸婢果其父嘗晝同一婢子寢明日瘡作師文即詳其時節明日即用其父所寢時令其父淨濯足以其藥貼腳心瘥不外吳茱萸生附子等藥北窗灸輠盧不遠治李某口舌生瘡幾三年矣脈浮細急數按之空虛而尺尤甚用立齋虛火不歸經法以加減八味丸料二劑即愈柴嶼青治吳穎庵少廷尉甥閔年三十口舌生瘡下部泄瀉脈尺弱而無力寸關豁大此陰盛於下逼陽於上若用涼藥清火則有礙於脾用燥藥治脾則有礙於舌惟有引火歸源之法竟用附子理中湯冷飲送八味丸三錢兩服頓愈光祿卿李瀛少夫人患口瘡醫屢投清火寒涼之劑無效更兼泄瀉飲食少思始求治按其右關微弱知系胃虛谷少復為寒涼損傷致脾胃虛衰之火被逼上炎則為口瘡元藏虛寒則為泄瀉也惟補其火散其寒則火得所助接引而退舍矣方用人參白朮附子炮薑炙甘草李君畏不敢與服逡巡數日勢益困勉用前方連進數劑即安蓋口瘡非止一端有上焦實熱中焦虛寒下焦陰火各經傳變所致必須分別治之不可執也陸養愚治姚明水天稟素弱脾腎兩虛幸能節養兼服溫補之劑中年頗健啖因無子置妾遂患口瘡齒痛初以涼膈散數錢服之即愈自後常發常服至半年許滿口腐爛飲食不進脈之兩寸浮數而微關尺浮弱而澀謂形雖有餘精仍不足當嚴守禁忌服滋補藥涼劑不可再投矣用八物湯倍地黃以峻補腎水加桂附各一分引火歸原經謂折之不去求其屬以衰之是也煎就涼服十劑其患如失薛立齋治儒者劉允功形體魁偉冬日飲水自喜壯實薛曰此陰虛也不信一日口舌生瘡或用寒涼之劑肢體倦怠發熱惡寒乃與六味地黃補中益氣而愈王肯堂治常熟嚴養翁相公春秋高而求助於厚味補藥以致胃火久而益熾服清胃散不效加山梔芩連而益甚以為涼之非也疑其當補聞王善用人參因延診而決之才及門則口中穢氣達於四室向之欲噦此正清胃散症也獨其熱甚當用從治而既失之今且欲從而不可矣當求其屬而衰之用天冬麥冬生地熟地石斛升麻犀角蘭香之類大劑投之數日而臭已止矣經云諸病寒之而熱者取之陰所謂求其屬也火衰於戌故峻補其陰而熱自已後因不屏肉食胃火復作大便不利目翳耳鳴不能自忍雜進寒涼時或利之遂致不起嗟乎苟知其熱涼之而已則塗之人皆可以為盧扁何事醫乎郁崗齋筆塵邑侯許少微患口糜王謂非乾薑不能愈許猶疑之後竟從王言而愈從子懋鋙亦患此甚危急熱甚惟欲飲冷水王用人參白朮乾薑各二錢茯苓甘草各一錢煎成冷服數服乃已噫此豈可與拘方者道耶口瘡無論新舊遇夜臥時將自己兩睪丸以手握緊左右以手揉之三五十遍每夜睡覺輒行之愈於服藥蘇談立齋治一男子口舌生瘡服涼藥愈甚治以理中湯而愈又一男子口舌生瘡飲食不甘勞而愈甚亦與前湯頓愈一男子口糜爛服涼藥愈甚脈數而無力以四物加酒炒梔柏元參一劑頓退四劑而痊一男子口舌生瘡脈浮而緩飲補中益氣湯加炮姜更以桂末含之即愈又一男子患之勞而愈盛以前藥加附子三片三劑即愈丹溪云口瘡服涼藥不愈者此中焦氣不足虛火泛上無制用理中湯甚則加附子一婦人常口舌糜爛頰赤唇乾眼澀作渴脈數按之則澀此心肺壅熱傷於氣血為患名熱勞症也當多服滋陰養血藥彼欲速效用敗毒寒劑攻之後變瘵症而歿婦人良方云婦人熱勞者由肺壅熱傷於氣血氣血不調臟腑壅滯熱毒內積不得宣通之所致也其候心神煩躁頰赤頭痛眼澀唇乾四肢壯熱煩渴不止口舌生瘡神思昏沉嗜臥少寐飲食無味舉體痠疼或時心怔或時盜汗肌膚日漸消瘦故名熱勞也焦秀才病口苦羅謙甫制龍膽瀉肝湯治之得效經云有病口苦名曰膽癉乃肝主謀慮膽主決斷為清淨之府肝取決於膽膽或不決為之恚怒怒則氣逆膽汁上溢故口苦或熱盛使然也寶鑑羅謙甫治梁齊民膏粱多飲因勞心過度肺金有傷以致氣出腥臭涕唾稠黏咽嗌不利口舌乾燥以加減瀉白散主之難經云心主五臭入肺為腥臭此其一也因大飲大熱之氣所傷從心火刑于肺金以桑皮地骨皮苦微寒降肺中伏火而補氣為君以黃芩知母苦寒治氣腥臭清利肺氣為臣肺欲收急食酸以收之五味子酸溫以收肺氣麥冬甘寒治涕唾稠黏口苦幹燥為佐桔梗辛溫體輕浮治痰逆利咽膈為使服數劑而愈尤在涇曰王肯堂治許少薇口糜謂非乾薑不愈卒如其言又從子懋鋙亦患此勢甚危急欲飲冷水與人參白朮乾薑各二錢茯苓甘草各一錢煎成冷飲日數服乃已蓋土濕則火斂人多不能知此所以然者胃虛食少腎水之氣逆而乘之則為寒中脾胃虛衰之火被迫上炎作為口瘡其症飲食少思大便不實或手足逆冷肚腹作痛是也唇李大富而極鄙吝唇生肉須一尺長痛不可忍或云用刀或云用藥鄰有金先生者曰我能治須講定謝金方醫眾親友講以十兩為謝金用末藥一匕爐中燒煙燻之即落去一寸袖手索謝李先付一兩五日已好及講完前約乃堅不與矣金笑曰逆知其然也明年必發即百金不用藥後果發遂死焉扁鵲謂重財者為六不治之一見續金陵瑣事晉魏詠之生而兔缺有善相者謂之曰卿當富貴年十八聞荊州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何為遂齎數斛米西上以投仲堪既至造門自通仲堪與語嘉其盛意召醫視之醫曰可割而補之但須百日進粥不得笑語詠之曰半生不語而有半生亦當療之況百日耶仲堪於是處之別室令醫善療之遂閉口不語惟食薄粥百日而瘥槎庵小乘薛立齋治一婦人懷抱久郁患繭唇雜治消痰降火虛症悉具盜汗如雨此氣血虛而有熱也用當歸六黃湯內黃芩連柏俱炒黑二劑而盜汗頓止仍用歸脾湯八珍散兼服元氣漸復更以逍遙散加歸脾湯間服百餘劑唇亦瘥一婦人唇裂內熱二年矣每作服寒涼之劑時出血水益增他症此胃火傷血而藥傷元氣也用加味清胃散而愈後因怒唇口腫脹寒熱作嘔此屬肝木乘脾土用小柴胡加山梔茯苓桔梗諸症頓愈復以加味逍遙散調補元氣而愈一婦人生育多胎月經不調兩足發熱至年餘而身亦熱勞則足腿痠疼又年餘唇腫裂痛又半年唇裂出血形體瘦倦飲食無味月水不通唇下腫如黑棗此肝脾血虛火盛也彼不信用通經藥而歿一婦人忿怒而唇腫或用消毒之藥唇腫出血年餘矣此肝木克脾土而血傷也須養脾胃滋化源為主彼執用前藥反進蝕狀如翻花瘤而歿一婦人懷抱久郁或時胃口嘈辣胸膈不利月水不調晡熱食少體倦唇腫已年餘矣此脾經鬱火傷血用歸脾湯加薑汁炒黃連山梔少佐吳茱萸嘈辣頓去飲食稍進乃去黃連加貝母遠志胸膈通利飲食如常又用加味逍遙散歸脾湯間服百餘劑月水調而唇腫愈州守劉克新患繭唇時出血水內熱口乾吐痰體瘦腎虛之症悉具用濟陰地黃丸年許而愈一儒者因勞役感暑唇生瘡或用四物湯加知柏之類而愈後復作彼仍用前藥益甚腹中陰冷乃用補中益氣湯加茯苓半夏治之而愈一男子素善怒唇腫脹服清胃等藥時出血水形體骨立用補中益氣湯加半夏茯苓桔梗月餘唇腫漸消元氣漸復又以四物加柴胡炒梔丹皮升麻甘草數劑乃去梔加參術而愈一男子內熱作渴咳唾痰涎大便乾澀自喜壯實此脾腎陰虧陽旺之症當壯水之主不信自服二陳芩連之類次年下唇漸腫小便赤澀執守前藥唇出血大便黑塊小便淋瀝再求治曰大便黑結小便淋瀝肝腎敗也唇口腫白脾氣敗也辭不赴竟歿齒元亨在大聖中結道友登岳頂至明皇館故址得斷碑數行彷彿有古文洗滌之得歌一首曰豬牙皂角及生薑犀角升麻蜀地黃木律旱蓮槐角子細辛荷葉要相當青鹽等分同燒煅研細將來使最良揩齒固牙髭髩黑誰知世上有仙方荷葉下注云翦荷葉心子也因錄以歸朝之名卿鉅公皆依之修用其效響應皇朝類苑朱端章云余被檄任淮西幕府時牙疼大作一刀鑷入以草藥一捻湯泡少時以手蘸湯挹痛處即定因求其方用之治人多效乃皺面地菘草也俗人訛為地蔥沈存中筆談專辨地菘其子名鶴蝨正此物也錢季誠方用鶴蝨一枚擢置齒中高監方以鶴蝨煎米醋漱口或用防風鶴蝨煎水噙漱及研草塞痛處皆有效本草綱目周密志雅堂雜抄治齒痛腫云用黑豆以酒煮汁漱之立愈王修竹云其閣中嘗用驗仙人鄭思遠常騎虎故人許隱齒痛求治鄭曰虎鬚及熱插齒即愈拔數莖與之醫說澤州李繼之忽病牙痛皺眉不語欒景先見之曰何不樂也曰牙痛欒曰曾記戴人云陽明經熱有餘也宜大下之乃付舟車丸七十粒服畢遇數知交留飲強飲熱酒數杯藥為熱酒所發盡吐之吐畢而痛止李大笑曰戴人神仙也不三五日又痛再服前藥百餘粒大下數行乃愈儒門事親姚應鳳視一人唇有紅痣無他病苦乃謂之曰此齒藎三年必死其人怒不應三年齒潰詣求救謝曰君天譴也不能過期矣果歿錢塘縣誌龔子才治一人齒浮作痛耳面黧色口乾作渴日晡則劇此脾虛弱也用補中益氣湯加減八味丸而痊一男子每足發熱牙即浮腫此足三陰虛火用加減八味丸而不復作李小園患滿口牙齒疼痛潰爛動搖飲食不下乃牙疳也諸醫不效忽遇道人傳一方用川椒炒一錢五分銅青一錢硼砂一錢三味為末每少許擦患處流涎立瘥易思蘭治一人患齒病每有房勞齒即俱長痛不可忍熱湯涼水俱不得入凡有惱怒痛亦如之十年前尚輕十年後殊甚每發必三五日呻吟極楚竟絕欲服補腎丸清胃飲俱不效一日疾作七日不飲食診其脈上二部俱得本體惟二尺洪數有力此腎經火邪太盛也以滋腎飲餌之且漱且嚥下二盞隨覺丹田熱氣升上自咽而出復進二盞其痛頓止齒即可叩永不再作其方黃柏三錢青鹽一錢升麻一錢水五碗煎湯頻漱之嚥下其人問曰吾病齒二十年試藥不下百餘皆未效君用三味而奏功何也曰齒屬腎諸痛屬火今診得脈洪數有力愈按愈堅蓋沉濡而滑者腎脈也洪數有力者心脈也腎脈不沉濡而洪數是所不勝者侮其所勝乃妻入乘夫腎經中已有火邪矣如遇房勞則相火一動邪火上衝故齒長而痛也又腎者肝之母肝者腎之子肝主怒怒氣一發則子益母氣木來生火而火愈熾矣齒豈不長而痛乎其用清胃飲者以牙齦屬陽明胃也此惟胃脈洪數者為宜今胃脈平和是胃無恙用清胃飲何益也非惟無益且寒涼傷胃反飲食不進矣又腎主骨齒乃骨余腎經火盛致令齒長復用補陰丸治之中有乾薑等熱藥以火濟火其痛愈甚故用黃柏為君以滋腎水泄腎火青鹽為之引升麻升出腎經火邪藥一入口便覺丹田火熱上升自咽而出腎臟一清齒自安矣何必清胃補腎哉俞東扶曰此案醫理講得最精由於脈象認得的真而更運以巧思斯發無不中矣清胃散之庸誠不足責即泛用滋陰藥亦難應手只此三味詮解甚明信乎缺一味不可多一味不必也余鄉有患齒痛數年諸藥不效者葉天士用山萸肉五味子女貞子旱蓮草各三錢牛膝青鹽各一錢而全愈此取酸鹹下降引腎經之火歸宿腎經可與易公方並垂不朽雄按謝再華室患上齦右痛匝月益劇四晝夜不能合目渾身肉顫足冷面紅舌赤無津余視之患處不腫脈軟無神氣衝覺冷乃肝火為患也以鹽湯送下滋腎丸三錢一睡而愈呂東莊治許開壅病齒上齦從耳根痛起便苦楚不可耐醫用平胃降火藥日增劇診之關滯而尺衰授方以熟地為君杜仲為臣女貞子甘草黃柏山藥山萸為佐其尊人青臣舉以問醫曰此方何如醫曰大謬不可服問其謬狀曰齒病為陽明之火與腎何干而俱用補腎藥耶青臣曰果爾則吾知此方之妙矣乃更邀往視呂曰病見於上而治當從下起此有步驟不可責速效也仍用前藥數劑繼用人參白朮茯神甘草白芍棗仁遠志當歸黃耆丹皮數劑痛已減而未去也診其兩尺已應右關以上皆平和惟左關尚鬱塞曰今當為君立除之遂用補中益氣湯和龍膽草即愈後小發復加減前方愈之因囑之曰此雖小疾而其根在下當謹調攝毋使頻發也孫文垣治昆池內人患牙痛一晚暈厥三次次日兩腮紅腫痛不可支且灑淅惡寒寢食以廢與清胃湯加石膏為君白芷為臣連翹為佐北細辛為使服之痛如失外以明礬為末大五倍子一枚入礬滿之炭火炙以礬紅炙為末不時擦牙痛處立止此方多效孫蠖齋因食雞嚼骨迸碎其齒出血至暈自後遇雞鳴時輒痛不可忍余時則否凡燕會遇雞湯羹則痛發即不染指痛亦然如是數年其家禁不畜雞親舊欲招之者必先戒廚人弗用也後有人教食黃鼠狼家人乃設法捕得一頭烹而進之孫以其物異心惡之強飲湯數呷爾後遇雞輒啖如常了無所苦矣新案文潞公方治牙齒風熱上攻腫痛獨活地黃各三錢為末每服三錢水一盞煎和滓溫服臥時再用本草薛立齋治毛宗伯齒痛胃脈無力用補中益氣加生地丹皮治之而愈楊考功齒動作渴屬脾胃虛弱陰火熾甚用補中益氣加炒黑黃柏四劑又服加減八味丸諸症頓愈王侍御齒搖齦露喜冷飲食此胃經濕熱先用承氣湯以退其火又用清胃散以調理而齒固繼用六味丸以補腎而痊一男子晡熱內熱牙痛齦潰常取小蟲此足三陰虛火足陽明經濕熱先用桃仁承氣湯二劑又用六味丸而愈茯苓石膏龍骨各一兩寒水石二兩半白芷半兩石燕子大者一枚小者一雙末之早晚揩牙繁峙王文漢卿得此方於鱗撫折守折守得於國初洛陽帥李成折年逾九十牙齒都不疏豁亦無風蟲王公今九十食肉尚能齒決之信此方之神也續夷堅志薛立齋治一婦人因怒齒痛寒熱作嘔用清胃等藥益甚此肝火傷胃寒藥復傷故也用六君子加白芍柴胡山梔而愈一婦人發熱齒痛日晡益甚月水不調此脾經血虛用逍遙散加升麻尋愈後因怒復痛仍以前藥加川芎而痊一婦人胃中嘈辣甚則熱痛後患齒動此胃中痰火也用二陳加芩連下越鞠丸而瘳一婦人因怒牙痛寒熱此肝火侮脾土用小柴胡加芎歸苓朮山梔而疼痛止用加味逍遙散而寒熱退一婦人每產後齒齦動搖皆痛逾月乃止此氣血虛動也後復懷妊臨月與十全大補湯二劑令產後煎服其齒不動如故廷尉張中梁齒動搖用安腎丸考功楊仲玉齒動用補中益氣湯侍御王濟川齒搖齦露用承氣湯文選鄭伯興齒腦痛用羌活附子湯顏金憲齒痛用涼膈散郭職方過飲用清胃散黨吏部風熱用犀角升麻湯朱工部血氣虛用十全大補湯沈大尹頭腦齒痛頭重手足厥冷此風寒入腦用麻黃附子細辛湯並愈一男子齒痛脈數實而便秘用防風通聖散即愈一男子齒痛胃脈數而有力以清胃散加石膏荊防二劑而痊一男子齒痛甚胃脈數實以承氣湯一劑即止一男子齒痛脈浮無力以補中益氣湯加黃連生地石膏治之不復作一老人齒痛午後即發至晚尤甚胃脈數而實以涼膈散加荊防石膏王教授云有老婦人舊患牙疼人教將兩手大指交叉以大指頭盡處為穴灸七壯永不疼恐是外關穴也穴本手少陽去腕後二寸陷中泉州一梢子妻舊亦苦牙疼人為灸手外踝穴近前些子遂永不疼但不知千金所謂足外踝耶手外踝耶識者當辨之百乙方辛帥舊患傷寒方愈食青梅已而牙疼甚有道人為之灸屈手大指本節後陷中灸三壯初灸覺病牙癢再灸覺牙有聲三壯疼止今二十年矣恐陽谿穴也銅人云此穴治齒痛手陽明脈入齒縫中左疼灸右右疼灸左效同上昔率為樂清主簿者蛀牙疼不可忍號呼之聲徹於四鄰用藥不效有丐者獻一方用之即安以漢椒為末及巴豆一粒同研成膏飯為丸如綠豆大以綿裹安在蛀牙孔處立效同上馬敏叔說一村媼苦牙痛百藥不效用絲瓜兒俗呼為磨蘿燒灰存性為細末擦痛處立止同上香白芷太平州道地者不拘多少硃砂一分白芷並另研上為細末入硃砂拌勻煉蜜如櫻桃大每用一丸擦痛立止廬州郭醫傳云渠親曾累取效盡勝他藥此藥乃濠梁一村婦人以醫治帥母夫人者倉卒不用硃砂及蜜亦可其功只在香白芷耳趙從簡府判所用只白芷細辛二味等分亦每作效同上李莫安撫女子退齒逾年不生甚以為撓因過平江會李亮卿語之李云予有一方已經試驗用之一月齒遂生用雌烏雞雄烏雞糞以二雞各畜之舊鞋底麻底尤佳上三物等分燒灰存性研細入麝香少許同研敷於齒齦同上立齋治黨吏部頰腮腫焮至牙齦右關脈數此胃經風熱上攻也以犀角升麻湯治之而消郭職方齒腫焮至頰腮素善飲治以清胃散數劑而愈一男子患齒痛服清胃散不應服涼膈散而愈盛予用補胃丸治之而愈固齒方取老鼠頭骨牙同鹽煅存性研細以擦動牙即堅固不搖來天培治一婦人五旬患齒痛連腦兩頰赤腫惡寒發熱脈細而澀此肝脾鬱結為患治以逍遙散加熟地石膏荊穗杞子一劑而腫痛減再劑而諸症釋然脫頷羅太無治一人伸頸而頰車蹉但開不能合以酒飲之令大醉睡中吹皂角末搐其鼻嚏透即自正矣醫學綱目龔子才治一人因怒氣大叫下頦脫落任掇不上眾莫措手令以烏梅槌餅塞於兩腮至牙盡頭控處張口流涎須臾隨手掇上張三錫治一婦人錯下頷古謂脫金鉤兩手脈弱用八珍湯加升柴遂全愈先用手法拿上正骨科當知雄按余治一人以大劑熟地柏杞龍眼肉而愈
