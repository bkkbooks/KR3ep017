body:
  text: 卷二十七順證萬密齋治羅野松年十六出痘或曰凡出痘者春夏為順秋冬為逆今冬出時逆也痘起發頭面要腫今被寒氣遏抑毒不得出故頭面不腫症逆也曰不然春夏為順秋冬為逆非以時言以症言也蓋春夏者發生長養之令也秋冬者收斂閉藏之令也痘本陽毒自出現而起發自起發而成膿如苗而秀秀而實故曰春夏為順如應出不出應發不發謂之陷伏故曰秋冬為逆頭面不腫順症也頭浮腫者險症也頭面預腫者逆痘也今痘本磊落尖圓堅實其毒輕微故不腫若頂平根闊肌肉鮮紅此為毒盛不待起發而頭面先腫矣或又曰起發太遲宜服溫補曰痘無病不須服藥此症紅潤鮮明表氣足也大小便調裡氣充也無熱無渴無他病也若補之謂之實實此症不十數日必收靨矣果不藥而安雄按此乃千古名言吳氏子五歲出痘起發時頂平而陷曰順症也凡出痘以氣血和平為主尖圓堅實者氣也紅活明潤者血也紅活平陷者血至而氣不足也圓實而色白者氣至而血不足也平塌灰白者氣血俱不足也焮腫紅綻者氣血俱有熱也今痘出即密時日未到氣血未周以漸起發得其常也故曰順症不須服藥已而果然看痘之法盡此數語氣虛徐仲光治一兒痘初標於下頰腎部也形平陷氣不足也少神血不足也六脈沉弱五朝尚暗色不起兩腿作痛便溏有氣凝血滯之象此乃氣虛脾弱之症宜大補中氣以補中益氣湯加蟬蛻肉桂羌活二劑而起脹繼以保元湯加肉桂陳皮調理八朝溏泄不已加木香訶子肉蔻治之而愈一兒痘起脹頂平而色淡白渴瀉肢冷喜熱飲經曰陰甚者飲沸湯不知熱又曰大寒而盛熱之不熱是無火也治之宜益火之源以消陰翳用陳皮散異功散又八味丸治之而愈一兒痘六日稠密形平塌色黑滯有擬云掩天庭者有擬鎖項鎖胸者然形色雖逆而四肢紅活綻突唇口紅潤起止安寧飲食如常二便調適雖毒盛氣血不足幸脾胃尚強宜補養而兼保固以補中益氣加紫草蟬蛻牛蒡等劑其逆痘俱平漿破漏結痂發疔癰數處而愈此亦氣虛血熱之證用藥甚合法費養恆治一兒因內傷而吐次日見痘甚密一日絕無起勢松肌透表二劑不應次日以保元湯加薑桂少許二劑亦不應三日加參耆至三錢四五日略起終頂陷囊薄七日加參耆五錢鹿茸膏半杯仍無沛然之勢或謂邪得補而愈盛曰果爾則煩熱燥渴色蒼老礬紅矣今皮薄色白頭溫足冷症可知也乃以參耆各一兩鹿茸膏大半盞一劑即綻突如珠根紅頂白不一日漿即肥膿其後收功不假餘力是以補為瀉之一驗也今無是症矣二句乃建中之言梟毒費建中治故友孫真老子四歲庚寅暮春痘甚勻朗稀疏而綻突其熱宜和其神宜爽乃躁亂乾熱頭汗如雨蓋梟熱內擾邪火外爍也頭為諸陽之首先賢謂毒參陽位者死幸初見勢雖騰湧而毒尚未有定位耳大黃二錢黃連六分石膏生地各三錢佐以地丁青皮荊芥蟬蛻木通山楂三劑頭汗收熱勢減減石膏黃連加丹皮滑石牛蒡四劑五朝仍壯熱紅暈如珠此痘起齊毒火盡外發也躁亂如前而更渴大便日三四次前方復用石膏黃連倍加生地至九朝漿甚老而乏滋潤紅暈未淡胃氣不開熱亦未減寐亦未安再服十二朝漸愈救偏瑣言嚴氏子一周痘稀朗且紅潤乃身熱如烙愁楚不堪兼顆粒不松此內有伏毒也以大黃六分石膏生地各一錢半荊芥丹皮山楂蟬蛻葛根青皮二劑大便三四次又二劑熱和神定根窠亦鬆宛然順症矣有阻之者遂勿藥至八朝仍熱叫哭失音頭面擦破身上紫滯幸未焦隱前方倍大黃生地黃連減葛根入大桑蟲日二劑以化毒丹調油胭脂如膏藥貼之次日癢止紅活又二劑漿足熱和十二朝用紅花地丁生地牛蒡荊芥木通甘草連翹山楂漸愈矣痘初似順一有伏毒便至如此余可知矣臧氏子八歲患疳僅存皮骨庚寅仲春見痘羸憊如此似宜培補矣乃身熱如烙目紅如火燥渴不已溺血如膏椒紅點滯此梟毒挾烈火發即內攻若不通變七日即內潰也以大黃四錢石膏七錢生地兩許佐以桃仁赤芍荊芥牛蒡木通臨服和豬尾血一盞日二劑或三劑六日加黃連自始至終一方而已約用大黃斤余生地石膏二十餘兩豬尾血十餘碗良以毒火猛熾苟不滌除淨盡功虧一簣矣痘後精神煥發飲食大進肌肉生長是以瀉為補之一驗也張仲文子癸未仲冬忽身熱如火神即昏憒舌刺如煤唇口焦黑血斑無數溺色紅鮮肉瞤筋惕有如驚悸宛然悶痘斷非輕劑可挽即用石膏一兩大黃五錢黃連三錢生地一兩佐以青皮荊芥地丁丹皮天寒稍配蜜炒麻黃三分姜一斤以行之灌下即嘔費曰毒火上衝水火搏激兩不相下故耳十餘劑見痘及見則以數記唇猶黑溺血依然至九日後黑退津生神氣漸省十二日溺血始淡胃氣日開十六日全愈服過大黃十餘兩石膏生地約二斤是早圖之一驗也毒壅附穢濁徐仲光治一兒痘紫色而不起脹乃毒盛壅遏也以紫草紅花蟬蛻煎酒調獨聖散服之又以犀角地黃治之紅潤起脹而愈一兒痘六日稠密紫滯平陷而不起脹煩躁悶亂亦毒盛壅遏也但分珠腳斂可治以人中黃每服三分酒調連二服色漸紅活又以犀角地黃湯加牛蒡蟬蛻痘綻突起脹而愈一兒痘血熱重初時純與涼血解毒犀角服過二兩石膏五錢一劑者服過五劑至十朝略用參三分托漿十二朝外漿清痂薄用助托藥加棉繭帶蛾者七枚糯米一合渴時即以麥冬糯米棉繭煎湯飲之又發水泡數個漿疤暗長灌爛遍身復用茯苓苡仁白芍黃連銀花甘草生地骨皮山楂蓮肉木通連翹牛蒡荊芥而愈清熱過重故元氣不能充漿所以善治者於清熱之時即預為異日催漿之地庶不至打成兩橛也萬世用云庚申春家有頑童僅十歲患痘瘡症適僕寓鄉之故盧聞報急歸視其疾不為不急且傍有煎炒油膩欲避莫能荷育溪曾世榮也療之恰七日瘡脹而光澤偶因舍下有動廁穢觸覺色黯而神昏大為驚懼育溪曰毋慮吾有除穢藥投之必安不數日果如其言遂拜更生用扣其所用何劑曰中和湯即十奇散如沉檀等劑而已余無他巧幼幼心書血熱施季泉治臧玉涵次郎年十六因新婚兼酒食忽感痘咸以為不可治至八日漿清寒戰咬牙譫語神思恍惚咸欲進保元湯大補之施季泉以為不然改用犀角地黃湯得愈脫痂後嘔吐大便燥結淹延一年繆仲淳視其舌有裂紋曰必當時未曾解陽明之毒故有是症以石膏一兩人參一兩麥冬五錢枇杷葉橘紅竹茹童便為佐一劑即安再劑膈中如冷物隔定只以人參投之服兩許即索粥食晚得大便夙疾頓愈廣筆記孫生東治鄭黃門子痘血熱大盛初起即以犀角地黃湯治之不效至用白芍八錢一泄毒解徐補收功同上家弟元著一發熱即譫語唇腫齒黑痘欲出不出醫者以為發斑傷寒也延仲淳季泉不至予曰事急矣以生地八錢白芍五錢苓連各二錢稍加發藥日三劑勢稍定痘漸次而出又減地黃白芍之半復於助漿藥中兼清涼之劑九十朝漿始足卒傷一目靨後方大便此真血熱也若重用解毒輕於補劑則目亦可以不眇矣同上黃綺雲治一兒初痘血熱甚用生地三兩煎濃汁頻飲其痘紫立轉紅色同上一兒痘毒盛又遇火令用白花地丁汁和淡白酒少許服之立解一兒痘稠密綻突但色紫暗壯熱煩渴譫語目赤便秘乃毒火亢極也以四順清涼飲加大黃六錢微利二度其勢稍減再劑服之又利二次病去其半再以前方加人參三錢前症悉平色見淡白精神疲倦邪雖去而正氣不足宜大補之又以保元湯加芎歸芍術而愈一兒痘出夏月起脹而乾紅壯熱煩渴舌燥不眠溺赤此內外熱極也以黃連解毒湯合化斑湯而愈一兒痘值六月六朝痘痛煩渴氣急便秘乃心肺實熱也恣與涼水梨汁飲之前症悉平一兒痘出勻朗綻突但枯燥而不肥澤皮膚皺揭皆屬於燥經曰燥勝則乾治以養血清金潤燥之劑又保元合四物加麥冬治之而愈萬密齋治鄒氏之子五歲出痘或以保元湯熱益甚或以為險曰此順症也期十八日安不須服藥蓋痘不可以日期算出已盡發已透膿已滿而後收靨可期也今痘出而熱轉盛者出未盡也由服保元湯犯實實之戒故令出遲靨亦遲也夫善攻不如善守無他症何以藥為已而果愈萬子婦患痘大熱大渴眼紅唇裂自利清水妄見妄語循衣摸床遍身紅斑如蚊跡皆逆症也此毒在三焦表裡俱熱非大發大下之劑不可救也乃以通聖散全料大劑與之一服而前症悉去痘出甚密復用十全大補湯去桂加防風連翹銀花桔梗調理而愈其痘自下收起亦奇事也一小兒痘後發熱大小便難瘡瘢帶赤或言虛欲用保元湯曰不可此實熱也因食辛熱之物得之果因食雞而得以三黃丸而愈諸熱徐仲光治一兒痘後午余發熱臉赤色譫妄狂顛乃火從虛發也以保元湯加歸芎川連而愈一兒痘後身熱減食面黃肌瘦右脈沉滑雖系內傷而脾胃則虛宜先調而後消之六君子加山楂青皮而愈一兒痘痂後能食便秘身熱口渴乃胃有蘊熱也遲則變生三黃丸清胃湯利之而愈一兒痘後夏令痞滿燥熱用巴豆下之心痞少解燥腸腹痛利下如爛魚腦強食即嘔痞噯不已足肘痛舌赤溺澀此乃傷元氣熱藥又傷之陰亡而陽獨存也一痘後傷食過用克伐致面黃少食午後潮熱用清熱劑更加泄瀉此中氣不足用六君補中益氣即愈一痘後身熱煩躁面紅唇赤驚掣此熱傷風也由於衣被太暖或近火積溫成熱熱極生風以犀角地黃湯合導赤散而愈萬密齋治徐氏子痘後發熱或用小柴胡湯竹葉湯黃連解毒湯皆不效乃與保元湯加當歸炒黑乾薑一服熱去費建中治沈氏女周歲身熱如焚汗出如雨兩目彷徨如畏刀鋸以大黃四分黃連三分石膏二錢佐以青皮木通山楂丹皮蟬蛻連二劑次日神色定放標數點磊落分明又二劑熱和神爽稀疏頗潤更以中和之劑八日愈吳橋治汪一龍幼而患痘方七日痘多而不起四肢皆涼痘色如浮萍乾紅枯紫渴甚啜茶水日數十升水瀉不禁諸醫皆以為寒也遞以木香異功散獨參湯補之既而下結血數枚諸醫辭去橋至則以為火症眾皆不然皆曰身涼飲水多且水瀉不止即有熱無傷也橋曰水瀉者挾熱也身涼者熱厥也視其口則舌有紅斑一黑斑三語眾曰此非熱而何遂大寒涼之劑投之一服得寐而渴止詰朝四服痘色微紅有神九日而起太函集汗徐仲光治一兒痘漿足盜汗此陰虛也用保元湯加浮小麥治之而愈一痘後盜汗肌瘦煩躁此陽虛也補中益氣湯倍耆加麥冬而愈中暑曾世榮治衡陽侯自牧次子五歲盛夏泄瀉面垢煩渴耳尻冷驚悸診其心肝脈浮而洪大脾肺脈虛而細數曰面垢渴瀉脈虛細數者此中暑也驚悸發熱耳尻俱冷肝心脈洪大者此痘瘡欲出也先服黃連香薷散解利暑毒續投陳氏異功散再加附子與之實脾二日瀉止三日瘡見不旬余而全功此隆暑用附子之效也幼幼心書費建中治鍾氏小女痘值炎天受暑煩擾非常壯熱如焚痘色乾紅累日不起渴思井水僅與碗許便覺爽朗求之不止竟飲及二斗通身微汗神怡始快痘頓起色亦紅活終以清火解毒收功渴徐仲光治一痘漿足漸蒼老宜靜以養之有謂脾主結痂用異功散加山藥白芍喘渴身熱此實症而用補劑內外皆熱也治以寬中湯又口齦發疳以清火解毒湯而愈一痘八朝漿滿身熱而渴咳有痰涎火盛津液涸也用白虎湯而愈一痘起脹煩渴不已寒之不寒是無水也宜壯水之主以制陽光六味地黃丸料加麥冬五味多服而愈一人十九歲痘六朝勻朗綻突淡白少神渴甚不已此虛弱而津液竭以人參二兩麥冬五錢水煎漸服又以補中益氣湯加枸杞二劑保元湯加冬芍歸杞九朝漿足渴止用人參一斤而愈一痘起脹乾紅焦紫根窠堅實便結煩渴用黃連解毒湯而愈一痘六日起脹形色順不食引飲此胃弱也調脾內托散治之即愈亦有毒壅而不食引飲者不可不辨徐仲光治一痘八日漿半足熱甚引飲有用保元湯而煩渴益甚余當倍加人參用人參二兩麥冬兩半煎成頻飲而渴止此渴甚藥輕不能生津以自救也一痘九日空殼無漿根血乾紅壯熱口渴與保元湯而渴愈甚此腎水枯涸不能生火宜壯水之主六味地黃丸料加人參當歸知母麥冬枸杞子菟絲子而愈一新婚後出痘燥熱而渴與冷飲即睡醒則復索飲不已時大冷大寒此亦腎水涸不能制火乃孤陽絕陰後雖行漿二三日而卒無陰則陽無以化正謂此也雄按何以不投甘寒壯水之劑一新婚後出痘燥熱引飲亦宜壯水制火用八味地黃丸料加人參麥冬五味子又用補中益氣湯而渴止熱減一痘七朝潮熱口渴自利下臭穢陳積此脾胃熱蒸而下也雖虛而無寒以保元湯固中之劑而愈若用燥熱之劑如木香散禍不旋踵一痘漿期壯熱煩渴舌乾口燥或疑津液不足與保元湯加麥冬而熱渴愈甚痘色焦紫此症本熱而衣被火爐過暖用補反助其熱宜清涼以黃連解毒湯加牛蒡而愈一痘後熱渴能食便秘溺赤咽乾口燥此心胃二經受邪也用白虎湯而愈一痘後口乾舌燥咽乾食少便調此脾胃虛津液不足也用參苓白朮散及參冬甘朮升葛麥冬花粉五味粳米而愈一痘後口渴食少小便數此食傷胃氣津液不生故渴而溺數也用補中益氣湯加麥冬五味而愈一痘黑陷黃色不食性好飲酒順其性與飲紅綻而愈一冬月出痘頂陷紫黑飲食藥餌俱不用以當歸浸酒與之而痘起脹收功一痘火毒閉而形若死移棄外庭遇暴雨而蘇此以水制其火也一險痘熱壅索飲不已連與井水數升渴止而痘起萬密齋治鄒氏子痘養膿時大渴不止議用人參麥冬散彼即依本方修合曰瘡太甚津液不足之症白朮燥津液茯苓滲津液皆所禁也乃以本方去茯苓白朮加升麻生地花粉知母淡竹葉一服渴止萬氏子痘養膿時大渴不止即用前加減方作大劑代湯飲之一帖而止痛一痘半出遍身作痛乃熱毒壅滯未盡外出故也活命飲加蟬蛻而愈一痘漿足而痛不止此諸痛為實也用白芷陳皮甘草牛蒡連翹山楂而愈一痘六七日痛不止此毒未化鬱而作痛也非虛非實不須治之俟毒從膿化其痛自止癢徐仲光治一痘初起作癢風寒外滯也升麻葛根湯焙荊芥穗熨而愈一痘起脹淡白神少泄瀉口渴而癢此脾胃氣虛也補中益氣湯去歸加桂附糯米而愈一痘成漿癢破是衛氣暴瀉津液不榮幸能食便潤四君子湯加芎芍橘復腫灌成痂而愈一痘成漿癢破潰爛乃濕火併至也調脾滲濕而愈一痘九日漿清作癢大補氣血而愈一痘見七日至十三日癢塌木香散加丁桂固表裡而愈萬密齋治鄭氏子痘將見形作癢不能禁曰起發時作癢者逆也貫膿時作癢者逆也漿靨時作癢者險也險者可治逆者不可治才見便癢書無此症因思仲景傷寒正理論云病身癢此邪在表欲出而不得出也桂枝麻黃各半湯陽明經病皮中如蟲行者此肌肉虛也建中湯今此身癢正是痘欲出不得出與太陽症同非陽明肌肉虛也乃以各半湯去桂杏加升麻葛根牛蒡一服癢止痘出甚密調治半月而安雄按真善讀古人書者屠家子出痘貫膿時請一巫誦咒噀水解厭後忽加瘙癢痘形平塌其色青白而氣腥臭曰犯房室穢氣也急令買膠棗一斤燒煙燻之痘轉紅活而癢亦止問其故老巫他往而子代之有房事胡氏女七歲痘初發熱兩手如捻物狀曰此肝病也經云其為病也握宜平其肝以瀉青丸去大黃加甘草柴胡青皮一帖而握止欲再進一帖不聽曰凡肝病者多水泡而作癢宜止之未發之前既不信七日後再議至六日盡抓破矣乃用保元湯加防風白芷二帖癢止再服著痂而安施季泉治臧玉函幼兒甫半周身熱一日即見痘專門云樹少花多頂平腳塌根窠薄百死一生之症也五朝固辭去藥以保元湯為主擬六朝多用人參加附子疑慮間施至曰此險症且戒云必發癢異常須看守嚴密藥用涼劑與前治大別七朝大發癢作瀉一日夜二十餘行或藥水或乳或湯飲俱傾注不變色或謂必無幸矣施怡然自若因強之用參必不許乃加炒黑黃連渴止十三朝復發癢口渴唇燥舌生白苔又加炒黃連白苔去到底不用參十九朝而別又戒曰慎防痘疔口疳疔之發也必在腦後枕骨間當以收口膏貼之禁用滲藥口疳惟君家人中白散為妙不數日發疳如其言治之輒效廣筆記疥癬一痘感暑毒靨後頭髮珠子因用香薷飲合犀角地黃湯加荊防服而愈一痘後遍身生瘡忽自愈而喘脹搐搦此同倒陷論先用升發使再作後用犀角解毒湯加人參而愈亦有用百解散發為丹腫者一痘遍身膿瘡久而肌瘦潮熱此毒已外泄宜固正氣為主補中益氣湯加苡芍茯防銀花石斛外治水銀膏一女十七痘後膿疥逢時即發苦參四兩歸芍芎防荊芥白芷牛蒡枸杞連翹蔓荊薄蒺蔞丹胡麻首烏各一兩黃米糊丸盡劑而愈一女痘順十二朝成膿疥身熱煩躁此毒壅失解也幸正不容邪以歸芍翹蒡芷防苡銀花治愈若失於解散多有損其肢目者矣疔徐仲光治一痘清漿結疕四肢發疔數處能食便調見其脾胃實強以內托解毒散治之潰出疔根用生肌散敷愈一痘清漿結疤便泄減食疔發二十餘處因脾胃虛弱正不勝邪毒反內攻解毒無效十四日頂陷而死愚按解毒中兼補托藥未必無效一痘漿足發疔數處壯熱煩渴便秘能食此有餘之毒未盡以四順清涼飲治之而愈萬密齋治朱大尹子痘至起發時項後手背有二痘變黑者摸之則痛此痘也急取胭脂數帖水浸取汁塗之盡汁而止次日紅潤起發汪氏子痘起發時有變黑者以朱公子事語之教取胭脂汁塗之不聽後一身盡成黑痘而塌復出一層又塌如此者三而卒汪氏子八歲痘起發時有黑枯者此痘疔也用四聖散胭脂汁調銀針撥開瘡頭塗之即轉紅活亦不蔓延數日後應收不收問之不便七日矣知其腸內燥結取豬肉爛煮和汁與食腸潤便通旋收靨鄭氏子症同以前法治之而愈此病皮肉不活根腳不腫者死若起發有水頂平而黑內服涼血解毒加燒人矢外用胭脂塗法若便秘得之裡熱內服四物湯三黃湯外用膽導若泄瀉此寒虛也用保元湯加木香桂如盡乾枯煩躁悶亂者不治水泡附膿泡萬密齋治李氏子一歲出痘起發時都似水痘曰痘乃胎毒五臟各具一症肝為水泡肺為膿泡心為斑脾為疹腎為黑陷此乃肝臟之症喜皮肉厚堅而色蒼蠟若皮薄色嬌不可治也乃以四君子湯加黃耆防風牛蒡母子同服十三日安梁大尹公子出痘起發時多成膿泡曰此險症也治晚矣越二日癢作而殞鄭氏子九歲出痘起發時額上兩頰皆成膿泡曰逆痘不可治也痘症自有次序初出一點血化為水水化為膿成而毒解矣如苗而秀秀而實今方苗而秀恐早發還先萎也七日後更論未及期大癢而死夾斑一兒發斑身熱口燥舌乾化斑湯及小柴胡湯加黃連而愈一兒發斑狂煩面赤咽痛梔子仁湯治愈一痘後發斑紫色身熱便秘過於溫補也四順清涼飲及解毒化斑之劑而愈一夏月發斑咽痛升麻葛根元參甘草桔梗牛蒡子治愈一發斑因以胎毒治以犀角地黃湯砭去惡血而愈有用犀角大青犀角解毒湯一發斑紫色煩躁便秘溺赤此毒盛也用黑奴丸而愈一發斑赤色腹脹便秘此內傷也調胃承氣湯下之反肢厥脈沉附子理中湯六君子湯治愈一夏月發斑由於暑毒用化斑湯合香薷飲而愈一夏月發斑勢盛狂煩此瘟毒也用五瘟丹黃連陳皮湯治之而愈一發斑身熱頭疼咳嗽由於風熱芎薊散葛根湯而愈一痘出斑如錦紋而間有顆粒色赤壯熱煩燥舌苔便秘此斑疹並出調胃承氣湯又用白虎湯合葛根湯而愈萬密齋治羅氏婦年二十七歲出痘遍身紅斑如蚊跡咸謂不治視其神識精明語言清亮診其六脈調勻問其飲食如常大小便調不煩不渴但遍身紅斑稠密無縫色且豔曰此夾斑痘也解去其斑則痘自見以荊防敗毒散加元參升麻作大劑一服次早斑退痘顯再一服痘起發調理半月而愈本邑各衙出痘先二衙一子一女長子後發熱見紅斑疑是夾斑症三四日後其斑盡收熱退身涼痘不出又四衙眾出痘一子發熱亦出紅斑亦亡恙乃信人言有不出痘者或發斑或發疹或發水痘皆可折過也必在正出痘時方論以上皆徐仲光所治而言之者夾疹一疹後報痘不易長大乾咳連聲不續此過於發散也保元湯加貝味甘桔橘紅而愈一疹後出痘失於解散咽喉腫痛聲啞水嗆飲食不進倒靨而死一疹後痘出三日痰咳喘急亦失於解散甘桔蒡膏陳枳殼蟬蛻蘇子疏邪解毒清金而愈一兒身熱咳嗽疹出隱隱以藥發之而不見不沒此風寒鬱而不散此癮疹也非正疹論芎蘇散治愈一兒痘出數顆而夾疹遍身圓朗紅活兩日盡沒有識者曰痘沒者必悶亂煩躁此卻安靜且正痘宛在乃疹沒非痘伏也以劑調之而愈一痘報點粗肥有紅盤間有細密隱隱者此水痘夾疹也內症安寧但表邪宜散葛根湯加荊防翹芷二劑而愈一水痘不膿而乾枯身熱煩躁此失解同於倒陷也治以葛根湯加荊芥防風連翹牛蒡子木通蟬蛻遍身發紅點此餘毒散也又用荊防解毒湯而愈萬密齋治一女二歲出痘遍身紅點大小相雜無空處此夾疹夾斑痘也以升麻葛根湯加荊防元參翹蒡淡竹葉木通一服減再服再減三服痘顯而愈夾丹附夾瘡徐仲光治一痘勻朗容易肥大淡白少神煩躁不寧因頭上素患肥瘡太甚耗泄真氣故也先用白芨膏紙封頭瘡後用保元湯而愈一痘正面勻朗綻突少神身肢平塌色暗因手足膿疥踵痛泄氣故也恐漿雖滿不能收功用保元湯加芎蒡耆芍歸甘陳防桂術調理而愈此症雖補而不保脾則必致泄瀉而不能收功一痘靨後平陷瘙癢遂發血風瘡用苦參梔翹防風獨活苡仁黃芩蜜丸服並灸風池三里二穴各五七壯愈一痘出膿疥後見其疤痕黑大有似痘疔須審頭面痘顆明白初起疏散涼血七八日後根窠紅黑不消亦宜涼血解毒十一二日根窠淡紅宜生血補劑愈一兒痘三日耳前紅腫如桃用葛根湯加荊芥防風桔梗牛蒡而愈一痘勻朗紅潤左腮腫塊青紫熱甚煩躁此痘先塊青名鬼捏真惡候也急與紫金救焚散而愈若此症治遲必毒攻於心發驚竄而死失血徐仲光治一痘發熱時衄血宜發之用升麻葛根湯加荊蒡而愈一痘四朝吐血痘陷淡白煩躁譫語妄言肢冷身涼此血熱毒壅未盡即服涼藥攻伐之故今血脫毒解而虛矣宜先益氣保元湯加薑附芎歸蟬芍糯米而愈一痘正起發而便血怠惰減食作渴肢冷此皆脾虛也四君子湯加升橘炮姜而愈一痘八日根窠赤腫脹滿痛煩渴飲冷便下黑血此熱毒內蘊也犀角地黃湯治愈一痘收靨身熱咳嗽血痰聲啞鼻衄此火刑肺金黃連解毒湯加麥冬犀角丹皮知母牛蒡而愈一痘靨後咳嗽不已此毒鬱於肺清金開鬱解毒而愈一痘靨後便下紫血此毒鬱滯下鬱金五錢牛蒡一錢每服五分燈心湯下一痘後溏泄糞後下血此脾弱也用異功散加升麻地榆黃連小柴胡湯而愈一痘後血淋乃熱結下焦也柏知通地小薊根藕節歸滑甘草梢竹葉服愈一女六歲標點吐紫黑血甚多然而唇舌滋潤形色俱順神寧氣旺竟無恙因女之父素有血症乃遺稟非毒也故不解毒不補脾而收功症雖險而症與神自順也未可以見點吐血紫黑為死也萬密齋曰里中林霄年二十餘染痘初發熱小便下血予聞之曰不可為矣或問故曰乙未春祁水桃村坳徐氏出痘死者十八人皆小便血也霄越三月殞傷食萬密齋治李氏女痘膿成將靨忽腹脹且痛氣喘呻吟曰瘡既胖壯膿又飽滿其脈弦滑此非痘毒乃傷食也詢之因食雞肉糯米飯曰宜急下之或謂痘瘡首尾不可下恐虛其里不靨也曰病不執方藥貴對症有是病則有是藥下之無妨遂以原物作湯吞丁香脾積丸得利而安金氏子痘成膿時忽腹脹作痛氣喘煩悶其痘光壯飽滿非毒也必曾傷食果因麵食過飽亦用前方法得利病稍定再用錢氏異功散加青皮山楂一服愈費建中治嚴孝廉子六歲丙戌仲夏見痘乾紅色澀頂陷不松身熱如烙煩躁不寧按其腹膈愁痛口噯腐氣此毒火內伏中宮停滯也以大黃二錢青皮錢許蟬蛻荊芥赤芍紅花地丁用山楂一兩煎湯代水連二劑下宿物甚多痘頓起色焮赤前方加黃連生地漸放白成漿第熱未和前方服至十二朝始收功費建中子二歲孟夏見痘壯熱昏迷乾紅稠密然得分珠亦不腳塌至三日絕無起勢氣粗煩悶轉矢氣極臭因痘前食一苧頭圓子重以枳實山楂桔梗前胡廣皮麥芽赤芍蟬蛻牛蒡去結屎甚多即起發紅潤後雖甚密幸獲收功施氏子痘始事者極其升發四日不起狂煩叫喊至啞目時上竄視其根窠尚在但稠密礬紅頂陷干滯身反涼按其胸膈手足皆起診其右手寸關洪滑而實此內積重而閉塞也以枳實五錢青皮前胡各三錢桔梗五分佐以荊芥蟬蛻用山楂二兩煎湯代水連夜進兩頭汁次午又進一劑下午去宿垢極多猶有雞肉未化者將晚又行一次即頓然起發神安身大熱色未轉以得通達火毒發見於外也改用涼血清解色漸紅活漿漸肥膿而收功寒戰咬牙徐仲光所治痘症甚多仁端錄抄出此下皆其神效者也載之一痘六日不起脹寒戰咬牙腹脹氣急用奇攻散補中益氣湯而愈一痘初發熱時惡寒身振動此邪正交爭欲出不出也用升麻葛根湯加人參防風桂枝山甲及補中益氣湯調理而愈一痘未出齊而手足搖動以異功散投之而更甚此假寒實熱木氣太過而兼火化也宜平肝制火升麻葛根湯加川芎柴胡防風而愈一痘發熱時咬牙兼竄視乃心熱甚也用升麻葛根湯合導赤散服之而愈一痘發熱時悶瞀咬牙此肝熱症也羌活湯加葛芍服之而愈萬密齋長孫二歲染痘發熱三日內寒戰似瘧其父泣曰死矣萬笑曰爾為醫救人病如篙工然忽遇風浪手足自亂何以濟人此兒元氣充盛毒氣微少邪不勝正作寒戰而退試觀其痘必少也果止五七粒七日愈一兒初發熱便咬牙戛戛有聲精神昏憒此逆痘也乃腎虛症蓋腎主骨齒者骨之餘腎水不足則毒火無制火氣煽動故上下相戛有聲陳氏所謂槁者是也果卒一兒痘甚密曰此兒脾胃素弱當用補胃之劑使血氣旺而痘易成就也不聽至成膿後過期不靨遍身潰爛寒戰咬牙失音悉具曰此戰乃遍身潰爛坐臥艱難不能自任非鼓頷寒戰也咬牙者齦瘡癢相戛而鳴非神昏鬥齒也失音者欲得肉食不與之日夜啼哭得之非咽喉爛瘡也用調元湯加白芷防風暗入熟附一片三劑而安寒折徐仲光治一痘五日形色少神腹脹喘急腸鳴肢冷或擬內傷者或擬陷伏者殊不知內傷者按必痛陷伏者必煩悶今便利安寧而虛鳴者乃陰陽二氣不和傷冷之症或服涼藥也經曰中虛不足則腹滿腸鳴以理中湯加木香陳皮官桂等疏逐冷氣諸症悉平又以補中益氣湯調理而愈一痘因春夏久雨為寒濕之氣所侵不能起者五苓散加蒼朮防風多服之佳或平胃快斑湯松江黃綺雲療徐氏兒痘兒幼遇冬月痘不起熾炭圍爐抱兒火邊以酒漿挹火火氣熏兒痘立起發廣筆記費建中治朱氏子痘稠密乾紅或以色滯便用清火兼升發累日不起見其鼻流清涕身涼且靜時在春初寒風凜凜此熱毒輕而感寒重毒火為外邪所閉也以溫肌透毒散陳皮枳殼荊芥連二劑身漸暖頓起發次日鼻塞眼封而痘發煌身漸熱清解治毒調理收功一兒痘稠密不松眉愁腹痛不寐毒盛也蒼白乾滯涕吐稠黏頭溫足冷邪閉也急疏風攻毒四朝體漸熱痘漸起色漸紅活但筋脈時惕以活血驅毒而愈一兒痘三日目紅鼻塞噴涕甚濃氣粗熱壯痘甚稀色滯乾紅無甚內症以荊芥穗葛根前胡黃芩牛蒡木通丹皮蟬蛻青皮赤芍三劑起發沛然六日肥綻順敘收功厥逆徐仲光治一兒痘四日溏泄無度四肢厥冷痘點隱隱其瀉已旬日此脾虛也以附子理中湯數劑瀉減肢溫又以補中益氣湯加肉果官桂瀉止後竟用補中益氣湯調理而愈一兒痘九日色灰白溏泄厥逆氣憊陰陽不相順接四肢為之厥冷也用陳氏異功散而愈一兒痘過期不斂便溏安靜四肢少溫但脾氣不足用參附芩陳甘芍山藥木香肉果治之破損不成痂而愈一兒痘七日肢厥減食乃血熱而過服冷劑以致冰伏也保元湯加丁桂炮姜而愈一兒痘六朝綻突焦紫煩躁悶亂喘促厥逆乃陽毒陷伏厥深熱亦深也以四順飲行二次諸症悉平又清解之而愈一兒痘四五日毒已盡形色無神二便自利四肢厥冷腹脹發噦裡氣虛弱也稍遲則胃氣脫矣急以理中湯連進二服內氣一暖痘即發光紅活四肢溫暖又以補中益氣湯加丁香噦止而愈一兒痘靨後自言手足冷及按之而熱夜臥不安經曰外熱而內冷者脾弱也內熱而外冷者胃弱也夜臥不寧脾陰不足也用歸脾湯而愈一兒痘後手足厥冷乃脾弱不能旁達四肢用保元湯加當歸白芍附子炮姜而愈昏冒萬密齋治汪氏子痘靨後忽然悶絕目閉口合令作調元湯加麥冬濃煎灌之又與粥湯遂愈此正氣素弱邪氣方盛壯火食氣氣益弱矣今邪氣既退正氣將生乃否極泰來之兆所以戒勿擾亂待其自蘇人不知此卒見悶絕或呼喚抱持神氣一散不救者多矣或謂恐有餘毒曰餘毒有三一曰疥二曰癰三曰目赤未聞有昏瞀也凡痘瘡或出不盡發不透或空殼無水或清水非膿則有餘毒今起發胖壯膿漿飽滿何餘毒之有哉驚搐徐仲光治一兒卒僕驚搐蘇而復作此風寒壅毒也紅棉散治愈一兒驚搐誤以驚藥涼其心痘不得出而死一兒初發熱搐以升麻葛根湯加天麻鉤藤木通蟬蛻枳殼痘出而愈一兒見點發搐此心血虛而客邪以四物湯加茯苓遠志石菖蒲棗仁蟬蛻而愈一痘初點驚搐不止此心脾虛而血少失治十朝而卒一痘出二三日驚搐此毒不透心經有邪導赤散加蟬蛻黃連紅花天麻鉤藤石菖蒲而愈一痘出未盡驚搐且溏泄肢冷異功散四劑而愈一痘漿期驚搐不止安神養血丸而愈一痘後驚搐吐瀉肢厥目直痰鳴此中氣不足補中益氣湯為主兼醒脾散附子理中湯下至聖保命丹而愈一痘後驚搐氣促痰喘口開目直二便閉澀此類急驚乃風邪有餘症宜清涼解散瀉氣以天麻抱龍瀉青丸治愈一痘後過食白果驚搐痰壅目直腹脹喘急此氣滯生痰甘草湯薑湯漸與服得吐瀉而愈不可以風治之也煩躁以下皆徐仲光所治一痘未出齊色赤壯熱煩躁清解之而益重此反冰其毒也宜升解之升麻葛根湯加桂枝牛蒡紫草而愈一四朝順痘煩躁不食毒未盡也升麻葛根湯補中益氣湯而愈一順痘日夜啼哭不止此不勝火熾刑金也瀉青散導赤散加黃連而愈一痘少淡白不易肥而煩躁真氣弱也棉紙搓軟白芨膏封痘服保元湯而愈一痘後夜臥不寧此胃不和而衛氣不得入於陰也四物湯加遠志棗仁龍眼肉及歸脾湯而愈一痘後身熱午時煩躁解毒清熱而愈一痘六朝不起乾紅煩躁此毒壅也過用保元湯而反悶亂焦紫乃以枳殼湯先解參耆之滯犀角地黃湯加蟬蒡紫草清其壅滯之熱七朝痘色正後以保元湯調理而愈萬密齋治邱氏子痘正作膿瘙癢煩哭其面磊落紅綻膿漿未熟兩頰先紅干皮肉木硬曰左頰屬木肝也肝主血藏魂右頰屬金肺也肺主氣藏魄兩頰木硬氣血不榮魂魄不靖所以煩哭也請藥曰欲解其毒則中氣反傷欲補其中則邪火正盛不可為也是夕加煩而死譫妄徐仲光治一痘起脹色焦枯譫語此火亢極也以退火回生丹無比散治之而愈一痘密漿其色白昏睡譫語此血虛也保元湯加歸地芎冬茯苓棗仁一痘後午余發睡面赤譫語此火從虛發也保元湯加歸芍川連萬密齋治胡三溪子痘時常以手自掩其面身下縮頻呼曰我怕若有所見者曰逆痘也經曰腎敗者失志目中見鬼死不治錢氏曰腎病則下竄此痘發於腎不可為也果然一婦年二十餘發熱五日痘不出常起摸床壁昏不知人口喃喃不休曰死症也果然周璜子年十三染痘發熱五日痘不出發狂譫語已進保元湯三劑矣曰誤矣犯實實之戒也凡痘發熱之初驚者平之渴者潤之吐利者和之便秘者利之熱盛者解之如無他症不須服藥今此子元氣素厚飲食夙強乃以保元湯助火為邪毒氣鬱遏至於狂妄熱已劇矣宜急下之與三黃湯得利而狂止痘出至十七日靨治痘之法盡此數語汪少溪婢染痘發熱顛狂曰熱極矣當速解之乃作三黃湯與服得利熱減神清痘出而安徐氏子年十七出痘至膿將靨忽發狂妄語起舞或毆人罵人皆平日仇恨者一身之瘡盡迸破祈禳不效乃用安神丸百粒作二次服良久始省問其所為殊夢夢也喘急下亦徐仲光所言一痘稀嫩少神起脹時泄瀉而喘此氣虛也補中益氣湯加肉果而愈一痘漿足痰喘便實此肺熱過於補也枳殼湯加連翹牛蒡腹皮栝蔞而愈一痘收靨原痂喘急腹脹因能食非倒靨也保和湯愈一痘漿灌喘急用荊防桔梗枳杏冬貝橘紅鹽炒竹葉而愈一痘喘急用白花地丁水煎服即止如神一痘後齁喘久不愈蜜炒麻黃半夏桑皮款冬花各一錢白果肉五個煎服數劑愈一云有甘杏芩蘇子更妥一痘後喘嘔不已用長流水揚百遍煎清上之藥愈一痘後喘急聲重客水侵肺也蜜炒麻黃桂枝杏仁車前葶藶甘草愈一痘後痰嗽喘嘔用阿膠糯米各一兩牛蒡兜鈴各三錢杏仁三粒甘草五分丸服愈一痘後泄瀉喘急此肺虛也人參一錢五味三錢煎服而愈一痘後痰喘不已火侵肺也用芩連枳杏甘桔花粉柴胡煎服而愈一痘八朝俱充灌因暑月汗多解衣熱為邪抑忽咬牙喘瀉一晝夜頰上有倒靨先用蘇防杏枳青皮陳皮耆朮葶貝前蠶得微汗喘緩次用震蟄丹三分隨以大青丸三丸小青丸五丸大靈丸三丸連進二服而愈萬密齋治程氏子未一歲多笑知其心火有餘令以川連山梔辰砂為丸服之三日後笑漸少隨染痘發熱忽作喘喉中涎響汩汩有聲此肺熱症幸不肩息作冷乃作清金散湯一服而減半再劑而喘定如不知則殆矣咳嗽一痘五朝勻澤紅潤稀朗頂平陷痰嗽甚此傷風失表邪客肺經但膿期患此難於補托用甘桔前芩桑杏橘蔞而愈一痘七朝不易起脹喘咳吐食此毒壅也清理解散而愈一痘收靨厚而乾黑身熱咳嗽風寒客肺也麻黃湯愈一痘收疤咳嗽咽膈不利用甘桔翹防蒡陳皮射干元參輩愈一痘後傷風咳嗽發熱用解表藥反汗喘用二陳湯加桑杏山梔反加搐搦此脾胃虛弱也用補中益氣湯加麥冬五味鉤藤而愈一痘痰嗽諸藥不效用黑散子而愈一痘後咳嗽連聲不續痰鳴欲絕嗽罷吐白沫面唇白飲食少不得臥此虛而攻肺下痰過劑也小異功散加藿半蔞粉冬又用人參清肺飲而愈此救子益母之法也一痘後咳嗽吐膿腥臭胸中隱隱作痛右脈數滑乃餘毒在胸作內癰也用橘貝甘桔芩合翹蒡知蔞防己並蒸百合服愈一痘久嗽不已腰背痛此腎咳也地黃湯加麥冬五味子而愈一痘十二朝咳嗽旬余不止服發表化痰藥多反吐膿血此脾肺虛重傷真氣成肝癰也用桔梗湯而愈萬密齋治陶氏子痘將靨咳嗽喘急用甘桔湯加麥冬牛蒡未效此肺有火邪火鬱宜發之乃去麥冬加紫蘇地骨皮一服而安嘔吐噦下皆徐仲光所言一兒年十五血熱毒重而無顆粒正額略見分珠而又稠密唇焦口腫舌有黑刺大熱大渴先用羌活湯調下催蟄丹退火丹雖起發嘔噦特甚用芩連荊防翹蒡楂蟬犀角紫草石膏大黃二劑痘乃稍潤又加芎歸冬知甘桔生地丹皮紅花元參痘漸滋長嘔噦漸止八九朝復嘔背痘平塌仍用芎歸芩連蟬翹防羌蒡陳藿石膏黃土澄水煎服隨以桑蟲漿雞腦各二個入催蟄丹震蟄丹各五分至夜狂躁作渴以陳冬米麥冬煎湯頻飲至天明熟睡痘轉而起灌矣但大便溏數加耆朮楂橘炮薑人參三四分調理而愈一兒痘成漿倒陷吐噦不止急用攻發藥以起其痘於安胃藥中加參耆黑薑陳米白朮黃泥澄水煎治愈一兒痘標點噦吐面色枯口唇焦胃氣已脫毒不出三日而死一痘六朝勻朗光澤外症順而胃氣損聞食則噦漿雖滿不能收拾蒼老變倒靨而死吐蛔者更重一痘後煩渴乳多則吐身熱喜涼此餘毒在胃竹葉石膏湯治之而愈一痘後噦腐或有用香砂丸克伐太過遂變泄瀉而死萬密齋治一兒痘本輕因傷食腹痛而嘔用平胃散加砂仁藿香葉煨姜而嘔止一小兒因食生冷傷脾胃而嘔痘變灰白用錢氏異功散加砂仁丁香桂而嘔止一小兒痘甚密喉舌都是將閉時嗆水嘔食雜膿血痂皮痰涎而出用甘桔湯加牛蒡頻呷之調理而安一小兒膿成將靨忽作乾嘔雖飲食常自嘔噦其痘不作膿不滿頂曰此逆痘也乃誦木陳葉落絃斷聲嘶之言以告之後失音悶絕而死庠生餘光庭年十九出痘膿成將靨忽作咳逆即噦也又名呃逆脈促成代或謂咳逆者惡症也促代者怪脈也痘瘡順正飽壯明潤何以得此曰咳逆三症一曰胃寒二曰水逆三曰胃敗皆與此不合經曰諸逆衝上皆屬於火此火炎上之象乃問其大便如何則自出痘至今七日未更衣曰此燥矢壅塞下竅不通火炎上竅故咳逆也促代之脈得之氣逆脈亦逆矣以豬膽導之下燥矢咳逆即止而脈亦調勻而起吐瀉及蛔徐仲光治一痘不見出吐瀉不已服升發益盛此虛症宜溫補藥升發以透肌散六君子湯加升蟬薑桂陳米棗而愈以其熱靜痘嬌也若執痘未齊而不補真元反致伏陷矣一痘後吐瀉類霍亂此外感兼內傷也藿香正氣散藿香五苓散因兼暑食加味二陳湯治愈一痘後吐蛔乃氣血虛無穀氣以養蛔求食而出也二陳湯加連翹連棗薑芍而愈一痘起脹吐蛔乃胃熱而久不能食蟲為熱迫但聞食氣則上湧出安蛔湯而愈然多有不治者雖痘勻朗漿半足若久不食而服劑不止者土虛而木乘之必至腫消目閉倒陷而死費養恆治馮憲副孫痘兩日稠密無縫皮薄色淡身涼而靜睡不合目而困倦面光白吐蛔數條俱已死此虛寒而鄰於逆者也以保元湯加芎歸肉桂山甲數劑絕無起勢乃加參三錢耆五錢熟附五分日二劑六日漸起色漸紅囊漸蒼老肢體亦暖參耆更加重附至七分幸不瀉又加熟地膏半盞鹿茸膏數匙十日漿肥膿成神爽寢食俱安十四日收功因痂乾燥防餘毒以參歸化毒湯重入忍冬膏調理而安費建中治姚氏子秋夜忽吐瀉三十餘次口不能合兩目失神身不熱痘齊湧出甚細密僅得分珠顆粒圓滿卻如水泡有頂無盤乃劇虛劇寒之症形象固逆幸氣血未離疏通之劑斷不宜用即與保元湯加白朮木香當歸熟地訶子等服至六日如常乃倍參耆加鹿茸肉桂至八日身得溫暖窠囊覺厚漿水及半而不蒼老前方去鹿茸肉桂訶子加白芍茯苓銀花神爽進食而瘥矣虛劇之症補之不足尚可散乎但今無是症矣泄瀉一兒痘瀉投以升澀藥不效黃綺雲用白芍藥酒炒三兩煎服一劑即止此脾虛有熱也廣筆記一兒虛寒痘將行漿時作瀉用炒蓮肉去心一兩真鴉片五分共末白湯下兒小者三分大者五分瀉立止虛癢或虛煩躁不止亦如之若系大熱泄瀉者不可用也同上一血熱痘兼氣虛先用解毒藥毒清矣忽瀉日數行不止痘漸平塌繆仲淳以炒蓮肉五分真鴉片半分米湯下立止王宇泰復用人參二兩黃耆三兩鹿茸三錢煎服補其元氣漿頓足而自愈蓋因其先解毒盡故可補而無他症起也同上一痘脾虛作瀉用蓮肉六兩參耆五味山萸扁豆各四兩白朮三兩棗肉為丸薑湯下此方移治老年腎虛脾泄瀉更效一痘密毒重起發亦透八朝但頭面胸背膿漿手足止有清泡有用參耆米桔翹連蠶薯即痰喘不食身熱而嘔大便頻頻失屁急加歸芍楂陳砂冬防朮元參石膏山豆根及便制人參兼用牛黃抱龍丸八寶丹連進二三劑四肢漿足以後去人參只用清解藥而愈一痘起脹時忽瀉痘色赤而稠根窠堅突便秘六日矣此血熱毒壅正宜瀉去其毒治法只宜清解主人恐瀉耗其元氣用豆蔻丸保元湯加肉果官桂等痂雖收而目腫赤四肢發癰始悔而用清解病根已深竟損一目廢一肢此痘有同是熱瀉而用犀角地黃湯加木通桔梗川芎提之而順愈一痘早起泄瀉飲食不化此脾腎不足四君子湯加補骨脂肉果又朝服四神丸夜服參耆白朮散而愈一痘隱隱不見面白神疲微熱飧泄此脾虛不能送毒也異功散加木通芎升歸陳米瀉止痘發補中益氣湯調理而愈一痘後瀉藥食俱不化此脾虛也用參苓白朮散阿附丸而漸愈一痘後泄瀉不已此脾虛也四君子湯加升防肉果及肉豆丸而愈一痘後羸瘦枯槁溏泄不已或謂脾弱理中湯小異功散六君子湯皆不效知其乳母弱乳薄故也令易乳而安一痘溺赤溏泄如糜腸中熱則瀉黃如糜此煎爆積熱也以五苓散加車前黃連神麯麥茅山楂而愈一痘後傷食傷暑而瀉四苓散合香藿飲加神麯麥茅山楂而愈一痘未出盡利下赤白此血熱痘壅有積熱也以葛根升麻湯加芎歸楂麥蟬蛻稍減面目赤溺數犀角地黃湯補中益氣湯治愈一痘暑月六朝而利下膿血壯熱煩渴此毒留大腸三黃丸兼補中益氣湯而愈一痘同而不治痢久漸倒陷二七而死故曰險者治之一痘靨期而利水穀不分完穀不化參苓白朮散芍藥獨參湯治愈一痘後利下蛔蟲此熱迫之也苓甘半芍烏梅川椒薑棗治愈一痘後患利裡急後重面黃不食聞藥食則嘔此病邪雖實而胃氣受傷多矣當先補後攻小異功散加芍藥而噦止進食次以木香檳榔丸去積盡服調中湯而安一痘臘月瀉數日而後標點患痢無度用升發藥不效痘色淡白少神脈浮大無根大虛症也附子理中湯日進二劑積少減痘亦紅潤脈始有根然飲食不進用補中益氣湯加桂枝炮姜遂能食安寢漿雖充而完穀不化亦不易結痂小異功散加芍藥木香參苓白朮散調理而愈萬密齋治胡氏子染痘自利三日不止或欲進理中湯加訶子肉豆蔻曰不可此協熱利也宜用黃芩芍藥湯但觀其形色利當自止不必服藥次日痘出利止一小兒發熱時自利大孔如竹筒狀清水流出逆症也此乃火盛於內肺金不行收令也以黃芩芍藥湯加烏梅一服而利止萬之子三歲出痘至膿成將靨時忽泄瀉痘變灰白先君曰此虛寒症命作木香散服之未盡劑泄止瘡復紅活時鄰人曾氏子痘出密盛將靨亦作瀉痘變灰白且作癢來請藥先君即以前未盡劑與之瀉止痘紅活不癢矣蕭別駕女七歲出痘連服保元湯痘甚密曰表裡俱實雖密順症也不必藥蕭江西永豐人彼處出痘專食雞戒以不可食不聽日食雞汁至膿將成忽大瀉日夜五六次所下皆清水欲止之曰裡氣太實正須瀉耳次日瀉益盛視其痘飽滿紅潤不與藥乃怒甚曰保無他或欲進肉豆蔻丸力止之至第三日大瀉水一行曰瀉止矣問故曰此瀉飲雞汁大多水留薄腸胃之間今瀉者名蓄水瀉也水盡瀉自止與四君子湯加陳皮調理而愈一痘將靨忽作泄瀉口渴飲水小便短少其痘胖壯紅潤此內熱也用五苓散加黃芩白芍煎調益元散而愈一痘成膿面部將靨困渴飲過多以致自利白朮散服之渴瀉俱止愈一痘成膿少食忽作泄瀉不止變灰白用木香散豆蔻丸服之愈一滑瀉不止食少腹脹足冷痘灰白色脈細無力此犯五虛不治必死陳三農治一小兒痘後泄瀉二三年體瘦腹大善食此久瀉傷腎腎不納氣肝木火起脾無正火不殺穀故作瀉瘦削成疳耳用紅曲丸加草果三錢服之愈李季虯曰長兒痘初發熱即泄日數十行見痘泄不止時醫以脾胃藥止之愈甚施季泉曰是在不治予強之曰止泄不難發藥中加黃連二錢黃芩一錢二劑泄止予喜甚施曰非也毒火熾故泄初泄時即解利藥乘熱導之或可望生今遲矣過四日即欲解毒無及矣坐視七日死廣筆記痢萬密齋治張氏子痘靨時面瘡潰腫膿水浸淫泄下膿血後重不食或作噤口痢治不效視其症乃倒靨非痢也在痘科中痢下膿血痂皮者生水穀不化者死在傷寒太陰經病論則曰熱蓄於內當便膿血勿治利盡膿血自愈因思此疾不可急治乃故製藥延緩以待之數日後度其膿血將盡乃用四君子湯加白芍枳殼黃連木香一服後重除利稍止再服能食三四服痘靨一痘後初秋利下白積身熱腹痛嘔噦不食此濕熱瘀積兼受寒邪理中湯加防風一劑噦止平胃散加香連青葛麥愈一痘後利下赤白能食而不化此胃熱而脾虛也乃恣食而不知節慎遂致莫救一痘後噤口痢用人參一兩陳皮黃連石蓮肉各五錢桔梗三錢胃風湯調服愈一痘後利久不止積未盡而中氣不足用人參白朮白芍甘草升麻陳米大固中氣而愈一痘後毒入大腸而便膿血者牛黃散三黃散犀角地黃湯黃連解毒湯而愈便秘徐仲光治一痘十九歲標點時便秘至十二朝不行口渴狂躁左尺脈浮大此陰不足而津液竭也用參冬歸地知杞枳殼菟絲子而便利一痘後食粽便結痛不可按手足搐搦大柴胡湯加酒麴二錢而行一痘後身熱便秘此餘毒結大腸也以解毒湯治之而愈一痘後身熱便燥此辛熱耗液潤燥湯愈一十五歲血熱毒重痘十八朝忽小便不利欲解不能起倒竟夕聞其大便已阻而不行者四日矣此有燥屎結於幽門後竅不通故前竅亦閉進以湯藥則小便益急而不能出痛苦極矣且藥力未能達於至陰之下因用膽導法須臾二便皆通一痘正出而小便秘此氣為火食也導赤散加疏解藥而愈一痘泄瀉溺澀此陰陽不分五苓散加車通而愈一痘陰陽分而小便少此脾肺虛也補中益氣湯加麥冬五味而愈一痘溺澀為陰虛火炎爍肺六味地黃丸加冬味而愈一痘後小便赤色知熱在膀胱導赤散加梔苓車前竹葉燈心而愈一痘後小便不利用五苓而愈甚陰囊漸腫此陰虛而滲利之復損其陰也六味地黃丸加肉桂車前又補中益氣調理愈六味丸最為此症的對之藥既系陰虛何取乎補中益氣一老醫有孫痘既脫痂少腹脹小便不通眾謂痘後餘毒用利水解毒愈脹老醫忽悟曰此脾虛下陷也痘後無實症土堅則水清人參一兩大棗五枚生薑五片煎服愈廣筆記萬密齋治庠生餘光庭年十九歲染痘發熱五日不出三日未更衣脈細而數雖有下症元氣怯弱不可下也以膽導之不得通病者煩躁因思發熱日久毒流其中燥糞閉塞肛門大腸乾枯氣不得行血不得潤膽導力小故不能通也自立一法取豬尿脬一枚以豬膽汁半杯清油半杯蜜半杯三物和勻入脬中如作膽導法取下燥屎二十餘枚氣通熱解神清痘出此法外意也虞天民亦有此法胡氏子出痘乍熱乍退足冷數日不大便先出者猶是紅點亦不起發此逆症也或曰熱微毒亦微熱甚毒亦甚今熱不甚順症也曰不然痘本火毒待熱而發如發熱而不煩不渴大小便如常精神清爽者此熱在表無邪毒火發越而痘易出易靨也若煩躁不安大小便艱昏昏喜睡此毒火內蘊不得發越表熱雖微內熱則甚今乍熱乍退者毒火來往也大便不通者毒火鬱遏也見紅點而不起發者毒火陷伏也足冷者火極兼水化謂之逆冷也彼不以為然次日紅點俱沒煩躁轉甚猶謂此內收也翌日死疫癘徐仲光治一兒季春出痘感疫氣亢極便秘用十神解毒湯次以升發藥治之而愈一兒季春出痘七朝順朗亢極便秘狂煩舌有黑苔刺痘空處隱隱有黑點此感疫失解也先用大承氣湯治之次以理氣血而愈萬密齋云嘉靖甲午春痘毒流行死者十八九乃一厄也時有預服三豆子湯絲瓜辰砂散者凡方書所載預解痘毒之法用之無效予思痘疹疫癘之毒因歲運災眚之變難以藥解而人事未盡又不可委之天數也於是檢閱右方於韓氏醫通得五瘟丹以五運為主喜曰此解毒神藥也依方修合施售與人但服之莫不輕疏人皆神之因命之曰代天宣化九甘草甲已年為君土黃芩乙庚年為君金黃柏丙辛年為君水山梔丁壬年為君木黃連戊癸年為君火連翹佐山豆根佐牛蒡子佐先見其年所屬者為君次四味為臣君藥倍用臣藥減半佐視臣又減半共為細末於冬至日修合取雪水煮升麻汁打麵糊為丸辰砂為衣竹葉煎湯下萬密齋曰胡松山子出痘在母黃氏懷半夜後此兒卻在地下蕭楚梧子出痘日中時聞蒜氣過胡三溪子出痘有鴉日日聒噪胡淑卿子出痘近夜時樓上忽聞棹到聲視之無他王東樓子出痘有蝙蝠飛入室後皆凶醫者病家不可不知目徐仲光治一兒痘後目黑睛初起細白點大便順而日晡潮熱有用雞䏶胵花粉威靈仙煮食其瞳神即高腫突出白睛紅腫徐用瀉青丸煎服兼用羽皇散五六劑而愈一兒白睛生翳漸掩黑睛連用去風去翳涼血清熱等藥不效即用瀉青丸及羽皇散間服數劑而安鵝不食草鹽酒炒乾白蒺藜各二兩穀精草石決明各二兩旋覆花蟬蛻川芎龍膽草各五分羊膽三個蜜丸每服二錢鹽湯下羽皇散萬密齋治蕭別駕女痘後不戒厚味其俗有病者必服附子食雄雞灸關元戒之不聽後兩目出浪若爛此毒發於肝肝火旺也或曰目上下胞屬脾脾亦熱乎曰此因淚出不止浸淫潰爛也乃用瀉青丸去大黃加柴胡黃芩密蒙花蜜丸服半年而愈雄按蕭江西人其俗至今猶然雷邑巫孫痘七日倒陷已與發出毒猶甚欲解其毒中氣素虛又恐倒陷欲補其中恐助毒火又傷其目不如節飲食適寒溫以待自安不聽乃服參耆溫補之劑後兩目俱盲王司訓子痘後兩目畏明此肝火太旺宜服瀉肝散加柴胡蟬蛻黃芩初一劑用酒浸大黃乃畏苦不肯服果成內障目盲蕭氏子痘後目有白翳曰此痘瘢也治之無功果盲徐淑道痘不靨用陳氏木香散一服曰誤也必損目矣果盲其一周氏女痘後目閉不開曰痘順無餘毒必羞明症也乃試之向暗則開嚮明則閉不流淚此肝經火邪未除耳用羌防歸尾川芎柴胡蔓荊密蒙花生甘草淡竹葉一服目開遍身痘瘢腫凸再用四物湯加荊防人參連翹甘草而愈周氏子九歲痘後出外忽頭腫兩目不開此非毒乃風熱也用羌防升柴芎歸藁本蔓荊細辛甘菊黃芩治之愈王肯堂治從子懋鋙痘後兩目生翳羞明特甚窗牖皆以衣被覆蔽就明展兩眸視之則白膜已遍覆黑睛淚如泉湧嬰科眼科投藥不效束手告技窮矣乃閉戶而思目者清陽之所越也忽焉而有翳膜是濁陰犯之也濁陰惡敢與陽敵故羞明特甚乃以黃耆助清陽之氣為君生地當歸養目真血為臣羌獨防芎芷甘菊薄荷升清陽黃芩豬膽汁車前茯苓降濁陰為佐仍間服瀉青丸八劑而目開翳已去矣凡眼科點洗藥概屏不用惟以橄欖核磨汁敷上皮而已蓋嬰幼柔脆點洗之藥必有所傷故也費建中治一女三歲痘稀而綻突紅潤似可弗藥但烈熱如炮叫喊不絕左目焮腫如桃以大黃生地荊芥甘菊赤芍黃連木通地丁青皮連進三朝始身涼神靜目亦無恙痘後目翳用荔枝肉搗膏貼囟門上即愈但已過百日則不效唇口徐仲光治一兒痘稠密未起發而唇先黃熟目先虛閉咽喉腫痛不能食遍身痘俱平暗幸正額勻朗眼眶口唇雖腫而紅活以甘桔湯加牛蒡連翹山楂荊芥陳皮人中黃等清利咽膈解其脾毒而愈一兒痘四朝稠密未起脹而口唇先黃熟乃內潰之惡候必為唇刺幸余痘光澤腳斂脾雖受毒根本猶固以補中益氣湯去白朮加牛蒡連翹山楂繼以補元湯理中湯而愈一兒痘稠如綴粟平塌嬌紅血散不附唇口腫硬剝落一層又一層皮薄空漿破如血汁溏瀉煩渴皆為逆候但能食安靜知有胃氣也用參朮連各二錢日進三服十四朝肢厥脈沉靜如死狀痘皆倒靨心胸尚溫數日漸蘇而愈口疳徐仲光曰一兒患血熱痘後身發熱口臭成疳潰脫上齦門牙左腮盤牙唇紅乾裂左頰下亦紅腫如發毒狀湖州沈三春外用抑陽散加蔥汁酒漿調敷腫處若面腫而帶有紫色為實熱必成走馬疳潰頰不治矣今雖腫而紅活知為另發癰也內服犀魚羚羊角黃連黃芩元參生地牛蒡桔梗甘草白芍花粉木通紫花地丁及人中黃散一二服或煎銀花一兩入廣膠一錢間搗甘菊花根葉汁衝入服之面腫漸平身熱漸退外吹牛黃一分珍珠三分黃柏青黛人中白硼砂豬膽制各四分不易斂加烏梅炭三分血竭二分龍骨一分因體虛又加人參象皮灰各三分制爐甘石四分又常以醋調雄黃末軟筆點入潰竅中延至月餘而愈咽痛徐仲光治一兒患血熱痘先用寒涼芩連犀角起發灌漿頭面身背俱膿但兩腿面凹陷不起用參耆托之反見熱渴躁煩大便溏泄多次咽喉腫痛改用清咽利膈山豆根麥冬川貝桔梗元參防風殭蠶山甲當歸白芍紅花生地山楂陳皮蚯蚓牛蒡川連黃芩甘草而愈一兒痘後咽痛壅塞不通此餘毒留於心肺邪熱不泄風痰壅盛先以桐油探吐服駝原散甘桔湯連翹牛蒡射干元參而愈一兒痘後真陰不足二火上行咽喉腫痛有以寒涼治者愈而復腫原其火為寒鬱先以附子理中湯驅其寒次宜壯水之主六味地黃丸加知母麥冬元參治其本外吹葛槿散而愈一兒痘後脾胃不足陰火上炎咽喉腫痛以四君子加甘桔知柏川連牛蒡而愈一兒痘後咽喉成疔以柴葛地龍蜈蚣等分煎成加犀角磨汁和服而愈萬密齋治馬氏子五歲痘不起發曰此順痘也毒甚者則頭面腫毒微者則頭面不腫非不起發也又呼咽痛曰此痘家常病喜喉舌無瘡頸項間痘稀不足怪也以甘桔湯加牛蒡子煎細細嚥之咽痛即止喑萬密齋媳李氏年十八痘成膿時經水忽行下血塊且多未逾日猝失音問之但搖頭垂淚凡痘帶黑歸腎宜有猝失音之症今已成膿飽滿紅潤何以有此逆症思之良久乃得之經云婦人重身九月而喑者少陰之脈不榮於舌也手少陰者心也心主血諸瘡皆屬於心瘡毒之火內起於心迫血下行故經血來也舌者心之苗血去則心虛不能上榮於舌故舌萎縮而猝失音也乃以生脈散去五味子加當歸生地服之頃之愈後以十全大補湯調理而起蕭氏子三歲出痘將靨時忽失音啼哭有聲但言語重濁不清亮曰此肺熱也以甘桔清金散服之而安發核徐仲光治一兒痘十朝外早上齦潰爛外頰紅腫外治用抑陽散同蔥汁酒漿搗敷每日一換不用紙封內服紫花地丁花粉生地丹皮元參山慈菇貝母翹防蒡芎桔連芩歸芍先以銀花一兩煎汁服之頰腫口疳漸平月餘忽發夜熱左腮下生一核大如李色白按之而疼外治硼砂一錢五分膽礬五分麝香半分燒酒薄薄調勻新筆蘸塗內服芩羌翹蒡甘芍元參前胡貝母膽草山梔亦以夏枯草一兩煎汁服之連進四五劑而愈腹痛徐仲光治一痘未盡出而腹痛噯乳吞酸大便酸臭乃飲食停滯也保和丸二服而愈一痘起脹時不易行漿肢冷腹痛乃血熱症而過用冷劑理中湯加肉桂木香炮姜一劑而愈一痘後傷食腹痛本中氣不足宜補瀉兼施香砂保脾丸又補中益氣湯調理而愈一痘後能食易化腹痛此胃熱易飢脾弱不能消磨鬱積而痛也補中益氣湯加芍藥木香黃連治之而愈一痘漿足不易靨腹脹發熱面赤午後益甚按之腹不痛乃脾虛血少也歸芍六君子湯加陳皮棗姜數劑而愈費建中治錢銓部女平時內熱柴瘦仲夏痘而熾熱腹痛異常不能轉側口極穢紫滯稠密但不細碎幸初起毒雖惡未有定位以大黃四錢石膏七錢生地六錢黃連一錢佐以山楂荊芥葛根赤芍桃仁地丁紅花地龍臨服和豬尾膏盞許服至六日色漸肥紅放白腹痛少緩余未減仍前方至九日漿甚充而腹痛熾熱尤甚眼封而角流血譫語不寐不食前方加犀角倍大生地石膏減豬尾血臨服以化毒丹調入牛黃一分朱末二分十二日頭面發臭方日進粥三次皆碗許而腹痛與熱依然至十八日始大轉自始至終一方收效如此治驗多矣聊舉此以概其餘腰痛徐仲光治一庠友年十八初熱腰痛點發在額角紅綻光澤心經順症非腎逆候亦宜滋腎六味地黃丸料加杞子杜仲與升發之藥間服痛止痘出至六朝煩渴譫妄唇燥舌黑睡臥不寧此乃腎水不足以制火也保元湯加歸芍冬杞棗仁龍眼肉間服八味地黃丸加麥冬枸杞漸愈有一痘同但補陽而不滋陰竟枯涸疤黏不脫而死一兒痘初熱腰痛如折此折腰痘也強以荊防敗毒散發出點如蚤斑口鼻出血而死一兒初熱腰痛連背脊不能轉側點見左耳側及腰左一點如筋頭大平而紫又舌中心一點悚而黑此腎毒逆候也急以四牙散發出紫黑點五日死一兒孟夏發熱腰痛甚見點稠密紫黑幸有神而胃氣強元氣實雖逆而尚有生理四朝以四牙散一服又化毒散送下地黃丸二服次日痘起但色未轉以黃連解毒湯加柴蒡歸芍地黃而愈一女年十四痘正漿足忽腰痛不能轉側此經血去多之故六味地黃丸加歸芍續斷杜仲治之而愈一男子年十八痘後四十日外忽腰痛極兩手撒撇目開無光汗出遺尿喉聲如鋸六脈浮大此恣欲房勞而陰陽離決也以艾灸氣海六十二壯四肢活動又以獨聖湯頻服及八味地黃丸而愈一男子年二十痘後腰痛左尺脈微弱房勞所致也以八味地黃丸補中益氣湯相間服而愈一痘不起而腰痛繆仲淳用人參蘆三兩煎服一吐而痘起痛止毒在下吐而升之吐有發散之義也廣筆記一好痘綻朗而色淡紅兩腿痛甚腿亦屬腎此陰虛而毒乘之也活命飲二劑痛稍止十全大補湯六味地黃丸間服而愈此症不早治及四肢厥冷則變黑變紫而死與腰痛之逆相同不可輕視之也一兒痘後足脛痛甚不紅腫氣血虛不能榮養筋骨也歸芍四君子湯加牛膝獨活苡仁桂枝連進數服而愈一兒年十四痘後腰脊痛不能俯仰午後潮熱此骨髓枯少水不勝火腎氣熱也灸崑崙穴申脈穴各三壯又以六味地黃丸加獨活及補中益氣湯間服而愈既是腎熱何以用火攻而愈其說可疑萬密齋治一富家子年十六患痘發熱腰痛問曾婚否曰未也連進人參敗毒散二劑痛止痘出而安若曾有房室者不可治也或以大劑左歸與之必有拿手琇批李季虯曰顧叔夏次郎出痘而先腰痛予斷以不治果殤施季泉曰凡成婚或破陽後出痘而腰痛者可療童子而腰痛是先天之水不足也不治廣筆記費建中治章繼美年近三旬季冬忽腰如杖昏潰如迷問之不答身體振振肉瞤筋惕痘之象也但腰如被杖其症必逆用大黃山楂各六錢青皮羌活桃仁各二錢佐以荊芥乾葛元參乘初起預攻庶望轉機於萬一若見痘則腎已受傷無及矣自申至卯連服二頭煎次早發出如芥如砂色焦紫上下無容針之隙形色既逆神情又惡辭勿治因苦懇乃用大黃八錢石膏一兩黃連二錢生地兩半佐以荊芥羌活葛根牛蒡紅花桃仁蟬蛻等加白頸地龍每劑十條又以豬尾膏半盞和入連進二劑次日如芥如砂並焦黑色即退顆粒分明紅活但密而神昏熱熾前方服之九朝雖圓綻如珠漿黃如蠟而昏熱如故大便日六七次而不暢水米不沾議者謂寒涼太過曰如過盪滌傷胃則氣血乏本漿何由得至十日正面有回意仍不思食乃用大黃石膏各一兩生地兩半黃連山楂四錢佐以牛蒡荊芥甘草十二日胃忽開神爽熱和十五日諸症悉愈痂如松皮彼又口疳齒牙既落又服牛黃朱末並黃連解毒湯十餘劑漸愈月外又發血風瘡身無完膚此腎傳脾故為輕症將百日始霍然是症當危疑之際旁議紛紛幸病家有識故得收效云朱應我治一新娶男子二十歲痘腰痛不支醫以面部痘白色挨簇當此新婚時必腎虛也急煎杜仲鎖陽等補劑朱視之面部雖白而眼則紅腰間微見紅斑決不可補以犀角生地丹皮加升麻芍藥一劑腰痛如失此見斑則治斑不可拘於新婚也後亦清補間施而愈手足徐仲光治一兒痘後溏泄腿腫睡臥不寧足三陰虛也四君子湯加陳皮歸芍枸杞澤瀉石斛川牛膝繼以八味丸而愈一兒痘後勞役痢雖愈而脛膝結核成鶴膝風此足三陰虛而邪襲之也驅風散間八味丸加苡仁牛膝菟絲當歸一兒痘先從腳底出起逆上至頭面回至心窩內攻而死此症早治俟其頭面出齊重用升提保元湯加川芎及先護心以黃連解毒湯一劑使其起灌收痂自上而下可保無事膿期朱應我治其侄孫七個月見標三日點粒甚朗但紅白不甚分明混混暗暗似少神彩即以帶補帶表藥以和其陰陽至七日猶不活動速以人參黃耆保元湯帶血藥進之至十一二朝亦灌淡漿而臉色菜黃且暗速加參耆至十七八九朝詢之日則疲睡精神短少略無嬉笑之容熟察右一邊疤皆白暗右手足皆萎僵不動至左邊疤紅而手足亦動躍如常用以揉麵者系左手也不早治恐成痿廢以補中益氣湯二劑柴胡多升麻一倍又加黃柏雖不見兒喜而右手足之浮腫漸退原方用升麻升清氣於左旋用柴胡升清氣於右旋故用柴胡多於升麻所以治其右也加黃柏使足力湧出用方得宜其症漸愈此症右手足腫大不紅初以為濕痰流注不成腫毒所以用補中益氣湯可以消平至二十三日復視之神氣猶減右手足仍不能起動遂加桂技二分越二三日猶不定耐改方為十全大補見其右手能握物而右足背生癤高穿出膿其安停藥侯消息此亦得將息法也聽之計服過參六七錢幸徐徐元氣少復得以再用平補而愈未周之兒用藥至三十餘帖亦非常法也徐仲光曰一痘養漿而內卻無水乾涸空虛此氣虛伏陷也若得人事清爽飲食如常痘無損處宜補中益氣湯歸茸湯主之若喘脹嘔泄煩悶外剝者不治一痘漿充滿根血淡紅痰涎壅盛日晡潮熱皆謂氣不足以保元加芎歸貝母陳皮治之不愈不知此乃陰虛火盛生痰也以六味地黃丸料內加參附肉桂溫之而痰絕熱去又與補中益氣湯而愈一痘漿充滿痰盛少食便溏此乃脾胃虛弱不能運化精微津液凝滯所致以六君子湯加炮姜一痘漿足忽泄瀉身冷自汗此本於脾胃氣虛也以保元合附子理中湯愈或加肉果一痘漿不易充足而色淡白亦脾胃氣虛也以大保元湯主之又歸茸湯益之一痘漿足而色不易蒼臘乃脾弱之故脾主結痂也用保元加白朮白芍陳皮官桂蓮肉收厚靨而愈若收如麩薄只以參苓白朮散主之一痘七日無漿倒靨獨根窠斂束以保元加山甲官桂又以水湯浴洗頭面手足良久復起成膿而愈一痘九日平塌無漿自口以下俱紅綻能食便溏乃元氣不足不能上升於面以保元加白朮白芍官桂肉果升麻十一朝空地滿出增痘俱行漿又與異功散而愈一痘正面漿足結痂身肢無漿能食便溏完穀不化乃脾陰不足不能以充灌用參苓白朮散加附子菟絲肉果又與河車散而愈一痘八日空殼無漿因氣血不足不能振作以制其毒用補中益氣治之發疔四五處而愈經曰發癰發疔者生也一痘八日倒靨灰白色泄瀉煩渴咬牙寒戰此乃氣血虛寒也以異功散治愈若治之不止反加昏悶者死一痘八朝頂陷漿滯不行色見焦紫乃風寒壅腠里氣滯血凝之故宜升提發散之劑內服紫蘇飲外浴水楊湯使藥氣藉湯氣上升毒隨暖氣而發若兒弱只浴頭面手足痘即光潤隨服補中益氣湯調理凡用此湯須量氣血充足的為風寒所閉則可浴若浴後不起又加悶亂者死一痘養漿時昏睡不蘇便溏能食乃脾主困因便溏而脾虛倦怠而昏睡也歸脾湯加白芍山藥米仁蓮肉愈一痘漿充足忽爾一齊結痂乾紫能食便調此是火迫而收之太急乃倒靨也投以補益攻發之劑十四日四肢腫痛成靨膿成毒化若不食便溏噦嗆則為內虛倒靨毒歸於內喘脹而卒一痘漿不易充足根血赤色煩渴溺澀舌燥便秘皆雲氣虛而津液不足以保元加麥冬治之愈甚漿滯不行此乃血熱未解溫補反助其邪乃火盛水涸之義更以犀角地黃湯又四順清涼飲利之前症悉平漿滿而愈經曰毒未盡解而溫補則毒蘊盛而不能化漿也一痘九朝死而棄之沙灘視其手足動掣色雖焦紫形尚綻突乃毒火悶瞀一時而死得水氣而火減故復甦也抱回治以犀角地黃湯而愈然亦有得土氣而解者一痘七日根窠赤痛便秘溺澀煩躁飲水或清解之劑未應乃熱毒內郁也以大黃當歸赤芍甘草之類一劑又與犀角地黃湯而愈一痘養漿時大便下血或尿血或神昏不醒或多睡蓋心主血虛邪乘而入心神昏亂之故宜犀角地黃湯安神丸若治而不已者至二十日而卒若毒盡外出當以補中益氣湯加麥冬棗仁一痘漿足膿俱紫黑熱甚便秘乃血熱毒壅也以黃連解毒湯加翹蒡愈一女季春患痘妄言卓立日夜不能眠睡至七朝尚未安寧視其形色俱順而妄言卓立者心膽火熾也以犀角地黃加柴胡龍膽治愈萬密齋治汪氏子痘出膿成時頭面腹背皆飽滿惟手足自肘膝至掌指猶未起發曰脾主四肢此子脾胃何甚弱也乃由去胎失乳故用建中湯加黃耆防風一服盡起脹作膿矣其家奉信魯湖黑神此子寄名於神未出痘神先降壇云吾保老黑痘出必少至是痘出甚密乃以計逐之使去靨期附痂後徐仲光曰一痘漿足結痂忽爾紫黑此沖冒穢氣也以十全大補加木香治之而愈一痘收痂厚而乾黑身熱咳嗽乃風寒客肺也麻黃湯得微汗而愈一痘痂如麩薄黏皮不脫昏睡內熱乃脾虛少血之故以調脾養榮湯治之一痘收靨乾黑黏皮不脫身熱煩渴睡臥不寧有以氣血不足大補之四七日枯槁而卒一痘如前以犀角地黃湯加翹蒡治之火漸減而諸痘悉平痂疕漸脫而愈此乃毒火彌熾之故經曰火盛則水涸此之謂也一痘痂厚而乾黑黏皮不脫身熱煩渴譫語妄言睡臥不寧乃陰虛火甚也以四物湯合生脈散加棗仁一痘清漿結疕如麩乃正氣不足不能化毒盡解以補中益氣湯加山藥治之兩曲池發癰成膿而愈一痘靨淡白如麩便溏減食乃中氣不足用參苓白朮散加肉果陳倉米愈一兒九歲出痘勻朗綻突九日漿足能食便溏乃恃其順而恣與之食以致肚腹脹痛停漿色滯用消化藥而便行安和痘漿不長乃食物雖消正氣受傷當與調脾益氣助漿收斂竟不從治延至十四日漸內虛倒靨漿復化為水而始行補氣不效喘脹而卒一痘至十日十一日頭面將結痂膿漿尚未充足只是氣虛不能托毒於外急以木香散加黃耆蟬蛻而愈一痘十二三日上身已結痂下身尚灰白不充滿頭溫足冷以木香散加附子酒耆而愈一痘至十四五日遍身結痂而充但是足下未焦寒戰咬牙以十全大補湯加附子愈一痘至十五六日膿泡充足當痂不痂又作寒戰咬牙只是不足治以溫補一痘如前頂突根綻此是陽火有餘胃氣大熱也服白虎湯一劑而愈一痘痂脫盡正額一痘潰而不斂四九日作癢破出臭膿聲啞悶亂而死一痘痂盡脫頭上一痘不斂二十八朝作癢甚出蛆盞許亦聲啞悶亂而死萬密齋治胡氏長女痘甚密膿成過期不靨此女平日脾虛食少性不服湯劑以錢氏異功散加木香青皮蜜丸米飲下調理而安胡氏子痘甚密膿成不靨漸至潰爛自起發以來未得大便此毒熱鬱蒸故不成痂欲下之彼謂此子素弱不可下時有術士符水甚驗乃書一符焚而服之少頃腹中鳴而利下清水眾皆稱妙因思久未更衣豈無燥矢至次日痘益潰爛乃用膽導法下燥矢三十餘枚如彈子大眾又笑曰此法更妙痘即收靨至腰又不收蓋大便下後又未行也再用膽導法去燥矢十四枚後皆溏屎痘盡收而安一小兒因渴飲水過多濕傷脾胃不靨以四君子湯人參補中白朮燥濕茯苓滲水甘草解毒加防風以勝皮毛之濕白芷以逐肌肉之水桂以利關節而去寒水之邪砂仁以溫胃止渴調理而安一小兒大便不通熱蒸於內而生濕致潯淫不能成痂用當歸梢生地以涼血麻仁以潤燥酒大黃以瀉熱開結生甘草以和中得利而安一小兒泄瀉不止食少此裡虛不能成痂用陳氏異功散合肉蔻丸而愈蔡氏子痘密膿成過期不靨面瘡潰腫起止呻吟嗆水吐食語音不清或謂不治視其面瘡腫起正在貫膿遍身皆然非倒靨也嗆水嘔食者口唇腫硬吞嚥不便非咽喉潰爛也語音不清者鼻中壅塞氣不得通非失音也瘡毒盡表病里和可治也用苦參酒芩牛蒡白蒺藜何首烏荊芥穗等分為末酒糊為丸淡竹葉煎湯下調理而安時鄰居一兒症同謂不可治或問故曰彼過期宜靨此未成膿不宜靨一也彼腫脹猶實膿血此則面平目開皮脫肉乾二也彼喉舌無瘡此則咽舌潰爛嗆水失音三也彼私與蔡氏求藥服之無效死雄按吞嚥不便何以用丸胡氏女十三歲痘甚密或與參耆大補之二十日後過期不靨已潰爛幸勿倒靨乃溫補過多里邪盡出表毒不解急宜解表勿使皮肉腐爛不信又逾五日不收乃用荊防升麻以解表白芷以蝕膿逐水連翹牛蒡甘草解鬱蒸之毒肺主皮毛因黃耆之補肺熱已甚時值夏火正旺之時用黃芩以瀉肺中之火解時令之熱調理一月而安盧文學妻李氏痘甚密未及成膿面瘡自破皮腫膿聚氣多腥臭過期不靨飯食漸少鎖喉嗆水曰形症俱惡恐不得痊二十餘日殞一小兒痘後又出一層小痘其家驚憂曰佳兆也痘科云輕者作三四次出大小不一等重者一齊湧出此痘最輕且無餘毒發已盡矣果然吳氏子三歲出痘毒氣有餘穀氣不足食少故不靨也問服何藥曰無藥可解能食則生不能食則死次日思食所食且多曰死急矣問故曰謂能食矣久不食而今思食自少加多胃氣復也今忽多食乃胃敗火盛邪火殺穀名曰除中出傷寒論猶膏之將滅必大明而後熄死在旦夕也果然一小兒靨後痂皮不脫曰此脾肺二經不足也蓋肺主皮毛脾主肌肉其氣不足故痂難脫用錢氏異功散加黃耆桂而愈一兒痘後一身盡靨痂皮盡脫惟頭與足不靨曰此常候也不必治蓋諸陽皆聚於頭乃陽中之陽謂之孤陽諸陰皆會於足乃陰中之陰謂之寡陰孤陽不生寡陰不育所以頭瘡不收者孤陽無陰也足瘡不收者寡陰無陽也久當自痊但遲遲也說欠明允一小兒痂落後瘢內凸起作癢此風熱也用人參敗毒散加荊防一服安後有患此者用荊防敗毒散加人參服之外洗水楊湯皆效一小兒落痂後瘢腫覆成瘡久不愈此痘毒瘡也由犯手撏掐不得自脫故皮肉受傷而復作瘡以苦參丸與服效一小兒落痂後瘢毒不平曰痘家戒食姜恐靨不齊瘢不平也問之果然王氏女痂落遍身盡白色不紅日夜啼哭遍身潮熱不思乳食曰此症若不急治或一二月或二三年必至成疳而死不信後果歿其子亦患此令服十全大補湯數劑又與三合湯治之其熱即退哭亦止痂肉色盡紅方止藥又服加減八寶湯全愈一小兒已脫痂初無他苦一醫視其目睛無神帶白曰不可為矣逾日亡廣筆記伏陷附倒靨徐仲光治一血熱痘初失涼解至五六日方進芩連歸地翹紅才起脹灌漿至半漿又不服藥九朝變黑歸腎面唇腰腳皮肉俱黑仍用前藥加金汁及人牙散勢少緩又用黃連生地紅曲各一錢木香三分燈心一錢次日加犀角連翹黑色俱散唇眼俱清前方連進四劑而愈萬密齋治吳氏子磊落紅活順痘也其兒脾胃素弱起發略遲或謂其氣虛妄投陳氏木香散一劑痘轉平不起又投陳氏異功散一劑再延視不可為矣李氏子四歲出痘十日後痘頂平陷根窠紅紫昏睡不食不可救也次日死吳氏女痘將膿面上有干靨者犯倒陷逆症乃用參耆甘草節歸地赤芍銀花牛蒡連翹麻黃酒蜜拌炒黑紅花子山甲末水煎服且告之曰服後若先乾者復起作膿未乾者壯紅飽滿空處再出小痘上也不作膿不補空或癰腫次也否則不可為矣連進三服已乾者不腫未乾者飽膿空中補出不多手足發癰後以十全大補湯加銀花連翹調理而安雷邑丞孫五歲出痘衣以厚錦圍以厚被日夜向火任其飲酒未七日而靨面目至腰潰爛平塌無作痂者曰此非至是倒靨也亟用疏理解毒之藥減去衣被勿近火飲酒方保無事以黃耆白芷排膿托裡防風蟬蛻以疏表青皮桔梗以疏里牛蒡甘草以解毒一服潰瘡復脹大便膿涎此毒氣中外無留矣戒勿再藥恐生他病也董氏女年十九臘月半出痘至歲中不能收靨精神已昏飲食俱廢視之僵臥如死人其脈洪實調勻此本倒靨逆症幸脈洪實不疾不徐今舍症從脈治之若得壞瘡復起新瘡復出人事清爽飲食如常則無事矣乃用升陽降火湯加黃耆當歸木香青皮連進三劑初三日復出一層新痘舊者盡干初五日出盡周匝一身乃漸甦醒能言求飯食依期起發至十三日靨後以十全大補湯調理謂痘倒靨必歸腎今幸愈尤當防目疾宜預解之不聽半月後左目痛不能開果喪明此案不的大抵前案中升發太多故目受其病余見倒靨後起者甚多不必皆傷目也柴氏婦二十七歲痘甚密膿成時鼻準先干曰此症凶也不可治問故曰起發未透膿漿未熟不當靨也況收靨自有次第形色亦殊先自口唇兩旁收起漏漿堆膿面瘡皆然自項以下則成疕殼今痘未熟而靨乃倒陷也自鼻先收失其序也不漏漿者乾枯也後竟死痘毒徐仲光治一兒漿足為穢氣所觸倒靨焦黑四肢腫痛幸其能食便調正不留邪必發癰也用內托解毒之劑而愈一兒七朝痘順有行漿之勢兩臂膊腫大如瓜幸能食便調此少陽經虛毒滯不散也補其陽而腫自愈用參耆甘桂歸芍陳芷羌活人中黃治之漿足腫漸消而愈一兒痘症相同不補漿雖滿痂腫處成膿竟損一目一兒五朝兩臂腫痛用解散藥而漿不充毒不退反寒戰作癢危甚此急治其表而失於補托也保元湯加丁桂朮橘治之漿足而痂後以托解藥其毒成膿而愈一痘密而內強過於補益而生癰腫煩躁口渴便秘以三黃丸利之再用清解之劑調理腫消而愈一兒患痘癰於小腿歲余尚潰腐不能收口此至陰之下無陽氣充拓膿血既久氣寒虛弱宜補助元氣千金內托散加牛膝檳榔土茯苓首烏潰出一嫩骨漸收而愈蓋毒久不散凝結似骨與地四生金之義同一兒痘毒流注四五個於肩臂痂如麩薄少神黏著不脫此氣血不足也十宣托裡散外用針刺破又玉龍膏鐵箍散圍吸筒吸膿而愈一毒痘出清水六脈微弱元氣虛寒保元湯加桂附白朮調理而愈一痘大腿腫痛此毒火鬱於肉分丹腫也用歸芍丹地翹芷木瓜大黃一耳後赤腫見核寒熱頭腫體痛此感冒不正之氣所結乃時毒也十神解毒湯治之而愈一痘漿雖滿而四肢清薄如水痂薄如麩十二朝兩肩臂腫痛有謂餘毒而用養血解毒食少倦怠毒亦不退此陰虛而毒滯不化也宜大補氣血而兼解毒得氣血調暢則毒歸一處成膿而化矣四君子湯加陳芍歸芷薑翹銀花大劑加減調理而愈此症若專用解毒致傷脾胃而瀉嘔厥冷耗散真元者附子理中湯加肉果木香得肢熱疼腫又四君子湯加金銀花黃耆白芷而愈若專解毒而不固元氣只以圍藥塗敷腫雖退而毒內蘊非損手足必腹脹喘急而死矣萬密齋治周氏女出痘發熱五日余未見痘出但背上發一腫毒曰不可治也非癰乃痘母也三日後果卒雄按若種痘頰後腫亦名痘母卻最吉張氏女痘起發止空殼此氣有餘而血不足責在肝經用四物湯小柴胡湯雖作膿亦未飽滿而收曰凡痘瘡不成膿或膿少者皆發癰毒此足厥陰肝病必發頂疽果然施季泉口授一家傳秘方治痘後毒如神人參茯苓銀花犀角各三錢甘草一錢五分羚羊角一錢珍珠八分蜜丸每服一錢日一服廣筆記萬密齋治胡氏女痘不甚密亦不十分光壯飽滿素畏藥不肯服收靨時一片薄殼逆症也足膝發癰毒與藥一飲而盡曰病不可為也問故曰脾主味開竅於口經云口利則知五味其平素不肯服藥今日一飲而盡是不知味而脾敗矣況臏膝乃脾所主脾敗則不能成膿或針之果然清水次日死夏氏子痘後手足發癰面色黧黑精神疲睏飲食且少曰兒痘未得起壯收靨太急今發癰毒仍倒陷歸腎也必不能成膿而死果然一小兒痘後發癰用十全大補湯加連翹銀花治之愈蓋其癰已潰故用是方凡潰癰以是治之無不愈者一小兒痘後發癰用解毒內托散調理而安蔡氏子痘後卵腫曰此厥陰肝病用小柴胡湯加青皮木通楂肉調理而愈費建中曰一兒痘止八十三粒或以輕緩之劑按日期規則投至十六日咸謂收效矣延至二十六日邀視則兩目張皇如臨白刃乾嘔不止愁楚非常陰囊兩旁有小毒桃核大隱於肌肉色且黑暗此餘毒悶焉者也辭勿治是晚即死一兒半周痘甚稀頗紅活惟身熱如火漿後躁亂霎時收斂紅暈焮赤痂甚焦燥腰及環跳發兩癰如掌大硬如石腫如拳又小疔甚夥以必勝湯日兩劑胭脂調化毒丹貼之疔漸退癰亦膿潰以忍冬解毒湯加地丁當歸收效此俗所謂帶火干收也不發癰必死也腫脹徐仲光曰一痘後痂未盡脫遍身黃腫壯熱腹滿漏赤者乃脾胃素有濕熱而兼餘毒不盡也宜消積滲濕解毒以五補散加米仁連翹山梔竹葉防風白朮蒼朮厚朴茯苓一痘後浮腫皮薄而光手按成窟咳渴便澀乃痘後飲食傷脾脾虛不能制水水漬妄行浸漬脾土滲透皮膚故腫耳其喘咳者水妄行不能制火火盛刑金也又曰水氣上行侵肺最為難治其小便澀者由金為火克失其降下之令不能輸化也治宜補中行濕清熱利便之藥以實脾飲五脾散石千散治之一痘後遍身發腫餘毒攻衝也以滿天星草同水楊根銀花馬藺頭各搗汁和勻服滿天星葉如芫荽多生牆下陰濕之處一痘後小便不利腰以下腫乃脾胃氣虛不能制腎水水溢下焦故也當利小便以五苓散間服牡蠣散又六君加澤瀉一痘後遍身赤腫發為赤遊風者乃餘毒不盡解而又恣食煎炒辛熱之物熏蒸腸胃熱與血搏而然宜犀角解毒湯一痘後腮頰赤腫為遁毒風者乃客風蓄於皮膚流注而為頑核赤色也內服解毒湯外敷玉龍散一夏月痘漿足收靨溺赤短澀外腎膚囊赤腫通明乃膀胱熱甚毒氣流於小腸以八正散及化毒湯治之萬密齋治一男子年二十餘痘甚密起發時腫異常面如錫餅形狀可畏喜其飲食如常大小便調安靜而睡或欲投木香散曰痘疹無疾不須服藥色白者痘出太多氣血不能周偏也數日後自收靨矣果然一小兒痘甚密不甚起發面如錫餅食少而渴或欲投木香散曰兒無吐瀉裡虛之症不可用也乃以保元湯加當歸赤芍防風桔梗牛蒡調理而安一婦人年二十四五痘甚密而腫甚身無完膚七八日後眉心唇上有成漿者或謂正當作膿之時曰未也面瘡帶赤猶是血色未曾化水遽爾成膿此惡候也後必潰爛而死果然唐大尹子年十二痘靨後右肩發紅腫非毒也或以針刺之其手遂不能舉視之其手不痛但軟弱無力不能自舉必用左手持之乃能舉此血熱氣虛也蓋肝主筋資血以養寒則縮熱則脹惟補氣養血則愈用參耆朮草芎歸川斷木香桔梗苡仁防風為末山藥糊丸服半月而愈一小兒痘後洗浴面目一身俱腫此水氣也用四君子湯以補脾去濕加黃耆以實表防風以勝肌表之濕麻黃以逐脾間之水一服腫減半再以錢氏異功散加豬苓澤瀉而安倦怠欲臥徐仲光治一痘後煩熱喘脹便溏溺赤嗜臥此暑傷氣分清暑益氣湯而愈一痘便溏食少嗜臥亦脾胃虛也六君子湯加木香棗仁而愈徐仲光治一痘後嗜臥煩熱喘滿溺赤便溏時值長夏脾胃不足之故用清暑益氣湯治凡痘後倦怠嗜臥便溏減食皆由胃虛不能生氣脾虛不能生血運令不行化工失職宜六君子湯加棗仁木香一痘後嗜臥呼之不醒晝夜皆然乃氣虛脾弱清氣不能上升也以五味異功散加歸芍又與歸脾湯愈一痘後炎暑嗜臥怠惰食少口燥咽乾肌膚枯瘁乃脾胃虛元氣弱不能實四肢育肌膚而潤皮毛也況值長夏熱傷元氣以補中益氣湯合生脈散治之萬密齋治一小兒痘後發熱不止食少喜睡又喜黑暗乃毒痘內陷也因問其膿水必清痂皮必薄果然不成膿不結痂但水出皮脫而干曰凡痘初出壯熱昏睡常候也今既收則當邪盡正復熱退食加神爽乃俱不然不可治也後忽昏冒死羸瘦徐仲光曰一痘煩熱口渴能食易化不作肌肉此氣血虛乏心火充甚而乘也經曰火炎上則土燥多食亦飢治而氣血兼補單日服五味異功散加黃連麥冬知母雙日服四物湯亦有治之不應為毒火爍陰津液枯涸而死一能食枯渴肌肉不長精神憔悴脈來沉緩此乃脾胃不足東垣曰胃伏火邪於氣分則能食脾虛則肌肉削又曰脾胃虛寒則元氣不足以補中益氣湯加黃連一能飲食易飢不長肌肉此因胃陽有餘脾陰不足故胃食善消內經曰二陽結謂之消二陽者胃與大腸也以小異功散加黃連白芷治之以瀉二陽之熱也一痘後面白唇赤肌肉羸瘦皮毛枯槁潮熱往來雖食易化乃疳勞之候皆由痘後飲食不節脾胃過傷東垣曰脾胃虛弱則元氣下流陰火上乘其土位治宜健脾為主而兼以清熱之劑則脾土堅固氣血滋生諸症自平以歸芍四物湯加石斛麥冬地骨皮銀花柴胡等劑又六味地黃丸加參朮歸枸杞子五味子間服異功散一痘後面白無精光口氣冷少食羸瘦乃胃氣虛之候以六君子湯治之一痘如前兼以便溏腸漏即用六君加炮薑木香一命門火不能生土而成是症者用六味地黃丸一痘後漸黃瘦面腫身熱肚大吃泥吃米此由痘後飲食傷脾愈而復傷乃脾疳之候也治宜養正而積自除以肥兒丸治之此皆脾陰大傷之候非燥補之藥所能治也
